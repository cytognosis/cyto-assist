name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 5 1,15 * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Nox Test Suite (Python {% raw %}${{ matrix.python-version }}{% endraw %})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          filter: blob:none
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "{% raw %}${{ matrix.python-version }}{% endraw %}"
          cache-dependency-glob: pyproject.toml

      - name: Initialize project
        run: uvx nox -s init_project

      - name: Run tests via Nox
        run: uvx nox -s test --python "{% raw %}${{ matrix.python-version }}{% endraw %}"

  check:
    name: Tests pass in all environments
    if: always()
    needs:
      - test
    runs-on: ubuntu-latest
    steps:
        - uses: re-actors/alls-green@release/v1
          with:
            jobs: {% raw %}${{ toJSON(needs) }}{% endraw %}
