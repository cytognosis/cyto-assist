## Evaluation Criteria
# From the main residency page (astera.org/residency/):
criteria:
  - "Mission alignment with Astera's vision for open science and public goods"
  - "Technical ambition and feasibility"
  - "Team capability and track record"
  - "Clear 12-18 month deliverables"
  - "Open science commitment"
  - "Why not academia/government/industry — structural justification"

## Open Science Expectations
# "We expect residents to publish openly and often, producing accessible outputs and
#  sharing learnings — including what didn't work — so others can build on the full
#  arc of the work. That said, we recognize that some projects have future commercial
#  potential, and we're happy to work through any tensions between openness and those
#  interests during the application process."

## Cytognosis Pitch Angle
# Full analysis: materials/contents/grants/astera/astera-institute-reference.md
#
# PRIMARY Track: Life Sciences and Open Science
# Align with: "New technologies, workflows, or platforms for generation of
#  multidimensional, information-rich, AI-ready missing data in life science"
# Leverage: Open science commitment, FRO model justification, continuous spectrum mapping
#
# SECONDARY Track: Neuroscience and Artificial Intelligence
# Align with: "Representation/structure learning for causal inference" and
#  "Computational frameworks for analyzing and interpreting large-scale datasets"
# Leverage: Cytoverse as causal health coordinate system, Cytonome on-device AI
#
# KEY DIFFERENTIATOR: Both Astera and Cytognosis are 501(c)(3) foundations
# building open public goods. Cytognosis's Apache 2.0/CC BY 4.0 licensing
# directly matches Astera's open science policy. South San Francisco location
# makes in-person Emeryville requirement trivial.
#
# NOTE: Astera's 2025-2026 strategic shift to neuroscience/neuro-AI makes
# dual-track application stronger. Frame Cytoverse's continuous biological
# axes as "representation learning for causal inference" in health.
