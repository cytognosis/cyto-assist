## Tracks (select one or more)
tracks:
  - id: neuro-ai
    label: "Neuroscience and Artificial Intelligence"
    description: "Ambitious projects at the interface of neuroscience and AI — deepen understanding of the biological brain, enable more powerful/robust/interpretable artificial systems"
    examples:
      - "Mathematical frameworks for learning beyond gradient descent"
      - "Computational frameworks for large-scale neuroscience datasets"
      - "Representation/structure learning for causal inference"
      - "Bottom-up brain modeling grounded in connectomics"
      - "Neurally inspired models of perception or intelligence"
      - "New techniques for measuring/manipulating neural circuits at scale"
      - "Cross-disciplinary efforts linking neural mechanisms and ML architectures"
  - id: life-sciences
