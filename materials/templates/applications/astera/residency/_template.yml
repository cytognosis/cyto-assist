### Section 2: Residency Application Questions
section_instructions: "All questions other than the first two have a 1000-character limit. If you don't know the answer to a question or it doesn't seem applicable to your circumstances, say that. Aim for clear, concise answers – bullet points are fine."

fields:
  - id: track_selection
    title: "To what track(s) are you applying?"
    type: multi_select
    options: ["Neuroscience and Artificial Intelligence", "Life Sciences and Open Science", "Other"]
    required: true
    note: "Review the JD for details of specific interest within each track."

  - id: video
    title: "Video: Who you are and what you are building"
    type: file
    required: true
    constraints:
      max_duration: "2 minutes"
    note: "Simple shot with the team, no additional production needed."

  - id: project_summary
    title: "Describe what you intend to create during your residency in 2 sentences or less"
    type: long_text
    required: true
    constraints:
      max_characters: 300
    maps_to_framework: "heilmeier_q1"
    shared_question_group: "problem_gap_innovation"

  - id: technical_approach
    title: "Technically speaking, how will you achieve this? What steps, tools, and resources are required?"
    type: long_text
    required: true
    constraints:
      max_characters: 1000
    maps_to_framework: "heilmeier_q3"
    shared_question_group: "technical_approach"

  - id: team_fit
    title: "Why are you the right person/team to work on this project?"
    type: long_text
    required: true
    constraints:
      max_characters: 1000
    shared_question_group: "team_capability"

  - id: conviction
    title: "How did you develop conviction that this project is worth your effort? How much progress have you made?"
    type: long_text
    required: true
    constraints:
      max_characters: 1000
    shared_question_group: "conviction_progress"

  - id: users
    title: "Who do you envision using your residency's outputs, and how?"
    type: long_text
    required: true
    constraints:
      max_characters: 1000
    maps_to_framework: "heilmeier_q4"
    shared_question_group: "impact_who_cares"

  - id: why_astera
    title: "Why is the Astera residency the right fit for this work? Why isn't this problem likely to be adequately addressed (at this stage) by academia, government, or industry?"
    type: long_text
    required: true
    constraints:
      max_characters: 1000
    maps_to_framework: "fro_justification"
    shared_question_group: "why_fro_not_startup"

  - id: scope
    title: "Which parts of your vision are in scope for a 12-18 month residency, and which are intentionally out of scope?"
    type: long_text
    required: true
    constraints:
      max_characters: 1000
    shared_question_group: "scope_milestones"

  - id: open_science
    title: "How do you plan to approach producing open, public-domain outputs during the residency, and what considerations or tradeoffs do you anticipate?"
    type: long_text
    required: true
    constraints:
      max_characters: 1000
    maps_to_framework: "openness_commitment"
    shared_question_group: "openness"

  - id: saved_responses
    title: "Have you saved a copy of your responses elsewhere to refer back to if you move forward?"
    type: select
    options: ["Yes"]
    required: false

