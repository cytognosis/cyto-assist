    label: "Other"
    description: "Projects that don't fit neatly into above tracks but align with Astera's mission"

## Application Process
stages:
  - stage: 1
    name: "Initial Application"
    description: "Basic info + 2-min video + 8 questions (≤1000 chars each)"
  - stage: 2
    name: "Introductory Conversation"
    description: "15-25 minute call with Astera team"
  - stage: 3
    name: "Detailed Project Proposal"
