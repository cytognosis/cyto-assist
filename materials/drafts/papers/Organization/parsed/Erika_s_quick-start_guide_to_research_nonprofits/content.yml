content:
  sections: "[\n  {\n    \"name\": \"DEC 07, 2023\",\n    \"text\": \"3\\n4\\nSha\\nWhen I came to the end of my PhD, I was\
    \ offered a black and white choice: academ\\nor industry. It\\u2019s a false dichotomy. The reality is that there are\
    \ many different shape\\nand sizes of scientific projects, and they don\\u2019t all fit into the academia OR the indus\\\
    nbox. There\\u2019s a burgeoning world out there of people creating a richer ecosystem of\\nniches in which science can\
    \ thrive.\"\n  },\n  {\n    \"name\": \"ERIKA ALDEN DEBENEDICTIS\",\n    \"text\": \"59\"\n  },\n  {\n    \"name\": \"\
    Introduction\",\n    \"text\": \"\"\n  },\n  {\n    \"name\": \"/28/25, 11:58 PM\",\n    \"text\": \"Erika's quick-start\
    \ guide to research nonprofits\\nhttps://erikaaldendeb.substack.com/p/erikas-quick-start-guide-to-research\\n1/19\\n\\\
    nThere are many research projects that are not supported by the current ecosystem\\nIndeed, the science ecosystem prematurely\
    \ converged on a relatively small number\\nmechanisms for funding, organizing, and incentivizing research. Some mainstays\
    \ o\\nscientific research today include: use of peer review to evaluate proposals/outputs a\\nallocation of small grants\
    \ to professors at a university for the purpose of supporting\\ntheir trainees.\\nWant to lead a team of experienced mid-career\
    \ folks rather than trainees? Toug\\n\\u2014 if they\\u2019re not willing to have a postdoc salary you\\u2019re pretty\
    \ much out of luck!\"\n  },\n  {\n    \"name\": \"/28/25, 11:58 PM\",\n    \"text\": \"Erika's quick-start guide to research\
    \ nonprofits\\nhttps://erikaaldendeb.substack.com/p/erikas-quick-start-guide-to-research\\n2/19\\n\\nWould the scientific\
    \ ecosystem be improved by a new benchmark or standard t\\nyou know how to develop? If it doesn\\u2019t make a profit\
    \ or generate high-impact\\npeer-reviewed publications, no-can-do.\\nFortunately, philanthropists are increasingly partnering\
    \ with independent research\\nnon-profits to more fully explore the space of possible institutional structures.\\nResearch\
    \ non-profits can be designed to fit the given scientific goal, rather than th\\nother way around: designing a project\
    \ to fit in the \\u2018academia\\u2019 or \\u2018industry\\u2019 box.\\nThis post is a brief guide to starting a nonprofit\
    \ research organization outside of\\nacademia that is philanthropically funded. There is nothing magic about the\\nresources\
    \ offered by academia. The mechanics of setting up a nonprofit research\\norganization are very straightforward. Philanthropic\
    \ fundraising can be challenging\\nbut IMO it\\u2019s a lot easier than writing an R01.\\nThere is nothing magic about\
    \ the resources offered by academia.\\nDisclaimer: I\\u2019m not a lawyer and this isn\\u2019t designed to be comprehensive.\
    \ These are\\nhot takes + first person experience from starting Align Bio. I\\u2019ve raised $10M+ in\\nphilanthropic\
    \ funding outside of academia for Align. I also run an academic lab at t\\nFrancis Crick Institute.\\nTo get started,\
    \ usually you write a \\u2018two-pager\\u2019 about what you want to do. Start\\nemailing it around to see who might be\
    \ interested in helping you. Help can take ma\\nforms: feedback on your pitch, ongoing mentorship and advice, and most\
    \ important\\nwarm introductions to other people and to potential funders.\\nHow to get started - write a \\u201ctwo-pager\\\
    u201d\"\n  },\n  {\n    \"name\": \"/28/25, 11:58 PM\",\n    \"text\": \"Erika's quick-start guide to research nonprofits\\\
    nhttps://erikaaldendeb.substack.com/p/erikas-quick-start-guide-to-research\\n3/19\\n\\nIs there a format for your two-pager?\
    \ Nope! Unlike writing an academic grant, the\\ntwo-pager is just a short PDF that you can attach to an email that gives\
    \ the person\\nyou\\u2019re talking to additional background about what you\\u2019re doing and a way to\\nremember you.\
    \ (This type of document is called different things in different\\ndisciplines, when you\\u2019re lobbying on the Hill,\
    \ it\\u2019s called a \\u201cleave-behind,\\u201d for academ\\nfunders it\\u2019s sort of equivalent to a Letter Of Intent,\
    \ or LOI.)\\nTwo-pagers don\\u2019t literally need to be two-pages. I like to structure them in sort of a\\nscale-invariant\
    \ way. A two-pager is a document that makes sense if you read just t\\nfirst paragraph, the first page, the first two\
    \ pages, the first four pages, or the whol\\nthing. Make sure there\\u2019s a good diagram on the first page. I usually\
    \ include the \\u2018deta\\nin a \\u2018technical appendix\\u2019 on pages 3+ for folks who actually are curious. Here\\\
    u2019s an\\nexample \\u2018two-pager\\u2019 that I used to fundraise for Align\\u2019s Open Dataset Initiative.\\nThe\
    \ social network of people who do science and people who do philanthropy is ver\\ndensely connected. You are probably\
    \ a lot fewer than six degrees separated from you\\nfuture funder!\\nStart by reaching out to anyone and everyone who\
    \ seems like they might be able to\\npoint you in the right direction. A good place to start is by looking at the research\\\
    nnonprofit founder community, especially people who are already executing on proje\\nwith similar themes to what you want\
    \ to do.\\nHere\\u2019s a list of organizations that fall in-between \\u201cacademia\\u201d and \\u201cindustry\\u201d.\
    \ All of\\nthese organizations are experiments in new institutional models for doing scientific\\nprojects. Check out\
    \ their websites and find people to email. If you're squeamish abo\\ncold-emailing, get over it, and/or use linkedin to\
    \ engineer warm intros for yourself t\\npeople at these organizations.\\nHow to get connected\"\n  },\n  {\n    \"name\"\
    : \"/28/25, 11:58 PM\",\n    \"text\": \"Erika's quick-start guide to research nonprofits\\nhttps://erikaaldendeb.substack.com/p/erikas-quick-start-guide-to-research\\\
    n4/19\\n\\nConvergent. Convergent specializes in the Focused Research Organization mod\\nfor large, time-bound research\
    \ projects.\\nSpecTech. Another nonprofit aiming to run ARPA-like research programs.\\nAlign Bio. This is my nonprofit!\
    \ We give grants and run programs focused on th\\nthemes of automation, data, and reproducibility in life science.\\nFuture\
    \ House. An independent nonprofit research institute focused on building\\nan AI scientist.\\nArc Institute. A independent\
    \ nonprofit research institute focused on biomedici\\nArcadia. A for-profit, \\u201crun-by-scientists\\u201d incubator,\
    \ technically grounded in\\nworking with microbes.\\nHomeworld Collective. A nonprofit running experiments in new funding\\\
    nstructures for climate science.\\nAnd others! See also arbesman.net/overedge/\\nSend an email with your two-pager attached\
    \ and ask for a zoom call. Every time you\\ntalk to a new person make sure to ask them who else they think you should\
    \ talk to, a\\nwhether or not they would be able to give a warm intro. Use these calls as an\\nopportunity to iterate\
    \ on your pitch. We\\u2019re all very friendly, and can help route you\\nthe right direction.\\nIn addition to asking\
    \ people to route you organically, you can also do your own\\nresearch and identify philanthropists you want to talk to.\
    \ You can also check out th\\nlist of people who have signed The Giving Pledge (a commitment billionaires sign t\\ngive\
    \ away their wealth during their lifetime) and identify people who have a history\\nbeing interested in relevant causes.\
    \ Again, you can try to use linkedin to find a path\\nbetween you and people you want to talk to. In my experience this\
    \ strategy is less\\nfruitful than allowing people to point you in the right direction organically.\\nHow to fundraise\"\
    \n  },\n  {\n    \"name\": \"/28/25, 11:58 PM\",\n    \"text\": \"Erika's quick-start guide to research nonprofits\\nhttps://erikaaldendeb.substack.com/p/erikas-quick-start-guide-to-research\\\
    n5/19\\n\\nYou need to be shameless about asking for intros and articulate about what you\\u2019re\\ntrying to do. You\
    \ need to talk to a lot of people and listen very carefully to what they\\ncare about. It\\u2019s a similar grind to raising\
    \ VC money, but with a different target\\naudience.\\nYou will need to fundraise for longer than you think and talk to\
    \ way more people\\nthan you expect. Finding the right philanthropist is about talking to a lot of people\\nlistening\
    \ very carefully to what they care about, and describing what the project you\\nwant to do would look like in partnership\
    \ with them. There are a lot of good reason\\ndo science! Listen very carefully and tailor your pitch to suit the taste\
    \ of the person\\nyou\\u2019re talking to. These are cool people who care about science and want to help!\\nIf they\\\
    u2019re serious, often they will ask you to send them something more detailed tha\\nyour \\u2018two-pager\\u2019. Some\
    \ philanthropists may have formats for the proposal at this po\\nand/or a structured review process, others may just show\
    \ your two-pager as-is to\\ntechnical experts they trust for a second opinion. Usually the first indication that a\\nphilanthropist\
    \ is going to fund you is they start coaching you about how to get\\nthrough their due diligence process. Other times\
    \ you may not have a ton of indicat\\nof what's going on, you may pitch to someone and then receive money months later\\\
    nwith no contact in between. If you want to know what to expect you can ask around\\nother grantees to learn what\\u2019s\
    \ typical for a particular philanthropist.\\nAll together, you probably aren\\u2019t going to write anywhere near as much\
    \ paperwork\\nget funded as you would for an equivalently-sized academic grant. Your goal is to\\nconvince just ONE specific\
    \ person, not a panel of anonymous reviewers, and the tas\\nis understanding them and appealing to them.\\nKeep in mind\
    \ that there is a lot of science philanthropy. In the US alone,\\nphilanthropists fund $30B of research/year. High net-worth\
    \ individuals sometimes g\\nmoney directly, other times they may donate through their own foundation, or throu\\nPhilanthropy\
    \ is about relationships, not paperwork\"\n  },\n  {\n    \"name\": \"/28/25, 11:58 PM\",\n    \"text\": \"Erika's quick-start\
    \ guide to research nonprofits\\nhttps://erikaaldendeb.substack.com/p/erikas-quick-start-guide-to-research\\n6/19\\n\\\
    nfoundations that route donations from many donors. You may not end up talking\\ndirectly to \\u201cthe philanthropist,\\\
    u201d but rather to someone running their philanthropic\\nfoundation who they trust to vet philanthropic opportunities\
    \ for them.\\nWhen I explain that my research projects are philanthropically funded, people often\\nask, \\u201cbut what\
    \ does the philanthropist get out of it?\\u201d\\nIt used to be that rich people would spend their money to buy some fancy\
    \ purple clo\\nto make a fabulous cape, or some spices to make hot chocolate. We now have wealth\\npeople who are so rich\
    \ that the only thing worth buying is paying someone $100M t\\nsend a spacecraft to the nearest star. Science is the new\
    \ luxury good. Much like\\ncommissioning art, science philanthropy gives philanthropists the opportunity to\\nmake research\
    \ projects happen that might not be funded any other way. It also give\\nthem a unique lever to change the world by accelerating\
    \ basic research on issues th\\ncare about like climate, health, space, etc.\\nScience is a luxury good that appeals to\
    \ people who are already financially successfu\\nin traditional ways and still want to change the world. Philanthropists\
    \ are themselve\\noften really interesting, talented, cool people.\\nThis is very different to venture capital money.\
    \ In venture, the person giving you\\nmoney has a legal responsibility to make a return on investment. They literally\
    \ CAN\\ngive you money if they don\\u2019t in good faith think you are a good investment (they cou\\nbe sued). Philanthropy\
    \ is uniquely capable of funding certain types of projects. Th\\npart of why it\\u2019s special and philanthropists like\
    \ to do it.\\nThe entire point is that they don\\u2019t need to get anything material out of it.\\nBut how does philanthropy\
    \ work??? What do they get ou\\nof it?\\nWhat is the ongoing relationship with the philanthropist?\"\n  },\n  {\n    \"\
    name\": \"/28/25, 11:58 PM\",\n    \"text\": \"Erika's quick-start guide to research nonprofits\\nhttps://erikaaldendeb.substack.com/p/erikas-quick-start-guide-to-research\\\
    n7/19\\n\\nOnce you find someone who wants to fund you there are two different ways they ca\\ngive you money: gifts, and\
    \ grants.\\nA gift is a no-strings-attached donation. They give you the money, and it\\u2019s up t\\nyou to spend it.\
    \ A gift just requires that you give them details to wire money to\\nyour nonprofit\\u2019s bank account (see next section).\\\
    nA grant is slightly more hands-on. Grant payments are sometimes traunched o\\nmeeting milestones, much like DARPA grants.\
    \ (\\u201cTraunched\\u201d means broken int\\ndifferent \\u201cchunks\\u201d of funding, so you might traunch a $2M grant\
    \ into four $500\\nchunks, each successively unlocked by milestones.) A grant will usually have a\\ngrant agreement that\
    \ is signed between the two parties outlining what the\\npayment schedule and milestones are. Once signed, you also give\
    \ them bank\\ndetails (see next section).\\nWhether it\\u2019s a gift or a grant, different philanthropists may have different\
    \ expectati\\nabout how much you will interact with them. The philanthropists I\\u2019ve worked with\\nseem to be quite\
    \ hands-off. If I have a question, want an intro, or need advice I can\\nalways reach out and they\\u2019re super helpful,\
    \ but otherwise they don\\u2019t seem to expect\\nton of contact. Your mileage may vary.\\nCongratulations, you found\
    \ someone to give you money! Next step: what bank detai\\ndo you give them? Literally, where do you PUT the money?\\n(In\
    \ this quickstart, I\\u2019m going to assume that you have a research program idea that\\ndoesn\\u2019t fit into academia\
    \ OR industry OR one of the existing nonprofit research scie\\ninstitutions listed in the \\u201cgetting connected\\u201d\
    \ section. Conversely, if your idea does fi\\nit\\u2019s well worth just using an existing institution and not reinventing\
    \ the wheel. For\\nexample, if you want to do a project that fits in the \\u201c$50M over 5 years\\u201d bucket, it\\\
    u2019s\\nvery worth talking to Convergent.)\\nHow to get a bank account\"\n  },\n  {\n    \"name\": \"/28/25, 11:58 PM\"\
    ,\n    \"text\": \"Erika's quick-start guide to research nonprofits\\nhttps://erikaaldendeb.substack.com/p/erikas-quick-start-guide-to-research\\\
    n8/19\\n\\nAll you really need to get started is a bank account and someone to file the tax\\npaperwork for your nonprofit.\
    \ Fortunately, there\\u2019s a name for a nonprofit that does\\nexactly this for other nonprofits: a fiscal sponsor!\\\
    nHaven\\u2019t heard of a \\u2018fiscal sponsor\\u2019 before? Sure you have! Universities are fiscal\\nsponsors for all\
    \ the academic labs within them. Rather than have every separate\\nacademic lab spin up its own incorporated nonprofit,\
    \ file its own taxes, and have its\\nown bank account, the university is just a single umbrella nonprofit that does tax\\\
    npaperwork and accounting for all the labs within it. Fiscal sponsors act just like\\nuniversities: you can come to them\
    \ with gift or grant money, open an account, and\\nthey\\u2019ll take care of the paperwork on the back end for you.\\\
    nLike Universities, fiscal sponsors usually charge \\u2018overhead\\u2019 to pay for the\\nadministrative services they\
    \ offer. Unlike universities, fiscal sponsors charge WAY\\nless. Universities often have overhead rates of 50% or even\
    \ 100%, while fiscal sponso\\nare more like 10%.\\nYou should shop around for a fiscal sponsor who is experienced with\
    \ sponsoring\\nprojects of the type/scale/needs that you have. I\\u2019ve worked with The Federation of\\nAmerican Scientists.\
    \ Another couple to check out are Rethink Charity, PFF, and\\nTides.\\nEvery fiscal sponsor is a little bit different.\
    \ Some, like Rethink, require that you sub\\na budget upfront that needs to be approved by their board. Once approved,\
    \ you have\\nvery little leeway in updating the budget (i.e., you need to spend only on the things t\\nyou said you would\
    \ spend on). Others, like PPF, are more flexible but require that yo\\nsubmit documentation for each distribution that\
    \ you request and get their approval\\ncontracts. The fiscal sponsor will take care of the compliance and filing taxes.\
    \ Your\\norganization will be responsible for signing all contracts, hiring employees, managi\\npayroll, etc (see \\u201chow\
    \ to spend money\\u201d section below).\\nEasy mode: get a fiscal sponsor\"\n  },\n  {\n    \"name\": \"/28/25, 11:58\
    \ PM\",\n    \"text\": \"Erika's quick-start guide to research nonprofits\\nhttps://erikaaldendeb.substack.com/p/erikas-quick-start-guide-to-research\\\
    n9/19\\n\\nThere\\u2019s lots of different fiscal sponsors and they\\u2019ll all be set up for different sorts\\nprojects.\
    \ They\\u2019ll often have an \\u2018application\\u2019 on their website that you can fill out to\\nchat with them. If\
    \ they\\u2019re not the right fit they can usually point you in the right\\ndirection.\\nIf you want something more bespoke\
    \ you can go straight to incorporating a dedicat\\nnonprofit.\\nHow to do this? You can file the paperwork on your own\
    \ if you want, but most peop\\nknow just email Kitty Bickford (support[at]taxexempt501c3.com) and have her do it\\nyou.\
    \ She\\u2019ll send you a brief questionnaire and help you work through issues like \\u201cbu\\nthe name I wanted isn\\\
    u2019t available in the state I wanted\\u201d. She\\u2019ll do all the paperwork\\nyou. It costs about $1,600 to set up\
    \ a non-profit through Kitty, total.\\nIn order to create a new nonprofit you need just a couple things including:\\nA\
    \ name\\nAt least three board members (who are not related to one another).\\u00a0More\\nsuggestions for picking board\
    \ members here.\\nA mission statement. The board members will be legally obligated to uphold th\\nmission of the nonprofit.\
    \ You can create a mission statement by telling Kitty w\\nsorts of activities your nonprofit will do, and she will help\
    \ you translate it into\\nstandard nonprofit lingo.\\nIf you know the name and board members you can file paperwork essentially\\\
    nimmediately. What takes longer is getting your \\u2018determination letter\\u2019 from the IRS.\\nThis is the letter\
    \ that gives an official \\u201cnonprofit\\u201d stamp on your organization, and\\nthus be eligible to receive nonprofit\
    \ donations. If left to their own devices, it takes 7\\n10 months for the IRS to get around to issuing your determination\
    \ letter. Howeve\\nonce you have money actually lined up you can ask to expedite this timeline, which\\nSlightly more\
    \ sophisticated: set up your own nonprofit\"\n  },\n  {\n    \"name\": \"/28/25, 11:58 PM\",\n    \"text\": \"Erika's\
    \ quick-start guide to research nonprofits\\nhttps://erikaaldendeb.substack.com/p/erikas-quick-start-guide-to-research\\\
    n10/19\\n\\nreduce the wait to ~2 months or less. It usually helps to file the expedition request a\\nthen call the IRS\
    \ every few weeks until they send you the letter.\\nYou will also need to file your Charitable Registration in each state\
    \ where you are\\nreceiving funds before receiving funds. Kitty can help you do this, or companies like\\nHarbor Compliance\
    \ or Labyrinth offer services to manage your Charitable\\nRegistration and Annual Renewals for you.\\nOnce set up, your\
    \ new shiny nonprofit will need to hold a board meeting at least on\\na year, and will need to file taxes. Kitty will\
    \ provide you with how-to documents for\\neverything from taking minutes at the Board meeting to recognizing scam snail\
    \ ma\\nthat your nonprofit will receive. Kitty can file taxes for you yearly, expect it to cost $\\n3k/year.\\nAs a person\
    \ extremely allergic to paperwork of all forms, I absolutely wanted to skip\\nthis entire process and go for the fiscal\
    \ sponsor route! Indeed, what would ever poss\\nsomeone to set up a dedicated nonprofit?! The answer is that you may eventually\\\
    noutgrow your fiscal sponsor and need a dedicated nonprofit. Because the fiscal\\nsponsor hosts other projects, they sometimes\
    \ can\\u2019t do things like, say, enter into\\nexclusive contracts with other corporations. You also may want to isolate\
    \ legal liabi\\nto just your project. Fiscal sponsors (understandably) tend to be pretty conservative\\nabout the sorts\
    \ of contracts they sign.\\nCongrats - you now have money in the bank! Now how do you spend it?\\nThis is where we get\
    \ into \\u201cops\\u201d. As a person coming from academia, I didn\\u2019t even\\nknow what \\u201cops\\u201d is. Ops\
    \ is short for operations, and basically refers to all the nitty-\\ngritty stuff that needs to get done to make an organization\
    \ go, like managing the ba\\naccount, filing taxes, paying people, making sure the people have healthcare, and\\nprocessing\
    \ reimbursements.\\nHow to spend money\"\n  },\n  {\n    \"name\": \"/28/25, 11:58 PM\",\n    \"text\": \"Erika's quick-start\
    \ guide to research nonprofits\\nhttps://erikaaldendeb.substack.com/p/erikas-quick-start-guide-to-research\\n11/19\\n\\\
    nOps is a lot of work, but fortunately if you have a small nonprofit you can outsourc\\nall of your ops pretty easily.\\\
    u00a0 If you have a fiscal sponsor, they may take care of som\\nthis for you.\\nHere\\u2019s a basic set of outsourcing\
    \ I\\u2019d recommend:\\nMission First Ops. They\\u2019re excellent. They will take care of many of the mechanics\\nmaking\
    \ a functional nonprofit, and also provide good support, advice, and\\nconnections. They are very reasonably priced and\
    \ vastly less expensive than hiring a\\nops person. Mission First has also worked with quite a few of the recent nonprofits\\\
    nfor-science, so they know what\\u2019s up. As a sampling of the things Mission First will d\\nfor you:\\nMission First\
    \ will register in every state where you employ someone (for tax and\\nwithholding purposes).\\nIf you are not already\
    \ using Kitty Bickford to file your yearly taxes, Mission Firs\\ncan connect you to an accountant. Expect a tax accountant\
    \ to cost $2-$3k/year.\\nMission First can connect you to NFP, a broker who can provide you with\\nbusiness insurance.\
    \ Expect business insurance to cost $2.5-$4k/year.\\nIf you want to get healthcare for employees, Mission First will connect\
    \ you to a\\nbenefits consultant who can help you find plans/coverage options.\\nMission First can refer you to a lawyer\
    \ who you can keep on hand to draft\\ncontracts, review contracts, ask compliance questions, etc.\\nQuickbooks. Obviously.\
    \ We use this for accounting, it makes it very easy to file taxe\\nand clicks in effortlessly with\\u2026\\nRamp. Ramp\
    \ is a really slick tool to use for giving people corporate credit cards and\\nhandling receipts. You can forward receipts\
    \ via email to a ramp email address, and\\nthey will get automatically attached to the corresponding credit card charges.\
    \ They\"\n  },\n  {\n    \"name\": \"/28/25, 11:58 PM\",\n    \"text\": \"Erika's quick-start guide to research nonprofits\\\
    nhttps://erikaaldendeb.substack.com/p/erikas-quick-start-guide-to-research\\n12/19\\n\\nalso have an app where you can\
    \ just take a picture of the receipt. It all hooks into\\nquickbooks so that it\\u2019s easy for Mission First to file\
    \ your taxes.\\nGusto. We use them for payroll, again through Mission First.\\nVelocity Global. When you are first getting\
    \ set up, it can be difficult to get all of the\\nbenefits in place when you have only one or two employees and no company\
    \ history\\nVelocity Global is a professional employer organization (PEO) that can hire your\\nemployees for you. They\
    \ can also help you hire people internationally. My nonprofit\\n(Align) is unusual because we have employees in three\
    \ different countries, despite o\\nhaving five employees! Velocity Global is how we employ people outside of the US.\\\
    nyou want to make an offer to someone international, just give Velocity Global the\\nheads up, and a few weeks later they\
    \ will have spun up all the legal stuff necessary t\\nemploy someone internationally with benefits. Note that employing\
    \ someone\\ninternationally does add a bit to the cost.\\nOutsourcing ops tends to be a great idea for small organizations.\
    \ If your organizatio\\ngrows to the size or complexity that you feel the need to hire a dedicated lab manag\\nor HR person,\
    \ it\\u2019s probably time to start doing your own ops in-house.\\nNow that everything\\u2019s set up, it\\u2019s time\
    \ to work! In order to get things done, you need\\nbe able to hire people, either part-time as contractors or full-time\
    \ as employees.\\nLet\\u2019s start with contractors. Setting up a consulting contract is a nice way to formal\\nengage\
    \ someone to do a small amount of work for you. To do this, you want to write\\nstatement of work (here\\u2019s an example\
    \ statement of work), which outlines the scope\\nwhat this person will be doing. Sync with your lawyer to generate a contract\
    \ that\\nincorporates this statement of work and how much they\\u2019ll be paid. Both of you sign\\nthe contract. When\
    \ they\\u2019ve done their work they can submit an invoice (here\\u2019s an\\nexample invoice template), which you can\
    \ then use to pay them through gusto.\\nHow to hire people\"\n  },\n  {\n    \"name\": \"/28/25, 11:58 PM\",\n    \"text\"\
    : \"Erika's quick-start guide to research nonprofits\\nhttps://erikaaldendeb.substack.com/p/erikas-quick-start-guide-to-research\\\
    n13/19\\n\\nIf you want to hire someone, you begin by writing a job description. Here\\u2019s an exam\\nof a job description.\
    \ To get the word out, make a PDF of the job description, put it o\\nyour website, send it to your friends, post it on\
    \ linkedin, post on twitter, and hit up\\nrelevant mailing lists/communities. (In my experience, posting on linkedin is\
    \ valuab\\nbut using their job advertisement feature seems to mostly generate spam\\napplications.)\\nNonprofits are required\
    \ to justify the salaries they pay employees by benchmarkin\\nagainst equivalent roles in other organizations. To pull\
    \ salary data, you need to go\\na website like Option Impact to find \\u2018comps,\\u2019 or comparable salary data. (Note\
    \ that\\ngetting access to salary data through Option Impact is pretty expensive, but there a\\ncheaper options like glassdoor.)\
    \ So for example, if you\\u2019re looking to hire a Project\\nManager, you can look for project managers in your same\
    \ technical field in the\\ngeographic area you\\u2019re looking at, and filter by organizations that are roughly the sa\\\
    nsize. This will give you a sense for roughly what you should be paying people. If you\\nplan to use industry-esque salaries\
    \ in biotech, Petri has a great reference for biotech\\ncompensation.\\nIf you discover you need to hire someone who has\
    \ very specific expertise and comes\\nfrom an especially well-compensated discipline (like, say, machine learning), you\
    \ ca\\nask to get a copy of their previous contract and/or find other comparable salary\\ninformation for their more specific\
    \ role, which will allow you to justify a higher sala\\nKeep in mind that employees cost you more than you pay them. A\
    \ good rule of thum\\nthat benefits for an employee cost about 30-35% of their base salary.\\nOnce you agree on a salary,\
    \ a start date, and a job description you\\u2019re all set to hire th\\nperson. You will also want to keep notes from\
    \ interviewing candidates and checking\"\n  },\n  {\n    \"name\": \"references on file\",\n    \"text\": \"How to get\
    \ lab space\"\n  },\n  {\n    \"name\": \"/28/25, 11:58 PM\",\n    \"text\": \"Erika's quick-start guide to research nonprofits\\\
    nhttps://erikaaldendeb.substack.com/p/erikas-quick-start-guide-to-research\\n14/19\\n\\nAlign doesn\\u2019t do bench work\
    \ at all (we do cloud science \\ud83d\\ude1b), but many people who d\\nresearch may need access to facilities. In general,\
    \ it seems like the usual rent-a-ben\\necosystem for startups is pretty friendly to research nonprofits. In the Bay Area\
    \ yo\\ncan rent a bench with access to standard shared wet lab equipment for about\\n$2k/bench/month at places like MBC\
    \ Biolabs, BADASS Labs, Bakar Hall, or numero\\nother incubator spaces. These places create a very, very easy way to get\
    \ started. The\\nare completely turnkey.\\nIf you grow beyond 10 or 20 bench scientists, it will become more economical\
    \ to lea\\nyour own dedicated lab space. To get a sense of order of magnitude, the price for bu\\nout lab space in the\
    \ Bay area is about $5/sqft/month. 5,000 sqft is about the right\\namount of space for ~10 people. So if you have a research\
    \ nonprofit with 20 scientis\\nyou may be paying (ballpark) about $0.5M/year to lease space.\\nIP is pretty simple and\
    \ similar to the University model. The University/your nonpro\\nis a nonprofit entity that holds an IP portfolio generated\
    \ by employees. When a\\npostdoc/an employee of your nonprofit wants to start a company, they license the IP\\nfrom the\
    \ nonprofit.\\nAt a university, IP licensing decisions are made by a bunch of patent attorneys who\\ntrying (and pretty\
    \ much always failing) to make the university\\u2019s IP portfolio net\\npositive. At your nonprofit, IP decisions are\
    \ in the hands of the Board, who are lega\\nobligated to uphold the mission of the nonprofit (that you set). If the mission\
    \ is to\\n\\u201cchange the world with X technology\\u201d, then the Board needs to make the best decis\\nfor making that\
    \ happen. Sometimes that might be licensing technology to a for-pro\\nthat can make it scale, other times, it might be\
    \ to open source the IP. The key is tha\\nwhen the nonprofit is founded you get to write down what the goal is that will\
    \ driv\\nIP decision making.\\nHow to manage IP and spinouts\"\n  },\n  {\n    \"name\": \"/28/25, 11:58 PM\",\n    \"\
    text\": \"Erika's quick-start guide to research nonprofits\\nhttps://erikaaldendeb.substack.com/p/erikas-quick-start-guide-to-research\\\
    n15/19\\n\\nIn all cases, when IP generated by a nonprofit is licensed it needs to be done at \\u2018fa\\nmarket value\\\
    u2019. This is an IRS term that is designed to prevent for-profit companies\\nfrom just separating their entire research\
    \ arm into a nonprofit, doing research with\\ntax-free dollars, and then giving the results straight back to their for-profit\
    \ for free.\\nThese considerations apply not just to IP but to other things with economic value b\\nwith the nonprofit\
    \ money.\\nSo tldr: yes, you can do research at a nonprofit and then later spin out a for-profit,\\nand the necessary\
    \ licensing needs to be done at fair market value.\\nThat\\u2019s it! You now have a functional nonprofit that can employ\
    \ people and make thi\\nhappen!\\nNow you\\u2019re in the same boat as every other academic lab and startup company: you\\\
    nhave a fixed amount of money in the bank that dictates how long you can operate\\nbefore you need to fundraise again.\
    \ It is useful to have a spreadsheet handy to keep\\ntrack of how much runway you have, and how that number is modified\
    \ if you choos\\nhire an additional person.\\nDifferent research nonprofits have different visions for the long-term.\
    \ Some examp\\nYou might be aiming to execute a project that will be completed in a fixed amo\\nof time and then dissolve\
    \ (like, say, a political campaign, or a Focused Research\\nOrganization).\\nYou might be creating a research nonprofit\
    \ with the intention of building it ou\\ninto a research institution that will exist in perpetuity (like the Arc Institute,\
    \ or\\nthe Broad). In this scenario you should have a plan for when you are going to w\\ngrants, raise more philanthropic\
    \ money, and/or raise an endowment before you\\nrunway ends.\\nWhat\\u2019s the endgame? Computing runway\"\n  },\n  {\n\
    \    \"name\": \"/28/25, 11:58 PM\",\n    \"text\": \"Erika's quick-start guide to research nonprofits\\nhttps://erikaaldendeb.substack.com/p/erikas-quick-start-guide-to-research\\\
    n16/19\\n\\nYou might be creating a research nonprofit with the hope of generating for-pro\\nspinouts. In this scenario,\
    \ pay attention to how you handle IP.\\nYou might decide your nonprofit is destined to have revenue that will sustain\
    \ it\\nactivities in the long run, like iGEM.\\nIt\\u2019s a big world out there of nonprofits, and they\\u2019re very\
    \ diverse. Indeed, you probab\\ninteract with a lot of institutions that are nonprofits, including:\\nInfamously, OpenAI\"\
    \n  },\n  {\n    \"name\": \"IKEA\",\n    \"text\": \"Novo Nordisk\\nSRI, a nonprofit that gets a lot of government funding.\\\
    nBattelle, which runs many national labs.\\nThe blessing and the curse of research nonprofits is that you get to customize\
    \ the\\nendgame to your heart\\u2019s content. The ultimate goal doesn\\u2019t need to be tenure\\n(academia) or profit\
    \ (industry) - it can be whatever you want it to be (!) If you want to\\nmake your own adventure outside of the black-and-white\
    \ standard options, you nee\\nto do the work to articulate what your vision is and communicate it to funders and t\\npeople\
    \ who work with you.\\nTLDR: it\\u2019s pretty straightforward to create your own nonprofit organization. If you\\u2019\\\
    never interacted with a university, you will probably appreciate that doing it yourself\\nmight just be less work. \\\
    ud83d\\ude1b If you have an idea that doesn\\u2019t quite fit in an existing b\\ndon\\u2019t let the mechanics of getting\
    \ the organization set up stop you from making it\\nhappen.\"\n  },\n  {\n    \"name\": \"Conclusion\",\n    \"text\"\
    : \"Contribute to the living doc\"\n  },\n  {\n    \"name\": \"/28/25, 11:58 PM\",\n    \"text\": \"Erika's quick-start\
    \ guide to research nonprofits\\nhttps://erikaaldendeb.substack.com/p/erikas-quick-start-guide-to-research\\n17/19\\n\\\
    nRelative to the materials that are available for starting a for-profit or an academic la\\nstarting a nonprofit research\
    \ organization is relatively untrodden territory. I\\u2019m goin\\nto host a living document where folks can send in additional\
    \ advice or questions.\\nIf you have material you\\u2019d like to add, or questions you\\u2019d like to incorporate, just\
    \ em\\nalden.debenedictis[at]gmail.com, message me on twitter @erika_alden_d, or request\\nedit access. Say whether you\\\
    u2019d like your additions to be anonymous or not!\\nThe living doc already has lots of good additional info - please\
    \ do visit if you want t\\nhear more!\\nIf this document was useful to you, check out The Astera Institute\\u2019s expanded\\\
    nNonprofit Guide that walks through every step in much greater detail. A great\\nresource!\\nNick Gjokaj, who is an absolute\
    \ ops wizard and makes it look easy (!!) Tom Kalil, wh\\nintroduced me to the world of nonprofit research outside of academia,\
    \ and first\\nexplained to me what a \\u2018fiscal sponsor\\u2019 is. Also thanks to Sam Rodriques, Andrew\\nPayne, Yunha\
    \ Hwang, Ivana Cvijovi\\u0107, Chloe Hsu, Ben Reinhardt, Adam Marbleston\\nAnastasia Gamick, and Dan Goodwin for questions,\
    \ comments, and feedback.\\nThanks for reading Erika\\u2019s Newsletter! If this was\\ninteresting, subscribe for free\
    \ to receive new\\nposts.\\nUpdate March 31 2025\\nThanks to\\nType your email...\\nSubscribe\"\n  },\n  {\n    \"name\"\
    : \"/28/25, 11:58 PM\",\n    \"text\": \"Erika's quick-start guide to research nonprofits\\nhttps://erikaaldendeb.substack.com/p/erikas-quick-start-guide-to-research\\\
