    nOctober 18, 2022\\nHow does the culture of science change and improve? Many people have\\nidentified shortcomings in\
    \ core social processes of science, such as peer\\nreview, how grants are awarded, how people are selected to become scientists,\\\
    nand so on. Yet despite often compelling criticisms, strong barriers inhibit\\nwidespread change in such social processes.\
    \ The result is near stasis, and\\napathy about the prospects for improvement. People sometimes start new\\nresearch institutions\
    \ intended to do things differently; unfortunately such\\ninstitutions are often changed more by the existing ecosystem\
    \ than they\\nchange it. In this essay we sketch a vision of how the social processes of\\nscience may be rapidly improved.\
    \ In this vision, metascience plays a key role:\\nit deepens our understanding of which social processes best support\\\
    ndiscovery; that understanding can then help drive change. We introduce the\\nnotion of a metascience entrepreneur, a\
    \ person seeking to achieve a scalable\\nimprovement in the social processes of science. We argue that: (1) metascience\\\
    nis an imaginative design practice, exploring an enormous design space for\\nsocial processes; (2) that exploration aims\
    \ to find new social processes which\\nunlock latent potential for discovery; (3) decentralized change must be\\npossible,\
    \ so outsiders with superior ideas can't be blocked by established\\npower centers; (4) ideally, change would align with\
    \ what is best for science\\nand for humanity, not merely what is fashionable, politically popular, or\\nmedia-friendly;\
    \ (5) the net result would be a far more structurally diverse set\\nof environments for doing science; and (6) this would\
    \ enable crucial types of\\nwork difficult or impossible within existing environments. For this vision to\\nsucceed metascience\
    \ must develop and intertwine three elements: an\\n(/index.html)\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n \
