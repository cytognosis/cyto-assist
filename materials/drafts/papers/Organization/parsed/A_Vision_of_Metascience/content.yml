    \ is an engine of improvement\\nfor the social processes and ultimately the culture of science.\\nHow does the culture\
    \ of science\\nchange?\\nImagine you're a science fiction author writing a story depicting a scientific discovery made\
    \ by\\nan alien species. In your story you show the alien scientists up close \\u2013 how they work, how they\\nlive.\
    \ Would you show them working within institutions resembling human universities, with\\nthe PhD system, grant agencies,\
    \ academic journals, and so on? Would they use social processes\\nlike peer review and citation? Would the alien scientists\
    \ have interminable arguments, as\\nhuman scientists do, about the merits of the h-index and impact factor and similar\
    \ attempts to\\nmeasure science?\\nAlmost certainly, the design of our human scientific social processes has been too\
    \ contingent\\non the accidents of history for the answers to those questions to all be \\\"yes\\\". It seems unlikely\\\
    nthat humanity has found the best possible means of allocating scarce scientific resources! We\\ndoubt even the most fervent\
    \ proponents of, say, Harvard or the US National Science\\nFoundation would regard them as a platonic ideal. Nor does\
    \ it seem likely the h-index and\\nsimilar measures are universal measures of scientific merit.\\nThis doesn't mean the\
    \ aliens wouldn't have many scientific facts and methodological ideas in\\ncommon with humanity \\u2013 plausibly, for\
    \ instance, the use of mathematics to describe the\\nuniverse, or the central role of experiment in improving our understanding.\
    \ But it also seems\\nlikely such aliens will have radically different social processes to support science. What would\\\
    nthose social processes be? Could they have developed scientific institutions as superior to ours\\nas modern universities\
    \ are to the learned medieval monasteries?\\nThe question \\\"how would aliens do science?\\\" is fun to consider, if\
    \ fanciful. But it's also a good\\nstimulus for immediately human-relevant questions. For instance: suppose you were given\
    \ a\\nlarge sum of money \\u2013 say, a hundred million dollars, or a billion dollars, or even ten or a\\n(/index.html)\"\
