    \ new research institutes, such as the Arc\\nInstitute, DeepMind, and Altos. There are tiny pirate insurgencies, such\
    \ as the Center for Open\\nScience, DynamicLand, EleutherAI, and dozens or perhaps even hundreds more . There are\\nnew\
