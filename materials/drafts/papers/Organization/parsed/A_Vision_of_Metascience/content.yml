    n(/index.html)\\n1\\n2\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n4/107\\n\\nexpress hope that not only will their organization succeed, it will be a beacon, succeeding so\\nspectacularly\
    \ that the underlying social ideas will spread widely, improving humanity's\\ndiscovery ecosystem as a whole.\\nHow realistic\
    \ is that hope? Does our discovery ecosystem improve in response to successful\\nexperiments with new social processes?\
    \ Or is it resistant to change, only improving slowly? In\\na nutshell, this essay explores the question: how well does\
    \ the discovery ecosystem learn, and\\ncan we improve the way it learns? As we address this question, many related questions\\\
    nnaturally arise: does the discovery ecosystem enable the rapid trial of a multitude of wildly\\nimaginative social processes?\
    \ Or are only tiny, incremental changes ever possible? Can\\noutsiders with great ideas displace existing approaches?\
    \ Or can change only come from people\\nand organizations who already have enormous power?\\nWhat we'll find is a discovery\
    \ ecosystem in a state of near stasis, with strong barriers inhibiting\\nthe improvement of key social processes. We believe\
    \ it's possible to change this situation. In\\nthis essay we sketch a vision in which metascience drives rapid improvement\
    \ in the social\\nprocesses of science. This vision requires a strong theoretical discipline of metascience, able to\\\
    nobtain results decisive enough to drive the adoption of new social processes, including\\nprocesses that may displace\
    \ incumbents. It also requires a strong ecosystem of metascience\\nentrepreneurs, people working to achieve scalable change\
    \ in the social processes of science. In\\nsome sense, the essay explores what it would mean for humanity to do metascience\
    \ seriously.\\nAnd it's about placing that endeavor at the core of science. We believe the net result will be a\\nportfolio\
    \ of social processes far more structurally diverse than today, enabling crucial types of\\nwork difficult or impossible\
    \ within existing environments, and so expanding the range of\\npossible discoveries.\\nAs far as we are aware, these\
    \ questions have not previously been explored in depth. To make\\nthe questions more concrete, let's sketch a few specific\
    \ examples of unusual social processes\\nthat could be (or are being) trialled today by adventurous funders or research\
    \ organizations .\\nThese sketches are intended as brief illustrative examples, to evoke what we mean by \\\"changed\\\
    nsocial processes\\\". Though the examples are modest and conservative \\u2013 indeed, some ideas may\\nbe familiar to\
    \ you , though perhaps not all \\u2013 versions scaled out across science would\\nsignificantly change the culture of\
    \ science. It's a long list, to emphasize the many diverse\\nopportunities for imaginative change. Later in the essay\
    \ we develop deeper ways of thinking\\nthat generate many more ideas for change.\\n(/index.html)\\n3\\n4\"\n  },\n  {\n\
    \    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n5/107\\n\\nFund-by-variance: Instead of funding grants that get the highest average score from\\nreviewers, a funder\
    \ should use the variance (or kurtosis or some similar measurement of\\ndisagreement ) in reviewer scores as a primary\
    \ signal: only fund things that are highly\\npolarizing (some people love it, some people hate it). One thesis to support\
    \ such a\\nprogram is that you may prefer to fund projects with a modest chance of outlier success\\nover projects with\
    \ a high chance of modest success. An alternate thesis is that you should\\naspire to fund things only you would fund,\
    \ and so should look for signal to that end:\\nprojects everyone agrees are good will certainly get funded elsewhere.\
    \ And if you merely\\nfund what everyone else is funding, then you have little marginal impact\\n.\\nCentury Grant Program\
    \ : Solicit grant applications for projects to be funded for 100\\nyears. Done through an endowment model, the cost would\
    \ be a small multiple of\\nconventional 5- or 10-year funding. The point is to elicit an important type of intellectual\\\
    ndark matter : problems of immense scientific value that can't be investigated on short\\ntimelines. Inspired by seminal\
    \ projects such as the CO2 monitoring at the Mauna Loa\\nobservatory, the Framingham Heart Study, and the Cape Grim Air\
    \ Archive.\\nTenure insurance: Tenure-track scientists often play it safe in the projects they take on.\\nEncourage people\
    \ to swing for the fences by offering a large payout if they fail to receive\\ntenure. Supposing 80% of tenure-track faculty\
    \ receive tenure , the cost for a large payout\\nwould only be a modest addition to an existing benefits package. A premium\
    \ of $8k per\\nyear for 6 years, with a 5x multiplier and reasonable assumptions about interest rates,\\nwould result\
    \ in a payout of over $300k. That's several years of pre-tenure salary in many\\nfields and at many institutions. This\
    \ suggestion is an instance of two more general\\npatterns: (1) moving risk to parties who can more easily bear it, making\
    \ the system as a\\nwhole less risk averse; and (2) a plausible way to increase people's ambition is to de-risk\\nby improving\
    \ their fallback options in the event of failure .\\nFailure audit: Many funders advocate high-risk, high-reward research,\
    \ but this is often\\nmere research theater, not seriously meant. For instance, in 2018 the European Research\\nCouncil\
    \ issued a self-congratulatory report claiming that: (a) they fund mostly \\\"high risk\\\"\\nwork; and (b) almost all\
    \ the work they fund succeeds, with 79% of projects achieving\\neither a \\\"scientific breakthrough\\\" or a \\\"major\
    \ scientific advance\\\". If almost every project\\nsucceeds, then this is not a definition of \\\"high risk\\\" we recognize\
    \ . To prove the\\nseriousness of their intent about risk, funders could run credible independent audits on\\n(/index.html)\\\
    n5\\n6,7\\n8\\n9\\n10\\n11\\n12\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\\
    nhttps://scienceplusplus.org/metascience/index.html\\n6/107\\n\\ntheir grant programs, and if the failure rate for grants\
    \ persists below some threshold (say,\\n50%), the program manager is fired . Or, at a different level of abstraction,\
    \ the entire\\nfunder could be audited, and if the number of grant programs which fails is below 50%,\\nthe funder's director\
    \ is fired.\\nAcquisition pipeline for research institutes: People often lament the loss of (or\\nlarge changes in) great\
    \ private research institutes past \\u2013 PARC in the 1970s is perhaps the\\nbest modern example . If PARC-in-the-1970s\
    \ was so great, why didn't the NSF acquire it?\\nAn acquisition would have been within their mission, and almost certainly\
    \ a far-better-\\nthan-median use of NSF's funds . There might well have been political or bureaucratic\\nbarriers, but\
    \ if so the problem lies in politics and bureaucracy, not in the merit of the idea.\\nIf public (or philanthropic) acquisition\
    \ of private research institutes was common, it may\\nincentivize the creation of more outstanding private research institutes.\\\
    nPull immigration programs: Moving between countries is an intimidating and\\narduous exercise, often involving a considerable\
    \ amount of know-how. There is no a priori\\nreason some enterprising country \\u2013 let's say Estonia, which has run\
    \ several innovative\\nexperiments in the way they approach immigration \\u2013 couldn't simply identify outstanding\\\
    npeople they'd like as immigrants, and directly recruit them. Imagine a valet shows up on\\nthe doorstep of every science\
    \ olympiad student in the world, with a first-class plane ticket\\nto Estonia, a pre-approved visa, an offer of several\
    \ years of first-rate private mentoring in\\nwhatever field or fields they desire, a stipend, and housing as part of a\
    \ community of\\nsimilarly extraordinary students. It'd be interesting to see what the long-run outcomes\\nfrom such a\
    \ community would be .\\nOpen Source Institute: Like a research university, but instead of producing\\nunderstanding in\
    \ the form of research papers, it would produce understanding in the form\\nof open source software and open protocols\
    \ (with a penumbra of concomitant goods, such\\nas prototypes, demos, open data and, yes, papers). Based on the thesis\
    \ that sometimes\\nimportant new understanding isn't best expressed in words, but rather in code or\\nprotocols. A number\
    \ of superficially similar programs already operate, but none (as far we\\nknow) genuinely change the underlying political\
    \ economy \\u2013 the means by which people\\nbuild their reputation and career \\u2013 which is the primary point.\\\
    n(/index.html)\\n13\\n14\\n15\\n16\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\\
    nhttps://scienceplusplus.org/metascience/index.html\\n7/107\\n\\nInstitute for Traveling Scientists: A yacht that sails\
    \ around the world, boarding and\\nde-boarding scientists in each port. It would be a mobile version of places like the\
    \ Stanford\\nCenter for Advanced Study in the Behavioral Sciences \\u2013 somewhere stimulating and\\nrelaxing for scientists\
    \ to go on sabbatical, learn a new field, or perhaps write that book\\nthey've been meaning to write. Inspired in part\
    \ by Craig Venter's round-the-world trip for\\nthe Ocean Sequencing Project.\\nLong-shot prizes: Purchase insurance premiums\
    \ against extremely unlikely possibilities\\nthat would transform the world. A proof that P \\u2260 NP. A proof that P\
    \ = NP. A constructive\\nalgorithm solving NP-complete problems quickly. Cold fusion. True faster-than-light\\ntravel.\
    \ A perpetual motion machine. And so on. The more unlikely the outcome, the larger\\nthe prize can be, even for a small\
    \ premium . Cheap, unlikely to succeed, and\\nextraordinarily impactful if it led to solutions to such problems .\\nPublic\
    \ hall of shame / anti-portfolio: The venture capital firm Bessemer Venture\\nPartners maintains a public anti-portfolio\
    \ (https://www.bvp.com/anti-portfolio) of\\ncompanies where they had an opportunity to invest, but failed. It includes\
    \ enormously\\nsuccessful companies such as Apple, Google, Facebook, Tesla, and many others. Each\\nfailure is accompanied\
    \ by a short story naming the Bessemer partner who had the\\nopportunity to invest but didn't, and describing (often fancifully\
    \ and amusingly) why they\\nfailed to invest. Every science funder, every university, and every scientific journal in\
    \ the\\nworld should maintain a similar anti-portfolio. Alternately, a collective anti-portfolio\\ncould be constructed\
    \ by a third party willing to tolerate some opprobrium. It wouldn't be\\npopular . But done well it would be invaluable.\\\
    nInterdisciplinary Institute: Most proposals for interdisciplinarity are tepid. Take\\ninterdisciplinarity seriously,\
    \ by setting up an institute which identifies (say) 30 different\\ndisciplines, and then hires three people to work at\
    \ the intersection of every possible\\npairing of disciplines. That's just 1305 people \\u2013 a large program, but tiny\
    \ on the scale of\\nmodern science. This would be a deliberately variance-inducing strategy. Most pairings of\\ndisciplines\
    \ would produce little, but there are likely a few where great discoveries would\\nunexpectedly be made through the combination.\
    \ Those few would pay for all the rest. A\\nless expensive approach would be to sample from randomly chosen pairs of disciplines,\\\
    nwith the disciplines potentially coming from a much longer list.\\n(/index.html)\\n17\\n18\\n19\"\n  },\n  {\n    \"\
    name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n8/107\\n\\nAt-the-Bench Fellowship: In their heyday, senior scientists at places such as Bell Labs\\nand Cambridge's\
    \ Laboratory for Molecular Biology often carried out research work\\nthemselves, or in direct, hands-on collaboration\
    \ with 1-3 others\\n. Yet modern universities\\noften strongly encourage scientists to take on a managerial role, applying\
    \ for grants but\\nbeing hands off in research work. This Fellowship would fund senior scientists to spend\\nessentially\
    \ all their time actually doing science. The thesis here is that for some types of\\nwork, important discoveries are most\
    \ likely if done by someone highly skilled, with a\\ndeeply developed affinity for some part of nature. Put another way,\
    \ the thesis is that for\\nsome scientists there are increasing returns to focused expertise, not the diminishing\\nreturns\
    \ assumed in the conventional scientist-becomes-manager-of-a-large-group model.\\nPrinting press for funders: An entity\
    \ endowed with $10 billion could spin out new\\nfunders each year; it could spin out, for instance, a single funder with\
    \ a roughly $500\\nmillion endowment, perhaps running a competition to find the operators of the new\\nfunder. Or it could\
    \ spin out a larger number of smaller funders. If each new funder had a\\nradically different thesis, this could significantly\
    \ increase the structural diversity of\\nscience; and perhaps increase the diversity of ambient working environments available\
    \ to\\nscientists. It would also be possible to set up a similar kind of printing press for research\\norganizations,\
    \ mutatis mutandis. And, perhaps, to set up sunset clauses for the\\norganizations, so they don't permanently occupy organizational\
    \ space in the discovery\\necosystem; organizational longevity would then necessarily be through people and ideas\\nbeing\
    \ passed to future organizations, not organizational inertia.\\nExcitement quotient for funders: Scientists often apply\
    \ for grants on the basis of\\nwhat they believe is fundable, rather than with their best ideas . We've spoken with\\\
    nscientists who tell us \\\"I know I can get funding for many fashionable-but-unimportant\\nprojects, but I can't get\
    \ funding for the work I think is most important\\\". Why should a\\nfunder or anonymous peer reviewer know better than\
    \ the scientist how they should use\\ntheir skills? It has the flavor of the busybody stranger who tells a parent they're\
    \ parenting\\nwrong. Many funders effectively give veto power to such strangers. One approach to\\npartially address this\
    \ is for an independent agency to sample people applying to different\\nfunders, asking: \\\"how excited were you about\
    \ this grant application?\\\" They can then\\npublicly rate different funders by comparing excitement scores. This would\
    \ place pressure\\non funders to fund work applicants were excited about, and raise questions if it was mostly\\npro forma.\\\
    n(/index.html)\\n20\\n21\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\\
    nhttps://scienceplusplus.org/metascience/index.html\\n9/107\\n\\nWith these examples in mind, we may restate the basic\
    \ questions of the essay. Suppose, for\\ninstance, that the first of these ideas, \\\"fund-by-variance\\\", was given\
    \ a serious trial, perhaps\\nwith multiple rounds of debugging and improvement. Suppose it was found that when\\nimplemented\
    \ well it was a decisive improvement over the committee-based peer review\\napproach used today by many funders. Would\
    \ it then be adopted broadly? Or would other\\ninstitutions ignore or resist it? In a healthy, dynamic discovery ecosystem\
    \ it would spread\\nwidely, displacing inferior methods when appropriate. By contrast, in a static ecosystem, even\\nif\
    \ the early trials were extremely successful, other institutions would be slow to respond, or\\nresistant to change. They\
    \ would get hung up over whether the approach came from the \\\"right\\\"\\noriginator, or was prestigious enough. In\
    \ a healthy discovery ecosystem the improved idea\\ncould come from anywhere.\\nIn early drafts of this essay we were\
    \ hesitant about writing the concrete list of ideas above. We\\nworried that it would anchor readers on \\\"these are\
    \ the changes Nielsen and Qiu are arguing\\nfor\\\". But the individual programs are not the point; indeed we'll suggest\
    \ many more (and\\nsometimes deeper) ideas later in this essay. Rather, the point is that a flourishing ecosystem\\nwould\
    \ rapidly generate and seriously trial an enormous profusion of ideas, including many\\nideas far more imaginative than\
    \ anything listed above. The best of those ideas would be\\nrigorously tested, iterated on, debugged, and scaled out to\
    \ improve the entire discovery\\necosystem. Indeed, if truly bold ideas were being trialled, then they would include many\
    \ ideas\\nwe would at first disapprove of, but sometimes the evidence for them would be so strong that\\nwe'd be forced\
    \ to change our minds.\\nAs stated above, the focus of this essay is how the discovery ecosystem improves. Part of the\\\
    nmotivation for this focus is the belief that the design space for promising new social processes\\nis vast:\\n(/index.html)\"\
    \n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n10/107\\n\\nWe won't prove this belief. But we'll try to make it plausible. In Part 1 of the essay we'll discuss\\nheuristics\
    \ for exploring this metascience design space. These heuristics arise out of plausible\\nmodels of how human beings make\
    \ discoveries. Indeed, all the social processes of science\\nreflect and are grounded in such models \\u2013 often implicit\
    \ or informal folk theories \\u2013 of how\\ndiscovery happens. Weak metascientific ideas result in weak social processes;\
    \ stronger\\nmetascientific ideas result in stronger processes. Insofar as we can improve our metascientific\\ntheories,\
    \ we can improve the way human beings make discoveries. A good way to develop that\\nunderstanding is to explore boldly\
    \ in the design space above, understanding which ideas do\\nand don't work, and why.\\nThroughout this introduction we've\
    \ used many different-but-related terms, talking about\\nchanging the social processes of science; changing the culture\
    \ of science; changing the\\ninstitutions of science; changing the discovery ecosystem; and so on. From now on we'll use\\\
    n\\\"social processes of science\\\" as an informal catchall. By that we mean the institutional\\npractices, incentives,\
    \ norms (and so on) widely used in science. So when we talk about change\\nto the social processes of science we are talking\
    \ about changes to things like peer review, or\\nhiring practices, or how funders approach risk, as well as broader ideas,\
    \ such as the \\\"pull\\nimmigration\\\" or \\\"printing press for funders\\\" or \\\"anti-portfolio\\\" ideas mentioned\
    \ above. The\\nphrase \\\"social processes of science\\\" is unfortunately unwieldy. But it is nonetheless very\\nhelpful\
    \ to have such a catchall. We will save the use of other terms for when we have a more\\nspecific need.\\n(/index.html)\"\
    \n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n11/107\\n\\nAs noted earlier, the essay is an entry in the field of metascience. This still emerging field\\noverlaps\
    \ and draws upon many well-established fields, including the philosophy, history, and\\nsociology of science, as well\
    \ as newer fields such as the economics of science funding, the\\nscience of science, science policy, and others. While\
    \ we draw on all these fields, there are\\nnotable differences in our focus. Unlike the philosophy of science, we are\
    \ more concerned with\\nsocial processes than methodology. The two are intertwined, so this is a difference of degree,\\\
    nnot kind, but is nonetheless real. Of course, fields such as the sociology of science and the\\nscience of science do\
    \ focus on social processes, but the focus is primarily descriptive, not\\nimaginative design and active intervention,\
    \ as discussed in our work. The exception is science\\npolicy, which has design and intervention as core goals. However,\
    \ in the science policy world\\ninterventions are often focused on what is practical within existing power structures.\
    \ We shall\\nbe concerned with more a priori questions of principle, and enabling decentralized change,\\ni.e., change\
    \ that may occur outside existing power structures. For all these reasons we think of\\nthe essay as simply part of metascience.\\\
    nOne factor not discussed in the main body of the essay is the relationship between metascience\\nand several external\
    \ factors affecting the future of science (artificial intelligence, the rise of\\nChina and India, the colonization of\
    \ space, and intelligence augmentation). We discuss these\\nbriefly in an Appendix\\n(https://scienceplusplus.org/metascience/index.html#app_external_factors)\
    \ to the essay. The\\nfocus in the body of the essay is more endogenous to science.\\nUnderlying the essay is the assumption\
    \ that improved social processes can radically transform\\nand improve science. Most scientists we've spoken with agree\
    \ with at least a weak form of this\\nassumption. For instance, many strongly advocate metascientific principles like:\
    \ the\\nimportance of freedom of inquiry for scientists; or that it strengthens science if outsiders can\\noverturn established\
    \ theories on the strength of evidence, not their credentials. For science to\\nwork well, such ideas must be expressed,\
    \ even if imperfectly, in the design of the social\\nprocesses of science. As said above, the quality of our social processes\
    \ (and of our institutions)\\nis determined by the quality of the metascientific ideas they embody.\\nBut our assumption\
    \ in this essay is much stronger than that weak form. Again: we believe\\nimproved social processes can radically transform\
    \ and improve science. It's not so obvious this\\nis true. Some scientists we talk with are excited by this idea, and\
    \ agree that new social\\nprocesses may be transformative. Others sharply disagree, telling us that broad, ecosystem-\\\
    n(/index.html)\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n12/107\\n\\nlevel social changes make little substantive difference to the actual science. Indeed, several\\nnotable\
    \ scientists have expressed this to us using minor variations on a single phrase: \\\"all that\\nmatters is to fund good\
    \ people doing good work\\\". Several others have said words to the effect\\nof: \\\"I admire your optimism, but the system\
    \ never really gets any better, there's just more and\\nmore bureaucracy and 'accountability'\\\". It's possible those\
    \ people are correct. But the only way\\nto determine that is to actively explore the question: what if there are truly\
    \ transformative\\nsocial processes waiting to be discovered?\\nWe'll proceed on that assumption for now, and return at\
    \ the end of the essay to reconsider\\nwhether it is true. For now, let us merely recount an anecdote from the legal scholar\
    \ and\\ncomputer scientist Nick Szabo\\n. Szabo writes of how, during the early Renaissance, exploring\\nthe oceans was\
    \ an extremely risky business. Ships could run aground, or be blown badly off\\ncourse by storms. Sometimes entire crews\
    \ and ships and cargoes were lost. There were risks at\\nall levels of an expedition, from the health and livelihood of\
    \ individual sailors through to\\nfinanciers who faced ruin if the ship ran aground or was badly damaged. But, Szabo points\
    \ out,\\nthis risk profile changed considerably in the 14th century, when Genovese merchants invented\\nmaritime insurance:\
    \ for the cost of a modest premium, the people financing the expedition\\nwould not suffer if the ship was damaged. This\
    \ spread the risk, and made the expedition much\\nless risky for some (though not all\\n) participants. That change in\
    \ the funding system helped\\nenable a new age of exploration, discovery, and prosperity.\\nIt is easy to imagine a salty\
    \ Genovese sea captain, upon being asked how to improve shipping,\\nsaying that you \\\"just need good ships, crewed by\
    \ good sailors\\\". This would be in the vein of our\\nscientist friends telling us \\\"just fund good people doing good\
    \ work\\\". It contains a large grain of\\ntruth, but is not incompatible with system-level ideas radically improving\
    \ the situation. The\\nsalty scientists are correct, but only within a limited outlook. Research organizations do need\\\
    nto be maniacal about funding good people with good projects; they can also make system-level\\nchanges which have much\
    \ more profound effects. This essay is about such system-level\\nchanges.\\nPut another way: we believe our salty scientists\
    \ are blind to just how strongly systems and\\nsocial processes shape creative work. This isn't because they're unimaginative.\
    \ Often, it's\\nbecause the systems change they've seen during their own careers is mostly bureaucracies\\nmaking themselves\
    \ happier (and often everyone else unhappier), with more red tape and\\n(/index.html)\\n22\\n23\"\n  },\n  {\n    \"name\"\
    : \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n13/107\\n\\ndemands for accountability. Naturally, such scientists are cynical about the prospects for\\nimprovement.\
    \ We hope to make a convincing case that much more unconventional changes are\\npossible, resulting in a profoundly different\
    \ and better discovery system.\\nA variation of this line of critique is that the current social processes of science\
    \ already\\nproduce many terrific outcomes. This is certainly true! It's a humbling experience to talk to the\\nbest scientists:\
    \ what they can do is genuinely astounding. And you think to yourself: \\\"this is it,\\nthese are extraordinary human\
    \ beings, being used by humanity to near their full capacity\\\". It's\\na wonderful achievement of humanity that we do\
    \ support such people. And it's reasonable to\\nask why we'd need anything else. Why not just scale this up? Indeed, sometimes\
    \ when talking\\nwith such people we encounter friendly or skeptical bewilderment. For them and their friends,\\nthe current\
    \ system works well, and they don't see the need for anything different. But perhaps\\nthere are very different types\
    \ of scientist (and scientific work) who could also achieve\\nastounding things in science, perhaps achievements which\
    \ the current system is unknowingly\\nbottlenecked on, because their personality type doesn't thrive within that system?\
    \ And perhaps\\nthey, and their approach to science, would thrive if there was more structural diversity in the\\nsocial\
    \ processes of science? This is a central point to which we shall return.\\nAt first glance, this essay may appear to\
    \ be an entry in that flourishing genre, what's-wrong-\\nwith-science-and-how-to-fix-it? This genre is well represented\
    \ on social media, in conversation\\namong scientists, and in articles in the scientific and mainstream media. \\\"Here\
    \ are the things\\nwrong with peer review [or grant agencies, or universities, or etc\\u2026] \\u2013 and how to fix them.\\\
    \"\\nIndeed, the genre is not new: you can find discussions of these issues going back decades and\\neven centuries. Each\
    \ generation confronts the problems anew, and proposes solutions anew.\\nBut although there is no shortage of grand hopes\
    \ and plans, progress is often slow.\\nOur point of view is different in a crucial way: we are not proposing a single\
    \ silver bullet. We\\nbelieve the opportunity is far larger. What we want is a flourishing ecosystem of people with\\\
    nwildly imaginative and insightful ideas for new social processes; and for those ideas to be\\ntested and the best ideas\
    \ scaled out. We will show, in part by example, that there are many\\ndifferent possible approaches to fixing peer review\
    \ [or grant agencies, universities,\\u2026]. Instead\\nof believing we already know the answers, and just need to implement\
    \ them, it's better to\\ndevelop a discovery ecosystem which can rapidly improve its own processes. The fundamental\\\
    nunderlying questions are: How do social processes in science change? Is there a general theory\\nof such change? Is it\
    \ possible to speed up and improve that change? This subject isn't\\n(/index.html)\"\n  },\n  {\n    \"name\": \"/28/25,\
    \ 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n14/107\\\
    n\\nfashionable in the same way as yet another proposal for \\\"how to fix grant agencies\\\" or \\\"how to\\nfix universities\\\
    \". But we believe it is a fundamental issue in the way human beings make\\ndiscoveries, is a central problem of metascience,\
    \ and at the very core of science\\n.\\nAs a final note, we've used informal language throughout the essay, and that may\
    \ make some\\nreaders mistake it for journalism. But while it is in part a synthesis, that isn't the primary\\nintent.\
    \ Rather, it's intended as a creative research contribution: a broad vision of the purpose\\nand potential of metascience,\
    \ and how it can change science. We introduce terminology and\\nsimple models for many key elements of metascience, and\
    \ sketch many core problems. Our\\narguments unavoidably sometimes use speculative and incomplete reasoning. We shall\
    \ borrow\\nfrom many existing fields, but our work isn't primarily intended as a contribution to those\\nfields. Rather,\
    \ it's intended as a sketch of part of the emerging proto-field of metascience, to\\nhelp it along the way to becoming\
    \ a fully fledged field\\n.\\nPart 1: Exploring the metascience\\ndesign space\\nOne conception of metascience is that\
    \ it's about fine-tuning science, making incremental\\ntweaks to social processes such as peer review or grant-making.\
    \ But we conceive of\\nmetascience differently, believing radically different and far better social processes are\\npossible,\
    \ and that the metascience design space is vast and mostly unexplored:\\n(/index.html)\\n24\\n25\"\n  },\n  {\n    \"\
    name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n15/107\\n\\nIndeed, we believe the design space is so large that exploring it will require decades or\\ncenturies, at\
    \ the least. Still, in Part 1 we hope to evoke something of that grand size. We'll\\nexplore the space, focusing initially\
    \ on simple program ideas that could be trialled unilaterally\\nby some imaginative funder. Although this initial focus\
    \ is restricted, it can be used to illustrate\\ngenerative design heuristics that help explore in imaginative ways. Later\
    \ we'll broaden our\\nscope. Along the way we'll sometimes run across well-known ideas \\u2013 things like the currently\\\
    nfashionable idea of funding lotteries, or the idea that one should fund people, not projects. But\\nto keep the discussion\
    \ fresh we'll also mention ideas that have only rarely been discussed, or\\nwhich to our knowledge are novel.\\nThe funder\
    \ as detector-and-predictor: one\\nheuristic for exploring the metascience design\\nspace\\nLet's begin with a simple\
    \ heuristic for exploring the design space. We call this the funder-as-\\ndetector-and-predictor model\\n, or just the\
    \ detector-and-predictor model, for short. As the\\nname implies, this is a two-part model. In one part of the model,\
    \ we think of a science funder\\nas a kind of detector or sensor , a collective human instrument aiming to locate intellectual\\\
    ndark matter. That is, it aims to locate important ideas or signals present in the discovery\\necosystem, but ignored\
    \ by existing funders. For example, the Century Grant Program aims to\\n(/index.html)\\n26\\n27\"\n  },\n  {\n    \"name\"\
    : \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n16/107\\n\\nelicit a class of previously invisible intellectual dark matter \\u2013 ideas for projects that should last\\\
    na century or more. There may be many great ideas for such projects out there; there may be few\\nsuch ideas. We won't\
    \ know unless we do a determined search! In this part of the model, crucial\\nquestions to ask include: what types of\
    \ important signal are present in the system, but are\\ncurrently ignored? Is there information which is systematically\
    \ being hidden; and, if so, how\\nmight it be elicited? And what new mechanisms can we develop to locate and amplify signal\\\
    n?\\nConcretely: what do the body of scientists know that is important, and yet currently either\\ninvisible (or not visible\
    \ enough) to funders? And how can we surface that information?\\nIn the second part of the detector-and-predictor model,\
    \ funders are thought of as predictors,\\ntrying to predict future outcomes. In particular, they use some inference process\
    \ to make\\ndecisions about an uncertain future, on the basis of incomplete current information. (This is\\nthe underlying\
    \ problem to be solved in funding discovery.) As an example, the idea of high-\\nvariance funding is based on a simple\
    \ change to the inference method used to make decisions:\\ninstead of using typical or average scores, use the variance\
    \ in scores to help decide which\\nproposals to fund. In this part of the detector-and-predictor model, crucial questions\
    \ include:\\nwhat information might we collect? What hedging and aggregation and indirection strategies\\nmight be used?\
    \ Where is there asymmetric opportunity? Or opportunity for unique marginal\\nimpact? What are the possible contractual\
    \ designs? Where is the risk, and how can it be moved\\nand transformed?\\nMany of the suggestions we made in the introduction\
    \ may be understood through the lens of\\nthe detector-and-predictor model. We already mentioned the Century Grant Program\
    \ and\\nhigh-variance funding, but many others may also be viewed this way. For instance: failure\\naudits are about observing\
    \ the outcomes from the inference model, in order to determine\\nwhether it's achieving some desired end, and using incentives\
    \ to change the model used. Or:\\nthe pull immigration program is about surfacing previously invisible intellectual dark\
    \ matter.\\nMany of the programs involve both parts of the model: high-variance funding changes, as\\nalready mentioned,\
    \ the prediction method, but will also likely elicit different types of grant\\nproposal, encouraging people with riskier\
    \ ideas to apply. In this sense, what you detect and\\nhow you predict are interwoven. More broadly: it's stimulating\
    \ to simply look through the\\nearlier examples, and see how the model applies (or not).\\n(/index.html)\\n28\"\n  },\n\
    \  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n17/107\\n\\nThe detector-and-predictor model is not intended to be universally applicable, nor to be\\nliterally correct\
    \ as a descriptive model. Rather, it's a generative design heuristic, to help\\ngenerate plausible, interesting program\
    \ ideas. By playing with the model you can easily\\ngenerate an endless supply of potential programs. To illustrate, let's\
    \ describe four more\\nprograms motivated by a view of the funder as a detector searching out intellectual dark\\nmatter.\\\
    nEndowed professorships by 25: Many of history's great scientists made key\\ndiscoveries while very young. This was true,\
    \ for example, of giants such as Newton,\\nDarwin, and Einstein. It's also been true more recently: think of Joshua Lederberg,\\\
    ndiscovering bacterial conjugation at the age of 21, or Brian Josephson, discovering the\\ntunneling current between superconductors\
    \ at the age of 22. Concerningly, in recent times\\nthe age at which scientists can establish independent research programs\
    \ has substantially\\nincreased\\n. Often, people who begin research in their early 20s can't establish\\nindependent\
    \ programs until their late 30s or 40s(!) Instead, they work on someone else's\\nresearch program, or leave science. The\
    \ thesis of this endowment program is that it will\\nunlock latent potential for discovery if we give some young people\
    \ full independence to\\nfollow their ideas. To this end, establish endowed professorships (and associated project\\nsupport)\
    \ at a few outstanding institutions, say Harvard and Cambridge, for promising\\nscientists no more than 25 years old.\
    \ If even a few recapitulate the success of a Lederberg\\nor a Josephson such a program would be well worth it\\n.\\nFocused\
    \ Research Organizations (FROs): First trialled in 2021, these are\\norganizations of scientists and engineers which \\\
    \"require levels of coordinated engineering\\nor system-building inaccessible to academia\\\", often tens of millions\
    \ of dollars . They aim\\nto produce a well-defined tool, technology, or scientific dataset. Examples include: E11 bio\\\
    n(https://e11.bio/), developing tools to make it relatively easy and inexpensive to map mice\\nbrains, down to the level\
    \ of single synapses; and the Cultivarium\\n(https://www.cultivarium.org/) \\u2013 most work in synthetic biology has\
    \ been focused on a\\nfew model organisms, but the Cultivarium is developing tools to make synthetic biology\\nroutine\
    \ in a much wider range of organisms. At first glance, FROs seem similar to\\nendeavors such as LIGO, the LHC, and the\
    \ human genome project, each of which also\\ninvolved large-scale science and engineering in pursuit of well-defined ends.\
    \ But in the\\npast such endeavors were conceived and funded on a bespoke basis. The innovation of\\nFROs is that they\
    \ are a scalable way of eliciting and creating such entities; the underlying\\n(/index.html)\\n29\\n30\\n31\"\n  },\n\
    \  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n18/107\\n\\nthesis is that such a scalable means would reveal many valuable FROs that are currently\\nlatent. It is (again)\
    \ a mechanism to search out and activate a kind of intellectual dark\\nmatter\\n.\\nPara-academic Fellowship: A Fellowship\
    \ for people to do independent research work\\noutside academia. The underlying thesis is that there are many such people\
    \ who have\\nextremely unusual combinations of skills, skills unlikely to be found in academia, but\\nwhich may enable\
    \ important discoveries. Think of people such as Jane Jacobs, Judith Rich\\nHarris, and Robert Ballard. Indeed, if we\
    \ go back further in time, think of the young Albert\\nEinstein, during his time in the Swiss Patent Office. Again: this\
    \ is building a detector for a\\nclass of undervalued intellectual dark matter, and then funding whatever seems most\\\
    npromising\\n.\\nDiscipline-switching Fellowship: To make it easy for outstanding scientists to change\\nfields. We have\
    \ met many scientists who have no trouble getting funding in the field they\\nare currently working in, but who tell us\
    \ they would prefer to be working in some other\\nfield. This is strange: they have funding to work on projects they're\
    \ not so keen on, but not\\nfor things they consider more promising. Sometimes they have some special insight or\\nedge\
    \ that they feel gives them an advantage in their desired new area. Others feel they\\nhave run the course of what they\
    \ have to contribute in their current field. Whatever the\\nreason, funders currently largely ignore this information:\
    \ it is, yet again, intellectual dark\\nmatter. Surfacing and acting on it will help people better use their talents.\
    \ Done at\\nsufficient scale, it would help established but moribund fields die. And it would also\\nsurface useful aggregate\
    \ information: if people are unexpectedly going into unglamorous\\nfields or leaving high status fields, that's a striking\
    \ signal that something is afoot. Many\\nsmall-scale programs along these lines are already done; it would be interesting\
    \ to make,\\nsay, 50,000 such grants each year, providing a huge injection of disciplinary liquidity into\\nscience\\\
    n.\\nAs with the program ideas suggested in the opening section, we're not claiming that any one of\\nthese program ideas\
    \ would revolutionize science. Indeed, we're not even claiming any\\nparticular one would work well at all; some might\
    \ work quite poorly (though we're not sure\\nwhich!) A healthy discovery system should trial a profusion of ideas, including\
    \ many which\\nfail; that's what it means to be trying risky things. We do believe it's worth trialling all the ideas\\\
    nabove, and many more. Conducting such trials would help answer an immense variety of\\n(/index.html)\\n32\\n33\\n34\"\
    \n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n19/107\\n\\nquestions, things like: how much demand is there for discipline switching? What are the\\nresulting flows\
    \ of scientists between disciplines? What determines those flows? How well do\\nyoung people perform as Principal Investigators?\
    \ Are there systematic differences in the\\ndirections they explore? And so on, a cornucopia of questions, partial answers,\
    \ and useful data.\\nIn that sense, even \\\"failed\\\" programs would be successful: they will contribute crucial\\nknowledge\
    \ to our understanding of metascience. And in the event that one of the programs\\nworks strikingly well, it can be scaled\
    \ up. It may even begin to change the culture of science.\\nThere is a particular sense in which existing funders already\
    \ change their \\\"detector\\\": they\\nactively search for new research subfields to fund. Consider, for instance, the\
    \ way the NIH\\nsystematically expands their panel areas. Or the way DARPA searches for technological\\nwhitespace. But\
    \ the notion of intellectual dark matter goes much further than that\\n. The\\nunifying motivating question is: what does\
    \ the body of scientists know that is important, and\\nyet is currently either invisible (or not visible enough) to funders?\
    \ For example, FROs are not\\nprincipally about expanding the range of fields being considered; rather, they are about\
    \ a\\nchange in the structure of scientific problem which may be attacked at all. How do you know\\nsuch intellectual\
    \ dark matter exists? You can't. But the success of bespoke prior projects such\\nas LIGO, the LHC, and the human genome\
    \ project at least suggest it's worth looking. Similarly,\\nthe Discipline-switching Fellowship isn't about expanding\
    \ the range of fields considered, but\\nrather about making use of scientists' knowledge of their own comparative advantage.\
    \ And\\nagain, this is suggested by famous examples: Francis Crick from physics to molecular biology;\\nEd Witten from\
    \ mathematics to physics. And so on. If you talk with individual scientists, and\\nappreciate the barriers preventing\
    \ such switching, you realize the intellectual dark matter\\nexists, and a scalable Discipline-switching Fellowship is\
    \ natural. Such intellectual dark matter\\nis replete in the history and current practice of science. By searching out\
    \ specific examples, it's\\npossible to identify many more programs in the vein of those above\\n.\\nThe programs just\
    \ described were generated by thinking of funders as detectors. What if we\\nfocus instead on funders as predictors, trying\
    \ to develop new inference procedures to make\\ndecisions? Again, there are an immense number of ways this can be done.\
    \ Here's three\\nprogram suggestions based on changed prediction methods:\\nElicit-the-secret-thesis: Sometimes a scientist\
    \ undertakes a project because they have\\nsome special secret, something they know that no-one else fully appreciates,\
    \ giving them a\\nunique competitive edge. Feynman talked about the necessity of having \\\"to think that I\\n(/index.html)\\\
    n35\\n36\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n20/107\\n\\nhave some kind of inside track\\u2026 that I have some special mathematical trick that I'm\\ngoing to use\
    \ that [my competitors] don't have, or some kind of a talent\\\" . But if you're a\\nscientist with such an edge, you're\
    \ in a bind when it comes to funding. You don't want to\\ndisclose this special edge in a peer-reviewed grant: you may\
    \ be telling competitors your\\nbest ideas! Thus: the standard peer review procedure sometimes suppresses the\\ninformation\
    \ that would be most useful for making decisions. It's an inverse market for\\nlemons\\n, a form of asymmetric knowledge\
    \ where perverse incentives inhibit the applicant\\nfrom revealing how good their idea is. Of course, some projects have\
    \ competitive edges of\\na less easy-to-copy nature (e.g., special equipment or personnel). But not all. A grant\\napplication\
    \ could have a short separate section, where scientists are asked to describe any\\nsecret competitive edge they have.\
    \ The funder would promise this secret thesis is seen only\\nby the (professional, not peer) program manager. The secret\
    \ thesis could then be used as\\nan input in the decision-making; sometimes, it would be the decisive input.\\nA quota\
    \ for young program managers: Suppose 50 percent of program managers\\nwere required to be appointed before age 28, and\
    \ only allowed to serve for five years.\\nPerhaps offer program manager jobs to all the Hertz or NSF Graduate Fellows\
    \ at age 27?\\nHow would that change the nature of decisions made? Conventional wisdom says it\\nrequires age and experience\
    \ to make good decisions. Perhaps that wisdom is correct. But\\nthe thesis here is that younger program managers would\
    \ make systematically different\\ndecisions to today's incumbents, an effective change in inference method, and perhaps\\\
    nwith some advantages relative to the current situation. It would also be interesting to try\\nsimilar ideas at other\
    \ levels of a funder, perhaps at the level of the overall CEO or Director.\\nWhat would a 25 year-old Director do differently,\
    \ compared to the 50-, 60- and even 70-\\nsomethings common now at most funders?\\nA \\\"Nobel prize\\\" for funders:\
    \ The early stages of important discoveries often look\\nstrange and illegible: people grappling with fundamental ideas\
    \ in ways at the margin of, or\\noutside, conventional wisdom. Since such projects often look like anything but sure bets,\\\
    nthere is a strong incentive for funders to delay support \\u2013 just when it is most needed \\u2013 in\\norder to avoid\
    \ looking foolish. This is especially true of individual program managers, who\\nnaturally shy away from funding things\
    \ that may later seem silly or frivolous. It's striking\\nto contrast this situation with venture capital, where there\
    \ is a strong incentive to fund in\\nthe earliest stages, when stock is cheap because of the uncertainty; the net result\
    \ is more\\nchance of looking silly when things fail, but also a much larger windfall if things work\\n(/index.html)\\\
    n37\\n38\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n21/107\\n\\nout\\n. It's interesting to think about ways of rewarding the science funders \\u2013 especially\\nindividuals\
    \ \\u2013 who are first to put their own reputations on the line to support such\\nprojects. This can be done in many\
    \ ways: one natural way is to create one or more prizes to\\npublicly recognize such brave funders.\\nWe could explore\
    \ the generative power of the detector-and-predictor model at much greater\\nlength. Each element can be riffed upon endlessly,\
    \ generating many more program ideas. But\\nthat's not our purpose in this essay. Rather, the model is here as an example\
    \ of a generative\\ndesign heuristic which can be used to explore one (tiny!) part of the metascience design space.\\\
    nLet's now discuss more briefly several other such design heuristics. Each provides a different\\nway of exploring that\
    \ design space, while illustrating the broader idea of metascience as an\\nimaginative design practice.\\nMetascience\
    \ as an imaginative design practice\\nThe detector-and-predictor-model poses the question: where is there intellectual\
    \ dark matter,\\nand how to detect and amplify it? The underlying thesis is that there are many such types of\\ndark matter,\
    \ and by identifying new types we can activate untapped latent potential for\\ndiscovery. Now, let's briefly discuss four\
    \ other metascientific questions motivating different\\nways of exploring the design space. Each question needs an essay\
    \ or book of its own, and could\\ngenerate dozens or hundreds of program ideas, each with its own in-depth treatment\\\
    n. But we\\nbelieve these brief descriptions evoke what is possible, and help convey different theses about\\nwhere there\
    \ is latent potential for discovery.\\nHow to 10x the rate at which new fields are created? The physicist Paul Dirac once\\\
    nsaid that the 1920s, when quantum mechanics was discovered, was a period in which it\\nwas very easy \\\"for any second-rate\
    \ physicist to do first-rate work\\\" . Indeed, history\\nsuggests the early days of new scientific fields are often golden\
    \ ages, with fundamental\\nquestions about the world being answered quickly and easily. By contrast, later work often\\\
    nrequires far more effort to make progress on more incremental questions. As Dirac said\\ndecades after the discovery\
    \ of quantum mechanics: \\\"There has not been such a glorious\\ntime since. It is very difficult now for a first-rate\
    \ physicist to do second-rate work.\\\" We\\nbelieve science is badly bottlenecked on field formation. In particular,\
    \ we believe current\\nsocial processes in science are designed to support work in existing fields, but strongly\\n(/index.html)\\\
    n39\\n40\\n41\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n22/107\\n\\ninhibit work critical to the creation of new fields. What programs would dramatically\\nincrease the rate\
    \ of production of fruitful new fields? (And how to simultaneously avoid\\nthe creation of unfruitful Potemkin fields,\
    \ animated by money rather than deep ideas?)\\nSuch programs would support ideas which are: in their very early stages\\\
    n; illegible\\nthrough conventional processes; outside standard disciplines; and from unusual sources.\\nTo develop such\
    \ programs would mean understanding early signals that a new field is\\nstirring, and designing to detect and support\
    \ those signals. We believe many such signals\\nare actively selected against in existing funding programs, and selecting\
    \ for them would\\nunlock tremendous latent potential for discovery.\\nHow to greatly increase support for high risk,\
    \ high reward projects? This is\\nbased on the idea, popular though not universal among scientists, that an enormous\\\
    nopportunity in science is to increase support for high risk, high reward research\\n. As we\\nmentioned earlier, funders\
    \ often talk about \\\"high risk, high reward\\\" research in their\\nmarketing brochures, but it's often merely words\
    \ and research theater, not actual risk. To\\ndevelop programs to support genuine risk means developing commitment mechanisms\\\
    nthat tie allocation of resources to risk. We've already seen some design ideas that can help:\\nmeasuring risk, bundling\
    \ and unbundling and moving it around, through ideas like\\ninsurance and hedging; improving scientists' fallback options\
    \ (one of many possible\\nmeans of de-risking); increasing variation and disagreement; increasing pressure for a\\nthesis\
    \ identifying a unique competitive edge. These ideas arose incidentally as we\\ndeveloped other ideas. Pursued for their\
    \ own sake, they could be developed much further,\\nand other primitives introduced. It's notable that existing science\
    \ funders seem to be\\nbringing little urgency to the pursuit of such ideas: for instance, for more than a decade\\nwe've\
    \ heard funders talk about \\\"taking a portfolio approach\\\". None, that we know of, have\\nactually gone beyond largely\
    \ toothless informal heuristic approaches. Indeed, they are not\\neven systematically using the simplest of tools \\u2013\
    \ things like dollar cost averaging, routine\\nportfolio rebalancing, insurance or hedging, much less more sophisticated\
    \ ideas.\\nInstitutional investors in the financial markets take risk seriously, and routinely use such\\nideas. Science\
    \ funders could and should develop analogous ideas. Risk can potentially be\\ndesigned, and the relationship to reward\
    \ understood\\n.\\nHow to fix the problems with hypothesis testing? (The reproducibility\\nmovement) Hypothesis testing\
    \ has been widely used in science for decades, and plays a\\ncentral role in many fields. It has been known almost as\
    \ long that it is susceptible to\\n(/index.html)\\n42\\n43\\n44\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n  \
    \  \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n23/107\\n\\nquestionable\
    \ research practices: p-hacking, the file drawer effect, and many others. The\\nmeta-researcher John Ioannidis has used\
    \ this to argue that \\\"most published research\\nfindings are false\\\"\\n. The rough claim was that a large fraction\
    \ of results in many fields\\namount to little more than statistical noise. In the 2010s a small cadre of people seriously\\\
    ndeveloped a suite of greatly improved research practices that aimed to make those fields\\nmuch more reliable. This work\
    \ is ongoing, but initial results are encouraging, and we\\ndiscuss this work more in Part 2 of this essay. The underlying\
    \ thesis is that these changed\\npractices enable much stronger foundations for many fields, and consequently a reliable\\\
    naccumulation of knowledge. That may sound dry, but it parses out close to: it means these\\nfields can begin to make\
    \ reliable, cumulative progress. And that's an enormous,\\ntransformative change\\n.\\nHow to ensure scientists share\
    \ results openly, so others may build on their\\nwork? (The modern open science movement\\n) In the 17th century, scientists\
    \ often\\nkept their discoveries entirely secret, or would \\\"publish\\\" accounts only in the form of\\nanagrams, which\
    \ could later be unscrambled to establish priority over competitors. Early\\nmetascientists such as Henry Oldenburg realized\
    \ science and humanity would be far better\\nserved if scientists openly shared their discoveries. They worked hard to\
    \ establish the\\nscientific journal system, a kind of collective long-term memory for humanity, one that\\nenabled scientists\
    \ to build on each others' results. Modern computer networks radically\\nexpand the possibilities for open science, enabling\
    \ scientists to build on each others' ideas,\\ndata, and code in formerly unprecedented ways. This enables an ongoing\
    \ restructuring of\\nhow scientists work, both individually and collectively.\\nThere are many other plausible questions\
    \ one might ask, other generative heuristics to explore\\nthe design space. Even more briefly: (1) In biology evolutionary\
    \ innovation often follows\\ncatastrophe; this happens in markets too; would it lead to an explosion of discovery if we\\\
    ntemporarily but drastically decreased (and then increased) funding to entities such as the NSF?\\nWe don't expect this\
    \ suggestion to be popular, but that does not mean it's wrong. (2) Can we\\nuse cryptoeconomics to radically improve the\
    \ political economy of science, creating far\\nstronger alignment between individual incentives and collective social\
    \ good\\n? (3) Can we\\ndiversify exploration and unleash creativity by decreasing the amount of grant overhead, since\\\
    noverhead incentivizes universities to follow grant agency fashion, and is thus a strong\\ncentralizing force\\n?\\n(/index.html)\\\
    n45\\n46\\n47\\n48\\n49\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n24/107\\n\\nThese questions are different to \\\"where is there intellectual dark matter, and how to detect and\\namplify\
    \ it?\\\" But each expresses a different design heuristic, helping us explore different parts\\nof the metascience design\
    \ space\\n. As we noted earlier, the value of those heuristics lies not in\\ntheir descriptive correctness or universality\
    \ , but rather in their ability to help generate good\\nnew design ideas. Each is based upon a plausible broad thesis\
    \ about where there is latent\\npotential for discovery, and sketches mechanisms to unlock that potential. The greater\
    \ the\\npotential and the better it is activated, the more transformative.\\nUnderlying these heuristics is a view of\
    \ metascience as an imaginative design practice. It's a\\nview very different from that common in the natural sciences,\
    \ which are most often about more\\ndeeply understanding existing systems, or natural variations thereof\\n. Design, by\
    \ contrast,\\nis about inventing fundamental new types of object and action, which don't obviously occur in\\nnature.\
    \ Consider Genovese maritime insurance as an example. It wasn't a change to how ships\\nwere built, or sailors trained.\
    \ Rather, it introduced a radical new interlinked set of abstractions\\n\\u2013 the insurance premium, counterparties,\
    \ spreading of risk, insurance payouts. These are\\nbeautiful, non-obvious ideas, none of which naturally occur in the\
    \ world. Rather, they were\\ninvented through deep design imagination. And despite being \\\"made up\\\", they transformed\\\
    nhumanity's relationship to the world. This is characteristic of design imagination. It must have\\nseemed to the Genovese\
    \ that financiers were \\\"naturally\\\" reluctant to finance expeditions, given\\nthe risks, and that this was a fixed\
    \ feature of the world. And yet design showed that this was an\\nillusion, which could be radically changed.\\nWe mention\
    \ this because discussions of metascience often give short shrift to imaginative\\ndesign. We often meet people who think\
    \ metascience means studying relatively minor tweaks\\nto existing social processes, for things like peer review, hiring,\
    \ granting, and so on. Those\\nminor tweaks are genuinely valuable, and can teach us much. But we believe that imaginative\\\
    ndesign can be at the core of metascience. That means inventing fundamental new primitives for\\nthe social processes\
    \ of science. It means developing tremendous design imagination and\\ninsight and new ideas to explore the metascience\
    \ design space. We believe the most important\\nand powerful social primitives in this design space are yet to be discovered.\\\
    nIt's challenging to illustrate this idea of imaginative design as well as we should like. That's in\\npart because truly\
    \ imaginative design is hard. The individual program ideas we've described\\nillustrate no more than rather modest levels\
    \ of imagination. A few \\u2013 ideas like the failure\\naudits or tenure insurance or the Century Grant Program \\u2013\
    \ do involve moderately striking new\\n(/index.html)\\n50\\n51\\n52,53\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\"\
    ,\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n25/107\\n\\ndesign ideas\
    \ (not all ours!). But they're not as imaginative as maritime insurance was in its\\ntime. Still, we hope you'll think\
    \ of individual program ideas like these as points in a pointilist\\nsketch to evoke metascience as a design practice.\
    \ And we're confident that deeper and more\\nimaginative ideas are possible than anything we gesture at here. Developing\
    \ such ideas is part\\nof the challenge and opportunity of metascience.\\nThere's no reason to expect scientists to be\
    \ good at this sort of design. Scientists are users of\\nthe discovery system, not (for the most part) designers. There's\
    \ no reason they should deeply\\nunderstand how to improve it, any more than someone who drives a car should understand\\\
    nhow to design and build a great car. A good driver will notice problems with their car, and may\\nhave important insights\
    \ about cars. But that doesn't mean they'll understand the origins of\\nthose problems in the design, or how to fix them,\
    \ or how to design new and better cars. Just\\nbecause someone is good at science doesn't mean they have the skills of\
    \ a good designer.\\nWorse, they're sometimes convinced they know, and will ignore or hold in low regard people\\nwho\
    \ actually have more insight about these things. It's all \\\"soft skills\\\", not \\\"real knowledge of\\nscience\\\"\
    , in this view, and so how could an outsider have anything useful to say? Contrariwise,\\njust because someone has strong\
    \ convictions about the social processes of science, doesn't\\nmean they actually have much insight. Indeed, we confess\
    \ to much self-doubt on this point. On\\nthis issue, humanity is still figuring out how to tell the difference between\
    \ people with insight\\nand people who merely have strong convictions about how science should be\\n.\\nWe've been developing\
    \ the idea of metascience as an imaginative design practice. In Part 2\\nwe'll argue that this is one of three major components\
    \ of metascience. The other two\\ncomponents are: (1) metascience as an entrepreneurial discipline, actually trialling\
    \ and then\\nscaling out new social processes; and (2) metascience as a research field, aimed at deepening\\nour understanding\
    \ of the social processes of science, in part as a tool to evaluate their impact\\non discovery. All three components\
    \ must work together for metascience to be successful.\\nThe point about scaling out deserves amplification. Our discussions\
    \ so far have been of modest\\npilot trials that could be done unilaterally today. If such ideas were scaled out broadly,\
    \ they\\nwould change science far more profoundly than the trials: they would change the culture of\\nscience, i.e., the\
    \ ambient environment and background working assumptions scientists take for\\ngranted.\\n(/index.html)\\n54\"\n  },\n\
    \  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n26/107\\n\\nAs a concrete example, suppose programs to support much higher risk work were scaled out\\nbroadly. Done\
    \ well, the culture would change so that it was routine for scientists to pursue\\nextremely ambitious and risky projects.\
    \ Taken far enough, some scientists may begin to worry\\nabout their plans not being risky enough, rather than too risky\
    \ . This change in culture would\\nhave many follow-on effects: in how scientists choose what to work on; in how they\
    \ develop\\nand change over the course of their working lives; in the personality characteristics of the\\npeople who\
    \ choose to go into and remain in science; and so on. We believe it's not an\\nexaggeration to say that such a change\
    \ would transform the culture of science. And it would be\\na qualitatively different kind of change than merely a trial\
    \ program.\\nThat's just one example. Many others could be given. But we trust the broader points are clear:\\n(1) large\
    \ cultural shifts are different in kind from unilateral pilot trials, even if the cultural shift\\nis \\\"merely\\\" making\
    \ widespread some idea of the trial; and (2) each of the trial ideas above have\\nnatural extensions as part of broader\
    \ cultural changes.\\nSummarizing, and looking ahead, in the vision that will emerge, metascience is not just about\\\
    nthe study of science, understanding descriptively what is happening. It has as a fundamental\\ngoal interventions to\
    \ change science. And metascience is not only about incremental\\ninterventions. It is also about wildly imaginative design,\
    \ conjuring new fundamental elements\\nfor social processes in science. This is what we mean when we say metascience is\
    \ an\\nimaginative design discipline. Furthermore, metascience is not just theoretical. That is, it is not\\njust about\
    \ new understanding (and papers), in the conventional academic mode. It requires\\nbuilding new organizations, new programs,\
    \ new tools, and new systems. Only by such\\nentrepreneurial building is it possible to test metascientific ideas, and\
    \ to improve our\\nunderstanding. That improvement is both valuable in its own right, and also improves what\\npeople\
    \ can build in the future. At the same time, it is not sufficient just to build local systems.\\nMetascience also requires\
    \ moving from (comparatively) small trials to broader cultural\\nchanges in science. That is the main subject of Part\
    \ 2 of the essay.\\nPart 2: The decentralized\\nimprovement of the social processes\\nof science\\n(/index.html)\\n55\"\
    \n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n27/107\\n\\nBottlenecks inhibiting decentralized\\nimprovement\\nImagine you're a graduate student with a brilliant idea\
    \ to improve the way science is funded.\\nChafing under what you perceive as a flawed academic system, you learn about\
    \ the history of\\nscience and alternate funding models. You talk with many scientists, and delve into alternate\\nmodels\
    \ of the allocation of resources \\u2013 ranging over fields such as finance, organizational\\npsychology, and anthropology.\
    \ You develop and discard many ideas; over time, your ideas get\\nmore imaginative and insightful. And you gradually develop\
    \ insights you believe would enable\\nyou to create a new funding agency, one that would, given time and resources, be\
    \ vastly\\nsuperior to the status quo. You raise pilot funding, and begin to operate. You identify some\\nmisconceptions\
    \ in your ideas, and improve them still further. Suppose you did all this, and\\nyour idea genuinely was vastly better\
    \ for science than existing funders, such as the NSF and\\nNIH. Would your funder rapidly grow to be larger and more influential\
    \ than the NSF and NIH?\\nThis has not happened in the modern era. Nor has it happened that such an outsider has\\nrapidly\
    \ grown a research organization to a scale outstripping Harvard and Cambridge and\\nother incumbents. Examples like Janelia\
    \ and Altos might seem superficially to be examples,\\nbut they are not: they didn't grow because they were better; rather,\
    \ they were simply endowed\\nin advance by wealthy donors. Indeed, the possibility of such growth happening seems almost\\\
    nludicrous. Garage band research organizations don't grow to worldwide pre-eminence\\n. But\\nwe'll argue that this kind\
    \ of change is both highly desirable and potentially feasible in science.\\nOne tremendous strength of modern science\
    \ is that a similar phenomenon does happen\\nroutinely with scientific ideas: outsiders or people with little power (e.g.,\
    \ graduate students)\\nreplacing established ideas with better ones. There are many famous examples. Think of the\\nway\
    \ the young and unheralded Francis Crick, James Watson, and Rosalind Franklin\\ntriumphed over Linus Pauling in the race\
    \ to decode the structure of DNA. Pauling was the most\\nfamous chemist then alive, and he announced his (incorrect!)\
    \ structure for DNA first; Crick,\\nWatson, and Franklin were scrappy outsiders, apparently beaten to the punch. But they\
    \ were\\nright, and Pauling was wrong, and their structure  was almost immediately accepted by the\\nscientific community,\
    \ including Pauling(!) Or think of the 22 year old Brian Josephson, whose\\nwork on superconductivity was publicly rebutted\
    \ in a paper by John Bardeen, the only person\\never to win two Nobel Prizes in physics. But Josephson was right and Bardeen\
    \ was wrong, and\\n(/index.html)\\n56\\n57\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision\
    \ of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n28/107\\n\\nthe physics community quickly sided\
    \ with Josephson. Or perhaps the most famous example of\\nall: the 26 year old Albert Einstein, a patent clerk who proposed\
    \ new conceptions of space,\\ntime, mass, and energy. And in almost no time his ideas triumphed over the old.\\nThese\
    \ examples are exalted. But something similar happens routinely at a much less exalted\\nlevel. One of the best things\
    \ a graduate student can do in their PhD is convincingly show that a\\ncelebrated idea of one of their elders is incomplete\
    \ (often a gentle way of saying \\\"wrong\\\") or\\nneeds extension. That's the way careers are made, and the ideas of\
    \ science are updated and\\nimproved. While this process is often bumpy, this replacement or improvement of scientific\\\
    nideas is genuinely routine. It's foundational for science, and happens so often that it's tempting\\nto take for granted.\
    \ But it only happens because extraordinary institutions ensure that good\\nideas from relative outsiders can get a fair\
    \ hearing, even when they contradict established\\nwisdom\\n. The value of such decentralized change in ideas has been\
    \ understood since at least\\nthe time of Francis Bacon, who argued for the primacy of experiment and against the received\\\
    nauthority of Church and State. And it was baked into the Royal Society's motto, nullius in\\nverba, take no-one's word\
    \ for it, chosen in 1660, and still used today. Of course, our scientific\\ninstitutions don't always achieve this ideal\
    \ of supporting decentralized change in ideas! There\\nare many cases \\u2013 think of Lynn Margulis or Gregor Mendel\
    \ or Alfred Wegener \\u2013 where the\\nestablishment resisted new ideas long after they should have been taken seriously.\
    \ But\\nnonetheless our scientific institutions do remarkably well, protecting and testing novel ideas,\\nand amplifying\
    \ genuine improvements, even when they come from outsiders.\\nWhat about the analogous process for updating the social\
    \ processes of science? We began this\\nsection with the concrete example of a graduate student attempting to displace\
    \ today's funders\\nor universities. But the idea can also be interpreted more broadly, to include widespread\\nchanges\
    \ to social processes such as peer review, funding, hiring, and so on, such as the\\nalternatives discussed in Part 1.\
    \ In an ideal world there would be a means by which many ideas\\nfor new social processes could be easily trialled, and\
    \ then taken quickly through the following\\nmetascience learning loop\\n:\\n(/index.html)\\n58\\n59\"\n  },\n  {\n  \
    \  \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n29/107\\n\\nMany of the steps in this diagram could be accomplished today by daring and imaginative\\nfunders. But some\
    \ of the steps are very difficult to accomplish today. In particular, suppose you\\ntrial some new social process, and\
    \ find it greatly superior to existing processes. How would you\\nscale it? In this section, we argue that there are many\
    \ strong forces inhibiting scaling, enough\\nso that many existing social processes in science are in a state of near\
    \ stasis, almost unable to\\nchange. More broadly, in Part 2 we'll discuss whether and how it is possible to move out\
    \ of this\\nstasis, so the social processes of science can be much more rapidly improved.\\nWhen we criticize (say) funders\
    \ for being near stasis, we're often immediately told: \\\"that's not\\ntrue, funders try new processes all the time!\
    \ Just look at all the interest in funding lotteries!\\\"\"\n  },\n  {\n    \"name\": \"Funding lotteries are the idea\
    \ that instead of deciding grant outcomes through a peer review\",\n    \"text\": \"process, they should fund grants at\
    \ random from among the pool of applicants (usually after\\nfiltering out obviously kooky ideas). The hope is that this\
    \ will increase the diversity of project\\nideas submitted. The idea seems to have first been seriously suggested by Daniel\
    \ Greenberg in\\n1998\\n. It's been developed over the quarter century since, and began to receive small-scale\\n(/index.html)\\\
    n60\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n30/107\\n\\ntrials in the latter part of the 2010s. Now, in the early 2020s, funding lotteries are a\\nfashionable topic\
    \ of investigation. And it's plausible that over the next decade or so they will be\\nwidely deployed, although we doubt\
    \ they'll become the dominant mode of funding.\"\n  },\n  {\n    \"name\": \"Funding lotteries are genuinely interesting,\
    \ and we're pleased to see serious trials. But we're\",\n    \"text\": \"unimpressed by them as a rebuttal to the charge\
    \ of stasis. They're rather the exception that\\nproves the rule. It's hardly dynamism when it takes a quarter century\
    \ to get widespread\\ninterest in and serious trials of one idea! There should have been (at least) a hundred ideas\\\
    nequally or more ambitious trialled over the same period. A flood, not a trickle. Most of those\\nideas would have failed,\
    \ or been qualified successes. And, ideally, a few would have succeeded\\nso decisively that they'd now be deployed at\
    \ scale. Funding today ought to look vastly different\\nthan a quarter century ago. Not just different in the sense of\
    \ making the administering\\nbureaucracies happier \\u2013 more process, more red tape, more requirements for \\\"accountability\\\
    \".\\nNo: vastly scientifically better, enabling an explosion of discovery. When The New York Times\\nran a laudatory\
    \ 2020 article\\n(https://web.archive.org/web/20220105023613/https://www.nytimes.com/2020/02/14/scie\\nnce/research-funding-lotteries.html)\
    \ about encouraging results from small-scale trials of\"\n  },\n  {\n    \"name\": \"funding lotteries, they briefly noted\
    \ the response of the NSF and NIH: \\\"The U.S. National\",\n    \"text\": \"Science Foundation and the National Institutes\
    \ of Health say that they have not tested lotteries\\nand don't currently plan to do so.\\\" Improving their approach\
    \ isn't a top institutional priority\\nand matter of urgency for those agencies. It's something to do only if it doesn't\
    \ interfere with\\nother priorities.\\nWe believe there are four main reasons scalable change to social processes is hard\
    \ in science.\\nFirst is the centralization of control over science in a small number of large funders and\\ninfluential\
    \ research institutions . If you ask scientists to tell you how granting, hiring, and\\npeer review are broken, many will\
    \ tell you about a plethora of problems, and make suggestions\\nfor improvement. Unfortunately, many of the suggestions\
    \ are of the form: \\\"The NIH [or NSF\\nor Nature or Harvard or one of a small handful of other organizations] should\
    \ [do such-and-\\nsuch]\\\". This may work if the Director of the NIH or the NSF throws their weight behind the\\nproposal.\
    \ But that happens rarely. When most resources are under the control of a few\\norganizations which are not designed to\
    \ undergo radical organizational change, those\\norganizations are a bottleneck preventing improvement.\\n(/index.html)\\\
    n61\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n31/107\\n\\nSecond, in many cases there is no single organization or person who can make a change. Again,\\nyou hear:\
    \ \\\"The system needs to change the incentives [or norms or processes] in [such-and-\\nsuch a way]\\\". Even when true,\
    \ no-one is singly responsible for processes such as peer review,\\nor the importance of high impact journals, or etc.\
    \ You can't get a meeting with the Director of\\nScience-as-a-Whole and convince them to throw their weight behind a change.\
    \ They are,\\ninstead, collective action problems. This does not mean single individuals can't have a big\\nimpact: if\
    \ the Director of the NIH went on the warpath against impact factor, for instance, they\\ncould make a big difference.\
    \ But it's still a community-held norm, and requires collective\\nchange. Of course, you may complain privately that the\
    \ incentives are not right, and\\n\\\"something should be done\\\"\\n. But while that may blow off steam, sensible working\
    \ scientists\\nmostly just get on with their scientific work.\\nThe third factor, which reinforces the first two, is network\
    \ effects that homogenize social\\nprocesses. Over and over we hear variations on: \\\"I'd like to try this new thing\
    \ \\u2013 publishing in\\nan unconventional way, supporting students in high risk or unfashionable work, changing to\\\
    nan unfashionable field \\u2013 but I have a responsibility to my students and collaborators to toe the\\nline right now.\\\
    \" There's a tyranny of the community: people won't try unusual things, since\\ntheir community would look askance; the\
    \ unusual things therefore never get serious attention;\\nas a result, the community thinks poorly of those very possibilities.\
    \ Such communities have\\nmechanisms designed to help them collectively change their scientific ideas, but no similar\\\
    nmechanism for changing their social processes. This is compounded by a shadow of the future:\\npeople worrying about\
    \ imagined future judgments of their community. Suppose, for example,\\nsomeone wishes to experiment with sharing their\
    \ scientific results in a non-standard way: they\\nmust weigh that desire against the (imagined) future negative judgment\
    \ of some hiring or\\ngranting committee. This may seem a small thing, but community judgment is so important in\\nscience\
    \ that it strongly inhibits experimentation.\\nThese three factors badly bottleneck change within existing institutions.\
    \ The obvious\\nworkaround is to build new institutions which by fiat may ignore the first two factors. Such\\nnew institutions\
    \ could, for example, simply declare that publication in high-impact journals is\\nforbidden to employees, or engage in\
    \ practices strongly encouraging high risk work. But when\\nthis is done, the third factor \\u2013 network effects \\\
    u2013 influence the startup institution even more\\nstrongly. Scientists considering working for Jazzy Not-for-Profit\
    \ (or for-Profit) Startup\\nInstitute must ponder: do they really want to give up publication in high impact journals?\
    \ Or to\\nwork on risky projects that may not pan out? Or to do anything else which violates the norms\\n(/index.html)\\\
    n62\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n32/107\\n\\nof their scientific community? If they ever decide to leave their Jazzy Startup Institute job,\\nwon't they\
    \ then have a tough time finding another good job? After all, other potential\\nemployers haven't changed their standards,\
    \ just because Jazzy Startup Institute has. The\\nshadow of the future looms strongly for such ventures, causing a kind\
    \ of regression to the\\ninstitutional mean. One of us (MN) has worked in many unusual startup research\\norganizations.\
    \ The perennial question within such organizations is: if I hew to local\\naspirations, will that damage my chances of\
    \ getting a job anywhere else?\\nNow, such forces could be overcome if Jazzy Startup Institute seemed likely to grow to\
    \ be far\\nlarger than others, so its standards became dominant and replaced those of the existing\\ncommunity. But there's\
    \ a fourth bottleneck, which is that there's no natural feedback loop\\ndriving growth in new institutions. In particular,\
    \ even if a new institution is scientifically\\noutstanding, that does not mean it will grow to be much larger than existing\
    \ institutions.\\nBetween these four bottlenecking factors, the discovery ecosystem can only change many of its\\nsocial\
    \ processes very slowly.\\nWith that said, these bottlenecks only apply to change in certain kinds of social process:\
    \ those\\nwhich are collectively held. It is often possible to change social processes when they're not\\ncontrolled by\
    \ central agencies, or network consensus, or strongly influenced by community\\njudgment or the shadow of the future.\
    \ And when we look empirically, we see lots of variation in\\nlabs and institutions in just these ways. We've seen labs\
    \ with very unusual approaches to\\nmentorship, for example, or to hosting visitors, or to seminar culture\\n, and so\
    \ on. Such\\nvariations in social process fall outside the bottlenecking forces mentioned above, and so can\\nbe changed\
    \ unilaterally. Such changes are of great interest, both from the practical point of\\nview of doing better science, and\
    \ as objects of study within metascience. But they're not within\\nthe scope of this essay. In this sense, the essay is\
    \ about a vision of a particular aspect of\\nmetascience, that aspect concerned with improving social processes that are\
    \ collectively held,\\nand so subject to these bottlenecks. For the most part, we'll omit the \\\"collectively held\\\"\
    \ from\\n\\\"collectively held social processes\\\" through the rest of the essay, though it should be\\nunderstood.\\\
    nWe've argued that stasis affects collectively held social processes in science. This stasis may be\\nillustrated in many\
    \ ways, and we'll now briefly mention a few. These examples are not meant\\nas dispositive evidence, but rather are merely\
    \ plausible illustrative examples.\\n(/index.html)\\n63\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\"\
    : \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n33/107\\n\\nOne such example is provided\
    \ by the Shanghai Rankings, the longest-running ranking of the\\nworld's research universities. In the 19 years since\
    \ being founded in 2003, the Top 10\\nUniversities have merely shuffled around, every single year, with just one exception\
    \ (#8 in\\n2003 was replaced in 2004's table). Of course, such rankings are only imperfect, and perhaps\\ndo not capture\
    \ genuine changes within the research ecosystem. But neither does this seem\\nillustrative of dynamism and change\\n!\
    \ By contrast, if you consider the top ten technology\\ncompanies in the NASDAQ index, they've been transformed over the\
    \ same time period. 2022's\\nbiggest companies include Meta (Facebook), which didn't exist at all in 2003; Tesla, which\\\
    nbegan operation in 2003; and Alphabet (Google), which was a promising but still small private\\ncompany in 2003. Many\
    \ of today's other behemoths were relatively small in 2003, like\\nNVIDIA, Amazon, and Apple, all far down the NASDAQ.\
    \ As we noted at the beginning of this\\nsection, it simply wasn't possible in 2003 for a grad student to start their\
    \ own research\\nuniversity, and to have it grow to be one of the top 10 research universities in the world. And\\nyet\
    \ the analogous thing did happen with NASDAQ companies. There is far more institutional\\ndynamism in tech than there\
    \ is in research. This is not an intrinsic fact about the world, but\\nrather a consequence of the ways the institutions\
    \ are designed, and so can be changed.\\nAs another illustrative example, consider the case of Katalin Kariko, one of\
    \ the key scientists\\nbehind the messenger RNA (mRNA) vaccines that helped end the Covid-19 pandemic that\\ndominated\
    \ the world in the early 2020s\\n. Kariko worked in relative obscurity for decades.\\nNever earning more than $60,000\
    \ per year, she was ultimately demoted by the University of\\nPennsylvania. Her grant applications were repeatedly turned\
    \ down: \\\"Every night I was\\nworking: grant, grant, grant\\u2026 And it came back always no, no, no.\\\" A key collaborator\
    \ said of\\ntheir attempts to raise funding: \\\"People were not interested in mRNA. The people who\\nreviewed the grants\
    \ said mRNA will not be a good therapeutic, so don't bother,\\\" and\\nsummarized the situation: \\\"When your idea is\
    \ against the conventional wisdom that makes\\nsense to the star chamber, it is very hard to break out\\\". Kariko eventually\
    \ left the university and\\nacademia.\\nOn its own this story doesn't illustrate stasis. Rather, it seems merely to be\
    \ a story of mistakes\\nmade by the NIH and the University of Pennsylvania. But any system will always make\\nmistakes.\
    \ The issue of stasis arises when we ask whether the discovery ecosystem\\nsystematically learns from such mistakes? Have\
    \ the NIH or the University of Pennsylvania\\ndone a serious post mortem on this failure, and made determined changes\
    \ to the way they do\\nthings? The signs are not encouraging. The University of Pennsylvania, which demoted Kariko\\n(/index.html)\\\
    n64\\n65\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n34/107\\n\\nbefore she left, now runs advertisements\\n(https://twitter.com/penn/status/1355983425681956875?lang=en)\
    \ touting the way \\\"Penn\\nresearchers made the breakthrough\\\" leading to the mRNA vaccines. And Sudip Parikh, chief\\\
    nexecutive of the American Association for the Advancement of Science, claims that \\\"The mRNA\\nvaccines are a product\
    \ of doubling our investment in the NIH\\\"\\n. He's not entirely wrong:\\nsome later work on the mRNA vaccines did benefit\
    \ from NIH funding. But at the crucial early\\nstages, when support was most needed, it was: \\\"And it came back always\
    \ no, no, no.\\\" If\\nresearch organizations can and will take credit for discoveries where they manifestly screwed\\\
    nup, how can the discovery ecosystem get any better\\n?\\nKariko's story has been told and retold so many times, in so\
    \ many high-profile places, that it\\nmay become an exception to the rule, and actually lead to genuine change. But the\
    \ pattern is\\ncommonplace. In the late 1980s the molecular biologist Douglas Prasher figured out how to\\nclone the green\
    \ fluorescent protein (GFP) giving some jellyfish their bright green color. Prasher\\nrealized the bright green color\
    \ made GFP potentially an excellent tracer, a kind of tag that\\ncould be used to track the location of cells (in other\
    \ organisms, not just jellyfish), and thus\\nmonitor things like gene expression in an organism\\n. Unfortunately, Prasher's\
    \ requests for\\nfurther funding were turned down; fortunately for humanity, the work was taken up by other\\nscientists,\
    \ some of whom later received the 2008 Nobel Prize in Chemistry. One of the\\nLaureates stated of Prasher's contribution:\
    \ \\\"They could've easily given the prize to Douglas and\\nthe other two and left me out\\\"\\n. At the time of the Nobel\
    \ Prize, Prasher was unable to obtain\\nwork in science, and was instead working as a shuttle bus driver for a car dealership.\
    \ Honest\\nwork, making a contribution, but also something that could be done by many people. It's hard\\nnot to agree\
    \ with one of his former colleagues, who said it was a \\\"staggering waste of talent\\\"\\n.\\nAgain: the issue is not\
    \ that a mistake was made by the funder. Large-scale systems operating\\nunder conditions of great uncertainty will always\
    \ make mistakes. Such mistakes are an\\nimportant and indeed inevitable part of the process. The real problem is how to\
    \ make those\\nsystems responsive, so they learn from their errors. And so, as with Kariko, the right question\\nto ask\
    \ is: has there been a serious post mortem on the error with Prasher? And has there been\\nany systematic change in funding\
    \ or hiring practice as a result? Again: we know of no major\\ninitiative to make such changes. Unfortunately, the discovery\
    \ ecosystem currently appears to\\nlearn little from such errors.\\n(/index.html)\\n66\\n67\\n68\\n69\\n70\"\n  },\n \
    \ {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n35/107\\n\\nYou might respond: wasn't all this work ultimately done anyway? So is the failure to support\\nthe work really\
    \ an indictment of the current discovery system? And does it matter if it doesn't\\nchange in response to such apparent\
    \ errors? The trouble with this argument is that we've no\\nway of knowing what discoveries are not being made at all.\
    \ We see merely the tip of the\\niceberg, scorned scientists who managed to just barely find their way through. But how\
    \ many\\nKatalin Kariko's have been missed? How many are struggling out there right now, perhaps on\\nthe verge of leaving\
    \ science? And how many have already left science, or never even made the\\nentry?\\nUnfortunately, most of the examples\
    \ of change in social processes that we know of are changes\\ntoward more bureaucracy and \\\"accountability\\\". It's\
    \ perhaps unsurprising that bureaucracies\\nwant more (seeming) control, but it often seems likely that such changes have\
    \ done as much to\\nhurt science as to help. Peter Higgs, the physicist who won the Nobel Prize for proposing the\\nHiggs\
    \ boson \\u2013 in some sense, the ultimate cause of mass in the universe \\u2013 has stated: \\\"Today I\\nwouldn't get\
    \ an academic job. It's as simple as that\\\", and described himself as \\\"an\\nembarrassment to the department when\
    \ they did research assessment exercises\\\" . David\\nDeutsch, co-founder of the field of quantum computing, conceived\
    \ quantum computers in the\\nearly 1980s without any grant funding. Later, in 1985, Deutsch received a small grant for\\\
    nfollowup work. In 2018 he asked\\n(https://twitter.com/DavidDeutschOxf/status/982233180081029128) a member of the\\ngranting\
    \ committee if he would have gotten that grant under 2018 criteria and was told \\\"no\\nchance\\\", that he could not\
    \ have ticked any of those boxes. In his Nobel Lecture, Sydney\\nBrenner, one of the great molecular biologists, stated:\
    \ \\\"I want particularly to record the patient\\nand generous support given to me by the Medical Research Council of\
    \ Great Britain. Such long\\nterm research could not be done today, when everybody is intent only on assured short term\"\
    \n  },\n  {\n    \"name\": \"results and nobody is willing to gamble. Innovation comes only from the assault on the\"\
    ,\n    \"text\": \"unknown\\\" . And in 2009 in the The New York Times, Richard Klausner, a former director of\\nthe NIH's\
    \ National Cancer Institute, said : \\\"There is no conversation that I have ever had\\nabout the grant system that doesn't\
    \ have an incredible sense of consensus that it is not\\nworking. That is a terrible wasted opportunity for the scientists,\
    \ patients, the nation and the\\nworld.\\\" In the 13 years since, the NIH \\u2013 the world's largest science funder\
    \ \\u2013 has only made\\nrelatively small, incremental changes to how it operates.\\n(/index.html)\\n71\\n72\\n73\"\n\
    \  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n36/107\\n\\nIn this section, we've argued that many of the social processes of science are in stasis, and\\nidentified\
    \ four bottlenecking forces responsible for that stasis. Our argument is not watertight,\\nand we don't expect to convince\
    \ people who do not want to be convinced. But we believe the\\nargument is plausible enough to proceed. In the remainder\
    \ of this essay we ask: how can we\\navoid or weaken these bottlenecking forces, to achieve scalable improvements in the\
    \ social\\nprocesses of science?\\nA prototype of success: the replication crisis\\nand the Renaissance in social psychology\\\
    nSo, is there any prospect for breaking this near stasis? In an ideal world we'd recount many\\ninspiring stories of change,\
    \ and develop a playbook for what we shall later dub metascience\\nentrepreneurship\\n. Unfortunately, the inhibiting\
    \ forces are strong, and many of the examples\\nwe looked at while researching the essay were depressing: \\\"stories\
    \ of sclerosis\\\" is a better title\\nfor a horror movie than an essay about science. Still there are some partial successes,\
    \ and in\\nthis section we discuss a major change we admire, both to see what we can learn, and to try to\\nunderstand\
    \ what remains to be done.\\nThe example comes from the replication crisis in social psychology , which we briefly\\nmentioned\
    \ earlier. The crisis is usually described as a negative event, but as we'll see it can be\\nviewed as a positive prototype\
    \ for changed social processes, while also illustrating the\\nchallenges of making such changes. It is perhaps most often\
    \ associated to a remarkable 2015\\npaper\\n, which attempted to replicate the results of 100 experimental social psychology\
    \ papers,\\nall taken from leading psychology journals. This 2015 paper, put together by a collaboration of\\n270 authors\
    \ calling itself the Open Science Collaboration, found that only 36 of the 100\\nreplications reported statistically significant\
    \ results; by contrast, 97 of the original studies\\nreported statistically significant results. Furthermore, the mean\
    \ effect sizes in the replications\\nwere roughly half of the original effect sizes.\\nThis paper helped ignite a major\
    \ controversy not just within social psychology, but broadly\\nacross science. Many people considered the drop from 97%\
    \ to 36% a sign that something was\\nbadly amiss in social psychology. A 2015 New York Times article quoted Jelte Wicherts,\
    \ an\\nassociate professor of scientific methodology and statistics at Tilburg University, as saying :\\n(/index.html)\\\
    n74\\n75\\n76\\n77\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n37/107\\n\\nI think we knew or suspected that the literature had problems, but to see it so clearly,\\non such a large\
    \ scale \\u2013 it's unprecedented.\\nIn the seven years since publication, the Open Science Collaboration's 2015 paper\
    \ has been\\ncited more than 7,000 times. We've had individual scientists tell us things like: \\\"I no longer\\ntrust\
    \ many of my own papers before [some date, typically around 2014-2016]\\\". It's not that\\nthey were dishonest in the\
    \ earlier papers: rather, they were proceeding honestly and carefully\\nas they understood things at that time, but they\
    \ now understand that the methodological\\napproaches they used in earlier work were unreliable.\\nSome well-known social\
    \ psychologists were unhappy with the furor. In the same New York\\nTimes article, Norbert Schwarz, a professor of psychology\
    \ at the University of Southern\\nCalifornia, commented:\\nThere's no doubt replication is important, but it's often just\
    \ an attack, a vigilante\\nexercise\\nIn a highly critical response to the 2015 paper, also published in Science\\n, researchers\
    \ at\\nHarvard and the University of Virginia concluded:\\nWe applaud efforts to improve psychological science, many of\
    \ which have been\\ncareful, responsible, and effective, and we appreciate the effort that went into\\nproducing OSC [the\
    \ Open Science Collaboration]. But metascience is not exempt\\nfrom the rules of science. OSC used a benchmark that did\
    \ not take into account the\\nmultiple sources of error in their data, used a relatively low-powered design that\\ndemonstrably\
    \ underestimates the true rate of replication, and permitted considerable\\ninfidelities that almost certainly biased\
    \ their replication studies toward failure. As a\\nresult, OSC seriously underestimated the reproducibility of psychological\
    \ science.\\nAs suggested by these quotes, the 2015 Open Science Collaboration paper triggered a lot of\\npushback and\
    \ a robust and still ongoing conversation. What did the unsuccessful replications\\nmean? Were there major problems in\
    \ some techniques commonly used in social psychology?\\n(/index.html)\\n78\"\n  },\n  {\n    \"name\": \"/28/25, 11:48\
    \ PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n38/107\\n\\nWere\
    \ major reforms in the field needed? And what (if anything) did it mean for other fields of\\nscience? The paper had many\
    \ thoughtful caveats, e.g.:\\nIt is also too easy to conclude that a failure to replicate a result means that the\\noriginal\
    \ evidence was a false positive. Replications can fail if the replication\\nmethodology differs from the original in ways\
    \ that interfere with observing the effect.\\nWe conducted replications designed to minimize a priori reasons to expect\
    \ a different\\nresult by using original materials, engaging original authors for review of the designs,\\nand conducting\
    \ internal reviews. Nonetheless, unanticipated factors in the sample,\\nsetting, or procedure could still have altered\
    \ the observed effect magnitudes\\u2026 After\\nthis intensive effort to reproduce a sample of published psychological\
    \ findings, how\\nmany of the effects have we established are true? Zero. And how many of the effects\\nhave we established\
    \ are false? Zero. Is this a limitation of the project design? No. It is\\nthe reality of doing science, even if it is\
    \ not appreciated in daily practice. Humans\\ndesire certainty, and science infrequently provides it\\u2026 Scientific\
    \ progress is a\\ncumulative process of uncertainty reduction that can only succeed if science itself\\nremains the greatest\
    \ skeptic of its explanatory claims.\\nAs earlier quotes suggest, there is disagreement about what's causing the replication\
    \ crisis.\\nHowever, many scientists suspect the cause is certain practices widely used in social\\npsychology that may\
    \ make it easy to publish incorrect results. For example: the practice of only\\npublishing a study when it obtains a\
    \ statistically significant finding. That sounds reasonable \\u2013\\nafter all, when things don't pan out, doesn't it\
    \ make sense to move along quickly to your next\\nproject? It's practical also, since many scientific journals are extremely\
    \ reluctant to publish\\nnull findings. But this practice has a dark side. If you do enough studies, pure chance means\\\
    nthat occasionally you will obtain what looks like \\\"evidence\\\" for an effect, but was really a\\nstatistical fluke.\
    \ Furthermore, if null results are seldom reported, that means the literature may\\nfill up with papers providing \\\"\
    evidence\\\" which is just such statistical flukes. What seems like a\\nreasonable practice can create a consequential\
    \ bias in scientific journals.\\nWe've focused on the role of the 2015 Open Science Collaboration paper in triggering\
    \ the\\nreplication crisis. But the replication crisis arose gradually. It's beyond our scope to do a full\\nhistory,\
    \ but useful to sketch some of the background. At first this brief history will seem\\ndisconnected to the arc of the\
    \ essay: not a changed social process in sight! But we'll eventually\\n(/index.html)\"\n  },\n  {\n    \"name\": \"/28/25,\
    \ 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n39/107\\\
    n\\nsee that these apparently disconnected historical facts reflect why it's so hard to change social\\nprocesses, and\
    \ what ultimately needed to happen. The 2015 paper was the culmination of a\\nseries of troubling events over 2011-2015.\
    \ This series began in 2011 when a well-known social\\npsychologist named Diederik Stapel was found to have committed\
    \ fraud, fabricating data on a\\nlarge scale. Since then, more than 50 of Stapel's papers have been retracted\\n. The\
    \ year 2011\\nalso saw the publication of a paper by the social psychologist Daryl Bem\\n, using the methods\\nof social\
    \ psychology to demonstrate evidence for precognition(!!) This wasn't a crank, it was a\\nwell-known and respected social\
    \ psychologist publishing a peer reviewed paper in the high-\\nprofile Journal of Personality and Social Psychology. Furthermore,\
    \ unlike in Stapel's case,\\nthere was no suspicion of fraud. Bem's work used standard practices in the field . However,\\\
    nthe extremely surprising nature of the results posed a sharp question about whether those\\nstandard practices might\
    \ sometimes produce unreliable results.\\nIn 2012, St\\u00e9phane Doyen, and colleagues\\npublished an attempt to replicate\
    \ the famous\\n\\\"priming\\\" effect in psychology \\u2013 the result in \\\"which participants unwittingly exposed to\
    \ the\\nstereotype of age walked slower when exiting the laboratory\\\". That replication failed. It was an\\nembarrassing\
    \ failure for the field, in part because in 2011 Nobel Laureate Daniel Kahneman\\nhad published a widely-read popular\
    \ book\\nwhich described the priming studies extensively.\\nIn the book, Kahneman states about priming: \\\"disbelief\
    \ is not an option. The results are not\\nmade up, nor are they statistical flukes. You have no choice but to accept that\
    \ the major\"\n  },\n  {\n    \"name\": \"conclusions of these studies are true.\\\" Yet the failed replications led Kahneman\
    \ to lose much\",\n    \"text\": \"confidence in the field, and he wrote a widely distributed letter, noting that \\\"\
    questions have\\nbeen raised about the robustness of priming results\\\" and that \\\"I see a train wreck looming\\\"\\\
    n.\\nKahneman's letter received a lot of public scrutiny.\\nWith these events in the background, in 2012 it began to be\
    \ common to use the phrase\\n\\\"replication crisis\\\" to describe the state of social psychology\\n. Many social psychologists\
    \ were\\nconcerned about the state of their field, and a steady drip of troubling results continued until\\nthe 2015 Open\
    \ Science Collaboration paper demonstrated that the problems weren't just\\nsporadic, but were plausibly affecting the\
    \ entire field.\\nBut while the replication crisis came to a head over 2011-2015, many of the problems had been\\nknown\
    \ for decades. Writing in 1985, the well-known psychologist Paul Meehl\\nidentified 10\\n\\\"obfuscating influences\\\"\
    \ in what he called \\\"soft psychology\\\". These were widely-used practices,\\n(/index.html)\\n79\\n80\\n81\\n82\\n83\\\
    n84\\n85\\n86\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n40/107\\n\\nincluding the practice described above, of only submitting for publication studies which obtain\\nstatistical\
    \ significance. Meehl did not hold back:\\nThe net epistemic effect of these ten obfuscating influences is that the usual\
    \ research\\nliterature is well nigh uninterpretable\\u2026. If the reader is impelled to object at this\\npoint \\\"\
    Well, but for heaven's sake, you are practically saying that the whole tradition\\nof testing substantive theories in\
    \ soft psychology by null hypothesis refutation is a\\nmistake, despite R. A. Fisher and Co. in agronomy,\\\" that complaint\
    \ does not disturb\\nme because that is exactly what I am arguing.\\n\\\"Well nigh uninterpretable\\\" is about as damning\
    \ a phrase as we know to describe a large\\nfraction of an entire field. Similar points, though less flamboyantly phrased,\
    \ have often been\\nmade by other scientists. Writing in 1975, the well-known social psychologist Anthony\\nGreenwald\
    \ identified\\nmany of the same problems with significance testing. Among others, he\\nidentified the following behaviors\
    \ as problematic:\\nsubmitting results for publication more often when the null hypothesis has been\\nrejected than when\
    \ it has not been rejected\\u2026 continuing research on a problem when\"\n  },\n  {\n    \"name\": \"results have been\
    \ close to rejection of the null hypothesis (\\\"near significant\\\"), while\",\n    \"text\": \"abandoning the problem\
    \ if rejection of the null hypothesis is not close\\u2026 failing to\\nreport initial data collections (renamed as \\\"\
    pilot data\\\" or \\\"false starts\\\")\\u2026 using\\nstricter editorial standards for evaluating manuscripts that conclude\
    \ in favor of,\\nrather than against, the null hypothesis.\\nAll these practices are understandable, very human behaviors.\
    \ If your study \\\"almost\\\" shows\\nstatistical significance, it's tempting to run just a few more analyses in the\
    \ hope of meeting the\\nthreshold for significance. That way you can publish it, rather than abandoning months of\\nwork\
    \ as unpublishable! Unfortunately, such practices may also lead to a scientific literature full\\nof erroneous conclusions.\
    \ As mentioned in Part 1, in 2005 the meta-researcher John Ioannidis\\npublished the provocatively-titled \\\"Why Most\
    \ Published Research Findings Are False\\\". The\\nessence of Ioannidis's paper is that in many parts of science we lack\
    \ good theories to tell us\\nwhat are plausible hypotheses and what are not. Because of that, people are likely to test\
    \ many\\nfalse hypotheses: if they test far more false hypotheses than true (say, 20 false hypotheses for\\n(/index.html)\\\
    n87\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n41/107\\n\\neach true one), then false positives might outnumber true positives in the published literature!\\nIndeed,\
    \ for any given experimental data set it's often possible to run many different analyses,\\nand in this way you're very\
    \ likely to eventually find some apparently-interesting hypothesis\\nthat seems(!) supported by the data. The scientific\
    \ literature would fill up with plausible results\\nthat were really just statistical flukes, not indicative of anything\
    \ about nature.\\nPrior to the replication crisis coming to a head over 2011-2015, the papers by Meehl,\\nGreenwald, and\
    \ Ioannidis were highly-cited papers by well-known scientists. And there were\\nother papers in a similar vein, correctly\
    \ pointing out severe problems with standard practice in\\nsocial psychology and other fields. Yet these well-founded\
    \ criticisms caused few discernible\\nchanges in the practices actually carried out by scientists. Put starkly: the problems\
    \ underlying\\nthe replication crisis had been widely known for decades before 2011-2015. And yet almost\\nnothing had\
    \ been done about it.\\nThe great benefit of the crisis of 2011-2015 is that it was so acute that it helped instigate\\\
    ngenuine methodological and social change. Many of these changes are being expressed in\\nchanged social processes. One\
    \ is a gradual rise in scientists and journals using an approach to\\npublishing papers called Registered Reports\\n.\
    \ In the standard approach to publishing papers,\\nscientists design and perform an experiment, analyze the results, and\
    \ then submit a paper\\ndescribing the results to a journal. The paper is peer reviewed and (if it passes peer review)\
    \ is\\npublished. To pass peer review, a paper must be judged methodologically sound, and also\\n\\\"scientifically interesting\\\
    \". High-profile journals, in particular, set a high bar for what counts\\nas \\\"interesting\\\". Unfortunately: \\\"\
    We looked for such-and-such an effect and found nothing\\\"\\nisn't usually considered \\\"interesting\\\". This creates\
    \ a bad incentive: as a scientist, it's tempting\\nto keep asking different questions of your data until you find a significant\
    \ effect, one plausibly\\nmeeting the bar for \\\"interesting\\\", and so can publish. Or it's tempting to keep taking\
    \ just a little\\nmore data until you achieve significance (and so can publish). And so on. Something which\\nseems innocuous,\
    \ even sensible \\u2013 the desire of journals to publishing interesting positive\"\n  },\n  {\n    \"name\": \"results\
    \ \\u2013 has many bad consequences\",\n    \"text\": \"Registered Reports radically change this model. The idea is for\
    \ scientists to design their study\\nin advance: exactly what data is to be taken, exactly what analyses are to be run,\
    \ what\\nquestions asked. That study design is then pre-registered publicly, and before data is taken the\\ndesign is\
    \ refereed at the journal. The referees can't know whether the results are \\\"interesting\\\",\\nsince no data has yet\
    \ been taken. There are (as yet) no results! Rather, they're looking to see if\\n(/index.html)\\n88\"\n  },\n  {\n   \
    \ \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n42/107\\n\\nthe design is sound, and if the questions being asked are interesting \\u2013 which is quite different\\\
    nto whether the answers are interesting! If the paper passes this round of peer review, only then\\nare the experiments\
    \ done, and the paper completed. A routine second round of refereeing is\\nthen done, to ensure methodological soundness,\
    \ and the paper is published. As of this writing\\n(2022), more than 300 journals are publishing Registered Reports.\\\
    nThere are encouraging signs that pre-registered study designs like this are helping address the\\nmethodological problems\
    \ described above. Consider the following five graphs. The graphs\\nshow the results from five major studies\\n, each\
    \ of which attempted to replicate many\\nexperiments from the social sciences literature. Filled in circles indicate the\
    \ replication found a\\nstatistically significant result, in the same direction as the original study. Open circles indicate\\\
    nthis criterion wasn't met. Circles above the line indicate the replication effect was larger than\\nthe original effect\
    \ size, while circles below the line indicate the effect size was smaller. A high\\ndegree of replicability would mean\
    \ many experiments with filled circles, clustered fairly close\\nto the line. Here's what these five replication studies\
    \ actually found:\\nAs you can see, the first four replication studies show many replications with questionable\"\n  },\n\
    \  {\n    \"name\": \"results \\u2013 large changes in effect size, or a failure to meet statistical significance. This\
    \ suggests a\",\n    \"text\": \"need for further investigation, and possibly that the initial result was faulty. The\
    \ fifth study is\\ndifferent, with statistical significance replicating in all cases, and much smaller changes in\\neffect\
    \ sizes. This is a 2020 study by John Protzko et al\\nthat aims to be a \\\"best practices\\\"\\nstudy. By this, they\
    \ mean the original studies were done using pre-registered study design, as\\n(/index.html)\\n89\\n90\"\n  },\n  {\n \
    \   \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n43/107\\n\\nwell as: large samples, and open sharing of code, data and other methodological materials,\\nmaking experiments\
    \ and analysis easier to replicate. The labs that did the original studies each\\ndid their own self-confirmatory replication;\
    \ they then asked three other labs to perform\\nreplications \\u2013 the fifth graph above shows combined results from\
    \ those independent\\nreplications. In short, the replications in the fifth graph are based on studies using much\\nhigher\
    \ evidentiary standards than had previously been the norm in psychology. Of course, the\"\n  },\n  {\n    \"name\": \"\
    results don't show that the effects are real. But they're extremely encouraging, and suggest the\",\n    \"text\": \"\
    spread of ideas like Registered Reports contribute to substantial progress.\\nWhile the replication crisis is usually\
    \ described negatively, it seems to us that in retrospect the\\n2010s will be seen as the beginning of a Renaissance in\
    \ social psychology. 2011-2015 wasn't a\\nnegative time, but rather was the period when people began to shine a spotlight\
    \ on problems\\nthat had existed for decades, and to take action to address those problems . The eventual\\nresult will\
    \ likely be a much-improved field. This is expressed through improved norms,\\nimproved tools, improved training, but\
    \ all instantiated and funneled through new social\\nprocesses, perhaps including most notably the widespread use of pre-registration,\
    \ as well as\\nideas like open sharing of data and other materials.\\nThat said, it's still a work in progress. Code and\
    \ data sharing to help enable replication is\\nincreasing rapidly, but is far from universal. And it's not yet clear just\
    \ how frequently used pre-\\nregistration should be. The earlier, non-preregistered style is useful for rapid exploratory\
    \ work;\\neliminating that style entirely would set psychology back. It's important to be able to explore\\nquickly and\
    \ unrigorously! Such exploratory studies should continue to be done, but we need to\\nbe far more cautious in how we think\
    \ about the results. Alongside those exploratory studies\\nwill be more rigorous studies, with much higher standards of\
    \ evidence, using ideas like pre-\\nregistration. The end result may be two or more common styles of publication, with\
    \ different\\nepistemological statuses. Speculation aside, the underlying changes are still nascent: changes\\nin people's\
    \ values, their informal folk models of how to do science, and the way those are\\nreified in social processes. But while\
    \ nascent, progress is encouraging. It's an example where\\nthe social processes of science are changing in a significant\
    \ way, broadly across a field. Social\\npsychology is undergoing a major cultural change.\\nWhen we discuss the replication\
    \ crisis with metascience colleagues we're occasionally told the\\nwork on replication is \\\"good, but boring\\\". It's\
    \ not the incredible sunny optimism of flashy new\\nresearch institutes, or fancy ideas for new funding approaches. No-one\
    \ is giving triumphant\\n(/index.html)\\n91\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision\
    \ of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n44/107\\n\\ninterviews about how they're coming\
    \ to save science. It's a set of simple but powerful ideas for\\nsocial and methodological changes which will make social\
    \ psychology more reliable. But while\\nit isn't flashy, it is scaling out. Not just one or a few local changes, but significant\
    \ and broad\\nstructural changes to the social processes by which psychology operates. And it did so after\\ndecades of\
    \ inaction. It is a valuable example of how the social processes of science can change,\\nfrom which much can be learned.\\\
    nLearning from the Renaissance in social\\npsychology\\nA crisis is a terrible thing to waste. \\u2013 Paul Romer\\nWhat\
    \ can we learn from the Renaissance in social psychology? For us, one important learning\\nis that a deep crisis can help\
    \ enable a broad change in the social processes of science. As we've\\nseen, for decades well-known scientists had pointed\
    \ out problems in the practices of social\\npsychology, and suggested ideas for solution. Yet that understanding did not\
    \ produce a major\\ncrisis, nor did it produce substantive change. Even minor crises \\u2013 Bem's 2011 paper on\\nprecognition,\
    \ or Doyen's 2012 failure to replicate the priming studies \\u2013 were not enough. The\\ncrisis didn't become acute until\
    \ the 2015 Open Science Collaboration. Only at that point did\\nscientists and institutions start to become broadly willing\
    \ to consider alternative ways of\\nworking\\n.\\nOf course, a crisis alone was also not enough. It required deep new\
    \ ideas, such as Registered\\nReports\\n, as well as the toolbuilding and infrastructure necessary to make them work.\
    \ It\\nrequired partnerships with journals and other organizations, so that Registered Reports had a\\nchance to be widely\
    \ adopted. It required branding and marketing and narrative-crafting, to get\\nwidespread adoption and to begin a change\
    \ in the internalized values of scientists. It required\\nthe building of yet more tools and infrastructure to store code\
    \ and data and materials, to\\nenable easier replication. And, as we'll see, it required institution-building. If those\
    \ things\\nhadn't happened on top of the acute crisis, the field would still be stuck. In this sense, the crisis\\ninstigated\
    \ the conditions under which change was possible. But it required many other\\nelements for change to actually take place.\\\
    n(/index.html)\\n92\\n93\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\\
    nhttps://scienceplusplus.org/metascience/index.html\\n45/107\\n\\nMany of these required elements are outside the usual\
    \ job description for scientists. Consider\\nthat Greenwald, Meehl, and Ioannidis were all doing what academic research\
    \ scientists\\nconventionally do: developing ideas and understanding, publishing papers. But while ideas\\nand understanding\
    \ are important, on their own they aren't enough to produce change. And\\nscientists are usually \\\"not supposed\\\"\
    \ to build tools and infrastructure, unless to take data\\nimmediately needed in their scientific work\\n, nor are they\
    \ \\\"supposed\\\" to get involved in\\nbranding and marketing, activities that many scientists turn their noses up at.\
    \ Yet those\\nactivities are essential for cultural change. Thus, the actions necessary to achieve change are\\nnot part\
    \ of what is traditionally regarded as a scientist's job. This is a major inhibitor in\\nachieving such change.\\nMany\
    \ people have played important roles in instigating the replication crisis. But perhaps no\\nsingle person has done more\
    \ than Brian Nosek. Nosek is a social psychologist who until 2013\\nwas a professor at the University of Virginia. In\
    \ 2013, Nosek took leave from his tenured\\nposition to co-found the Center for Open Science (COS) as an independent not-for-profit\\\
    n(jointly with Jeff Spies, then a graduate student in his lab). Nosek and the COS were key co-\\norganizers of the 2015\
    \ replication paper by the Open Science Collaboration. Nosek and the\\nCOS have also been (along with Dani\\u00ebl Lakens,\
    \ Chris Chambers, and many others) central in\\ndeveloping Registered Reports. In particular, they founded and operate\
    \ the OSF website, which\\nis the key infrastructure supporting Registered Reports. That's not all OSF does, it's also\
    \ a\\ngeneral platform for scientists to share papers, code, and data, and is designed to make it easy\\nfor other labs\
    \ to replicate work. Finally, Nosek's been a frequent public advocate for\\nreplication, doing on-the-ground work to change\
    \ how scientists think about the subject, which\\nhas required both strong scientific argument and also good marketing\
    \ and brand-building. In\\nshort, Nosek and the COS are key figures in driving a massive, systemic change in social\\\
    npsychology. They're helping change the culture of science.\\nThe origin story of the COS is interesting. In 2007 and\
    \ 2008, Nosek submitted several grant\\nproposals to the NSF and NIH, suggesting many of the ideas that would eventually\
    \ mature into\\nthe COS\\n. All these proposals were turned down. Between 2008 and 2012 he gave up applying\\nfor grants\
    \ for metascience. Instead, he mostly self-funded his lab, using speaker's fees from\\ntalks about his prior professional\
    \ work. A graduate student of Nosek's named Jeff Spies did\\nsome preliminary work developing the site that would become\
    \ OSF. In 2012 this got some\\nmedia attention, and as a result was noticed by several private foundations, including\
    \ a\\n(/index.html)\\n94\\n95\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\\
    nhttps://scienceplusplus.org/metascience/index.html\\n46/107\\n\\nfoundation begun by a billionaire hedge fund operator,\
    \ John Arnold, and his wife, Laura\\nArnold. The Arnold Foundation reached out and rapidly agreed to provide some funding,\\\
    nultimately in the form of a $5.25 million grant.\\nBuoyed by the funding, in 2013 Nosek left the University of Virginia\
    \ to start the Center for\\nOpen Science. This may seem strange: why not keep it at the university? But as we've seen\
    \ the\\nwork of the COS was not social psychology in the conventional sense. Rather, Nosek was\\nsomething else, a metascience\
    \ entrepreneur, working to achieve a scalable change in the social\\nprocesses of science. Setting the COS up independently\
    \ gave them freedom to operate in ways\\ndifficult in a conventional academic environment. For instance, in many universities\
    \ it would\\nbe difficult and slow to hire the designers and programmers needed to develop infrastructure\\nsuch as OSF\
    \ and Registered Reports. Nosek estimated to us that roughly 1-in-5 of the COS staff\\ncould be considered researchers\
    \ in anything like the conventional sense. The repeated\\nobjection when attempting to make such hires in an academic\
    \ environment is \\\"that's-not-\\nreally-science\\\". It's ironic, in retrospect: Nosek and the COS are having tremendous\
    \ impact on\\npsychology, as a consequence of placing metascience at the core of their practice. It's a more\\nexpansive\
    \ view of what a scientist can be.\\nThis story concretely reflects many of the inhibiting factors we discussed earlier.\
    \ Consider the\\n\\\"that's-not-really-science\\\" problem: change in the social processes of science is no-one's job,\\\
    ncertainly not the job of working scientists. Or the challenge of raising funds via conventional\\nchannels: it seems\
    \ to us not an accident that the COS ultimately raised money from an\\nunconventional source. And then the structural\
    \ obstacle of hostility from important peers.\\nNosek reports (https://twitter.com/briannosek/status/1224725684960088069)\
    \ a journalist\\ntelling him that a \\\"big shot\\\" peer had said \\\"Nosek is John Arnold's willing idiot\\\". Tage\
    \ Rai, who\\nbecame an editor at Science magazine after the 2015 article, repeatedly attacked work on\\nreplication, claiming\
    \ (https://twitter.com/tage_rai/status/1304985745157914624) for\\ninstance that there \\\"are powerful private and gov't\
    \ interests hoping to co-opt the replication\\ncrisis to gain leverage over deciding what kind of research you can produce\\\
    \", and directly\\nattacking Nosek (https://twitter.com/tage_rai/status/1305586100501729282). So the\\nreplication crisis\
    \ is a story of perseverance, not just by Nosek, but by everyone involved. We've\\nargued here that cultural change is\
    \ often enabled by sustained critique of powerful institutions\\nin science. This requires bravery, and may have substantial\
    \ professional consequences, under\\n(/index.html)\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"\
    A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n47/107\\n\\nscience's self-governing model,\
    \ whereby an individual's future is determined by the judgments\\nof their colleagues. Creating a crisis for scientific\
    \ institutions is a deeply unpopular career\\nmove.\\nNosek and the Center for Open Science have played a key role in\
    \ the Renaissance in social\\npsychology. However, it's unfair and historically incomplete to single out an individual\
    \ as\\nmuch as we have: the work we've described is part of a movement involving hundreds or\\nthousands of other people.\
    \ Unfortunately, a detailed history of the replication crisis is beyond\\nour scope. To those many people whose work we\
    \ have unfairly omitted, our apologies. The\\nreason we've given this incomplete history is because it highlights an important\
    \ pattern for\\nchange in the social processes of science: that of the metascience entrepreneur.\\nMetascience entrepreneurship\\\
    nYou never change things by fighting the existing reality. To change something, build a\\nnew model that makes the existing\
    \ model obsolete. \\u2013 Buckminster Fuller\\nA metascience entrepreneur is a person, especially an outsider, who aims\
    \ to make a scalable\\nimprovement in the social processes of science. They take responsibility for making change\\nhappen.\
    \ To list a few metascience entrepreneurs now or recently active: there's Paul Ginsparg,\\nwho founded the arXiv preprint\
    \ server. There's Heather Joseph and Peter Suber, each\\ninstrumental in different ways in helping increase open access\
    \ to scientific papers. There's\\nAdam Marblestone, Anastasia Gamick, Sam Rodriques, and Tom Kalil, who are developing\
    \ the\\nFocused Research Organizations we mentioned earlier. There's Don Braben, who started the\\nVenture Research Unit\
    \ at BP and later University College London, making the case for giving\\nscientists far more freedom to pursue ambitious\
    \ lines of research. There's Brian Nosek and\\nmany others at work on the Renaissance in social psychology. And, of course,\
    \ there are many\\nother metascience entrepreneurs\\n. Not all changes in the social processes of science come\\nabout\
    \ through metascience entrepreneurship, but it is an extremely important pattern\\n.\\nThe term metascience entrepreneur\
    \ is new, and we considered many terms before deciding to\\nuse this one. Perhaps the best alternative we considered is\
    \ \\\"applied metascientist\\\": it's shorter,\\nrolls off the tongue more easily, and some scientists are suspicious\
    \ of the commercial overtones\\nof \\\"entrepreneur\\\"\\n. However, a problem with \\\"applied metascientist\\\" is that\
    \ it implicitly\\n(/index.html)\\n96\\n97\\n98\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision\
    \ of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n48/107\\n\\nsuggests a body of theoretical metascience,\
    \ which is then used by the applied metascientist. In\\npractice, we expect the connection to be strongly bidirectional,\
    \ and for this reason have\\npreferred \\\"metascience entrepreneur\\\". We are concerned that the term may mislead people\\\
    ninto thinking it's about making a profit; rather, it's about a more expansive notion of\\nentrepreneurship, as a person\
    \ working to build the future. In any case, a good term for this\\nconcept is certainly needed, and we're open to better\
    \ language.\\nWe've argued that creating a crisis has sometimes been crucial in instigating widespread\\nchanges in social\
    \ processes. Is it possible to avoid creating a crisis, or is it necessary? We\\nbelieve it is possible to avoid this\
    \ when the social process is in whitespace, but it's much harder\\nwhen there's an incumbent system and network effects\
    \ inhibiting change. For instance, prior to\\nthe replication crisis it was extremely difficult for social psychologists\
    \ to unilaterally adopt\\nbetter practices. This was in part for practical reasons (the tools and infrastructure were\\\
    nlacking), and in part for social reasons (doing so would place them and their collaborators at a\\nshort-term competitive\
    \ disadvantage over their peers). Similarly, while (say) someone like Don\\nBraben can run a trial program for his approach\
    \ to scientific freedom, that doesn't mean his\\napproach will gain traction in displacing more traditional approaches.\
    \ That would likely\\nrequire a crisis of confidence in those traditional approaches, to help instigate a change.\\nIn\
    \ our explanation of metascience entrepreneurship, we've emphasized the role of outsiders.\\nOf course, people like Nosek,\
    \ Ginsparg, et al aren't outsiders in certain senses: after all, they've\\nspent their careers as working scientists.\
    \ But we mean outsiders in the sense that they weren't\\ndecision makers at powerful institutions, able to move vast sums\
    \ of capital, or change policy.\\nNor were they enormously wealthy, and able to simply build what they desired. The reason\
    \ it's\\nimportant to have outsiders as metascience entrepreneurs is that it will decentralize change in\\nthe social\
    \ processes of science. That will expand the range of people who can cause change; and\\nincrease the range of ideas that\
    \ are tried. Indeed, it may be essential for outsiders to\\nparticipate, if severe and sustained critique of existing\
    \ institutions is required. A crisis can be\\nextremely difficult to instigate from inside a system. Nosek, recall, was\
    \ unable to obtain\\nsupport from conventional funders; when he did obtain funding, he took leave from his\\nacademic\
    \ job to set up the Center for Open Science. Of course, over time he's partnered with\\nexisting institutions to cause\
    \ change. But the change was instigated from outside existing\\npower centers. That's the pattern of a successful revolution.\\\
    n(/index.html)\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n49/107\\n\\nFor these reasons, we don't expect all or even most of the best ideas for change to come from\\nthe directors\
    \ of a few major grant agencies; nor from wealthy individuals hoping to have an\\nimpact. We expect the best ideas will\
    \ come from unexpected people at the edge. As we noted\\nearlier, it was a huge achievement of the 17th century scientific\
    \ revolution to decentralize\\nchange in ideas: Bacon helped break the monopoly of the Church and Aristotle on authority;\\\
    nthe Royal Society baked decentralization into their motto, nullius in verba, take no-one's word\\nfor it. We need the\
    \ same kind of decentralized ability to change social processes in science. And\\nthere is currently no institutional\
    \ means to make such changes.\\nThis outsider-oriented approach may be contrasted with an insider-oriented approach.\\\
    nCertainly, many people want to help existing funders and research organizations trial new\\nideas, and to scale out the\
    \ best, perhaps doing something like J-PAL-for-science. The people\\nleading and advising such organizations can do much\
    \ good, but these are likely to be insider\\nroles, incremental and evolutionary. Many people think that if they just\
    \ go work at their\\nfavorite funder for a few years, they can make the big changes necessary. But they get bogged\\ndown\
    \ in the inertia of existing systems. Most organizations are not designed to rapidly change,\\nand they're certainly not\
    \ designed to admit error in their past ways of doing things. We've had\\nconversations where people at the top of some\
    \ of the world's largest funding agencies express\\nthe belief that their hands are tied: the organization requires a\
    \ much larger change than it is\\ncapable of making. It's very different to the outside view of the metascience entrepreneur,\
    \ who\\nmay be working in social process whitespace, or with truly disruptive criticism of existing\\ninstitutions. Similarly,\
    \ some of those people at the funders have expressed to us that they are\\ndoing metascience entrepreneurship. And yet\
    \ they're not: their obstacles are quite different,\\nand require separate analysis.\\nThis is why we've focused on metascience\
    \ entrepreneurship, and (in what follows) on\\nstructural changes intended to help enable outsiders to win. Outsiders\
    \ may well start with far\\nfewer resources than incumbents; but if their ideas and execution are better, in an ideal\
    \ system\\nthey would grow to outcompete those incumbents.\\nThe work of such metascience entrepreneurs potentially looks\
    \ quite different from what is\\nusually evaluated as promising. Surprisingly many proposals come from true outsiders\\\
    n(sometimes denizens of Silicon Valley), including sometimes people who have had no more\\nthan modest success in a scientific\
    \ career. This used to annoy one of us (MN), when he saw\\noverconfident pronouncements about \\\"what's wrong with science\\\
    \" from such outsiders\\n. The\\n(/index.html)\\n99\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"\
    A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n50/107\\n\\nretort which came to mind:\
    \ \\\"If you know so much about science, why haven't you made any\\nimportant discoveries?\\\" But he's (somewhat!) changed\
    \ his mind. Overconfidence in\\ndetermined action is a feature of Silicon Valley that deserves to be emulated elsewhere,\\\
    nenabling ideas to be explored that otherwise would not be\\n. Of course, it usually fails. But\\ngenuine scientific successes\
    \ may pay for all the rest. We would not have invested in DeepMind,\\na company started by green graduate students with\
    \ venture capital backing. And we would\\nhave been wrong, not just financially, but more importantly scientifically.\
    \ Sometimes outsiders\\nfind better ways of doing things.\\nLet's return to the metascience learning loop:\\nThere are\
    \ many things existing organizations can do to enable this process. All of the\\nmetascience entrepreneurs discussed above\
    \ have already had (or likely will have) world-\\nchanging impact, far beyond a typical scientific grant; despite this,\
    \ all have had unusual\\n(/index.html)\\n100\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision\
    \ of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n51/107\\n\\namounts of trouble raising funding.\
    \ Funders aren't usually looking to fund this activity, often\\nregarding it as \\\"not really science\\\". Cultural change\
    \ isn't currently anybody's job. As a funder,\\ntwo simple enabling activities would be:\\nMetascience Entrepreneurship\
    \ Fellowship: A three-year fellowship for metascience\\nentrepreneurs. We expect it would be especially helpful for people\
    \ at an early stage:\\nexisting funders are especially unwilling to fund early efforts, when it would be most\\nhelpful.\
    \ Such a fellowship could be used to buy out salary (or provide for a leave of\\nabsence) for people in established positions.\
    \ We'd love to see such funding (or something\\nmore) offered to people such as Elisabeth Bik, James Heathers, Tal Yarkoni,\
    \ and others.\\nOf course, many challenges would need to be overcome. As mentioned, current\\nmetascience entrepreneurs\
    \ are often decried by their peers as \\\"not doing science\\\" [sic];\\nthis fellowship would need to be handled carefully\
    \ to manufacture status amongst\\nscientists. Another concern is over the perception of the fellow having \\\"left\\\"\
    \ science: this\\ncould partially be addressed by providing (say) two years of re-entry salary into their\\nformer area\
    \ if they decide not to continue with the project. The fellowship could also be a\\nstep toward a:\\nMetascience Entrepreneurship\
    \ Organization: Currently, projects such as the\\nCenter for Open Science are funded as bespoke one-offs. It would be\
    \ better if such efforts\\ncould be produced in a scalable way. Metascience entrepreneurship often involves many\\ndifferent\
    \ activities: theoretical metascience, tool-building, institution-building,\\ncommunity-building, cultural change, partnership-forming,\
    \ policy work, and so on. This\\nrequires multiple people acting in a co-ordinated way.\\nAs we've noted, metascience\
    \ entrepreneurship often requires a crisis for change to be possible.\\nHowever, crises also make incumbents unhappy.\
    \ In many instances, if people aren't shouting\\nat a metascience entrepreneur, it means they're not having much impact.\
    \ Brian Nosek being\\ncalled \\\"John Arnold's willing idiot\\\" is in some sense a sign of success. Or, more subtly,\\\
    ndismissing the people as \\\"not real scientists\\\", but rather merely cleaning up the work of their\\nbetters. Put\
    \ another way: community anger or dismissiveness may in fact be a useful proxy for\\nsuccess. For these reasons, programs\
    \ like those above may be a good target for outsiders,\\nfunders with strong stomachs and a contrarian desire to leapfrog\
    \ the Scientific Establishment.\\nOver the long run, a good goal would be to change the conception of a scientist's role\
    \ so it\\nincludes metascience entrepreneurship.\\n(/index.html)\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n \
    \   \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n52/107\\n\\nIn a more conventional\
    \ mode, it should be possible for all funders (and, more broadly,\\nscientific institutions) to set up an:\\nInternal\
    \ metascience program: Funders should set aside at least 10% of funds for\\ntrialling dozens of wildly imaginative programs,\
    \ for evaluating them seriously against\\nbaselines, and then iterating and eventually discarding or scaling up the programs,\
    \ rapidly\\ncreating space for new programs to be trialled.\\nTen percent is a lot by current standards. We think of it\
    \ as the funder's self-improvement fund.\\nIn the early 20th century, top-level athletes often \\\"trained\\\" mainly\
    \ by playing their sport. They\\ndidn't really understand how to train. But training is where you try new things, figure\
    \ out how\\nto make them work, and change your game, perhaps radically. Putting in ten percent seems\\nlike a lower bound\
    \ on what it would mean to take training seriously.\\nWhat we'd like to see, ultimately, is the emergence of a thriving\
    \ community of\\nmetascientists\\n. This community would blend both theoretical metascience, studies of what\\nworks well,\
    \ as well as metascience entrepreneurship, attempting to imagine and build the\\nsocial processes of the future. In this\
    \ future, metascientist would become a shared aspirational\\nidentity, much as \\\"scientist\\\" or \\\"entrepreneur\\\
    \" is now. A community of practice could develop,\\nsharing ideas, mentorship, resources, and so on. It could identify\
    \ patterns to improve science,\\nand patterns which result in failure\\n. The lack of awareness of these patterns means\
    \ that\\ntoday most attempts at metascience entrepreneurship simply fail or never get off the ground.\\nOver the remainder\
    \ of the essay we'll make the case that if this community thrived, it could\\nplace metascience at the core of science,\
    \ a kind of engine or dynamo driving decentralized\\nimprovement in the social processes of science.\\nPatterns of metascience\
    \ entrepreneurship\\nWe've discussed the replication crisis in detail because it suffers extreme versions of many of\\\
    nthe inhibiting effects identified earlier. We don't have space here to discuss many other\\nexamples in similar detail.\
    \ But it's helpful to identify some of the different patterns that\\nmetascience entrepreneurs have used.\\n(/index.html)\\\
    n101\\n102\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n53/107\\n\\nThe preprint arXiv, for example, relies for its success primarily on building a great product that\\nis attractive\
    \ to scientists. One major inhibiting factor was that \\\"it just wasn't science\\\". The\\nfounder of the arXiv, Paul\
    \ Ginsparg, was a well-known physicist working in string theory at\\nLos Alamos National Laboratory (LANL). But as he\
    \ developed the arXiv it consumed more and\\nmore of his time, and he gradually became what we would call a full-time\
    \ metascience\\nentrepreneur. He ultimately resigned his position at the lab after receiving an unfavorable\\nperformance\
    \ evaluation, describing him as having \\\"no particular computer skills contributing\\nto lab programs; easily replaced,\
    \ and moreover overpaid, according to an external market\\nsurvey\\\". He went to Cornell University, and more and more\
    \ of his professional identity became\\ninvested in the arXiv. One of his new colleagues at Cornell said of his Los Alamos\
    \ performance\\nevaluation, \\\"Evidently their form didn't have a box for: \\u2018completely transformed the nature and\\\
    nreach of scientific information in physics and other fields\\u2019\\\"\\n.\\nThe arXiv didn't suffer as strongly from\
    \ inhibiting network effects as did the changes we've\\ndiscussed in social psychology. For instance, for the most part\
    \ a scientist submitting to the\\narXiv doesn't suffer any ill effects. When they first use the arXiv they may fear getting\
    \ scooped\\nor violating journal publication policies, but these relatively minor fears are usually quickly\\novercome\\\
    n. The arXiv adopted a clever growth strategy, starting in a relatively narrow area \\u2013\\nhigh-energy theoretical\
    \ physics \\u2013 where they could bootstrap off Ginsparg's professional\\nconnections. Scientists in closely adjacent\
    \ areas would then start checking in, making those\\nadjacent areas good avenues for addition to the arXiv\\n. It remains\
    \ unfortunate that the\\narXiv's revenues are far lower than The Physical Review, perhaps the premier publisher in\\nphysics;\
    \ the arXiv has become far more important for the progress of physics (never mind\\nother sciences) than The Physical\
    \ Review.\\nA very different approach to metascience entrepreneurship has been taken by open access\\nadvocates such as\
    \ Heather Joseph and Peter Suber, who have helped intellectually architect\\nand lobby for open access policies. We said\
    \ earlier that it's rarely practical to pursue change by\\nworking through powerful grant agencies. But that's the strategy\
    \ that's been (successfully!)\\npursued by open access lobbyists. The essence is to convince powerful granting bodies\
    \ and\\ntheir political masters to adopt open access mandates. For example, the US Congress made it\\nso that from 2008\
    \ on NIH-funded research had to be made open access within 12 months of\\npublication. This policy has since been strengthened,\
    \ including most recently in 2022, when\\nthe White House directed all US government agencies funding research to develop\
    \ policies\\nwhich would make that research immediately openly accessible. This progress has been\\n(/index.html)\\n103\\\
    n104\\n105\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n54/107\\n\\nachieved through extensive lobbying over the past 20 years. In this sense it's quite different\\nfrom arXiv:\
    \ it's not a product used directly by scientists, but rather a policy change aimed at\\nachieving collective action. To\
    \ get this action taken, it's been necessary to enlist help from\\nleading scientists to influence powerful entities,\
    \ but not to convince every individual in a\\nscientific community. We note, however, that some of the same inhibiting\
    \ patterns are still in\\nplay: echoing earlier examples, Suber resigned his position as a tenured professor, and was\\\
    nfunded by a series of temporary grants.\\nAnother metascience entrepreneur, Don Braben, started the Venture Research\
    \ Unit with\"\n  },\n  {\n    \"name\": \"funding from BP in the 1980s. This was an attempt to identify and fund unusually\
    \ adventurous\",\n    \"text\": \"scientific work. Braben was interested in funding scientists who were potential members\
    \ of\\nwhat he called \\\"the Planck Club\\\", people doing work of a caliber comparable to Max Planck, the\\noriginator\
    \ of quantum mechanics. Braben convinced BP to spend upward of 20 million GBP on\\nthe Venture Research Unit, funding\
    \ roughly 30 proposals from scientists around the world. To\\nconvey the flavor of what he was looking for, Braben has\
    \ proposed the BRAVERI score (Braben\\nVenture Research Index), which gives high scores to proposals for research which:\
    \ is difficult\\nto define; addresses no extant peer group; would have trouble being published in a mainstream\\njournal;\
    \ has little or no competition; and has no clear definition of success at the outset. To\\ngive more concrete flavor,\
    \ for the timescale component of the score, Braben proposes\\nrewarding projects where the timescale is \\\"indeterminate\\\
    \" and \\\"successes, whatever they are\\ncould be achieved at any time, or never\\\". By contrast, a project would be\
    \ penalized if it was\\n\\\"expected to meet its targets in the time allowed\\\"\\n. The Venture Research Unit was a\\\
    nremarkable trial, and he's written several striking books about this and related topics\\n. It's\\ninfluenced other programs,\
    \ but it's not an example of decisive scaling of change in the culture\\nof science. For instance: no large-scale funding\
    \ program that we know of is using criteria\\nclearly descended from BRAVERI. It's an example of the difficulty in scaling.\
    \ We expect most\\nmetascience entrepreneurs today will meet the same fate, regardless of whether their idea is a\\ndecisive\
    \ improvement over the status quo or not.\\nThere are many striking contrasts between these instances of metascience entrepreneurship.\\\
    nAs we've seen, Braben's approach has not yet scaled out. While he provides a nice list of\\nprojects funded, it's not\
    \ decisive evidence that his approach is better than the conventional\\napproach. Someone initially hostile to Braben\
    \ would be unlikely to be won over by the evidence\\nhe gives. By contrast, the Center for Open Science is succeeding\
    \ because they have obtained\\ndecisive evidence that: (a) things weren't working in social psychology; and (b) they have\\\
    n(/index.html)\\n106\\n107\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\\
    nhttps://scienceplusplus.org/metascience/index.html\\n55/107\\n\\ndeveloped a far better set of social and methodological\
    \ processes. The evidence is so strong it\\nhas won over even people initially hostile to the approach\\n. The arXiv and\
    \ open access\\nmandates are different yet again. The open access mandates were achieved by persuading\\npowerful people\
    \ and institutions. The arXiv achieved change through individual scientists\\nmaking the decision to routinely use the\
    \ arXiv. We are personally in favor of both, and believe\\nthe core arguments made for them are correct \\u2013 indeed,\
    \ one of us (MN) worked for some years\\nas an open science advocate. But despite that, someone hostile to those arguments\
    \ could in\\ngood faith remain so\\n: we don't have overwhelming proof that either the arXiv or the open\\naccess mandates\
    \ are decisively better for science. With that said: we're sympathetic to the\\ndecentralized product adoption pattern\
    \ used by the arXiv. Absent strong evidence to the\\ncontrary, we trust individual scientists to choose what's best for\
    \ them. We're more cautious\\nabout the centralized change pattern exemplified by the open access mandates. A danger with\\\
    nany centralized pattern is that persuasion and politics may result in damaging processes being\\nadopted, unless a high\
    \ evidentiary bar is applied at the point of control. Note that we're not\\ntalking here about the specific open access\
    \ policies, which we strongly believe are helpful, but\\nrather making an abstract point about the nature of the change\
    \ mechanism. The key overall\\npoint is that we want patterns of successful change to result in improvements to science.\\\
    nWe've identified several distinct patterns of metascience entrepreneurship. Through the\\nremainder of the essay we'll\
    \ focus on one in particular, used in the replication crisis. That\\npattern is perhaps the most challenging, requiring\
    \ both decisive results in theoretical\\nmetascience and effective metascience entrepreneurship to drive change. But first\
    \ let's make\\nsome summary remarks about the other patterns. In general, the decentralized product\\nadoption pattern\
    \ has limited range of applicability, since many social processes aren't\\nexpressed through products. But when it does\
    \ apply it can be very powerful, and not strongly\\nsubject to the earlier inhibiting effects. For that reason we won't\
    \ discuss it much through the\\nremainder of the essay. The centralized change pattern can work, but has the problem that\\\
    narbitrary changes can be made on the basis of good optics, political palatability, and so on,\\nwithout any guarantee\
    \ of improvement. Of course, no-one will think that's their program! The\\nbest way of making this a good pattern is to\
    \ improve evidentiary standards from theoretical\\nmetascience. Our subsequent discussion of theoretical metascience thus\
    \ applies to this pattern.\\nAs we noted earlier social processes that are local and not collectively held can be changed\\\
    nrelatively easily, and for that reason we don't discuss them further. Through the remainder of\\n(/index.html)\\n108\\\
    n109\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n56/107\\n\\nthe essay we focus on the theoretical metascience pattern. It applies to many social processes,\\nand it's\
    \ able to overcome all the inhibiting factors mentioned earlier, including entrenched\\nnorms, the shadow of the future,\
    \ network effects, and so on.\\nIncorporating the earlier distinction between changes in local versus collectively held\
    \ social\\nprocesses, we can sum up the situation visually as follows:\\nThere's also a sliding scale in difficulty between\
    \ doing work on social processes where there's\\nno existing established process or few inhibitors, and situations where\
    \ there are major\\ninhibitors and established processes:\\nCan we use decisive metascientific results to\\ndrive improvement\
    \ in the social processes of\\nscience?\\nLet's return again to the metascience learning loop,\\n(/index.html)\"\n  },\n\
    \  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n57/107\\n\\nThe replication crisis in social psychology is an example where scaling has been achieved, with\\nmetascientific\
    \ results driving major changes to an entire field. Is it possible to develop a\\nbroader array of metascientific results\
    \ strong enough to drive similar improvements in other\\nsocial processes? Variations on this vision have been proposed\
    \ by many people. For example,\\nin 2012 Pierre Azoulay\\nproposed that:\\nIt is time to turn the scientific method on\
    \ ourselves. In our attempts to reform the\\ninstitutions of science, we should adhere to the same empirical standards\
    \ that we\\ninsist on when evaluating research results. We already know how: by subjecting\\nproposed reforms to a prospective,\
    \ randomized controlled experiment. Retrospective\\nanalyses using selected samples are often little more than veiled\
    \ attempts to justify\\npast choices.\\n(/index.html)\\n110\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"\
    text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n58/107\\n\\nMany initiatives\
    \ in this vein are underway. They include the Research on Research Institute\\n,\\nled by James Wilsdon; the work by Paul\
    \ Niehaus and Heidi Williams to develop J-PAL-for-\\nscience\\n; and the proposal, led by Brian Nosek, for an NSF Science\
    \ and Technology Center for\\nImproving Science\\n. There are also related ideas, like the proposal from James Evans and\\\
    nJacob Foster to use research on metaknowledge to \\\"reshape science\\\"\\n.\\nThis vision arises out of a much older\
    \ tradition of measuring science. One early example comes\\nfrom James Cattell, who in 1910 wrote an early book about\
    \ metascience\\n, posing the\\nchallenge: \\\"It is surely time for scientific men [sic] to apply scientific method to\
    \ determine the\\ncircumstances that promote or hinder the advancement of science.\\\" Today, merely naming the\\ndisciplines\
    \ that have contributed to this tradition takes some time \\u2013 economics,\\nscientometrics, science policy, and many\
    \ more. Let us look briefly at a few representative\"\n  },\n  {\n    \"name\": \"results from several of these literatures.\
    \ We do so with no pretense of completeness. Rather,\",\n    \"text\": \"our intent is to provide some context to better\
    \ understand the opportunity and challenge for\\nmetascience.\\nOne rich vein of work is the idea of comparing different\
    \ countries against one another. This has\\nbeen done, for example, in papers by Robert May and David King\\n, who use\
    \ measures such as\\ncitations, publications, and prizes to do country-level comparisons. It's also been pursued, in\\\
    nvery different ways, by economists such as Robert Solow, Zvi Griliches, Paul Romer, and\\nRobert Gordon, who have tried\
    \ to develop an understanding of the relationship between\\nscientific research and concepts from economics such as GDP\
    \ growth. Both these veins of work\\ncan be viewed as a kind of macroscience, attempting to develop aggregate measures\
    \ to\\nunderstand (and in many cases manage) the progress of science at a high level. There's also a\\nmore intermediate-level\
    \ mesoscience, things like the Shanghai rankings of research\\nuniversities, or the UK Research Excellence Framework (REF),\
    \ which ranks individual\\nuniversity departments. Both these veins of work evaluate science at high levels of abstraction\\\
    n\\u2013 high enough that they are not intrinsically connected to social processes in a straightforward\\nway, nor to\
    \ systematically improving our understanding of what works, when, and why. With\\nthat said, we have heard many stories\
    \ of the way evaluations like the Shanghai rankings and\\nthe REF affect behavior and processes. It will be interesting\
    \ to monitor the long-run effect of\\nsuch evaluations on the rate at which the discovery ecosystem learns.\\n(/index.html)\\\
    n111\\n112\\n113\\n114\\n115\\n116\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\\
    nhttps://scienceplusplus.org/metascience/index.html\\n59/107\\n\\nAnother rich vein of work is focused less on aggregates,\
    \ and more on understanding the details\\nof individual scientists, discoveries, and programs. Again, we'll merely mention\
    \ a few\\nrepresentative lines of work, out of thousands that could be given\\n. There is work, for\\nexample, studying\
    \ what team structures make for important work and why, like the paper\\n\\\"Large teams develop and small teams disrupt\
    \ science and technology\\\", by Lingfei Wu, Dashun\\nWang, and James Evans\\n. There is work studying the increasing\
    \ age at which scientists make\\nmajor discoveries, and why that increase may be occurring, like that of Benjamin Jones\\\
    n.\\nThere is work doing retrospective analyses of funding programs, like Caroline Wagner and\\nJeffrey Alexander's analysis\\\
    nof the NSF's Small Grants for Exploratory Research program.\\nThis vein of work gives rise to many striking descriptive\
    \ facts about science. The work is often\\nsuggestive of changes. For instance, the Wu et al paper just mentioned suggests\
    \ that: \\\"both\\nsmall and large teams are essential to a flourishing ecology of science and technology, and [\\u2026]\\\
    nto achieve this, science policies should aim to support a diversity of team sizes\\\". As another\\nexample, a tremendous\
    \ amount of work has been done on the relationship between aging and\\nbreakthrough discoveries, which has led to much\
    \ concern at some funders about the aging of\\ntheir grantees, and attempts to change the situation.\\nIt is interesting\
    \ to contrast these styles of work with the replication crisis in social psychology.\\nThere, the metascientific results\
    \ were so strong they forced change on a resistant field. Recall\\nthe early inability to raise funding from conventional\
    \ funders; and attacks from central figures\\nof the field, characterizing Brian Nosek as \\\"John Arnold's willing idiot\\\
    \". And yet despite that\\nresistance, they appear likely to revolutionize the methodology and social processes of an\\\
    nentire field. That has required both entrepreneurial building, as discussed in the last two\\nsections, and also extremely\
    \ strong theoretical results. Recall the theoretical takeaways from\\nour earlier discussion: (1) there is a significant\
    \ problem where conventional (pre-2015)\\npractices give rise to many apparently non-replicable \\\"discoveries\\\"; but\
    \ (2) improved practices\\ndo replicate. These conclusions arise from a large body of work \\u2013 we mentioned a few\
    \ key\\npapers, but really it's the body of work that matters. Taken together, they are decisive\\nmetascientific results,\
    \ strong enough to drive real change. By contrast, most results \\u2013 like those\\nmentioned in the past few paragraphs\
    \ \\u2013 are more descriptive results, often documenting\\ninteresting facts, but rarely dispositive of change, especially\
    \ when it would upset an existing\\norder.\\n(/index.html)\\n117\\n118\\n119\\n120\"\n  },\n  {\n    \"name\": \"/28/25,\
    \ 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n60/107\\\
    n\\nThe vision we are interested in, then, is of a metascience which routinely obtain results strong\\nenough to drive\
    \ real change, even when the evidence comes from outsiders. It is useful to\\ncompare the situation to fields where it\
    \ is routine to obtain such decisive results. Think of the\\ntheory of relativity, which overturns some of humanity's\
    \ most dearly-held ideas about space\\nand time, energy and mass. Many students of physics are initially hostile to relativity,\
    \ disliking\\nthe violence it does to their pre-conceived notions. But the evidence for relatively is so\\noverwhelming\
    \ that they are forced to accept a new order. That new order accepted, it radically\\nchanges the way they interact with\
    \ the world. In a similar way, the replication crisis has\\nprovided a set of theoretical results so strong that it caused\
    \ a crisis of confidence in old\\nprocesses, and caused a transition to new processes. But there are as yet very few other\
    \ results\\nas strong in metascience. Most results are merely suggestive, not dispositive of change.\\nCertainly, they\
    \ are not strong enough to overcome opposition from powerful entrenched\\ninterests. Is it possible to routinely develop\
    \ metascientific results strong enough to drive real,\\ncounterintuitive change in our social processes, even when those\
    \ results disrupt the existing\\norder?\\nTo express these ideas from now we'll use the term decisive result to mean a\
    \ result sufficiently\\nstrong that it would routinely convince someone who was initially hostile or had a vested\\ninterest\
    \ in a different conclusion. This is not a rigorous or precise definition, but it does encode\\na useful criterion, capturing\
    \ the notion of a result strong enough to force change, driving the\\nscaling step in the metascience learning loop. To\
    \ repeat the above in this new language: the key\"\n  },\n  {\n    \"name\": \"results of the replication crisis were,\
    \ altogether, a decisive result in this way\",\n    \"text\": \"It's notable that the kind of work required to obtain\
    \ decisive results isn't just business-as-\\nusual. We'll have more to say about this in the next section, but: consider\
    \ the extraordinary\\nscale of the Open Science Collaboration: 270 people working together over several years to\\nreplicate\
    \ 100 experiments. Furthermore, this was merely a small part of a much larger effort.\\nThere have been many large-scale\
    \ replication studies; studies of individual questionable\\nresearch practices; and studies of proposed solutions, like\
    \ pre-registration. It's a major co-\\nordinated body of work that is only decisive when considered together as a body.\
    \ The Open\\nScience Collaboration was far beyond the scale of just another nice paper; but it was also only a\\nsmall\
    \ part of what was required. Such a large and nuanced body of work seems required when\\npursuing a compelling understanding\
    \ of complex social systems. And, of course, such decisive\"\n  },\n  {\n    \"name\": \"results still require entrepreneurial\
    \ activity to result in change\",\n    \"text\": \"(/index.html)\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n \
    \   \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n61/107\\n\\nThe situation\
    \ in metascience today is similar to one that arises often in many parts of the social\\nsciences. One dream of many social\
    \ sciences is that they will help guide human behavior, and\\nhelp improve the design of human institutions. Perhaps,\
    \ for example, psychology can help\\npeople lead happier lives, be better parents, and so on? Perhaps economics can help\
    \ us make\\nbetter choices about the way central banks set interest rates, about housing policy,\\nimmigration policy,\
    \ the minimum wage, and so on?\\nThis is a marvelous dream which has led to significant successes. But there are also\
    \ challenges.\\nOne is the intrinsic difficulty of solving the problems: a question like \\\"what should the\\nminimum\
    \ wage be?\\\" is immensely complex, involving a tremendous number of different\\nvariables. Second, it's difficult to\
    \ balance the interests, values, and power of different groups.\\nThird, even if these difficulties can be overcome, and\
    \ you develop an extraordinarily\\ncompelling answer, there is still the problem of whether there is institutional capacity\
    \ to make\\nthe changes. Using social science to motivate change \\u2013 especially when it runs against some\\npeople's\
    \ perceived self-interest \\u2013 is extremely difficult\\n.\\nAnother reflection of these issues has been discussed by\
    \ the development economist Lant\\nPritchett, who described program evaluations in development economics as \\\"weapons\
    \ against\\nthe weak\\\"\\n. That is, politically weak or unpopular programs tend to be much more stringently\\nevaluated.\
    \ In this view, those evaluations are often ways of justifying decisions that powerful\\npeople want made. When our theoretical\
    \ tools are weak, politics will dominate over evidence.\\nPolicy entrepreneurs, certain of the righteousness of their\
    \ cause, will wield papers as weapons\\nto serve their ends, even when they are wrong about how the world works. It will\
    \ be extremely\\ndifficult for change to come from outsiders, even when they have important and correct new\\nideas about\
    \ the world.\\nTheoretical metascience beyond RCTs\\nA fundamental question of metascience then is: can we develop results\
    \ that can be used as\\nweapons against the strong, enabling decentralized improvement in the social processes of\\nscience\\\
    n? As our discussion of the social sciences suggests, this is a considerable challenge! In\\nthe passage quoted above,\
    \ Pierre Azoulay makes a general, broad methodological suggestion\\n(/index.html)\\n121\\n122\\n123\"\n  },\n  {\n   \
    \ \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n62/107\\n\\nfor how to do it: \\\"by subjecting proposed reforms to a prospective, randomized controlled\\nexperiment.\\\
    \" In this section we'll consider and critique this idea, and make some suggestions\\nfor building upon it.\\nA striking\
    \ prototype in this vein is the 2011 paper \\\"Incentives and Creativity: Evidence from\\nthe Academic Life Sciences\\\
    \", by Azoulay, Graff Zivin, and Manso (AGZM for short). Informally,\\nAGZM is often described as testing \\\"people-based\\\
    \" versus \\\"project-based\\\" funding. In\\nparticular, it compares the outcomes of the HHMI Investigator program, which\
    \ gives scientists\\nfreedom to work on what they want, with NIH funding, where scientists must seek approval for\\neach\
    \ new project. AGZM does an unusually careful comparison of the two approaches. It\\ndoesn't just look at outputs from\
    \ the two programs. The trouble is that the people entering the\\ntwo programs might have different backgrounds, interests,\
    \ and capabilities. Instead, AGZM\\nattempt to make a fair like-to-like comparison, so the HHMI program can plausibly\
    \ be\\nconsidered an intervention, and NIH a control. It's not a randomized controlled trial (RCT) \\u2013\\nthere's (currently)\
    \ no way to randomize scientists into HHMI or NIH. But it's plausibly RCT-\\nlike. AGZM obtain many striking results,\
    \ including finding a 39% increase in publication\\noutput for HHMI-funded scientists; furthermore, that increase becomes\
    \ 96% when focused on\\npapers in the top 1% of the citation distribution. These all seem suggestive that \\\"people,\
    \ not\\nprojects\\\" is correct.\\nAGZM has much to recommend it, notably the idea of doing an intervention and making\
    \ a fair\\ncomparison. It's also got many limitations, as we shall see below. This means that it is not a\\ndecisive result\
    \ in the sense described above. It's true that if you want to believe in \\\"people, not\\nprojects\\\", then AGZM provides\
    \ a fig leaf. But if you don't, then we doubt it would convince\\nanyone otherwise. And that's what decisive evidence\
    \ can do: convince you of things you regard\\nas a priori unlikely or distasteful. We ourselves personally prefer \\\"\
    people, not projects\\\", and\\nfor that reason are sympathetic to AGZM's conclusions. But that's a good reason to be\\\
    ndistrustful: if the same type of evidence had shown \\\"projects, not people\\\", we would find\\nreasons to distrust\\\
    n. That is the litmus test for a decisive result in metascience: is the\\nevidence strong enough to drive real change\
    \ to displace an existing social process, despite the\\nopposition of people who favor that process?\\nIn what follows\
    \ we briefly critique AGZM and similar RCT-like proposals, and make a few\\nobservations about how to obtain decisive\
    \ metascientific results. We won't solve the general\\nproblem of how to obtain such results: that will take thousands\
    \ of people many decades. One\\n(/index.html)\\n124\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"\
    A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n63/107\\n\\nsmall indicator of the difficulty\
    \ of the problem is that the decisive results of the replication\\ncrisis weren't obtain by an RCT; rather, they were\
    \ obtained in a bespoke fashion, in response to\\na particular problem. Still, despite the challenges, we are optimistic\
    \ that further work will\\ndevelop approaches strong enough to routinely provide decisive metascientific results,\\ncompleting\
    \ the metascience learning loop.\\nIsn't discovery intrinsically extremely slow to evaluate? A common retort to any effort\\\
    nto improve the social processes of science is: \\\"It's impossible to do this well because it takes so\\nlong to understand\
    \ the importance of scientific discoveries. Doesn't that make it impossible to\\nset up learning feedback loops like the\
    \ ones you're talking about?\\\" There's some truth to this: it\\noften does take a very long time to understand the importance\
    \ of a discovery. But it does not\\ntherefore follow that we can't make progress. That would be like saying \\\"the human\
    \ eye can\\nonly resolve down to tens of microns, therefore it's impossible to see E. coli bacteria\\\". Much of\\nthe\
    \ challenge in science \\u2013 and we expect in metascience \\u2013 is to develop better theories and\\nbetter instruments\
    \ to amplify signal amidst the noise. It's a challenge to develop better\\nmetascientific instruments, perhaps a metascience\
    \ microscope or chronoscope\\nto help us\\nbetter and more rapidly understand the importance of scientific work, amplifying\
    \ currently\\nillegible signals into something meaningful. Good scientists do this kind of evaluation\\nintuitively: the\
    \ challenge is to figure out how to do it as well or even better systematically. With\\nthat said, this isn't a concrete\
    \ proposal, we're merely pointing out that the \\\"reasoning\\\" many\\npeople use here is a non sequitur: \\\"it's not\
    \ so obvious how to do this, therefore it's impossible\\\".\\nAnd that's just wrong: the history of science is in considerable\
    \ part about learning to see better.\\nSeriously study the outliers: It's not controversial to say it's a good idea to\
    \ support\\npotentially Nobel Prizewinning research! But when people study research outcomes they often\\nfocus on the\
    \ bulk of the curve, i.e., more or less typical outcomes, not extreme outliers. This\\nwas true in many of the examples\
    \ we mentioned earlier, looking at statistics of team size, age\\ndistributions, citation aggregates, and so on. It's\
    \ a kind of data-based approach, aimed at\\nforming an overall picture of what's going on. But there's an implicit tension\
    \ lurking: there is\\nno a priori reason that what is good for the bulk of the curve is also good for outlier outcomes.\\\
    nIndeed, improving typical outcomes by better controlling the process may suppress exactly the\\nkind of wild variation\
    \ underlying outliers. We've discussed this point in detail in a prior\\nessay\\n, which goes more deeply into some associated\
    \ problems\\nthan we shall here. A nice\\nshorthand for thinking about it is the following diagram:\\n(/index.html)\\\
    n125\\n126\\n127\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n64/107\\n\\nAs a specific example, we noted above that AGZM used as a metric the increase in total\\npublication output,\
    \ as well as the increase in top-1% cited papers. While top 1% is certainly\\ngood, most such papers are still in the\
    \ bulk of the curve, they're not actual outliers. Implicit in\\nsuch an evaluation is the assumption that you want to\
    \ improve the bulk of the curve. But if\\noutliers actually dominate discovery, then they should be the core of what we\
    \ try to evaluate\\nand support. Improving the bulk may ignore what is most important and lead to erroneous or\\neven\
    \ counterproductive conclusions.\\nNow, with that being said we also believe it is valuable to consider such bulk measures.\
    \ But the\\npicture formed will be deeply incomplete unless the outliers are also identified and studied. So\\nany serious\
    \ evaluation program must also systematically identify the most important outliers\\nand compare those. In other words,\
    \ serious comparisons of different approaches to discovery\\nshould combine both the bulk of the curve and also identify\
    \ and compare outlier case studies.\\nTo do only one and not the other is, in our opinion, a potentially misleading mistake.\
    \ This is in\\ncontrast to a common point of view which is to treat large data-based studies as somehow\\nintrinsically\
    \ \\\"more serious\\\" than a few case studies about outliers. But this is a case where\\nanecdotes may trump data. At\
    \ the very least, such case studies must be considered as first-class\\nparticipants in the evaluation process, alongside\
    \ more data-based approaches. It is only by\\ntaking both seriously that it is possible to see whether and when there\
    \ are tensions between the\\nbulk and outliers\\n.\\n(/index.html)\\n128\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\"\
    ,\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n65/107\\n\\nOne challenge\
    \ in comparing outliers from different programs is that the size of the program\\nmatters a great deal. A program with\
    \ a $10 billion budget should be expected to have many\\nmore extreme outlier outcomes than a program with a $10 million\
    \ budget. This makes\\ncomparing outliers tricky. For instance, it's popular to laud Bell Labs for their many Nobel-\\\
    nworthy discoveries. It's true, they were exceptional. But they also had a research budget on the\\norder of many hundreds\
    \ of millions of dollars a year, for decades (2022 dollars)\\n. They\\nshould have done very well at that scale! One plausible\
    \ way of making a fair comparison to a\\nmuch smaller research laboratory is to compare randomly chosen but equally sized\
    \ subsets of\\nthe research outputs. (It would be a good research problem to make that comparison fairly!)\\nAn illustrative\
    \ example close to our hearts is the Dynamicland laboratory\\n(https://dynamicland.org/) in the San Francisco Bay Area.\
    \ This is an exceptional and very\\nunusual independent laboratory. But in part because it is so unusual it has sometimes\\\
    nstruggled for funding. We've often extolled its virtues to potential funders. Some of them \\u2013\\nusually wealthy\
    \ people in tech \\u2013 have made the observation that Dynamicland's output doesn't\\nyet appear as impressive as the\
    \ very best outcomes from Bell Labs \\u2013 things like information\\ntheory and the transistor. This is true. However,\
    \ Bell Labs had two to three orders of\\nmagnitude more funding in any given year, and existed over the better part of\
    \ a century, not\\nless than a decade. It would be shocking if Dynamicland could compare on outliers. But we\\nexpect\
    \ that if you compared Dynamicland to a randomly chosen Dynamicland-sized slice of\\nBell Labs the comparison would be\
    \ extremely favorable to Dynamicland. This point is\\nillustrated in more quantitative detail in an Appendix\\n(https://scienceplusplus.org/metascience/index.html#app_scale)\
    \ to the essay\\n.\\nOne-and-a-half cheers for citations: It's a cliche in metascience that \\\"citations-are-\\nlimited-or-bad-and-we-have-qualms-about-using-them\\\
    u2026 but we're going to use them because\\n\\u00af\\\\\\n_/\\u00af\\\". A venerable example comes from Eugene Garfield,\
    \ the creator of the Science\\nCitation Index, who enumerated many thoughtful criticisms of citation analysis and\\ncommented\
    \ that\\n: \\\"none of the criticisms are unfounded. Most of them are based on facets of\\ncitation analysis that pose\
    \ either theoretical or real problems in using the technique to evaluate\\npeople. Those using citation data to evaluate\
    \ research performance at any level, but\\nparticularly at the level of individuals, must understand both its subtleties\
    \ and its limitations.\\\"\\nBut despite such hand-wringing about the limitations of citation analysis, it is extremely\
    \ widely\\nused. This is illustrated by our prototypical example, AGZM, which relies on ad hoc citation-\\nbased measures\
    \ to quantify scientific merit. It's not the only thing they use, but it is their\\n(/index.html)\\n129\\n130\\n(\\u30c4)\\\
    n131\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n66/107\\n\\nprimary metric.\\nIt's easy to understand why citation analysis is so popular. Citation data is relatively\
    \ easily\\navailable. Citation analysis is easy to apply across disciplines, producing clear \\\"results\\\" with a\\\
    npleasing sheen of quantitative rigor and respectability. You can scale the analysis up, all while\\nnot needing to understand\
    \ anything much about the underlying ideas in the scientific literature\\nitself. And you can write lots of papers with\
    \ relatively simple scripts.\\nAll told, this kind of citation analysis seems to have many of the same benefits as choosing\
    \ a\\nbasketball team's players by simply trying to maximize the total height of the players. It's not\\nentirely wrong.\
    \ But it's also not taking the problem seriously, and will certainly mislead.\\nCitations have no intrinsic connection\
    \ to scientific progress at all; they are closer to exhaust\\nfrom progress, not progress itself. Proposals to understand\
    \ the evolution of ideas in detail are\\noften dismissed as \\\"not scalable\\\". But it seems strange to us to prioritize\
    \ scalability as the\\nbinding constraint over understanding what's actually going on. If you're going to learn to do\\\
    nsomething well at scale, it makes sense to first learn to do it well locally, even if that approach\\nis not obviously\
    \ scalable\\n. Fortunately, we believe a complementary approach is possible:\\nTwo-and-a-half cheers for the history of\
    \ science: By contrast to citation analysis, there\\nis already a field that studies the evolution, influence, and importance\
    \ of ideas in science: the\\nhistory of science. A good illustrative example, one of many, is the work of Abraham Pais.\
    \ An\\noutstanding theoretical physicist as a young man, in his 50s he switched to become a full-time\\nhistorian, writing\
    \ excellent biographies of Albert Einstein and Niels Bohr, as well as a history\\nof particle physics. As just one example,\
    \ consider Pais's beautiful biography of Einstein, \\\"Subtle\\nis the Lord\\\"\\n. What you learn from Pais is how to\
    \ think about Einstein's work. Why did it\\nmatter? Where did the ideas come from? How did they change later thinking?\
    \ How did they\\nchange the course of science, and of human civilization? He traces the lineage of thought,\\nthrough\
    \ letters, papers, books, and other people's accounts. In this way, we come to appreciate\\nboth Einstein's changing internal\
    \ understanding, and also how that fits into the collective mind\\nand intellectual landscape of the time. By contrast,\
    \ citation analysis seems almost like (a\\ncaricature of) behaviorist psychology, studying the external forms of science,\
    \ but not in any\\ndepth the evolution of the intrinsic underlying ideas. It is only by doing the latter that we can\\\
    nproperly grasp the changed understanding. That is the remit of history of science, and also (to\\nsome extent) of the\
    \ sociology and philosophy of science.\\n(/index.html)\\n132\\n133\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n\
    \    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n67/107\\n\\nNow, of course,\
    \ the history of science is a very active field. But, so far as we know, its approach\\nis not usually used as the basis\
    \ for program comparisons of the type we are discussing. And it's\\neasy to see why: it's not scalable and superficially\
    \ \\\"objective\\\" in the way citation analysis\\nappears to be. But we believe it is far more reliable, getting at the\
    \ actual importance of ideas.\\nIt's especially preferable for understanding the importance of individual outlier discoveries.\\\
    nAnd, as we said above: if you're going to learn to do something well at scale, it makes sense to\\nfirst learn to do\
    \ it well locally, even if that approach is not obviously scalable. And so we believe\\nthat the techniques of the history\
    \ of science should take on a central role in making program\\ncomparisons, especially in understanding the outliers.\
    \ It can and should be placed at the\\nfoundation of scalable analyses. Citation analysis is also valuable, but we believe\
    \ it should be\\nsecondary.\\nOf course, a major challenge is that the history of science has the benefit of long hindsight.\
    \ Pais\\nwas able to look back and understand what happened decades earlier, combining both serious\\nhistorical research\
    \ with a deep understanding of the underlying ideas\\n. But even with that\\ndepth of understanding it's harder to do\
    \ this nearer to real time, when the dust hasn't yet\\nsettled. This is certainly a challenge, and maybe even an intrinsic\
    \ problem: part of what makes\\ngreat scientists great is that they have superb taste (or, in some cases, luck) in what\
    \ they choose\\nto work on. It may be intrinsically difficult to scale this kind of taste. Still, we believe this\\napproach\
    \ is worth making a central plank in any approach to program evaluation.\\nThree cheers for structural diversity: As a\
    \ general principle for evaluation, we believe\\nthere should be a strong presumption favoring structural diversity in\
    \ social processes. Such\\nstructural diversity is a core, precious resource for science, a resource enlarging the range\
    \ of\\nproblems humanity can successfully attack. The reason is that different ambient environments\\nenable different\
    \ kinds of work. Problems easily soluble in one environment may be near\\ninsoluble in another; and vice versa. Indeed,\
    \ often we don't a priori know what environment\\nwould best enable an attack on an important problem. Thus it's important\
    \ to ensure many very\\ndifferent environments are available, and to enable scientists to liquidly move between\\nthem\\\
    n. In this view, structural diversity is a resource to be fostered and protected, not\\nhomogenized away for bureaucratic\
    \ convenience, or the false god of efficiency. What we need is\\na diverse range of very different environments, expressing\
    \ a wide range of powerful ideas about\\nhow to support discovery. In some sense, the range of available environments\
    \ is a reflection of\\nour collective metascientific intelligence. And monoculture is the enemy of creative work.\\n(/index.html)\\\
    n134\\n135\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n68/107\\n\\nStructural diversity is sometimes opposed. We've heard people describe instances of it as \\\"too\\nchaotic\\\
    \" or \\\"too confusing\\\". When startup initiatives are announced they often attract far\\ngreater critical scrutiny\
    \ than incumbents. This is a recurring pattern: from Janelia Farm to the\\nThiel Fellowship to the Santa Fe Institute,\
    \ and many others. We've been repeatedly told it's\\n\\\"common knowledge\\\" that these are underperforming or even failing.\
    \ Yet upon closer scrutiny\\nit often seems that such initiatives are outstanding successes, with negative impressions\
    \ not\\ndriven by serious evaluation.\\nAn instructive example is the Thiel Fellowship. Begun in 2010, this is a program\
    \ by which\\ntalented people of about age 20 are offered $100k to drop out of university and pursue\\nambitious independent\
    \ projects. The total cost of the program is a few million dollars per year,\\nequivalent to a handful of NIH R01 grants.\
    \ Critical scrutiny has included negative articles\\nabout the Fellowship in The New York Times, The Wall Street Journal,\
    \ The LA Times, and\\nother prominent sources. Former Harvard President Lawrence Summers described it as: \\\"the\\nsingle\
    \ most misdirected bit of philanthropy in this decade\\\". And yet it has supported\\nfoundational work in cryptoeconomics,\
    \ artificial intelligence, and a wide variety of startups.\\nWe believe any reasonable evaluation would show it to be\
    \ an extraordinary success, if\\ncompared dollar for dollar with most other programs. Certainly, the Thiel Fellowship's\
    \ budget\\nis a rounding error on the scale of Harvard and similar institutions.\\nOne way to think about it is this:\
    \ if you donate $10 million to Harvard or a similar incumbent,\\nthen a reasonable rough model is that that money will\
    \ go to the best thing Harvard didn't\\nalready fund. But Harvard has an enormous budget. And so it will fund something\
    \ far down\\nHarvard's priority list: something Harvard thought wasn't good enough to fund with its first\\nseveral billion\
    \ dollars in spending. By contrast, startup ventures striking out in new directions\\nare doing the best they can in those\
    \ directions. Diminishing marginal returns haven't yet set in.\\nStructural diversity may be chaotic and confusing, but\
    \ it also offers a chance to escape the\\ntyranny of diminishing marginal returns, and to enable new kinds of creative\
    \ work. We discuss\\nsome of the detailed challenges of achieving structural diversity in an Appendix\\n(https://scienceplusplus.org/metascience/index.html#challenges-in-achieving-structural-\\\
    ndiversity)\\n.\\n(/index.html)\\n136\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\\
    nhttps://scienceplusplus.org/metascience/index.html\\n69/107\\n\\nA metascience accelerator to drive change\\nBehind all\
    \ this you can imagine a metascience accelerator, either a new organization or a\\nstrongly empowered part of an existing\
    \ organization, taking a profusion of ideas through the\\nmetascience learning loop, over and over:\\nEach time through\
    \ the core loop would provide more information. The accelerator would\\nprovide support to scale trial programs that were\
    \ succeeding. It would publish detailed post\\nmortems not just of successes, but of failures. The accelerator would provide\
    \ mentors who\\ndeeply understood the key theoretical ideas of metascience, and also provide practical support\\nfor metascience\
    \ entrepreneurs. Such support would assist in: tool-building, marketing,\\nbranding; in fairly evaluating programs, aiming\
    \ to achieve decisive new metascience results; in\\ninstigating crises as a way of achieving change; and aggressively\
    \ promoting improved new\\napproaches, and attacking poorly performing incumbents. It would be tempting for the\\naccelerator\
    \ to avoid owning failures: consider the example of the Gates Foundation, which\\n(/index.html)\"\n  },\n  {\n    \"name\"\
    : \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n70/107\\n\\nsolicited an RCT to evaluate the impact of an educational initiative; and then tried to bury the\"\n  },\n\
    \  {\n    \"name\": \"results when they didn't like them\",\n    \"text\": \". But it is only in candidly admitting failure\
    \ that the\\ncommunity can actually learn; in this, there is credibility. Of course, there is a tension between\\nmanaging\
    \ funder relations (which often requires writing laudatory self-reports), and actually\\nimproving the way you do science.\
    \ The latter must take precedence over the former for such an\\naccelerator to be anything more than an empty exercise.\\\
    nImportant points not otherwise covered\\nLet us conclude Part 2 with a brief discussion of three issues that are important\
    \ for\\nmetascience, but which we have ignored in the core of our treatment.\\nUsing \\\"metascience\\\" to unintentionally\
    \ make things worse: There's a disastrous\\nfuture possible where \\\"metascience\\\" is used by bureaucracies as a lever\
    \ to justify ever-\\nincreased control. \\\"Let's measure and improve things!\\\" is the bureaucrat's sincerely well-\\\
    nmeaning war cry. It is understandable that the people running funders and research\\ninstitutions \\u2013 often brilliant,\
    \ imaginative people \\u2013 will think they know just the right way to\\nimprove things. Yet the usual de facto outcome\
    \ of such efforts is to centralize decision-making\\npower, and so to suppress much of the messy, illegible potential\
    \ latent in the community of\\nscientists. We fear a future in which armies of metascientists go forth, suggesting\\n\\\
    \"improvements\\\" which move more power to the center, and impose an ever larger burden on\\nscientists. One sees this\
    \ already in some misuses of scientometrics as a tool of measurement\\nand control. Capital and centralized authority\
    \ may determine much about how people behave,\\nbut they have no influence whatsoever over how Nature behaves. The correct\
    \ response is to\\nimpose an expectation of metascientific humility on incumbent organizations; and to hold to\\nespecially\
    \ high standards of evidence any proposed \\\"improvement\\\" which increases the power\\nof incumbents or the burden\
    \ on scientists.\\nContrasting metascience with macroscience: There's a point of view in which what\\nmatters for science\
    \ is government spending on research as a fraction of GDP; the number of\\nPhDs a country produces; number of papers;\
    \ number of citations, and so on. These, in turn,\\nare purportedly related to measures such as GDP and productivity growth.\
    \ Nations do\\n\\\"capacity building\\\" in \\\"priority areas\\\". It's science-by-the-barrel, viewing it as a commodity\
    \ to\\nbe bought and sold. This macroscopic view is very different from the view we've developed,\\n(/index.html)\\n137\"\
    \n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n71/107\\n\\nwhich focuses on understanding mechanisms of action, and improving specific social processes\\nand culture.\
    \ By contrast, the macroscopic view does not usually have strong specific\\nmechanisms of action, other than \\\"more\
    \ science is good\\\", and contingent ad hoc assumptions\\n(e.g.: \\\"AI is important, we should invest more in it\\\"\
    ). To some extent the two views are\\ncomplementary. But we also believe that over the long term most macroscopic value\
    \ is likely to\\nbe a consequence of improved social processes and culture. It is such improvements which can\\nproduce\
    \ qualitative changes inaccessible through merely \\\"more science\\\".\\nMetascience doesn't determine what we value:\
    \ There are central questions metascience\\ncan't answer. Consider a question like how fast NSF versus NIH versus DARPA\
    \ grows. Or: how\\nto prioritize efforts at diversity, equity, and inclusion. These aren't purely metascientific\\nquestions,\
    \ but are about what human beings think are important and valuable. They\\nnecessarily and correctly involve political\
    \ priorities, which reflect the values and judgments of\\nstakeholders. Metascience can help us understand how better\
    \ to achieve particular desired\\nends, but cannot on its own determine what those ends ought to be. The distinction is\
    \ related\\nto Hume's is-ought distinction. You can, for example, embark on a metascientific program of\\nunderstanding\
    \ how to design and achieve particular risk profiles. As those principles and\\ndesign ideas are developed, they can be\
    \ deployed in service of better achieving the goals\\nsuggested by our values and political priorities. But they won't\
    \ determine those values and\\npolitical priorities! We've ignored these issues through the main body of the essay. We\
    \ expect\\nthat, as a practical matter, many of the ideas of metascience can be developed independently of\\nvalues and\
    \ stakeholder interests. But ultimately all must play a role.\\nIs transformative improvement\\npossible in the culture\
    \ of science?\\nThis present moment used to be the unimaginable future. \\u2013 Stewart Brand\\nWe've just written 30,000\
    \ words about improving the culture of science. To what end? Even if\\nwe could rapidly change science's culture, maybe\
    \ today's discovery ecosystem is close to the\\nbest possible? Can we only make tiny incremental improvements, or are\
    \ truly transformative\\n(/index.html)\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of\
    \ Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n72/107\\n\\nimprovements possible \\u2013 changes\
    \ that would surprise or shock scientists of previous\\ngenerations with their novelty? Of course, this question is beyond\
    \ the scope of what we can\\ndiscuss with confidence. But we cannot resist a few speculative thoughts.\\nOne reasonable\
    \ conjecture is that today's ecosystem is close to the best possible. In this view,\\nany kvetching you hear is either\
    \ people looking for minor improvements, or people who are\\nmistaken or expressing sour grapes. It's easy to find superficial\
    \ support for this position. As we\\nnoted in the introduction the best scientists today are doing astounding work. And\
    \ if you talk\\nwith such people it is natural to wonder: \\\"is it possible to do better than the way this amazing\\\
    nperson is already operating? Surely all that's needed is to scale up the organizations that\\nproduce such people, and\
    \ to improve the way we support them?\\\"\\nBut there is a hole in such an argument. Even if you accept that certain types\
    \ of work are\\nsuperbly supported by today's system, that doesn't mean there aren't bottlenecks preventing\\nother crucial\
    \ types of work. In this view, there are researchers with particular canonical\\nworking styles \\u2013 perhaps a Robert\
    \ Langer or George Church\\n\\u2013 which accord well with what\\nuniversities are oriented to support. In those cases,\
    \ they have large labs, many grad students\\nand postdocs, a stream of papers and grants (and overhead) in the vanguard\
    \ of mainstream\\nfields, a combination of salespersonship and management and leadership and science. This is\\nterrific\
    \ and we're glad universities support it. But perhaps there are other not-currently-\\ncanonical working styles \\u2013\
    \ that of a Katalin Kariko or Stephen Wiesner or Douglas Prasher, for\\ninstance \\u2013 which aren't so congenial to\
    \ today's institutions. And perhaps those working styles\\nenable scientific work which is crucial, but near-impossible\
    \ to do within the existing\\necosystem. That is, you can stack up as many canonical researchers as you like and they\
    \ still\\nwon't do the non-canonical work; it's a bottleneck on our capacity for discovery.\\nIn this view, a benefit\
    \ of new social processes and new cultures is that they can enable new\\ntypes of work not easily possible in existing\
    \ environments. And, furthermore, those new types\\nof work may play an irreplaceable role in furthering science. As just\
    \ one example, we've\\nsuggested increasing the rate at which new fields are founded. Implicit in this suggestion is\\\
    nthree ideas: (1) that field-founding often requires types of work which are difficult to support\\nwithin today's discovery\
    \ ecosystem; (2) those new types of work can be enabled by new types of\\nenvironment; and (3) science is currently bottlenecked\
    \ on field-founding, and so enabling\\n(/index.html)\\n138\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\"\
    : \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n73/107\\n\\nfield-founding work would\
    \ unlock tremendous latent potential for discovery. In this way,\\ncreating a new cultural niche can have a transformative\
    \ effect on science. Analogous\\narguments can be made for many of the other ideas sketched earlier.\\nOf course, new\
    \ environments and new social processes don't just change what types of work\\nare immediately possible. Over the long\
    \ term they may transform who goes into science; how\\nthey grow and change over the course of their lives; the collective\
    \ norms and shared\\nassumptions and tools they have available to them; and the structure of the networks that\\ncarry\
    \ expertise and problems and resources to individuals. This in turn changes the problem\\nflux they're exposed to, the\
    \ types of people they talk to, the resources and expertise available,\\nand the values and incentives shaping their growth.\
    \ Indeed, it potentially changes the entire\\ncognitive and emotional experience of being a scientist. It is those longer-term\
    \ changes which\\ncan enable the \\\"same\\\" person to do radically different types of work, including work very\\ndifficult\
    \ to do today. This is why we believe cultural shifts may completely transform science.\\nIt's worth contrasting this\
    \ to a common romantic ideal, memorably expressed by Vannevar\\nBush, that science is best done through \\\"the free play\
    \ of free intellects\\\". Or, as many people\\nhave said to us: \\\"Aren't top people at top places able to do as they\
    \ want? Why not just do more\\nof that? Let's minimize red tape, reduce the amount of administration and grant-writing,\
    \ and\\nget out of the way!\\\" Versions of these sentiments are also sometimes expressed in the what's-\\nwrong-with-science-and-how-to-fix-it\
    \ genre. There is merit in these ideas, but resource\\nconstraints mean the question \\\"whose intellect gets to play\
    \ freely\\\" becomes omnipresent. After\\nall, the phrase originates in the document credited as the origin of the US\
    \ National Science\\nFoundation! So while \\\"the free play of free intellects\\\" seems attractive, it is not usually\\\
    nattainable. But more importantly, such ideas fail to address the crucial role of culture and\\nenvironment. It's an individualist\
    \ philosophy, while discovery is fundamentally a networked\\nendeavor\\n. Changed culture doesn't matter because it eliminates\
    \ inconveniences in scientists'\\nlives. It matters because it transforms scientists themselves, and the structure of\
    \ their\\nnetworks, and so transforms and enlarges the kinds of work that can be done\\n.\\nIn this essay we've attempted\
    \ to peer into and shape the future. It's a sketch, and the ideas and\\nlanguage need development. It needs to be improved\
    \ by experience. And it's possible to make a\\ncase against this vision. The social processes of science have incredible\
    \ inertia: it's like turning\\na supertanker around. It's easy to conclude the situation is intractable. Still, there\
    \ is value in\\npersistence: the culture and social processes of science are jewels of human civilization. We\\n(/index.html)\\\
    n139\\n140\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n74/107\\n\\nhave an opportunity to make them rapidly self-improving, and to develop metascience into an\\nengine driving\
    \ improvement in the way humanity understands the world. It is humanity's\\nability to improve the discovery ecosystem\
    \ that will ultimately determine the long-run health\\nof science.\"\n  },\n  {\n    \"name\": \"Acknowledgments\",\n\
    \    \"text\": \"MN's work was supported by the Astera Institute. KQ's work was supported by Generally\\nIntelligent.\
    \ Our thinking has been formed in conversation with hundreds of people over several\\ndecades. Our thanks to them all.\
    \ Especial thanks to: Scott Aaronson, Dorit Aharonov, Dave\\nAlbert, Josh Albrecht, Sam Altman, Marc Andreessen, Nadia\
    \ Asparouhova, Pierre Azoulay,\\nNick Beckstead, Juan Benet, Alexander Berger, Nick Bloom, Ed Boyden, Adam Brown, Stuart\\\
    nBuck, Howard Burton, Carl Caves, David Chapman, Jennifer Chayes, Seemay Chou, Ike\\nChuang, Matt Clancy, Patrick Collison,\
    \ Tyler Cowen, Dom Cummings, Laura Deming, David\\nDeutsch, Artur Ekert, Chris Fuchs, Julia Galef, Anastasia Gamick, Danny\
    \ Goroff, Ilan Gur,\\nGwern, Melissa Hagemann, Celine Halioua, Timo Hannay, Robin Hanson, Demis Hassabis,\\nSabine Hossenfelder,\
    \ Anton Howes, Elanor Huntington, Tim Hwang, Heather Joseph, Tom\\nKalil, Alan Kay, Julia Kempe, Ottoline Leyser, Adam\
    \ Marblestone, Andy Matuschak, Jed\\nMcCaleb, Gerard Milburn, Evan Miyazono, Cameron Neylon, Brian Nosek, Chris Olah,\\\
    nCatherine Olsson, Tim O'Reilly, James Phillips, Ben Reinhardt, Jos\\u00e9 Luis Ric\\u00f3n, Gerry Rubin,\\nHalina Rubinsztein-Dunlop,\
    \ Terry Rudolph, Grant Sanderson, Ben Schumacher, David Siddle,\\nStar Simpson, Lee Smolin, Rob Spekkens, David Spergel,\
    \ Peter Suber, Umesh Vazirani, Bret\\nVictor, Marc Warner, Mike Webb, Eric Weinstein, Andrew White, John Wilbanks, and\
    \ Heidi\\nWilliams. For feedback on drafts of the essay, we thank: Kat Baney, David Chapman, David\\nLang, Evan Miyazono,\
    \ Brian Nosek, and Janelle Tam. Especial thanks to: Patrick Collison, with\\nwhom MN collaborated on a precursor project;\
    \ to Grant Sanderson, for initial encouragement\\nto undertake this project; to David Chapman for help and encouragement\
    \ in overcoming a\\ncrucial difficulty, and for many generous conversations; and to Brian Nosek for conversations\\nabout\
    \ the origin of the Center for Open Science. The icons for navigation were created by\\nFreepik-Flaticon (https://www.flaticon.com/free-icons/home-button),\
    \ and the table of\\ncontents benefits from code supplied by Michael Keenan, and adapted from Jim Babcock.\\n(/index.html)\"\
    \n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n75/107\\n\\nFinally, thanks to the wonderful, maddening, collective genius and collective boor that is\\nTwitter \\u2013\
    \ simultaneously history's most able, most irritating, and most distracting research\\nassistant and research stimulant.\\\
    nCitation information\\nFor attribution in academic contexts, please cite this work as:\\nMichael Nielsen and Kanjun Qiu,\
    \ \\\"A Vision of Metascience: An Engine of Improvement for the\\nSocial Processes of Science\\\", https://scienceplusplus.org/metascience/index.html\\\
    n(https://scienceplusplus.org/metascience/index.html), San Francisco (2022).\\nAppendices\\nOther opportunities to transform\
    \ science:\\nartificial intelligence, India, China, space\\ncolonization, and intelligence augmentation\\nThere are several\
    \ external factors we've ignored through this essay, which may eventually be\\nhighly relevant to the future progress\
    \ of science. We'll now briefly turn to those factors, and\\nhow they relate to metascience.\\nPerhaps the most fashionable\
    \ is artificial intelligence (AI). Some well-informed people\\nconfidently believe AI will soon transform science (and\
    \ the world), while others believe it's no\\nbig deal. The recent success of DeepMind on protein structure prediction\
    \ is impressive: we\\nhumans are now learning a great deal about proteins from our machines. And while that's\\n\\\"merely\\\
    \" one (important) problem, one wonders: will this kind of breakthrough become\\nroutine? Are AI systems going to drive\
    \ more and more progress in science? Will they drive\\nimprovements in themselves\\n? Might they eventually transform\
    \ the engine of scientific\\ndiscovery? Ilya Sutskever, Chief Scientist at the AI company OpenAI, tweeted\\n(https://twitter.com/ilyasut/status/1505754945860956160):\
    \ \\\"In the future, it will be obvious\\n(/index.html)\\n141\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"\
    text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n76/107\\n\\nthat the sole purpose\
    \ of science was to build AGI [artificial general intelligence]\\\". The\\nstatement is absurdly over-the-top \\u2013\
    \ the billions of people whose lives have been improved by\\npre-AGI science could not possibly agree \\u2013 and was\
    \ perhaps meant merely as marketing for his\\ncompany. But it may have a grain of truth.\\nFor our purposes, the point\
    \ is that if AI does completely transform science, then modifying the\\nsocial processes of science today may matter little\
    \ for the long run. Of course, this argument\\ncan be used in favor of not thinking about anything except AI in the medium-term\
    \ future. It's\\nAI-as-thought-terminating-cliche. We know some people with this view. But we believe there's\\nenough\
    \ uncertainty about this that improving the social processes of science remains a\\nquestion of considerable interest.\\\
    nAI isn't the only event which might plausibly cause a new scientific revolution. India and China\\nare rapidly developing\
    \ their parts of the overall discovery ecosystem. In so doing, they may\\ndecide to mostly copy the institutional approaches\
    \ of the US and Europe. But we hope they will\\nseize the opportunity to be different and (perhaps) vastly better than\
    \ extant institutions. Doing\\nso will require imagination and insight and courage; we hope metascience will contribute\\\
    nuseful ideas. It's a tremendous opportunity for those countries and, we hope, for humanity\\n.\\nAnother potentially\
    \ transformative opportunity is humanity's colonization of space. This is\\nsimilar to the opportunity for science afforded\
    \ by India and China, but ultimately far larger\\n(and more challenging). The colonization of space is still just beginning,\
    \ but seems likely to\\ngain pace over the next century and in the centuries that follow. It will provide enormous\\nchallenges,\
    \ and also incredible opportunities to trial new institutional ideas. Again: we hope\\nour descendants will have the courage\
    \ and creativity to reimagine our institutions. Given the\\ncourage and imagination it will take to colonize space, that\
    \ seems likely! We hope and expect\\nthat a flourishing field of metascience will contribute to any such reimagination.\\\
    nFinally, there is the possibility of new technologies for intelligence augmentation. Humanity's\\nexisting technologies\
    \ for intelligence augmentation \\u2013 language, writing, the alphabet,\\nmathematics, the printing press, early computers\
    \ \\u2013 have each transformed how human beings\\nthink and discover. Will we develop new technologies for intelligence\
    \ augmentation that enable\\nfurther such transformations\\n? As with AI it's difficult to say how any such transformation\\\
    nwould relate to metascience. But insofar as metascience is able to work toward universal truths\\nabout discovery it\
    \ will inform the future of science no matter what.\\n(/index.html)\\n142\\n143\"\n  },\n  {\n    \"name\": \"/28/25,\
    \ 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n77/107\\\
    n\\nThe trouble caused by scale\\nAs we noted in the body of the essay a major challenge in evaluating and comparing novel\\\
    nsocial processes is that the scale of the trial may matter in ways that are hard to reason about.\\nIn particular, outlier-dominated\
    \ processes can show surprising relationships between the scale\\nat which the process is trialled and the outcome. This\
    \ can, for example, lead you to falsely\\nconclude that a trial process performs worse than an incumbent, simply because\
    \ the\\nincumbent has much more scale.\\nTo understand what's going on, it helps to think about the (non outlier dominated)\
    \ world we\\nusually live in. If you put ten times as much fuel in your car, you expect it to go about ten times\\nfurther.\
    \ If you plant ten times as much of a crop, you expect about ten times as much of a\\nharvest. Of course, in both cases\
    \ there are exceptions \\u2013 maybe some of the larger land area\\nisn't very good, causing part of the crop to fail.\
    \ But the basic intuition is right, and it's relatively\\nstraightforward to reason about variations.\\nThis has consequences\
    \ when you make comparisons. Suppose you are comparing the fuel\\nefficiency of two cars, and are told that one of the\
    \ cars will get 100 miles on 5 gallons of gas,\\nwhile the other car will get 1200 miles on 50 gallons of gas. Obviously,\
    \ you'd conclude the\\nsecond car was more fuel efficient! The strange thing about outlier-dominated processes is that\\\
    nthis reasoning can utterly fail to hold, and fail to hold in ways that are difficult to reason about.\\nThere's a nice\
    \ toy model that can be used to illustrate this. The model is not realistic \\u2013 that's\\nnot its point. Rather, the\
    \ point is to illustrate a tricky issue that we believe holds more\\ngenerally. The purpose of this Appendix is to lay\
    \ out the toy model, to help readers build\\nintuition.\\nSuppose we have two approaches to science funding, which we'll\
    \ call\\n, the control\\n(representing an existing approach), and  (the intervention, representing a new approach).\\\
    nThe basic idea is to suppose we have some way of quantifying the importance of discoveries,\\nand both\\nand  have heavy\
    \ tails under this measure of importance, but: the intervention is\\nmuch heavier tailed (i.e., is more likely to produce\
    \ enormous outliers), while on typical\\noutcomes the intervention performs a little worse than the control. Qualitatively,\
    \ the idea is\\nthat the distributions may be depicted as:\\n(/index.html)\\nC\\nI\\nC\\nI\"\n  },\n  {\n    \"name\"\
    : \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n78/107\\n\\nIf the intervention is worse in typical behavior, then for a small trial the intervention  will\\nappear\
    \ worse than the control\\n, since a much smaller number of samples means  has much\\nless opportunity to benefit from\
    \ the heavy-tailedness. It's not that the existing approach\\nis\\nactually better. It's rather that it has tremendous\
    \ scale, which means it benefits from\\noccasional outlier outcomes. By contrast, the intervention  has relatively few\
    \ opportunities to\\nbenefit; if it had similar scale, the outliers would be more pronounced than\\n. Put another\\nway:\
    \ in heavy-tailed systems the number of \\\"shots on goal\\\" you get matters a lot.\\nOf course, scientific discoveries\
    \ aren't fungible, and can't be quantified in this way. But this is\\nnonetheless useful as a toy model or intuition pump\
    \ to illustrate the underlying issue. In\\nparticular, it's easy to construct explicit examples of distributions with\
    \ the properties just\\ndescribed. One example is if\\nis a log-normal distribution with\\nand\\n;  is a\\npower-law distribution\
    \ with shape parameter\\nand with minimal value . We did\\nrepeated computer simulations\\n, drawing 100 times from the\
    \ intervention, and 100,000\\ntimes from the control. When we did 1,000 such simulations, we found that roughly 63 percent\\\
    nof the time: (1) the median of the intervention was lower than the control; (2) the average\\nvalues of the trial intervention\
    \ were also lower than the control; but (3) if the trial intervention\\nwas extended to have the same number of samples\
    \ as the control, it actually had a higher\\naverage value, with the average being substantially shifted due to more opportunities\
    \ for\\noutliers. Moreover, the shift was often quite significant, with an average 39% increase when the\\n(/index.html)\\\
    nI\\nC\\nI\\nC\\nI\\nC\\nC\\n\\u03bc = 0\\n\\u03c3 = 1.4 I\\n\\u03b1 = 2.3\\n0\\n144\"\n  },\n  {\n    \"name\": \"/28/25,\
    \ 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n79/107\\\
    n\\ntrial was extended out. The scale really matters, enough so that a comparison would likely be\\nstrongly misleading\
    \ without taking scale into account. How best to do that we leave as an open\\nproblem.\\nOf course, this toy model is\
    \ contrived and artificial. But the fundamental point is clear. Indeed,\\nit even seems plausible as a description of\
    \ certain historic situations, like that of Bell Labs, as\\ndiscussed in the body of the essay. As mentioned there, the\
    \ idealization of Bell Labs is typically\\nbased on a few very important outcomes: the transistor, information theory,\
    \ theory of\\nsuperconductivity, and a few others. But Bell Labs was enormous, and it's difficult to untangle\\nthose\
    \ successes from the fact that their scale meant they were able to take a lot of shots on goal.\\nSome looked like Shannon\
    \ producing information theory. But most are justifiably forgotten.\\nAnd this makes it tricky to compare them to much\
    \ smaller operations.\\nChallenges in achieving structural diversity\\nIn the body of the essay we've advocated for structural\
    \ diversity in scientific culture. There are\\nmany associated challenges, and in this Appendix we describe a few. Most\
    \ broadly, there's the\\nportfolio construction problem: what regulating mechanisms should set the portfolio of\\navailable\
    \ environments?\\nThe portfolio construction problem has many subproblems. One is the unbounded growth\\nproblem. To illustrate\
    \ this problem, let's return to the example of Focused Research\\nOrganizations (FROs). Adam Marblestone, the co-creator\
    \ of FROs, has told us that he\\nfrequently hears the critique that \\\"not everything should be a FRO\\\". He sometimes\
    \ hears this\\neven after he repeatedly emphasizes that \\\"not everything should be a FRO\\\". It's easy to see why\\\
    npeople worry. FROs have just recently been launched, and it's possible the first few FROs will\\ngo poorly, and the idea\
    \ may sink. But it's also possible that one of the first FROs will be a\\nspectacular success. All of a sudden there may\
    \ be many laudatory articles about the model.\\nOther funders may start to launch FRO-like programs. That may lead to\
    \ still more articles, and\\nmore FRO-like programs. In such a situation: what sets the final scale? Do funders become\\\
    nFRO-happy? FROs hit many satisfying spots for them: they're highly legible, goal-oriented,\\nmeasurable, with good stories\
    \ and optics. All things funders love; FROs are, in many ways, a\\ntoo-natural thing for funders to want to scale! Perhaps\
    \ we reach a state where some scientists\\nbegin to complain that everything is FROs, FROs, FROs, that's the only way\
    \ to get anything\\n(/index.html)\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\\
    nhttps://scienceplusplus.org/metascience/index.html\\n80/107\\n\\nfunded. What was healthy growth becomes malignancy.\
    \ Or do we instead reach a situation\\nwhere FROs are one component in a diverse heteroculture, used when appropriate,\
    \ but\\nwithout other work being unnaturally shoehorned into the model? What sets the scale?\\nThe same story can be repeated\
    \ for many ideas for new social processes. We very much like\\nRegistered Reports, but it would be a bad mistake if they\
    \ became compulsory. More\\nexploratory and speculative work is also extremely important. Ideas like fund-by-variance\
    \ and\\nfund-by-lottery likely have significant advantages over conventional approaches; but they\\nshouldn't replace\
    \ them entirely. The trouble in all these cases is the lack of good self-regulating\\nmechanisms. It's easy to end up\
    \ with research monocultures, when it would be far healthier to\\nhave a diverse portfolio of approaches co-existing,\
    \ with the relative scale regulated by some\\nmechanism ensuring the ongoing health of science.\\nThe fundamental question\
    \ is: what sets the scale for any such program? Is it fashion and fickle\\nperception and politics and highly legible\
    \ stories? Or is it the scientific contribution, and the\\nvalue of the program as a part of the wider ecosystem? At present,\
    \ it is almost entirely the\\nformer, and only incidentally the latter. Of course, fashion and fickle perception and politics\\\
    noften do not present as such. They present as enthusiastic articles by well-meaning people in\\nNature and Science and\
    \ The New York Times. They present as enthusiastic and brilliant\\nfounders of new institutions, with their pet ideas\
    \ about how things could be better. This is\\nexcellent for generating new social processes, but a terrible basis for\
    \ evaluation\\n. The net\\nresult is a natural monoculture, an oligarchy in which there's either far too much or not nearly\\\
    nenough of something. This is a disaster for science.\\nUnfortunately, we don't have good answers for these questions!\
    \ Just to summarize the\\nproblems as we see them: there's the portfolio construction problem, and three related\\nsubproblems.\
    \ (1) The unbounded growth problem: finding a healthy regulator for the ultimate\\nscale of a process; (2) The metascience\
    \ alignment problem: whether the ultimate scale of a\\nprocess is set by the value to humanity and science, or by fashion\
    \ and politics; (3) A problem\\nwe haven't yet explicitly mentioned, the extinction problem: how to scale down processes\\\
    nwhich are working poorly, a kind of creative destruction for science. This is something science\\ncurrently does extremely\
    \ poorly; the result is long-lived institutions and communities and\\nprocesses which crowd out new entrants\\n. It's\
    \ possible there are no perfect or near-perfect\\nanswers to any of these problems. But we believe far better answers\
    \ are possible than we have\\n(/index.html)\\n145\\n146\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\"\
    : \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n81/107\\n\\ntoday, through imaginative\
    \ theoretical work and mechanism design. In the meantime, even\\nwithout solving these global problems of portfolio construction,\
    \ it seems worth focusing more\\nlocally, on identifying new processes that deserve to be amplified.\\nFootnotes\\n1.\
    \ We'll use the term discovery ecosystem to denote the set of organizations and social\\nprocesses that engage in basic\
    \ science. It includes much work done by universities,\\nnational laboratories, some industrial laboratories, and many\
    \ independent research\\ninstitutes, thinktanks, and independent researchers. In speaking with academics we've\\nnoticed\
    \ they sometimes assume that nearly all noteworthy basic science is done within\\nuniversities. This is, however, not\
    \ even close to true. We use the term \\\"ecosystem\\\" to help\\nsuggest that many of these organizations wink in and\
    \ out of existence, or change form, and\\nthat there are familial similarities between many of them. In general, we've\
    \ found\\nevolutionary metaphors helpful in thinking about this landscape.\\u21a9\\ufe0e\\n2. A partial but useful catalog\
    \ of new research organizations has been collected by Sam\\nArbesman, the Overedge Catalog (https://arbesman.net/overedge/).\
    \ See also: Nadia\\nAsparouhova, \\\"Understanding science funding in tech, 2011-2021\\\"\\n(https://nadia.xyz/science-funding)\
    \ (2022).\\u21a9\\ufe0e\\n3. Incidentally, here and throughout we accept this dichotomy between funders and research\\\
    ninstitutions. It is a false dichotomy (though a useful present-day approximation), making\\ncertain assumptions about\
    \ the way in which labor should be divided. It's easy to come up\\nwith example mechanisms which fall outside this dichotomy:\
    \ an obvious one is distributed\\nmechanisms for the allocation of resources, such as have been proposed by the\\nDecentralized\
    \ Science (DeSci) community, with ideas like Distributed Autonomous\\nOrganizations (DAOs). And, of course, organizations\
    \ like professional societies and\\njournals also fall outside the dichotomy. Instinctively, we feel that the metascience\\\
    naccelerator discussed later in the essay really ought to sit outside this dichotomy too: it's a\\nset of ideas that should\
    \ have multiple instantiations.\\u21a9\\ufe0e\\n(/index.html)\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"\
    text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n82/107\\n\\n4. In the footnotes\
    \ we cite some antecedents we believe the reader may find of especial\\ninterest, but our citations are rather ad hoc\
    \ and incomplete, since our intent in listing\\nthese ideas is merely to evoke some of the many possibilities. We apologize\
    \ to and ask for\\nunderstanding from those whose work we have unfairly slighted.\\u21a9\\ufe0e\\n5. There are many variations\
    \ of this idea possible. Another one is to assign an Advocate and a\\nDevil's Advocate for each grant. Yet other variations\
    \ back off from a hard insistence on\\nvariance, and instead mix polarization and consensus models.\\u21a9\\ufe0e\\n6.\
    \ This fund-by-variance strategy can be done at other levels of abstraction, not just the level\\nof individual grants.\
    \ For instance, instead of getting involved in new program areas by\\nconsensus, funders could look for program areas\
    \ which are controversial. One\\nimplementation would be to only start a new program area if it is strongly supported\
    \ by\\nsome program managers, and strongly opposed by some program managers. The idea is\\nmotivated by the observation\
    \ that DARPA has often chosen highly unusual programs,\\nwhich then very nearly force grant applications which would be\
    \ considered unorthodox by\\nother funders. Similar select-by-variance ideas could be applied to hiring, selecting areas\\\
    nfor new departments at universities, even for setting up entirely new institutions.\\u21a9\\ufe0e\\n7. There is at least\
    \ some weak evidence against the idea: Adrian G. Barnett, Scott R. Glisson,\\nand Stephen Gallo, Do funding applications\
    \ where peer reviewers disagree have higher\\ncitations? A cross-sectional study\\n(https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6171721.2/)\
    \ (2018).\\u21a9\\ufe0e\\n8. Note that this is a proper noun, and so capitalized, whereas the preceding item, fund-by-\\\
    nvariance, is an abstract strategy applicable in many contexts, and so is lower case. This\\nkind of distinction will\
    \ recur throughout the essay. Where possible we prefer concreteness\\nand capitalization, and rely on the reader's imagination\
    \ to generalize. However, when it is\\nmore informative to work with a higher degree of abstraction we shall do so.\\\
    u21a9\\ufe0e\\n9. This term has also been used by Samo Burja in his 2019 essay Intellectual Dark Matter\\n(https://medium.com/the-long-now-foundation/intellectual-dark-matter-\\\
    n2e5890aa8d8f). His focus is on tacit and lost knowledge, and so is rather different than\\nours, which is focused on\
    \ hidden ideas with potential to drive scientific discovery. Still, all\\nseem like part of a larger category.\\u21a9\\\
    ufe0e\\n(/index.html)\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n83/107\\n\\n10. It's surprisingly difficult to find good data on tenure rates. One useful report is: Michael J.\\nDooris\
    \ and Marianne Guidos, \\\"Tenure Achievement Rates at Research Universities\\\"\\n(2006). That report suggests that at\
    \ many research universities something like 50-60% of\\ntenure track faculty are eventually tenured at that university,\
    \ with considerable variation.\\nHowever, much of the deficit is due to faculty moving to jobs elsewhere. The actual tenure\\\
    nrate for people who go up for tenure review is, for the one university where they have data\\n(Penn State), much higher:\
    \ 89%. All these factors (and more) would need to be taken into\\naccount in the design of a serious tenure insurance\
    \ program. However, for the sketch in\\nthe essay, an estimate of 80% seems fine as a ballpark figure.\\u21a9\\ufe0e\\\
    n11. The idea of tenure insurance was, as far as we know, originated in conversation between\\nPatrick Collison and Michael\
    \ Nielsen.\\u21a9\\ufe0e\\n12. The report is at Qualitative Evaluation of Complete Projects Funded by the European\\nResearch\
    \ Council (https://erc.europa.eu/sites/default/files/document/file/2018-\\nqualitative-evaluation-projects.pdf) (2017).\
    \ There are various ways one might try to\\nreconcile the facts we mention. The two best we can think of: (1) The original\
    \ project ideas\\nreally did overwhelmingly fail, but the projects achieved some other extremely valuable\\noutcome; (2)\
    \ The use of \\\"high-risk\\\" should be understood as a socially-constructed a\\npriori judgment: if describing a project\
    \ to others in the field, most would say \\\"that sounds\\nvery risky\\\", but in fact the recipient was so resourceful\
    \ (or perhaps lucky) that they\\nsucceeded anyway. If the ERC meant either of these things, they failed to note it in\
    \ their\\nreport. We believe a more likely hypothesis is that the review was a marketing document\\nintended to make the\
    \ ERC look good, not a serious evaluation of risk.\\u21a9\\ufe0e\\n13. Of course, there are many problems with this proposal.\
    \ Most obviously: won't this\\nincentivize program managers to actively select bad projects, to reach their failure quota?\\\
    nIt's easy to think of plausible ways this might be avoided. However, in these brief program\\nevocations we won't try\
    \ to debug the proposals. In a similar way, failed / not failed, and\\nfired / not fired are demarcations which need more\
    \ thought and refinement. As a practical\\nmatter, debugging and iteration will certainly be required, not just of this\
    \ proposal, but of\\nall of them. Again: these are program evocations, not full proposals.\\u21a9\\ufe0e\\n14. Perhaps\
    \ the other most-cited example from relatively recent times is Bell Labs. As we'll\\ndiscuss later in the essay, Bell\
    \ Labs was certainly very good, but its budget was also\\nenormous \\u2013 at their respective peaks, more than an order\
    \ of magnitude larger per year\\n(/index.html)\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision\
    \ of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n84/107\\n\\nthan PARC. Bell Labs also persisted\
    \ as a research lab for far longer. On a per-dollar basis it\\nseems likely to us that PARC was far more successful.\\\
    u21a9\\ufe0e\\n15. Incidentally, it's possible to make a case that PARC would have inevitably declined in the\\n1980s,\
    \ with key staff exiting for more applied positions at companies such as Microsoft,\\nApple, and even Atari. The story\
    \ of the changes that actually happened are told in chapters\\n24-26 of Michael Hiltzik's book \\\"Dealers of Lightning\\\
    \" (1999). If a severe decline was\\ninevitable, then one might argue that an NSF or similar acquisition would have been\
    \ a bad\\nidea. That would not, however, establish that such acquisitions are in general a bad idea.\\nThe Google acquisition\
    \ of DeepMind seems like an example of this acquisition strategy\\nsucceeding well, at least as judged by research impact.\\\
    u21a9\\ufe0e\\n16. It could plausibly be net negative for humanity to move brilliant teenagers from the\\ndeveloping world\
    \ to richer countries. Certainly, jingoists or the self-interested in richer\\ncountries could easily make a superficially\
    \ plausible case that it would be a net positive for\\nhumanity. But that doesn't make it true, and the situation seems\
    \ to us rather complicated\\nto assess, with many positives and negatives.\\u21a9\\ufe0e\\n17. There's a certain type\
    \ of closed-minded \\\"scientist\\\" who would hate this. These people\\ncould, perhaps, be sought out to act as insurance\
    \ counterparties. Certainly, if they're\\ngenuinely outraged at the possibility of (say) a prize for perpetual motion,\
    \ then they\\nshould be willing to accept (say) a $100 premium against the possibility of a $10,000\\npayout. After all,\
    \ \\\"it's free money!\\\" is what they (claim to) believe. Put together 10,000\\nsuch people, and you have a $100 million\
    \ prize. It's amusing to imagine a DAO of people\\npoo-poohing perpetual motion, acting as counterparties for the prize.\
    \ Though impossible,\\nat present, to imagine such people joining a DAO.\\u21a9\\ufe0e\\n18. An obvious argument against\
    \ this is that many such prizes would be dwarfed by the\\nintrinsic commercial incentive. Even a billion dollar prize\
    \ for cheap cold fusion would\\n(plausibly) be tiny compared to the commercial payout. While this argument is\\nreasonable,\
    \ it is perhaps less true in practice than one might think. There are many\\nhistoric instances where the person or organization\
    \ who creates a technology was not\\nsuited to building a successful company around that technology. There's also something\\\
    nabout the concrete vividness of such a prize: the founder of the $10 million X-Prize, Peter\\nDiamandis, has estimated\
    \ that more than $100 million was spent trying to win the prize.\\nThat is, despite the superficial rational investment\
    \ calculus, in practice investors behaved\\n(/index.html)\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\"\
    : \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n85/107\\n\\nquite differently. It's\
    \ interesting to ponder the reasons for what seems like overinvestment.\\nIn some sense it seems that the investors must\
    \ have viewed the possibility of a prize (and\\nthe publicity and other halo effects) as a kind of subsidy, and on the\
    \ margin that was\\nenough to change their behavior.\\u21a9\\ufe0e\\n19. When we talk with funders about this idea we\
    \ encounter a deluge of objections. As far as\\nwe can tell these are mostly proxies for \\\"we'd be really uncomfortable\
    \ doing this, and\\nwould much prefer to not be publicly accountable for bad decisions in such a clear cut way.\\nCertainly,\
    \ we don't want individual program managers [etc] to be accountable\\\". While that\\nis perhaps an uncharitable interpretation\
    \ of their comments, we believe it is likely true, in\\npart because both of us so intensely dislike being held accountable\
    \ in such a way. It really\\nis deeply unpleasant! Kudos to the partners at Bessemer Venture Partners for their\\nwillingness\
    \ to do this publicly and with such good humor.\\u21a9\\ufe0e\"\n  },\n  {\n    \"name\": \"We owe this observation to\
    \ James Phillips.\\u21a9\\ufe0e\",\n    \"text\": \"21. This is attested in part by scientists who participated in the\
    \ Fast Grants program; of those\\nwho received a grant, \\\"78% said that they would change their research program `a\
    \ lot' if\\ntheir existing funding could be spent in an unconstrained fashion.\\\" (Patrick Collison, Tyler\\nCowen, and\
    \ Patrick Hsu, What We Learned Doing Fast Grants (https://future.com/what-\\nwe-learned-doing-fast-grants/)). It is also\
    \ attested by Thomas Sinkj\\u00e6r, former director of\\nthe Danish National Research Foundation, explaining that he and\
    \ the board of the\\nfoundation: \\\"spoke with more than 400 young scientists and kept hearing the same\\ndepressing\
    \ refrain: many were writing grants not for work they really wanted to do, but for\\nprojects they thought could get funded.\
    \ Often, they were not even bringing their best ideas\\nto the table.\\\" (Thomas Sinkj\\u00e6r, Fund ideas, not pedigree,\
    \ to find fresh insight\\n(https://www.nature.com/articles/d41586-018-02743-2), Nature (2018)).\\u21a9\\ufe0e\"\n  },\n\
    \  {\n    \"name\": \"Nick Szabo, The Birth of Insurance\",\n    \"text\": \"(https://web.archive.org/web/20150507134912/http://szabo.best.vwh.net:80/insurance.\\\
    nhtml) (2005).\\u21a9\\ufe0e\\n23. A reasonable response is: \\\"That's not much good if you're a sailor\\\". Of course,\
    \ this is an\\nanalogy to make a point about systems change, not meant to be directly applied.\\nNonetheless, it's worth\
    \ noting that many of the points we discuss amount to ways of de-\\nrisking individual sailor / scientist lives \\u2013\
    \ ideas like tenure insurance.\\u21a9\\ufe0e\\n(/index.html)\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"\
    text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n86/107\\n\\n24. Speaking very\
    \ loosely, and with a great deal of hubris, in this essay we aim to do for\\nrevolutions in the social processes of science\
    \ what Kuhn did for scientific ideas in \\\"The\\nStructure of Scientific Revolutions\\\". We amused ourselves while writing\
    \ with the title \\\"The\\nStructure of Scientific Social Revolutions\\\". Of course, a big difference is that Kuhn was\\\
    nable to analyze an extant situation already designed to support such revolutions in ideas.\\nScience today is not designed\
    \ to support social revolutions. And so a better title might be:\\n\\\"Structures to Support Scientific Social Revolutions\\\
    \".\\u21a9\\ufe0e\\n25. We are using terms like \\\"proto-field\\\" and \\\"field\\\" here, which may be taken to imply\
    \ that\\nmetascience is purely a research field. That is not the case. Rather, as we shall argue later,\\nto be successful\
    \ metascience must develop and intertwine three elements: an imaginative\\ndesign practice, an entrepreneurial discipline,\
    \ and a research field.\\u21a9\\ufe0e\\n26. Our discussion is framed in terms of funders, though the model may be easily\
    \ and\\nfruitfully adapted to other research organizations.\\u21a9\\ufe0e\\n27. There are several related but different\
    \ framings which are also helpful. One that's quite\\nclose, but suggests different avenues of investigation, is that\
    \ this is about search-and-\\ninference. As this model is meant primarily to be a generative design tool, such changes\
    \ in\\nframing can be very helpful. A more radical change in framing is suggested by Jo\\u00ebl de\\nRosnay's 1979 book\
    \ The Macroscope. (http://pcp.vub.ac.be/MACRBOOK.html) By\\nmacroscope, de Rosnay means (roughly) an instrument capable\
    \ of seeing the big picture of\\nsome complex system. It may be thought of by contrast to a microscope: whereas a\\nmicroscope\
    \ lets you view the fine detail of a system, a macroscope lets you form an overall\\nview of a complex system. So: funder-as-detector-and-predictor\
    \ may also usefully be\\nrephrased as funder-as-macroscope-and-predictor.\\u21a9\\ufe0e\\n28. This framing owes a lot\
    \ to: F. A. Hayek, \\\"The Use of Knowledge in Society\\\", The American\\nEconomic Review (1945).\\u21a9\\ufe0e\\n29.\
    \ The trend has been widely discussed, and there is a large literature. A stimulating recent\\npaper with many references\
    \ is: Haochuan Cui, Lingfei Wu, and James A. Evans, Aging\\nScientists and Slowed Advance (https://arxiv.org/abs/2202.04044)\
    \ (2022).\\u21a9\\ufe0e\\n30. Experiments along these lines are being done by the Thiel Fellowship and New Science\\n(https://newscience.org/).\
    \ In some sense, there are many similar experiments within\\nacademic science: things like the Royal Society Fellowships\
    \ in the UK, for instance, or the\\n(/index.html)\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"\
    A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n87/107\\n\\nHanna Gray Fellowships from\
    \ HHMI. Informal conversation suggests that these are often\\nviewed as minting young superstars, who are anticipated\
    \ to go on to great things. Of\\ncourse, it's very different to have been granted an endowed professorship rather than\\\
    nthese temporary positions.\\u21a9\\ufe0e\\n31. An introduction to FROs may be found in: Adam Marblestone, Anastasia Gamick,\
    \ Tom\\nKalil, Cheryl Martin, Milan Cvitkovic, and Samuel G. Rodriques, Unblock research\\nbottlenecks with non-profit\
    \ start-ups (https://www.nature.com/articles/d41586-022-\\n00018-5) (2022).\\u21a9\\ufe0e\\n32. It's fun to think of the\
    \ Century Grant Program as like FROs, but tipped sideways in time.\\nThat is, FROs aim to achieve scale in the here-and-now,\
    \ while the Century Grant Program\\naims to achieve scale over time.\\u21a9\\ufe0e\\n33. A discussion of the origin of\
    \ the term para-academia may be found in: Alex Wardrop and\\nDebora Withers (ed.), The Para-Academic Handbook\\n(https://library.oapen.org/handle/20.500.12657/42468)\
    \ (2014). We're using the term in\\na related, but different sense, simply to mean the act of doing research outside\\\
    nconventional university or institutional (including industrial laboratory) settings.\\u21a9\\ufe0e\"\n  },\n  {\n   \
    \ \"name\": \"A nice recent example of such a program is the Pivot Fellowship\",\n    \"text\": \"(https://www.simonsfoundation.org/2022/02/15/new-simons-foundation-pivot-\\\
    nfellowship-enables-researchers-to-explore-new-fields/) recently introduced by the Simons\\nFoundation.\\u21a9\\ufe0e\\\
    n35. This, in turn, is a special case of exploring social process whitespace, which is the main\\ntheme of Part 1 of this\
    \ essay, and a major theme of the entire essay.\\u21a9\\ufe0e\\n36. It's interesting and instructive to ask scientists\
    \ for wild things they'd like to do, but can't. A\\ntiny minority of scientists will immediately talk about such things.\
    \ They may even have a\\nside project working on some aspect of it (a point made to us by Evan Miyazono). But\\nmany are\
    \ simply silent. And some will describe the boringly conventional in response \\u2013 it's\\nsurprising how many will\
    \ respond with whatever is currently fashionable at the NSF etc.\\nOne of the most imaginative scientists we know, a MacArthur\
    \ Fellow, once told one of us\\n(roughly): \\\"Even very conservative scientists often have wild ideas. But it's often\
    \ hard to\\nget them to talk about them. They have good reasons to keep quiet. My preferred method\\nis to get them liquered\
    \ up. It still turns out that even some very good scientists have no\\n(/index.html)\"\n  },\n  {\n    \"name\": \"/28/25,\
    \ 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n88/107\\\
    n\\nwild ideas. But sometimes you're really surprised when someone you thought was\\nconservative has many crazy ideas.\\\
    \" Even with all that said: over time, many people\\nbecome programmed by the system, and learn to see only those things\
    \ which are possible.\\nStill, it's fun to have these conversations.\\u21a9\\ufe0e\"\n  },\n  {\n    \"name\": \"In Christopher\
    \ Sykes, \\\"No Ordinary Genius\\\" (1994).\\u21a9\\ufe0e\",\n    \"text\": \"38. George A. Akerlof, \\\"The Market for\
    \ 'Lemons': Quality Uncertainty and the Market\\nMechanism\\\", The Quarterly Journal of Economics (1970).\\u21a9\\ufe0e\\\
    n39. Academic scientists sometimes talk about \\\"high risk, high reward\\\" research, but are often\\nthemselves extremely\
    \ rigid and conservative. As an example, after the boutique orange\\njuice company Juicero failed, on social media we\
    \ saw many people, including many\\nscientists, lambast Juicero and the venture capital ecosystem, claiming it was obviously\\\
    ngoing to fail. But they were doing so merely with eagle-eyed hindsight: indeed, many of the\\nreasons we saw stated for\
    \ Juicero's failure applied equally to the boutique coffee company\\nKeurig, which was an enormous success. An appetite\
    \ for risk means that some things will\\nfail badly; such failures are a natural consequences of correct systemic behavior.\
    \ (This is, it\\nis worth noting, quite distinct from cases of fraud, such as Theranos.)\\u21a9\\ufe0e\\n40. Something\
    \ we've struggled with in writing this section is depth of description. We're trying\\nto evoke an (enormous) design space,\
    \ and the idea of what imaginative design means.\\nWe're trying to explore broadly, asking many fundamental questions,\
    \ playfully proposing\\nmany ideas, and exploring many heuristics for design. But each of these ideas is really a\\nworld\
    \ unto itself, and needs an extended treatment. In early drafts of the essay we\\nexpanded out some of those ideas. Unfortunately,\
    \ it made the essay impossibly long, and\\ndestroyed much of the evocative effect. And so we've gone for evocation at\
    \ the expense of\\ndepth. And that depth really is a sacrifice: to make any of these ideas work would require\\nvery considerable\
    \ depth. We hope you forgive us for this rapid tour of part of the design\\nspace, and keep in mind the depth that is\
    \ really required.\\u21a9\\ufe0e\"\n  },\n  {\n    \"name\": \"Paul Dirac, \\\"Directions in Physics\\\" (1978).\\u21a9\\\
    ufe0e\",\n    \"text\": \"42. Our experience in talking to current funders is that what they consider \\\"early\\\" is\
    \ usually\\nvery late, often one or several decades after actual early work. Real early-stage work seems\\nto be almost\
    \ entirely illegible to such funders, a form of intellectual dark matter. For\\ncalibration on what we mean: early work\
    \ on AI and AI safety was no later than the 1940s,\\n(/index.html)\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n\
    \    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n89/107\\n\\nprior to Turing's\
    \ famous 1952 paper; on quantum computing was no later than in the\\n1980s (or arguably the 1970s, prior to Feynman's\
    \ famous 1982 paper, but after, e.g.,\\nseminal contributions by people such as Wiesner, Bennett, and Holevo); and on\
    \ nanotech\\nno later than the 1970s, prior to Drexler's famous 1981 paper, though well after Feynman's\\nspeech \\\"\
    There's Plenty of Room at the Bottom\\\". For a funder to be good at funding early-\\nstage work they'd need an approach\
    \ that could plausibly fund that kind of work. Few do.\\u21a9\\ufe0e\\n43. As far as we know, this idea has not been thoroughly\
    \ explored. Indeed, even the basic\\nthesis of a connection between risk and reward is on shaky ground: it's easy to think\
    \ of\\nexamples of project ideas which are high risk, low reward. In financial markets, the\\nconnection between risk\
    \ and reward is explained by portfolio theory, with the simple (and\\nmostly empirically true, though there are exceptions)\
    \ observation that if two portfolios\\nhave the same expected value, but one has higher risk, investors will usually prefer\
    \ the\\nlower-risk one, so driving down its price. Thus the rule of thumb: high risk, high reward.\\nBut this reasoning\
    \ fails in multiple ways in science funding: there's no obvious notion of\\nexpected value; no thick market of funders\
    \ driving competition on price; indeed, the very\\nnotion of a buyer is rather murky. We can attempt to rescue the argument\
    \ by thinking of a\\nvery different type of market in which scientists allocate time and attention to projects\\nwith\
    \ different expected intellectual payoffs; following the same logic does yield a\\nconnection between risk and reward.\
    \ But several steps in the resulting argument hold no\\nmore than weakly, and we expect the conclusion to hold no more\
    \ than weakly. A better\\nargument may be the (more historically contingent fact) that there is an over-supply of\"\n\
    \  },\n  {\n    \"name\": \"funding money going to low-risk projects, due to systemic facts about the way existing\",\n\
    \    \"text\": \"funders (and their ultimate sources of capital) operate. And so funders with a genuine\\nappetite for\
    \ risk \\u2013 DARPA is the only obvious large candidate \\u2013 benefit greatly by having a\\nnear monopoly. They are,\
    \ in some sense, underpaying relative to results. These ideas need\\nmuch further development. We are encouraged by recent\
    \ work in the economics of science\"\n  },\n  {\n    \"name\": \"funding literature, e.g.: Chiara Franzoni, Paula Stephan,\
    \ and Reinhilde Veugelers,\",\n    \"text\": \"\"\n  },\n  {\n    \"name\": \"Funding Risky Research (https://www.nber.org/papers/w28905)\
    \ (2021); Pierre Azoulay\",\n    \"text\": \"and Danielle Li, Scientific Grant Funding (https://www.nber.org/papers/w26889)\\\
    n(2020); and Wesley H. Greenblatt, Suman K. Maity, Roger P. Levy, and Pierre Azoulay,\\n\\\"Does Grant Peer Review Penalize\
    \ Scientific Risk Taking? Evidence from the NIH\\\"\\n(forthcoming).\\u21a9\\ufe0e\\n(/index.html)\"\n  },\n  {\n    \"\
    name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n90/107\\n\\n44. A stimulating talk on this subject is: Eric R. Weinstein, [[https://pirsa.org/08090036\\n(https://pirsa.org/08090036)][Sheldon\
    \ Glashow Owes me a Dollar (and 17 years of\\ninterest): What happens in the marketplace of ideas when the endless frontier\
    \ meets the\\nefficient frontier?]] (2008).\\u21a9\\ufe0e\\n45. The claim is ironic, even self-illustrating, since the\
    \ argument and simulations in the paper\\ndon't reliably demonstrate the claim, except in some very loose sense. The reference\
    \ is:\\nJohn P. A. Ioannidis, Why Most Published Research Findings Are False\\n(https://journals.plos.org/plosmedicine/article?id=10.1371/journal.pmed.0020124),\\\
    nPLoS medicine (2005).\\u21a9\\ufe0e\\n46. A more skeptical, albeit much more speculative and less well worked out, view\
    \ on the\\nvalue is outlined here\\n(https://twitter.com/michael_nielsen/status/1558044167028084736).\\u21a9\\ufe0e\\\
    n47. Good starting places for understanding the rise of open science in the 17th and 18th\\ncenturies are: Paul David,\
    \ The Historical Origins of 'Open Science': An Essay on\\nPatronage, Reputation and Common Agency Contracting in the Scientific\
    \ Revolution\\n(https://papers.ssrn.com/sol3/papers.cfm?abstract_id=2209188) (2013), and: Marie\\nBoas Hall, \\\"Henry\
    \ Oldenburg: Shaping the Royal Society\\\", Oxford University Press\\n(2002). An account of the modern open science revolution\
    \ may be found in: Michael\\nNielsen, \\\"Reinventing Discovery\\\", Princeton University Press (2011).\\u21a9\\ufe0e\\\
    n48. This idea has its origins in 1990s discussions from the Cypherpunks, and has received a lot\\nof modern discussion.\
    \ Nice early examples include: Shirley Wu, Envisioning the scientific\\ncommunity as One Big Lab (http://onebiglab.blogspot.com/2008/04/envisioning-\\\
    nscientific-community-as-one.html) (2008) and: Cameron Neylon, The Science Exchange\\n(http://cameronneylon.net/blog/the-science-exchange/)\
    \ (2008). More recent discussion\\ntends to be associated with the DeSci (decentralized science) movement. See, for example:\\\
    nJuan Benet, DeSci: fund, organize, and open science (https://www.youtube.com/watch?\\nv=zkXM9H90g_E&ab_channel=GrandAmphiTh%25C3%25A9atre)\
    \ (2022).\\u21a9\\ufe0e\\n49. James Phillips pointed out to us, and several people have subsequently confirmed, that\\\
    nwhile this is likely broadly true in the US, it is not always true in other countries. There\\ngrant income may be a\
    \ net loss to universities, since grants incur genuine overheads, albeit\\noften not at the levels commonly charged in\
    \ the US.\\u21a9\\ufe0e\\n(/index.html)\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of\
    \ Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n91/107\\n\\n50. We've leaned on the idea of a \\\"\
    design heuristic\\\". Such heuristics are useful, but not\\nfundamental. They're a bit like problem-solving heuristics\
    \ in mathematics: ultimately, it\\ndoesn't matter how you solved such a problem, but only what you learned. The\\nmathematician\
    \ Ramanujan is said to have claimed that his work came from visions\\ninspired by the goddess Mahalakshmi of Namakkal;\
    \ fortunately for us, others can access\\nthe mathematical results, even if they lack those visions. Similarly, design\
    \ heuristics are a\\nmeans to an end. What is fundamental is the idea of imaginative design of new social\\nprocesses,\
    \ identifying and activating latent potential for discovery. So we're merely using\\ndesign heuristics as scaffolding,\
    \ to help illustrate the idea of imaginative design. In a\\nnutshell: it ultimately doesn't matter if a great new design\
    \ idea comes from a design\\nheuristic, or was inspired by visions of the Goddess.\\u21a9\\ufe0e\\n51. Indeed, designers\
    \ will happily juggle many different \\u2013 even inconsistent \\u2013 heuristic\\nmodels to help generate imaginative\
    \ new design ideas.\\u21a9\\ufe0e\\n52. As Herbert Simon pointed out in \\\"The Sciences of the Artificial\\\" (MIT Press,\
    \ 3rd ed. 1996),\\nthere are also sciences studying artificial systems, and those tend to be more friendly to\\nthe design\
    \ point of view. For instance, economists study the economy, but they also\\nconsider ideas like the design of new financial\
    \ instruments. Still, we think it fair to say that\\neven in most of Simon's \\\"sciences of the artificial\\\" the design\
    \ point of view is taken to be\\nsubsidiary. Financiers tend to be much more imaginative than economists when it comes\\\
    nto new financial instruments, though of course the line is blurry.\\u21a9\\ufe0e\\n53. A pioneer in the design of institutions,\
    \ and in thinking imaginatively about design in\\nscience, is Robin Hanson. See, for example, his webpage about Alternative\
    \ Institutions\\n(http://robinhanson.com/altinst.html), or his recent short essay about Intellectual\\nPrestige Futures\
    \ (https://www.overcomingbias.com/2022/04/intellectual-prestige-\\nfutures.html) (2022).\\u21a9\\ufe0e\\n54. We've been\
    \ to many metascience workshops. They're often surprisingly monocultural:\\nmostly science funders, or mostly economists,\
    \ or mostly non-scientist founders of new\\nresearch organizations, or mostly active scientists. One resulting conviction:\
    \ a large (but\\nnot dominant) subgroup at any such workshop should be active, experienced scientists, to\\nact as a check\
    \ on the wilder flights of fancy of non-scientists. More generally, with a proto-\\n(/index.html)\"\n  },\n  {\n    \"\
    name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n92/107\\n\\nfield it seems likely to us that extremely robust discussion between groups with very\\ndifferent points\
    \ of view is likely to be generative, and a good check on the myopia of any\\nindividual group. We include ourselves in\
    \ this diagnosis of myopia.\\u21a9\\ufe0e\\n55. Indeed, it would work best if there were a great diversity in ambient\
    \ environments, and\\nscientists could move liquidly between environments in which high risk was expected or in\\nwhich\
    \ less risky work was expected. We will return to this theme later in a much more\\ngeneral context.\\u21a9\\ufe0e\\n56.\
    \ It's too early to be sure, but plausibly DeepMind ought to be viewed as an exception, with\\ninjections of rapidly-increasing\
    \ quantities of capital coming in response to scientific\\nsuccess. It is, nonetheless, at most an approximate example,\
    \ since the quantities of money\\ninjected were only approximately driven by scientific success: arguably the long-term\\\
    ncommercial potential of AI is the principal driver, and that is perhaps only loosely related\\nto the science. Still\
    \ it's a very unusual and striking example.\\u21a9\\ufe0e\\n57. Historically, the structure has most often been attributed\
    \ to Watson and Crick. However,\\nas has subsequently become clear, Franklin's data played a crucial role and it seems\
    \ at\\nleast reasonable to jointly attribute the structure. Indeed, complicating the matter further,\\nan important part\
    \ of that data was obtained by a student working with Franklin, Raymond\\nGosling.\\u21a9\\ufe0e\\n58. It is not difficult\
    \ to find online forums full of people who will explain in loud detail how\\nthe scientific establishment routinely suppress\
    \ all daring, unconventional ideas etc. The\\nvery hold this cliched wisdom has over the imagination is, of course, an\
    \ expression of the\\nfundamental point: the scientist-rebel is one of the standard archetypes for the scientist\\nhero,\
    \ and our institutions reflect that (while also warring with tendencies to favor\\nincumbents). It's curiously similar\
    \ to the celebrated role of the rebel outsider in American\\nculture: it would seem almost tautologically true that a\
    \ rebel ceases to be a rebel when they\\nbecome an icon. But from James Dean to Apple's \\\"Think Different\\\" to many\
    \ modern\\nexamples, it has a tremendous (and largely healthy) hold over the imagination of both\\nscientists and the\
    \ public.\\u21a9\\ufe0e\\n59. Sharp-eyed readers will notice that this is not, in fact, a loop. But the core is of course\
    \ an\\niterative loop, and we hope you shall forgive us this descriptive infelicity.\\u21a9\\ufe0e\\n(/index.html)\"\n\
    \  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n93/107\\n\\n60. Daniel S. Greenberg, Chance and Grants (https://pubmed.ncbi.nlm.nih.gov/9500372/),\\nThe Lancet (1998).\\\
    u21a9\\ufe0e\\n61. Indeed, the preferences of the grant agencies often propagate back to influence the\\nbehavior of grant-hungry\
    \ institutions.\\u21a9\\ufe0e\\n62. We would be remiss not to mention Tal Yarkoni's beautiful essay No, it's not The\\\
    nIncentives\\u2014it's you (https://www.talyarkoni.org/blog/2018/10/02/no-its-not-the-\\nincentives-its-you/) (2018),\
    \ which argues that very often people use \\\"the system's\\nincentives\\\" as an excuse not to make change. But the essay\
    \ is speaking to people's\\nindividual decision making and to their (both individual and collective) values. As a\\npractical\
    \ matter systemic incentives matter a great deal for collective behavior. They do\\nnot dictate behavior, as the essay\
    \ emphasizes, but they do influence it, mediated by those\\nvalues.\\u21a9\\ufe0e\\n63. A favorite: \\\"Would you like\
    \ to give a talk in our seminar series?\\\" \\\"Yes, sure, I'd love to talk\\nabout some work on [\\u2026]\\\". \\\"Our\
    \ seminar slot runs from noon to 3pm on Friday\\\". \\\"Oh, I\\nonly have material for a standard hour-long talk.\\\"\
    \ \\\"Perfect!\\\" (The audience liked to get\\nraucously involved in the talk.) This is a transcription of a story MN\
    \ heard, from the\\nprincipal; but he has also personally experienced something similar. On the most\\nmemorable such\
    \ occasion, his \\\"hour-long\\\" talk eventually stretched to 6 hours over two\\ndays. This was certainly not due to\
    \ his \\\"running over\\\", at least not in any standard way.\\nRather, it was due to the extraordinary intensity of involvement\
    \ of the audience. Rarely\\nhas he spent so much time seated and silent during his \\\"own\\\" talk, while audience\\\
    nmembers took over at the whiteboard, trading ideas, arguing, developing lines of\\nreasoning. One-on-one and small-group\
    \ conversation is often very intense in good\\nresearch organizations, but this kind of large-group seminar culture is\
    \ unusual, in our\\nexperience.\\u21a9\\ufe0e\\n64. When we make this observation, people often respond with non sequiturs.\
    \ Common\\nresponses are things like: \\\"Well, of course, those places are where all the top people are\\\",\\nas though\
    \ top people are somehow a fixed, immobile class, incapable of movement. Do\\nyou think that between 2000 and 2010 there\
    \ was any migration of talent from Microsoft\\nto the (non-existent in 2000) Facebook? In a dynamic environment, top people\
    \ move a\\nlot. And not just individually, but in aggregate.\\u21a9\\ufe0e\\n(/index.html)\"\n  },\n  {\n    \"name\"\
    : \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n94/107\\n\\n65. The material about Kariko is based on articles by: Damian Garde and Jonathan Saltzman,\\nThe story of\
    \ mRNA: How a once-dismissed idea became a leading technology in the Covid\\nvaccine race (https://www.statnews.com/2020/11/10/the-story-of-mrna-how-a-once-\\\
    ndismissed-idea-became-a-leading-technology-in-the-covid-vaccine-race/) (2020), and:\\nGina Kolata, Kati Kariko helped\
    \ shield the world from the coronavirus\\n(https://www.nytimes.com/2021/04/08/health/coronavirus-mrna-kariko.html) (2021).\\\
    u21a9\\ufe0e\\n66. See: Ariana Remmel, How a historic funding boom might transform the US National\\nScience Foundation\
    \ (https://www.nature.com/articles/d41586-021-01076-x) (2021).\\u21a9\\ufe0e\\n67. Alexander Berger has made a striking\
    \ reverse argument to us privately: that the scale of\\nthe NIH (and the doubling) created space on the edges for researchers\
    \ such as Kariko to\\n(just!) eke out a living. It's a very interesting argument, and would be worth considering as\\\
    nan argument for status quo in a serious post mortem.\\u21a9\\ufe0e\\n68. For an account and further references, see:\
    \ Douglas C. Prasher, Using GFP to see the light\\n(https://pubmed.ncbi.nlm.nih.gov/8585130/) (1995).\\u21a9\\ufe0e\"\n\
    \  },\n  {\n    \"name\": \"Aaron Gouveia, Shuttle driver reflects on Nobel snub\",\n    \"text\": \"(https://web.archive.org/web/20081011230049/http://www.capecodonline.com/apps/p\\\
    nbcs.dll/article?AID=%252F20081011%252FNEWS%252F810110328) (2008).\\u21a9\\ufe0e\"\n  },\n  {\n    \"name\": \"Dan Charles,\
    \ Glowing gene's discoverer left out of Nobel Prize\",\n    \"text\": \"(https://www.npr.org/templates/story/story.php?storyId=95545761)\
    \ (2008).\\u21a9\\ufe0e\\n71. Decca Aitkenhead, Peter Higgs: I wouldn't be productive enough for today's academic\\nsystem\
    \ (https://www.theguardian.com/science/2013/dec/06/peter-higgs-boson-\\nacademic-system) (2013).\\u21a9\\ufe0e\"\n  },\n\
    \  {\n    \"name\": \"Sydney Brenner, Nature's Gift to Science (2002).\\u21a9\\ufe0e\",\n    \"text\": \"\"\n  },\n  {\n\
    \    \"name\": \"Gina Kolata, Grant System Leads Cancer Researchers to Play It Safe\",\n    \"text\": \"(https://www.nytimes.com/2009/06/28/health/research/28cancer.html),\
    \ The New York\\nTimes (2009).\\u21a9\\ufe0e\\n74. It is, in fact, easy to find significant examples in the early days\
    \ of modern science. In the\\n17th through 19th centuries there were plenty of institutional green fields and social\\\
    nprocess white space. But over the 20th century and the early part of the 21st it has\\n(/index.html)\"\n  },\n  {\n \
    \   \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n95/107\\n\\ngradually became more difficult. In general, white space is far easier to impact than areas\\nwhere existing\
    \ institutions operate.\\u21a9\\ufe0e\\n75. As we shall see, this isn't because the problem is peculiar to social psychology;\
    \ rather, it's\\nbecause social psychologists were the first to do anything about it. The replication crisis\\nhas since\
    \ \\\"spread\\\" to many other disciplines. We put spread in scare quotes because, of\\ncourse, it has merely revealed\
    \ a pre-existing underlying problem; what has spread is\\nevidence and awareness of the problem, not the problem itself.\\\
    u21a9\\ufe0e\\n76. The Open Science Collaboration, Estimating the reproducibility of psychological science\\n(https://scienceplusplus.org/metascience/assets/OSC2015.odf),\
    \ Science (2015).\\u21a9\\ufe0e\\n77. Benedict Carey, Many Psychology Findings Not as Strong as Claimed, Study Says\\\
    n(https://www.nytimes.com/2015/08/28/science/many-social-science-findings-not-as-\\nstrong-as-claimed-study-says.html)\
    \ (2015).\\u21a9\\ufe0e\\n78. Daniel T. Gilbert, Gary King, Stephen Pettigrew, and Timothy D. Wilson, Comment on\\n\\\"\
    Estimating the reproducibility of psychological science\\\"\\n(https://scienceplusplus.org/metascience/assets/Gilbert2016.pdf),\
    \ Science (2015).\\u21a9\\ufe0e\\n79. See, for instance: Ewen Callaway, Report finds massive fraud at Dutch universities\\\
    n(https://www.nature.com/articles/479015a), Nature (2011)\\u21a9\\ufe0e\\n80. Daryl J. Bem, Feeling the Future: Experimental\
    \ Evidence for Anomalous Retroactive\\nInfluences on Cognition and Affect\\n(https://scienceplusplus.org/metascience/assets/Bem2011.pdf),\
    \ Journal of Personality\\nand Social Psychology (2011).\\u21a9\\ufe0e\\n81. Experiments often involve thousands of decisions.\
    \ There is enough latitude that even\\nhonest, conscientious scientists can easily fool themselves. Tal Yarkoni put it\
    \ well in his\\nreview ([[http://www.talyarkoni.org/blog/2011/01/10/the-psychology-of-\\nparapsychology-or-why-good-researchers-publishing-good-articles-in-good-journals-can-\\\
    nstill-get-it-totally-wrong/ (http://www.talyarkoni.org/blog/2011/01/10/the-psychology-\\nof-parapsychology-or-why-good-researchers-publishing-good-articles-in-good-journals-\\\
    ncan-still-get-it-totally-wrong/)][The psychology of parapsychology, or why good\\nresearchers publishing good articles\
    \ in good journals can still get it totally wrong]], 2011)\\nof Bem's paper: \\\"[T]his might seem like a pretty damning\
    \ review, and you might be\\n(/index.html)\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision\
    \ of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n96/107\\n\\nthinking, boy, this is really a terrible\
    \ paper. But I don't think that's true at all. In many\\nways, I think Bem's actually been relatively careful. The thing\
    \ to remember is that this type\\nof fudging isn't unusual; to the contrary, it's rampant \\u2013 everyone does it. And\
    \ that's\\nbecause it's very difficult, and often outright impossible, to avoid.\\\"\\u21a9\\ufe0e\\n82. St\\u00e9phane\
    \ Doyen, Olivier Klein, Cora-Lise Pichon, Axel Cleeremans, Behavioral Priming:\\nIt's All in the Mind, but Whose Mind?\
    \ (https://journals.plos.org/plosone/article?\\nid=10.1371/journal.pone.0029081), PLoS One (2012).\\u21a9\\ufe0e\"\n \
    \ },\n  {\n    \"name\": \"Daniel Kahneman, \\\"Thinking Fast and Slow\\\" (2011).\\u21a9\\ufe0e\",\n    \"text\": \"\"\
    \n  },\n  {\n    \"name\": \"See Kahneman's open letter\",\n    \"text\": \"(https://www.nature.com/news/polopoly_fs/7.6716.1349271308!/suppinfoFile/Kahnema\\\
    nn%2520Letter.pdf) to colleagues, in 2012. It is also worth reading many followups to the\\nevents, including: Ulrich\
    \ Schimmack, Moritz Heene, and Kamini Kesavan, Reconstruction\\nof a Train Wreck: How Priming Research Went off the Rails\\\
    n(https://replicationindex.com/2017/02/02/reconstruction-of-a-train-wreck-how-\\npriming-research-went-of-the-rails/)\
    \ (2017).\\u21a9\\ufe0e\\n85. The first occurrence we're aware of is in: Harold Pashler and Christine R. Harris, Is the\\\
    nReplicability Crisis Overblown? Three Arguments Examined\\n(https://scienceplusplus.org/metascience/assets/Pashler2012.pdf),\
    \ Perspectives on\\nPsychological Science (2012).\\u21a9\\ufe0e\\n86. Paul E. Meehl, Why Summaries of Research on Psychological\
    \ Theories are often\\nUninterpretable (https://scienceplusplus.org/metascience/assets/Meehl1990_1985.pdf),\\nPsychological\
    \ Reports (1990, reprint of a 1985 article).\\u21a9\\ufe0e\"\n  },\n  {\n    \"name\": \"Anthony G. Greenwald, Consequences\
    \ of Prejudice Against the Null Hypothesis\",\n    \"text\": \"(https://assets/Greenwald1975.pdf) (1975).\\u21a9\\ufe0e\\\
    n88. Registered reports were proposed in: Brian Nosek and Dani\\u00ebl Lakens, Registered reports:\\na method to increase\
    \ the credibility of published results\\n(https://econtent.hogrefe.com/doi/full/10.1027/1864-9335/a000192), Social Psychology\\\
    n(2014). Other solutions to these problems might also be proposed, of course. A common\\nsuggestion, which we've heard\
    \ going back nearly 30 years, is that some journals should\\nspecialize in publishing null results. Unfortunately, it\
    \ seems likely those journals would be\\n(/index.html)\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\"\
    : \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n97/107\\n\\nconsidered low status,\
    \ a place to publish unimportant work. That's not much of an\\nincentive to publish! As we'll see, part of the beauty\
    \ of Registered Reports is that they co-\\nopt existing sources of prestige, in service of improved standards of evidence.\
    \ However,\\nthey don't solve the entire issue: scientists are (understandably) most interested in\\nsurprising non-null\
    \ findings, and we'd expect such findings to continue to garner more\\nlong-term attention. But Registered Reports do\
    \ help us determine whether a non-null\\nfinding is true or not. This point is made in: Brian A. Nosek, Jeffrey R. Spies,\
    \ and Matt\\nMotyl, Scientific Utopia: II. Restructuring Incentives and Practices to Promote Truth Over\\nPublishability\
    \ (https://journals.sagepub.com/doi/full/10.1177/1745691612459058),\\nPerspectives on Psychological Science (2014).\\\
    u21a9\\ufe0e\\n89. Brian A. Nosek, Tom E. Hardwicke, Hannah Moshontz et al, Replicability, Robustness,\\nand Reproducibility\
    \ in Psychological Science (https://osf.io/7np92/), Annual Reviews of\\nPsychology (in press, 2021). Note that the fourth\
    \ graph actually combines results from\\nseveral different multi-site replication studies, and so we're being somewhat\
    \ liberal in\\ndescribing this graph as showing the results of \\\"a study\\\". Details may be found in the just-\\ncited\
    \ paper.\\u21a9\\ufe0e\\n90. John Protzko, Jon Krosnick, Leif D. Nelson et al, High Replicability of Newly-Discovered\\\
    nSocial-behavioral Findings is Achievable (https://psyarxiv.com/n2a9x/) (2020).\\u21a9\\ufe0e\\n91. One unfortunate consequence\
    \ of the replication crisis is that it's led to lots of psychology-\\nbashing from online critics. In fact, when a group\
    \ of people realize they're making an error\\nand begin taking steps to address it, that's laudable. We suspect many other\
    \ sciences have\\nthe same problems, but haven't yet realized it or begun taking steps to solve the\\nproblem.\\u21a9\\\
    ufe0e\\n92. Major disruptions in business are also often associated to crises. Netflix created a crisis for\\nBlockbuster;\
    \ Napster and successors such as Spotify created a crisis for the music labels.\\nAnd so on. Such a crisis is often a\
    \ signifier of a major improvement underway. Of course,\\nthe mechanisms are fundamentally different in the two cases.\
    \ But there is also a surprising\\namount in common. Incidentally, in this connection: there is a literature on whether\
    \ the\\nreplication crisis is \\\"neoliberal\\\". It's a rather curious literature, in some regards, but\\nstimulating.\
    \ See, for instance: Duygu Uygun, Mehmet Necip Tun\\u00e7, and Ziya Batuhan Eper,\\nIs Open Science Neoliberal? (https://psyarxiv.com/ft8dc)\
    \ (2022), and citations within.\\u21a9\\ufe0e\\n(/index.html)\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"\
    text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n98/107\\n\\n93. It is perhaps\
    \ not immediately obvious how deep an idea Registered Reports are. In fact,\\nprior to Registered Reports many people\
    \ had proposed variations on (and in some cases,\\nmade attempts to create) journals that would publish null results.\
    \ This is a simpler idea\\nthat appears to address many of the same underlying issues. But such journals would tend\\\
    nto be very low status, and unlikely to attract high quality submissions. Registered Reports\\nare a much better design\
    \ that solves the underlying problems. This was pointed out in:\\nBrian A. Nosek, Jeffrey R. Spies, and Matt Motyl, \\\
    \"Scientific Utopia: II\\\", Perspectives in\\nPsychological Science (2013). Of course, the idea isn't completely original\
    \ \\u2013 pre-\\nregistration of designs for medical trials had been pioneered much earlier. But the analysis\\nin that\
    \ paper is nonetheless a nice example of metascience design.\\u21a9\\ufe0e\\n94. It's striking that the builder of the\
    \ first telescope is not remembered by most scientists, but\\nGalileo is. The usual view is: Galileo made the scientific\
    \ discoveries, but the toolbuilder did\\nnot. But they did enable discovery. This is an early example of a pattern that\
    \ persists to\\nthis day. It's beyond the scope of this essay to delve deeper, but fascinating to think\\nupon.\\u21a9\\\
    ufe0e\\n95. An early draft proposal to the NIH may be found here (https://osf.io/784rn/).\\u21a9\\ufe0e\\n96. Indeed,\
    \ one of us (MN) worked fulltime as a metascience entrepreneur from 2007 through\\n2012, developing and promoting open\
    \ science.\\u21a9\\ufe0e\\n97. Some important changes in the social processes of science come about without much or\\\
    nany involvement of metascience entrepreneurs. For example, as far as we are aware, no-\\none at the NIH decided to increase\
    \ the age at which NIH awards grants to grantees; it\\nseems likely to rather be an emergent consequence of other decisions.\
    \ (We owe this point\\nto: Thomas R. Cech, \\\"Fostering Innovation and Discovery in Biomedical Research\\\",\\nJournal\
    \ of the American Medical Association (2005).) Still, many of the most important\\ndeliberate improvements in the social\
    \ processes of science have come from the actions of\\none or a few individual metascience entrepreneurs. We further believe\
    \ that there is\\ntremendous scope to increase the impact of such metascience entrepreneurs. That's why\\nwe've focused\
    \ on them.\\u21a9\\ufe0e\\n98. Note that as our examples suggest we do not think of metascience entrepreneurship as\\\
    nnecessarily having a commercial component.\\u21a9\\ufe0e\"\n  },\n  {\n    \"name\": \"Of course, he's also given to\
    \ making such overconfident pronouncements!\\u21a9\\ufe0e\",\n    \"text\": \"(/index.html)\"\n  },\n  {\n    \"name\"\
    : \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n99/107\\n\\n100. With that said, it is common on Twitter and in-person to hear well-known tech VCs and\\nCEOs critique\
    \ academia, often in the face of events like the replication crisis. Critique is far\\neasier than creation, and confidence\
    \ is not always correlated with ability.\\u21a9\\ufe0e\\n101. A good parallel example of this is the rise in startup entrepreneurship,\
    \ driven in part by\\nthe large body of writing about startup entrepreneurship, and the emergence of\\ncommunities of\
    \ practice.\\u21a9\\ufe0e\\n102. There really needs to be a history and ethnography of metascience entrepreneurship.\\\
    u21a9\\ufe0e\\n103. See: Declan Butler, \\\"Los Alamos loses physics archive as preprint pioneer heads east\\\",\\nNature\
    \ (2001).\\u21a9\\ufe0e\\n104. These patterns typically pass relatively quickly. For instance, fear of being scooped may\\\
    npass as the arXiv actually becomes a means of claiming priority, and researchers may rush\\nto arXiv publication to avoid\
    \ being scooped. Also: many journals have initially feared the\\narXiv as a potential competitor, but typically come to\
    \ accept (if only begrudgingly) the role\\nit plays in scientific communication.\\u21a9\\ufe0e\\n105. In this, arXiv was\
    \ very similar to social networks like Facebook, and some other venture\\ncapital-backed startup companies, which pursued\
    \ an expansion strategy, starting narrow\\nand gradually branching into adjacent communities. This is also a pattern that\
    \ was noted\\nin early work on the solution of collective action problems, by researchers such as Mancur\\nOlson, \\\"\
    The Logic of Collective Action\\\" (1971).\\u21a9\\ufe0e\\n106. Note that Braben publicly laid out the BRAVERI score in\
    \ a paper in Physica A in 2002,\\nafter BP's Venture Research Unit had been disbanded. He claimed that most of what BP\\\
    nhad funded would score 50-100% on the BRAVERI criteria. A later, smaller iteration of\\nVenture Research has been run\
    \ at University College London, and Braben has set out a\\nrevised version of the BRAVERI score in explaining the UCL\
    \ program: Don Braben,\\n\\\"Introduction to the UCL Provost\\u2019s Venture Research Fellowship scheme\\\"\\n(https://web.archive.org/web/20210121050759/https://www.ucl.ac.uk/research/sites/re\\\
    nsearch/files/document_pack_revised.pdf) (2019).\\u21a9\\ufe0e\\n107. See, e.g.: Donald Braben, \\\"Scientific Freedom:\
    \ The Elixir of Civilization\\\" (2008).\\u21a9\\ufe0e\\n(/index.html)\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\"\
    ,\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n100/107\\n\\n108. One\
    \ of us (MN), while not exactly hostile, was initially skeptical that replication was that\\nimportant a problem in social\
    \ psychology. He's gradually moved from skepticism to\\nextreme enthusiasm for the replication movement, convinced by\
    \ the strength of the work\\ndone on the replication crisis.\\u21a9\\ufe0e\\n109. It's worth noting that many of the arguments\
    \ made against seem more like reasoning\\nmotivated by pecuniary interest than the interest of science. But there are\
    \ some good faith\\narguments. For example, the science journalist John Bohannon did an investigation\\nsuggesting that\
    \ many fee-charging open access journals had extremely low quality\\neditorial standards. This was attacked by many open\
    \ access advocates, but there was\\nconsiderable merit to Bohannon's work: John Bohannon, \\\"Who's Afraid of Peer Review?\\\
    \",\\nScience (2013).\\u21a9\\ufe0e\"\n  },\n  {\n    \"name\": \"Pierre Azoulay, Turn the scientific method on ourselves\"\
    ,\n    \"text\": \"(https://www.nature.com/articles/484031a), Nature (2012).\\u21a9\\ufe0e\\n111. See, for a review of\
    \ the early work of the Research on Research Institute: Sandra\\nBendiscioli, Teo Firpo, Albert Bravo-Biosca, Eszter Czibor,\
    \ Michele Garfinkel, Tom\\nStafford, James Wilsdon, and Helen Buckley Woods, The experimental research funder's\\nhandbook\\\
    n(https://rori.figshare.com/articles/report/The_experimental_research_funder_s_handb\\nook_final_version_/19459328) (2022).\\\
    u21a9\\ufe0e\"\n  },\n  {\n    \"name\": \"See the announcement here\",\n    \"text\": \"(https://twitter.com/heidilwilliams_/status/1542210319673479168).\\\
    u21a9\\ufe0e\"\n  },\n  {\n    \"name\": \"See the proposal here (https://osf.io/q7y86).\\u21a9\\ufe0e\",\n    \"text\"\
    : \"\"\n  },\n  {\n    \"name\": \"James A. Evans and Jacob G. Foster, Metaknowledge\",\n    \"text\": \"(https://www.science.org/doi/abs/10.1126/science.1201765),\
    \ Science (2011).\\u21a9\\ufe0e\"\n  },\n  {\n    \"name\": \"James McKeen Cattell, \\\"American Men of Science\\\" (1910).\\\
    u21a9\\ufe0e\",\n    \"text\": \"116. See: Robert May, \\\"The Scientific Wealth of Nations\\\", Science (1997), and:\
    \ David A. King,\\nThe Scientific Impact of Nations (https://www.nature.com/articles/430311a), Nature\\n(2004).\\u21a9\\\
    ufe0e\\n(/index.html)\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n101/107\\n\\n117. Merely listing pertinent recent review papers and books would be an extensive\\nundertaking. Good starting\
    \ points for obtaining familiarity include the recent book:\\nDashun Wang and Albert-L\\u00e1szl\\u00f3 Barab\\u00e1si,\
    \ \\\"The Science of Science\\\" (2021); and the review\\npaper: Santo Fortunato, Carl T. Bergstrom, Katy B\\u00f6rner,\
    \ James A. Evans, Dirk Helbing,\\nSta\\u0161a Milojevi\\u0107, Alexander M. Petersen, Filippo Radicchi, Roberta Sinatra,\
    \ Brian Uzzi,\\nAlessandro Vespignani, Ludo Waltman, Dashun Wang, and Albert-L\\u00e1szl\\u00f3 Barab\\u00e1si,\\n\\\"\
    Science of Science\\\", Science (2018).\\u21a9\\ufe0e\\n118. Lingfei Wu, Dashun Wang, and James A. Evans, \\\"Large teams\
    \ develop and small teams\\ndisrupt science and technology\\\", Nature (2019).\\u21a9\\ufe0e\\n119. Benjamin F. Jones,\
    \ \\\"Age and Great Invention\\\", The Review of Economics and Statistics\\n(2010).\\u21a9\\ufe0e\\n120. Caroline S. Wagner\
    \ and Jeffrey Alexander, \\\"Evaluating transformative research\\nprogrammes: A case study of the NSF Small Grants for\
    \ Exploratory Research\\nprogramme\\\", Research Evaluation (2013).\\u21a9\\ufe0e\\n121. One part of the problem is that\
    \ it's tempting to concentrate our attention on papers which\\ntell the story we want, rather than to change our beliefs\
    \ about the world in the light of\\ncompelling new evidence. Few of us think we do this; almost all of us do. It's difficult\
    \ to\\nescape because how we evaluate evidence is mediated by a community, who determines\\nmuch about what we see, and\
    \ how we see it. So even if our individual reasoning is\\nunusually careful and honest, we are still strongly influenced\
    \ by our community's\\nstandards. Put another way, if even one of our colleagues \\u2013 perhaps a person we've never\\\
    nmet, in some far distant part of our network \\u2013 is a little less fair-minded then they ought to\\nbe, then they\
    \ actually negatively affect our ability to evaluate evidence. In more detail: how\\nwe evaluate evidence is not an individual\
    \ property, it's a collective property. Consider the\\nfollowing simple model: suppose there are two strong papers on\
    \ a policy topic you're\\ninterested in. One paper, X, reaches a conclusion you like, while paper Y reaches the\\nopposite\
    \ conclusion. Suppose paper Y actually has stronger evidence. You, being a serious-\\nand fair-minded person, will realize\
    \ if you deeply read both papers that paper Y has better\\nevidence, and re-evaluate your opinions. This all seems fine\
    \ and good. But there's a\\nproblem. Your friends and colleagues, who likely share your policy opinions, are naturally\\\
    nexcited about paper X. They pass it around; you're likely to see it. Meanwhile, if they come\\nacross paper Y they're\
    \ just not so excited, and a little less likely to pass it on, making you\\n(/index.html)\"\n  },\n  {\n    \"name\":\
    \ \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n102/107\\n\\nmuch less likely to ever see paper Y. Collectively, paper X rapidly passes through much of\\nyour network,\
    \ and is absorbed as another piece of evidence in favor of that position; paper\\nY is heard of only by a few exceptionally\
    \ wonkish people. (In this sense how we absorb\\nknowledge is a bit like how we catch an infectious disease: whether you\
    \ catch a disease\\ndepends in part on your actions, but also to a considerable extent upon the behavior of\\nyour broader\
    \ social network.) This is a simple model, and of course there are many ways it\\ncan be modified so the conclusions don't\
    \ hold. But it points at a real problem: in many\\nrespects we don't reason individually, we reason collectively. What\
    \ we pay attention to,\\nand the kind of attention we pay, is mediated by our networks. Worse, it is easy to forget\\\
    nthis and to arrive at an illusion of fair reasoning because we ourselves are exceptionally\\nfair. But it's not enough!\\\
    u21a9\\ufe0e\"\n  },\n  {\n    \"name\": \"See, for example, this article\",\n    \"text\": \"(https://web.archive.org/web/20210428102006/https://oxfamblogs.org/fp2p/lant-\\\
    npritchett-v-the-randomistas-on-the-nature-of-evidence-is-a-wonkwar-brewing/). As far as\\nwe know, Pritchett hasn't used\
    \ this term in his published work, although he certainly make\\narguments germane to it, e.g., in: Lant Pritchett, \\\"\
    It pays to be ignorant: A simple political\\neconomy of rigorous program evaluation\\\" The Journal of Policy Reform (2002).\\\
    u21a9\\ufe0e\\n123. The alternative is for metascientific work to become principally the purview of science\\nbureaucrats\
    \ who think they're making major improvements, when really they're making\\ntiny changes or making things worse. Indeed,\
    \ we believe many of the easiest\\nimprovements will be things in the blind spot of existing organizations, often things\
    \ which\\nmake them uncomfortable. Things like: taking irrelevantly long grant applications and\\nmaking them quick and\
    \ easy. Speeding up grant cycles. Doing things which are illegible or\\na little disreputable or politically unpopular.\
    \ And so on. In all this, we're firmly on the side\\nof the outsiders.\\u21a9\\ufe0e\\n124. This point is made in: Jos\\\
    u00e9 Luis Ric\\u00f3n, \\u201cNew Science's NIH report: highlights\\u201d, Nintil\\n(2022-04-25), available at https://nintil.com/new-science-nih/\
    \ (https://nintil.com/new-\\nscience-nih/).\\u21a9\\ufe0e\\n125. Note that this is different from the standard meaning\
    \ for chronoscope, which is a device to\\nmeasure small time intervals.\\u21a9\\ufe0e\\n(/index.html)\"\n  },\n  {\n \
    \   \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n103/107\\n\\n126. Michael Nielsen and Kanjun Qiu, \\\"The trouble in comparing different approaches to\\nscience funding\\\
    \", https://scienceplusplus.org/trouble_with_rcts/index.html\\n(https://scienceplusplus.org/trouble_with_rcts/index.html),\
    \ San Francisco (2022).\\u21a9\\ufe0e\\n127. In particular: (1) the non-stationary nature of metascience: lessons learned\
    \ in the past\\nmay not continue to hold in the future; and (2) the need to learn from single outlier\\nexamples. Also\
    \ related is whether we can expect metascience to be a science at all: why\\nshould we expect there to be underlying laws\
    \ or principles at all? This is discussed in:\\nMichael Nielsen, \\\"In what sense is the science of science a science?\\\
    \",\\nhttps://scienceplusplus.org/what_is_sos/index.html\\n(https://scienceplusplus.org/what_is_sos/index.html), San Francisco\
    \ (2022).\\u21a9\\ufe0e\\n128. When we discuss this with colleagues, they sometimes object that the bulk of the curve\\\
    nalso matters, and should not be ignored. We wish to be clear: we are not arguing for\\nignoring the bulk, but merely\
    \ for taking seriously both the bulk and the outliers. An\\ninteresting, albeit much stronger point of view \\u2013 one\
    \ whose truth we are very uncertain of\\n\\u2013 is that if we prioritize outliers, then everything else will take care\
    \ of itself. This is not a\\npopular view with many scientists! But it may have the decided upside of being true. Note\\\
    nthat it is strongly related to the ongoing argument over the Ortega and Newton\\nhypotheses, c.f.: Jonathan R. Cole and\
    \ Stephen Cole, \\\"The Ortega Hypothesis\\\", Science\\n(1972).\\u21a9\\ufe0e\\n129. We don't have detailed long run\
    \ sources of data for the Bell Labs research budget. But\\nthree sources are at least suggestive. One is the Office of\
    \ Technology Assessment's report\\n\\\"Information Technology R&D: Critical Trends and Issues\\\"\\n(https://www.princeton.edu/~ota/ns20/year_f.html%0A)\
    \ (1985). This estimates a $2.1\\nbillion spend on R&D in 1982, with roughly 10% of the R&D budget on research, so $210\\\
    nmillion in 1982, or $660 million in 2022. A second source is this post: Brian Wang,\\n\\\"Comparing Research budgets\
    \ of 1970s Bell Labs to DARPA and Google Today\\\",\\nhttps://www.nextbigfuture.com/2015/08/comparing-research-budgets-of-1970s.html\\\
    n(https://www.nextbigfuture.com/2015/08/comparing-research-budgets-of-1970s.html)\\n(2015). It estimates $500 million\
    \ in non-military R&D in 1974, or $3.1B in 2022. Of\\ncourse, that's an over-estimate since it includes all R&D, not just\
    \ research. Furthermore,\\nmany sources give an impression of an organization whose peak years were the 1940s\\nthrough\
    \ 1990s. Perhaps most notable is: Jon Gertner, \\\"The Idea Factory\\\" (2012).\\u21a9\\ufe0e\\n(/index.html)\"\n  },\n\
    \  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n104/107\\n\\n130. Another example to illustrate the point, albeit less directly pertinent, comes from venture\\ncapital\
    \ (VC). This is outlier dominated \\u2013 see, for example: Abraham Othman, Startup\\nGrowth and Venture Returns (https://angel.co/pdf/growth.pdf)\
    \ (2019). Again, scale may\\nhelp in VC: simply having the resources to make a much larger number of relatively\\nindependent\
    \ bets may give one VC an enormous advantage over another, even if they are\\nactually using an otherwise inferior strategy.\
    \ The additional scale gives them a much\\nhigher chance of achieving catastrophic success, despite their strategy.\\\
    u21a9\\ufe0e\\n131. Eugene Garfield, \\\"Is citation analysis a legitimate evaluation tool?\\\", Scientometrics\\n(1979).\\\
    u21a9\\ufe0e\\n132. The analogous argument for startup companies has been eloquently made in: Paul\\nGraham, Do Things\
    \ That Don't Scale (http://paulgraham.com/ds.html) (2013).\\u21a9\\ufe0e\\n133. Abraham Pais, \\\"Subtle is the Lord:\
    \ The Science and the Life of Albert Einstein\\\" (1982).\\u21a9\\ufe0e\\n134. Note that this kind of approach certainly\
    \ does not mean uncritically accepting scientists'\\nmyths about themselves. But there is benefit in understanding science\
    \ on its own terms, as\\nwell as a more outsider perspective.\\u21a9\\ufe0e\\n135. One idea we toyed with while writing\
    \ this essay was that of a tenure fellowship, meaning\\ntenure but with the ability to move immediately and with no administrative\
    \ friction\\nbetween different universities. Making such an idea work is complicated by some logistical\\nfacts (moving\
    \ a lab may be difficult), as well as a market-making problem: some\\nuniversities are more attractive locations than\
    \ others; some professors are more attractive\\nas members of faculty than others. Still, we believe there may be some\
    \ version of the idea\\nwhich is workable, and which adds liquidity to the usually very illiquid market in tenured\\nfaculty.\\\
    u21a9\\ufe0e\\n136. In Part 2 we've been focused on scaling social processes that are working. But there's some\\ntension\
    \ with the desire for structural diversity. Perhaps, if outlier successes are what\\nmatter, then it's sufficient to have\
    \ many small but very different cultures. In this view,\\nscaling may not matter so much. Indeed, maybe scale is even\
    \ undesirable. Cf the problems\\ndiscussed in this Appendix\\n(https://scienceplusplus.org/metascience/index.html#challenges-in-achieving-structural-\\\
    ndiversity).\\u21a9\\ufe0e\\n(/index.html)\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision\
    \ of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\n105/107\"\n  },\n  {\n    \"name\": \"See this\
    \ Twitter commentary by Stuart Buck\",\n    \"text\": \"(https://twitter.com/stuartbuck1/status/1544436480507932673),\
    \ and the associated\\nessay: Stuart Buck, \\\"'Evidence-based' Philanthropy Gone Wrong: The Myth of How Small\\nSchools\
    \ Failed\\\", https://www.insidephilanthropy.com/home/2014/12/22/evidence-\\nbased-philanthropy-gone-wrong-the-myth-of-how-small.html\\\
    n(https://www.insidephilanthropy.com/home/2014/12/22/evidence-based-philanthropy-\\ngone-wrong-the-myth-of-how-small.html)\
    \ (2014).\\u21a9\\ufe0e\\n138. We don't know Langer or Church, and they may disagree. Certainly, both have\\nencountered\
    \ significant problems in getting their own work supported. But while those\\nproblems are no doubt very real, they appear\
    \ to pale beside the issues faced by many\\nothers, included people such as Katalin Kariko, Stephen Wiesner, and Douglas\
    \ Prasher,\\nmentioned later in the paragraph as contrasting examples of non-canonical scientists.\\u21a9\\ufe0e\\n139.\
    \ A stimulating simple model suggesting some of the limits of \\\"the free play of free\\nintellects\\\" idea may be found\
    \ in: Erich Kummerfeld and Kevin J. S. Zollman,\\n\\\"Conservatism and the Scientific State of Nature\\\", The British\
    \ Journal for the Philosophy\\nof Science (2016). Their argument is rather different to ours: it's an idealized microscopic\\\
    nmodel of how people choose what to work on, arguing that individuals will tend to under-\\ninvest in risky projects,\
    \ if left to their own devices. Still, the model is complementary, in\\nthe sense that these are precisely the kinds of\
    \ issues that can be addressed by culture and\\ninstitutions.\\u21a9\\ufe0e\\n140. Put another way: the value of unique\
    \ environments is that they produce particularly\\nunusual individuals, individuals capable of actions no-one else is\
    \ capable of. Such an\\nenvironment does not feel like anywhere else. There is obviously some connection between\\nthe\
    \ uniqueness of such an environment (and the concomitant emotional experience) and\\nthe network structure and social\
    \ processes. Those network structures must be genuinely\\ndifferent in some important way. But understanding such connections\
    \ is far beyond the\\nscope of this essay. We will, however, note again that there is some tension between scale\\nand\
    \ uniqueness.\\u21a9\\ufe0e\\n141. Insightful early explorations of this idea may be found in: Irving John Good, Speculations\\\
    nConcerning the First Ultraintelligent Machine\\n(https://scienceplusplus.org/metascience/assets/Good1965.pdf) (1965);\
    \ and: Vernor\\n(/index.html)\"\n  },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\\
    nhttps://scienceplusplus.org/metascience/index.html\\n106/107\\n\\nVinge, The Coming Technological Singularity: How to\
    \ Survive in the Post-Human Era\\n(https://edoras.sdsu.edu/~vinge/misc/singularity.html) (1993).\\u21a9\\ufe0e\\n142.\
    \ The benefit to humanity depends in part on the future course of those countries. China's\\ntotalitarian approach is\
    \ deeply discouraging; we are encouraged by the thought that\\ntotalitarian governance is likely net bad for their science\
    \ and technology.\\u21a9\\ufe0e\\n143. Recent surveys in this direction include: Andy Matuschak and Michael Nielsen, How\
    \ can\\nwe develop transformative tools for thought? (https://numinous.productions/ttft/)\\n(2019); and: Bret Victor,\
    \ Media for Thinking the Unthinkable\\n(http://worrydream.com/MediaForThinkingTheUnthinkable/) (2013). See also: Douglas\\\
    nEngelbart, Augmenting Human Intellect: A Conceptual Framework\\n(https://numinous.productions/ttft/assets/Engelbart1962.pdf)\
    \ (1962). These omit\"\n  },\n  {\n    \"name\": \"discussions of brain-computer interfaces, but that is of course also\
    \ of interest in this\",\n    \"text\": \"vein.\\u21a9\\ufe0e\"\n  },\n  {\n    \"name\": \"The code may be found here\"\
    ,\n    \"text\": \"(https://scienceplusplus.org/metascience/assets/trouble_with_scale.py).\\u21a9\\ufe0e\\n145. In the\
    \ world of technology startups it's like asking a startup founder if their idea is better\\nthan the competitors. Of course,\
    \ the answer must always be \\\"yes!\\\" But it doesn't make it\\nso.\\u21a9\\ufe0e\\n146. At the level of individual\
    \ researchers and their networks this effect has been studied in:\\nPierre Azoulay, Joshua S. Graff Zivin, and Jialan\
    \ Wang, \\\"Superstar Extinction\\\", The\\nQuarterly Journal of Economics (2010).\\u21a9\\ufe0e\\n(/index.html)\"\n \
    \ },\n  {\n    \"name\": \"/28/25, 11:48 PM\",\n    \"text\": \"A Vision of Metascience\\nhttps://scienceplusplus.org/metascience/index.html\\\
    n107/107\"\n  }\n]"
