    \ Feasibility. Is there room and interest in the world for the\\nOrthogonal Technology Lab?\\nNext steps: Socialising\
    \ these ideas (hence this blog post), listening to\\nfeedback, and seeing whether thoughts are sparked, directly or indirectly.\"\
