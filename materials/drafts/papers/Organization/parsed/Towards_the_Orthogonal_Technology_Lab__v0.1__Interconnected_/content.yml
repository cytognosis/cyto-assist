  funding: 'Questions and next steps

    These are v0.1 thoughts, with the main purpose being to get them out of my

    head.

    I’m not ready to get my pitch deck and spreadsheet out quite yet. Like I said,

    this is a thought experiment, and working it through will teach me

    something. Maybe I can take what I learn into a client engagements in

    adjacent areas, or maybe it’ll give me a lens to understand historic research

    labs.

    But here are the specifics that I’m thinking through, as a result of writing the

    above:

    How do I better define the research areas? Are they too narrow or too

    broad? How do I know what is out of scope? (This interacts with the funding

    model.)

    Are there established models for the process? For example, Startup

    Studio Playbook (Attila Szigeti) is fantastic for the macro, micro, and case

    studies of startup studios - and would be the perfect springboard if you were

    setting up a new one. But for research labs and think tanks?

    Does the team make sense? Especially the use of mixed internal/external'
