    funding, or whether there needs to be a different approach\",\n    \"text\": \"Questions and next steps\\nThese are v0.1\
    \ thoughts, with the main purpose being to get them out of my\\nhead.\\nI\\u2019m not ready to get my pitch deck and spreadsheet\
    \ out quite yet. Like I said,\\nthis is a thought experiment, and working it through will teach me\\nsomething. Maybe\
    \ I can take what I learn into a client engagements in\\nadjacent areas, or maybe it\\u2019ll give me a lens to understand\
    \ historic research\\nlabs.\\nBut here are the specifics that I\\u2019m thinking through, as a result of writing the\\\
    nabove:\\nHow do I better define the research areas? Are they too narrow or too\\nbroad? How do I know what is out of\
    \ scope? (This interacts with the funding\\nmodel.)\\nAre there established models for the process? For example, Startup\\\
    nStudio Playbook (Attila Szigeti) is fantastic for the macro, micro, and case\\nstudies of startup studios - and would\
