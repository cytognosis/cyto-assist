content:
  sections: "[\n  {\n    \"name\": \"/29/25, 12:12 AM\",\n    \"text\": \"Towards the Orthogonal Technology Lab, v0.1 (Interconnected)\\\
    nhttps://interconnected.org/home/2021/01/21/otl\\n1/7\\n\\nThe document version is v0.1. All I\\u2019m trying to do is\
    \ capture and structure\\nwhat\\u2019s already in my head.\\nResearch areas\\nResearch areas TBD and there\\u2019s a necessary\
    \ mapping exercise, but I would\\nwant to cover areas such as:\\nConnected products and zero data: e.g. how could you\
    \ have voice\\ncontrolled home lighting with no user sign-in and no cloud connection?\\nCloud services and open protocols\
    \ for portability and interop: e.g. how\\nshare presence data between video call platforms, without insisting on\\nfederation?\\\
    nThe consumerisation of Robotic Process Automation (RPA): e.g. could we\\nship a software-enabled co-op as a Shopify plugin?\\\
    nWhat this isn\\u2019t is about developing new tech for its own sake, or creating\\nnew business models where currently\
    \ none are established. Which means no\\ndrones or cryptocurrency.\\nIf there\\u2019s an underlying thesis, it\\u2019s\
    \ to look in places where Srnicek\\u2019s platform\\ncapitalism has taken hold, leading to data-driven captured marketplaces,\
    \ and\\nthat\\u2019s impeding technology development to the detriment of the consumer.\\nGiven that view, something like\
    \ ad micro-targeting is a symptom of platform\\ncapitalism and not something to be rethought directly. Instead we start\
    \ by\\nrethinking the captured activity itself.\\nSo there\\u2019s a focus on B2C, rather than enterprise, and there\\\
    u2019s a focus on the\\nsmart assembling of existing tech rather than innovating new tech - though\\nthat\\u2019s not\
    \ to say that patentable technology won\\u2019t be found.\\nOutcomes\\nThe desired outcome is influence in shipped products\
    \ and services, and\\nthat\\u2019s tough to quantify, especially as an independent lab.\\nThere are a couple of models\
    \ here:\\nAs a think tank, what\\u2019s the press coverage: articles with readership, video\\nviews, social media mentions\
    \ and so on.\\nHere: 1\"\n  },\n  {\n    \"name\": \"/29/25, 12:12 AM\",\n    \"text\": \"Towards the Orthogonal Technology\
    \ Lab, v0.1 (Interconnected)\\nhttps://interconnected.org/home/2021/01/21/otl\\n2/7\\n\\nAs an academic research lab,\
    \ like a micro DeepMind, how many papers\\nare published, and how much are they cited.\\nAs a commercial research lab,\
    \ how many patents are granted - and, in the\\nlong run, what is the patent license income.\\nNone of these are particularly\
    \ good proxies to influence, except perhaps\\npatent licensing.\\nOutputs\\nArtefacts:\\nThe idea is to follow early product\
    \ innovation processes, but ship all the\\ncollateral around the product rather than the product itself. So\\u2026\\na\
    \ proof of concept of a zero-data connected product platform - but\\nmainly the strategy deck that shows why this is a\
    \ sound business.\\na proof of concept of interoperating video platforms - but mainly the\\nopen protocol that makes it\
    \ possible, together with docs and protocols.\\na proof of concept of how mutualised businesses can run as software -\\\
    nand a shipped use case of it plugging into a gig economy platform.\\nEngagement:\\nInnovation doesn\\u2019t happen in\
    \ a vacuum. So communications and audience\\nengagement are an output all of their own - everything from continuously\\\
    nexplaining the work, to open research newsletters. Although these aren\\u2019t the\\nprimary outcomes, it feels important\
    \ to translate work into policy papers and\\nMBA decks too.\\nThere are a couple of non-traditional activities that are\
    \ worth looking at here:\\nA fellowship program, as discussed by Peter Bihr.\\nAn original art programme, as discussed\
    \ (and used) by the Open Data\\nInstitute.\\nCommercial opportunities:\\nEventually you\\u2019d want a lab like this to\
    \ stand up on its own.\\nDoes that mean patents and licensing, in the style of Fraunhofer and\\nmp3?\\nIs there a membership\
    \ model for early access, paid by one or more\\ncorporate sponsors?\\nIs there a consultancy arm?\\nOr is there an attached\
    \ startup studio, with payback from equity?\\nHere: 1\"\n  },\n  {\n    \"name\": \"/29/25, 12:12 AM\",\n    \"text\"\
    : \"Towards the Orthogonal Technology Lab, v0.1 (Interconnected)\\nhttps://interconnected.org/home/2021/01/21/otl\\n3/7\\\
    n\\nThe trick is to pick a model with aligns with the mission (without adding too\\nmuch overhead), and focus on that\
    \ from day 1. It may not come to fruition,\\nbut I think it\\u2019s necessary as a hedge against the loss of funding.\\\
    nStructure\\nProcess:\\nPutting aside the engagement and commercial activities, the core activity\\nprobably follows a\
    \ standard innovation pipeline. There\\u2019s concepting,\\nprototyping, and development work, all separated by gates,\
    \ and a healthy\\ncull at each gate.\\nPortfolio management is about ensuring all stages of the pipeline are active.\\\
    nLooking at the four types of innovation I would say this is more about\\n\\u201cdisruptive\\u201d and \\u201croutine\\\
    u201d innovation, where there are new business models\\nbut no new fundamental tech. But the outcomes may point the way\
    \ to future\\ntech research.\\nTeam:\\nOne question is about how much is done internally, within the lab, versus\\nhow\
    \ much is done by commissioning.\\nMy first best guess that there\\u2019s a small, multi-disciplinary internal team of\\\
    ndesign, tech architecture, and business analysts, and that\\u2019s the early,\\nconcepting part of the timeline.\\nEngagement/communications\
    \ and program management are also in-house.\\nThen prototypes, technical protocols, and other builds are all commissioned.\\\
    nYou probably also need a permanent fundraising or partnerships function,\\nplus management. Other support functions such\
    \ as owning the art and\\nfellowship programs, and commercialisation/patents, can probably be done\\non a freelance basis.\\\
    nTalking about the team is a long way downstream from what matters - the\\noutcomes - but it\\u2019s worth sketching out.\
    \ What is this\\u2026 8-10 people plus a\\nstrong commissioning budget?\"\n  },\n  {\n    \"name\": \"Funding\",\n   \
    \ \"text\": \"The purpose of the above is to figure out the funding requirements.\\nWhat\\u2019s a full innovation cycle\\\
    u2026 Three years? Four years? What\\u2019s the full\\nloaded budget for that, given the team and activities? It should\
    \ just be a\\nmatter of doing the sums to come up with the number.\\nHere: 1\"\n  },\n  {\n    \"name\": \"/29/25, 12:12\
