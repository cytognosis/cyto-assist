    \ vice president at Motorola Mobility\\nand the deputy director of ATAP.\\n\\\"Special Forces\\\"\\nInnovation:\\nHow\
    \ DARPA\\nAttacks Problems\\nby Regina E. Dugan and Kaigham J. Gabriel\"\n  },\n  {\n    \"name\": \"SPOTLIGHT ON BREAKTHROUGH\
    \ INNOVATION\",\n    \"text\": \"Over the past 50 years, the Pentagon's Defense Advanced Research\\nProjects Agency (DARPA)\
    \ has produced an unparalleled number of\\nbreakthroughs. Arguably, it has the longest-standing, most con-\\nsistent track\
    \ record of radical invention in history. Its innovations\\ninclude the internet; RISC computing; global positioning satellites;\\\
    nstealth technology; unmanned aerial vehicles, or\\n\\\"drones\\\"; and micro-electro-mechanical systems\\n(MEMS), which\
    \ are now used in everything from air\\nbags to ink-jet printers to video games like the Wii.\\nThough the U.S. military\
    \ was the original customer\\nfor DARPA's applications, the agency's advances\\nhave played a central role in creating\
    \ a host of multi-\\nbillion-dollar industries.\\nWhat makes DARPA's long list of accomplish-\\nments even more impressive\
    \ is the agency's swift-\\nness, relatively tiny organization, and comparatively\\nmodest budget. Its programs last, on\
    \ average, only\\nthree to five years. About lOO temporary technical\\nprogram managers and a vibrant mix of contract\\\
    n\\\"performers\\\"\\u2014individuals or teams drawn from uni-\\nversities, companies of all sizes, labs, government\\\
    npartners, and nonprofits\\u2014do the project work. The\\nsupport staff comprises only 120 people in finance,\\ncontracting,\
    \ HR, security, and legal. The annual\\nbudget for the roughly 200 programs that are un-\\nder way at any given time is\
    \ about $3 billion. With\\nits unconventional approach, speed, and effective-\\nness, DARPA has created a \\\"special\
    \ forces\\\" model of\\ninnovation.\\nNot surprisingly, in recent decades there have\\nbeen many attempts to apply the\
    \ DARPA model in\\nother organizations in the private and public sectors.\\nAll those efforts\\u2014or at least the ones\
    \ with which\\nwe're familiar\\u2014have had mixed results or failed.\\nThese disappointments have led people to conclude\\\
    nthat the successes of this extraordinary agency sim-\\nply can't be replicated outside the Department of\\nDefense.\\\
    nWe disagree. We led DARPA from mid-2009 tmtil\\nmid-2012. Since then, we have been implementing\\nthe agency's model\
    \ of innovation in a new organiza-\\ntion\\u2014the Advanced Technology and Projects (ATAP)\\ngroup at Motorola Mobility,\
    \ which was acquired by\\nGoogle in May 2012. We believe that the past efforts\"\n  },\n  {\n    \"name\": \"Harvard Business\
