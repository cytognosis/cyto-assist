    \ as assigned course material in academic institutions nor as corporate learning\\nor training materials in businesses.\
    \ Academic licensees may not use this content in electronic\\nreserves, electronic course packs, persistent linking from\
    \ syllabi or by any other means of\\nincorporating the content into course resources. Business licensees may not host\
    \ this content\\non learning management systems or use persistent linking or other means to incorporate the\\ncontent\
    \ into learning management systems. Harvard Business Publishing will be pleased to\\ngrant permission to make this content\
    \ available through such means. For rates and permission,\\ncontact permissions@harvardbusiness.org.\"\n  }\n]"
