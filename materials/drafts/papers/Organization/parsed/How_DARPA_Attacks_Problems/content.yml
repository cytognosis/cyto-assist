    : \"HBR.ORG\",\n    \"text\": \"Regina E. Dugan and Kaigham J.\\nGabriel were formerly the director and\\ndeputy director\
    \ of the Defense Advanced\\nResearch Projects Agency. Dugan is cur-\\nrently a senior vice president at Google's\\nMotorola\
