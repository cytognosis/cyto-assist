    \ of specifics. This is like looking at the maze\\nfrom the outside \\u2014 Where are its boundaries? Why does it exist?\
    \ What dangers\\nlurk within?At the same time, it's equally important to talk about gritty\\nimplementation details. These\
    \ are the junctures in the maze and how you know\\nthat you've reached them. The abstract considerations are important\
    \ for enabling\\npeople to come to their own conclusions, but without the details, it's easy to leave\\nthe difficult\
    \ tradeoffs as frustrating \\\"exercises for the the reader.\\\"\\nNo, not that labyrinth.\\nThis piece has a three-part\
    \ structure that addresses increasingly concrete\\nquestions. The first question it strives to answer is: Why does the\
    \ maze exist and\\nwhere are its boundaries? The second question is: What is the layout of the\\nmaze? And finally: What\
    \ is the specific path we will try to chart through the\\nmaze?\\nWhy does the maze exist and where are its boundaries?\\\
    nWhen your goal is to navigate a maze, it's easy to treat it as a fixture in the\\nworld and ignore what it looks like\
    \ from the outside and its history. But mazes\\nexist for reasons. Don't forget that King Minos had the Labyrinth built\
    \ in order\\nto contain the minotaur! Describing the boundaries of the maze in the context of\\ninstitution building is\
    \ about understanding the scope of what we're setting out to\\ndo and the constraints in the world that shape that scope.\
    \ The history lets us\\nknow what's lurking inside to kill and eat us.\\nThe exterior of the maze is fractal \\u2014 every\
    \ time you zoom in on it, there are\\nmore interesting details to explore. As such, it's easy to fall into the trap of\\\
    nfocusing only on the contours of the questions \\\"Why does this problem exist?\\\" or\\njust \\\"Is there a problem?\\\
    \" Answering these is a worthy goal, but it is not our goal.\\nI spend a good chunk of the piece describing the exterior\
    \ of the maze and why it\\nexists, but only insofar as I feel it's useful for hypothesizing about the maze's\\ninterior\
    \ and the path through it. This approach will frustrate some of you for its\\nlack of rigor and others for its extraneous\
    \ information. Not all sections are for\\neverybody!\\nWhat is the layout of the maze?\\nThe interior layout of the maze\
    \ corresponds to the myriad decisions facing\\nanyone who is trying to build an organization to tackle a specific niche.\
    \ The\\nlayout of the maze \\u2014 with its junctures, turns, and dead ends \\u2014 is impossible to\\nknow for sure before\
    \ you enter it. Even then, you'll only be sure of the junctures\\nand distances you've actually traversed, and only if\
    \ you keep careful track of\\nthem. However, you can sketch possible layouts. This sort of hypothesizing is\\nimportant\
    \ and underdone, especially in public, in large part because there is not\\njust one path through the maze! In addition\
    \ to explaining which decisions I think\\nare correct, I want to both encourage other adventurers to enter the maze and\\\
    nequip them as well as I can.\\nIt's also just good practice to lay out your hypotheses about not just what\\nexperimental\
    \ results will be but why they will happen. Abstractly describing\\ndecision points is admittedly a bit of a hedge! Even\
    \ if our specific\\nimplementation fails, I hope that it doesn't stand as a condemnation of the entire\\nmodel.\\nI'm\
