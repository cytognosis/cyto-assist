    \    \"text\": \"In short, they enabled simultaneous activity in all quadrants described in\\nDonald Stoke's Pasteur's\
    \ Quadrant :\\nWhy DARPA and not Bell Labs?\\nBell Labs may seem a more obvious model to imitate than DARPA, a\\ngovernment\
