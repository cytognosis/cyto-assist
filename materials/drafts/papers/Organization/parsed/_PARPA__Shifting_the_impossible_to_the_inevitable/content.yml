    n2/61\\n\\nPurpose\\nThis piece is a combination of three components: a specific organization's\\ndesign; a broad proposal\
    \ for a new organizational structure and an associated\\n\\\"research\\\" agenda; and a synthesis of a gestalt of institutions,\
    \ incentives, history,\\nand theory that stabs at the questions \\\"How does the process of creating new,\\nimpactful\
    \ knowledge and technology work?\\\" and \\\"How can we do more of that\\nbetter?\\\"\\nIt's traditional to separate the\
    \ three roles this document is trying to play \\u2014\\nanalytical synthesis, broad proposal, and specific organizational\
    \ design. However,\\nin this case, they are too intimately entangled. Separating any one of them would\\nforce me to either\
    \ leave glaring gaps or project an unwarranted level of certainty.\\nThe synthesis clearly drives the broad proposal as\
    \ well as specific organizational\\nhypotheses. A large part of the research agenda is inseparable from the specific\\\
    norganizational design itself \\u2014 from \\\"How does money work in a DARPA-riff?\\\" to\\nthe hypothesis that good\
    \ simulations could be the \\\"Why now?\\\" of a program\\ndesign discipline. At the same time, one of the (admittedly\
    \ grand) goals of the\\nspecific organization is to shift some of the conclusions in the synthesis;\\ncoupling the synthesis\
    \ to the other parts allows us to say not just \\\"Here is how\\nthe world is\\\" but also \\\"Here is how it could be.\\\
    \"\\nAn important goal for this piece is to argue for the existence of a new\\norganization in the first place. Creating\
    \ an organizational structure around a\\nproject prematurely can have many downsides, so the burden of proof rests\\nheavily\
    \ on the argument that you can't accomplish what you need to do without\\nan \\\"official\\\" organizational structure.\
    \ I will argue that there are a number of\\nexperiments that seem like they can only be done in the context of a new\\\
    norganization, and that they comprise some of the most interesting questions that\\nthe broad proposal wants to explore.\\\
    nCalling out and exploring unavoidable tensions is one of the piece's core\\nthemes and an important role. Innovation\
    \ organizations are shot through with\\nStraits of Messinas, with Scylla waiting to snatch you if you focus too far on\
    \ one\\nside of a trade-off and Charybdis ready to suck you to your doom if tack too far\\nthe other way. As we will see,\
    \ these tensions often have to do with incentives.\\nWith these tensions, the only way to avoid a messy fate is to first\
    \ know the\\nupcoming danger and then sail the narrow path between them, which will always\\nbe uncomfortable and require\
    \ constant course correction. These tensions\\nmanifest even in the piece's very existence: If you think you have good\
    \ ideas, you\\nshould show that by acting on them; at the same time, propagating the ideas can\\nalso be valuable if it\
    \ enables other people to act on them. But acting on ideas and\\nexplaining them are often at odds! These conflicting\
    \ prerogatives are especially\\ntrue in this context where we need an explosion of new models, not a single\\norganization.\
    \ The piece's ultimate goal is to affect change, but the nature of the\\nbeast is such that I suspect neither generalizable\
    \ knowledge nor a specific\\norganizational design will be sufficient on its own. Normally, people end up on\\none end\
    \ of the spectrum or another \\u2014 either publishing a policy proposal or\\ntrying to lead by example (which doesn't\
    \ even produce an artifact).\\n\\\"Om nom nom\\\" \\u2014Scylla and Charybdis\\nFinally, this piece is meant to build\
    \ trust. Doing anything new requires trust,\\nand research requires more trust than other disciplines. Many of these ideas\\\
    ndon't have a \\\"closed form\\\" solution or a right answer, so the only way that I can\\nconvince you I've come to a\
    \ reasonable conclusion is by walking you through the\\nprocess of getting there. Hopefully, I can build that trust by\
    \ showing you that I've\\nreally done my homework and walking you through the thoughts behind the\\nactions. There are\
    \ many uncomfortable truths and icky trade-offs embedded in\\ngood solutions R&D. Staring them in the eye requires trust\
    \ in addition to raw\\nlogic.\\nHousekeeping\\nLinks. Whenever I lean on an argument I make elsewhere in the piece, I\
