    \n  },\n  {\n    \"name\": \"In the past, industrial labs filled a particular niche in the innovation\",\n    \"text\"\
    : \"ecosystem.\\n2. Especially in the world of atoms, industrial labs no longer fill the niche they\\ndid in the early-to-mid\
    \ 20th century.\\n3. The niche industrial labs once occupied still needs to be filled, and we should\\nnot expect organizations\
    \ that look like industrial labs to fill it.\\nDifferent institutions are each good at enabling certain sets of activities\
    \ that we\\nassociate with \\\"innovations': Academia is good at generating novel ideas;\\nstartups are great at pushing\
    \ high-potential products into new markets;\\ncorporate R&D is unparalleled for improving existing product lines. Together,\
    \ the\\ninstitutions that play a part in creating new knowledge and technology make up\\nan \\\"innovation ecosystem.\\\
    \" 3 The\\norganizations that make up these\\ninstitutions vary wildly, but they share\\nenough commonalities that it's\
    \ worth\\ncollectively referring to them as\\n\\\"innovation organizations.'\\nObviously, each institution can't\\nexcel\
    \ at every type of activity. Each institutional structure has some set of\\nconstraints that prevent it from engaging\
    \ in certain activities well or at all. Many\\nfactors shape these constraints, and they are effectively synonymous with\\\
    n\\\"incentives.\\\" You could think of each institution occupying some area on a map\\nof all possible activities \\\
    u2014 the institution is well suited to tackle the activities it\\ncovers and poorly suited to tackle activities at the\
    \ edge or outside of its area.\\nSome activities are covered by multiple institutions, but some aren't covered by\\nany\
    \ institutions. These activities are \\\"constrained out\\\" of happening by existing\\ninstitutional structures. For\
    \ example, unsexy long-term  4 projects that won't\\nnecessarily produce a product or novel papers are simultaneously\
    \ beyond the\\nscope of venture-funded startups, corporate R&D, philanthropy, and academia.\\nVenture-funded startups\
    \ could support either a shorter timeline or more product\\nfocus; corporate R&D would want the activities to be sexy\
    \ or product-focused;\\nphilanthropy would want them to be sexy; and academia would push for novelty\\nand papers.\\nOf\
    \ course there are counterexamples of projects with those characteristics that\\nhave been supported by existing institutional\
    \ structures! It will always be\\npossible to make arguments like \\\"SpaceX exists, so the innovation ecosystem is\\\
    nfine.\\\" Antibiotics are pretty great, even though people can sometimes survive\\ninfections without them. Similarly,\
    \ it's worthwhile to try to enable more\\nconstrained activities, even if a few projects make it through.\\nInstitutionally\
    \ constrained activity is a useful and precise way to think about\\nthe vibe that the world could be on a more wonderful\
    \ trajectory than it's on right\\nnow.  5\\nInstead of arguing over The Great Stagnation 4 or lamenting the fact that\
    \ some\\ncombination of research, academia,\\nscience, and physical innovation is\\nbroken, looking through the lens of\\\
    ninstitutional constraints enables us to\\ntalk specifically about which classes of\\nactivities we expect to be happening\
    \ that are missing or anemic. We can then ask\\nwhat institutional constraints are creating those gaps. Instead of asking,\\\
    n\\\"Where's my flying car?\\\" 5 we should be\\nasking, \\\"What activities would enable\\nflying cars, and what institutional\\\
    nconstraints are stopping them?\\\"  8 This analysis can in turn help us address those\\ngaps by pointing to concrete\
    \ ways to adjust incentives in existing institutions or\\nnew institutions with different sets of incentives one could\
    \ create. Some\\nimportant questions to ask are: What incentives are preventing institutions from\\nenabling these activities?\
    \ Should I be shifting incentives within an existing\\ninstitution or building a new one? How do I keep a new institution\
    \ from falling\\ninto the same incentive traps?\\nLooking at the innovation ecosystem through this lens suggests that\
    \ there are\\nmany different activities that we lump together under the umbrella of \\\"research\\\"\\nor \\\"innovation,\\\
    \" and many ways they could be improved. There are infinitely\\ndivisible multitudes, but I will briefly note three clusters\
    \ of them, primarily\\nbecause they are frequently conflated and I explicitly want to say, \\\"This piece is\\nabout one\
    \ of these but not the other.\\\"\\nOne cluster where things could be better is what I might call \\\"breakdowns in\\\
    nthe scientific process.\\\" Here you see issues like the replication crisis and science\\nbeing judged not on one of\
    \ several scientific epistemologies but on politics and\\nits ilk. 6\\nAnother area for improvement is in\\nenabling paradigm-shifting\
    \ work. It's a\\nbit of a trope, but there is something in\\nthe fact that someone from 1920 would barely recognize the\
    \ built world in 1970,\\nbut someone from 1970 wouldn't be too surprised by today's cars, planes, and\\nbuildings or their\
    \ capabilities. The built world hasn't experienced many\\nparadigm shifts. Similarly, physicists are still working on\
    \ string theory 50 years\\nlater, and despite incredible advances in biology, nothing has displaced the\\nstructure and\
    \ centrality of DNA as the dominant biological paradigm. There are\\nlegitimate arguments that this narrative ignores\
    \ less visible paradigm shifts, like\\nthose in computing, or the fact that the late 19th to mid 20th century may have\\\
    nbeen a massive outlier in the realm of physical innovation. I don't think these\\narguments are incompatible with the\
    \ assertion that we could do better.\\nGenerally, things are done the way they are\\nfor a reason.\\n2.\\nPart I: Problems\
    \ and Possibilities - The Boundaries of\\nthe Maze and the Minotaurs Within\\nOverlapping institutional constraints rule\
    \ out several\\nclasses of creative work\\nBoth the terms \\\"innovation\\\" and \\\"innovation\\necosystem\\\" are often\
    \ frustrating suitcase\\nwords. But it is useful to have a shorthand for\\n\\\"all the institutions that enable activities\
    \ that\\ncollectively cover the process of an idea\\nbecoming a new impactful idea or\\ntechnology.\\\"\\n3.\\nSee Tyler\
    \ Cownen's The Great Stagnation:\\nHow America Ate All The Low-Hanging\\nFruit of Modern History, Got Sick, and Will\\\
    n(Eventually) Feel Better and a lot of related\\nliterature.\\n4.\\nSee J. Storrs Hall's Where Is My Flying Car?:\\nA\
    \ Memoir of Future Past .\\n5.\\nFor more on breakdowns on the scientific\\nprocess, I recommend Brian Nosek's work on\\\
    nthe replication crisis or Stuart Ritchie's book\\nScience Fictions .\\n6.\"\n  },\n  {\n    \"name\": \"/28/25, 11:59\
    \ PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n5/61\\\
    n\\nYou can roughly divide paradigm-shift-enabling activities into two distinct\\nmodes. The first mode is paradigm-shifting\
    \ science. Here the sentiment is that\\n\\\"Einstein would be stuck in the patent office.\\\" We don't seem to have a\
    \ healthy\\nsystem of unfettered research that is producing paradigm shifts in how we\\nunderstand the world, like those\
    \ seen up through the 1950s or '60s in everything\\nfrom quantum chromodynamics to general relativity and the double-helix\\\
    nstructure of DNA. The second mode is paradigm-shifting engineering. \\\"Where's my\\nflying car?\\\" We don't seem to\
    \ be able to build new systems that radically change\\nour physical capabilities. The line between science and engineering\
    \ is of course\\nnebulous, porous, and full of feedback loops.\\nDistinguishing between these areas isn't just a semantic\
    \ exercise \\u2014 it's\\nimportant for enabling action. While they share many similarities and causal\\nlinks, each area\
    \ prioritizes different activities and mind-sets. As a na\\u00efve example,\\nparadigm-shifting science probably depends\
    \ on monomaniacal individuals\\nrunning an idea to ground over the course of sometimes decades, while that same\\nmode\
    \ would be detrimental to paradigm-shifting engineering because it requires\\nmore pragmatism and coordination. Think\
    \ Einstein and general relativity vs.\\nPolavision, Polaroid's failed home-movie system. 7 It's important to address each\\\
    nof these areas, but there needs to be a\\ndivision of labor. Despite the\\ntemptation to do all the things, \\\"fixing\\\
    nresearch\\\" is going to require many new\\ninstitutions (that I suspect will not scale) to address different niches\
    \ in constraint\\nspace. Additionally, legible niches can help prevent mimetic infighting over who\\nis going to \\\"\
    save science.\\\" Given all of this, enabling more paradigm-shifting\\nscience is incredibly important, but it won't show\
    \ up in the rest of this piece as we\\nturn our focus to the niche in the innovation ecosystem that enables paradigm-\\\
    nshifting engineering.\\nFeeling around the edges of solutions R&D\\nHow should we think about the bundle of activities\
    \ that enable paradigm-\\nshifting engineering? The bundle is incredibly nebulous \\u2014 absolutely real, but\\nhard\
    \ to capture, fuzzy-edged, and context-dependent. There is clearly something\\nthat is more focused on products and outcomes\
    \ than the exploration of nature we\\nassociate with Newton or Einstein, yet at the same time doesn't have the steely\\\
    neyed focus on commercial products we associate with Edison or Jobs. Invoking\\nthese contrasting historical figures brings\
    \ to mind Donald Stokes's concept of\\nPasteur's Quadrant; 8 Stokes captures\\nthe mind-set excellently but doesn't\\\
    nfocus on the actual institutional\\nactivities or how to enable them. Closer to the mark, DARPA director Arati\\nPrabhakar\
    \ captures the spirit of what we're striving for in her description of\\n\\\"Solutions R&D\\\":\\nSolutions R&D weaves\
    \ the threads of research from multiple domains\\ntogether with lessons from the reality of use and practice, to\\ndemonstrate\
    \ prototypes, develop tools, and build convincing evidence.\\nBecause it reaches into and connects all the parts of the\
    \ innovation\\nsystem, solutions R&D is a powerful way to ratchet the whole system\\nup faster, once some initial elements\
    \ of research and implementation\\nare in place. Doing it well takes a management approach that combines\\na relentless\
    \ focus on a bold goal with the ability to manage the high\\nrisk involved in creative experimentation. 9\\n\\\"Solutions\
    \ R&D\\\" is certainly a great\\nterm for the niche we're interested in. We don't have to keep referring to it as\\n\\\
    \"that bundle of activities that enables paradigm-shifting engineering\\\" (though it\\nwould lead to an impressive word\
    \ count). But like other nebulous things, such as\\nclouds, science, and porn, a name doesn't do much to further understanding\
    \ the\\nimportant properties of the activities we're talking about, why they're not as\\ncommon as we'd like, and how\
    \ to change that.\\nPerhaps frustratingly, the best strategy for getting a handle on nebulous but\\nvery real things is\
    \ not to rigidly define them but to \\\"feel around the edges.\\\"\\nPeople are terrible at describing what they want\
    \ given a blank slate, but we're\\npretty good at knowing what we want when we see it. Considering what triggers\\nthe\
    \ \\\"Yes, that!\\\" for systems R&D, we consistently arrive back at the industrial labs\\nof the early-to-mid 20th century\
    \ and Bell Labs in particular.\\nSolutions R&D is nebulous, but we can get a sense of it by feeling around the\\nedges\
    \ and looking at what sorts of things happened at great labs that don't seem\\nto be happening now. While industrial labs\
    \ (including Bell Labs and PARC\\nthemselves) still exist, they no longer fill the niche they did in the early-to-mid\\\
    n20th century . Understanding what changed and why is part of understanding the\\nniche more broadly. While the early-to-mid\
    \ 20th century was home to many well-\\nregarded industrial labs 10 , like GE\\nLaboratories (f. 1900), DuPont\\nExperimental\
    \ Station (f. 1903), and\\nKodak Research Laboratories (f. 1912),\\nBell Labs (f. 1925) stands head and shoulders above\
    \ them in the pantheon. Most\\nof the properties and important activities in this section are drawn primarily\\nfrom accounts\
    \ of Bell Labs, supplemented by accounts from other labs. This Bell\\nLabs focus is admittedly in part because of the\
    \ streetlight effect \\u2014 people have\\nchronicled Bell Labs much more extensively \\u2014 but also because Bell Labs\\\
    \"\\noutput was such an outlier. I feel comfortable doing this because, unlike the\\nidiosyncratic success of individuals\
    \ or startups, there appears to be a consistent\\nset of activities shared across industrial labs that are missing today.\\\
    nThe trick here is to distinguish between the \\\"universal\\\" characteristics of the\\nactivities that enable good solutions\
    \ R&D and the particular set of tactics and\\nstrategies that Bell Labs used to implement those characteristics. It's\
    \ important\\nto distinguish between the two because we might need to use different tactics to\\nachieve the same characteristics\
    \ in a new, 21st century context. Blindly following\\ntactics regardless of context is ineffective and cargo-culty.\\\
    nI've identified nine characteristics that enabled industrial labs to fill the\\nsolutions R&D niche .\"\n  },\n  {\n\
    \    \"name\": \"Industrial labs enabled work on general-purpose technology before it\",\n    \"text\": \"specialized.\"\
    \n  },\n  {\n    \"name\": \"Industrial labs enabled targeted piddling around, especially with equipment\",\n    \"text\"\
    : \"and collaborators who would not otherwise be accessible.\"\n  },\n  {\n    \"name\": \"Industrial labs enabled high-collaboration\
    \ research work among larger and\",\n    \"text\": \"more diverse groups of people than academia or startups.\"\n  },\n\
    \  {\n    \"name\": \"Industrial labs enabled smooth transitions of technologies between different\",\n    \"text\": \"\
    readiness levels \\u2014 they cared about both novelty and scale.\"\n  },\n  {\n    \"name\": \"Industrial labs provided\
    \ a default customer for process improvements and\",\n    \"text\": \"default scale for products.\"\n  },\n  {\n    \"\
    name\": \"Industrial labs often provided a precise set of problems and feedback loops\",\n    \"text\": \"about whether\
    \ solutions actually solved those problems.\\n7. Industrial labs provided a first-class alternative to academia in which\
    \ people\\ncould still participate in the scientific enterprise.\\n8. Industrial labs enabled continuous work on projects\
    \ over a six-plus-year time\\nscales. The work to create the transistor took eight years (because of a gap\\ncreated by\
    \ World War II) and making it mass-manufacturable took another\\neight.\"\n  },\n  {\n    \"name\": \"Industrial labs\
    \ enabled work in Pasteur's Quadrant 11 \\u2014 explorations into\",\n    \"text\": \"natural phenomena with an eye\\\
    ntoward exploiting those phenomena\\nfor human flourishing (and profit).\\nExceptions abound, of course. Non-industrial\
    \ lab organizations exist today that\\nembody many of these characteristics, and not all golden-age industrial labs did\\\
    nall these things all the time. I'll expand on some (but not all) of these points\\nbelow.\\nIndustrial labs enabled work\
    \ on general-purpose technology\\nbefore it specialized\\nSpecialization has a complicated relationship with new technologies.\
    \ New\\ntechnology will never be as good as old technology along every dimension.  15\\nThis failure of pareto-superiority\
    \ is why frontier technologies need to start in\\nniche markets where they are especially valuable. It's rare that a technology\
    \ can\\ndo well in a niche market without some specialization. If you imagine the\\nstraightest path that a technology\
    \ can take to its most powerful or general use,  16\\nPolavision took 10 years and half a billion\\ndollars to make. In\
    \ Loonshots , Safi Bahcall\\nattributes its failure to expensive but amazing\\nfeatures driven by Polaroid's founder.\\\
    n7.\\nSee Pasteur's Quadrant: Basic Science and\\nTechnological Innovation .\\n8.\\nFrom \\\" In the Realm of the Barely\\\
    nFeasible .\\\"\\nIn the past, industrial labs filled a particular niche in\\nthe innovation ecosystem\\nFor more about\
    \ why industrial labs started,\\nsee \\\" The Changing Structure of American\\nInnovation : Some Cautionary Remarks for\\\
    nEconomic Growth.\\\"\\n10.\\nPasteur's Quadrant is an excellent\\nexploration into the nuances of different\\ntypes of\
    \ research.\\n11.\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\\
    nhttps://blog.benjaminreinhardt.com/parpa\\n6/61\\n\\nthe specialization work to fit into niches can require larger or\
    \ smaller diversions\\nfrom this path. These diversions take the form of everything from technology\\ndevelopment to marketing\
    \ and building sales channels for a company. Going\\nfrom niche to niche is essential, but you can also get stuck in a\
    \ niche or jump\\nonto a different development path altogether. Say what you will about him, but\\nElon Musk is the master\
    \ of charting paths between niches: roadster \\u2192 high-end\\nsedan \\u2192 mass-market car; NASA-subsidized LEO rocket\
    \ \\u2192 GEO rocket \\u2192\\nreusable GEO rocket \\u2192 Starship. More time and resources can enable you to\\npick\
    \ an \\\"optimal\\\" sequence of niches or search around for yet-unknown niches\\ninstead of being forced to hop into\
    \ the nearest or most obvious ones. 12 In other\\nwords, if you imagine decoupling from\\nmarket discipline as cave diving\
    \ ,\\nindustrial labs acted like extra oxygen\\ntanks.\\nIndustrial labs\\\" work on unabashedly general-purpose technologies\
    \ stands in\\ncontrast to modern startups. I don't know how often I've seen a presentation\\nfrom a grad student or professor\
    \ that goes something like, \\\"We've invented this\\nincredible technology that could potentially do [amazing thing];\
    \ however, it will\\ntake a lot of work to get there, so we're starting a company to build a product to\\ndo [kind of\
    \ pathetic thing that will still require a lot of specialization and\\ncompany-building] in [domain totally unrelated\
    \ to [amazing thing]].\\\" While I'm\\nusually sure it's doomed to failure, it's unfortunately the best move, given history\\\
    nand the constraints on startups. First, many successful startups do look like they\\nstarted in a tiny, scoffable niche\
    \ \\u2014 Tesla (weird rich people), NVIDIA (gamers),\\nPayPal (Beanie Babies on eBay?), Apple (hobbyists), Twitch (life\
    \ livestreaming),\\nAmazon (books) ... the list goes on. However, each of these weird niches didn't\\nrequire huge diversions\
    \ from the critical path.  18 Second, \\\"start in a niche\\\" is folk\\nstartup wisdom for a reason . History is littered\
    \ with the corpses of startups that\\nwere going to be the next platform or general-purpose technology as soon as they\\\
    nlaunched. General Magic, NeXT, Quibi, Atrium, Rethink Robotics, and Magic\\nLeap. Many others that started with grand\
    \ ambitions were forced to crawl into a\\nniche to survive \\u2014 I won't name names here. At the same time, startup\
    \ investors\\nwant to see massive potential returns. \\\"Find a compelling story about how a niche\\nbecomes a billion-dollar\
    \ market\\\" puts a technology between a rock and a hard\\nplace.  19\\nIn most cases, it wouldn't have been feasible\
    \ to do the necessary work to find\\nor develop for a better niche in an academic setting either. While that work still\\\
    nrequires \\\"research,\\\" it also requires focus and systems engineering, both things\\nthat academia does not support\
    \ for a slew of reasons .\\nOf course, it's possible that I and others just overestimated the potential of\\nmany of these\
    \ technologies. However, the examples of technologies that were\\nmassively impactful only after \\\"hanging out\\\" in\
    \ an industrial lab for many years\\nwould seem to argue otherwise. The transistor, public key cryptography, Pyrex,\\\
    nsolar panels, and the graphical user interface (and personal computing in general)\\ncome to mind. Industrial labs provided\
    \ the environment to do the work to get a\\ntechnology to a point where it was viable for a \\\"useful\\\" niche, and\
    \ enable it to\\nfind that niche in the first place.\\nIn addition to giving projects longer time scales, less existential\
    \ risk, and larger\\nbudgets than most startups, there are several specific ways that industrial labs\\nhelped technologies\
    \ find good niches that startups and academia don't provide.\\nWhen you're still trying to figure a technology out, it's\
    \ not clear which skill\\nsets you want in the room. Industrial labs facilitated people floating between\\ndifferent projects\
    \ loosely creating and breaking collaborations. Bell Labs was\\nparticularly good at enabling these free radicals:\\n\\\
    \"The Solar cell just sort of happened,\\\" he [Cal Fuller] said. It was not\\n\\\"team research\\\" in the traditional\
    \ sense, but it was made possible\\n\\\"because the Labs policy did not require us to get the permission of our\\nbosses\
    \ to cooperate\\u2014at the Laboratories one could go directly to the\\nperson who could help.\\\" 13\\nTo get the same\
    \ effect at a startup, you need to either find a magical individual\\nwho has gone deep on multiple areas (an M-shaped\
    \ individual instead of T-\\nshaped individual?) or hire people who might ultimately turn out to be useless.\\nStartups\
    \ don't have the slack for this.\\nAnother dividend from industrial labs\\\" slack is the room to notice something\\nunexpected,\
    \ say, \\\"Huh, that's funny,\\\" and run the anomaly to ground. Perhaps the\\nmost famous slack dividend is the discovery\
    \ of the cosmic microwave\"\n  },\n  {\n    \"name\": \"background when Arno Penzias and Robert Woodrow Wilson were using\
    \ the\",\n    \"text\": \"Holmdel Horn Antenna to try to do satellite communication experiments. They\\nnoticed persistent\
    \ noise in their measurements that didn't seem to respond to\\nrecalibration or cleaning. Eventually, they got in touch\
    \ with theorists who\\nconnected the noise they saw with predicted echoes of the (still very\\nhypothetical) big bang.\
    \ In a lower-slack (more \\\"efficient') organization, Penzias\\nand Wilson wouldn't have had the bandwidth to dig into\
    \ the mysterious noise\\nbeyond determining that it didn't seem to be fixable.\\nModern corporate R&D has become worse\
    \ at enabling work on general-\\npurpose technology. Bell Labs had a culture that was almost the polar opposite of\\nthe\
    \ \\\"demo or die\\\" pressures in many modern organizations. The need to produce\\ndemos for corporate higher-ups may\
    \ create the same pressure to specialize into a\\nniche that makes startups bad places to develop general-purpose technology.\
    \ One\\nway to look at this would be to ask: How has the management of corporate R&D\\nchanged over time?\\nIndustrial\
    \ labs enabled targeted piddling around\\nIt was effortless. It was easy to play with these things. It was like\\nuncorking\
    \ a bottle: Everything flowed out effortlessly. I almost tried to\\nresist it! There was no importance to what I was doing,\
    \ but ultimately\\nthere was. The diagrams and the whole business that I got the Nobel\\nPrize for came from that piddling\
    \ around with the wobbling plate.\\n\\u2014Richard Feynman, Surely You're Joking, Mr. Feynman\\nSo many stories of golden-age\
    \ industrial labs revolve around researchers\\nliterally just trying out a lot of stuff. \\\"Hey, we came up with this\
    \ new chemical,\\nwhat's it useful for?\\\" In the startup world, that's often derided as a \\\"solution\\nlooking for\
    \ a problem.\\\" Arguably, though, many important technologies started\\noff this way \\u2014 they weren't a hole-in-one\
    \ solution to a problem. We don't seem\\nto have a place for this \\\"targeted piddling around\\\" to happen anymore in\\\
    nsituations that require specialized knowledge and equipment.\\nDisciplines where targeted piddling around can happen\
    \ seem to be healthier.\\nThis contrast is stark looking at software compared to, say, space technology.\\nModern software\
    \ (and slowly, biology) suggests that, in many cases, piddling\\naround requires cheap, democratized technology. Industrial\
    \ labs may have been\\nable to loosen that requirement. Stories about DuPont and 3M's industrial labs\\nalways involve\
    \ a lot of \\\"just trying stuff out.\\\"\\nIt's important to call attention to the \\\"targeted\\\" part of \\\"targeted\
    \ piddling\\naround.\\\" Contrary to common perception, Bell Labs and PARC didn't give\\nresearchers free rein to work\
    \ on whatever they wanted. There were relatively few\\nmilestones, and researchers had enough slack from management to\
    \ explore\\nadjacencies. However, people were explicitly asked to work on high-level goals\\nthat would benefit AT&T's\
    \ continent-spanning communication system.\\nThis targeting stands in contrast to accounts extolling how much freedom\\\
    nresearchers had. It's almost impossible to confirm, but I suspect that researchers\\nwho portray themselves as having\
    \ completely free rein in industrial labs are\\nunreliable narrators. My hunch is that they felt like they had entirely\
    \ free rein\\nbecause the lab managers were good at hiring people whose interests were\\nsufficiently aligned with the\
    \ lab's goals that anything they chose to do was within\\nsome window. Another alternative is that they gave a few people\
    \ free rein and the\\npersonal accounts are from the wunderkinds. Claude Shannon illustrates both of\\nthese possibilities\
    \ \\u2014 he was absolutely a wunderkind who was given free rein.\\nThat is, up until he started working on projects like\
    \ a \\\"mechanical mouse\\\" that\\nBell Labs management couldn't possibly justify to regulators as being related to\\\
    ncommunication.\\nToday, many people implicitly assume that targeted piddling around happens\\nin universities. Academics\
    \ certainly do piddle around with ideas, but they're less\\nincentivized to do it with technology applications. You can't\
    \ really write a paper\\nabout how you spent a year modifying your novel technology to 100 specific\\napplications. Even\
    \ when academic labs do piddle around with technology\\napplications, the targeting systems are often suboptimal. Often,\
    \ academics are\\nworking on a specific application for a specific industrial partner, or they've\\neffectively made up\
    \ a use case out of whole cloth. This isn't to cast shade on\\nacademics, but to point out that academia is not set up\
    \ to enable the sorts of\\nfeedback loops that enable just the right amount of targeting.\\nGetting a general-purpose\
    \ technology to work is actually an iterated cycle of\\ngenerality and specificity. You can think of two coupled modes:\
    \ testing a general\\ntool on many specific applications, and testing many specific components to get\\na general tool\
    \ to work. Xerox PARC's GUI work is a good example of the former\\nmode \\u2014 they stress-tested the general system\
    \ by using it for day-to-day work!\\nEdison's workshop (arguably the OG industrial lab) did a lot of \\\"trying stuff\
    \ out,\\\"\\nMore abstractly, general purpose technology\\nneeds developmental slack. See \\\" Studies on\\nSlack .\\\"\
    \\n12.\\nFrom Jon Gertner's The Idea Factory\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting\
    \ the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n7/61\\n\\nbut the opposite way, where\
    \ they had a general application in mind (lighting,\\nrecording, picking up voices on the phone) and just went through\
    \ a thousand\\nmaterials to see what would fit the bill.\\nThe two modes are strongly coupled. While you're trying out\
    \ a thousand things\\nto figure out how to do a specific thing, you may realize that the five hundred and\\ntwenty-first\
    \ thing is no good for the intended purpose, but might be amazing for\\nanother thing. However, that realization can easily\
    \ be tossed out the door without\\nthe room to explore that hunch (because usually it's a hunch). Startups, academia,\\\
    nand 21st-century corporate R&D are rarely set up incentive-wise to enable\\nrunning that hunch to ground. You do see\
    \ this happen with software startups,\\nbecause it is much easier to do targeted piddling around with software. Arguably,\\\
    nthis could be one reason that we've seen less stagnation in software.\\nIn contrast to many modern corporate R&D labs,\
    \ Google Brain feels like it does\\nthe same thing. And perhaps that's why it feels like a much more \\\"healthy\\\"\\\
    ncorporate R&D organization. In fact, a lot of the pure AI work feels a little bit\\nlike this targeted piddling around.\
    \ Except that they actually don't take it the one\\nstep further to be an experimental product.\\nThe Valley of Death\
    \ is a concept that pops up repeatedly in discussions about\\ntechnology development. 14 It's\\nnebulous and overloaded,\
    \ but it always\\nrefers to a situation where there is\\nsecretly much more or different work\\nthan you'd expect between\
    \ a development stage that feels \\\"complete\\\" and its\\nnatural next step; often, this is between a proof of concept\
    \ and a prototype or\\nbetween a prototype and a manufactured process. I don't find the concept\\nparticularly useful,\
    \ but the thought that targeted piddling around might be the\\nequivalent of \\\"hanging out\\\" in the Valley of Death\
    \ feels generative. 15\\nIndustrial labs enabled smooth\\nproject ramp-ups with high\\nceilings\\nA common pattern in\
    \ golden-age industrial labs was an individual or small team\\npiddling around with something for a while, then roping\
    \ in a few people part-\\ntime and, if it shows promise, going from there. Less than a dozen people were\\nworking on\
    \ transistors at Bell Labs from 1939 to 1947,  23 but within two years,\\nmany dozens of people across multiple teams\
    \ were figuring out how to\\nmanufacture them at scale and where they might fit within AT&T's system.\\nIndustrial labs\
    \ were unique in their ability to enable research to start small and\\nthen ramp; smoothly transitioning along the technology\
    \ readiness curve from\\npromising experiment to prototype to end-user-quality product.\\nThese smooth ramp-ups stand\
    \ in contrast to both academic labs and startups.\\nProjects can absolutely start small in academic labs, but they will\
    \ hit a ceiling\\nquickly because of both grant dynamics and publishing pressures.  24 Individual\\ngrants rarely break\
    \ the single-digit-million dollar mark, which can only support a\\nsmall team. Grants are hard to combine to fund a single\
    \ project because most\\ngrants want to support a discrete piece of work. Notably, these grant dynamics\\nmean that national\
    \ labs and other non-university organizations that depend on\\ngrants are under the same constraints. If grants are the\
    \ input to academic labs,\\npublications are the output. Academic careers are built on citations, but the\\nlarger teams\
    \ required by scaled-up projects either dilute citations or the work\\nisn't novel enough to publish.\\nSmall businesses\
    \ don't have the same ceiling as academic labs, but it is hard for\\nthem to scale smoothly unless the work produces near-term\
    \ profit. Unfortunately,\\nsome of the most interesting work precedes profits by a significant chunk of time\\n(even if\
    \ it will be profitable eventually). So, in order to pursue that work, a small\\nbusiness would need to transform itself\
    \ into a high growth startup. Startups have\\nthe opposite problem of academia: They have a hard lower bound on scale.\\\
    nThey're expected to grow quickly \\u2014 if a startup is not constantly hiring, it's a red\\nflag.\\nIdeally, the combination\
    \ of academic labs and startups should enable this\\nsmooth ramping, allowing a project to pupate from academia to a startup\
    \ when\\nit's mature enough. However, there is often a gap between where you can get in\\nan academic lab and what you\
    \ need to start a startup. This is where the Valley of\\nDeath rears its head  25 again!\\nIt's informative to compare\
    \ Google Brain and (the organization-formerly-\\nknown-as-Google-)X in the context of smoothly ramping projects. Google\
    \ Brain\\nhas a ton of different things being tinkered on at once, with projects of all\\ndifferent scales. By contrast,\
    \ X famously prides itself on \\\"killing ideas quickly.\\\" 16\\nHard early gating processes prevent the\\nsort of long-burn\
    \ early work that led to\\ninnovations that range from transistors\\nto nylon; hard early gating processes are a good\
    \ move for startups but perhaps\\nsquander the advantages of corporate R&D.\\nA quick research diversion! It would be\
    \ fascinating to plot a histogram of project\\nsizes at different organizations. My hypothesis is that the organizations\
    \ that\\nseem to be doing the best solutions R&D would have a nice, smooth decay \\u2014 lots\\nof little projects, and\
    \ a few big projects, and many in between. I suspect that\\nmany organizations would have a hole in the middle. Maybe\
    \ that's the Valley of\\nDeath appearing as a statistical phenomena.\\nPrototyping needs manufacturing in the room\\n'Manufacturing\\\
    \" is code for the folks who will produce the thing at scale.\\nIt's easy to think that if the first version of an invention\
    \ works consistently, you\\ncan just turn around and make a bunch of them. However, the way something is\\nmade has a\
    \ huge influence on its cost. A piece of metal that a skilled craftsperson\\nshaped by hand is much more expensive than\
    \ that same piece of metal cast in a\\nmold. Sometimes it's straightforward to turn the former into the latter. However,\\\
    nsometimes you need to redesign the thing almost from scratch.\\nThe difference between these two situations is often\
    \ not obvious to someone\\nwithout manufacturing experience. There are many non-obvious design choices\\nthat make scaling\
    \ easier or harder. For example, perfect right-angle corners in a\\nrectangular cutout are completely free (and the default!)\
    \ in a CAD model, but they\\nare extremely hard to machine precisely. Often, you don't actually need the\\ninterior corners\
    \ of the cutout to be perfect right angles, but incorporating that\\ntolerance requires shifting other pieces of the design\
    \ to accommodate it without\\nchanging functionality. These design shifts are fairly straightforward if you make\\nthem\
    \ while prototyping. However, once the entire system is roughly complete,\\nmanufacturing-focused design shifts can have\
    \ cascading effects that require\\nredesigning many other components as well. This is often what's going on when\\nthere's\
    \ a weirdly long gap between a company triumphantly showing off a\\nprototype or concept version of a product and actually\
    \ putting something in\\ncustomers\\\" hands.\\nNot only are the impediments to scaling non-obvious, they're often tacit\\\
    nknowledge. Instead of a legible rule of thumb like \\\"Avoid precise angles at the\\nbottoms of cutouts,\\\" as in the\
    \ example above, someone with a lot of experience\\nwill take one look at a design and say, \\\"Mmm, nope, that's a bad\
    \ idea.\\\" It's not\\nlike they could have given you an explicit list of dos and don'ts \\u2014 most tacit\\nknowledge\
    \ is illegible, and even if you could tease it out, the list would be\\ninfinitely long.\\nThe importance of having manufacturing\
    \ in the room applies in software as\\nwell as hardware. Different implementations of the same algorithm can\\nparallelize\
    \ fine or completely break, a functional piece of code could leave giant\\nsecurity holes, etc.\\nA pattern starts to\
    \ emerge when you ask: How do golden-age industrial labs\\ndiffer from corporate R&D today? Corporate R&D no longer seems\
    \ to have the\\nimpressive output or cachet that it once did.\\nThe golden-age industrial labs shared a trifecta of conditions:\"\
    \n  },\n  {\n    \"name\": \"They were run by a monopoly\",\n    \"text\": \"For a good short article on the Valley of\\\
    nDeath and its relationship to technology\\nreadiness levels, see \\\" Technology Readiness\\nand the Valley of Death\
    \ .\\\"\\n14.\\nHat tip to Michael Filler who (to my\\nknowledge) created this intuition pump.\\n15.\\nSee Derek Thomson's\
    \ \\\" Google X and the\\nScience of Radical Creativity .\\\" The Atlantic.\\n16.\\nHealthy industrial labs require a\
    \ trifecta of\\nconditions\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible\
    \ to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n8/61\"\n  },\n  {\n    \"name\": \"They were working\
    \ on a clearly high-potential technology\",\n    \"text\": \"3. That technology addressed one or more existential threats\
    \ to the company.  27\\nDigging in:\"\n  },\n  {\n    \"name\": \"They were run by a monopoly\",\n    \"text\": \"More\
    \ specifically, they were run by companies that were extracting monopoly\\nrents on some high-margin product. Xerox was\
    \ the only game in town for copy\\nmachines (which, believe it or not, were as essential to many businesses as Excel\\\
    nis today), DuPont controlled well-known materials like Teflon and Lycra, Corning\\nhad Pyrex and Silicone, and of course\
    \ AT&T controlled the telephone networks.\"\n  },\n  {\n    \"name\": \"They were working on a clearly high-potential\
    \ technology\",\n    \"text\": \"The technologies the labs worked on generated strong conviction that if\\nresearchers\
    \ could actually pull it off technically, the parent company would be\\nable to sell it. \\\"If you can replace a vacuum\
    \ tube with something that uses 1000x\\nless power, of course people would use it.\\\" \\\"If you can create glass that\
    \ won't\\nshatter when you heat it up and cool it down, of course people would use it.\\\"\\nWhat's not clear is why so\
    \ many fewer technologies seem to fall under that\\numbrella now. It could be that we picked the low-hanging fruit in\
    \ atom land. It\\ncould be that people are just more pessimistic about what we can build. It could\\nbe that timelines\
    \ have shrunk, and there is no high-potential technology on those\\ntimelines. It could be that people think in terms\
    \ of products instead of\\ntechnology. Or it could be that companies have scoped down, so many fewer\\ntechnologies fall\
    \ into \\\"things the parent company can sell.\\\"\"\n  },\n  {\n    \"name\": \"That technology addressed one or more\
    \ existential threats to the\",\n    \"text\": \"company.\\nConditions 1 and 2 are insufficient if the technology the\
    \ lab works on doesn't\\naddress existential threats to the company. This third condition is often ignored\\nbut perhaps\
    \ most important! In order for an industrial lab to have the massive\\nimpact we associate with the greats, it needs active\
    \ help from its parent\\norganization to bridge the huge gap between an invention and widespread\\nimpact. Someone needs\
    \ to put in active effort to diffuse technology into the\\nworld, and if the company doesn't feel intense pressure to\
    \ do the diffusion work,\\nthe technology will languish.\\nFor companies, leveraging core organizational capabilities\
    \ for a new high-\\nmargin product is one of the most straightforward and common ways that new\\ntechnology can address\
    \ existential threats. Products become commoditized over\\ntime and companies need to keep growing to keep their valuations\
    \ high. Thus,\\nnew technology can address the existential threat of low margins and flagging\\ngrowth. However! If that\
    \ technology isn't in line with core capabilities, taking\\nadvantage of it would require significant organizational changes,\
    \ which pose a\\ndifferent (at least perceived) existential threat. So only technologies aligned with\\nan organization's\
    \ core capabilities address existential threats. This core-business\\nalignment may also have contributed to industrial\
    \ labs\\\" impactfulness beyond\\njust enabling them to exist because a technology that can take advantage of\\nexisting\
    \ manufacturing and distribution channels is more likely to be impactful.\\nThe different dynamics of Xerox PARC's work\
    \ on the laser printer and the\\npersonal printer are illustrative. While PARC is legendary for the impact of its\\npersonal\
    \ computing work, structurally, most of that impact shouldn't have\\nhappened. PARC's personal computing work wasn't tied\
    \ to Xerox's core business.\\nDifferent technologies require different organizations, and Xerox wasn't set up to\\nscale\
    \ up and build a business around personal computing. The only reason it was\\nimpactful was because of a crazy set of\
    \ contingencies \\u2014 Steve Jobs's \\\"raiding\\nparty\\\" and Bill Gates quickly following suit.\\nOn the other hand,\
    \ the laser printer was aligned with Xerox's core business.\\nXerox already sold printers and copiers; the laser printer,\
    \ while a revolutionary\\nnew technology, was effectively a better version of those existing products. Xerox\\ncould leverage\
    \ its management structure, manufacturing apparatus, and sales\\nchannels to diffuse laser printers with relatively few\
    \ alterations.\\nThrough the lens of aligning with core capability, Bell Labs practically\\ncheated. AT&T's core capability\
    \ was the full stack of \\\"communications,\\\" so\\neverything from chemistry that kept telephone poles from rotting\
    \ to information\\ntheory that enabled more calls to fit into each wire was actually tied to the\\ncompany's core business.\
    \ Transistors had the potential to integrate directly into\\nAT&T's system and enable faster, cheaper service. Faster,\
    \ cheaper service was an\\nexistential priority for AT&T, because if it didn't continue to improve, the US\\ngovernment\
    \ would have an excuse to break them up.\\nI suspect that the existential threat criterion is a big factor in the difference\\\
    nbetween Google Brain and the organization formerly known as Google X. Better\\nmachine-learning technology directly ties\
    \ into Google Cloud services, search,\\nGmail, etc. While drone delivery and autonomous cars can potentially be big\\\
    nbusinesses, they are basically orthogonal to Google's core business.\\nThese criteria provide a springboard to briefly\
    \ explore some abstract but\\nimportant concepts that seem to apply beyond industrial labs to innovation\\norganizations\
    \ more broadly.\\nInnovation organizations need a money factory\\nInnovation organizations cannot depend on their outputs\
    \ for free cash flow. A\\ncore part of what makes them innovation orgs in the first place is that they create\\nthings\
    \ riddled with Knightian uncertainty 17 that aren't necessarily products.\\nTherefore, they need a consistent\\nexternal\
    \ funding source, a money\\nfactory,  29 if you will. These external\\nsources can be anything from repeated\\nequity-based\
    \ investments to a budget\\nfrom a parent org to an endowment,\\ngrants, contracts, or something else.\\nDon't all organizations\
    \ need a funding source? Well, yes. For your standard\\nvanilla business, that funding source is just the revenue from\
    \ producing a good or\\nservice and then selling it. Its cash flow is directly coupled to its output. Many\\norganizations\
    \ use financial tools to pull those cash flows from the future to the\\npresent (with some discount). These tools introduce\
    \ different levels of decoupling\\nfrom outputs \\u2014 from still tightly coupled short-term loans to loosely coupled\\\
    nequity investments. The latter case is so decoupled from output that equity\\ninvestments are a common go-to money factory.\\\
    nThere are two major differences between innovation orgs and other\\norganizations that force them to decouple funding\
    \ from output: They have a\\nsignificantly longer cycle time and much more uncertainty about their output.\\nAdditionally,\
    \ that output isn't necessarily a product that can be sold directly \\u2014 it\\nmight be a prototype, a process improvement,\
    \ or simply something that is hard to\\nmonetize without hamstringing its impact .\\nHistorically, it takes a long time\
    \ for actually new ideas to become valuable\\nthings out in the world.  30 This development time means that even if a\
    \ project is\\ngoing to become incredibly valuable, the organization creating it is going to be\\nilliquid for a long\
    \ time. However, the difference between innovation orgs and\\nother businesses is not just about time scales but also\
    \ about uncertainty. Large\\nenergy and infrastructure projects can take years to start making money, but the\\namount\
    \ of money they need to get there is fairly predictable,  31 so they can\\ntheoretically get the project done with one\
    \ lump of money and don't need a\\nconsistent source of cash. In addition to uncertainty about how long it will take to\\\
    npay off, new types of work differ from other long-term projects because of\\nuncertainty about whether they even will\
    \ generate a return or whether seeking\\nthat return is even a good idea if their goal isn't pure profit.\\nThe more an\
    \ organization looks like past organizations, the more accurately\\none can predict future performance based on a set\
    \ of leading indicators. By\\ncontrast, it's not clear at all what success metrics should be when you're creating\\nsomething\
    \ new. Unlike other long time scale organizations, an innovation\\norganization might never converge on a set of metrics!\
    \ It's almost tautological\\nthat if it is are consistently trying to create appreciably different new things then\\nthere\
    \ will consistently be new ways to evaluate those things.\\nDespite (and in part because of) their inherent uncertainty,\
    \ innovation orgs\\nneed their funding to be stable in addition to consistent. The stability may be just\\nas important\
    \ as the amount. People's incentives go haywire if they have money\\nfor now but don't know that it will continue. It\
    \ might seem that a solution would\\nbe to fund individual projects instead of an organization. Unfortunately,\\nuncertain\
    \ timescales mean that it's extremely hard to do one-shot funding for any\\ngiven project.  32 Innovation organizations\
    \ are divas: They want consistent cash\\nflows for inconsistent results. Through this lens, it makes sense why many\\\
    nrational people are hesitant to fund them in the way that they need.\\nAn innovation org's money factory needs to deal\
    \ not just with uncertain time\\nscales and illegible leading indicators but with the fact that a chunk of the money\\\
    nis inevitably going to be \\\"wasted.\\\" History shows that people are shockingly bad\\nat predicting which research\
    \ projects are going to be wildly valuable (either in\\nthe cash or impact sense) and which are going to be duds. Complicating\
    \ the\\nmatter is the fact that expectations of success or failure can feed back and either\\nhurt or help the project.\
    \  33\\nJust to recap: Innovation organizations need stable cash flows to support long-\\nterm projects with significant\
    \ Knightian uncertainty and illegible success\\nmetrics. Despite their diversity, these common characteristics make it\
    \ useful to\\nI'm using Knightian uncertainty in its\\nbroader sense \\u2014 situations where there is not\\nonly uncertainty\
    \ but you don't even know\\nwhat the probability distribution is or even\\nwhat axis to measure it on. See Risk,\\nUncertainty,\
    \ and Profit .\\n17.\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible to the\
    \ inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n9/61\\n\\nlump funding sources for innovation orgs together\
    \ into the idea of a money\\nfactory.\\nInnovation orgs need to be aligned with their money factories\\nAligned incentives\
    \ between an innovation org and its money factory is the only\\nway an innovation org can avoid crushing oversight and\
    \ have the ability to work\\non long-term projects. Playing the same game is the only way people can align for\\nextremely\
    \ long time scales, so if the innovation org is going to survive long term,\\nit needs to be playing the same game as\
    \ the money factory. The alignment also\\nneeds to be clear to the people who control the money and be on a time scale\\\
    nthat's acceptable to them. While deep research into the mysteries of the universe\\nmight be in the long-term interest\
    \ of the United States government, the\\ntimescale that matters to most politicians is their term in office. One of the\\\
    nreasons Bell Labs was able to be such an outlier is that AT&T's government-\\nsanctioned monopoly and purview over all\
    \ things communication meant that\\nthey were truly aligned with a large range of research.\\nThe more fund-strapped the\
    \ money factory is, the tighter the alignment needs\\nto be. When AT&T, Microsoft, or Google are flush with monopoly money,\
    \ they're\\nhappy to let people piddle around on whatever they wish. When stocks dip, the\\nfirst programs to get cut\
    \ are the ones that have the least plausible ties to the core\\nproduct. Expensive research needs to address an existential\
    \ threat eventually at\\nan organizational level to maintain support. Similarly, ARPA became DARPA in\\n1972 because of\
    \ the increased scrutiny on military spending both in the\\ngovernment and outside of it.\\nAlignment requires existential\
    \ threats\\nWhat does it actually mean for an innovation org to be aligned with its money\\nfactory? When not deciding\
    \ what their chaotic neutral bard will do when\\nconfronted by the town guard, people often use \\\"alignment\\\" as a\
    \ fuzzy suitcase\\nword. It doesn't need to be stuffed to the point of meaninglessness though \\u2014 as a\\nuseful concept\
    \ it boils down to the blunt question: Is maintaining this\\nrelationship holding off some existential threat?\\nIt's\
    \ useful to think about alignment in terms of James Carse's concept of \\\"finite\\ngames\\\" and \\\"infinite games.\\\
    \" 18 Each\\nperson and organization is playing\\ndifferent games \\u2014 whether the game is exploring the world or maximizing\\\
    nprofits. An existential threat is something that potentially brings your game to a\\ncrashing halt. Bluntly, the only\
    \ way for two entities playing different games to\\nhave the same goal is if one or both of the games would end if that\
    \ shared goal\\nwasn't met. That is, the goal addresses an existential threat. In the (grossly\\noversimplified) case\
    \ of industrial labs and corporations, corporations are often\\nplaying the \\\"maximize profit\\\" game. The labs are\
    \ often playing the \\\"create sweet\\ntechnology\\\" game. In reality, the two can only be aligned if the labs\\\" intermediate\\\
    ngoals either directly help the corporation maximize profit or enable the\\ncorporation to keep playing its game (by deflecting\
    \ antitrust litigation, for\\nexample).\\nOf course, \\\"existential threat\\\" is an extreme term that means different\
    \ things\\nfor different entities. You could think of an existential threat as an event or series\\nof events that could\
    \ end something that you really do not want to end. This\\n\\\"threatened thing\\\" can vary wildly in different contexts.\
    \ For companies, it could\\nbe an important revenue stream or the business itself. For an individual, it could\\nbe your\
    \ life or just the trajectory of your career. Clearly, what is existential is\\nrelative, and there's a continuum of importance\
    \ in the threats.\\nWhile it's abstract, I find this concept useful because it allows you to roughly\\nanalyze how \\\"\
    aligned\\\" two entities are and have blunt conversations about it.\\nExpensive research needs to address an existential\
    \ threat\\neventually at an organizational level to maintain the support it\\nneeds to be effective\\nIf alignment requires\
    \ existential threats and innovation orgs need to be aligned\\nwith their money factories , it follows that research efforts\
    \ need to address an\\nexistential risk to maintain support. I want to dig into what that means\\npractically.\\nA brief\
    \ aside: I'm going to focus on the realities of how innovation\\norganizations continue to get money in the door. It's\
    \ easy for the discussion to go\\ndown the track of \\\"Painkillers vs vitamins! If I'd asked people what they wanted,\\\
    nthey would have said \\\"a faster horse.\\\" Make things people want! Is physics\\nworthwhile if it never becomes a product?\\\
    \" And so on. These are questions of\\n\\\"What should a research organization do?\\\" which is important in its own right.\\\
    nHowever, the less-discussed question is \\\"What should a research organization do\\nto stay alive? \\\"\\nI wish this\
    \ section's header could be \\\"Research organizations  35 need to\\naddress existential threats to maintain support.\\\
    \" The statement is both simple\\nand bold; there are plenty of examples of research orgs that struggled with\\nsupport\
    \ because they didn't really address an existential threat (Dynamicland and\\nBP Venture Research come to mind). However\
    \ it's also not true: There is a large\\nclass of research organizations that maintain support but continue to limp along\\\
    nineffectively (Bell Labs still exists!) So perhaps \\\"Effective research organizations\\nneed to address existential\
    \ threats\\\" is more accurate. This would explain the\\ndifference between ARPA-E and DARPA and why Bell Labs declined\
    \ once it no\\nlonger staved off regulators, among other examples.\\nHowever! There are many examples of effective research\
    \ organizations that did\\nnot address existential threats. In fact, most great scientists were not actually out\\nto\
    \ address existential threats \\u2014 Galileo, Newton, Rutherford, Einstein, etc. They\\njust managed to cobble together\
    \ enough money from patrons or side hustles to\\nkeep going. Patreon-sponsored contemporaries are similar \\u2014 I give\
    \ some money\\nto support a few researchers, but they aren't addressing any existential threat for\\nme. The notable pattern\
    \ is that these examples are all individuals or small groups.\\nAha! It suggests that perhaps there is a nebulous threshold\
    \ below which effective\\nresearch can work off of \\\"throwaway\\\" money and above which people start\\nlooking at money\
    \ spent on research as \\\"buying\\\" something \\u2014 we could call this\\npoint \\\"expensive.\\\"\\nAnother potential\
    \ Achilles heel in this idea is the fact that often the work that\\nconvinces us outsiders that a research organization\
    \ is effective is often some of\\nthe least existential-problem-addressing work that the organization does:\\ntransistors\
    \ at Bell Labs, interactive computing at DARPA, etc. However, at the\\nsame time that it was inventing the transistor,\
    \ Bell Labs was discovering better\\nwire sheathings that saved AT&T billions of dollars, and DARPA was working\\nout\
    \ ways to detect nuclear explosions anywhere in the world at the same time\\nthat Licklider was seeding interactive computing\
    \ groups across the US. This\\ntension is worth noting because it's critical not to lash any single project too\\ntightly\
    \ to the importance of addressing existential threats at an organizational\\nlevel.\\nSo, the correct statement is perhaps\
    \ that expensive research needs to address an\\nexistential threat eventually at an organizational level to maintain support.\
    \ This is\\nquite the mashup of nebulous words, isn't it? It's important enough that it's\\nworthwhile to dig into each\
    \ piece.\\nWhat does it mean for research to be \\\"expensive'?\\nThe line delineating \\\"expensive\\\" is relative and\
    \ slippery, but there's definitely a\\nline. In large part, it's psychological. Buying something expensive causes you\
    \ to\\npause and consider. You care much more about its outcome. While your wealth\\nlevel absolutely factors into what\
    \ is expensive and not expensive, it's nothing like\\na 1:1 relationship. Someone who agonizes when cabbage prices go\
    \ from $0.69/lb\\nto $0.89/lb will buy a $500 phone without thinking about it. This same\\nphenomenon happens with corporations,\
    \ governments, investors, and\\nphilanthropists as well.\\nWhat does \\\"eventually\\\" entail?\\nMost organizations have\
    \ a grace period to piddle around. However, like the\\nborder between expensive and not-expensive, the length of this\
    \ grace period is\\nextremely fuzzy and liable to change at a moment's notice. Usually, when it's\\nconfusing why a corporation\
    \ or investor would be supporting work that is so far\\nfrom a product, it doesn't mean you're missing something; it means\
    \ the hammer\\nis about to fall. It's almost indescribable, but there is a distinct sense you get\\nfrom a startup or\
    \ new research lab that suddenly runs into the end of its grace\\nperiod \\u2014 it goes from feeling like Willy Wonka's\
    \ chocolate factory to ACME\\nChocolate Improvement Inc.\\n\\\"Eventually\\\" also raises a question about the frequency\
    \ of hits that an\\norganization needs to maintain, which seems to be a function of how big those\\nhits are and how existential\
    \ the threats they address actually are. DARPA has a 5\\u2013\\n10% program success rate, which I suspect it can get away\
    \ with because military\\nsuperiority is very important to the US government, while most charities need to\\nshow progress\
    \ every semi-annual fundraising season.\\nWhy do existential threats need to be addressed at an organizational level?\\\
    nThe organization needs to address an existential threat to its money factory  36\\nrather than any individual project.\
    \ Effective research organizations seem to build\\na portfolio of projects that address existential threats at a sufficient\
    \ rate to\\nmaintain the perception that they're addressing existential threats.\\nThis portfolio approach is clutch for\
    \ several reasons. There is uncertainty\\naround any given project as to whether it will address existential threats,\
    \ and\\nSee Finite and Infinite Games .\\n18.\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting\
    \ the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n10/61\\n\\noften, you can't honestly answer\
    \ that question a priori without doing some work\\nor strangling the project in the cradle. 19 Additionally, the projects\
    \ that directly\\naddress existential threats for funders\\nand those that are most interesting or\\nglobally impactful\
    \ are often disjointed.\\nAT&T didn't overwhelmingly benefit\\nfrom the transistor or the cell phone, nor did Xerox benefit\
    \ from the GUI. In the\\nsame way that winners pay for duds in a VC portfolio, aligned work can cover for\\nmisaligned\
    \ work if the alignment is considered at an organizational instead of a\\nproject level.\\nIf the organization produces\
    \ aligned hits at a sufficient rate, it ideally can\\ncreate a trusted hierarchy where the trust (and money) is flowing\
    \ down the power\\nladder. Congress trusts the DARPA director, who trusts the deputy director, who\\ntrusts the PM. The\
    \ PM doesn't need to get Congress's permission to start a\\nprogram, just the permission of the deputy director.  38 This\
    \ is why opacity is\\nimportant to DARPA's outlier success \\u2014 it can work on crazy ideas that would\\nnever get a\
    \ priori funding from Congress, but it needs to continually renew the\\ntrust to maintain that opacity by delivering as\
    \ an organization.\\nAnother way this manifests is through contract research organizations that\\nfund themselves through\
    \ contracts or grants but use that money to fund internal\\nresearch.\\nIn the past, industrial labs filled a particular\
    \ niche in the innovation ecosystem.\\nThere's a strong sense that, as of 2021, corporate R&D organizations  39 no longer\\\
    nfill that niche. However, these organizations (including Xerox PARC and Bell\\nLabs ) still exist, so we need a strong\
    \ argument that they no longer fill the\\nsolutions R&D niche.\\nI'll proceed by both looking at outputs and inputs. Industrial\
    \ labs are no longer\\nproducing the real-world outcomes they once did. However, that argument has a\\ncausality problem\
    \ \\u2014 it could be that labs are actually filling the same niche and a\\nconfounder is causing decreased output. This\
    \ confounder could be the same\\nthing driving stagnation in general. For example, if we really have picked a finite\\\
    namount of low-hanging fruit and Robert Gordon is right that the explosion of\\ngrowth between the late 19th and mid 20th\
    \ century was a one-off event. I want to\\nargue that, instead, the conditions that enabled industrial labs in particular\
    \ to do\\ngreat work no longer exist.\\nThere are many exceptions! AI research in particular is a glaring exception to\\\
    nthe decline of industrial labs, but there are many potentially amazing corporate\\nR&D projects happening around the\
    \ world.  40 One might argue that the\\nexceptions are the rule \\u2014 that there are just fewer technologies that would\\\
    nbenefit from healthy industrial labs (remember the low-hanging fruit\\nconfounder). It's impossible to prove definitively,\
    \ but I want to argue that the\\nniche industrial labs once occupied still needs to be filled .\\nGoing through the characteristics\
    \ of the niche we discussed previously :\\nMost industrial labs no longer work on general-purpose technology. The\\ntrend\
    \ is embodied by the founding memo Nathan Myhrvold wrote about\\nMicrosoft Research. 20 In it, he\\nexplicitly focused\
    \ Microsoft Research\\non advanced product development\\nand not cutting-edge research. This trend is also seen at the\
    \ organization\\nformerly known as Google X, where they pride themselves on killing ideas\\nquickly and then focusing\
    \ on a specific product. The trend toward product\\ndevelopment pushes corporate R&D more toward the same niche filled\
    \ by\\nstartups.\\nIndustrial labs no longer enable smooth transitions from crazy proofs of\\nconcept to manufactured\
    \ products . Either the labs are so incredibly separate\\nfrom the main organization that they have no advantage over\
    \ a startup or are so\\ntightly integrated that anything new is quashed. In the first case, there is no\\nsystematic way\
    \ for projects to move from the lab to the main organization.\\nInstead, they are forced to go through the same process\
    \ of \\\"finding a\\nchampion\\\" and fighting a bespoke uphill battle that any product going to\\nmarket faces. These\
    \ barriers create the same Valley of Death that the academic\\nproject spinning out into a startup path faces. In the\
    \ second case, labs are so\\njoined at the hip to the main org that they can't work on anything besides\\nincremental\
    \ improvements. 21\\nEchoing the previous point,\\nindustrial labs often no longer work\\non potentially game-changing\\\
    ntechnologies with tight feedback\\nloops . They're either doing show-off\\nwork that leads to nifty demos and papers\
    \ or grungy incremental work. To\\nposit a reason why: Technology improvement is no longer an existential\\nimperative\
    \ for most corporations. Today it's much easier for corporations to\\nacquire new technology through M&A because of relaxed\
    \ antitrust and a\\nvibrant startup ecosystem. Modern corporations also face very different\\npressures from AT&T in the\
    \ mid 20th century. AT&T benefited significantly\\nfrom creating better technology both because it was the key blocker\
    \ to its\\nexpansion and because the antitrust hammer was always waiting to drop if it\\ndidn't appear to be benefiting\
    \ the public. 22\\nIndustrial labs no longer provide a\\nfirst-class alternative to academia .\\nWith the exception of\
    \ the big AI labs\\nand maybe IBM research on\\nsuperconductors, there are few areas where working at an industrial lab\
    \ is as\\nacademically prestigious as being a professor. Like the shift away from game-\\nchanging technologies, I attribute\
    \ the declining prestige to the fact that\\ncutting-edge science and technology are no longer existential concerns for\\\
    ncompanies. The absence of an existential threat gives them little reason to hire\\nand keep the best and most ambitious\
    \ researchers, creating a downward spiral\\nwhere there are no A players and the labs become susceptible to the fact that\
    \ A\\nplayers hire A players and B players hire C players.  44 Additionally, the\\nincentive shift to focus more on product\
    \ development has created a cultural\\nshift away from participating in the scientific enterprise. 23\\nIndustrial labs\
    \ no longer enable\\ncontinuous work on 5+ year time\\nscales . There is a lot of literature on corporate short-termism\
    \ that I won't dig\\ninto. In short, most companies that have the resources to do research on a 5+\\nyear timeline are\
    \ disincentivized from speculative 5\\u201310-year projects through a\\ncombination of focusing on quarterly earnings,\
    \ competition, shareholders\\npushing companies to stick to their knitting, and the availability of M&A\\nopportunities.\
    \ Companies fail to support long-term research not just in the\\nobvious sense that the projects get canceled or never\
    \ started in the first place.\\nThe more insidious and common failure is that there's no level of planning for\\nhow promising\
    \ projects eventually become part of the core company so even if\\nthey're not canceled, they putter along forever.\\\
    nIn most cases, industrial labs no longer probe deeply into natural\\nphenomena and try to exploit them . Industrial labs\
    \ just don't do as much\\nscience. This isn't to say that industrial labs ever pursued scientific discovery\\nfor its\
    \ own sake, but in the past they perceived a direct line between scientific\\ndiscoveries and the health of the company.\
    \ I suspect that this perception is\\naccurate in most cases! The move away from Pasteur's quadrant could simply\\nbe\
    \ because we've exhausted exploitable phenomena and everything left is\\neither too big, too small, or too obscure to\
    \ make a difference at human time-\\nand-size scales. Alternatively, the move could be chalked up to a change in the\\\
    nnature of the companies and their products to be more specialized and less\\ndependent on exploiting new phenomena.\\\
    nAI research is an exception to the decline of industrial labs\\nAI research bucks the trend of the decline of industrial\
    \ labs as a place where\\nglobally important, cutting-edge work is done. If you squint, organizations like\\nFacebook\
    \ AI Research, Google Brain, DeepMind, and possibly OpenAI  46 bear\\nstrong resemblance to Bell Labs, Xerox PARC, and\
    \ other legendary industrial\\nlabs in their heydays. It's worth understanding why this resemblance exists in\\nthese\
    \ labs but not elsewhere to understand whether \\\"creating the new Bell Labs\\\"\\nis a reasonable goal in other disciplines.\\\
    nAI research can require massive resources \\u2014 in this case, it's the thousands of\\ndollars of compute for training\
    \ models and creating massive datasets to train on.\\nThese resource requirements mean that there is exploratory research\
    \ that people\\njust can't do with the resources available to most labs at universities. As a result,\\nindustrial AI\
    \ labs are a first-class alternative to academia with titans of the field\\nlike Yann LeCun and Samy Bengio joining FAIR\
    \ and Google Brain, respectively.\\nA similar effect pulled professors away from universities and into industrial labs\\\
    nin the first half of the 20th century.\\nThe book Loonshots introduces the concepts\\nof \\\"warty babies\\\" and \\\"\
    the three deaths,\\\"\\nwhich are incisive mental models of the\\nphenomena that lead to project-cradle-death.\\n19.\\\
    nIndustrial labs no longer fill the niche they did in the\\nearly-to-mid 20th century\\nThe memo is quite good, and available\
    \ here\\n.\\n20.\\nFor more on the first case, see the section in\\nLoonshots about \\\"Manage the transfer, not\\nthe\
    \ technology.\\\" For the second, see\\n\\\"Separate soldiers and scientists.\\\" (Have I\\nconvinced you to read it yet?)\\\
    n21.\\nSee \\\" Killing the Golden Goose? The\\nchanging nature of corporate research ,\\n1980-2007\\\" for an in-depth\
    \ exploration of\\nthis trend.\\n22.\\nSee \\\" The Decline of Science in Corporate\\nR&D\\\" for a more in-depth look.\\\
    n23.\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\\
    n11/61\\n\\nAt the same time, corporations running AI labs (reasonably) expect the\\nresearch to create value commensurate\
    \ to the costs of this research. Machine\\nlearning can directly improve the core product lines of all the companies listed\\\
    nabove, in the same way that Bell Labs\\\" work directly improved AT&T's \\\"System.\\\"\\nAdditionally, AI promises massive\
    \ value over long but not infinite time scales.\\nOpenAI's business model is implicitly based on the assumption that they\
    \ will\\ncreate literally infinite value in the not unforeseeable future.\\nThis alignment between their research and\
    \ money factories allows modern AI\\nlabs to do highly regarded work and collaborate closely with academia without it\\\
    nseeming like a waste of money. Bell Labs provided a home for work that led to\\nnine Nobel Prizes, often in collaboration\
    \ with universities. Today, AI conferences\\nare dominated by work from corporate AI labs, not just in quantity but quality\
    \ as\\nwell.\\nLike the electronics work at Bell Labs, AI research benefits from having\\nmultiple disciplines in the\
    \ same place with the people who will eventually\\nproduce it. When you're creating \\\"AI for X]\\\", it's generally\
    \ helpful to have\\nsomeone who is an expert in [X] around. Training and implementing ML\\nalgorithms at scale requires\
    \ a different skill set than creating and prototyping the\\nalgorithms. Corporate AI labs have the budgets to hire research\
    \ engineers, and\\nalso make it easy for researchers to talk to some of the best infrastructure and\\nproduction engineers\
    \ in the world. This dynamic roughly parallels the close ties\\nbetween Bell Labs and Western Electric and is effectively\
    \ the software version of\\n[\\\"Prototyping needs manufacturing in the room.\\\"\\nPerhaps the most uncomfortable parallel\
    \ is between AT&T's status as a high-\\nmargin, cash-printing monopoly and Google or Facebook's similar situation.  47\\\
    nAI labs provide more evidence that successful industrial labs can only exist in\\ndomains where there are large corporations\
    \ with monopoly-like profits. The\\ndecline of industrial labs in chemistry- and physics-related domains may have\\nbeen\
    \ caused by commoditization of those products. GE, DuPont, Kodak, and\\nothers\\\" share prices suggest that they at least\
    \ are no longer perceived as\\nmonopolies. However, monopoly profits \\u2192 high-quality corporate research isn't\\nthe\
    \ entire story, because you don't see a lot of high-quality non-product research\\ncoming out of Boeing or, arguably,\
    \ Amazon.  48 Perhaps the missing difference is\\nwhether or not the corporation perceives that it will benefit from significantly\\\
    nbetter technology. AT&T benefited significantly from creating better technology\\nbecause they had a pact with the government\
    \ that as long as they kept making\\nthe system better and did public-benefiting research, they wouldn't be broken up.\\\
    nI wonder what the counterfactual is \\u2014 if the government left them a monopoly\\nwithout the pact. While Google and\
    \ Facebook have no (publicly known)\\nagreement with the government, arguably Google's ad-fueled profit does depend\\\
    non them continuing to have the best search engine \\u2014 people have no loyalty to\\nGoogle beyond the quality of their\
    \ searches. Similarly, one could make an\\nargument that advertisers will abandon Facebook as soon as they have worse\
    \ ad\\ntargeting or the kids move to another platform, like TikTok or Snap.\\nMicrosoft is an interesting beast to examine\
    \ through this lens. It's\\nunconfirmed, but Microsoft Research (MSR) may have been started as a public\\noffering in\
    \ the same way Bell Labs was. Regardless, they explicitly set out to do\\nmore product-focused work than PARC, and Microsoft's\
    \ cash cows were\\nWindows and the Office Suite, both of which didn't benefit much from MSR\\nwork. MSR was subsequently\
    \ pretty neglected and used for stunts like China\\nexpansion. However, Microsoft's core business has begun to shift toward\
    \ cloud\\nservices, which do benefit from AI research, and it's becoming clear with things\\nlike GPT-3 that AI research\
    \ can augment Office Suite products that are now\\nactually under threat. This shift coincides with a partnership with\
    \ OpenAI 24 that\\nlooks a bit like the relationship\\nbetween AT&T and Bell Labs if you\\nsquint. Amazon remains a challenge\
    \ to\\nthis just-so story because it also has a\\nmassive cloud business but is not (publicly) doing as much speculative\
    \ AI\\nresearch.\\nThis narrative suggests an uncomfortable truth. Instead of declining because\\nof corporate short-termism,\
    \ speculative corporate R&D might depend on\\ncompanies with monopoly-like profits perceiving their fates as being intimately\\\
    ntied to a high-potential technology. This trifecta (monopoly profits + clearly high-\\npotential technology + that technology\
    \ being tied to the company's core business)\\ncan't be created by policy or even a cultural shift. The trifecta is the\
    \ most\\nstraightforward answer to the question \\\"Why hasn't Bell Labs been replicated?\\\"\\nand suggests that attempts\
    \ to \\\"create a new Bell Labs\\\" are doomed to failure if\\nthey try to follow the playbook too closely. At the same\
    \ time, I strongly suspect\\nthere are incredibly valuable technologies that don't clearly have high potential\\nto solve\
    \ an existential threat for a monopoly rentee but do need the environment\\nand resources that were once provided by healthy\
    \ industrial labs to realize that\\nvalue.\\nEven if it's true that in the past industrial labs filled a particular niche\
    \ in the\\ninnovation ecosystem , and tha industrial labs no longer fill the niche they did in\\nthe early-to-mid 20th\
    \ century , it doesn't necessarily follow that the niche still\\nexists or that it would be a good  50 idea to try to\
    \ fill it. It's possible that we've\\npushed human capability to a point that has rendered the solutions R&D niche\\nirrelevant.\
    \ If we have truly unlocked every phenomenon it's possible to exploit,\\neven Bell Labs in its full power would not have\
    \ impressive output. However, I\\nsuspect this isn't the case.\\nIt's hard to positively  51 answer the question \\\"\
    Is the niche once filled by\\nindustrial labs still valuable?\\\" Part of the nature of solutions R&D is that valuable\\\
    nwork is often not obvious. If we could point to an area of the adjacent possible 25\\nthat is uncontroversially valuable,\
    \ it\\narguably is no longer even solutions\\nR&D. So it's hard to point to specific,\\nclearly valuable solutions R&D\
    \ areas\\nthat are not being tackled. Instead, I'm\\ngoing to approach the question with\\nthe double-negative argument\
    \ that we\\nshould not believe that the reason the\\nniche has been vacated is because it is not valuable. I realize that's\
    \ a bit\\nconvoluted. It's like a negative-space painting where I cannot portray the\\nsubjects directly but instead suggest\
    \ their existence by filling in everything else.\\nFirst, let's take seriously the idea that the solutions R&D niche isn't\
    \ valuable\\nbecause we've picked all the low-hanging fruit that were once harvested by\\nindustrial labs. It has indeed\
    \ been many years since we have unlocked a new\\nphysical phenomenon for exploitation in the same way we tapped the electron\\\
    nand steam before it.  53 It could be that we've exhausted exploitable phenomena\\nand everything left is either too big,\
    \ too small, or too obscure to make a\\ndifference at human time-and-size scales. If this is the case, the enterprise\
    \ of\\ndiscovery has become decoupled from the enterprise of invention, and while\\nthere are big discovery projects to\
    \ be done, they will be purely for curiosity's\\nsake. If this is the case, all the possible new inventions shouldn't\
    \ require a lot of\\npiddling around in disciplines that border on science. This argument is plausible.\\nAfter all, companies\
    \ with science-based products still have labs: 3M, Corning,\\nKodak, and others. One would expect that if there were fruits\
    \ to be picked, these\\nlabs would be picking them. Instead, it looks like they're hanging out at the top\\nof their respective\
    \ S-curves and not producing new ones. DuPont gutting its\\nonce-legendary R&D department 26\\ncould be seen as a concession\
    \ to this\\nnew state of the world.\\nHowever, there is also evidence that a world where industrial labs no longer fill\\\
    nthe niche they once did was created by forces that were driven by shifting\\neconomic and cultural factors more than\
    \ a depleted adjacent possible.\\nSee \\\" OpenAI forms exclusive computing\\npartnership with Microsoft to build new\\\
    nAzure AI supercomputing technologies .\\\"\\n24.\\nThe niche industrial labs once occupied still needs to\\nbe filled\\\
    nThe \\\"adjacent possible\\\" (grossly simplified) is\\nthe set of possible states that a system can\\nenter, given its\
    \ current state. In the case of\\nscience and technology, it's the set of things\\nwe could possibly invent and discover,\
    \ given\\nwhat we've already invented or discovered.\\nThe concept was originally introduced by\\nStuart Kauffman in his\
    \ book Investigations .\\n25.\\nSee \\\" DuPont Will Dissolve Central\\nResearch.\\\"\\n26.\"\n  },\n  {\n    \"name\"\
    : \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\\
    n12/61\\n\\nThe decline of science in corporate R&D argues that increasing international\\ncompetition and pressure from\
    \ shareholders to specialize forced companies to\\ndecrease the scope of corporate R&D and shift toward more directly\
    \ product-\\nrelated work. The Microsoft Research memo is evidence for this scope shift \\u2014\\nmanagers realized that\
    \ Bell Labs and PARC-style R&D orgs were not actually\\ngreat for business. Jettisoning industrial labs from a purely\
    \ financial standpoint\\nalso makes sense when there are many perceived M&A opportunities to acquire\\nnew technology\
    \ instead of developing it in-house. The decision is further\\nsupported when labs no longer function as monopoly-preserving\
    \ peace offerings.\\nFew companies today meet the trifecta of conditions that healthy industrial\\nlabs require, and those\
    \ that do are existentially tied to bit-based technologies\\nmore than atom-based technologies. The companies with science-based\
    \ products\\nthat still have labs no longer command massive high-margin profits, forcing more\\nconservative work that\
    \ doesn't push far enough into the adjacent possible to\\nunlock new high-margin S-curves. It's possible that the conditions\
    \ for healthy\\nindustrial labs that focus on atom-based technologies could occur again, but\\ncreating those conditions\
    \ requires so many other contingent things to happen\\nfirst that it won't happen anytime soon. For example, it's possible\
    \ to imagine a\\nworld where a company has mastered a high-margin application of molecular\\nmachines, and to keep its\
    \ edge it needs to push ever farther into the realms of\\natomically precise manufacturing. However, even if that company\
    \ were to start\\ntoday, it would take a decade before it was at a point where it could create a\\nhealthy industrial\
    \ lab.\\nWhat about government labs? We haven't talked about them much, but\\ngovernment research is basically corporate\
    \ R&D for United States Inc. If there\\nwere valuable parts of the adjacent possible that industrial labs could explore,\\\
    nshouldn't we expect government labs to be filling the solutions R&D niche? Yes\\nand no. The US government technically\
    \ meets the conditions for healthy\\nindustrial labs \\u2014 it's a monopoly and benefits from value created in the US.\
    \ As\\none would expect, in areas where America feels an existential threat, National\\nLabs and other government research\
    \ organizations do actually look like healthy\\nindustrial labs. However, there are fewer areas where research can address\\\
    nexistential risk for a country than you might expect! If you look at National Labs\\nthrough the lens that Alignment\
    \ requires existential threats,\\\" everything makes\\nmore sense; National Labs  55 excel at work related to nuclear\
    \ weapons and\\nmilitary capability in general. Perhaps a bit cynically, arguably everything else\\nNational Labs do is\
    \ a nice-to-have but doesn't address an existential threat to the\\ngovernment.\\nIt's impossible to rule out the grim\
    \ possibility that we have depleted the areas\\nof the adjacent possible that solutions R&D can reach. However, there\
    \ is strong\\nevidence that even if there were fertile ground, industrial labs (including those of\\nUnited States Inc.)\
    \ would not be cultivating it. In this case, it's up to other\\ninstitutions to step boldly into the void.\\nIn the late\
    \ 20th century and early 21st century, industrial labs yielded more and\\nmore of their niche to a combination of academia\
    \ and newfangled \\\"startups.\\\" You\\ncan see this change in data on scientific publications (which have gone through\\\
    nthe roof in academia but steadily declined in companies, suggesting that\\nresearchy work has consolidated in academia)\
    \ or the number of mergers and\\nacquisitions (also through the roof, suggesting that large companies have\\nincreasingly\
    \ outsourced early-stage engineering work to startups). 27 A less\\nrigorous but more powerful way to see\\nthe change\
    \ is by cultural pattern-\\nmatching \\u2014 that the sorts of projects\\nthat you would once have expected to find in\
    \ an industrial lab are now either in\\nacademic labs or startups. Many people implicitly or explicitly believe that\\\
    nbetween academia and startups  57 the solutions R&D niche is filled. I once\\nbelieved that myself, but came to realize\
    \ that there are many projects that don't\\nfit within the constraints of either academia or startups. \\\"Things that\
    \ are too\\nengineering-heavy for academia and too researchy for startups\\\" is shorthand for\\none class of these projects.\
    \  58 By unpacking that term, I hope to convince you\\nthat the combination of startups and academia is insufficient to\
    \ occupy the niche\\nonce served by industrial labs.\\nAcademia revolves around scientific inquiry\\nA quick aside : \\\
    \"Academia\\\" is a nebulous term. It doesn't strictly refer to\\nuniversities. Instead, I use \\\"academia\\\" to cover\
    \ all the people and institutions\\nwho are playing the incentive game where you get points for papers, citations,\\nand\
    \ general adulation from other people who are playing that same game. In this\\nsense, you can participate in academia\
    \ partially; there are some professors who\\nare barely part of it beyond their institutional ties; there are people with\
    \ jobs\\nentirely unrelated to research who nevertheless are driven by academia's\\nincentives.\\nThe academic model is\
    \ built around scientific inquiry. Academics are\\nrewarded for moving information up the ladder of abstraction. 28 The\
    \ more\\ngeneral your theory or technique, the\\nmore you are praised. Unfortunately,\\nthe academic reward system is\
    \ at odds\\nwith the engineering design work you\\nneed to create useful products.\\nA schematic of scientific inquiry\
    \ vs. engineering design from Radical Abundance.\\nIn Radical Abundance , Eric Drexler presents this incredible chart\
    \ that\\ncaptures the contrasting dynamics of scientific inquiry and engineering design.\\nIn a nutshell, scientific inquiry\
    \ is a process where information flows from the\\nconcrete to the abstract, ideally resulting in an abstract model \\\
    u2014 the more\\ngeneral, the better; engineering design is a process where information flows from\\nthe abstract to the\
    \ concrete, ideally resulting in a physical system \\u2014 the more\\nuseful the better. Neither of these processes \\\
    \"precedes\\\" the other.  60\\nMoving down the ladder of abstraction clashes with academic incentives that\\nhave been\
    \ set up to support scientific inquiry. As a result, academic engineers\\ndefault to creating proofs of concept not as\
    \ a step toward a working system but\\nfor the sole purpose of validating general engineering principles or design\\nconcepts.\
    \ The whole working system is left as an exercise to the reader. Proofs of\\nconcept, general principles, and designs\
    \ are important! But they are a long way\\nfrom a useful thing out in the world. For context, proof of concept is level\
    \ three\\nof nine on NASA's Technology Readiness Scale. 29 More importantly, a proof of\\nconcept usually isn't enough\
    \ for a\\ntechnology to gain momentum by\\nattracting the money and effort to continue the process of engineering design.\\\
    nHere is where the Valley of Death raises its head again.\\nBecause academic engineering focuses on the top of the ladder\
    \ of abstraction,\\nfeedback loops that can only come from implementation are rare. A design can\\ncheck all the boxes\
    \ on a list of requirements (which makes it great for a paper)\\nbut completely fail to be a useful system.  62 My favorite\
    \ example of this takes us\\nback to the example in Prototyping needs manufacturing in the room\\\": Recall\\nhow perfect\
    \ right angles in cutouts are completely free (and the default!) in a\\nCAD model but are extremely hard to machine correctly.\
    \ These weirdly important\\nimplementation details are usually tacit knowledge that does not exist at higher\\nlevels\
    \ of abstraction. It gets \\\"abstracted away.'\\nNovelty is an important tool for moving up the ladder of abstraction,\
    \ but it can\\nbe a wrench in the gears of useful engineering design. When your goal is abstract\\nknowledge, anything\
    \ that's fully captured by existing understanding is worthless.\\nAs a result, academic work is always judged by \\\"\
    What are the new ideas here?\\\"\\nrather than \\\"Does it work?\\\" On the other hand, a reliability and success-\\nmaximizing\
    \ engineering rule of thumb is to use as few new things as possible to\\nget the system to work. This tension means that\
    \ academic engineers will not\\nwork on some ideas or bolt on unnecessary fancy techniques. Welding together a\\nbunch\
    \ of old ideas to get something to work is great engineering practice, but it\\ndoesn't create any general academic insight\
    \ and thus doesn't lead to papers,\\npromotion, or tenure.\\nAt the end of the day, ideas need to come out of a single\
    \ mind. The abstract\\nmodels at the pinnacle of scientific inquiry are effectively just well-justified\\nExisting Institutional\
    \ Structures are Inadequate\\nSee \\\" The Decline of Science in Corporate\\nR&D \\\" again.\\n27.\\nSee\\nhttp://worrydream.com/LadderOfAbstraction/\\\
    n.\\n28.\\nSee https://blog.benjaminreinhardt.com/trl .\\n29.\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"\
    text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n13/61\\n\\nideas. Scientific\
    \ mythology has further solidified the paradigm of theory leaping\\nforth from a single great mind like Athena from the\
    \ head of Zeus. Newton,\\nEinstein, Curie ... As a result,  63 academic culture prizes individual recognition,\\nnot team\
    \ output. In academia, citations and (especially first) authorships on\\npapers are the coin of the realm. These status\
    \ and reward mechanisms push\\npeople to make sure each piece of their work is recognized. Many engineering\\nprojects\
    \ require \\\"teamwork\\\" in the sense of putting your head down and doing\\nthe unsexy work that needs to be done without\
    \ remembering who did what. This\\nisn't to say that academics won't do unsexy work,  64 but it does need to culminate\\\
    nin something paper-worthy.\\nThere are an increasing number of academic papers with large numbers of\\nauthors, but there\
    \ is a roughly constant amount of \\\"esteem currency\\\" per paper,\\nso the career capital per author decreases as the\
    \ number of authors increases. 30\\nContrast the incentives in academia to\\nprofessional engineering, where reward\\\
    n(both status and monetary) is usually invariant to the number of people on the\\nproject. When someone says \\\"I helped\
    \ build the Falcon 9 Rocket\\\" or \\\"My\\ninstrument is on the Perseverance Rover,\\\" nobody asks, \\\"Ah, but how\
    \ many other\\npeople also worked on it? Were you first author?\\\" It's viscerally cool even if you\\njust tested one\
    \ non-critical part. When \\\"Does it work?\\\" is the biggest source of\\nrecognition, the incentive is to have as many\
    \ people working on a project as\\nnecessary to make it work.\\nAcademic constraints\\nIn order to build up our pattern-matching,\
    \ it's useful to explicitly enumerate the\\nconstraints that define the nebulous edge of academia's reach. By rights,\
    \ this list\\nneeds its own piece, and we touched on several of these points already, but they\\nbear repeating.\\nA lot\
    \ of engineering work is not novel. Spend enough time in research\\nseminars, and you'll inevitably hear many variations\
    \ on both \\\"Our work is novel\\nbecause...\\\" and \\\"Yes, but it's not really novel, is it?\\\" The word \\\"novel\\\
    \" is used as\\nan idea bludgeon in academia and weeds out many classes of ideas.\\nA non-exhaustive list of what gets\
    \ discarded by the novelty filter:\\nNew approaches to old, \\\"solved\\\" problems.\\nBetter implementations of an idea\
    \ that's already been implemented.\\nEfficiency improvements along a different metric than the ones the field\\nnormally\
    \ cares about.\\nScaling existing techniques.\\nCreating something for a specific applicationn as opposed to a general\\\
    nprinciple or purpose.\\nFurther work on things that have already gotten to proofs of concept.\\nIntegrating several already-existing\
    \ ideas into a single system.\\n1. engineering does not always get many citations. Even if work is novel enough\\nto be\
    \ published, low-citation ideas languish in obscurity. It's valid to ask, \\\"Are\\nthere things that are valuable that\
    \ don't get a lot of citations?\\\"Absolutely.\\nValuable projects that want to live in an academic lab but wouldn't get\
    \ many\\ncitations include:\\nProjects that are intermediate steps to a larger vision without a strong\"\n  },\n  {\n\
    \    \"name\": \"conclusion besides \\\"We did a thing!\\\"\",\n    \"text\": \"Engineering work in a theory-heavy field\
    \ or theory work in an engineering-\\nheavy field. More generally, work in a field that the field doesn't think is\\nvaluable.\\\
    nIdeas that are far out of mainstream. Even non-malicious people often don't\\nhave the bandwidth to dig in and see if\
    \ an idea from left field is worthwhile or\\nutter crackpottery. It's usually the latter, so the default answer is no.\
    \ (See the\\npoint about stepping too far outside the mainstream below.)\\nEngineering just asks, \\\"Does it work?\\\"\
    \ In academia, it's hard to publish ideas\\nthat are too outside of the approved way of doing things. Kuhnian paradigms\\\
    noutline a set of questions and the rules around answering them. 31 Ideas can stray\\ntoo far outside of accepted paradigms\\\
    nwhen they're asking different\\nquestions, or measure success differently than the ways the paradigm prescribes.\\nBoyden\
    \ et al.'s work with expansion microscopy 32 is a good example: Instead of\\nasking, \\\"How good can we make a\\nmicroscope's\
    \ resolution?\\\" they asked,\\n\\\"How big can we expand a sample while maintaining its structure?\\\"  68 It's also\\\
    nhard to publish work that doesn't fit cleanly into a disciplinary box. 33 It's too\\nmuch like discipline X to be published\\\
    nin a journal for discipline Y, but it's too\\nmuch like discipline Y to be published\\nin a journal for discipline X.\
    \ This\\nsituation is of course tricky because many (most?) ideas that go outside of\\nestablished paradigms are crackpottery.\\\
    nIt's hard to write a paper if you can't even get the money to do the research.\\nThe need to align with current funding\
    \ priorities is particularly pernicious in\\nacademia because most grant processes depend on politics and committees.\
    \ By\\ntheir nature, committees lead to median results, so committee-mediated grants\\nwill rarely fund unsexy outlier\
    \ work. One reason to write papers is to continue\\nplaying the game, so if a paper doesn't hint at your continued ability\
    \ to do work\\nthat aligns with funding priorities, there's less incentive to write it.\\nA project is unlikely to lead\
    \ to a paper if it's not within scope for a PhD\\nstudent or untenured professor. Graduate students are the labor force\
    \ in\\nacademic science and engineering. In exchange for cheap labor, grad students\\nexpect to produce research within\
    \ a 4\\u20137-year time frame that can help them\\nmove on to the next rung of the academic career ladder.  70 While a\
    \ tenured\\nprofessor might be willing to work on something crazy that will take 10 years and\\ncould be a complete dud,\
    \ no grad student would rationally work on it and no\\nadvisor with a student's best interest at heart would ask them\
    \ to. The incentive\\nfor PhD students to produce high-impact papers for the sake of their careers\\namplifies all the\
    \ other constraints; PhD students in science get most of their\"\n  },\n  {\n    \"name\": \"funding through research\
    \ grants, so their work is especially susceptible to grant-\",\n    \"text\": \"related constraints.\\nProjects whose\
    \ outputs are structured data or reusable code don't lend\\nthemselves to papers. Academic papers are built around the\
    \ process of scientific\\ninquiry, where collecting data and writing code are only in service of producing\\nan abstract\
    \ model or theory \\u2014 the more generalizable the better. There is little\\nreward to producing high-quality, reusable\
    \ datasets or code, despite the value\\nthey can create.\\nA project is unlikely to lead to a paper if it involves a lot\
    \ of coordination.\\nAcademia emphasizes individual agency. This is a good thing, but if a project\\ncannot be effectively\
    \ modularized, it will end up requiring a lot of grungy\\ncoordination work that doesn't count as a contribution unless\
    \ you're in charge of\\nthe project. A big reason to go into academia in the first place is to avoid having\\na boss and\
    \ because you like doing your own thing your own way. Obviously, there\\nare exceptions like the LHC, but that is a situation\
    \ where the experimental\\nparticle physicists are locked into a paradigm and have no other option.\\nCoordination aversion\
    \ hits especially hard projects that don't fit into a\\nparticular disciplinary bucket or require integration between\
    \ components built\\nin different labs. Projects of a particular scale require coordination by their very\\nnature.\\\
    nStartups revolve around growth\\nA startup is a company designed to grow fast. Being newly founded\\ndoes not in itself\
    \ make a company a startup. Nor is it necessary for a\\nstartup to work on technology, or take venture funding, or have\
    \ some\\nSee \\\" Paper Authorship Goes Hyper .\\\"\\n30.\\nSee The Structure of Scientific Revolutions.\\n31.\\nSee \\\
    \" Expansion Microscopy .\\\"\\n32.\\nI want to use the term \\\"antedisciplinary\\nscience\\\" from Sean R. Eddy's article\
    \ of the\\nsame name but relegated it to this footnote to\\navoid too many new words.\\n33.\"\n  },\n  {\n    \"name\"\
    : \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\\
    n14/61\\n\\nsort of \\\"exit.\\\" The only essential thing is growth. Everything else we\\nassociate with startups follows\
    \ from growth.\\n\\u2014Paul Graham, \\\"Startup = Growth\\\" 34\\nJust as academia revolves around scientific inquiry,\
    \ startups revolve around\\ngrowth. In our context \\u2014 filling the solutions R&D niche \\u2014 this focus on growth\\\
    ncreates several corollaries. Obviously, it does mean we're talking about companies\\nthat work on technology. And not\
    \ just software-driven, scalable-business \\\"tech\\\"\\nbut actual technology. A technology startup is unlikely to be\
    \ able to fund\\ndevelopment by selling products from day one. The company then needs to take\\ninvestment, short of extraordinary\
    \ circumstances, like being run by a\\nmultimillionaire or some kind of absurd government contract that pays in\\nadvance.\
    \ The only people who will make that kind of investment are institutional\\nVCs and individual angel investors. Raising\
    \ VC money then commits a startup to\\nhave some sort of \\\"exit.\\\" So, for our purposes, \\\"startup\\\" means \\\"\
    VC-funded\\nstartup,\\\" along with the consequent constraints.  72\\nThe coupling between startups and growth raises\
    \ the reasonable question: What about low-growth\\nsmall businesses? As we noted earlier the nature of innovation orgs\
    \ makes them dependent on an\\nexternal money factory . If a small business is doing self-directed R&D, they can't depend\
    \ on its\"\n  },\n  {\n    \"name\": \"results for free cash flow. If the company raises money, it implicitly binds itself\
    \ to all the startup\",\n    \"text\": \"constraints we will dig into shortly, even if it does not consider itself a high-growth\
    \ startup. If the\\ncompany forgoes investment and the founders are not extremely wealthy (e.g.: SpaceX), the company\\\
    nneeds early revenue from somewhere. The common move for bootstrapped companies that need to do\\nmore development is\
    \ to do consulting work to generate revenue that they then plow into\\ndevelopment. Unless it's wildly profitable, the\
    \ consulting approach severely limits the amount of time\\nand money that can be spent on development, possibly dragging\
    \ it out forever. SBIR grants are\\nanother option, but they are relatively small (order $1M over several years) and have\
    \ the same effect as\\nconsulting with small companies limping from one grant to the next. Some projects need effort above\\\
    na certain threshold to move forward!\\nStartup constraints\\nSimilar to the constraints on academia, this list deserves\
    \ its own piece! This list\\nis meant to enumerate the constraints on startups specifically in the context of\\nsolutions\
    \ R&D.\\nStartups need a convincing story for how the project's output produces a\\nmassive and competitive return on\
    \ investment over a reasonable time scale.\\nThe long-tailed nature of startup investing means that venture capitalists\
    \ need to\\nbelieve that any investment in their portfolio could potentially return the fund.\\nBut it's not even enough\
    \ to have great returns \\u2014 you need to have the best\\nreturns! That is, VCs don't need to hit an absolute benchmark\
    \ but instead need to\\ncompete against other assets like the stock market for LP (i.e., their investors)\\ndollars. If\
    \ the stock market is absolutely crushing it, LPs have less incentive to\\ninvest in higher-risk assets like tech startups.\
    \ As a result, VCs need to do\\neverything in their power to maximize their ROI, which includes not just how\\nmuch they\
    \ grew the principal but how long that growth took. As a result, the\\nsame dynamic plays out \\\"one level lower\\\"\
    \ with VCs now in the role the LPs once\\nheld. Many atom-based technologies have the same or higher risk as a software\\\
    nstartup but require more capital and have longer timelines. The cold, hard\\nnumbers often make SaaS businesses a better\
    \ investment.\\nStartups need to move fast. J. C. R. Licklider kicked off work on the ARPA\\nprogram that would go on\
    \ to build what we would consider \\\"modern computing\\\"\\nin 1962. Perhaps the first real \\\"value capture\\\" event\
    \ it led to was Apple's IPO in\"\n  },\n  {\n    \"name\": \"This trajectory would have been untenable as a startup. While\
    \ there is\",\n    \"text\": \"flexibility if a project's valuation continues going through the roof, VC fund\\nstructure\
    \ pushes for returns on 5\\u20137-year time horizons. Venture timescales often\\nlead to projects being pushed to focus\
    \ on a specific application or being acquired\\nbefore achieving the technical goals they set out to hit. There is nothing\
    \ wrong\\nwith focus or acquisition, per se, but they can lead to technologies failing to live\\nup to their potential.\\\
    nStartups need to capture the value they create. Markets are great, but there is\\nno law of economics that people can\
    \ always capture the value they create if they\\nare clever enough. 35 Innovation\\nrequires multiple people. Often, the\\\
    nperson who figures out how to make a\\nlot of money off of a discovery or\\ninvention is not the person who created\\\
    nit, nor are they even in the same\\norganization.\\nInnovations that change one or more components of a bigger system\
    \ or\\nprocess often make poor startups. A startup that is trying to improve or change\\na component of a bigger system\
    \ has two options. It either needs to convince\\nwhoever runs that system to adopt the change (which is especially hard\
    \ when no\\nparticular entity runs the system) or to build the entire system themselves with\\nthe change incorporated.\
    \ Obviously, the change needs to happen eventually, but\\nmany paradigm shifts (especially in complex systems) initially\
    \ lower performance,\\nat least on traditional metrics. Change happens either when the new paradigm\\nhas the time and\
    \ resources it needs to catch up to the old way of doing things or\\npeople pay attention to new metrics where the new\
    \ paradigm performs well. The\\nlatter usually only happens if they can see the new paradigm in action and realize\\nthat\
    \ the traditional metrics weren't capturing all the important features of the\\nsystem. Both of these options are hard\
    \ for a startup to pull off because each\\napproach requires significant time and resources before even getting hints\
    \ of\\ntraction. It's hard to get that time and resources because potential customers (the\\npeople running the systems\
    \ or consuming their outputs) will assert that the idea\\nis dumb right up until it's not.\\nSome innovations are just\
    \ hard to productize. Process innovations often fall\\ninto this category 36 \\u2014 especially those\\nthat don't depend\
    \ on new technology,\\nper se, but on a new way of doing the\\nsame thing with basically the same tools. The Bessemer\
    \ process, for example,\\nused the same crucibles, but you put different materials in them. Social process\\nchanges (like\
    \ Toyota's Kaizen method ) are even harder to productize. In these\\nsituations, the vast majority of the value generally\
    \ accrues to the end user. The\\nobvious advice would be to start a firm that's doing the end-to-end thing and\\noutcompete\
    \ the incumbents. While that should theoretically work, it often runs\\ninto the reality of extremely complex products\
    \ that you would need to reinvent\\nfrom the ground up (like if you had a better way of making passenger jets) or\\nheavily\
    \ regulated industries where it would take massive lobbying just to use a\\nnew process. A startup doesn't usually have\
    \ the time or resources to tackle these\\nscenarios. The alternative approach is to take on a change-management\\nconsulting\
    \ role, which usually doesn't capture enough value to be VC-fundable,\\nso it needs to be profitable early on. Additionally,\
    \ consulting runs headlong into\\nthe bootstrapping issues we already discussed.\\nStartups shouldn't tackle market, channel,\
    \ AND technical risk. New\\ntechnological paradigms usually face all three of technical, market, and channel\\nrisk. You\
    \ simultaneously need to develop the technology to a point where it's\\ncompetitive with alternatives, figure out who\
    \ wants to use it, and establish how\\nthey're going to buy it. All three are herculean tasks.\\nIt's common wisdom among\
    \ VCs that it's not a good idea to invest in\\ncompanies that are taking on more than one of these risks. 37 This heuristic\
    \ isn't\\nmisguided. The chance of failure goes\\nup dramatically when an organization\\ntries to tackle two, let alone\
    \ three, of\\nthose risks. Startups should only tackle\\none (or maybe two). The reason therapeutics-focused startups\
    \ can exist is that\\nthey have almost no channel or market risk; there is a well-established pipeline\\nfrom lab to acquisition\
    \ by a pharma company, and insurance companies are\\nguaranteed to pay for drugs that go through FDA approval and target\
    \ big\\nconditions.\\nhttp://paulgraham.com/growth.html .\\n34.\\n\\\"We conclude that only a miniscule fraction\\nof\
    \ the social returns from technological\\nadvances over the 1948-2001 period was\\ncaptured by producers\\\" \\u2014 William\
    \ D.\\nNordhaous, \\\" Schumpeterian Profits in the\\nAmerican Economy: Theory and\\nMeasurement .\\\"\\n35.\\nSee \\\"\
    \ Fundamental Manufacturing Process\\nInnovation Changes the World .\\\"\\n36.\\nIn addition, Jerry Neumann argues\\nconvincingly\
    \ that VCs rationally should avoid\\ntechnical risk in \\\" Productive Uncertainty .\\\"\\n37.\"\n  },\n  {\n    \"name\"\
    : \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\\
    n15/61\\n\\nAt the end of the day, the work you need to do to drive adoption of a\\ntechnology is often very different\
    \ from getting it to a certain performance level.\\nThe work priorities drive the type of organization you create. As\
    \ much as we like\\nto think that startups are about building technology, they are actually about\\nselling technology\
    \ and adopting it for specific markets so that they can do that\\nbetter.\\nMisconceptions about things that are too engineering-heavy\\\
    nfor academia and too researchy for startups\\nIt's common to use wacky ideas and long-term projects as examples of things\
    \ that\\nfall outside of both academic and startup constraints. This belief is pernicious\\nbecause there are many examples\
    \ of both getting support; people hold those\\nexamples up as evidence that the whole class of things that don't fit into\\\
    nacademia or startups doesn't exist.\\nLong-term projects get support if they hit consistent milestones, and they'll be\\\
    nable to capture a lot of the value they create if they succeed.\\nWacky ideas get support as long as they don't threaten\
    \ paradigms too much or\\nsomeone thinks they can make money off of them.\\nResearch projects that require a lot of people\
    \ or coordination as long as the\\nfinal product is a paper they can all put their names on.\\nResearch projects that\
    \ require some engineering effort as long as the\\nengineering effort resembles something that has been done before: building\
    \ a\\nbigger telescope/particle collider/linear accelerator/space probe, etc.\\nLurking in the firmament above any question\
    \ of institutional homes for researchy\\nactivities is the question of profit and value capture. Academic work is usually\\\
    nprofit-agnostic and defaults toward being \\\"open\\\" in a way that often clashes with\\ncapturing the value of the\
    \ work. Startup work needs to be eventually-profitable so\\nit defaults toward work whose value can be captured. Stepping\
    \ outside of existing\\ninstitutional structures creates a dazzling array of possible trade-offs. Profit\\nincentivizes\
    \ people and funds work but can warp incentives and feedback loops.\\nValue capture creates profit but can constrain diffusion\
    \ and types of work.\\nContext attenuates all of these trad-eoffs!\\nIf you want to maximize the amount of awesome, joy,\
    \ and wonder that\\ntechnology work creates (which I'll just refer to with the horrible but useful\\nshorthand \\\"impact\\\
    \"), what is the correct approach to profit and value capture?\\nThe topic quickly becomes ideologically saturated \\\
    u2014 some people view profit as\\nritually unclean, and others see it as just rewards or even a key metric for virtuous\\\
    nactions.\\nI want to step orthogonally to this ideological spectrum and unpack the\\nquestion: What is the relationship\
    \ between profit, value capture, and impact in\\nthe context of invention and discovery? Attacking this question isn't\
    \ just idle\\nphilosophizing; it can be a compass for navigating the idea maze by giving a\\nsense of high-level direction\
    \ while navigating around practical obstacles like\\nfiguring out how money works at a new kind of innovation organization.\\\
    nProfit is important for both practical and ideological reasons\\nPractically , profit increases organizational longevity\
    \ and robustness because it\\nmeans the organization is getting paid directly for what it does.  76 In other\\nwords,\
    \ profit makes organizations autocatalyzing . Profit is the most\\nstraightforward way for an organization to both keep\
    \ doing what it's doing and\\npossibly do more of it. If the organization is doing good work, profit is the most\\nstraightforward\
    \ way for them to continue!\\nProfit also lowers the opportunity cost of working on a project. As of 2021,\\nmost people\
    \ who have the skills to do important solutions R&D work always have\\nmuch better opportunities both in terms of pay\
    \ and status. They could either start\\na startup and roll the dice on a massive outcome or go work at a big tech\\ncompany,\
    \ get a position in finance,  77 or become a management consultant \\u2014 all\\nplaces where paychecks have the possibility\
    \ of being huge and there really isn't\\nany hit to prestige. Nonprofits and government organizations usually have\\nsignificantly\
    \ diminished pay scales because of tight budgets and convention.\\nAnecdotally, forgone salaries are one of the biggest\
    \ deterrents that keep people\\nfrom becoming DARPA program managers. While many people do forgo higher\\nsalaries to\
    \ do important work, many of them can only sustain the discomfort for\\nso long. For other excellent people, the opportunity\
    \ cost is too high. Profit\\nenables an organization to pay higher salaries, which in turn reduces opportunity\\ncost.\
    \ If more activities could be profitable, that could lower opportunity costs for\\nexcellent people to work on a more\
    \ diverse set of things.\\nIdeologically, there is a sense of justice when organizations and people who\\nmake the world\
    \ better are rewarded. \\\"Doing good is its own reward\\\" is not\\nuntrue, but it would be lovely if profitability matched\
    \ up more closely with value\\ncreation. It seems a little \\\"off\\\" that companies like Peloton (just to name an\\\
    nexample and not to call them out specifically) are valued at billions of dollars in\\nlarge part because of technologies\
    \ like screens, GUIs, and internet connectivity,\\nwhile the people who originally created those technologies aren't particularly\\\
    nwealthy. Anecdotally, I believe Robert Metcalfe is the only former PARC\\nemployee who became a centimillionaire, and\
    \ to my knowledge, no Bell Labs\\nemployees became fabulously wealthy from the work they did there.  78\\nEnabling (or\
    \ at least not maligning) profit from world-improving activities is a\\nkey that unlocks both profit's practical and ideological\
    \ benefits. However, there's\\na (perhaps productive) tension between whether profit should be an instrumental\\nor intrinsic\
    \ goal. Profit as an instrumental goal is the stance that \\\"ultimately we\\nwant more amazing things and profit is an\
    \ important tool to encourage people to\\nmake those things.\\\" Profit as an intrinsic goal is the stance that \\\"profit\
    \ is the just\\nreward for creating amazing things.\\\" The latter can problematically bleed into\\nthe stance that \\\
    \"any created value can and should be captured.\\\"\\nThose of us who primarily care about enabling more amazing things\
    \ in the\\nworld should be wary of this last point because it comes along with the corollary\\n\\\"And therefore, if you\
    \ can't capture value, you must be missing something, or it\\nwasn't worthwhile in the first place.\\\" Most of you probably\
    \ don't believe the\\nextreme corollary explicitly. However, it does tend to implicitly pervade the\\ndiscourse ,so I'm\
    \ going to spend a good chunk of time arguing against it. But\\nbefore I do, I want to argue that while profit isn't an\
    \ end goal like the Golden\\nFleece, it's also not a complete trap like the Hand of Midas. It's important to\\nacknowledge\
    \ that profit is critical for both organizational longevity and for\\ntechnology to diffuse into the world at all!\\nProfit\
    \ makes organizations autocatalyzing\\nAutocatalytic reactions are (chemical) reactions that produce at least one of their\
    \ own reactants.\\nAutocatalytic reactions are complicated!\\nProducing some of their own reactants makes autocatalytic\
    \ reactions easier to\\nsustain than other reactions. Arguably, life itself is one giant autocatalytic\\nreaction. Profitable\
    \ organizations are autocatalytic reactions because they\\nproduce the key ingredient you need to keep an organization\
    \ going: money. In\\neffect, profitable organizations become their own money factory . Autocatalytic\\norganizations are\
    \ more robust and ultimately have more leeway to take\\nunconventional actions.\\nProfit gives an organization as much\
    \ control of its own fate as possible. A\\nprofitable business has many different \\\"moves\\\" at its disposal that it\
    \ can use to\\nsurvive. It can build up cash reserves to hold it through down markets; it can sell\\nstock to raise cash;\
    \ it can shift products to adjust to changing demand; it can\\nWhat is the relationship between profit, value\\ncapture,\
    \ and impact in the context of invention and\\ndiscovery?\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\"\
    : \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n16/61\\n\\ngrow or shrink depending\
    \ on need. All of these moves are possible with minimal\\nregulatory restriction or third-party permission. These moves\
    \ can increase\\norganizational longevity, which in turn can enable an organization to take on\\nlong-term projects that\
    \ would otherwise be off the table. In addition, larger profit\\nmargins translate to more slack in the system for unconventional\
    \ actions. Low-\\nmargin organizations (rationally) avoid rocking the boat because they can quickly\\nbecome unprofitable,\
    \ while high-margin organizations can afford failed\\nexperiments.\\nOn the other hand, if you are funding operations\
    \ from sources besides profit,\\nyou're obligated to one or more entities that care about something besides the\\norganization's\
    \ output. Some of these sources include purchasing debt, selling\\nequity, or soliciting donations. Ideally, incentives\
    \ are aligned even in this\\nsituation, but \\\"reaper functions\\\" 38 \\u2014\\nthe real reasons, often unspoken, why\\\
    npeople are promoted or fired \\u2014\\ndominate other incentives. At the end of the day, equity investors care about\
    \ their\\nshare prices going up, debtors care about being paid back, and donors care about\\nfeeling good.\\nThe only\
    \ way for an organization to become autocatalyzing without being\\nprofitable would be to somehow amass a war chest large\
    \ enough to fund\\noperations out of interest on its principal. Looking at a list of the longest-lived\\norganizations\
    \ in the world, they're overwhelmingly profitable companies that\\nmake and sell goods people want (usually food or alcohol)\
    \ and universities with\\nendowments. 39\\nOn top of flexibility and long-term\\nsurvivability, profit also creates an\
    \ extremely tight feedback loop between an\\norganization and the outside world. 40\\nArguably, cold, hard cash is one\
    \ of the\\nonly metrics that isn't automatically\\nsubject to Goodhart's Law 41 \\u2014 if your\\norganization's goal\
    \ is genuinely selling\\na product or service, profit is a hard\\nmetric to game short of literal fraud.\\nWhile it's\
    \ nowhere near as useful as actual profit, aiming for eventual\\nprofitability can still contribute to organizational\
    \ longevity. Practically, it's both\\neasier and less organizationally risky to raise capital if you're aiming to become\\\
    n(or better yet, are) profitable. Many people are more open to parting with their\\nmoney if they think of it as an investment\
    \ instead of a donation. And obviously,\\nthe less uncertain and closer to the present that profit is, the less you need\
    \ to pay\\nfor that money. In the context of talking to people about riffing on ARPA, I've\\ngotten \\\"Can I invest?\\\
    \"many times, but rarely \\\"Can I donate?\\\" Of course, targeting\\neventual profitability can also backfire from an\
    \ organizational longevity point of\\nview!\\nThe trick is threading the needle between organizational goals and what\\\
    npeople will actually pay for. We tend to laud organizations that have pulled this\\noff \\u2014 they become household\
    \ names, like Apple, SpaceX, and Zappos. It's pretty\\nclear that they are better equipped to deliver delightful electronics,\
    \ spaceflight,\\nand internet shoes than a nonprofit with the same goals. Alignment is easy if\\nyour organizational goal\
    \ is \\\"make as much money as possible,\\\" but that is often\\nnot the case for organizations in the 21st century that\
    \ are often started to fulfill\\nsome mission \\\"and make money while doing it.\\\" Most of you reading this\\nprobably\
    \ lean toward the latter category. I suspect that an underlying point of\\ndisagreement between people who laud profit\
    \ and those who denounce it is over\\nhow feasible it is to align organizational goals and profitability. It's easy to\
    \ to get\\nsucked to one end of the spectrum or the other: either the view that it's possible\\nto align profit and other\
    \ goals in almost every situation or that profit inevitably\\ndistracts from other goals. Like most dichotomies in complex\
    \ systems, the\\nanswer is, \\\"It depends.\\\"\\nSomeone needs to buy manufactured technology eventually in\\na monetized\
    \ economy\\nProfit is also an integral part of getting technology out into the world. The only\\nway that a technology\
    \ ends up being used by people who didn't build it is if it's\\nsold or given away. The former situation is far more common.\
    \ In either situation,\\ntechnology needs to be \\\"productized\\\" \\u2014 ie., made legible and useful for people\\\
    noutside the organization. If it is going to be sold on an open market, it also needs\\nto be \\\"commercialized,\\\"\
    \ i.e., made cheap and desirable enough that it makes\\nsense to sell it in the first place. Empirically, profit-seeking\
    \ organizations have\\nmuch stronger incentives to do commercialization well. As a result, profit is\\nalmost always part\
    \ of technology out into the world.\\nThere are exceptions, of course. The major exception happens when a\\ntechnology\
    \ is created and used entirely internally to an organization. Many of the\\ninternal tools used at Google are entirely\
    \ created, manufactured, and used\\ninternally. Other exceptions, like open-source software, are harder to categorize.\\\
    nFirms create technology barter deals with one other. At-home manufacturing\\ncompletely breaks the model. (Although arguably\
    \ that would just be a trend\\ntoward a less monetized economy, rather than an exception to the rule.)\\nIt's a common\
    \ perception that the military creates internal technology similar\\nto Google and sits outside the market as an unmoved\
    \ mover of technology. The\\nUS government's version of internal technology creation is less clean than\\nGoogle's. The\
    \ government does own R&D labs it uses to create some technology\\nthat it specifically needs. However, the government\
    \ contracts out much of its\\nR&D and all of its manufacturing to external firms (as opposed to owning the\\nmanufacturing\
    \ plant and giving it a budget).  83 So even military technology is\\npurchased eventually. The firms that sell to the\
    \ military need to pay their bills, so\\nthe costs do matter (though cost-plus contracting distorts this). If the military\\\
    npaid less than the cost of the goods, the firms would go out of business. While the\\nUS military spends hundreds of\
    \ billions of dollars a year ($934B in 2019), it does\\nnot have infinite money. So while they are weaker, I'd argue that\
    \ the forces of\\nmarket discipline do act on military technology \\u2014 if it becomes cheaper for the\\nsame quality,\
    \ it will be used more.\\nIf this view is correct, it means that in a monetized economy,\\ncommercialization is an essential\
    \ step on a technology's path to adoption. There\\nis an implicit feeling among some technologists  84 that commercialization\
    \ is a\\nlesser activity for people just out to make money. Instead, it should be seen as a\\ncritical part of the cycle.\\\
    nMarket discipline is a double-edged sword\\nMarkets are implicitly entangled in any line of thought around\\ncommercialization\
    \ and profit. They are, of course, where you buy and sell goods.\\nThe most interesting thing about markets for thinking\
    \ about enabling better\\nsolutions R&D (and invention and discovery more generally) is market discipline.\\nRather than\
    \ the narrow, technical definition that nobody knows, I'll be using it in\\nthe colloquial, nebulous sense of: \\\"She\
    \ wanted to build an entire new computing\\necosystem, but market discipline forced her to release subpar imitation of\\\
    nexisting products\\\"; \\\"Resisting market discipline, she built the technology\\neverybody thought was stupid but turned\
    \ out amazing in the end\\\"; \\\"Market\\ndiscipline honed the organization into a lean, mean, product-producing\\nmachine.\\\
    \" Market discipline can make organizations strong and efficient, but it\\ncan also crush eventually-productive creativity.\
    \ Discipline enabled the Spartans\\nto crush the Athenians in the Peloponnesian War, but do we want a world made\\nof\
    \ only Spartas?\\nDecoupling from market discipline is like cave diving\\nNote that I have never gone cave diving. I am\
    \ not that cool.\\nMarket discipline is embodied in Y Combinator's motto: \\\"Make something\\npeople want.\\\" It's a\
    \ good heuristic for hewing to market discipline even before\\nmaking money. Paradoxically, there are many counter-aphorisms,\
    \ like the\\napocryphal Henry Ford quote, \\\"If I asked people what they wanted, they would\\nhave said \\\"a faster\
    \ horse.'\\\" The resolution to this paradox is, \\\"Make something\\npeople want at some point in the future.\\\" In\
    \ the long run, someone needs to buy\\nsomething downstream of any \\\"useful\\\" work, so by definition they need to\
    \ want\\nit! However, the whole time you're not making something people want, you are\\nburning resources. The question\
    \ then becomes: What is the thing people want in\\nthe future and can the technology or idea survive long enough to get\
    \ there?\\nCave diving feels like a great analogy for the process. While you're going\\nthrough the cave, you're using\
    \ oxygen. If you run out before you reach the next\\nair pocket, you're dead. Working on a product you can always test\
    \ against the\\nmarket is like normal diving \\u2014 you can always come up for air, and maybe you\\nneed to get the timing\
    \ right so you don't get the bends.\\nPerhaps it's torturing the analogy, but there are some interesting concepts to\\\
    npull back from cave diving. The longer the path, the better you need to plan. If\\nit's a short hop and you can see where\
    \ you're aiming, you don't need to plan as\\nmuch. If you know that there are lots of possible air pockets, you have the\\\
    nfreedom to explore more. Similarly, if the technology has lots of market \\\"exit\\nramps,\\\" you can do more exploration.\
    \ Software is uniquely repurposable which\\nmight offer an explanation for why agile product development makes sense for\\\
    nsoftware but perhaps not in other situations. Having a precise idea of where\\nPeter van Hardenberg minted this excellent\\\
    nterm.\\n38.\\nSee \\\" The Data of Long-lived Institutions .\\\"\\n39.\\nJason Crawford argues that cash flow also\\\
    ncreates the tightest possible feedback loop\\nwith the world outside the organization.\\n40.\\n\\\" When a measure becomes\
    \ a target, it ceases\\nto be a good measure .\\\"\\n41.\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\"\
    : \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n17/61\\n\\nyou're going is\
    \ very important. Even if you don't know the exact way, you need to\\nkeep your bearings toward where you're going.\\\
    nMany of DARPA's outlier results were things that nobody was\\nasking for\\nDARPA works on programs that go against the\
    \ established paradigm. DARPA has\\nworked on things unasked for by both the military and industry. Often people\\nwho\
    \ have become comfortable with one way of doing something are not asking\\nfor them to come in and change it or actively\
    \ resist the change.\\nThree examples of this are:\"\n  },\n  {\n    \"name\": \"Drones : DARPA had a drone program in\
    \ the 80s. DARPA transferred the\",\n    \"text\": \"program to the Navy where it was discontinued, but DARPA continued\
    \ to work\\non drones until the military paradigm shifted and suddenly they were incredibly\\nuseful.\"\n  },\n  {\n \
    \   \"name\": \"Optoelectronics : In this case, it was businesses that weren't asking for\",\n    \"text\": \"optical\
    \ multiplexing. AT&T and IBM had worked on multiplexing but had budget\\ncrunches and didn't see value in it. DARPA supported\
    \ optoelectronics work from\\n1985 to 2005 (20 years!).\"\n  },\n  {\n    \"name\": \"Personal computers : Nobody was\
    \ asking for most of the pieces of the\",\n    \"text\": \"Mother of All Demos. 42 Instead of\\ncollaborative shopping\
    \ lists and voice\\ncalls, the military wanted a computer\\nthat could help commanders\\nunderstand what was happening\
    \ with nukes and battles.\\nThe upshot is that you can't apply the normal maxim of \\\"Make something\\npeople want\\\"\
    \ to an ARPA program and seek out \\\"customer validation.\\\" This\\nmissing feedback loop is tricky because you do need\
    \ to make something people\\nwant ... eventually.\\nProfit maximization can hamstring technologies whose impact\\ndepends\
    \ on them spreading as far as possible\\nProfit-focused organizations are incentivized to try to capture as much of the\\\
    nvalue they create as possible. At the end of the day, both a startup's valuation and\\na corporation's share price are\
    \ both theoretically based on future cash flows and\\nprofits. Of course, profit-maximizing organizations are not mindless\
    \ greed-\\nmonsters. In many situations, giving up short-term profit can actually lead to\\nlonger-term revenue. Ideally,\
    \ these organizations would be able to sit at some\\npoint on the trade-off curve that maximized value by maximizing impact.\
    \ Profit-\\nmaximizing organizational structures can also be the best way to support a\\ntechnology!\\nHowever, there\
    \ are four mechanisms that can lead to for-profit companies\\nhamstringing technological advancement, despite other aspirations.\\\
    n1. Specialization: Generally, it's a good idea for a for-profit business to start\\nwith a single product and a specific\
    \ market or niche. This good business practice\\nmeans that outside of a large company with an R&D department, most of\
    \ the\\ndevelopment work should be focused on productizing a technology for a specific\\ntask. Startups who want to start\
    \ by building a platform or doing all the things tend\\nto go down in glory-seeking flames. Specializing technology for\
    \ a specific task is\\nnot inherently a bad thing! It's also possible to thread the narrow path of\\nincreasing generality,\
    \ starting from a small niche and jumping to bigger and\\nbigger applications over time. Elon Musk is the master of this.\
    \ However,\\ncompanies rarely avoid getting stuck in one of those niches, especially if the\\nniche isn't profitable enough\
    \ to support R&D on the more general technology.\\nThis situation happens all the time to university spinoff technology;\
    \ it often\\nneeds more general development to reach a certain performance threshold, but it\\ngets stuck in a niche in\
    \ order to build a company. I've seen this trap ensnare\\neverything from multi-material 3D printers to biosensors and\
    \ home robots.\"\n  },\n  {\n    \"name\": \"Investor pressures: For-profit companies working on technology generally\"\
    ,\n    \"text\": \"need investors because they won't turn a profit for at least several years after\\ngetting started.\
    \ These investors have their own incentives, and maximizing the\\nimpact of a technology generally is not the most important\
    \ one. Investors can\\nhave specific timelines for an exit, need to show growth to their investors in order\\nto raise\
    \ a new round, or just have opinions about where the technology should go\\nthat conflict with maximizing impact. (Of\
    \ course, any source of money comes\\nalong with its own set of pressures!)\"\n  },\n  {\n    \"name\": \"Capturing value:\
    \ For-profit companies need to capture some value that they\",\n    \"text\": \"create! It is rare that an organization\
    \ can both forgo significant value by making\\nkey parts of a technology public and make money at a rate that both satisfies\\\
    ninvestors and can fund the development of general-purpose technologies. I will\\nargue later that there is a significant\
    \ class of innovations that would create\\ndrastically less value for the world if their value had been captured by their\\\
    ncreators .\"\n  },\n  {\n    \"name\": \"Speed : An organization could detect all of the traps listed above and forgo\"\
    ,\n    \"text\": \"trying to maximize profit, not take investment, and make most of its technology\\nwork public, pulling\
    \ in revenue through non-exclusive license fees and\\nconsulting work. Unfortunately, this strategy can hamstring the\
    \ technology\\nyou're working on in a different way, limiting general-purpose development to\\nthe work that can be done\
    \ when you have particularly lucrative contracts. As a\\nresult, technology development slows to a crawl. Many aerospace\
    \ technologies\\nseem to get stuck in this particular trap!\\nWe stand on the shoulders of too many giants to give them\
    \ all\\ncredit\\nIf you wish to make an apple pie from scratch, you must first invent the\\nuniverse.\\n\\u2014Carl Sagan\\\
    nShould the neighbor who had a cross-fence conversation about a process she\\nuses at work that sparked the realization\
    \ that led to the invention capture some\\nvalue? She was certainly instrumental to its success. What about the technician\\\
    nwho knew how to twist the wire in just the right way to get the first proof of\\nconcept to work?\\nAnd what about all\
    \ the failed projects that left a pile of skeletons indicating\\nwhere the traps were?\\nIt might be possible for software\
    \ companies to go through their tech stacks\\nand enumerate the open-source projects that they use and who contributed\
    \ to\\nthose. However, there is still a ton of illegibility around what fraction of the value\\neach project contributes,\
    \ how much each contributor to the project contributed,\\nand a million other considerations. And outside of software\
    \ it gets even more\\ngnarly.\\nThe multiplicity of people involved in creation leads to a contradiction that I\\nsuspect\
    \ is fundamentally unresolvable.\\nOn the one hand, one person or class of people do not deserve credit for an\\ninnovation.\
    \ The iPhone needed Jobs and Ive and all the engineers and designers\\nat Apple and the team at Xerox PARC and all the\
    \ people who invented the\\ntransistor and all the folks at Intel and other places who made it cheap and\\neverybody at\
    \ Corning who made gorilla glass and ...\\nOn the other hand, credit is really important for motivating people and\\nenabling\
    \ us to wrap our human brains around the world.\\nIt is hard to capture value from research\\nKnowledge is non-rivalrous.\
    \ Your knowledge of airplane building does not\\nprevent me from knowing how to build an airplane. Once knowledge is no\
    \ longer\\nsecret, it generally becomes non-excludable as well. As a result, a lot of research\\nresembles a public good.\
    \  86\\nAt the same time, value capture is important for incentivizing and funding\\nresearch. At an organizational level,\
    \ it's easier to fund research if it there's a\\nchance will eventually generate returns. At an individual level, money\
    \ is coupled\\nto both status and quality of life. People with the skills to do research often have\\nlucrative alternatives.\
    \ So all things held equal, capturing the value from research\\nis useful. Unfortunately, all things are not held equal.\\\
    nThe primary way to capture a public good's value is to privatize it. However,\\nprivatizing research is tricky. Current\
    \ value capture mechanisms are crude \\u2014 to\\ncapture value from research, you need to either patent it and enforce\
    \ that patent\\nor build a product around it. Researchers and research organizations can also\\nindirectly capture some\
    \ of the value they create through credit and status that\\ncan convert to consulting gigs and speaking fees. All of these\
    \ value-capture\\nmechanisms introduce different sorts of friction. That friction doesn't mean that\\nwe shouldn't try\
    \ to capture value from research, but that it's important to\\nconsider the effects of value capture on the research and\
    \ its impact. I'll dig into\\neach mechanism to show you what I mean.\\nPatents\\nPatents only apply to research that\
    \ directly goes into a product, but there is a\\nlot of work (and failures) by different people and organizations that\
    \ eventually\\nleads to the patentable research. Bluntly, we stand on the shoulders of too many\\ngiants to give them\
    \ all credit , which makes it impossible for all the people who\\npave the way for research to get a kickback from patents.\
    \ Large R&D labs\\namortize some of this work, but the modern system of startups and academia\\nThe Mother of All Demos\
    \ was Douglas\\nEngelbart's 1968 tour de force in which he\\ndemonstrated the majority of what has\\nbecome modern computing.\\\
    n42.\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\\
    n18/61\\n\\nfractionalizes the work and weights the rewards towards the people at the end of\\nthe chain who directly\
    \ contribute to the final patent or spin out a startup. While\\nweighting the rewards towards end products is great at\
    \ incentivizing that final\\ngrindy push, it disincentivizes targeted piddling around . Consider also that\\nresearch\
    \ projects often need to be combined with other research to create\\nsomething really valuable. The entire point of patents\
    \ is to create a \\\"toll\\\" on\\ncombining intellectual property with other knowledge. As the saying goes, \\\"if you\\\
    nwant less of a thing, tax it.\\\" While any single licensing fee can be painful but\\nreasonable, combined they can make\
    \ an invention no longer worthwhile and kill\\nit in the cradle.\\nFinally, capturing value with a patent can be wildly\
    \ inefficient. In an ideal\\nsituation, someone building a product that incorporates the patented process\\ncomes to you,\
    \ the two of you negotiate a licensing deal, and they send you a\\ncheck every year. The world is not ideal. Often, you\
    \ need to find people who are\\nviolating your patent and threaten to sue them if they don't pay up. Standard\\nlawyer\
    \ advice  87 when building something is to not look for prior art because it\\ndecreases your liability in case you happen\
    \ to reinvent something. Even if\\nsomeone does come to license your patent, the negotiation over licensing terms\\ncan\
    \ be brutal \\u2014 there are no standard terms and especially for a startup it can\\ncreate a drag chute on a product's\
    \ profitability that makes an already hard job\\neven harder. Once the licensing agreement is signed, you still need to\
    \ make sure\\nthat the company is paying you the royalties you're due and sue if they're\\nskimping you. Many inventors\
    \ have spent a lot of their lives in court over patents\\n88 and some, like Charles Goodyear  89 , wind up dying destitute\
    \ regardless.\\nProducts\\nIn order to capture research value with a product, the research needs to make a\\nsingle product\
    \  90 better than its alternatives. Unfortunately, products rarely\\nsucceed on the quality of their new technology alone.\
    \ Instead, products are\\ncoupled to companies, leading to many other factors that affect the value\\ncaptured by the\
    \ researchers besides the research itself, or even the product.\\nMarkets, sales channels, margins, fundraising, perception,\
    \ etc. all make or break\\ncompanies independent of their products.\\nJust as it's a long and windy road to a productizable\
    \ piece of research, it's also a\\nlong, windy, and narrow road to successfully productizing that research.\\nArguably,\
    \ the work to productize the research is equally or more valuable than\\nthe research itself. The unfortunate consequence\
    \ is that the best technologies\\ndon't always win! And even if they do, the value of the research as a fraction of\\\
    nthe company's value is often small.\\nSlight Tangent: Pharmaceuticals are usually figure 1 for \\\"capturing value from\\\
    nresearch.\\\" However, pharmaceuticals are unique in their productizability. It's\\neasy to trace new molecules back\
    \ to the scientists in the lab and those molecules\\nare patentable. Drugs demand relatively little work to go from research\
    \ to a\\nproduct. You don't need to worry about design aesthetics, usability or user\\npersonas when taking a drug to\
    \ market. Scaling, manufacturing, and tweaking are\\nof course hard and should not be ignored. If the drug does what it\
    \ says there is\\nclose to zero market risk \\u2014 people don't like to die. The standardized FDA\\napproval process\
    \ combined with the Pharma-insurance complex means that there\\nis almost no channel risk either. This is all to say that\
    \ pharmaceuticals might not\\nbe the best exemplar for capturing value from research.\\nIndirect Value Capture\\nResearchers\
    \ can also capture value from their research by consulting with\\ncompanies who could benefit from that research, getting\
    \ speaking fees, selling\\nbooks, and just generally acquiring social status. While in ways this can be good\\nbecause\
    \ it encourages people to spread knowledge as far and wide as possible,\\nthose same forces also incentivize exaggeration,\
    \ sensationalization, and at worst,\\nfalsification (see: the replication crisis.) Indirect value capture also pushes\\\
    nresearchers to try to grab all the credit for themselves. Instead of trying to create\\na monopoly on the research itself,\
    \ researchers can capture monopoly rents on\\nresearch credit.\\nIs uncapturable value actually valuable?\\nThere's a\
    \ common implicit (and sometimes explicit) view that if a piece of\\nresearch doesn't lead to a valuable product or patent\
    \ then it isn't valuable itself.\\nCaveat! This entire section is of course, adopting the larger stance that the\\npurpose\
    \ of research is to be valuable, which isn't true! I'm going to sidestep a\\nbigger discussion of why knowledge and discoveries\
    \ that will never save single\\nlife or create a single dollar of GDP (What does the sex life of snails look like?\\nWhat\
    \ happened before the Big Bang?  91 ) are still incredibly important. Instead,\\nI'm going to stay within the restricted\
    \ framework of \\\"valuable research.\\\"\\nFor research to be valuable, it needs to somehow end up in a product.\\nRemember,\
    \ someone needs to buy manufactured technology eventually in a\\nmonetized economy . However, there are many pathways\
    \ by which research can\\neventually end up in those products. Some of those pathways might enable\\nresearchers to capture\
    \ value with better value capture mechanisms; I want to\\nargue that the value of other pathways are inherently uncapturable.\\\
    nThere is a lot of research that would make many different products a little bit\\nbetter, but the improvements aren't\
    \ worth the overhead of patenting and\\nlicensing. At the same time they aren't modular enough to be products on their\\\
    nown. Imagine a manufacturing tweak that saved ten-thousands of companies\\n$100 over several years. Valuable, but not\
    \ enough to license on either side. You\\ncould imagine that situation might be remedied by better value-capture\\nmechanisms.\
    \ Though given current physical and cultural technology, I am\\nskeptical that the overhead of making the value creation\
    \ sufficiently legible will\\ndominate and prevent useful value capture.  92\\nSome impactful research creates solutions\
    \ to problems where finding the\\nanswer is incredibly hard but the solution is shockingly simple once found. This\\nsituation\
    \ applies to a lot of design work and best practices. Arguably you could\\npatent these, but the work to hunt down and\
    \ sue everybody who used it would\\nrequire massive resources and perhaps just lead to people taking the hit and not\\\
    nusing it in the first place. It's questionable whether better mechanisms could\\nhelp here, though you could make an\
    \ argument that in the same way that the\\niTunes Store drastically decreased piracy, better mechanisms could make it\
    \ easier\\nto give kickbacks.\\nWe stand on the shoulders of too many giants to give them all credit. Like this\\nsentence,\
    \ research often follows circuitous routes and sometimes it's not even\\nclear who you're building on or you are separated\
    \ from them through so much\\ntime that it's impossible for them to capture some of the value they create. If you\\nbuild\
    \ a product with the help of a fifty-year-old paper, do you give some royalties\\nto the author's heirs? There's also\
    \ the question of failures: does a research group\\ndeserve some of the value if lessons from their failure led to your\
    \ success? How\\nmuch? Is it different if they handed you a lab notebook or just told you how\\nimportant it is to use\
    \ human oil from the front of your nose to grease a wire 43 at\\nthe bar after a conference?\\nWhile it's not strictly\
    \ uncapturability,\\nthere is a significant class of\\ninnovations that would create drastically less value for the world\
    \ if their value\\nhad been captured by their creators. There's also just a lot of clearly valuable\\nwork that never\
    \ turns into money. How would even the most sophisticated IP\\nmechanisms have made Norman Borlaug \\u2014 whose agricultural\
    \ research has\\narguably saved the lives of over a billion people 44 \\u2014 a bajillionaire?\\nWhile better value capture\\\
    nmechanisms may help, we also need\\nbetter social technology to fund and\\nreward research that is truly a public good.\\\
    nCurrent value-capture mechanisms are crude\\nThe direct ways to capture the value from research are to patent it or build\
    \ a\\nproduct around it (and leverage trade secrets). Other possibilities are more\\nindirect and credit-based: consulting,\
    \ speaking fees, or leveraging reputation to\\nget more lucrative positions later.\\nPatents\\nPatents require an expensive\
    \ application that can take years to process,\\nlawsuits to enforce, and effort to monitor for violation, and lead to\
    \ an extremely\\nilliquid market. On top of that, there is tons of valuable work that just isn't\\npatentable.\\nCapturing\
    \ value with a patent is often inefficient. In an ideal situation,\\nsomeone building a product that incorporates the\
    \ patented process comes to you,\\nthe two of you negotiate a licensing deal, and they send you a check every year.\\\
    nThe world is not ideal. Often, you need to find people who are violating your\\npatent and threaten to sue them if they\
    \ don't pay up. Standard lawyer advice\\nwhen building something is to not look for prior art because it decreases your\\\
    nliability in case you happen to reinvent something. Even if someone does come to\\nlicense your patent, the negotiation\
    \ over licensing terms can be brutal \\u2014 there\\nare no standard terms, and especially for a startup, it can create\
    \ a drag chute on a\\nproduct's profitability that makes an already hard job even harder. Once the\\nlicensing agreement\
    \ is signed, you still need to make sure that the company is\\npaying you the royalties you're due and sue if they're\
    \ skimping you. Many\\ninventors have spent a lot of their lives in court over patents, and sometimes\\nwind up dying\
    \ in the gutter in spite of that.\\nIt's worth noting two historical facts about patents that shed some light on\\ntheir\
    \ limitations. Patents have gone from well-reviewed descriptions of already-\\nSee \\\" Tacit Knowledge, Trust, and the\
    \ Q of\\nSapphire .\\\"\\n43.\\nSee \\\" Congressional Tribute to Dr. Norman E.\\nBorlaug Act of 2006.\\\"\\n44.\"\n \
    \ },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\\
    n19/61\\n\\nbuilt mechanical inventions to hastily reviewed descriptions of everything from\\nsoftware to biotech written\
    \ by lawyers. The number of patents issued in the US\\nhas increased by four orders of magnitude since the patent office\
    \ opened \\u2014 from\\n33 in 1791 to 354,430 in 2019.  95 The number of patent reviewers hasn't increased\\nanywhere\
    \ near that much. On top of all of that, patents weren't even created as a\\nvalue-capture tool for discovery or invention.\
    \ Instead, patents started as a way for\\nmonarchs to increase their income without going through Parliament by\\ngranting\
    \ temporary monopolies. 45 Of\\ncourse, the modern patent system is\\nexplicitly meant to incentivize\\ninnovation, so\
    \ this might be nothing more than a historical anecdote.\\nAdditionally, patents inherently prevent a piece of intellectual\
    \ property from\\nbeing combined with other knowledge . The combination-preventing nature of\\npatents is particularly\
    \ problematic if you want to use them to try to fund work to\\naddress gaps in work on processes and systems (which naturally\
    \ require\\ntechnological combinations).\\nProducts\\nThe first reason products are a crude way to capture value from\
    \ research is that\\nmost modern products are an amalgamation of different technologies and\\ndesigns. So while a piece\
    \ of research may have vastly improved a component, that\\ndoesn't necessarily translate to a vastly superior product.\\\
    nSecond, products are inherently coupled to companies, so the success of a\\nproduct (from a value capture standpoint)\
    \ is inherently tied to the success of a\\ncompany. This coupling means that there are many other factors that affect\
    \ the\\nproduct's success besides the product itself (let alone the research-based piece of\\nit). Markets, sales channels,\
    \ margins, fundraising, perception, and more all make\\nor break companies independent of their products. \\\"The best\
    \ technologies don't\\nalways win\\\" is an adage for a reason.\\n\\\"But unique new technology creates a moat that will\
    \ make the company\\nsuccessful!\\\" Jerry Neumann's \\\" Productive Uncertainty \\\" argues convincingly\\nagainst pure\
    \ technology with the idea of \\\"excess value\\\" an invention would\\nproduce for a startup.\\nIf a moat exists prior\
    \ to the startup being founded (say, a patent) then,\\nabsent uncertainty, this patent could be sold for at least as much\
    \ as the\\nstartup could garner from it.\\nMore broadly, product-driven value capture forces innovations to be subject\
    \ to\\nthe constraints on startups or corporations. None of this is to say that products\\nare a bad way to capture value,\
    \ only that they are subject to many constraints and\\ncontingent requirements that mean that the correspondence between\
    \ valuable\\ntechnologies and technologies whose value can be captured by a product is weak.\\nPatents inherently prevent\
    \ a piece of intellectual property from\\nbeing combined with other knowledge\\nImagine a system with components A, B,\
    \ and C, each of them owned by a\\ndifferent entity. On their own, they are worth one unit but the system is worth 10\\\
    nunits. Arguably, the value of the last unit added to the system is actually eight. A\\ngame-theoretical situation occurs\
    \ where each IP owner holds out to be paid eight\\nunits. An alternative situation is that the value of the system is\
    \ five, but A, B, and\\nC all arbitrarily set their price to be two.\\nThis situation is exacerbated the more different\
    \ applications there are.\\nThis combinatorial drag from patents is why, in most industries outside of\\npharma and chemicals,\
    \ patents are a net drag on innovation. 46 Chemicals and\\ndrugs usually have a 1:1\\ncorrespondence between patents and\\\
    nproducts. On the other hand,\\nsemiconductors and software can have dozens of patents in a single product.\\nWhat about\
    \ a non-exclusive license? A piece of IP under a non-exclusive\\nlicense becomes something much closer to a public good.\
    \ Non-exclusive licenses\\nhave other problems: They enable you to capture less value and still require\\nlawsuits and\
    \ monitoring to enforce.\\nValue capture can hamstring impact\\nWe often talk about individuals or organizations capturing\
    \ the value that they\\ncreate . However, conversations about value capture can shift from an\\ninstrumental goal in service\
    \ of encouraging more innovation to an intrinsic goal:\\nthat people should be justly rewarded for the value that they\
    \ create. I want to\\nargue that from a practical perspective, value capture as an intrinsic goal is a\\nchimera, and\
    \ point out its significant downsides.\\nValue capture as an intrinsic goal requires that you (or at least a market) can\\\
    nput a price on everything, and that just isn't true. Norman Borlaug arguably saved\\na billion lives. What is the value\
    \ of those lives? The people who benefited most\\nfrom his work were some of the poorest people in the world, so their\\\
    ncontribution to GDP is negligible. And yet their lives have value. What is the\\nvalue of knowledge about how the universe\
    \ started, or the weird blob fish that\\nlive at the bottom of the ocean? One could make an argument that perhaps in the\\\
    nfar future our studies of the big bang will lead to warp drives, or the blob fish will\\nlead to a cure for aging. I\
    \ can't shake the belief that this knowledge is important\\neven without contributing one cent to GDP, and any mechanism\
    \ to find a \\\"dollar\\nequivalent\\\" would be absurd. Markets are amazing, but they require certain\\nconditions to\
    \ work. It's not clear that those conditions can be met for everything.\\nBelief in value capture as an intrinsic goal\
    \ warps people's focus. If you believe\\nthat value capture is an intrinsic goal, it makes sense to focus on value-capture\\\
    nmechanisms without consideration to whether those mechanisms are the most\\neffective way to encourage valuable behavior.\
    \ Viewing value capture as\\nintrinsically good encourages the stance that if someone or something is unable\\nto capture\
    \ value, it must not have been valuable in the first place. If you asked,\\nmany people don't explicitly believe this,\
    \ but pay attention and you will see it\\nimplicitly worm its way into conversations and logic.\\nCharacterizing creations\
    \ that would be hamstrung by value\\ncapture\\nTwo notes:\\n1. By \\\"public,\\\" I mean technology that is not illegal\
    \ to copy without permission. It\\ndoesn't necessarily mean it's \\\"open\\\" (though that does make it more public).\
    \ It\\nalso doesn't mean that it was funded by the government (which, incidentally,\\nfunds plenty of private inventions).\\\
    n2. To avoid introducing a new term I'll be using the term \\\"creation\\\" to describe\\nnebulous discovery/invention/potential\
    \ innovation-type things. 47\\nHow can we think about the nebulous\\nline between creations that would be\\nhamstrung\
    \ by value capture and those accelerated by privatization?\\nYou can approach the question both empirically and theoretically.\
    \ Both\\napproaches are flawed. Empirically, there are anecdotes to support any position.\\nTheoretically, you can make\
    \ arguments on both sides and the ultimate conclusion\\nis something around \\\"It depends.\\\" I'm going to focus on\
    \ the theoretical approach\\nSee \\\" Age of Invention: How to Build a State\\n.\\\"\\n45.\\nFor a much deeper discussion\
    \ about where\\npatents are helpful or harmful, see The\\nPatent Crisis and How the Courts Can Solve\\nIt .\\n46.\\n\\\
    \" Heuretic\\\" is a better word , but I've\\nintroduced enough new terms as it is.\\n47.\"\n  },\n  {\n    \"name\":\
    \ \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\\
    n20/61\\n\\nto outline the characteristics of creations that would be hamstrung by value\\ncapture and lean on the empirical\
    \ approach to argue that potential innovations\\nthat have these characteristics are increasingly common in the world.\
    \ 48\\nIgnoring incentives and costs,\\nscientific and technological knowledge\\nwill have more impact if it is more\\\
    npublic. If knowledge is more public and\\naccessible, more people can try more\\nexperiments, and more brains will be\\\
    nable to focus on the real problems. The\\ncreation of technology is a combinatorial process 49 , and public knowledge\\\
    nenables more combinations.\\nThat's a big \\\"if.\\\" Incentives do exist,\\nand research can be expensive.\\nSo there\
    \ are good arguments both for holding knowledge private and for\\nmaking it public. We neither live in a socialist paradise\
    \ ruled by an omniscient\\noverlord who distributes resources to their optimal use nor a world where\\nfrictionless markets\
    \ exist for everything, distributing value perfectly to its\\ncreators. So the answer to \\\"Will a creation have more\
    \ impact if it's private or\\npublic?\\\" is \\\"It depends.\\\" Our job is to figure out what makes the answer tip to\\\
    none side vs. another.\\nOne important question is whether a technology is valuable on its own or in\\ncombination with\
    \ other technologies. And, in the latter case, how many other\\ntechnologies? Single-molecule drugs are a great example\
    \ of low-combination\\ntechnologies, and airplanes are great examples of high-combination\\ntechnologies. Patents inherently\
    \ prevent a piece of intellectual property from\\nbeing combined with other knowledge, so patents will be problematic\
    \ if the\\nmajority of a creation's value will be generated combinatorially. You could think\\nof patents as a tax on\
    \ including a component technology; taxing a thing is\\ngenerally a good way to get less of it, all things held equal.\
    \ If there are only a few\\nbig, clearly valuable possible combinations, IP (especially a non-exclusive license)\\nmay\
    \ still be reasonable. Patents\\\" combination-taxing mechanism suggests that\\n\\\"many combinatorial possibilities\\\
    \" may be one heuristic for creations that will\\nhave much more impact if they're public.\\nThere is also the question\
    \ of composability 50 \\u2014 how easy is it to do the\\ncombining? How large is a technology's\\n\\\"combinatorial surface\
    \ area\\\" and how\\nmuch do you need to mess with its\\ninsides to combine it with other\\nthings? If a creation has\
    \ a small surface area and/or is very composable, it can\\nhave a lot of impact as a private product. Take bolts, for\
    \ example. They are only\\nvaluable when you combine them with other things to create something new.\\nHowever, they have\
    \ a small combinatorial surface area (you almost always use\\nthem to hold things against a threaded thing), and you rarely\
    \ need to modify\\nthem (if you do, you're probably doing something wrong, but I have an angle\\ngrinder to sell you).\
    \ Well-designed APIs are also extremely composable. Low-\\nsurface-area, composable creations make good private products\
    \ that can achieve\\nnear-maximum impact.\\nInverting the characteristics of creations that can create significant impact\
    \ as\\nprivate goods is suggestive of the sorts of things that would create significantly\\nless impact if you tried to\
    \ capture their value: creations that generate uncertain\\nvalue through combination with many other things, have a large\
    \ combinatorial\\nsurface area, and frequently require internal modifications to enable these\\ncombinations to happen.\\\
    nHow common are potentially hamstrung creations?\\nEven if there's a class of creations whose impact is stifled by trying\
    \ to capture\\ntheir value, the question remains: How common are these creations, actually?\\nPeople trying to capture\
    \ the value from their creations have generated massive\\nvalue in the world, so maybe anything else is a corner case.\
    \ I will argue that they\\nhave been common throughout the 20th century, and that increasingly complex\\ntechnology makes\
    \ them even more common.\\nCaveat : There are two glaring problems with this incredibly empirical\\napproach. First, we\
    \ cannot go through every technology, so there will be\\ninevitable cherry-picking. Second, counterfactuals are hard.\
    \ There is no way to\\n\\\"prove\\\" that a technology would have had more or less impact if it were public or\\nprivate.\
    \ With these problems in mind, the empirical approach is probably most\\nuseful to try to disprove the assertion that\
    \ there is a non-trivial set of heuretics\\nwhose impact depends on being public. If the disproof feels weak, that is\
    \ perhaps\\nthe best empirical evidence for the claim.\\nThe innovation ecosystem of the late 19th and early 20th century\
    \ is one of the\\nstrongest pieces of evidence that private innovations alone can carry the torch of\\nprogress forward.\
    \ It was an age of massive technological change \\u2014 Vulcanized\\nrubber! Automobiles! Airplanes! Electricity! Telephones!\
    \ Almost all created by\\nprivate for-profit companies, patented, and sold.\\nHowever, many of these innovations only\
    \ hit the mainstream when the\\ncomponent technologies became public knowledge. There was an explosion of\\ncar patents\
    \ in the 1880s and 1890s, and an explosion of car production in the 1900s\\nand 1910s, roughly tracking the end of a patent's\
    \ 20-year lifespan. It's telling that\\nsafety glass was patented in 1905 and became standard car equipment in 1926. Of\\\
    ncourse, this could be completely correlational, and the time gap between\\ninvention and diffusion is just how much time\
    \ was needed for learning-by-doing\\nto happen.\\nNone of these technologies were complex enough that you couldn't figure\
    \ out\\nhow it works by taking it apart. Nor did they require up-front capital costs\\ninaccessible to individuals without\
    \ institutional backing. Those attributes mean\\nthat, almost by default, the technologies became public knowledge as\
    \ soon as\\nthey were sold. The sufficiently low cost and complexity combined with the cost\\nof acquiring and enforcing\
    \ patents in multiple countries at once  102 meant that\\nwhile private, for-profit organizations were creating the technology,\
    \ the\\ntechnology itself was effectively public. It was virtually impossible for a single\\norganization to blunt its\
    \ impact across the whole world.\\nMany of the \\\"charismatic\\\" 51\\ntechnologies of the late 19th century\\nwere \\\
    \"final goods\\\" with relatively small functional surface area. Cars move you\\nand your stuff fast, telephones let you\
    \ talk to someone else, airplanes move stuff\\nthrough the air. Even electricity was primarily just used to light stuff\
    \ up and spin\\nthings. Additionally, you could make these technologies good enough to have\\nsome market using relatively\
    \ low-complexity component parts that could be\\ncreated in-house. In situations where those component parts were private\
    \ thanks\\nto patents or just secrets, the invention's impact was suppressed until the\\ncomponents became more public.\
    \ The canonical example is the Wright brothers\\\"\\npatent on coupled wing-warping/rudder control for airplanes, 52 which\
    \ arguably\\n53 stunted the American airplane\\nindustry for a decade.\\nThe upshot is that few Industrial Age\\ntechnologies\
    \ meet the criteria that we\\nwould predict should lead to a\\ntechnology being hamstrung by being\\nprivate. Strictly\
    \ enforced patents on the\\ntechnologies that approach the criteria\\n(like airplane control) seem to have\\nhamstrung\
    \ impact in the US, where the\\npatent was in effect.\\nSo which technologies would meet\\nthe criteria for being hamstrung\
    \ by attempted value capture? The age of chemical\\nengineering that began in the early 20th century seems like good hunting\\\
    nground. Chemicals and the scalable processes to make them are rarely a final\\nproduct and can be tuned for many different\
    \ purposes.\\nThe Haber\\u2014Bosch Process is one of the most charismatic chemical processes.\\nIt also turns out to\
    \ have been made public through a non-exclusive license at\\ngunpoint. From Enriching the Earth :\\nThe first transfer\
    \ of the Haber\\u2013Bosch process abroad was a result of\\nthe Versailles Treaty, which the defeated Germany had to sign\
    \ in 1919.\\nBy its terms, BASF was obliged to license construction of an ammonia\\nplant with an annual capacity of 100,000\
    \ t in France.\\nIt would be an entire (worthy!) research project to discern the licensing\\npractices around other chemical\
    \ processes. However, skimming through the\\nhistory of the heavy hitters, there seem to be repeated references to multiple\\\
    ncompanies bringing them to market. 54\\nAdditionally, a significant chunk of the\\nwork still ended up in academic papers\\\
    ninstead of patents, whether it was being\\ndone in universities or industrial labs. 55 The number of papers that industrial\\\
    nlabs published suggests that at least\\nmore of the steps leading up to an\\ninnovation were public than today.\\nThis\
    \ section only skims the surface of this\\ntopic as far as we need to understand the\\nsorts of technologies that current\
    \ institutions\\nhave trouble enabling. For a much deeper\\ndive, see the already-mentioned-but-worth-\\nmentioning-again\
    \ The Patent Crisis and How\\nthe Courts Can Solve It .\\n48.\\nSee The Nature of Technology: What It Is and\\nHow It\
    \ Evolves and \\\" One Process .\\\"\\n49.\\nComposability is an excellent and under-\\ndiscussed concept.\\nhttps://en.wikipedia.org/wiki/Composability\\\
    n50.\\nIn the sense of \\\"charismatic megafauna .\\\"\\n51.\\nSee\\nhttps://en.wikipedia.org/wiki/Wright_brothers\\n.\\\
    n52.\\nThere literally is an academic argument over\\nthis. For arguments that patent thickets did\\nstifle airplane development,\
    \ see \\\" Spillover\\nEffects of Intellectual Property Protection in\\nthe Interwar Aircraft Industry ,\\\" and for\\\
    narguments that patents weren't a problem see\\n\\\" The myth of the early aviation patent hold-\\nup\\u2014how a US government\
    \ monopsony\\ncommandeered pioneer airplane patents .\\\" I\\nfind the former compelling, but it's tricky.\\n53.\\nSee\
    \ \\\" Not Counting Chemistry: How We\\nMisread the History of 20th-Century Science\\nand Technology.\\\"\\n54.\\nSee\
    \ \\\" The Decline of Science in Corporate\\nR&D \\\" (again).\\n55.\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\"\
    ,\n    \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n21/61\\n\\nIt's\
    \ worth noting that before the relationship of government, academia, and\\ntechnology fundamentally changed in 1980 with\
    \ the Bayh\\u2014Dole Act, it was hard\\nto have exclusive license rights on federally funded research. The situation\\\
    nflipped after 1980 to a world where research institutions by default had exclusive\\nrights to the output of federally\
    \ funded research. This shift coincides roughly\\nwith the distinct absence of new general-purpose physical technologies.\\\
    nObviously, any direct causal link is speculation at best. At the same time,\\nignoring it feels dishonest as well. Counterfactuals\
    \ are hard.\\nThe computer age is littered with anecdotes of technologies that were only\\nimpactful because their creators\
    \ failed to capture their value. Alan Kay argues\\nthat the technologies created in Xerox PARC have created trillions\
    \ of dollars in\\nvalue. 56 Imagine a world where Xerox\\nsued the living daylights out of any\\nproduct that used a mouse\
    \ or a GUI. I suspect the mouse and GUI would have\\nbeen much less impactful in that world.\\nCounterfactually, what\
    \ would have happened if AT&T were not required to\\nlicense for free all of the non-telephone patents at Bell Labs? Two\
    \ plausible\\nscenarios could have happened: Either AT&T would have had a monopoly on the\\nsemiconductor market or William\
    \ Shockley would have had an exclusive license\\nto the technology. In the former situation, it's likely that semiconductors\
    \ would\\nhave been treated the same way that most technologies tangential to a core line\\nof business historically have\
    \ been: marginalized and deprived of the chance to\\nlive up to its promise. An eternally expensive piece of military\
    \ equipment. If\\ninstead Shockley negotiated an exclusive license with AT&T, consider that\\nShockley was a notoriously\
    \ terrible manager, and Shockley Semiconductor went\\nout of business in 1968. The traitorous eight would never have left\
    \ to found\\nFairchild, so Shockley Semiconductor might have persisted, but would the\\ninnovations that came out of Fairchild\
    \ have happened? Would Hoerni's Planar\\nProcess have been created and adopted in either situation? Poor management is\\\
    ngreat at killing weird paradigm-shifting ideas. The entire modern technological\\nstack might never have existed.\\nLinux\
    \ is literally powering Mars Rovers now. How much irreplaceable impact\\nhas it had? If Linus Torvald were trying to capture\
    \ the value it created, how\\nwould Linux have been anything other than an inferior version of Windows?\"\n  },\n  {\n\
    \    \"name\": \"Conclusion\",\n    \"text\": \"Many ideas have massive impact because people can copy them without paying\\\
    ntheir creators. Any mechanism for capturing value has more or less built-in\\nfriction. This friction can limit the diffusion\
    \ of innovations.\\nThe strong argument in favor of trying to capture value is that value capture is\\nwhat incentivizes\
    \ and funds innovations in the first place. Value capture is not a\\nbinary \\\"either you capture all of the value or\
    \ none of it,\\\" but a question of how\\nmuch of it you capture and how you capture it. Arguably, Google (and many other\\\
    ncompanies) has created much more value than they have captured and may have\\ncreated less value if its creators hadn't\
    \ tried to capture that value. Profit really is\\nimportant! However, these companies generally are not generating profit\
    \ from\\ninnovations with large surface area that generate uncertain a priori value through\\nnot-particularly-modular\
    \ mechanisms.\\nCurrent value capture-mechanisms are crude . It's possible that better value-\\ncapture mechanisms could\
    \ create a world where any innovation could create as\\nmuch value as possible and its creators could be rewarded. However,\
    \ it doesn't\\nseem possible to capture value (especially in non-digital technologies) without\\nintroducing some friction\
    \ into the system in order to track contributions and\\nforcibly extract money from people who are keeping more than their\
    \ fair share.\\n109\\nFinally, the potentially hamstrung class of innovations seems to become more\\nprevalent as the\
    \ complexity of technology increases and technological\\ndevelopment depends more and more on long research pipelines.\
    \ Given all of\\nthese considerations, it seems clear that navigating between impact and value\\ncapture is a Scylla and\
    \ Charybdis situation indeed. Like other unavoidable\\ntensions, there's no \\\"correct\\\" answer beyond \\\"Constantly\
    \ pay attention and\\ncourse-correct!\\\"\\nFor fun, I will leave you with a potentially controversial 2x2 of innovations\
    \ that\\nwould arguably have had more or less impact if they were public or private.\\nWhile we didn't mention them directly,\
    \ legal structures were lurking just below\\nthe surface throughout the discussion of profit and value capture. Who exactly\
    \ is\\ncapturing value and how profit incentivizes individuals is all a matter of legal\\nstructure. Many people implicitly\
    \ or explicitly believe that legal structures are\\nakin to \\\"syntactic sugar\\\" in programming: a surface-level feature\
    \ that ultimately\\nhas little effect on organizational outcomes. I want to argue that instead, legal\\nstructures are\
    \ intimately tied to organizational capacity.\\nWhen you boil it down, legal structures are contracts that establish how\
    \ money\\nand explicit power flow in an organization. Served that way, how can legal\\nstructures not be tightly coupled\
    \ to organizational capacity? The government\\nacts as an external forcing function on these contracts: allowing some,\\\
    ndisallowing others, and using them to assess one of the two inevitabilities of life\\n(taxes) which actually play a big\
    \ role in what people decide to do with their\\nmoney. Taxes often play a big role in incentives for people and organizations\\\
    nwith enough money to make a difference with their money.\\nHistorically, new legal structures have enabled new classes\
    \ of activity. The\\ncreation of joint stock companies in the 1600s enabled larger and riskier private\\nventures like\
    \ the East India Company 57 and arguably enabled a lot of English\\nsettlement in North America. The\\ncreation of limited\
    \ liability\\ncorporations in the mid 19th century\\nhelped enable the railroad boom first in Britain and then in the\
    \ US. 58 In 2020,\\nSPACs made going public a reasonable\\nmove for several non-software\\ntechnology companies that may\
    \ not\\nhave happened otherwise.\\nEntrepreneur First is a great example of an organization using unconventional\\nstructures\
    \ to unlock new strategic moves and outcomes. They are in part an\\ninvestment firm, but their cohorts require much more\
    \ operating capital (for\\nexample, more employees) than the traditional VC firm structure provides. So, in\\naddition\
    \ to the normal-for-VCs closed-end funds with LPs, EF also has a C-corp\\nthat issues equity and has its own investors\
    \ that both employs most of the people\\nat EF and \\\"co-invests\\\" with the closed-end fund. This unconventional structure\\\
    nallows EF to be more operationally intensive than a normal VC fund and has the\\nadded side effect that if their investments\
    \ are successful enough, it's conceivable\\nthat they could choose to stop needing LPs at all. Eventually, the organization\\\
    ncould become an autocatalyzing cycle where operations are funded solely\\nthrough liquidated investments held by the\
    \ C-corp. Y Combinator has a similar\\nstructure and uses this additional flexibility to do experiments like the now-\\\
    ndefunct YC Research . This additional long-term operating flexibility wouldn't be\\npossible in a normal VC fund structure\
    \ because most VC firms fund operations\\noff of their management fees and return all their profits to LPs. I want to\
    \ make it\\nclear that there are trade-offs so this is not a strictly-better structure for all tech\\ninvestors. But it\
    \ is a better structure for EF and YC to the extent that they\\nconceivably could not do what they do without it.\\nSee\
    \ this interview with Alan Kay .\\n56.\\nLegal structure is critical to institutional capacity\\nSee \\\" A Brief History\
    \ of the Corporate Form\\nand Why It Matters .\\\"\\n57.\\nSee The Modern Corporation and Private\\nProperty .\\n58.\"\
    \n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\\
    n22/61\\n\\nSo if new legal structures have a large impact on organizational capabilities,\\nwhy shouldn't organizations\
    \ trying to do qualitatively different things take legal\\nstructures seriously? Clearly there are many organizations\
    \ that have\\naccomplished great new things without innovating on legal structures. This is yet\\nanother place where\
    \ counterfactuals are hard. We do more than speculate on\\norganizations that structural constraints caused to never exist\
    \ in the first place.\\nOther organizations may have been subtly forced into more mainstream behavior.\\nHowever, the\
    \ historical precedent and surprising number of ways you can be\\ncreative with legal structures suggests that, at least\
    \ on the margin, there is a lot of\\nroom for new legal structures to enable new organizational capacities.\\nLegal structures\
    \ are intimately tied to the question of how\\nmoney works in an organization\\nLegal structures affect where you can\
    \ get money and what you can do with it.\\nEven the words we use have both a funding and an organizational meaning.\\\
    n\\\"Nonprofit\\\" both implies that funding is from people who don't expect a return\\non profit and is a specific designation\
    \ under the law. Similarly, \\\"selling equity\\\"\\nimplies a specific legal structure and also that funding will come\
    \ with a certain\\nset of expectations.\\nHow money works in an organization spills over into organizational incentives\\\
    nin too many subtle ways to list. For example, creating equity enables you to raise\\nmoney that doesn't need to be returned\
    \ on a finite time scale (which can\\nincentivize longer-term thinking) but puts ownership of a fraction of the\\norganization\
    \ in the hands of outside shareholders (who can push for different\\ndecisions than the founders would have made  112\
    \ ). If you want to avoid someone\\nelse owning your organization but still want to raise money from outside\\ninvestors,\
    \ you could organize as an LLC, but then you start a ticking clock to\\nreturn that money with interest. Nonprofit status\
    \ enables you to raise money that\\npeople can write off on their taxes and don't expect a return on, but it comes with\\\
    na host of requirements around what you can and must spend money on. These\\nexamples are only meant to illustratively\
    \ scratch the surface \\u2014 someone should\\nreally write The Big Book of Organizational Incentives .\\nAs an example\
    \ of the coupling, let's think through funding a DARPA-riff.It is\\nhard to capture value from research, so a reasonable\
    \ first instinct is to look to\\nphilanthropic funding. Philanthropic funding pushes an organization to legally\\nbe a\
    \ nonprofit both because people expect a tax break for money they give away\\nand because \\\"nonprofit\\\" signals, \\\
    \"No, seriously, we're not going to use your\\nmoney to get rich.\\\"  113 That's not the end of the story, though, because\
    \ from the\\nperspective of pure impact the best move will likely be for a startup to carry some\\nof the technology forward.\
    \ It would be extremely helpful to use some of the\\nstartup's eventual profit both to fund further work at the DARPA-riff\
    \ and to tap\\ninto for-profit investment. People are willing to write much bigger checks if they\\nthink they'll get\
    \ a return on them! However, the standard nonprofit structure puts\\nmany constraints on your ability to issue equity\
    \ (which would be the normal\\nstructural way to channel for-profit investment) ...\\nThe traditional nonprofit structure\
    \ is a bad idea for an\\norganization that requires a significant chunk of capital and\\nproduces uncertain results on\
    \ a long time scale\\nA nonprofit can be organized as either a charity or a foundation. Each has\\ndifferent constraints,\
    \ but in both cases, nonprofit structures are more at the\\nwhims of the entities giving them money than they would be\
    \ if they were\\nproviding a good or service. It just comes down to leverage.\\nLegally designated charities enable donors\
    \ to write off their donations as tax-\\ndeductible. However, charities need to get 33% of their income from donations\\\
    nand those donations need to come from \\\"small donors\\\" who each provide less\\nthan 2% of their total funding. Because\
    \ of these rules, charities raise money on a\\nyearly or sub-yearly basis, which forces them to give people a reason to\
    \ donate on\\nthat short timescale. Uncertain results on a long timescale don't lend themselves\\nto the sorts of updates\
    \ that encourage people to give on short time scales. \\\"Hey,\\nuh, still doing that experiment that we were doing last\
    \ time we asked you for\\nmoney.\\\" The short funding time scale also means that cash flows can be quite\\nvolatile,\
    \ which poses obvious problems for long-term research. You can't really\\nfire a researcher and then hire them back a\
    \ year later when funding conditions\\nget better.\\nLegally designated foundations don't have a charity's requirements\
    \ for regular\\nsmall donations, so they are not as susceptible to the whims of a large group of\\npeople. Instead of\
    \ regular small donations, foundations need to convince a few\\ndonors to give a lot of money. Big checks always come\
    \ with strings attached.\\nWhile the check size might be higher, it's often distributed over time, so an\\nunhappy donor\
    \ can pull out, leaving the organization in the lurch. These donors\\nalso get lower tax write-offs, which can give a\
    \ feeling of more ownership over the\\norganization and thus more control over its direction. So while the constraints\
    \ on\\nfoundations are different from those on charities, they still need to keep donors\\nhappy, which could push the\
    \ organization toward shorter-term, sexier projects\\nthat align with philanthropists\\\" priorities.\\nAdmittedly, I've\
    \ outlined worst-case scenarios for how incentives can play out\\nin both charities and foundations. However, people always\
    \ spend money for a\\npurpose. In the case of philanthropy, that purpose is a complex, fragile \\\"product\\\"\\n(as opposed\
    \ to more simple products, like eggplants or index funds). Taste in\\nprojects is more flighty than the desire for return\
    \ on capital. People usually want\\ncloser involvement when the money is buying a more ill-defined good than \\\"more\\\
    nmoney.\\\"\\nIt's easy for a philanthropy to take actions that do not deliver on donors\\\"\\nexpectations. In other\
    \ words, it's easy for philanthropies to become misaligned\\nwith their money factories. This easy misalignment makes\
    \ it dicey to rely only on\\ndonations for long-term projects. Unfortunately, the nature of research means\\nthat it both\
    \ needs stable, long-term funding and often fails to live up to\\nexpectations. In short, structural constraints make\
    \ the traditional nonprofit\\nstructure a shaky foundation for an organization that requires a significant chunk\\nof\
    \ capital and produces uncertain results on a long time scale.\\nThere are no first principles for legal structures\\\
    nDisclaimer: I am not a lawyer.\\nYou'll notice that most organizations\\\" legal structures don't stray too far from\
    \ a\\nfew basic models. New companies tend to be vanilla C-corps if they intend to sell\\nequity and LLCs if not (and\
    \ their equivalents outside the US). Organizations with\\ncharitable intent tend to be 501(c)(3)-designated charities\
    \ or foundations. VC\\nfirms tend to be LLCs with a few members forming a general partnership. This\\ngeneral partnership\
    \ then creates closed-end funds that are limited partnerships\\nwith other investors.\\nThe structure of a typical VC\
    \ firm. 59\\nAt the end of the day, legal structures\\nare \\\"just\\\" contracts that determine how\\nmoney flows and\
    \ how decisions are made both within and between one or more\\ntaxable entities. We generally think of organizations in\
    \ terms of these tax\\ndesignations: LLC, c-Corp, 501(c)(3), etc.  115 Our custom of using tax designation\\nas one of\
    \ the primary descriptions of an organization hints at the fact that taxes\\nmatter a lot! Tax designations can place\
    \ requirements on organizational\\nstructures like the need for a board of directors and determine both what\\nhappens\
    \ to money that comes in (for example, C-corps and their shareholders are\\nboth taxed; only the shareholders of an LLC\
    \ are taxed) and what an organization\\nis allowed to spend money on (501(c)(3)s can only spend money related to their\\\
    nofficial missions).\\nThese contracts have a big impact on an organization's output. That impact\\nmakes it important\
    \ to find the appropriate legal structure. Moreover, legal\\nstructures have more flexibility than most people assume.\\\
    nPeople tend to implicitly treat legal structures like elements and particle\\nphysics  116 \\u2014 a set of clear options\
    \ in the same way that hydrogen, helium, and\\ncarbon are composed of electrons, protons, and neutrons. That's not the\
    \ case at\\nall. You can actually write whatever contract all the involved parties are willing to\\nagree to. The question\
    \ is what will happen afterward \\u2014 it could be totally fine, or\\nFrom \\\" VC Funds 101: Understanding Venture Fund\\\
    nStructures, Team Compensation, Fund Metrics and\\nReporting\\\" by Ahmad Takatkah\\n59.\"\n  },\n  {\n    \"name\": \"\
    /28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\\
    n23/61\\n\\nthe government could sue you out of existence and send you to jail. It seems like,\\ngiven a set of laws,\
    \ you should be able to tell what is in bounds and what is out of\\nbounds. In reality, it's extremely hard for lawyers\
    \ to know a priori whether a legal\\nstructure is legit without trying it and seeing whether you get sued. There are no\\\
    nfirst principles that let you derive legitimate legal structures.  117 Composite\\nmaterials are a good analogy: Beyond\
    \ well-studied or simple examples, it's\\nextremely hard to predict how truly novel materials will perform.\\nThis illegibility\
    \ is an underlying reason why people tend to stick with legal\\nstructures that have already been safely demonstrated.\
    \ (The same is true with\\nmaterials!) Limited partnerships are used for almost every small investment firm\\nnot because\
    \ it was a carefully thought-out structure but because it had precedent\\nin the whaling industry, where it had basically\
    \ been made up by common law.\\nDelaware C-corps are everywhere in part because they have so much case law\\nbehind them\
    \ that the lines of acceptability are much clearer than any other\\noption.\\nSticking to well-known structures creates\
    \ several reenforcing feedback loops.\\nMost lawyers are hesitant to even suggest a non-standard structure because they\\\
    ndon't have the experience to intuit the affordances of a new structure. That leads\\nto even fewer lawyers with that\
    \ experience. People are (rationally!) hesitant to\\nfund non-standard structures. It's generally not worth the work to\
    \ avoid the risk\\nof a lawsuit, surprisingly high taxes, or other surprises. This pressure from\\nbackers to stick to\
    \ standard structures creates an adverse selection effect: The\\nthings people are interested in funding are nudged toward\
    \ traditional structures,\\nleaving only the things nobody wants to fund with weird structures and making it\\na good\
    \ guess that most organizations using non-standard structures are sketchy.\\nThe association between unconventional legal\
    \ structures and sketchy\\norganizations wears the habit grooves even deeper, increasing hesitation to do\\nsomething\
    \ different and creating more examples of organizations that have\\nsucceeded despite few-sizes-fit-all legal structures.\
    \ This survivorship bias\\nignores all the counterfactual organizations that failed or never even started\\nbecause of\
    \ the restrictions they faced.  118\\nThis all might seem like cute esoterica, but the combined flexibility and\\nillegibility\
    \ of legal structures has several significant consequences. Legal\\nstructures are intimately tied to the question of\
    \ how money works in an\\norganization, the actions that an organization can take, and the incentives they\\ncan deploy.\
    \ Don't we want more organizations that can use philanthropic dollars\\nto produce public goods, but then are able to\
    \ capture some of the value they\\ncreate in order to produce more things? Or perhaps organizations that look like a\\\
    ncompany but, instead of implicitly lasting forever, they have finite lifetimes like a\\nclosed-end fund?\\nOpenAI's capped-profit/nonprofit\
    \ structure 60 is a great example of an\\norganization playing with legal\\nstructures to match their own situation\\\
    nand shape incentives in ways that wouldn't otherwise be possible. They need to\\nbe able to pay AI researchers top dollar,\
    \ while at the same time their nominal\\nmission is to keep powerful AI technology from being captured by organizations\\\
    nwhose incentives are to use it to maximize shareholder value.  120\\nAt the same time, doing things differently for the\
    \ sake of doing things\\ndifferently is rarely a good idea. It's well worth paying attention to Chesterton's\\nFence.\
    \ Most of the time, it is easier to use standard legal structures, especially\\nconsidering the cost of lawyers who understand\
    \ contract and tax law well enough\\nto play with soft constraints. Old legal structures rarely provide huge barriers\
    \ to\\nan organization's ability to achieve its goals, just inconveniences. It's a situation\\nwhere continuous changes\
    \ can lead to discrete differences \\u2014 will the little\\ninconveniences from standard structures eventually cause\
    \ an organization's death\\n(or derailment) by a thousand cuts?\\nFor a DARPA-riff, I would argue the answer is yes.\\\
    nBell Labs was a product of its time and a set of unique conditions that no longer\\nexist today. DARPA, on the other\
    \ hand, seems able to work in today's world just\\nfine. Its biggest hamper is perhaps the constraints that come along\
    \ with being\\npart of the government.\\nI suspect there is more room to play with the DARPA model because the\\n\\\"\
    search space\\\" for replicating Bell Labs is both more restricted and has been\\nheavily explored. Bell Labs didn't have\
    \ a unique model. While they definitely\\nhave the best narrative, there were several other great industrial labs. Many\\\
    norganizations have tried to create \\\"the next Bell Labs.\\\" Those that have tried it as\\na part of an existing company\
    \ without the right external conditions were crushed\\nunder the constraints of modern corporate R&D, and those that tried\
    \ to do it as a\\nseparate entity did not address the trifecta of conditions required by healthy\\nindustrial labs . Arguably,\
    \ we still do have great industrial labs today, just not in\\natom-based disciplines .\\nIn contrast to Bell Labs clones,\
    \ extragovernmental riffs on the DARPA model\\nare rare. Many organizations give lip service to the DARPA model but don't\\\
    nresemble it at all. It's easy to set out to build a DARPA but end up building a\\nSkunkworks. Of the organizations that\
    \ do seem like earnest riffs, Actuate\\n(solutions R&D for social good) and Wellcome Leap (solutions R&D for health)\\\
    nhave only started in earnest in the past year, so it's hard to say much about them.\\nInk & Switch seems to be successfully\
    \ riffing off the DARPA model in the\\nsoftware world. There is a lot of organizational white space still to explore.\\\
    nAt the same time, this apparent whitespace could be the same as shouting\\n\\\"The real nongovernmental DARPA model has\
    \ never been tried!\\\" into a graveyard\\nof failed attempts. Maybe there have been organizations riffing on DARPA that\\\
    ndied quietly or didn't explicitly draw the connection between their model and\\nDARPA's. Another real possibility is\
    \ that the DARPA model just doesn't work\\noutside the context of the government. However, the evidence suggests that\
    \ a\\nprivate DARPA-riff is not impossible, and may in fact be possible. After reading\\nthis section, hopefully you'll\
    \ agree.\\nIn summary, it seems possible to replicate DARPA in today's world, but it\\ndoesn't seem possible to purposefully\
    \ re-create the conditions that enabled Bell\\nLabs to be what it was.\\nThere are DARPA-style ideas that DARPA doesn't\
    \ pursue\\nA key reason why it would be impossible to riff on DARPA is because actual\\nDARPA is already tackling all\
    \ the parts of the adjacent possible that fit within its\\nstructural constraints. All DARPA programs need to tie into\
    \ US defense\\npriorities. However, almost any piece of technology can be tied into defense\\npriorities somehow. For\
    \ example: Human-computer interfaces are for command\\nand control, medicine is for helping wounded soldiers and disabled\
    \ veterans,\\nimproved learning techniques can help train military personnel, new materials\\nand energy-generation technology\
    \ can be deployed on the battlefield and make\\nour military more energy-secure, and fundamental physics could enable\
    \ warp-\\ndrive-powered battlecruisers!\\nTherefore, it's quite reasonable to conclude that DARPA would already have\\\
    ntried any potentially impactful DARPA-style program. If this were true, trying to\\nrun similar programs with less resources\
    \ and clout would be idiotic.\\nLuckily, evidence suggests this isn't the case. It's perhaps a cheap analogy, but\\nassuming\
    \ that DARPA will undertake every potentially awesome technology\\nprogram is the same line of thinking as assuming that\
    \ Google will go after any\\npotentially valuable software product.\\nOne piece of evidence is simply testimony from former\
    \ PMs that they had\\nprogram ideas rejected because they were insufficiently applicable in a defense\\nsetting. It would\
    \ be lovely to have a list of \\\"good ideas DARPA rejected,\\\" but\\nDARPA is still a part of the US Department of Defense\
    \ so it's hard to just ask\\nabout those proposals directly.  121\\nAnother piece of evidence are stories of how many\
    \ of the programs eked into\\nexistence by the skin of their teeth. Their stories often involve a dedicated PM\\ndoggedly\
    \ arguing for them through several rejections or impending budget cuts.\"\n  },\n  {\n    \"name\": \"It could be that\
    \ DARPA's selection\",\n    \"text\": \"process is actually amazing at\\nsupporting almost every eventually-\\nviable\
    \ idea but puts them all through\\nthe wringer first. This seems unlikely.\\nInstead, if many of the DARPA programs, especially\
    \ those that are especially\\nexciting outside of the military, barely made it over a line, there are as many or\\nmore\
    \ that didn't make it over that line.\\nWhile DARPA famously has fewer constraints than other government agencies,\\nit's\
    \ still part of the US government bureaucracy. As such, DARPA still has a\\nnumber of constraints that could rule out\
    \ otherwise viable programs. DARPA\\ndoesn't do any research in house, so it cannot pursue programs that would\\nrequire\
    \ spinning up an entirely new organization. It still needs to use\\nSee https://openai.com/blog/openai-lp/ .\\n60.\\nPart\
    \ II: It is Worthwhile and Possible to Riff on ARPA\\n- The Layout of the Maze\\nWhy try to emulate DARPA and not Bell\
    \ Labs\\nSee, for example, the history of DARPA's\\ndrone program in The DARPA Model for\\nTransformative Technologies:\
    \ Perspectives\\non the US Defense Advanced Research\\nProjects Agency .\\n61.\"\n  },\n  {\n    \"name\": \"/28/25, 11:59\
    \ PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n24/61\\\
    n\\ngovernment procurement, hiring, and salary practices, all of which could\\nsabotage potential programs.\\nAt the end\
    \ of the day, though, the only hard evidence to support the claim that\\nthere are DARPA-style ideas that DARPA doesn't\
    \ pursue is to successfully design\\nand run them!\\nCan the DARPA model exist outside of the government?\\nIn addition\
    \ to establishing the fact that it is possible to riff on the DARPA model,\\nit's also important to ask whether that riff\
    \ can exist outside of a government. Is it\\nonly possible to riff on the DARPA model successfully with organizations\
    \ like\\nIARPA or the recently announced British ARPA, ARIA? 62\\nThere is no good way to satisfyingly\\nanswer the question,\
    \ but we may be\\nable to make more headway on the isomorphic question:\\nWhat are the reasons that something could only\
    \ exist in the context of a\\ngovernment?\\nPut differently, there are \\\"hard\\\" and \\\"soft\\\" reasons why an organization\
    \ would\\nneed to be part of the government. Hard reasons are reasons that you literally\\ncannot get around without a\
    \ government. Soft reasons are places where it seems\\nreally hard without a government but possible. If the only reasons\
    \ we can find are\\nsoft, we are forced to conclude that a DARPA-riff can exist outside of a\\ngovernment.\\nThere are\
    \ two hard reasons that an innovation organization needs to be part of\\na government. The first is that the organization's\
    \ core work involves controlled\\ntechnology, like things that can directly be turned into nuclear or bioweapons. In\\\
    nthese cases, if you aren't part of a government, some government will, with\\nvarying degrees of force, make sure that\
    \ you don't exist at all.  124 The second\\nhard reason an organization would need to be part of a government is when\
    \ it\\nrequires more capital than could possibly be aggregated without the power of a\\nnation-state. The original moon\
    \ landings are good examples of work that could\\nnot be accomplished without government funding  125 \\u2014 NASA's budget\
    \ was 4%\\nof the US federal budget in 1965 and 1966.\\nAll of the other reasons feel soft. There are probably more soft\
    \ reasons why an\\ninnovation organization would want to be part of the government than are useful\\nto enumerate. I'll\
    \ list a few.\\nThe work involves doing things that impinge on people's rights (privacy,\\nproperty, etc.).\\nThe work\
    \ is expensive without much possibility for capturing a return.\\nThe work creates public goods or outputs whose value\
    \ can only be captured on\\nthe scale of a nation-state.\\nThe weight of government authority could significantly advance\
    \ the work.\\nThe organization needs a recurring budget that it can't find as part of a\\ncorporation.\\nThe organization\
    \ needs to utilize equipment and resources owned by the\\ngovernment, like national labs.\\nAn organization riffing on\
    \ the DARPA model absolutely is subject to several (all?)\\nof the soft reasons. However, I would argue that it isn't\
    \ subject to either of the\\nhard reasons. We have actual DARPA to do weapons research, and the numbers\\nnecessary to\
    \ run actual DARPA are large ($3.6B in FY2020), but not impossible to\\nachieve without government funds.\\nWhile being\
    \ part of a government could certainly relax some constraints\\nstanding in the way of success, it imposes many other\
    \ constraints. Successfully\\nriffing on DARPA might be extremely hard without being a government entity\\nbut riffing\
    \ on DARPA is extremely hard as a government entity \\u2014 just in a\\ndifferent way. Two actions of former DARPA directors\
    \ Regina Dugan and Arati\\nPrabhakar seem to back up this conclusion \\u2014 both of them are working on\\nnongovernmental\
    \ ARPA riffs. Dugan is the head of Wellcome Leap and\\nPrabhakar started Actuate . I agree with their tacit conclusion,\
    \ and would argue\\nthat in addition to being viable without government support, 21^st^-century riffs\\non DARPA should\
    \ be private.\\n21st-century DARPA-riffs should be private\\nOn the back of evidence that it's possible to build a DARPA-riff\
    \ outside of a\\ngovernment, I want to make a more aggressive claim: 21st-century DARPA riffs\\nnot only can but should\
    \ be voluntary organizations. There are two major reasons\\nfor this. First, modern bureaucracies introduce an intractable\
    \ tension between\\naccountability and the opacity a high-variance organization needs to succeed.\\nSecond, government\
    \ independence gives an organization a fighting chance to do\\nbetter than (actual) DARPA in some areas by taking advantage\
    \ of the ability to do\\nthings that a government organization cannot.\\nIf you ask most people \\\"Do you want the government\
    \ to be accountable for the\\nmoney it spends?\\\" They would probably answer, \\\"Of course!\\\" In a liberal\\ndemocracy,\
    \ the government is nominally accountable to The People; as much as\\npossible, we demand transparency and oversight over\
    \ how our money is spent.\\nGovernment transparency is good, but it also stands in direct opposition to the\\nfact that,\
    \ arguably, opacity is important to DARPA's outlier success. 63 If we are\\npainfully honest, the actions that lead\\\
    nto great results often a priori look like\\nbad ideas or offend our sense of fairness. It is completely reasonable to\
    \ demand\\nthat an elected government be fair. However, making a game more fair reduces its\\nvariance and rules out many\
    \ activities; the way ARPA operated in the '60s would\\nnever be allowed now. These two conflicting but correct outlooks\
    \ put any\\ngovernment organization trying to produce high-variance results between a rock\\nand a hard place. The way\
    \ to slice through this Gordian knot is by not forcing the\\ngovernment into the position in the first place.\\nDARPA\
    \ isn't perfect. 64 While some\\nof the downsides, like high-variance\\noutcomes, are structurally tied to the\\nmodel\
    \ itself, others are artifacts of being a government organization. As a\\ngovernment organization, DARPA needs to have\
    \ an air of impartiality \\u2014 they\\nmust issue open calls for most programs, go through a rigorous process to\\ndemonstrate\
    \ that they considered all options before making a decision, work\\nwith legitimate institutions, show they are paying\
    \ no more or less than fair\\nmarket price, the list goes on. On paper, these are all good things, but they also\\ncreate\
    \ a slower, more constrained process that potentially leaves opportunities\\nfor a private organization. A private organization\
    \ could potentially tap talent that\\nis hard for a government organization to attract because it has much more\\nflexibility\
    \ to play with salaries, equity, and other incentives. Hopefully, this list\\n(which could be expanded) is convincing\
    \ evidence that there are potential\\nimprovements to the DARPA model that are out of reach for government\\norganizations.\\\
    nA DARPA-riff both can and must do multiple experiments at\\nonce\\nRunning multiple organizational experiments flies\
    \ in the face of the common\\nwisdom that you should only change one thing at a time.  128 This is absolutely\\ntrue for\
    \ building a successful business. However, people have tried millions of\\nfairly open  129 experiments with organizational\
    \ practices over many decades in\\neverything from human resources to management and employee compensation.\\nAs a result,\
    \ while you might not like how an organization does HR or design,\\nbasic organizational structure and best business practices\
    \ are pretty effective.\\nResearch organizations have simultaneously had many fewer experiments (just\\ncompare the number\
    \ of companies that have been started to the number of\\nuniversity labs that have been started), less selective pressure,\
    \ and looser\\nfeedback loops.\\nConcretely, you're in a bind if you simultaneously believe it is worthwhile and\\npossible\
    \ to riff on DARPA and that you should only change one thing at a time.\\nYou would be limited to creating new government\
    \ organizations, like ARPA-E\\nand IARPA. If you buy the argument that it's possible to riff on the DARPA\\nmodel outside\
    \ of government, that single shift forces you to rethink multiple\\nthings (legal structures and funding, for a start),\
    \ whether you like it or not. At that\\npoint, clinging to existing structures could become more of a liability than\\\
    nwisdom, because the assumptions that made those structures good ideas in the\\nfirst place no longer hold.\\nSetting\
    \ up a new colony in Massachusetts is very different than setting one up\\non Mars in terms of the number of things you'll\
    \ need to rethink. Environmentally,\\nMassachusetts is pretty similar to England, so it makes sense to keep many\\nthings\
    \ the same. Sure, you might want to use some different crops to deal with\\nthe weather, but you still want to use roughly\
    \ the same tools, farm the same way,\\nand build houses the same way. Even the extreme religious stuff that was the\\\
    nwhole point of the colony eventually reverted to the mean. Mars, on the other\\nSee \\\" A new UK research funding agency\
    \ .\\\"\\n62.\\nSee \\\" Why Does DARPA Work ?\\\"\\n63.\\nSee the \\\" Room for Improvement\\\" section of\\n\\\"Why\
    \ Does DARPA Work? \\\"\\n64.\\nThings any DARPA-riff will need to consider\"\n  },\n  {\n    \"name\": \"/28/25, 11:59\
    \ PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n25/61\\\
    n\\nhand, is unlike anywhere on Earth (except maybe Antarctica). If you try to live\\nthere in anything resembling the\
    \ way you did before, you're dead.\\nSo a DARPA-riff needs to do some institutional experiments to survive at all.\\nOn\
    \ top of that, there are a number of experiments that seem like they can only be\\ndone in the context of an organization.\
    \ Since the goal of a DARPA-riff is not just\\nto enable more paradigm-shifting technology but to try to demonstrate a\
    \ new\\ninstitutional model, guinea pigging should be part of its role. A laboratory for\\nexperiments in 21^st^-century\
    \ research management, if you will.\\nThis isn't to advocate for throwing everything away just because it smells like\\\
    nthe past. Chesterton's Fence is important! Instead, it's important to learn from\\nthose who have come before \\u2014\
    \ hopefully, the valuable lessons from Bell Labs and\\nDARPA have convinced you of that. But in a strongly disequilibrium\
    \ state, you\\nneed to evaluate each component on its own merit, and perhaps grab\\ncomponents from disparate parts of\
    \ history or the organizational landscape.\\nPulling off this balance will be like sailing between Scylla and Charybdis;\\\
    nextraneous experiments on one side and the same old incentives leading to the\\nsame old outcomes on the other. With\
    \ this gauntlet before us, I want to note that\\nthere is a whole ontology of both experiments and structural components\
    \ that\\nshouldn't be poked. There are some parts of the DARPA model that, if changed,\\nwould make it hard to even call\
    \ an organization a \\\"DARPA-riff\\\" in the first place.\\nOn top of these immutable considerations, there are some\
    \ experiments that must\\nhappen. Figuring out how money works without a DoD budget is one of the most\\nglaring ones.\
    \ Other experiments are more \\\"optional\\\" \\u2014 they might make the\\ndifference between success and failure, or\
    \ they might be a distraction.\\nA DARPA-riff needs to be obsessed with program managers\\nThe relationship between the\
    \ DARPA model and empowered program managers\\nis like the relationship between a hydra and its many heads. The heads\
    \ are part of\\nthe hydra, its business end, and one of its defining characteristics.\\n\\\" Why Does DARPA Work? \\\"\
    \ covers DARPA PMs extensively, but the key\\npoints are worth reiterating both as a refresher and to emphasize that\\\
    nempowered PMs are the core thing one should not mess with. \\\"What about\\nmanaging programs through a committee?\\\"\
    \ NO. \\\"What if performers just\\nsubmitted grants and coordinated among themselves?\\\" NO. \\\"What about a more\\\
    nrigorous approval process to make sure money isn't wasted?\\\" NO. \\\"What if\\npeople could be career program managers?\\\
    \" NO. You get the point.\\nThe importance of program managers means that anybody attempting to\\nreplicate DARPA's outlier\
    \ results needs to be utterly obsessed with bringing the\\nright program managers on board. Getting the right program\
    \ managers will\\nrequire understanding both who those people are and how to convince them to\\njoin.\\nProgram managers\
    \ can't just be general high-quality people but need to exhibit\\nspecific traits: curiosity, low ego, good at bringing\
    \ people together, good at\\ncommunication, and have high doing-to-talking ratios.\\nA DARPA-riff will need to do some\
    \ hard work to convince good program\\nmanagers to join. A new organization can't depend on accumulated prestige, and\\\
    na private organization can't take advantage of patriotic instincts the way that a\\ngovernment organization can. So you'll\
    \ need to be creative! One speculative\\napproach for recruiting PMs is to embrace people who have expertise but are not\\\
    ntraditionally credentialed. This pattern is not uncommon in software-adjacent\\ndisciplines like deep learning or cryptography,\
    \ where people can independently\\nbuild mastery and then do real cutting-edge work without going through\\ntraditional\
    \ institutions. Outside of software, uncredentialed research expertise is\\nrarer; developing it requires more specialized\
    \ equipment and tacit knowledge\\nthat lives primarily in traditional institutions. However, uncredentialed expertise\\\
    nstill exists outside of software, and if predictions about the democratization of\\ndisciplines like biology play out,\
    \ they may become easier to find over time.\\nDeveloping taste in uncredentialed experts might yield fruit!\\nA DARPA-riff\
    \ has career affordances that you can't find elsewhere, which will\\nhopefully appeal to a subset of folks who would be\
    \ excellent PMs. There aren't\\nmany opportunities to work with extreme autonomy on getting a technology out\\ninto the\
    \ world without needing to tune the work to either produce papers or\\nhockey-stick growth numbers. I suspect that there\
    \ are a few extremely competent\\npeople out there (it doesn't take that many) who are seething to shift\\ntechnological\
    \ paradigms and are willing to trade off salary, prestige, and stability\\nfor the ability to make those shifts happen.\
    \ Of course, often that sort of pitch\\nleads to bitter disappointment, so smart people are rightly skeptical of it! The\\\
    nburden of proof is then on the organization to become a place that does deliver\\non those promises.\\nMore than any\
    \ specific ideas, though, a DARPA-riff will need to constantly ask\\nitself: How do we become a place that PMs want to\
    \ work?\\nPeople who have done research should be in charge of research\\n(and more generally, people who have done a\
    \ thing should be in\\ncharge of that thing)\\nOnce hired, PMs have significant agency to make programs succeed or fail.\
    \ This\\npower should make anybody building a DARPA-riff take very seriously the\\nquestions, \\\"What makes people good\
    \ at being in charge of research and how do\\nyou find those people?\\\" This question is also important for anybody who\
    \ cares\\nabout innovation systems more generally \\u2014 too-involved funders, MBAs running\\nthe details of research\
    \ programs, and other control-project mismatches are all\\ntoo common.\\n\\\"Being in charge of a thing\\\" is a nebulous\
    \ concept. However, at its core is the\\nability to directly control the fate of that thing; some combination of deciding\\\
    nwhether a project or person gets approval funding, how well a project is doing,\\nand coming up with ideas for what should\
    \ be done in the first place.\\nIn research especially, there are very few metrics you can use to distinguish\\nbetween\
    \ a good idea and a bad idea or how a project is progressing once it's\\nstarted. Even when metrics suggest that \\\"\
    everything is working great!\\\" it is easy\\nfor researchers to fool themselves, optimize for the wrong thing, or overlook\
    \ a\\ncore problem. As a result, the decisions that someone in charge of research needs\\nto make demand a level of understanding\
    \ that can peel back the metrics and poke\\nat what's going on underneath.\\nThe \\\"understanding\\\" that allows you\
    \ to see past metrics has a lot to do with\\nintuiting the affordances of that thing. That is, you have built up a rich\
    \ enough\\ntapestry of patterns that you can subconsciously integrate many explicit and\\nimplicit inputs and have a sense\
    \ of the effect of different interventions into the\\nsystem. This process, almost by definition, is hard to abstract\
    \ \\u2014 if we were good\\nat de-abstracting it, you could put it in a metric!\\nTo illustrate, I'll use an example that\
    \ has nothing to do with research: gym\\nmanagers. You can always tell when the manager on duty at a gym is a\\nweightlifter\
    \ themselves by how they react to people deadlifting in socks.\\nDeadlifting in socks is a common practice; nominally\
    \ because it enables you to\\n\\\"feel\\\" the floor as well as possible and balance while lifting heavy weight (and\\\
    nalso because some famous weightlifters recommended it many years ago). Rules\\nthat everybody must wear shoes in the\
    \ gym are also common practice; shoes can\\nmitigate the damage if you drop something heavy on your foot, and some people\\\
    nwould find it gross if everybody were walking around without shoes.  130 If a\\nmanager hasn't done much lifting, they'll\
    \ immediately stop someone deadlifting\\nin socks \\u2014 it's against the rules! (Note here that metrics are nothing\
    \ but rules\\nabout what's good and bad.) If a manager has lifting experience, they'll generally\\nlet someone deadlift\
    \ in socks if they look like they know what they're doing and\\nare lifting enough weight to warrant it. Not only will\
    \ they probably not hurt\\nthemselves, but shoes won't stop damage above a certain weight, anyway. Note\\neven in this\
    \ simple example how quickly we run into illegibility! What does it\\nmean for someone to \\\"look like they know what\
    \ they're doing\\\"? It's not just a\\nmatter of how big their muscles are or whether they use chalk \\u2014 it's how\
    \ they\\nput the weight on the bar, how they hold themselves, the intention in their eyes;\\nthat is, things that are\
    \ completely inadmissible as metrics. Research is immensely\\nmore complex than a gym!\\nThis person looks like they know\
    \ what they're doing.\\nAs uncomfortable as it is to say in our metrics-driven world, both good gym\\nmanagers and research\
    \ managers depend on intuition. This section should more\\naccurately be titled \\\"People who have an intuition for research\
    \ should be in\\ncharge of research.\\\" However, it's extremely hard to get a sense of someone's\"\n  },\n  {\n    \"\
    name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\\
    n26/61\\n\\nintuition for a thing \\u2014 even if you yourself have intuition for the thing. So, in a\\ndelightful meta-situation,\
    \ we need to find more legible heuristics for \\\"intuition.\\\"\\n\\\"Having done a thing\\\" is a reasonable heuristic\
    \ for \\\"has intuition about this\\nthing.\\\" It's of course not always true; people who have done a thing do not always\\\
    nhave intuition for it, and people who have not done the thing can sometimes\\nbuild intuition for it! It helps if they\
    \ have a track record that could only be\\naccomplished by having an intuition for the thing or extreme luck. Of course,\
    \ it\\nrequires intuition to distill what pieces of a track record can be accomplished\\nwithout intuition. Intuition\
    \ turtles all the way down.\\nThe \\\"gotcha!\\\" comes in deciding what counts as \\\"having done the thing.\\\" Does\\\
    nsomeone who worked in a biology lab doing experiments on rat brains count as\\nsomeone who has \\\"done\\\" biology?\
    \ Should they be in charge of a molecular\\ngenetics project? A DNA-origami project? This is where you need to defer back\\\
    nto the fact that experience is just a heuristic and attempt to tease out how much\\nintuition is shared between the past\
    \ experience and the future work. The trap to\\navoid here is that sometimes someone will overspecialize and end up being\
    \ less\\nqualified to be in charge of a thing in an area that's normally quite close to their\\nexperience. For example,\
    \ someone who is a tenured professor in biology working\\non lipid bilayers might be terrible at being in charge of a\
    \ CRISPR-based program,\\nwhile someone with relatively less experience would be good at it. The trap there\\nis to take\
    \ that logic to the extreme and declare, \\\"Experience doesn't matter!\\\" If\\nyou take anything away from this section,\
    \ I hope it's that experience does matter,\\nbut that it isn't the only thing that matters.\\nOf course, at some point,\
    \ someone needs to be in charge of several things and\\nthey can't have done everything. My hunch is that the trick to\
    \ navigating this\\nunavoidable tension is \\\"attenuated delegation.\\\" That is, the less intuition\\nsomeone has, the\
    \ more heavily they should delegate; or, conversely, the less they\\nshould be involved. You could roughly divide involvement\
    \ into three levels:\\nbinary go/no-go decisions, progress measurement and course correction, and\\ndirectly helping in\
    \ the process. Each of these requires quite a bit more intuition\\nthan the one before it.\\nAnybody attempting to emulate\
    \ DARPA needs to be willing to\\nsit with a lot of discomfort for a long time\\nThe results of solutions R&D take a long\
    \ time to impact the world. On top of\\nthat, the attribution is usually mixed because of how many entities often need\
    \ to\\ntouch a technology between where a DARPA-riff will work on it and when it\\nenters regular use. I desperately want\
    \ to burn this into your brain because I\\nsuspect a DARPA-riff's most likely failure mode is the frustration of some\\\
    ncombination of people working on it or supporting it, leading to result-killing\\ntimescale compression or abandoning\
    \ the organization altogether.\\nThe Mother of All Demos happened in 1968 \\u2014 six years after J. C. R. Licklider\\\
    njoined DARPA. Personal computing technology took another five years to go\\nfrom this demo to prototype system in the\
    \ Xerox Alto and (depending on how you\\ncount) another 10 years after that to become a commercial product in the Apple\\\
    nLisa. That's 21 years between the start of the ARPA program and a product on\\nthe shelf that people could buy. Similarly,\
    \ the first DARPA Grand Challenge that\\narguably kicked off modern autonomous driving happened in 2004 (and was\\narguably\
    \ a failure \\u2014 none of the cars could complete the course) and, of this\\nwriting in 2021, autonomous vehicles are\
    \ still not mainstream. That's 17 years\\nand counting.\\nPeople in the startup world often pride themselves on their\
    \ timescales \\u2014 10\\nyears is the rough average from first funding to IPO. The timescales we're\\nlooking at here\
    \ are twice that or more, not to an IPO but to a customer-facing\\nproduct (if the work even ends up as a product!) that's\
    \ possibly attributed to\\nsomeone else entirely. It's like running a relay marathon. Of course, some\\nscientists are\
    \ rolling their eyes \\u2014 \\\"That's nothing,\\\" they say, tuning the\\nexperiment they've been working on for the\
    \ past three decades.\\nAdding to the uncertainty is the fact that a big part of solutions R&D is to get\\nthe ball rolling,\
    \ not to get it to the goal. This role is important but muddles\\nattribution. You see this historically in how DARPA\
    \ seeded some of the best CS\\ndepartments in the country; DARPA doesn't get credit for everything that has\\ncome out\
    \ of the University of Utah CS department 65 (nor, arguably, should it!).\\nDARPA money often plays a role of de-\\nrisking\
    \ research to the point that the\\nNSF is willing to fund it. Almost by\\ndesign, there will be arguments about\\nwho\
    \ deserves credit for things a\\nDARPA-riff helped with.\\nOn top of excruciating timelines and attribution uncertainty,\
    \ riffing on DARPA\\nwill entail working on weird shit . You've heard of the successes, but DARPA\\nregularly funds wacky\
    \ things that go nowhere. Things that make you think,\\n\\\"They're wasting my tax dollars on that?\\\" Warp drives. Remote-control\
    \ insects.\\nCreating fusion through soundwaves. Super-soldier serum. Though it should be\\nnoted that DARPA had nothing\
    \ to do with telepathic goat murder research. Over\\ntime, DARPA directors have needed to fight to keep DARPA from being\
    \ toned\\ndown and turned into a normal R&D org.\\nA big part of the unavoidable discomfort for supporters of a good DARPA-riff\\\
    nis that any of these attributes can also be used as an excuse for poor performance.\\n\\\"We're not showing clear results\
    \ because we need more time to resolve\\nuncertainty\\\" can be true or false, and even the person saying it might not\
    \ know\\nthe difference. The line between a program that just takes time and is going\\nnowhere is often illegible to\
    \ everybody but the people working on it. Ditto for\\nattribution and weirdness. Here lies yet another Scylla and Charybdis\
    \ that we\\nmust navigate; there is no compass here besides trust.\\nIt is important for big things to start small\\nAs\
    \ far as I can tell, every big thing that really sticks in people's heads started at\\nbare minimum an order of magnitude\
    \ smaller than where it ended up. This goes\\nfor companies, organizations, projects, movements, you name it.\\nBy contrast,\
    \ it seems that whenever someone starts something huge \\u2014 a\\nmassive fund; a company that is hyped from day one;\
    \ a movement where they\\ndeclare, \\\"We are starting a movement to change the world!\\\"; a new field where\\nthey declare,\
    \ \\\"We are creating a new field!\\\" \\u2014 it ultimately disappoints.\\nThere are several practical reasons for why\
    \ big things tend to succeed more\\noften if they start small. Three of the biggest ones (which are not completely\\nindependent\
    \ of each other) are expectations, momentum, and trust.\\nWhen something starts small, it has the ability to exceed expectations.\\\
    nExceeding expectations sticks in people's heads more than meeting them.\\nExceeding even small expectations is memorable!\
    \ By contrast, when something\\nstarts big, it has massive expectations from the beginning, so it is hard to exceed\\\
    nthem.\\nSmall things have less momentum, which in turn allows you to make many\\nquick micro-adjustments to iron out\
    \ problems and move in a better direction.\\nLess momentum lowers the cost of changing things. It's the difference between\\\
    nbeing in a kayak and a cruise ship moving at the same speed. If you know you're\\ngoing in the right direction, you want\
    \ to be in the cruise ship, but almost nobody\\ngets everything right from day one. You want to turn the low-momentum\
    \ kayak\\ninto the cruise ship only once you've made several course corrections.\\nThe momentum-related costs of changing\
    \ direction come in several forms.\\nDirection-changing costs could appear as coordination-related transaction costs\\\
    nbetween people: The more people who are involved in something, the more\\ncoordination costs you accrue when you try\
    \ to change anything. The costs could\\nbe in terms of reputation: The more eyes and expectations on what you're doing,\\\
    nThe University of Utah CS department is\\nnotorious for early computer graphics work\\nlike the Utah Teapot . Pixar Founder\
    \ Ed\\nCatmull is a direct descendent of this\\ntradition.\\n65.\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n \
    \   \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n27/61\\n\\nthe\
    \ bigger the confusion and/or reputation damage you cause when you choose to\\ndo something different. The costs could\
    \ be literal capital costs: If you buy an\\nexpensive piece of hardware that ends up being useless or a large office in\
    \ a place\\nthat ends up being the incorrect place.\\nStarting small enables you to build up trust. In large part, building\
    \ trust is a\\nprocess of verifying that someone or something is both competent and reliable.\\nTo some extent, it's just\
    \ about \\\"getting in the reps.\\\" The same quick, small\\nactions you use to course-correct can (if done competently)\
    \ create many trust-\\nverify loops. A history of reliable and competent small actions provides a strong\\nfoundation\
    \ for bigger leaps of faith. On the other hand, asking people to take a\\nbig leap of faith up front often leads to second-guessing\
    \ or sandbagging, which\\nin turn can bring even the largest organization to its knees.\\nIn the context of a DARPA-riff,\
    \ this is a warning about the dangers of coming\\nout of the gate yelling, \\\"We're going to change the world!\\\" and\
    \ raising a massive\\nwar chest commensurate with that statement without first working out kinks and\\nbuilding trust.\
    \ It's not an injunction against massive ambition! Soberingly, the\\nadmonition to start small creates a tension in conjunction\
    \ with the \\\"portfolio\\\"\\nnature of the DARPA model, which we'll address later.\\nThe boon and bane of institutional\
    \ missions\\nOn the note of ambitions, it's worth briefly talking about institutional missions.\\nInstitutional missions\
    \ are a tricky thing. On the one hand, they can be an\\ninspirational rallying point and a powerful filter for actions\
    \ you should and\\nshould not take. On the other hand, they can be distracting piles of words that\\nobscure reality and\
    \ enable people to feel good about themselves without earning\\nit.\\nIt's unclear whether people focus too much on missions\
    \ or too little. Most\\nmission statements are bullshit on which people fixate at the expense of putting\\ntheir heads\
    \ down and letting actions speak for themselves. This phenomena\\nencourages (at least in me) a counter-reaction to eschew\
    \ thinking and talking\\nabout mission entirely \\u2014 \\\"Let's earn the luxury of thinking about mission\\nthrough\
    \ hard work first.\\\" I'm still sympathetic to this view, but at the same time,\\nspending some cycles on missions is\
    \ probably worthwhile. People use an\\ninstitutional missions as proxies for what that an organization actually does,\
    \ so\\nwithout a mission it will be hard to succinctly get across a useful mental model of\\nan organization. It's especially\
    \ hard to build that model if you're doing something\\nnew with long feedback loops, like building a DARPA-riff. All institutions\
    \ have\\nimplicit missions, so there is a mission, whether you make it explicit or not.\\nA good mission can also be a\
    \ powerful filter both on actions and on people.\\nYou should be able to ask of any action or project, \\\"Does this fit\
    \ within the\\nmission?\\\" and be able to come up with a concrete answer that can plausibly be\\nno. Creating a mission\
    \ that sounds good to everybody is seductive \\u2014 we all want\\nto be loved and be lovely. As a result, most missions\
    \ are so nebulous as to\\narguably cover anything. They don't enable you to rule things out . Any given\\nmission shouldn't\
    \ appeal to everybody. Institutions need to differentiate between\\nindividuals inside and outside themselves, and missions\
    \ that don't sound good to\\neverybody can help with that.\\nSpaceX and Bell Labs\\\" missions are good examples of broad\
    \ but discriminating\\nmissions. Bell Labs\\\" mission was to \\\"Support the Bell System with Science and\\nEngineering\
    \ Advances.\\\" SpaceX's mission is to \\\"Make humanity an\\ninterplanetary species.\\\" Both of them cover a massive\
    \ range of activity, but at the\\nsame time, there are many activities that do not fit under their umbrellas. Both of\\\
    nthem will appeal to some people and completely turn off other people.\\nFrontier technology has bespoke sales channels\\\
    nOutside of software and therapeutics, there are no good default paths for new\\ntechnologies to get into the hands of\
    \ end users.  132 The less it looks like\\nanything that came before it, the fewer precedents there are for how to buy\
    \ or\\nsell it! Figuring out how to sell a technology  133 can be a comparable challenge to\\ndeveloping it in the first\
    \ place. It's a challenge that's worth worrying about even\\nif your primary goal is not to make money, because someone\
    \ needs to buy\\nmanufactured technology eventually in a monetized economy . Questions about\\nsales channels introduce\
    \ a tension into technology creation \\u2014 things you can do\\nto make a technology more useful to end users (for example,\
    \ which performance\\nmetrics you focus on), but too much focus on end use can push the technology\\ninto a premature\
    \ local optimum.\\nBy contrast, software and therapeutics have well-established sales channels. As\\nthe two (glaring)\
    \ exceptions to the rule, they are illustrative and perhaps hint at\\nhow to improve sales channels for other technologies.\
    \ People have sold software\\nfor long enough and in enough volume that there are well-established strategies\\nfor diffusing\
    \ software: \\\"land and expand,\\\" enterprise sales, open source while\\nselling managed instances, etc. Individual\
    \ consumers and companies have\\nreasonable mental models about how to acquire and test new software. This isn't\\nto\
    \ say that everything has been tried, that software sales is easy, or that software\\nis all the same. However, there\
    \ are fewer unknown unknowns on both sides of a\\nsoftware transaction than, say, a new sort of hydrogen filter for a\
    \ petroleum-\\nprocessing plant.\\nThe FDA approval process provides a set of extremely legible milestones that\\nallow\
    \ therapeutic developers and funders to resolve the normal standoff: \\\"We'll\\ntell you how much money we'll give you\
    \ if you can tell us some clear milestones.\\\"\\n\\\"We'll be able to tell you some clear milestones if you give us a\
    \ sense of how\\nmuch money you'll give us.\\\" Instead, the negotiation becomes, \\\"We need $X to\\nget through Phase\
    \ 1 \\u2014 if we do that, will you agree to give us $Y to get through\\nPhase 2?\\\" \\\"Sure.\\\"  134 This relatively\
    \ straightforward (but still risky!) path from lab\\nto market depends on the incredibly low market risk for therapeutics\
    \ that make it\\nthrough the FDA. Insurance companies pay for the majority of therapeutics and\\nregularly agree to how\
    \ much they will buy and how much they will pay for a given\\ntherapeutic, assuming it makes it through the approval process.\
    \ A big part of the\\njob for more traditional VCs who focus on therapeutics is to lubricate this whole\\nprocess.\\nFiguring\
    \ out how to sell a technology can be as complicated as creating it in\\nthe first place: Who/which member of an organization\
    \ is actually spending the money?\\nWho do you need to convince that it's a good idea? How do they know it works? What\\\
    ndoes the contract look like? Do you need to go through a third party? All of these\\nquestions slither subtle tentacles\
    \ back to the development process. These\\ntentacles raise many uncomfortable questions: How low does the bill of materials\\\
    nneed to be? What does this need to interface with? Should this even be a\\nproduct? (\\\"Build a startup\\\" is in itself\
    \ a channel design choice.) Uncertainty about\\na technology's sales channel in turn affects how much support it can get\
    \ in the\\nfirst place. People are far more willing to support uncertain work like\\npharmaceutical development that has\
    \ a clear light at the end of the tunnel.\\nPeople creating technology often do not have the bandwidth to give sales\\\
    nchannels the attention they require. This limited bandwidth creates another\\ntension: What is the role of the people\
    \ building technology in diffusing  135 it?\\nOn the one hand, the idea of \\\"build technology and throw it over the\
    \ wall\\\" has\\nserious flaws \\u2014 small nudges in development can have large effects on its\\nusability, and involved\
    \ creators can be essential to successful diffusion. On the\\nother hand, imposing diffusion-related questions at the\
    \ wrong time can be\\ndistracting at best, and at worst force a technology to a local optimum where it is\\n\\\"useful\\\
    \" but blocked from reaching its full potential.\\nIt's tempting to punt on worrying about the challenges of diffusing\
    \ new\\ntechnology until it's actually built. The instinct is reasonable but misguided\\nbecause (un)certainty about diffusion\
    \ feeds back and hinders or helps\\ntechnological development. Drugs with billion-dollar development bills can be\\ncreated\
    \ only because therapeutics have well-established sales channels. There's a\\nfeedback loop between the availability of\
    \ funding and what gets built! 80% of VC\\ndollars go toward software and pharma 66 which invariably leads to more work\
    \ in\\nthose areas, further establishing sales\\nchannels and reducing uncertainty in\\nfuture software and pharma investments.\
    \ Conversely, the sentiment \\\"Even if it\\nworks, you have no idea how you're going to sell it (or otherwise enable\
    \ it to have\\nan impact)\\\" makes people hesitant to fund development work or put in the effort\\nto get the technology\
    \ to work in the first place!\\nI am not confident about any of the many possible experiments a DARPA-riff\\ncan do to\
    \ address the sales channel dilemma, so I'll describe them further on in\\nthe \\\"Speculation\\\" section. However, I\
    \ am confident that any DARPA-riff that\\nwants to have an impact needs to address the dilemma somehow.\\nStepping into\
    \ the shoes of industrial labs\\nIf we've established anything so far, it's that a DARPA-riff will need to fill at least\\\
    npart of the niche once filled by industrial labs . Embracing that role, it's\\nimportant to ask: Which aspects of the\
    \ niche is a DARPA-riff well suited to fill?\\nWhere will it be weak? What can it do structurally to maximize strengths\
    \ and\\nminimize weaknesses?\"\n  },\n  {\n    \"name\": \"Industrial labs enabled work on general-purpose technology\
    \ before it's\",\n    \"text\": \"specialized.\\nWorking on general-purpose technology will require a DARPA-riff to explicitly\\\
    nand uncomfortably push back against the (accurate) common startup wisdom to\\n\\\"focus on a niche.\\\"  137 At the same\
    \ time, any technology does need to find an\\nSee the NVCA 2017 Yearbook .\\n66.\"\n  },\n  {\n    \"name\": \"/28/25,\
    \ 11:59 PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\\
    n28/61\\n\\ninitial niche eventually, so programs should have some precise hypotheses about\\nan eventual application.\
    \ Counterintuitively, this tension between considering\\nhow a technology will be used and potential local-optimum traps\
    \ may be one of\\nthe barometers for a healthy organization, ensuring that it doesn't lean too far\\none way or another.\
    \ Maintaining this unstable balance will require a lot of work\\nto frame goals correctly. It's perhaps a cliche at this\
    \ point, but the development\\nof the transistor is a good example of walking the general-specific line. It had a\\nprecise\
    \ goal \\u2014 to find a solid-state replacement for the vacuum tube that we\\nthink will be useful in telephone repeaters\
    \ and switches \\u2014 but nobody\\nconstrained the work to only make more efficient repeaters and switches.\"\n  },\n\
    \  {\n    \"name\": \"Industrial labs enabled targeted piddling around\",\n    \"text\": \"A DARPA-riff can enable targeted\
    \ piddling around through low-stakes\\nseedling programs, using a single organizational umbrella to quickly spin up and\\\
    nclose down programs, and having some number of \\\"free radicals.'\\nDARPA uses low-stakes seedling programs to \\\"\
    acid test\\\" the riskiest part of a\\nprogram idea. 67 There's no reason that\\na DARPA-riff can't shamelessly copy\\\
    nthat strategy directly. The trick is to go\\ninto them with the explicit attitude of\\n\\\"Let's see what will happen.\\\
    \" It's important to acknowledge that while everyone\\nwould rather seedlings lead to a promising program than be nothingburgers,\\\
    nreality might have different plans. The way to prevent that preference from\\nmorphing into pressure is to explicitly\
    \ make sure that negative results don't have\\nlasting effects. Specifically, negative results absolutely cannot affect\
    \ a program\\nmanager's ability to run other experiments or affect an external researcher's\\nrelationship with the organization\
    \ as a whole.  139\\nIt's tempting to ask, \\\"Why do you need a DARPA-like organization at all? Just\\nrun each program\
    \ separately.\\\" An organizational umbrella over programs can\\nturn targeted piddling around into a compounding long-term\
    \ benefit.  140 The\"\n  },\n  {\n    \"name\": \"results of piddling around often come in the form of informative failures\
    \ or tacit\",\n    \"text\": \"knowledge. It's easy for these results of piddling around to evaporate. If each\\nprogram\
    \ were a separate organization, pursuing any serendipitous discovery that\\ndidn't help the program move toward its goals\
    \ would be a distraction. Someone\\nmight keep track of those discoveries, but there would be relatively little\\nincentive\
    \ to do so.  141 An umbrella structure can enable serendipitous potential\\nside quests discovered during the main body\
    \ of a program to be fed back to the\\nbeginning of the \\\"pipeline\\\" and possibly become their own programs.\\nA DARPA-riff\
    \ could also enable targeted piddling around by explicitly having\\npeople whose job is to piddle around! These \\\"free\
    \ radicals\\\" 68 could be competent\\nindividuals who aren't attached to any\\nspecific project. They could help PMs\\\
    ndesign programs, do experiments, or\\nresearch areas that nobody in the\\norganization has even thought about. You could\
    \ imagine this role as having the\\nflavor of a \\\"pre-PM [X]-in-residence.\\\" The role would resemble an internship\
    \ in\\nthe sense that the radical isn't doing anything mission-critical and could\\npotentially become a PM, but without\
    \ the expectation of that outcome. The role\\nwould be unlike an internship because it would involve much more\\nindependence,\
    \ and there would be less of a teaching component \\u2014 people in the\\nrole would already be skilled. It also rhymes\
    \ with the constant theme in Bell Labs\\nnarratives where \\\"free radicals\\\" between projects would play a critical\
    \ role in\\neverything from semiconductor manufacturing techniques to solar cells. 69\\nHowever, this sort of role would\
    \ need\\nto be defended: It's anathema to\\nefficiency and could easily be a waste of resources!\"\n  },\n  {\n    \"\
    name\": \"Industrial labs enabled high-collaboration research work among larger\",\n    \"text\": \"and more diverse groups\
    \ of people than in academia or startups.\\nA DARPA-riff can be a bridge between different worlds and disciplines.\\nSeedling\
    \ programs enable PMs to slowly pull together a diverse set of performers\\nby holding regular closed-door meetings (so\
    \ people can talk about real problems\\ninstead of just showing off good results) and making sure different performers\\\
    nknow one another. 70 J. C. R. Licklider\\nwas a master of this \\u2014 not only having\\nregular meetings for PIs working\
    \ on\\ndifferent aspects of interactive\\ncomputing but for the graduate students working on it as well. A DARPA-riff\
    \ can\\nfurther enhance these collaborations if it explicitly pulls people together into a\\nsingle organization as the\
    \ program progresses.\\nInteractions between program managers could create a high-collaboration\\nenvironment between\
    \ wildly different disciplines. Program managers can and\\nshould be drawn from a wide range of professional and technical\
    \ experience.\\nThis diversity, combined with correctly set cultural expectations, could go a long\\nway toward filling\
    \ this aspect of the niche. For example, at Bell Labs, \\\"They were\\nnot to work with their doors closed. They were\
    \ not to refuse help to a colleague,\\nregardless of his rank or department, when it might be necessary.\\\" 71\\nRealistically,\
    \ a DARPA-riff won't be\\nable to fulfill this role as well as a\\ngolden-age industrial lab. Programs that initially\
    \ revolve around externalized\\nresearch might make high-collaboration environments challenging, and there\\nwon't be\
    \ the same number of \\\"floating\\\" people. However, a DARPA-riff will fill\\nthis part of the niche much better than\
    \ academia or startups do today.\"\n  },\n  {\n    \"name\": \"Industrial labs enabled smooth transitions of technologies\
    \ between\",\n    \"text\": \"different readiness levels \\u2014 they cared about both novelty and scale.\\nThis one is\
    \ tricky. If DARPA's small size is indeed a key to its success, a\\nDARPA-riff can't act like an industrial lab by supporting\
    \ both a large number of\\npeople working on extremely speculative projects and a large manufacturing\\nteam.\\nA scheme\
    \ where programs are set up so that they can bud off into their own\\norganizations could address the problem by becoming\
    \ the organization on the\\nother end of the handoff. As they progress, programs could shift from loose\\ncollections\
    \ of projects to independent organizations whose purpose is to get the\\ntechnology that they developed out into the world,\
    \ either by selling it as a startup\\nor helping people adopt it as a nonprofit.\\nOf course, many technologies are more\
    \ effective if they're absorbed by existing\\norganizations; this is especially true for new processes. 72 Another important\\\
    napproach to the handoff problem will\\nbe involving organizations that the\\ntechnology might be handed off to\\nfrom\
    \ day one (or before!).\\nFor a small DARPA-riff, smooth transitions will require long-term\\nrelationships  147 with\
    \ both exploratory researchers and manufacturers. Ideally,\\nthese relationships could become part of a relatively systematized\
    \ pipeline  148\\nreminiscent of Flagship Pioneering, with less profit-focus and more discipline\\ndiversity. On one end\
    \ of the pipeline, you want people helping you surface and\\nsmoothly build programs around promising research. On the\
    \ other end, you want\\nto have trusted connections who can help \\\"manufacture\\\" the output, whatever\\nthat entails.\
    \ How to build this pipeline is an open question. While it will\\ninevitably involve a lot of legwork, it could be systematized\
    \ by creating a\\nconsortium of partners similar to the MIT Media Lab or the Santa Fe Institute.\"\n  },\n  {\n    \"\
    name\": \"Industrial labs provided a default customer for process improvements\",\n    \"text\": \"and default scale for\
    \ products.\\nThis part of the niche is strongly coupled to the previous one, and comes with\\nsimilar possibilities and\
    \ challenges. Smooth technology transitions at the end of\\na program basically demand something resembling default customers\
    \ and scale.\\nA DARPA-riff will never have its own Western Electric. However, a persistent\\norganization with a track\
    \ record of quality work can get into a situation where\\nevery program doesn't need to start from scratch when it is\
    \ ready to \\\"graduate.'\"\n  },\n  {\n    \"name\": \"Industrial labs often provided a precise set of problems and feedback\"\
    ,\n    \"text\": \"loops about whether solutions actually solved those problems.\\nThis is a part of the niche that a\
    \ DARPA-riff can absolutely move into, but it\\nwill require a good chunk of conscious experimentation. Feedback loops\
    \ that\\ngenerate precise problems and filter solutions are not structurally built into a\\nDARPA-riff. At the same time,\
    \ other prerogatives around graduating programs\\ncan serve double duty. Additionally, like many independent research\\\
    norganizations, DARPA-riffs could do consulting work to help external\\norganizations implement new tools and processes.\
    \ In addition to generating\\nfeedback, this sort of consulting could nudge larger organizations toward being\\ncustomers\
    \ (see #5 above) and provide an alternative revenue source. As\\nmentioned earlier, a DARPA-riff could also set up a consortium\
    \ similar to the\\nMIT Media Lab, which would give the organization a default reason to talk to\\nother organizations.\
    \ A consistent stream of new PMs with diverse sets of\\nindustry experiences could create another feedback loop.\"\n \
    \ },\n  {\n    \"name\": \"Industrial labs provided a first-class alternative to academia where\",\n    \"text\": \"people\
    \ could still participate in the scientific enterprise.\\nThis one is tough. A single DARPA-riff might be able to offer\
    \ an alternative to\\nacademia for some people, some of the time, but it won't be able to change the\\necosystem. However,\
    \ we could dream very big and imagine that an alternative\\ncould emerge from an ecosystem of DARPA-riffs and other new\
    \ types of research\\norganizations.  149 A DARPA-riff's programs will most likely still lean heavily on\\nacademic work,\
    \ especially early in its life. As a result, it won't do as well at\\nSee the section \\\" DARPA uses low-stakes\\nseedling\
    \ programs to \\\"acid test\\\" the riskiest\\npart of a program idea \\\" of \\\"Why Does\\nDARPA Work?\\\"\\n67.\\nIn\
    \ chemistry, free radicals are atoms,\\nmolecules, or ions with an unpaired valence\\nelectron that makes them extremely\
    \ reactive.\\n)\\n68.\\nSee The Idea Factory again.\\n69.\\nSee the section \\\" A large part of a DARPA\\nprogram manager's\
    \ job is focused network\\nbuilding \\\" from \\\"Why Does DARPA Work?\\\"\\n70.\\nFrom The Idea Factory again.\\n71.\\\
    nSee \\\" Fundamental Manufacturing Process\\nInnovation Changes the World .\\\"\\n72.\"\n  },\n  {\n    \"name\": \"\
    /28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\\
    n29/61\\n\\nproviding an alternative to academia as industrial labs. You could and should also\\nsupport other alternatives\
    \ to academia by working with extra-academic\\nresearchers instead of using academic affiliations as a proxy for competence.\"\
    \n  },\n  {\n    \"name\": \"Industrial labs enabled continuous work on projects over 6+ year time\",\n    \"text\": \"\
    scales.\\nOne might expect that it would be hard to support long-term projects in a\\nDARPA-riff because PMs with relatively\
    \ short tours of duty are a core part of the\\nmodel. However, DARPA has a strong precedent of programs outlasting the\\\
    ntenure of the PMs who started them. There's no reason a DARPA-riff couldn't do\\nthe same thing. Arguably, PM-PM handoffs\
    \ can maintain continuity better than\\nmany academic labs, where most of the work is done by grad students with 5\\u20136-\\\
    nyear tenures who sometimes have little incentive for smooth handoffs,  150 or\\nstartups, where employees are notoriously\
    \ mercenary and it can be surprising if\\nsomeone stays more than three years.\\nHowever, it's also important to consider\
    \ constraints that the organization will\\nface early in its life that will hopefully relax over time. While a DARPA-riff\
    \ is\\nstructurally set up to tackle long-term projects, it's probably not a good idea for\\nthe first projects to take\
    \ 6+ years to show results. The reality of the situation is\\nthat a new organization will have no track record, so people\
    \ will (rationally) have\\nless patience with it. Organizational reputation matters. If funders, potential\\nemployees,\
    \ and collaborators start to see the organization as unable to get things\\ndone,  151 it can become a self-fulfilling\
    \ prophecy.\"\n  },\n  {\n    \"name\": \"Corporate labs enabled work in Pasteur's Quadrant \",\n    \"text\": \"There's\
    \ not much to say here. This is the tightrope that a DARPA-riff should\\ntry to walk: things that are too researchy for\
    \ a startup and too engineering-heavy\\nfor academia.\\nA DARPA-riff will need to invert the normal relationship\\nbetween\
    \ an innovation org and its money factory\\nResearch orgs are typically subsidiary to their money factories. Bell Labs\
    \ was\\nsubsidiary to AT&T, PARC to Xerox, DARPA to the DoD and Congress, academic\\nlabs to grant givers, etc. This relationship\
    \ generates so many of the incentives\\nthat run counter to producing high-quality and eventually-impactful research.\
    \ A\\nlot of the specific friction can be traced back to mismatched Buxton Indexes \\u2014\\nthe length of the period\
    \ over which an entity makes its plans. 73 Research just has\\na longer time signature than the natural\\nbeats of elected\
    \ officials, quarterly\\nearnings, or LP fundraising rounds.\\nWhat if you invert this relationship?\\nInstead of the\
    \ revenue-generating entity (money factory) being the \\\"parent\\\" org,\\nthe innovation org becomes the parent.\\nFirst,\
    \ it's worth asking what the distinction between a parent and a child or\\nsubsidiary organization means. Ultimately,\
    \ it's about power \\u2014 whose priorities\\ntake precedence? In the most extreme sense, if there is a choice between\
    \ an\\naction that will destroy one organization or another, which one gets priority? It's\\nuncomfortable to talk about\
    \ inter-organizational power in the same way that it's\\nuncomfortable to talk about what will actually get you fired\
    \ or promoted in an\\norganization.  153 This power usually takes the form of contracts if the children\\nare external\
    \ to the parent, and budgets if they are internal. To some extent, the\\npower is simply a function of which organization\
    \ came first. If a parent\\norganization could survive before its child came along, it's a clear proof point\\nthat it\
    \ can survive without the child.  154\\nIt's tempting to say, \\\"Ah, yes! Inverting the relationship between innovation\\\
    norgs and money factories will solve the problems!\\\" But that is magical thinking.\\nInverting the relationship won't\
    \ solve the mismatched Buxton Indices; it will just\\nchange which side exerts power. That relationship will create a\
    \ different set of\\nconstraints on what happens and what can exist. The inversion is rare enough\\nthat there aren't\
    \ many case studies, but one could imagine projects never\\nshipping because of perfectionist thinking or a hesitance\
    \ to kill projects that\\naren't going anywhere.\\nIt feels slightly nonsensical not to have the main profit-generating\
    \ entity as the\\nparent organization because otherwise, where does operating capital come from\\nbefore the money factories\
    \ are created? Let's call this the \\\"bootstrapping\\nproblem.\\\" The challenge becomes finding a transient source of\
    \ money that\\nsimultaneously puts few enough constraints on the organization that it can do\\nthe work to create cash-generating\
    \ children while at the same time not warping\\nits incentives toward generating cash-children as soon as possible at\
    \ all costs.\\nThere are examples of organizations that have pulled off the inversion with\\nvarying degrees of success.\
    \ Flagship Pioneering, Ink & Switch, Idealab, and\\nTandemLaunch are all both the parent organization and the innovation\\\
    norganization, while the companies that they spin out are the money factories. If\\nyou squint, Howard Hughes Medical\
    \ Institute also fits this pattern \\u2014 its funding\\ncomes from its foundation, which is the subsidiary organization.\
    \ HHMI is\\nespecially noteworthy because unlike the others, its survival isn't contingent on\\nspinning out companies.\
    \ As we've noted, spinning out companies is a double-\\nedged sword. On the one hand, companies are a powerful technology\
    \ diffusion\\nmechanism, but on the other hand, there is a significant class of innovations that\\nwould create drastically\
    \ less value for the world if their value had been captured\\nby their creators.\\nHow did each of these organizations\
    \ address the bootstrapping problem?\\nFlagship Pioneering, Idealab, TandemLaunch and their ilk \\u2014 \\\"researchy\
    \ startup\\nstudios\\\" \\u2014 are explicitly out to create high-growth, venture-backable startups.\\nThis goal allows\
    \ them to bootstrap with for-profit investment capital. It also\\nincentivizes them toward projects that can become high-growth\
    \ startups on a\\nshort time scale. Ink & Switch has bootstrapped with a combination of sources \\u2014\\ninvestment,\
    \ \\\"friendly investment,\\\"  155 and consulting with companies on the\\nimplementation of different areas of their\
    \ research. Howard Hughes Medical\\nInstitute cheated by starting already sitting on top of a massive endowment. The\\\
    nupshot is that there isn't a well-worn path for an innovation organization to get\\nto a point where its operating capital\
    \ can consistently come from subsidiary\\norganizations if it wants to work on things that might not want to become high-\\\
    ngrowth startups. Charting different possible approaches to the bootstrapping\\nproblem is the focus of the next section.\\\
    nResearch is expensive. DARPA's 2020 budget was $3.6B. 74 In the long run, a\\nDARPA-riff that works on atom-based\\ntechnologies\
    \ is going to need a lot of\\nmoney. How money works is a major\\nforce that shapes incentives and organizational capability,\
    \ so it is worth taking\\nvery seriously.\\nWhen considering the pros and cons of funding sources, it's important to think\\\
    nabout them in terms of how much they could potentially blow the organization\\noff of its \\\"ideal\\\" course of action.\
    \ This isn't to say \\\"money taints everything!\\\" It is\\nto say that money comes from people external to the organization\
    \ who have their\\nown agendas. (Otherwise they would just be part of the organization!)  157\\nThis section explores\
    \ both the many-forked possibility path for making money\\nas well as the meta-considerations surrounding it.\\nCould\
    \ DARPA have a positive return?\\nSpoiler alert: I suspect the answer is no, given any currently existing value-capture\\\
    nmechanism.\\nProfit is important for both practical and ideological reasons. One of the most\\nimportant reasons is that\
    \ profit enables institutions to be self-sustaining. In\\nsteady state, could an organization riffing on DARPA sustain\
    \ itself, or would it\\nconstantly need external money?\\nIt's not an unreasonable question \\u2014 technology eventually\
    \ needs to be\\ncommercialized and diffused in order to actually impact people's lives, which\\nmeans that eventually\
    \ it will end up as products on the market . However, it's\\nentirely possible for the product to be so many steps removed\
    \ from the people\\nwho created the original technology that you can barely see the connection, let\\nalone propagate\
    \ value back to the technology's creators .\\nOne way to get a handle on the question of whether a DARPA-riff could be\\\
    nself-sustaining would be to ask, \\\"Would (actual) DARPA have had a positive\\nreturn?\\\"\\nAnswering this question\
    \ is tricky. DARPA doesn't do any research in house, so\\nall research they fund was ultimately done by another organization.\
    \ Externalized\\nresearch has a sparse paper trail and doesn't have an obvious value-capture\\nmechanism. Even if DARPA\
    \ were able to directly capture value from its\\nprograms, those programs may have the impact they did because DARPA didn't\\\
    ntry to capture their value. On top of all of that, valuable things that can be traced\\nback to DARPA-funded work are\
    \ usually combined with a lot of other work. This\\nresearch admixture means that even if you could track down every dollar\
    \ of sales\\nassociated with DARPA research and assume that DARPA would have been able\\nto capture some of it, a fixed\
    \ percentage of that amount is a terrible assumption.\\nGiven these hurdles, a more tractable question is, \\\"How much\
    \ monetary value\\nhas DARPA spent and created?\\\" Even answering this question is hard \\u2014 DARPA\\nis rarely the\
    \ first or last organization to touch a project, and on top of that, it's\\nThe Buxton Index comes from E.W.Dijkstra\\\
    nin \\\" The Strengths of the Academic\\nEnterprise.\\\"\\n73.\\nHow does money work in a DARPA-riff?\\nSee \\\" Department\
    \ of Defense Fiscal Year (FY)\"\n  },\n  {\n    \"name\": \"Budget Estimates .\\\"\",\n    \"text\": \"74.\"\n  },\n \
    \ {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\\
    n30/61\\n\\nunclear how much their help contributed. Given an accounting of created value,\\nwe could then play around\
    \ with, \\\"Given different scenarios, how much of that\\ncreated value could have been \\\"captured,\\\" and what would\
    \ the effects have\\nbeen?\\\"\\nThe numbers I'm going to throw out are sketchy back-of-the envelope\\ncalculations \\\
    u2014 in reality, a rigorous accounting of DARPA's full-scale output is a\\nfull research project. I'm surprised the government\
    \ hasn't commissioned such a\\nproject, but I've searched high and low to no avail.\\nDARPA's cost is straightforward.\
    \ DARPA's budget in 2020 was $(2020)3.6B.\\nTheir budget has been roughly stable since its founding \\u2014 except for\
    \ a massive\\ninitial spike because it was originally responsible for what would eventually\\nbecome NASA and various\
    \ missile programs. Assuming a constant budget,\\nDARPA has cost $(2021)221B over their 63-year history.\\nDARPA's output\
    \ is complicated. The simple place to start is with the stock\\nmarket: Which companies on the S&P 500 owe their existence\
    \ to DARPA\\ntechnology, and how much are they worth? You can see the list and associated\\ncalculations here . The total\
    \ comes out to approximately $(2021)11,200B  158 \\u2014\\ntwo orders of magnitude bigger than DARPA's entire cost. Obviously,\
    \ DARPA\\nisn't responsible for anywhere near all of that value, but it's also unclear what\\npercentage to use. YCombinator's\
    \ (sketchily estimated) 1.7% ownership at\\nDoordash's IPO 75 is a hand-wavy\\nanchor point. Despite ultimate\\nresponsibility\
    \ for a lot of core\\ntechnology, let's be conservative and say DARPA is \\\"owns\\\" an order of magnitude\\nless at\
    \ 0.2%. This would come out to a DARPA ownership of $22.5B \\u2014 an order of\\nmagnitude less than the total amount\
    \ that was spent on DARPA. This is\\nsurprising!\\nOf course, this calculation is a massive underestimate: It's only counting\
    \ public\\ncompanies, it's ignoring any dividends that they may have paid out, it gives\\nDARPA a tiny ownership, and\
    \ I'm being very sloppy about what's attributable to\\nDARPA. At the same time, I'm skeptical that private companies (there\
    \ are many\\nhighly valued autonomous car companies especially) or dividends would make\\nmuch of a difference or that\
    \ DARPA would own much more, especially given\\nexisting value-capture mechanisms. I don't have strong evidence, but I\
    \ strongly\\nsuspect this $22.5B number isn't anywhere representative of the amount of value\\nDARPA has created. The\
    \ reality may truly be that most of the value that DARPA\\nhas created isn't easily measurable. How much modern activity,\
    \ joy, and wonder\\nis enabled by GPS and the internet? What has been built on top of obscure\\nresearch funded by DARPA?\
    \ How many careers has it touched? The trick is that\\nif you can't measure value, you certainly can't capture it.\\nIt\
    \ is hard for a DARPA-riff to capture value without\\nhamstringing impact\\nIf a DARPA-riff wants to maximize its impact,\
    \ there are three reasons why trying\\nto capture value is likely a bad move.\\nFirst, there are several ways that profit-maximizing\
    \ organizational structures\\ncan hamstring technologies whose impact depends on them . It would be nigh-\\nimpossible\
    \ to avoid impact-killing pitfalls while still capturing value.\\nSecond, the market in for-profit organizations is fairly\
    \ efficient. The\\ntraditional barriers to starting companies \\u2014 initial costs, talent, and long term\\ncapital \\\
    u2014 have come crashing down. Software, global supply chains, cloud labs,\\nand the ability to rent lab space + equipment\
    \ has significantly decreased the cost\\nof starting even atom-based businesses.  160 Silicon Valley reverence has gone\\\
    nglobal so the people who have what it takes to start a startup both have the\\ninformation and sanction to do it. There\
    \ are more early-stage VCs than ever\\nbefore and the sexy success of SpaceX and other \\\"hard tech\\\" companies means\\\
    nthat anything that looks vaguely like it might become hugely profitable can get\\nfunded. In fact, the barriers to creating\
    \ for-profit organizations might be so low\\nthat people are starting companies when they shouldn't be. An efficient market\\\
    nin for-profit organizations means that the most impactful work will be\\nunprofitable.\\nFinally, and perhaps most importantly,\
    \ many important innovations that are\\nbad investments. One of the most impactful things a DARPA-riff can do is to\\\
    nsupport projects in this category.\\nApart from these broader points, DARPA does specific things that seem\\neffective\
    \ and worth emulating but at the same make value capture harder.\\nExternalized research is a load-bearing component of\
    \ the DARPA model 76\\nbecause it enables minimal full-time\\nstaff, spinning up or spinning down\\nprojects quickly,\
    \ access rare talents and\\nmachines, and tying different approaches in parallel. However, not only is it hard\\nto capture\
    \ value from research , it is especially hard to capture value from\\nexternalized research!\\nThe role of DARPA as a\
    \ in-between organization 77 that acts as glue for a\\nbroader innovation ecosystem feels\\nweirdly important. That role\
    \ also plays\\nawkwardly with value capture. If the\\nwhole goal is to kick off a community\\n163 , many entities need\
    \ to feel like they can capture value from an innovation and\\nmight feel threatened or hesitate to collaborate with a\
    \ purely for-profit venture.\\nIs there a minimum effective budget to generate outlier results?\\nIt is important for\
    \ big things to start small \\u2014 many attempts to replicate\\nDARPA's results start too big. 78 So it\\nmakes sense\
    \ to ask: Is there a minimum\\neffective budget to generate outlier\"\n  },\n  {\n    \"name\": \"results? Can you start\
    \ with a tenth of\",\n    \"text\": \"DARPA's budget? A hundredth? A thousandth?\\nThere are two lower-budget bounds that\
    \ you'll run into: the number of\\nprograms you need to run to get a single \\\"successful\\\" program and the budget\
    \ per\\nprogram for it to have a viable shot at that success.\\nA back-of-the-envelope calculation suggests that if each\
    \ program generously\\nhas a 10% chance of success (DARPA has a 5\\u201310% program success rate) 79 then\\nyou need to\
    \ run at least seven programs\\nto give yourself a 50% chance of at least\\none program being successful. 80\\nWhether\
    \ these programs are run in\\nseries or in parallel depends on\\navailable funding. However, if it takes five years to\
    \ run a full program, running\\nthem in series could take a decade or more (assuming several unsuccessful\\nprograms are\
    \ terminated early) to even demonstrate organizational feasibility.\\nAnd this isn't \\\"10 years to a $1B IPO\\\" \\\
    u2014 it's \\\"10 years to getting a really\\npromising technology out into the world that given another decade might\\\
    nproduce a measurable impact.\\\" Given the absurd timeline of running programs in\\nseries, running several programs\
    \ in parallel is important. The necessity of both\\nstarting small and running several programs in parallel to even demonstrate\\\
    nfeasibility is one of the core tensions inherent in riffing on DARPA.\\nThe question of minimum program budgets is tricky.\
    \ Let's first look at some\\ncomparison numbers. In the years 2018\\u20132020, among DARPA programs not\\nfocused on assembly\
    \ and production, the minimum budget was $2M, the\\nmaximum budget was $31.4M, and the average budget was $12M. 81 The\
    \ ARPA\\nIPTO directorate that midwifed the\\npersonal computer started with a\\nbudget of $(2020)47M in 1962. 82 ARPA-\\\
    nE vacillates around $200\\u2013300M/year\\nand has about 50 programs running at\\nany time, which comes out to roughly\\\
    n$4\\u20146M per program. IARPA's budget is classified. Could a program go below a\\ncouple million dollars a year and\
    \ still be effective? There are arguments both\\nways. On the one hand, you could argue that surely bureaucratic inefficiency\
    \ is\\npushing those budgets higher than they need to be. On the other hand, it might\\nbe that the sort of work that\
    \ it is most valuable for a DARPA-riff to do needs a\\nrelatively large budget, otherwise it would happen in other institutions.\
    \ Without\\nstrong reasons to believe otherwise (which we don't have), it seems irresponsible\\nto assume that you could\
    \ run impactful programs for significantly less than\\nDARPA. The saving grace is that programs don't need to start at\
    \ full budget but\\ncan ramp up over a year or two.\\nSo is there a minimum effective budget to generate outlier results?\
    \ Absolutely.\\nThe number depends heavily on how often you expect programs to fail and the\\ntype of work those programs\
    \ will entail. There are different strategies you could\\nuse to both accept the reality of a minimum effective budget\
    \ and at the same\\ntime start as small as possible to avoid money poisoning. In Part III, I'll argue\\nthat (one) feasible\
    \ approach is a combination of explicit evolutionary forms and\\ntranches.\\nIncome\\nDARPA-riffs need free cash flow.\
    \ You need money to pay people, rent lab space,\\npurchase equipment and reagents, hire lawyers to keep regulators from\
    \ shutting\\nyou down, and possibly pay to rebuild anything that you blow up in the process.\\nSee \\\"Running the Numbers\
    \ on Y\\nCombinator's Best Year Yet .\\\"\\n75.\\nSee the section \\\" DARPA doesn't do ay\\nresearch in house \\\" from\
    \ \\\"Why Does DARPA\\nWork?\\\"\\n76.\\nSee \\\" Rethinking the role of the state in\\ntechnology development: DARPA\
    \ and the\\ncase for embedded network governance\\npoints .\\\"\\n77.\\nSee the section \\\" Most DARPA clones start\\\
    ntoo big or with heavy process \\\" from \\\"Why\\nDoes DARPA Work?\\\"\\n78.\\nSee \\\" DARPA\\u2014Enabling Technical\\\
    nInnovation .\\\"\\n79.\\nSee this numbers appendix .\\n80.\\nSee \\\" Department of Defense Fiscal Year (FY)\"\n  },\n\
    \  {\n    \"name\": \"Budget Estimates \\\" and in spreadsheet\",\n    \"text\": \"form here .\\n81.\\nSee \\\" ARPA Does\
    \ Windows: The Defense\\nUnderpinning of the PC Revolution .\\\"\\n82.\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\"\
    ,\n    \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n31/61\\n\\nFiguring\
    \ out where this money comes from is a narrow path between the Scylla\\nof external constraints and the Charybdis of organizational\
    \ death. Hew too far\\ntoward any established funding source and the constraints it imposes won't let\\nyou do anything\
    \ different from a normal startup, nonprofit, consulting firm, etc.\\nHew too far the other way and all that freedom will\
    \ be worthless because you'll\\nneed to shut down the organization. The rocks of history are littered with the\\nsmashed\
    \ wrecks of organizations that failed to run this gauntlet \\u2014 Magic Leap is\\na prime example of the former and Willow\
    \ Garage of the latter. There are many\\nothers, but to avoid disparagement, I'll leave you with a pregnant silence.\\\
    nThree big considerations for any income stream are whether it is a transient\\nsource that could be used by the organization\
    \ in its early days or could provide\\nsteady state income, what order of magnitude you could expect it to provide\\n(Thousands?\
    \ Tens of thousands?), and how replicable it is. The last point is worth\\nconsidering because ideally DARPA-riffs would\
    \ become a replicable institutional\\nmodel.\\nThis section will walk through potential directions at the many-forking\\\
    njuncture that asks \\\"Where does free cash flow for an DARPA-riff come from?\\\" Or\\nin other words, what are the different\
    \ tools a DARPA-riff can use to build its\\nmoney factory ?\\nTechnology licensing\\nLicensing fees from patents are a\
    \ straightforward way to make money for an\\norganization that creates technology. Licensing patents lets you focus on\\\
    ncreating the technology rather than commercializing it. Licensing also enables\\nyou to create an organization that can\
    \ generate income from outputs that\\nwouldn't necessarily make good startups \\u2014 processes or technologies that\\\
    nbenefit from the existing manufacturing, expertise, and supply chains of large\\norganizations.\\nA few organizations\
    \ make a significant chunk of money from licensing\\nrevenue. Between 2008 and 2012, IBM made over $1B/year in licensing\
    \ revenue.\"\n  },\n  {\n    \"name\": \"Intellectual Ventures' primary\",\n    \"text\": \"business model revolves around\\\
    nlicensing. Universities are another\\nexample. From a 2015 article on\\nlicensing revenues :\\nNorthwestern University\
    \ topped the income list, at $360 million, a\\nnumber that was boosted by the sale of its remaining royalty rights to\
    \ a\\ncompound used to control neuropathic pain that is marketed as Lyrica.\\nOther big earners in the survey included\
    \ New York University, $215\\nmillion; Princeton, $142 million; Columbia, $115 million; the UC\\nsystem and Stanford,\
    \ each about $108 million; and the University of\\nTexas system, $49 million.\\nAll of these examples do some good research\
    \ work! However, there are some\\nflies in the ointment. The majority of university licensing income is from drug\\nlicensing\
    \ deals. Both IBM and universities spend far more on research than they\\nmake in licensing revenue. Most technology transfer\
    \ offices are not profitable. 84\\nAll the universities in Canada\\ncombined only do $62M in licensing\\nrevenue. 85 And\
    \ the steps Intellectual\\nVentures needs to take in order to get\\npaid have earned them a rather\\nunpleasant reputation.\\\
    nAt the end of the day, patents need to be enforced through the law. The only\\nway to do that is through lawsuits. Ideally\
    \ people will proactively pay licensing\\nfees, but often they do not, either through maliciousness or negligence. As\
    \ a\\nresult, any organization depending on patent licensing fees needs to also have a\\nstaff of (expensive) lawyers\
    \ constantly monitoring for patent violations and ready\\nto sue to enforce patent rights. This unfortunate necessity\
    \ is why Intellectual\\nVentures is maligned as a patent troll. It might be possible to decrease violations\\nby using\
    \ non-exclusive licenses. However, non-exclusive licenses are usually\\nworth much less than exclusive licenses, even\
    \ counting the fees from multiple\\nlicensees.\\nHeavy dependence on licensing fees tends to warp incentives. IBM's internal\\\
    nstatus game is on publishing patents \\u2014 people are promoted based on the\\nnumber of patents they file rather than\
    \ getting anything to work. Patents as an\\naccomplishment metric leads to projects being abandoned once they get to a\\\
    npatentable state. I've experienced this personally at other organizations as well.\\nLicensing obsession also leads to\
    \ a conflict of interest between researchers and\\nthe organization. If a researcher thinks they're on to something valuable,\
    \ they're\\nincentivized to keep it secret, leave the organization, and set up their own\\nventure to capitalize on the\
    \ thing they've created without paying licensing fees.\\nSuch a surreptitious course of action is totally rational \\\
    u2014 licensing fees are a\\ndeadweight loss on any organization that has to pay them, especially a startup.\\nThis effect\
    \ seems especially likely to happen if some or all of the research is\\nexternalized.\\nOn top of the organizational problems\
    \ that a licensing-fee-based income\\nstrategy can introduce, patents add a lot of friction to innovation. There are\\\
    nexamples throughout history of patents keeping systems that depend on multiple\\npatents held by different entities from\
    \ being built. Aviation is arguably one of the\\nmost notorious examples. Patents hamstring the entire class of innovations\
    \ that\\nwould create drastically less value for the world if their value had been captured\\nby their creators.\\nThis\
    \ isn't to say that a DARPA-riff should never patent anything. However, it\\nwould need to be on a case-by-case basis\
    \ and have a strong reason why the patent\\nwould be in service to the technology. For example, a good reason to license\\\
    nwould be to enable a technology to raise further financing where otherwise it\\ncould not. The upshot is that while patents\
    \ could be a way to spuriously create\\nincome, licensing is a bad primary income strategy for a DARPA-riff.\\nSpin-off\
    \ companies\\nAnother obvious way for an organization creating technology to make money is\\nby spinning off startups\
    \ to commercialize that technology, investing in them, and\\nusing the revenues from liquidity events like acquisitions\
    \ or IPOs to fund\\noperations.\\nOne might think the prevalence of startup studios is a strong proof point in\\nfavor\
    \ of the spin-off. However, most startup studios (rationally) focus on company\\nideas with low technical risk \\u2014\
    \ well-trodden software paths, direct-to-consumer\\nmodels, etc. There are, of course, notable exceptions \\u2014 Idealab\
    \ , Flagship\\nPioneering , Deep Science Ventures, and TandemLaunch 86 , to name a few. Each\\nof these organizations\
    \ does take on\\nsignificant technical risk, but the need\\nto create and capture venture-scale\\nreturns limits the sorts\
    \ of work they\\ncan do. In the vast majority of cases, research-y startup studios are constrained to\\nwork on classes\
    \ of problems that have clear-cut sales channels and product\\npipelines, like pharmaceuticals (and other medical technology),\
    \ software, or\\nelectronics. They also primarily focus on work that has been de-risked by a single\\nacademic lab.\\\
    nAn income stream based on spinning off companies has a number of\\nadvantages. As anybody who has even heard the words\
    \ \\\"Silicon Valley\\\" knows all\\ntoo well, equity in high-growth startups can have truly massive upside. The\\nmoney\
    \ from a single successful spin-off can fund many others. Spin-offs could\\nalso help align incentives. If a program manager\
    \ could potentially become a CEO\\nof a company, a DARPA-riff could possibly avoid situations where smart, talented\\\
    npeople say, \\\"That sounds good, but I could make much more going off and\\nstarting a startup.\\\" Another advantage\
    \ of spin-offs is that in the long run,\\nresearch affects the world in one of two ways: knowledge or products and\\nprocesses.\
    \ Companies are entities whose incentive is (to a large part) to diffuse\\nproducts or processes as far and wide as possible.\
    \ So if you're creating new\\ntechnology that you want to get out into the world (as opposed to sitting on a\\nshelf),\
    \ creating a company around it is probably a good idea ... eventually.\\nAt the same time, spin-off-based revenue introduces\
    \ a number of constraints.\\nThe biggest is the danger that if every program is aimed at becoming a company,\\nthe organization\
    \ will be incentivized away from things that would create\\ndrastically less value for the world if you try to capture\
    \ their value. Focusing on\\nspin-offs could potentially warp incentives to work on things that could produce\\nshort-term\
    \ wins and things that would be able to raise money easily once they've\\nspun out; spin-outs will probably only succeed\
    \ if they can raise follow-on capital\\nand turn into income only when they liquidate, so fundable, shorter-term wins\\\
    nare a more predictable income stream.\\nUsing spin-offs as a primary income source also creates a liquidity problem.\\\
    nEven if you avoid all the incentive problems and manage to do maximally\\nimportant work that could also become valuable\
    \ companies, given the state of\\nprivate and public markets, those companies probably won't generate a return for\\nmany\
    \ years. In that situation, you need to get operating capital from outside\\nsources \\u2014 presumably equity investors.\
    \ These investors will want their own\\nabove-market returns, which will apply pressure that can propagate all the way\\\
    nSee \\\" If Patents Are So Valuable Why Does\\nIBM's Intellectual Property Revenue\\nContinue to Decline.\\\"\\n83.\\\
    nSee \\\" Benchmarking of Technology Transfer\\nOffices and What It Means for Developing\\nCountries .\\\"\\n84.\\nSee\
    \ \\\" Canada needs a national overhaul of\\nuniversity IP policies.\\\"\\n85.\\nFor more on Deep Science Ventures and\\\
    nTandemLaunch, respectively, see Episodes 19\\nand 30 of the \\\"Idea Machines\\\" podcast.\\n86.\"\n  },\n  {\n    \"\
    name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\\
    n32/61\\n\\nback and warp which programs you undertake in the first place. Pressure from\\nthe same sorts of investors\
    \ who invest in VC funds will create the same pressure\\nthat those funds are under. Even with understanding, long-term\
    \ investors, there\\nwould need to be a justification of how any program could become a company.\\nBut there are some\
    \ pieces of a future that maximizes human capability and\\nwonder that might just not make good companies!\\nCase study:\
    \ Intellectual Ventures\\nIntellectual Ventures (IV) has a unique structure that combines income from\\ntechnology licensing\
    \ and spin-offs.\\nThree of IV's four divisions (Invention Science Fund, Intellectual Ventures\\nLab, and Deep Science\
    \ Fund) are focused on creating internal patents and spin-\\noffs. So far, the companies they've created have raised $700M\
    \ in venture funding,\\n87 which roughly puts their total value\\nbetween $5\\u201310B. Assuming IV did not\\ntake an\
    \ equity share too large to\\ndissuade investors (\\\\<20%, perhaps?),\\nthat would put their share at $1\\u20132B \\\
    u2014 far less than the $5B invested externally\\nand who knows how much originally put in by its founder, Nathan Myhrvold.\
    \ It's\\nlikely that it's heavily subsidized by the patent buying and licensing business (i.e.,\\nthe troll part). The\
    \ intriguing open question is whether IV could pay for itself\\nwith spin-offs alone?\\nTraditional philanthropic funding\
    \ (donations)\\nDonations without any hope of monetary return seems like an obvious way to\\nfund things that need to\
    \ be public goods in order to have an impact.\\nThe biggest advantage of donation-based income is that an organization\
    \ can\\nunabashedly work on things that won't generate a profit. The ability to decouple\\nfrom profit is a fairly self-explanatory\
    \ boost in freedom of action. A more subtle\\nbenefit is that external researchers and organizations might be more willing\
    \ to\\ncollaborate because (non-political) nonprofits are perceived as having fewer\\nulterior motives.\\nThere are several\
    \ successful or promising research organizations funded\\nentirely by traditional philanthropy. Among them are the Allen\
    \ AI Institute , the\\nHoward Hughes Medical Institute (HHMI) , the Santa Fe Institute , the Gates\\nFoundation , the\
    \ Chan Zuckerberg Initiative , and Wellcome Leap .  174 The latter\\nthree blur the line between \\\"research funding\\\
    \" and \\\"research execution,\\\" but so\\ndoes DARPA. While not a research institute per se, the XPRIZE Foundation is\
    \ a\\ngood example of a philanthropically funded innovation organization that\\npioneered a weird new model. At the same\
    \ time, the fate of many organizations\\nlike Willow Garage illustrates that doing paradigm-shifting, well-regarded,\\\
    nvisionary work is not sufficient to bring in enough donations to fuel an\\norganization.\\nWhile not being beholden to\
    \ investors or customers creates a lot of freedom,\\ndonation-based income comes with a whole raft of constraints.\\nPeople\
    \ don't like giving away money. Furthermore, the reticence tends to be\\nsupralinear with the amount of money (regardless\
    \ of the total wealth fraction that\\nmoney represents). Fundraising for anything is hard; even more so when there is\\\
    nno potential return on that money.\\nWhile companies (hopefully) get to profitability after a few fundraising rounds,\\\
    ndonation-based income never escapes the fundraising game. Investors like VC or\\nhedge funds are in a similar situation,\
    \ but the differences between them and\\ncharities is illustrative. The key difference between donation- and investment-\\\
    nbased funds is that the latter has a clear metric (usually internal rate of return)\\nthat it can use to encourage future\
    \ investment, despite the whole \\\"Past\\nperformance is not indicative of future results\\\" rigamarole. A donation-funded\\\
    norganization that tries to have an equally clear metric will inevitably fall victim to\\nGoodhart's Law.  175 Raising\
    \ money without a metric means that you're\\ncompletely at the whims of people's feelings. Bluntly, most people give money\
    \ to\\nphilanthropy to make themselves look and feel good.\\nRaising money without a metric forces an organization to\
    \ do a lot of \\\"donor\\nmanagement.\\\" In addition to time and money (charity balls, anyone?), you need to\\nshow progress\
    \ every time you ask for money \\u2014 once or twice a year.  176 Because\\nmost donors can't or don't want to get into\
    \ the weeds, these progress reports\\nneed to take the form of shiny demos which can end up distracting from the core\\\
    nmission or worse, biasing the entire organization toward programs that create\\nshiny demos.\\nDonation-based income\
    \ is especially vulnerable to economic downturns.\\nEconomy-coupled funding is especially dangerous for long-term research\\\
    nbecause most researchers are not fungible. You can't just lay off researchers and\\nhire them back when there's more\
    \ money. Labs will find different sources of\"\n  },\n  {\n    \"name\": \"funding, and talented people will always be\
    \ in demand somewhere. Even if you\",\n    \"text\": \"could, programs would take a massive hit \\u2014 the nature of\
    \ research makes it\\nimpossible to start back up exactly where you left off.\\nIt's also important to consider the scale\
    \ of donors and donations and the\\nassociated trade-offs. On one end of the spectrum are individuals giving a few\\ndollars,\
    \ and on the other end you have an organization like Wellcome Leap or the\\nAllen AI Institute, funded by a single massive\
    \ foundation.\\nA brief aside on terminology: So far, we've managed to avoid the terms\\n\\\"nonprofit\\\" and \\\"charity\\\
    \" when talking about donation-funded organizations.\\nThese terms are tricky because they have both colloquial meanings\
    \ but are also\\nlegal designations that come with a slew of implications \\u2014 especially around\\ntaxes and allowed\
    \ activities. These implications warp behavior enough that it\\nwould be sloppy to flip between using (little-n) nonprofit\
    \ \\u2014 an organization that\\nis not seeking to maximize profits \\u2014 and (big-N) Nonprofit \\u2014 an organization\\\
    nincorporated under section 501(c)(3) of the US tax code. To avoid confusion for\\neveryone, I'm going to try to use \\\
    \"Charity,\\\" \\\"Nonprofit,\\\" and \\\"Foundation\\\" in the\\nlegal sense and capitalize them to remind you of that\
    \ usage.\\nThe many-small-donors end of the spectrum tends to push organizations\\ntoward either short-termism or constrained\
    \ sizes. You'll notice that Charities\\nthat depend on many small donations are constantly asking for donations \\u2014\\\
    neverybody has seen Wikipedia's yearly banner; many of us remember asking for\\npennies for UNICEF on Halloween. Even\
    \ if they aren't cash-strapped, Charities\\nneed to get 33% of their income from \\\"small donors\\\"  177 in order to\
    \ maintain\\ntheir legal status (and associated tax benefits for themselves and donors). 88\\n\\\"Yeah, we're still struggling\
    \ with the\\nsame experiments we were last year\\\" is\\na common occurrence in research, but isn't a great way to get\
    \ people excited\\nabout donating, nudging charities toward shorter time horizons and flashier\"\n  },\n  {\n    \"name\"\
    : \"results\",\n    \"text\": \"Small donors also make funding even more unpredictable than the economy-\\ncoupling you\
    \ would expect from any donation-based funding. If you have a few\\nlarge donors, you can stay in touch and at least get\
    \ a heads up on whether they're\\nthinking about donating this year.\\nThere are a few \\\"independent researchers\\\"\
    \ whose incomes depend on\\ndonations through platforms like Patreon and GitHub Sponsors . These folks\\nforgo the tax\
    \ benefits and funding requirements of being a legal Charity in favor\\nof longer-term funding stability. Empirically,\
    \ this approach seems to be able\\nsupport an individual, but not a team or work that has large capital requirements.\\\
    nHowever, this corner of the funding maze seems underexplored and might be\\nable to be productively combined with membership\
    \ models , or something\\nsimilar.\\nThe few-massive-donors end of the philanthropic spectrum is dominated by\\nlarge\
    \ Foundations. Outside of a few Foundations that are directly controlled by\\ntheir founders, most are controlled by professional\
    \ managers. Professionally\\nmanaged Foundations usually fall into the asymmetric career risk trap \\u2014\\nmanagers\
    \ are punished for funding something risky that fails but get relatively\\nlittle upside from funding something risky\
    \ that succeeds. As a result,\\nFoundations want to see clear metrics, updates, and de-risking on the money\\nthey give\
    \ out. In reality, it's shockingly hard to get professionally managed\\nfoundations to do weird new things.\\nGiven the\
    \ issues with small donors and professionally managed Foundations, a\\ncommon refrain is: \\\"Just find a few wise, long-term-thinking\
    \ billionaires and\\nyou're set!\\\" This is lazy thinking for several reasons.\\n1. There are only 2,095 billionaires\
    \ in the world as of 2020. Being a billionaire\\ndoesn't shift your chances of being wise and good at long-term thinking\
    \ too\\nmuch \\ud83d\\ude31 so there just aren't that many wise, long-term-thinking billionaires.\\n2. Wise, long-term-thinking\
    \ billionaires already have a bajillion people banging\\ndown their doors for money because everybody else has the same\
    \ thought.\\n3. Partially as a result, many wise, long-term thinking-billionaires have already\\nbucketed their philanthropic\
    \ dollars into a foundation.\\n4. Being worth a billion dollars on paper doesn't mean that someone has a billion\\ndollars\
    \ in a bank account they can actually give away.\"\n  },\n  {\n    \"name\": \"Perception of money isn't strictly a fraction\
    \ of how much money you have \\u2014\",\n    \"text\": \"tens of millions of dollars is a lot of money, period.\\n6. If\
    \ a single person is bankrolling an entire project, they (for good reason!) tend\\nto feel some ownership over it. Depending\
    \ on the person, this attitude may be\\nSee\\nhttps://www.intellectualventures.com/spinouts\\n.\\n87.\\nHowStuffWorks\
    \ has a reasonable explainer .\\n88.\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible\
    \ to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n33/61\\n\\nproblematic for an organization that benefits\
    \ from opacity and independence.\\n89\"\n  },\n  {\n    \"name\": \"A single source of funding means a\",\n    \"text\"\
    : \"single point of failure for the\\norganization if the funder decides to pull out \\u2014 a not-uncommon occurrence.\\\
    nThe upshot is not that it's a bad idea to consider funding from wealthy\\nindividuals but that it is a bad idea for that\
    \ to be the only plan.\\n(Legally designated) Nonprofits are subject to a raft of requirements and\\nconstraints about\
    \ what they can and cannot do without losing their Nonprofit\\nstatus (and thus loading donors with a host of unexpected\
    \ taxes). The yearly\\nsmall-donor requirement on Charities is just one of them. The existence of\\nmultiple, ill-defined\
    \ actions that a Nonprofit is not allowed to take is especially\\nproblematic for an organization where it's unclear a\
    \ priori what it's going to take\\nto achieve an R&D goal and wants to be able to move quickly.\\nPeople who donate money\
    \ generally expect that money will not be used to\\nenrich any individual. However, it's nebulous a priori which research\
    \ should\\nproduce public goods vs. private goods. Sometimes the best way for a technology\\nto have an impact is as part\
    \ of a private, for-profit enterprise. This tension would\\nneed to be treated carefully.\\nPhilanthropic investing\\\
    nPhilanthropic investing sits in a gray zone between a donation and an investment\\nand is definitely worth investigating\
    \ for a DARPA-riff. \\\"Philanthropic investing\\\"\\ncan happen in one of two ways: when a Foundation makes a return-producing\\\
    ninvestment out of the money that it's spending on its \\\"charitable mission\\\"  180 or\\nwhen they make a risky investment\
    \ out of their endowment.  181 In both cases,\\nthe foundation is bending the normal rules in order to make an investment\
    \ that's\\naligned with the Foundation's mission. Under normal circumstances,\\nFoundations can only use their \\\"programmatic\\\
    \" money to give grants to 501(c)(3)\\norganizations ('Big-N\\\" Nonprofits  182 ) and endowments can only make \\\"non-\\\
    nrisky\\\"  183 investments.\\nThe potential to tap into donor-advised funds is another reason for a DARPA-\\nriff to\
    \ think about philanthropic investing. Donor-advised funds (DAFs) are like\\nFoundations\\\" weird younger siblings: Both\
    \ organizations are vehicles for wealthy\\nfolks to philanthropically spend their money; Foundations give their founders\\\
    nmore control but have more overhead and restrictions; DAFs require less initial\\ncapital, so they appeal to many wealthy-but-not-name-you-know-wealthy\
    \ folks.\\nFor our purposes, one of the biggest differences is that unlike Foundations, DAFs\\ndon't have a payout requirement.\
    \ As a result, there is a lot of earmarked-for-\\ncharity-eventually money sitting around collecting dividends. 90 The\
    \ hypothesis\\nis that (in part because they have\\nsmaller staffs to evaluate non-money\\nmetrics) philanthropic investments\
    \ are\\na way to connect DAF money to\\nresearch projects. 91\\nA DARPA-riff's ability to take\\nadvantage of philanthropic\
    \ investing is\\na complex dance with its own structure.\\nReturn-producing investments made from a Foundation's charitable\
    \ spending\\n(also called program-related investments, or PRIs) can happen through several\\nmechanisms. These mechanisms\
    \ include \\\"recoverable grants\\\" directly to a for-\\nprofit organization or funding through an intermediary Nonprofit.\
    \ 92 If a\\nDARPA-riff were organized as a for-\\nprofit organization, it could get income\\ndirectly from a recoverable\
    \ grant; if it\\nwere organized as a Nonprofit, it could\\nonly act as an intermediary for research\\nthat had already\
    \ budded off into its\\nown organization. Depending on the exact legal requirements for these different\"\n  },\n  {\n\
    \    \"name\": \"funding vehicles, direct grants or loans may require programs to be separate\",\n    \"text\": \"entities\
    \ from the umbrella organizations and thus may be appropriate for more\\nadvanced (post-seedling) programs.\\nIt's likely\
    \ that philanthropic investing will primarily need to be done on a\\nprogram-by-program basis. The funding needs to align\
    \ with each funder's\\nspecific mission, so there will also most likely be a lot of fiddling involved to\\nmatch programs\
    \ with funders that will require constant inputs of time and effort.\\nMany programs might not align with any causes,\
    \ because charitable causes tend\\nto be focused on \\\"problems\\\" and DARPA-like programs tend to focus on \\\"more\\\
    namazing\\\" rather than \\\"less bad.\\\" Program-by-program funding would require the\\numbrella organization to find\
    \ a different source of funding for things that aren't\\nfull-fledged programs, like seedling efforts that could possibly\
    \ go nowhere.\\nEarmarked philanthropic investments would also limit the fungibility of funds\\nbetween different programs\
    \ that allow DARPA to take on more risk. 93\\nThis is all rather speculative. In\\ncontrast to the fairly-well-trodden\\\
    npaths of technology licensing, spin-\\noffs, and donations, philanthropic\\ninvesting is a relatively new thing. The\
    \ core hypothesis is that DAFs and\\nFoundations would be more likely to give if there were some chance that they\\ncould\
    \ recover some of the investment (so that they could fund more good things).\\nPrime Coalition is one of the pioneers\
    \ in the area. They use recoverable grants to\\ndo equity funding of for-profit companies. If you squint at it, a DARPA-riff\
    \ could\\nhave the same relationship to Prime Coalition's structure as a startup studio does\\nto a VC firm.\\nMembership\
    \ model\\nA DARPA-riff could generate some free cash flow from a membership model\\nwhere other organizations pay to be\
    \ part of a \\\"business network\\\" where they get\\naccess to special events, a first crack at research, and help implementing\
    \ it. The\\nMIT Media Lab's funding consortium is the most prominent (and successful)\\nexample of this approach.\\nRelative\
    \ operational freedom (if managed correctly) is potentially the biggest\\nupside of the membership model. It can provide\
    \ short-term liquidity without\\nneeding to provide either a monetary ROI like an investment while having\\nperhaps less\
    \ volatility than charity if you can convince organizations to buy\\nlonger-term memberships.\\nIn addition to money,\
    \ the membership model could help more technology get\\nout into the world. One of the most failure-prone points in technological\\\
    ndevelopment is when a technology needs to move from an organization that\\nfocuses on R&D to one that focuses on marketing\
    \ and manufacturing. Having\\nlarge organizations with marketing and manufacturing capabilities in the loop\\nand already\
    \ \\\"bought in\\\"  188 could reduce a lot of friction. A membership model\\ncould help shepherd frontier technologies\
    \ with bespoke sales channels in the\\nsame way that some pharma investors\\\" main role is as a smooth pipeline through\\\
    nthe FDA approval process to acquisition. Short of a program literally becoming the\\nmarketing and manufacturing organization\
    \ for the technology it worked on,  189 a\\nDARPA-riff needs to interface with external orgs to smooth transitions to\\\
    nmaximize its impact, with or without a membership model.\\nA less-tried version of the membership model would extend\
    \ it beyond big\\ncompanies to individuals as well. This extended membership model would almost\\nbe a hybrid between\
    \ charity and providing a \\\"product\\\" in the sense of enabling\\npeople to be a part of something bigger. How many\
    \ people would sign up to be\\nSpaceX members? Probably a lot! The closest analogue is probably independent\\nresearchers\
    \ who fund their work through Patreon. 94 There are many unexplored\\nand potentially exciting paths\\nsurrounding individual\
    \ memberships\\n\\u2014 point systems; tying donations to\\nindividual units of work or purchases;\\ncommunity participation\
    \ in the research itself. The biggest open question is\\nwhether an agglomeration of small individual memberships can\
    \ fund more than a\\nsmall team. For all the people who would be excited to be SpaceX members,\\nwould they even fund\
    \ a single starship test launch?\\nUnfortunately, the membership model will probably be unable to fund\\noperations on\
    \ its own. The MIT Media Lab is probably the most successful\\norganization using this model, and its operating budget\
    \ is only $45M 95\\n(approximately four average-sized\\nDARPA programs). It's unlikely that a\\nDARPA-riff could do much\
    \ better.\\nAdditionally, expenses with fuzzy ROIs are often the first to get cut from\\norganizational budgets during\
    \ lean times, so membership-based income won't be\\nparticularly stable. Notoriously, the Media Lab's incentives drive\
    \ it to constantly\\nput out shiny demos that ultimately go nowhere. Member management \\u2014\\nputting on events, making\
    \ half-finished projects sounds exciting \\u2014 could take up\\ntime and resources.\\nThese constraints mean that a membership\
    \ model is certainly a promising\\nincome stream but should probably be coupled with other income sources.\\nGovernment\
    \ grants and contracts\\nSee the section \\\" Opacity is important to\\nDARPA's outlier success \\\" from \\\"Why Does\\\
    nDARPA Work?\\\"\\n89.\\nSee \\\" Zombie philanthropy: The rich have\\nstashed billions in donor-advised charities \\\
    u2014\\nbut it's not reaching those in need\\\"\\n(paywalled).\\n90.\\nSee \\\" Donor-Advised Funds: an underutilized\\\
    nphilanthropic vehicle to support innovation\\nin science and engineering \\\" for many more\\ndetails.\\n91.\\nFor a\
    \ more in-depth flowchart of the\\ndifferent ways PRIs can happen based on\\ndifferent constraints, see \\\" Foundations:\\\
    nexploring the emerging practice of\\nphilanthropic investing to support innovation\\nin science and engineering .\\\"\
    \\n92.\\nSee the section \\\"It is relatively easy for\\nDARPA PMs to re-deploy funding \\\" from\\n\\\"Why Does DARPA\
    \ Work?\\\"\\n93.\\nSee \\\" Reflections on 2020 As an Independent\\nResearcher \\\" for a more in-depth description\\\
    nof this approach.\\n94.\\nSee http://catalog.mit.edu/mit/research/mit-\\nmedia-lab/ .\\n95.\"\n  },\n  {\n    \"name\"\
    : \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\\
    n34/61\\n\\nWhile 21st-century riffs on DARPA should be private , the government gives both\\ngrants and contracts to\
    \ plenty of private organizations. Would a DARPA-riff be\\nable to take advantage of them?\\nGovernment grants\\nThe advantage\
    \ of government grants is that they come with relatively*  192 few\\nstrings attached. Nominally, governments don't care\
    \ about direct monetary ROI\\n193 and can act on long time scales. The government can actually capture value\\nfrom public\
    \ goods, so their incentives are nominally aligned  194 with an\\norganization whose goal is to create impactful technology.\
    \ Governments also\\ndeploy a massive amount of money so the operating budget of a DARPA-riff isn't\\noutrageous compared\
    \ to other expenditures.\\nWhile multi-year government grants are more stable than donations that you\\nneed to worry\
    \ about on a yearly or semi-yearly cycle, they are often one-off\\nevents. As a result, an organization that depends on\
    \ government grants for\\nincome needs to spend a significant chunk of time applying for and\\nadministering those grants.\\\
    nThere's also a question of which grants specifically we're talking about. Small\\nBusiness Innovation Research (SBIR)\
    \ grants are one obvious answer. These grants\\nare explicitly designed to fund private R&D that has the potential for\\\
    ncommercialization. However, the money from SBIRs is often barely worth the\\ntime spent to get it: \\\"Although the applications\
    \ [for less than $1M] may only be\\n10 or so pages long, companies should budget at least 80 full-time hours to\\ncomplete\
    \ them.\\\" 96 So SBIRs are ... less\\nthan optimal, meaning that it will be a\\njob to even hunt down the right grants\\\
    nto apply for.\\nDespite coming with relatively few incentive-warping strings, government\\ngrants do come with plenty\
    \ of restrictions on how the money can be spent. Most\\ngovernment grant money is earmarked \\u2014 either to be spent\
    \ on a specific project\\nor for a specific purpose, like salaries or equipment.  196 Spending restrictions are\\nclearly\
    \ problematic when you want to be able to do whatever is necessary to get\\nthe work done. It's unlikely that a DARPA-riff\
    \ would be able to get much grant\\nmoney that wasn't tied to a specific program. You would also need to either\\ncontort\
    \ what the organization is working on to align with existing government\"\n  },\n  {\n    \"name\": \"funding priorities\
    \ or do a lot of work to convince people to shift those priorities\",\n    \"text\": \"Government grants also tend to\
    \ either fall into the under $1M or over $100M\\nrange, both of which are suboptimal for a DARPA-riff. Going for non-standard\\\
    ngrant sizes will require a lot of work. You also need to convince people in the\\ngovernment that this weird institutional\
    \ structure is important and worth\"\n  },\n  {\n    \"name\": \"funding. In other words, a lot of lobbying (or, put more\
    \ bluntly, rent-seeking)\",\n    \"text\": \"would be involved.\\nGovernment contracts\\nGovernment contracts are like\
    \ grants with more clearly defined deliverables.\\nUnlike selling products, the payment is upfront and the \\\"deliverable\\\
    \" doesn't\\nnecessarily need to be as polished and stand alone as a product. The deliverable\\ncould be the output of\
    \ a piece of research or a proof of concept.\\nSRI International is a great case study of an innovation organization whose\\\
    nincome is primarily based on contracts. Arguably, SRI is co-responsible for many\\nof DARPA's triumphs \\u2014 Douglas\
    \ Engelbart did the work that resulted in the\\nMother of All Demos at SRI \\u2014 and has spun off many valuable and\
    \ well-regarded\\norganizations. 97 At the same time,\\nthey're also the prime example for the\\nconstraints below.\\\
    nContracts have advantages over both\\ngrants and equity funding. Research contracts can be much larger than grants\\\
    nwhile still enabling work that might not result in a product. There are fewer\\nrestrictions on how you can deploy money\
    \ from contracts, and at least part of\\nthat money comes in before doing the work, so you can hire necessary people and\\\
    nbuy equipment.\\nDepending on contracts as a primary source of income pushes an organization\\nto increasingly resemble\
    \ a government contractor despite lofty goals otherwise.\\nOnce you start playing the government contracting game, the\
    \ path of least\\nresistance is to become a government contractor. Even with this possibility in\\nmind, it's impossible\
    \ work on government contracts without slight\\norganizational warping. You need to spend time and effort paying attention\
    \ to\\nwhich contracts are available, bidding for them, and administering them, so\\ncontracts aren't something that you\
    \ can easily do occasionally and\\nopportunistically.\\nContracts are fairly unpredictable. SRI International, for example,\
    \ has regular\\nboom and bust cycles, where they hire many people to work on a particular\\nproject and then need to fire\
    \ them when they no longer have contracts to work\\non. Unpredictability might be slightly less of a problem if more of\
    \ the work is\\nexternalized, but it would still be problematic for long-term projects.\\nObviously, the biggest problem\
    \ with contracts is that you don't have much\\ncontrol over what you're working on. In a best-case scenario, you can find\
    \ an\\nexisting call for something that you already need to do or a slight extension of\\nthat work. In a less-good scenario,\
    \ you either end up lobbying to get contracts for\\nwhat you were going to do anyway or need to heavily shift what you're\
    \ doing in\\norder to win them. Again, the issue is that in order to maintain the organizational\\ninfrastructure to do\
    \ the former, you'll probably need to at least some of the latter.\\nDespite all the pitfalls, organizations like Otherlab\
    \ and many other small\\nengineering firms have managed to get by on grants combined with contracts.\\nHowever, their\
    \ work often feels scattered and incomplete. The need to pursue\\ndifferent contracts and grants makes it hard to do the\
    \ sort of deep long-term\\nwork that can lead to extensible breakthroughs.\\nConsulting\\nA DARPA-riff could sell program\
    \ designs to large organizations and provide\\nconsulting services for implementing them. There are a number of organizations\\\
    nwith similar models; Lux Research charges tens of thousands of dollars for high\\nquality reports on technical areas\
    \ and the ability to ask questions about them. If\\nthe hypothesis is that program design will be a core part of a DARPA-riff,\
    \ it will\\nalready be creating artifacts that larger organizations might be interested in.\\nA consulting-based income\
    \ stream has a number of upsides, especially early in\\na DARPA-riff's life. It could generate early cash before even\
    \ implementing\\nprograms while maintaining relative operational freedom from investors or\\ndonors. If the program designs\
    \ would be important and good for the world (as I\\nwould hope all of them are!) it's a win-win, whether or not the large\
    \ organizations\\nactually execute on the program. If they do execute on it well, it's a cheap\\ndemonstration that the\
    \ program design process works. If they don't execute on it\\nor execute on it poorly, you could still run the program\
    \ later (assuming there is no\\nreputational blowback to the organization or the program idea itself). Selling\\nknowledge\
    \ to large companies with manufacturing capabilities could potentially\\naddress frontier technology's bespoke sales channel\
    \ problem. One could imagine\\na \\\"pipeline\\\" where, even if big organizations don't fully embrace program\\ndesigns,\
    \ they nevertheless start to acclimate to the ideas. In this way, there's a\\nfuzzy boundary between consulting and the\
    \ membership model.\\nConsulting-based income comes with a slew of downsides. The biggest\\ndownside is that consulting\
    \ wouldn't provide enough cash to support a full-\\nblown steady-state DARPA-riff. That being said, it could be a good\
    \ way of\\nbringing in income while demonstrating that program design can work.\\nConsulting is a canonical trap for small\
    \ organizations \\u2014 clients can often pull\\nyou in unproductive directions, and you need to spend a significant chunk\
    \ of\\ntime on sales. Another danger is that this income stream would render a DARPA-\\nriff particularly susceptible\
    \ to working on \\\"hot\\\" areas that are adjacent to high-\\nmargin industries. This danger is particularly insidious\
    \ because the most\\nimportant things to work on may be unsexy areas adjacent to low-margin\\nindustries.\\nThe mitochondria\
    \ maneuver: Be an independent-ish arm of\\nsome existing money factory\\nAs we've beaten to death by now, a DARPA-riff\
    \ would fill a niche in the\\ninnovation ecosystem that was once filled by industrial labs. While new industrial\\nlabs\
    \ created inside of corporations are probably not viable, it might be possible\\nfor an external organization to become\
    \ a corporation's industrial lab while\\nmaintaining process and culture that supports high quality solutions R&D. This\\\
    nstrategy toward long-term survival is \\\"the mitochondria maneuver\\\": Get absorbed\\ninto a larger organization while\
    \ maintaining a permeable barrier and your own\\ncultural and operational DNA.\\nThe benefits are pretty clear, if they\
    \ don't require neutering your organization\\nto get them. Innovation organizations need a money factory, and what better\\\
    nmoney factory than a big company that is already making massive profits? The\\nbudget from the larger org is effectively\
    \ dividends from an endowment.\\nArguably, DeepMind is a great example of the mitochondria maneuver.  198 An\\nAI research\
    \ lab, they were acquired by Google in 2014, but unlike most acquired\\nSee \\\" How to access \\\"America's Seed Fund,\\\
    \"\\nthe $3 billion SBIR program .\\\"\\n96.\\nIncluding Intuitive Surgical, E-Trade,\\nSymantec \\u2014 see this Wikipedia\
    \ page for a\\nfull list.\\n97.\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible\
    \ to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n35/61\\n\\ncompanies, they have maintained relative independence\
    \ to do high-quality long-\\nterm work.  199 As long as they continue to have hits every few years (AlphaGo,\\nAlphaFold)\
    \ and some of their work directly helps the mothership (some of their\\nwork makes Google's data centers more efficient),\
    \ Alphabet seems willing to\\nheavily subsidize their almost $1B budget. 98 However, the fact that the Alphabet\\n\\u2014DeepMind\
    \ relationship meets the\\nthree criteria for healthy industrial labs\\nshould make you skeptical whether the\\nmitochondria\
    \ maneuver can be accomplished in other (lower-margin, less clearly\\naligned) domains.\\nWhile they're under the same\
    \ constraints in the long run, a key difference\\nbetween a mitochondrial organization and a home-grown lab may be the\
    \ ability\\nto skate where the puck is going. A \\\"normal\\\" industrial lab needs to justify its\\nexistence from day\
    \ one \\u2014 \\\"stakeholder buy-in\\\" and all that. By contrast, a\\nmitochondrial organization only needs that justification\
    \ eventually. DeepMind\\nofficially started in 2010 \\u2014 two years before AlexNet acted like lightning to AI\\nhype's\
    \ thunder. It's hard to put yourself in the mind-set of pre-2012 attitudes\\ntoward AI research, but the term \\\"AI winter\\\
    \" exists for a reason. Suffice to say, it\\nseems unlikely that any corporation would have created a full-fledged AI-focused\\\
    nlab in 2010.  201 This framework suggests that a key requirement for the\\nmitochondria maneuver to work is a strong\
    \ thesis about how your DARPA-riff's\\nfocus will align with a high-margin corporation's priorities in the future.\\nA\
    \ DARPA-riff cannot count on the mitochondria maneuver from day one.\\nDuring its Odyssean wanderings, it will still need\
    \ to depend on one of the other\\nincome sources. However, some income streams might be more conducive to\\neventually\
    \ getting absorbed than others \\u2014 a membership model or programmatic\\nconsulting could both become more and more\
    \ serious until two organizations\\ndecide to go steady and consummate their relationship.\\nAttempting the mitochondria\
    \ maneuver seems fraught with failure modes. It\\nbasically requires predicting the future, which is hard. (Though easier\
    \ if you're\\ndoing that by inventing it.)  202 The steps an organization might need to take to\\nsurvive might make it\
    \ unpalatable for a corporation. The opposite could also\\nhappen! And while DeepMind has done well, history is littered\
    \ with\\norganizations that thought they were going to become their acquirer's R&D arm\\nbut the fates had other things\
    \ in store for them.\\nAn endowment that funds operations out of the interest on a\\nlarge principal seems like the ideal\
    \ funding mechanism for a\\nDARPA-riff\\nUltimately, a DARPA-riff needs to be autocatalytic. The only way for it to be\
    \ able\\nto plan and act over long time scales is to fund operations through predictable,\\nlong-term income that doesn't\
    \ distract from the core goal. Unfortunately, these\\ncriteria rule out many funding sources for \\\"steady state\\\"\
    \ operations. One of the\\nonly ways to satisfy them all may be to build an endowment.\\nMost of the income streams we've\
    \ explored aren't suitable to fund a DARPA-\\nriff over the long run. For income to be predictable, it can't disappear\
    \ at the\\nwhims of either a few individuals or large mobs \\u2014 so grants, philanthropy, and\\ncontracts aren't viable\
    \ as steady-state funding sources. Technology licensing and\\nmembership models can't generate enough revenue to fully\
    \ fund steady-state\\noperations. Creating and selling products or services can create predictable long-\\nterm income.\
    \ However, it seems hard to avoid sales-based income distracting\\nfrom the core goal when that goal is in part to enable\
    \ things that are not product-\\nfocused enough for startups. Similarly, it would be very hard to avoid an\\ninvestment-in-spin-offs-based\
    \ income stream creating incentives to spin off\\nmore things with ever bigger, nearer-term exits. Spin-off-based income\
    \ might\\nwork in steady state, but to count on it alone would be to enter the same\\nincentive regime as VCs. The mitochondria\
    \ maneuver is one explicitly steady-\\nstate option, but it requires a fairly narrow set of conditions.\\nThe magically\
    \ ideal steady-state income source for a DARPA-riff is an\\nendowment that can fund operations from its interest. An endowment\
    \ could\\ncreate a near-infinite time horizon with minimal pandering to external\\nstakeholders. Of course, getting to\
    \ that point will take a long time and may be\\nimpossible!\\nPerpetual endowments have precedent for enabling different\
    \ research\\nparadigms \\u2014 the Rockefeller Foundation , Howard Hughes Medical Institute ,\\nand Wellcome Trust have\
    \ all done great work.\\nWhat would the ideal steady-state budget of a DARPA-riff be? As some anchor\\npoints, DARPA's\
    \ 2020 budget was $3.6B 99 and Bell Labs\\\" 1974 budget was\\nweirdly similar at $2.8B in 2021 dollars.\"\n  },\n  {\n\
    \    \"name\": \"If it's true that research orgs don't\",\n    \"text\": \"scale, these historical anecdotes\\nsuggest\
    \ that a single-digit billion-dollar\\nbudget may be the upper limit for an\\neffective research organization. This argument\
    \ is admittedly hand-wavy, but it\\nprovides a useful anchor for the high end of a long-term DARPA-riff budget.\\nBeing\
    \ aggressively ambitious, let's say ~$1B/year. This number is less than\\nDARPA and the fully evolved form of Bell Labs\
    \ but more than Bell Labs\\\" 1930\\nbudget of $300M in 2021 dollars. 101\\nA back-of-the-envelope calculation\\ntells\
    \ us that to hit a $1B budget,\\nassuming 4% dividends on invested\\ncapital, you would need a $25B endowment. That is\
    \ an absurd but not\\nunthinkably large number. For comparison, Harvard, Yale, and Stanford have\\nendowments of $41B,\
    \ $31B, and $29B, respectively, as of 2019. 102 Howard\\nHughes Medical Institute had $21.2B in\\nassets in 2020. 103\
    \ Admittedly, these are\\nthe largest endowments in the world so\\nthe chances of being able to get there\\nare incredibly\
    \ low. However, they stand as proof points that a long-term goal to\\nbuild an endowment that could support a $1B budget\
    \ is hard but not impossible.\\n208\\nEven endowment-based funding is not without pitfalls. Endowment-based\"\n  },\n\
    \  {\n    \"name\": \"funding's boon and bane is that it dampens feedback loops. As a result, the\",\n    \"text\": \"\
    organization could become decoupled from its original goal as new generations\\nof people (specially professional managers)\
    \ take over. While this problem is not\\ninevitable, the distinct possibility emphasizes the importance of long-term\\\
    nfocused governance structures and intergenerational culture.\\nAnother potential downside of loose feedback loops is\
    \ that mission-focused\\norganizations run the risk of perverse incentives when they come close to\\nachieving their mission.\
    \ Instead of closing up shop at a job well done, mission-\\nfocused organizations can wind up exaggerating the prevalence\
    \ of a problem or\\nslacking on the job in order to remain relevant. Luckily for a DARPA-riff, I'm not\\ntoo worried about\
    \ running out of possibly potentially game-changing but\\notherwise unsupportable projects.\\nAnother minor consideration\
    \ is that the other side of endowment-based\"\n  },\n  {\n    \"name\": \"funding's stability is that it can't quickly\
    \ scale up. That doesn't seem like a\",\n    \"text\": \"significant limitation because we can expect DARPA-riffs to be\
    \ more ideas-\\nlimited than money-limited. 104\\nAnecdotally, a DARPA director once\\nasked for Congress to decrease\
    \ their budget, lest they be crushed under the\\naccompanying expectations.\\nOf course, the biggest question is: How\
    \ do you build an endowment in the first\\nplace?\\nLet's rule out the possibility of acquiring the money all at once\
    \ for three\\nreasons. First is the obvious one: Anybody with a chunk of money that big\\nburning a hole in their pocket\
    \ already has plans for it. Second, it is important for\\nbig things to start small \\u2014 the organization needs the\
    \ flexibility to work out\\nkinks and develop a culture without the pressure to deploy a massive amount of\\nmoney. Third,\
    \ most people with the ability to create an endowment of that size\\nwould (reasonably!) want near direct control of the\
    \ organization, which would\\nlikely as not lead to headaches. 105\\nRuling out one big funding event\\nmeans that a DARPA-riff\
    \ will need to\\nbuild an endowment up over time, depending on the other funding sources we've\\nexplored in this section.\
    \ Through a conscious process of budgetary discipline,\\nthe organization could squirrel away funds, perhaps helped by\
    \ a windfall here\\nand there. Again, an endowment is a possibly unreachable goal, but it's one of\\nthose low-probability\
    \ events whose probability drops to zero if you don't shoot\\nfor it.\\nExploratory program organizations\\nOne potential\
    \ experiment is that each program could be its own semi-\\nindependent entity \\u2014 an exploratory program organization\
    \ (EPO). You could\\nimagine it as a legal entity that enables a research program to smoothly slide\\nbetween the fully\
    \ externalized research that DARPA coordinates and the\\ninternalized research of an organization like Lockheed Skunk\
    \ Works.\\nSee \\\" DeepMind revenue dwarfed by $649\\nmillion loss.\\\"\\n98.\\nSee \\\" Department of Defense Fiscal\
    \ Year (FY)\"\n  },\n  {\n    \"name\": \"Budget Estimates .\\\"\",\n    \"text\": \"99.\\nSee \\\" The End of AT&T \\\
    \" (this might require\\na free account login).\\n100.\\nSee The Making of American Industrial\\nResearch: Science and\
    \ Business at GE and\\nBell 1876\\u20131926 .\\n101.\\nSee the list on Wikipedia here .\\n102.\\nSee HHMI financials .\\\
    n103.\\nSee \\\" What makes DARPA tick ?\\\"\\n104.\\nSee this essay by Paul Graham about\\nunrestricted donations\\n105.\\\
    nSpeculation\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\\
    nhttps://blog.benjaminreinhardt.com/parpa\\n36/61\\n\\nDARPA doesn't do any research in house. Externalized research has\
    \ benefits,\\nespecially at the beginning of high-risk programs. It can act as a buffer against B-\\nplayers, allows you\
    \ to tap into tacit knowledge and specialized equipment\\nwithout going all in, and more. Externalized research also has\
    \ downsides that\\nincrease as the research matures. Dependencies between different parts of any\\nresearch program tend\
    \ to increase as the program matures, increasing the\\ncoordination costs if everybody involved isn't under the same roof.\
    \ Anybody who\\nhas done a group project has experienced this: It starts with, \\\"You go figure out\\nhow we'll do path\
    \ planning and I'll figure out how to talk to the motor,\\\" but the\\ndivision of labor breaks down when you actually\
    \ need the motor to do the path\\nplanning! These trade-offs mean that there's no constant correct level of\\ninternal/external\
    \ research throughout a program. It's even possible that one\\nreason DARPA has a mixed record on transitioning is because\
    \ their pure\\nexternalized research makes it hard to cohere the different projects within a\\nprogram into a single system.\\\
    nAt the beginning of a program, externalized research is important for building\\nconviction. Externalized research enables\
    \ the program to have access to rare\\nskills or equipment that might only exist in one or two places in the world.\\\
    nPerhaps there is just one researcher who has perfected the technique for\\nsynthesizing a particular molecule. Externalized\
    \ research allows the program to\\ntap into people who would only want to work part-time or have other\\ncommitments,\
    \ like finishing a PhD. One of the big barriers to starting a company\\nis that founders need to be 100% in or there is\
    \ weird, murky uncertainty. Many\\nDARPA programs would have been killed by these coordination costs if they had\\nto\
    \ be self-contained organizations from day one.\\nAt the end of a program, internalized work is important for bringing\
    \ disparate\\npieces of a program together and commercializing or otherwise \\\"encapsulating\\\" a\\ntechnology so other\
    \ people can use it. While it's possible, there are very few\\nexamples of successful decentralized productization, and\
    \ someone needs to buy\\ntechnology eventually .\\nIn its early stages, an EPO could look similar to a DARPA program,\
    \ with a\\nprogram manager coordinating externalized research. As the program matures,\\nperformers can move from academic\
    \ labs or other organizations to work directly\\nfor the EPO. This internalization lowers coordination costs around system\\\
    nintegration once the individual pieces are de-risked. There's something clutch\\nabout the ability to go to someone's\
    \ desk and say, \\\"Hey, look at this\\\" when you're\\ndealing with physical systems. In effect, the program manager\
    \ is an initial CEO\\nfor the EPO, gradually internalizing outputs and people from the externally\\nfunded activity.\\\
    nIt is hard to know going into a program what kind of value it will create. Some\\nresearch programs end up creating something\
    \ that resembles a product, some\\nend up creating valuable IP, and some just end up creating valuable knowledge\\nwithout\
    \ a clear way to capture it. Of course, many programs produce nothing of\\nvalue at all except good stories. The EPO's\
    \ structure acknowledges this reality by\\nbeing temporary and converting to one of several options at the end of its\
    \ life.\\nAt the end of its life, the EPO could:\\n1. Renew for another life if several more years of external research\
    \ could get the\\nprogram to a much better place.\\n2. Convert into a profit-focused C-corp or LLC if it has reached a\
    \ point where a\\nproduct is on the horizon.\"\n  },\n  {\n    \"name\": \"Convert into a nonprofit focused on advancing\
    \ the EPO's research mission if\",\n    \"text\": \"the EPO's focus needs long-term research and coordination but won't\
    \ be\\nproducing a product.\\n4. Convert into an organization for licensing IP if the EPO produced valuable IP\\nthat\
    \ doesn't cohere into a product.\\n5. Or (in reality, the most likely case) the EPO can do nothing in particular after\
    \ it\\nexpires.\\nMany EPOs will not work out. That is OK because of the continuously varied\\ncommitment and temporary\
    \ nature. You're not asking investors to put in a ton of\\nmoney or people to quit their jobs from day one. The high failure\
    \ rate might\\nsuggest that an EPO should be structured to be renewed every year with a\\nmaximum lifetime of five years.\
    \ You wouldn't want a zombie EPO sucking\\nresources for years after it's clear that it won't work.\\nEPOs could give\
    \ PMs incentives that DARPA programs cannot \\u2014 the ability to\\nbecome the leader of an organization devoted to making\
    \ a vision into a reality. In\\na way, the PM to EPO leader would systematize Robert Taylor's role in the\\npersonal computer:\
    \ After running the Information Processing Technology Office\\nat ARPA, Taylor spun up the interactive computing group\
    \ at PARC and recruited\\nthe people who had been working on the ARPA program to work there.\\nEPOs could bridge the Valley\
    \ of Death. A big \\\"failure\\\" mode of both DARPA\\nand ARPA-E is that nobody takes the technology football when a\
    \ program\\nsuccessfully wraps up. It's especially insidious because that handoff falls into the\\ncracks between job\
    \ descriptions so often, someone has to go above and beyond to\\nmake it happen. In the book Loonshots , Safi Bahcall\
    \ uses the pithy aphorism\\n\\\"Manage the transfer, not the technology\\\" to emphasize the point that this\\nhandoff,\
    \ not the technological development itself, is where many promising\\ntechnologies go to die. Although ARPA-E has a commercialization\
    \ team, they\\nonly try to get the individual pieces of a program commercialized, but do not\\ncoordinate them into a\
    \ single entity. The nature of an EPO removes that gap\\nentirely; the program becomes a new organization that takes the\
    \ football. A\\ncontinuous slider from modularized external research to coordinated internalized\\nresearch also enables\
    \ people from disciplines farther down the \\\"pipeline\\\" to be\\ninvolved in the process. For example, prototypes are\
    \ much more likely to be\\nmanufactured if people from manufacturing are in the room during the prototype\\ndesign.\\\
    nEPOs probably need a novel legal structure.\\nA parent organization for the EPOs\\nYou could imagine EPOs acting as stand-alone\
    \ organizations; something akin\\nto focused research organizations 106\\nthat initially have a distributed\\nstructure.\
    \ However, EPOs will be\\ndrastically more effective with an\\numbrella organization that can spin them up and maintain\
    \ the nebulous things\\nthat benefit from institutional consistency, like intra-organizational relationships\\nand tacit\
    \ knowledge. In other words, EPOs are a complement to a DARPA-riff,\\nnot a replacement for it.\\nA DARPA-riff is important\
    \ for getting EPOs off the ground. Starting EPOs\\nprobably involves an involved program design process and scattered\
    \ experiments\\nto show that it's worthwhile to start. You need another organization to do that\\nwork. Additionally,\
    \ DARPA PMs often work on multiple programs at once, which\\nwould be harder to do without a DARPA-riff acting as an umbrella\
    \ organization.\\nCulture, process knowledge, extra-organizational relationships, and\\norganizational trust that a parent\
    \ organization could build are intangible but\\ncould ultimately make each individual EPO more likely to succeed both\
    \ in terms\\nof know-how and money.\\nSince any given EPO is likely to fail, an umbrella organization is important for\\\
    ncreating a portfolio of programs and shifting money between them. The portfolio\\napproach enables funders to put money\
    \ into the parent organization with a much\\nhigher chance that it will have a payoff than with any individual EPO. If\
    \ each\\nEPO needed to raise its own money, it would take a lot of time and resources and\\nthey would be incentivized\
    \ to work on whatever is most likely to be funded,\\nwhich heavily incentivizes likely-to-work or heavily hyped areas.\\\
    nIssues\\nThe private companies and labs who DARPA (and hence a DARPA-riff) works\\nwith might have a problem with folks\
    \ leaving to join an EPO. \\\"This might lead to\\npeople leaving\\\" might make other organizations hesitant to work\
    \ with you in the\\nfirst place. Graduate students and postdocs who are transient members of labs\\nare the obvious exception.\\\
    nIntellectual property ownership will also be an issue. Companies and\\nuniversities are willing to work with DARPA at\
    \ least in part because they know\\nthat they will get to keep the IP that comes out of the collaboration. At the same\\\
    ntime, large companies work with universities and smaller companies all the time\\nand presumably have satisfactory IP\
    \ arrangements, so this doesn't seem like an\\nunsolvable problem.\\nYou can create a program design discipline that enables\
    \ better\\nresearch and development\\nThere is a lot of literature about how to manage research programs, but very little\\\
    nthinking about how to design them in the first place.\\nProgram design is inextricably tied up with research planning.\
    \ The idea of\\nplanning research might make some people throw up up in their mouths a little\\nbit, 107 but bear with\
    \ me. I'm going to\\nput on my Wittgenstein hat 108 and\\nsuggest that words matter; what people\\nare actually objecting\
    \ to is scheduling\\nresearch around deliverables , which is\\nSee \\\" Focused Research Organizations to\\nAccelerate\
    \ Science, Technology, and\\nMedicine .\\\"\\n106.\\nSee \\\" Fund people, not projects I: The HHMI\\nand the NIH Director's\
    \ Pioneer Award \\\" and\\nthe other parts of the same series for a deep\\ndive on the literature around this.\\n107.\\\
    nSee \\\"Wittgenstein: Reality is shaped by the\\nwords we use \\\" from Farnam Stree t.\\n108.\"\n  },\n  {\n    \"name\"\
    : \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\\
    n37/61\\n\\nvery different from planning research\\naround goals .\\nAll research is planned around goals to some extent.\
    \ Even \\\"I'm going to put\\nthis liquid in this other liquid and see what happens\\\" is a plan. In this situation,\\\
    nthe goal is to see and report on what happens when you mix those two liquids.\\nIt's a silly example, but it provides\
    \ a base case to build off of. The chemist mixing\\nthe chemicals probably has a bigger plan than simply seeing what happens;\
    \ the\\nplan probably involves mixing many combinations of chemicals in order to chase\\na bigger goal like understanding\
    \ which combination produces the most heat or\\nperhaps why exothermic reactions exist at all.\\nOur chemist friend doesn't\
    \ necessarily have or need a specific deliverable to do\\ngood work. It might literally be impossible for her to, for\
    \ example, find a mixture\\nthat produces as much heat as she wants. Even if she could, it might involve\\ntesting an\
    \ order of magnitude more mixtures or even needing to invent an\\nentirely new synthesis technique to do it. Requiring\
    \ her to work on a specific\\nschedule would be inane. I suspect that deliverables and schedules are artifacts of\\nthe\
    \ commoditization process that happened to research during the 20th century\\nas a by-product of the expansion and institutionalization\
    \ of science. 109\\nIf planning and goal setting (separate\\nfrom schedules and deliverables) are\\nnecessary for any\
    \ kind of R&D work, it\\nraises several questions. What kind of\\ngoals should be set and what time scales should be planned\
    \ for what sort of\\nwork? Should you parallelize work or serialize it? In what contexts? What are the\\nkey constraints\
    \ keeping you from a breakthrough? What level of fidelity will stifle\\ncreativity, and what will provide the focus to\
    \ make breakthroughs? Which tools\\nwill maximize the focus and minimize stifling, and which frameworks can make\\nthe\
    \ difference between good work and bad? I would posit that these questions\\nand their ilk, what I might refer to as \\\
    \"program design', are woefully under-\\ntheorized.\\nIn addition to the big-headed questions, the objective truth seems\
    \ to be that\\nwe kind of suck at designing researchy programs. Most programs feel like a grab\\nbag of vaguely related\
    \ projects that are incremental extensions of whatever\\nresearchers were already working on but nudged slightly toward\
    \ a central theme.\\nMost technology roadmaps feel like the penultimate committee output; bland\\ndocuments that simultaneously\
    \ seem to say everything but are useless for making\\nhard decisions. 110 Whether or not\\nwe've actually become worse\
    \ at program\\ndesign is an open question. To stake a\\nfirm position, I will say yes, we have\\nbecome worse \\u2014\
    \ anecdotally, compare\\nF-35 or SLS development to Apollo. This disciplinary decay would be due to\\nreasonable incentives\
    \ \\u2014 there are fewer areas that need program design to\\nfunction. Arguably, software has become the dominant \\\"\
    innovation-based\\nindustry\\\" and, unlike science-based manufacturing, it doesn't benefit\\nsignificantly from (and\
    \ can even be harmed by) long-time-horizon program\\ndesign.\\nThe question of whether we've become worse at program design\
    \ is an\\nimportant preliminary for the more important question: Could we do program\\ndesign better?  216 If we've gotten\
    \ worse, it's strong evidence that we could do\\nbetter. However, I suspect that we can do better regardless of whether\
    \ we've\\nalways sucked at it (or are secretly good at it? \\ud83e\\udd14) .\\nOne reason program design is under-theorized\
    \ is that the people who are good\\nat it are too busy applying it to spend time and effort making it legible.  217 There\\\
    nare no research coaches. Program design also suffers acutely from siloization \\u2014\\neach organization (or individual!)\
    \ seems to reinvent the wheel. This isn't to say\\nthat we should aim for standardization; program design will always\
    \ be very\\ncontext-dependent. However, it seems possible to shoot for a baseline of best\\npractices and frameworks for\
    \ building on top of those best practices.\\nThere are many inspirations that the discipline might be able to draw on.\
    \ A big\\npart of a program design discipline will be trying to make legible the process that\\nskilled practitioners\
    \ already use to create things like Adam Marblestone's \\\"\\nClimate Technology Primer \\\" or Jos\\u00e9 Luis Ric\\\
    u00f3n's \\\" Longevity FAQ .\\\" Ric\\u00f3n does\\na good job unpacking his process in \\\" The Longevity FAQ: Making\
    \ Of \\\"; one\\ncould imagine a line of research that focuses on understanding why some people\\nare good at this process\
    \ and some are not. Adam Marblestone and Ed Boyden\\nhinted at the possibility of more structured discovery in their article\
    \ \\\"\\nArchitecting Discovery .\\\"\\nHistory is another place to dig \\u2014 how did people manage research-adjacent\\\
    nprojects that had shockingly fast results ? While some of the results were\\ncontingent on the individuals involved,\
    \ I can't shake the hunch that there is\\ntransferable knowledge in the tools developed to manage early space programs.\"\
    \n  },\n  {\n    \"name\": \"How did the creators of the \\\" Fusion\",\n    \"text\": \"Power by Magnetic Confinement\
    \ \\\"\\nreport think about the different\\npossibilities and trade-offs?  219 Of course, the value of historical study\
    \ depends\\non the aforementioned question of whether we've become worse or not.\\nYou don't often see this kind of program\
    \ design anymore. Was it never useful, now outdated, or a lost\\nart?\\nThere has been a lot of relevant work on how to\
    \ do better project management\\n(as opposed to program management). One could even argue that researchy\\nprogram design\
    \ is just part of project management. I would argue that standard\\nproject management techniques (Six Sigma 112 , Matrix\
    \ Management 113 , etc.)\\nneed so much modification to deal with\\nthe uncertainty, time scales, and\\nfractured expertise\
    \ inherent in research\\nprograms that we're talking about\\nsomething beyond a simple extension\\nof project management.\
    \ There is a\\nwhole range of methodologies like TRIZ 114 , Wigmore charts , and Wardley\\nmaps , that feel like they\
    \ have nuggets\\nof truth but are, for the most part, post-\\nhoc explanations of success used to get\\nconsulting gigs\
    \ in areas with loose\\nfeedback loops like big companies and law schools. So, like any good discipline,\\nprogram design\
    \ would start strongly adjacent to crackpots and mysticism!  223\\nWhat might a Wardley-inspired roadmap for describing\
    \ the complete structural connectivity of the\\nhuman brain look like?\\nSee \\\" The decline of unfettered research \\\
    \" for\\na good description of this process and its\\nconsequences.\\n109.\\nThere are some exceptions! The International\\\
    nTechnology Roadmap for Semiconductors is\\nquite good, I presume because an entire\\nmassive industry actually depends\
    \ on\\ncoordinated research.\\n110.\\nSee The Secrets of Apollo or the PERT guide\\nfor management .\\n111.\\nSix Sigma\
    \ is Motorola's process-improvement\\nprocess.\\n112.\\nMatrix management is a now-disfavored\\nproject management approach\
    \ created by the\\naerospace industry in the 1950s.\\n113.\\nSee And Suddenly the Inventor Appeared:\\nTriz, the Theory\
    \ of Inventive Problem Solving\\n.\\n114.\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting\
    \ the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n38/61\\n\\nThere are several areas that\
    \ I suspect are important for good program design\\nwhere I haven't found much written prior art (unless you squint very\
    \ hard):\\nsystematic ways to think about technological constraints and tradeoffs; ways to\\nvisually represent constraints\
    \ and possibilities in a manner that can actually aid\\ndecision-making and reveal new possibilities; and the tactical\
    \ psychology of\\ncreating programs. Each of these areas is something that people already do, but\\nin an ad-hoc way.\
    \ Anytime someone says something along the lines of, \\\"Oh, you\\ncan't do long-range battery-powered commercial flight\
    \ \\u2014 batteries are too\\nheavy,\\\" they're implicitly bundling many constraints and assumptions: What\\nkinds of\
    \ batteries are we talking about? What is their power density? What\\ncomponents contribute what fraction to their weight?\
    \ How much power do they\\nneed to put out for how long to be useful? What are we assuming about the\\npropulsion systems\
    \ for the plane? What are the degrees of freedom for all of\\nthese components? What are the dependencies between them?\
    \ How hard would\\nit be to improve any one of those components, by how much, and what would\\nthat effect be on the whole\
    \ system? The same sorts of questions are important for\\nany technology. That many complex questions are also impossible\
    \ to hold in your\\nhead all at once, let alone transfer into someone else's head \\u2014 thus the need for\\nthinking\
    \ frameworks and representation tools.\\nAnd then there's the shockingly human and under-discussed process of mining\\\
    nthat knowledge in the first place. Perhaps controversially, I'm convinced that\\nmost human knowledge is not encoded,\
    \ especially on the knowledge frontier. As\\na consequence, a lot of program design is actually applied psychology. As\
    \ the\\nprogram designer, you need to not only nudge people to talk about their areas of\\nexpertise in ways that they\
    \ probably haven't before and generate excitement\\nabout the idea of a bigger program, you also need to figure out who\
    \ are the right\\npeople to talk to and get them to talk to you in the first place! This piece of\\nprogram design resembles\
    \ some combination of sales and user research. Equally\\n(or perhaps more!) important to the question of \\\"What work\
    \ needs to be done?\\\" is\\n\\\"Who is best suited to do the work?\\\" It's quite funny, actually \\u2014 while there\\\
    nseems to be a strong cultural consensus that good outcomes in high-uncertainty\\nendeavors depend heavily on the specific\
    \ individuals involved, answers to the\\nquestion \\\"Who is best suited to do this work?\\\" are almost entirely absent\
    \ when\\npeople lay out a research program.\\nIt's important to acknowledge that this entire hypothesis that you can create\
    \ a\\nprogram design discipline could easily be false. Perhaps guiding research is more\\nlike creating art; one can talk\
    \ about specific techniques ( art : stenciling, mixing\\npaints, shadows; program design : talking to experts, budgeting,\
    \ evaluating\\nclaims), but the process itself is too context-dependent and holistic to improve\\nthrough the tools and\
    \ abstractions that a discipline would provide. Perhaps more\\ndangerous is the possibility that any formalization ventures\
    \ out of the realm of\\nplanning and goals and into the realm of schedules and deliverables,\\nhamstringing the work you\
    \ intend to enable.\\nAnother strong argument against the formalization of program design is that\\nthe real issues are\
    \ Rumsfeldian unknown unknowns that are undiscoverable or\\nunthinkable before you run into them in the process of doing\
    \ the work. Paradigm\\nshifts are to some extent unimaginable before they happen by definition. The\\npresumption that\
    \ we could do a better job than practitioner intuition could be a\\nfoolish waste of brain cycles at best, or actively\
    \ steer people away from actually\\nuseful work at worst. \\\"How do you draw a roadmap off the edge of the map?\\\" is\
    \ a\\nvalid question.\\nThe possible upsides of a healthy program design discipline seem like they\\ncould be huge. So\
    \ if you go in explicitly acknowledging the potential failure\\nmodes, the potential upsides are worth it. Program design\
    \ could potentially help\\nprograms to exist that would not exist otherwise, prevent wild goose chases, and\\nunlock unintuitive\
    \ possibilities!\\nThe trick is that to do risky experiments  224 , program design as a discipline\\nneeds to be embedded\
    \ in an organization running programs. Enabling\\ntechnologies must be developed while doing serious work, 115 and without\
    \ an\\norganizational home, program design\\nwould be severed from a serious\\ncontext of use. It would suffer the same\\\
    nfate as other academic or consultant-driven disciplines of practice. These\\ndisciplines tend to sound great on paper\
    \ so that someone wants to implement\\nthem, but that implementation often has so many restrictions, imperfect\\ninformation,\
    \ and strung-out feedback loops that it's unclear how much of the\\nsuccess or failure of the project is attributable\
    \ to the discipline. Developing\\nbetter program design is one of the reasons why, despite the fact that running\\nmultiple\
    \ organizational experiments flies in the face of common wisdom, a\\nDARPA-riff both can and must do multiple experiments\
    \ at once .\\nProgram design is like creating a Lego instruction book\\n'Program design\\\" is an awfully nebulous term.\
    \ Its centrality to any DARPA-riff\\nmakes it worth spending some time wrapping our heads around. Like many\\nnebulous\
    \ things, the best way to think about program design may be through an\\nextended analogy. If you didn't build Lego sets\
    \ as a kid, I recommend you pause\\nreading, buy one, build it, and then resume.\\nModern research institutions tend to\
    \ produce a lot of atomic contributions.\\nThese contributions resemble Lego bricks in the sense that you can intuit that\\\
    nwhile they are not useful on their own, they will be useful as part of a broader\\nsystem. But like most Lego bricks\
    \ it's not immediately clear what amazing thing\\nthe brick can eventually be part of. (And in fact it can be part of\
    \ many things!)\\nEven a giant bucket of Lego bricks often doesn't immediately suggest what to\\nbuild. This bucket of\
    \ bricks is the state of many disciplines. That description is\\ntoo extreme \\u2014 the situation is more that we have\
    \ the picture on the front of the\\nbox and the bricks that came in the box mixed with a bunch of extraneous ones.\\nThought\
    \ leaders and big ideas people talk about the different box-pictures all the\\ntime; everybody has a vague idea that their\
    \ brick is a part of the spaceship. But if\\nyou've ever put together a Lego set, it's rarely clear where each part fits\
    \ in until\\nyou see all the intermediate steps in the instruction book.\\nThe goal of program design is to create these\
    \ intermediate steps. For example,\\nthe painfully unsexy step 72 that has a bunch of tan and gray pieces in a rough\\\
    nshape with some flanges on it that doesn't look like anything at all. It is hard to\\nknow that step 72 is going to lead\
    \ to the awesome spaceship on the box; it\\ncertainly doesn't look like a spaceship.\\nIt's a spaceship, obviously.\\\
    nGetting step 34 to happen is hard. You need to imagine the unseen interior of\\nwhat's on the box, which pieces are available,\
    \ which pieces you would ideally\\nhave, and which substitutions are OK. (It doesn't really matter if you use a neon\\\
    ngreen brick instead of a gray one as an interior part.) If you really need a piece\\nthat doesn't exist, you need to\
    \ make it yourself or convince someone else to make\\nit. And then you need to get all the pieces together \\u2014 just\
    \ because you put\\ntogether an actionable plan does not mean people will take those actions!\\nIdeally, as many steps\
    \ as possible are relatively self-contained \\\"modules': the\\ncockpit part of the spaceship, a secondary landing craft,\
    \ an escape pod. In real\\nlife, this corresponds to intermediate goals that are useful on their own or are at\\nleast\
    \ exciting milestones or demos. There are many words that should be written\\nabout the tension between the benefits of\
    \ useful intermediate steps and the\\ndanger that undue focus on useful intermediate steps can pose to eventual\\noutcomes.\
    \ In hindsight, it's easy to both look at technological development and\\nforget how many incremental useful steps there\
    \ were (synthetic plastic was used\\nas a nifty liquid by printers before it was accidentally cooked), and to forget how\\\
    nmuch work has gone into technologies before they get to anything useful\\n(transistors needed eight years of work before\
    \ the first completely unusable\\npoint-contact demonstration).\\nObviously, this analogy can only be pushed so far: Research-heavy\
    \ programs\\nwill inevitably have gaps between steps that would make any Lego assembler tear\\nher hair out; the picture\
    \ on the front of the box might be fuzzy or wrong; in real\\nlife, pieces don't just snap together; technology doesn't\
    \ exist independent of\\npeople, so you need to deal with incentives, politics, and egos; and more.\\nYou could reasonably\
    \ object to this analogy with a counter-analogy that the\\npieces of a research program are less like Legos and more like\
    \ biological\\ncomponents. Separate components in a biological process have much more\\nSee How can we develop transformative\
    \ tools\\nfor thought?\\n115.\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible\
    \ to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n39/61\\n\\n\\\"agency\\\" \\u2014 if you create the right\
    \ environment and shake it or apply a jolt of\\nelectricity, they will self-assemble. 116\\nThe biological analogy would\
    \ be much\\nmore apt than a Lego analogy if paradigm-shifting work cannot be planned or the\\ninnovation ecosystem is\
    \ \\\"directionally\\\" correct and just needs more funding and\\nwork along existing channels.\\nI suspect the reality\
    \ is a mix of both analogies \\u2014 in research programs, unlike\\nLego construction, you can't lay out every single\
    \ step, so \\\"biological\\\" self-\\nassembly between steps will be essential. Keep in mind that these analogies are\\\
    nmeant as thinking tools, not evidence or predictive descriptions of the world.\\nHopefully, though, the Lego analogy\
    \ is provocative. Playing with it is a more\\ntangible way to describe the need for program design overall and suggests\\\
    nextensions, like the the possible role of simulations and legible intermediate\\nsteps.\\nGood simulations could be the\
    \ \\\"why now\\\" of roadmapping tools\\nNew technologies and disciplines are often good ideas in theory but infeasible\
    \ in\\npractice because they're built on top of other technologies that aren't up to snuff.\\nElectric cars that are comparable\
    \ to gasoline-powered cars weren't really feasible\\nuntil the electronics industry caused leaps in lithium-ion batteries.\
    \ \\\"Why now?\\\"\\nis a good question to ask whenever someone proposes a new technology or\\ndiscipline. A good answer\
    \ can hint at eventual success. Of course, the many\\nexamples of successful creations that didn't have a particular \\\
    \"why now\\\" means\\nthat a bad answer to the question doesn't predict failure. Simulations may be an\\nanswer to the\
    \ \\\"why now\\\" question for a new program design discipline: Our\\ncapability to simulate everything from proteins\
    \ to cities has exploded in the 21st\\ncentury, and simulations have a unique ability to precisely illustrate possibilities\\\
    nthat do not yet exist in a way that is both internally consistent and externally\\nconsistent.\\nSimulations have continuously\
    \ improved over the late 20th century and early\\n21st century, thanks to improvements in both software and hardware.\
    \  227 Games\\nand movies have pushed the edge of the possible, encouraging better algorithms,\\nprocesses, and tools.\
    \ Improvement in graphics processing units (GPUs) both\\ndirectly enables better simulations (the world is massively parallel!)\
    \ and has\\nfueled improvements in machine learning, which has recently started unlocking\\nsimulation capabilities like\
    \ AlphaFold and FermiNet. 117\\nWith simulations, you can precisely\\nwork backward from a long-term goal\\ntechnology.\
    \ This \\\"backward\\npropagation\\\" can then be used to\\ninform what you build starting with what is possible today.\
    \ In a way, this role is\\nsimilar to the one fulfilled by science fiction when you use it as a case study, or\\nsimply\
    \ a precise vision of where a technology can go. However, simulations are\\nmuch more precise than visions and can be\
    \ not only a compass but a map as well.\\nThey can surface obstacles and make non-intuitive suggestions about which\\\
    nroutes might be productive and which might be traps.\\nTake \\\"atomically precise manufacturing\\\", for example. There\
    \ is one camp that\\nsays \\\"There's no reason it shouldn't work\\\" but doesn't give clear examples of\\nwhat \\\"working\\\
    \" would actually look like. There is another camp that says \\\"That's\\nnot how molecules work!\\\" but, like the proponents,\
    \ can't be any more grounded.\\nWith that level of discourse, the two groups inevitably just talk past each other,\\nwhich\
    \ makes it hard for even a technically trained outsider to evaluate their\\narguments. In a way, it resembles the post-consensus\
    \ political discourse. If both\\ngroups could agree to the assumptions and methods behind a simulation, it\\nwould be\
    \ possible to create more or less objective evidence for or against the\\nfeasibility of one plan or another. The simulations\
    \ could then enable researchers\\n229 to iterate on precise challenges.\\nEven more optimistically, simulations could\
    \ enable non-researchers to\\ncontribute as well! If you squint, video games are simply simulations optimized\\nfor fun\
    \ instead of accuracy. One could imagine many [games? tools?] somewhere\\nbetween Foldit and Kerbal Space Program that\
    \ enable non-experts to explore\\npossibility space and surface approaches orthogonal to expert thinking.\\nOf course\
    \ there are challenges. To name a few: It is hard to interface different\\nsimulations; it is hard to know where a simulation\
    \ diverges from reality; and\\nsimulations and models often fail to capture important aspects of a real system.\\nLike\
    \ any intellectual tool, simulations can be used well and poorly. People often\\nclaim that an idea works \\\"in simulation\\\
    \" without laying out the assumptions\\nbehind that simulation and without any connection to how it might be physically\\\
    nimplemented. So this isn't to say that simulations can address every problem\\nright now. However, the space of problems\
    \ that simulations can potentially\\nunlock has significantly expanded in the past several years (as of 2021).\\nA DARPA-riff\
    \ could use a constitution with checks and balances\\nto produce high variance-results over a long period of time\\nThe\
    \ DARPA model is an unbuffered system. In chemistry, an unbuffered system\\nchanges its overall pH rapidly in response\
    \ to acids or bases. At DARPA,\\nindividual contributions easily have a huge effect on outcomes. An unbuffered\\nsystem\
    \ has many advantages \\u2014 most notably, it enables high-agency individuals\\nto act quickly with minimal friction.\
    \ At the same time, an unbuffered system\\nseems likely to run into a catastrophic failure that kills the whole thing.\
    \ In order\\nto do effective solutions R&D, a DARPA-riff needs to be a long-term institution.\\nIs it possible to build\
    \ in checks and balances that could sustain a long-term\\ninstitution without ruining the possibility of high-variance\
    \ outputs?\\nLooking far outside the realm of research organizations, it's worth noting that\\nthere are some core elements\
    \ of the American Constitution that have made the\\nUnited States a rather robust institution.  230 The US founders thought\
    \ a lot\\nabout institutional longevity, and it's worth drawing from their experience. As a\\nthought experiment, let's\
    \ go back to sixth grade civics class. (For those readers\\nwho didn't go to school in the US, you really didn't miss\
    \ much.) We can examine\\nthe roles of different branches of government and play with them through the\\nlens of the different\
    \ building blocks we have in corporate governance and\\nDARPA's structure. I'll pay special attention to the Buxton Index\
    \ (the length of\\nthe period over which an entity makes its plans) of each role to explicitly call out\\nwhere there\
    \ will be incentive mismatches. Ideally, you can use those tensions as a\\nproductive set of checks and balances instead\
    \ of generating wasteful friction.\\nDifferent roles as different branches of government\\nIt seems pretty clear that\
    \ the program managers (PMs), as the people who are\\nactually executing on the programs, are analogous to the American\
    \ Executive\\nBranch. Similar to the Executive Branch, they probably have the lowest Buxton\\nIndex. Remember, PMs have\
    \ a tenure of four to five years. PMs are also the\\noutward facing piece of the institution, similar to the role of the\
    \ Executive\\nBranch.\\nThe role of the Judicial Branch seems well served by some kind of multi-person\\nboard of directors\
    \ (which is an awkward juxtaposition with the \\\"director\\\" titles\\nusually held by DARPA managers so we'll just call\
    \ it the board for now). Like the\\nJudicial Branch it makes sense for the board to be the farthest removed from the\\\
    nday-to-day operations of the organization. Also similar to the Judicial Branch\\n(and other boards), it seems like a\
    \ good starting place to have it be composed of\\nseveral people with indefinite term limits, giving it both the highest\
    \ Buxton\\nIndex and the lowest variance; we can use the fact that decisions made by\\ncommittees lead to median results\
    \ in our favor.\\nThat leaves the director(s) as the Legislative Branch . At first, this connection\\nseems a bit odd\
    \ because we're juxtaposing a bicameral legislature and at most a\\nfew people (and likely just one person \\u2014 at\
    \ least at first). However, taking a step\\nback and looking at the Legislative Branch as the internally facing branch\
    \ that\\nwrites the laws, the connection makes more sense. The director will have a\\nBuxton Index that is somewhere between\
    \ the PMs and the board and be\\nresponsible for setting culture and procedures, money, and other internal\\nfunctions\
    \ that are roughly analogous to laws.\\nThe last piece of the puzzle is a constitution and a body of laws. Most\\ncorporations\
    \ have constitutions, but it's usually a formality. Instead, a DARPA-\\nriff should take a constitution seriously as a\
    \ coordination mechanism. It flies in\\nthe face of common wisdom to have written rules early on in an organization's\\\
    nlife. However, as a mechanism for enabling institutional longevity, it might be\\nvaluable enough to introduce it as\
    \ a source of friction. Many fast-moving\\norganizations still have very writing-centric cultures. You could take this\\\
    napproach one step further and say that memos constitute a body of laws.\\nChecks and balances between branches\\nThe\
    \ checks and balances should be based around two principles: 1. By default,\\npeople should be allowed to do things unless\
    \ they will harm the organization's\\nlong-term ability to achieve its goals; and 2. Each branch should be able to check\\\
    neach other branch.\\nIt's standard for a board to appoint CEOs (in this case, directors). This practice\\nfits into our\
    \ framework. Since there is no electorate, the board is effectively the\\nrepresentative of stakeholders who would otherwise\
    \ elect the members of the\\nlegislature. Similar to the judiciary, the board should be able to step in and stop\\nactions\
    \ that explicitly go against the organization's written constitution. This less-\\nstandard ability gives them a lot of\
    \ power to check both the Executive and\\nLegislative Branch, but they are only allowed to use it in a very constrained\
    \ way.\\nSee the Miller\\u2013Urey experiment .\\n116.\\nSee \\\" AlphaFold: Using AI for scientific\\ndiscovery \\\"\
    \ and \\\" FermiNet: Quantum Physics\\nand Chemistry from First Principles .\\\"\\n117.\"\n  },\n  {\n    \"name\": \"\
    /28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\\
    n40/61\\n\\nIn most corporations, the board has the ability to remove the CEO. Should that\\nbe the case in a DARPA-riff?\
    \ It gives the board a ton of power to warp the\\ndirector's incentives. My hunch is that it should be possible, but should\
    \ resemble\\nimpeachment in the sense that it needs to be an action of last resort and needs to\\nbe non-arbitrary (that\
    \ is, constitutionally based).\\nLike the American Legislative Branch's check on the executive, money will be\\nthe director's\
    \ major check on the PMs. For this to work, trust and\\ncommunication must flow freely in both directions. The director's\
    \ check on the\\nboard is through the written rules, as the board is constrained to only stop\\nactions that go against\
    \ the written rules. Giving the director an explicit check on\\nthe board is one place where we deviate from normal corporate\
    \ structure.\\nThe PMs/Executive Branch will require some non-standard tools in order to\\nhave official checks on the\
    \ other two branches. Normally, employees don't have\\nan official check outside of perhaps choosing to join or leave\
    \ an organization.\\nAlthough their positions are explicitly temporary, you want PMs to be as bought-\\nin to the institution\
    \ as everybody else. Perhaps even more so. Having their own\\nlevers of power are important to that buy-in.\\nGiven that\
    \ PMs should have checks on the directors and the board, what\\nshould they look like? In the US government, the Executive\
    \ Branch nominates\\nnew justices. PMs nominating new board members is unconventional, but it\\ncreates an intriguing\
    \ coupling between the lowest and highest Buxton Indexes in\\nthe organization. The hope would be that the PMs would nominate\
    \ people who\\nwould get it , in the sense that it takes someone who has been in the trenches to\\nget what it's like\
    \ to be there. Board member election could also be a mechanism\\nto get long-term PM buy-in despite short-term tenures.\
    \ Either \\\"graduated\\\" PMs\\ncould participate in every board member selection or there could be a single\\nboard\
    \ position devoted to representing alumni that only alumni can select. More\\nbroadly, employee ownership could enable\
    \ a DARPA-riff to align long-term\\nincentives.\\nThe PMs\\\" check on the director could also resemble the American system,\\\
    nwhere the Executive Branch has veto power over the Legislative Branch. Perhaps\\nthe PMs should have veto power over\
    \ both proposed rule changes and (especially)\\nnew PMs. Implementing veto power within a group of people is tricky because\
    \ it\\ncould easily lead to politics with single PMs trying to convince the others to go\\nalong with them.\\nAvoiding\
    \ deadlock\\nDeadlock is the primary failure mode of an organization with a robust system\\nof checks and balances. The\
    \ obvious places in this scheme that seem most\\ndeadlock-prone are the PMs\\\" veto power and the writing-based decision-making.\\\
    nYou could imagine a situation where the PMs veto literally every rule change and\\npotential new PM to try to force the\
    \ director to do something. Similarly, you\\ncould also imagine a situation where everybody uses written precedent and\
    \ the\\nconstitution to browbeat and block one another instead of talking and trusting.\\nTo the former case, there could\
    \ be a check on this check, like enabling an\\nagreement between the director and the board to overturn a veto. To the\
    \ latter\\ncase, one could suggest something like an \\\"Ask forgiveness, not permission\\nclause,\\\" that enables rule-breaking\
    \ actions if they have good outcomes. Both of\\nthese might be fine ideas, and there may be other similar fixes, but there\
    \ are\\nlimitations to this type of thinking.\\nAt the end of the day, you cannot create a set of rules that will guarantee\
    \ that a\\ngroup of people will work together in a way that produces high-variance results\\nover many organizational\
    \ generations. Effective action will always depend on\\ntrust and communication. There are several structural pieces that\
    \ can make this\\ntrust and communication more likely : keeping the organization small,\\nmaintaining a precise mission,\
    \ and filling all positions with excellent, diligent,\\nand applied people. However, all structural components will be\
    \ worthless if the\\npeople in the organization don't commit to constantly maintaining the\\norganization in the same\
    \ way you maintain a building. Intentionality and trust\\nare unavoidable!\\nEmployee ownership could enable a DARPA-riff\
    \ to align long-\\nterm incentives\\nA DARPA-riff needs to be obsessed with program managers. Unfortunately, many\\nof\
    \ the attributes that make people excellent PMs also make them good for many\\nother roles; people who are potential PMs\
    \ have a lot of options. Unlike DARPA, a\\nDARPA-riff doesn't offer people a way to serve their country, and at least\
    \ in the\\nearly days, you won't be able to pay as much as a tech or finance job.\\nThis heavy reliance on in-demand people\
    \ means that it's important to think\\nseriously about why people would take up the role and how to make sure that\\ntheir\
    \ incentives are aligned with the organization's. There are many ways a\\nDARPA-riff could structurally address this question;\
    \ \\\"employee ownership\\\"\\nmight go a long way toward encouraging everybody involved in the enterprise to\\nwork towards\
    \ its long-term success. Of course, that term is incredibly vague, so\\nlet's break it down and think about what implementing\
    \ it might look like.\\nEmployee ownership via economic stake\\nOne sense of employee ownership is to give everybody a\
    \ stake in any potential\\neconomic upside. While a DARPA-riff probably can't be profitable overall , that\\ndoesn't necessarily\
    \ mean there can't be an economic upside for employees.\\nIt's likely that a DARPA-riff will eventually spin out companies.\
    \ If it does, it\\ncould potentially retain shares in those companies via a for-profit entity.\\nEmployees could have\
    \ shares of this entity. The shares could act as a smoothing\\nfunction on the amount of value different PMs capture and\
    \ create buy-in to the\\norganization's long-term success instead of only a PM's specific program.\\nAnecdotally, even\
    \ a small number of shares in Entrepreneur First's global fund\\n(which, rationally, most people realized was not going\
    \ to be a life-changing\\namount of money) created a sense of caring about the organization and its long-\\nterm outcome.\\\
    nThe best way to handle liquidity in a for-profit DARPA-riff subsidiary is still an\\nopen question. If employees have\
    \ shares in a for-profit subsidiary, somehow\\nthose shares need to turn into cash eventually. The subsidiary could go\
    \ public,\\nbut that's a bad idea for too many reasons to get into here. Another option would\\nbe to have it be a fixed-life\
    \ fund similar to a PE or VC fund \\u2014 this seems to\\ncreate misaligned incentives with creating long-term value.\
    \ Both traditional\\noptions being off the table means that the situation isn't hopeless, but it does\\nneed more work.\\\
    nThe first requirement that Nonprofits must meet to maintain 501(3)(c) status\\nmight clash with an employee pool: \\\"\
    Organizations that apply for tax-exempt\\nstatus cannot serve the private interests, or private benefit, of any individual\
    \ or\\norganization besides itself past an insubstantial degree.\\\" This requirement is\\nprobably why OpenAI is structured\
    \ so that all the employees are employees of\\nthe for-profit subsidiary. A DARPA-riff could do something similar, with\
    \ the for-\\nprofit subsidiary employing almost everybody and contracting them to a\\nNonprofit entity.\\nRegardless of\
    \ how it's done, it's important that any employee value-capture\\nmechanism ignores how much value those employees themselves\
    \ captured.\\nSpecifically, I'm worried about incentives that push people to work on programs\\nthat they think can create\
    \ more-certain capturable value instead of less-certain\\n(but potentially massive) uncapturable value.\\nThere will be\
    \ unavoidable inequality between the amount of value different\\nPMs capture. Some programs will probably lead to successful\
    \ companies; the\\npeople who do the work to get the company off the ground will inevitably reap\\nthe lion's share of\
    \ the rewards. There is so much more to starting a successful\\ncompany than the technology it's built around, so it seems\
    \ reasonable that a\\nsignificant chunk of its value should be captured by people who build the\\ncompany instead of just\
    \ doing the research. Some programs will yield complete\\nduds. Some PMs will do work that leads to highly paid consulting\
    \ gigs or nifty\\njobs. Some programs will create massive value that is impossible to capture. It's\\nimpossible for an\
    \ employee value-capture mechanism to eliminate these\\ninequalities (nor should it), but it should attempt to buffer\
    \ them.\\nMy model of monetary compensation is that for most people  231 it's not a\\nstrict matter of \\\"More is better,\\\
    \" but that there is a threshold that feels \\\"fair\\\"\\nabove which other incentives matter much more.\\nEmployee ownership\
    \ via control\\nIn addition to economic stakes, people tend to feel more invested in the long-\\nterm success of an institution\
    \ if they have a voice in its direction.\\nThe most prominent way that organizations implement employee ownership is\\\
    nthrough the co-op model. 118 As gross\\noversimplification: Instead of a co-op\\nhaving a management team who\\nanswers\
    \ to a board, co-op employees\\nare the management team and elect representatives who liaise with the board.\\nThere's\
    \ something emotionally appealing in the idea of a DARPA-riff as a\\n\\\"research collective.\\\"\\nA DARPA-riff likely\
    \ can't adopt a co-op model out of whole cloth; co-ops tend\\nto be organizations that sell concrete outputs on relatively\
    \ short time scales, like\\nfarms and retail stores. However, the idea of PMs comprising the Executive\\nBranch in a constitutional\
    \ system is shockingly similar to a co-op. In both cases,\\nthe \\\"members\\\" select who will be on the board. The difference\
    \ is that the\\nconstitutional model has three separate branches while co-ops have two. I\\nI honestly could not find\
    \ any great resources\\non how co-ops work. The best I could do is\\nthis Ohio State University site . If you know\\nof\
    \ any better ones, please let me know!\\n118.\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting\
    \ the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n41/61\\n\\nsuspect this third branch (the\
    \ director/Legislative Branch) is important for\\ndealing with longer time scales and more nebulosity than normal co-ops.\\\
    nA bit of weirdness for control-type ownership pops up because of PMs\\\" short\\ntenures.\\nIf PMs don't feel a long-term\
    \ connection with the DARPA-riff, their level of\\nautonomy will easily allow them to act in ways that are good for them\
    \ but bad for\\nthe organization. This could look like taking on lower-risk programs so they're\\nlikely to have a win\
    \ under their belt that they can leverage later in their career; or\\n(if the PMs have strong control-type ownership)\
    \ pushing raises that would give\\nthe organization far less runway. There are many actions that are not overtly bad,\\\
    nlike embezzling, but if they were widespread, it would quickly bring the\\norganization to its knees. Short tenures have\
    \ the potential to amplify this sort of\\nproblem.\\nUniversities are a good case study in creating a connection between\
    \ an\\ninstitution and short-tenured individuals. Despite being primarily composed of\\nstudents who will be there for\
    \ ~5 years (with high variance), universities both\\nmanage to maintain a stable intergenerational culture and convince\
    \ alumni to\\ncare about the institution's long-term health after they graduate. This example\\nmakes it worthwhile to\
    \ ask, \\\"How are universities so institutionally and culturally\\nstable?\\\" One possibility to create long-term buy-in\
    \ is to have a board member\\nwho is explicitly a representative for \\\"graduated\\\" PMs, in the same way that\\nuniversities\
    \ often have an alumni representative as part of their governance.\\nA DARPA-riff could establish sales channels for frontier\
    \ tech\\nThere is nothing more difficult to take in hand, more perilous to\\nconduct or more uncertain in its success,\
    \ than to take the lead in the\\nnew order of things; because the innovator has for enemies all those\\nwho have done\
    \ well under the old conditions, and lukewarm defenders\\nin those who may do well under the new.\\n\\u2014Machiavelli,\
    \ The Prince\\nAnother important organizational experiment is to figure out better ways to\\nget new types of technology\
    \ out into the world.\\nFrontier technology has bespoke sales channels. People trying to get new\\ntechnology out into\
    \ the world constantly need to do some combination of\\nshoving it into ill-fitting but established channels (\\\"We're\
    \ going to sell this\\njetpack like SaaS software!\\\") or creating a new way of selling from scratch. The\\nlatter introduces\
    \ a whole new failure point for the technology and sometimes\\nrequires as much inventiveness as creating the technology\
    \ itself. Making this\\nprocess less harrowing would have massive impact.\\nSpeculatively, a DARPA-riff may be able to\
    \ address new technology's\\nproblematic dispersion-related uncertainty through institutional knowledge\\naccumulation,\
    \ credibility, and ongoing relationships.\\nKnowledge accumulation\\nOver the years, the startup world has built up cultural\
    \ wisdom about how to\\nsell software. Could the same thing happen for the wildly different technologies\\nthat might\
    \ come out of DARPA-like programs? A general-purpose telerobotic\\nplatform is incredibly different from a molecular factory,\
    \ and they both look\\nnothing like a muon-catalyzed fusion prototype.\\nDespite massive technology differences, I suspect\
    \ that a DARPA-riff could\\naccumulate institutional pattern-matching for disperate technologies if they\\nexplicitly\
    \ set out to do so. This hunch is based in large part on personal\\nexperience trying to help dozens of \\\"deep tech\\\
    \" startups off the ground. There\\nwere hints of replicable patterns in building out successful sales channels in\\neverything\
    \ from hydrogen filters to grocery-store robots. Truthfully, I didn't\\nspend enough time doing it to pull on that thread\
    \ and investigate where it went.\\nInstitutional credibility\\nCredibility matters in technology diffusion. People (and\
    \ thus organizations too)\\nare more willing to at least try something they're dubious of if it has a name they\\ntrust\
    \ behind it. Of course, it's critical that the technology work well! But\\ncredibility can be that initial foot in the\
    \ door. In the same way that individual\\nacademic labs can gain credibility from the university as a whole, individual\\\
    nprograms and people could lean on a DARPA-riff's established organizational\\nreputation.\\nOngoing relationships\\nTechnology\
    \ diffusion inevitably depends on many other organizations:\\nmanufacturers, regulators, resellers, advertisers ... the\
    \ list goes on. And people\\nlike to work with people they've worked with before. One big reason people tend\\nto bet\
    \ on industry insiders launching new ventures is because of the assumption\\nthat their existing relationships will reduce\
    \ friction and make them more likely to\\nsucceed. At the same time, new technological paradigms often come from\\noutsiders.\
    \ What might look like a nefarious plot to suppress change  233 can also\\nbe explained by outsiders not having the right\
    \ relationships.\\nIt might be possible to circumvent this problem by maintaining relationships\\nwith people in a wide\
    \ array of other organizations at the umbrella-organization\\nlevel. The alternative would be to force each program to\
    \ develop new\\nrelationships or to find someone who has them on top of technical work. Even\\nmore speculatively, these\
    \ relationships could be codified in actual contracts\\nwhere external organizations (manufacturers or distributors) are\
    \ part of a\\nconsortium that gets first crack at program outputs, similar to the MIT Media\\nLab's model.\\nThis is one\
    \ of those ideas that can sound good on paper but will be incredibly\\nhard in practice. ARPA-E has an entire tech-to-market\
    \ team and still has a mixed\\ntrack record.\\nR&D incentivization SPAC\\nI'm allowed to have one part of the speculation\
    \ section that's just pure wild\\nspeculation, right? OK, here goes: It might be possible to create a SPAC 119 that\\\
    nis designed to incentivize getting\\ntechnology past a goalpost.\\nNormally, SPACs either have a fairly\\nbroad mandate\
    \ (\\\"Find a high-potential\\ntech company\\\") or are created in order\\nto take a specific company public. What if\
    \ instead the SPACs mandate was to go\\nafter a specific set of technological milestones? Say, for example, the ability\
    \ to\\ncreate an arbitrary chemical reaction at a specific site faster than a given rate\\nwith precision to a specific\
    \ number of nanometers (which would be, broadly, the\\nspecs for a company on the way toward atomically precise manufacturing).\\\
    nIn effect, an R&D incentivization SPAC (RDISPAC just rolls off the tongue,\\nright?) could act like a non-government\
    \ advanced market commitment for a\\ntechnology. Advanced market commitments are the government saying, in effect,\\n\\\
    \"If you create something that meets these specifications, we guarantee we will\\nbuy N of them for $X apiece.\\\" 120\
    \ The\\nmost famous advanced market\\ncommitment in recent memory is the\\nUS government's approach to COVID-19 vaccines.\
    \ Of course, an RDISPAC\\nwould differ from an advanced market commitment because investment doesn't\\nautomatically translate\
    \ to customers the way an advanced market commitment\\ndoes.\\nThe milestones that a SPAC is looking for would need to\
    \ be very carefully\\nconsidered. The best technologies don't always win, so there needs to be a strong\\nargument that\
    \ technical capabilities will translate into a long-term profitable\\nbusiness. Drug companies get around this problem\
    \ because it's basically\\nguaranteed that if you create a drug that gets FDA approval for a certain set of\\nconditions,\
    \ insurance companies will pay for it. However, in any other case, new\\ntechnology has bespoke sales channels. Instead\
    \ of a fairly legible process,\\ncreating sales channels for something nobody has seen before requires almost\\nmagical\
    \ persuasion. One of the reasons why VCs (accurately) care so much about\\na startup's founding team is because much of\
    \ a company's success has nothing to\\ndo with the technology and everything to do with sales and market creation. 121\
    \ It\\nseems like an open question how to\\nboth argue that a technology-based\\nSPAC is a good investment and have its\
    \ acquisition conditions be based only on\\ntechnical milestones. Additionally, the cash injection from the SPAC needs\
    \ to be\\nable to get the technology to a place where you're seeing fairly continuous\\nbusiness improvement. If the SPAC\
    \ acquires a technology company and the share\\nprice falls, it's unlikely that you'll be able to raise any more money.\\\
    nIf we talk about it in terms of technology readiness levels (TRLs), 122 an\\nRDISPAC could target either 3 (proof of\\\
    nconcept), 6 (prototype in a relevant\\nenvironment), or 8 (production version\\nin a real environment). If the RDISPAC\
    \ were targeting TRL 3 or 6, the technology\\nwould actually skip being a VC-funded startup. If the RDSPAC targeted TRL\
    \ 8,\\nyou would still need to raise private funds and build a business, but the existence\\nof the SPAC, as a clear exit\
    \ option, would hopefully make it easier to raise funds.\\nRDISPACs could contribute to a healthier technology creation\
    \ ecosystem. The\\norganization that is doing the work to get technology projects off the ground and\\nhelp fund them\
    \ initially, like a DARPA-riff, could manage the SPAC as well.\\nWe've already seen a few technology-focused VC firms,\
    \ like Lux Capital, go down\\nIn a grossly oversimplified nutshell, SPACs\\n(special purpose acquisition companies) are\\\
    npublicly listed shell companies that merge\\nwith private companies, effectively taking\\nthem public without an IPO.\\\
    n119.\\nAnton Howes has a good Twitter thread\\nabout advanced market commitments here .\\n120.\\nSee \\\" Productive\
    \ Uncertainty .\\\"\\n121.\\nSee a more detailed description of technology\\nreadiness levels here .\\n122.\"\n  },\n\
    \  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\\
    n42/61\\n\\nthis route. The advantage of a DARPA-riff helping manage a SPAC would be that\\nmanagement fees could go directly\
    \ toward creating more technology. Running\\nboth the beginning and end of the pipeline may enable a \\\"closed loop\\\
    \"\\ntechnology development system, where the organization helping germinate the\\ntechnology can capture some of its\
    \ value without taking deadweight equity or\\nlicensing fees.\\nOf course, the closed-loop scheme could potentially incentivize\
    \ fraud! It's\\nimportant to think about fraud upfront because, in addition to being bad in and\\nof itself, it could\
    \ poison the whole mechanism, even for honest actors. Precise,\\nexternally verifiable acquisition conditions could both\
    \ prevent fraud and create\\nalignment between investors and organizations shooting for the target. In a way,\\nprecise\
    \ acquisition conditions can focus the conversation around how valuable it\\ncould be if technology with a certain capability\
    \ existed. It's entirely my bias, but\\nthese conversations would further increase the value of precise, understandable\\\
    nroadmaps.\\nOf course, there are many technologies whose values were unknown a priori\\n(personal computers, cars, etc.),\
    \ so RDISPACs are not a silver bullets.\\nThere is obviously a horde of unanswered questions. Some fun ones to think\\\
    nabout might include:\\nIs there a way to test public appetite for something like this?\\nPublicly owned R&D assets have\
    \ traditionally not done well \\u2014 people are fine\\nbuying and holding when something is low volatility, but R&D tends\
    \ to be high\\nvolatility. Is there a way around this?\\nWhat are the conditions on SPAC investments? There is still tons\
    \ of business\\nrisk even if you hit technological milestones, so this would be much higher risk\\nthan most things on\
    \ the market.\\nHow can you both argue that a technology-based SPAC is a good investment\\nand have its acquisition conditions\
    \ be based only on technical milestones?\\nSpeculatively, could the RDISPAC management also do the legwork to line up\\\
    nadvanced market commitments from governments or companies?\\nAgain, this is wild speculation on a hype-filled trend.\
    \ Like all the other\\nspeculations, it's hard to be sure that it will work, but it's the sort of thing that's\\nworth\
    \ thinking about.\\nThe men preferred to think they worked not in a laboratory but in what\\nKelly once called \\\"an\
    \ institute of creative technology.\\\" This description\\naimed to inform the world that the line between the art and\
    \ science of\\nwhat Bell scientists did wasn't always distinct. Moreover, while many of\\nKelly's colleagues might have\
    \ been eccentrics, few were dreamers in\\nthe less flattering sense of the word. They were paid for their\\nimaginative\
    \ abilities. But they were also paid for working within a\\nculture, and within an institution, where the very point of\
    \ new ideas\\nwas to make them into new things.\\n\\u2014 Jon Gertner, The Idea Factory\\nKnowing things about the maze\
    \ is worthless if you don't use that knowledge to\\nchart a path. But as soon as you discover that what you thought would\
    \ be a valid\\nturn is in fact a dead end, the entire path needs to be rejiggered! As a result, this\\nis weirdly both\
    \ the most important and the most transient part of the piece!\\nIn this part, I dig into the specifics of what I (and\
    \ perhaps, with your help, we )\\nare setting out to do to build Private ARPA (PARPA). If Part II was a description\\\
    nof the junctions that any maze adventurer could face, Part III is the path that I\\nexpect my thread to trace.\\nI will\
    \ first lay out the organizational structures that I suspect will best dip,\\ndoge, duck, and dive between the constraints\
    \ we explored in Part II. I'll then lay\\nout a series of nested hypotheses that effectively make up the organization's\\\
    nroadmap. The notion is that \\\"testing\\\" each hypothesis will progressively de-risk\\nthe giant spiky ball of assumptions\
    \ underlying this whole scheme. These\\nhypotheses will comprise three major phases in the organization's development.\\\
    nI'll outline these phases and the conditions for phase shifts.\\nSome of you have probably been asking, \\\"Yes, but\
    \ what programs will you\\nactually work on ??\\\" this whole time. Your appetite will finally be sated! In this\\npart,\
    \ I'll sketch some potential programs that the organization could undertake.\\nMost people who enter a labyrinth \\u2014\
    \ even those with a plan \\u2014 don't survive.\\nWith that in mind, I'll close with a glance into the abyss and outline\
    \ as explicitly\\nas I can why this whole adventure could fail and what success could look like. My\\nhope is that such\
    \ an analysis will maximize both the chances of success and what\\nwe can learn in the unfortunate case of failure.\\\
    nPrecise visions are more likely to happen\\nA striking through-line that connects ambitious and successful technology\\\
    nprograms from SpaceX to PARC (and ARPA computing programs before that) is\\nthat they were organized either explicitly\
    \ or implicitly around a precise vision of\\nthe future.  238 These precise visions both act like a filter for likely-to-succeed\\\
    nprograms and contribute directly to that success.\\nThe causal relationship between precise visions and success is fairly\
    \ intuitive.\\nA precise vision acts as a coordinating mechanism that enables a large group of\\npeople to agree on what\
    \ things they are working toward and, perhaps more\\nimportantly, what they are not working toward. Just as mythic rowers\
    \ are useless\\nwithout the coordination of a drumbeat, any compelling vision will generate\\naction, but if it's imprecise,\
    \ the energy will quickly dissipate. It's the difference\\nbetween rocket fuel creating a fireball and delivering a payload\
    \ to orbit. If people\\ncan see the specific actions that they can do now in order to move toward the\\nvision, it's comparatively\
    \ easy for them to start doing them. However, most\\nvisions are abstract and fuzzy, which leads to reactions along the\
    \ lines of,\\n\\\"Somebody should do something!\\\" \\\"Pass a law!\\\" or \\\"It sure would be nice if ...\\\"\\nLegibility\
    \ enables action!\\nI suspect that precise visions are also a filter for programs that are more likely\\nto be successful.\
    \ You could think of the vision like a test against reality. Do we\\nunderstand the thing well enough to execute on it?\
    \ If no, it's less likely to be\\nfeasible and may need more work before a program is likely to succeed. Of\\ncourse,\
    \ if you can precisely say what that pre-work is, you've bootstrapped your\\nway to a (different) precise program. Precision\
    \ produces payoffs!\\nThis litmus test doesn't limit you to just incremental changes either \\u2014\\nVannevar Bush's\
    \ essay \\\"As We May Think\\\" 123 painted a precise vision of a\\nPart III: The Institute for Creative Technology -\
    \ How I\\nPropose to Navigate the Maze\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the\
    \ impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n43/61\\n\\nthinking tool that was a massive\\\
    nparadigm shift away from anything that\\nhad existed before and yet precisely\\ndescribed many aspects of computers we'd\
    \ recognize today.\\nA validated hypothesis is like getting to a junction you expected to be there,\\nturning in the direction\
    \ you expected to turn, and not dying.\\nBundled together, PARPA's path through the maze looks like:\"\n  },\n  {\n  \
    \  \"name\": \"Create and stress-test unintuitive research programs in a systematic (and\",\n    \"text\": \"therefore\
    \ repeatable) way.\"\n  },\n  {\n    \"name\": \"Use that credibility to run a handful of research programs and produce\"\
    ,\n    \"text\": \"\"\n  },\n  {\n    \"name\": \"results that wouldn't happen otherwise\",\n    \"text\": \"\"\n  },\n\
    \  {\n    \"name\": \"Use that credibility to run more research programs and help them\",\n    \"text\": \"\\\"graduate\\\
    \" to effective next steps.\"\n  },\n  {\n    \"name\": \"Make the entire cycle eventually-autocatylizing by plowing windfalls\
    \ into an\",\n    \"text\": \"endowment.\\nWe can transform these steps into real action by making explicit the\\nhypotheses\
    \ each step entails. Each of these hypotheses is made of several\\nconstituent hypotheses. (And those are made of even\
    \ smaller hypotheses until\\nyou get to things like, \\\"If I send an email to Professor So-and-So, we will have a\\nmeeting\
    \ and they will be able to point me to two other people to talk to ...\\\" but I\\nwill leave that level of detail to\
    \ your imagination.) I'll present an overview below\\n(with numbers and letters so we can refer to specific hypotheses)\
    \ and then dig\\ninto each one.\\n1. It's possible to design programs in a systematic (and therefore repeatable) way .\\\
    na. It's possible to find people who want to do pieces of work that would not\\nhappen otherwise.\\nb. There exist several\
    \ areas that could possibly yield results (defined loosely) in\\n3\\u20135 years (given steady work).\\nc. For each potential\
    \ program, it's possible to come up with a set of small\\nexperiments that could further confirm or deny its feasibility\
    \ within 12\\u201324\\nmonths and ~$1M scale.\\nd. It's possible to get people to undertake seedling experiments.\\ne.\
    \ Accomplishing 1a\\u21921d will involve a combination of one-on-one\\nconversations driven by reading papers, finding\
    \ gaps, reaching out to people,\\nand holding small, intensive workshops.\\nf. It's possible to find people who are excited\
    \ to be PMs and actually do 1a\\u21921e.\\ng. It's possible to systematize this process.\"\n  },\n  {\n    \"name\": \"\
    It's possible to execute on these programs in a way that relaxes\",\n    \"text\": \"academic/startup constraints.\\na.\
    \ It will be possible to coordinate several research projects toward a coherent\\ngoal.\\nb. The early pieces of work\
    \ will be done by some combination of academic labs,\\ncontract R&D orgs, independent researchers, and possibly people\
    \ within\\ncorporate R&D who are able to do work for grants.\\nc. People will be willing to shift their organizational\
    \ affiliations to an\\nexploratory program organization as the program goes on.\\n3. It's possible to \\\"graduate\\\"\
    \ these programs in a way that gives them a life of\\ntheir own.\\na. During the programs themselves, it will be possible\
    \ to do some of the pre-\\nwork to figure out the best way to graduate technology in order to maximize\\nits beneficial\
    \ impact on the world.\\nb. At least some of the people who have been working on the program will\\nwant to carry it forward\
    \ in some form.\\nc. Some of the technology will make sense as a company, some of it will make\\nsense as a nonprofit,\
    \ some of it will make sense as a licensed technology, and\\nsome of it will make sense as open-source.\"\n  },\n  {\n\
    \    \"name\": \"It's possible for this entire cycle to eventually become autocatalytic\",\n    \"text\": \"a. An early\
    \ (non-monetary) component of autocatalysis is a community that\\ngenerates good inbound programs.\\nb. 'Pseudo-autocatalysis\\\
    \" is a state where the organization is getting enough\\nconsistent revenue through some combination of donations, spin-offs,\
    \ and\\nother sources, like licensing and consulting, that it can continue to run\\nmultiple programs assuming those revenue\
    \ sources continue.\\nc. Full autocatalysis can only happen by building up an endowment.\\nI'll walk through each of these\
    \ in as much detail as possible. Fair warning:\\nWe'll quickly reach the limits of making research legible upfront. So\
    \ many things\\nneed to be figured out on the fly, and as a result, the details of these hypotheses\\nare going to read\
    \ much more like working notes than a polished piece. Later\\nhypotheses get more fuzzy because the farther you go in\
    \ time, the more paths can\\nfork. Many of the details about hypotheses sound like a litany of ways that it\\ncould go\
    \ wrong \\u2014 alas, this is the nature of these experimental things.\\nThe first big question that any pragmatic person\
    \ asks about PARPA is, \\\"So, what\\nare you working on?\\\"  240 Building a process to consistently and precisely\\\
    ngenerate answers to that question is PARPA's first major task.\\n\\\"Figuring out what to work on\\\" (or worse, figuring\
    \ out how to figure out what\\nto work on) as a first major step may sound a bit silly (and indeed, it feels a bit\\nsilly\
    \ to write it). Startups are generally created to go after a specific problem or\\nopportunity, so it's a big red flag\
    \ if they don't know what they're working on from\\nday one.  241 Conversely, actively \\\"figuring out what to work on\\\
    \" is also a waste of\\ntime for most research funding organizations; once they've settled on a broad\\narea, their modus\
    \ operandi is to solicit and judge applications.\\nIn both of these situations, though, the \\\"context\\\" of work is\
    \ roughly fixed and\\nwell established. People have patterns to match. A key reason for PARPA's\\nexistence is to enable\
    \ work that's not being done because it doesn't fall into those\\nwell-established contexts. Good PARPA programs will\
    \ lurk in the shadows of\\ncounterfactuals, and counterfactuals are hard. Our job, then, is not just figuring\\nout what\
    \ to work on but three coupled questions: What things would be enabled\\nby a new context, what is that context, and can\
    \ PARPA create it? Program design\\nwill require answering all three in a way that resembles the final step of solving\
    \ a\\nblacksmith's puzzle \\u2014 each answer depends on all the others.\\nTo give you a flavor of some of the questions\
    \ we'll need to tackle in the process\\nof figuring out what to work on: Is it a matter of coordinating multiple pieces\
    \ of a\\nsystem? Creating collaborations between disciplines? Prompting aggressive\\nideas that researchers aren't even\
    \ thinking because they wouldn't normally be\\nfunded? Or does the thing not exist because it's actually just violating\
    \ some laws\\nof physics? What experiments could be done to test the answers to these\\nquestions?\\nAnother reason figuring\
    \ out what to work on is not straightforward is that\\nPARPA is especially susceptible to the chicken-and-egg situation\
    \ facing any new\\ninstitution: We can't be sure that we can work on something until we know who\\nwill be working on\
    \ it, and people are hesitant to agree to work on something\\nuntil the organization declares that it's working on it.\
    \ We can't honestly declare\\nthat we're working on something until we at least have strong suspicions about\\nwho will\
    \ be working on it. Unlike most startups that base their plans on hiring\\nfairly fungible roles \\u2014 \\\"a software\
    \ engineer\\\" or \\\"a data scientist\\\"  242 \\u2014 PARPA\\nprograms will hinge on working with people who have knowledge\
    \ and skills that\\nonly exist in a few minds around the world. Many ambitious proposals start with\\n\\\"Someone should\
    \ do this crazy ambitious thing\\\" but never actually specify who is\\nboth qualified and willing to do it. Finding those\
    \ people and building trust\\nrelationships with them will be a project in itself . Who is open to participating\\nwill\
    \ shape the programs PARPA should undertake.\\nI've already begun this process for a few possible programs, and frankly,\
    \ it is a\\nfull-time job in and of itself.\\nThis chicken-and-egg situation will hopefully change once we have enough\\\
    ninstitutional momentum that we can count on inbounds, but even DARPA PMs\\ntend to get precommitments from researchers\
    \ to respond to calls for proposals\\nbefore they launch programs.\\nSee \\\" As We May Think \\\" (uses up one of\\nthree\
    \ free articles at The Atlantic).\\n123.\\nPARPA's path through the maze is a series of nested\\nhypotheses\\nIt's possible\
    \ to systematically design programs\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible\
    \ to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n44/61\\n\\nFinally, the entire process needs to be repeatable.\
    \ Creating the initial programs\\nwill undoubtedly be ad-hoc and a bit of a mess, but in order for PARPA to be able\\\
    nto consistently create programs in the future, it will be critical to spend time and\\neffort paying attention to what\
    \ works, what doesn't, and what could be\\nsystematized.\\nIt's possible to find people who want to do pieces of work\
    \ that\\nwould not happen otherwise\\nMost people don't advertise the fact that they want to go after slightly crazy\\\
    nresearch that requires resources or collaborators that aren't already at their\\ndisposal. This is doubly true if they\
    \ actually have the skill to pull it off.  243 There\\nare exceptions, of course, but most career-focused researchers\
    \ file overly\\nambitious ideas away \\\"for later.\\\" Often these ideas are buried so deep that they\\nneed prompting\
    \ and trust to even talk about them out loud.  244\\nA big part of the PARPA's success depends on our ability to find\
    \ these people.\\nIt will be a harder task than it might seem, especially without a track record.\\nWhile doing a few\
    \ pieces of preliminary program design, I've found that the\\npeople who are excited about ambitious technical ideas often\
    \ aren't in a position\\nto execute on those ideas; either because they don't have the technical expertise\\n245 or they're\
    \ in a long-term position that precludes them from doing the work.\\nConversely, the people who on paper are at the cutting\
    \ edge of a field tend to\\nhave gotten there by being laser-focused on a specific academic research agenda\\nthat can\
    \ proceed methodically using the resources available to a single lab. This\\nself-selected group is often distinctly unexcited\
    \ by larger jumps that would\\ninvolve combining their research with other disciplines.\\nNot all hope is lost! I have\
    \ come across several people who do seem to have a\\nmagical blend of technical skills and excitement about ambitious\
    \ possibilities\\nthat might be one step beyond what the consensus thinks is possible. These\\npeople tend to be postdocs,\
    \ grad students, and technically trained people who\\nhave left academia. So the \\\"right\\\" people do exist \\u2014\
    \ the challenge is to figure out\\nhow to find them consistently and bridge the gap between \\\"intrigued\\\" and \\\"\
    on\\nboard.'\\nThe people who would want to do early program work tend to\\nbe postdocs, grad students, and technically\
    \ trained people who\\nhave left academia\\nAfter talking to dozens of researchers in the process of poking program\\\
    npossibilities, I've noticed a pattern. Tenured professors are happy to talk about\\nthe next step suggested by a specific\
    \ paper and fuzzy long-term ideas, but\\npostdocs, grad students, and technically trained people who have left academia\\\
    n('tenure-trackless folks') are the ones who have the precise ambitious ideas that\\nare critical for a solutions R&D\
    \ program. It's frustrating to ask the point of\\ncontact for an exciting paper (who is usually the most senior coauthor\
    \ who nine\\ntimes out of 10 is the professor) about what possibilities the paper opens up only\\nto hear a list of more-of-the-same\
    \ kinds of experiments that are well within their\\ngrasp. If you can dig up the contact info for the tenure-trackless\
    \ folks on the\\npaper, on the other hand, you're often rewarded with, \\\"Well, if we could simulate\\nthis better, we'd\
    \ be able to ...\\\" or, \\\"If we could work with some physicists, we\\ncould ...\\\"\\nThis response pattern makes sense:\
    \ Professors tend to become successful by\\nfinding a speciality and becoming its master through deliberate, incremental\\\
    nwork. This specialization makes them great at acquiring grants (\\\"This person\\nwants to do this feasible thing that\
    \ nobody else in the world can do!\\\") but pushes\\nthem into a mode where they have clear boundaries between the feasible\
    \ within\\ntheir realm of control and the infeasible outside of it. People with very little\\nresearch experience tend\
    \ to be the opposite: full of grand ideas, but with no idea\\nhow to implement them. Tenure-trackless folks are able to\
    \ walk the middle way\\nbetween the two extremes.\\nAnother reason to seek out tenure-trackless folks is that they are\
    \ (by definition)\\nless tied to the traditional academic career path. So, if a program ends up being\\nsuccessful, there\
    \ will be a higher chance that they'll be open to \\\"graduating\\\" with\\nit to whatever form makes the most sense \\\
    u2014 whether it is a startup, nonprofit, or\\nsome kind of corporate absorption. Intellectual continuity is critical\
    \ for a\\ngraduated program's eventual success in the real world.\\nTesting this hypothesis will entail deliberately skewing\
    \ conversations and\\nworkshops toward tenure-trackless folks. This skew is tricky for two reasons.\\nFirst, the person\
    \ that people associate with an area of interest is usually a\\nprofessor. Professor obsession makes it hard to find the\
    \ high-quality tenure-\\ntrackless folks in the first place, because one of the best tactics to find your way\\nto interesting\
    \ people is through recommendations. Second, tenure-trackless folks\\noften don't have the same access to labs and equipment\
    \ as professors, so working\\nwith them on externalized research will present extra challenges.\\nThe focus on tenure-trackless\
    \ folks should not be exclusive by any stretch of\\nthe imagination. There are tenured professors who want to use their\
    \ tenure's\\nfreedom to its full extent and sometimes still do benchwork. There are high-\\nschool dropouts who learned\
    \ to build bioreactors in their basements. However, I\\nsuspect those people will be such rarefied outliers that the bulk\
    \ of scarce\\nresources will be better spent cultivating tenure-trackless folks.\\nThe pieces of work in a PARPA program\
    \ will tend to be things\\nthat people think can't get through a grant committee or\\nrequire some sort of collaboration\
    \ that isn't available to them\\nPARPA needs to nail down early the type of work that it's enabling. There are two\\nopposing\
    \ traps we could potentially fall into: On one side is supporting work that\\nwould happen regardless, and on the other\
    \ side is supporting work that is\\nactually impossible. The delineation is clear as mud; there are even things that\\\
    nwould happen regardless and are actually impossible. This nebulosity means that\\ninstead of rigid classification systems,\
    \ we'll need to focus on developing\\nheuristics.\\nI have a hunch that there are (at least) two heuristics for the type\
    \ of work that\\nfalls into the sweet spot of \\\"possible but not incentivized': work that people\\nsuspect wouldn't\
    \ be able to get through a grant committee, and work that would\\nrequire some sort of weird collaboration. Both of these\
    \ cases tend to fall into\\nmental blind spots: Instead of a nagging pain, they're the sort of thing where you\\nthink,\
    \ \\\"That would be nice,\\\" but then forget about it. Part of PARPA's role is to\\ntease out those discarded ideas.\\\
    nWork might not be able to get through a grant committee for several reasons:\\nIt doesn't fit into a neat bucket; it\
    \ isn't directly related to research that the\\nperformer has done before;  246 or it just doesn't have strong evidence\
    \ that it will\\nsucceed.\\nThe sort of work that might require a nonexistent collaboration is hard to\\ngeneralize. An\
    \ example might be a molecular-level process that a chemistry\\ngroup wants to implement, but the time it takes to synthesize\
    \ and the range of\\npossible outcomes makes trial-and-error experiments infeasible. A machine-\\nlearning-driven simulation\
    \ could narrow down the search space enough to make\\ntrial-and-error in the constrained search space feasible, but the\
    \ chemistry group\\nhas nobody with the expertise to build the simulation. At the same time, the\\nsimulation folks have\
    \ nobody with the nuanced experience with chemistry to\\nhelp make the simulations they're building actually useful. PARPA\
    \ could fund\\nboth groups to work together and help coordinate between them.\\nFrontier-pushing technical people will\
    \ be willing to work with a\\nnew organization\\nEven if it's possible to find people who want to do pieces of work that\
    \ would not\\nhappen otherwise , there is a big gap between \\\"interested\\\" and \\\"on board.\\\"\\nPeople will happily\
    \ have conversations and spitball ideas; actually sitting down\\nand doing work is an entirely different beast. This gap\
    \ means that another\\nhypothesis PARPA needs to validate early on is that we will be able to get\\nresearchers to work\
    \ with us.\\nA big part of working with research is the ability to fund the research at all,\\nwhich is what makes this\
    \ hypothesis one of those experiments that can only be\\ndone in the context of an organization. However, money is necessary\
    \ but\\nnowhere near sufficient to get people to work with you. People need to be excited\\nabout the work; it will inevitably\
    \ require both creativity and persistence in\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting\
    \ the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n45/61\\n\\nspades. We can't go all in\
    \ on \\\"Be excited! Pursue your passion!\\\" For any single\\nproject in the program because eventually the different\
    \ projects need to\\nconverge. Finding this balance consistently will be hard!\\nSome tactics that we can test to \\\"\
    onboard\\\" collaborators include: small\\nworkshops of high-potential possible performers, spending a lot of work building\\\
    ntrust with individual researchers, 124\\nand working to build a long-term\\ncommunity that will continue to be\\nvaluable\
    \ to researchers after any\\nspecific project.\\nThere exist several areas that could possibly yield results\\n(defined\
    \ loosely) in 3\\u20135 years (given steady work)\\nPARPA's success depends on creating several programs in the \\\"sweet\
    \ spot\\\" where\\nthey'll yield tangible results in 3\\u20135 years. \\\"Tangible\\\" here doesn't necessarily\\nmean\
    \ a product, per se, but an artifact that inspires confidence in people outside\\nof the organization. This constraint\
    \ is purely pragmatic \\u2014 realistically, even\\npeople who are excited about PARPA's potential (hopefully you, dear\
    \ reader) will\\nlose enthusiasm if the organization doesn't make some sort of visible progress\\nover several years.\
    \ As the organization builds more trust over time, it will be able\\nto go after longer-term programs and work on promising\
    \ projects for \\\"as long as\\nit takes,\\\" but the path dependence is important.\\nThis plan rests on the hypothesis\
    \ that the sweet spot even exists. It could be\\nthe case that solutions R&D programs that could show results in 3\\u20135\
    \ years are\\nuninspiring and/or are already being tacked for any number of reasons \\u2014 a frothy\\nVC market, unusually\
    \ prescient grant allocators, actual DARPA, etc. This is\\nwhere program design plays an important role: It's important\
    \ not only to have\\nreasons to believe that a program will be successful but to have reasons to believe\\nearly on that\
    \ there's a chance that success will happen on a useful time scale. The\\ntwo specific programs that we have been digging\
    \ at so far are general-purpose\\ntelerobotics and first steps on what would be a series of programs toward\\natomically\
    \ precise manufacturing. We're open to suggestions!\\nFor each potential PARPA program, it's possible to come up\\nwith\
    \ a set of small experiments that could further confirm or\\ndeny its feasibility within 12\\u201324 months and ~$1M scale\\\
    nDARPA PMs use seedling projects to \\\"acid test\\\" the riskiest pieces of a program\\nidea. 125 I'm confident that\
    \ PARPA will\\nbe able to do something similar for our\\nprograms, but it's still a hypothesis we\\nneed to explicitly\
    \ test. It is extremely\\nhard to call out in advance which pieces of evidence would compellingly suggest\\nthat a crazy\
    \ idea is at least possible.\\nPart of de-risking this hypothesis is frankly just a learning process about what\\nmakes\
    \ a good seedling project. After studying examples of past DARPA seedling\\nprograms, some potential heuristics are:\\\
    nGood seedling projects specifically go after the reasons that everybody says\\nthat something won't work. Their goal\
    \ isn't to make it work, but to at least\\nshow that the reason why it won't work isn't the game-ender that it at first\\\
    nappears to be. For this approach to work, it's critical to precisely pin down\\nboth what won't work and why experts\
    \ assert that's the case.\\nThe tagline will either sound incredibly silly (\\\"How memes become reality\\\") or\\nincomprehensible\
    \ (\\\"Augmented Reality-based Collaborative and Corroborative\\nCollection\\\"). Speculatively, this heuristic might\
    \ work because seedlings need to\\neither be poking at a broad hunch (that it might be possible for memes to\\nbecome\
    \ reality) or a specific interesting technical thing that you suspect could\\nbecome significant.\\nI suspect the line\
    \ between success and failure in seedling projects will often be\\nfuzzy. This nebulosity is why developing trust with\
    \ performers will be critical.\\nHuman judgment will be unavoidable in deciding whether the seedling\\nexperiments provide\
    \ enough evidence to launch a full program. Another possible\\nframe for the seedling programs is that they serve as a\
    \ trust-building \\\"trial\\\"\\nperiod. Think of internships, or how some companies set it up so that employees\\nand\
    \ the company can both choose to part ways after a few months.\\nBelow are some top-of-mind examples 126 of speculative\
    \ seedling projects to\\nprime your intuition pump. They might\\nnot be feasible for many reasons!\\nShowing that it might\
    \ be possible to get muons to have a higher replication\\nrate in a fusion reaction.\\nDoing a study on what the design\
    \ for a broadly applicable robot specifically\\ndesigned for telerobotics work might look like.\\nExperimenting with the\
    \ binding constraints on scaling up carbon-free cement.\\nTesting AlphaFold in a closed loop with specified properties\
    \ for the blocks\\nthat a 3D-protein printer would use.\\nShowing that you can make a nanoscale breadboard by applying\
    \ implosion\\nfabrication to a DNA microarray.\\nShowing that temperature-hardened electronics and communications\\ndeveloped\
    \ for space missions could withstand the conditions involved in\\ndrilling 20 km into the Earth for geothermal energy.\\\
    nDesigning a MEMS device that could polish or sharpen its own features after\\nfabrication.\\nPrototyping a small sensor\
    \ that could extract DNA from muddy water while\\nharvesting the mud as a biofuel and allowing for self-sterilization\
    \ and cleaning.\\nIt's possible to get people to undertake seedling experiments\\nAn obvious but important challenge is\
    \ to bridge the gap between potential\\nperformers being \\\"interested\\\" and actually taking action. How do we shift\
    \ the\\npeople we found while testing the hypothesis that \\\"It's possible to find people\\nwho want to do things that\
    \ would not happen otherwise\\\" from interest to action?\\nIt's one thing to find people who have both the ambition and\
    \ the skills to\\nundertake things and another to actually get them to spend the time undertaking\\nthem!\\nThis is where\
    \ having money and an organization is actually important. At some\\npoint we need to be able to say, \\\"We'll fund the\
    \ work to explore this thing.\\\" Does\\nthere need to be a contract? What sort of agreement does it look like? Can we\\\
    nwork directly with the tenure-trackless folks or will we be forced to go through a\\nprofessor or university bureaucracy?\
    \ Could we \\\"hire\\\" someone for an\\n\\\"internship\\\" to do seedling projects? There are fractal questions that\
    \ will only be\\nresolved by just doing the thing.\\nAccomplishing hypotheses 1a \\u2192 1d will require a combination\\\
    nof gumshoeing and workshops\\nFinding people and promising areas, figuring out the experiments they could do\\nto poke\
    \ at binding constraints, and then pulling everything together so those\\nexperiments happen will require a lot of fuzzy\
    \ \\\"people-wrangling.\\\" If you write\\ndown what the work I would call \\\"gumshoeing\\\" entails \\u2014 lots of\
    \ emails, talking\\nto people, following up, connecting, circling back, negotiating \\u2014 it certainly\\ndeserves the\
    \ uncomfortable side-eye it gets from people (like me) who like\\nconcrete, actionable plans. Doing those things can easily\
    \ lead nowhere if done\\npoorly. Hopefully, by explicitly calling out the possibility, we can avoid that trap,\\nbut it\
    \ remains a deeply unsatisfying answer.\\nWorkshops are a systemized way of people-wrangling\\nDARPA program managers\
    \ often hold small workshops of experts as part of their\\nprogram design process. 127 Running a\\nseries of these workshops\
    \ might be a\\nsmall, actionable place to start PARPA.\\nI suspect that a big part of starting\\nand testing PARPA's viability\
    \ is to design sufficiently precise programs : External\\nresearchers need to believe the projects in the program are\
    \ a convincing use of\\ntheir time, external funders need to be willing to provide the money to start\\nexecuting on those\
    \ programs, and we need to believe that they actually have a\\nchance of unlocking something amazing if they're successful.\
    \  251\\nOne way to start designing programs is to run a series of workshops where a\\nhandful people at the edge of a\
    \ discipline with different backgrounds get\\ntogether to riff on one another, explore, and argue their way toward a clear\\\
    npicture of the edge of possibility.\\nWhat would a workshop look like concretely?\\nImagine 5\\u20137 people who understand\
    \ the edge of a discipline but are fringey in\\none way or another getting together in person in a big whiteboard-filled\
    \ house in\\nthe woods somewhere with relatively easy access to an airport. The participants\\nwould spend a week digging\
    \ into the precise problems in areas like, \\\"Why don't\\nWarren Weaver, the Rockefeller Foundation\\nprogram officer\
    \ who funded early genetics\\nwork, expands on this point in his notes for\\nother program officers .\\n124.\\nSee the\
    \ section \\\" DARPA PMs use seedling\\nprojects to \\\"acid test\\\" the riskiest pieces of a\\nprogram idea \\\" from\
    \ \\\"Why Does DARPA\\nWork?\\\"\\n125.\\nThe last four are directly from Adam\\nMarblestone.\\n126.\\nSee the section\
    \ \\\" A large part of a DARPA\\nprogram manager's job is focused network\\nbuilding \\\" from \\\"Why Does DARPA Work?\\\
    \"\\n127.\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\\
    nhttps://blog.benjaminreinhardt.com/parpa\\n46/61\\n\\nwe have black-box factories?\\\" \\\"How could we grow infrastructure\
    \ like plants?\\\"\\n\\\"How far could we push our ability to do positionally-controlled chemistry?\\\" with\\nthe goal\
    \ of establishing what's possible in a 2\\u20135 year time frame that's not being\\nworked on, precisely why not, and\
    \ what work would need to happen in order to\\nget there.\\nAdmittedly, it's a big ask for people to take a week out of\
    \ their lives.\\nUnfortunately, less than a week is probably insufficient. It takes people a few\\ndays to get comfortable\
    \ with one another to the point where they're willing to dig\\ninto out-there ideas. It might be possible to boost the\
    \ comfort level beforehand\\nwith digital tools, but I'm skeptical.\\nWorkshops would ideally produce several concrete\
    \ outputs:\\nA list of preliminary seedling projects that could act as go/no-go experiments\\nfor a larger program, along\
    \ with who should be doing them.\\nAnswers to all of the questions in the Heilmeier Catechism, or precise reasons\\nwhy\
    \ the answer is unknown or nebulous (and the project you would need to do\\nto firm it up).\\nA \\\"roadmap\\\" of what\
    \ would happen in a full program if the seedling projects\\npan out.\\nA list of key people in an area to loop in on the\
    \ project.\\nOptimistically, after running a few workshops, the participants could form the\\ncore of a larger community.\
    \ This group would ideally serve two purposes: It\\nwould help people who want to push the edge of their fields find overlapping\
    \ and\\ncomplementary people 128 and provide\\na pool of people in PARPA's orbit who\\ncould help generate program ideas,\
    \ act\\nas contractors, and perhaps become\\nPMs or performers. As a proof point, Ink & Switch seems to have pursued this\\\
    nstrategy successfully!\\nPros and cons of the hub-and-spoke model of program design\\nThe alternative to workshops would\
    \ be for the program manager to talk to a\\nslew of experts directly and do the synthesis themselves. This is the hub-and-\\\
    nspoke model of program design. It has the PM as the hub in the middle, doing\\nthe majority of the talking with the experts\
    \ and perhaps connecting them as\\nneeded. This approach has pros and cons. The pros are that a PM will be\\nmaximally\
    \ bought into a program entirely of their own creation and the idea will\\nbe maximally coherent. Committees tend to lead\
    \ to median results, and it's easy\\nfor workshops to devolve into committee thinking.\\nOn the other hand, the hub-and-spoke\
    \ model requires the PM to figure out all\\nthe right questions to ask or play the go-between for different experts. The\
    \ hub-\\nand-spoke method might be ideal when a PM comes in with a strong hypothesis\\nabout the program and expertise\
    \ in the area. I might be able to do this for a\\nsimulation- or robotics-based program, but would be unable to do it\
    \ for\\nsomething in biology or materials.\\nIt seems important for PARPA's initial programs to be relatively uncorrelated.\\\
    nPrograms designed via the hub-and-spoke method by the same PM will be more\\nstrongly correlated with one another than\
    \ via the workshop method. Early on, we\\nwon't have very many PMs, which could exacerbate the correlation. These facts\\\
    nsuggest that while it's worthwhile to pursue both strategies, the potential pros of\\nthe workshop method and the potential\
    \ downsides of the hub-and-spoke method\\nmean that PARPA should lean more heavily on workshops early in its life.\\nIt's\
    \ possible to find people who are both willing and capable to\\nbe program managers\\nLike any DARPA-riff , PARPA's success\
    \ or failure will hinge on our ability to\\nwork with amazing program managers. It's not a given that we'll be able to\
    \ find\\nthe right people and persuade them to work with us. Pickiness will abound on\\nboth sides: People who would be\
    \ good PMs have many options in life; at the\\nsame time, PARPA needs to be discerning about who becomes PMs because of\\\
    nthe trust and responsibility that they must shoulder.\\nGiven these challenges, how do we propose to find PMs and why\
    \ will they\\njoin?\\nA chunk of this hypothesis is based on confidence that the frustratingly vague\\n\\\"people-wrangling\\\
    \" that also goes into program design will yield fruit. \\\"I suspect\\nthat if I try really hard I will succeed.\\\"\
    \ This hypothesis is not entirely based on\\nhubris, though \\u2014 below are some more precise hunches about where to\
    \ find PMs\\nand what will convince them to forgo other options:\\nThe same tenure-trackless folks who might make good\
    \ performers may also\\nmake good PMs. Performers often become PMs at actual DARPA.\\nPeople who are thinking about starting\
    \ companies (or started and stopped) as\\nthe best of bad options for enabling a technology would be good PMs. Some\\\
    nsubset of people who start startups are doing it not because they want to build\\na business but because it seems like\
    \ the best way to get a technology into the\\nworld. In some of those cases, a PARPA program would be far more effective\\\
    nthan a startup.\\nWhile we won't be able to pay as much as a big tech company, I suspect that\\nthe people who would\
    \ make good PMs aren't out to maximize their income but\\ninstead have some income threshold above which the non-monetary\
    \ benefits\\nof the work (which is uniquely excellent!) dominate their mental calculus.\\nWithout being tied to any government\
    \ pay scales, we can negotiate this\\nthreshold with individuals.\\nIt's possible to systematize the whole program-creating\
    \ process\\nValidating this hypothesis looks like getting to a place where after we've created\\nsome hopefully-not-too-large\
    \ number of programs, we (internally, at least) feel\\nconfidence that it wasn't just a fluke. Ideally, we would also\
    \ be able to instill that\\nconfidence into people outside the organization as well. The ability to repeatedly\\ncreate\
    \ good programs is a strong reason to believe that it might be successful in\\nthe long run.\\nA good chunk of systemizing\
    \ program creation will entail nothing but\\nexplicitly paying attention to what works and what doesn't while going after\
    \ the\\nprevious hypotheses. However, I also suspect that more abstract work on program\\ndesign as a discipline will\
    \ also be important. Perhaps you could look at them as\\nthe empirical and theoretical sides of the same coin.\\nIt's\
    \ possible to execute on programs in a way that relaxes\\nacademic/startup constraints\\nProgram designs are useless if\
    \ they don't translate into useful outcomes. People\\nwon't just see a roadmap and leap into action \\u2014 there will\
    \ almost by definition\\nbe significant friction, since we're explicitly going after programs that we suspect\\nwouldn't\
    \ happen otherwise in the current system. As a result, getting programs\\ndone will be a challenge!\\nIt's easy to imagine\
    \ scenarios where we run workshops, create precise ideas\\nabout the riskiest questions in them, know the exact right\
    \ people to work on\\ndifferent parts of the program, and even do some seedling experiments to show\\nthat what we're\
    \ proposing is not impossible, and yet fall flat on our faces when it\\ncomes to a full program. Coordinating multiple\
    \ long-term research projects and\\nsynthesizing them into a working technology is an entirely different beast.\\nA clear\
    \ failure mode is that we fail to achieve escape velocity from existing\\nincentive structures. Maybe all the people who\
    \ have the experience to do the\\nwork still want to optimize for publishing papers. Maybe the program requires\\ncoordination\
    \ between a number of disparate groups, and all of those groups want\\nto optimize their particular piece instead of accepting\
    \ constraints that make the\\nentire program eventually successful. Maybe there are legal problems with the\\nresearcher's\
    \ organizations. Maybe the people working on the program graduate\\nor get a job offer halfway through. The list goes\
    \ on.\\nThe overarching hypothesis is that we'll be able to avoid these known pitfalls,\\ndiscover and avoid the unknown\
    \ unknowns and successfully execute on full\\nprograms. De-risking program execution entails several sub-hypotheses:\\\
    nIt will be possible to coordinate several research projects\\ntoward a coherent goal\\nCoordination is hard. Research\
    \ is hard. Coordinating research is going to be\\nextra hard. Dealing with dependencies between projects will be a challenge\
    \ both\\non the technical front and the human front. Technical coordination will require\\nfiguring out how to keep each\
    \ project going despite hiccups in other projects.\\nHuman coordination will require making sure people communicate and\
    \ get\\nalong. These are normal management problems, but they will be turned up to 11.\\nThe distributed nature of early\
    \ programs will compound with the fact that doing\\nanything new (especially with atoms) makes it harder to have shared\
    \ context. At\\nthe same time, shared context will be critical!\\nTo illustrate what the coordination problems might look\
    \ like, let's look at an\\nimaginary program to use molecular machines in metal-organic frameworks to\\ndo one-shot molecular\
    \ synthesis. There might be one project to create better\\nsimulations for a molecular process, one project to design\
    \ a series of molecular\\nIn Reinventing Discovery , Michael Nielsen\\nelegantly describes this process as \\\"designed\\\
    nserendipity.\\\"\\n128.\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible to\
    \ the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n47/61\\n\\nmachines that could potentially turn a multi-step\
    \ synthesis process into a single-\\nshot process, and one project to synthesize the system. Friction can pop up all\\\
    nover the place: Benchmarks for the simulation need to be processes that are\\nactually relevant for the second group;\
    \ the design group and the implementation\\ngroup need to avoid both designing something that is actually impossible to\\\
    ncreate and also limiting themselves to conservative designs that would be\\nstraightforward to create.\\nThere are many\
    \ ways to potentially address these coordination problems, all of\\nwhich need experimental de-fuzzification. PMs can\
    \ check in regularly with each\\ngroup, not to crack the whip about progress but to check on what each group\\nneeds from\
    \ the others and whether they're getting it. One of the PM's roles will\\nbe keeping the bigger program goal front and\
    \ center and figuring out when an\\nindividual group needs to do something \\\"suboptimal\\\" in order to maximize the\\\
    nentire system. Another tactic is to regularly bring together the people actually\\ndoing the work on each project (as\
    \ opposed to just the PIs) before they have\"\n  },\n  {\n    \"name\": \"results, so that people across the program can\
    \ build rapport talking about real\",\n    \"text\": \"research problems instead of defending results.\\nThe early pieces\
    \ of work will be done by some combination of\\nacademic labs, contract R&D orgs, independent researchers,\\nand possibly\
    \ people within corporate R&D who are able to do\\nwork for grants\\nThis hypothesis has three implicit sub-hypotheses:\
    \ 1. The early work in programs\\nwill be done in distributed external organizations; 2. the types of groups that will\\\
    ndo that work will be heterogeneous \\u2014 that is, it won't just be academic labs; 3.\\nPMs should be agnostic to the\
    \ types of organizations doing the work as long as\\nthey can get it done.\\nAny one of these sub-hypotheses could be\
    \ wrong! Other private organizations,\\nlike Ink & Switch and various open-source projects have pulled off distributed,\\\
    nexternalized, research but that may not translate to atom-based solutions R&D. It\\nmay turn out that externalized non-computer-science\
    \ research only works when\\nyou're a government organization with massive resources that can buy work at\\ncontract research\
    \ organizations like SRI or APL. Academic labs might have\\ndraconian licensing or university overhead requirements that\
    \ rule them out as\\npotential partners. Independent researchers, regardless of their ability, might not\\nhave access\
    \ to the equipment they would need to undertake a project.\\nHowever, I'm optimistic that there will be ways around these\
    \ potential\\nproblems!\\nPeople will be willing to shift their organizational affiliations to\\nan exploratory program\
    \ organization as the program goes on\\nThis hypothesis exists at two levels: Would people from different projects in\
    \ a\\nprogram be willing to shift into a single organization? And is consolidating into a\\nsingle organization even a\
    \ good idea? I lay out the reasoning for why exploratory\\nprogram organizations might be a good idea in Part II, so I\
    \ won't dig into it here.\\nTo the question of whether people would be willing to join the EPO, like most\\nhuman systems,\
    \ there are many factors at play, and it's impossible to predict all of\\nthem a priori. How much people come to care\
    \ about the program they're working\\non would ideally be a deciding factor, but in reality, it's a complicated mix of\\\
    nincentives: what career track they see themselves on; what the opportunity cost\\nof joining is; how they weight the\
    \ chance of a good outcome; etc. Managing all of\\nthese incentives will be a major challenge.\\nIt's possible to \\\"\
    graduate\\\" programs in a way that gives them a\\nlife of their own\\n\\\"Manage the transfer, not the technology: Innovative\
    \ leaders with some\\nsuccesses tend to appoint themselves loonshot judge and jury (the\\nMoses Trap). Instead, create\
    \ a natural process for projects to transfer\\nfrom the loonshot nursery to the field, and for valuable feedback and\\\
    nmarket intelligence to cycle back from the field to the nursery. Help\\nmanage the timing of the transfer: not too early\
    \ (fragile loonshots will\\nbe permanently crushed), not too late (making adjustments will be\\ndifficult). Intervene\
    \ only as needed, with a gentle hand. In other words,\\nbe a gardener, not a Moses.\\\"\\n\\u2014Safi Bahcall, Loonshots\\\
    nEven if PARPA manages to nurture programs all the way from baby seedlings\\nto impressive results, all that work will\
    \ be worthless if the programs don't have a\\npositive impact on the world. In order for that impact to happen, the programs\\\
    nneed to take on lives of their own. There are many ways that technology can take\\non a life of its own, but unfortunately,\
    \ none of them are as easy as just kissing it\\nand hoping the gods do the rest. It could end up as an \\\"open\\\" project,\
    \ be carried\\nforward by a nonprofit, absorbed into an existing organization, or become the\\ncore of a startup. Regardless\
    \ of the outcome, I suspect that explicitly thinking\\nabout which outcomes to target and course-correcting toward them\
    \ will\\nmaximize the viability of programs after being part of PARPA.\\nBringing technology to life is harder and hopefully\
    \ less awkward than this.\\nOne sub-hypothesis of \\\"graduating\\\" programs is that there is a lot of pre-work\\nthat\
    \ can be done during the course of a program to maximize its impact after it\\nconcludes. It would be easy to focus monomaniacally\
    \ on getting to some\\ntremendous milestone, reach it, and then look around and ask \\\"OK, what do we\\ndo with this\
    \ now?\\\" Or worse, assert, \\\"Well, our job here is done, it's up to others\\nto carry the torch forward!\\\" Instead,\
    \ PMs could act a bit like curling sweepers \\u2014\\naltering the friction in front of the program ever so slightly so\
    \ it ends up in the\\nbest place possible.\\nThis \\\"pre-work\\\" will involve going back and forth with potential\\\
    nmanufacturers (\\\"What would make this technology actually producible at scale?\\\"),\\npotential adopters (\\\"What\
    \ specs do you actually care about? Why don't you use\\nsomething like this already?\\\"), and regulators so that the\
    \ previous two groups\\naren't worried. The PM/program team will obviously need to make a call on what\\nto incorporate\
    \ into their work \\u2014 throw out \\\"I want a faster horse!\\\" But keep\\n\\\"Power/weight ratio doesn't matter to\
    \ us, but power/volume does.\\\" There will also\\nbe hard questions around what \\\"form factor\\\" would maximize diffusion\
    \ \\u2014 Is it a\\nproduct? A process upgrade? A lab that does a particular kind of microscopy or\\nsynthesis work? Does\
    \ it perhaps need to be the starting point for another\\nprogram? A lot of this work closely resembles standard startup\
    \ best practices \\u2014 I\\nimagine them both as \\\"finding a fit in the real world,\\\" but where a startup is\\ntrying\
    \ to optimize long-term capturable value through a scalable product, a\\nPARPA program has more degrees of freedom.\\\
    nFocusing too intently on what will happen after the program ends could have\\ndeleterious warping effects as well! As\
    \ we've beaten to death already, one of the\\nreasons PARPA needs to exist in the first place is because existing institutions\\\
    nfocus work on outcomes like papers or profit. Navigating between the drive to\\nenable potentially impactful work and\
    \ nudging that work so that it actually\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the\
    \ impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n48/61\\n\\ndelivers on that impact is yet\
    \ another unavoidable tension that PARPA must\\nconfront.\\nAnother sub-hypothesis is that in order to successfully \\\
    \"graduate,\\\" a program\\nneeds some of the people who were working on it to carry it forward. Intellectual\\ncontinuity\
    \ matters. And of course, we suspect that some of the program\\nparticipants will want to graduate with the program. This\
    \ intellectual continuity\\ncould take many forms \\u2014 consulting with other organizations implementing the\\ntechnology,\
    \ starting a startup or nonprofit, perhaps something less conventional.\\nThe key thing is that at least one person who\
    \ worked on the technology full-time\\ncontinues to do so. It's a common misconception that \\\"technology transfer\\\"\
    \ can\\nhappen by handing off some patents and perhaps some light part-time consulting\\nwork. This might have been the\
    \ case in the past, when patents were schematics\\nof a mechanical part, but no longer! As a result, it will be important\
    \ for at least a\\nfew of the people in a (temporary) PARPA program to see it as a long-term\\nendeavor.\\nPARPA will\
    \ eventually spin out companies\\nSpinning out  253 as a company is only one of several ways that programs can\\n\\\"\
    graduate.\\\" However, it's worth talking about them directly, because startups\\ndominate so much of the cultural zeitgeist\
    \ and potentially play a unique role in\\nPARPA's business plans.\\nAt the end of the day, PARPA's goal is roughly to\
    \ unlock more technologically\\nenabled wonder in the world. The \\\"in the world\\\" part does a lot of work. It\\ndemands\
    \ technological diffusion, which can happen in one of three (not mutually\\nexclusive) ways: You can sell technology directly,\
    \ you can give it away, or you can\\nbuild an organization around it.\\nSome of PARPA's work will certainly be appropriate\
    \ for selling directly to\\ncompanies that might diffuse it. However, there will be many things that just\\ndon't fit\
    \ into the existing product lines or business models of current\\norganizations.\\nGiving away non-software technologies\
    \ tends to have limited diffusive\\npotential outside of an institutional framework. Most people don't make their\\nown\
    \ stuff, so if you just put designs on the internet, they're unlikely to be widely\\nused. There are of course counterexamples,\
    \ but more often the diffusion of free\\nor open technology is eventually driven by organizations. Penicillin needed\\\
    nPfizer; the semiconductor needed Fairchild; electricity needed Edison Electric.\\nThe importance of companies for diffusing\
    \ technology means that PARPA will\\n(sometimes) need to spin out companies in order for it to achieve its goals.\\nThere\
    \ are, of course, caveats: Not all of these companies will be high-growth\\nstartups. Even though a technology might be\
    \ at a point where it needs a company\\nto carry it forward, that doesn't necessarily mean that company will be a good\\\
    nventure capital investment. The appropriate structure for some of these\\ncompanies might even be as nonprofits, like\
    \ the Mozilla or Wikimedia\\nfoundations.\\nIt's possible for this entire cycle to eventually become\\nautocatalytic\\\
    nThe longest-term, vaguest, and most aggressive hypothesis is that it's possible for\\nthis entire cycle of program design,\
    \ execution, and graduation to become\\n\\\"autocatalytic\\\" \\u2014 that is, PARPA can (and must) become its own money\
    \ factory.\\nAutocatalyzation isn't just about money, but something bigger: a cycle where\\ngood results beget good results.\\\
    nWhy does autocatalyzation matter? The underlying meta-hypothesis is that\\nPARPA will only be able to achieve truly miraculous\
    \ things if it plays a long\\ngame. Good research has long time scales \\u2014 it took the industrial labs of the\\n20th\
    \ century decades to hit their stride. It's fairly unsubstantiated, but it feels\\nlike an organization's time scales\
    \ need to be even longer than the work it\\nundertakes. There are also compounding returns to institutional competence\
    \ in\\nhigh-variance domains. Of course, this meta-hypothesis could be wrong as well!\\nThere are several research organizations\
    \ that were flashes in the pan but\\nproduced outsized results: The Rad Lab and Willow Garage leap to mind.\\nI suspect\
    \ that in order to thrive in the long run, PARPA needs to be as in\\ncontrol of its own fate as possible. If PARPA never\
    \ stops depending on external\\ncapital, it will eventually fall into one incentive trap or another. Even with the\\nbest\
    \ funders, the wisest leaders, and the most robust organizational structures, if\\nyou roll a die enough times you'll\
    \ eventually roll a natural 1. Of course,\\nautocatalyzation does not guarantee success, but it seems like an eventually-\\\
    nimportant part of it.\\nWe can divide the hypothesis that PARPA's \\\"core gameplay loop\\\" can become\\nautocatalyzing\
    \ into three sequential sub-hypotheses:\"\n  },\n  {\n    \"name\": \"PARPA can create a community that generates good\
    \ inbounds and\",\n    \"text\": \"enables more successful programs. The first hint that PARPA can become self-\\nsustaining\
    \ may not be monetary at all. In the early days, we will need to spend\\nsignificant effort hunting down good performers\
    \ and programs. If PARPA is\\ndoing good, differentiated work, this should shift over time and we should be\\nable to\
    \ become a honeypot for excellent people who want work to with us and\\nideas that couldn't live anywhere else. You can\
    \ tell a lot about both people and\\norganizations by the company they keep. An autocatalyzing community is of\\ncourse\
    \ insufficient for an autocatalyzing organization. However, it may be\\nnecessary and will happen more quickly than monetary\
    \ autocatalyzation, thereby\\nproviding an early \\\"test\\\" of the autocatalyzation hypothesis.\"\n  },\n  {\n    \"\
    name\": \"PARPA can get to a \\\"pseudo-autocatalytic\\\" state where the organization\",\n    \"text\": \"is getting\
    \ enough consistent free cash flow through some combination of\\ndonations, spin-offs, and other sources that it feels\
    \ \\\"default alive.\\\" For a long\\nwhile, PARPA will be living pretty hand to mouth \\u2014 we'll be able to raise\
    \ money\\nhere and there but they will be one-off events. At some point after demonstrating\\npromising results (and probably\
    \ after creating an autocatalyzing community),\"\n  },\n  {\n    \"name\": \"funding will become dependable and/or large\
    \ enough to create a small buffer\",\n    \"text\": \"People will donate regularly, or larger amounts; spin-offs might\
    \ have a few\\nsuccessful exits, encouraging more people to invest; we could establish a\\nconsortium or consulting agreements\
    \ that bring in revenue. At this point we will\\nhave flipped from \\\"default dead\\\" to \\\"default alive.\\\" 129\
    \ This state will still be full\\nof incentive traps and therefore long-\\nterm unstable but will nevertheless be a\\\
    nsignificant step.\"\n  },\n  {\n    \"name\": \"Full autocatalyzation can only happen by building up an endowment,\"\
    ,\n    \"text\": \"which will be possible by squirreling away excess from the pseudo-\\nautocatalytic process. An endowment\
    \ that funds operations out of the interest\\non a large principal seems like the ideal funding mechanism for a DARPA-riff\
    \ \\u2014\\nthe question is whether building one is a chimera. Our working hypothesis is\\nthat building an endowment\
    \ will be extremely hard and likely to fail but isn't\\nimpossible. It will take a long time and strong financial discipline;\
    \ as I noted in\\nthe section on endowments, it's a bad idea to try to build it all at once, so it will\\nneed to be built\
    \ up slowly over time by limiting expenses to a portion of the\\norganization's revenue. A big assumption here is that\
    \ funders and investors will\\nbe on board with this plan!\\nPARPA can and should create a replicable institutional model\\\
    nThere are several attributes of solutions R&D and PARPA that suggest that in\\norder to maximize awesome in the world,\
    \ we should explicitly think about how to\\ncreate a replicable institutional model while building PARPA. The model is\\\
    ninherently unscalable and institutional models are generally more robust than\\nany individual institution. This final\
    \ hypothesis is more of a meta-hypothesis that\\nwe should be paying attention to throughout every stage of the organization.\\\
    nWhile PARPA will hopefully be able to accomplish many important things, it\\nwill be structurally unable to do all the\
    \ important things. Companies can\\nconceivably  255 monopolize an entire market and provide all the search, steel, cat\\\
    nvideos, or diapers in the world. By contrast, DARPA's tiny and flat structure likely\\nplays a key role in their success\
    \ 130 and\\nany organization riffing on its model\\nwill see diminishing returns beyond its\\nsize.  257 This may be similar\
    \ to what you see in venture capital firms and many\\nprivate equity firms \\u2014 small firms are able to get crazy returns\
    \ on outlier results\\nwhile large ones revert to the mean.\\nBlazing the trail for new institutional structures is far\
    \ more impactful than any\\ngiven institution. The impressive thing about Sequoia and Don Draper is less the\\ninvestments\
    \ they made but the fact that they created a template for an entire\\ninstitutional model.\\nContingent factors can always\
    \ kill a given organization even if it gets the\\nmodel correct. Or perhaps like ARDC, 131 arguably the first VC firm,\
    \ you get the\\nidea and some pieces correct but screw\\nup others (like legal structures) in an\\nultimately fatal way.\\\
    nWhat would you do differently if\\nyou're trying to create a replicable model vs. just building a one-off? One piece\
    \ is\\nto consciously document decisions and failures \\u2014 why you do one thing over\\nanother and things you tried\
    \ that didn't work. Additionally, it means forgoing a\\nSee \\\" Default Alive or Default Dead .\\\"\\n129.\\nSee the\
    \ section \\\" DARPA is relatively tiny and\\nflat \\\" in \\\"Why Does DARPA Work?\\\"\\n130.\\nFor much more about ARDC,\
    \ see Creative\\nCapital: Georges Doriot and the Birth of\\nVenture Capital .\\n131.\"\n  },\n  {\n    \"name\": \"/28/25,\
    \ 11:59 PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\\
    n49/61\\n\\nlevel of secrecy and being open to helping people who want to do something\\nsimilar.\\nNote: Many of the\
    \ decisions in this section are based on numerical assumptions. I've\\nmarked each of these assumptions with a \\ud83d\\\
    udcca. I've put these quantitative factors into a\\nmodel that can be referenced here, so you can copy it and play with\
    \ it yourself.\\nAnother note: This is a description of a hypothetical platonic ideal \\u2014 there are surely\\nthings\
    \ in this section that are either illegal or pragmatically impractical because key\\npeople will say, \\\"Ha, no, I'm\
    \ not signing that.\\\" However, it's important to start from\\nsomewhere precise!\\nThe ideal legal structure for PARPA\
    \ would satisfy three conditions:\"\n  },\n  {\n    \"name\": \"The legal structure should enable people to make tax-deductible\
    \ donations to\",\n    \"text\": \"the organization but also be able to channel for-profit investments toward\\nvaluable\
    \ work.\\n2. The legal structure should enable the organization and the people involved in\\nit to participate in some\
    \ upside of capturing value from technologies they've\\ncreated.\\n3. The legal structure should enable the organization\
    \ to become self-sustaining.\\nA self-sustaining organization either needs to sell a product or service, have an\\nendowment,\
    \ or regularly generate liquidatable equity.\\nOn its face, these three conditions seem contradictory. In aggregate, we\
    \ can't\\nexpect an organization that seriously tackles solutions R&D to be profitable.\\nEspecially if it focuses on\
    \ the work that the relatively efficient market in for-\\nprofit organizations won't touch.\\nHowever, while an aggregate\
    \ of all of PARPA's activities will not be profitable,\\nit's a reasonable (but still risky) hypothesis that a portfolio\
    \ of companies spun out\\nof PARPA could end up doing well. Regardless of profit, PARPA will eventually\\nspin out companies\
    \ because companies can be an effective mechanism for\\ntechnology diffusion. It's an even safer bet that if PARPA is\
    \ doing something\\nuseful, there will end up being many profit-generating organizations that can\\ntrace their DNA back\
    \ to PARPA. But let's ignore the latter for now.  259\\nThis will be a sketch of the simplest structure that (I believe)\
    \ meets all three\\ncriteria \\u2014 let's call it the platonic structure, because implementing it will\\nundoubtedly\
    \ involve some changes for pragmatic reasons, like \\\"not going to\\nprison on a technicality.\\\" In a sentence, you\
    \ have a Big-N Nonprofit that owns a\\nC-corp and also has an endowment. For convenience, let's name them after the\\\
    nmuses Nete, Calliope, and Euterpe, because it will make the section much more\\ninteresting than saying \\\"the Nonprofit,\\\
    \" \\\"the C-corp,\\\" and \\\"the endowment\\\" over\\nand over again. Nete runs all of PARPA's activities. Her operating\
    \ capital comes\\nfrom three places: tax-exempt donations from donors, cash from Calliope, and\\ndividends from Euterpe.\
    \ Calliope owns parts of companies that spin out of Nete\\neither as equity in the case of high-growth companies or as\
    \ profit-share\\nagreements in the case of low-growth companies. People can invest in Calliope\\nin exchange for a claim\
    \ on future profits. Finally, Euterpe does what endowments\\ndo: She invests money broadly and attempts to generate a\
    \ steady dividend that\\nshe gives to Nete. Euterpe gets money either directly from donors or from Nete\\nwhen her revenues\
    \ exceed her expenses.\\nAt a high level, this structure satisfies criteria #1 by enabling people who\\nprefer to make\
    \ tax-deductible donations to donate either directly to Nete's\\noperational budget or to Euterpe. The structure satisfies\
    \ criteria #2 by enabling\\npeople to invest in only the outcomes of programs that eventually become\\ncompanies, which\
    \ I do suspect could create real returns, as opposed to the\\nstructure as a whole. Finally, the structure satisfies criteria\
    \ #3 through the fact\\nthat Nete is the \\\"parent org\\\" and a reasonable hypothesis about how Euterpe can get\\nto\
    \ a point where she can sustain operations. \\ud83d\\udcca\\nThere are several nuances, especially around Calliope, the\
    \ C-corp. The first\\nnuance is about how Calliope's stake in spin-out companies works. We've already\\nestablished thatPARPA\
    \ will eventually spin out companies. However, it's\\nimportant to reiterate both that not every successful program will\
    \ turn into a\\ncompany\\ud83d\\udcca and that not every company will be a high-growth venture-backable\\nstartup. Sometimes\
    \ the best vehicle to get a technology out into the world is a\\nsmall, specialized organization. Standard equity ownership\
    \ does not make sense\\nfor slow-growth companies because they may never be acquired or go public.\\nInstead, Calliope\
    \ could own a share of their future profits. This profit-sharing\\nwill end up being negligible on the for-profit's balance\
    \ sheet in a best-case-\\nscenario\\ud83d\\udcca but it is a useful source of free cash flow. So, in order to maximize\\\
    ntechnology getting out into the world, it's important to offer companies a choice\\nof profit- or equity-based ownership.\
    \ The size of that ownership is another tricky\\nmatter.\\ud83d\\udcca The more ownership Calliope maintains in the baby\
    \ companies, the\\nless profit or equity they'll have to fund their own operations, and the less likely\\nthey are to\
    \ succeed. At the same time, Calliope needs to own enough to make a\\nreturn for her investors. As anchors, Y Combinator\
    \ takes 7% and Entrepreneur\\nFirst takes 10%. We'll go with 10% because it's a nice round number and any\\nhigher number\
    \ feels like it could cause significant damage to a startup. Perhaps it\\nshould be lower.\\nThe next nuance is about\
    \ Calliope's legal status. The two main choices are\\nwhether she should be an LLC or a C-corp. The most pertinent differences\\\
    nbetween the two revolve around taxes and the ability to issue shares. LLCs are\\n\\\"pass-through\\\" legal structures,\
    \ so only investors would be taxed on income they\\nmake from Calliope. As a C-corp, both Calliope and her investors would\
    \ be taxed.\\nC-corps have much more legal precedence and people are more comfortable with\\nthem, so unless the double\
    \ taxation is a significant burden, it's generally a good\\nidea to default to a C-corp. The way to navigate this trade-off\
    \ is to look at where\\nCalliope's (hypothetical) value is going to come from and which structure would\\nmaximize technological\
    \ diffusion. (Do not forget our goal!) The majority of\\nCalliope's value will be in holding equity in companies that\
    \ are high value. The\\nclassic trap here is to set up Calliope's incentives so that she is incentivized to\\nlean on\
    \ those companies to have a liquidity event as soon as possible. Calliope\\nwould be incentivized to push for liquidity\
    \ events if her value were in the cash\\nshe would be returning to investors. Instead, it would be better if Calliope's\
    \ value\\nwere based on the long-term value of the equity she held. Aligning those\\nincentives seems to suggest that\
    \ Calliope should be a C-corp. While this might\\nbe an obvious conclusion to you, it was not actually my first assumption.\
    \ The one\\nother consideration that might tip the balance is that there are more constraints\\non how ownership works\
    \ in an LLC than a C-corp.\\nThe next nuance is how ownership of Calliope will work. The ways that you\\ncan legally divide\
    \ up ownership in an organization are heavily regulated, so I am\\ngoing to first describe a platonic system that is probably\
    \ illegal and then explain\\nhow it could be crudely implemented within the constraints of the law.\\nObviously, investors\
    \ and Nete herself are going to own a good chunk of Calliope,\\nbut it's also important to figure out how to enable Nete's\
    \ PMs to participate as\\nwell. Enabling PMs to own a meaningful part of Calliope is actually important to\\nincentives,\
    \ when you consider that there will be some programs that will\\nnaturally lead to valuable companies but other programs\
    \ will be hugely impactful\\nwhile not leading to good companies. If the implicit choice for PMs is \\\"If your\\nprogram\
    \ becomes a company, you'll get financial upside but if it doesn't you get\\nnothing,\\\" you will incentivize PMs to\
    \ either push programs that shouldn't\\nbecome companies toward becoming companies or to never start\\nuncommercializable\
    \ programs in the first place. If instead you give everybody\\nsome slice of the value Calliope captures, it will hopefully\
    \ alleviate that pressure.\\nOf course, this won't stop PMs who are strongly driven by economic incentives\\nfrom skewing\
    \ all their work toward companies. Nor will it create totally equal\\noutcomes \\u2014 PMs who go on to create successful\
    \ companies will obviously own\\nfar more of those companies; arguably, the majority of a technology company's\\n\\\"\
    excess value\\\" is not actually due to its technology. 132\\nOwnership based on an\\naccumulating \\\"ledger\\\" of points\
    \ would\\nenable everybody involved in the organization \\u2014 both those who put in money\\nand those who put in time\
    \ \\u2014 to participate in upside on roughly equal ground.\\nPARPA's ideal legal structure comprises both a\\nNonprofit\
    \ and a for-profit\\nSee \\\" Productive Uncertainty ,\\\" again.\\n132.\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\"\
    ,\n    \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n50/61\\n\\nYou\
    \ could assign different numbers of points for different activities that help the\\nthe enterprise as a whole: \\\"You\
    \ get N points for the first year of service, 1.2*N for\\nthe next year, etc.\\\" \\\"You get M points per $100K.\\\"\
    \ At the end of the day, you end\\nup with a list of people and how many points each of them has \\u2014 ownership is\\\
    njust your points divided by the total number of points. The ledger system\\nultimately has the same outcome as selling\
    \ and awarding people shares that get\\nprogressively diluted as a company increases in value. (More points will be\\\
    ncreated over time, so a fixed number of points will represent a decreasing\\nfraction of Calliope.) However, a point\
    \ system has several positive features that\\nstandard shares do not and avoids some of their downsides. One upside to\
    \ this\\nsystem is that it gives everybody the same type of ownership: avoiding preferred\\nshares, etc. The ledger can\
    \ roughly stand as an accounting of who contributed to\\nthe organization's success.  261 Combined with \\\"pseudopoints\\\
    \" for donations to\\nthe nonprofit (which can't be financially rewarded), the ledger could be a public\\nsource of pride\
    \ instead of a secret and source of jealousy like company ownership\\nnormally is.\\nThe points system would also enable\
    \ people to participate in multiple ways\\ninstead of different types of shares shunting people into different buckets\\\
    naccording to their roles; there would be no accounting hassle for an employee\\nwho also wanted to invest. There's also\
    \ a psychological component in the\\ndifference between adding a grain to a growing pile of sand and getting a slice of\\\
    na fixed pie. I realize this all comes with a whiff of utopian faeries and rainbows \\u2014\\nregulatory constraints and\
    \ investor pressure will undoubtedly make this full\\nsystem infeasible. It's important to lay it out, however, so that\
    \ we can get as close\\nas possible without going to jail.\\nThe trickiest pieces of the puzzle are the questions of who\
    \ does the work, who\\nowns it, and who employs people. It would be awkward if Nete had a bunch of\\nemployees who just\
    \ happened to get compensated with a stake in Calliope. A\\ntentatively feasible way to separate Nete and Calliope is\
    \ as follows: All of the\\nPMs are Calliope's employees. They are then contracted to Nete, who owns any\\nresulting work.\
    \ If the work gets to the point where a company makes sense, Nete\\nthen can license that work at fair market value to\
    \ Calliope, who would then spin\\nout companies. At least in theory, this arrangement allows PMs to have an equity\\nstake\
    \ while at the same time making sure that Nete, not Calliope (and therefore\\nprofit), is driving research agendas.\\\
    nCalliope's existence won't free Nete from depending on donations to fund\\noperations for many years. However, Calliope\
    \ can possibly free Nete from\\ndepending on donations in the long run by filling Euterpe's coffers. This scheme\\nrelies\
    \ on two big assumptions \\u2014 that Calliope will eventually become very\\nvaluable, and/or that Nete will be able to\
    \ get enough donations to cover\\noperations so that, through some combination of those donations and money\\nfrom Calliope,\
    \ there will be enough to slowly build up Euterpe's principal to the\\npoint where its dividends can fund Nete indefinitely.\\\
    ud83d\\udcca\\nOrganizations tend to resemble punctuated equilibria 133 \\u2014 instead of always\\nchanging at a continuous\
    \ rate, they\\ntend to go through periods of relative\\nstability punctuated by \\\"phase shifts\\\"\\nwhen they hit a\
    \ critical level of\\nresources. In other words,\\norganizations evolve more like Pok\\u00e9mon than (growing) people.\\\
    nMost organizations go through different forms but rarely make them explicit.\\nInstead, the situation resembles the South\
    \ Park Underpants Gnomes\\\" business\\nplan: There's an initial form (collect underpants) and a final form (profit) with\
    \ a\\nbig question mark in between them. It's hard to evaluate how good such a plan is\\nfrom the outside, but perhaps\
    \ more importantly, it's hard to use a gnomish plan\\ninternally \\u2014 when should you push to the next phase? When\
    \ should you exert\\ndiscipline and remain in the current phase because you haven't met key\\nconditions for a phase shift?\
    \ Making the different forms explicit can get\\neverybody on the same page. As with so many other things, making forms\
    \ legible\\nalso makes them vulnerable \\u2014 both to criticism and to accusations of hypocrisy\\nif they end up not\
    \ playing out as predicted (which is almost inevitable). In my\\ncalculus, the clarity and intellectual honesty is worth\
    \ the risk.\\nThrough this lens, we can think about PARPA as taking on different \\\"forms\\\"\\nover time. Each form\
    \ will require different resources, focus on a different set of\\nactivities, and generate different outputs. These forms\
    \ roughly correspond to\\neach of the major hypotheses on PARPA's path through the idea maze.\\nPARPA could use tranches\
    \ to walk the line between long-term\"\n  },\n  {\n    \"name\": \"funding and step-by-step de-risking\",\n    \"text\"\
    : \"One pragmatic reason to explicitly divide PARPA's development into discrete\\nforms is to enable tranches for both\
    \ donors and investors. As I've noted several\\ntimes, there are many tensions between starting small and the other pieces\
    \ of the\\nDARPA ,odel. Tranched donations and funding could be one way to relax this\\ntension. 134\\nMilestone-based\
    \ funding is common\\nin the pharmaceutical world, where\\ndeveloping a drug takes many years and\\npotentially billions\
    \ of dollars yet follows a fairly predictable trajectory through\\nthe different stages of FDA approval. The predictability\
    \ and structure do not\\nreduce the risk associated with the venture, but they do reduce the uncertainty\\nabout possible\
    \ outcomes.\\nPARPA could conceivably raise money in a similar way \\u2014 soliciting small\\ndonations that are automatically\
    \ followed up by larger ones once specific\\nmilestones are hit. This approach would allow the organization to act as\
    \ though\\nPARPA will go through three phases of\\norganizational growth\\nEvolutionary systems (may) go through long\\\
    nperiods of slow change punctuated by periods\\nof rapid change. See \\\" Punctuated equilibria:\\nan alternative to phyletic\
    \ gradualism .\\\"\\n133.\\nFor some more complex and well thought-out\\ntranched funding schemes, see \\\" Funding\\\
    nLong Shots .\\\"\\n134.\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible to\
    \ the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n51/61\\n\\nit had secured long-term funding without being\
    \ under the pressure to deploy a\\nlarge amount of money. Milestone-based funding would also allow donors and\\nfunders\
    \ to hold onto their money until the milestones were hit and feel like the\\norganization was de-risked before deploying\
    \ larger amounts of money.\\nOne danger is that a donor could choose to renege on their commitment once\\na milestone\
    \ is hit. This unfortunately happens with capital calls in funds, but\\nhopefully, the chances of it happening in this\
    \ case could be small, both because\\nhitting milestones will be less unexpected than a capital call (which could come\\\
    nat any time) and clear milestones could enable a firmer contract.\\nCreating and agreeing on milestones will be a challenge.\
    \ Milestone-based\\ntranches require clear milestones. One of the reasons they work so well in\\nmedical technology and\
    \ drugs is that passing FDA trials are unambiguous\\nmilestones that everybody can agree on. PARPA won't have the luxury(?)\
    \ of a\\nstaged government gatekeeper as the primary barrier to success, so we'll need to\\nselect milestones carefully\
    \ and do the work to get donors to buy into them. My\\nintention is that laying out the forms below is a first step in\
    \ that process!\\nForm 1: Program Design \\ufffc\\ufffc\\nPeople: 1\\u20135\\nBudget: $0\\u2013500K/year\\nOutputs: Program\
    \ designs\\nIn this form, PARPA will be just one or two full-time individuals designing\\npossible programs. Remember,\
    \ it is important for big things to start small ! These\\nPMs will be focused on an iterated process of hub-and-spoke-style\
    \ work, where a\\nPM reads many papers and talks to many people to form their own hypotheses\\nand couples that with many-to-many\
    \ workshops where several experts come\\ntogether to hash out possibilities.\\nIn this form, the organization's primary\
    \ output will be artifacts \\u2014 let's call\\nthem roadmaps. These living documents will work backward from a clear\
    \ goal to\\nthe precise work that would maximize your chance of getting to that goal; call out\\nwho might be best suited\
    \ to do that work (there are many pieces of equipment or\\ntacit knowledge that only exist in one or two places in the\
    \ world!); and explain\\nhow to think about the work in terms of timelines, branch points, and milestones.\\nThe roadmaps\
    \ will inevitably need a few iterations of real experiments to de-risk\\nkey assumptions . Keep in mind that a roadmap\
    \ doesn't mean that a program is\\n\\\"shovel-ready.\\\" There will be a lot of work to get all the pieces in place like\\\
    nfiguring out who will do the work, signing contracts, sorting out equipment, etc.\\nIdeally, other organizations would\
    \ act on these roadmaps, but I wouldn't bet on\\nit.\\nIdeally, we will evolve out of this form as quickly as possible\
    \ once we have a\\ngood handle on the hypothesis that it's possible to design programs in a\\nsystematic (and therefore\
    \ repeatable) way .\\nThere is no critical mass to get to this stage, but the critical mass to get out of\\nit is to have\
    \ designed around five programs that are worth moving forward with.\"\n  },\n  {\n    \"name\": \"We need to generate\
    \ a sufficient number of roadmaps to show both that the\",\n    \"text\": \"planning process is repeatable and that there\
    \ are enough areas in PARPA's early\\nsweet spot to make this whole endeavor worthwhile.\\nThe budget for this stage is\
    \ just enough to cover individual salaries and the\\ncosts of running workshops \\u2014 renting out a cabin in the woods\
    \ and (hopefully)\\nfood and transportation for people, so a few thousand dollars. The tricky bit here\\nis that our ability\
    \ to dig into problems and possibilities deeply enough to do good\\nprogram design may be coupled to our ability to execute\
    \ on those programs. In\\nmy experience,  265 people are much more willing to talk shop about precise\\npotentials when\
    \ they can see the conversation leading to an actual program.\\nIf other organizations do want to act on the roadmaps,\
    \ there is perhaps a Form\\n1.5, in which the boundaries between PARPA and the executing organizations\\nbecome fuzzier.\
    \ We could bring representatives from those organizations into the\\nprocess to increase the chance that the output becomes\
    \ reality. Similarly, PARPA\\npeople could consult with organizations executing on roadmaps to keep the\\nroadmaps alive\
    \ and make sure nothing is lost in translation.\\nForm 2: Architecting Institute\\nPeople: 5\\u201320\\nBudget: $10M/year\\\
    nOutputs: Self-sufficient but temporary research organizations\\nIn this form PARPA will comprise several program managers\
    \ working on\\nprogram design but expand beyond Form 1's process by running seedling\\nexperiments and getting programs\
    \ off the ground. The organization's primary\\noutput will be (semi) independent organizations along the lines of focused\\\
    nresearch organizations 135 whose\\nmission is to execute on a program.\\nOnce a PM has driven a program to a\\npoint\
    \ where they have good answers to\\nall the questions in the the Heilmeier Catechism 136 or an equivalent \\\"gate', \
    \ 268\\nthey would need to get all the pieces in\\nplace for the full program organization\\n\\u2014 funding, incorporation,\
    \ research\\ncontracts, and hiring \\u2014 and either move to the program organization full-time or\\ntransition leadership\
    \ to someone else.\\nThe funding for these program-executing organizations could come from a\\nmyriad of sources \\u2014\
    \ the government, philanthropists, or investors, depending on\\nthe nature of the work to be done. Frankly, this transition\
    \ from a loose set of\\nconnected projects to its own organization seems incredibly tricky to do well.\\nThere are many\
    \ disconnected pieces that need to come together. Compromises to\\nget funding or convince people to join could end up\
    \ derailing the program.\\nPARPA should be able to help the creation of these temporary organizations by\\nmaintaining\
    \ connections to funding sources, labs, and contract research\\norganizations, providing initial space, and generally\
    \ honing process knowledge.\\nIt might be possible to get around these problems by building out the idea of\\nexploratory\
    \ program organizations that enable a program to undergo a more\\ncontinuous transition to an independent entity.\\nThere\
    \ is a minimum number of programs that PARPA needs to be working on\\nin parallel \\u2014 probably in the five to seven\
    \ range. If the programs are actually\\nhigh risk, any single one is more likely to fail than not, so if there were only\
    \ a few\\nprograms, the chances that all of them would go nowhere and take down the\\nSee \\\"Focused Research Organizations\
    \ to\\nAccelerate Science, Technology, and\\nMedicine ,\\\" again.\\n135.\\nSee https://www.darpa.mil/work-with-\\nus/heilmeier-catechism\
    \ .\\n136.\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\\
    nhttps://blog.benjaminreinhardt.com/parpa\\n52/61\\n\\nwhole organization with them would be quite high. If each program\
    \ has a 5\\u201310%\\nchance of success (as is the case in DARPA 137 ), then you need to run seven\\nprograms to get a\
    \ 50% chance of seeing\\none of them succeed .\\nA critical mass of programs needs a\\ncritical mass of program managers\
    \ to run them. In addition to the bare minimum\\nnumber of people needed to run the programs, there's some number above\
    \ which\\nthe group starts passively generating more ideas than all the individuals on their\\nown. This number is probably\
    \ around five to seven: a dinner party's worth of\\npeople.  270\\nThis form is where the director emerges as a separate\
    \ role to focus on the\\norganization itself. The director wasn't even worth mentioning in Form 1\\nbecause in the beginning\
    \ the director will be basically be a PM with some extra\\nadministrative work.\\nEstimating the minimum level for the\
    \ budget in Form 2 is tricky. Too low and\\nyou're unable to do the work to show that the whole organization has potential.\\\
    nDARPA seedling programs have total budgets between $1\\u20135M. If we assume that\\nyou want to complete the program\
    \ in 6\\u201318 months, that's a rate of $0.7\\u201310M per\\nprogram per year. If you need a critical mass of five programs\
    \ at any one time,\\nthat's $3.5\\u201350M per year in research costs. Obviously, this is a huge range, drawn\\nfrom multiplying\
    \ the extreme ends of the time/budget spectrum. A more\\nreasonable estimate would probably be $10M/year. This number\
    \ feels like it's\\nskirting the edge of setting the organization up to fail because of the inevitable\\npressure to deliver\
    \ results ASAP. So in total, the critical budget to consider\\nmoving to this stage is around ~$10M/year, but hopefully\
    \ higher.\\nWhile the $10M/year number is tiny compared to the amount that the US\\ngovernment spends on research, it\
    \ is massive compared to most relatively new\\norganizations. Donors might be understandably hesitant to commit to that\\\
    namount for the several years you would need to see real outputs. Ideally, verdicts\\nwould be withheld until after the\
    \ created semi-independent programs had a\\nchance to show results. This is a place where tranches could be clutch.\\\
    nForm 3: An Institute for Creative Technology\\nPeople: 20\\u2013100\\nBudget: $60M\\u20133B/year\\nOutputs: Open research,\
    \ companies\\nThis phase is the fully evolved version of PARPA that can hopefully exist\\nproductively for a very long\
    \ time. In this phase, PARPA will not only design and\\nde-risk programs but will run them as well.\\nRunning programs\
    \ without creating and funding an entire new organization\\nhas several advantages. Internal programs enable higher-risk\
    \ programs because\\nyou can shift money away from a failed program to a healthy one. Internal\\nprograms smooth the transition\
    \ from \\\"Hey, we should do this!\\\" to actually doing\\nit \\u2014 you don't have to go and raise a bunch of money,\
    \ transfer knowledge, and\\nspin up a whole organization. Instead, all of that can happen organically over the\\ncourse\
    \ of the program.\\nIn this phase, the organization's outputs are whatever the programs turn into\\n\\u2014 whether it's\
    \ startup companies, research nonprofits, or knowledge and IP that\\nwe work to diffuse into existing organizations. PARPA\
    \ will still need to do a lot of\\nwork to make sure that the programs transition to whatever form will maximize\\ntheir\
    \ impact. Everything else about the organization will be a fairly natural\\nextension from Form 2.\\nLike Form 2, Form\
    \ 3 does need a critical mass of simultaneous programs\\nbecause of the program's high chances of failure. This number\
    \ is probably\\naround seven, based on the back-of-the-envelope exercise that a 10% success rate\\nrequires seven programs\
    \ in order to give the organization a 50% chance of a\\nsingle successful program. Assuming each of seven programs costs\
    \ ~$8M/year\\nand you're continuing to do seedling programs as well (per Form 2), you wind up\\nwith a minimum budget\
    \ of ~$60M/year. Interestingly, this number roughly\\ncorresponds to the original ARPA IPTO budget that midwifed the personal\\\
    ncomputer ($2020 47M).\\nEventually, we aim to get to the scale of DARPA: ~100 programs with program\\nmanagers deploying\
    \ a budget of ~$3B. Of course, that steady state can and should\\nbe approached incrementally after many years of operation.\
    \ I realize this target is\\nincredibly ambitious and there is a large chance we will never get there!\\nI struggle with\
    \ how far down the ladder of abstraction to climb when talking\\nabout specific programs. On the one hand, I have built\
    \ a few strong hypotheses,\\nand having examples is always helpful for what is otherwise a very abstract\\nproposal. On\
    \ the other hand, readers (not you, of course, but other people) tend to\\nover-focus on those examples to the point where\
    \ questions and disagreements\\nover the examples dominate everything else. (\\\"Forget all the models, forget the\\nplans,\
    \ why are you working on that ?\\\") Which programs we'll work on is both one\\nof the most important and least fixed\
    \ pieces of the plan. But I've already asserted\\nthat precise visions are more likely to happen, so I will hold myself\
    \ to my word.\\nKeep in mind that these are hunches that need a lot of work to even verify that\\nthey're worth creating\
    \ a program around. As it says on open house furniture: for\\ndisplay only (but perhaps available later). In this section,\
    \ I'll present both a list of\\nhypotheses that may be worth designing programs around and two more detailed\\ndescriptions\
    \ of programs I suspect are particularly promising.\\nSome program hypotheses\\nA caveat: You are probably going to think\
    \ that most of these examples are\\nobjectionable for one reason or another. Some will sound like fantastic\\nramblings,\
    \ others will sound too eminently practicable to need new institutional\\nsupport.\\nReconfigurable black-box factories\
    \ are a systems and robotics problem that\\ncould drastically change what gets made where.\\n3D printing could potentially\
    \ enable soft robotics to become a useful thing.\\nNon-human-centric biology could unlock new paradigms of physical\\\
    ntechnology. For example, you could make high strength to weight linear\\nactuators that effectively run on garbage if\
    \ you could create an artificial muscle\\ncoupled to an artificial metabolism.\\nMulti-purpose farming robotics could\
    \ change the way we grow food, especially\\nindoors.\\nNew simulation paradigms \\u2014 especially hierarchical systems\
    \ of simulations \\u2014\\ncould enable everything from new materials to generative design and new\\ngenerations of robotics.\\\
    n'General purpose\\\" telerobotics is a systems engineer problem that could both\\naddress global problems and enable\
    \ people to do things they never could\\nbefore.\\n\\\"Positional chemistry\\\" driven by some combination of protein\
    \ 3D printers,\\nnanomachines embedded in metal-organic frameworks, and other tools could\\nbegin to deliver on the vision\
    \ of atomically precise manufacturing.\\nGeneral purpose telerobotics\\nPossibilities\\nOne of the most iconic scenes\
    \ in The Matrix occurs soon after Neo has escaped\\nthe Matrix for the first time and is learning that he can download\
    \ in-Matrix skills\\ndirectly into his brain. He plugs a cable into the back of his neck, thrashes\\naround, opens his\
    \ eyes, and announces, \\\"I know kung fu.\\\" It has become\\nSee \\\" DARPA - Enabling Technical\\nInnovation .\\\"\\\
    n137.\\nPotential programs\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible\
    \ to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n53/61\\n\\nshorthand for the idea of \\\"downloading\\\
    \" an ability. While telerobotic technology\\ncannot give people superpowers directly, it can create many of the outcomes.\\\
    nThere is something intangibly beautiful about giving people more agency. In the\\nsame way that computers can be a \\\
    \"bicycle for the mind,\\\" enhancing our\\ncreativity and thinking abilities, robots could be a \\\"computer for the\
    \ hands.'\\nThe first and most obvious power that telerobotics can give people is the\\nability to teleport. There are\
    \ obvious benefits (less commuting for physical jobs,\\nan expert chef being able to cook for people around the world,\
    \ etc.), but one of\\nthe less obvious ones is the ability to fully utilize relatively rare pieces of\\nequipment. At\
    \ 2 a.m., people on the other side of the world can continue research\\nwork.\\nTeleoperated robots could be the size\
    \ of buildings. In addition to fulfilling\\neveryone's fantasies of commanding giant mechs, massive remotely operated\\\
    nrobots could do the work of large crews on construction sites or during\\nemergencies. Both are high-uncertainty situations\
    \ where we won't be trusting\\nfully automated robots anytime soon. On the flip side, teleoperated robots could\\nbe small\
    \ enough to go inside a human body, crawl inside walls, and generally\\noperate in places a person could never access\
    \ non-destructively. Robots the size\\nof pills could make The Fantastic Journey a (less adventurous) reality. To some\\\
    nextent, this already exists in the tools for laprasocopic surgery and the da Vinci\\nrobot. However, we should see these\
    \ as crude hints of what is possible. Robots\\ncan have a plethora of form factors. Researchers have worked on everything\
    \ from\\nsnake robots to gecko robots and octopus robots. Telerobotic technology can\\nenable people to utilize the advantages\
    \ of these form factors like any shape-\\nshifting superhero.\\nEven at human scale, robots can have physical abilities\
    \ far beyond those of\\nhumans. Electricity-powered robots don't need air. Robotic hands can hold\\nthings that are much\
    \ hotter or colder than a human can. Powerful motors can\\nenable a robot (and, by extension its operator) to have superhuman\
    \ strength,\\nwhile precise stepper motors can enable people to act with steady precision that\\nfew human hands can.\
    \ Regardless of their main powers, superheroes are\\ngenerally much more damage-resistant than normal people. A remotely\
    \ operated\\nrobot enables squishy humans to approximate this damage resistance. There's\\nalso the fact that it's much\
    \ more ethical to put a robot in danger than a person.\\nFor now, robots are so expensive and telerobotic technology is\
    \ clunky enough\\nthat it's worthwhile to pay the liability insurance and send people into danger.\\nDedicated work on\
    \ telerobotic technologies can change this \\\"fact.\\\"\\nChallenges\\nIf telerobotics is so great and not just a pipe\
    \ dream, why are real telerobotics\\nplatforms basically just iPads on Segways? A big part of the answer is that there\\\
    nare many different pieces that need work in the context of a system. A general-\\npurpose telerobot needs to enable a\
    \ person to smoothly interact with an\\nenvironment.\\nWithout laying down telerobotics-dedicated cable, telerobots will\
    \ always need\\nto operate over the internet. That means dropped packets and variable lag. While\\nthese are slightly\
    \ annoying during video calls, they can be disastrous for a\\ndelicate task. Na\\u00efvely implemented, haptic feedback\
    \ over a laggy connection can\\ncreate a self-reinforcing loop that could (without force limiters) rip off an arm.\\nThere\
    \ are many potential ways to get around lag: onboard autonomy that can\\ntranslate \\\"Rotate this\\\" and \\\"Pick that\
    \ up\\\" into lower-level path planning;\\ngenerating a model of the robot's environment that a controller interacts with\\\
    nand then the system translates into robot movement on the other end; or the less\\ntechnical approach of cutting a deal\
    \ with a telecom company. The trick is that\\nhow well each of these approaches \\\"works\\\" depends on other pieces\
    \ of the\\nsystem.\\nHuman touch is pretty extraordinary \\u2014 pick up a pen if one's handy (any small\\nobject will\
    \ do), read the next sentence, and then close your eyes. Once your eyes\\nare closed, twiddle the pen in a few loops,\
    \ bring it back to its original position,\\nand then open your eyes again. The extraordinary thing is how easy that probably\\\
    nwas. Most modern robots and telerobots operate primarily through visual sensors\\n\\u2014 either passive, like a CCD,\
    \ or active, like LIDAR. Compared to gigapixel visual\\nsensors, modern tactile sensors are primitive. Human skin can\
    \ have neurite\\ndensities in the thousands per square millimeter, 138 while the cutting-edge\\nBioTac tactile sensor\
    \ measures forces\\nvia the differences between 19\\nelectrodes. 139 The situation isn't much\\nbetter interfacing with\
    \ the human hand\\non the other end. One upshot might be\\nthat the binding constraint on\\ntelerobotics is haptics technology.\
    \ Perhaps! But at a system level, there may be\\nways to achieve better performance even with low-quality tactile sensors:\\\
    nmultiple cameras, simulated tactile responses, Project Soli \\u2013style radar-on-a-chip,\\nor autonomy in the loop.\\\
    nHuman hands are also versatile \\u2014 those same hands that can thread a needle\\nor hold a baby can also lift hundreds\
    \ of pounds or smash a brick. Robotic\\nactuators (the fancy word for \\\"things that do physical things to the world\\\
    \") are\\nnowhere near that good \\u2014 either they're too weak to do any damage or liable to\\ndestroy things without\
    \ very careful control. There are so many potential ways to\\nimprove this situation: from haptic feedback loops to mechanically\
    \ compliant\\narms and soft grippers. Artificial muscles, pneumatic systems, and pulley-driven\\narms and hands are all\
    \ potential ways to approach the versatility of human limbs\\nand hands. The trick is (and I will sound like a broken\
    \ record here) that the \\\"best\\\"\\nsolution only exists in the context of a system \\u2014 if you have lower lag,\
    \ you need\\nto worry less about arm compliance; if you have a four-armed robot, you could\\nswitch between strong arms\
    \ and delicate ones; etc.\\nSo far, we've only talked about the technical challenges. There are many\\npeople-based constraints\
    \ on telerobotic development. Telerobotics has become\\nseen as the redheaded step child next to work on full autonomy.\
    \ It's seen as\\nnothing but a stepping stone to a near-future inevitability. Hopefully, previous\\nsections at least\
    \ nudged your belief that such assertions are like saying that work\\non productivity software is useless because it will\
    \ all be automated anyway. The\\nwork that is happening is rarely done in a real context of use outside of a few\\nexceptions;\
    \ researchers usually demonstrate different subsystems on benchmark\\ntasks, publish a paper, and call it a day. These\
    \ benchmarks are barely even\\ncomparable because every telerobotics lab cobbles together its own unique setup\\nfrom\
    \ different commercially available components.\\nActions\\nWhat would a PARPA program to go after general-purpose telerobotics\
    \ look\\nlike?\\nOne concrete possibility is to work with academic and commercial groups to\\ncreate a standardized telerobotic\
    \ research platform. Both the PR2 and Baxter )\\nrobots simultaneously spurred a lot of robotics work by providing an\
    \ extensible\\nresearch platform and were commercial failures. PARPA, in its role of taking on\\nwork that both academia\
    \ and startups won't touch, could coordinate work to\\nbuild an extensible telerobot and the work to figure out how to\
    \ make it a\\nmaximally useful general tool.\\nAnother possibility might look like picking one extremely hard but obviously\\\
    nimportant context-of-use and then coordinating work to build a prototype system\\nwithin that context. Hopefully, a challenging\
    \ context of use with many\\ncontradictory requirements would prevent the system from overspecializing. The\\ngoal would\
    \ be twofold: First we would try to get the system to a point where\\ncommercial entities see enough potential to move\
    \ the ball forward. Second, you\\ncould imagine reaching a place where improvement is a matter of optimizing\\nindividual\
    \ components, rather than the system as a whole. Elder care is the most\\nsalient context of use; it's important and involves\
    \ everything from big, strenuous\\n(but delicate) tasks, like physically helping someone move, to small precise\\nthings,\
    \ like preparing food.\\nPositional chemistry\\nPossibilities\\nI'll stand on the shoulders of some giants:\\nUp to now,\
    \ we have been content to dig in the ground to find minerals.\\nWe heat them and we do things on a large scale with them,\
    \ and we\\nhope to get a pure substance with just so much impurity, and so on. But\\nwe must always accept some atomic\
    \ arrangement that nature gives us.\\nWe haven't got anything, say, with a \\\"checkerboard\\\" arrangement, with\\nthe\
    \ impurity atoms exactly arranged 1,000 angstroms apart, or in some\\nother particular pattern.\\nWhat could we do with\
    \ layered structures with just the right layers?\\nWhat would the properties of materials be if we could really arrange\\\
    nthe atoms the way we want them? They would be very interesting to\\ninvestigate theoretically. I can't see exactly what\
    \ would happen, but I\\ncan hardly doubt that when we have some control of the arrangement of\\nthings on a small scale\
    \ we will get an enormously greater range of\\npossible properties that substances can have, and of different things\\\
    nthat we can do.\\nConsider, for example, a piece of material in which we make little coils\\nand condensers (or their\
    \ solid state analogs) 1,000 or 10,000 angstroms\\nin a circuit, one right next to the other, over a large area, with\
    \ little\\nSee \\\" The density of remaining nerve endings\\nin human skin with and without postherpetic\\nneuralgia after\
    \ shingles 00481-4).\\\"\\n138.\\nSee \\\"The BioTac - Multimodal Tactile\\nSensor.\\\"\\n139.\"\n  },\n  {\n    \"name\"\
    : \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\\
    n54/61\\n\\nantennas sticking out at the other end \\u2013 a whole series of circuits. Is it\\npossible, for example,\
    \ to emit light from a whole set of antennas, like\\nwe emit radio waves from an organized set of antennas to beam the\\\
    nradio programs to Europe? The same thing would be to beam the light\\nout in a definite direction with very high intensity.\
    \ (Perhaps such a\\nbeam is not very useful technically or economically.)\\n...\\nBut it is interesting that it would\
    \ be, in principle, possible (I think) for\\na physicist to synthesize any chemical substance that the chemist\\nwrites\
    \ down. Give the orders and the physicist synthesizes it. How? Put\\nthe atoms down where the chemist says, and so you\
    \ make the\\nsubstance. The problems of chemistry and biology can be greatly\\nhelped if our ability to see what we are\
    \ doing, and to do things on an\\natomic level, is ultimately developed \\u2013 a development which I think\\ncannot be\
    \ avoided.\\n\\u2014Richard Feynman, \\\" There's Plenty of Room at the Bottom \\\"\\nA short summary of what molecular\
    \ nanotechnology will mean is\\nthorough and inexpensive control of the structure of matter. Pollution,\\nphysical disease,\
    \ and material poverty all stem from poor control of the\\nstructure of matter. Strip mines, clear-cutting, refineries,\
    \ paper mills,\\nand oil wells are some of the crude, twentieth-century technologies\\nthat will be replaced. Dental drills\
    \ and toxic chemotherapies are others.\\n\\u2014K. Eric Drexler, Unbounding the Future\\nIn short, successful positional\
    \ chemistry would allow us to turn the\\narrangement of atoms from an indirect, stochastic process to a direct, designed\\\
    nprocess. Biology already does this \\u2014 you could think of the relationship between\\npositional chemistry and biological\
    \ processes, like the action of ribosomes or\\nkinesin, as similar to the relationship between aircraft and birds. Unfortunately\\\
    nwe're still lashing wings to our arms and jumping off churches.\\nChallenges\\nYou would need an entire book to do justice\
    \ to the challenges facing anyone\\nwho wants to make the Feynman/Drexler vision a reality. However, it boils down\\nto\
    \ the fact that atoms aren't just little balls you can stick to one another. The\\natomic-scale world effectively has\
    \ a different set of rules and demands almost\\nentirely new engineering paradigms.\\nThe world on the scale of atoms\
    \ works very differently than our macro-world.\\n(As an intuition pump, a carbon atom is ~0.3nm across, a water molecule\
    \ is\\n~0.27nm, and DNA is ~2nm wide.) Gravity doesn't matter, everything is floppy\\nand constantly jiggling, and quantum\
    \ effects are a going concern. Some people\\nargue 140 that these attributes make it\\nimpossible to do anything at this\
    \ scale\\nbesides \\\"stochastic building\\\" \\u2014\\neffectively putting a bunch of ingredients together, shaking,\
    \ and counting on\\ntheir properties to direct the process and output. While I'm optimistic that the\\nproperties of the\
    \ nanoscale world don't make positional chemistry impossible, it\\nwill require drastically new ways of doing engineering.\\\
    nI'll use the example of a DNA \\\"3D printer\\\" to illustrate some more general\\nchallenges in positional chemistry.\
    \  274 Imagine a DNA-based protein 3D\\nprinter/pick-and-place-machine \\u2014 a precisely positioned write head that\
    \ can\\npick up and exactly place prefabricated proteins on a work surface. At some\\npoint, any positional chemistry\
    \ system needs to interface between stochastic\\nprocesses and more deterministic ones at the same scale. The printer\
    \ might need\\nto change \\\"tools\\\" (antibody-like proteins?) by flowing a high-concentration\\nsolution of the new\
    \ tools over the device. These tools will be constrained (for a\\nlong time) by the necessity to be fabricate them through\
    \ traditional methods \\u2014\\nputting stuff in a tube and shaking. The same goes for the protein \\\"Lego bricks\\\"\
    \\nthat the printer is arranging. The bricks will need to fold the good old-fashioned\\nway, so they'll be limited by\
    \ the shapes and capabilities of amino acids (which,\\nluckily, are provably capable of creating everything from bone\
    \ to wood and shell).\\nThe upshot is that this will in no way be a \\\"universal matter printer.\\\"\\nThese constraints\
    \ will cascade up to what you can build and the steps that you\\nneed to take to build it in ways that traditional engineering\
    \ has no good way of\\nwrapping its collective mind around. To make things even harder, the traditional\\nengineering\
    \ tools of models and simulations basically need to be reinvented for\\nthis new world. While the topics themselves still\
    \ matter just as much (or more!),\\nyou would need to throw out your college textbooks on thermodynamics, statics,\\nand\
    \ dynamics. Great progress has been made on simulating processes on the\\nnanoscale, but there is a lot of work to be\
    \ done both on making the simulations\\nmore versatile and on using them as engineering tools.\\nAnd how do you know that\
    \ your simulations were accurate? Observability is a\\nchallenge both for model development and for positional chemistry\
    \ in general.\\nUnlike a macro-scale system, you usually can't just look at a nanoscale system\\nand see whether it looks\
    \ like you expect it to based on the model. While scanning\\nelectron microscopes, atomic force microscopes, X-ray crystallography,\
    \ and other\\ntools make the nanoscale world not entirely inaccessible, they're severely limited\\nin the conditions they\
    \ can observe, and the data they produce often requires\\ninterpretation. In many situations, you're limited to observing\
    \ secondary effects\\nto tell you whether things are working the way you expect. These indirect\\nobservations make it\
    \ harder to do failure analysis and increase the length of\\nfeedback loops, which is yet another challenge.\\nYou also\
    \ need to tell the printer what to do! Unlike a macro-scale printer, you\\ncan't just hook up some wires to a stepper\
    \ motor or turn a crank on a mill.\\nInstead, the current toolkit is limited to some combination of light, chemical\\\
    ngradients, and \\\"preprogrammed\\\" cascading reactions.\\nA meta-challenge is that there isn't a clear \\\"best system\\\
    \" for achieving\\npositional chemistry. I've been using a DNA-based 3D printer as an example, but\\nmaybe the printer\
    \ should be built out of proteins, DNA-cast metal, or implosion\\nfabricated materials. Or the 3D-printer approach might\
    \ be the incorrect first\\nstep. An entirely different but potentially exciting approach is to embed\\nmolecular motors\
    \ and switches in a metal-organic framework scaffolding with\\nthe whole system acting as a tiny \\\"assembly line,\\\"\
    \ with each step adding or\\nchanging the ultimate product. Each approach has its own specialists and\\nadvocates. Maybe\
    \ the most effective approach involves some of all of them. It's a\\ncomplex systems-engineering question that doesn't\
    \ yet allow you to abstract\\nthings into black boxes in the way that systems engineers like to operate.\\nArguably, the\
    \ biggest meta-challenge is the human one. Everything that I've\\nmentioned so far is primarily in the domain of people\
    \ who are part of academic\\nchemistry or biology departments. Novelty and papers are strong incentives for\\nthem. The\
    \ answer to the question \\\"This work is excellent \\u2014 how do you think it\\ncould be integrated into a bigger system?\\\
    \" is often \\\"No clue. Not my\\ndepartment.\\\" As we've discussed, novelty and papers are not bad, but they can be\\\
    nat odds with engineering design. In addition to being fragmented across\\ndifferent academic disciplines, this entire\
    \ area is heavily stained with what I\\nwould call \\\"hype-fallout.\\\" During the '90s, people became very excited about\
    \ the\\npossibilities of \\\"nanotechnology.\\\" As a result, the government started pouring\\nmoney into the area in\
    \ part by pulling funding from other areas. This funding\\nshift pushed anybody who was doing anything remotely related\
    \ to processes that\\noccurred on the scale of ~1nm to relabel their work as nanotechnology, diluting\\nthe term and blunting\
    \ progress toward \\\"atomically precise manufacturing\\\" \\u2014\\nanother radioactive term. Combine discipline dilution\
    \ with overpromises and a\\nhealthy dose of crankery and the modern hesitance to take positional chemistry\\nas an engineering\
    \ problem seriously is entirely reasonable.\\nActions\\nIn the near term, a PARPA program could set out to answer the\
    \ question, \\\"Is it\\npossible to build a system that does positional chemistry?\\\" Or perhaps more\\naggressively,\
    \ \\\"Is it possible to build a system that does reconfigurable positional\\nSee the Drexler-Smalley debate for strong\\\
    narguments against positional chemistry.\\n140.\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting\
    \ the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n55/61\\n\\nchemistry?\\\" The initial\
    \ steps would be to fund a number of parallel efforts with\\nthe explicit intention of figuring out how to integrate them\
    \ should they prove\\npromising. Despite the grim picture, the challenges paint there are some reasons\\nto be hopeful.\
    \ In the past decade, there's been an explosion of tools and\\ntechniques to design and fabricate roughly deterministic\
    \ structures out of\\nbiological materials \\u2014 especially DNA \\u2014 and do useful things with them. There\\nare\
    \ many new ways to simulate and synthesize useful proteins. This work might\\nprovide a jumping-off point for positional\
    \ chemistry.\\nA non-exclusive list of parallel efforts might look like:\\nA project to develop precise actuators for\
    \ a DNA-based printer. Perhaps an\\nexpansion on William Shih's work. 141\\nA project to develop protein building\\nblocks\
    \ (probably based on coiled-coil proteins 142 1. that could be used in a\\nDNA-based printer.\\nA project to simulate\
    \ the protein\\nbuilding blocks using machine\\nlearning \\u2014 perhaps a system that uses something like AlphaFold in\
    \ a\\nreinforcement loop.\\nA project to simulate what could be built with the protein building blocks.\\nA project to\
    \ develop different \\\"tooling\\\" for the 3D printer \\u2014 perhaps\\nstructures derived from antibodies that have\
    \ a similar ability to bind to specific\\nsites on the protein building blocks.\\nA project to develop artificial amino\
    \ acids that could be part of the building\\nblocks and bring non-organic molecules into the system's output.\\nA project\
    \ to poke at how Metal-Organic Frameworks 143 might play with the\\nother projects.\\nA project to look at how DNA/protein\\\
    nmetal \\\"casting\\\" 144 might play with\\nthe other projects.\\nA theory which is not refutable by any conceivable\
    \ event is non-\\nscientific.\\n\\u2014Karl Popper, \\\"Science as Falsification\\\"\\nThe ideas I've laid out are not\
    \ scientific, but it's still important to ask, \\\"How\\nwill we know that there is merit to these ideas? What evidence\
    \ would suggest\\nthat they're wrong?\\\" It's tricky because any outcome will doubtless have many\\ncauses. Complicating\
    \ things further is the fact that it's not always clear whether\\nan outcome counts as a success or a failure \\u2014\
    \ does dying in the process of killing\\nthe minotaur count as success or failure? Grappling with these questions\\nexplicitly\
    \ before the fact is unusual but can hopefully be a bit of a golden thread\\n\\u2014 giving us a sense of when we're moving\
    \ in the right direction or straying into a\\ntrap. I hope that this exercise also enables PARPA to be a useful case study,\\\
    nregardless of its outcome.\\nOrganizational failure scenarios are absurdly contingent, especially when\\ntraversing less-trodden\
    \ paths in obscure mazes. Sometimes it's not a monster\\nthat gets the hero but a random falling stalactite. The potentially\
    \ large effects of\\nsmall, unanticipated factors is a big reason for this entire piece, and this section\\nin particular;\
    \ it's important to record hypotheses and how they evolve over time\\nbefore narrative-building inevitably kicks in around\
    \ either success or failure.\\nObviously, there are many unknown unknowns, but if I've done a reasonable job,\\nthis section\
    \ covers most possible scenarios.\\nHints of success\\nPARPA's long-run success looks like being a contingent cause of\
    \ humanity\\nbecoming more awesome. Admittedly, it's hard to get more nebulous, long term,\\nand debatable than that.\
    \ Instead of a well-defined success condition, it's probably\\nmore useful to paint several concrete and shorter-term\
    \ possibilities that would\\nsuggest that we're moving in the direction of success.\\nUncomfortably, any one of these\
    \ success indicators in isolation probably does\\nnot point toward broader success. However, it is important to list them\
    \ in an\\nattempt to minimize either positive or negative hindsight bias. Looking at\\norganizations in hindsight is generally\
    \ just narrative-building full of both too\\nmuch \\\"Well, this was actually a success because...\\\" and too much \\\
    \"That didn't\\nreally do anything...\\\" So, while any isolated item on this list doesn't count as\\nsuccess, together\
    \ they're directionally suggestive: The more boxes the\\norganization can check off, the more it will look like a success.\\\
    nShift ideas from outlandish to mundane . Technological paradigm shifts don't\\ncome out of the blue. They are usually\
    \ preceded by shifting Overton windows\\naround what is impossible, what is feasible, and what is expected. These\\nopinion\
    \ shifts aren't necessarily causal, so shifting opinion should not be a\\ngoal in and of itself but could be a useful\
    \ leading indicator of doing good work.\\n279\\nProduce useful ideas or artifacts that other organizations pick up and\
    \ run with .\\nCreating convincing programs, prototypes, or system-seeds that other\\norganizations pick up and run with\
    \ is absolutely a leading success indicator.\\nAndy Matuschak put it well: The goal is \\\"developing ideas far enough\
    \ that they\\nbecome \\\"obvious,\\\" the banal fodder for half a dozen companies in a future YC\\nbatch.\\\" 145 There\
    \ are traps to be aware\\nof here as well \\u2014 in the same way that\\nan acquired company's product is\\noften quietly\
    \ shut down, it's a real possibility that other organizations can\\nclaim to be pushing ideas or technology forward while\
    \ quietly smothering or\\ncompletely mangling it.\\nCreate a large impact in a small niche . On the scale of a few years,\
    \ it's impossible\\nto create unambiguously impactful innovations. Non-digital dissemination is\\nalways slower than you\
    \ expect. However, it may be feasible to create big\\noutcomes among a small group of people \\u2014 perhaps a research\
    \ domain or a\\nspecific set of practitioners.\\nThe last two success indicators are perhaps not leading indicators but\\\
    n\\\"alternative win conditions.'\\nServe as a jumping-off point for eventually extremely impactful people. History is\
    \ full\\nof largely forgotten \\\"sceniuses\\\" 146\\nthat quietly lie in the pasts of an\\nuncanny number of impactful\
    \ individuals. Creating even a short-lived scenius,\\nlike the Rad Lab or Willow Garage, would be a worthy result.\\nIn\
    \ death, serve as an inspiration for similar models . A single organization can't fill\\nall the gaps in the innovation\
    \ ecosystem, so generating lessons and impetus for\\nother organizations is an actual win (as opposed to a bitter consolation\
    \ prize).\\nOf course, it's hard to be inspirational when you haven't produced anything of\\nnote. Shooting for inspiration\
    \ without more tangible outcomes is the path of\\npeople who have \\\"visionary\\\" on their business cards. So while\
    \ it's possible for\\nthe organization to die prematurely, it still needs other successes.\\nLongevity and notoriety are\
    \ not success indicators\\nThe ambiguity between success and failure is compounded by organizational\\nlongevity. Any\
    \ innovation organization that survives long enough will usually end\\nup with one or two wins to its name. I wouldn't\
    \ call the NSF and NIH shining\\nexamples of success, but they have supported many paradigm shifts and Nobel\\nPrizes.\
    \ I would argue that they achieved these wins through their sheer size and\\nlongevity. Perhaps there's a useful efficiency\
    \ metric like \\\"Nobel Prizes per\\ndollar,\\\" but I have no clue what it is. The paired realities that solutions R&D\\\
    ndoesn't lend itself to Nobel Prizes and the number of intermediate steps and\\ndifferent actors to get to a clear win\
    \ makes an efficiency metric hard.\\nThere is something to be said for simply surviving long enough to find the\\nright\
    \ project or hop on the right S-curve. Innovation organizations can take a\\nlong time to hit their stride. Bell Labs\
    \ didn't start producing the work we laud\\nthem for today until more than a decade after the labs were founded. If for\
    \ some\\nreason they had closed their doors in 1935 (10 years after it was started), they\\nwould be barely a blip on\
    \ the historical radar. Similarly, ARPA's first programs\\nwere at the time critical but now forgettable, pursuing questions\
    \ like \\\"Can we\\nstop a missile strike by exploding a nuclear device in the upper atmosphere?\\\"\\nThe ambiguity around\
    \ intermediate organizations\\\" impact and the legitimate\\nvalue of longevity make it easy to tell yourself and the\
    \ world that you're building\\nup to something great while in fact you will just limp along forever. There are\\nmany\
    \ organizations we can both think of that have done this.\\nFor PARPA, raw survival is not success. One could imagine\
    \ us surviving for\\nmore than a decade, putting out white-papers perhaps backed up by little proof-\\nof-concept experiments\
    \ without any significant impact. Even if PARPA becomes\\nwell known, notoriety doesn't count as success unless it stems\
    \ from enabling\\noutputs that wouldn't have happened otherwise or serving as a direct model for\\nSee \\\" DNA Strand\
    \ Displacement-Driven\\nDNA Origami Tools and Materials .\\\"\\nSee \\\" Design of a single-chain polypeptide\\ntetrahedron\
    \ assembled from coiled-coil\\nsegments .\\\"\\nSee \\\" Ultrafast rotation in an amphidynamic\\ncrystalline metal organic\
    \ framework .\\\"\\nSee \\\" Casting inorganic structures with\\nDNA molds. \\\"\\nReasons why PARPA would succeed or\
    \ fail\\nSee \\\" Reflections on 2020 as an independent\\nresearcher .\\\"\\n145.\\nSee \\\" Scenius, or Communal Genius\
    \ .\\\"\\n146.\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n    \"text\": \"Shifting the impossible to the inevitable\\\
    nhttps://blog.benjaminreinhardt.com/parpa\\n56/61\\n\\nother people to do that work. At the same time, even if it produces\
    \ impressive\\noutputs, it's a failure if PARPA winds up effectively indistinguishable from a\\nconsulting firm, a government\
    \ contractor, a startups studio, or other possibilities.\\nI realize this is a high bar.\\nWhat would failure look like\
    \ and why would it happen?\\nThe line between success and failure is more nebulous than we'd like to admit.\\nThere's\
    \ an obvious difference between abject failure and clear success, but a rich\\nspectrum lies between them. This ambiguity\
    \ is especially prominent for\\norganizations like PARPA that play intermediate roles in the relay race of turning\\nideas\
    \ into impactful things in the world. We stand on the shoulders of too many\\ngiants to give them all credit.\\nPrecise\
    \ visions of failure are important because post-hoc success can be woven\\ninto a failure narrative and failure can be\
    \ woven into a success narrative. Some\\norganizations fail to achieve their explicit goals but should go in the success\\\
    ncolumn. Taylor-era PARC  282 and Willow Garage were not particularly long lived\\n(12 and seven years respectively) nor\
    \ did they live up to the expectations of their\\ncreators. However, they ultimately spawned a group of people and projects\
    \ that\\nhad and continue to have a long-term effect. ROS provides the backbone for most\\nmodern robotics research, and\
    \ you're probably reading this on something that\\ncan trace its intellectual lineage back to PARC. On the other side\
    \ of the coin,\\nthere is also a class of organizations that have lasted for decades. You could easily\\nweave them into\
    \ a success narrative, but they somehow smell \\\"off,\\\" like\\nsomething that should have been tossed out long ago.\
    \ And of course there's\\neverything in between.\\nSpecific failure scenarios\\nThe two clear-cut failure scenarios are\
    \ a failure to launch and dying before\\ndoing anything useful. As discussed above, a more insidious scenario is\\nbecoming\
    \ a \\\"zombie\\\" organization \\u2014 consuming money and mindshare (and\\nperhaps even thinking we're a live player)\
    \ while ultimately going nowhere.\\nBelow, I will dig into the reasons why those things might happen. Teasing out\\nhow\
    \ one would know that one has fallen into a particular failure mode is more\\nimportant than enumerating failure modes.\
    \ I will take a stab at answering \\\"How\\nwill we know how we failed?\\\" but you should consider it an open question.\\\
    nFailure modes fall into two buckets \\u2014 one set of failures apply to DARPA-riffs\\nin general, and the other set\
    \ applies specifically to PARPA. It's important\\ndistinguish between these two categories because I don't want PARPA's\
    \ failure to\\ncondemn the idea of riffing on DARPA as a whole, but at the same time, it's\\nfoolish to cling to a failed\
    \ theory.\\nWhy would riffing on DARPA be a bad idea?\\nStructure doesn't actually matter\\nInstitutional structure could\
    \ be much less important to an organization's\\nability to enable new things than I've argued for . Instead of structure,\
    \ the factors\\nthat determine the activities an organization can do well could depend almost\\nexclusively on its particulars\
    \ \\u2014 its leaders, its funders, its employees, its time and\\nplace. It could also be that structure does matter,\
    \ but that focusing on DARPA is\\nzooming in on the entirely wrong place on the map.\\nThe current ecosystem has no unfilled\
    \ niches\\nOne of the core premises behind riffing on DARPA is the assertion that\\noverlapping institutional constraints\
    \ rule out several classes of creative work ,\\nand therefore we need new institutional structures to fill the role that\
    \ industrial\\nlabs once occupied. This could be wrong! It could be that enabling most\\nphysically possible technology\
    \ just takes more people like Elon Musk threading\\nneedles with the institutional structures we already have. More broadly,\
    \ this\\nwould mean that existing institutional structures have fewer structural\\nconstraints than it seems like they\
    \ do.\\nA DARPA-riff is unable to institutionally decouple from papers or profit\\nA DARPA-riff might inevitably be coupled\
    \ to other institutions in a way that\\nprevents it from having significantly different constraints. Any DARPA-riff will\\\
    ninevitably need to work with academia for early-stage research and profit-\\nfocused companies to diffuse technology.\
    \ It could be impossible to both work\\nwith these other organizations and stand apart from their incentives, slowly but\\\
    ninexorably being pulled to publish or profit.\\nDARPA-riffs need government funding\\nThe hypothesis that 21st-century\
    \ riffs on DARPA should be private could be\\nwrong, and it's impossible for a DARPA-riff to succeed without government\"\
    \n  },\n  {\n    \"name\": \"funding. Perhaps the Department of Defense (and maybe the Department of\",\n    \"text\"\
    : \"Homeland Security) is the only place where massive budgets are sufficiently\\naligned with outputs that don't necessarily\
    \ generate papers or profits. One could\\nargue that governments are the only institutions that have the time scale (the\
    \ US\\ngovernment is a relatively young 245) and scope (GDP) to capture the value from\\nlong-term, high-uncertainty programs.\\\
    nCoordinated programs are bunk\\nIt could be that DARPA-style programs are a holdover from the Cold War that\\ndon't actually\
    \ help innovations exist. In our world of shared documents, agile\\ndevelopment, and cloud labs, the payoffs for research\
    \ management could have\\ndecreased significantly. Instead of trying to direct research work toward a goal,\\nthe correct\
    \ strategy in all domains might just be, \\\"Give good people money and\\nlet them rip!\\\"\\nWhy would PARPA in particular\
    \ be unsuccessful?\\nSize\\nWe could fail because a small new institution wouldn't be able to move the\\nneedle. We're\
    \ working off of the hypothesis that it is important for big things to\\nstart small, but perhaps a successful DARPA-riff\
    \ needs to start big. Size could be\\na failure mode either because to succeed we actually need to start big or because\\\
    norganization fails to grow (for one of many reasons) and fails to hit the critical\\nmass of programs necessary for a\
    \ DARPA-like portfolio.\\nWorking on the wrong things\\nPARPA could fail to work on the \\\"right\\\" programs. A causal\
    \ factor (probably\\npeople) could make us consistently bad at designing or picking programs. We\\ncould also fall into\
    \ a trap of working on things that are \\\"easy\\\" instead of \\\"right\\\"\\n\\u2014 an easy program might fit nicely\
    \ into a budget, be part of a hype wave, or just\\nrequire convincing fewer people.\\nThis trap is insidious because research\
    \ has a halting problem \\u2014 you can never\\nbe sure that a project won't produce something amazing after dragging\
    \ on for a\\nlong time. This goes for the organization as a whole. However, at some point,\\neven if you have faith in\
    \ the general DARPA-riff model, it will make sense to kill\\nPARPA after too many failures. It may be impossible to know\
    \ if it's sheer bad\\nluck or something systemic.\\nPath dependence\\nWorking on the right things in the wrong order could\
    \ also lead to failure. If\\nthere is fundamental uncertainty about how a program will turn out, you can end\\nup getting\
    \ a whole bunch of duds in a row. HHTTTT and TTTTHH have the\\nsame failure rate, but a string of early successes could\
    \ buy enough trust that\\npeople could roll with a string of failures while a string of early failures could kill\\nthe\
    \ organization before it has a chance to get to the successes.\\nPeople\\nIt could just be that I am the wrong person\
    \ to do this. I bring neither\\nexperience managing coordinated research programs nor capital to the table. I\\ncould\
    \ be insufficiently charismatic or outgoing to convince the right people to\\nbuy into the project before it has demonstrated\
    \ success and has its own\\nmomentum. I can try to mitigate this by working with other people, but those\\npeople need\
    \ to be convinced as well. It could be that there is a group of people\\nwith whom the idea would work, but they end up\
    \ not being available at the right\\ntime. Perhaps they will read this in the future and succeed where I fail. That\\\
    nwould be a good outcome.\\nWe end our exploration of PARPA's idea maze at last.\\nThe maze exists in the first place\
    \ because constraints on existing institutions\\nhave created a gap in the innovation ecosystem. Solutions R&D was once\
    \ the\\npurview of industrial labs, but no longer. Shifts in both technology and how\\ncompanies work mean that we can't\
    \ expect Bell Labs\\\" successor to look anything\\nlike Bell Labs. Nor can we count on the two institutions we've defaulted\
    \ to in the\\n21st century. Solutions R&D's tense mix of pragmatic application focus and\\npiddling around is too researchy\
    \ for startups and too engineering-heavy for\\nacademia. So, with a respectful hat-tip to Chesterton's Fence, we need\
    \ something\\nnew.\\nIt's impossible to know the true layout of the idea maze before traversing it,\\nbut we can make\
    \ many hypotheses about its twists and turns. While we could\\nstart from absolute scratch, it's worthwhile to pay attention\
    \ to the solutions R&D\\nheroes of yore \\u2014 we can't follow in Bell Labs\\\" footsteps, but it might be possible\\\
    nto follow in DARPA's. There are many junctures that anybody building a DARPA-\\nriff will need to consider: experiments,\
    \ program managers, time scales, sales\\nchannels, missions, and more. Perhaps the thorniest question we'll all need to\\\
    nface is, \\\"How does money work?\\\" Unfortunately, if you draw a box around all the\\nactivities in impactful solutions\
    \ R&D, it's probably not a profitable venture (value\\ncreation and value capture are, alas, not always the same). However,\
    \ there are\\nShifting technology from impossible to inevitable\"\n  },\n  {\n    \"name\": \"/28/25, 11:59 PM\",\n  \
    \  \"text\": \"Shifting the impossible to the inevitable\\nhttps://blog.benjaminreinhardt.com/parpa\\n57/61\\n\\nplenty\
    \ of strategies that a DARPA-riff can use to get enough money to continue\\nthrough the maze!\\nFinally, I want to propose\
    \ a specific path through the maze \\u2014 PARPA. We can\\nlook at PARPA's  283 potential path through the idea maze as\
    \ a sequence of\\nhypotheses \\u2014 junctures that decrease your risk of failing for each one you\\nsuccessfully pass.\
    \ Bundled together, PARPA's path through the maze looks like:\"\n  },\n  {\n    \"name\": \"Create and stress-test unintuitive\
    \ research programs in a systematic (and\",\n    \"text\": \"therefore repeatable) way.\"\n  },\n  {\n    \"name\": \"\
    Use that credibility to run a handful of research programs and produce\",\n    \"text\": \"\"\n  },\n  {\n    \"name\"\
    : \"results that wouldn't happen otherwise\",\n    \"text\": \"\"\n  },\n  {\n    \"name\": \"Use that credibility to\
    \ run more research programs and help them\",\n    \"text\": \"\\\"graduate\\\" to effective next steps.\"\n  },\n  {\n\
    \    \"name\": \"Make the entire cycle eventually-autocatalytic by plowing windfalls into an\",\n    \"text\": \"endowment.\\\
    nEach of the first three steps roughly corresponds to a sequence of\\norganizational \\\"forms\\\" that PARPA will evolve\
    \ along as it validates hypotheses (or\\ninvalidates them and has to figure out new ones).\\nAny idea maze is fraught\
    \ with danger \\u2014 many who enter do not survive, and\\nmany who survive make it through by the skin of their teeth\
    \ without real success.\\nThere are many ways that PARPA can both succeed and fail; it's important to\\nacknowledge this\
    \ before setting out so that the journey is not just about its\\noutcome but can help other people traverse the same or\
    \ similar mazes.\\nI hope to have convinced you of several points:\\nIt's possible to create technology that expands human\
    \ capability and wonder.\\nCreating this technology requires (among other things!) a set of activities that\\nform a solutions\
    \ R&D niche in the innovation ecosystem.\\nBuilt-in constraints prevent modern corporate R&D, academia, and startups\\\
    nfrom doing a good job at filling the solutions R&D niche.\\nA significant chunk of these constraints has to do with the\
    \ fact that while\\nprofit is important, value capture can hamstring a lot of solutions R&D work.\\nWe need to try new\
    \ organizational and legal models to do good work that is\\n\\\"too researchy for startups and too engineering-heavy for\
    \ academia.\\\"\\nDARPA is a good starting point for creating new organizational and legal\\nmodels to fill the solutions\
    \ R&D niche.\\n21st-century DARPA-riffs need to exist outside of 21st-century government\\nbureaucracies.\\nThere are\
    \ many ways to build a DARPA-riff.\\nThere is a set of things every DARPA-riff will need to consider, including PMs,\\\
    ntime scales, sales channels, missions, and, perhaps most importantly \\u2014 money.\\nThere are many ways that a DARPA-riff\
    \ can make money, each creating a set of\\nincentives and constraints.\\nOverall, a DARPA-riff that is doing unique work\
    \ will probably not be\\nprofitable, though a portion of it might be.\\nPart of a DARPA-riff's role is to act as a serious\
    \ context of use for experiments\\nin research management, for example, \\\"It might be possible to develop a\\ndiscipline\
    \ around program design.\\\"\\nA legal structure comprising a (big-N) Nonprofit and a C-corp will give PARPA\\nthe best\
    \ chance of success and avoiding incentive traps.\\nIf you think these are wrong, show it! Do great solutions R&D within\
    \ existing\\ninstitutions! Build a successor to Bell Labs! I like being right, but I would like\\nthose things more.\\\
    nIf, however, you think the ideas I've presented are plausible, let's put them into\\naction. There are so many things\
    \ to be done. You can put these ideas into\\npractice at an existing institution or use them to build a new institution\
    \ \\u2014 either\\na DARPA-riff or something entirely different. There are also many concrete ways\\nto help PARPA! Reach\
    \ out if you or someone you know would make an excellent\\nPM or otherwise want to put legwork into building the organization.\
    \ Send\\nprecise hunches about projects and people who could form the seed of a\\nprogram. Donate or invest. Or just send\
    \ this piece to someone who will\\nappreciate it.\\nTogether we can shift technology from impossible to inevitable .\\\
    nIdeas don't spring out of a single brain, and this piece is no different.\\nMany excellent people read and helped refine\
    \ early drafts: Adam Marblestone,\\nJed McCaleb, Pamela Vagata, Andy Matuschak, Mark McGranaghan, Jos\\u00e9 Luis\\nRic\\\
    u00f3n, Cheryl Reinhardt, Sam Arbesman, Michael Nielsen, Nathan Ihara, Martin\\nPermin, Luke Constable, Arnaud Schenk.\\\
    nWe stand on the shoulders of too many giants to give them all credit, but to list\\na few who helped me grope through\
    \ the idea maze: Marissa Weichman, Ilan Gur,\\nSemon Rezchikov, Tim Hwang, Jeff Graham, Arati Prabhakar, Patrick Collison,\\\
    nMalcolm Handley, Olivia Wang, Noah Tye, Rebecca Li, Steven Glinert, Keegan\\nMcNamara, Michael Filler, Matt Clifford,\
    \ Adrienne Little, Peter van Hardenberg,\\nJosh Tobin, Cameron Kelly, Evan Miyazono, Jeff Lipton, Lee Ricketson, Adit\\\
    nSwarup, Alexey Guzey, Sebastian Winther, Luke Durant, Rachel Zucker, and\\nVictoria Chen.\\nThe styling and interface\
