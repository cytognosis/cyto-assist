  sections: "[\n  {\n    \"name\": \"JANUARY 2026 Science\",\n    \"text\": \"\"\n  },\n  {\n    \"name\": \"NEWS\",\n   \
    \ \"text\": \"\"\n  },\n  {\n    \"name\": \"PHOTO: NEW YORK PUBLIC LIBRARY/SCIENCE SOURCE\",\n    \"text\": \"I\\nn November\
    \ 2025, yet another\\nbillionaire-backed Silicon Valley\\ncompany emerged. With a post on\\nSubstack, tech journalist\
    \ Ashlee\\nVance announced the existence of\\nEpisteme, a company spun up with an\\nundisclosed amount of money from Sam\\\
    nAltman, CEO of OpenAI, and Masayoshi\\nSon, CEO of SoftBank. It doesn\\u2019t have\\nany products yet, or even a focused\
    \ line\\nof business\\u2014just a kitted-out lab space\\nin San Francisco to support 15 scientists\\nfollowing their curiosity\
    \ in fields from\\nartificial intelligence to biotech, with no\\nneed to worry about grant proposals or\\njournal articles.\\\
    nCEO Louis Andre is confident the\\ngamble will pay off. He thinks world-\\nchanging, profitable ideas can emerge\\nfrom\
    \ basic research, as long as scientists\\nare freed up from hassles. \\u201cProfit should\\nbe a byproduct,\\u201d says\
    \ Andre, a startup\\nveteran with a background in neuro-\\nscience and computer science. He says\\nhe founded Episteme\
    \ after a series of\\nconversations with Altman. \\u201cThe main\\nfocus should be impact. When you do\\ngreat science,\
    \ commercialization op-\\nportunities will emerge.\\u201d\\nWinning grants from public funders\\nhas long been a slog\
    \ through slow, risk-\\naverse bureaucracies. It\\u2019s easy to see the\\nappeal of Episteme, which is modeled\\non the\
    \ big-money corporate labs of yore,\\nlike Bell Laboratories and Xerox PARC.\\nAndre says he is picking people for their\\\
    n\\u201ctheory of change\\u201d rather than their\\nscience. \\u201cIf an idea fails, that\\u2019s OK, and\\nyou should\
    \ give space for a researcher to\\npivot,\\u201d he says. Episteme will determine\\nintellectual property rights and owner-\\\
    nship of spun-out startups case by case.\\nIt all sounds utopian. But the recent\\nhistory of deep-pocketed benefactors\\\
    ntrying to disrupt research funding with\\nan insistence on startup-like speed is\\ncheckered. For example, at the height\
    \ of\\nthe COVID-19 pandemic, economist\\nTyler Cowen and Stripe co-founder\\nPatrick Collison introduced a $50 mil-\\\
    nlion \\u201cfast grants\\u201d program to award\\nrapid-turnaround grants in the hopes of\\nstimulating pandemic science.\
    \ Some re-\\nsulted in publications, but none yielded\\nlifesaving insights such as dexametha-\\nsone or messenger RNA\
    \ vaccines. And in\\n2024, a flock of billionaires spent\\n$500 million to found Boston-based\\nArena BioWorks, hiring\
    \ big-deal scien-\\ntists at seven-figure salaries to develop\\ndrugs. It folded late last year.\\nOne reason private\
    \ funding often hits\\nspeedbumps, says Pae Wu, chief technol-\\nogy officer of the biotech incubator\\nIndieBio, is that\
    \ the curiosity-driven\\nbasic research it looks to profit from is\\nslow to pay off. \\u201cThere are activities that\\\
    nare not profit seeking which are soci-\\netally important, strategically important,\\nand do not drive maximal shareholder\\\
    nvalue. And those are the things that are\\nthe domain of the government,\\u201d Wu says.\\nThat\\u2019s not to say researchers\
    \ in both\\nworlds can\\u2019t work at crossing the so-\\ncalled \\u201cvalley of death\\u201d: plucking good\\nideas\
    \ from basic research and develop-\\ning them into commercial products.\\nThat\\u2019s one reason why Wu says IndieBio\\\
    nmaintains a fully equipped wet lab in its\\noffices\\u2014to prove out promising ideas.\\nIn fact, studies show public\
    \ support\\nof basic research eventually yields big-\\nger economic gains than private efforts\\ndo\\u2014measured not\
    \ just in gross domestic\\nproduct, but economic productivity, too.\\nBack in 2013, a team of economists from\\nStanford\
    \ University and the London\\nSchool of Economics found that public\\nand private R&D funding combined\\nyielded productivity\
    \ returns of about\\n55%, whereas private money alone led\\nto just a 21% increase. And a 2024 study\\nby Andrew Fieldhouse,\
    \ an economist at\\nTexas A&M University, found an even\\nbigger effect, putting overall productiv-\\nity returns from\
    \ public, nondefense R&D\"\n  },\n  {\n    \"name\": \"funding at a whopping 140% to 210%\",\n    \"text\": \"But those\
    \ gains take years or decades\\nto show up. Some 80% of the world\\u2019s\\nmost important drugs originated from\\npublicly\
    \ funded science, but with an\\naverage of 32 years between discovery\\nand drug, according to a 2018 study. And\\nno\
    \ one can ever tell which grant will\\nresult in a discovery, or which discovery\\nis going to break big.\\nThe Mad Men\\\
    u2013tinged nostalgia for\\ncorporate labs as bubbling cauldrons\\nof innovation may also be somewhat\\nmisplaced. It\\\
    u2019s true that in the 1950s,\\nmore than 80% of companies had\\nlabs, a figure that has declined ever\\nsince. However,\
    \ whereas giants such\\nas Bell Labs did transformational basic\\nresearch\\u2014stuff that led to the transistor,\\nthe\
    \ laser\\u2014most corporate labs de-\\nemphasized the R in R&D in favor of the\\nD, says Ashish Arora, an economist at\\\
    nDuke University. \\u201cThey were essentially\\nwhat you might think of as followers,\\u201d\\nhe says. \\u201cThey were\
    \ using scientific\\nresearch\\u2014they were not producing it.\\u201d\\nSo although nobody particularly cares\\nfor the\
    \ way research gets funded in the\\nUnited States today, nobody wants to\\nburn down the system, either. \\u201cIf [Epis-\\\
    nteme] can plug a hole in the current\\nfederal funding system and a hole in\\ncurrent private funding, that would be\\\
    na wonderful thing for the U.S. economy,\\u201d\\nFieldhouse says.\\nThat\\u2019s a lot of weight on Episteme\\u2019s\\\
    nmeager crew of 15 scientists. Andre says\\nhe plans to expand the operation to\\nother labs in other cities\\u2014presumably\\\
    ncontingent on its success and the will-\\ningness of backers like Altman to keep\\nopening their wallets. \\u201cIt\\\
    u2019s an ambitious\\nmission,\\u201d Andre says. \\u201cBut I\\u2019m always\\nappreciative of people trying to experi-\\\
    nment with novel models, because iterat-\\ning and doing is how we learn.\\u201d\\nAnd just maybe earn a profit. \\u0000Adam\
    \ Rogers is a science journalist based\\nin San Francisco.\"\n  },\n  {\n    \"name\": \"RESEARCH FUNDING\",\n    \"text\"\
    : \"Bell Labs 2.0? Silicon Valley bets on science\\nBillionaire-backed Episteme aims to free research from bureaucracy.\
    \ History shows that\\u2019s a tall task\"\n  },\n  {\n    \"name\": \"ADAM ROGERS\",\n    \"text\": \"One model for Episteme\
    \ is Bell Labs, where the\\ntransistor was invented in the late 1940s.\\nDownloaded from https://www.science.org at Massachusetts\
    \ Institute of Technology on January 26, 2026\"\n  }\n]"
