    n1/13\\n\\ncapacity to drive the work toward a common goal. It isn\\u2019t only about applying resources; it\\u2019s\\\
    nalso about creating the structures required to deploy those resources to facilitate such a\\nsynchronized effort. What\\\
    u2019s needed to achieve more breakthroughs faster are new ways of\\nworking that systematically stack the odds in favor\
    \ of success.\\nA case in point has been the development of mRNA vaccines\\u2014arguably one of the most\\nimportant scientific\
    \ breakthroughs of recent decades. The trauma and upheaval of the past\\ntwo years have laid bare how much work has to\
    \ be done in health, equity, and care for the\\nplanet. These years have also revealed the difference a single breakthrough\
    \ can make.\\nImportantly, the pivotal decisions and investments needed to advance mRNA technology and\\nshrink the vaccine\
    \ development process from years to months were not made at an expansive\\nfederal science agency like the National Institutes\
    \ of Health, in a global pharmaceutical\\nconglomerate like Pfizer, or even by a swashbuckling venture capital firm.\\\
    nWhat\\u2019s needed to achieve more breakthroughs faster are new ways of working that\\nsystematically stack the odds\
    \ in favor of success.\\nThe technology was seeded at a place purpose-built for breakthroughs: the relatively small\\\
    ngovernment agency called the Defense Advanced Research Projects Agency (DARPA),\\noperating with only 0.5% of the Department\
    \ of Defense budget and a staff of about 250\\npeople.\\nFew seem to remember the moment now. But we do, because we were\
    \ there. At the time, we\\nran DARPA for President Obama. It was one year after the H1N1 pandemic, and he was\\ndetermined\
    \ to make sure another pandemic wouldn\\u2019t catch America by surprise. Inspired by\\nthat, a clinical geneticist and\
    \ young DARPA program manager named Dan Wattendorf came to\\nus with two important questions:\\nWhat if a novel pathogen\
    \ causes a global pandemic that forces the world to stand still, and we can\\u2019t\\nwait years for a vaccine?\\nAnd\
    \ what if mRNA injected directly into the body to elicit vaccine-level antibody production could\\ndramatically shrink\
    \ the standard timeline for vaccine development?\\nIt was 2010, a year when the world was still reeling from a deep recession,\
    \ and most of the\\npublic and private sectors were unwilling to invest in such questions, much less make a bet on\\na\
    \ once-in-a-century pandemic. Moreover, there were many people in the scientific community\\nwho contended there was simply\
    \ no evidence it would work.\"\n  },\n  {\n    \"name\": \"/2/25, 2:33 PM\",\n    \"text\": \"Changing the Business of\
    \ Breakthroughs\\nhttps://issues.org/network-innovation-wellcome-leap-dugan-gabriel/\\n2/13\\n\\nWattendorf argued there\
    \ was no evidence that mRNA vaccines wouldn\\u2019t work and that if they\\ndid, someday it would matter. That day came\
    \ ten years later.\\nThese types of anticipatory decisions and investments are encouraged at DARPA, where\\nprograms are\
    \ designed to intersect what is possible\\u2014albeit perhaps not yet proven\\u2014with\\nwhat matters. By encouraging\
    \ such \\u201cwhat if\\u201d thinking, DARPA fosters exploration and the\\nsubsequent actions required to create breakthroughs\
    \ that provide new options.\\nWe greenlit the program, and work began that year. At the time, Moderna was in start-up\\\
    nmode with a handful of people, and other performers were brought in to start working on\\ndelivery and scaling in parallel.\
    \ Working all elements necessary to demonstrate a\\nbreakthrough is part of what DARPA does, because a demonstration at\
    \ a sufficiently\\nconvincing scale is what changes minds. Such programs must move quickly to generate a\\nsense of momentum,\
    \ be agile enough to enable collaboration across disciplines and\\norganizations, and work toward a goal that is bigger\
    \ than any one individual so as to unite all\\ninvolved in pushing past obstacles.\\nAlthough DARPA was designed specifically\
    \ to serve US strategic interests, we are convinced\\nthat its model can be retooled to increase the number and pace of\
    \ breakthroughs needed to\\naddress global challenges. Putting such an entity in place requires new approaches that go\\\
    nbeyond national borders, beyond the boundaries of basic vs. applied research, beyond the life\\nsciences vs. the physical\
    \ sciences, and, perhaps most critically, beyond public vs. private\"\n  },\n  {\n    \"name\": \"funding\",\n    \"text\"\
    : \"\"\n  },\n  {\n    \"name\": \"A MODEL THAT STACKS THE ODDS\",\n    \"text\": \"After the 1957 launch of the Soviet\
    \ satellite Sputnik, President Eisenhower created DARPA to\\nensure that the United States would never again be caught\
    \ unprepared by strategic surprise.\\nThe agency\\u2019s model was an expressly new structure devised to facilitate seemingly\
    \ impossible\\nbreakthroughs by providing the conditions that make such revolutionary advances possible.\\nNotably, the\
    \ enduring attributes of the DARPA model don\\u2019t guarantee a breakthrough; rather,\\nthey are designed to improve\
    \ the odds of getting one.\\nFirst, every program has an ambitious goal that is also testable and measurable, since it\
    \ must\\nbe possible to tell if the program succeeds or fails. Program goals articulate and focus on a\\nspecific new\
    \ capability or a specific problem that needs to be solved.\\nDARPA was designed specifically to serve US strategic interests,\
    \ but we are\\nconvinced that its model can be retooled to increase the number and pace of\"\n  },\n  {\n    \"name\"\
    : \"/2/25, 2:33 PM\",\n    \"text\": \"Changing the Business of Breakthroughs\\nhttps://issues.org/network-innovation-wellcome-leap-dugan-gabriel/\\\
    n3/13\\n\\nbreakthroughs needed to address global challenges.\\nThis clarity in the goal enables the second attribute:\
    \ a coordinated network of diverse,\\nmultidisciplinary teams from multiple organizations, all working together to solve\
    \ a problem\\nthey cannot solve alone. Importantly, it is rarely, if ever, true that all the expertise or all the\\nadvances\
    \ needed to achieve a breakthrough are resident in one laboratory or organization.\\nThis network, crucially, is not static,\
    \ but is agile and dynamic. Tasks change as progress is\\nmade or setbacks are encountered, and the team that set out\
    \ to reach the goal may not be the\\nteam that achieves it. This attention to network effects contrasts with more conventional\\\
    napproaches that tend to fund individuals or small teams working in isolation.\\nUnifying these temporary project teams\
    \ is a key responsibility for the program manager, who\\nis central to the whole process. Just as an agile, dynamic orchestra\
    \ of performers needs a\\nconductor, the program manager pushes, encourages, clears obstacles, and synchronizes the\\\
    nentire effort both scientifically and programmatically. Inputs from the team are important,\\nand collaboration is necessary,\
    \ but decisions are made by the program manager to avoid\\ngroupthink, conventional wisdom, and conservatism that could\
    \ stymie progress.\\nFinally, breakthroughs demand a sense of urgency, and a deadline provides it. DARPA projects\\nare\
    \ given three to five years to solve a problem or create a new capability. Such a timeline\\nsparks a shared and celebrated\
    \ impatience that forces the team to focus on the big advance\\nand edit away paths that might make modest progress but\
    \ fail to achieve the goal. In a three-\\nyear program, if two weeks go by without progress, you\\u2019ve already lost\
    \ 1% of your time. That\\nexigency tends to make people intolerant of unnecessary delays or process creep.\\nOver the\
    \ past six decades, DARPA\\u2019s model has proved itself again and again by delivering\\nadvanced technological breakthroughs,\
    \ including miniaturized GPS, microelectromechanical\\nsystems technology, stealth technology, the internet, lasers, night\
    \ vision, and autonomous\\nvehicles.\"\n  },\n  {\n    \"name\": \"CATALYZING GLOBAL PROBLEM-SOLVING\",\n    \"text\"\
    : \"It\\u2019s abundantly clear that the looming threats of today, such as pandemics and climate change,\\ndon\\u2019t\
    \ recognize national borders. Much as Sputnik highlighted that business as usual wasn\\u2019t\\nsufficient to meet the\
    \ needs of national security, business as usual is not sufficient to solve\\nthese big, global challenges.\\nInstead,\
    \ it will be necessary to bridge gaps not only between disciplines and organizations,\\nbut also among national, governmental,\
    \ academic, and commercial innovation systems. Such\"\n  },\n  {\n    \"name\": \"/2/25, 2:33 PM\",\n    \"text\": \"\
    Changing the Business of Breakthroughs\\nhttps://issues.org/network-innovation-wellcome-leap-dugan-gabriel/\\n4/13\\n\\\
    nan effort in the global commons requires investment capital and independent leaders who can\\noperate without the constraints\
    \ imposed by existing national systems\\u2014a task for which\\nphilanthropy is well suited.\\nIt is rarely, if ever,\
    \ true that all the expertise or all the advances needed to achieve\\na breakthrough are resident in one laboratory or\
    \ organization.\\nWhile it is difficult for governments to act globally and the private sector cannot bankroll\\nhealth\
    \ investments that lack clear financial returns, independent philanthropy can step into\\nthis void. And at a time when\
    \ humanity is in urgent need of action, philanthropy can act\\nquickly, without concern for election cycles or the lengthy\
    \ process of realigning political will\\nand global economic incentive structures. Independent philanthropy has the ability\\\
    u2014even the\\nduty\\u2014to actively hunt for the dramatic advances that current and future generations need.\\nIn 2018,\
    \ Wellcome, a storied global philanthropy focused on health, saw a need emerging for a\\nnew entity that could tackle\
    \ huge global challenges in health. The leadership of Wellcome\\nfunded the effort, called Wellcome Leap, and launched\
    \ it in 2020. Importantly, they hired an\\nexperienced leadership team and then gave us and our fellow team members the\
    \ freedom to\\noperate differently. We were given the mandate to create an agile, ambitious new organization\\nwith program\
    \ goals, funding structures, risk tolerance, and timelines more like the DARPA\\nmodel and less like conventional research\
    \ activities. Such a system isn\\u2019t always comfortable,\\nand that was the point. If you want to build an organization\
    \ that challenges conventional\\nwisdom, you cannot be surprised when it challenges conventional wisdoms.\"\n  },\n  {\n\
    \    \"name\": \"BUILDING DYNAMIC NETWORKS\",\n    \"text\": \"Like DARPA, Wellcome Leap stacks the odds in favor of breakthroughs.\
    \ But to operate\\nglobally, we had to reimagine how some of the DARPA attributes\\u2014goals, networks, program\\nmanagers,\
    \ and deadlines\\u2014work in a global context.\\nThe ability to build dynamic networks, not in one country, but across\
    \ the entire global\\ncommons, started with what we understand in retrospect was a door-to-door grassroots\\neffort. We\
    \ spoke directly to university chancellors, chief executive officers, and nonprofit\\norganization leaders around the\
    \ world to give them the context of the network we wanted to\\nbuild. We explained our hypothesis\\u2014that breakthroughs\
    \ require a sense of urgency and\\nmomentum in a team\\u2014so we needed to get teams working.\"\n  },\n  {\n    \"name\"\
    : \"/2/25, 2:33 PM\",\n    \"text\": \"Changing the Business of Breakthroughs\\nhttps://issues.org/network-innovation-wellcome-leap-dugan-gabriel/\\\
    n5/13\\n\\nWe knew the biggest obstacle to speed and momentum was contracting. Therefore, we asked\\nleaders of this new\
    \ network to pre-sign a master funding agreement\\u2014not to secure an edge in\\nselection or guarantee any funding,\
    \ but to enable the rapid formation of networks of\\nresearchers. The pre-signed contract does offer a key advantage to\
    \ institutions that are\\nselected because it means that anyone in their organization could be funded and working in\\\
    ndays or weeks instead of the usual months or even a year it can take to complete contract\\npaperwork in other organizations.\
    \ And if an organization is not a signatory when selected for\"\n  },\n  {\n    \"name\": \"funding, we ask them to sign\
    \ as the first step in contracting. To date, all have done so\",\n    \"text\": \"We didn\\u2019t know if such an approach\
    \ would work, but within the first year, 21 organizations on\\nsix continents had signed. Today, the number of organizations\
    \ has quadrupled to more than\\n80. The resulting Wellcome Leap Health Breakthrough Network is arguably the largest, most\\\
    nreadily \\u201cactivatable\\u201d network in the world, encompassing more than 650,000 scientists and\\nengineers globally.\
    \ This type of grassroots effort doesn\\u2019t work unless the appetite to work in\\nthis dynamic way on a global level\
    \ is already there: we simply found a way to facilitate it.\"\n  },\n  {\n    \"name\": \"/2/25, 2:33 PM\",\n    \"text\"\
    : \"Changing the Business of Breakthroughs\\nhttps://issues.org/network-innovation-wellcome-leap-dugan-gabriel/\\n6/13\\\
    n\\nAt a time when humanity is in urgent need of action, philanthropy can act\\nquickly, without concern for election\
    \ cycles or the lengthy process of realigning\\npolitical will and global economic incentive structures.\\nThe excitement\
    \ quickly bore fruit. When we made our first program announcement (about\\neight months after standing up Wellcome Leap),\
    \ we received 164 proposal abstracts from 21\\ncountries. For all subsequent programs since, we\\u2019ve seen similar\
    \ and growing international\\ninterest and participation in proposals and, ultimately, in selections.\\nWellcome Leap\\\
    u2019s commitment to clearing obstacles has allowed it to move at extraordinary\\nspeed. A mere 30 days after making the\
    \ first announcement, we received abstracts. Within two\\nweeks, we provided feedback and recommendations for submission\
    \ of full proposals.\\nProposers then had 30 days after receiving feedback to submit a full proposal, and we made\"\n\
    \  },\n  {\n    \"name\": \"funding decisions 30 days after that. What this means is that while other models might take\"\
    ,\n    \"text\": \"more than a year for a project to actually begin, we\\u2019re off and running in under 100 days from\\\
    nthe program announcement.\\nAnother important attribute that Wellcome Leap shares with the DARPA approach is that we\\\
    ndo not use a consensus-based peer review process that requires rank ordering. Instead, we\\nevaluate every proposal\\\
    u2019s ability to contribute to the specific goals outlined in the program\\nannouncement. That is the benefit of having\
    \ a specific goal in mind: it provides a point of\\nview for decisionmaking. Each program director chooses specific program\
    \ goals and activities\\nusing an analytic framework. Because the program managers put in the work to form this\\npoint\
    \ of view, they have the conviction required to make confident selections and adjustments\\nalong the way.\\nInterestingly,\
    \ we have also found that not requiring a consensus process creates more diverse\\nteams, linking early-career researchers,\
    \ established researchers, and researchers across the\\nacademic, nonprofit, and commercial spectra. Our method tends\
    \ to elevate young\\ninvestigators with new ideas that challenge the conventional wisdom in ways that consensus\\npeer\
    \ review does not\\u2014in part because it isn\\u2019t necessary to have proof that new ideas will work\\nbefore they\
    \ try.\\nIf you want to build an organization that challenges conventional wisdom, you\\ncannot be surprised when it challenges\
    \ conventional wisdoms.\"\n  },\n  {\n    \"name\": \"/2/25, 2:33 PM\",\n    \"text\": \"Changing the Business of Breakthroughs\\\
    nhttps://issues.org/network-innovation-wellcome-leap-dugan-gabriel/\\n7/13\\n\\nThis kind of risk tolerance is, counterintuitively,\
    \ facilitated by our use of contracts rather\\nthan grants. We can agree, together, to take a shot at something in year\
    \ one. If it works, we\\ncan make the decision to fund years two and three. If it doesn\\u2019t, we can shake hands and\
    \ part\\nways with the knowledge that it was worth the attempt. Our firm belief is that this process\\nalso allows us\
    \ to spend less time trying to make perfect decisions at the proposal phase. The\\nproposal, after all, is not the work;\
    \ the work is the work. This belief has the ultimate effect of\\nsuppressing \\u201cgrantsmanship\\u201d and elevating\
    \ the outcome\\u2014the breakthrough itself\\u2014as the\\nmeasure of success.\"\n  },\n  {\n    \"name\": \"CHOOSING\
    \ PASTEUR\\u2019S QUADRANT\",\n    \"text\": \"Perhaps the single most\\ncommon question we are\\nasked about the model\
    \ is\\nnot about the program\\nconstruct or its execution,\\nbut how we choose a\\nprogram in the first place.\\nWellcome\
    \ Leap has an\\nunwavering commitment\\nto work in what political\\nscientist Donald Stokes\\ndescribed as \\u201cuse-inspired\\\
    nresearch\\u201d in his 1997 book\\nPasteur\\u2019s Quadrant. Work\\nin Pasteur\\u2019s quadrant,\\nexemplified by the\
    \ microbiology research of Louis Pasteur, is mission-driven, designed to\\ncreate a new capability or solve a specific\
    \ problem. Unlike pure applied research, work in\\nPasteur\\u2019s quadrant requires the simultaneous advancement of science\
    \ to create a new\\nsolution. And unlike pure basic science, which is curiosity-driven but need not have a specific\\\
    napplication in mind, work in Pasteur\\u2019s quadrant needs a bold goal to focus the work and unite\\na diverse set of\
    \ performers.\\nThis commitment drives every Wellcome Leap program to the same kind of \\u201cwhat if\\u201d thinking\\\
    nof DARPA programs. And although the first six programs we\\u2019ve launched over the past two\\nyears differ in program\
    \ goals and focus, they share the attribute of being grounded in creating\\nnew solutions. A few representative examples\
    \ are the following:\\nWhat if we could cultivate human tissue so that no one had to wait on an organ donor list?\"\n\
    \  },\n  {\n    \"name\": \"/2/25, 2:33 PM\",\n    \"text\": \"Changing the Business of Breakthroughs\\nhttps://issues.org/network-innovation-wellcome-leap-dugan-gabriel/\\\
    n8/13\\n\\nWhat if we\\u2019ve been approaching the first three years of a child\\u2019s cognitive development all wrong,\\\
    nand a new way would lead to healthier, more productive lives?\\nWhat if the treatment of depression didn\\u2019t have\
    \ to feel like rolling the dice?\\nAlthough no program has yet completed its full three-year timeline, early and emerging\"\
    \n  },\n  {\n    \"name\": \"results are showing progress toward meeting goals in several areas. Work on 3D printing of\"\
    ,\n    \"text\": \"kidney organoids is now sufficient to conduct early studies in animal models. Teams of\\ncommercial\
    \ and academic researchers are collaborating on state-of-the-art data pipelines to\\nfeed new models of cognitive development.\
    \ A project focused on understanding how diseases\\nprogress shows promise for dramatically increasing the speed of single-cell\
    \ imaging from a\\nweeks-long, process-intensive task using expensive equipment into an hours-long task doable\\non widely\
    \ available gene sequencers. And a fourth project has demonstrated a 100-fold\\nreduction in the dose\\u2014and cost\\\
    u2014of mRNA-based monoclonal antibodies that can be used to\\ntreat viral infections.\"\n  },\n  {\n    \"name\": \"\
    TRANSFORMING FOR THE FUTURE\",\n    \"text\": \"In the coming decades, science policy needs to transform and adapt to\
    \ attend to the big\\nquestions facing humanity and with the urgency they demand. Some people will say this is too\\nhard.\
    \ Or they will argue that the scientific research community should simply do more of\\nwhat it\\u2019s been doing because\
    \ that\\u2019s safer. This kind of inertia is the enemy of possibility\\u2014it\\nmakes global challenges such as human\
    \ health and climate change seem too big. It makes\\npolitics seem too small and the public too mired in a fog of distrust,\
    \ disinformation, and\\ndeepening cynicism to believe in the ability of institutions to solve such problems.\\nInertia\
    \ is the enemy of possibility\\u2014it makes global challenges such as human\\nhealth and climate change seem too big.\\\
    nTo meet these challenges requires seeing beyond borders, disciplines, and barriers to begin\\nactively changing the way\
    \ science is done, as well as the way it\\u2019s funded. At this time,\\nindependent philanthropy has the ability to do\
    \ what others cannot: take an unconventional\\nand optimistic view of what\\u2019s possible in order to act on behalf\
    \ of future generations.\\nOur team built Wellcome Leap to harness global collaboration and find solutions to\\nhumanity\\\
    u2019s urgent needs. But also to create something else we need: hope. We see multiple\\ngenerations disillusioned by institutions\
    \ that tell them to set their sights lower, temper their\"\n  },\n  {\n    \"name\": \"/2/25, 2:33 PM\",\n    \"text\"\
    : \"Changing the Business of Breakthroughs\\nhttps://issues.org/network-innovation-wellcome-leap-dugan-gabriel/\\n9/13\\\
    n\\nexpectations, accept the way things have always been done. They deserve somewhere to put\\ntheir efforts and their\
    \ faith. That faith must be rewarded, not with promises but with progress\\n\\u2014one breakthrough at a time.\\nRegina\
    \ E. Dugan is chief executive officer of Wellcome Leap. She was the nineteenth director of\\u2014and first\\nwoman to\
    \ lead\\u2014the Defense Advanced Research Projects Agency, and has held senior executive roles at\\nMeta, Motorola, and\
    \ Google.\\u00a0Kaigham J. Gabriel is chief operating officer of Wellcome Leap\\u00a0and was most\\nrecently president\
    \ and chief executive officer of The Charles Stark Draper Laboratory. He has held senior\\nexecutive positions in the\
    \ private sector, government, and academia.\\nThis essay is part of Issues in Science and Technology\\u2019s \\u201cThe\
    \ Next 75 Years of Science Policy,\\u201d made\\npossible through the generous support of\\u00a0The Kavli Foundation.\"\
