    Another important attribute that Wellcome Leap shares with the DARPA approach is that we

    do not use a consensus-based peer review process that requires rank ordering. Instead, we

    evaluate every proposal’s ability to contribute to the specific goals outlined in the program

    announcement. That is the benefit of having a specific goal in mind: it provides a point of

    view for decisionmaking. Each program director chooses specific program goals and activities

    using an analytic framework. Because the program managers put in the work to form this

    point of view, they have the conviction required to make confident selections and adjustments

    along the way.

    Interestingly, we have also found that not requiring a consensus process creates more diverse

    teams, linking early-career researchers, established researchers, and researchers across the

    academic, nonprofit, and commercial spectra. Our method tends to elevate young

    investigators with new ideas that challenge the conventional wisdom in ways that consensus

    peer review does not—in part because it isn’t necessary to have proof that new ideas will work

    before they try.

    If you want to build an organization that challenges conventional wisdom, you

    cannot be surprised when it challenges conventional wisdoms.'
