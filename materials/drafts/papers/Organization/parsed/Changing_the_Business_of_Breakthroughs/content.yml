    \ can leverage a highly effective innovation model to solve urgent\\nglobal problems.\"\n  },\n  {\n    \"name\": \"A\
    \  D I S C U S S I O N  O F\",\n    \"text\": \"The Next 75 Years of Science Policy\\nHistory tends to turn scientific\
    \ breakthroughs into stories of lone heroes in which individual\\nresearchers doggedly pursued a new discovery or charismatic\
    \ leaders pointed to the horizon\\nand made massive investments at scale.\\nWhat these accounts miss, however, is the\
    \ reality that solutions to complex problems\\u2014and\\nthe resulting breakthroughs\\u2014more often require a network\
    \ of diverse contributors with the\"\n  },\n  {\n    \"name\": \"NATIONAL ACADEMY OF SCIENCES\",\n    \"text\": \"\"\n\
