    ,\n    \"text\": \"\"\n  },\n  {\n    \"name\": \"Glossary\",\n    \"text\": \"3\\n\\nThe Different Roles and Phases of\
    \ Running a\\nCoordinated Research Program\\nThe leader of a coordinated research program1 needs to wear many hats. This\
    \ is\\none of the reasons why the job is so hard! These hats roughly correspond to the\\ndifferent phases of a program.\
    \ Leading a program through each phase is almost\\na different job.\\nThe phases are:\"\n  },\n  {\n    \"name\": \"Exploration\
    \ and Field Mapping\",\n    \"text\": \"\"\n  },\n  {\n    \"name\": \"Refining Ideas\",\n    \"text\": \"\"\n  },\n \
