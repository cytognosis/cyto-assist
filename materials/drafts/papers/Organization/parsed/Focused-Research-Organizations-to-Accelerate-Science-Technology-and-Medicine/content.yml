    tighter alignment of team incentives and focus than would an externalized collaborative research

    program that uses existing entities (e.g., universities) as performers. This structure will also enable

    tighter alignment of incentives and focus than would a DARPA-like externalized effort

    coordinated by a single program manager (although some FROs could be created as an outcome

    or second stage of DARPA-like programs). Generally, FROs would rent commercial real estate

    for operations. In rare cases it may be appropriate for FROs to use National Lab facilities. Pay

    structure in FROs should be flexible to allow top talent to be recruited.


    FROs should be expressly time-bound and outcome driven in order to prevent mission creep

    and organizational aging. This will require clear and pre-defined end-points/exits. As an FRO

    sunsets, stakeholders in that FRO’s outputs should be convened to maximize output deployment

    and uptake. Intellectual property should be out-licensed or released publicly for similar reasons.

    Transition support should be provided to outgoing FRO employees. Follow-on from FROs could

    include formation and/or incubation of new companies, larger public-sector projects, and/or

    creation of facilities designed to host and maintain FRO outputs (e.g., datasets or tools).


    Mission selection

    FROs should pursue specific goals that, if achieved, will dramatically increase the R&D capacity

    and/or technological capabilities of the United States in a given field. To preserve the FRO

    program’s ability to pursue specific, focused innovation objectives, FROs would operate for

    defined time periods and would not ordinarily be renewed. Renewal would only be permitted in

    exceptional cases in which an FRO proves that an extension of that FRO would be as impactful

    as the initial investment. More frequently, we expect that an FRO might serve as proof of concept

    for a project or initiative that could then be separately pursued through an act of Congress or

    through a public-private partnership. All new FROs should meet following two criteria:


