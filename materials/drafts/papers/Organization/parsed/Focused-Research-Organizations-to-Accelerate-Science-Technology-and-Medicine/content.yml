    \ examples of FROs?\\nThe Human Genome Project is a good example of a past effort that could have easily existed as\\\
    nan FRO. A Genome Sequencing FRO could have been established to develop key genome\\nsequencing instrumentation, processes,\
    \ and protocols. The success of the FRO could have been\\nassessed using metrics such as \\u201cletters of DNA sequenced\
    \ per day\\u201d with an appropriate means\\nof quality cross-checking. Once that metric exceeded a pre-defined threshold,\
    \ the FRO would\\nhave been deemed to have achieved its goal. The sequencing capacities that the FRO\\ndeveloped would\
    \ have then been used by other institutions and facilities to contribute to the\\nmuch larger Human Genome Project itself.\
    \ The appendix provides additional concrete examples\\nof areas that could benefit from FROs.\\nWhy can\\u2019t the projects\
    \ envisioned for FROs be pursued in academia or industry?\\nAcademics are rewarded for novelty and individual publication\
    \ records, which discourages the\\ntight-knit collaboration (among potentially dozens of people) and accountability necessary\
    \ for\\nlarge-scale projects to succeed. For-profit companies can align large and well-organized teams\\nbut must pursue\
    \ developments that are commercially profitable and achievable within the\\nlifetime of a patent and/or the timescales\
    \ dictated by investor returns. Raising the amount of\\nmoney needed for FRO-level technical work in industry would, except\
    \ in the rarest of cases,\\nrequire an immediate path to revenue or profitability. Many societally important scientific\
    \ and\\ntechnological projects take too long for venture-capital funding cycles, and/or create public\\ngoods without\
    \ the ability to efficiently capture value from them. To highlight these points further:\\nFRO projects are generally\
    \ not doable in academia because their requirement for coordinated,\\nmilestone-driven team-based engineering is not consistent\
    \ with academic culture and reward\\nstructure. Instead, the work done in FROs requires:\\n\\u2022\\nLarge-scale team\
    \ science, rather than a study led by a single principal investigator or a\\nsmall group of co-researchers.\\n\\u2022\\\
    nTop-down coordination and management/leadership from a CEO/CTO figure, rather\\nthan a loose collaboration between peers\
    \ with limited direction or long-term\\ncommitment.\\n\\u2022\\nScalable, repeatable execution, rather than simply \\\"\
    proof of concept\\\" of a new idea.\\n\\n\\n\\n8\\n\\u2022\\nInvolvement of highly trained and experienced professionals,\
    \ rather than primarily\\ngraduate students and postdocs.\\n\\u2022\\nA high level of accountability for achieving time-bound\
    \ milestones.\\n\\u2022\\nGoal-driven development, integration and systematization of technologies, rather than\\nprioritization\\\
    nof\\nunpredictable\\nconceptual\\nbreakthroughs\\nand/or\\nopen-ended\\nexploration.\\nFRO projects are not generally\
    \ doable in industry because they have no immediate (within about\\nfive years) path to profitability. Instead, the work\
    \ done in FROs requires:\\n\\u2022\\nGenerating scientific data that will be made freely available to the research community.\\\
    n\\u2022\\nCreating a new scientific instrument that will be transformative for research in the longer\\nterm but may\
    \ not generate direct financial returns over relatively short timeframes.\\n\\u2022\\nDeveloping crucial technology that\
    \ is still immature and may require sustained\\ninvestment before becoming commercially viable.\\nWhy is roughly $5\\\
    u201315 million per year per FRO an appropriate amount of funding?\\nThis amount is roughly comparable to the funding\
    \ level of a Series A or B level hard-tech startup\\nor a DARPA project. $5\\u201315 million per year over five years\
    \ will support a team of a dozen or more\\nhighly skilled senior staff (recruited with industry-level salaries) as well\
    \ as requisite capital\\ninfrastructure, logistical support, and workspace. A robust funding commitment is also needed\\\
    nto provide a compelling reason for top talent to leave their regular jobs and to finance a large-\\nscale project that\
    \ is infeasible in an academic or for-profit setting. A high funding level is justified\\nby the capabilities that FROs\
    \ will develop. The tools, technologies, datasets, and processes\\ndeveloped by FROs will substantially reduce the cost\
    \ or increase the throughput or reliability of\\nsubsequent work, enabling much larger returns on investment for the long\
    \ term.\\nWhy can\\u2019t existing funding structures create centralized, cross-disciplinary projects in an agile\\nway?\\\
    nExisting funding structures, such as grant programs administered by federal agencies, tend to\\ndistribute work across\
    \ many different institutions like universities. These institutions are generally\\nfurther fragmented into many small\
    \ labs\\u2014each of which is pursuing a different problem and\\ntraining their own students under an individual principal\
    \ investigator. This system is useful for\\nstudying a variety of specific components of a given field but fails at efficiently\
    \ tackling many\\nlarge, complex technological or measurement challenges. While such challenges may be best\\naddressed\
    \ through a single, coordinated $50 million-dollar scale project with an optimal team\\nstructure, existing funding structures\
    \ will allocate that $50 million across a hundred projects of\\n$500,000 each. The result is often a focus on components\
    \ rather than systems, under-powered\\nstudies, partially duplicated yet incompatible efforts, and fragmented incentives\
    \ among transient\\nor inexperienced staff. Even ARPA organizations rely on external entities as performers and can\\\
    nsuffer when no single organization is both able and willing to pull the pieces together. Note that\\n\\n\\n\\n9\\nthere\
    \ are notable exceptions, such as when DARPA convinced the company Moderna to pivot\\nsome of its efforts from cancer\
    \ to vaccine development, and the ARPA model has complementary\\nadvantages to FROs for certain problem classes.2\\nWhen\
    \ teams are not aligned around a single mission and led by a CEO figure (possessing both\\ntechnical and management experience),\
    \ there is limited accountability, transparency, and\\ncollaboration. This truth is well-known in business but not generally\
    \ acknowledged in\\ngovernment-funded R&D. The separation of agencies like NIH into institutes or divisions focused\\\
    non individual diseases also contributes to difficulty in assembling centralized teams around cross-\\ncutting initiatives.\
    \ DOE National Labs are a rare example of a federal institution that does\\nsucceed at pursuing centralized large-scale\
    \ R&D projects. However, DOE National Labs naturally\\nfocus on the energy sector and are mostly characterized by long-term\
    \ contracts focused on fixed\\ninfrastructure assets, rather than agile development of new methods.\\nHow are FROs different\
    \ from DARPA?\\nMultiple aspects of DARPA provide inspiration for FROs, including the milestone-driven and\\nambitious,\
    \ risk-taking nature of DARPA programs, DARPA\\u2019s ability to recruit top talent for\\nintensive projects of finite\
    \ duration, and DARPA\\u2019s intermediate scale that bridges a gap between\\ntypical grants and very large initiatives.\
    \ Indeed, some FROs could be created within or as an\\noutcome of broader DARPA or DARPA-like programs. Certain FROs could\
    \ also coordinate\\nDARPA-like externalized research if needed and appropriate. Yet FROs would depart from\\nDARPA in\
    \ two important ways:\\n1. DARPA focuses on defense-specific applications. FROs would focus on producing public\\ngoods\
    \ for science, technology, or medicine broadly.\\n2.  DARPA relies on portfolios of externalized research through transiently\
    \ organized\\ncollaborations of existing organizations. FROs would be dedicated, stand-alone\\norganizations led by a\
    \ CEO-like figure and staffed with the personnel needed to carry out\\nprojects in house.\\nHow are FROs different from\
    \ National Lab projects?\\nDOE National Labs are world-class at building large-scale user facilities and at maintaining\
    \ high-\\nsecurity technical infrastructure. FROs would largely pursue projects that don\\u2019t require these\\nspecific\
    \ capacities and/or are out of scope topically for the DOE labs. FROs would also have\\nmore open and fluid interactions\
    \ with industry and academic labs compared to DOE labs and\\ncould be operated at lower security levels.\\n\\n\\n\\n2\
    \ Washington Post, Paul Sonne, \\u201cHow a Secretive Pentagon Agency Seeded the Ground for a Rapid Coronavirus Cure,\\\
    u201d\\n(September 22, 2020). https://www.washingtonpost.com/national-security/how-a-secretive-pentagon-agency-seeded-the-ground-\\\
    nfor-a-rapid-coronavirus-cure/2020/07/30/ad1853c4-c778-11ea-a9d3-74640f25b953_story.html.\\n\\n\\n\\n\\n10\\n\\nAbout\
    \ the Authors\\nSam Rodriques is an entrepreneur, biotechnologist, and inventor.\\nHe is founding the Applied Biotechnology\
    \ Laboratory at the\\nFrancis Crick Institute in the winter of 2021. He has founded\\nmultiple medical-device companies\
    \ and obtained his Ph.D. in\\nPhysics from the Massachusetts Institute of Technology as a Hertz\\nFoundation Fellow.\\\
    n\\n\\n\\nAdam Marblestone is a Schmidt Futures Innovation Fellow and a\\nSenior Fellow with the Federation of American\
    \ Scientists. He was\\npreviously a research scientist at Google DeepMind, was the Chief\\nStrategy Officer of the brain-computer\
    \ interface company Kernel,\\nand co-founded BioBright LLC. He has been recognized with a\\nTechnology Review 35 Innovators\
    \ Under 35 Award. He received a\\nPh.D. in Biophysics from Harvard University as a Hertz Foundation\\nFellow.\\n\\n\\\
    nAbout the Day One Project\\nThe Day One Project is dedicated to democratizing the\\npolicymaking process by working with\
    \ new and expert voices\\nacross the science and technology community, helping to\\ndevelop actionable policies that can\
    \ improve the lives of all\\nAmericans, and readying them for Day One of a future\\npresidential term. For more about\
    \ the Day One Project, visit\\ndayoneproject.org.\\n\\n\\n\\n\\nAppendix: Conceptual Ideas for FROs\\n\\nHigh-throughput\
    \ brain mapping\\nMany neuroscientists believe that all mammals, including humans, share fundamental features of\\na core\
    \ cortical architecture that underlies cognition. Knowing that architecture is crucial for\\nunderstanding brain disease\
    \ and for generating the next generations of artificial intelligence and\\nenergy-efficient computing. In an effort largely\
    \ executed by the Allen Institute for Brain Science,\\nthe Intelligence Advanced Research Projects Activity (IARPA) MICRONS\
    \ program brought brain-\\ncircuit mapping to the 1 cubic millimeter (mm3) level. Yet the brain of a mouse is about 400\
    \ times\\nlarger than the volume mapped through the MICRONS program. The NIH is considering a\\ntransformative project\
    \ to map the mouse brain, but the requisite tools have not yet been brought\\ntogether to support this effort.\\n\\nAn\
    \ FRO focused on brain mapping could advance and validate the technologies necessary for\\nmapping an entire mammalian\
    \ brain. A specific governing metric could be to \\u201cachieve a 5x\\nincrease in mapping throughput at a 5x reduction\
    \ in cost, relative to current methods.\\u201d Talent\\ncould be drawn from the industrial process control and semiconductor\
    \ inspection industries, from\\ntech companies, and from academic neuroscience and chemistry departments. Resulting\\\
    nsystems could then be internalized into a National Lab and scaled further.\\n\\nMulti-drug combination therapies and\
    \ drug repurposing\\nNeither academics nor pharmaceutical companies are well incentivized to pursue systematic\\nstudies\
    \ of multi-drug combination therapies, especially those that would use combinations of\\nalready-approved drugs to optimize\
    \ long-term health outcomes in a preventative fashion.\\nAcademic labs are rewarded for novelty and specialization and\
    \ are under pressure to build a\\nunique academic \\u201cbrand\\u201d around a particular mechanistic biology \\u201cstory\\\
    u201d rather than for applied\\nengineering or logistical achievements. Pharmaceutical companies need to get single, novel,\\\
    nand patentable drug assets through trials with minimal risk. Yet combinatorial interventions could\\ndo much to crack\
    \ the complex and interlocking problems of age-related disease, health span,\\nand cancer.\\n\\nAn FRO could centralize\
    \ resources around combinatorial testing of compounds already known\\nto be safe. The FRO could specifically be tasked\
    \ with developing combinatorial interventions\\nthat prevent the onset of diabetes or heart disease in at-risk populations.\
    \ If successful, the FRO\\u2019s\\ncombinatorial approach would likely be applied more broadly to address other pressing\
    \ health\\nissues. Talent could be drawn from the pharmaceutical industry, medical centers, and from\\nengineers with\
    \ expertise in robotics and real-time controls.\\n\\nSynthetic fuel production\\nMany researchers are working on new methods\
    \ to produce synthetic, carbon-neutral fuels. This\\nrequires integration of innovations in catalysis and materials with\
    \ state-of-the-art engineering\"\n  },\n  {\n    \"name\": \"methods for energy storage and fuel transport. Unfortunately,\
    \ today the synthetic-fuels field is\",\n    \"text\": \"12\\nfragmented among many academic researchers pursuing small-scale\
    \ studies outside of relevant\\nsystems (e.g., fuel markets, logistics operations). An FRO could seek to integratively\
    \ solve the\\nproblem of synthetic fuel production and storage by bringing top chemists and materials\\nscientists into\
    \ a system-building context that emphasizes integrated devices rather than just\\ncomponent materials and is equipped\
    \ with high-throughput robotic materials screening and\\ncomputational modeling capabilities, not just chemistry labs.\
    \ Talent could be from fuel-transport\\nand logistics companies, battery manufacturers, and academic experts in materials\
    \ science,\\nelectrical engineering, and chemistry.\\n\\nDiagnostics and biomarkers for priority diseases\\nIt is hard\
    \ to develop therapeutics for age-related diseases like Alzheimer\\u2019s in the absence of\\ngood early biomarkers. Developing\
    \ biomarkers and early diagnostics can be prohibitively\\nexpensive for academic researchers since, due to the low incidence\
    \ and slow progression of any\\none disease in the general population, it requires very large and well-controlled studies\
    \ to prove\\nstatistical significance. Better-resourced pharmaceutical companies are, meanwhile, not well\\nincentivized\
    \ to develop biomarkers in the absence of a marketable treatment. A similar market\\nfailure exists for early cancer detection.\\\
    n\\nAn FRO could work to collect a large pool of clinical samples to support development of new\\nbiomarkers for a disease\
    \ like Alzheimers. The FRO could also use machine learning on large\\nanonymized patient populations to validate the resulting\
    \ biomarkers at a level of statistical\\npower, control, and reproducibility inaccessible to standard academic labs. These\
    \ biomarkers\\ncould then be made publicly accessible via commercialization. The underlying systems for\\ndeveloping new\
    \ biomarkers could be separately commercialized and/or internalized as an NIH\\nintramural center.\\n\\nDeveloping next-generation\
    \ microprocessors\\nMicroprocessor advancement is limited by the number of transistors that engineers can pack\\nonto\
    \ microchips of a fixed size. The next generation of microprocessors will need to rely on\\nalternative strategies, such\
    \ as using nanophotonics to quickly move data between separate chips\\nand/or to package chips tightly in 3D.\\n\\nAn\
    \ FRO could be tasked with developing a prototype large-scale 3D photonic interconnect\\nsystem to support next-generation\
    \ microprocessors. The FRO would bring top optical physicists\\nfrom academia together with chip designers and machine\
    \ learning experts from industry. The\\nFRO would contract with commercial manufacturers for prototype fabrication at\
    \ a level\\ninaccessible to academia and too capital-intensive for a seed stage startup, while leveraging the\\nlatest\
    \ research ideas from multiple fields to inform prototype architecture. If successful, a large\\nsemiconductor or tech\
    \ company might invest in subsequent commercialization and optimization\\nof the prototype. A DARPA or NSF program split\
    \ across several university labs and small startups\\ncould support development of software algorithms compatible with\
    \ the new hardware to further\\npave the way for dramatic advances in computing.\\n\\n\\n\\n\\n13\\nOrgan preservation\
    \ and banking\\nSolving the organ transplant shortage would save more lives each year than curing cancer.3 In\\ntheory,\
    \ rapidly cooling and reheating organs or biochemically inducing a state of suspended\\nanimation should allow organs\
    \ to be maintained for much longer times to facilitate organ\\nbanking and transport. This problem is currently too high-risk\
    \ and multifaceted for startups to\\ntackle, especially given regulatory risks. Making organ preservation and banking\
    \ a reality\\ntherefore requires a large centralized multidisciplinary engineering effort closely linked to clinical\\\
    nsettings.\\n\\nAn FRO could locate an engineering and operations center adjacent to a major hospital system\\nand recruit\
    \ top cryogenics and microwave physics experts as well as experts in epigenetic tissue\\ncharacterization and bioreactors\
    \ to develop an organ preservation and storage pipeline that\\nenables organs to last at least 10 times longer than is\
    \ currently possible. NIH could later initiate\\na program to fund clinical trials of this system for multiple organ types.\\\
    n\\n\\n\\n\\n\\n3 Giwa et al., \\u201cThe promise of organ and tissue preservation to transform medicine,\\u201c (2017)\\\
    nhttps://www.ncbi.nlm.nih.gov/pmc/articles/PMC5724041/.\"\n  }\n]"
