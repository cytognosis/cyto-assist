    Logistics

    FRO organization and operations should be designed to make FROs as agile, flexible, and self-

    directed as possible. Each FRO should exist independent of existing organizations such as

    National Laboratories or labs at other government agencies and academic institutions. Each FRO

    would be run by a CEO/CTO and staffed by a centralized, startup-like team of well-trained

    professionals sourced from both industry and academia. This personnel structure will enable


