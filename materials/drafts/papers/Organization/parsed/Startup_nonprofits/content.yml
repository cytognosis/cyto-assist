  title: Startup nonprofits
content:
  sections: "[\n  {\n    \"name\": \"PROJECTS\",\n    \"text\": \"\"\n  },\n  {\n    \"name\": \"AWARDS\",\n    \"text\":\
    \ \"\"\n  },\n  {\n    \"name\": \"BLOG\",\n    \"text\": \"\"\n  },\n  {\n    \"name\": \"SOCIAL CHANGE\",\n    \"text\"\
    : \"\"\n  },\n  {\n    \"name\": \"CONTACT\",\n    \"text\": \"Mark Lutter PhD\"\n  },\n  {\n    \"name\": \"/29/25, 12:13\
    \ AM\",\n    \"text\": \"Mark Lutter\\nhttps://www.marklutter.com/post/startup-nonprofits\\n1/5\\n\\nStartup non-profits\\\
    nSilicon Valley has a bias against nonprofits. On multiple occasions potential donors have told me that\\nthey would invest\
    \ in a fund or company I started, but not donate to the Charter Cities Institute (CCI).\\nThat bias is to a certain extent\
    \ justified. Many nonprofits, like many companies, are complacent,\\nineffective, and serve as rent extractors from the\
    \ productive economy. If something can be structured\\nas a for profit, it probably should be. However, nonprofits can\
    \ serve a useful function: producing value\\nthat isn\\u2019t easily captured by a for-profit entity.\\nLet\\u2019s start\
    \ with the CCI. For profit charter cities companies exist, including Prospera, Ciudad Moraz\\u00e1n,\\nand Pronomos Capital.\
    \ In addition to the public projects, there is an active community that is\\nplanning and coordinating the next generation\
    \ of charter cities. What then, is CCI\\u2019s role?\\nIt is important to note that most of the current energy is coming\
    \ from the high income remote work\\nspace. There is an interest in pushing the frontier of governance, unlocking new\
    \ forms of social\\norganization. While a worthy goal, CCI is focused on catch up growth, how to accelerate economic\\\
    ndevelopment in emerging markets. While there is much overlap between these two goals, they are\\nsufficiently distinct\
    \ to justify separate approaches.\\nCCI\\u2019s value proposition is based on two distinct factors. First, charter cities\
    \ have slow feedback loops\\nwhich makes early stage planning extra important. Second, maximizing the benefit of charter\
    \ cities\\nrequires socializing multiple stakeholders to the idea of charter cities who wouldn\\u2019t otherwise be\\\
    nsocialized by for profit ventures.\\nThe bet of the Charter Cities Institute is that research and community building\
    \ is valuable, particularly\\nin early days, to catalyze the growth of the industry. In 10 or 20 years the industry will\
    \ be substantially\\nmore developed than had the Charter Cities Institute not existed. However, the nonprofit structure\\\
    nworks better because the value we are creating is difficult to capture.\\nA consensus has emerged that science funding\
    \ mechanisms are ineffective, if not broken. The NIH was\\nglacially slow in awarding grants to research covid compared\
    \ to new organizations like Fast Grants.\\nBasic research is important, however, by its nature it is difficult to monetize.\
    \ Fast Grants is one way to\\npush reform, by illustrating the possibility of making funding decisions much more rapidly.\
    \ What\\nwould it look like to scale Fast Grants to fund research that isn\\u2019t covid related? Alexey Guzey is\\nworking\
    \ on it with New Science.\\nAmerica\\u2019s foreign policy establishment is broken. While it appears that President Biden\
    \ is finally\\nwithdrawing American troops from Afghanistan, it is a decision long overdue. Part of the challenge is a\\\
    nforeign policy establishment that lies to our elected officials about troop numbers to prevent them\"\n  },\n  {\n  \
    \  \"name\": \"/29/25, 12:13 AM\",\n    \"text\": \"Mark Lutter\\nhttps://www.marklutter.com/post/startup-nonprofits\\\
    n2/5\\n\\nfrom bringing our troops home. While for-profit defense startups like Anduril are improving our\\nmilitary effectiveness,\
    \ there is also the need for policy reform which isn\\u2019t as easily monetizable.\\nImproving our institutions requires\
    \ a pluralistic approach. While for-profit startups are great, there\\nare some problems they can\\u2019t solve.\\nCharacteristics\
    \ of the Nonprofit Startup\\nGiven the novelty of the category of startup nonprofit, I\\u2019m not able to fully define\
    \ what it entails,\\nhowever, I can outline some characteristics that I have learned since I began building the Charter\\\
    nCities Institute in 2017.\\nVision: A nonprofit startup starts with a vision. There must be some large, intractable problem,\
    \ for\\nwhich the solution is hard to capture value from. This must be the animating vision behind the\\nnonprofit, like\
    \ Stripe\\u2019s \\u2018increasing the GDP of the internet\\u2019 or SpaceX\\u2019s \\u2018colonize Mars\\u2019. The vision\
    \ must\\nbe sufficiently ambitious to attract talent and funding, but sufficiently well-defined to be achievable.\\nIn\
    \ the previous section I outline two other ideas that could animate startup nonprofits, improving\\nscience funding mechanisms\
    \ and reforming American foreign policy.\\nMomentum: Like a technology startup, momentum is crucial for a nonprofit startup.\
    \ They need to\\naccomplish more every year. They are selling their ability to execute on the vision. If they lose\\nmomentum\
    \ or take substantial missteps, they risk losing donors and talent. The goal should seem\\ninevitable by the constant\
    \ momentum that the nonprofit is able to generate.\\nIncrementalism: The vision must be broken down into incremental steps.\
    \ If you are building the\\necosystem for charter cities, where do you start? Who are the first groups you need to build\
    \ a\\ncoalition with, how to get early wins to demonstrate credibility to various stakeholders? How do you\\nbalance the\
    \ decades long nature of city development with getting a foot in the door? Having clearly\\ndefined incremental steps\
    \ to achieve the goal is key.\\nMilestones: Technology startups have clear milestones they must meet to raise their next\
    \ round of\"\n  },\n  {\n    \"name\": \"funding. Depending on the industry, the milestones can include, growth, ARR,\
    \ DAUs, and CAC. There\",\n    \"text\": \"have evolved generally accepted industry standards for success, the ultimate\
    \ test being the ability to\\nmake money. Nonprofit startups need similar metrics. How to you define success, momentum,\
    \ and\\nachieving relevant milestones?\\nIteration: Silicon Valley is defined in part by its iterative approach. The key\
    \ question isn\\u2019t success, but\\nrate of learning and growth. Nonprofit startups need a similar iterative method.\
    \ You won\\u2019t know\\nexactly what tactics will get a startup nonprofit to its vision. Some ideas might work, while\
    \ others\"\n  },\n  {\n    \"name\": \"/29/25, 12:13 AM\",\n    \"text\": \"Mark Lutter\\nhttps://www.marklutter.com/post/startup-nonprofits\\\
    n3/5\\n\\nmight fail. The ability to test some ideas, scale them up if successful, or kill them off if unsuccessful, is\\\
    na key component of a nonprofit startup.\\nHiring: Nonprofit startups necessarily exist in the space between startups\
    \ and legacy institutions.\\nHiring is a challenge. If you hire too exclusively from startups and the very online, you\
    \ will build a\\nteam that is unable to effectively interact with legacy institutions, weakening your ability to garner\\\
    ninfluence. If you hire too much from the legacy institutions, you won\\u2019t be able to think from first\\nprinciples\
    \ and build something new. Striking this balance right is key.\\nGeneral funds: Most foundations give restricted funds.\
    \ The money can only be spent on a\\npredetermined program. I am increasingly convinced that this problem is an order\
    \ of magnitude more\\nharmful than most realize. The Charter Cities Institute could never have been founded with restricted\\\
    nfunds. Our vision required the flexibility that general funds provide. Some ideas we had didn\\u2019t work,\\nso we had\
    \ to stop them. Even now, we are greater than the sum of our parts. Defining our programs\\ninto grant sized bites is\
    \ sometimes an exercise in creativity. Not to mention, much of the work of\\nbuilding something is a boring grind that\
    \ is not appealing to supporters. Luckily, folks like\\nPaul Graham and Tyler Cowen realize this and are taking steps\
    \ to address it.\"\n  },\n  {\n    \"name\": \"Conclusion\",\n    \"text\": \"Silicon Valley inspired me to start the\
    \ Charter Cities Institute. I listened to podcasts, read articles, and\\nconsumed the media. I was inspired by the stories\
    \ of great founders, wanting to follow in their\\nfootsteps. When hiring people, I consult Marc Andreessen\\u2019s famous\
    \ essay. The Charter Cities Institute\\nwould not exist without these influences.\\nThat being said, I was also na\\u00efve.\
    \ Working in Washington, DC only allows so much exposure to Silicon\\nValley. The problems facing nonprofits are substantially\
    \ different from those facing for-profits. While I\\nconsider myself a founder, the mold is a bit distinct from a tech\
    \ company founder.\\nI now believe realizing those distinctions was a crucial part of the growing pains of building a\
    \ new\\ntype of organization. I hope these lessons on building a nonprofit startup can be useful for those who\\nwant\
    \ to build organizations in spaces the value is not easily capturable in the traditional for-profit\\nmold.\\nSee All\
    \ Posts\"\n  },\n  {\n    \"name\": \"/29/25, 12:13 AM\",\n    \"text\": \"Mark Lutter\\nhttps://www.marklutter.com/post/startup-nonprofits\\\
    n4/5\"\n  },\n  {\n    \"name\": \"MARK LUTTER PHD\",\n    \"text\": \"\"\n  },\n  {\n    \"name\": \"MEDIUM\",\n    \"\
    text\": \"\"\n  },\n  {\n    \"name\": \"TWITTER\",\n    \"text\": \"\"\n  },\n  {\n    \"name\": \"/29/25, 12:13 AM\"\
    ,\n    \"text\": \"Mark Lutter\\nhttps://www.marklutter.com/post/startup-nonprofits\\n5/5\"\n  }\n]"
