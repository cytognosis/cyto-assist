    \ embeddings as additional input\\n\\u2022 Using conditional language models with style as a conditioning factor\\nOur\
    \ Multi-Style Adapter builds upon these ideas, introducing a more flexible and adaptive approach\\nto style-aware language\
    \ generation.\\n3.3\"\n  },\n  {\n    \"name\": \"PROBLEM SETTING\",\n    \"text\": \"In this work, we address the task\
    \ of style-aware language modeling. Given a sequence of input\\ntokens x = (x1, . . . , xT ) and a desired style s, our\
    \ goal is to generate a sequence of output tokens\\ny = (y1, . . . , yN) that not only continues the input sequence coherently\
    \ but also adheres to the\\nspecified style. Formally, we aim to model the conditional probability distribution:\\nP(y|x,\
    \ s) =\\nN\\nY\\nt=1\\nP(yt|y<t, x, s)\\n(1)\\nwhere y<t represents all tokens generated before yt.\\nTo incorporate style\
    \ awareness, we introduce a set of learnable style embeddings Es \\u2208RK\\u00d7D, where\\nK is the number of predefined\
    \ styles and D is the embedding dimension. These style embeddings are\\nused to modulate the hidden states of the language\
    \ model, allowing for style-specific text generation.\\nOur approach makes the following assumptions:\\n\\u2022 The set\
    \ of styles is predefined and finite.\\n\\u2022 The style of the input sequence is not explicitly provided and must be\
    \ inferred by the model.\\n\\u2022 The model should be capable of maintaining style consistency throughout the generated\\\
    nsequence.\\nBy extending the GPT architecture with our Multi-Style Adapter, we aim to enhance style awareness\\nand consistency\
    \ in character-level language generation while maintaining competitive language\\nmodeling performance.\\n4\"\n  },\n\
