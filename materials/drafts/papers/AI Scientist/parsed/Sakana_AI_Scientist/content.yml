    \ earlier version of the draft. This work was supported by the\\nVector Institute, Canada CIFAR AI Chairs program, grants\
    \ from Schmidt Futures, Open Philanthropy,\\nNSERC, and a generous donation from Rafael Cosman.\"\n  },\n  {\n    \"name\"\
