    nLLM Reviewer Ablations. We compare various prompt configurations for GPT-4o and find that both\\nReflexion (+2%) and\
    \ one-shot prompting (+2%) substantially help with performing more accurate\\nreviewing (Figure 2, top and bottom-right).\
