    \ While Claude Sonnet 3.5 (Anthropic, 2024) and GPT-\\n4o-mini provide a more cost-efficient approach, their performance\
    \ was substantially worse (Table 1).\\nMoreover, we had to threshold scores at 8 for Sonnet 3.5 to obtain calibrated results,\
    \ due to persistent\\nover-optimism bias. Llama 3.1 405B (Llama Team, 2024) struggled to follow the reviewer output\\\
