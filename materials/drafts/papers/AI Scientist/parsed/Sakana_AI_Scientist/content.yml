  sections: "[\n  {\n    \"name\": \"Introduction\",\n    \"text\": \"The modern scientific method (Chalmers, 2013; Dewey,\
    \ 1910; Jevons, 1877) is arguably one of the\\ngreatest achievements of the Enlightenment. Traditionally, a human researcher\
    \ collects background\\nknowledge, drafts a set of plausible hypotheses to test, constructs an evaluation procedure, collects\\\
    nevidence for the different hypotheses, and finally assesses and communicates their findings. Afterward,\\nthe resulting\
    \ manuscript undergoes peer review and subsequent iterations of refinement. This\\nprocedure has led to countless breakthroughs\
    \ in science and technology, improving human quality of\\nlife. However, this iterative process is inherently limited\
    \ by human researchers\\u2019 ingenuity, background\\nknowledge, and finite time. Attempting to automate general scientific\
    \ discovery (Langley, 1987, 2024;\\nWaltz and Buchanan, 2009) has been a long ambition of the community since at least\
    \ the early 70s, with\\ncomputer-assisted works like the Automated Mathematician (Lenat, 1977; Lenat and Brown, 1984)\\\
    nand DENDRAL (Buchanan and Feigenbaum, 1981). In the field of AI, researchers have envisioned the\\npossibility of automating\
    \ AI research using AI itself (Ghahramani, 2015; Schmidhuber, 1991, 2010a,b,\\n2012), leading to \\u201cAI-generating\
    \ algorithms\\u201d (Clune, 2019). More recently, foundation models\\nhave seen tremendous advances in their general capabilities\
    \ (Anthropic, 2024; Google DeepMind\\nGemini Team, 2023; Llama Team, 2024; OpenAI, 2023), but they have only been shown\
    \ to accelerate\\nindividual parts of the research pipeline, e.g. the writing of scientific manuscripts (Altm\\u00e4e\
    \ et al., 2023;\\nCorresponding author(s): Chris Lu (chrislu@sakana.ai), Cong Lu (conglu@cs.ubc.ca), and Robert Tjarko\
    \ Lange (robert@sakana.ai)\\narXiv:2408.06292v3  [cs.AI]  1 Sep 2024\\n\\nThe AI Scientist: Towards Fully Automated Open-Ended\
    \ Scientific Discovery\\nDinu et al., 2024; Ifargan et al., 2024; Majumder et al., 2024), as a muse to brainstorm ideas\
    \ (Baek\\net al., 2024; Girotra et al., 2023; Wang et al., 2024b), or aides to coding (Gauthier, 2024). To date,\\nthe\
    \ community has yet to show the possibility of executing entire research endeavors without human\\ninvolvement.\\nTraditional\
    \ approaches to automating research projects have so far relied on carefully constrain-\\ning the search space of potential\
    \ discoveries, which severely limits the scope of exploration and\\nrequires substantial human expertise and design. For\
    \ example, significant advancements in materials\\ndiscovery (Merchant et al., 2023; Pyzer-Knapp et al., 2022; Szymanski\
    \ et al., 2023) and synthetic\\nbiology (Hayes et al., 2024; Jumper et al., 2021) have been achieved by restricting exploration\
    \ to\\nwell-characterized domains with predefined parameters, which allows for targeted progress but\\nlimits broader,\
    \ open-ended discovery and addressing only a subset of the scientific process, without\\nencompassing tasks such as manuscript\
    \ preparation. Within the field of machine learning itself,\\nresearch automation has largely been restricted to hyperparameter\
    \ and architecture search (He et al.,\\n2021; Hutter et al., 2019; Lu et al., 2022b; Wan et al., 2021, 2022) or algorithm\
    \ discovery (Alet et al.,\\n2020; Chen et al., 2024b; Kirsch et al., 2019; Lange et al., 2023a,b; Lu et al., 2022a; Metz\
    \ et al., 2022)\\nwithin a hand-crafted search space. Recent advances in LLMs have shown the potential to extend the\\\
    nsearch space to more generalized, code-level solutions (Faldor et al., 2024; Lehman et al., 2022; Lu\\net al., 2024a;\
    \ Ma et al., 2023). However, these approaches remain constrained by rigorously-defined\\nsearch spaces and objectives,\
    \ which limit the breadth and depth of possible discoveries.\\nIn this paper, we introduce The AI Scientist, the first\
    \ fully automated and scalable pipeline\\nfor end-to-end paper generation, enabled by recent advances in foundation models.\
    \ Given a broad\\nresearch direction and a simple initial codebase, The AI Scientist seamlessly performs ideation, a\\\
    nliterature search, experiment planning, experiment iterations, manuscript writing, and peer reviewing\\nto produce insightful\
    \ papers. Furthermore, in principle The AI Scientist can run in an open-\\nended loop, building on its previous scientific\
    \ discoveries to improve the next generation of ideas.\\nThis allows us to speed up the slow nature of scientific iteration\
    \ at a surprisingly low financial cost\\n(\\u223c$15/paper) and represents a step towards turning the world\\u2019s ever-increasing\
    \ computing resources\\ninto the scientific breakthroughs needed to tackle the core challenges of the 21st century. Here,\
    \ we\\nfocus on Machine Learning (ML) applications, but this approach can more generally be applied to\\nalmost any other\
    \ discipline, e.g. biology or physics, given an adequate way of automatically executing\\nexperiments (Arnold, 2022; Kehoe\
    \ et al., 2015; Zucchelli et al., 2021).\\nBy leveraging modern LLM frameworks like chain-of-thought (Wei et al., 2022)\
    \ and self-reflection (Shinn\\net al., 2024) to improve decision-making, The AI Scientist is able to generate its own\
    \ scientific\\nideas and hypotheses, as well as a plan for testing them with experiments. Next, The AI Scientist\\nimplements\
    \ plan-directed code-level changes to the experiment \\u201ctemplate\\u201d using the state-of-the-art\\ncoding assistant\
    \ Aider (Gauthier, 2024), and executes experiments to collect a set of computational\"\n  },\n  {\n    \"name\": \"results,\
    \ which are in turn used to draft a scientific paper. The AI Scientist then performs an\",\n    \"text\": \"automated\
    \ paper-reviewing process using guidelines from a standard machine learning conference.\\nFinally, The AI Scientist adds\
    \ the completed ideas and reviewer feedback to its archive of\\nscientific findings, and the process repeats. Crucially,\
    \ the generated paper and experimental artifacts\\nThe AI Scientist produces allow us to easily interpret and judge its\
    \ findings post-hoc, allowing\\nhuman scientists to also benefit from what is learned.\\nOur contributions are summarized\
    \ as follows:\\n1. We introduce the first end-to-end framework for fully automated scientific discovery in Machine\\nLearning\
    \ research, enabled by frontier LLMs (Section 3). This fully automated process includes\\nidea generation, experiment\
    \ design, execution, and visualizing and writing up the results into a\\nfull manuscript.\\n2\\n\\nThe AI Scientist: Towards\
    \ Fully Automated Open-Ended Scientific Discovery\\nFigure 1 | Conceptual illustration of The AI Scientist, an end-to-end\
    \ LLM-driven scientific discovery\\nprocess. The AI Scientist first invents and assesses the novelty of a set of ideas.\
    \ It then determines how to\\ntest the hypotheses, including writing the necessary code by editing a codebase powered\
    \ by recent advances in\\nautomated code generation. Afterward, the experiments are automatically executed to collect\
    \ a set of results\\nconsisting of both numerical scores and visual summaries (e.g. plots or tables). The results are\
    \ motivated,\\nexplained, and summarized in a LaTeX report. Finally, The AI Scientist generates an automated review,\\\
    naccording to current practice at standard machine learning conferences. The review can be used to either\\nimprove the\
    \ project or as feedback to future generations for open-ended scientific discovery.\\n2. To assess the quality of the\
    \ generated papers, we introduce a foundation model-based reviewing\\nprocess in Section 4. This process achieves near-human-level\
    \ performance across multiple evalu-\\nation metrics (e.g. 65% vs. 66% balanced accuracy) when evaluated on ICLR 2022\
    \ OpenReview\\ndata. The reviews further enable The AI Scientist to select the best ideas for \\u201cpublication\\u201d\\\
    nto an ever-growing archive of scientific discoveries, and the process can be repeated to build on\\nthese discoveries,\
    \ just as in the human scientific community.\\n3. The AI Scientist can generate hundreds of interesting, medium-quality\
    \ papers over the\\ncourse of a week. In this report, we focus on a subset of these papers, highlighting novel insights\\\
    nin diffusion modeling, language modeling, and grokking. We perform an in-depth case study\\ninto one selected paper in\
    \ Section 5, and present aggregate results in Section 6.\\n4. We conclude the paper with an extensive discussion on the\
    \ limitations, ethical considerations,\\nand future outlook of our approach in Sections 8 and 9.\"\n  },\n  {\n    \"\
    name\": \"Background\",\n    \"text\": \"Large Language Models. In this paper, we build our automated scientist from autoregressive\
    \ large\\nlanguage models (LLMs, Anthropic (2023); Google DeepMind Gemini Team (2023); Llama Team\\n(2024); OpenAI (2023);\
    \ Zhu et al. (2024)) which learn to generate text completions by modeling the\\nconditional probability of a new token\
    \ (similar to a word) given the preceding tokens, \\ud835\\udc5d(\\ud835\\udc65\\ud835\\udc61|\\ud835\\udc65<\\ud835\\\
    udc61; \\ud835\\udf03),\\nand sampling at test-time. Together with vast data and model scaling, this enables LLMs to not\\\
    nonly generate coherent text, but crucially also exhibit human-like abilities, including commonsense\\nknowledge (Talmor\
    \ et al., 2019), reasoning (Wei et al., 2022), and the ability to write code (Chen\\net al., 2021; Xu et al., 2022).\\\
    nLLM Agent Frameworks. Typical applications of LLMs often involve embedding the model into\\nan \\u201cagent\\u201d (Wang\
    \ et al., 2024a) framework, including the following possibilities: the structuring of\\n3\\n\\nThe AI Scientist: Towards\
    \ Fully Automated Open-Ended Scientific Discovery\\nlanguage queries (e.g. few-shot prompting (Brown et al., 2020)), encouraging\
    \ reasoning traces (e.g.\\nchain-of-thought (Wei et al., 2022)), or asking the model to iteratively refine its outputs\
    \ (e.g., self-\\nreflection (Shinn et al., 2024)). These leverage the language model\\u2019s ability to learn in-context\
    \ (Olsson\\net al., 2022) and can greatly improve its performance, robustness and reliability on many tasks.\\nAider:\
    \ An LLM-Based Coding Assistant. Our automated scientist directly implements ideas in code\\nand uses a state-of-the-art\
    \ open-source coding assistant, Aider (Gauthier, 2024). Aider is an agent\\nframework that is designed to implement requested\
    \ features, fix bugs, or refactor code in existing\\ncodebases. While Aider can in principle use any underlying LLM, with\
    \ frontier models it achieves a\\nremarkable success rate of 18.9% on the SWE Bench (Jimenez et al., 2024) benchmark,\
    \ a collection\\nof real-world GitHub issues. In conjunction with new innovations added in this work, this level of\\\
    nreliability enables us, for the first time, to fully automate the ML research process.\"\n  },\n  {\n    \"name\": \"\
    The AI Scientist\",\n    \"text\": \"Overview. The AI Scientist has three main phases (Figure 1): (1) Idea Generation,\
    \ (2) Ex-\\nperimental Iteration, and (3) Paper Write-up. After the write-up, we introduce and validate an\\nLLM-generated\
    \ review to assess the quality of the generated paper (Section 4). We provide The AI\\nScientist with a starting code\
    \ template that reproduces a lightweight baseline training run from a\\npopular model or benchmark. For example, this\
    \ could be code that trains a small transformer on the\\nworks of Shakespeare (Karpathy, 2022), a classic proof-of-concept\
    \ training run from natural language\\nprocessing that completes within a few minutes. The AI Scientist is then free to\
    \ explore any\\npossible research direction. The template also includes a LaTeX folder that contains style files and\\\
    nsection headers, along with simple plotting code. We provide further details on the templates in\\nSection 6, but in\
    \ general, each run starts with a representative small-scale experiment relevant to\\nthe topic area. The focus on small-scale\
    \ experiments is not a fundamental limitation of our method,\\nbut simply for computational efficiency reasons and compute\
    \ constraints on our end. We provide the\\nprompts for all stages in Appendix A.\\n1. Idea Generation. Given a starting\
    \ template, The AI Scientist first \\u201cbrainstorms\\u201d a diverse set\\nof novel research directions. We take inspiration\
    \ from evolutionary computation and open-endedness\\nresearch (Brant and Stanley, 2017; Lehman et al., 2008; Stanley,\
    \ 2019; Stanley et al., 2017) and\\niteratively grow an archive of ideas using LLMs as the mutation operator (Faldor et\
    \ al., 2024; Lehman\\net al., 2022; Lu et al., 2024b; Zhang et al., 2024). Each idea comprises a description, experiment\\\
    nexecution plan, and (self-assessed) numerical scores of interestingness, novelty, and feasibility. At each\\niteration,\
    \ we prompt the language model to generate an interesting new research direction conditional\\non the existing archive,\
    \ which can include the numerical review scores from completed previous ideas.\\nWe use multiple rounds of chain-of-thought\
    \ (Wei et al., 2022) and self-reflection (Shinn et al., 2024)\\nto refine and develop each idea. After idea generation,\
    \ we filter ideas by connecting the language\\nmodel with the Semantic Scholar API (Fricke, 2018) and web access as a\
    \ tool (Schick et al., 2024).\\nThis allows The AI Scientist to discard any idea that is too similar to existing literature.\\\
    n2. Experiment Iteration. Given an idea and a template, the second phase of The AI Scientist\\nfirst executes the proposed\
    \ experiments and then visualizes its results for the downstream write-up.\\nThe AI Scientist uses Aider to first plan\
    \ a list of experiments to run and then executes them\\nin order. We make this process more robust by returning any errors\
    \ upon a failure or time-out (e.g.\\nexperiments taking too long to run) to Aider to fix the code and re-attempt up to\
    \ four times.\\nAfter the completion of each experiment, Aider is then given the results and told to take notes in\\nthe\
    \ style of an experimental journal. Currently, it only conditions on text but in future versions, this\\ncould include\
    \ data visualizations or any modality. Conditional on the results, it then re-plans and\\nimplements the next experiment.\
    \ This process is repeated up to five times. Upon completion of\\n4\\n\\nThe AI Scientist: Towards Fully Automated Open-Ended\
    \ Scientific Discovery\\nexperiments, Aider is prompted to edit a plotting script to create figures for the paper using\
    \ Python.\\nThe AI Scientist makes a note describing what each plot contains, enabling the saved figures\\nand experimental\
    \ notes to provide all the information required to write up the paper. At all steps,\\nAider sees its history of execution.\\\
    nNote that, in general, the provided initial seed plotting and experiment templates are small, self-\\ncontained files.\
    \ The AI Scientist frequently implements entirely new plots and collects new\\nmetrics that are not in the seed templates.\
    \ This ability to arbitrarily edit the code occasionally leads\\nto unexpected outcomes (Section 8).\\n3. Paper Write-up.\
    \ The third phase of The AI Scientist produces a concise and informative\\nwrite-up of its progress in the style of a\
    \ standard machine learning conference proceeding in LaTeX.\\nWe note that writing good LaTeX can even take competent\
    \ human researchers some time, so we take\\nseveral steps to robustify the process. This consists of the following:\\\
    n(a) Per-Section Text Generation: The recorded notes and plots are passed to Aider, which is\\nprompted to fill in a blank\
    \ conference template section by section. This goes in order of\"\n  },\n  {\n    \"name\": \"introduction, background,\
    \ methods, experimental setup, results, and then the conclusion (all\",\n    \"text\": \"sections apart from the related\
    \ work). All previous sections of the paper it has already written\\nare in the context of the language model. We include\
    \ brief tips and guidelines on what each\\nsection should include, based on the popular \\u201cHow to ML Paper\\u201d\
    \ guide, and include details in\\nAppendix A.3. At each step of writing, Aider is prompted to only use real experimental\
    \ results in\\nthe form of notes and figures generated from code, and real citations to reduce hallucination. Each\\nsection\
    \ is initially refined with one round of self-reflection (Shinn et al., 2024) as it is being\\nwritten. Aider is prompted\
    \ to not include any citations in the text at this stage, and fill in only a\\nskeleton for the related work, which will\
    \ be completed in the next stage.\\n(b) Web Search for References: In a similar vein to idea generation, The AI Scientist\
    \ is\\nallowed 20 rounds to poll the Semantic Scholar API looking for the most relevant sources to\\ncompare and contrast\
    \ the near-completed paper against for the related work section. This\\nprocess also allows The AI Scientist to select\
    \ any papers it would like to discuss and\\nadditionally fill in any citations that are missing from other sections of\
    \ the paper. Alongside\\neach selected paper, a short description is produced of where and how to include the citation,\\\
    nwhich is then passed to Aider. The paper\\u2019s bibtex is automatically appended to the LaTeX file to\\nguarantee correctness.\\\
    n(c) Refinement: After the previous two stages, The AI Scientist has a completed first draft,\\nbut can often be overly\
    \ verbose and repetitive. To resolve this, we perform one final round of\\nself-reflection section-by-section, aiming\
    \ to remove any duplicated information and streamline\\nthe arguments of the paper.\\n(d) Compilation: Once the LaTeX\
    \ template has been filled in with all the appropriate results, this\\nis fed into a LaTeX compiler. We use a LaTeX linter\
    \ and pipe compilation errors back into Aider\\nso that it can automatically correct any issues.\"\n  },\n  {\n    \"\
    name\": \"Automated Paper Reviewing\",\n    \"text\": \"An LLM Reviewer Agent. A key component of an effective scientific\
    \ community is its reviewing\\nsystem, which evaluates and improves the quality of scientific papers. To mimic such a\
    \ process using\\nlarge language models, we design a GPT-4o-based agent (OpenAI, 2023) to conduct paper reviews\\nbased\
    \ on the Neural Information Processing Systems (NeurIPS) conference review guidelines. The\\nreview agent processes the\
    \ raw text of the PDF manuscript using the PyMuPDF parsing library. The\\noutput contains numerical scores (soundness,\
    \ presentation, contribution, overall, confidence), lists of\\nweaknesses and strengths as well as a preliminary binary\
    \ decision (accept or reject). These decisions\\n5\\n\\nThe AI Scientist: Towards Fully Automated Open-Ended Scientific\
    \ Discovery\\nmay then be post-calibrated by thresholding using the reviewer score. We leverage this automated\\nreviewing\
    \ process to obtain an initial evaluation of the papers generated by The AI Scientist.\\nWe provide the entire reviewing\
    \ prompt template in Appendix A.4.\\nTable 1 | Performance of The AI Scientist\\u2019s automated LLM reviewing system\
