    \ control codes.\\nThis allows our model to potentially discover and utilize more nuanced style representations that may\\\
    nnot be captured by predefined categories.\\nOur Multi-Style Adapter addresses several limitations of these existing approaches:\\\
    n1. Flexibility: Unlike methods that rely on predefined style categories or control codes, our approach\\nlearns style\
    \ representations during training, allowing for more flexible and adaptable style modeling.\\n2. Granularity: By incorporating\
