    Figure 2: StratCP controls pre-specified error rates across ophthalmology and neuro-oncology tasks. a, In the

    action arm, StratCP maps FM predictions of patient profiles to candidate disease statuses and select predictions eligible

    for downstream action under a pre-specified error budget. Not-selected predictions are routed to the deferral arm, where

    StratCP returns prediction sets calibrated to achieve the target coverage (e.g., the set contains the true disease status

    for 95% of deferred patients). b, StratCP constructs a one-dimensional confidence score and calibrates a decision

    threshold using expert-labeled reference data, following a post-selection calibration procedure [30]. Predictions with

    scores above the threshold are selected in the action arm (Methods). c, Guide to interpreting performance in terms of

    coverage and efficiency. A method is valid if it achieves coverage at least the target level and efficient if it selects
    more

    patients or slides while producing smaller prediction sets. A method is conservative if its coverage exceeds the target

    level but efficiency is low. A method is invalid and inefficient if its coverage is below the target level and efficiency

    is low. A method is aggressive if its coverage is below the target level even though efficiency is high. d, Diabetic

    retinopathy severity grading. From top to bottom: (i) coverage (1 – false discovery rate) within each predicted stage

    among selected patients; (ii) the number of selected predictions per predicted stage; (iii) marginal coverage over all

    held-out patients across target levels; and (iv) marginal prediction-set size over all patients across target levels.
