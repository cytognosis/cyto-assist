content:
  abstract: 'Clinical deployment of foundation models requires decision policies that operate under explicit error

    budgets, such as a cap on false-positive clinical calls. Strong average accuracy alone does not guarantee

    safety: errors can concentrate among patients selected for action, leading to harm and inefficient

    use of healthcare resources.

    Here we introduce StratCP, a stratified conformal framework that

    turns foundation model predictions into decision-ready outputs through error-controlled selection

    and calibrated deferral.

    StratCP first selects a subset of patients for immediate clinical action

    while controlling the false discovery rate at a user-specified level.

    For the remaining patients, it

    returns prediction sets that achieve target coverage conditional on deferral, supporting confirmatory

    testing or expert review. When clinical guidelines define relationships among disease states, StratCP

    incorporates a utility graph to produce clinically coherent prediction sets without sacrificing coverage

    guarantees. We evaluate StratCP in ophthalmology and neuro-oncology across diagnosis, biomarker

    prediction, and time-to-event prognosis.

    Across tasks, StratCP controls the false discovery rate

    among selected patients and provides valid, selection-conditional coverage for deferred patients. In

    neuro-oncology, it enables H&E-based diagnosis under a fixed error budget, reducing reliance on

    reflex molecular assays and lowering laboratory cost and turnaround time.

    StratCP establishes

    error-controlled decision policies for safe deployment of medical foundation models.

    Main

    Medical foundation models (FMs) have been developed across diverse clinical data modalities,

    including retinal imaging [1], whole-slide histopathology [2, 3], and longitudinal electronic health

    records (EHRs) [4–7]. Several FMs have progressed to prospective evaluation and integration

    within health-system workflows, spanning language models for diagnosis and risk prediction [8–

    10] and pathology FMs in silent deployment for EGFR screening [11].

    Routine clinical use,

    however, shifts the objective from benchmark performance to actionable outputs that support safe

    downstream decisions under pre-specified error budgets. The central question is not only how

