    ndoi:\\nmedRxiv preprint\\n\\nUtility improvement. We now describe the implementations of utility enhancement in Fig.\
    \ 4e.\\nWe query the GPT-o1 model API with the detailed description of each condition provided in the\\noriginal dataset\
