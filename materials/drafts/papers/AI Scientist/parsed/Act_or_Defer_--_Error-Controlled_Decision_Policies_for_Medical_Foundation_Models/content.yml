    \ holder for this\\nthis version posted February 26, 2026.\\n;\\nhttps://doi.org/10.64898/2026.02.23.26346927\\ndoi:\\\
    nmedRxiv preprint\\n\\nmethod does not involve the training and validation folds used to fine-tune the RETFound models,\\\
    nso that the fine-tuned models were treated as fixed and independent of the data used in evaluation.\\nThe original test\
    \ fold was randomly split into two equally-sized subsets: a calibration fold and a\\ntest fold. The calibration fold served\
    \ as labeled data used in StratCP; the test fold was treated\\nas unlabeled data for which decisions or prediction sets\
    \ are to be issued, with ground-truth labels\\nreserved for evaluation. Given the fine-tuned model, StratCP only uses\
    \ the model predictions\\napplied to the calibration and test folds. No further information such as hidden representations\
    \ of\\nthe fine-tuned foundation models is needed. The specific implementations of the experiments in\\nthese tasks are\
    \ described in Section 4, following the general algorithms in Section 2.\\n1.2\\nModels and datasets for neuro-oncology\
    \ tasks\\nOverview. Across all neuro-oncology tasks, we extracted patch-level features from H&E-stained\\nwhole-slide\
    \ images (WSIs) using the UNI foundation model [2]. We obtained task-specific predic-\\ntors by fine-tuning these features\
    \ with attention-based multiple instance learning (ABMIL) [55] on\\ncohorts curated for each endpoint. We then applied\
    \ StratCP to the resulting task-specific scores:\\nthe action arm selects a confident subset under an expert-specified\
    \ error budget (FDR control), and\\nthe deferral arm provides coverage guarantees for the remaining (deferred) slides.\\\
    nDatasets. We used WSIs from TCGA-LGG and TCGA-GBM (downloaded via the NIH GDC\\nportal [35]) and from the EBRAINS repository\
    \ [36]. For TCGA, we included only FFPE diagnostic\\nslides; the majority were scanned at 40\\u00d7 magnification, with\
    \ a minority at 20\\u00d7. For EBRAINS, all\\nslides were scanned at 40\\u00d7 and include expert-assigned WHO-based diagnostic\
    \ labels spanning 30\\nCNS tumor types.\\nWSI preprocessing. We segmented, patched, and preprocessed WSIs using the CLAM\
    \ pipeline\\n[58]. For TCGA slides, we used the CLAM \\u201cTCGA\\u201d preset for tissue segmentation; for EBRAINS,\\\
    nwe used the \\u201cBWH biopsy\\u201d preset. When a slide did not contain a downsample level equivalent\\nto 20\\u00d7,\
    \ patches were extracted at 40\\u00d7 using a 512 \\u00d7 512 pixel window and subsequently resized\\nto 224 \\u00d7 224\
    \ for feature extraction, yielding an effective magnification comparable to 20\\u00d7 (as in\\n[2]). After segmentation\
    \ and tiling, patch embeddings were computed with UNI and aggregated\\nby ABMIL during task-specific fine-tuning.\\n27\\\
