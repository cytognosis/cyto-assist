    \ sets that contain the\\ntrue disease status, along with efficiency metrics: the number of deferred patients or slides\
    \ that\\nreceive prediction sets and the size of those sets.\\nAcross ophthalmology tasks, StratCP (using RETFound [1]\
    \ FM to generate predictions)\\nmeets the target coverage level on deferred patients. In the diabetic retinopathy diagnosis\
    \ task,\\nStratCP defers 279.7 patients and attains the desired 95.0% coverage on this deferred set (Fig. 3b,\\ntop panel).\
    \ In contrast, CP under-covers on deferred patients (94.2% coverage over 478 patients),\\nincreasing the risk that the\
    \ returned prediction set omits the correct diagnosis. Thresh selects\\nfar fewer patients and leaves roughly twice as\
    \ many patients deferred as StratCP, shifting a larger\\nfraction of patients to follow-up evaluation (98.6% coverage\
    \ over 550 deferred patients) (Fig. 3b,\\nmiddle panel). Because StratCP defers patients whose FM predictions fall below\
    \ the action-arm\\nthreshold, the deferred set contains patients for whom FM\\u2019s predictions have lower separation\\\
    nbetween candidate disease statuses; StratCP therefore returns larger prediction sets to maintain\\nthe target coverage\
    \ (StratCP: average size of 2.98; CP: average size of 2.28; Thresh: average\\nsize of 2.73) (Fig. 3b, bottom panel).\\\
    nIn the glaucoma diagnosis task (Fig. 3c), StratCP leaves fewer deferred patients than CP\\nand Thresh, on which the coverage\
    \ is exact; as CP and Thresh overselects in the action arm,\\nthey become conservative for the deferred patients (StratCP:\
    \ 95% coverage on 128.3 patients,\\nsuggesting 1.90 diagnosis labels on average; CP: 98% coverage on 192.5 patients, suggesting\
    \ 2.00\\ndiagnosis labels on average; Thresh: 99.9% coverage on 214.1 patients, suggesting 2.10 diagnosis\\nlabels on\
    \ average).\\nIn the eye condition diagnosis task (Fig. 3d), StratCP leaves fewer deferred diagnoses, con-\\nstructs prediction\
    \ sets with exact coverage, and the prediction sets contain more possible diagnoses\\n10\\n.\\nCC-BY-NC 4.0 International\
