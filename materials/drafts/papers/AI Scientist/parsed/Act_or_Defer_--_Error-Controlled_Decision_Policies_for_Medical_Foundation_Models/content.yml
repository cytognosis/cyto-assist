    npreprint\\nThe copyright holder for this\\nthis version posted February 26, 2026.\\n;\\nhttps://doi.org/10.64898/2026.02.23.26346927\\\
    ndoi:\\nmedRxiv preprint\\n\\nStratCP enables H&E-only finalization of diagnosis for a subset of patients under the pre-\\\
    nspecified FDR, reducing the need for reflex molecular testing. Using GlioSeq (a routine CNS tumor\\npanel at UPMC [50])\
    \ as a reference, each glioblastoma, IDH-wildtype case finalized from H&E\\nalone saves an average of 8.7 laboratory days\
    \ of turnaround and $1,650 in assay cost [50]. With\\nan annual U.S. incidence of \\u22488,000 GBM, IDH-wildtype cases\
    \ (CBTRUS [41]) and a conservative\\nacted-upon fraction of 0.95, this corresponds to \\u224866,000 laboratory days and\
    \ $12.5 million in\\nannual molecular testing assay costs (Methods).\"\n  },\n  {\n    \"name\": \"Discussion\",\n   \
    \ \"text\": \"Clinical use of medical foundation models raises a question beyond average accuracy: when\\ndoes a model\
    \ prediction allow for immediate clinical action, and when should clinicians defer\\nto additional evaluation? StratCP\
    \ operationalizes this decision boundary by combining error-\\ncontrolled action with calibrated deferral. In the action\
    \ arm, StratCP selects a subset of patients\\nfor whom clinicians can act on the model prediction while controlling the\
    \ false discovery rate at a\\npre-specified budget. For the remaining patients, the deferral arm returns calibrated prediction\
    \ sets\\nwith a coverage guarantee, so that the true disease status lies in the set at the target rate. Across\\ndiagnosis,\
    \ biomarker prediction, and prognosis, StratCP converts FM outputs into decision-ready\\nrecommendations that specify\
    \ when to act and what alternatives to consider when deferring.\\nStratCP extends conformal prediction from population-level\
    \ guarantees to action-aligned\\ncalibration. Standard conformal methods provide marginal coverage, but they do not specify\
    \ which\\npatients should receive an immediate action versus be deferred. StratCP makes this split explicit\\nby controlling\
    \ FDR among selected patients in the action arm and returning calibrated prediction\\nsets for deferred patients (or calibrated\
    \ lower prediction bounds in time-to-event settings).\\nIn\\nclassification, we find that standard conformal prediction\
    \ can overspend disease-status-specific error\\nbudgets among selected predictions, whereas StratCP enables abstention\
    \ so that only patients who\\nmeet the budget receive a definitive assignment and the remainder receive calibrated differentials.\\\
    nThis provides a principled deferral mechanism for FMs that otherwise return only point predictions,\\nrouting uncertain\
    \ cases to confirmatory testing or follow-up and helping allocate limited diagnostic\\nresources [51]. We also show that\
    \ task-specific utility graphs can shape prediction sets without\\nsacrificing coverage, yielding differentials that respect\
    \ clinical adjacency and often lead to similar\\ndownstream actions, such as adjacent diabetic retinopathy or CNS subtypes\
    \ related by grade. In\\ntime-to-event settings, StratCP identifies patients likely to achieve favorable early survival\
    \ under\\n16\\n.\\nCC-BY-NC 4.0 International license\\nIt is made available under a\\nis the author/funder, who has granted\
    \ medRxiv a license to display the preprint in perpetuity.\\n(which was not certified by peer review)\\npreprint\\nThe\
    \ copyright holder for this\\nthis version posted February 26, 2026.\\n;\\nhttps://doi.org/10.64898/2026.02.23.26346927\\\
    ndoi:\\nmedRxiv preprint\\n\\nexplicit FDR control and returns calibrated lower survival bounds for deferred patients.\\\
    nStratCP is model agnostic: it takes patient- or slide-level predictions from an existing FM\\nand returns decision-ready\
    \ recommendations without retraining. Separating the prediction model\\nfrom the decision layer also simplifies updates\
    \ when clinical guidelines change, because the policy\\ncan be revised by updating disease-status definitions or guideline-based\
    \ adjacency rules rather than\\nrebuilding the model. This modularity supports site-to-site evaluation, routine maintenance\
    \ as\\ndata and workflows evolve, and integration at clearly defined decision points in clinical pipelines.\\nIn neuro-oncology,\
    \ for example, StratCP supports H&E-only sign-out for a subset of adult-type\\ndiffuse glioma cases under a pre-specified\
    \ FDR budget, with the potential to reduce laboratory cost\\nand diagnostic turnaround.\\nOur study has limitations. The\
    \ coverage and error-control guarantees rely on exchangeability\\nbetween the calibration data and the data encountered\
    \ at use, and distribution shifts across sites\\nor technical factors (for example, staining protocols or scanners) can\
    \ weaken nominal control.\\nPerformance also depends on label quality and on having sufficient calibration examples for\
    \ rare\\ndisease statuses. When labels are noisy or calibration data are sparse, prediction sets can widen and\\nthe action\
    \ arm may select few or no patients for some statuses. Large-scale pretraining may improve\\nrobustness across centers\
    \ and for rare diseases [34], but FMs alone do not resolve covariate or label\\nshift [52]; local calibration and ongoing\
    \ monitoring remain necessary. Utility graphs encode expert\\nstructure, but these priors may vary across institutions\
    \ and evolve over time, requiring governance\\nto remain aligned with up-to-date clinical practice. Finally, StratCP inherits\
    \ the discriminative\\nlimits of its base FM: weaker models lead to larger sets and more deferral, whereas stronger models\\\
    nsupport action for more patients under the same error budget.\\nA future direction is to extend error-controlled decision\
    \ policies for FMs across clinical\\nsettings. In cancer research, FMs have shown promise, but their integration into\
    \ routine care\\nremains limited. With StratCP, these models could support biomarker prediction in routine care\\nby prioritizing\
    \ confirmatory assays, such as IDH mutation, TP53 alterations, and breast cancer\\nhormone status [11, 53]. StratCP could\
    \ also support grading and primary diagnosis, including\\nin settings where reflex testing is constrained [54]. Error-budget-aware\
    \ selection, together with\\ncalibrated differential diagnosis sets, could streamline workflows by directing molecular\
    \ testing\\nto cases where it provides the greatest benefit. Another direction is to extend the framework to\\nadditional\
    \ clinically actionable endpoints, such as therapy effectiveness (response and progression-\\nfree survival) and adverse\
    \ events. StratCP provides a general decision layer for medical FMs,\\nenabling error-controlled action based on FM predictions.\\\
