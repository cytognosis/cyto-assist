    nmedRxiv preprint\\n\\nStratCP selects, the expected fraction of incorrect diagnoses is controlled at 5% (FDR), supporting\\\
    nH&E-only sign-out of selected slides under the specified 5% error budget (Methods).\\nStratCP\\u2019s action arm supports\
    \ error-controlled H&E-only diagnostic triage. After initial\\nH&E review, intraoperative cases suspected of adult-type\
    \ diffuse glioma are triaged into three\\nmorphology-defined branches [49]: (i) microvascular proliferation (MVP) or necrosis,\
    \ (ii) mitotic\\nactivity without MVP/necrosis, and (iii) neither feature. For each branch, we train a dedicated\\nclassifier\
    \ on UNI-derived patch embeddings from WSIs in EBRAINS [36] and TCGA [35], us-\\ning ground-truth labels for the candidate\
    \ diagnoses within that branch (Fig. 6a; Supplementary\\nTable S7; Methods). Within each branch, StratCP controls the\
    \ FDR at the 5% level among\\nselected predictions for each candidate diagnosis. This supports a workflow in which StratCP\\\
    ncan issue H&E-only diagnoses for selected slides with an error budget guarantee. We report one\\nrepresentative diagnosis\
