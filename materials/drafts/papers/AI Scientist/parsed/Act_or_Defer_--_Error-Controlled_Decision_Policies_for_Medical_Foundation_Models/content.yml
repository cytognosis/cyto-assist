    \ APS score. The\\ncoverage is evaluated over all deferred patients accordingly.\\n4.2\\nGlaucoma diagnosis\\nThe Glaucoma\
    \ diagnosis task comes with \\ud835\\udc3e= 3 distinct disease statuses in the form of disease\\nstages. For the selection\
