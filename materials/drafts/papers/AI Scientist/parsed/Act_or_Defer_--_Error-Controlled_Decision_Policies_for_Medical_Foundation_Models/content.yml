    into differentiated downstream actions. When clinicians use CP outputs to route patients into

    downstream actions, marginal coverage does not ensure error control within the decision-induced

    subsets [29, 30], such as the subset of patients on which a clinician acts. Put differently, 95%

    marginal coverage over all patients does not imply 95% correctness among patients selected for

    action. In practice, this can concentrate errors among high-stakes acted-upon predictions, while

    producing large prediction sets for ambiguous cases that are difficult to interpret and often lack

    clinical coherence, limiting their utility for follow-up evaluation.

    To meet these guarantees, we introduce StratCP, a stratified conformal framework that

    turns foundation model predictions into two types of clinical decision support: when to act and

    how to follow up. In the action arm, StratCP selects a subset of patients for whom the model

    prediction is reliable enough to support immediate clinical action under a pre-specified error budget.

    Concretely, it controls the false discovery rate (FDR), the expected fraction of incorrect predictions

    among selected patients, at a user-chosen level (such as 5%) for predictions such as tumor subtype

    or favorable-early-survival status. In the deferral arm, StratCP defers the remaining patients and

    returns prediction sets with selection-conditional coverage, meaning that among deferred patients

    the set contains the true disease status with the desired probability (such as 95%). When diagnostic

    guidelines are available, StratCP uses them to group disease statuses so that prediction sets are

    clinically coherent without sacrificing coverage.

    StratCP can wrap any FM as a post-processing layer and does not require retraining. We

    pair StratCP with a vision foundation model [1] for retinal imaging and a pathology foundation

    model [2] for H&E whole-slide images.

    We evaluate StratCP in ophthalmology and neuro-

    oncology across diagnosis, biomarker prediction, and time-to-event prognosis.

    Across tasks,

    StratCP controls error among selected patients (action arm) and returns calibrated prediction sets

    that contain the true disease status at the target rate for deferred patients (deferral arm). In eye-

    condition diagnosis, both StratCP and CP satisfy the 5% error budget among selected patients,

    but StratCP acts on more patients on average (119.2 vs. 97.5), indicating better calibration and

    more efficient use of the error budget. In IDH mutation status prediction, StratCP keeps the error

    rate within the 5% budget for IDH-mutant predictions (FDR 0.046), whereas CP exceeds the error

    budget on its selected subset of patients (FDR 0.096). For central nervous system (CNS) tumor

    subtyping, StratCP abstains as needed to meet the 5% error budget (StratCP: 143 selected,

    FDR 0.047), while CP overspends it (CP: 175 selected, FDR 0.090). In time-to-event prognosis,

    StratCP matches CP on error control at 5% among selected patients, yet acts on more patients

    on average (36.6 vs. 2.1). We show that utility graphs derived from diagnostic guidelines can

