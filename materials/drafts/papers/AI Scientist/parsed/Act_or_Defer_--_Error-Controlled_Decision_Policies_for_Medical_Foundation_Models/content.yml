    \ constructs a one-dimensional confidence score and calibrates a decision\\nthreshold using expert-labeled reference data,\
    \ following a post-selection calibration procedure [30]. Predictions with\\nscores above the threshold are selected in\
    \ the action arm (Methods). c, Guide to interpreting performance in terms of\\ncoverage and efficiency. A method is valid\
    \ if it achieves coverage at least the target level and efficient if it selects more\\npatients or slides while producing\
    \ smaller prediction sets. A method is conservative if its coverage exceeds the target\\nlevel but efficiency is low.\
    \ A method is invalid and inefficient if its coverage is below the target level and efficiency\\nis low. A method is aggressive\
    \ if its coverage is below the target level even though efficiency is high. d, Diabetic\\nretinopathy severity grading.\
