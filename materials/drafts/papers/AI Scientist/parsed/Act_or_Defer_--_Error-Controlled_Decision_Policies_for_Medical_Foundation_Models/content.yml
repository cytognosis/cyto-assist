    \ 3 over 500 independent runs.\\n4.3\\nEye condition diagnosis\\nThere are |Y| = 39 disease statuses in the eye condition\
    \ diagnosis dataset that indicate various\\neye conditions, from normal conditions to severe ones. Given the limited sample\
    \ size, we do not\\nassign a separate decision group for every disease status. Instead, we only consider the selection\
    \ of\\nany confident prediction, no matter its specific disease status, and control the error rate in selected\\nand deferred\
    \ patients. While the first and second steps are largely the same as those in the diabetic\\nretinopathy diagnosis task,\
    \ we briefly describe the implementations here.\\nWe use the trustworthiness criteria I( \\ud835\\udc53, \\ud835\\udc65,\
    \ \\ud835\\udc66) = 1{\\ud835\\udc66= argmax\\ud835\\udc66\\u2032\\u2208Y \\ud835\\udc53(\\ud835\\udc65, \\ud835\\udc66\\\
