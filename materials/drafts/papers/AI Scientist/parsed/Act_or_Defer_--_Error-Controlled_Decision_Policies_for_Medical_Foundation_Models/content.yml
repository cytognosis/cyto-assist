    \ on 143.1 patients, suggesting 6.5 diagnosis\\nlabels on average).\\nIn neuro-oncology, when paired with UNI [2] FM,\
    \ StratCP attains the 95% target coverage\\non deferred slides in both the IDH mutation status and CNS tumor subtyping\
    \ tasks. In IDH mutation\\nstatus prediction, StratCP meets the 95% coverage target (Fig. 3e). Thresh also reaches the\\\
    ntarget on its deferred subset, but defers fewer slides (31 versus 73 for StratCP) because it selects\\nmore slides in\
    \ the action arm, where it fails to meet the error requirement (Fig. 2g). CP meets the\\ntarget coverage on deferred slides\
    \ but selects fewer slides in the action arm, resulting in a larger\\ndeferred pool and larger prediction sets on average\
    \ (221 deferred slides, mean set size 2.00 for\\nCP versus 73 deferred slides, mean set size 1.83 for StratCP), which\
    \ increases the amount of\\nfollow-up interpretation and workup required.\\nIn the CNS tumor subtyping task, paired with\
    \ UNI [2] FM for generating predictions, both\\nStratCP and CP achieve the 95% coverage target on deferred slides (Fig.\
    \ 3f), whereas Thresh\\nfalls short (mean coverage 0.802 for Thresh, 0.941 for StratCP, and 0.963 for CP). To satisfy\\\
    nits action-arm FDR guarantee, StratCP defers more slides than CP (339 for StratCP vs. 307 for\\nCP), while returning\
    \ prediction sets of comparable size within the deferred subset (average size\\n7.76 for StratCP vs. 7.77 for CP). Clinically,\
    \ this demonstrates that StratCP provides calibrated\\ndisease differentials for deferred patients (i.e., those not selected\
    \ in the action arm) that include the\\ntrue disease subtype at the target coverage level.\\nClinical guideline-informed\
    \ prediction sets for follow-up\\nFollow-up evaluation is more efficient when prediction sets group disease statuses that\
    \ are clinically\\nrelated, such as adjacent severity stages, related tumor subtypes, or conditions that share the\\nsame\
    \ next diagnostic step. Compared with prediction sets that mix unrelated statuses, these sets\\nallow clinicians to resolve\
    \ remaining uncertainty with fewer confirmatory tests or a single disease\\nmanagement pathway. Standard conformal prediction\
    \ does not incorporate this clinical structure:\\nit forms prediction sets from model-derived scores alone, which can\
    \ combine clinically unrelated\\nstatuses, particularly when the underlying FM is miscalibrated.\\nStratCP includes an\
    \ optional module that incorporates relationships defined in diagnostic\\nguidelines (Fig. 4a). We encode these relationships\
    \ as a CP utility graph, where nodes represent\\n11\\n.\\nCC-BY-NC 4.0 International license\\nIt is made available under\
    \ a\\nis the author/funder, who has granted medRxiv a license to display the preprint in perpetuity.\\n(which was not\
    \ certified by peer review)\\npreprint\\nThe copyright holder for this\\nthis version posted February 26, 2026.\\n;\\\
    nhttps://doi.org/10.64898/2026.02.23.26346927\\ndoi:\\nmedRxiv preprint\\n\\ndisease statuses and edge weights quantify\
    \ the utility of including two statuses in the same prediction\\nset. The graph can capture ordinal progression, shared\
    \ disease management or treatment actions, or\\ngrade-based relationships among tumor subtypes. StratCP constructs prediction\
    \ sets by combining\\nFM-predicted probabilities with this utility graph. It begins with the highest-probability disease\\\
    nstatus under the FM and iteratively adds the candidate that maximizes utility relative to the statuses\\nalready selected.\
    \ StratCP then returns the smallest prefix of this ordered list that satisfies the\\ntarget coverage guarantee (see Methods).\\\
    nWe demonstrate this utility-based construction in ophthalmology tasks with different label\\nstructures. In diabetic\
    \ retinopathy grading (Fig. 4b-d), prediction sets represent candidate stages\\nalong an ordinal severity spectrum. Using\
    \ a chain-structured utility graph, StratCP constructs\\nprediction sets that contain consecutive stages, reflecting adjacency\
    \ on the severity scale. This\\nyields stage sets that correspond to similar follow-up actions, while maintaining the\
    \ target coverage\\nguarantee. In eye condition prediction (Fig. 4e-g), different candidate disease statuses often imply\\\
    ndifferent follow-up actions. For example, tessellated fundus typically does not require intervention,\\nwhereas maculopathy\
    \ may warrant counseling, monitoring, or treatment [38\\u201340].\\nTo encode\\nthis structure, we construct a utility\
    \ graph whose edge weights quantify overlap in downstream\\nmanagement actions between pairs of disease statuses. We estimate\
    \ these overlaps by prompting a\\nlarge language model to generate a fixed set of \\ud835\\udc3e= 10 management actions\
    \ for each disease status\\n(see Methods). StratCP then uses this graph to prioritize prediction sets whose members share\\\
    nmanagement actions. Relative to standard StratCP (without the utility graph), utility-enhanced\\nStratCP increases overlap\
    \ in recommended management actions at matched set size (utility-\\nenhanced/standard StratCP: average utility 4.89/4.47\
    \ for prediction set of size two, 5.11/4.03 for\\nprediction set of size three, 4.88/3.66 for prediction set of size four,\
    \ and 4.61/3.54 for prediction\\nset of size five). Supplementary Fig. S1 shows an example in which utility enhancement\
    \ returns\\na focused set of candidate disease statuses with more consistent follow-up actions, even though\\nStratCP\
    \ does not explicitly optimize urgency.\\nIn neuro-oncology, in the CNS tumor subtyping task (Fig. 4h-j), each disease\
    \ status cor-\\nresponds to a WHO-defined tumor subtype with an associated grade that reflects severity and\\nmanagement\
    \ [37]. To encode this structure, we construct a WHO-based utility graph in which\\nedge weights reflect shared grade\
    \ membership (Fig. 4h; Methods). We find that utility-enhanced\\nStratCP returns prediction sets that group subtypes within\
    \ the same grade or within one grade of\\neach other, reflecting similar workup and urgency. As shown in Fig. 4i-j, utility-enhanced\
    \ StratCP\\nincreases grade coherence, measured as the fraction of prediction sets whose subtypes lie within the\\n12\\\
