    \ workflow augmented with StratCP can identify patients likely to achieve favorable\\nearly survival under a pre-specified\
    \ error budget, while providing calibrated lower survival bounds\\nfor patients whose predictions are deferred.\\nError\
    \ controlled H&E-based diagnostic triage in diffuse glioma\\nGiven the clinical burden of adult-type diffuse gliomas and\
    \ the need for integrated diagnosis, di-\\nagnostic evaluation often combines H&E histopathology with immunohistochemistry\
    \ (IHC) and\\nmolecular testing to resolve morphological and molecular heterogeneity (Fig. 6a) [43, 45]. However,\\nmolecular\
    \ testing can add turnaround time to the final integrated diagnosis in routine workflows\\n(\\u223c2\\u20133 weeks in\
    \ routine practice) [46, 47], while timely molecular results can inform early treat-\\nment planning and clinical-trial\
    \ eligibility [48]. Motivated by this integrated workflow, we apply\\nStratCP to implement an H&E-based diagnostic triage\
    \ under a 5% error budget, selecting a sub-\\nset of slides with H&E-only diagnoses and deferring the remainder for reflex\
    \ IHC and molecular\\ntesting. In this setting, StratCP provides an action-aligned guarantee: among slides on which\\\
