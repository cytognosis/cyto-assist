    nbins 2\\u20134, 5\\u20137, and 8\\u201310, this fraction is 0.90, 0.50, and 0.07 with utility enhancement, compared\\\
    nwith 0.70, 0.09, and 0.00, while providing coverage guarantee.\\nError-controlled survival prediction in diffuse glioma\\\
    nAdult-type diffuse gliomas account for substantial morbidity and mortality among primary brain\\ntumors, with glioblastoma\
    \ being the most common malignant diagnosis and associated with poor\\noutcomes [41]. Early prognostication is important\
    \ for clinical management and patient care in\\nadult-type diffuse glioma [42, 43]. Favorable early survival is defined\
    \ as survival for \\u226518 months,\\na milestone that exceeds the typical median overall survival from diagnosis for\
    \ glioblastoma under\\ncontemporary standard-of-care therapy (\\u223c14.6\\u201316.7 months) [44], while remaining early\
    \ enough\\nto inform counseling and management across adult-type diffuse glioma subtypes [42]. We use UNI\\nmodel as the\
    \ backbone FM to extract H&E-derived slide representations and train a survival head\\nthat predicts each patient\\u2019s\
    \ survival. We then apply StratCP as a post hoc decision layer to these\\npredictions: it selects patients for whom it\
    \ can assign favorable early survival under FDR control\\nand returns calibrated lower prediction bounds for deferred\
    \ patients under right censoring. StratCP\\noperates in two stages (Fig. 5a-b). In the action arm, StratCP uses a log-normal\
    \ accelerated failure\\ntime (AFT) regression head to score each patient\\u2019s likelihood of surviving beyond 18 months\
    \ and\\nselects a subset predicted to have favorable early survival, while controlling FDR at 5%. In the\\ndeferral arm,\
    \ StratCP assigns each deferred patient a one-sided lower prediction bound (LPB) on\\nsurvival time, defining a prediction\
    \ set [LPB, \\u221e) such that the true survival time exceeds the LPB\\nfor 95% of deferred patients (target coverage\
    \ level; Methods). To address right censoring (i.e., loss\\nto follow-up), both stages use inverse probability of censoring\
    \ weighting (IPCW) (Methods).\\nStratCP controls error at the pre-specified 5% error budget among patients selected in\\\
    nthe action arm as likely favorable early survivors and attains the target coverage level among\\npatients deferred to\
    \ the deferral arm because their favorable early survival status cannot be assigned\\nwith sufficient confidence (Fig.\
    \ 5c-g; see Supplementary Table S6 for cohort counts and model\\nperformance). We compare StratCP with three methods:\
    \ Top-1 (predict favorable early survival\\nif the estimated 18-month survival probability \\u22650.5), LNQ (log-normal\
    \ quantile; a parametric\\nselector and lower bound), and CP (selects when the conformal lower bound is \\u226518 months;\"\
