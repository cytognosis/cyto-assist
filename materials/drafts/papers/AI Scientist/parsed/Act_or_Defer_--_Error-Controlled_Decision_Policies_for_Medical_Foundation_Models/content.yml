    \ shows higher FDR of\\n0.073 (95% CI 0.071\\u20130.075). In contrast, CP with singleton sets selects fewer slides (127.30,\
    \ 95%\\nCI 125.18\\u2013129.42) at lower FDR (0.029, 95% CI 0.027\\u20130.031), reflecting a conservative threshold\\\
    nnot able to control diagnosis-specific FDR.\\nIn the mitotic-activity branch, for anaplastic oligodendroglioma, IDH-mutant\
