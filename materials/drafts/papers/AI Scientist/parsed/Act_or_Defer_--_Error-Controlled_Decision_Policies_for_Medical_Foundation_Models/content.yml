    nSchwan\\n\\u2026\\nOphthalmology\\nPathology\\nUnactionable\\nFigure 1: Overview of StratCP: from foundation model (FM)\
    \ predictions to error-budgeted action and\\ncalibrated deferral. a, Raw FM scores do not by themselves support safe clinical\
    \ decisions: a high predicted risk\\nmay prompt treatment escalation, whereas a lower score may prompt monitoring, and\
    \ both choices can be harmful\\nwhen miscalibrated. b, Standard conformal prediction provides average (marginal) coverage,\
    \ but the error rate can\\nvary across predicted disease statuses. Multi-label prediction sets are often not actionable\
    \ because they combine\\ndiagnoses with different management pathways. c, StratCP performs error-controlled stratification:\
    \ in the action\\narm, it selects predictions eligible for downstream action while controlling error among selected predictions\
    \ within a\\nuser-specified budget (e.g., \\u22645%) for each disease status; in the deferral arm, it returns prediction\
    \ sets for deferred\\npatients that achieve the target coverage (e.g., contain the true disease status for 95% of deferred\
    \ patients), supporting\\ncalibrated follow-up. d, Ophthalmology: paired with RETFound FM on retinal images, StratCP supports\
    \ diabetic\\nretinopathy staging, glaucoma staging, and multi-class eye-condition diagnosis by selecting patients in the\
    \ action\\narm under the error budget and returning calibrated prediction sets for deferred patients; an optional utility\
    \ module\\ncan reorder candidates within each set to provide clinically related differentials (e.g., shared follow-up\
    \ actions). e,\\nNeuro-oncology: paired with UNI FM on H&E whole-slide images, StratCP supports biomarker prediction (IDH\\\
    nmutation status), CNS tumor subtyping, and time-to-mortality prognosis by selecting predictions in the action arm\\nunder\
    \ the error budget and deferring the remainder to calibrated prediction sets (or one-sided lower prediction bounds\\nfor\
    \ prognosis); for subtyping, guideline structure (e.g., WHO grade adjacency) can provide grade-coherent prediction\\nsets.\\\
