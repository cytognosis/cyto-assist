    accurate a model is on average, but when it is appropriate to act on its predictions. Clinicians

    require explicit guidance on when to act, when to defer, and what follow-up to pursue [12, 13].

    Providing such guidance requires decision policies defined by explicit error budgets. Absent these

    policies, model-guided actions may trigger unnecessary or harmful interventions, delay appropriate

    care, and waste limited diagnostic resources [14, 15].

    Medical foundation models typically produce point predictions and do not provide uncer-

    tainty estimates that indicate when a prediction is reliable enough to support action [12, 13, 16].

    Only a small number of recent FMs report uncertainty alongside predictions, for example via

    dedicated uncertainty heads [17] or by ensembling multiple model instances [18]. When present,

    these approaches inherit known limitations of uncertainty quantification: uncertainty scores can be

    miscalibrated and rarely provide decision-relevant guarantees that link uncertainty to user-specified

    error budgets for downstream actions [19–21]. Moreover, methods that rely on Bayesian approx-

    imations or distributional assumptions can be sensitive to model misspecification, making the

    resulting uncertainty measures difficult to interpret in high-stakes settings [19, 21].

    Conformal prediction (CP) offers a complementary, distribution-free framework for trans-

    forming point predictions into prediction sets with finite-sample coverage guarantees [22, 23].

    Given a pre-trained or fine-tuned foundation model and a small labeled dataset from the intended

    deployment setting, CP can be applied post hoc, without retraining or architectural modifications,

    to produce a prediction set (for example, a differential diagnosis) for each new patient such that

    the set contains the true label (for example, disease status) with a user-specified probability, such

    as 95%, averaged over new patients. This guarantee has motivated the use of CP in clinical de-

    cision support [24–27], including methods for selecting confident predictions with guarantees in

    digital pathology [25], predicting clinical milestones in multiple sclerosis [26], and a framework

    for identifying high-quality predictions with applications in medical question answering and report

    generation [28]. However, most medical applications to date have focused on task-specific models,

    rather than using CP as a deployment layer for general medical FMs.

    For safe use of medical FMs, we require two guarantees: (1) identify patients for whom

    a single predicted disease status is reliable enough to directly act on, and (2) return calibrated

    prediction sets that guide confirmatory testing or expert review. The first requires error control

    within the acted-upon subset, whereas the second requires coverage within the deferred group.

    CP provides a marginal coverage guarantee, meaning that across new patients the prediction set

    contains the true disease status with a user-specified probability, such as 95% (often referred to

    as the “coverage” of these sets). However, CP does not specify how to translate a prediction set

