    \ statuses, we manually merge semantically equal terms, yielding 89\\ndistinct downstream actions in total. Denoting the\
    \ downstream action set of disease status \\ud835\\udc66as \\ud835\\udc34\\ud835\\udc66,\\nwe then measure the conformal\
    \ utility of two disease statuses \\ud835\\udc66, \\ud835\\udc66\\u2032 by\\n\\ud835\\udc38\\ud835\\udc66,\\ud835\\udc66\\\
    u2032 = |\\ud835\\udc34\\ud835\\udc66\\u2229\\ud835\\udc34\\ud835\\udc66\\u2032|,\\nthat is, the number of overlapping\
    \ actions. We then run Algorithm 5 to obtain a utility-enhanced\\nprediction sets for deferred patients.\\nFor fair comparison\
    \ of methods, we evaluate the average utility of U( b\\n\\ud835\\udc36\\ud835\\udc5b+\\ud835\\udc57) defined in\\nSection\
    \ 3 by the size of the prediction set, recognizing that large prediction sets tend to have lower\\nutility since it is\
    \ more difficult to maintain high overlap among more distinct disease statuses. The\\ncoverage of these prediction sets\
    \ are evaluated in the same way as in Fig. 3.\\n4.4\\nIDH mutation status\\nWe combined TCGA-LGG, TCGA-GBM, and EBRAINS\
    \ cases with unambiguous IDH status. For\\nTCGA, IDH status (mutant vs. wild-type) is derived from the TCGA molecular\
    \ database following\\n[62]. For EBRAINS, we include WHO-based diagnoses for which IDH status is explicit; the\\ndisease\
    \ status mapping and sample counts are provided in Supplementary Table S1. This task is\\nformulated as binary classification\
    \ (\\ud835\\udc3e= 2: IDH mutant vs. IDH wild-type).\\nStratCP provides decision-specific guarantees: the action arm controls\
    \ the false discovery\\nrate (FDR) at \\ud835\\udefc= 0.05 for each disease-status-specific selection (IDH mutant, IDH\
    \ wild-type),\\nwhile the deferral arm provides valid coverage for the remaining (deferred) slides.\\nSelection\\nprocedures\
    \ (the action arm), prediction-set construction for deferred slides (the deferral arm),\\nand baseline methods follow\
    \ the protocol used for the diabetic retinopathy task (Methods 4.1).\"\n  },\n  {\n    \"name\": \"Results are summarized\
