    nmedRxiv preprint\\n\\nTask-specific data splits and evaluation protocol. For each task, we partitioned the data\\ninto\
    \ train/validation/conformal-calibration/test splits as follows (percentages of the total avail-\\nable cases for that\
    \ task): IDH mutation status (45/20/15/20), WHO-based CNS tumor subtyping\\n(45/20/15/20), time-to-mortality prediction\
    \ (45/20/20/15), and H&E-only diagnosis in adult-type\\ndiffuse glioma (45/25/20/15). We performed patient-stratified\
    \ splitting to prevent leakage, ensuring\\nthat all slides from a given patient were assigned to a single split. Then,\
    \ we performed 500 Monte\\nCarlo resamples by sampling with replacement from the conformal calibration and test sets and\\\
    nreported coverage and efficiency metrics across resamples.\\nModel implementation details. For all histopathology tasks,\
    \ we extracted patch embeddings\\nwith the UNI foundation model [2] and aggregated them using attention-based multiple\
    \ instance\\nlearning (ABMIL) [55] during task-specific fine-tuning. Task heads (classification or time-to-event\\nregression)\
    \ were trained with the ABMIL aggregator.\\nWe chose hyperparameters by random search over a predefined grid and selected\
    \ based\\non validation performance with early stopping (patience {5, 10}). For classification tasks (IDH\\nmutation status,\
