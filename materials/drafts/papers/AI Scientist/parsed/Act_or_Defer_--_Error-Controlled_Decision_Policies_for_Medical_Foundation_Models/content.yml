    \ Prediction sets are grouped by set size,\\nand within each group we report the proportion of sets that are grade-consecutive\\\
    u2014that is,\\nmax\\n\\ud835\\udc66\\u2208b\\n\\ud835\\udc36\\ngrade(\\ud835\\udc66) \\u2212min\\n\\ud835\\udc66\\u2208b\\\
    n\\ud835\\udc36\\ngrade(\\ud835\\udc66) < 2,\\nso all disease statuses in a set are at most one grade apart (same or adjacent\
    \ grades).\\n4.6\\nH&E-only diagnostic triage in adult-type diffuse glioma\\nWe simulated a common diagnostic workflow\
