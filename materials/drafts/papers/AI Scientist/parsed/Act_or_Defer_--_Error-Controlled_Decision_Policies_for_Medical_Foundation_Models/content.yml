    ndoi:\\nmedRxiv preprint\\n\\n4.7\\nH&E-based survival prediction in adult-type diffuse glioma\\nIn H&E-based survival\
    \ prediction, the clinical objective is to confidently identify patients with\\nfavorable early survival, meaning patients\
    \ expected to live beyond a prespecified horizon \\ud835\\udc50, while\\nalso providing reliable survival-time information\
    \ for patients who are not assigned favorable early\\nsurvival. Such stratified predictions can inform follow-up intensity\
    \ (including de-escalation for the\\nformer group), targeted monitoring or trial consideration for the latter, and resource\
    \ allocation.\\nWe define favorable early survival as survival for \\u226518 months, a milestone that exceeds the\\ntypical\
    \ median overall survival from diagnosis for glioblastoma under contemporary standard-of-\\ncare therapy (\\u223c14.6\\\
    u201316.7 months) [44], while remaining early enough to inform counseling and\\nmanagement across adult-type diffuse glioma\
    \ subtypes [42]. Throughout this section, we set \\ud835\\udc50= 18\\nmonths.\\nAt deployment, we therefore require two\
    \ outputs:\\n1. an action arm, consisting of patients for whom we are confident that \\ud835\\udc47\\u2265\\ud835\\udc50(favorable\
