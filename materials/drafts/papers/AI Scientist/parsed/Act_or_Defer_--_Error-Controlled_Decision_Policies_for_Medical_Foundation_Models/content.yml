    nFigure 5: StratCP identifies patients with favorable early survival (\\u226518 months) from H&E whole-slide images\\\
    nand returns calibrated lower bounds for others. a, Action arm. The model maps each patient to a one-dimensional\\nconfidence\
    \ score for survival beyond 18 months and selects patients above a calibrated cutoff to control the false\\ndiscovery\
    \ rate (FDR) at 5% (Methods). Selected patients may be treated as favorable early survival for downstream\\naction; remaining\
    \ patients are deferred. b, Deferral arm. For a deferred patient \\ud835\\udc57, StratCP returns a one-sided\\nprediction\
    \ set [LPB, \\u221e). It first forms a deferred reference group and computes conformity scores \\ud835\\udc49for each\
    \ reference\\npatient. Given the target coverage level 1 \\u2212\\ud835\\udefc(e.g., \\ud835\\udefc= 0.05), StratCP calibrates\
    \ a threshold \\ud835\\udf02as the (1 \\u2212\\ud835\\udefc)-quantile\\nof the reference-group \\ud835\\udc49scores. The\
    \ bound LPB for patient \\ud835\\udc57is then computed by inverting the conformity score at \\ud835\\udf02\\n(i.e., LPB\
    \ = \\ud835\\udc5e\\ud835\\udc57(\\ud835\\udf02)), producing sets that satisfy deferred-set coverage \\ud835\\udc43(\\\
    ud835\\udc47\\ud835\\udc57\\u2265LPB) \\u22651 \\u2212\\ud835\\udefc(Methods); blue shading\\nindicates the set. c, Coverage\
