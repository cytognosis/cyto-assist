    ndoi:\\nmedRxiv preprint\\n\\nOnline Methods\\nOnline Methods are organized into four parts. Section 1 describes the datasets,\
    \ clinical endpoints,\\nand foundation models paired with StratCP across both retinal disease and neuro-oncology set-\\\
    ntings. Section 2 presents the core StratCP algorithms, including the selection step (action arm)\\nand the construction\
    \ of calibrated prediction sets for deferred patients or slides (deferral arm),\\ntogether with the theoretical arguments\
    \ establishing finite-sample guarantees under the stated as-\\nsumptions.\\nSection 3 introduces our utility-enhancement\
    \ module, which incorporates domain\\nknowledge encoded as a utility graph over labels by modifying the conformity score\
    \ so that the\\nresulting prediction sets preferentially group clinically related labels. Finally, Section 4 provides\\\
    ntask-specific experimental and validation details, including data splitting, hyperparameter selection,\\nand case-study\\\
    u2013level implementation choices for each task.\\n1\\nModels and datasets\\nWe describe here the foundation models and\
    \ the collection and preprocessing of datasets used\\nfor the retinal disease and neuro-oncology tasks. The selection\
    \ of the foundation models was\\nprimarily determined by public availability, and we focused on well-established benchmark\
    \ tasks\\nto demonstrate the general applicability of StratCP.\\n1.1\\nModels and datasets for retinal disease tasks\\\
    nWe utilized the fine-tuned RETFound models and datasets provided by [1] in the three retinal disease\\ntasks. The diabetic\
    \ retinopathy diagnosis task leverages the Kaggle APTOS-2019 dataset [56], with\\nlabels defined according to the International\
    \ Clinical Diabetic Retinopathy Severity Scale, spanning\\nfive stages from no retinopathy to proliferative diabetic retinopathy.\
    \ The glaucoma diagnosis task\\nuses the Glaucoma Fundus dataset [57], with three categorical labels indicating the stages\
    \ of\\nglaucoma: non-glaucoma, early (suspected) glaucoma and advanced glaucoma. The eye condition\\ndiagnosis task uses\
    \ the JSIEC dataset [40], which includes 1,000 images in total with 39 categories\\nof common referable fundus diseases\
    \ and conditions.\\nFor each task, we adhered to the data preprocessing and splits in the original paper [1]. Our\\n26\\\
