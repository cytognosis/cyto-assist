    Figure 1: Overview of StratCP: from foundation model (FM) predictions to error-budgeted action and

    calibrated deferral. a, Raw FM scores do not by themselves support safe clinical decisions: a high predicted risk

    may prompt treatment escalation, whereas a lower score may prompt monitoring, and both choices can be harmful

    when miscalibrated. b, Standard conformal prediction provides average (marginal) coverage, but the error rate can

    vary across predicted disease statuses. Multi-label prediction sets are often not actionable because they combine

    diagnoses with different management pathways. c, StratCP performs error-controlled stratification: in the action

    arm, it selects predictions eligible for downstream action while controlling error among selected predictions within a

    user-specified budget (e.g., ≤5%) for each disease status; in the deferral arm, it returns prediction sets for deferred

    patients that achieve the target coverage (e.g., contain the true disease status for 95% of deferred patients), supporting

    calibrated follow-up. d, Ophthalmology: paired with RETFound FM on retinal images, StratCP supports diabetic

    retinopathy staging, glaucoma staging, and multi-class eye-condition diagnosis by selecting patients in the action

    arm under the error budget and returning calibrated prediction sets for deferred patients; an optional utility module

    can reorder candidates within each set to provide clinically related differentials (e.g., shared follow-up actions). e,

    Neuro-oncology: paired with UNI FM on H&E whole-slide images, StratCP supports biomarker prediction (IDH

    mutation status), CNS tumor subtyping, and time-to-mortality prognosis by selecting predictions in the action arm

    under the error budget and deferring the remainder to calibrated prediction sets (or one-sided lower prediction bounds

    for prognosis); for subtyping, guideline structure (e.g., WHO grade adjacency) can provide grade-coherent prediction

    sets.

