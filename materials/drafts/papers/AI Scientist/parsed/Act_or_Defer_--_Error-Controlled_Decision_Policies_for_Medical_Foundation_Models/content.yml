    ndoi:\\nmedRxiv preprint\\n\\n4.5\\nWHO-based CNS tumor subtyping\\nWe used the full EBRAINS cohort with 30 expert-labeled\
    \ WHO-based CNS tumor subtypes [37]\\n(see Supplementary Table S2 for subtype definitions and counts).\\nThe task is formulated\
    \ as\\nmulticlass classification with 30 classes. In the StratCP pipeline for this task, the action arm\\ncontrols the\
    \ false discovery rate (FDR) at \\ud835\\udefc= 0.05 among the selected (confident) predictions,\\nand the deferral arm\
    \ provides valid coverage for the remaining (deferred) slides. As in the eye-\\ncondition diagnosis task (Methods 4.3),\
    \ limited per-class sample sizes preclude defining separate\\ndecision groups for all 30 subtypes. Instead, we control\
    \ the error rate for the event that the model\\u2019s\\ntop prediction is selected, irrespective of subtype. Concretely,\
    \ we use the trustworthiness criteria\\nI( \\ud835\\udc53, \\ud835\\udc65, \\ud835\\udc66) = 1{\\ud835\\udc66= argmax\\\
    ud835\\udc66\\u2032\\u2208Y \\ud835\\udc53(\\ud835\\udc65, \\ud835\\udc66\\u2032)}, do not group patients with any eligibility\
    \ criterion, and\\nrun Algorithm 1 to select confident predictions. Metrics are evaluated as in the diabetic retinopathy\\\
    ntask (Methods 4.1); the baseline pipelines and the construction of prediction sets for unselected\\ncases mirror those\
    \ used in that section. Results are summarized in Fig. 2 and 3.\\nUtility improvement. For the analysis in Fig. 4h\\u2013j,\
    \ we encoded clinical relatedness using WHO\\ngrade groups (Supplementary Table S2): subtype disease statuses are organized\
    \ into disjoint grades\\n[37]. We define \\ud835\\udc38\\ud835\\udc66,\\ud835\\udc66\\u2032 = 1 if \\ud835\\udc66and \\\
