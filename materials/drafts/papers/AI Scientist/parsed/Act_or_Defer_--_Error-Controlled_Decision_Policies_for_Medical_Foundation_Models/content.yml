    \ Mod., ?)\\nTop-1 prediction\\n\\u2026\\nModel prediction\\nMod.\\nMild\\nNorm.\\nSev.\\nProl.\\nFigure 4: StratCP provides\
    \ clinically coherent prediction sets that align with downstream management. a,\\nUtility enhancement module.\\nGiven\
    \ a CP utility graph encoding guideline relationships among disease statuses,\\nStratCP constructs a utility-informed\
    \ ordering of candidate disease statuses. It starts from the status with the highest\\nFM-predicted probability (e.g.,\
    \ Normal), then adds high-probability alternatives that maximize utility with the statuses\\nalready selected (e.g., an\
    \ adjacent stage such as Mild); the final prediction set is the calibrated prefix of this ordering\\nneeded to achieve\
    \ the target coverage in the deferred group (Methods). b, Diabetic retinopathy grading. We use an\\nordinal (chain) utility\
    \ graph so that sets preferentially include adjacent stages; StratCP orders labels by expanding\\nalong the severity scale.\
    \ c, Fraction of prediction sets containing consecutive stages across target levels. Standard\\nStratCP is shown in blue,\
    \ and utility-enhanced StratCP is shown in orange. d, Coverage is maintained after utility\\nenhancement (fraction of\
    \ sets containing the true disease status) across target levels. e, Eye-condition classification. We\\nconstruct a management-action\
    \ utility graph whose edge weights quantify overlap in downstream management actions\\nbetween disease-status pairs; actions\
    \ are obtained by prompting an LLM (Methods). f, Mean overlap in management\\nactions for prediction sets at matched set\
    \ size; utility enhancement increases management coherence within sets. g,\\nStratCP maintains coverage across target\
    \ levels. h, CNS tumor subtyping. We construct a WHO grade-based utility\\ngraph so that sets preferentially group subtypes\
    \ within the same grade or adjacent grades (Methods). i, Fraction of\\nprediction sets whose maximum within-set WHO grade\
    \ difference is < 2 across set-size bins; utility enhancement\\nincreases grade coherence. j, StratCP maintains coverage\
