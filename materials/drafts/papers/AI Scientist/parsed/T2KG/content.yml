    \ Service (OLS)\\nFigure 1: Architecture diagram of Talk2Biomodels and Talk2KnowledgeGraphs orchestrated by the\\nmain\
    \ agent. Users can interact with T2B and T2KG agents via the main agent. The main agent acts\\nas a supervisor agent and\
    \ determines which agent (and its respective tools) to invoke based on the\\nuser input. The T2B agent specializes in\
    \ quantitative analysis, including model search, simulation,\\nplotting, parameter scanning, steady-state stability analysis,\
    \ annotation extraction, and RAG for\\nuploaded scientific articles. Meanwhile, the T2KG agent focuses on providing quantitative\
    \ insights,\\nsuch as subgraph extraction, summarization, and GraphRAG reasoning on the knowledge graph.\\nThese agentic\
    \ AI tools interactively engage with resources, including BioModels, OLS, and UniProt\\ndatabases as external databases\
    \ and PrimeKG as a knowledge graph resource. Each agent maintains\\nits state independently throughout the chat history.\\\
    nFor both T2B and T2KG agents, the computational nodes consist of a prebuilt reasoning and action\\n(ReAct)-based agent,\
    \ implemented following the ReAct paradigm (Yao et al., 2023), and a suite of\\ntools available (Fig. 1). A central main\
    \ agent developed using the LangGraph-Supervisor library\\n(v0.0.4)4, manages task delegation and communication, dynamically\
    \ invoking T2B and/or T2KG\\nbased on task context. Directed edges within the graph facilitate structured interactions\
    \ between\\nagents and their tools. Agents autonomously select and execute tool invocations in response to user\\ninput,\
    \ updating their internal state accordingly. The system tracks key-value pairs storing messages,\\nanalysis outputs, and\
    \ intermediate results, ensuring consistency across computational steps. Upon\\ncompletion, the final state is parsed\
    \ to extract relevant outputs for rendering.\\nT2B executes operations on models using the BASICO library (v0.78)(Bergmann,\
    \ 2023). T2KG\\nextracts subgraphs from an initial biomedical knowledge graph based on user queries, employing\\nthe Prize\
    \ Collecting Steiner Tree (PCST) algorithm (Hegde et al., 2015) to guarantee a connected\\nsubgraph. The retrieved subgraph\
    \ in the form of a textualized subgraph (i.e., textual information of\\nthe selected nodes and triples) is further incorporated\
    \ for RAG (He et al., 2024) to enhance response\\nquality. We used PrimeKG (Chandak et al., 2023) as the knowledge graph\
    \ dataset, enriching its\\nnodes and edges with a set of textual information from Stark (Wu et al., 2024). Textual embeddings\\\
    nwere generated using the nomic-embed-text model (Nussbaum et al., 2025) retrieved from Ollama5.\\nThe processed graph\
    \ was stored using NetworkX6 (Hagberg et al., 2008) and efficiently manipulated\\nwith the PyTorch Geometric7 library\
    \ (Fey & Lenssen, 2019).\\nFor configuring agent-based text generation tasks, users can select between two LLMs: OpenAI\\\
    u2019s\\nGPT-4o-mini (OpenAI et al., 2024) and NVIDIA NIM-optimized Meta/Llama-3.3-70B-Instruct\\n8. For text-to-embedding\
    \ transformations, the application supports two embedding models: Ope-\\nnAI\\u2019s text-embedding-ada-002 and NVIDIA\
    \ NIM-optimized Llama-3.2-NV-EmbedQA-1B-V29.\\nThe backend of the system is implemented in Python 3.12, while the front\
    \ end was developed using\\n4https://github.com/langchain-ai/langgraph-supervisor-py\\n5https://ollama.com/\\n6https://networkx.org/\\\
    n7https://pytorch-geometric.readthedocs.io/\\n8https://build.nvidia.com/meta/llama-3 3-70b-instruct/modelcard\\n9https://build.nvidia.com/nvidia/llama-3\
    \ 2-nv-embedqa-1b-v2\\n3\\n\\nPublished as a workshop paper at MLGenX 2025\\na\\nb\\nc\\nd\\ne\\nf\\nFigure 2: An example\
    \ of the search models tool in the Talk2BioModels GUI. This GUI supports both\\nopen and closed-source LLMs, enabling\
    \ users to upload SBML-format mathematical models and\\nPDF-format scientific articles (a). T2B allows natural language\
    \ prompts via the chat box interface\\n(b). The GUI features a chat history window (c) displaying question-and-answer\
    \ conversations (d,\\ne). Additionally, T2B\\u2019s GUI allows dynamic user feedback through upvote and downvote buttons.\\\
    n(f). We exemplify search models tool for keyword-based searches in the BioModels database (e).\\nStreamlit (v1.39.0)10,\
    \ Plotly (v5.24.1)11, and Gravis (v0.1.0)12 for an interactive and user-friendly\\ninterface.\\nThe T2B, T2KG, and their\
    \ unified version (Talk2AIAgents4Pharma) applications are open-source\\nand available on GitHub13, supporting community\
    \ contributions and discussions.\\n3\"\n  },\n  {\n    \"name\": \"RESULTS AND DISCUSSION\",\n    \"text\": \"T2B offers\
    \ a comprehensive suite of functions for biological and translational ODE models. Users\\ncan upload ODE models in SBML\
    \ format or retrieve curated models from the BioModels database\\nusing the search models tool (Fig. 2). The get model\
    \ information tool extracts model details, includ-\\ning species, parameters, and model abstract. Concurrently, the get\
    \ annotations tool retrieves and\\ndisplays model species\\u2019 identifiers by dynamically accessing Ontology Lookup\
    \ Service (OLS) and\\nUniProt data bases (Jupp et al., 2015; The UniProt Consortium, 2024) over APIs. This capability\\\
    nenables researchers to thoroughly explore and interpret the specific nomenclature of the model.\\nIn T2B, SBML models\
    \ can be directly accessed, simulated, and analyzed. The platform supports\\ntime-course simulations with adjustable time\
    \ steps, initial concentrations and durations (simulate\\nmodel tool), presenting results in dynamic tables and graphs\
    \ that can be interactively modified to\\nsuit the users\\u2019 needs (custom plotter tool). Additionally, users can interrogate\
    \ model description and\\nsimulation results (ask questions tool) and alter model parameters using natural language.\\\
    nMoreover, T2B offers several tools for model analysis: the steady-state tool determines whether a\\nmodel reaches equilibrium,\
    \ while the parameter scan tool performs multiple simulations by sys-\\ntematically varying model initial conditions or\
    \ parameter values within user-specified range and\\nintervals (Fig. A1). Finally, the query article tool leverages the\
    \ RAG framework (Lewis et al.,\\n2020) to extract supplementary information from user-uploaded research articles, enhancing\
    \ model\\nunderstanding.\\n10https://streamlit.io/\\n11https://plotly.com/\\n12https://robert-haas.github.io/gravis-docs/\\\
    n13https://github.com/VirtualPatientEngine/AIAgents4Pharma\\n4\\n\\nPublished as a workshop paper at MLGenX 2025\\nTo\
    \ promote greater explainability and contextualization of quantitative computational biology sim-\\nulation predictions,\
    \ users can invoke the T2KG to qualitatively reason over T2B results using a\\nbroader scope of disease biology captured\
    \ in biomedical knowledge graphs. Specifically, users can\\nextract out one or more subgraphs using the subgraph extraction\
    \ tool based on the textual embedding\\nsimilarity between the user\\u2019s query and the embedded textual features of\
    \ the biomedical knowledge\\ngraph. The textualized and summarized subgraph is then used for RAG in conjunction with previous\\\
    ncomputational biology model simulation results using the graph RAG reasoning tool. The results\\nare presented to the\
    \ user in natural language with citations to the entities and relations in the biomed-\\nical knowledge graph along with\
    \ a dynamic widget of the extracted subgraph for interactive visual\\ninspection.\\nOverall, this suite of agentic AI-driven\
    \ tools offers a unique platform for working with biological\\nmodels of disease, combining user-friendliness and interactive\
    \ features.\\n3.1\"\n  },\n  {\n    \"name\": \"USE-CASE IN PRECISION MEDICINE\",\n    \"text\": \"The use cases in precision\
    \ medicine14 utilizes a multiscale model of interleukin 6 (IL-6) mediated\\nimmune regulation in Crohn\\u2019s disease\
    \ to examine drug-disease interaction mechanisms and drug\\ntreatment prediction (Dwivedi et al., 2014). The model was\
    \ validated using clinical trial biomarker\\ndata from patients treated with tocilizumab, an anti IL6 receptor monoclonal\
    \ antibody drug.\\nUsers can interrogate model annotations, adjust the dosage of a drug, simulate drug administration\\\
    nat intervals of either 2 or 4 weeks, and view the value of the clinical readout parameter (C-reactive\\nprotein (CRP)\
    \ in serum) at any given time point. Users can determine the time required for the\\ndepletion of serum anti-IL6Ralpha\
    \ concentration by replicating the published figure (Dwivedi et al.,\\n2014). The effect on CRP suppression can also be\
    \ compared by simulating different antibodies\\nwith varying dissociation affinities, thereby performing in silico tests\
    \ for potential antibodies. Ad-\\nditionally, users can explore alternative drugs that target IL-6 or even alternative\
    \ targets of Crohn\\u2019s\\ndiseases as a basis for follow-up studies. Users can qualitatively reason over the simulated\
    \ results by\\ndeveloping a rational grounded in curated biomedical knowledge of genes and pathways associated\\nwith\
    \ Crohn\\u2019s disease for why certain treatments work and others do not. A snapshot of a use case\\non extracting subgraph\
    \ that captures the IL6 node along with its interconnections to other relevant\\nnodes (e.g., gene/protein, disease, pathway)\
    \ within subsets of PrimeKG is presented in Fig. A2.\\n4\"\n  },\n  {\n    \"name\": \"CONCLUSIONS\",\n    \"text\": \"\
    T2B and T2KG are open-source, user-friendly agentic AI platform designed to democratize access\\nto computational models\
    \ and biomedical knowledge graphs of disease. By integrating a natural\\nlanguage interface with agentic AI, these platforms\
    \ lower the barrier for non-experts to leverage\\nexpert knowledge captured in computational biology models and biomedical\
    \ knowledge graphs. A\\nuse case in precision medicine was presented to demonstrate the ease which the users can reproduce\\\
    nand explore questions of clinical translatable of drug assets.\\nAs the user base of these platforms continues to grow\
    \ and the complexity of agentic tools and\\nworkflows increases, ensuring transparency and validation of results becomes\
    \ increasingly critical.\\nMinimizing hallucinations through model simulation-specific tool calling is essential and must\
    \ be\\nrigorously tested using comprehensive testing suites. Further, we aim to extend T2KG\\u2019s current\\nfunctionality\
    \ to support multi-modal embeddings for small molecules, proteins, and other biological\\nentities, enhancing its utility\
    \ in biomedical applications. Additionally, as new LLMs are developed\\nand incorporated into the framework, it is important\
    \ to continuously assess and validate their rea-\\nsoning capabilities.\\nWe would greatly appreciate contributions to\
    \ our open-source project from the community.\"\n  },\n  {\n    \"name\": \"ACKNOWLEDGMENTS\",\n    \"text\": \"We acknowledge\
