    \  \"name\": \"INTRODUCTION\",\n    \"text\": \"Recent developments in generative artificial intelligence (AI), particularly\
    \ in large language models\\n(LLMs), have demonstrated substantial progress. Noteworthy advances in both algorithmic inno-\\\
    nvation and data-driven biomedical discovery are showcased by the advent of foundational learning\\nmodels for protein\
    \ structure, single cell omics and genomic data across species, such as, AlphaFold,\\nscGPT, and Evo 2, to name a few\
    \ (Brixi et al., 2025; Cui et al., 2024; Jumper et al., 2021). While\\nLLMs\\u2019 role is currently confined to narrow,\
    \ task-specific applications, efforts are underway to en-\\nable open-source LLM-driven agentic workflows in biomedical\
    \ discovery (Lobentanzer et al., 2025).\\nCollaborative AI agents, with their task orchestration, reflective learning\
    \ and sophisticated reason-\\ning capabilities, have the potential to revolutionize biomedical research and patient treatment\
    \ (Gao\\net al., 2024; Zou & Topol, 2025).\\n\\u2217These authors contributed equally to this work.\\n\\u2020Corresponding\
    \ author.\\n1Source code available at: https://github.com/VirtualPatientEngine/AIAgents4Pharma\\n1\\n\\nPublished as a\
    \ workshop paper at MLGenX 2025\\nComputational models and biomedical knowledge graphs have become an essential component\\\
    nin enhancing our understanding of complex disease processes. The most common computational\\nmodeling frameworks in systems\
    \ biology modeling include kinetic, constraint-based, logic, and\\nagent-based modeling. The present study specifically\
    \ focuses on ordinary differential equations\\n(ODE) models, a subset of kinetic models, due to their widespread application\
    \ and significance in\\nthe field. ODE models represent the most popular modeling approach, with approximately 1,662\\\
    nmodels2 currently deposited in the BioModels database (Malik-Sheriff et al., 2019) and a multi-\\ntude of models not\
    \ systematically stored in the scientific literature. These models cover a wide\\nrange of domains, as demonstrated by\
    \ their use in precision medicine (e.g., inflammatory bowel\\ndisease treatment) (Dwivedi et al., 2014), COVID-19 pandemic\
    \ studies (Tang et al., 2020), and\\ntheoretical analysis of dynamic systems (Markevich et al., 2004). Furthermore, ODEs\
    \ are a stan-\\ndard tool in pharmaceutical research, particularly in the development of physiologically based phar-\\\
    nmacokinetic/pharmacodynamic (PBPK/PD) and quantitative systems pharmacology and toxicology\\n(QSP/QST) models (Chan et\
    \ al., 2024; Kuepfer et al., 2016). In addition, the regulatory authorities,\\nsuch as the U.S. Food and Drug Administration\
    \ (FDA), recognize these computational models as\\na well-established and increasingly significant body of evidence in\
    \ drug approval decision-making\\nprocesses (Morrison et al., 2018). While computational models provide quantitative predictions\\\
    nwithin a limited biological scope, biomedical knowledge graphs offer qualitative reasoning across a\\nbroader biological\
    \ spectrum. Biomedical knowledge graphs also play a critical role in pharmaceuti-\\ncal research (Bonner et al., 2022)\
    \ where they are used to identify new drug targets (Middleton et al.,\\n2024), repurpose existing drugs (Huang et al.,\
    \ 2024), explore the effects of drug-drug interactions\\n(Zitnik et al., 2018), and refine patient endotypes that would\
    \ most benefit from an existing or new\\ntherapy (Geleta et al., 2021).\\nTo interact with mathematical models of biological\
    \ systems, several popular graphical user interface\\n(GUI)-based ODE modelling frameworks exist for biological and translational\
    \ applications. These\\ninclude proprietary options such as the MATLAB toolbox SimBiology (The MathWorks Inc, 2024)\\\
    nand Berkley Madonna (Marcoline et al., 2022), as well as open-source alternatives like COPASI\\n(Hoops et al., 2006)\
    \ and the Open Systems Pharmacology Suite (Kuepfer et al., 2016). However,\\nboth proprietary and open-source solutions\
    \ typically require software installation, specialized train-\\ning, and domain knowledge for effective simulation and\
    \ analysis of models.\\nTo overcome the limitations of existing modelling frameworks, and to expand the biological scope\\\
    nof computational models, we propose Talk2BioModels (T2B) and Talk2KnowledgeGraphs (T2KG)\\nas easily accessible agentic\
    \ AI applications. T2B and T2KG users do not need to possess expert\\nknowledge in programming nor systems biology to\
    \ simulate and perform basic analyses of ODE\\nmodels, and qualitatively reason over and contextualize the results in\
    \ the broader understanding of\\nbiology and disease captured in biomedical knowledge graphs. The platform supports the\
    \ import and\\nexport of open and closed-source models encoded in SBML (Keating et al., 2020), and connectors\\nto open\
    \ and closed-source biomedical knowledge graphs such as the publicly available PrimeKG\\ndataset (Chandak et al., 2023).\\\
    nBy using an agentic AI framework, T2B and T2KG democratize access to expert knowledge cap-\\ntured in computational models\
    \ of disease and biomedical knowledge graphs. T2B and T2KG pro-\\nmote accurate and explainable science by grounding LLM\
    \ responses in computational modeling\\nsimulation results or in extracted biomedical knowledge graph subsets. Graph Retrieval-Augmented\\\
    nGeneration (GraphRAG) (Lewis et al., 2020; He et al., 2024; Edge et al., 2025) provides the neces-\\nsary explainability\
    \ for deployment in regulated industries, including healthcare and pharmaceutical\\nindustries.\\n2\"\n  },\n  {\n   \
    \ \"name\": \"METHODS\",\n    \"text\": \"We developed a multi-agent hierarchical system using the LangGraph library (v0.3.2)3,\
    \ which pro-\\nvides a framework for constructing stateful computational graphs. In this architecture, each node\\nrepresents\
    \ a discrete computational step, while the edges define the relationships between these\\nsteps. Each agent within the\
    \ system maintains a state, a snapshot of its application, which is propa-\\ngated and updated throughout the execution\
    \ process (Fig. 1).\\n2Viewed on 24.02.2025\\n3https://github.com/langchain-ai/langgraph\\n2\\n\\nPublished as a workshop\
