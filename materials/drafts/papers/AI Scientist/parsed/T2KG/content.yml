  author_contributions: 'LW, GS, AWM, and DM conceptualized the study. GS developed the agentic AI framework and the

    agentic AI tools for T2B. AWM contributed to the development of the agentic AI framework, agentic

    AI tools for T2KG, and created the figures and icons. RHS implemented get annotations tool. GS

    and AWM developed the user interface. DM and LW conceptualized the precision medicine use

    case. LW wrote the manuscript. DM supervised the writing of the manuscript and the development

    of the agentic AI framework. All authors contributed to testing T2B and T2KG and reviewing the

    manuscript.'
