    n2.2\\nRobin identifies novel therapeutic candidates for dry AMD\\nWe applied Robin to generate therapeutic candidates\
    \ for dAMD as an initial proof-of-concept (Figure 2A). Robin began\\nthe therapeutic hypothesis generation workflow by\
    \ identifying and reviewing 151 papers to propose ten biologically\\nrelevant dAMD mechanisms to assay. After ranking\
