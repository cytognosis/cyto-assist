    \ pHrodo beads due to availability.\\npHrodo beads are fluorescently activated in the low pH environment of the lysosome,\
    \ allowing detection of phagocytosis\\nin single cells using flow cytometry (Figure 2B). After testing these therapeutic\
    \ candidates in the RPE phagocytosis\\nassay, the raw flow cytometry data, associated metadata, and an analysis prompt\
    \ were uploaded to Robin. Robin\\ncalled the data analysis agent Finch, which developed a Jupyter notebook to quantify\
    \ the effect of each compound\\non RPE phagocytosis by gating the flow cytometry data and performing statistical tests.\
    \ Plots from a representative\\nindividual Finch trajectory are shown in Figure 2C-F. These results were confirmed by\
