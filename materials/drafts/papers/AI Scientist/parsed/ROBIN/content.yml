    \ 4: Ripasudil significantly enhances RPE phagocytosis. A) Excerpt of Robin proposal for ripasudil. Drawing\\nfrom the\
    \ insights from the first round of experimental analysis, Robin proposes ripasudil as a therapeutic candidate\\nfor treating\
    \ dry AMD. B) Analyzed flow cytometry data from the second round of experiments shows that ripasudil\\nsignificantly enhances\
    \ phagocytosis in RPE cells, inducing an even greater effect than Y-27632.\\nincrease in Supplementary Figure S14). Although\
    \ further testing at different doses and longer incubation times would\\nbe necessary for definitive comparison, the initial\
    \ superior performance of ripasudil relative to Y-27632 demonstrates\\nRobin\\u2019s ability to progressively refine therapeutic\
    \ hypotheses through iterative experimentation and feedback.\\n3\"\n  },\n  {\n    \"name\": \"Discussion\",\n    \"text\"\
    : \"In this report, we present Robin, a multi-agent system integrating automated hypothesis generation and experimental\\\
    ndata analysis for scientific discovery. When tasked with identifying novel therapeutics for dAMD, Robin proposed\\nenhancing\
    \ RPE cell phagocytosis using ROCK inhibitors, and discovered ripasudil as the most potent enhancer\\nof RPE phagocytosis\
    \ among tested compounds through an iterative lab-in-the-loop discovery cycle. Ripasudil\\u2019s\\nestablished safety\
    \ profile and clinical approval for ocular use present a promising drug repurposing opportunity that\\ncould significantly\
    \ accelerate the development pathway for dAMD treatment.\\nNotably, while ROCK inhibitors have been previously suggested\
    \ for treatment of wet AMD and other retinal diseases\\nof neovascularization, Robin is the first to propose their application\
    \ in dry AMD for their effect on phagocytosis [35].\\nThis approach is supported by several lines of evidence, as RPE\
    \ phagocytic dysfunction is observed not only with\\nnormal aging but is pronounced in AMD patients [41, 42, 43]. In investigating\
    \ the basis for Robin\\u2019s initial identification\\nof Y-27632, we found that the literature search included a single\
    \ paper demonstrating Y-27632\\u2019s ability to enhance\\nphagocytic efficiency in \\u201clow-phagocytic\\u201d RPE cells\
    \ from human donors by promoting actin polymerization [42]. Taken\\ntogether, these results demonstrate Robin\\u2019s\
    \ ability to effectively generate novel hypotheses by synthesizing insights\\nalready present in the scientific literature.\\\
    nBeyond the specific application of dAMD, Robin addresses a broader challenge in therapeutic development. With\\nFDA approvals\
    \ stagnating at approximately 50 novel drugs annually over the past decade [44], new approaches to\\nscale therapeutic\
    \ discovery are urgently needed. As the first system to automate both literature-grounded hypothesis\\ngeneration and\
    \ experimental data analysis, Robin is poised to accelerate the pace of drug discovery compared to\\ntraditional approaches.\
    \ We demonstrate Robin\\u2019s broader applicability by generating hypotheses for 10 additional\\ndiseases with pressing\
    \ therapeutic needs (Supplementary Figures S16-S25).\\nIn its current implementation, Robin has several opportunities\
    \ for continued development. For example, while Robin\\ngenerates experimental outlines, it does not yet produce precise,\
    \ executable protocols\\u2014future iterations aim to provide\\ndetailed methodologies that require minimal human translation\
    \ for laboratory execution. The Finch data analysis agent\\nis also heavily reliant on prompt engineering by domain experts\
    \ to produce reliable analytical results. Adapting Finch\\nto independently generate or adapt prompts to specific data\
    \ modalities would enable a more autonomous discovery\\npipeline. Finally, while Robin uses an LLM-judged tournament to\
    \ nominate therapeutic hypotheses, future work on\\nbetter aligning hypothesis generation and evaluation with human scientific\
    \ judgment may be helpful in more reliably\\nproducing high-quality hypotheses.\\n7\\n\\nBy automating hypothesis generation,\
    \ experimental planning, and data analysis in an integrated system, Robin represents\\na powerful new paradigm for AI-driven\
    \ scientific discovery. This approach can be used to not only reshape therapeutic\\ndevelopment, but fundamentally accelerate\
    \ the scientific process to drive a greater understanding of the natural world.\\n4\"\n  },\n  {\n    \"name\": \"Methods\"\
    ,\n    \"text\": \"4.1\\nRobin Implementation\\nRobin is implemented as a Jupyter notebook using the Aviary framework\
    \ to instantiate and call agents [32]. Robin\\nutilizes the OpenAI o4-mini model to synthesize literature and generate\
    \ hypotheses, and the Anthropic Claude 3.7\\nSonnet model as the judge for pairwise comparisons to rank hypotheses.\\\
    nNotably, while the experiments in this paper were conducted using an agentic implementation of Robin, we observed\\nthat\
    \ Robin almost always called tools in the same order, leading to a deterministic workflow. Therefore, we translated\\\
    nRobin into a streamlined Jupyter notebook to improve stability and ease of use.\\nThe ranking of hypotheses was calculated\
    \ via a series of pairwise comparisons adjudicated by the LLM judge. When\\nranking 25 or fewer hypotheses, all possible\
    \ pairs were compared in a round robin tournament. When considering\\nmore than 25 hypotheses, 300 pairwise comparisons\
    \ were randomly selected to achieve a comprehensive assessment\\nwithin reasonable computational and time constraints.\
    \ The outcomes from these comparisons were used to estimate\\nstrength parameters via the Bradley-Terry-Luce (BTL) model,\
    \ which subsequently informed the relative ranking of\\neach hypothesis [45].\\nTo generate the prompt for this LLM judge,\
    \ domain experts were asked to conduct pairwise comparisons of Robin\\u2019s\\ntherapeutic candidate hypotheses. The results\
    \ of these expert evaluations were given to Google\\u2019s Gemini 2.5 Pro\\nPreview model to generate a prompt for Robin\\\
    u2019s LLM judge. This approach was designed to elicit decision-making\\nfrom the LLM judge consistent with expert preferences\
    \ and criteria.\\nWhen comparing the LLM judge\\u2019s preferences with experts\\u2019, the LLM judge demonstrated high\
    \ concordance with expert\\npreferences, with an average of 7.25 of its top 10 hypotheses matching those in the experts\\\
    u2019 top 10 (Supplementary\\nFigure S11A). This concordance is more than double that expected from random selection.\
    \ Furthermore, the LLM\\njudge exhibited higher intra-rater consistency than human experts (Supplementary Figure S11B).\
    \ When presented with\\nidentical pairwise comparisons, the LLM judge selected the same hypothesis in 88% of comparisons,\
    \ as compared with\\nhuman experts who selected the same hypothesis 61% of the time.\\n4.2\\nFinch Implementation\\nFinch,\
    \ initially introduced in BixBench, is an autonomous, Jupyter-native data analysis agent designed using the\\nAviary framework\
    \ [32]. Finch systematically processes bioinformatics workflows, such as RNA sequencing differential\\nexpression analysis\
    \ or flow cytometry, based on a provided dataset and research question.\\nThe agent operates within a structured execution\
    \ environment provided by the Aviary framework, an extensible\\ngymnasium tailored for language agent evaluation and iterative\
    \ problem-solving. Aviary was selected specifically for\\nits controlled environment, supporting reproducible evaluations\
    \ through standardized software environments, consistent\\ntool access, and structured multi-step reasoning.\\nFinch leverages\
    \ an agentic prompting strategy based on the ReAct approach, balancing logical reasoning and practical\\nexecution effectively\
    \ [46]. Each Finch trajectory unfolds within a pre-built Docker container (BixBench-env:v1.0),\\ncontaining extensive\
    \ bioinformatics-oriented Python, R, and Bash libraries. This standardized container ensures\\nreproducibility and isolates\
    \ evaluation strictly to Finch\\u2019s analytical capability rather than software installation or\\ndependency management.\
    \ That being said, Finch is capable of installing new dependencies when needed and does so\\ncompetently.\\n4.2.1\\nTools\
    \ and Environment\\nFinch interacts exclusively via two tools enabled by the Aviary framework:\\n\\u2022 edit_cell: The\
    \ agent can select, modify, and execute cells within a Jupyter notebook.\\n\\u2022 submit_answer: Finalizes and submits\
    \ the agent\\u2019s analytical conclusion.\\nPrompt engineering was thoroughly explored to optimize Finch\\u2019s initial\
    \ instructions, with an example provided in\"\n  },\n  {\n    \"name\": \"Supplementary Figure S10. All Finch trajectories\
    \ are available through the FutureHouse platform\",\n    \"text\": \"8\\n\\n4.3\\nCell Culture\\nARPE-19 cells (ATCC;\
    \ Cat. No. CRL-2302) are maintained in DMEM/F12 (Corning; Cat. No. 15-090-CV), with\\n10% fetal bovine serum (Gibco; Cat.\
    \ No. 10082-147), 2mM L-glutamine (Gibco; Cat. No. 25030-081), 1mM sodium\\npyruvate (Gibco; Cat. No. 11360-070) and 1%\
    \ penicillin-streptomycin (Gibco; Cat. No. 15140-122) at 37\\u00b0C, 5% CO2.\\nFor phagocytosis assays, cells are seeded\
    \ in 96-well tissue culture plates at a density of 1x104 cells per well with 100\\n\\u00b5L of complete cell media. They\
    \ are grown to confluence and then incubated for a further 7 days, during which the\\nmedia is not changed. At this point\
    \ they have formed a monolayer and show signs of differentiation (melanin granule\\nexpression, cobblestone morphology)\
    \ [47].\\n4.4\\nPhagocytosis Assay\\n4.4.1\\nDrug Library Preparation\\nOptimal cell culture concentrations for the drugs\
    \ proposed by Robin were found in the literature and if multiple\\nconcentrations were proposed, the highest was selected\
    \ for use in the phagocytosis assay. On the day of the phagocytosis\\nexperiment, drug stocks were used to prepare working\
    \ stocks in complete media at 2X working concentration. AICAR\\nand TUDCA were used in combination at the concentrations\
    \ below.\\nDrug\\nWorking concentration\\nY-27632 (Cayman Chemical Company; Cat. No. 10005583)\\n20\\u00b5M [48]\\nAICAR\
    \ (Sigma-Aldrich; Cat. No. A9978)\\n1mM [49]\\nTauroursodeoxycholic acid (TUDCA) (TargetMol; Cat. No. T2532)\\n100\\u00b5M\
    \ [50]\\nExendin-4 (TargetMol; Cat. No. T3967)\\n1\\u00b5M [51]\\nMLN120\\u03b2 (TargetMol; Cat. No. TQ0306)\\n20\\u00b5M\
    \ [52]\\nFingolimod (PeproTech; Cat. No. 1625605)\\n1\\u00b5M [53]\\nMFGE-8 (Sino Biological; Cat. No. 10853-H27B-B-20)\\\
    n2.5\\u00b5g/mL [54]\\nRipasudil (Cayman Chemical Company; Cat. No. 19920)\\n100\\u00b5M [55]\\nVorinostat (Active Motif;\
    \ Cat No. 14027)\\n5\\u00b5M [56]\\nSimvastatin (TargetMol; Cat No. T0687)\\n1\\u00b5M\\nResveratrol (PeproTech; Cat No.\
    \ 5013606)\\n16mM [57]\\nBay K8644 (Alomone Labs; Cat No. B-350)\\n3\\u00b5M [58]\\nKL001 (Cayman Chemical Company; Cat\
    \ No. 13878)\\n50\\u00b5M [59]\\nRapamycin (Gift from RetroBio)\\n100nM [60]\\nBMS-777607 (ApexBio; Cat No. A5703)\\n10\\\
    u00b5M [61]\\nNECA (5\\u2019-N-ethylcarboxamidoadenosine; Cayman Chemical Company; Cat No.\\n21420)\\n10\\u00b5M [62]\\\
    nRolipram (PeproTech; Cat No. 6145453)\\n10\\u00b5M\\nPF-573228 (ApexBio; Cat No. B1523)\\n5\\u00b5M [63]\\n4-phenylbutyric\
    \ acid (ApexBio; Cat No. C6831)\\n10mM [64]\\nB-Ionone (AA Blocks; Cat No. AA003JVY)\\n200\\u00b5M [65]\\nSiponimod (TargetMol;\
    \ Cat No. T6403)\\n10mM [66]\\nTable 1: List of Drugs and Working Concentrations\\n4.4.2\\npHrodo Bead Preparation\\nTo\
    \ specifically detect phagocytosed particles, we utilized pHrodo beads (ThermoFisher; Cat. No. A10010) which are\\nfluorescent\
    \ only in the low pH of the lysosome. Deep red E. coli pHrodo beads were thawed and a single vial was\\nresuspended in\
    \ 2 ml PBS as per the manufacturer\\u2019s instructions. The resuspended beads (protected from light) were\\nthen sonicated\
    \ for 10 minutes in a water bath at RT before addition to the cell assay plate.\\n9\\n\\n4.4.3\\nPhagocytosis Assay\\\
    nFor the phagocytosis assays, cells were treated with test compounds or vehicle control (0.5% DMSO) for 60 minutes\\nat\
    \ 37\\u00b0C, 5% CO2, prior to bead addition by adding 100 \\u00b5L of 2X drug stock in complete media to the cells. At\
    \ 60\\nminutes, 10 \\u00b5L of pHrodo beads (approximately 10\\u00b5g of beads) were added to each well. After bead addition,\
    \ plates\\nwere incubated at 37\\u00b0C for 3 hours while phagocytosis of the pHrodo beads proceeded. Cells were treated\
    \ with TrypLE\\nExpress (Gibco; Cat. No. 12604-013) for 10 minutes and washed with FACS buffer (1% BSA and 500 ng/ml DAPI\
    \ in\\ncalcium and magnesium-free PBS) to achieve a cell suspension suitable for flow cytometry.\\n4.4.4\\nFlow Cytometry\\\
    nARPE-19 cells suspended in FACS buffer in 96-well cell culture plates were immediately transferred to an Attune NxT\\\
    nflow cytometer (ThermoFisher; Cat. No. A24858) equipped with an Autosampler. Fluorescence from the pHrodo beads\\nand\
    \ DAPI was stimulated using the 637 and 405 nm lasers, respectively, and detected using the 670/14 and 450/40\\nfilters,\
    \ respectively. All events were analyzed until the full volume of the well was aspirated to capture the entire cell\\\
    npopulation. A minimum of 4,000 events per well were recorded to ensure adequate statistical power (excluding the\\nbead-only\
    \ (no cell) control).\\n4.4.5\\nRNA Sequencing\\nARPE-19 cells were seeded in 24-well tissue culture plates and cells\
    \ were lysed and RNA extracted using the Maxwell\\nRSC 48 (Promega; Cat. No. AS8500) and Maxwell RSC SimplyTissue kit\
    \ (Promega; Cat. No. AS1340) as per the\\nmanufacturer\\u2019s guidelines. Total RNA was quantified using a Qubit instrument\
    \ (ThermoFisher; Cat. No. Q33327) and\\nQubit high-sensitivity RNA kit (ThermoFisher; Cat. No. Q10210). Using 1 \\u00b5g\
    \ of total RNA as input, poly-A tailed\\nmRNA was isolated using NEBNext\\u00ae Poly(A) mRNA Magnetic Isolation Module\
    \ (New England Biolabs; Cat. No.\\nE7490) and then prepared for sequencing using the NEBNext Ultra II Directional RNA\
    \ Library Prep Kit for Illumina\\n(New England Biolabs; Cat. No. E7760). Quality control was performed using an Agilent\
    \ Bioanalyzer. Libraries (with\\n1% PhiX spiked in) were sequenced on an Illumina NextSeq 2000 with 75 base-pair paired-end\
    \ reads using a P3 flow\\ncell.\\n4.5\\nData Analysis\\n4.5.1\\nFlow Cytometry\\nFinch, the data analysis agent, performed\
    \ end-to-end analysis of our flow cytometry data. Debris and cell aggregates\\nwere excluded from the analysis based on\
    \ forward and side scatter parameters. In general, Finch clusters the forward\\nscatter versus side scatter plot by using\
    \ the flowMeans package for the R programming language to apply a k-means\\nclustering before choosing the cluster most\
    \ likely to contain the main cell population. For subsequent gates, Finch\\ngenerated scatter plots and then used the\
    \ plots to define gates. Single cells were gated based on pulse width and area\\nparameters. The mean fluorescence intensity\
    \ (MFI) of the pHrodo signal was quantified for each well to assess the\\nextent of phagocytosis.\\nFlow cytometry data\
    \ was also analyzed by a human scientist. Those strategies are shown in Supplementary Figures 2\\nand 3. The human flow\
    \ cytometry analysis was similar to Finch\\u2019s except that the human analysis had the additional\\nstep of using the\
    \ no-bead control to remove background signal in the Alexa 647 channel, which proved minimal. The\\nhuman analysis started\
    \ by identifying the main cell population in the forward versus side scatter plot. Next, singlets\\nwere identified. Dead\
    \ cells were then removed using the DAPI channel before finally removing Alexa 647 background\\nsignal using the no bead\
    \ control.\\n4.5.2\\nRNA Sequencing\\nRead demultiplexing and alignment was performed by a human and subsequent differential\
    \ gene expression analysis\\nwas performed by Finch.\\n4.5.3\\nRead Alignment and Processing\\nRaw paired-end RNA-Seq\
    \ reads (2 \\u00d7 150 bp) for twelve samples (including Y27632-treated, wild-type, and bead-treated\\nconditions) were\
    \ processed using a custom Bash pipeline. Sequencing files (*_R1_001.fastq.gz and *_R2_001.fastq.gz)\\nwere retrieved\
    \ from the FASTQ directory and aligned individually to the GRCh38 human reference genome (HISAT2\\nindex built from GENCODE\
    \ v44) using HISAT2 with the \\u2013dta flag to retain splice junction information for downstream\\ntranscriptome assembly.\
    \ Alignments were performed with eight CPU threads (-p 8) and output in SAM format. Each\\n10\\n\\nSAM file was converted\
    \ to BAM with samtools view -bS, then sorted (samtools sort) and indexed (samtools index) to\\nproduce compressed, coordinate-sorted\
    \ BAMs. Intermediate SAM and unsorted BAM files were removed to conserve\\ndisk space. This procedure ensured that all\
    \ alignments were uniformly processed and ready for quantitative analysis.\\n4.5.4\\nGene-Level Quantification\\nGene\
    \ counts were obtained with the featureCounts tool from the Subread package, using the GENCODE v44 GTF\\nannotation file.\
    \ Paired-end mode (-p) was specified to correctly handle fragment counting, and eight threads (-T 8) were\\nused to accelerate\
    \ processing. All of the indexed, sorted BAM files were supplied simultaneously, and read assignment\\nto genes was performed\
    \ according to the provided exon features. The resulting raw gene-level count matrix was\\nwritten to gene_counts.txt,\
    \ serving as the input for subsequent normalization and differential expression analyses. This\\nworkflow provides a reproducible\
    \ framework for high-throughput RNA-Seq data processing from raw reads through\\ngene-level quantification.\\n4.5.5\\\
    nDifferential Gene Expression Analysis\\nRaw gene counts were imported into R (v4.2.0) and filtered to remove non-count\
    \ columns, yielding a matrix of 6 samples\\nacross two conditions (Y-27632, untreated). The count matrix and metadata\
    \ were encapsulated in a DESeqDataSet object\\n(DESeq2 v1.36.0) [67]. Normalization, dispersion estimation, and Wald tests\
    \ were performed to detect differential\\nexpression. Transcript identifiers were mapped to gene symbols using biomaRt,\
    \ and one pairwise contrasts were defined\\n(Y-27632 versus untreated) [68]. Results were ordered by adjusted p-value,\
    \ exported to CSV, and volcano plots were\\ngenerated with EnhancedVolcano (v1.14.0) using thresholds of |log2FC| > 1\
    \ and adj. p < 0.05 [69].\"\n  },\n  {\n    \"name\": \"Acknowledgements\",\n    \"text\": \"We would like to acknowledge\
