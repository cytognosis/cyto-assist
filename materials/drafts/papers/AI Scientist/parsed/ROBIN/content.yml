    \ END>\",\n    \"text\": \"User prompt:\\nGenerate exactly **{num_candidates}** distinct and scientifically rigorous proposals\
    \ for therapeutic candi-\\ndates to treat {disease_name}. Here is some relevant background information that can guide\
    \ your proposals:\\n{therapeutic_candidate_review_output}\"\n  },\n  {\n    \"name\": \"Supplementary Figure S8 Prompt\
    \ for generating therapeutic candidate hypotheses\",\n    \"text\": \"21\\n\\nModel: Falcon\\nYou are an expert drug development\
