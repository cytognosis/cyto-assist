    \ this research and reviewing this manuscript. We are also grateful to all our colleagues at\\nFutureHouse for their support.\\\
    nData and Code Availability\\nSample trajectories for Robin and Finch, as well as the code for Robin will be available\
    \ at github.com/\\nFuture-House/robin\\n11\"\n  },\n  {\n    \"name\": \"References\",\n    \"text\": \"[1] Zachary D.\
