    \ },\n  {\n    \"name\": \"Supplementary Figure S1 Detailed example workflow of Robin experimental assay and therapeutic\
    \ candidate\",\n    \"text\": \"hypothesis generation.\\n16\\n\\n5.2\\nPrompts used in this report\\n5.2.1\\nExperimental\
    \ Assay Generation\\nModel: o4-mini\\nSystem prompt:\\nYou are a highly experienced biomedical research strategist. Your\
    \ task is to propose **mechanistic hypotheses**\\ntested via **cell-culture assays** or **therapeutic strategies**. Generate\
    \ exactly {num_assays} distinct ideas.\\nUser prompt:\\nReturn a list of {num_queries} queries (separated by <>) that\
    \ would be useful in doing research to develop\\ndetailed, mechanistic cell culture assays that would be used to evaluate\
    \ drugs to treat {disease_name}. These\\nqueries will be given to a 20-person scientific team to research in depth, so\
    \ they should be able to capture broadly\\nrelevant information (30+ words) and search relevant literature across biomedical,\
    \ clinical, and biochemical\\nliterature about the disease or therapeutic landscape. Don\\u2019t look up specific drugs,\
    \ but any relevant scientific\\ninformation that may help with assay development. You have {num_queries} queries, so spread\
    \ your queries\\nout to cover as much ground as possible. Create queries both about the general biochemistry and mechanistic\\\
    nunderpinnings of {disease_name} as well as about the assays. In formatting, don\\u2019t number the queries, just\\noutput\
    \ a string with {num_queries} queries separated by <>.\"\n  },\n  {\n    \"name\": \"Supplementary Figure S2 Prompt for\
    \ generating literature search queries\",\n    \"text\": \"Model: o4-mini\\nSystem prompt:\\nYou are a professional biomedical\
    \ researcher, having experience in early-stage drug discovery and validation in\\nvitro. Your task is to propose **mechanistic\
    \ hypotheses** tested via **cell-culture assays** or **therapeutic\\nstrategies**. Generate exactly {num_assays} distinct\
    \ assay ideas. You are meticulous, creative, and scientifically\\nrigorous. Focus on strategies that prioritize simplicity,\
    \ speed of readout, biological relevance, and direct\\nmeasurement of functional endpoints. Strong preference for biologically\
    \ relevant strategies.\\n**Output Format Specification (Strict Adherence Required):**\\nYour entire output MUST be a single,\
    \ valid JSON object. This JSON object will be an **array** at its root,\\ncontaining exactly {num_assays} individual JSON\
    \ objects. Each of these inner objects represents one distinct\\nproposal and MUST conform to the following structure\
    \ and content guidelines:\\n[\\n{{\\n\\\"strategy_name\\\": \\\"string\\\", # Name of the strategy. Keep this name simple,\
    \ don't\\ninclude details about how specific mechanisms or specific methodology.\\n,\\u2192\\n\\\"reasoning\\\": \\\"\
    string\\\" # Scientific reasoning justifying the chosen strategy or\\nthe feasibility/relevance of the assay design, citing\
    \ relevant literature.\\n,\\u2192\\n}}\\n// ... more objects here, up to {num_assays} total\\n]\\nUser prompt:\\nGenerate\
    \ exactly **{num_assays}** distinct and scientifically rigorous proposals for cell culture assays that\\ncan evaluate\
    \ drugs to treat {disease_name}. Here is some relevant background information that can guide your\\nproposals: {assay_lit_review_output}\"\
    \n  },\n  {\n    \"name\": \"Supplementary Figure S3 Prompt for generating hypotheses for experimental assays\",\n   \
    \ \"text\": \"17\\n\\nModel: Crow\\nYou are a professional biomedical researcher, having experience in early-stage drug\
    \ discovery and validation in\\nvitro. Your task is to evaluate cell culture assays that would be used to evaluate drugs\
    \ to treat {disease_name}.\\nGiven the following assay, do a comprehensive literature review to evaluate if this assay\
    \ would be useful for\\ntesting therapeutics for {disease_name}. Search relevant literature across biomedical, clinical,\
    \ and biochemical\\nliterature about the disease or therapeutic landscape. Don\\u2019t look up specific drugs, but any\
    \ relevant scientific\\ninformation that may inform assay development. {Strategy}\\nProvide your response in the following\
    \ format, like an evaluation for a scientific proposal:\\nAssay Overview: Explain the assay idea, including the following\
    \ key points: which aspect of the disease\\npathogenesis does the assay model, what measurements will be taken from the\
    \ assay and how they will be taken,\\nwhich cells or other biological material are used in the assay.\\nBiomedical Evidence:\
    \ Make a compelling argument for how the aspect of the disease represented in the\\nassay is central to the pathogenesis\
    \ of the disease. Make sure to consider both the biomedical and clinical\\nliterature.\\nPrevious Use: Explain how this\
    \ assay has previously been used for drug discovery (if this has been done).\\nExplain any key scientific discoveries\
    \ which have been made using this assay.\\nOverall Evaluation: Strengths and weaknesses of this assay for testing therapeutics\
    \ for {disease_name}.\"\n  },\n  {\n    \"name\": \"Supplementary Figure S4 Prompt for generating detailed evaluation\
    \ for each experimental assay\",\n    \"text\": \"18\\n\\nModel: Claude Sonnet 3.7\\nSystem prompt:\\nYou are an experienced\
    \ drug development committee member, with broad scientific expertise across the biology,\\nchemistry, clinical, medical,\
    \ and pharmaceutical sciences.\\nYour objective is to perform a rigorous scientific comparison of two proposals for experimental\
    \ assays that\\nwill be used to test therapeutics for {disease_name}.\\nYour evaluation must be based strictly on the\
    \ presented scientific evidence, scientific novelty, methodological\\nrigor, and logical interpretation, not on the persuasive\
    \ quality or wording of the proposal documents.\\nCritically assess the scientific soundness and biological rationale\
    \ for the experimental assay, analyzing the\\nsupporting literature and historical usage.\\nPreference for in vitro strategies\
    \ that prioritize simplicity, speed of readout, biological relevance, and direct\\nmeasurement of functional endpoints.\
    \ Strong preference for biologically relevant strategies.\\nThe goal of this task is to choose the best in vitro experimental\
    \ assay that would be scientifically relevant and\\ninsightful for testing therapeutics for {disease_name}. Prefer assays\
    \ that are biologically functionally relevant\\nand simple to perform in standard lab setting.\\nUser prompt:\\nEvaluate\
    \ the experimental assays using the structure below. This evaluation informs a critical decision.\\n**Respond ONLY in\
    \ the specified JSON format, do not include any text outside the JSON object itself.**\\n{{\\n\\\"Analysis\\\": {\\\"\
    type\\\": \\\"string\\\", \\\"description\\\": \\\"[Provide a detailed analysis of the\\ntwo experimental assays, based\
    \ on the evaluation criteria and the evidence\\nprovided.]\\\"},\\n,\\u2192\\n,\\u2192\\n\\\"Reasoning\\\": {\\\"type\\\
    \": \\\"string\\\", \\\"description\\\": \\\"[Choose which experimental assay is\\nbetter. Provide a detailed explanation\
    \ for why you think the winner is better\\nthan the loser, based on the evaluation criteria and the evidence provided.]\\\
    \"},\\n,\\u2192\\n,\\u2192\\n\\\"Winner\\\": {\\\"type\\\": \\\"string\\\", \\\"description\\\": \\\"[Return the name\
    \ and ID number of the\\ncandidate that you think is better between the two candidates, as a tuple. It\\nshould be formatted\
    \ as (winner_name, winner_id)]\\\"},\\n,\\u2192\\n,\\u2192\\n\\\"Loser\\\": {\\\"type\\\": \\\"string\\\", \\\"description\\\
    \": \\\"[Return the name and ID number of the\\ncandidate that you think is worse between the two candidates, as a tuple.\
    \ It\\nshould be formatted as (loser_name, loser_id)]\\\"},\\n,\\u2192\\n,\\u2192\\n}}\"\n  },\n  {\n    \"name\": \"\
    Supplementary Figure S5 Prompt for LLM judge to select the top experimental assay\",\n    \"text\": \"Model: o4-mini\\\
    nSystem prompt:\\nYou are a biomedical researcher briefly explaining a strategy of how to identify novel therapeutic compounds\
    \ to\\ntest using this assay to treat {disease_name}.\\nUser prompt:\\nHere is a proposed experimental assay identified\
    \ for treating '{disease_name}':\\nAssay Name: \\\"{assay_name}\\\"\\nSynthesize a concise and specific research goal\
    \ for the *next* stage, which is focused on **identifying\\nnovel therapeutic compounds** to test using this assay to\
