    \ cells or ARPE-19 cells in a flow cytometry assay.\\nRobin then deployed Crow to conduct a literature review of about\
    \ 400 papers about RPE phagocytosis and the therapeutic\\nlandscape of dry AMD and synthesized the results to propose\
    \ 30 existing drug candidates for experimental testing in\\nthe phagocytosis assay. Robin called Falcon to produce comprehensive\
    \ evaluation reports on each of these molecules\\n(Supplementary Figure S9), which were ranked in an LLM-judged tournament.\\\
    n2.2.1\\nROCK inhibitors enhance RPE phagocytosis\\nWe then selected the top five candidates from this ranking for experimental\
