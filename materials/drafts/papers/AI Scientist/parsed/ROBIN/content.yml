    : \"Advances in our ability to measure, perturb, and model biological systems have resulted in rapid growth of our collective\\\
    nscientific knowledge [1]. Yet, complementary technologies to interpret, synthesize, and generate hypotheses from this\\\
    nknowledge have lagged behind [2]. Artificial intelligence (AI) systems based on large language models (LLMs) show\\npromise\
    \ for automating this knowledge synthesis process and accelerating scientific discovery. As a primary goal of\\nbiomedical\
    \ research is the development of new treatments for disease, our ability to produce new therapeutics may be\\nthe ultimate\
    \ beneficiary of these approaches. Drug development heavily relies on a confluence of biological, clinical,\\nand pharmaceutical\
    \ expertise, and is limited by the rate at which these experts can synthesize the scientific literature [3].\\nThe repurposing\
    \ of existing drugs for new indications presents a promising application space for LLM systems. The\\nhistory of drug\
    \ repurposing often shows a pattern: while insights often existed in scientific literature, only after a\\n*Equal contribution.\\\
    n1FutureHouse, San Francisco, USA.\\n2University of Oxford, Oxford, UK.\\n\\u2020These authors jointly supervise work\
    \ at FutureHouse.\\n\\u2021These authors jointly supervised this work.\\n\\nsignificant lag did that knowledge crystallize\
    \ into a new treatment. For example, dabrafenib, an inhibitor of BRAF\\nkinase that is used in various cancers with mitogenic\
    \ mutations in BRAF, is being repurposed to prevent hearing\\nloss [4, 5]. While its molecular action was well characterized\
    \ by 2010 [6, 7, 8], dabrafenib\\u2019s otoprotective effects were\\nonly discovered 10 years later via unbiased high-throughput\
    \ screening [6]. This delayed discovery occurred despite\\ndabrafenib\\u2019s otoprotective effects being a direct result\
    \ of its known inhibition of BRAF [4, 9, 5], suggesting that more\\nrepurposing opportunities could be identified through\
    \ logical connection of existing biological insights in the literature.\\nFurther cases across medicine \\u2013 from ketamine\
    \ (22 year lag [10, 11]) to leucovorin (5 year lag [12, 13]) to KarXT (13\\nyear lag [14, 15]) \\u2013 underscore how\
    \ repurposing efforts are frequently realized years after core insights are documented.\\nSuch delays in connecting existing\
    \ insights to new therapeutic applications highlight the challenge of synthesizing\\ndisparate scientific knowledge. Trained\
    \ on data across many fields, large language models (LLMs) are able to store and\\nrecall information on a wide variety\
    \ of scientific topics and thus transcend the limitations of individual human knowledge.\\nPrevious work has shown that\
    \ fine-tuned LLMs and specialized RAG systems can exceed human performance on\\nretrieving and summarizing information\
    \ from the scientific literature. These advances raise the possibility that LLM\\nsystems could be used for novel hypothesis\
    \ generation [16, 17, 18, 19].\\nSeveral LLM systems have recently been developed to automate hypothesis generation [20,\
    \ 21, 22, 23, 24, 25].\\nSpecialized systems have also been developed to automate specific tasks in drug discovery, such\
    \ as prediction of\\npharmacological properties and safety profiles [25, 22]. These systems have demonstrated they can\
    \ generate reasonable\\nhypotheses by utilizing multi-agent architectures that decompose scientific reasoning into discrete\
    \ manageable sub-\\ntasks [25], domain-specific fine-tuning [24, 26], integration of external tools [24, 25], and incorporation\
    \ of human\\nfeedback [25]. However, none of these systems are currently capable of fully automating the key intellectual\
    \ steps of the\\nscientific process, including generating hypotheses and experimental strategies, analyzing results from\
    \ the experiments,\\nand refining hypotheses in light of new data.\\nHere, we introduce Robin, the first multi-agent system\
    \ for scientific discovery that integrates novel hypothesis generation\\nwith experimental data analysis in one continuous\
    \ workflow (Figure 1A). Robin utilizes specialized language agents for\\nliterature search (Crow and Falcon) and data\
    \ analysis (Finch) to enable semi-autonomous scientific discovery [27, 28].\\nThough this system could be applicable to\
    \ scientific discovery across disciplines, in this report, we focus on its\\npotential in therapeutics. Given a disease,\
    \ Robin automatically identifies relevant in vitro assays that model key disease\\nmechanisms and proposes specific drug\
    \ candidates to evaluate in these experimental models. Researchers next conduct\\nthe experiments and provide the resulting\
    \ data to Robin for autonomous analysis. Robin then interprets the results of this\\nanalysis to generate a new round\
    \ of therapeutic candidates. Through this process, Robin drives an iterative therapeutics\\ndevelopment cycle where hypotheses\
    \ are generated, tested, analyzed, and refined based on experimental results. The\\nkey intellectual steps of the scientific\
    \ method are thus automated while coordinating with scientists throughout the\\nexperimental loop. By connecting literature-based\
    \ hypothesis generation with experimental data analysis in a continuous\\nfeedback system, Robin represents the first\
    \ complete implementation of AI-driven scientific discovery.\\nTo demonstrate Robin\\u2019s ability to generate and refine\
    \ novel therapeutic hypotheses, we attempted to identify potential\\nnew treatments for dry age-related macular degeneration\
    \ (dAMD). dAMD is the leading cause of irreversible sight\\nloss in developed countries, yet limited treatment options\
    \ are available. In the U.S. alone, 1.5 million people have\\nvision-threatening dAMD, and 600,000 are legally blind due\
    \ to AMD, a figure projected to almost triple by 2050 due\\nto an aging population [29, 30]. By applying Robin to discover\
    \ novel therapeutic candidates for dAMD, this work\\nrepresents a first step towards AI-generated discovery in scientific\
    \ research.\\n2\"\n  },\n  {\n    \"name\": \"Results\",\n    \"text\": \"2.1\\nRobin: A multi-agent system for scientific\
