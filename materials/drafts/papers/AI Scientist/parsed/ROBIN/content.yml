    nnesses of this therapeutic candidate for treating {disease_name}.\"\n  },\n  {\n    \"name\": \"Supplementary Figure\
    \ S9 Prompt for generating detailed investigation for each therapeutic candidate\",\n    \"text\": \"Model: Finch\\nAnalyze\
    \ the zipped .fcs files from three 96-well plates to measure average Alexa Fluor 647 signal in live retinal\\npigment\
    \ epithelial cells across different drug treatments.\\nUse the metadata file to match well positions (e.g., A1) with their\
