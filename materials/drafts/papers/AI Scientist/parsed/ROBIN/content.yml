    \ Validation:** The target pathway/mechanism has robust evidence (genetic, functional)\\nlinking it *specifically* to\
    \ the disease pathophysiology.\\n2. **Relevant Preclinical/Clinical Evidence:** Supporting data exists from disease-relevant\
    \ models or,\\nideally, preliminary human data (even if from related conditions or pilot studies).\\n3. **Mechanistic\
    \ Specificity:** A clear, well-defined molecular mechanism is preferable over broad, non-\\nspecific actions.\\n4. **Novelty\
    \ (Balanced with Validation):** Innovative, exciting, and novel approaches that can advance\\ntreatment for {disease_name},\
    \ that are also grounded in strong scientific rationale and evidence.\\n- Focus on compounds that are commercially available\
    \ (mention catalog numbers) and can be developed into\\ndrugs\\n- Favor mechanisms with minimal impact on other cellular\
    \ functions\\n- Compounds should be novel for treatment of the disease and ideally address novel targets for the diseased\\\
    ncell type (i.e. not tested in prior studies)\\nUser prompt:\\nReturn a list of {2*num_queries} queries (separated by\
    \ <>) that would be useful in doing background research\\nfor the goal of {candidate_generation_goal}.\\nThese queries\
