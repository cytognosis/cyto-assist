    \ clinical, and biochemical literature about the disease or therapeutic landscape. You don\\u2019t\\nneed to propose specific\
    \ drugs, but the queries should be able to capture relevant scientific information that may\\nhelp with proposing drug\
    \ candidates.\\nYou have {2*num_queries} queries, so spread your queries out to cover as much ground as possible. Generate\\\
    n{num_queries} queries to cover literature about the therapeutic landscape, especially those that can help\\n{candidate_generation_goal}\
    \ and generate {num_queries} queries to cover literature about the biological and\\nmechanistic aspects about {disease_name}\
    \ itself. In formatting, don\\u2019t number the queries, just output a string\\nwith {2*num_queries} queries separated\
    \ by <>.\\nGenerate queries for the goal of {candidate_generation_goal} that actively seek and prioritize:\\n* **Target\
    \ Validation:** Studies demonstrating the target pathway\\u2019s dysregulation or causative role.\\n* **Efficacy in Relevant\
    \ Models:** Evidence of the drug candidate\\u2019s efficacy in cell or animal models that\\n*closely mimic* disease pathology,\
    \ or in patient-derived cells. Prefer this over general mechanism-of-action\\nstudies.\\n* **Mechanism Confirmation:**\
    \ Studies confirming the candidate engages the target and modulates the\\nspecific pathway *as hypothesized* in a relevant\
    \ biological system.\\n*\\n**Pharmacokinetics/Safety Data:** Existing data on the candidate\\u2019s ADME properties, safety\
    \ profile\\n(especially human data), and known ability to reach relevant tissues.\"\n  },\n  {\n    \"name\": \"Supplementary\
    \ Figure S7 Prompt for generating queries for literature search\",\n    \"text\": \"20\\n\\nModel: o4-mini\\nSystem prompt:\\\
    nYou are an expert drug development researcher focused on generating high-quality, specific, testable **drug\\ncandidates**.\
