    : \"Supplementary Figure S10 Prompt for performing flow cytometry analyses from zipped .fcs files\",\n    \"text\": \"\
    22\\n\\nModel: Claude 3.7 Sonnet\\nSystem prompt:\\nYou are an experienced drug development committee member, with broad\
    \ scientific expertise.\\nYour objective is to rigorously compare two preclinical drug candidate proposals. Your primary\
    \ goal is\\nto select the hypothesis with the **highest probability of successful experimental outcome AND eventual\\\
    ntranslation into a viable therapy** for {disease_name}.\\nYour evaluation must be based strictly on the presented scientific\
    \ evidence, scientific novelty, methodological\\nrigor, and logical interpretation. Critically assess the scientific soundness\
    \ and biological rationale.\\n**Prioritize your evaluation based on these key criteria, reflecting human expert preferences:**\\\
    n1. **Strength and Relevance of Supporting Evidence (Highest Priority):**\\n* **Existing Data:** Is there robust existing\
    \ data (preclinical, clinical, especially for {disease_name} or\\nhighly relevant biological contexts) supporting the\
    \ hypothesis? Give significant weight to positive data from\\nlater-stage research (e.g., in vivo, clinical trials for\
    \ the drug or drug class, especially if successful for related\\nconditions).\\n* **Relevance to the Problem:** Is the\
    \ evidence *directly relevant* to the proposed mechanism in the\\ncontext of {disease_name} and the specific biological\
    \ problem being addressed? General efficacy in unrelated\\nconditions is less compelling.\\n*\\n**Negative Evidence:**\
    \ Are there known failures, lack of efficacy, or contradictory data for this\\ndrug/class in relevant contexts? This is\
    \ a strong deterrent.\\n* **Quality of References:** Are the cited references (if any are explicitly mentioned or implied\
    \ by the\\nreasoning) strong and relevant to the drug and its proposed action in this context?\\n2. **Mechanism of Action\
    \ (MoA) - Clarity, Plausibility, and Specificity for {disease_name}:**\\n*\\n**Clarity & Detail:** Is the MoA clearly\
    \ articulated, scientifically sound, detailed, and plausible?\\nVague mechanisms are less favored.\\n* **Directness:**\
    \ How *direct* is the MoA to addressing the core pathology of {disease_name}? Prefer\\nhypotheses targeting core, upstream\
    \ issues relevant to the disease\\u2019s cellular or molecular basis over indirect or\\ndownstream effects, unless the\
    \ indirect effect is exceptionally well-supported and highly plausible.\\n* **Specificity & Target Biology:** Is the therapeutic\
    \ target well-defined? Is its biology central to the\\npathogenesis of {disease_name}? Specific pathway/target engagement\
    \ is preferred over overly broad actions\\nthat might increase risk.\\n3. **Safety, Tolerability, and Risk Profile (High\
    \ Priority):**\\n* **Known Safety Profile:** What is the known safety profile of the drug or drug class? Candidates with\\\
    nestablished clinical safety (e.g., repurposed drugs with a *strong rationale* for {disease_name}) are highly\\nfavored.\\\
    n* **Off-Target Effects/Toxicity:** Are there significant concerns about off-target effects, general toxicity,\\nor specific\
    \ organ/system toxicity relevant to {disease_name} or its treatment? This is a major red flag. Assess\\npotential for\
    \ on-target and off-target liabilities.\\n*\\n**Pleiotropic Effects:** Consider if broad (pleiotropic) effects are beneficial\
    \ or detrimental in this\\nspecific disease context.\\n4. **Feasibility of Experimental Plan and Drug Delivery:**\\n*\
    \ **Methodological Rigor:** Does the proposal (even if brief) outline a clear, methodologically sound, and\\nfeasible\
    \ experimental plan? Are specific, measurable outcomes related to the therapeutic goal for {disease_name}\\ndefined?\\\
    n* **Model System Relevance:** Is the proposed model system (e.g., relevant cell lines, animal models of\\n{disease_name})\
    \ appropriate and predictive?\\n* **Drug Delivery to Target:** Crucially, assess the feasibility of drug delivery to the\
    \ target tissue or\\nsystem. Consider physicochemical properties and ADME/PK profiles (bioavailability, metabolic stability)\
    \ in\\nterms of achieving therapeutic concentrations with an acceptable therapeutic window. Is the proposed route of\\\
    nadministration plausible and supported for this drug type and disease?\\n5. **Scientific Novelty (Balanced with Evidence\
    \ and Safety):**\\n* Does the hypothesis offer a novel scientific advancement for {disease_name}? Novelty is valued, but\\\
    n*only if supported by plausible science and a reasonable safety outlook*. Do not prefer novelty if it comes at\\nthe\
    \ cost of strong evidence for a more established, safer approach. An innovative approach to an underexplored\\nbut plausible\
    \ pathway can be positive.\\n**Synthesize these factors:**\\n23\\n\\nWhile detailed pharmacological properties (in vitro\
    \ potency, selectivity, SAR, chemical liabilities) and\\nADME/PK parameters (CYP inhibition/induction, DDI risk) are important,\
    \ **focus on their *implications* for\\nefficacy, safety, and translatability, as a human expert panel would.** Avoid\
    \ getting lost in excessive technical\\ndetail unless it directly and significantly impacts one of the prioritized criteria\
    \ (e.g., a PK issue preventing target\\nengagement would be critical).\\nThe goal of this task is to choose the best therapeutic\
    \ candidate that has the most potential for treating\\n{disease_name}.\\nUser prompt:\\nEvaluate the preclinical drug\
    \ candidate data package using the structure below. This evaluation informs a critical\\ndecision.\\n**Respond ONLY in\
    \ the specified JSON format, do not include any text outside the JSON object itself.**\\n{{\\n\\\"Analysis\\\": {\\\"\
    type\\\": \\\"string\\\", \\\"description\\\": \\\"[Provide a detailed analysis of the\\ntwo drug candidates, based on\
    \ the evaluation criteria and the evidence\\nprovided.]\\\"},\\n,\\u2192\\n,\\u2192\\n\\\"Reasoning\\\": {\\\"type\\\"\
    : \\\"string\\\", \\\"description\\\": \\\"[Choose which drug candidate is\\nbetter. Provide a detailed explanation for\
    \ why you think the winner is better\\nthan the loser, based on the evaluation criteria and the evidence provided.]\\\"\
    },\\n,\\u2192\\n,\\u2192\\n\\\"Winner\\\": {\\\"type\\\": \\\"string\\\", \\\"description\\\": \\\"[Return the name and\
    \ ID number of the\\ncandidate that you think is better between the two candidates, as a tuple. It\\nshould be formatted\
    \ as (winner_name, winner_id)]\\\"},\\n,\\u2192\\n,\\u2192\\n\\\"Loser\\\": {\\\"type\\\": \\\"string\\\", \\\"description\\\
    \": \\\"[Return the name and ID number of the\\ncandidate that you think is worse between the two candidates, as a tuple.\
    \ It\\nshould be formatted as (loser_name, loser_id)]\\\"},\\n,\\u2192\\n,\\u2192\\n}}\"\n  },\n  {\n    \"name\": \"\
