  acknowledgments: 'In compliance with the International Committee of Medical Journal Editors

    (ICMJE) recommendations, the authors acknowledge the utilization of AI

    services in this work: the authors of this article used ChatGPT (GPT-4) by

    OpenAI exclusively for proofreading for English grammatical and/or lan­

    guage errors. It was also used to help summarise the key messages from

    the text in the Article Highlights Box. All sentences revised by GPT-4 were

    reviewed and verified by the authors. No content was generated by the

    GPT-4 or any other AI service.'
