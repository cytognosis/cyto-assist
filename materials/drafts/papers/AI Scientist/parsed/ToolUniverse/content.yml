  sections: "[\n  {\n    \"name\": \"Discussion\",\n    \"text\": \"TOOLUNIVERSE moves beyond bespoke AI agents by providing\
    \ an ecosystem for constructing\\nAI scientists. It integrates tools and operations into workflows and incorporates automatic\
    \ tool\\n5\\n\\ndiscovery and optimization. These capabilities extend any language model, agent, or reasoning\\nmodel\
    \ with research functionality tailored to the user: models can retrieve data or run existing\\nscripts, and also identify\
    \ relevant analysis tools, execute them with user inputs, combine outputs\\ninto multi-step workflows, and iteratively\
    \ refine or even generate new tools when gaps are encoun-\\ntered. It is applicable across scientific domains, and its\
    \ integration of human-in-the-loop tools\\nprovides safeguards against erroneous outputs. For example, an AI scientist\
    \ might propose several\\ncandidate compounds, and a human expert could validate tissue-specific expression before advanc-\\\
    ning them. Looking ahead, TOOLUNIVERSE will be used to build AI scientists for discovery and\\nserve as a testbed to evaluate\
    \ their integration with laboratory systems, potential for safety and\\nbiosecurity risks [27], and adherence to safeguards\
    \ [28] and governance specifications [29].\\nTOOLUNIVERSE goes beyond orchestration frameworks such as GPT Agent [30],\
    \ Gemini\\nCLI [31], Claude Code [32], Qwen Code [33], LangChain [34], Haystack [35], Autogen [36] or\\nCAMEL [37], and\
    \ communication protocols like MCP [11] and AutoTools [38], which standard-\\nize how models access data resources, browsers,\
    \ and tools. These systems are designed to route\\nqueries or connect agents with pre-defined tools, but they do not support\
    \ the end-to-end lifecycle of\\ncreating, refining, and integrating tools into scientific workflows. In contrast, TOOLUNIVERSE\
    \ can\\ncreate and optimize tools and integrate them into agentic workflows beyond providing static tool\\nregistries.\
    \ It introduces Tool Discoverer, which generates new tools from natural language descrip-\\ntions and transforms them\
    \ into ready-to-use components, and Tool Optimizer, which iteratively\\nimproves tool specifications through feedback\
    \ from users and other AI systems. These capabilities\\nenable TOOLUNIVERSE to manage and compose existing tools (Figure\
    \ 1b) into new tools.\\nTo ensure that tools can be effectively used by AI models to build AI scientists, TOOLU-\\nNIVERSE\
    \ employs a multi-step validation process combining tool-specific test cases for each tool\\nadded to TOOLUNIVERSE, human\
    \ expert reviews of input-output traces, and automated optimiza-\\ntion of tool specifications to verify correctness and\
    \ usability by AI scientists. Regular maintenance\\nand a bug-reporting system further sustain long-term reliability.\\\
    nA close parallel to TOOLUNIVERSE is the emergence of computational platforms in ge-\\nnomics, which created shared infrastructure\
    \ for reuse, reproducibility, and open science innova-\\ntion. TOOLUNIVERSE provides a comparable foundation for AI scientists,\
    \ lowering barriers to\\ntheir development and use in research.\\n6\\n\\nData and code availability. The project page\
    \ and web service of TOOLUNIVERSE are at https:\\n//aiscientist.tools. The code, docs, and demos of TOOLUNIVERSE are at\
    \ https://github.com/mim\\ns-harvard/ToolUniverse. The Python package of TOOLUNIVERSE is at https://pypi.org/project/t\\\
    nooluniverse. The therapeutic case study is at https://zitniklab.hms.harvard.edu/ToolUniverse/tutor\\nials/tooluniverse\
    \ case study.html.\"\n  },\n  {\n    \"name\": \"Acknowledgments. We thank Nicholas Yang and Yuchang Su for their contributions\
