    n\\n4.3\\nBuilding an AI Scientist from a Specialized AI Agent\\nSpecialized AI agents are trained on specific types of\
    \ tasks, allowing them to become experts in\\nparticular domains, such as the TxAgent [13] for precision therapeutics,\
    \ GeneAgent [16] for gene-\\nset analysis, and SpatialAgent [39] for spatial biology. In TxAgent [13], TOOLUNIVERSE can\
    \ be\\nused not only by these specialized AI agents during inference but also as a real-world environment\\nfor agent\
    \ training. In training, TOOLUNIVERSE serves as the scientific environment in which\\nTxAgent can interact. Through reinforcement\
    \ learning, TxAgent learns how to use tools within\\nTOOLUNIVERSE and effectively manage complex therapeutic tasks.\\\
    nTool category\\nDescription\\nML models\\nTools that apply machine learning algorithms to tasks like prediction,\\nclassification,\
    \ or generation. Examples include foundation models,\\nlanguage models, and reasoning models.\\nAgents\\nTools that operate\
    \ autonomously to perceive environments, make\\ndecisions, and take actions toward goals. Examples include research\\\
    nplanning agents, hypothesis generation agents, and data analysis agents.\\nScientific\\npackages\\nSoftware packages\
    \ engineered to facilitate diverse scientific tasks,\\nexperiments, and data analysis workflows. Examples include\\ncomputation\
    \ packages, biomedical libraries, and scientific simulators.\\nAutomation\\nTools involving physical or simulated machines\
    \ capable of sensing,\\nreasoning, and acting in the world. Examples include lab automation\\ntools and instrument control\
    \ policies.\\nWorkflows\\nTools that enable complex, multi-step scientific workflows. Examples\\ninclude orchestration\
    \ schedulers and RAG pipelines.\\nVisualization\\nTools that facilitate the display and communication of scientific data\
    \ and\"\n  },\n  {\n    \"name\": \"results. Examples include dashboards and plot and chart generators\",\n    \"text\"\
    : \"Feedback and\\nsafety\\nTools that incorporate evaluations or input from human experts to ensure\\nsafety and goal\
    \ alignment. Examples include privacy guardrails, security\\nchecklists, and human-in-the-loop tools.\\nLocal and remote\\\
    ndatasets\\nTools that store, manage, and query structured or semi-structured data\\nefficiently, including relational,\
    \ tabular, and hierarchical datasets.\\nExamples include knowledge bases and typed API clients.\\nExperimentation\\nTools\
    \ that support the design and management of experiments. Examples\\ninclude protocol generators and LIMS integration tools.\\\
    n25\\n\\nSearch and\\nembeddings\\nTools that store and retrieve vectorized representations of data for use in\\nmachine\
    \ learning tasks. Examples include vector search tools and\\nembedding generators.\"\n  },\n  {\n    \"name\": \"Supplementary\
