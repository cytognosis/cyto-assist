    name\": \"Supplementary Information\",\n    \"text\": \"1\\nOverview of TOOLUNIVERSE\\nTOOLUNIVERSE is an ecosystem that\
    \ wraps around any open or closed AI model, i.e., large lan-\\nguage model (LLM), agent, or large reasoning model (LRM),\
    \ and enables the user to create and\\nrefine their own entirely custom AI research assistant (i.e., AI scientist) without\
    \ the need for addi-\\ntional training or finetuning. To achieve that, TOOLUNIVERSE connects the user-specified LLM/L-\\\
    nRM/agent with a scientific toolkit (Supplementary Table 1). While advanced models possess plan-\\nning and reasoning\
    \ capabilities, scientific research cannot be conducted through reasoning alone.\\nTOOLUNIVERSE addresses this by providing\
    \ interactive scientific environments where models can\\nuse tools to obtain real-world feedback, effectively transforming\
    \ internal cognitive processes into\\ntangible research actions. TOOLUNIVERSE features a tool specification protocol that\
    \ makes tools\\nunderstandable to LLMs, LRMs, and AI agents regardless of their internal mechanisms, and an\\ninteraction\
    \ protocol that allows tool use without the need to manage backend complexities.\\nTOOLUNIVERSE is extensible and allows\
    \ the tools to be easily added, optimized, or cre-\\nated. It hosts a toolkit of over 600 scientific tools. It also supports\
    \ multi-query specific searches\\nto help users locate relevant tools and is engineered for easy integration with language\
    \ models,\\nagents, and reasoning models. Current tools in TOOLUNIVERSE include: foundation models, fine-\\ntuned LLMs,\
    \ LRMs, and other ML models exposed as callable endpoints; agentic planners and\\ntool routers; domain libraries and simulators;\
    \ and systems for human-in-the-loop feedback and\\nlab automation with instrument control. TOOLUNIVERSE also provides\
    \ data and retrieval utilities,\\nsuch as data sources, knowledge bases, vector search with embedding generators, and\
    \ complete\\nretrieval-augmented generation (RAG) pipelines. For integration and governance, the ecosystem\\noffers external\
    \ service connectors, typed API clients, privacy guardrails, safety checklists, com-\\npliance controls, and audit logs.\
    \ TOOLUNIVERSE supports high-level scientific and operational\\nworkflows through visualization dashboards, experiment\
    \ design tools with ELN/LIMS integration,\\nand robust workflow engines and orchestration schedulers. Despite the backend\
    \ heterogeneity of\\nthese tools, which span machine learning models, AI agents, software utilities, robotics, databases,\\\
    nand APIs, all are presented to the AI scientist through a unified AI-interaction protocol, which we\\ndescribe next.\\\
    nAI-Tool Interaction Protocol. TOOLUNIVERSE implements a protocol for presenting tool defi-\\nnitions, which makes the\
    \ backend agnostic to users and simplifies the addition of new tools. This\\nprotocol allows the user to equip their AI\
    \ scientist with tool-use capability without having to han-\\ndle tool-specific configurations. This protocol has two\
    \ endpoints: 1) Find Tool, which accepts a\\ntextual description of a desired functionality and retrieves tools from TOOLUNIVERSE\
    \ that have\\nthe desired functionality, and 2) Call Tool, which executes a specified tool with its arguments and\\nreturns\
    \ the results. TOOLUNIVERSE connects to an AI model by providing the definitions of these\\noperations within the model\\\
    u2019s context window. This enables the model to leverage its reasoning\\n12\\n\\ncapabilities to generate the correct\
    \ arguments for these operations and to autonomously search for\\nand execute tools.\\nCore Components. TOOLUNIVERSE include\
    \ Tool Discoverer and Tool Manager for discovering\\nand integrating tools, a Tool Finder to search for options from over\
    \ 600 candidates based on user\\nrequirements, and a Tool Caller for execution. For complex tasks, the Tool Composer assembles\\\
    nmultiple tools into a composite workflow. The Tool Optimizer utilizes a built-in multi-agent system\\nto refine tool\
    \ specifications, ensuring they better align with the tool\\u2019s actual behavior. Leveraging\\nthese components and\
    \ the unified AI-tool interaction protocol, TOOLUNIVERSE empowers creat-\\ning AI scientists: specialized AI models that\
    \ combine reasoning with access to curated tools to\\nperform complex research tasks.\\n2\\nUnified AI-Tool Interaction\
    \ Protocol in TOOLUNIVERSE\\nTOOLUNIVERSE is designed to support a comprehensive ecosystem of tools with exceptionally\\\
    ndiverse abilities. Despite the profound backend heterogeneity of these tools, which span machine\\nlearning models, AI\
    \ agents, software utilities, robotics, databases, and APIs, all are presented to\\nthe client through a unified protocol.\\\
    n2.1\\nTool Specification Schema\"\n  },\n  {\n    \"name\": \"Supplementary Figure 1 shows the tool specification schema\
    \ in TOOLUNIVERSE. This protocol\",\n    \"text\": \"exposes every tool via a standard specification containing its name;\
    \ a functional description; a\\nlist of parameters, where each parameter is explicitly defined with its own name, description,\
    \ data\\ntype, and required status; and a return schema that shows the data structure of the returned data. An\\nexample\
    \ tool specification is shown in Supplementary Figure 2. The specification is provided to\\nclients such as LLMs, reasoning\
    \ models, AI agents, and human users to help them understand how\\nto use the tool effectively. For instance, when the\
    \ client is an LLM, the specification is supplied\\nwithin its context window, thereby granting it the necessary information\
    \ to interact with tools from\"\n  },\n  {\n    \"name\": \"TOOLUNIVERSE\",\n    \"text\": \"2.2\\nAI-Tool Interaction\
    \ Protocol\\nTOOLUNIVERSE processes requests through a standard interaction protocol, illustrated in Supple-\\nmentary\
    \ Figure 3. All interactions are formatted as a single string that encodes a function call,\\nspecifying the desired tool\\\
    u2019s name and its input arguments. This protocol provides the foundation\\nfor all interactions with TOOLUNIVERSE, enabling\
    \ a suite of core operations including tool search,\\ncalling, discovery, optimization, and composition.\\n2.3\\nAI Communication\
    \ in TOOLUNIVERSE\\nTOOLUNIVERSE provides two methods for communication: local and remote. For local communi-\\ncation,\
    \ operations are executed directly in a Python environment using the TOOLUNIVERSE.run()\\nfunction. To support remote\
    \ serving, TOOLUNIVERSE also implements the Model Context Proto-\\n13\\n\\nName: The unique identifier for the tool.\\\
    nDescription: A clear and concise summary of the tool\\u2019s purpose and functionality.\\nParameters: A list of arguments\
    \ that the tool accepts. Each argument has the following\\nproperties:\\n\\u2022 Argument Name: The name of the parameter.\\\
    n\\u2022 Argument Type: The expected data type for the parameter\\u2019s value (e.g., string,\\ninteger, boolean).\\n\\\
    u2022 Argument Description: A detailed explanation of what the parameter represents\\nand its purpose.\\n\\u2022 Required:\
    \ A boolean value indicating whether the parameter is mandatory for the\\ntool to execute.\\nReturn Schema: A description\
    \ of the structure and data types of the output returned by the\\ntool upon successful execution.\\nTool Specification\
    \ Schema in TOOLUNIVERSE\"\n  },\n  {\n    \"name\": \"Supplementary Figure 1: The tool specification schema in TOOLUNIVERSE.\
    \ The tool specification schema in\",\n    \"text\": \"TOOLUNIVERSE is consistent across all tools, regardless of their\
    \ diverse backends.\\ncol (MCP), which allows all operations like searching and invoking tools to be communicated with\\\
    nthe TOOLUNIVERSE server over a network, eliminating the need for local deployment.\\n2.4\\nAccessing Tools from TOOLUNIVERSE\\\
    nBy leveraging a tool specification and interaction protocol, TOOLUNIVERSE provides an interface\\nfor human users and\
    \ AI agents to access tools. The tool can be invoked by executing:\\ntooluniverse.run(tool_call_schema)\\nwhere tool_call_schema\
    \ is a dictionary following the Interaction Protocol Schema: {\\u2018name\\u2019:\\nname of the tool, \\u2018arguments\\\
    u2019: parameters required by the tool}. This approach abstracts away\\nbackend complexity. Regardless of a tool\\u2019s\
    \ underlying implementation, it is presented to the client\\n(the user of the tool, such as LLMs, reasoning models, AI\
    \ agents) as a specification. To use a\\ntool, the client consults this specification to construct a request that adheres\
    \ to the unified AI-tool\\ninteraction protocol. This request is then sent to TOOLUNIVERSE via either a local interface\
    \ or a\\nremote MCP connection. TOOLUNIVERSE processes the request, executes the specified tool, and\\nreturns the results\
    \ to the client. This eliminates the need for complex configurations, regardless\\n14\"\n  },\n  {\n    \"name\": \"Supplementary\
    \ Figure 2: One example of tool specification in TOOLUNIVERSE\",\n    \"text\": \"Name: The name of the tool or operation\
    \ to be called.\\nParameters: A list of arguments that the tool accepts. Each argument has the following\\nproperties:\\\
    n\\u2022 Argument Name: The name of the parameter.\\n\\u2022 Argument Value: The value for the parameter provided by the\
    \ client.\\nInteraction schema in TOOLUNIVERSE\"\n  },\n  {\n    \"name\": \"Supplementary Figure 3: The universal interaction\
    \ schema for all tools and operations within TOOLUNIVERSE\",\n    \"text\": \"of backend or runtime differences. For example,\
    \ users can query a new database without writing\\ndatabase-specific SQL, run machine learning models without configuring\
    \ GPUs or environments,\\nor access web-based lab equipment through a single, standardized tool call request.\\n3\\nCore\
    \ Components of TOOLUNIVERSE\\nTOOLUNIVERSE operates through a set of core components designed for comprehensive tool\
    \ man-\\nagement. Its capabilities include Tool Discoverer to discover new tools and Tool Manager to in-\\ntegrate tools\
    \ into TOOLUNIVERSE, a Tool Finder to search for suitable options from over 600\\ncandidates based on user requirements,\
    \ and a Tool Caller for execution. For complex tasks, the\\nTool Composer assembles multiple tools into a new, composite\
    \ workflow. The Tool Optimizer\\nutilizes a built-in multi-agent system to refine tool specifications, ensuring they better\
    \ align with\\nthe tool\\u2019s actual behavior.\\n15\\n\\n3.1\\nTool Finder\\nThe TOOLUNIVERSE contains a large repository\
    \ of scientific tools. To facilitate the creation of\\na task-specific environment, the tool finder operation is designed\
    \ to identify and retrieve relevant\\ntools based on user requirements. The input to the tool finder is a natural language\
    \ query from\\nthe client, describing the task they wish to achieve or the specific capabilities required from the\\ntools.\
    \ It employs a versatile search architecture featuring three distinct methodologies: keyword\\nsearch, LLM in-context\
    \ search, and embedding search. The selection of a method allows for a\\nstrategic trade-off between search precision,\
    \ semantic understanding, and computational resource\\nconsumption.\\nKeyword search. Keyword search operates on a sophisticated\
    \ keyword-based methodology. The\\nprocess begins by parsing a user\\u2019s query through a multi-stage pipeline involving\
    \ tokenization\\nvia regular expressions, the removal of over 45 common English stop words, and suffix-based\\nstemming\
    \ using 20 morphological rules to reduce words to their root form. To capture multi-word\\nconcepts, this method also\
    \ generates n-grams (bigrams and trigrams). These processed keywords\\nand phrases are then matched against a pre-built\
    \ index of tool specifications. which has undergone\\nthe same processing. Relevance is scored using a term frequency-inverse\
    \ document frequency\\n(TF-IDF) algorithm, calculated as: Relevance = TF \\u00d7 IDF \\u00d7 log(1 + QueryFrequency),\
    \ where\\nTF measures how often a term appears in a document, IDF reflects how unique the term is across\\nall documents,\
    \ and QueryFrequency indicates how often the term appears in the user\\u2019s query. The\\nscoring model enhances precision\
    \ by applying a hierarchical bonus structure to the relevance score.\\nMatches found in a tool\\u2019s name receive the\
    \ highest priority with a 2.0\\u00d7 bonus multiplier, followed\\nby a 1.5\\u00d7 multiplier for exact phrase matches\
    \ within descriptions. This keyword search approach\\nprovides a fast and robust search solution that operates independently\
    \ of machine learning models,\\nensuring accessibility across different resource levels.\\nLLM in-context search. The\
    \ LLM in-context search leverages the advanced reasoning capabil-\\nities of a Large Language Model to interpret user\
    \ intent more holistically. Rather than relying\\non simple keyword matching, a detailed prompt for tool selection is\
    \ constructed. This prompt\\ncontextualizes the user\\u2019s task description with the tool specifications of a candidate\
    \ set of tools in\\nTOOLUNIVERSE. The LLM is then tasked with analyzing this rich context to infer the optimal\\ntool\
    \ or sequence of tools required to fulfill the user\\u2019s request. This method excels at interpreting\\ncomplex, multi-step,\
    \ or abstract queries that demand logical inference. While its application can\\nbe constrained by the finite context\
    \ window of the model, it offers strong flexibility in understand-\\ning abstract goals. The LLM in-context search is\
    \ powered by the agentic tool implementation\\nin TOOLUNIVERSE. This allows the user to simply provide a configuration\
    \ file that defines the\\nprompt and tool specifications, without needing to manage the backend LLM inference processes.\\\
    nEmbedding search. Embedding search is a highly scalable method that retrieves tools by match-\\ning the semantic similarity\
    \ between a user\\u2019s query and the tool\\u2019s description. To achieve this, we\\nfinetune the GTE-Qwen2-1.5B language\
    \ embedding model using pairs of synthetic user queries\\n16\"\n  },\n  {\n    \"name\": \"Supplementary Figure 4: Code\
    \ example of a tool operation implementation used by the Tool Caller during execution\",\n    \"text\": \"and augmented\
    \ tool specifications, training it to understand the connection between a user\\u2019s in-\\ntent and a tool\\u2019s function.\
    \ The process involves two stages. First, in an offline indexing stage,\\neach tool\\u2019s specification is passed through\
    \ the embedding model to generate a semantic vector that\\ncaptures its meaning. These vectors are then stored and indexed\
    \ in a specialized vector database.\\nLater, during the online querying stage, a user\\u2019s natural language query is\
    \ converted into a query\\nvector using the same model. Finally, relevant tools are discovered by calculating the cosine\
    \ simi-\\nlarity between the user\\u2019s query vector and all the tool vectors in the database, identifying the closest\\\
    nmatches.\\n3.2\\nTool Caller\\nThe Tool Caller is the primary execution engine in TOOLUNIVERSE. It is responsible for\
    \ in-\\nstantiating tools, validating requests, and dispatching calls. Upon initialization, the Tool Caller is\\nconfigured\
    \ with a manifest of available tools, including their specifications and settings. To miti-\\ngate the significant system\
    \ overhead associated with loading all tools simultaneously, it employs a\\ndynamic loading strategy. A specific tool\
    \ is loaded into memory only upon its first request and is\\nthen cached for a duration to efficiently handle subsequent\
    \ calls. During this loading process, the\\nTool Caller injects the necessary configurations, such as API endpoints and\
    \ authentication keys,\\ninto the corresponding tool class.\\nWhen a tool execution request is received, the Tool Caller\
    \ first parses it to extract the tool\\nname and arguments. It then performs a rigorous validation check, ensuring the\
    \ provided argu-\\nments conform to the data types and structural requirements defined in the tool\\u2019s specification.\\\
    nOnce validated, the Tool Caller dispatches the arguments to the tool\\u2019s primary execution method,\\nsuch as run(),\
    \ as illustrated in Supplementary Figure 4. The resulting output is then returned\\nto the client through the TOOLUNIVERSE\\\
    u2019s communication protocols. If any step in this process\\nfails, from loading to validation or execution, the system\
    \ generates and returns a descriptive er-\\nror message. This feedback mechanism helps the client diagnose the issue and\
    \ revise the request\\naccordingly.\\n17\"\n  },\n  {\n    \"name\": \"Supplementary Figure 5: Example code demonstrating\
    \ how to register a local tool with Tool Manager and add it to\",\n    \"text\": \"\"\n  },\n  {\n    \"name\": \"TOOLUNIVERSE\"\
    ,\n    \"text\": \"3.3\\nTool Manager\\nTool Manager is designed to simplify the process of adding new tools to TOOLUNIVERSE.\
    \ Tool\\nManager simplifies the addition of new tools through two modes: local tools and remote tool\\nintegration. For\
    \ local tools, which require no special dependencies, only a JSON specification\\n(including name, descriptions, arguments,\
    \ and configurations) and a corresponding function are\\nneeded. The function executes the tool call arguments. For remote\
    \ tools, which may have special\\ndependencies or cannot be open-sourced, TOOLUNIVERSE offers a wrapper that links them\
    \ as\\nexternal tools via the MCP.\\nLocal Tool Registration. For local tool registration, to add a tool to TOOLUNIVERSE,\
    \ both a\\ntool configuration and a corresponding tool class are required. The tool configuration is a dictio-\\nnary\
    \ that specifies the tool according to the Tool Specification Schema of TOOLUNIVERSE and\\nincludes the necessary settings\
    \ for its execution. The tool class defines an initialization func-\\ntion that sets up the tool based on its specification,\
    \ as well as a run function that processes tool\\ncall arguments in accordance with the Interaction Protocol Schema of\
    \ TOOLUNIVERSE. Local\\ntool registration within the Tool Manager is facilitated through an easy-to-use decorator func-\\\
    ntion, register tool(Class name, tool config), which decorates the tool class as il-\\nlustrated in Supplementary Figure\
    \ 5. Here, Class name is the string name of the tool class, and\\n18\"\n  },\n  {\n    \"name\": \"Supplementary Figure\
    \ 6: Example code demonstrating how to register a remote tool with Tool Manager and add it\",\n    \"text\": \"to TOOLUNIVERSE.\\\
    ntool config is the configuration containing both the tool specification and required settings.\\nOnce registered, the\
    \ tool is automatically integrated into TOOLUNIVERSE without further manual\\nconfiguration. This registration process\
    \ allows users to incorporate custom tools into TOOLUNI-\\nVERSE. This enables coordination with other existing tools,\
    \ thereby empowering the creation of\\ncustomized AI scientists.\\nRemote Tool Registration. Remote Tool Registration\
    \ enables the integration of tools that are pri-\\nvate, require specialized configurations, or operate within restricted\
    \ environments, and therefore\\ncannot be made publicly available. Once registered remotely, these tools are added to\
    \ TOOLUNI-\\nVERSE and can be accessed and executed in the same manner as standard tools.\\nTo achieve this, the Tool\
    \ Manager includes an automatic MCP Auto Loader Tool that accepts\\nthe address of an MCP server and registers all of\
    \ its tools into the TOOLUNIVERSE\\u2019s tool list. After\\nthe MCP Auto Loader Tool has loaded the remote tools, they\
    \ are integrated into the TOOLUNI-\\nVERSE with the same functionality as other tools. For the remote side, TOOLUNIVERSE\
    \ supports\\ntwo methods for setting up a remote tool. The first is building standard tools that support MCP. To\\n19\\\
    n\\nfurther simplify the process and make remote tool registration identical to local registration, the\\nTool Manager\
    \ also provides a decorator function, register remote tool(Class name,\\ntool config, mcp config). In this function, the\
    \ Class name and tool config pa-\\nrameters are the same as those used in register tool(Class name, tool config),\\nwhile\
    \ mcp config defines the configuration for the MCP server, such as the host address and\\nport used for the service.\"\
    \n  },\n  {\n    \"name\": \"Supplementary Figure 7: This example demonstrates a composable tool, built with the Tool\
    \ Composer, that runs\",\n    \"text\": \"multiple literature search tools concurrently, followed by a summary agent that\
    \ synthesizes the results. The Tool\\nComposer enables the combination of multiple tools from TOOLUNIVERSE in diverse\
    \ ways, such as in parallel,\\nsequentially, or in loops, enabling multi-tool collaboration.\\n3.4\\nTool Composer\\nFor\
    \ complex tasks, users can create new composite tools by programmatically combining ex-\\nisting ones. Tool Composer enables\
    \ the integration of tools with heterogeneous back ends to\\nbuild end-to-end workflows. Leveraging the Tool Caller for\
    \ direct in-code execution, Tool Com-\\nposer generates a container function that exposes both the Tool Caller and TOOLUNIVERSE\
    \ as\\nin-line, executable primitives. The container function, implemented as compose(arguments,\\ntooluniverse, call\
    \ tool), serves as the execution backbone for Tool Composer. It con-\\ntains the logic for coordinating different types\
    \ of tools so they work together in a single workflow.\\nThe arguments parameter specifies the tool call arguments that\
    \ follow the interaction protocol\\nschema of TOOLUNIVERSE, the tooluniverse is an instance of TOOLUNIVERSE that pro-\\\
    nvides all available functions that TOOLUNIVERSE can support, and the call tool parameter\\nis a callable interface of\
    \ Tool Caller that abstracts the invocation of individual tools in TOOL-\\nUNIVERSE. By integrating these components,\
    \ the container function enables flexible multi-tool\\nexecution patterns, such as chaining outputs between tools, broadcasting\
    \ a single query across\\nmultiple tools, and constructing agentic loops that leverage tool feedback for adaptive, multi-step\\\
    n20\\n\\nexperimental analysis. It can chain the output of one tool into the input of the next, call multiple\\ntools\
    \ with a single query, and build agentic loops that use an agentic tool to generate function calls,\\nexecute tools, and\
    \ incorporate tool feedback for multi-step experimental analysis. As illustrated\\nin Supplementary Figure 7, a composed\
    \ tool can run several literature search tools concurrently\\nand then invoke a summarization agent to synthesize the\
    \ findings, demonstrating heterogeneous\\nworkflow construction in which each step is driven by tool execution.\\n3.5\\\
    nTool Optimizer\\nTool Optimizer is designed to refine a tool\\u2019s specifications, ensuring they are clear, accurate,\
    \ and\\neasily understood by models. Taking advantage of the workflow building of TOOLUNIVERSE us-\\ning Tool Composer,\
    \ we build an agentic tool description optimization tool, where the tool descrip-\\ntion is optimized by an iterative\
    \ multi-round process that combines automated test case generation,\\nreal tool execution analysis, and agentic-powered\
    \ feedback refinement. Through feedback-driven\\niterations, the system progressively improves both tool descriptions\
    \ and parameter specifications,\\neliminating redundancy between them while ensuring accuracy through empirical validation.\
    \ The\\noptimization process automatically terminates when quality thresholds are met or maximum itera-\\ntions are reached,\
    \ producing specifications that enhances tool usability for AI agents.\\nCore principles and tools. We develop the Tool\
    \ Optimizer that employs a multi-round iterative\\noptimization strategy to automatically enhance tool documentation quality.\
    \ The optimizer is built\\non three core principles: (1) test-driven optimization that validates descriptions against\
    \ actual tool\\nexecution results, (2) multi-dimensional quality assessment across six standardized criteria, and (3)\\\
    nfeedback-driven improvement that leverages insights from previous optimization rounds to guide\\nsubsequent iterations.\
    \ The optimizer implements a compositional architecture consisting of four\\nspecialized components working in concert.\
    \ The TestCaseGenerator creates diverse test scenarios\\nbased on tool configurations and adaptively generates targeted\
    \ test cases in later rounds using feed-\\nback from previous iterations. The DescriptionAnalyzer examines the alignment\
    \ between existing\\ndescriptions and actual tool behavior by analyzing test execution results, then generates optimized\\\
    ndescriptions that better reflect the tool\\u2019s true functionality. The ArgumentDescriptionOptimizer\\nspecifically\
    \ targets parameter descriptions to ensure consistency with real usage patterns while\\neliminating redundancy between\
    \ tool and parameter documentation. Finally, the DescriptionQual-\\nityEvaluator provides objective scoring on a 0-10\
    \ scale across six quality dimensions: clarity,\\naccuracy, completeness, conciseness, user-friendliness, and redundancy\
    \ avoidance.\\nOptimization process. The optimization process begins with initial test case generation followed\\nby tool\
    \ execution to gather baseline performance data. The system then enters an iterative opti-\\nmization loop where each\
    \ round generates enhanced test cases based on previous feedback, ana-\\nlyzes accumulated test results to propose improved\
    \ descriptions, optimizes both tool and parameter\\ndescriptions, and evaluates quality against predefined thresholds.\
    \ The process continues until ei-\\nther the satisfaction threshold is met (typically 8.0/10 for production use) or the\
    \ maximum iteration\\n21\\n\\nlimit is reached (default: 3 rounds). This adaptive approach ensures comprehensive coverage\
    \ while\\nmaintaining computational efficiency.\\n3.6\\nTool Discoverer\\nTool Discoverer automatically generates new\
    \ tools, including both specifications and executable\\ncode, from high-level natural language descriptions. Leveraging\
    \ the workflow composition ca-\\npabilities of TOOLUNIVERSE via Tool Composer, we construct an agentic multi-stage pipeline\\\
    nthat transforms a plain-text functional request into a production-ready tool with minimal human\\nintervention. The process\
    \ integrates tool discovery, structured specification generation, code im-\\nplementation, and iterative quality refinement,\
    \ ensuring that the final tool adheres to functional\\nrequirements and ecosystem conventions.\\nThrough iterative feedback\
    \ loops combining search, analysis, and code optimization, the\\nsystem progressively improves the generated tool until\
    \ it reaches predefined quality standards.\\nThe process terminates when target scores are achieved or iteration limits\
    \ are reached, producing\\ntools that are robust, maintainable, and ready for deployment.\\nCore principles and architecture.\
    \ The Tool Discoverer system is built around four core princi-\\nples: pattern-guided generation that reuses functional\
    \ patterns and conventions from existing tools\\nto ensure ecosystem consistency; structured specification synthesis that\
    \ transforms unstructured re-\\nquests into tool specifications; automated code generation and validation that produces\
    \ executable\\nimplementations with integrated testing; and iterative refinement that uses feedback from analysis\\nand\
    \ testing to drive targeted improvements.\\nThe system integrates four specialized components. The tool finder locates\
    \ existing tools\\nwith similar functionality using semantic similarity and keyword-based search, ensuring adher-\\nence\
    \ to established conventions. The SpecificationGenerator converts the natural language descrip-\\ntion into a structured\
    \ specification, including tool name, description, parameter definitions, return\\nschema, and category metadata. The\
    \ ImplementationGenerator produces code that follows best\\npractices, includes complete dependency handling, integrates\
    \ with the TOOLUNIVERSE registry,\\nand implements error handling for robust operation. The QualityEvaluator assesses\
    \ the generated\\ntool across functionality, reliability, maintainability, performance, and test coverage, scoring each\\\
    ndimension from 0\\u201310 and computing an overall weighted score.\\nGeneration process. The generation workflow begins\
    \ with the discovery stage, which accepts a\\ntool description as inputs. It applies multiple search strategies to retrieve\
    \ similar tools. Results are\\nvalidated, deduplicated, and compiled into a final set of references. Next, the specification\
    \ stage\\nuses a agentic tool to produce a complete tool configuration. This includes tool name, descrip-\\ntions, parameter\
    \ definitions with type annotations and descriptions, JSON-schema-based return\\ntype specification, and other meta data.\
    \ The output conforms to TOOLUNIVERSE schema require-\\nments and naming conventions, enabling immediate downstream integration.\
    \ The implementation\\nphase employs template-driven code generation to produce production-ready code, incorporating\\\
    n22\\n\\nrequired imports, type-hinted function signatures, error handling, integration hooks via the @reg-\\nister tool\
    \ decorator in TOOLUNIVERSE, and a deployment-ready module structure. Finally, the\\nsystem conducts a multiple quality\
    \ assessments, combining code analysis, dynamic testing with\\nauto-generated test cases, and performance profiling. Each\
    \ dimension is scored, with a target\\nminimum of 9/10 for production deployment. An iterative refinement loop applies\
    \ targeted im-\\nprovements until the threshold is met. Generated tools are packaged for immediate inclusion in\\nTOOLUNIVERSE,\
    \ producing a JSON configuration file with metadata, a source file with the com-\\nplete implementation, and dependency\
    \ specifications for reproducible installation.\\n4\\nBuilding AI scientists with TOOLUNIVERSE\\nA customized AI scientist\
    \ can be developed by integrating TOOLUNIVERSE with LLMs, reason-\\ning models, and AI agents. In this configuration,\
    \ the LLMs and reasoning models provide the core\\ncapabilities for reasoning and tool usage, while TOOLUNIVERSE serves\
    \ as the scientific environ-\\nment for interaction and experimentation. The development process typically involves three\
    \ steps:\\n1) installing TOOLUNIVERSE with a single command (pip install tooluniverse); 2)\\nconnecting TOOLUNIVERSE to\
    \ the chosen model so it can access the tools provided by TOOLU-\\nNIVERSE; and 3) instructing the model to use these\
    \ tools to address a given scientific problem.\\nOnce the setup is complete, the AI scientist operates as follows: given\
    \ a user instruction or\\ntask, it formulates a plan or hypothesis, employs the tool finder in TOOLUNIVERSE to identify\\\
    nrelevant tools, and iteratively applies these tools to gather information, conduct experiments, ver-\\nify hypotheses,\
    \ and request human feedback when necessary. For each required tool call, the AI\\nscientist generates arguments that\
    \ conform to the TOOLUNIVERSE protocol, after which TOOLU-\\nNIVERSE executes the tool and returns the results for further\
    \ reasoning.\\nThe models used to construct AI scientists can include LLMs, reasoning models, and AI\\nagents. LLMs may\
    \ be API-based, such as GPT, Claude, or Gemini, or open-weight models, such\\nas LLaMA, DeepSeek, or Qwen. Large reasoning\
    \ models enhance problem-solving capabilities\\nby applying built-in chains of thought to analyze the current step before\
    \ interacting with TOOL-\\nUNIVERSE. Agentic systems, such as Gemini CLI or Claude Code, integrate reasoning models\\\
    nwith agentic feedback loops to autonomously manage multi-step problem solving and tool use. In\\naddition to general-purpose\
    \ agents, TOOLUNIVERSE can be paired with specialized agents trained\\nfor specific scientific domains, enabling stronger\
    \ performance on targeted tasks. The following\\nsections present three examples of building AI scientists using LLMs,\
    \ agentic systems, and spe-\\ncialized agents.\\n4.1\\nBuilding an AI Scientist from an LLM or an LRM\\nFigure 2b illustrates\
    \ an example of building an AI scientist using an LLM, such as Claude, together\\nwith TOOLUNIVERSE. The process involves\
    \ only three steps.\\n1. Install TOOLUNIVERSE with a single command and install the Claude desktop app.\\n23\"\n  },\n\
