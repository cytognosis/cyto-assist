    nNumber\\nExamples of tools in TOOLUNIVERSE\\nML models\\n17\\nboltz2 docking,\\nrun TxAgent biomedical reasoning,\\nADMET\
    \ predict CYP interactions\\nAgents\\n56\\nHypothesisGenerator,\\nCodeQualityAnalyzer,\\nMedicalLiteratureReviewer\\nScientific\\\
    npackages\\n164\\nget biopython info,\\nget pyscreener info,\\nget pykalman info\\nAutomation\\n8\\ncommunicate with ros\
    \ robot,\\nmcp auto loader,\\nmcp client\\nWorkflows\\n11\\nbiomarker discovery workflow\\ntool optimizer\\ntool discoverer\\\
    nVisualization\\n3\\nvisualize protein structure 3d\\nvisualize molecule 2d\\nvisualize molecule 3d\\nFeedback and\\nsafety\\\
    n6\\nconsult human expert,\\nget expert response,\\nget expert status\\nLocal and remote\\ndatasets\\n391\\ndrugbank get\
    \ drug pathways and reactions by name,\\nHPA get comprehensive gene details by ensembl id,\\nFDA get active ingredient\
    \ info by drug name,\\nOpenTargets get associated targets by disease efoId\\n26\\n\\nSearch and\\nembeddings\\n4\\nembedding\
    \ tool finder,\\nembedding database search,\\nembedding database add\\nExperimentation\\n3\\nexperimental design scorer,\\\
    nprotocol optimizer,\\nextract clinical trial outcomes\"\n  },\n  {\n    \"name\": \"Supplementary Table 2: Number of\
    \ tools and example tools for each category in TOOLUNIVERSE. The table shows\",\n    \"text\": \"the number of tools as\
    \ of October 11, 2025. Note that TOOLUNIVERSE is continually expanded with new tools.\\n5\\nTools in TOOLUNIVERSE\\nTOOLUNIVERSE\
    \ is a scientific environment that contains over 600 tools covering essential scien-\\ntific research domains. TOOLUNIVERSE\
    \ integrates built-in tool categories that are easy for people\\nto reuse, covering machine learning models, AI agents,\
    \ software utilities, expert feedback systems,\\nrobotics, databases, embedding stores, data archives, and APIs, each\
    \ serving specific computa-\\ntional and analytical requirements.\\nAgentic tools. Agentic tools operate autonomously\
    \ to perform complex tasks using LLMs. Each\\nagent is configurable with custom prompts and tool specifications, supporting\
    \ multiple backend\\nmodels, including ChatGPT and Gemini. TOOLUNIVERSE includes agentic tools for literature\\nsummarization,\
    \ code analysis, hypothesis generation, experiment planning, and results analysis.\\nBy defining the prompts and tool\
    \ specifications in the configuration file, one can quickly build an\\nagentic tool.\\nScientific software package tools.\
    \ To support scientific coding, scientific package tools pro-\\nvide comprehensive information about Python-based scientific\
    \ computing libraries such as NumPy,\\nPandas, and SciPy. These tools offer installation instructions, usage examples,\
    \ and documentation\\nlinks, implementing dual-source data retrieval from PyPI APIs with local backup information.\\nDatabase\
    \ tools. Database tools manage structured scientific resources such as DrugBank vo-\\ncabulary datasets, clinical trial\
    \ records, and molecular databases. They support integrations with\\ntabular, hierarchical, XML-based, and graph-structured\
    \ data. These tools provide capabilities for\\ntext-based search, field-level filtering, configurable result limits, and\
    \ metadata return schemas.\\nBuilt-in search, filtering, and indexing features can be reused when incorporating new databases.\\\
    nAPI integration tools. API integration tools enable communication with external scientific data\\nsources using standard\
    \ protocols such as RESTful APIs or GraphQL. Through these tools, users\\ncan access resources like FDA drug databases,\
    \ OpenTargets disease\\u2013target associations, PubChem\\ncompound information, and many other databases, all with robust\
    \ error handling and response\\nvalidation. New tools can be incorporated by updating the API server URL, provided the\
    \ common\\nprotocol is maintained.\\nExpert feedback tools. Expert feedback tools integrate human expertise directly into\
    \ the environ-\\n27\\n\\nment, allowing AI scientists to request human suggestions or approval whenever necessary. This\\\
    ntool includes a server that connects the system with human experts, along with a user interface\\nthrough which experts\
    \ can provide responses. When a user calls the expert feedback tool, the\\nrequest is redirected by the tool caller in\
    \ TOOLUNIVERSE to a server, which forwards it to the\\nhuman expert interface. Human experts can receive the request and\
    \ provide their own insights and\\njudgments. Their feedback is then sent back through the server as a tool response to\
    \ the user. This\\napproach enables consultation with human experts for complex scientific decisions and interpreta-\\\
    ntions, effectively combining automated analysis with expert validation.\\nMachine learning tools. Machine learning tools\
    \ apply predictive and generative models to sci-\\nentific use cases, such as disease\\u2013target scoring [40], disease-state\
    \ prediction, gene-gene interac-\\ntion [41, 42], gene dependency analysis [43], ADMET prediction [25], binding affinity\
    \ predic-\\ntion [24], and beyond. Since running environments for machine learning models often require\\nspecialized\
    \ setups and hardware (e.g., GPUs), which can be difficult to deploy, TOOLUNIVERSE\\nuses a remote registration scheme.\
    \ This approach allows models to run on private servers while\\nstill being exposed as tools within TOOLUNIVERSE. New\
    \ machine learning models can be quickly\\nintegrated into TOOLUNIVERSE through remote tool registration.\\nEmbedding\
    \ store tools. Embedding store tools manage vectorized representations of scientific\\ndata. Scientific data is first\
    \ transformed into embeddings using embedding models and then stored\\nin a database. TOOLUNIVERSE employs FAISS to enable\
    \ efficient semantic search, similarity\\nmatching, and data retrieval over these embedding databases.\\n6\\nEvaluation\
    \ of Tools\\nTo ensure the correctness and reliability of tools before their inclusion in TOOLUNIVERSE, we\\nimplemented\
    \ a multi-step evaluation process. This evaluation was designed both to validate tool\\nfunctionality and to ensure scientific\
    \ utility. The evaluation steps are as follows:\\n\\u2022 Input-output sampling. For each tool, we generated diverse sample\
    \ inputs and recorded\\ncorresponding outputs. These samples were constructed to cover typical use cases as well as\\\
    nedge conditions, ensuring broad coverage of tool functionality.\\n\\u2022 Human-in-the-loop review. Outputs produced\
    \ by the tools were subjected to systematic hu-\\nman review. Scientific experts assessed correctness, interpretability,\
    \ and consistency with ex-\\npected domain knowledge. This human evaluation provided an additional safeguard against\\\
    nerroneous or misleading outputs.\\n\\u2022 Automated optimizers and checkers. Complementing human evaluation, we employed\\\
    nautomated optimizer and checker tools. These systems iteratively tested tool specifications\\nagainst the sampled inputs,\
    \ refining descriptions and ensuring consistency between declared\\nfunctionality and observed behavior. This process\
    \ emphasized correctness and usability,\\nrather than accuracy alone, to promote robust integration within the ecosystem.\\\
    n28\\n\\n\\u2022 Regular maintenance and bug reporting. For continued reliability of tools within TOOL-\\nUNIVERSE, we\
    \ perform regular maintenance and monitoring. A structured bug reporting\\nsystem allows issues to be identified by users\
    \ and promptly addressed by the TOOLUNI-\\nVERSE team. These practices provide ongoing quality assurance and safeguard\
    \ the long-term\\nusability of the ecosystem.\\nBeyond these processes, TOOLUNIVERSE prioritizes tools from trusted sources.\
    \ Many in-\\ncluded tools have been published, peer-reviewed, and verified through prior use by established\\nscientific\
    \ communities, such as the NIH, FDA, and other regulatory or research agencies. By re-\\nlying on previously validated\
    \ resources, we reduce the risk of introducing spurious or unverified\\nfunctionality into the ecosystem. These evaluation\
    \ measures ensure that tools incorporated into\\nTOOLUNIVERSE meet standards of correctness, reproducibility, and scientific\
    \ reliability, provid-\\ning a foundation for dependable AI-assisted discovery.\\n7\\nFurther Details on the Case Study\
    \ of TOOLUNIVERSE\\nWe provide details for the hypercholesterolemia use case shown in Figure 2c, where an AI scien-\\\
    ntist powered by LLMs connected to TOOLUNIVERSE finds and optimizes statin compounds for\\nhypercholesterolemia. Through\
    \ this case study, we show how TOOLUNIVERSE can be used for\\nhighly interdisciplinary and complex scientific methods\
    \ like drug development. We demonstrate\\nthat a TOOLUNIVERSE-enabled AI scientist is able to recover existing research\
    \ on statins, lending\\ncredibility to the research enabled by TOOLUNIVERSE.\\nThe AI scientist is constructed by providing\
    \ all 600+ tools in TOOLUNIVERSE to Gemini\\nCLI (powered by the Gemini-2.5-Pro model). With this current AI scientist,\
    \ we must prompt\\nthe model with high-level prompts to achieve each stage of the case study. We envision that future\\\
    nTOOLUNIVERSE-enabled AI scientists will be knowledgeable enough about TOOLUNIVERSE and\\nthe scientific discovery process\
    \ to require only a single high-level prompt and occasional expert\\nfeedback to achieve the entire case study.\\nIn our\
    \ case study, the AI scientist is first prompted to conduct target identification for hyper-\\ncholesterolemia. The AI\
    \ scientist first calls OpenTargets get disease id description\\nby name (API Tool) and OpenTargets get associated targets\
    \ by disease efo\\nId (API Tool), which allow it to identify the top targets associated with the disease. Next, it calls\\\
    nOpenTargets get target tractability by ensemblID (API Tool) and EuropePMC\\nsearch articles (API Tool) on each protein\
    \ target. These tools provide diverse information\\nabout each protein\\u2019s potential as a target, including the existence\
    \ of approved drugs for the target,\\nthe presence of a high-quality binding pocket, and associated literature. After\
    \ retrieving this infor-\\nmation for each target, the AI scientist calls consult human expert (Expert Feedback Tool)\\\
    nto perform scientist-guided selection of the final target based on the existing literature. In this way,\\nthe AI scientist\
    \ identifies eleven protein targets involved in hypercholesterolemia, conducts exten-\\nsive literature reviews on each,\
    \ and selects HMG-CoA reductase as the target to take forward due\\n29\\n\\nto its history of successful targeting with\
    \ statins. Next, the AI scientist uses HPA search genes\\nby query (API Tool), HPA get rna expression in specific tissues\
    \ (API Tool),\\nand HPA get comprehensive gene details by ensembl id (API Tool) to query the\\nHuman Protein Atlas and\
    \ characterize the expression profile of HMG-CoA reductase. Using the\\natlas data, the AI scientist concluded that there\
    \ is high expression in the liver (the tissue of interest),\\nbut also in locations such as the gastrointestinal tract\
    \ and brain. It reasoned that this could explain\\ncertain off-target effects associated with targeting HMG-CoA reductase,\
    \ such as neurological side\\neffects. Thus, minimizing off-target binding and side effects is crucial to consider in\
    \ subsequent\\nscreening steps.\\nThe AI scientist now conducts an in silico screen and molecular optimization process.\
    \ It first\\ncalls drugbank get drug name and description by target name (Database Tool)\\nand drugbank get drug name\
    \ and description by indication (Database Tool) to\\nretrieve current statin treatments from the DrugBank database, as\
    \ statins target HMG-CoA reduc-\\ntase. The AI scientist then profiles each statin with drugbank get pharmacology by drug\\\
    nname or drugbank id (Database Tool). This result in the selection of lovastatin as the statin\\nto optimize. Lovastatin\
    \ is a widely used medication but has off-target binding in non-liver tissues\\ncompared to hydrophilic statins. To optimize\
    \ lovastatin, the AI scientist uses ChEMBL search\\nsimilar molecules (API Tool) to retrieve molecular candidates from\
    \ the ChEMBL database\\nthat are structural analogs to lovastatin (Tanimoto similarity > 0.80).\\nThen, two TOOLUNI-\\\
    nVERSE ML Model Tools (ADMETAI predict admet properties and boltz2 docking)\\nare used to retrieve key pharmaceutical\
    \ properties for each of the 32 structural analogs, including\\nADMET properties and binding affinity to HMG-CoA reductase.\
    \ Of note, though Boltz-2 has\\nstrong performance on binding likelihood and affinity predictions, there is variability\
    \ in the model\\noutput given the same input, so Boltz-2 was run four times for each of the structural analog can-\\ndidates,\
    \ and the mean and standard deviation of its outputs were calculated. Predictions from the\\nML Model Tools for select\
    \ properties are shown in Supplementary Table 3. We focus particularly\\non binding likelihood, binding affinity, and\
    \ probability of blood-brain-barrier (BBB) penetrance\\nbecause the former two assess the molecule\\u2019s ability to\
