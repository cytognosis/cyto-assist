    \ known as neurofibrillary tangles (NFTs). Despite the broad and constitutive expression\\nof tau across the brain, NFTs\
    \ form in a remarkably selective and stereotyped pattern, affecting distinct neuronal\\npopulations and brain regions\
    \ in a predictable sequence. This phenomenon, known as selective neuronal vulnerability,\\nremains one of the most enigmatic\
    \ features of diseases with NFT pathology. To investigate the underlying molecular\\nmechanisms of neuronal vulnerability,\
    \ Foiani et al. combined laser-capture microdissection with ultrasensitive mass\\nspectrometry to profile protein abundance\
    \ in affected neurons (i.e. neurons positive for phosphorylated tau accumu-\\nlation detected by antibody AT8) alongside\
    \ neighboring unaffected neurons in the same brain. Prior to providing\\nthis data to Kosmos, quality control was performed\
    \ and samples were ordered on a pseudotime axis closely reflecting\\nintracellular tau accumulation (Foiani et al. in\
    \ preparation).\\nThe primary research objective given to Kosmos was to propose mechanisms contributing to tau accumulation\
    \ and\\na temporal sequence of these events (Methods and Figure 7a). Kosmos initially performed a differential abundance\\\
    nanalysis by comparing minipools in the earliest 33% of the pseudotime to those in the latest 33% (Figure 7b). The\\ndown-regulated\
