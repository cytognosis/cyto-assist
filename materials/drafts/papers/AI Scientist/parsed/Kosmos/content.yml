    u221241, R2 = 0.9983), with consistent directionality across\\nall overlapping proteins (Figure 5f).\\nLastly, Kosmos\
    \ proposed a potential post-transcriptional mechanism for SOD2 regulation (Figure 5c), identifying\\nrs4555948 within\
