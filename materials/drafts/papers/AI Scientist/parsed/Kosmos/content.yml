    n17\\n\\nfrom the entorhinal cortex [39]. This pattern of early vulnerability is consistently observed in both human patients\
    \ and\\ncorresponding mouse models [40, 41], providing a powerful system for investigation. Bourdenx et al. (in preparation)\\\
    nhypothesized that investigating the specific mechanisms that make entorhinal neurons vulnerable during aging will\\nprovide\
    \ critical insights into the initial stages of Alzheimer\\u2019s disease (AD).\\nKosmos was directed to identify mechanisms\
    \ of vulnerability in aging by comparing vulnerable Layer 2/3 entorhinal\\ncortex (ENT) neurons against resilient Layer\
    \ 2/3 isocortex cortex (CTX) neurons, given single-nuclei RNA-sequencing\\ndata derived from brains of mice aged 6\\u201328\
    \ months (Figure 8a). Kosmos first conducted a high-level exploration\\nof the transcriptomic dataset. Differential expression\
    \ analysis in aged mice revealed that Atp10a expression was\\nsignificantly higher in ENT compared to CTX neurons (Figure\
    \ 8b). Kosmos then conducted a literature review,\\nidentifying Atp10a as a phospholipid flippase implicated in the survival\
    \ of glutamatergic neurons and genetically\\nlinked to neurodegenerative diseases (OpenTargets).\\nFurther analysis by\
    \ Kosmos showed that Atp10a expression in ENT was downregulated with age (Figure 8c). Kosmos\\nexplored a loss-of-function\
    \ mechanism, investigating whether the age-related downregulation of Atp10a in ENT was\\ncompensated by other P4-ATPase\
    \ flippases. This hypothesis was also refuted, as the analysis revealed a concurrent\\ndownregulation of nine other flippase\
    \ family members (Figure 8d). This widespread loss of flippase activity led Kosmos\\nto propose a novel mechanism of vulnerability:\
    \ the reduction in flippase activity resulting in increased exposure of\\nphosphatidylserine (PS) on the outer neuronal\
    \ membrane, which is an established \\u201ceat-me\\u201d signal that triggers\\nmicroglial phagocytosis [42]. Consistent\
    \ with this model, Kosmos performed subsequent analysis that confirmed a\\nconcurrent significant downregulation of flippase\
    \ genes in neurons and the upregulation of PS-sensing phagocytic\\npathway genes in microglia, providing a plausible mechanism\
    \ for the targeted removal of vulnerable neurons in the\\naging entorhinal cortex (Figure 8e).\\nThese findings were validated\
    \ through two independent methods. First, we tested the validity of the finding in an\\nindependent dataset generated\
    \ by another research group [43]. Then, we assessed computational replicability by\\nprompting our data analyst agent\
    \ to confirm the claim made by Kosmos (see Methods) over multiple runs. Both\\napproaches confirmed the observation of\
    \ an age-dependent collapse of the flippase machinery in the entorhinal cortex\\njointly with an upregulation of the pro-phagocytosis\
    \ axis in microglia (Figure 8f). Of note, the validation dataset was\\nsingle-cell RNA sequencing (as opposed to single-nuclei\
    \ for the discovery dataset), likely contributing to the observed\\ndifference in effect size, with the validation dataset\
    \ showing more modest changes.\\nTo evaluate the clinical relevance of this discovery, we analyzed an external single-cell\
    \ RNA sequencing dataset from\\nhuman AD cases [44], where a comparable trend was observed (Figure 8fg). We observed a\
    \ decrease in flippase\\nexpression in supragranular neurons from the entorhinal cortex at Braak stage II compared to\
    \ a cortical-free stage\\n(Braak 0), indicating that such decrease coincides with the appearance of tau pathology in that\
    \ region. Notably, this\\ndecrease was not observed in a later affected region (i.e. superior frontal gyrus, SFG). In\
    \ addition, microglia from\\nthe EC and to a lesser extent the SFG demonstrated concurrent upregulation of phagocytosis\
    \ markers, confirming\\nthe coordinated modulation of this pro-phagocytosis axis.\\nWhile the exposure of PS as an \\\
    u201ceat-me\\u201d signal is a recognized mechanism for cellular and synaptic clearance in\\nthe brain [42, 45], this\
    \ discovery establishes a novel mechanism for ENT neuron vulnerability in aging and AD.\\nFlippases are essential for\
    \ the maintenance of membrane asymmetry, signaling, or vesicular trafficking [46].\\nOf\\ninterest, A\\u03b2 oligomers\
    \ have been shown to induce PS exposure and hyperactivity [45]. The observed age- and tau-\\nrelated downregulation of\
    \ flippases in ENT neurons could further amplify this phenomenon and contribute to the\\nearly loss of entorhinal to hippocampal\
    \ connectivity in AD observed in preclinical patients [47] and indicate novel\\npotential areas for intervention. This\
    \ discovery demonstrates that, through iterative exploration, Kosmos can identify\\ndisease-relevant overlooked mechanisms\
    \ in existing datasets.\\n3\"\n  },\n  {\n    \"name\": \"Discussion\",\n    \"text\": \"To our knowledge, Kosmos is the\
    \ first example of an AI Scientist that can carry out months of work in a single run,\\ncombining closed-loop literature\
    \ search, data analysis, and world model updates to autonomously make discoveries\\nin multiple fields. Kosmos does this\
    \ by using structured world models to manage context between agents, allowing\\nit to deploy hundreds of agent rollouts,\
    \ write tens of thousands of lines of code, and read thousands of papers to\\ncomplete a single research objective. Kosmos\
    \ performs large-scale, unbiased exploration of high-dimensional datasets\\nto successfully reproduce known work (Figures\
    \ 2-4), refine and synthesize existing knowledge (Figures 5-7), and make\\n18\\n\\nnovel discoveries (Figure 8). Because\
    \ Kosmos uses a dynamically updated world model to deploy two general-purpose\\nscientific agents, Kosmos is able to operate\
    \ in any domain. While we have demonstrated its utility in metabolomics\\n(Figure 2), materials science (Figure 3), connectomics\
    \ (Figure 4), statistical genetics (Figures 5, 6), proteomics\\n(Figure 7), and transcriptomics (Figure 8), we anticipate\
    \ that Kosmos can be applied to diverse data-rich fields.\\nFinally, each statement in a Kosmos report is supported by\
    \ a piece of code or primary literature citation. This allows\\nthe entire discovery process to be transparent and facilitates\
    \ independent verification or replication of any finding, as\\npresented for the discoveries here.\\n3.1\\nScientist-in-the-loop\\\
    nKosmos is designed not to replace human scientists, but to augment and accelerate their work. A Kosmos-integrated\\npipeline\
    \ begins with human-generated and -curated high-quality dataset and ends with human interpretation and\\ncritical evaluation\
    \ of the results. Thus, the quality and format of input datasets have a significant impact on the\\noutput discoveries.\
    \ For instance, preliminary runs for discoveries in Figures 2, 5 and 6 yielded different focuses and\"\n  },\n  {\n  \
    \  \"name\": \"results depending on the type of input data pre-processing (data not shown). Throughout our testing, collaborators\"\
    ,\n    \"text\": \"found Kosmos provided the best scientific insight when given clearly labeled, well-formatted, and properly\
    \ normalized\\ndata.\\nFollowing a Kosmos run, the scientist\\u2019s role shifts to evaluation and interpretation of results.\
    \ This human oversight\\nis crucial, as independent evaluators noted that Kosmos tends to make excessively strong claims\
    \ and can sometimes\\nveer in unexpected trajectories (Figure 1c). Together, scientists and Kosmos form a rapid feedback\
    \ loop where initial\\nhuman findings feed AI-generated hypotheses which are then refined to guide subsequent searches,\
    \ ensuring Kosmos\\u2019\\nanalytical power remains directed toward accurate and meaningful scientific goals.\\n3.2\\\
    nLimitations and Future Work\\nKosmos has several limitations that highlight opportunities for future development. First,\
    \ although 85% of statements\\nderived from data analyses were accurate, our evaluations do not capture if the analyses\
    \ Kosmos chose to execute\\nwere the ones most likely to yield novel or interesting scientific insights. Kosmos has a\
    \ tendency to invent unorthodox\\nquantitative metrics in its analyses that, while often statistically sound, can be conceptually\
    \ obscure and difficult\\nto interpret. Similarly, Kosmos was found to be only 57% accurate in statements that required\
    \ interpretation of\"\n  },\n  {\n    \"name\": \"results, likely due to its propensity to conflate statistically significant\
    \ results with scientifically valuable ones. Given\",\n    \"text\": \"these limitations, the central value proposition\
    \ is therefore not that Kosmos is always correct, but that its extensive,\\nunbiased exploration can reliably uncover\
    \ true and interesting phenomena. We anticipate that training Kosmos may\\nbetter align these elements of \\u201cscientific\
    \ taste\\u201d with those of expert scientists and subsequently increase the number\\nof valuable insights Kosmos generates\
    \ in each run.\\nSecond, identifying valuable discoveries Kosmos made is a time-intensive process that relies on human\
    \ scientists\\nwith significant domain expertise. An average Kosmos report contains 3-4 discovery narratives, and each\
    \ discovery\\nnarrative contains 25 claims based on 8-9 agent trajectories. While the provenance of each claim is traceable,\
    \ there\\nexists no automated method to reliably evaluate if a claim is accurate, novel, and significant. Thus, although\
    \ Kosmos\\nperforms data-driven discovery at scale, identifying meaningful discoveries at scale remains a challenge.\\\
    nFinally, the current implementation of Kosmos faces several technical limitations. Kosmos can only manage datasets\\\
    nup to approximately 5GB, and does not currently excel in the analysis of raw data, such as images or raw sequencing\\\
    nfiles. Kosmos cannot autonomously access publicly available data from external sources to use as a reference or in\\\
    northogonal validations. Furthermore, as Kosmos is stochastic, multiple independent runs may not consistently con-\\nverge\
    \ on the same discoveries. The system\\u2019s research directions are currently sensitive to the phrasing of the research\\\
    nobjectives. Finally, the current implementation does not allow for scientists to interact with Kosmos in intermediate\\\
    ncycles, limiting opportunities for scientists to nudge Kosmos down fruitful research avenues. We anticipate addressing\\\
    nthese challenges in future work.\\n19\\n\\n3.3\"\n  },\n  {\n    \"name\": \"Conclusion\",\n    \"text\": \"Taken together,\
    \ our results demonstrate an AI scientist that can autonomously conduct extended research investiga-\\ntions that produce\
    \ discoveries validated by domain experts across multiple scientific fields. The world model enables\\ncoordination of\
    \ parallel agent trajectories at scales that would require months of human effort, while maintaining\\ncomplete traceability\
    \ of all scientific claims. With further training, Kosmos has the potential to significantly scale\\ndata-driven discovery.\\\
    n4\"\n  },\n  {\n    \"name\": \"Methods\",\n    \"text\": \"4.1\\nFigure 1 Methods\\n4.1.1\\nExpert evaluations of Kosmos\
    \ accuracy\\nExpert scientists were asked to evaluate a sample of Kosmos statements to determine if it is accurate and/or\
    \ repro-\\nducible. Initially, these experts were asked to mark the statements as \\\"SUPPORTED\\\", \\\"REFUTED\\\",\
    \ or \\\"UNSURE\\\".\\nThe instructions for evaluation are shown in Supplementary Information 3. Upon submission, all\
    \ answers that were\\nmarked as \\\"UNSURE\\\" were reviewed to determine if the expert was unable to perform the analysis\
    \ or if the state-\\nment was malformed or insufficient. In the latter case, the statement was clarified or additional\
    \ relevant information\\nwas provided, and the evaluator was asked to determine definitively if the statement was \\\"\
    SUPPORTED\\\" or \\\"RE-\\nFUTED\\\". Examples of both \\\"SUPPORTED\\\" and \\\"REFUTED\\\" evaluations for Data Analysis,\
    \ Literature Review, and\\nInterpretation statements are provided in Supplementary Information 4.\\n4.2\\nFigure 2 Methods\\\
    n4.2.1\\nin vivo experiment\\nAll experiments used adult KOR-Cre mice (9\\u201310 weeks old) maintained on a 12-hour light/dark\
    \ cycle with ad libitum\\naccess to food and water. All procedures were approved by the Washington University Animal Studies\
    \ Committee,\\nand experimenters were blinded to the treatment group.\\nFor chemogenetic activation, mice received bilateral\
    \ stereotactic injections of AAV8-hSyn-DIO-hM3Dq-mCherry (or\\ncontrol AAV8-hSyn-DIO-mCherry) into the medial preoptic\
    \ area (POA). Viral expression was verified at least three\\nweeks later by a test dose of clozapine-N-oxide (CNO; 0.5\
    \ mg/kg, intraperitoneal). Animals failing to show a decrease\\nin core body temperature of at least 3\\u00b0C were excluded.\\\
    nSeventeen validated mice were then assigned to one of three experimental conditions. Control mice received the\\ncontrol\
    \ virus and were housed at room temperature (\\u223c22\\u00b0C). Hypothermic-POAKOR+ mice received the DREADD\\nvirus\
    \ and were housed at room temperature (\\u223c22\\u00b0C) to allow the development of a torpor-like hypothermic state.\\\
    nNormothermic-POAKOR+ mice also received the DREADD virus but were housed at 36\\u00b0C to prevent cooling and\\nmaintain\
    \ normothermia.\\nThirty minutes after CNO administration, animals were euthanized by live decapitation. Whole brains\
    \ were rapidly\\nremoved, flash-frozen in liquid nitrogen, and stored at \\u221280\\u00b0C. Polar and lipid metabolites\
    \ were extracted as described\\npreviously [9]: tissue was homogenized in a 2:2:1 acetonitrile:methanol:water mixture\
    \ (40 \\u00b5 L per mg tissue) using\\na bead mill, incubated at \\u221220\\u00b0C for 1 hour, and centrifuged at 10,000\
    \ rpm for 10 minutes at 4\\u00b0C. The supernatant\\nwas transferred to autosampler vials and stored at \\u221280\\u00b0C\
    \ until analysis.\\n4.2.2\\nMetabolomic profiling and data preprocessing\\nMetabolomic profiling was performed on a Thermo\
    \ Scientific Vanquish Flex UHPLC system coupled to a Thermo\\nScientific Orbitrap ID-X mass spectrometer. Polar metabolites\
    \ were separated on a HILICON iHILIC-(P) Classic\\nHILIC column, and lipids were separated on an Acquity UPLC HSS T3 column\
    \ using the solvent gradients described\\nin the original study. Data were acquired in both positive and negative ion\
    \ modes.\\n20\\n\\nRaw spectra were processed in XCMS, Compound Discoverer (v3.3), and Skyline for peak detection, retention-time\\\
    nalignment, and compound identification. The resulting normalized peak-intensity matrix served as the input dataset\\\
    nfor Kosmos analyses. Statistical comparisons between hypothermia and control groups were performed using unpaired\\nt-tests\
    \ (Figure 2B).\\nThe results of Kosmos run were validated by comparing to the preprinted statistical results.\\n4.3\\\
    nFigure 3 Methods\\nTo investigate how the ambient environment during the synthesis of FAPbI3 perovskite thin films influences\
    \ solar\\ncell performance, two custom-built environmental enclosures were used to enable independent control of ambient\\\
    nconditions during the spin-coating and thermal annealing steps.\\nIn the spin-coating chamber, we independently\\nregulated\
    \ temperature, absolute humidity (AH), and the dimethylformamide (DMF) solvent partial pressure (SPP)\\nvia CDA, a humidifier/water\
    \ boiler, and a DMF bubbler, with resistive heating and local sensors for feedback. In\\nthe annealing chamber, AH was\
    \ actively controlled; temperature was set by the hotplate (no separate chamber\\ntemperature control), although it was\
    \ measured and included in our regressor.\\nPerovskite films for n\\u2013i\\u2013p solar\\ncell devices were fabricated\
    \ using a one-step antisolvent spin-coating method followed by thermal annealing. The\\nresulting devices were characterized\
    \ for short-circuit current density (JSC), open-circuit voltage (VOC), fill factor\\n(FF), and power conversion efficiency\
    \ (PCE). To efficiently explore the multidimensional process space, we employed\\nBayesian Optimization (BO) in iterative\
    \ learning cycles. Experimental results from each cycle informed the algorithm\\u2019s\\nsuggestion for the next set of\
    \ synthesis conditions. Full experimental details can be found in Liu et al., 2025 [14].\\nThe results of Kosmos run were\
    \ validated by comparing to the preprinted figures and reported trends.\\n4.4\\nFigure 4 Methods\\nAll data analyzed in\
    \ this study originate from a preprint [15] that integrated eight publicly available connectome\\nreconstructions, providing\
    \ single-neuron\\u2013resolution synaptic connectivity across five species (C. elegans, Drosophila\\nlarva, adult Drosophila,\
    \ zebrafish, mouse, and human). The datasets encompass the complete C. elegans connec-\\ntome [48, 49], and adult Drosophila\
    \ central nervous system [50, 51] and ventral nerve cord [52] reconstructions, the\\nlarval zebrafish brainstem [53],\
    \ a millimeter-scale volume of mouse visual cortex [54], and a human temporal cortex\\nsample [55]. The preprint harmonized\
    \ these datasets by standardizing neuron and synapse formats and rescaling spa-\\ntial coordinates to account for imaging\
    \ resolution and section thickness, allowing cross-species comparison of neuron\\nmorphology and connectivity. From this\
    \ preprocessed data, for which full details are provided in the preprint [15],\\nwe downloaded morphological details of\
    \ fully reconstructed neurons and all synapses associated with them. Specifi-\\ncally, we utilized neuronal size L (total\
    \ path length of each neuron\\u2019s reconstructed skeleton), synapse count S (total\\nnumber of pre- and post-synaptic\
    \ contacts per neuron), and local synapse density \\u03c1 (estimated using a random-walk\\napproach that samples local\
    \ synapse-per-micron density around each synapse), and neuronal degree k (number of\\nunique partner neurons per cell).\\\
    nThe results of Kosmos runs were validated by comparing to the preprinted figures and reported fit parameters.\\n4.5\\\
    nFigure 5 Methods\\n4.5.1\\nData description and preprocessing\\nPublicly available datasets were utilized. Genetic variants\
    \ that influence protein levels (known as cis-protein quantita-\\ntive trait loci or cis-pQTLs) were used as the exposure\
    \ data. GWAS summary statistics from plasma proteomics [31].\\nThese genetic variants were located within 500 kilobases\
    \ of the protein-coding gene, a region defined as \\\"cis\\\" in this\\ncontext. To ensure the genetic instruments were\
    \ independent from each other, linkage disequilibrium (LD) clumping\\nwas performed to retain only variants with minimal\
    \ correlation (r2 < 0.01). Independent variants were retained after\\nLD-based clumping (r2 < 0.01). Myocardial T1 relaxation\
    \ time GWAS summary statistics from Nauffal et al. was\\nused as the outcome data [25].\\n21\\n\\n4.5.2\\nDiscovery validation\\\
    nTo validate Kosmos results, Mendelian Randomization with the inverse-variance weighted (IVW) method was con-\\nducted\
    \ independently on the same dataset. The MR workflow was implemented using the MendelianRandomization\\nR package [56].\
    \ The number of SNPs used as instruments was recorded for each protein-outcome pair. Results were\\nconsidered statistically\
    \ significant if they achieved a p-value below the Bonferroni-corrected threshold (0.05 divided\\nby the number of tests\
    \ performed within each analysis type).\\n4.6\\nFigure 6 Methods\\n4.6.1\\nData description and preprocessing\\nPublicly\
    \ available datasets were utilized. The 10x multiome data from the Wang et al study [28] was accessed via GEO\\n(accession\
    \ IDs: GSE124742 and GSE164875). The T2D GWAS summary statistics were accessed on the DIAGRAM\\nconsortium website (https://diagram-consortium.org/downloads.html).\
    \ The snRNAseq and snATAC-seq data from\\nall of the available cell clusters were processed as previously described [28].\
    \ Cell clusters with less than 1000 cells\\nwere excluded from the analysis. The R package motifbreakR [31] was used to\
    \ predict transcription factor binding\\nsites (TFBS) that overlap with the fine-mapped GWAS variants. The ReMap lookup\
    \ function was used when running\\nmotifbreakR to include validated predicted TFBS with ChIP-seq validation. The ATAC-seq\
    \ and the snRNAseq counts\\nwere converted into pseudobulk counts using harmony [28]. The ATAC peak\\ntranscript level\
    \ associations were\\nconducted using a linear regression model which adjusted for sex, BMI, and disease status (since\
    \ we were interested\\nin a disease-agnostic association between ATAC peaks and transcript levels). eQTL and pQTL summary\
    \ stats were\\nprovided from pancreas-specific GTEx data [29] and blood-specific proteome data [30], respectively. Lastly,\
    \ we queried\\nGene Ontology for annotations for all of the putative target genes and the transcription factors that were\
    \ predicted\\nto have their binding sites disrupted by the GWAS variants. The resulting table contained 68K SNP-TF pairs\
    \ from\\n7,925 unique GWAS SNPs. A data dictionary that explained the significance of each column was also generated.\\\
    nThe table and the data dictionary were both used as input for Kosmos.\\n4.6.2\\nDiscovery validation\\nThe IGV plot with\
    \ the enhancer-to-gene (E2G) tracks were downloaded on 10/24/2025 here:\\nhttps://e2g.\\nstanford.edu/variant/6_7231610_G_A\\\
    nThe TWAS reflection plot was generated using Finch: https://platform.edisonscientific.com/trajectories/\\naa8f203a-a27c-454e-b4be-25c1ed67c965\\\
    n4.7\\nFigure 7 Methods\\n4.7.1\\nData collection and preprocessing\\nFormalin-fixed paraffin embedded (FFPE) sections\
    \ (8 \\u00b5m) were collected from 10 cases on slides compatible with\\nlaser-capture microdissection. Sections were stained\
    \ for phosphorylated Tau (Ser202/Thr205 - AT8) and minipools of\\n20 positive and neighboring negative cells were collected\
    \ and submitted to ultrasensitive mass spectrometry. Following\\ndata collection, standard quality control and imputation\
    \ were used. Minipools were ordered on a pseudotime axis\\nusing the palantir package [57]. The complete method and dataset\
    \ will be reported in an upcoming publication\\n(Foiani, et al., in preparation).\\n4.7.2\\nInitial discovery\\nThe dataset\
    \ and prompt (Supplementary Table 1) were provided to Kosmos, which was run for 35 iterations. Discovery\\nreports were\
    \ generated after iterations 8 and 35. Upon review, the discoveries from iteration 8 presented a more\\ncohesive narrative.\\\
    nTo refine the final output, we manually-curated these discoveries by writing new titles and\\nsummaries based on the\
    \ iteration 8 report. A final, consolidated discovery report was then generated using these\\ncurated descriptions and\
    \ the complete set of trajectories from all 35 iterations.\\n22\\n\\n4.7.3\\nECM composite score\\nPathway enrichment\
    \ analysis of down-regulated proteins identified a significant overrepresentation of proteins involved\\nin pathways such\
    \ as extracellular matrix (ECM). Protein-Protein-Interaction network analysis identified fibronectin\\n(FN1) as a high\
    \ centrality protein linking ECM to other affected pathways. The top ten ECM proteins with highest\\ncorrelation with\
    \ FN1 (LAMA2, HSPG2, NID2, NID1, LAMA4, LAMC1, COL4A2, ITGA7, LAMB2, COL6A3) were\\nconsidered the most tightly co-regulated\
    \ ECM protein networks. Their mean expressions were defined as \\u201ccomposite\\nECM score\\u201d for downstream analysis.\\\
    n4.7.4\\nDiscovery Validations\\nFor replication runs, the data analysis agent was provided the same dataset and prompted\
    \ to test Kosmos claim:\\n\\u201cAn ECM composite score (mean of LAMA2, HSPG2, NID2, NID1, LAMA4, LAMC1, COL4A2, ITGA7,\
    \ LAMB2,\\nCOL6A3) declined nonlinearly with pseudotime, with a significant breakpoint at 0.5754 where decline accelerated\\\
    n3.47-fold\\u201d. This process was repeated over 5 independent trajectories, which all strongly supported the claim.\\\
    nTo validate the identified breakpoint, we performed a sliding window correlation analysis. Pearson correlation was\\\
    ncalculated in a sliding window of 20 samples, with step size of one sample along the pseudotime axis. A Locally\\nWeighted\
    \ Scatterplot Smoothing (LOWESS) fit to the resulting correlation coefficients revealed a distinct inflection\\npoint\
    \ at a pseudotime of 0.57, which coincided with the Kosmos-defined breakpoint. This method was adapted from\\na data analysis\
    \ trajectory from another discovery of the same Kosmos output.\\nFor further validation, we used a publicly available\
    \ single-soma transcriptomics dataset from neurofibrillary tangles\\n(NFT) bearing and non-NFT bearing samples from AD\
    \ and controls37. The data analysis agent was prompted to\\n\\u201cCalculate a ECM score using the genes LAMA2, HSPG2,\
    \ NID2, NID1, LAMA4, LAMC1, COL4A2, ITGA7, LAMB2,\\nCOL6A3. Compare the ECM score between control, non-NFT bearing and\
    \ NFT bearing samples.\\u201d All 5 independent\\ntrajectories supported the initial discovery where ECM scores decrease\
    \ from control to non-NFT to NFT bearing\\nsamples.\\nTable 1: Links to validation data analysis trajectories\\nAnalysis\
    \ Type\\nTrajectory Links\\nReplication (original data)\\nhttps://platform.edisonscientific.com/trajectories/\\n4d948f9c-7402-48c5-a0f3-41daff09f737\\\
    nhttps://platform.edisonscientific.com/trajectories/\\nd40c1133-2e28-452f-b92e-75d4ba87d2e4\\nhttps://platform.edisonscientific.com/trajectories/\\\
    n13fee7fd-b5ef-4a61-bebf-cb2dcec678f0\\nhttps://platform.edisonscientific.com/trajectories/\\n627619c1-b726-4c4c-bbed-743e55f456b6\\\
    nhttps://platform.edisonscientific.com/trajectories/\\nd8ef5055-113d-4fb4-91a0-42a9e53e7c98\\nValidation (Single soma\
    \ RNA-seq)\\nhttps://platform.edisonscientific.com/trajectories/\\ne2ebf0d3-74b3-484a-a821-906d23109c94\\nhttps://platform.edisonscientific.com/trajectories/\\\
    n9e50daec-4670-45ce-bb20-9e1e6ff6e5fb\\nhttps://platform.edisonscientific.com/trajectories/\\n06ed2bf0-9ecd-4a54-bec9-40f4826c42bb\\\
    nhttps://platform.edisonscientific.com/trajectories/\\n68980a3b-5510-43bf-8f81-68a5d2367a37\\nhttps://platform.edisonscientific.com/trajectories/\\\
    n51d8ac2b-ae00-4bd6-a595-5696faec19b7\\nSliding window correlation\\nhttps://platform.edisonscientific.com/trajectories/\\\
    n5b0c9346-0070-45a4-b058-fffb77aef062\\n23\\n\\n4.8\\nFigure 8 Methods\\n4.8.1\\nData collection and preprocessing\\nTo\
    \ characterize aging-associated changes in the mouse brain, the ventral-posterior part of the cortex (i.e. containing\\\
    nentorhinal cortex) and the hippocampal formation were dissected out from and prepared for single-nuclei multiome\\nanalysis\
    \ (n=23 - Age range: 6months - 28months). Both RNA and ATAC libraries were sequenced with a target\\nof 30,000 and 50,000\
    \ reads per nucleus, respectively. Reads were demultiplexed to FASTQ files using bcl2fastq and\\nthen mapped to the mouse\
    \ reference genome (mm10). UMIs per genes were counted using cellranger-arc using\\nthe \\u2013include-intron parameter.\
    \ Count matrices were processed in R and Python for quality control and filtering.\\nCell-type annotation was performed\
    \ using RNAseq data by combining alignment with the Allen Brain Atlas mouse\\nbrain taxonomy [58] and de-novo clustering,\
    \ and then extended to the ATACseq data. Note that only RNAseq data\\nwas used in Kosmos. The complete dataset will be\
    \ made available in a separate publication (Bourdenx et al., in\\npreparation).\\n4.8.2\\nDiscovery Validations\\nFor\
    \ replication runs, the data analysis agent was provided the same dataset and prompted to test Kosmos claim:\\n\\u201cThe\
    \ core hypothesis is that an integrated \\\"pro-phagocytic axis\\\" is activated in the aged entorhinal cortex, involving\\\
    ncoordinated changes in both neurons and microglia.\\nL2/3 IT ENT neurons exhibit a systemic flippase collapse,\\nimplying\
    \ increased surface \\\"eat-me\\\" signals. Simultaneously, microglia become primed for phagocytosis, coupled with\\ndownregulation\
    \ of the \\\"don\\u2019t-eat-me\\\" signal.\\u201d. This process was repeated over 5 independent trajectories, which all\\\
    nstrongly supported the claim.\\nFor further validation, we used a previously published independent dataset of single\
    \ cell (as opposed to single\\nnuclei in the discovery dataset) RNA sequencing from mouse whole brain ageing41.\\nThe\
    \ data analysis agent\\nwas provided a subsetted dataset only containing ENT, CTX neurons and microglia (downloaded from:\
    \ https:\\n//assets.nemoarchive.org/dat-61kfys3) with same prompt as before, over 5 independent trajectories, which\\\
    nalso strongly supported the initial discovery.\\nFinally, to assess the clinical relevance of the discovery, we used\
    \ a publicly available single nuclei RNA sequencing\\ndataset from human AD in an early (EC) and late (SFG) affected regions\
    \ at various stages (Braak 0, II, and VI).\\nIn order to capture the earliest changes in flippase expression, we focused\
    \ on the comparison between Braak 0 and\\nII, which is the first stage when tau pathology appears in this region. The\
    \ dataset was subset for supragranular\\npopulations (EC:Exc.s1, EC:Exc.s2, EC:Exc.s4, SFG:Exc.s4 and SFG:Exc.s2). The\
    \ same prompt was used, 4 out of\\n5 independent trajectories supported the initial discovery.\\n5\"\n  },\n  {\n    \"\
    name\": \"Data availability statement\",\n    \"text\": \"Data for Figures 2-4 are available from respective preprints\
