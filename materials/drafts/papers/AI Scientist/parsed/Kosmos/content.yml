    \ approach (Figure 7g) and an orthogonal breakpoint\\nanalysis (by identifying the inflection point of a sliding window\
    \ correlation, Figure 7h), which both gave the identical\"\n  },\n  {\n    \"name\": \"conclusions\",\n    \"text\": \"\
    To validate the biological relevance of this finding, we calculated the ECM composite score in the same manner in\\npreviously\
    \ published single-soma transcriptomic data [37]. A similar decrease of ECM gene expression was observed in\\nthis dataset\
    \ between neurons from AD patients without neurofibrillary tangles (NFT) and those with NFT (Figure 7i),\\nthus suggesting\
    \ a possible adaptation to tau accumulation. The complete study will be reported in an upcoming\\nmanuscript (Foiani et\
    \ al., in preparation).\\nThis discovery highlighted Kosmos\\u2019 ability to not only execute standard analyses, such\
    \ as differential expression or\\npathway enrichment analysis, but also to reason and propose unconventional methods to\
    \ address research objectives.\\nWhile optimizing a segmented model to fit data is prevalent in data sciences [38], this\
    \ approach, to the best of our\\nknowledge, has not been previously applied within a biological context to investigate\
    \ molecular events along a cellular\\ntimeline.\\n2.5\\nKosmos makes novel clinical discoveries not identified by human\
    \ researchers\\n2.5.1\\nDiscovery 7: Mechanism of entorhinal cortex vulnerability in aging\\nHere, we demonstrate how\
    \ Kosmos was able to uncover a clinically relevant mechanism of neuronal aging that was\\nnot identified by the researchers\
    \ who originally created and analyzed the dataset.\\nAging is the most common risk factor for dementia but we still do\
    \ not understand the molecular mechanisms involved.\\nTau pathology first emerges in specific vulnerable cell-types and\
    \ brain regions, such as supragranular excitatory neurons\\n16\\n\\n1.0\\n1.5\\n2.0\\nAdult\\nAged\\nAtp10a expression\
    \ (log1p)\\na\\nResearch objective (Abbr.): Propose\\nmechanisms of vulnerability of ENT\\nneurons in aging.\\nd\\nVentroposterior\\\
    ncortex\\nHippocampus\\nAging entorhinal (ENT) neurons downregulate multiple P4-ATPase flippases, weakening membrane phospholip-\\\
    nid asymmetry and increasing phosphatidylserine exposure precisely as microglia upregulate PS-sensing phago-\\ncytic receptors.\\\
