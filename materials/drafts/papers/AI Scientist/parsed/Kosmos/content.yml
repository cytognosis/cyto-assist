    \ with plasma proteome GWAS available at https://www.\\nsynapse.org/Synapse:syn51365303 and myocardial T1 relaxation GWAS\
    \ available at https://cvd.hugeamp.\\norg/dinspector.html?dataset=Nauffal2024_Fibrosis_EU&phenotype=MyocardialT1. For\
    \ Discovery 5, the\\n10x multiome data from the Wang et al. [28] can be accessed via GEO (Accession IDs: GSE124742 and\
    \ GSE164875).\\nThe GWAS summary statistics are available on the DIAMANTE consortium website. Data for Discovery 6 will\
    \ be\\navailable in a forthcoming publication (Foiani et al., in preparation). Similarly, data for Discovery 7 will be\
    \ made\\navailable in a separate publication (Bourdenx et al., in preparation).\\nAll Kosmos reports for the discoveries\
    \ reported here can be found in Supplementary Data 1-7 in pdf format, and on\\nEdison platform (Supplementary Table 1).\
    \ Jupyter notebooks supporting data analysis and literature citations can\\nbe found within the report accessible through\
    \ the hyperlinks. All scripts used for data analysis and figure generation\\nare available on GitHub at https://github.com/EdisonScientific/kosmos-figures.\\\
