    \ scales with Kosmos\\nruntime, as estimated by leading academic groups. Shaded region denotes \\u00b11 SD. g) Academic\
    \ groups\\u2019 evaluations of valuable\\nfindings from Kosmos cycle 20 indicate moderate to complete novelty (top) and\
    \ high to moderate reasoning depth (bottom).\\n3\\n\\nstatements were not made available to the evaluating scientist during\
    \ this process. Overall, 79.4% of the statements in\\nthe report were accurate, with differing results by type: 85.5%\
    \ of the data analysis-based statements were reproducible,\\n82.1% of literature review-based statements were validated\
    \ with primary sources, and 57.9% of synthesis statements\\nwere accurate (Figure 1c).\\nWe then evaluated the time it\
    \ would take for a human scientist to complete the work that Kosmos performs in\\nan individual run. We first calculated\
    \ this value by tallying the number of data analysis and papers included in a\\ngiven Kosmos run and estimating the time\
    \ it would take a human researcher to complete the same number of tasks.\\nWe estimated each Kosmos run performs approximately\
    \ 4.1 expert-months of research (n=6, \\u03c3=0.85; Figure 1d),\\nassuming an expert scientist takes 15 minutes to read\
    \ a full paper and 2 hours to complete a data analysis task using\\na Jupyter notebook [8] at 174 hours of work per month.\\\
    nTo obtain an orthogonal estimate of the amount of work done by Kosmos, we collaborated with leading academic\\ngroups\
    \ to evaluate Kosmos at cycles 5, 10, and 20 of its run. These groups estimated that the findings from a 20-cycle\\nKosmos\
    \ run would have taken them 6.14 months of research to complete (n=7, \\u03c3=2.49), much higher than our\\nestimated\
    \ time savings given their runs (Figure 1e). Furthermore, they report that expert-equivalent research time\\nscales with\
    \ Kosmos runtime, roughly doubling from cycle 5 to cycle 20 (Figure 1e). Similarly, when asked about the\\nnumber of valuable\
    \ findings that Kosmos generated across the run, experts report that the number of valuable findings\\nscales with the\
    \ amount of cycles in the Kosmos run (Figure 1f). Lastly, when asked about Kosmos\\u2019 reasoning depth\\nand novelty,\
    \ expert scientists report that valuable findings from cycle 20 demonstrate high to moderate reasoning\\ndepth and moderate\
    \ to complete novelty (Figure 1g). Together, these results suggest scaling between computational\\ninvestment and scientific\
    \ output.\\nIn the following sections, we present seven studies illustrating discoveries made by Kosmos during these collaborations.\\\
    nWe group these Kosmos discoveries into the following categories:\\n1. Two runs that reproduce existing discoveries that\
    \ were either unpublished, or published after the cutoff of the\\nrelevant language models and not accessed by Kosmos\
    \ at runtime.\\n2. One run that reproduces a published finding not accessed by Kosmos at runtime using independent reasoning.\"\
