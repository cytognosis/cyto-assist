    \ that indicates the timing of ECM\\nfailure (Figure 7c). To test this hypothesis, Kosmos first selected 10 ECM proteins\
    \ and calculated a composite ECM\\nabundance score using the mean abundance of those 10 proteins (Figure 7d). Then, segmented\
