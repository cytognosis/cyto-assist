    \ 4), proposing that multiplicative processes in neurodevelopment can be causative of the observed distributions\\n(Figure\
    \ 4d). Thus, Kosmos could not only capture expected findings, but also can connect empirical results to novel\\ninterpretations\
    \ for network science and neurodevelopment.\\nWe note that the source preprint Piazza et al. was posted on bioRxiv on\
