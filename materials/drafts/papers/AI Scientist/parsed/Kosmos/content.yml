  sections: "[\n  {\n    \"name\": \"Introduction\",\n    \"text\": \"Data-driven discovery consists of iterative steps of\
    \ literature search, hypothesis generation, and data analysis to draw\\nnew scientific conclusions from datasets. Due\
    \ to their proficiency in programming and interdisciplinary reasoning,\\nlarge language model (LLM) agents have the potential\
    \ to automate data-driven discovery across domains.\\nRobin [1], a system we previously reported, performs automated cycles\
    \ of literature search and data analysis to\\npropose evidence-based hypotheses, but has limited context sharing between\
    \ its agents and is primarily tailored for\\ntherapeutics development. Sakana\\u2019s AI Scientist [2] autonomously forms\
    \ hypotheses, iteratively conducts computa-\\ntional experiments, and writes and reviews manuscripts about its results,\
    \ but remains limited to machine learning\\nresearch. Google\\u2019s AI co-scientist [3] conducts iterative cycles of\
    \ reasoning to generate scientific hypotheses, but\\ndoes not perform or analyze experiments. The Virtual Lab [4] successfully\
    \ designed novel nanobodies that neutralize\\nSARS-CoV-2, and may be extensible to other domains, but lacks exploratory\
    \ data analysis capabilities.\\nHere, we present Kosmos, an AI scientist that automates data-driven discovery across a\
    \ wide range of scientific\\ndisciplines. Given an open-ended objective and a dataset, Kosmos performs iterative cycles\
    \ of parallel data analysis,\\nliterature search, and hypothesis generation, and summarizes its discoveries in scientific\
    \ reports (Figure 1a). At each\\ncycle, Kosmos launches several parallel instances of two general-purpose Edison Scientific\
    \ agents, a data analysis\\nagent [5] and a literature search agent [6], with each instance assigned to a specific task\
    \ that is aligned with the\\nend objective. Kosmos shares and synthesizes information among these agents by continuously\
    \ updating a structured\\nworld model, which enables Kosmos to execute an average of 42,000 lines of code across 166 data\
    \ analysis agent\\nrollouts and read 1,500 full-length scientific papers across 36 literature review agent rollouts per\
    \ run (Figure 1b).\\nThis is a 9.8x increase in code generation compared to Robin. Consolidating information in the world\
    \ model further\\nallows every claim in a Kosmos scientific report to be directly linked to the data analysis or source\
    \ from which it\\noriginated, ensuring that Kosmos\\u2019 reasoning is traceable.\\nWe report seven discoveries made by\
    \ Kosmos: three discoveries made by Kosmos reproduce findings from preprinted\\nor unpublished manuscripts, while the\
    \ remaining four make novel contributions to the scientific literature. Each\\ndiscovery is derived from a unique data\
    \ type and field and is corroborated by independent analysis from a domain\\nexpert. Among the examples below, Kosmos\
    \ identified a novel, clinically relevant mechanism of neuronal aging, and\\ngenerated novel statistical evidence that\
    \ high circulating levels of superoxide dismutase 2 (SOD2) may causally reduce\\nmyocardial fibrosis in humans. Together,\
    \ these discoveries illustrate a system that can autonomously reproduce, refine,\\nand generate data-driven discoveries\
    \ with the rigor and transparency essential for advancing scientific understanding.\\n2\"\n  },\n  {\n    \"name\": \"\
    Results\",\n    \"text\": \"2.1\\nKosmos system and architecture\\nThe core advancement in Kosmos is the use of a structured\
    \ world model to manage the output of a large number\\nof agents running in parallel. Kosmos is initiated with a research\
    \ objective and a dataset, which are specified by a\\nscientist. Kosmos attempts to complete the research objective by\
    \ using LLMs, data analysis agents, literature search\\nagents, and the world model to perform iterative discovery cycles.\
    \ In each cycle, Kosmos executes up to ten literature\\nsearch and analysis tasks, and subsequently updates the world\
    \ model with summaries of the task outputs. Kosmos\\nthen queries the world model to propose literature search and data\
    \ analysis tasks to be completed in the next cycle.\\nThis context management strategy allows Kosmos to explore many different\
    \ research avenues simultaneously, and\\nrun for eight times as many iterations than existing systems [1, 2, 7]. Once\
    \ Kosmos believes it has completed the\\nresearch objective, it synthesizes key discoveries into three or four scientific\
    \ reports. Each statement and figure in\\nthe report cites either a publication found by the literature search agent or\
    \ a Jupyter notebook created by the data\\nanalysis agent.\\nTo assess the overall accuracy of Kosmos reports, we first\
    \ extracted 102 statements from three representative reports\\nand determined whether the statements originated from the\
    \ scientific literature, a data analysis, or an interpretation\\nbetween the two. We then asked expert scientist evaluators\
    \ to classify the accuracy of each statement as \\u201cSupported\\u201d\\nor \\u201cRefuted\\u201d. The scientist evaluators\
    \ were instructed to classify the statement as \\u201cSupported\\u201d if they could reproduce\\nthe statement with their\
    \ own analysis or find support for the statement in the literature, or \\u201cRefuted\\u201d if their analyses\\nor literature\
    \ search produced a different result (see Methods). The original code or cited paper(s) supporting the\\n2\\n\\nReasoning\\\
