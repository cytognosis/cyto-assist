    \ proteins and upregulation of metalloproteinases [36].\\nAs the research objective required Kosmos to propose a sequence\
    \ of events, the timing of the events would have to\\nbe determined. Kosmos rationalized that although the binned analysis\
    \ showed differences in early and late stages,\\na continuous analysis could pinpoint the timing of pathway changes more\
