    n13\\n\\nrisk [26], yet functional characterization of these loci has been hindered by locus complexity, linkage disequilibrium,\\\
    nand limited cell-type resolution.\\nTo address this problem at scale, we provided Kosmos with a variant-level input dataset\
    \ that integrated multi-omic\\nannotations from publicly available sources, including T2D GWAS summary stats with fine-mapping\
    \ posterior inclusion\\nprobabilities (PIPs) [27], computational prediction for Transcription Factor Binding Sites (TFBS)\
    \ overlap, chromatin\\naccessibility (ATAC-seq) [28], expression (eQTL) [29], and protein (pQTL) [30] data (Figure 6a).\
    \ Kosmos was tasked\\nwith generating mechanistic hypotheses for protective T2D variants, which were defined as biallelic\
    \ variants where\\nthe alternative allele confers reduced T2D risk relative to the reference allele (Figure 6a).\\nWithout\
    \ explicit instruction, Kosmos established a mechanistic ranking schema termed the Mechanistic Ranking Score\\n(MRS),\
    \ defined as: MRS = PIP \\u00d7(1+Concordance Score+Experimental Evidence Score) (Figure 6b) where: PIP\\nrepresents the\
    \ posterior inclusion probability from fine-mapping; Concordance Score quantifies the number of QTL\\ndata types (ATAC-seq,\
    \ eQTL, pQTL) showing directionally consistent effects with the GWAS signal (e.g., decreased\\nexpression or chromatin\
    \ accessibility for protective alleles); Experimental Evidence Score adds 1 point for predicted\\ntranscription-factor\
    \ binding disruption and 1 additional point for supporting ChIP-seq evidence from ReMap [31]. The\\nhighest MRS quantile\
    \ was 3.3-fold enriched for ChIP-seq validation of the TFBS prediction relative to lowest quantile\\n(p-value < 1 \\u00d7\
    \ 10\\u22123, Figure 6c), confirming that Kosmos\\u2019s prioritization aligned with experimentally supported\\nregulatory\
    \ elements. Across 7,925 GWAS variants, the highest observed MRS was 6.0 for rs9379084. Notably, 6 of\\nthe 10 top-scoring\
    \ SNP\\u2013gene pairs corresponded to the same variant (Figure 6d), prompting Kosmos to focus on the\\nrs9379084 locus.\\\
    nTo test whether the protein-coding genes in the rs9379084 locus (RREB1, SSR1, RIOK1, DSP, and SNRNP48) are\\nsignificantly\
    \ regulated by the 12 TFs predicted to be disrupted by the same SNP, Kosmos called the gseapy library\\u2019s\\nEnrichr\
    \ function for an over-representation analysis. The 5-gene set was tested against several Enrichr TF-target\\ndatabases\
    \ (including TRRUST_Transcription_Factors_2019, ENCODE_and_ChEA_Consensus_TFs_from_ChIP-X,\\nChEA_2022, ENCODE_TF_ChIP-seq_2015,\
    \ and TF_Perturbations_Followed_by_Expression). Enrichr output\\nwas then filtered for terms (regulator TFs) matching\
    \ one of the 12 predicted rs9379084-disrupted TF binding sites.\\nThe analysis identified one significant enrichment (p\
    \ < 0.05): the gene set was enriched for targets of ATF3\\n(p = 0.042), which regulates two of the five genes (SSR1 and\
    \ SNRNP48). This significant finding originated from\\nthe ATF3 GM12878 hg19 database term. A separate, non-significant\
    \ (p = 0.31) database match was also found\\nbetween ATF3 and RREB (Figure 6e). Finally the synthesis of this finding\
    \ was: \\u201cIn aggregate, rs9379084-A connects\\na missense-tagged regulatory sequence to increased ATF3 binding, islet-selective\
    \ chromatin closure, and directionally\\ncoherent (though variably powered) expression changes for SSR1 [...], providing\
    \ a plausible protective pathway that\\nreprograms stress-responsive regulatory circuits in pancreatic islet cells to\
    \ reduce type 2 diabetes risk\\u201d (Figure 6f).\\nIndependent validation of this mechanistic hypothesis identified supporting\
    \ evidence in the pancreas-specific enhancer-\\ntarget data [32] which shows that the missense SNP rs9379084-A overlaps\
    \ with a cis-regulatory element that is pre-\\ndicted to regulate SSR1 and RREB1 (Figure 6g). Additionally, the transcriptome-wide\
    \ association analyses (TWAS)\\nhub data [33] shows that SSR1 is the only gene in the locus with a significant association\
    \ with T2D (TWAS |Z| > 5,\\nFigure 6h), suggesting that genetically-inferred levels of SSR1 are associated with higher\
    \ risk of T2D. Lastly, pre-\\nvious studies have demonstrated that SSR1 levels are causally linked to circulating insulin\
    \ in cell [34] and animal\\nmodels [35].\\nThis discovery demonstrated Kosmos\\u2019 ability to autonomously develop a\
    \ target prioritization strategy for likely causal\\nmechanisms in T2D, followed by proposing a specific mechanistic hypothesis\
    \ that is supported by independent data\\nsources and literature.\\n2.4\\nKosmos independently develops new methods\\\
