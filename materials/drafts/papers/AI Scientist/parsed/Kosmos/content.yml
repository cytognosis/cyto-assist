    \ \"name\": \"Supplementary Information\",\n    \"text\": \"\"\n  },\n  {\n    \"name\": \"Supplementary Table 1: Hyperlinks\
    \ to Kosmos reports\",\n    \"text\": \"Discovery\\nHyperlinks\\n1: Nucleotide metabolism in hypothermia\\nhttps://platform.edisonscientific.com/kosmos/\\\
    nc4bdef64-5e9b-43b9-a365-592dd1ed7587\\n2: Determinant of perovskite solar-cell failure\\nhttps://platform.edisonscientific.com/kosmos/\\\
    n1fdbf827-be65-4d97-9b66-bf0da600091a\\n3: Log-normal connectivity in neural networks\\nhttps://platform.edisonscientific.com/kosmos/\\\
    n4fb3fbdb-c449-4064-9aa6-ff4ec53131d8\\n4: SOD2 as driver of myocardial fibrosis\\nhttps://platform.edisonscientific.com/kosmos/\\\
    nc6849232-5858-4634-adf5-83780afbe3db\\n5: Protective variant of SSR1 in type 2 diabetes\\nhttps://platform.edisonscientific.com/kosmos/\\\
    nabac07da-a6bb-458f-b0ba-ef08f1be617e\\n6: Temporal ordering in Alzheimer\\u2019s disease\\nhttps://platform.edisonscientific.com/kosmos/\\\
    na770052b-2334-4bbe-b086-5149e0f03d99\\n7: Mechanism of neuron vulnerability in aging\\nhttps://platform.edisonscientific.com/kosmos/\\\
    n28c427d2-be31-48b5-b272-28d5a1e3ea5c\\n34\"\n  },\n  {\n    \"name\": \"Supplementary Information 1: Kosmos inputs for\
    \ each discovery\",\n    \"text\": \"Discovery 1\\nResearch Objective\\nThe brain has long been conceptualized as a network\
    \ of neurons connected by synapses. However, attempts to\\ndescribe the connectome using established network science models\
    \ have yielded conflicting outcomes, leaving the\\narchitecture of neural networks unresolved. Here, we aggregate Degree\
    \ Length (\\u00b5m), Synapses (count), and Density\\n(synapses/\\u00b5m, a local value, not Synapses/Length, except in\
    \ the case of C. elegans, where we could not measure it) of\\nneurons from eight experimentally mapped connectomes. Consider\
    \ how these measures relate from a neuroscientific\\nperspective and neurodevelopment time course in order to propose\
    \ universal principles among them. Investigate\\nsimilarities and differences across connectomes and species in the distributions\
    \ that characterize these metrics, and,\\nif possible, link metrics to each other in a cohesive narrative.\\nData Description\\\
    nMultiple *_AggregatedData.csv files, each representing one connectome (\\u201cAnimal\\u201d): Celegans_AggregatedData.csv\\\
    n(C. Elegans, which does not have local density data), Larva_LocalDensity_AggregatedData.csv (Fruit Fly Larva),\\nHemibrain_LocalDensity_AggregatedData.csv\
    \ (Half of a Fruit Fly\\u2019s CNS), MANC_LocalDensity_AggregatedData.csv\\n(Fruit Fly Ventral Nerve Cord), FlyWire_LocalDensity_AggregatedData.csv\
    \ (Fruit Fly CNS), Zebrafish_LocalDensity\\n_AggregatedData.csv (local reconstruction of zebrafish brain), MM3_LocalDensity_AggregatedData.csv\
    \ (local re-\\nconstructions of mouse cortex), H01_LocalDensity_AggregatedData.csv (local reconstructions of human cortex).\\\
    nSchema (exact column names): CellID, Length, Synapses, LocalDensity (absent for c. Elegans), and Degree\\nDiscovery 2\\\
    nResearch Objective\\nThe study objective is to identify the impacts of various ambient environmental parameters (solvent\
    \ partial pressure,\\nabsolute humidity, ambient temperature) on perovskite device efficiency, during a synthesis process\
    \ consisting of two\\nsequential steps: a spin coating step, followed by a thermal annealing step.\\nData Description\\\
    n# Description A structured dataset combining environmental sensor measurements from separate spin coating (ab-\\nsolute\
    \ humidity, ambient temperature, solvent vapor partial pressure) and thermal annealing (absolute humidity,\\nambient temperature)\
    \ enclosures, with perovskite solar-cell device performance metrics open-circuit voltage (VOC),\\nshort-circuit current\
    \ (JSC), fill factor (FF), and power conversion efficiency (PCE). Environmental data were recorded\\nacross multiple fabrication\
    \ rounds using custom-built, feedback-controlled enclosures with calibrated sensors and ac-\\ntuators. Inputs: Environmental\
    \ sensor data includes two copies of each sample (redundancy).\\n# Data Processing Instructions\\n## Load Raw Data\\nRead\
    \ all Excel files in the folder Inputs \\u2013 environmental sensor data. These are time-dependent readings of the sensor\\\
    ndata. There are multiple tabs in each Excel file, labeled by sample ID number and process step (spin coating or\\nthermal\
    \ annealing). There are two synthesis steps for each device: a spin coating step, where perovskite precursors\\ndissolved\
    \ in dimethylformamide (DMF) are spun coat into a wet thin film, and a thermal annealing step, where the\\nsample is placed\
    \ on a hotplate and annealed. Note the environmental sensor data records the temperature of the\\nambient gas, not the\
    \ temperature of the hotplate. The ambient gas temperature in the thermal annealing stage was\\nmeasured, but not independently\
    \ controlled, because it was dominated by the hotplate. Read all text files in the\\nfolder Outputs - full current-voltage\
    \ curves. Treat these as raw illuminated J\\u2013V (current density vs. voltage) data\\ndirectly from the solar simulator.\\\
    n## Load Summary Data\\nRead the file Summary table.xlsx, which nominally contains average values of the sensor data and\
    \ extracted parameters\\nfrom the current-voltage curves. For each current-voltage curve, the following device metrics\
    \ were extracted: open-\\ncircuit voltage (VOC), short-circuit current (JSC), fill factor (FF), power conversion efficiency\
    \ (PCE).\\n35\\n\\n## Handle Fill Factor Discrepancies\\nBe aware that Kosmos previously miscalculated fill factors (FF)\
    \ from raw J-V curves. If FF values differ between the\\nraw curve-derived results and the summary table, default to the\
    \ summary table values. Only override this rule if the\\nroot cause of the discrepancy can be explicitly identified and\
    \ justified through reproducible computation.\\n## Environmental Sensor Precision\\nFor all environmental sensor data,\
    \ determine the minimum step size (i.e., smallest nonzero difference between consec-\\nutive values). Treat this as the\
    \ measurement precision. Example: if the smallest increment in temperature readings\\nis 0.1 \\u00b0C, set temperature\
    \ sensor resolution = 0.1 \\u00b0C.\\nDiscovery 3\\nResearch Objective\\nGiven that Preoptic area (POA) Kappa Opioid Receptor\
    \ (KOR+) activation induces a torpor-like, hypothermic and\\nhypometabolic state that is cerebroprotective only under\
    \ hypothermic conditions, identify the specific metabolic\\nadaptations that may support this effect.\\nData Description\\\
    nPolar (Brain_Polar_C_ST_NT_245_2024.csv) and lipid (Brain_Lipids_C_ST_NT.csv) untargeted metabolomic\\nscreen of brain\
    \ tissue from mice. The data is LC/MS peak intensities for three groups: control (N=6), hypothermia\\n(N=6) and normothermia\
    \ (N=5). The hypothermic group is mice with chemogenetic activation of POA KOR+\\nneurons. The hypothermic group was allowed\
    \ to undergo the full drop in body temperature (torpor-like hypothermia).\\nThe normothermia group has the same neuronal\
    \ activation as above, but animals were housed at elevated ambient\\ntemperature to clamp core temperature near normal.\
    \ The normothermia group isolates the effect of neural activation\\nwithout hypothermia, showing whether protection depends\
    \ on temperature.\\nControls received control treatment\\nwithout POA KOR+ activation and served as baseline comparison\
    \ for both hypothermia and normothermia groups.\\nDiscovery 4\\nResearch Objective\\nIdentify causal proteins in myocardial\
    \ fibrosis with T1 as a proxy and propose mechanism of action. Use multiple\\napproaches such as pairwise colocalisation\
    \ tests (using package coloc), statistical fine mapping (using package susieR)\\nand Mandelian Randomisation (using package\
    \ MandelianRandomization or TwoSampleMR). Take into account link-\\nage disequilibrium (obtain LD matrix with LDlinkR).\
    \ Use all available datasets, including T1 GWAS, cis-pQTLs,\\nsQTLs and eQTLs.\\nData Description\\nThere are four datasets\
    \ available: GWAS summary statistics for myocardial T1, cis_pQTLs from proteomics GWAS\\nof the same European cohort patients\
    \ as the myocardial T1 data, sQTLs and eQTLs of genotype-tissue expression\\ndata\\nDiscovery 5\\nResearch Objective\\\
    nIdentify the most validated Type 2 Diabetes protective mechanisms by ranking SNP-gene pairs based on: (1) multiple\\\
    nindependent QTL validations (ATAC, cell eQTL, GTEx eQTL, blood pQTL), (2) directional concordance between\\nGWAS and\
    \ QTL effect sizes, (3) experimental evidence (ReMap ChIP-seq support), and (4) biological relevance (gene\\nexpression\
    \ levels, posterior probability of causality). For each top mechanism, generate a complete mechanistic report\\nshowing:\
    \ SNP allele \\u2014> TF binding change (with delta scores and cell-type expression) \\u2014> chromatin accessibility\\\
    neffects (ATAC betas/ORs per cell type) \\u2014> gene/protein expression changes (with all QTL betas and p-values)\\n\\\
    u2014> biological function \\u2014> hypothesized link to T2D pathophysiology.\\nPrioritize mechanisms where protective\\\
    nalleles consistently decrease transcript or protein levels across multiple QTL sources, and provide publication-quality\\\
    nvisualizations with all statistical evidence clearly labeled.\\nData Description\\n36\\n\\nYou are given two master files,\
    \ MASTER_SNP_GENE_LEVEL_FINAL.csv with 12K SNP-gene pairs including ATAC,\\neQTL, GTEx, and blood pQTL data, and MASTER_ALL_CREDIBLE_SETS_WITH_QTLs_CORRECTED.csv\
    \ with\\n68K SNP-TF disruptions including motifBreakR predictions and ReMap ChIP-seq validation, and a comprehensive\\\
    nDATA_DICTIONARY.csv.\\nDiscovery 6\\nResearch Objective\\nThis is a proteomic dataset of mini pools of 10 neurons from\
    \ Alzheimer\\u2019s disease cases. Investigate proteome differ-\\nences between cells with positive and negative tau status.\
    \ You can also use MC1 (i.e. misfolded tau) quantification\\nto stratify tau positive cells or the precomputed pseudotime\
    \ to order samples. Your task is to propose mechanisms\\ncontributing to the accumulation of tau and the link with cellular\
    \ dysfunction, death, or survival. Propose a sequence\\nof events leading to tau accumulation.\\nData Description\\nIn\
    \ the obs dataframe, you will find some metadata about samples (age at death, MC1 score, pseudotime), and the\\ntau status\
    \ (positive/negative). Use robust statistical approaches accounting for the possible cofactors. Data are\\nalready log2\
    \ transformed.\\nDiscovery 7\\nResearch Objective\\nInvestigate differences in transcriptional regulation, transcriptional\
    \ entropy, transcriptional noise during ageing com-\\nparing subclass \\u2018008 L2/3 IT ENT Glut\\u2019 vs \\u2018007\
    \ L2/3 IT CTX Glut\\u2019 and \\u2018003 L5/6 IT TPE-ENT Glut\\u2019 vs \\u2018005 L5\\nIT CTX Glut\\u2019, that could\
    \ explain a higher propensity to accumulate proteins. Propose mechanisms of vulnerability\\nof ENT and mechanisms of resilience\
    \ of CTX neurons.\\nData Description\\nThis is a single nuclei dataset from the ageing mouse brain. In the obs dataframe,\
    \ you will find some metadata\\nabout samples (age, sex), manual cell-type annotation (celltype) and the cell-type annotation\
    \ using the Allen Brain\\nInstitue MapMyCells algorithm (class_name, subclass_name, supertype_name) as well as the cell-typing\
    \ confidence\\n(_bootstrapping_probability).\\n37\"\n  },\n  {\n    \"name\": \"Supplementary Information 2: Instructions\
    \ for Evaluations from Academic Groups\",\n    \"text\": \"Comparing with prior research\\n1. Consider a claim you previously\
    \ made similar in style and scope to the one from which Kosmos reproduced the\\ndiscovery. Describe the specific claim\
    \ that you previously made.\\n2. How long did it take to produce that claim after you had collected the data? Please answer\
    \ in terms of elapsed\\ncalendar time (days/weeks/months/years).\\nPlease review the following Kosmos report. Note that\
    \ you can click any hyperlinked trajectory to review\\nthem.\\n3. Please list out the number of all findings in this report\
    \ that you found to be valuable or significant.\\n4. Assume your lab received the data on January 1. Under your usual\
    \ workflow without AI tools, how long would\\nit typically take your lab to generate findings like those in the report,\
    \ including time spent reading the literature,\\ncoming up with ideas, performing the analyses? Please answer in terms\
    \ of elapsed calendar time in terms of\\ndays/weeks/months/years.\\n5. How many full-time employees would you expect to\
    \ be working on the project during that period? For example,\"\n  },\n  {\n    \"name\": \", 1.25, 1.7 FTE\",\n    \"\
    text\": \"6. Assess the depth of those findings that you chose, in terms of whether they required deep multi-step reasoning\\\
    nor more shallow ideation:\\n\\u2022 Shallow ideation based on surface-level observations\\n\\u2022 Light reasoning with\
    \ a straightforward connection of ideas/observations\\n\\u2022 Moderate depth of reasoning involving several connected\
    \ steps\\n\\u2022 Deep multi-step reasoning requiring synthesis across multiple ideas\\n7. Assess the quality of those\
    \ findings that you chose in terms of novelty to the field:\\n\\u2022 Little novel insight, mostly restatement of known\
    \ information\\n\\u2022 Moderate novelty; extends existing knowledge in meaningful ways\\n\\u2022 Largely novel with minor\
    \ connections to existing knowledge\\n\\u2022 Completely novel insight with little precedent\\n38\"\n  },\n  {\n    \"\
    name\": \"Supplementary Information 3: Example Instructions for Expert Evaluations (Discovery 1)\",\n    \"text\": \"\
    Thank you for evaluating our scientific findings! We are developing an AI scientist system that can generate novel\\ndiscoveries.\
    \ In this project, we performed detailed analyses on the following metabolomics dataset to investigate\\nthe specific\
    \ metabolic adaptations that may enable Preoptic area (POA) Kappa Opioid Receptor (KOR+)-induced\\ncerebroprotection under\
    \ torpor-like hypothermia and hypometabolism.\\nThe output from the system is a brief report summarizing the main finding,\
    \ with quantitative details and figures from\\nthe analyses. This report contains both results from direct analyses as\
    \ well as scientific interpretations of the data.\\nWe have chosen a random sample of these statements (both based on\
    \ data analysis and interpretations) for your\\nevaluation:\\n1. Read through the PDF of the discovery group. This report\
    \ will provide context for the statements that you will\\nbe evaluating. The figures are there for your reference, but\
    \ they will not be evaluated. Do not look through\\nthe hyperlinked citations or use those as evidence.\\n2. Familiarize\
    \ yourself with the dataset provided. All analyses and discoveries in this discovery group were derived\\nfrom this dataset.\\\
    n3. Each discovery group will have a sample of statements to be evaluated. These claims are either derived from\\ndata\
    \ analysis on the dataset, literature review, or by synthesizing ideas across claims/conclusions. Conduct your\\nevaluation\
    \ based on the type of claim it is. We tried our best to make each statement individually evaluable,\\nbut if something\
    \ is confusing, feel free to refer back to the discovery group PDF.\\nDataset Information\\nThis dataset comprises untargeted\
    \ metabolomic screens of mouse brain tissue, including a polar fraction\\n(Brain_Polar_C_ST_NT_245_2024.csv) and a lipid\
    \ fraction (Brain_Lipids_C_ST_NT.csv). It contains LC/MS\\npeak intensity measurements for three experimental groups:\
    \ control (N = 6), hypothermia (N = 6), and normothermia\\n(N = 5). The hypothermia group consists of mice with chemogenetic\
    \ activation of POA KOR+ neurons that were\\nallowed to undergo a full drop in body temperature, producing a torpor-like\
    \ hypothermic state. The normothermia\\ngroup received the same neuronal activation but was housed at an elevated ambient\
    \ temperature to clamp core\\ntemperature near normal, thereby isolating the effects of neural activation without hypothermia\
    \ and indicating whether\\nprotection depends on temperature. The control group received a control treatment without POA\
    \ KOR+ activation\\nand serves as the baseline for comparison with both the hypothermia and normothermia groups.\\nEvaluation\
    \ Rubrics\\nData Analysis Rubric: Attempt to replicate this claim using your own data analysis. Did your findings support\
    \ or\\nrefute the claim? The exact numbers and results do not need to match exactly, but your analysis should address\
    \ the\\ncentral idea behind the claim. Use your best judgement to determine if the claim is supported, based on the context\\\
    nof the discovery. IMPORTANT: Do all data analysis in PYTHON.\\n\\u2022 Answer: [SUPPORTED, REFUTED, UNSURE]\\n\\u2013\
    \ SUPPORTED: My data analysis is able to reproduce this claim.\\n\\u2013 REFUTED: My data analysis refutes this claim.\\\
    n\\u2013 UNSURE: I do not know how to do this analysis, the results are unclear/insignificant, or the claim is\\nambiguous\
    \ or missing key information.\\n\\u2022 Explanation: [Free response, backed by evidence.]\\n\\u2022 Your data analysis:\
    \ [Jupyter notebook]\\nLiterature Review Rubric: Analyze this claim and attempt to verify it in the scientific literature.\
    \ Does the literature\\nsupport or refute this claim? If any part of the claim is obviously wrong, it should be marked\
    \ as refuted. If some\\n39\\n\\nparts are supported and others are ambiguous/inconclusive, you may mark it as supported\
    \ but please use your best\\njudgement.\\n\\u2022 Answer: [SUPPORTED, REFUTED, UNSURE]\\n\\u2013 SUPPORTED: This claim\
    \ is supported by the literature.\\n\\u2013 REFUTED: The claim is NOT supported by the literature.\\n\\u2013 UNSURE: The\
    \ literature is completely inconclusive, the claim is ambiguous, or unable to be evaluated.\\n\\u2022 Explanation: [Free\
    \ response, citing specific papers.]\\nInterpretation Rubric: Analyze the claim and determine if the claim is a scientifically\
    \ accurate interpretation based\\nonly on the report context. This question is only evaluating if the claim\\u2019s interpretation\
    \ of the results is accurate,\\nso you should not conduct any data analysis. A summary of relevant context is given for\
    \ your reference, which you\\nshould assume is correct.\\n\\u2022 Answer: [SUPPORTED, REFUTED, UNSURE]\\n\\u2013 SUPPORTED:\
    \ This claim is a logically reasonable inference given the report and context.\\n\\u2013 REFUTED: This claim is NOT a\
    \ logically reasonable inference given the report and context.\\n\\u2013 UNSURE: The claim is ambiguous, missing key information,\
    \ or unable to be evaluated.\\n\\u2022 Explanation: [Free response, based on the report and context.]\\n40\"\n  },\n \
    \ {\n    \"name\": \"Supplementary Information 4: Examples of Kosmos evaluations across statement types\",\n    \"text\"\
    : \"Data Analysis Statement Evaluation Examples\\nSupported\\nStatement: When controlling for D-xylitol, the correlation\
    \ between betaine and carnosine lost significance and\\ndropped from r=0.910 to r=0.744 (p=0.149).\\nEvaluation: I was\
    \ able to reproduce this claim exactly, including the correlation coefficients and p-values.\\nRefuted\\nStatement: In\
    \ normothermia, PUFA-PC proportion was very strongly and significantly negatively correlated with\\ncarnosine.\\nEvaluation:\
    \ It appears that the agent somehow mixed up values for some of the mice, leading the correlation to\\nlook a lot stronger\
    \ than it is. In my analysis, there is a bit of a negative correlation, but it is not significant (p~0.3).\\nOverall,\
    \ the incorrect values negate the claim.\\nLiterature Review Statement Evaluation Examples\\nSupported\\nStatement: ASPN-mimic\
    \ peptides attenuate SMAD2/3 phosphorylation.\\nEvaluation: This has been demonstrated across multiple experimental models\
    \ in both breast cancer and cardiac\\ntissue contexts. 10.1371/journal.pmed.1001871, doi.org/10.1371/journal.pmed.1001871.\\\
    nRefuted\\nStatement: Carnosine has specialized roles at the bilayer as a transition-metal chelator and scavenger of secondary\\\
    nnon-aldehyde reactive species arising in arachidonic acid peroxidation cascades.\\nEvaluation: It\\u2019s true that carnosine\
    \ chelates transition metals. However, it does not seem fair to say that carnosine\\nhas specialized roles at the bilayer.\
    \ First, carnosine is water soluble and its activity for chelating transition metal ions\\nto avoid PUFA (e.g. ARA) peroxidation\
    \ is likely more about preventing these metals from getting into the membrane.\\nIt may be located near the membrane in\
    \ some cases, though. It can also prevent soluble macromolecule peroxidation\\n(e.g. of proteins), which argues against\
    \ a specialized role. Additionally, there does not seem to be much support for\\ncarnosine scavenging of NON-aldehyde\
    \ reactive species. It seems key for scavenging aldehydes in particular. Even if\\nI\\u2019m overinterpreting the word\
    \ \\u201cspecialized\\u201d here, there does not seem to be much evidence for carnosine scavenging\\nnon-aldehydes, so\
    \ this claim is still not supported.\\nInterpretation Statement Evaluation Examples\\nSupported\\nGiven context: Hypothermia\
    \ uniquely elevated betaine and carnosine and made them strongly coupled, while classic\\nTonEBP osmolytes (myo-inositol,\
    \ taurine, creatine) did not change.\\nStatement: The strict state-specificity of this coupling in a design that controls\
    \ for chemogenetic activation indicates\\na temperature-dependent metabolic program, rather than an effect of neuronal\
    \ activation alone.\\nEvaluation: Given that both hypothermic and normothermic experimental groups received KOR+ activation,\
    \ we can\\n41\\n\\nresonably conclude that any differences between these groups in metabolites are not due to chemogenetic\
    \ activation.\\nGiven that the key difference is temperature, it is therefore reasonable to say that this coupling indicates\
    \ temperature-\\ndependent metabolism.\\nRefuted\\nGiven context: Hypothermia indeed shifted PC composition toward PUFAs\
    \ relative to normothermia, consistent\\nwith a strategic adaptation to maintain membrane fluidity at low temperature.\
    \ In a targeted comparison, the PUFA-\\nPC proportion was significantly higher in hypothermia than normothermia, with\
    \ hypothermia showing a mean PUFA\\nproportion of 0.3100 \\u00b1 0.0041 versus 0.2999 \\u00b1 0.0093 in normothermia;\
    \ the control group was intermediate (0.3063\\n\\u00b1 0.0063) and not different from either treatment group.\\nStatement:\
    \ This modest yet coherent shift implicates compositional remodeling\\u2014as opposed to wholesale lipid\\nturnover\\\
    u2014as a thermoadaptive mechanism that could help preserve membrane function and provide precursors for\\nprotective\
    \ lipid mediators during the hypometabolic state.\\nEvaluation: Despite the caveat of \\u201cmodest yet coherent\\u201d\
    \ in the interpretation, it\\u2019s unclear to me without further\\nstatistics whether this difference is meaningful.\
    \ The control group PUFA-PC proportion being intermediate addition-\\nally argues against this being a mechanistically\
    \ meaningful change. There are many components to the lipid bilayer\\nand this change may not be very large relative to\
    \ other changes, some of which could counteract this change. And\\nit may not be large enough to actually preserve membrane\
    \ function at low temperatures. While PUFAs do maintain\\nmembrane fluidity at low temperature and that could preserve\
    \ membrane function, I don\\u2019t think the context here\\nis sufficient to support this interpretation. Additionally,\
    \ not all PUFAs equally contribute to supplying protective\\nlipid mediators, so without specific stratified analysis\
    \ of different PUFA lipid types, it\\u2019s not possible to evaluate that\\nparticular part of this claim. However, it\\\
    u2019s possible that, if these protective mediator species (ARA/DHA/EPA) are\\nincreasing, then this interpretation could\
    \ be supported. We just don\\u2019t have enough information.\\n42\"\n  }\n]"
