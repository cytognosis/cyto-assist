    \ ran-\\ndomization, coloc for colocalization, and susieR for fine-mapping (Figure 5a). Kosmos autonomously executed the\\\
    nanalytical pipeline to identify protein candidates and propose mechanistic hypotheses.\\nThe colocalization analysis\
    \ failed due to cascading technical issues: many p-values stored as 0 caused Kosmos to\\nmisidentify thousands of variants\
    \ as lead SNPs, column name collisions during merging led to mismatched vector\\nlengths, and missing standard deviation\
    \ and MAF information prevented proper coloc execution [r12]. Rather than\\nattempting to repair the failed colocalization\
    \ pipeline, Kosmos proceeded to SuSiE fine-mapping.\\nThis analysis\\nidentified a credible set of directionally consistent\
    \ variants for superoxide dismutase 2 (SOD2) (PP.H4 = 1.00),\\nresolving the conflicting colocalization results and providing\
    \ strong evidence for pleiotropic effects.\\nBoth Kosmos and human MR analyses independently identified superoxide dismutase\
