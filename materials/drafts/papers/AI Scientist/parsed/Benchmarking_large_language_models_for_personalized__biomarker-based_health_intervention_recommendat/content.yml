  sections: "[\n  {\n    \"name\": \"Results\",\n    \"text\": \"The models we evaluated for advice quality on longevity interventions\\\
    nincluded Llama 3.2 3B, Qwen 2.5 14B, DeepSeek R1 Distill Llama 70B (DSR\\nLlama 70B), GPT-4o mini, o3 mini, GPT-4o, and\
    \ the (bio)medical \\ufb01ne-\\ntuned model Llama3 Med42 8B. Model responses were evaluated by GPT-\\n4o mini, serving\
    \ as the LLM-as-a-judge. For further details on model con-\\n\\ufb01guration as well as the selection and implementation\
    \ of the judge, we refer\\nto the \\u201cModels\\u201d section in Methods. The LLMs were tested across \\ufb01ve\\nsystem\
    \ prompts of varying complexity (\\u201cSystem prompts\\u201d in Methods),\\ndifferent age groups and comorbidities of\
    \ the individuals presented in the\\nbenchmark test items, as well as with and without RAG (\\u201cDomain back-\\nground\
    \ and Retrieval-Augmented Generation (RAG)\\u201d in Methods). The\\n\\u201cBenchmark datasetand test items / user prompts\\\
    u201d sections in Methods and\\nFig. 1 summarize the development of the benchmark.\\nAccuracy of LLM responses varies\
    \ signi\\ufb01cantly with validation\\nrequirements\\nAcross validation requirements and models, GPT-4o achieved the highest\\\
    noverall balanced accuracy, while Llama 3.2 3B obtained the lowest (Fig. 2a).\\nModel responses were generally considered\
    \ safe, but not very comprehen-\\nsive (Fig. 2b). Except for being safe, Llama 3.2 3B performed signi\\ufb01cantly\\nworse\
    \ than all other non-\\ufb01netuned models (P < 0.001), and GPT-4o pro-\\nduced responses that were signi\\ufb01cantly\
    \ more comprehensive, correct, use-\\nful, interpretable and explainable (P < 0.001) (Fig. 2c, Table 1). The effect of\\\
    nRAG was not consistent, as open-source models tended to bene\\ufb01t while\\nproprietary ones tended to deteriorate (Fig.\
    \ 2d, Table 1). We also evaluated\\nLlama3 Med42 8B, a (bio)medical \\ufb01ne-tuned model. Its responses were\\nsigni\\\
    ufb01cantly less comprehensive than those of all other models in the naive\\nsetting (without RAG, P < 0.001). Although\
    \ it outperformed or matched\\nLlama 3.2 3B on the remaining validation requirements, it still fell short of\\nthe other\
    \ tested models.\\nSystem prompt speci\\ufb01city and test case structure affect model\\nperformance\\nGPT-4o performed\
    \ signi\\ufb01cantly better than the other models across all\\nsystem prompts (P < 0.001) and achieved high performance\
    \ levels for even\\nthe least speci\\ufb01c prompts (\\u201cMinimal\\u201d, \\u201cSpeci\\ufb01c\\u201d, Fig. 3a). With\
    \ increasing\\nspeci\\ufb01city of the system prompt, medium-performing models (Qwen 2.5\\n14B, GPT-4o mini, DSR Llama\
    \ 70B) improved by 0.02 to 0.18 in terms of\\nbalanced accuracy (at maximum, from 0.26 to 0.44). Llama3 Med42 8B\\nshowed\
    \ its highest performance gains when using the most sophisticated\\nprompt, \\u201cReq. explicit\\u201d. Across system\
    \ prompts, top-performing models\\nexperienced insigni\\ufb01cant performance declines with the application of\\nRAG,\
    \ while modest but signi\\ufb01cant improvements were observed for lower-\\nperforming models (e.g., Qwen 2.5 14B; P <\
    \ 0.001 for \\u201cMinimal\\u201d and\\n\\u201cSpeci\\ufb01c\\u201d, P = 0.01 for \\u201cRole Encouraging\\u201d; Fig.\
    \ 3b). By contrast, the quality\\nof Llama3 Med42\\u2019s responses signi\\ufb01cantly decreased for \\u201cReq. speci\\\
    ufb01c\\u201d and\\n\\u201cReq. explicit\\u201d\\u2018 when RAG was applied (P < 0.001, Table 1). For further\\ninformation\
    \ on how the system prompts affected model accuracy across all\\nrequirements, please refer to Supplementary Tables 1\\\
    u20134 (Supplementary\\nSection K). The vulnerability of the models to variations in backgrounds\\n(short,verbose),pro\\\
    ufb01les(paragraph-based,list-based),anddistractors(with\\ndistractor, without distractor within a test case) was evaluated\
    \ in an ablation\\nstudy, in which all pro\\ufb01le variations resulting from the components of a test\"\n  },\n  {\n\
