    nwithin a prompt31,32, posing a risk in healthcare in particular. In our case,\\neven small modi\\ufb01cations in test\
    \ case structure (e.g., increased verbosity) led\\nto performance differences across prompt settings. However, LLMs\\\
    ndemonstrated stability when exposed to irrelevant (distracting) statements,\\nmaintaining focus onthe main query. This\
