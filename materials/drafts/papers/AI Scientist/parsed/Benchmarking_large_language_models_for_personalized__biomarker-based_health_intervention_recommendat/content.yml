    \ Medicine |  (2025) 8:631\\n3\\n\\ngenerated responses and their associated LLM judgments. The responses\\nwere sampled\
    \ randomly and evaluated in a blinded fashion. This experi-\\nment was conducted to assess the validity of the LLM-as-a-Judge\
    \ paradigm\\nin our setting. With Cohen\\u2019s kappa scores ranging from 0.69 (Llama3\\nMed42 8B) to 0.87 (Qwen 2.5 14B)\
    \ across models and from 0.63 (Safe) to\\n0.81 (Correct) across validation requirements, the results indicate con-\\nsistently\
    \ high alignment (Fig. 4; see \\u201cModels\\u201d in Methods).\"\n  },\n  {\n    \"name\": \"Discussion\",\n    \"text\"\
    : \"By testing performance across multiple validation requirements using\\nmodular, physician-approved test items, we\
    \ went beyond the exam-based\\nassessment of LLMs in a reproducible and transparent manner, allowing for\\nthe assessment\
    \ of free-text tasks. We evaluated proprietary and open-source\\nLLMs using a benchmark speci\\ufb01cally designed for\
    \ evaluating intervention\\nrecommendationsinthe\\ufb01eldsofgeroscienceandlongevitymedicine.Using\\nthe LLM-as-a-judge\
    \ approach, our \\ufb01ndings demonstrated that current\\nLLMs must still be used with caution for any unsupervised medical\
    \ inter-\\nvention recommendations. Indeed, LLMs showed inconsistent accuracy\\nacross validation requirements, rendering\
    \ benchmarks that measure single\\ndimensionsofmodelperformanceinsuf\\ufb01cienttocapturethefullcomplexity\\nof heterogeneous\
    \ and test-item-speci\\ufb01c model capabilities. This demon-\\nstrated the complexity of judging LLM responses, justifying\
    \ a detailed\\nanalysis by the automated judging approach described in Fig. 1. However,\\nwe note that automated judgment\
    \ cannot systematically validate all testing\\ndimensions for their alignment with human judgements; the only exception\\\
    nwas correctness, in the scenario where the expert-provided binary ground\\ntruth was either matched or not by the response\
    \ of the LLM (see Supple-\\nmentary Fig. 4 in Supplementary Section H). Then again, human judge-\\nments are prone to\
    \ heterogeneity, errors, and biases, and it remains for\\nfuture research to analyze their correlation with judgements\
    \ by LLM-as-\\na-judge.\\nOverall,open-sourcemodelstendedtoperformworsethanproprietary\\nmodels, and response quality\
    \ of the latter was mostly considered suf\\ufb01cient,\\ntriggering positive verdicts by the LLM-as-a-judge in most cases,\
    \ see Fig. 2.\\nIntriguingly, Llama3 Med42 8B, which as a biomedically \\ufb01ne-tuned model\\nwould be expected to perform\
    \ well, exhibited dif\\ufb01culties in generating\\nresponses that suf\\ufb01ciently met the validation requirements.\
    \ A potential\\ncontributing factor may be a strong alignment to the \\ufb01ne-tuning corpus\\n(over\\ufb01tting to speci\\\
    ufb01c tasks) and, thus, reduced ability to generalize to new\\ndatasets. Open-source models struggled particularly in\
    \ achieving suf\\ufb01cient\\ncomprehensiveness. Along these lines, a recent study found that around\\n90% of research\
    \ papers criticized the lack of comprehensiveness (de\\ufb01ned\\nheterogeneously, yet in alignment with our de\\ufb01nition)\
    \ in LLM-generated\\nmedical responses28. However, while a lack of comprehensiveness may\\nmean that LLM outputs fail\
    \ to reveal knowledge important to the user,\\ncomprehensive responses may be less comprehensible (useful) by over-\\\
    nwhelming the user. Moreover, a notable positive aspect was that all models\\nexhibited a high \\u201cConsideration of\
    \ Toxicity/Safety\\u201d, such that any lack of\\ncomprehensiveness does not tend to imply the recommendation of a\\nharmful\
    \ intervention. This may re\\ufb02ect an alignment of LLMs with common\\nhuman values, presumably a consequence of Reinforcement\
    \ Learning via\\nHumanFeedback(RLHF).Ofnote,thealignmentbetweenhumanraterand\\nLLM was lowest for the safety requirement\
    \ out of all requirements (Cohen\\u2019s\\nkappa of 0.63). The primary responses received higher ratings for safety\\\
    nfrom the human evaluator, implying that the generally high safety score in\\nthe full benchmark could even be an underestimate.\
    \ From an ethical\\nperspective, safety is fundamental (re\\ufb02ecting the principle of non-\\nmale\\ufb01cence), yet\
    \ in our application domain, overly cautious model\\nbehavior may mean that no intervention is recommended \\u2013 not\
    \ even\\ndiet or exercise; this may not be in the interest of the user. Also, while\\ncomprehensive responses may pose\
    \ cognitive challenges for users, a\\nlack of comprehensiveness may harm informed decision-making and\\nthus the principle\
    \ of autonomy. Ethically, comprehensiveness must\\nthus be balanced with comprehensibility; it cannot be neglected\\nwithout\
    \ compromising user empowerment29,30.\\nTable 1 | Mean balanced accuracy of models across validation requirements without\
