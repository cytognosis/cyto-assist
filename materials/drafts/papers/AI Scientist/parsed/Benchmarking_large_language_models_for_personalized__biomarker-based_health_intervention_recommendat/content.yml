    \ with simple prompts, showing only slight improvements\\nwhen given additional instructions.\\nIn our study, LLMs appeared\
    \ toexhibit age-related performance bias33,\\nwhich however may be induced by the differential incidence of diseases\\\
    nrepresented inthecorrespondingtest cases.Indeed,ourframeworkrevealed\\nthat LLMs are more likely to correctly identify\
    \ frequently observed degen-\\nerative diseases compared to rare hormonal conditions, demonstrating that\\nthe age bias\
    \ may be explained at least in part by the age-associated pre-\\nvalence of certain diseases, see Fig. 3c\\u2013e. RAG\
    \ led to model-dependent\\nincreases or decreases in accuracy. This is interesting since RAG is typically\\nused to mitigate\
    \ knowledge gaps and improve response quality. The\\nobserved decline in accuracy under RAG, as also noted in GPT-4o,\
    \ may be\\nattributable to alignment of the training data with biomedical content.\\nHowever, Llama3 Med42 8B also exhibits\
    \ a notable performance reduction.\\nThus, anotherexplanation could be that the introduction of non-relevant or\\nlow-utility\
