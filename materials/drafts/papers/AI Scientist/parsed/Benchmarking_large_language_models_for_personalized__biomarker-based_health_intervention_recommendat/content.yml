    n0.51 \\u00b1 0.01\\n\\u22120.03\\n0.72 \\u00b1 0.03\\n0.75 \\u00b1 0.02\\n+0.03\\nLlama3 Med42 8B\\n0.31 \\u00b1 0.06\\\
    n0.30 \\u00b1 0.01\\n\\u22120.01\\n0.39 \\u00b1 0.06\\n0.33 \\u00b1 0.03\\n\\u22120.06\\n0.54 \\u00b1 0.04\\n0.45 \\u00b1\
    \ 0.03\\n\\u22120.09\\nIn both scenarios (w/o RAG and with RAG), all models achieve their highest scores for the \\u201dgeriatric\\\
    u201d age group. Highest scores per column are printed in bold.\\nFig. 4 | Alignment between human rater and LLM-based\
    \ judge. a Mean balanced\\naccuracies achieved by the models across all validation requirements, as assessed by\\nthe\
    \ human rater and the LLM-based judge. b Overall accuracies per model. Both\\nsubplots additionally illustrate Cohen\\\
    u2019s kappa scores, which are used as a measure of\\nalignment between the human rater and the LLM-based judge. Error\
    \ bars indicate\\nvariability in alignment.\\nhttps://doi.org/10.1038/s41746-025-01996-2\\nArticle\\nnpj Digital Medicine\
    \ |  (2025) 8:631\\n6\\n\\nreadily accessible. Future work should examine scenarios with less complete\\ninput, and explore\
    \ the added complexity of typical user-LLM dialogues.\\nAnother limitation is the use of an LLM-as-a-Judge to evaluate\
    \ tested\\nLLMs, which may introduce model-speci\\ufb01c biases, that is, the tendency of\\njudgments to favor the responses\
    \ from certain models rather than assessing\\nthem based on, e.g., a prede\\ufb01ned metric. To mitigate this, we provided\\\
    nphysician-validated ground truths to the LLM-as-a-judge. Despite con-\\nducting experiments that examined the alignment\
    \ between a human rater\\nand the LLM-based judge, which demonstrated high inter-rater reliability\\nwithin our setting,\
    \ it should be noted that we did not perform a compre-\\nhensive human evaluation of the full benchmark dataset. Thus,\
    \ further\\nstudies are needed to assess the consistency of automated judgments, and\\nalso to compare these to human\
    \ evaluations. Furthermore, while our study\\nexamined performance differences based on age and disease, it did not\\\
    nexplore how other de\\ufb01nitions of the age groups, swapping ages within test\\ncases, or including a higher variety\
    \ of diseases might in\\ufb02uence LLM beha-\\nvior. More elaborate item templates, e.g., by \\u201csymbolization\\u201d32,\
    \ are left to\\nfutureinvestigations.Inaddition,wefocusedonintegrating\\ufb01vewell-known\\nlongevity interventions, but\
    \ have to acknowledge that this selection is not\\nable to capture all available interventions. We focused on longevity\
    \ inter-\\nventions with enough evidence to form an expert opinion, which excludes\\nmany experimental and more recent\
    \ interventions.\\nPopular medical and biomedical benchmarks, including MedQA,\\nMedMCQA, MultiMedQA and the MIMIC datasets\
    \ (including MIMIC-\\nIII36, MIMIC-IV-ED37, MIMIC-IV-ICD38) primarily assess LLM perfor-\\nmance using multiple-choice\
    \ question formats. While valuable, these\\napproaches often fail to capture important nuances of model capabilities,\\\
    nsuch as personalization or robustness in open-ended tasks. Here, we\\ndeveloped a benchmark designed to evaluate LLMs\
    \ across \\ufb01ve validation\\nrequirementsusingmodular,open-endedtestitems.Theseitemsfocusedon\\npersonalized intervention\
    \ recommendations in geroscience and longevity\\nmedicine and were aligned with physician expertise through expert\\nannotation.\\\
    nOur\\nsystematic\\nand\\nautomated\\nmodel\\nevaluation\\napproach enables testing LLMs in various medical domains. Future\\\
    nwork could explore the extension of our framework to real-world\\nclinical settings and continuous evaluation as models\
    \ evolve. To\\nfacilitate this effort, the frameworks used and developed in this study\\nare freely available and intended\
    \ to be adapted and extended by other\\nresearchers for benchmarking models in diverse medical or other\\nresearch contexts.\"\
    \n  },\n  {\n    \"name\": \"Methods\",\n    \"text\": \"Benchmark dataset and test items/user prompts\\nWe developed\
    \ a benchmark of 25 test items assessing personalized LLM\\nadvice on longevity interventions and then tested the LLMs\
    \ across the\\nmentioned 5 validation requirements, as de\\ufb01ned comprehensively in Sup-\\nplementary Section A; in\
    \ most evaluation scenarios, these requirements\\nwere given as an explicit guide to the LLM-as-a-judge. We emphasize\
    \ that\\nthe test items comprise synthetically drafted medical pro\\ufb01les for bench-\\nmarking purposes; no real patient\
    \ data was used.\\nOne of us (HJ) drafted the test items along with the ground truths,\\nwhich centered around expert\
    \ commentaries with keywords, describing\\nwhat is expected from the LLM response, such as the gains and caveats to\\\
    nconsider. In this context, the keywords distill the core content of the expert\\ncommentaries and function as supplementary\
    \ input for the LLM-as-a-\\nJudge. Additionally, each query was designed so that a \\u201cYes\\u201d or \\u201cNo\\u201d\\\
    nresponse (binary ground truth) could be assigned, indicating whether an\\nintervention is recommended or not, see Supplementary\
    \ Section B.\\nFour domain experts (AH, BZ, CB, SF) reviewed the test items and\\nground truths in three rounds (\\u201cBenchmark\
    \ Development\\u201d in Fig. 1).\\nInitially, subsets of items were reviewed independently (\\u201c1st\\u201d [round of\\\
    nexpert assessment] in Fig. 1), followed by a revision of the full benchmark in\\nthe second round (\\u201c2nd\\u201d\
    \ [round of expert assessment] in Fig. 1). The test\\nitems were then structured into standardized modules: background\
    \ infor-\\nmation, biomarkerpro\\ufb01le, and the \\ufb01nal binary question (\\u201cYes\\u201d or \\u201cNo\\u201d).\
    \ To\\nsimulate diverse conversational scenarios, variations were created by\\nrephrasingbackgroundsandpro\\ufb01lesintodifferentformats(shortorverbose\"\
    \n  },\n  {\n    \"name\": \"backgrounds, paragraph-based or list-based pro\\ufb01les), with an additional\",\n    \"\
    text\": \"\\u201cdistracting statement\\u201d - placed at the end of a test case or not, to test the\\nLLM\\u2019s robustness\
    \ against irrelevant information (\\u201cRephrasing\\u201d in Fig. 1). In\\nthe third round, all experts re-reviewed the\
    \ full benchmark (\\u201c3rd\\u201d [round of\\nexpert assessment] in Fig. 1). The\\ufb01nal structure of a test item\
    \ is illustratedin\"\n  },\n  {\n    \"name\": \"Supplementary Fig. 1, while the development of this structure during\
    \ the\",\n    \"text\": \"three-round expert review process is shown in Supplementary Fig. 2 (see\"\n  },\n  {\n    \"\
    name\": \"Supplementary Section B)\",\n    \"text\": \"During automated benchmarking (\\u201cExecution\\u201d in Fig.\
    \ 1) eight dif-\\nferent test cases were thus created from one test item\\u2019s modules and used as\\nuser prompts. Together\
    \ with \\ufb01ve different system prompts (see below), this\\nmodular approach enabled the automated generation of 8 *\
    \ 5 *\\n25 = 1000 test cases from the 25 modular items. The structure of a\\n\\ufb01nalized test case and its combinatorial\
    \ assembly are illustrated in\"\n  },\n  {\n    \"name\": \"Supplementary Sections B and C. All 25 test items are listed\
    \ in\",\n    \"text\": \"\"\n  },\n  {\n    \"name\": \"Supplementary Section D\",\n    \"text\": \"Domain background\
    \ and Retrieval-Augmented\\nGeneration (RAG)\\nThe benchmarking data features clinical biomarker data from various\\nindividuals\
    \ who wish to undertake one or a combination of the following\\nlongevity interventions: caloric restriction (n = 6),\
    \ intermittent fasting\\n(n = 4), exercise (n = 5), a combination of caloric restriction and exercise\\n(n = 4), and the\
    \ intake of supplements or drugs commonly associated with\\nhealth effects. The latter are Epicatechin (n = 2), Fisetin\
    \ (n = 1), Spermidine\\n(n = 1), and Rapamycin (n = 2); see Supplementary Section E for back-\\nground information. Furthermore,the\
    \ individuals were categorized into the\\nfollowing age groups: young (20\\u201339 years, n = 11), mid-aged (40\\u201360\
    \ years,\\nn = 7), and elderly/geriatric (>60 years, n = 7). Five young and mid-aged\\npro\\ufb01les indicate the presence\
    \ of the risk for an underlying hormonal dis-\\norder (hypothyroidism, cushing syndrome, acromegaly, and polycystic\\\
    novarian syndrome [PCOS]) for which longevity interventions should not be\\nthe primary recommendation. Additionally,\
    \ for four \\u201cgeriatric\\u201d pro\\ufb01les, the\\napplication of longevity interventions is contraindicated due\
    \ to age-related\\nmusculoskeletal (osteoporosis and sarcopenia) or cardiovascular (coronary\\nartery disease, two cases)\
    \ diseases, along with their respective comorbidities.\\nThese diseases are noted, together with potential differential\
    \ diagnoses, in\\nthe expert commentaries.\\nTo test the effect of RAG on LLM response quality,weappended RAG-\\nbased\
    \ data to the user prompts, for which a vector database was created\\nusing QDrant (https://qdrant.tech/), containing\
    \ approximately 18 000\\nopen-sourcescienti\\ufb01cresearchpaperswithfocusonthe\\ufb01eldsofgeroscience\\nand longevity\
    \ medicine, see Supplementary Section F.\\nSystem prompts\\nWe de\\ufb01ned \\ufb01ve different system prompts with varying\
    \ complexity that\\nare automatically combined with the user prompts, where the infor-\\nmation content of the instructions\
    \ increases from \\u201cMinimal\\u201d towards\\n\\u201cRequirements-explicit\\u201d. \\u201cMinimal\\u201d prompts the\
    \ LLM to return, at the\\nend of the answer, either \\u201cYes\\u201d or \\u201cNo\\u201d, stating whether the inter-\\\
    nvention is recommended or not. \\u201cSpeci\\ufb01c\\u201d adds that the query relates\\nto longevity medicine, geroscience,\
    \ aging research and geroprotection.\\n\\u201cRole encouraging\\u201d additionally integrates a de\\ufb01nition of the\
    \ advisory\\nrole that the LLM is expected to assume. \\u201cRequirements-speci\\ufb01c\\u201d\\nfurther lists the \\\
    ufb01ve validation requirements the LLM should ful\\ufb01ll in\\nits response, while \\u201cRequirements-explicit\\u201d\
    \ additionally provides the\\nde\\ufb01nitions of these requirements. The instructions to the LLM-as-a-\\njudge then included\
    \ the test case, the response of the LLM being\\nevaluated and the expert annotated ground truths, see Fig. 1, while the\\\
    nbinary ground truth was added only in some evaluation scenarios\\nwhen the LLM-as-a-judge had to evaluate the correctness\
    \ of a model\\nresponse; for more information on the system prompts see Supple-\\nmentary Section G.\\nhttps://doi.org/10.1038/s41746-025-01996-2\\\
    nArticle\\nnpj Digital Medicine |  (2025) 8:631\\n7\\n\\nModels\\nProprietary LLMs available in February/March 2025 included\
    \ GPT\\n(Generative Pretrained Transformer) series models (OpenAI), speci\\ufb01-\\ncally o3-mini (with \\u201creasoning\
    \ effort\\u201d set to medium), GPT-4o and GPT-\\n4o mini, while open-source models selected were Llama 3.2 3B (by\\nMeta)39,\
    \ Qwen 2.5 14B and DeepSeek R1 Distill Llama 70B (DSR Llama\\n70B for short), which is built based on Llama 3.3 70B. All\
    \ models were\\naccessed via the appropriate APIs (OpenAI API, Groq, LMStudio).\\nConsidering the biomedical orientation\
    \ of our benchmark, it was of\\nparticular interest to evaluate how biomedical \\ufb01ne-tuned models perform\\nin the\
    \ test. We selected Llama3 Med42 8B40, an 8 billion-parameter\\ndomain-tuned model trained on biomedical literature and\
    \ datasets, and\\n\\ufb01rst evaluated it alongside OpenBioLLM3 8B. Prior to our benchmark,\\nboth models thus underwent\
    \ a pre-assessment using the AMEGA\\nBenchmark23, which is oriented toward clinical treatment recommen-\\ndations. We\
    \ integrated all 20 AMEGA cases, along with the 135 questions\\nand their corresponding ground truths, into our paradigm,\
    \ and executed\\nthe AMEGA Benchmark on the two biomedical models and the 6 models\\nwe already introduced. Llama3 Med42\
    \ 8B (balanced accuracy: 0.63)\\noutperformed OpenBioLLM3 8B (0.36) but both models performed\\nworse than open-source\
    \ and proprietary models (e.g., Qwen 2.5 14B:\\n0.82, GPT-4o: 0.89). Llama3 Med42 8B was thus chosen for inclusion in\\\
    nour benchmark. For more information we refer to Supplementary Fig. 3\\n(Supplementary Section H).\\nLlama 3.2 3B, Qwen\
    \ 2.5 14B, DSR Llama 70B, GPT-4o mini,\\no3 mini and GPT-4o were evaluated in the time period February-\\nMarch 2025.\
    \ Llama3 Med42 8B and OpenBioLLM3 8B were tested in\\nAugust 2025. Except for o3-mini, all models were tested using greedy\\\
    ndecoding (temperature 0). o3-mini was used with default temperature\\nsettings (temperature = 1), as OpenAI offered this\
    \ model only\\nthrough an API program which does not allow for custom adjust-\\nments of temperature.\\nTo further elucidate\
    \ the robustness of the judgements within the \\ufb01nal\\ntesting environment for the main benchmark, both GPT-4o mini\
    \ and GPT-\\n4owereusedtoassesscorrectnessintwoevaluationsettings:onewhengiven\\nthe binary ground truth (standard setting)\
    \ and one without. We selected\\nGPT-4o mini as the \\ufb01nal LLM-as-a-Judge for our experiments because\\nGPT-4o mini\\\
    u2019s judgments showed higher alignment with the ground truth\\nin both evaluationsettings,while acomparativeanalysisacrossallvalidation\\\
    nrequirements revealed that both models showed high interrater reliabilities\\nfor Correctness. For further information\
    \ please refer to Supplementary Figs.\\n4 and 5 (Supplementary Section H).\\nTo assess the agreement between LLM-based\
    \ judgments and human\\nevaluation, we conducted an alignment check using randomly sampled test\\nitem variations. Model\
    \ responses were blindly evaluated by a human rater\\n(HJ)acrossallvalidationrequirements,resultinginatotalof1000individual\\\
    njudgments.ThesehumanratingswerethencomparedwiththoseofGPT-4o\\nmini (Fig. 4).\\nPerformance evaluation\\nThe BioChatter\
    \ framework27,41 was used for automated performance\\nassessment, including the collection of model outputs providing\
    \ these\\ntogether with the ground truths to the LLM-as-a-Judge; this was done\\nn = 4 times, and repeated with RAG for\
    \ the responding (not the\\njudging) LLM. For each response, the judgement was conducted two\\ntimes, returning a verdict\
    \ (score) in binary format, e.g., \\u201ccompre-\\nhensive\\u201d or \\u201cnot comprehensive\\u201d for comprehensiveness;\
    \ this resul-\\nted in 280000 verdicts. Then, the verdicts were transformed to binary\\nnumeric values consisting of 0\
    \ (failure, e.g., \\u201cnot comprehensive\\u201d)\\nand 1 (success, e.g., \\u201ccomprehensive\\u201d). Judgement was\
    \ performed\\ntwice, and 1% of all judgements resulted in an intermediate score of\\n0.5. These were binarized as \\u201c0\\\
    u201d (failure). For further information on\\nthe judgement procedure, we refer to Fig. 1, and Supplementary\\nSections\
    \ I (structure of the judgement framework) and J (example\\ninteraction between researcher and framework).\\nStatistical\
    \ analysis\\nStatistical analyses were conducted using Pingouin (0.5.5)42, Scikit-learn\\n(1.6.1)43 and SciPy (1.15.2)44\
    \ in Python (version 3.11.2). The mean balanced\\naccuraciesofthemodelsweredeterminedbasedontheLLMjudge\\u2019sverdicts\\\
    nand compared across models. To evaluate overall differences in balanced\\naccuracy among all models for each validation\
    \ requirement and system\\nprompt, we applied Cochran\\u2019s Q test. Pairwise differences in model\\naccuracies were\
    \ assessed using McNemar\\u2019s test. To examine differences in\\ngroupedmodelaccuracyacrossagegroups,weusedtheChi-squaretest.Ap-\\\
    nvalue of P < 0.05 was considered statistically signi\\ufb01cant. All p-values were\\nBonferroni-corrected to account\
    \ for multiple comparisons. The perfor-\\nmance of the models is measured as their balanced accuracy scores in\\naddressing\
    \ the evaluation criteria, i.e., the validation requirements. Inter-\\nrater reliabilities were evaluated by calculating\
    \ Cohen\\u2019s kappa.\"\n  },\n  {\n    \"name\": \"Data availability\",\n    \"text\": \"The benchmarking data are openly\
