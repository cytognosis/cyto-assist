    u2013\\nclinician satisfaction.\"\n  },\n  {\n    \"name\": \"Conclusion\",\n    \"text\": \"We envision context switching\
    \ as the defining paradigm of medical AI.\\nRather than building separate models for each specialty or health system,\\\
    nfuture models can adjust their reasoning at test-time to multimodal data,\\nclinicians, patients and decisions required\
    \ in context. This shift moves\\nmedical AI beyond narrow, static tools toward models that reflect the\\ncomplexity and\
    \ variability of clinical practice. Medical care spans diverse\\nspecialties, populations and workflows that differ across\
    \ settings and\\nevolve over time. To remain reliable, models can respond to this varia-\\ntion without manual adjustment.\
    \ Context switching models can adapt\\nin real-time, reduce dependence on curated data and support consist-\\nent performance\
    \ across health systems. Progress must move beyond\\ncomputational benchmarking toward contextual, decision-centered\\\
    nevaluation that aligns medical AI models with goals that matter in specific\\nclinical contexts. Context switching AI\
    \ models can scale to match the\\ncomplexity of real-world clinical practice and the diversity of patients.\"\n  },\n\
