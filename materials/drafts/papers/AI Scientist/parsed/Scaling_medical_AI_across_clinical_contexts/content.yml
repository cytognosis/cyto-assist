  sections: "[\n  {\n    \"name\": \"BOX 1\",\n    \"text\": \"Early approaches to context\\nswitching in medical AI\\nSeveral\
    \ approaches illustrate how models begin to adapt their\\nbehavior in varying degrees across contexts:\\nPrompt engineering.\
    \ Input instructions supply the missing context\\nand narrow the search space of possible outputs29.\\nIn-context learning.\
    \ Zero-shot or few-shot examples in the prompt\\nshow the model how to perform a task in a new setting27,28.\\nContext\
    \ discovery. Algorithms identify, retrieve and compress the\\nmost relevant evidence from external data sources, re-rank\
    \ it by\\nuser constraints and feed it into the model115.\\nSupervised fine-tuning. Models update on curated datasets\
    \ to\\nperform a target task. Parameter-efficient fine-tuning achieves\\nsimilar performance with fewer resources; full\
    \ fine-tuning is\\nreserved for cases that require large behavioral shifts26,30\\u201333.\\nPost-pretraining adaptation.\
    \ Multi-round refinement adjusts model\\nbehavior and aligns outputs with user intent. Techniques include\\ninstruction\
    \ tuning to follow instructions116,117, domain-adaptive and\\ntask-adaptive pretraining to capture specialized vocabulary\
    \ and\\npatterns118, and adaptations that teach models to use tools and call\\nfunctions119. Preference optimization,\
    \ often implemented through\\nreinforcement learning from human feedback, further aligns\\noutputs with user expectations99.\\\
    nAgent models. Autonomous large language model agents plan,\\nreason and act across contexts90. Specialized components\
    \ for\\nplanning, memory, tool use or task decomposition collaborate on\\nmultistep workflows and adjust outputs based\
    \ on feedback from\\none another.\\n\\nNature Medicine | Volume 32 | February 2026 | 439\\u2013448\\n442\\nPerspective\\\
    nhttps://doi.org/10.1038/s41591-025-04184-7\\nlearn joint representations from raw inputs, and hybrid approaches\\ncombine\
    \ both79\\u201382. Cross-modal attention mechanisms, which let\\nthe model focus on related cues across data types (for\
    \ example,\\nlinking an imaging finding to the relevant note text), help align\\nsemantically related information, while\
    \ modality-specific encoders\\npreserve details unique to each modality30,32,74. To cope with missing\\nor variable inputs,\
    \ models may downweight unavailable data, rely on\\nalternative sources, or flexibly incorporate new modalities without\\\
    nretraining77,78. Using language as a shared interface, these systems can\\nshift across modalities to integrate the information\
    \ most relevant to\\nthe clinical context.\\nMultimodal context switching enables models to adjust their\\nuse of different\
    \ data modalities dynamically at inference time based\\non the clinical setting and available inputs83. For example, a\
    \ model\\nmay rely on histopathology images to classify a tumor when slides\\nare available, but shift to lab values and\
    \ clinical notes when imaging is\\nmissing. Beyond substituting one modality for another, multimodal\\ncontext switching\
    \ allows models to combine data types that are not\\nco-observed during training, such as ECG waveforms and genetic\\\
    nvariants in cardiology risk assessments. This behavior requires models\\nto infer which modalities are most informative,\
    \ detect redundancy or\\nmissingness, and reweight their reasoning in real-time. Retrieval-based\\ncontext discovery (Box\
    \ 1) can realize this capability by considering\\nuser-defined metrics on clinical informativeness in the re-ranking step.\\\
    nPreference optimization (Box 1) can allow a model to learn a reward\\nfunction that aligns model outputs with human preferences\
    \ based\\non a set of human-annotated examples (see \\u2018reward hacking\\u2019, Box 2).\\nFurther supporting this flexibility\
    \ are mechanisms like attention-based\\nmodality selection, uncertainty-aware fusion, and mixture-of-modality\\nexperts\
    \ that specialize based on the task and context84\\u201387.\\nWithout context switching, multimodal models can be fragile\\\
    nwhen the available data change. A system built to combine pathology\\nslides and clinical notes may work well when both\
    \ are present, but may\\nstruggle when the slide is delayed, the note is sparse, or key tests are\\nmissing. Context switching\
    \ aims to make these models more flexible:\\nit helps them use whatever information is available, shift emphasis as\\\
    nnew results arrive, and avoid overreliance on a single modality. This\\nflexibility matches how clinical decisions are\
    \ made in practice, where\\ninformation is often incomplete and evolves over time. As clinical\\ndata become more varied\
    \ and complex, models must be able to han-\\ndle missingness and uncertainty while still producing outputs that\\nremain\
    \ reliable.\\nReasoning in context through multistep analysis\\nHybrid models offer a modular design for achieving context\
    \ switch-\\ning across tasks, modalities, and user roles. These models combine\\nideas from multimodal learning, where\
    \ models jointly interpret diverse\\ndata types, and generative modeling, where outputs are conditioned\\non specific\
    \ contextual signals. Compound models, such as agents\\n(Box 1), provide a modular foundation for context switching. In\
    \ these\\nmodels, different subagents are trained to specialize in distinct tasks,\\ndata modalities85,86, or clinical\
    \ domains88,89, and are orchestrated to\\nsolve problems that require context-specific adaptation90. For exam-\\nple,\
    \ a dermatology case involving both imaging and text may trigger\\na vision agent specializing in skin lesion classification\
    \ and a language\\nagent that processes clinical notes describing symptom progression.\\nRouting decisions are either\
    \ optimized during training or dynamically\\ninferred at test-time, based on features of the input or task prompt. This\\\
    napproach enables efficient specialization and reduces unnecessary\\ncomputation, but relies on robust mechanisms to manage\
    \ transitions\\nbetween components.\\nAgents are goal-directed models that decompose complex tasks\\ninto subtasks, plan\
    \ actions, and interact with data, tools, or users in\\nreal-time88\\u201390. Agent models typically consist of multiple\
    \ specialized\\nagents, each trained to perform a distinct function (for example, infor-\\nmation retrieval, question\\\
    u2013answering, decision support or patient\\ncommunication). Context switching in this setting refers to selecting\\\
    nand orchestrating the appropriate agent or submodel based on features\\nof the task, user role, or available data. For\
    \ example, an agent coordi-\\nnating cardiovascular risk assessment may activate one subagent to\\nextract patient history,\
    \ another to synthesize lab results, and a third\\nto generate a summary tailored to a clinician or patient.\\nRather\
    \ than relying on single agents to generalize across tasks, a\\nmulti-agent approach applies context switching by routing\
    \ tasks to\\nthe most relevant experts. A supervisory or executive agent interprets\\ninput features, such as the type\
    \ of clinical query, user background, or\\ndata modality, and assigns subtasks to specialized agents. Coordina-\\ntion\
    \ can be implemented through gating functions, learned routing\\npolicies, or rule-based controllers that use structured\
    \ metadata to\\ndirect workflows. For example, a pharmacovigilance workflow may\\nuse agents for adverse event detection,\
    \ regulatory interpretation, and\\ncausal inference, with an executive agent selecting which experts to\\nengage depending\
    \ on whether the task is clinical trial monitoring or\\npost-market surveillance. In this setting, context switching arises\
    \ not\"\n  },\n  {\n    \"name\": \"BOX 2\",\n    \"text\": \"Opportunities for context\\nswitching in medical AI\\nContext\
    \ switching is an emerging paradigm with multiple\\nopportunities for innovation. Five open challenges in medical AI\\\
    nhighlight where context switching can have immediate impact:\\nInsufficient context in the query. When context is missing,\
    \ models\\ncan struggle to narrow the search space and often reach incorrect\"\n  },\n  {\n    \"name\": \"conclusions.\
