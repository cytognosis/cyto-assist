    n443\\nPerspective\\nhttps://doi.org/10.1038/s41591-025-04184-7\\nfrom each agent altering its reasoning strategy, but\
    \ from routing and\\nassigning the right expert agents to the clinical context.\\nModels that perform multistep analysis\
    \ represent a key direction\\nfor context switching in medical AI. Reasoning models learn infer-\\nence procedures that\
    \ chain intermediate steps to address tasks, such\\nas diagnosis, treatment selection, or risk prediction91\\u201393.\
    \ Reasoning\\nmodels, often built on large language models fine-tuned with rein-\\nforcement learning or supervised traces,\
    \ learn both the final output\\nand the sequence of reasoning steps that generate it93,94. This abstrac-\\ntion makes\
    \ reasoning models well-suited for context switching, since\\nreasoning strategies can often transfer across tasks. For\
    \ example,\\ngiven a patient\\u2019s symptoms, a reasoning model might infer a molecular\\ndiagnosis by sequentially identifying\
    \ phenotype-gene associations,\\nretrieving pathogenic variants, and ranking candidate genes. The\\nsame model could then\
    \ apply a similar reasoning process to identify\\ntreatment options, retrieve drugs that target the implicated gene,\\\
    nevaluate drug indications, and prioritize therapies based on safety and\\nefficacy. Context switching in reasoning models\
    \ occurs not by chang-\\ning the model architecture, but by adjusting the sequence and struc-\\nture of inference steps\
    \ based on the input prompt. In a novel context,\\nreasoning models can facilitate multi-turn collaboration34 with users,\\\
    nin which the model iteratively identifies the gaps in its knowledge or\\nthe given user instruction and prompts the user\
    \ to provide additional\\nguidance (Box 2).\\nA central challenge in developing reasoning models is designing\\nreward\
    \ functions that guide the model through intermediate steps of\\nclinical reasoning94. These functions must assess the\
    \ final prediction as\\nwell as the clinical relevance and plausibility of each step. For example,\\nin differential diagnosis\
    \ from patient symptoms89, a reward function\\nmight penalize inconsistencies between symptoms and candidate diag-\\nnoses,\
    \ reward logical progression in differential diagnosis from com-\\nmon to rare conditions, and prioritize hypotheses that\
    \ fit the patient\\u2019s\\ndemographic and clinical context. This structure encourages models\\nto revise reasoning when\
    \ context shifts, such as when new symptoms\\nappear or the task changes from screening to treatment planning95.\\nReward\
    \ functions must align with clinical objectives, including reduc-\\ning diagnostic error, avoiding unnecessary procedures,\
    \ and improving\\ncontinuity of care (Box 2). Reasoning models that incorporate such\\ncontext-aware rewards can adjust\
    \ how they interpret and prioritize\\ninformation and adapt to clinical goals and constraints.\\nMedical AI adapts to\
    \ who, where, what it serves\\nMedical AI must do more than process multimodal inputs or scale across\\ncomputing infrastructure.\
    \ It must adapt to the contexts of care, align-\\ning with patient needs, care settings, and clinical workflows. Varia-\\\
    ntion across four key domains\\u2014specialty, geography, population and\\naccess\\u2014expose the limits of static models\
    \ and make context switching a\\nrequirement for medical AI. Below, we use clinical vignettes to illustrate\\nthe importance\
    \ of context switching across each of these domains.\\nBridging medical specialties and disease contexts\\nPatients often\
    \ face fragmented care in siloed health systems or\\nresource-limited regions, leading to diagnostic odysseys and delays\\\
    nor errors in care96,97. Context switching models enable clinicians to\\ndraw on knowledge across specialties and disease\
    \ domains, including\\nareas beyond their own expertise, to guide clinical decisions (Fig. 2a).\\nClinical vignette. Consider\
    \ a patient with a rare disease who presents\\nwith neurological and pulmonary symptoms. The patient is referred to\\\
    na neurologist and a pulmonologist, each with deep expertise shaped\\nby shared foundational training and system-level\
    \ reasoning. Yet even\\nbroad training can be constrained by framing effects that narrow the\\ndifferential diagnosis\
    \ to more common or organ-specific causes. If\\nthe symptoms reflect a multisystem disorder, this framing may lead to\\\
    nmissed connections or delayed diagnosis. Context switching models\\ncan support clinicians by integrating knowledge across\
    \ specialties,\\nidentifying shared pathophysiology and generating a unified diagnosis\\nand treatment plan. A related\
    \ challenge arises in polypharmacy, when\\nmultiple physicians prescribe treatments for different conditions\\nwithout\
    \ visibility into overlapping risks or drug\\u2013drug interactions.\\nContext switching models can mitigate these issues\
    \ by synthesizing\\ncross-specialty knowledge, reasoning across comorbidities and tailor-\\ning treatment to minimize\
    \ therapeutic conflicts.\\nContext switching across specialties and disease domains remains\\ndifficult because both care\
    \ and model development often follow\\nspecialty-specific boundaries. Foundation models trained on siloed\\ndatasets or\
    \ optimized for narrow objectives can reproduce the same\\nlimitations seen in human reasoning. Overcoming this requires\
    \ models\\nthat perform multimodal reasoning and generalize across specialties,\\ndiseases and combinations of data types,\
    \ even when those combina-\\ntions are absent during training.\\nData. Without context-specific datasets, models cannot\
    \ generalize\\nacross specialties and diseases. Domain expertise can be used to curate\\ndiverse instructions (for example,\
    \ chain-of-thought98 reasoning steps\\nthat improve generalization to complex tasks) or response-preference\\nsets (for\
    \ example, human-annotated rankings of model outputs that\\nalign responses with user preferences99) for each specialty\
    \ or disease.\\nA useful resource for enabling context switching is a prompt library: a\\nstructured collection of multimodal\
    \ prompts linked to specific special-\\nties and disease scenarios.\\nModel. Medical specialties rely on complementary\
    \ data for diagnosis\\nand treatment. For example, evaluating heart failure may require elec-\\ntrocardiograms, blood\
    \ tests and chest X-rays. In neurology, diagnosing\\na seizure disorder may involve electroencephalograms, brain imaging\\\
    nand genetic testing. Multimodal models that identify and prioritize the\\nmost relevant data for a given clinical context,\
    \ such as through context\\ndiscovery (Box 1), can support context switching across specialties\\nand diseases.\\nEvaluation.\
    \ Model generalizability is critical for context switching. A\\nmodel should not fail when faced with a new context that\
    \ requires a\\nnovel combination of data modalities. This necessitates benchmarks\\nthat assess whether models can identify\
    \ the correct contexts, generate\\nresponses relevant to the specialty or disease, and align outputs with\\nspecialist\
    \ preferences100\\u2013103. These benchmarks must also minimize\\ndata contamination (for example, overlap between pretraining\
    \ and\\ntest datasets) to provide a valid measure of model generalizability104,105.\\nTailoring care to geography and\
    \ population\\nUnderstanding the incidence, prevalence and mortality rates of health\\nconditions in specific populations\
    \ is essential for tailoring clinical deci-\\nsions106. For example, isoniazid preventive therapy is recommended\\nby\
    \ the World Health Organization for people living with HIV in high\\ntuberculosis burden settings, even in the absence\
    \ of active tuberculo-\\nsis. However, there is ongoing debate about when to initiate isoniazid\\npreventive therapy,\
    \ especially relevant at the time of HIV diagnosis,\\ndue to concerns about adherence, resistance and regional variation\\\
    nin tuberculosis risk107. These decisions depend on global guidelines\\nas well as on local epidemiology, healthcare infrastructure\
    \ and social\\ncontext. For contextualized care, models need to interpret and apply\\nguidelines in light of regional\
    \ disease patterns, resource availability\\nand population needs106,108,109 (Fig. 2b).\\nClinical vignette. Consider a\
    \ patient who is susceptible to a disease that\\ncan lead to organ dysfunction. To monitor the patient\\u2019s disease\
    \ risk, a\\nclinician leverages an international scoring function to regularly assess\\norgan or tissue function using\
    \ the patient\\u2019s EHR data. A key challenge\\nof designing such a scoring function is to avoid introducing contextual\\\
    n\\nNature Medicine | Volume 32 | February 2026 | 439\\u2013448\\n444\\nPerspective\\nhttps://doi.org/10.1038/s41591-025-04184-7\\\
    nerror by assigning different scores to patients with similar clinical\\nprofiles based only on geography or demographic\
    \ attributes, such\\nas age, sex or race. These discrepancies often arise from uncalibrated\\nmodels that ignore variation\
    \ in healthcare delivery, disease prevalence\\nor access to care across settings. As a result, identical physiological\\\
    ninputs may yield different recommendations depending on context,\\nleading to inappropriate care. Context switching models\
    \ address this\\nby incorporating region-specific information, such as care practices,\\nhealth infrastructure or disease\
    \ incidence, directly into score computa-\\ntion. A multicenter model can switch across country-level contexts to\\nalign\
    \ with local systems and guidelines, while a multi-population model\\ncan detect subgroup-specific patterns and adapt\
