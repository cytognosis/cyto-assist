    nData. Patient-level data vary substantially across settings, even within\\nthe same country. Differences in documentation,\
    \ diagnostic workflows\\nand data completeness can limit the portability of models. Although\\nregional systems and guidelines\
    \ also influence care, the most immedi-\\nate challenge is variability in the underlying data. To support context\\nswitching,\
    \ models must be trained on datasets that capture this hetero-\\ngeneity. Engaging local experts and building regionally\
    \ representative\\ndatasets enable models to capture both how care is delivered and why\\nit varies across contexts.\\\
    nModel. To generate context-specific recommendations, a reason-\\ning model can integrate multistep logic that captures\
    \ both general\\nclinical objectives and local constraints. This includes treatment-level\\ndecisions (for example, choosing\
    \ a therapy based on symptoms) and\\nfine-grained adjustments (for example, adapting dosing schedules or\\ncare settings\
    \ to local resource availability). For instance, a model can\\nbe trained on human-annotated chain-of-thought reasoning\
    \ traces\\nto capture this nuanced multistep decision-making process. A con-\\ntext switching model can identify which\
    \ factors vary across popula-\\ntions and incorporate them into its reasoning process to produce\\ncontext-appropriate\
    \ outputs.\\nEvaluation. Working with local and regional experts makes it possible\\nto define metrics that evaluate whether\
    \ model outputs align with guide-\\nlines and common practices in specific populations and geographies.\\nAccuracy and\
    \ robustness can also be measured by the trust of the target\\npopulation in the model\\u2019s recommendations and their\
    \ acceptance of\\nits use in the community110.\\nDemocratizing access without reinforcing inequities\\nAccess to medical\
    \ care can be constrained by socioeconomic, geo-\\ngraphic, financial and cultural factors111,112 (Fig. 2c). Context switching\\\
    ncan adapt to patient needs, care settings and communication styles113,\\nbut if models are built on biased data or without\
    \ input from diverse\\ncommunities, they risk reinforcing inequities. The impact of context\\nswitching depends on the\
    \ model\\u2019s design, who develops it and whose\\ncontext it reflects114.\\nClinical vignette. Consider a patient who\
    \ arrives at the emergency\\ndepartment experiencing severe symptoms. The patient has fre-\\nquently missed wellness visits.\
    \ Although referred to oncology, the\\npatient has not followed up. A typical response might be for the cli-\\nnician\
    \ to remind the patient to schedule the appointment, but this\\noverlooks key contextual barriers. The patient may live\
    \ far from a\\nspecialty clinic, lack reliable transportation or childcare, or be unable\\nto take time off work. Without\
    \ accounting for these constraints, the\\nsystem risks recommending care that the patient cannot access: a\\ncontextual\
    \ error.\\nContextualized care incorporates these constraints. A more\\nappropriate intervention can be to assign the\
    \ patient a personalized\\nmedical chatbot for symptom monitoring (for example, automatic\\nprompting by the chatbot to\
    \ record symptoms or synchronizing\\nmeasurements captured by mobile health monitoring applications)\\nand real-time feedback\
    \ at home. The chatbot should communicate\\nsecurely with the clinical team, augment documentation and improve\\ncontinuity\
    \ of care. A context switching conversational model can\\ncombine clinical knowledge with the communication styles and\
    \ deci-\\nsion roles of different healthcare professionals to engage the patient\\neffectively and collect relevant information.\
    \ By adapting in this way,\\ncontext switching models can expand access to medical expertise\\nand provide continuous,\
    \ reliable points of contact between patients\\nand their care teams.\\nData. With consent, researchers can curate conversations\
    \ between\\npatients and healthcare professionals, including nurses, primary care\\nphysicians and specialists, as well\
    \ as communication between clini-\\ncians. These conversations should reflect diverse populations, lan-\\nguages and care\
    \ settings to capture variation in both patient expression\\nand expert communication styles. Additionally, human-annotated\\\
    nrankings of model outputs can ensure the alignment of generated\\nresponses with the healthcare role. Relevant clinical\
    \ tools and data-\\nbases can be integrated to improve the accuracy and adherence to\\nclinical guidelines of the model.\\\
    nModel. A context switching conversational model can be structured as\\na generative multi-agent system, where each agent\
    \ embodies a distinct\\nclinical persona. Agents can be selectively activated depending on the\\ntask or patient need;\
    \ for example, a nurse practitioner for symptom\\ntriage or a specialist for treatment counseling. These agents retrieve\\\
    nand incorporate up-to-date patient records to adjust dialogue and\\nreasoning in real-time, based on evolving clinical\
    \ context. Patients can\\ninitiate conversations with any agent or be directed to the appropriate\\none when uncertain.\
    \ In collaboration with the intended users, guard-\\nrails and recovery policies can be implemented to maintain long-term\\\
    nconsistency, reduce failure modes of subagents and mitigate security\\nand data governance violations.\\nEvaluation.\
    \ Assessing whether these models democratize care requires\\nmetrics developed alongside medical and public health experts.\
    \ One\\nmetric can be the rate of successful referrals to the appropriate spe-\\ncialists, which reflects how well the\
    \ model understands clinical roles.\\nAppointment follow-through can serve as a proxy for patient engage-\\nment and perceived\
