    \ post-meal intake (average 2.19C, median 1.10C), and notable\\ninter-individual variability in thermogenic responses.\
    \ (e-h) Biomni autonomously analyzed single-cell multiomics data from approx-\\nimately 336,000 nucleus droplets, combining\
    \ single-nucleus RNA (snRNA-seq) and single-nucleus ATAC sequencing (snATAC-seq)\\nacross human embryonic joint development\
    \ (shoulder, hip, knee). (f) A detailed work\\ufb02ow diagram showing Biomni\\u2019s 10-step analy-\\nsis pipeline for\
    \ gene regulatory networks with multiomics. (g) Two key \\ufb01gures generated from Biomni: Left panel shows a heatmap\\\
    nof regulator activity by developmental stage, with color intensity indicating activity levels. Right panel displays a\
    \ boxplot of RUNX2\\nregulon activity by cell type, showing variation in expression across different cell populations.\
    \ (h) Key \\ufb01ndings from the GRN anal-\\nysis: 1) Novel transcription factors (AUTS2, ZFHX3, and PBX1) showing high\
    \ regulatory activity across multiple skeletal lineages\\ndespite no previous association with skeletal development, and\
    \ 2) Across the 566-589 regulons recovered, limb mesenchyme cells\\ndisplay the highest mean regulonactivity score, underscoring\
    \ their prominent role in skeletal transcriptional control.\\n17\\n.\\nCC-BY 4.0 International license\\navailable under\
