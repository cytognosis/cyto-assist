    ndoi:\\nbioRxiv preprint\\n\\n4\"\n  },\n  {\n    \"name\": \"Methods\",\n    \"text\": \"370\\nAction Discovery from\
    \ Literature. 100 recent publications from the year 2024 at biorxiv Were\\n371\\ncollected and analyzed by extracting\
    \ and parsing their PDF contents. Each paper was processed\\n372\\nin chunks, and a specialized prompt guided an LLM through\
    \ each chunk to explicitly identify\\n373\\nand extract three categories of actionable insights: tasks, software, and\
    \ databases. Speci\\ufb01cally for\\n374\\ntasks, the LLM was instructed to highlight recurrent tasks requiring specialized\
    \ implementations\\n375\\nwithin biomedical research work\\ufb02ows.\\n376\\nImplementing the Biomni Environment. In the\
    \ initial iteration of environment construction, a\\n377\\nconservative and focused approach was adopted for tool curation.\
    \ Initially, tasks were \\ufb01ltered\\n378\\nbased on relevance to the primary research interests-drug discovery and\
    \ clinical biomedicine-\\n379\\nretaining \\ufb01elds such as biochemistry, bioengineering, biophysics, cancer biology,\
    \ cell biology, de-\\n380\\nvelopmental biology, genetics, genomics, immunology, microbiology, molecular biology, pathol-\\\
    n381\\nogy, pharmacology, physiology, synthetic biology, and systems biology. Subsequently, these were\\n382\\nnarrowed\
    \ down to approximately 1,900 commonly recurring tasks. These tasks were further man-\\n383\\nually reviewed to eliminate\
    \ redundancy and exclude tasks that were trivial or easily implementable\\n384\\nthrough simple code. Selecting highly\
    \ specialized tasks that require signi\\ufb01cant domain expertise\\n385\\nwas emphasized, such as wet-lab protocols and\
    \ advanced AI models.\\n386\\nHuman scientists then collaborated with software engineering agents equipped with web\\\
    n387\\nsearch capabilities to implement each specialized tool. Every tool underwent rigorous validation,\\n388\\nrequiring\
    \ a clearly de\\ufb01ned test case that it successfully passed. This stringent process culminated in\\n389\\na curated\
    \ collection of 150 specialized tools. Additionally, essential literature retrieval tools were\\n390\\nincluded, such\
    \ as PubMed and Google Scholar, with provisions for future iterative expansions.\\n391\\nEach tool was strictly de\\ufb01ned\
    \ using a comprehensive checklist that mandated: (1) a clear\\n392\\nand descriptive name, (2) detailed documentation,\
    \ (3) outputs formatted as detailed research logs\\n393\\noptimized for LLM interpretation, (4) the inclusion and successful\
    \ passing of a speci\\ufb01c test case,\\n394\\nand (5) specialization criteria-if a task could easily be implemented\
    \ via brief LLM-generated code\\n395\\n(e.g., simple database queries), no specialized tool was created.\\n396\\nDatabases\
    \ were categorized and extensive relational databases accessible via web APIs (e.g.,\\n397\\nPDB, OpenTargets, ClinVar)\
    \ were integrated using a uni\\ufb01ed querying function. This function\\n398\\naccepts natural language inputs and leverages\
    \ an LLM to dynamically parse database schemas\\n399\\nand execute corresponding queries. Databases lacking web APIs were\
    \ downloaded and locally\\n400\\npreprocessed into structured pandas DataFrames for seamless accessibility by the agent.\\\
    n401\\nFor software integration, recognizing the frequent necessity of concurrently utilizing multiple\\n402\\n19\\n.\\\
    nCC-BY 4.0 International license\\navailable under a\\nwas not certified by peer review) is the author/funder, who has\
    \ granted bioRxiv a license to display the preprint in perpetuity. It is made\\nThe copyright holder for this preprint\
    \ (which\\nthis version posted June 2, 2025.\\n;\\nhttps://doi.org/10.1101/2025.05.30.656746\\ndoi:\\nbioRxiv preprint\\\
    n\\nsoftware tools, a uni\\ufb01ed containerized environment was constructed, which was pre-installed with\\n403\\na comprehensive\
    \ suite of relevant software. Additionally, this environment supports the execution\\n404\\nof R packages and command-line\
    \ interface (CLI) tools.\\n405\\nBiomni-A1. The Biomni agent is a general-purpose biomedical AI agent built upon the CodeAct31\\\
    n406\\nframework, designed to systematically solve biomedical tasks by combining LLMs with an inter-\\n407\\nactive coding\
    \ environment. Given a user query, Biomni begins by prompting the LLM to generate\\n408\\na clear, numbered bullet-list\
    \ plan detailing the steps needed to tackle the given problem, keeping\\n409\\ncareful track of progress and adjustments\
    \ along the way. As the tool, software, and database space\\n410\\nis vast, the query task may only use a small set of\
    \ these resources. To avoid long context, a prompt-\\n411\\nbased retriever is utilized, powered by a separate LLM, where\
    \ the agent dynamically selects the\\n412\\nmost relevant functions, datasets, and software libraries from available resources.\
    \ During execu-\\n413\\ntion, the LLM generates code, executes it in a coding environment (Python, R, or Bash), and returns\\\
    n414\\nthe resulting observations to inform subsequent reasoning. This iterative approach continues until\\n415\\nthe\
    \ agent converges on an accurate, validated solution.\\n416\\nQ&A Benchmarks. Development and testing sets were created\
    \ by sampling the LAB-Bench\\n417\\nDatabase Question-Answering and Sequence Question-Answering benchmarks 24. Due to\
    \ resource\\n418\\nconstraints, each set comprises 12.5% of the complete reference, proportionally distributed across\\\
    n419\\nbenchmark subtasks, providing a cost-effective and representative assessment of model perfor-\\n420\\nmance. The\
    \ development set informed iterative re\\ufb01nements to Biomni\\u2019s database integrations and\\n421\\ntool implementations,\
    \ while the test set provided an independent evaluation of generalization ca-\\n422\\npabilities. Accuracy was evaluated\
    \ by following the LAB-Bench protocol, using multiple-choice\\n423\\nanswer options with an option for abstention due\
    \ to insuf\\ufb01cient information. Results represent\\n424\\naverages across three independent evaluation runs.\\n425\\\
    nFor Humanity\\u2019s Last Exam (HLE)23, a representative sample of questions was selected, span-\\n426\\nning fourteen\
    \ subdisciplines of Biology/Medicine: Genetics, Biology, Ecology, Neuroscience,\\n427\\nBiochemistry, Microbiology, Immunology,\
    \ Molecular Biology, Computational Biology, Biophysics,\\n428\\nBioinformatics, Genomics, and Physiology. From each subdiscipline,\
    \ up to \\ufb01ve questions were\\n429\\nsampled (or the maximum number available if fewer than \\ufb01ve existed in the\
    \ category). This\\n430\\nsampling approach yielded a \\ufb01nal evaluation set of 52 questions that comprehensively assessed\\\
    n431\\nBiomni\\u2019s performance across the biological sciences. The evaluation was conducted directly with-\\n432\\\
    nout the use of a development set.\\n433\\nCurating real-world benchmarks. The variant prioritization benchmark was curated\
    \ from Open\\n434\\nTarget Genetics32 ground truth set, and processed such that given a variant, a negative set of vari-\\\
    n435\\n20\\n.\\nCC-BY 4.0 International license\\navailable under a\\nwas not certified by peer review) is the author/funder,\
    \ who has granted bioRxiv a license to display the preprint in perpetuity. It is made\\nThe copyright holder for this\
    \ preprint (which\\nthis version posted June 2, 2025.\\n;\\nhttps://doi.org/10.1101/2025.05.30.656746\\ndoi:\\nbioRxiv\
    \ preprint\\n\\nants is found. The prompt was as follows: \\u201dYour task is to identify the most promising variant\\\
    n436\\nassociated with a given GWAS phenotype for futher examination. From the list, prioritize the\\n437\\ntop associated\
    \ variant (matching one of the given variant). GWAS phenotype: {trait} Variants:\\n438\\n{variant list}\\u201d. Accuracy\
    \ was used as the metric. The GWAS causal gene detection benchmark\\n439\\nutilized a dataset curated from Shringarpure\
    \ et al33, using the original prompt: \\u201dYour task is to\\n440\\nidentify likely causal genes within a locus for a\
    \ given GWAS phenotype. From the list, provide\\n441\\nonly the likely causal gene (matching one of the given genes).\
    \ Identify the causal gene. GWAS\\n442\\nphenotype: {trait} Genes in locus: {gene str}\\u201d. Accuracy was used as the\
    \ metric. The pertur-\\n443\\nbation screen design benchmark was curated from Schmidt et al.34. The prompt is \\u201dTask:\
    \ Plan\\n444\\na CRISPR screen to{task description}. There are 18,939 possible genes to perturb and only per-\\n445\\\
    nturb {num genes} genes. For each perturbation, you can measure out {measurement} which will\\n446\\nbe referred to as\
    \ the score. Generate {num genes} genes that maximize the perturbation effect.\\n447\\nOutput format: a list of genes\
    \ 1. XXX 2.XXX 3.XXX ...\\u201d. The evaluation metric was the average\\n448\\npost-perturbed effect. As the scale differs\
    \ for the post-perturbed effect, one screen (IL-2) was used.\\n449\\nThe scRNA-seq annotation benchmark ensured \\ufb02exibility\
    \ across diverse data formats (e.g., Cel-\\n450\\nlxGene, author-hosted portals), encompassing multiple tissues, species,\
    \ sequencing technologies,\\n451\\nand experimental conditions. Datasets with author-provided annotations (Tier 1 or Tier\
    \ 2, typically\\n452\\n\\u226510 cell types) were prioritized, and 20k-50k cells were subsampled proportionally to their\
    \ cell\\n453\\ntype distributions. Automatic evaluation was conducted at the single-cell level using LLMs via\\n454\\\
    nsemantic match, accounting for both naming variations (e.g., \\ufb01broblast vs. Fibroblast cells) and\\n455\\nhierarchical\
    \ relations (e.g., CD8+ T cells vs. T cells), judged on-the-\\ufb02y by LLM agents and later\\n456\\nveri\\ufb01ed by\
    \ humans. In the microbiome benchmark, both Biomni and human experts independently\\n457\\nperformed differential abundance\
    \ analysis on \\ufb01ve diverse microbiome datasets, selected to re\\ufb02ect\\n458\\ndifferent data types, biological\
    \ contexts, and analytical challenges. Dataset 1 comes from the MGM\\n459\\n2.0 platform35 and includes relative microbial\
    \ abundance across samples and another with sample\\n460\\nlabels, ideal for classi\\ufb01cation tasks35. Dataset 2 curated\
    \ from a well-known Nature study, offers\\n461\\nmicrobial abundance data in mice alongside metadata such as diet and\
    \ sex, making it valuable for\\n462\\nmodeling host-microbiome interactions36. Dataset 3, developed by Pasolli et al.37,\
    \ combines eight\\n463\\nhuman metagenomic studies with species-level features processed using MetaPhlAn237. Dataset 4\\\
    n464\\nexplores microbial communities in drinking water systems, providing an OTU matrix with abun-\\n465\\ndances represented\
    \ as relative sequence counts. This environmental dataset allows models to be\\n466\\ntested beyond host-associated microbiomes38.\
    \ Finally, Dataset 5 is an in-house resource derived\\n467\\nfrom the Human Microbiome Project39. Together, these datasets\
    \ provide a comprehensive foun-\\n468\\ndation for benchmarking AI agents in microbiome analysis across both clinical\
    \ and environmental\\n469\\n21\\n.\\nCC-BY 4.0 International license\\navailable under a\\nwas not certified by peer review)\
    \ is the author/funder, who has granted bioRxiv a license to display the preprint in perpetuity. It is made\\nThe copyright\
    \ holder for this preprint (which\\nthis version posted June 2, 2025.\\n;\\nhttps://doi.org/10.1101/2025.05.30.656746\\\
    ndoi:\\nbioRxiv preprint\\n\\ndomains. Biomni results were compared against those generated by human experts for consistency,\\\
    n470\\naccuracy, and ef\\ufb01ciency. The drug repurposing benchmark used a dataset from Huang et al.40, for\\n471\\nthe\
    \ task of identifying the most likely drug from a pre-de\\ufb01ned list of drugs for repurposing in a\\n472\\ngiven indication.\
    \ Evaluation was based on the alignment score with off-label prescription patterns\\n473\\nof clinicians from an EHR system.\
    \ The prompt was \\u201dYour task is to identify top 5 drugs that can\\n474\\nbe potentially repurposed to treat the given\
    \ disease. From the list, prioritize the drug list with\\n475\\nthe highest potential (matching the given DrugBank IDs).\
    \ Disease: {disease} Drugs: {drug list}\\n476\\nOutput format: a list of drugs with their DrugBank IDs, no drug name,\
    \ just the IDs: 1. DB00001\\n477\\n2. DB00002 3. DB00003 ..\\u201d. The rare disease diagnosis benchmark used the MyGene2\
    \ dataset,\\n478\\ncurated by Alsentzer et al.41. The ground truth was expert annotated diagnosis. The prompt was\\n479\\\
    n\\u201dTask: given a patient\\u2019s phenotypes and a list of candidate genes, diagnose the rare disease that\\n480\\\
    nthe patient has. Phenotypes: {phenotype list} Candidate genes: {candidate genes} Output format:\\n481\\n{{\\u2019disease\
    \ name\\u2019: XXX, \\u2019OMIM ID\\u2019: XXX}}\\u201d. The patient gene prioritization benchmark used\\n482\\na dataset\
    \ curated by Alsentzer et al.41. The ground truth was a truly causal gene. The prompt was\\n483\\n\\u201dTask: Given a\
    \ patient\\u2019s phenotypes and a list of candidate genes, identify the causal gene. Phe-\\n484\\nnotypes: {phenotype\
    \ list} Candidate genes: {candidate genes} Output format: {{\\u2019causal gene\\u2019:\\n485\\n[gene1]}}\\u201d.\\n486\\\
    nWearable analysis case study. A wearable case study integrated CGM-derived body temperature\\n487\\ndata, sleep metrics,\
    \ and multi-omics datasets from human participants42, as follows: CGM Body\\n488\\nTemperature Data: For each participant,\
    \ continuous glucose monitors (CGMs) equipped with tem-\\n489\\nperature sensors recorded skin temperature in high resolution.\
    \ A total of 485 temperature \\ufb01les were\\n490\\ncollected, each centered on a presumed meal event. The time window\
    \ for each \\ufb01le spanned 6 hours\\n491\\ntotal, comprising 2 hours pre-meal and 4 hours post-meal. Sleep Data: Sleep\
    \ metrics were derived\\n492\\nfrom wrist-worn wearable devices for a subset of 10 participants, covering 227 nights of\
    \ sleep. Pa-\\n493\\nrameters collected included sleep duration, sleep ef\\ufb01ciency, sleep latency, sleep stage composition\\\
    n494\\n(light, deep, REM), and number of wake episodes. Omics Data: Blood samples were analyzed to\\n495\\ngenerate the\
    \ following: Lipidomics: 652 lipid features across 147 samples; Metabolomics: 731\\n496\\nmetabolite features across 147\
    \ samples; Proteomics: 1,470 protein features across 20 samples.\\n497\\nMultiome analysis case study. The authors\\u2019\
    \ dataset was directly downloaded and used with no\\n498\\nmodi\\ufb01cations 27. The authors\\u2019 study generated a\
    \ multi-omic dataset of human embryonic skeletal\\n499\\ndevelopment from 5-11 weeks post-conception. The dataset includes\
    \ snRNA-seq and snATAC-seq\\n500\\ndata from approximately 336,000 nuclei across \\ufb01ve anatomical regions (hip, knee,\
    \ shoulder joints,\\n501\\ncalvaria, and skull base). The dataset covers both appendicular (limb) and cranial regions.\
    \ No\\n502\\n22\\n.\\nCC-BY 4.0 International license\\navailable under a\\nwas not certified by peer review) is the author/funder,\
    \ who has granted bioRxiv a license to display the preprint in perpetuity. It is made\\nThe copyright holder for this\
    \ preprint (which\\nthis version posted June 2, 2025.\\n;\\nhttps://doi.org/10.1101/2025.05.30.656746\\ndoi:\\nbioRxiv\
    \ preprint\\n\\nadditional tools or manual preprocessing were added. As the analytical traces are extensive, more\\n503\\\
    nguidance was included in the prompt instruction and two use cases were tested:\\n504\\nComparative Analysis. This analysis\
    \ focused on how cellular processes differ across anatomi-\\n505\\ncal locations and developmental timepoints. Biomni\
    \ was instructed to characterize the cellular\\n506\\ncomposition across anatomical regions (calvaria, skull base, shoulder,\
    \ hip, knee) and developmen-\\n507\\ntal stages. We prompted Biomni with detailed instructions (Supplementary Section\
    \ E), including\\n508\\ncell type proportion estimates, region-speci\\ufb01c population labels, UMAP embeddings, stacked\
    \ bar\\n509\\nplots, a comparison of intramembranous versus endochondral ossi\\ufb01cation, key transcription factor\\\
    n510\\nhighlights, and developmental trajectory tracing.\\n511\\nGene Regulatory Network Analysis We asked Biomni to identify\
    \ transcriptional programs underly-\\n512\\ning skeletal development. Following a systematic 10-step process, Biomni inferred\
    \ gene regulatory\\n513\\nnetworks by: (1) loading and exploring all datasets, (2) preparing RNA-seq data for analysis,\
    \ (3)\\n514\\ncon\\ufb01guring pySCENIC to retrieve motifs, (4) running GRNBoost2 to infer gene regulatory net-\\n515\\\
    nworks, (5) pruning networks using cisTarget, (6) calculating regulon activity with AUCell, (7)\\n516\\nextracting accessibility\
    \ data from ATAC-seq, (8) \\ufb01ltering predicted targets using ATAC-seq ac-\\n517\\ncessibility, (9) analyzing activity\
    \ patterns across cell types, developmental stages, and anatomical\\n518\\nregions, and (10) summarizing \\ufb01ndings.\\\
    n519\\nManual veri\\ufb01cation To evaluate whether the aggregated \\ufb01ndings are truly re\\ufb02ected by the data\
    \ or\\n520\\nmerely simulated or hallucinated by the LLM, manual (human) veri\\ufb01cation was conducted follow-\\n521\\\
    ning the traces and codes generate by Biomni.\\n522\\nWetlab Benchmark Development and Evaluation. A comprehensive benchmark\
    \ was developed\\n523\\nconsisting of 20 open-ended cloning questions curated from real-world applications to represent\\\
    n524\\nthe diversity and complexity of molecular cloning tasks across four major categories: Golden\\n525\\nGate assembly,\
    \ Gibson assembly, restriction enzyme cloning, and Gateway cloning. Each cate-\\n526\\ngory included both single-construct\
    \ and pooled cloning scenarios. Additionally, the benchmark\\n527\\nincorporated common validation methods, including\
    \ diagnostic restriction digestion, Sanger se-\\n528\\nquencing primer design, and sequence alignment analysis. For establishing\
    \ baseline performance,\\n529\\nthree human experts with extensive experience in molecular cloning were recruited. These\
    \ experts\\n530\\nwere instructed to complete each task without utilizing language models but were permitted to use\\\
    n531\\nstandard molecular biology tools, search engines, and publicly available online resources such as\\n532\\nplasmid\
    \ repositories and primer design platforms. The time required for each expert to complete\\n533\\neach task was recorded,\
    \ from initial task understanding to the \\ufb01nal protocol and plasmid map gen-\\n534\\neration. In parallel, Biomni\
    \ and general LLM models were evaluated on identical tasks. Each\\n535\\nsystem was provided with the same task descriptions\
    \ and required to generate detailed end-to-end\\n536\\n23\\n.\\nCC-BY 4.0 International license\\navailable under a\\\
    nwas not certified by peer review) is the author/funder, who has granted bioRxiv a license to display the preprint in\
    \ perpetuity. It is made\\nThe copyright holder for this preprint (which\\nthis version posted June 2, 2025.\\n;\\nhttps://doi.org/10.1101/2025.05.30.656746\\\
    ndoi:\\nbioRxiv preprint\\n\\nexperimental protocols and \\ufb01nal cloned plasmid maps. For general LLMs, Claude 3.7\
    \ was used as\\n537\\none of the most capable publicly-available models at the time of testing, providing it with the\
    \ same\\n538\\ninformation but without access to specialized molecular biology tools. For evaluation, an indepen-\\n539\\\
    ndent senior researcher with experience in molecular cloning technologies was recruited and blinded\\n540\\nto the source\
    \ of each protocol (human expert, Biomni, or general LLM). The evaluator assessed\\n541\\neach protocol and plasmid map\
    \ based on two primary criteria: (1) Accuracy: The correctness of\\n542\\nthe proposed methodology, including appropriate\
    \ enzyme selection, reaction conditions, primer\\n543\\ndesign parameters, and plasmid construction strategy. (2) Completeness:\
    \ The thoroughness of the\\n544\\nprotocol, including all necessary steps, reagents, concentrations, incubation times,\
    \ and veri\\ufb01cation\\n545\"\n  },\n  {\n    \"name\": \"methods. Each criterion was scored on a scale of 1-5 according\
    \ to a detailed rubric (Supplementary\",\n    \"text\": \"546\\nTable S31-32). The average scores across all 20 tasks\
    \ were calculated for each system and human\\n547\\nexpert to enable direct comparison.\\n548\\nWetlab Validation. A practical\
    \ cloning task was selected for validation: the insertion of a guide\\n549\\nRNA targeting the human B2M gene into the\
    \ lentiCRISPR v2 Blast construct. This task was\\n550\\nchosen for its relevance to CRISPR-based gene editing applications\
    \ and its moderate complexity,\\n551\\ninvolving multiple molecular biology techniques. The experiment was conducted in\
    \ a standard\\n552\\nmolecular biology laboratory setting using commercially available reagents and materials. The\\n553\\\
    nlentiCRISPR v2 Blast plasmid was obtained from Addgene. All protocols for the experiment were\\n554\\ngenerated entirely\
    \ by Biomni without modi\\ufb01cation (Supplementary Notes F), including plasmid\\n555\\nanalysis, sgRNA design, oligo\
    \ design with appropriate overhangs, detailed Golden Gate assembly\\n556\\nconditions, bacterial transformation parameters,\
    \ and veri\\ufb01cation strategies. For validation of the\\n557\\ncloning results, standard molecular biology practices\
    \ were followed, selecting colonies for cul-\\n558\\nture and miniprep, followed by Sanger sequencing using the Biomni-designed\
    \ primers. Sequence\\n559\\nalignment analysis was performed to verify the correct insertion of the sgRNA sequence. The\\\
    n560\\nsuccess of the cloning process was determined by the presence of bacterial colonies on selective\\n561\\nmedia\
    \ and subsequent sequence veri\\ufb01cation con\\ufb01rming the accurate incorporation of the designed\\n562\\nsgRNA construct\
    \ into the lentiCRISPR v2 Blast backbone.\\n563\\n24\\n.\\nCC-BY 4.0 International license\\navailable under a\\nwas not\
