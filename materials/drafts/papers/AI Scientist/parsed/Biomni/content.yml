    \ dataset of the developing human skeleton 27.\\n238\\nThis dataset comprises 336,162 single-nucleus RNA-Seq (snRNA) and\
    \ ATAC-seq (snATAC-Seq),\\n239\\npaired with spatial transcriptomics data collected from human embryos between 5-11 weeks\
    \ post-\\n240\\nconception (Figure3e). While the original study emphasized developmental trajectories and dis-\\n241\\\
    nease mechanisms, the scientist was interested in exploring gene regulatory mechanisms across\\n242\\nemerging skeletal\
    \ cell types \\u2013 a technically demanding task typically requiring extensive bioinfor-\\n243\\nmatics support.\\n244\\\
    nThe scientist asked Biomni to investigate transcriptional regulation across skeletal lineages\\n245\\nusing a detailed\
    \ instruction (Supplementary Notes E). The system autonomously planned and exe-\\n246\\ncuted a ten-stage analysis pipeline:\
    \ (1) loading and exploring all datasets, (2) preparing RNA-seq\\n247\\ndata for analysis, (3) con\\ufb01guring pySCENIC\
    \ to retrieve motifs, (4) running GRNBoost2 to infer\\n248\\ngene regulatory networks, (5) pruning networks using cisTarget,\
    \ (6) calculating regulon activity\\n249\\nwith AUCell, (7) extracting accessibility data from ATAC-seq, (8) \\ufb01ltering\
    \ predicted targets us-\\n250\\ning ATAC-seq accessibility, (9) analyzing activity patterns across cell types, developmental\
    \ stages,\\n251\\nand anatomical regions, and (10) summarizing \\ufb01ndings and preparing a report to the scientist.\
    \ It\\n252\\nenabled Biomni to predict transcription factor-target gene links and \\ufb01lter regulons based on mo-\\\
    n253\\ntif enrichment and chromatin accessibility correlations (Figure 3f). The full run, completed in\\n254\\njust over\
    \ \\ufb01ve hours, handled real-time execution issues (e.g., variable name mismatches) by sub-\\n255\\nsampling and debugging\
    \ locally. Throughout, Biomni maintained all intermediate outputs \\u2013 code,\\n256\\n\\ufb01gures, and logs \\u2013\
    \ organized in a reproducible folder structure for validation and inspection. The\\n257\\nagent summarized all the analysis\
    \ and generated a report describing the analysis and key \\ufb01ndings\\n258\\n10\\n.\\nCC-BY 4.0 International license\\\
    navailable under a\\nwas not certified by peer review) is the author/funder, who has granted bioRxiv a license to display\
    \ the preprint in perpetuity. It is made\\nThe copyright holder for this preprint (which\\nthis version posted June 2,\
    \ 2025.\\n;\\nhttps://doi.org/10.1101/2025.05.30.656746\\ndoi:\\nbioRxiv preprint\\n\\n(Supplementary Notes E).\\n259\\\
    nIn its \\ufb01nal gene regulatory network (GRN) analysis (Figure 3h), Biomni re-capitulated known\\n260\\nregulatory\
    \ relationships between key osteogenic transcription factors such as RUNX2 and HHIP,\\n261\\ncon\\ufb01rming how they\
    \ are regulated by a shared set of anti-osteogenic transcription factors including\\n262\\nTWIST1, LMX1B, and ALX4 27.\
    \ These \\ufb01ndings align with author\\u2019s report 27 about the balanced\\n263\\nregulation needed for proper bone\
    \ formation and suture patency. Furthermore, Biomni also uncov-\\n264\\nered several unreported TFs, including AUTS2,\
    \ ZFHX3, and PBX1, showed unexpectedly high\\n265\\nregulatory activity across multiple skeletal cell types. Although\
    \ PBX1 is a well-established skele-\\n266\\ntal regulator 28 and ZFHX3/AUTS2 have only limited or indirect skeletal reports\
    \ (in mouse 29\\n267\\nor zebra\\ufb01sh 30), their broad activity here suggests under-appreciated roles across diverse\
    \ skele-\\n268\\ntal lineages. Biomni reported that these novel regulators were particularly active in osteoblasts,\\\
    n269\\npreosteoblasts, and various chondrocyte populations, suggesting they play important but previ-\\n270\\nously unrecognized\
    \ roles in the transcriptional control of skeletal cell fate determination during\\n271\\nhuman embryonic development.\
    \ Finally, Figure 3g-h reveals how Biomni\\u2019s visualizations effec-\\n272\\ntively captured both temporal dynamics\
    \ of regulator activity and cell-type-speci\\ufb01c variations in key\\n273\\nregulons like RUNX2. This demonstrates how\
    \ Biomni enables researchers to autonomously per-\\n274\\nform complex multi-omics analysis and rapidly generate testable\
    \ hypotheses without specialized\\n275\\nprogramming expertise.\\n276\\nBiomni designs wet-lab validated experimental\
    \ protocol for cloning. To evaluate Biomni\\u2019s\\n277\\nability to support real-world experimental design, we focused\
    \ on a core task in molecular biology:\\n278\\ncloning. This process is central to countless work\\ufb02ows in research\
    \ and biotechnology and requires\\n279\\ncomplex reasoning, from designing high-\\ufb01delity primers to choosing the\
    \ right assembly method\\n280\\nand validating constructs. While general-purpose LLMs have struggled to perform such tasks\
    \ due\\n281\\nto limited domain knowledge and tool access 24, Biomni integrates LLM reasoning with dynamic\\n282\\ntool\
    \ execution, enabling expert-level performance in molecular biology tasks.\\n283\\nTo rigorously evaluate this task, we\
    \ \\ufb01rst collaborated with an expert group of gene-editing\\n284\\nresearchers to design an open-ended cloning benchmark\
    \ and expert user study (Figure 4a). Our\\n285\\nbenchmark consisted of 10 realistic, representative cloning tasks covering\
    \ Golden Gate, Gibson,\\n286\\nGateway, and restriction cloning \\u2013 each with options including single-fragment vs.\
    \ pooled assem-\\n287\\n11\\n.\\nCC-BY 4.0 International license\\navailable under a\\nwas not certified by peer review)\
    \ is the author/funder, who has granted bioRxiv a license to display the preprint in perpetuity. It is made\\nThe copyright\
    \ holder for this preprint (which\\nthis version posted June 2, 2025.\\n;\\nhttps://doi.org/10.1101/2025.05.30.656746\\\
    ndoi:\\nbioRxiv preprint\\n\\nbly. The benchmark also included essential validation steps, such as designing Sanger sequencing\\\
    n288\\nprimers and analyzing restriction digests. We posed these tasks to four entities: an LLM (Claude\\n289\\n3.7),\
    \ Biomni, a human trainee (Stanford Biology Master with previous experience in cloning),\\n290\\nand a senior human expert\
    \ (Stanford Genetics PostDoc with 5+ years of cloning experience).\\n291\\nEach was asked to generate a complete, end-to-end\
    \ protocol along with the \\ufb01nal cloned plas-\\n292\\nmid map. Blinded expert reviewers assessed the outputs. Biomni\
    \ produced protocols and designs\\n293\\nthat matched the human expert in accuracy and completeness \\u2013 often providing\
    \ comparable lev-\\n294\\nels of detail and anticipating the same edge cases. In contrast, the human trainee\\u2019s submissions\\\
    n295\\nwere frequently incomplete or suboptimal, re\\ufb02ecting the experience gap typical in early-stage re-\\n296\\\
    nsearchers. Remarkably, Biomni completed all tasks autonomously in a fraction of the time taken\\n297\\nby the expert.\\\
    n298\\nTo further validate Biomni in a real-world setting, a scientist assigned it a practical cloning\\n299\\ntask: cloning\
    \ a guide RNA targeting the human B2M gene into the lentiCRISPR v2 Blast construct\\n300\\n(Figure 4b). Biomni successfully\
    \ executed the task through a comprehensive work\\ufb02ow (Figure 4c).\\n301\\nFirst, it analyzed the plasmid structure\
    \ using annotation and pattern search tools to identify key fea-\\n302\\ntures necessary for cloning. It then designed\
    \ three Cas9 sgRNAs targeting B2M using specialized\\n303\\nknockout sgRNA design tools. For the cloning process, Biomni\
    \ generated forward and reverse\\n304\\noligos with BsmBI overhangs to enable directional insertion of the sgRNA sequence.\
    \ It produced\\n305\\ndetailed protocols (Figure 4d) for oligo annealing, double-stranded DNA formation, and Golden\\\
    n306\\nGate cloning into the target vector. Biomni also provided complete bacterial transformation in-\\n307\\nstructions,\
    \ including heat-shock steps and antibiotic selection. For quality control, it designed a\\n308\\nU6 promoter sequencing\
    \ primer to verify sgRNA insertion and simulated the Golden Gate assem-\\n309\\nbly to produce the \\ufb01nal plasmid\
    \ map.\\n310\\nThe scientist followed Biomni\\u2019s protocol exactly to perform the wet-lab experiment (Fig-\\n311\\\
    nure 4e). Colonies appeared on the plate the next day; two were cultured, miniprepped, and se-\\n312\\nquenced using the\
    \ Biomni-designed primers \\u2013 both showing perfect alignment. This case illustrates\\n313\\nhow scientists can rely\
    \ on Biomni to autonomously design complex molecular biology experiments\\n314\\nwith accuracy comparable to human experts,\
    \ but in a fraction of the time.\\n315\\nUser-friendly interface to empower scientists to generate biomedical discoveries.\
    \ To bring the\\n316\\n12\\n.\\nCC-BY 4.0 International license\\navailable under a\\nwas not certified by peer review)\
    \ is the author/funder, who has granted bioRxiv a license to display the preprint in perpetuity. It is made\\nThe copyright\
    \ holder for this preprint (which\\nthis version posted June 2, 2025.\\n;\\nhttps://doi.org/10.1101/2025.05.30.656746\\\
    ndoi:\\nbioRxiv preprint\\n\\npower of Biomni into the hands of every scientist, we built an intuitive graphical interface\
    \ \\u2013 avail-\\n317\\nable at https://biomni.stanford.edu \\u2013 to help transform the way researchers interact with\
    \ biomedical\\n318\\ndata and tools. This seamless platform enables users to submit natural language queries and receive\\\
    n319\"\n  },\n  {\n    \"name\": \"results powered by the full capabilities of Biomni\\u2019s agentic system. Whether\
    \ designing complex\",\n    \"text\": \"320\\ncloning experiments, querying multi-omics databases, or generating hypotheses\
    \ from wearable\\n321\\ndata, scientists can now access the intelligence of a general-purpose biomedical AI agent without\\\
    n322\\nwriting a single line of code. The interface is designed for rapid iteration, real-time feedback, and\\n323\\nvisual\
    \ traceability, allowing users to explore intermediate steps, inspect tool usage, and validate\\n324\"\n  },\n  {\n  \
    \  \"name\": \"results interactively. By closing the gap between biomedical intent and execution, Biomni opens a\",\n\
    \    \"text\": \"325\\nnew era of accessible, automated, and scalable scienti\\ufb01c discovery. An example of this interface\
    \ is\\n326\\nshown in Supplementary Figure 17.\\n327\\n3\"\n  },\n  {\n    \"name\": \"Discussion\",\n    \"text\": \"\
    328\\nBiomni marks a major step forward in biomedical research, demonstrating robust generalization\\n329\\nacross diverse\
    \ sub\\ufb01elds and laying the groundwork for AI agents as integral collaborators in scien-\\n330\\nti\\ufb01c discovery.\
    \ Its zero-shot performance across complex tasks \\u2013 including those in genetics, ge-\\n331\\nnomics, microbiology,\
    \ immunology, pharmacology, and clinical medicine \\u2013 underscores its poten-\\n332\\ntial to boost research productivity,\
    \ accelerate discovery, and broaden access to advanced biomedical\\n333\\nanalyses.\\n334\\nBy automating complex, labor-intensive\
    \ work\\ufb02ows, which normally require both expert\\n335\\nknowledge and coding skills, Biomni enables researchers to\
    \ redirect their efforts toward creative\\n336\\nhypothesis generation, experimental innovation, and cross-disciplinary\
    \ collaboration. This shift\\n337\\nholds profound implications. In the conext of target and drug discovery for biopharma,\
    \ Biomni\\n338\\ncan autonomously prioritize targets, design perturbation screens, or repurpose drugs \\u2013 offering\
    \ a\\n339\\npath to faster, more cost-effective reasearch. In clinical application settings, its capabilities in gene\\\
    n340\\nprioritization and rare disease diagnosis point to more accurate, personalized insights and stream-\\n341\\nlined\
    \ diagnostics. For consumer health, Biomni\\u2019s integration of wearable data and multi-omics\\n342\\nanalyses envisions\
    \ real-time, individualized health monitoring and intervention.\\n343\\nNonetheless, several limitations remain. While\
    \ Biomni\\u2019s uni\\ufb01ed environment spans a wide\\n344\\nrange of biomedical tools and databases, the evaluated\
    \ tasks represent only a subset of the \\ufb01eld,\\n345\\n13\\n.\\nCC-BY 4.0 International license\\navailable under\
    \ a\\nwas not certified by peer review) is the author/funder, who has granted bioRxiv a license to display the preprint\
    \ in perpetuity. It is made\\nThe copyright holder for this preprint (which\\nthis version posted June 2, 2025.\\n;\\\
    nhttps://doi.org/10.1101/2025.05.30.656746\\ndoi:\\nbioRxiv preprint\\n\\nand key domains remain unexplored. In addition,\
    \ in the action discovery agent, our decision to pri-\\n346\\noritize the most recent literature makes the agent appear\
    \ timely, but risks overlooking foundational\\n347\\nconcepts and techniques that have faded from current discourse despite\
    \ their enduring relevance.\\n348\\nThe future versions should encapsulate a larger coverage of publications when de\\\
    ufb01ning the envi-\\n349\\nronment. Moreover, although Biomni approaches human-level performance in tasks like database\\\
    n350\\nquerying, sequence analysis, and molecular cloning, it still struggles in areas requiring nuanced\\n351\\nclinical\
    \ judgment, novel experimental reasoning, analytical inventions, or deep biological thinking\\n352\\nand synthesis. No\
    \ system yet captures the full scope of human biomedical expertise. As re\\ufb02ected\\n353\\nin our benchmarks, Biomni\
    \ has not achieved expert-level performance across all task categories.\\n354\\nWe expect continued improvements as foundation\
    \ models evolve and the agentic environment ex-\\n355\\npands, as well as thanks to human experts and trainees deploying\
    \ Biomni to facilitate or augment\\n356\\ntheir work.\\n357\\nThese limitations open promising directions for future development.\
    \ Training biomedical\\n358\\nreasoning agents with reinforcement learning could enable continuous self-improvement in\
    \ plan-\\n359\\nning and execution. Integrating multimodal data \\u2013 text, images, and structured inputs \\u2013 may\
    \ further\\n360\\ndeepen reasoning capabilities. Equipping Biomni to autonomously discover and incorporate new\\n361\\\
    ntools and databases, as well as incorporate more historical methods (which may have high utility\\n362\\nbut can be easily\
    \ forgotten by human users), would ensure adaptability and long-term relevance.\\n363\\nLooking ahead, Biomni and its\
    \ successors could become foundational infrastructure in an AI-\\n364\\npowered biomedical ecosystem, working seamlessly\
    \ with human experts to unlock novel insights\\n365\\ninto health and disease. This hybrid partnership may radically reshape\
    \ biomedical research \\u2013\\n366\\nautomating hypothesis generation, scaling discovery pipelines, and enabling medical\
    \ innovation\\n367\\nto proceed at unprecedented speed and scope. General-purpose agents like Biomni could not only\\\
    n368\\naccelerate breakthroughs but rede\\ufb01ne the future of scienti\\ufb01c inquiry itself.\\n369\\n14\\n.\\nCC-BY\
