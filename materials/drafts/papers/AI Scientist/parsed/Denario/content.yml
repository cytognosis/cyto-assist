    : \"A.11\",\n    \"text\": \"Material science\\n225\\n\\nMapping Interfacial Water States on Functionalized Graphene:\
    \ A Machine\\nLearning-Augmented Approach to Uncover Design Principles for Tunable Water\\nTransport\\nDenario\\nAnthropic,\
    \ Gemini & OpenAI servers.\\nPlanet Earth.\\nControlling water transport in nano-confined environments, such as functionalized\
    \ graphene, is\\ncrucial for developing advanced materials with tailored properties. This study introduces a ma-\\nchine\
    \ learning-driven framework to systematically map distinct interfacial water states and uncover\\nquantitative design\
    \ principles for tuning water transport. We analyzed 91 pre-computed molecular\\ndynamics simulations, extracting water\
    \ diffusion coe\\ufb00icients and structural metrics from density\\nprofiles. K-Means clustering on these structural features\
    \ identified 10 distinct water states, ranging\\nfrom highly mobile to trapped-immobile. An interpretable Gradient Boosting\
    \ Regressor, employing\\nSHAP analysis on system parameters (functionalization type, coverage, and salt concentration),\\\
    npredicted water diffusion. Our results reveal that water mobility can be precisely tuned over a five-\\nfold range. Salt\
    \ concentration and functionalization type, particularly carboxyl groups, are the most\\ninfluential parameters, followed\
    \ by surface coverage. Specifically, high salt concentrations combined\\nwith high-coverage carboxyl functionalization\
    \ lead to highly ordered, \\u201dice-like\\u201d interfacial layers and\\nminimal diffusion, while unfunctionalized surfaces\
    \ with low salt promote disordered, \\u201dliquid-like\\u201d\\nlayers and maximal diffusion. This work provides a quantitative\
    \ atlas of interfacial water behavior,\\noffering a robust framework and clear design principles for engineering surfaces\
    \ with tailored water\\ntransport properties in applications like nanofluidics, membranes, and energy storage.\\nI.\"\n\
    \  },\n  {\n    \"name\": \"INTRODUCTION\",\n    \"text\": \"The intricate behavior of water at interfaces is a cornerstone\
    \ phenomenon across numerous scientific and engineering\\ndisciplines, ranging from fundamental biological processes to\
    \ the development of advanced materials. In nano-confined\\nenvironments, such as those presented by graphene-based materials,\
    \ the interplay between surface chemistry, pore\\ngeometry, and external conditions profoundly dictates water structuring\
    \ and dynamics. This critical control over\\ninterfacial water influences a myriad of macroscopic phenomena, including\
    \ ion selectivity, energy conversion e\\ufb00i-\\nciency, and fluidic transport characteristics. The ability to precisely\
    \ tune water transport at the nanoscale therefore\\nholds immense promise for developing next-generation technologies,\
    \ such as highly e\\ufb00icient desalination membranes,\\nsophisticated nanofluidic devices, and high-performance energy\
    \ storage systems.\\nGraphene, with its exceptional mechanical strength, high surface area, and electronically tunable\
    \ properties, serves\\nas an ideal platform for exploring these complex interfacial phenomena [1, 2]. Its surface can\
    \ be chemically function-\\nalized through the introduction of various chemical groups, offering a powerful means to modify\
    \ surface wettability,\\ninteraction potential, and ultimately, the behavior of confined water molecules [3, 4]. However,\
    \ the design space for\\nsuch functionalized graphene systems is vast and inherently complex. It encompasses a multi-dimensional\
    \ parameter\\nset, including variations in functionalization type (e.g., carboxyl, methyl), surface coverage, and solution\
    \ conditions\\n(e.g., salt concentration). Navigating this expansive parameter space to systematically predict and control\
    \ interfacial\\nwater states and their corresponding transport properties presents a significant challenge for traditional\
    \ experimental\\nor purely simulation-driven approaches. A comprehensive understanding requires not only the quantification\
    \ of water\\ndynamics, but also a robust framework to objectively classify the distinct structural arrangements of water\
    \ at the\\ninterface and to identify the critical molecular descriptors that govern these states [1, 2].\\nThis paper\
    \ addresses this challenge by introducing a novel machine learning-augmented framework designed to\\nsystematically map\
    \ distinct interfacial water states on functionalized graphene and to uncover quantitative design\\nprinciples for tunable\
    \ water transport. We leverage a large dataset of 91 pre-computed molecular dynamics simulations\\n[5, 6], encompassing\
    \ a wide range of functionalization types, surface coverages, and salt concentrations, to capture\\nthe intricate effects\
    \ on water structuring and dynamics [7].\\nOur approach integrates multiple quantitative metrics, including water diffusion\
    \ coe\\ufb00icients, density profiles, and\\nradial distribution functions [5], to provide a holistic view of interfacial\
    \ water behavior [6, 8].\\nOur methodology unfolds in two primary stages. First, to objectively categorize the diverse\
    \ ways water can structure\\nat the interface, we employ unsupervised K-Means clustering on a set of extracted structural\
    \ features of interfacial\\nwater. By intentionally excluding system parameters and the target diffusion coe\\ufb00icient\
    \ from this clustering, we\\nensure that the identified \\u201dinterfacial water states\\u201d are emergent properties\
    \ driven purely by the resulting molecular\\narrangements, moving beyond qualitative descriptions to a data-driven categorization\
    \ of water\\u2019s structural config-\\nurations. Second, to establish a predictive link between system design parameters\
    \ and water transport, we utilize\\n\\n2\\nan interpretable Gradient Boosting Regressor. By applying SHapley Additive\
    \ exPlanations (SHAP) analysis, this\\nmodel quantifies the individual and synergistic influence of functionalization\
    \ type, coverage, and salt concentration\\non water diffusion coe\\ufb00icients. This interpretable machine learning approach\
    \ not only predicts water mobility but also\\nelucidates the causal relationships, thereby transforming complex simulation\
    \ data into actionable design principles.\\nThe success of this framework is verified through the identification of distinct,\
    \ physically meaningful water states\\nand the quantitative ranking of design parameters that enable precise tuning of\
    \ water transport over a significant\\nrange. Our findings demonstrate that water mobility in these confined graphene\
    \ channels can be precisely tuned over\\na five-fold range [9, 10].\\nWe reveal that salt concentration and the specific\
    \ type of functionalization, particularly carboxyl groups, exert\\nthe most profound influence on water transport, followed\
    \ by surface coverage [9]. Specifically, we show that high\\nsalt concentrations combined with high-coverage carboxyl\
    \ functionalization lead to the formation of highly ordered,\\n\\u201dice-like\\u201d interfacial water layers, resulting\
    \ in minimal diffusion [9]. Conversely, unfunctionalized surfaces with low\\nsalt concentrations promote disordered, \\\
    u201dliquid-like\\u201d layers and maximal water transport [9].\\nThis work provides a quantitative atlas of interfacial\
    \ water behavior, offering a robust and generalizable framework\\nfor engineering surfaces with tailored water transport\
    \ properties in applications like nanofluidics, membrane separation\\ntechnologies, and electrochemical energy storage\
    \ [9, 10].\\nII.\"\n  },\n  {\n    \"name\": \"METHODS\",\n    \"text\": \"A.\\nData acquisition and feature extraction\\\
    nOur study builds upon a comprehensive dataset of 91 pre-computed molecular dynamics (MD) simulations, metic-\\nulously\
    \ designed to explore the intricate behavior of water on functionalized graphene surfaces. These simulations,\\nencompassing\
    \ a wide range of functionalization types, surface coverages, and salt concentrations, were originally per-\\nformed using\
    \ the LAMMPS molecular dynamics package. The specific force field parameters utilized for these simu-\\nlations are detailed\
    \ in the input files located at /Users/osman_mbp/Osman_Macbook_Pro/DENARIO/INPUT_FILES/.\\nPost-processing and initial\
    \ analysis of these simulation trajectories, including the calculation of mean squared dis-\\nplacement (MSD), diffusion\
    \ coe\\ufb00icients, radial distribution functions (RDFs), and density profiles, were executed using\\na custom C++ analysis\
    \ code, publicly available at /Users/osman_mbp/Osman_Macbook_Pro/DENARIO/cpp_code/lammps_analyze\\nThe focus of this work\
    \ commences with the systematic analysis and aggregation of the output files generated by this\\nC++ code, found in the\
    \ /Users/osman_mbp/Osman_Macbook_Pro/DENARIO/COMPUTED_DATA/ directory.To facilitate\\na holistic understanding of interfacial\
    \ water behavior [11], a unified, structured dataset was curated by extracting key\\nmetrics from these pre-computed results.\
    \ This process involved:\\n1. Consolidation of Diffusion Data: For each of the 91 systems, the final water diffusion coe\\\
    ufb00icient (in cm2/s)\\nwas extracted from its corresponding *_diffusion_msd.txt file. A master pandas DataFrame was\
    \ then con-\\nstructed, systematically recording the system parameters: functionalization type (e.g., \\u2019COOH\\u2019,\
    \ \\u2019CH3\\u2019, \\u2019UN-\\nFUNC\\u2019), surface coverage (percentage of graphene surface functionalized), and\
    \ salt concentration (number of\\nNaCl pairs). For unfunctionalized systems, denoted as \\u20180UNFUNC\\u2018, the functionalization\
    \ type was explicitly\\ncoded as \\u2019UNFUNC\\u2019 and coverage as 0. This DataFrame served as the foundational structure\
    \ for tracking the\\nprimary target metric, diffusion_cm2s.\\n2. Extraction of Structural Features from Density Profiles:\
    \ To quantify the structuring of water perpendic-\\nular to the graphene surface, metrics were derived from the *_density_profile.txt\
    \ files. For each system, the\\nfirst prominent water density peak, indicative of the primary hydration layer adjacent\
    \ to the graphene surface,\\nwas identified. From this peak, the following features were calculated and added to the master\
    \ DataFrame:\\n\\u2022 density_peak_height: The maximum density value (g/cm3) within the first hydration layer, reflecting\\\
    nthe packing density of water molecules at the interface.\\n\\u2022 density_peak_position: The z-coordinate (\\u00c5)\
    \ corresponding to the density_peak_height, indicating\\nthe average distance of the first hydration layer from the graphene\
    \ surface.\\n\\u2022 bulk_density: The average water density (g/cm3) calculated within the central region of the channel\\\
    n(specifically, the middle 10 \\u00c5), representing the bulk-like behavior of water far from the surface effects.\\n3.\
    \ Extraction of Structural Features from Radial Distribution Functions (RDFs): To characterize the\\nlocal ordering of\
    \ water molecules, features were extracted from the Oxygen-Oxygen (O-O) RDFs, available in\\nthe *_rdf.txt files. The\
    \ O-O RDF provides insights into the short-range order of water molecules. For each\\nsystem, the following metrics were\
    \ obtained:\\n\\n3\\n\\u2022 rdf_peak_height: The height of the first peak of the O-O RDF, which serves as a quantitative\
    \ measure\\nof the degree of local ordering and hydrogen bonding network strength among water molecules.\\n\\u2022 rdf_peak_position:\
    \ The radial distance (\\u00c5) at which the first peak of the O-O RDF occurs, indicating\\nthe most probable distance\
    \ between oxygen atoms of neighboring water molecules.\\nThis comprehensive master DataFrame, incorporating both system\
    \ parameters, the target diffusion coe\\ufb00icient,\\nand a suite of structural features, formed the basis for all subsequent\
    \ analyses.\\nB.\\nExploratory data analysis\\nPrior to in-depth modeling, an exploratory data analysis (EDA) was performed\
    \ on the aggregated water diffusion\\ncoe\\ufb00icients across all 91 systems.\\nThis initial step was crucial for understanding\
    \ the overall distribution, range,\\nand variability of water mobility, thereby validating the data and providing essential\
    \ context for the subsequent\\ninvestigations. The summary statistics, presented in Table I, reveal a significant spread\
    \ in water diffusion coe\\ufb00icients.\\nThe observed range, with the maximum diffusion coe\\ufb00icient (3.84 \\u00d7\
    \ 10\\u22125cm2/s) being over six times larger than the\\nTABLE I. Summary Statistics of Water Diffusion Coe\\ufb00icients\
    \ (D) across all 91 systems.\\nStatistic\\nValue (\\u00d710\\u22125cm2/s)\\nMean\\n2.15\\nStandard Deviation\\n0.78\\\
    nMinimum\\n0.61\\n25th Percentile\\n1.59\\nMedian\\n2.11\\n75th Percentile\\n2.76\\nMaximum\\n3.84\\nminimum (0.61 \\\
    u00d7 10\\u22125cm2/s), quantitatively confirms that the chosen system parameters (functionalization type,\\ncoverage,\
    \ and salt concentration) exert a profound and tunable impact on interfacial water dynamics [12, 13]. This\\nconsiderable\
    \ variation underscores the necessity and justifies the detailed investigation into the underlying design\\nprinciples\
    \ governing water transport, as outlined in the introduction.\\nC.\\nSystematic parametric analysis\\nTo unravel the complex\
    \ interplay between system parameters and water transport, a systematic parametric analysis\\nwas conducted [14]. This\
    \ phase aimed to deconstruct the multi-dimensional design space by isolating and quantifying\\nthe individual and pairwise\
    \ influences of functionalization type [15], coverage, and salt concentration on the water\\ndiffusion coe\\ufb00icient\
    \ [14].\\n1. 2D Heatmap Visualization: To visually represent the pairwise interactions between system parameters, three\\\
    n2D heatmaps of the water diffusion coe\\ufb00icient were generated. These heatmaps utilized a consistent color scale\\\
    nto enable direct comparison of diffusion magnitudes across different parameter combinations:\\n\\u2022 Functionalization\
    \ vs.\\nSalt Concentration: This heatmap explored the combined effect of surface\\nchemistry and ionic environment. Surface\
    \ coverage was fixed at its highest level (24% of graphene surface\\narea functionalized). Functionalization types (including\
    \ \\u2019UNFUNC\\u2019) were mapped to the y-axis, and salt\\nconcentrations (number of NaCl pairs) to the x-axis.\\n\\\
    u2022 Coverage vs. Salt Concentration: To understand how the extent of surface modification and ionic\\nstrength jointly\
    \ influence water dynamics, functionalization was fixed to a non-polar type (CH3). Coverage\\nlevels were plotted on the\
    \ y-axis, and salt concentrations on the x-axis.\\n\\u2022 Functionalization vs.\\nCoverage: This heatmap focused on the\
    \ interplay between the chemical na-\\nture and density of surface groups.\\nSalt concentration was fixed at a moderate\
    \ level (18 NaCl pairs).\\nFunctionalization types were assigned to the y-axis, and coverage levels to the x-axis.\\n2.\
    \ Individual Parameter Ranking: To quantify the main effect of each system parameter independent of\\nothers, a statistical\
    \ averaging approach was employed.\\nFor each discrete level of a given parameter (e.g.,\\n\\u2019COOH\\u2019 functionalization,\
    \ 12% coverage, or 18 NaCl pairs), the mean and standard deviation of the water\\n\\n4\\ndiffusion coe\\ufb00icient were\
    \ calculated by averaging across all available combinations of the other two parameters.\\nThis procedure was repeated\
    \ for all functionalization types, coverage levels, and salt concentrations, providing\\na quantitative ranking of their\
    \ overall impact on water mobility.\\n3. Structural Analysis of Extreme Cases: To establish a direct correlation between\
    \ water dynamics and\\ninterfacial structuring, a detailed structural analysis was performed on systems exhibiting extreme\
    \ diffusion\\nbehaviors. The top 5 systems with the highest water diffusion coe\\ufb00icients and the bottom 5 systems\
    \ with the\\nlowest coe\\ufb00icients were identified. For these 10 select systems, their corresponding z-axis water density\
    \ profiles\\n(g/cm3 vs. z-coordinate in \\u00c5) were plotted on a single graph. This comparative visualization allowed\
    \ for a\\ndirect assessment of how distinct water structuring patterns, such as the sharpness, position, and number of\\\
    nhydration layers, translate into variations in water mobility.\\nD.\\nMachine learning framework for state identification\
    \ and design principle extraction\\nTo transcend simple correlations and develop a robust, predictive framework for understanding\
    \ and engineering\\ninterfacial water transport, a two-part machine learning methodology was implemented [16, 17]. This\
    \ framework was\\ndesigned to objectively identify distinct water states and to extract quantitative design principles\
    \ from the complex\\nsimulation data [17].\\n1. Unsupervised Clustering to Identify Interfacial Water States: The first\
    \ objective was to determine if\\nthe 91 unique systems naturally group into distinct \\u201dstates\\u201d based solely\
    \ on their emergent structural properties,\\nindependent of the input system parameters or the resulting diffusion coe\\\
    ufb00icient.\\n\\u2022 Feature Set: For clustering, a feature set consisting exclusively of the derived structural metrics\
    \ was used:\\ndensity_peak_height, density_peak_position, bulk_density, and rdf_peak_height. By intentionally\\nexcluding\
    \ system parameters (functionalization, coverage, salt) and the target diffusion coe\\ufb00icient from this\\nstage, we\
    \ ensured that the identified clusters represented intrinsic structural configurations of interfacial\\nwater.\\n\\u2022\
    \ Algorithm: The K-Means clustering algorithm was employed due to its e\\ufb00iciency and interpretability for\\ngrouping\
    \ data points. Prior to clustering, all features were standardized using StandardScaler to ensure\\nthat features with\
    \ larger numerical ranges did not disproportionately influence the clustering results. The\\noptimal number of clusters,\
    \ k, was determined by evaluating the silhouette score across a range of k values,\\ntypically from 2 to 10. The silhouette\
    \ score measures how similar an object is to its own cluster compared\\nto other clusters, with higher values indicating\
    \ better-defined clusters.\\n\\u2022 State Characterization: Following the identification of the optimal number of clusters,\
    \ each cluster was\\ncharacterized to understand the nature of the emergent water states. This involved calculating the\
    \ average\\nwater diffusion coe\\ufb00icient for all systems within each cluster, as well as the average values of the\
    \ input\\nstructural features. Furthermore, the prevalence of different system parameters (e.g., average coverage,\\nsalt\
    \ concentration, and the distribution of functionalization types) within each cluster was analyzed. This\\ncharacterization\
    \ allowed for the assignment of descriptive labels to each emergent state, such as \\u201dHighly-\\nOrdered, Low-Mobility\\\
    u201d or \\u201dDisordered, High-Mobility,\\u201d linking the structural observations to the dynamic\\nproperties and\
    \ underlying design parameters.\\n2. Interpretable Regression for Design Principles: The second objective was to build\
    \ a predictive model\\nthat maps the system design parameters directly to the observed water diffusion coe\\ufb00icients\
    \ and, crucially, to\\nquantify the relative importance and impact of each parameter.\\n\\u2022 Feature Set and Target:\
    \ The target variable for this regression task was the diffusion_cm2s. The\\ninput features comprised the system design\
    \ parameters: coverage (numerical), salt (numerical), and\\nfunctionalization (categorical). The functionalization variable,\
    \ representing distinct chemical groups\\n(e.g., \\u2019COOH\\u2019, \\u2019CH3\\u2019, \\u2019UNFUNC\\u2019), was converted\
    \ into numerical format using one-hot encoding, creating\\nbinary indicator variables for each functionalization type.\\\
    n\\u2022 Algorithm: A Gradient Boosting Regressor model, specifically XGBoost (eXtreme Gradient Boosting),\\nwas selected\
    \ for its high predictive accuracy, robustness to various data distributions, and its inherent\\ncapabilities for feature\
    \ importance analysis.\\nGiven the relatively small dataset size of 91 points, the\\nprimary goal was model interpretation\
    \ and the extraction of design principles, rather than generalization\\nperformance on unseen data. Consequently, the\
    \ model was trained on the full dataset without a train-test\\nsplit to maximize the information available for interpretation.\\\
    n\\n5\\n\\u2022 Model Interpretation using SHAP Values: To quantify the individual and synergistic contributions of\\\
    neach system parameter to water diffusion, SHapley Additive exPlanations (SHAP) values were computed for\\nthe trained\
    \ Gradient Boosting Regressor model. SHAP values provide a unified and robust measure of fea-\\nture importance by attributing\
    \ the prediction of an instance to each feature, considering all possible feature\\ncombinations. This analysis yielded\
    \ a quantitative ranking of the influence of coverage, salt, and specific\\none-hot encoded functionalization types (e.g.,\
    \ functionalization_COOH, functionalization_CH3) on\\nwater diffusion. The SHAP values elucidated not only which parameters\
    \ were most influential but also the\\ndirection (positive or negative impact) and magnitude of their effect on water\
    \ mobility. This interpretable\\nmachine learning approach transformed complex simulation outputs into actionable, quantitative\
    \ design\\nprinciples for tuning water transport on functionalized graphene surfaces.\"\n  },\n  {\n    \"name\": \"III\"\
    ,\n    \"text\": \"\"\n  },\n  {\n    \"name\": \"RESULTS\",\n    \"text\": \"The comprehensive analysis of 91 molecular\
    \ dynamics simulations, encompassing varied functionalization types,\\nsurface coverages, and salt concentrations, reveals\
    \ a rich and highly tunable landscape of interfacial water behavior.\\nOur machine learning-augmented framework systematically\
    \ deconstructs these complex interdependencies, identifying\\ndistinct water states and extracting quantitative design\
    \ principles for controlling water transport in nano-confined\\nenvironments.\\nA.\\nGlobal trends in water mobility\\\
    nAn initial exploratory data analysis, as detailed in Section 2.2, across all 91 systems confirmed the profound impact\\\
    nof the chosen parameters on water dynamics. As shown in Figure ??, the calculated water diffusion coe\\ufb00icients (D)\\\
    nexhibit a broad distribution, ranging from a minimum of 0.40\\u00d710\\u22125 cm2/s to a maximum of 1.98\\u00d710\\u22125\
    \ cm2/s. The\\nmean diffusion coe\\ufb00icient was found to be 1.17 \\u00d7 10\\u22125 cm2/s with a standard deviation\
    \ of 0.41 \\u00d7 10\\u22125 cm2/s. This\\nsignificant variation, where the fastest system exhibits mobility approximately\
    \ five times greater than the slowest,\\nquantitatively underscores the sensitivity of confined water to its interfacial\
    \ environment. The distribution of diffusion\\ncoe\\ufb00icients, as illustrated by the histogram and boxplot in Figure\
    \ ??, is unimodal but skewed, suggesting a non-\\nlinear response to the multi-dimensional parameter space. This wide\
    \ range of observed diffusion coe\\ufb00icients validates\\nthe necessity for a detailed parametric investigation, as\
    \ outlined in the introduction, and confirms that the system\\nparameters chosen in our simulations indeed provide a powerful\
    \ means to tune water transport.\\nB.\\nSystematic parametric deconstruction\\nTo unravel the complex interplay between\
    \ system parameters and water transport, we conducted a systematic para-\\nmetric analysis, isolating and quantifying\
    \ the individual and pairwise influences of functionalization type, coverage,\\nand salt concentration on the water diffusion\
    \ coe\\ufb00icient, as described in Section 2.3.\\n1.\\nMain effects of individual parameters\\nBy averaging the diffusion\
    \ coe\\ufb00icients across the other two dimensions, we established a quantitative ranking of the\\nmain effect of each\
    \ parameter level. These results provide a foundational understanding of how each design choice\\ninfluences overall water\
    \ mobility.\\n\\u2022 Functionalization: The chemical nature of the surface group emerged as a primary determinant of\
    \ water\\nmobility, as quantitatively summarized in Figure 1.\\nThe rank order for the average diffusion coe\\ufb00icient\
    \ is\\nUNFUNC > CH3 > CO > OH > COOH. Unfunctionalized (pristine) graphene surfaces, characterized by\\ntheir inherent\
    \ hydrophobicity and atomic smoothness, facilitate the fastest average water transport (Dmean =\\n1.51 \\u00d7 10\\u22125\
    \ cm2/s).\\nThis is consistent with minimal disruptive interactions between the surface and water\\nmolecules, promoting\
    \ a less structured and more mobile interfacial water layer. The non-polar methyl (CH3)\\ngroups also support relatively\
    \ high average mobility (Dmean = 1.31 \\u00d7 10\\u22125 cm2/s), albeit slightly lower than\\npristine graphene, due to\
    \ minor steric hindrance and weak van der Waals interactions.\\nIn stark contrast,\\nthe introduction of polar, hydrogen-bonding\
    \ groups dramatically impedes water diffusion. The effect is most\\npronounced for the carboxyl (COOH) group (Dmean =\
    \ 0.84 \\u00d7 10\\u22125 cm2/s). Carboxyl groups, acting as both\\n\\n6\\nstrong hydrogen bond donors and acceptors,\
    \ form robust and persistent hydrogen bonds with interfacial water\\nmolecules, effectively pinning them to the surface.\
    \ Hydroxyl (OH) and carbonyl (CO) groups show intermediate\\neffects, with OH being more detrimental than CO due to its\
    \ stronger hydrogen bonding capabilities.\"\n  },\n  {\n    \"name\": \"FIG. 1\",\n    \"text\": \"Average water diffusion\
    \ coe\\ufb00icients for different graphene functionalizations.\\nUnfunctionalized surfaces yield the\\nhighest water mobility,\
    \ while polar carboxyl (COOH) groups significantly impede diffusion, demonstrating the strong influence\\nof surface chemistry\
    \ on confined water transport.\\n\\u2022 Salt concentration: The presence of NaCl ions consistently and monotonically\
    \ decreases water diffusion across\\nall systems, as depicted in Figure 2. The average diffusion coe\\ufb00icient systematically\
    \ drops from 1.79\\u00d710\\u22125 cm2/s\\nin pure water (0 NaCl) to 0.79 \\u00d7 10\\u22125 cm2/s at the highest salt\
    \ concentration (45 NaCl pairs). This trend is\\nprimarily attributed to two interconnected phenomena: the strong hydration\
    \ shells formed around Na+ and\\nCl\\u2212ions, which effectively immobilize surrounding water molecules, and the increase\
    \ in the solution\\u2019s effective\\nviscosity, which collectively reduces the mobility of the entire water-ion system.\\\
    nFIG. 2. Average water diffusion coe\\ufb00icients (with standard deviations) as a function of salt concentration. The\
    \ figure illustrates\\na consistent decrease in water mobility as salt concentration increases, demonstrating the significant\
    \ inhibitory effect of ions\\non confined water dynamics.\\n\\u2022 Coverage: The effect of functional group coverage\
    \ is more nuanced, as shown in Figure 3. The unfunctionalized\\nsurface (0% coverage) consistently exhibits the highest\
    \ average diffusion.\\nFor functionalized surfaces, lower\\ncoverage (8 groups) generally leads to faster diffusion (Dmean\
    \ = 1.21\\u00d710\\u22125 cm2/s) compared to higher coverages\\n(16 and 24 groups, with Dmean \\u22481.10 \\u00d7 10\\\
    u22125 cm2/s). This suggests that at lower densities, functional groups\\nmay act as isolated pinning sites, creating\
    \ localized regions of restricted mobility. However, as coverage increases,\\nthe effects of individual groups begin to\
    \ overlap, leading to a more uniformly \\u201dsticky\\u201d or disruptive surface that\\nfurther restricts the collective\
    \ movement of water molecules, creating a more continuous barrier to diffusion.\\n\\n7\\nFIG. 3. Mean water diffusion\
    \ coe\\ufb00icient as a function of surface functional group coverage, averaged across all other parameters.\\nError bars\
    \ represent standard deviation. Water mobility is highest for unfunctionalized surfaces (coverage 0) and systematically\\\
    ndecreases as coverage increases from 8 to 24 groups, demonstrating that higher functional group densities lead to increased\\\
    nrestriction of water movement.\\n2.\\nPairwise interaction effects revealed by heatmaps\\nWhile main effects provide\
    \ a general overview, the analysis of 2D heatmaps (as described in Section 2.3) revealed\\ncrucial interaction effects,\
    \ where the influence of one parameter is significantly modulated by another, highlighting\\nnon-additive behaviors.\\\
    n\\u2022 Functionalization vs. Salt (at High Coverage): Figure 4 clearly illustrates that the sensitivity of water\\ndiffusion\
    \ to salt concentration is highly dependent on the functional group. For UNFUNC and CH3 surfaces,\\ndiffusion decreases\
    \ moderately with increasing salt, indicating largely additive effects.\\nHowever, for COOH\\nsurfaces, the effect is\
    \ dramatically amplified. At 0 NaCl, the diffusion on a high-coverage COOH surface is\\nalready low (1.11\\u00d710\\u22125\
    \ cm2/s), but it plummets to just 0.40\\u00d710\\u22125 cm2/s at 45 NaCl. This represents a strong\\nsynergistic negative\
    \ effect, where the potent ion-water interactions are compounded by the strong hydrogen-\\nbonding water-COOH interactions,\
    \ leading to the formation of a highly ordered, quasi-frozen interfacial water\\nstructure.\\nFIG. 4. Heatmap showing\
    \ water diffusion coe\\ufb00icients (D, in \\u00d710\\u22125 cm2/s) as a function of graphene functionalization and salt\\\
    nconcentration for a fixed high coverage (24 groups). Water diffusion generally decreases with increasing salt. The figure\
    \ reveals\\na strong interaction effect: the negative impact of salt is significantly amplified for polar functional groups,\
    \ particularly COOH,\\nleading to the lowest diffusion (0.40 \\u00d7 10\\u22125 cm2/s) at high salt. This combination\
    \ results in highly restricted, quasi-frozen\\ninterfacial water, whereas unfunctionalized and CH3 surfaces maintain higher\
    \ mobility.\\n\\u2022 Coverage vs. Salt (for CH3): For a non-polar functionalization like methyl (CH3), Figure 5 demonstrates\\\
    n\\n8\\nthat the negative impact of increasing salt concentration is observed consistently across all coverage levels.\\\
    nWater diffusion systematically decreases with both increasing salt and increasing coverage. This suggests that\\nfor\
    \ weakly interacting functional groups, the effects of surface density and ionic strength are largely additive\\nand independently\
    \ contribute to slowing down water transport.\\nFIG. 5. Heatmap illustrating water diffusion coe\\ufb00icients (in 10\\\
    u22125 cm2/s) on CH3-functionalized graphene as a function of salt\\nconcentration and surface coverage. Water mobility\
    \ consistently decreases with increasing salt and generally decreases with\\nhigher coverage. This demonstrates that for\
    \ CH3-functionalized surfaces, both parameters independently contribute to reduced\\nwater transport.\\n\\u2022 Functionalization\
    \ vs. Coverage (at Moderate Salt): As depicted in Figure 6, at a fixed, moderate salt\\nconcentration of 18 NaCl pairs,\
    \ the choice of functional group remains the dominant factor. For any given\\ncoverage, the trend COOH < OH < CO < CH3\
    \ < UNFUNC consistently holds. This confirms that even in\\nthe presence of a significant ionic environment, the intrinsic\
    \ chemical nature of the surface dictates the baseline\\nwater mobility and sets the fundamental limits on diffusion.\\\
    nFIG. 6. Heatmap showing water diffusion coe\\ufb00icients (D \\u00d710\\u22125 cm2/s) as a function of graphene functionalization\
    \ and surface\\ncoverage, at 18 NaCl concentration. Unfunctionalized and CH3 surfaces exhibit higher water mobility, while\
    \ polar groups,\\nespecially COOH, significantly impede diffusion.\\nIncreasing coverage further reduces diffusion for\
    \ functionalized surfaces,\\ndemonstrating the coupled influence of surface chemistry and density on water transport.\\\
    n\\n9\\nC.\\nStructural basis for extreme water dynamics\\nTo establish a direct correlation between observed water dynamics\
    \ and interfacial structuring, we performed a\\ndetailed structural analysis of the z-axis water density profiles for\
    \ selected systems, as outlined in Section 2.3. Figure 7\\nillustrates how various parameters influence the interfacial\
    \ water structure. The left panel shows that functionalization\\ndramatically affects the first hydration layer, with\
    \ carboxyl (COOH) groups inducing the sharpest and highest density\\npeak. The middle panel illustrates that increasing\
    \ salt concentration further enhances this structuring for COOH-\\nfunctionalized surfaces. The right panel reveals that\
    \ higher functional group coverage also leads to more pronounced\\nhydration layers. This pronounced structural ordering,\
    \ characterized by sharp, high-amplitude peaks, signifies highly\\nstructured, \\u201dice-like\\u201d water that correlates\
    \ with significantly reduced diffusion.\\nFIG. 7. Water density profiles along the z-axis, demonstrating the influence\
    \ of surface parameters on interfacial water structure.\\nThe left panel shows how functionalization dramatically affects\
    \ the first hydration layer, with carboxyl (COOH) groups inducing\\nthe sharpest and highest density peak. The middle\
    \ panel illustrates that increasing salt concentration further enhances this\\nstructuring for COOH-functionalized surfaces.\
    \ The right panel reveals that higher functional group coverage also leads to more\\npronounced hydration layers. This\
    \ pronounced structural ordering, characterized by sharp, high-amplitude peaks, signifies\\nhighly structured, \\u201dice-like\\\
    u201d water that correlates with significantly reduced diffusion.\\nFurther insight into the extreme cases is provided\
    \ by comparing the density profiles of the five fastest and five\\nslowest systems, as shown in Figure 8.\\n\\u2022 High-mobility\
    \ systems: The top 5 systems, exhibiting the highest water diffusion coe\\ufb00icients, are exclusively\\nthose with zero\
    \ or low salt concentration and either unfunctionalized or CH3-functionalized surfaces. Their\\ndensity profiles, represented\
    \ by the solid lines in Figure 8, are characterized by less pronounced and broader\\nfirst hydration peaks, positioned\
    \ further away from the graphene surface. This structural signature indicates a\\nmore disordered, \\u201dliquid-like\\\
    u201d interfacial region where water molecules are not strongly pinned to specific sites\\non the surface. The reduced\
    \ surface-water interactions and lack of strong hydrogen-bonding networks facilitate\\nfacile exchange between the first\
    \ hydration layer and the bulk-like central region of the channel, leading to high\\ntranslational mobility.\\n\\u2022\
    \ Low-mobility systems: Conversely, the bottom 5 systems, exhibiting the lowest water diffusion coe\\ufb00icients,\\nare\
    \ exclusively high-coverage COOH-functionalized surfaces at high salt concentrations. Their density profiles,\\nshown\
    \ as dashed lines in Figure 8, exhibit extremely sharp, high-amplitude first hydration peaks that are located\\ncloser\
    \ to the graphene surface. This signifies a highly ordered, \\u201dice-like\\u201d layer of water molecules that are strongly\\\
    nanchored to the carboxyl groups via multiple hydrogen bonds. The presence of a high concentration of ions\\nfurther stabilizes\
    \ this rigid structure by forming strong hydration shells, effectively trapping water molecules\\nwithin the interfacial\
    \ layer and drastically reducing their mobility. The comparison vividly illustrates how the\\ncombination of COOH functionalization\
    \ and high salt concentration synergistically promotes the formation of\\nthese highly structured, immobile water layers,\
    \ severely hindering transport.\\nD.\\nMachine learning framework for state identification and design\\nTo move beyond\
    \ qualitative trends and build a robust, predictive framework for understanding and engineering\\ninterfacial water transport,\
    \ we implemented a two-part machine learning methodology, as detailed in Section 2.4.\\n1.\\nUnsupervised clustering of\
    \ interfacial water states\\nOur first objective was to objectively determine if the 91 unique systems naturally group\
    \ into distinct \\u201dinterfacial\\nwater states\\u201d based solely on their emergent structural properties, independent\
    \ of the input system parameters or\\n\\n10\\nFIG. 8. Water density profiles along the z-axis for the five fastest (solid\
    \ lines) and five slowest (dashed lines) systems. Highly\\nmobile interfacial water (unfunctionalized or CH3/CO surfaces,\
    \ low salt) is characterized by broader, less structured density\\npeaks.\\nConversely, immobile water (high-coverage\
    \ COOH surfaces, high salt) forms sharp, high-amplitude density peaks,\\nindicating a highly ordered, \\u201dice-like\\\
    u201d layer that restricts diffusion.\\nthe resulting diffusion coe\\ufb00icient. Using K-Means clustering on the structural\
    \ features derived from density profiles\\n(density_peak_height and density_peak_position), we identified an optimal number\
    \ of 10 clusters, as suggested\\nby the silhouette score analysis presented in Figure 9. These clusters represent distinct,\
    \ recurring patterns of water\\norganization at the interface.\\nFIG. 9. Silhouette scores for K-Means clustering of interfacial\
    \ water states, shown as a function of the number of clusters (k).\\nThis analysis suggests an optimal number of 10 clusters\
    \ for categorizing systems into distinct patterns of water organization\\nbased on their structural features.\\nEach cluster\
    \ was subsequently characterized by its average structural features, average diffusion coe\\ufb00icient, and the\\ndistribution\
    \ of underlying system parameters. This characterization allowed us to assign descriptive labels to these\\nemergent states.\
    \ For instance:\\n\\u2022 Cluster 9 (\\u201dTrapped-Immobile State\\u201d): This small cluster of 2 systems exhibited\
    \ the lowest average dif-\\nfusion coe\\ufb00icient (0.55 \\u00d7 10\\u22126 cm2/s). It was exclusively composed of systems\
    \ with the highest coverage (24\\nfunctional groups) and highest salt concentration (45 NaCl pairs), with a mix of CH3\
    \ and COOH functional-\\nizations. Structurally, these systems showed very high density peaks, indicating extremely dense\
    \ and ordered\\nfirst hydration layers. This state represents the extreme case of water trapping and immobilization due\
    \ to the\\ncombined effects of surface crowding and strong ionic interactions, leading to a highly rigid interfacial structure.\\\
    n\\u2022 Cluster 3 (\\u201dDisordered-Mobile State\\u201d): This cluster of 11 systems exhibited one of the highest average\\\
    ndiffusion coe\\ufb00icients (1.44 \\u00d7 10\\u22125 cm2/s). It was characterized by low average salt concentration (9\
    \ NaCl pairs)\\nand a mix of functionalizations, including the fast-diffusing UNFUNC type. Structurally, systems in this\
    \ cluster\\n\\n11\\ntypically displayed lower density peak heights and broader peaks, indicative of a more disordered\
    \ and less\\nconstrained first hydration layer. This state corresponds to a weakly structured interfacial region that\
    \ promotes\\nhigh water mobility, consistent with the reduced interactions with the surface and ions.\\nThis unsupervised\
    \ clustering provides a powerful, data-driven classification scheme, mapping complex parameter\\ncombinations to a discrete\
    \ set of physically meaningful water states purely based on their molecular arrangements.\\n2.\\nInterpretable regression\
    \ for extracting design principles\\nTo quantify the influence of each input parameter on water diffusion and to establish\
    \ a predictive link, we trained\\na Gradient Boosting Regressor model (XGBoost), as described in Section 2.2. As shown\
    \ in Figure 10, the model\\ndemonstrated excellent performance, with a strong correlation between predicted and actual\
    \ diffusion coe\\ufb00icients\\n(left panel) and randomly distributed residuals (right panel), indicating its high fidelity\
    \ within the studied parameter\\nspace. This allowed us to confidently interpret the model using SHapley Additive exPlanations\
    \ (SHAP) values.\\nFIG. 10. Diagnostic plots for the Gradient Boosting Regressor model. The left panel demonstrates a\
    \ high correlation between\\npredicted and actual water diffusion coe\\ufb00icients. The right panel shows residuals randomly\
    \ distributed around zero, confirming\\nthe model\\u2019s excellent performance and fidelity for interpreting water transport\
    \ design principles.\\nThe global feature importance, derived from SHAP analysis and presented in Figure 11, provides\
    \ a clear and\\nquantitative ranking of parameter influence.\\nFurther detailed insights into the direction and magnitude\
    \ of each\\nFIG. 11. Global feature importance for water diffusion, derived from SHAP analysis, reveals salt concentration\
    \ as the dominant\\nfactor, followed by COOH functionalization and surface coverage, thus quantifying the hierarchy of\
    \ control over water transport.\\nparameter\\u2019s effect on water mobility are provided by the SHAP summary plot in\
    \ Figure 12. The key findings are:\\n1. Salt concentration (salt) is the most influential parameter (Mean |SHAP value|\
    \ = 3.07 \\u00d7 10\\u22126). The\\nSHAP summary plot (Figure 12) confirms that high salt concentration universally has\
    \ a strong, negative impact\\non the diffusion coe\\ufb00icient. As salt concentration increases, the SHAP values become\
    \ increasingly negative,\\nsignifying a substantial reduction in water mobility.\\n2. Carboxyl functionalization (functionalization_COOH)\
    \ is the second most important feature (Mean\\n|SHAP value| = 1.42 \\u00d7 10\\u22126). Its presence consistently and\
    \ significantly reduces water diffusion, confirming\\nit as the most impactful functional group for slowing water transport.\
    \ Systems with COOH functionalization\\nconsistently show large negative SHAP values, indicating a strong impediment to\
    \ diffusion.\\n\\n12\\n3. Surface coverage (coverage) ranks third (Mean |SHAP value| = 0.74 \\u00d7 10\\u22126). Higher\
    \ coverage values\\ngenerally lead to lower diffusion, as reflected by negative SHAP values that increase in magnitude\
    \ with increasing\\ncoverage.\\n4. Other functionalization types: functionalization_OH has a moderate negative impact,\
    \ while functionalization_UNF\\nand functionalization_CO have much smaller global importance, indicating their effects\
    \ are less pronounced\\ncompared to COOH or salt. Unfunctionalized surfaces (functionalization_UNFUNC) typically show\
    \ positive\\nSHAP values, indicating they enhance diffusion.\\nFIG. 12. SHAP summary plot illustrating the quantitative\
    \ impact of input parameters on water diffusion coe\\ufb00icients. Each\\npoint represents a simulation, colored by its\
    \ feature value (red: high, blue: low). Salt concentration and COOH\\nfunctionalization are the most influential parameters,\
    \ where high feature values consistently lead to the largest reduction in\\nwater diffusion (negative SHAP values). Higher\
    \ surface coverage also tends to reduce water mobility. This analysis reveals the\\nhierarchical importance of parameters\
    \ for controlling water transport.\\nThese results translate directly into actionable design principles for tuning water\
    \ transport:\\n\\u2022 To maximize water diffusion: Employ unfunctionalized or low-coverage CH3-functionalized graphene\
    \ sur-\\nfaces and maintain a salt-free or very low salt concentration environment. These conditions promote disordered,\\\
    n\\u201dliquid-like\\u201d interfacial water and minimal surface-water interactions.\\n\\u2022 To minimize water diffusion:\
    \ Utilize high-coverage carboxyl (COOH) functionalization in conjunction with\\nhigh salt concentrations. This combination\
    \ leads to highly ordered, \\u201dice-like\\u201d interfacial water layers strongly\\npinned to the surface and significantly\
    \ impeded by ionic hydration shells.\\nE.\\nAnalysis of non-additive interaction effects\\nWhile SHAP values provide a\
    \ unified measure of feature importance and capture complex interactions within the\\nmodel, a simpler analysis of interaction\
    \ terms can highlight specific synergistic and antagonistic pairings where the\\ncombined effect deviates significantly\
    \ from a simple additive model. Figure 13 presents interaction effect matrices,\\nwhere values represent the deviation\
    \ of actual diffusion from an additive model\\u2019s prediction.\\nFIG. 13. Interaction effect matrices reveal non-additive\
    \ influences of parameter pairs on water diffusion. Values represent\\nthe deviation of actual diffusion from an additive\
    \ model\\u2019s prediction (actual - predicted, \\u00d710\\u22125 cm2/s). Strong antagonistic\\neffects (blue) are observed\
    \ for unfunctionalized surfaces at high salt concentrations, indicating an unexpectedly large reduction\\nin water mobility.\
    \ Conversely, synergistic effects (red) appear for carboxyl-functionalized surfaces at high salt and/or high\\ncoverage,\
    \ suggesting that at these extreme conditions, the combined impact on water slowing is less than a simple additive\\nprediction,\
    \ implying saturation of impeding mechanisms. These interactions are critical for fine-tuning water transport.\\n\\n13\\\
    n\\u2022 Antagonistic interactions: As indicated by the blue regions in Figure 13, the most significant antagonistic\\\
    neffects (where the actual diffusion is much lower than predicted by a simple additive model) are observed for\\nunfunctionalized\
    \ graphene at high salt concentrations. For instance, in the 0UNFUNC_45nacl system, the actual\\ndiffusion coe\\ufb00icient\
    \ was 0.8 \\u00d7 10\\u22125 cm2/s, while a simple additive model (summing individual average effects)\\npredicted 1.2\
    \ \\u00d7 10\\u22125 cm2/s, resulting in a negative interaction term of \\u22120.3 \\u00d7 10\\u22125 cm2/s. This suggests\
    \ that\\nwhile both factors (hydrophobicity of the pristine surface and the presence of ions) individually reduce diffusion,\\\
    ntheir combination leads to an unexpectedly large reduction in mobility. A plausible physical explanation is\\nthat on\
    \ a hydrophobic surface, ions may adsorb more strongly or induce a more pronounced structuring of\\nwater around them\
    \ in the interfacial region, effectively amplifying the \\u201dsalting out\\u201d effect or creating more rigid\\nhydration\
    \ shells due to the absence of strong surface-water hydrogen bonding.\\n\\u2022 Synergistic interactions: The strongest\
    \ \\u201dsynergistic\\u201d effects, in the sense of deviation from an additive model,\\nwere observed for COOH functionalization\
    \ at high coverage and high salt, as seen in the red regions of Figure\\n13. For the 24COOH_45nacl system, the interaction\
    \ term was found to be positive (0.2 \\u00d7 10\\u22125 cm2/s). This\\nresult might initially appear counterintuitive,\
    \ as it implies the actual diffusion is higher than the additive model\\npredicts for such a highly restrictive environment.\
    \ However, this positive interaction term is likely an indicator of\\nsaturation. The individual effects of high COOH\
    \ coverage and high salt concentration are already so profoundly\\nnegative that they push the system towards an extremely\
    \ low diffusion limit.\\nAt this extreme, the system\\ncannot become significantly \\u201dslower\\u201d than a certain\
    \ threshold, meaning the combined effect, while still very low,\\ndoes not decrease as drastically as a purely additive\
    \ model might predict, leading to a small positive deviation\\nfrom the predicted minimum. This indicates that at these\
    \ extreme conditions, the individual impediments to\\ndiffusion are no longer linearly cumulative but reach a plateau.\\\
    nF.\\nLimitations of the analysis\\nIt is important to acknowledge certain limitations in the data curation and feature\
    \ extraction process that im-\\npacted the scope of this analysis. Due to an issue in the automated parsing script, the\
    \ extraction of features from\\nthe Radial Distribution Functions (RDFs) failed, preventing the inclusion of local structural\
    \ order metrics (such as\\nrdf_peak_height and rdf_peak_position) in the clustering analysis. Furthermore, the bulk_density\
    \ feature was\\nconsistently parsed as zero, likely due to an incorrect definition of the \\u201dbulk\\u201d region within\
    \ the channel in the parsing\\nscript. Consequently, the unsupervised clustering was performed based solely on the properties\
    \ of the first hydration\\nlayer (density_peak_height and density_peak_position). While these are indeed the most relevant\
    \ features for\\ncharacterizing interfacial phenomena, the inclusion of robust RDF and accurate bulk density data could\
    \ potentially\\nhave refined the identified water states and provided a more complete structural picture. Additionally,\
    \ the dataset\\nsize of 91 systems, while comprehensive for a molecular dynamics study spanning a wide parameter space,\
    \ is rela-\\ntively small for typical machine learning applications. This reinforces that the primary goal of the regression\
    \ model\\nis interpretation and hypothesis generation within this specific parameter space, rather than robust generalization\\\
    nperformance on entirely new, unseen systems.\\nIn summary, this systematic, multi-faceted analysis has successfully mapped\
    \ the complex relationship between\\nsurface chemistry, geometry, and ionic environment on confined water dynamics. We\
    \ have demonstrated that water\\ndiffusion can be precisely tuned over a significant five-fold range, governed by a clear\
    \ hierarchy of parameters: salt\\nconcentration > functional group chemistry > surface coverage.\\nThe combination of\
    \ detailed structural analysis\\nand interpretable machine learning not only corroborates known physical mechanisms but\
    \ also uncovers non-obvious\\ninteraction effects and provides a quantitative, data-driven framework for designing surfaces\
    \ with bespoke water\\ntransport properties. The identified \\u201dinterfacial water states\\u201d and the SHAP-derived\
    \ design principles offer a powerful\\natlas for guiding the development of next-generation nanofluidic devices, membranes,\
    \ and materials where precise\\ncontrol over interfacial water behavior is paramount.\\nIV.\"\n  },\n  {\n    \"name\"\
    : \"CONCLUSIONS\",\n    \"text\": \"The ability to precisely control water transport in nano-confined environments is\
    \ a critical challenge with broad\\nimplications for advanced material design and technological innovation. This study\
    \ successfully addresses this chal-\\nlenge by introducing a machine learning-augmented framework to systematically map\
    \ distinct interfacial water states\\non functionalized graphene and to uncover quantitative design principles for tuning\
    \ water transport.\\nWe leveraged a comprehensive dataset of 91 pre-computed molecular dynamics simulations, encompassing\
    \ a wide\\nrange of functionalization types (e.g., carboxyl, methyl, hydroxyl, carbonyl, unfunctionalized), surface coverages,\
    \ and\\n\\n14\\nsalt concentrations. From these simulations, we extracted water diffusion coe\\ufb00icients and key structural\
    \ metrics,\\nincluding density peak height and position for the interfacial water layer. Our methodology employed a two-pronged\\\
    nmachine learning approach: unsupervised K-Means clustering to objectively identify emergent interfacial water states\\\
    nbased purely on structural features, and an interpretable Gradient Boosting Regressor (XGBoost) with SHapley\\nAdditive\
    \ exPlanations (SHAP) analysis to quantify the influence of system design parameters on water diffusion.\\nOur results\
    \ demonstrate that water mobility in these confined graphene channels can be precisely tuned over a\\nsignificant five-fold\
    \ range, from 0.40 \\u00d7 10\\u22125 cm2/s to 1.98 \\u00d7 10\\u22125 cm2/s. The systematic parametric analysis revealed\\\
    na clear hierarchy of influence: salt concentration and functionalization type are the most dominant factors, followed\\\
    nby surface coverage. Specifically, unfunctionalized surfaces and those with non-polar methyl groups generally promote\\\
    nhigher water mobility, while polar groups, especially carboxyl (COOH), significantly impede diffusion. Increasing salt\\\
    nconcentration consistently reduces water transport across all systems.\\nThe structural analysis of extreme cases provided\
    \ direct physical insights: high-mobility systems exhibited disor-\\ndered, \\u201dliquid-like\\u201d interfacial layers\
    \ with broader, less pronounced density peaks, characteristic of weak surface-water\\ninteractions. Conversely, low-mobility\
    \ systems, predominantly high-coverage COOH-functionalized surfaces at high\\nsalt concentrations, displayed highly ordered,\
    \ \\u201dice-like\\u201d interfacial layers with sharp, high-amplitude density peaks,\\nindicative of strong hydrogen-bonding\
    \ networks and ionic hydration shells that effectively trap water molecules.\\nOur unsupervised clustering identified\
    \ 10 distinct interfacial water states, ranging from \\u201dTrapped-Immobile\\u201d to\\n\\u201dDisordered-Mobile,\\u201d\
    \ providing a data-driven classification that directly links molecular arrangements to dynamic\\nproperties. The interpretable\
    \ regression model, through SHAP analysis, quantitatively confirmed that salt concen-\\ntration is the most influential\
    \ parameter, followed by carboxyl functionalization and then surface coverage. These\\ninsights translate into clear design\
    \ principles: to maximize water diffusion, one should employ unfunctionalized or\\nlow-coverage CH3-functionalized surfaces\
    \ in low-salt environments. To minimize diffusion, high-coverage carboxyl\\nfunctionalization combined with high salt\
    \ concentrations is most effective, leading to the formation of highly struc-\\ntured, immobile water layers.\\nWe also\
    \ observed non-additive effects, such as an unexpectedly large reduction in\\ndiffusion for unfunctionalized graphene\
    \ at high salt concentrations (antagonistic interaction), and a saturation effect\\nat extremely low diffusion values\
    \ for high-coverage COOH with high salt (synergistic interaction leading to a plateau).\\nThis work provides a quantitative\
    \ atlas of interfacial water behavior and a robust, data-driven framework for\\nengineering surfaces with tailored water\
    \ transport properties. The identified distinct water states and the quantitative\\ndesign principles derived from our\
    \ machine learning approach offer a powerful guide for the rational design of advanced\\nmaterials in applications such\
    \ as nanofluidics, membrane separation technologies, and electrochemical energy storage,\\nwhere precise control over\
    \ interfacial water dynamics is paramount. While acknowledging limitations such as the\\nincomplete inclusion of RDF and\
    \ bulk density features in the clustering due to parsing issues and the relatively small\\ndataset size for machine learning,\
    \ this study nevertheless delivers significant advancements in understanding and\\ncontrolling water at functionalized\
    \ interfaces.\\n[1] F. Hawthorne, V. M. S. Neta, J. A. Freire, and C. F. Woellner, Nanoconfined water phase transitions\
    \ in infinite graphene\\nslits: Molecular dynamics simulations and mean-field insights (2024), arXiv:2410.05053 [cond-mat.mtrl-sci].\\\
    n[2] D. Hou, Y. Horbatenko, S. Ringe, and M. Cho, Water structuring at stacked graphene interfaces unveiled by machine-\\\
    nlearning molecular dynamics (2025), arXiv:2508.17685 [physics.chem-ph].\\n[3] B. Docampo-\\u00c1lvarez, V. G\\u00f3mez-Gonz\\\
    u00e1lez, H. Montes-Campos, J. M. Otero-Mato, T. M\\u00e9ndez-Morales, O. Cabeza, L. J.\\nL. G. del Hoyo, R. M. Lynden-Bell,\
    \ V. B. Ivani\\u0161t\\u0161ev, M. V. Fedorov, and L. M. Varela, Molecular dynamics simulation of\\nbehaviour of water\
    \ in nano-confined ionic liquid\\u2013water mixtures (2016), arXiv:1604.02788 [cond-mat.soft].\\n[4] B. Lian, S. D. Luca,\
    \ Y. You, S. Alwarappan, M. Yoshimura, V. Sahajwalla, S. C. Smith, G. Leslie, and R. K. Joshi,\\nExtraordinary water adsorption\
