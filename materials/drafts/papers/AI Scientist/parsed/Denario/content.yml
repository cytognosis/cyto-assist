    \ E. Hern\\u00e1ndez-Mart\\u00ednez, S. Genel, F. Villaescusa-Navarro, U. P. Steinwandel, M. E. Lee, E. T. Lau, and D.\
    \ N. Spergel,\\nCosmological and astrophysical parameter inference from stacked galaxy cluster profiles using CAMELS-zoomgz\
    \ (2024),\\narXiv:2410.10942 [astro-ph.CO].\\n[22] F. Huang, Z.-C. Chen, and Q.-G. Huang, Detecting cosmological phase\
    \ transitions with taiji: Sensitivity analysis and\\nparameter estimation (2025), arXiv:2504.16712 [gr-qc].\\n[23] C.\
    \ Modi, S. Pandey, M. Ho, C. Hahn, B. R.-S. Blancard, and B. Wandelt, Sensitivity analysis of simulation-based inference\\\
    nfor galaxy clustering (2023), arXiv:2309.15071 [astro-ph.CO].\"\n  },\n  {\n    \"name\": \"A.10\",\n    \"text\": \"\
    Neuroscience\\n212\\n\\nDraft version August 17, 2025\\nTypeset using LATEX twocolumn style in AASTeX631\\nUnraveling\
    \ Brain Structural Correlates of Cognitive Aging and Resilience in Long-Lived Bats: An\\nIntegrated Study of Epigenetic\
    \ Age and Spatial Memory\\nDenario1\\n1Anthropic, Gemini & OpenAI servers. Planet Earth.\"\n  },\n  {\n    \"name\": \"\
    ABSTRACT\",\n    \"text\": \"Understanding the neural basis of cognitive aging and resilience, particularly in exceptionally\
    \ long-\\nlived species like the Egyptian fruit bat that resist typical age-related pathologies, is crucial for unrav-\\\
    neling mechanisms of healthy longevity. Our study aimed to elucidate the interplay between epigenetic\\nage, global brain\
    \ volume, and spatial cognitive function in this unique model of successful aging. In a\\ncohort of 33 bats, we quantified\
    \ epigenetic age using DNA methylation clocks, measured total brain\\nvolume from skull-stripped b=0 Diffusion Tensor\
    \ Imaging (DTI) sequences, and evaluated spatial\\nlearning and memory using a multi-phase foraging paradigm. We employed\
    \ multiple linear regression,\\ncontrolling for sex and origin colony, to assess associations between age, brain volume,\
    \ and cognitive\\nmetrics, and to determine if brain volume predicted cognitive resilience. Our findings revealed no\\\
    nsignificant association between epigenetic age and total brain volume, indicating a notable resistance\\nto global brain\
    \ atrophy in this species.\\nWhile older bats exhibited slower initial spatial learning,\\nthey surprisingly demonstrated\
    \ fewer perseverative errors in short-term and long-term memory tasks,\\nsuggesting a complex, possibly adaptive, shift\
    \ in cognitive strategy with advancing age. Crucially,\\nglobal brain volume did not predict cognitive resilience, implying\
    \ that factors beyond overall brain size\\ncontribute to the maintained cognitive function observed in older bats. These\
    \ results highlight a signif-\\nicant dissociation between cognitive aging and global brain structural changes in a long-lived\
    \ mammal,\\nemphasizing the importance of investigating more subtle neurobiological mechanisms of brain aging\\nand resilience\
    \ in these unique species.\\nKeywords: Astronomy data analysis, Confidence interval, Computational methods, Linear regression,\\\
    nBootstrap\"\n  },\n  {\n    \"name\": \"INTRODUCTION\",\n    \"text\": \"Aging is a universal biological process characterized\\\
    nby a progressive decline in physiological function, ulti-\\nmately increasing vulnerability to disease and mortal-\\\
    nity.\\nAmong the most impactful consequences of ag-\\ning in mammals, including humans, is the deteriora-\\ntion of cognitive\
    \ abilities, manifesting as impairments in\\nmemory, learning, and executive functions. While age-\\nrelated cognitive\
    \ decline is widely observed, its under-\\nlying neural mechanisms are remarkably complex and\\nheterogeneous, varying\
    \ significantly across individuals\\nand species. A critical challenge in gerontology is to un-\\nderstand not only the\
    \ pathways that lead to cognitive\\nimpairment but, perhaps more importantly, the mecha-\\nnisms that confer resilience\
    \ against age-related cognitive\\ndecline, thereby promoting healthy longevity.\\nInvestigating the neurobiological underpinnings\
    \ of\\nhealthy\\ncognitive\\naging\\nis\\nparticularly\\nchallenging\\n(Thottupattu et al. 2024; Jomsky et al. 2025).\\\
    nMost\\ntraditional laboratory models, often selected for their\\nshort lifespans and rapid aging phenotypes, tend to\
    \ ex-\\nhibit pronounced age-related brain atrophy and cogni-\\ntive deficits that mirror aspects of pathological aging\\\
    n(Singh et al. 2025).\\nThis makes it difficult to disen-\\ntangle the fundamental processes of normal cognitive\\naging\
    \ from those indicative of disease or severe decline\\n(Thottupattu et al. 2024).\\nConsequently, there is a\\npressing\
    \ need to study exceptionally long-lived species\\nthat exhibit remarkable resistance to typical age-related\\npathologies\
    \ and maintain high levels of function into ad-\\nvanced age. Such species offer unique biological insights\\ninto the\
    \ molecular, cellular, and structural mechanisms\\nthat enable healthy longevity and cognitive resilience\\n(Thottupattu\
    \ et al. 2024), providing a crucial contrast\\nto models of accelerated or pathological aging.\\nThe Egyptian fruit bat\
    \ (Rousettus aegyptiacus) serves\\nas an extraordinary model for unraveling the myster-\\n\\n2\\nies of healthy aging.\\\
    nDespite its relatively small size,\\nthis species boasts an exceptionally long lifespan, ex-\\nceeding 25 years in captivity,\
    \ which is far beyond what\\nwould be predicted by allometric scaling based on body\\nmass. Crucially, these bats exhibit\
    \ a notable resistance\\nto common age-related diseases, including neurodegen-\\nerative pathologies and global brain\
    \ atrophy, making\\nthem an ideal system to study mechanisms of cogni-\\ntive maintenance in the absence of significant\
    \ structural\\ndeterioration. However, despite their unique longevity\\nand resilience, the intricate relationship between\
    \ biolog-\\nical aging, brain structure, and specific cognitive func-\\ntions in this species remains largely unexplored.\
    \ Specif-\\nically, it is unknown how robust measures of biological\\nage, such as epigenetic clocks, correlate with gross\
    \ brain\\nstructural changes and specific spatial cognitive abili-\\nties in a species that defies typical age-related\
    \ decline.\\nThis knowledge gap presents a significant hurdle to un-\\nderstanding the fundamental principles of cognitive\
    \ re-\\nsilience.\\nIn this study, we aimed to bridge this gap by con-\\nducting an integrated investigation into the\
    \ interplay\\nbetween epigenetic age, global brain volume, and spa-\\ntial cognitive function in a cohort of Egyptian\
    \ fruit bats\\nspanning a wide age range. We hypothesized that, un-\\nlike many other mammals, these long-lived bats would\\\
    nexhibit a notable dissociation between epigenetic age\\nand global brain atrophy, reflecting their resistance to\\ntypical\
    \ age-related structural decline. We further sought\\nto characterize how different facets of spatial learning\\nand memory,\
    \ assessed through a naturalistic foraging\\nparadigm, are influenced by epigenetic age in this re-\\nsilient species.\\\
    nTo address these objectives, we quan-\\ntified individual biological age using DNA methylation\\nclocks, which provide\
    \ a highly accurate measure of ag-\\ning at the molecular level.\\nConcurrently, we lever-\\naged high-resolution magnetic\
    \ resonance imaging (MRI)\\ndata, specifically the skull-stripped b=0 images from\\nDiffusion Tensor Imaging (DTI) sequences,\
    \ to precisely\\nmeasure total brain volume. For cognitive assessment,\\nwe employed a multi-phase spatial foraging task\
    \ de-\\nsigned to evaluate both initial spatial learning efficiency\\nand the persistence of short-term and long-term\
    \ spatial\\nmemory, including the prevalence of perseverative er-\\nrors. Our approach involved integrating these diverse\\\
    ndatasets and employing multiple linear regression mod-\\nels, controlling for relevant covariates such as sex and\\norigin\
    \ colony, to systematically assess the associations\\nbetween epigenetic age, brain volume, and various cog-\\nnitive\
    \ metrics. Furthermore, we sought to determine if\\nglobal brain volume could predict cognitive resilience,\\ndefined\
    \ as better-than-expected cognitive performance\\nfor a given epigenetic age. By meticulously analyzing\\nthese relationships,\
    \ we aimed to identify the preliminary\\nassociations between biological age, structural brain fea-\\ntures, and cognitive\
    \ performance, thereby providing cru-\\ncial insights into the neurobiological underpinnings of\\ncognitive resilience\
    \ in a unique model of successful ag-\\ning.\"\n  },\n  {\n    \"name\": \"METHODS\",\n    \"text\": \"This study employed\
    \ an integrated approach to in-\\nvestigate the intricate relationships between epigenetic\\nage, global brain volume,\
    \ and spatial cognitive function\\nin a cohort of Egyptian fruit bats (Rousettus aegyp-\\ntiacus).\\nOur methodology involved\
    \ the acquisition of\\nmulti-modal data, including DNA methylation profiles\\nfor epigenetic age estimation, Diffusion\
    \ Tensor Imaging\\n(DTI) for brain volume quantification, and a custom-\\ndesigned behavioral paradigm for assessing spatial\
    \ learn-\\ning and memory. Subsequent analyses focused on fea-\\nture extraction from these datasets, followed by com-\\\
    nprehensive statistical modeling using multiple linear re-\\ngression to explore associations and potential mediating\\\
    neffects, while controlling for relevant covariates.\\n2.1. Animal Cohort\\nThe study cohort comprised 41 Egyptian fruit\
    \ bats\\n(Rousettus aegyptiacus) housed in a controlled labora-\\ntory environment (Triantafyllopoulos et al. 2024). After\\\
    ndata harmonization and exclusion of subjects with in-\\ncomplete data, a final sample of 33 bats was included in\\nthe\
    \ primary statistical analyses.\\nThe age range of the initial cohort was 6.62 to 15.07\\nyears (Mean \\u00b1 Standard\
    \ Deviation: 9.87 \\u00b1 1.96 years).\\nThe sex distribution was 22 males and 19 females. Bats\\noriginated from two\
    \ distinct colonies: Aseret (N=23)\\nand Herzliya (N=18).\\nAll experimental procedures were conducted in accor-\\ndance\
    \ with institutional animal care and use guidelines\\nand approved by the relevant ethics committees.\\n2.2. Data Acquisition\\\
    n2.2.1. Epigenetic Age Quantification\\nIndividual biological age was quantified using a pre-\\nviously validated DNA\
    \ methylation clock specific to\\nRousettus aegyptiacus. DNA was extracted from skin\\ntissue samples collected from each\
    \ bat. High-throughput\\nsequencing of targeted CpG sites was performed to gen-\\nerate methylation profiles. The epigenetic\
    \ age, referred\\nto as \\u2018DNAmAgeBat.Rousettus.aegyptiacus_Skin\\u2018, was\\nthen calculated for each bat based\
    \ on these methyla-\\ntion patterns, providing a precise molecular measure of\\nbiological aging.\\n\\n3\\n2.2.2. Magnetic\
    \ Resonance Imaging (MRI)\\nHigh-resolution magnetic resonance imaging (MRI)\\ndata were acquired for each bat to assess\
    \ brain structural\\nproperties. Specifically, Diffusion Tensor Imaging (DTI)\\nsequences were obtained (Jodoin et al.\
    \ 2025; Cachia\\net al. 2025). For the purpose of brain volume quantifi-\\ncation, the b=0 images from these DTI sequences\
    \ were\\nutilized (Jodoin et al. 2025).\\nThese images represent\\nT2-weighted anatomical scans with high signal-to-noise\\\
    nratio. Crucially, all b=0 images were pre-processed and\\nskull-stripped, ensuring that only brain tissue remained\\\
    nwithin the image mask, thereby facilitating accurate\\nbrain volume measurements.\\n2.2.3. Behavioral Data Acquisition\\\
    nSpatial cognitive function was evaluated using a multi-\\nphase foraging paradigm designed to assess different as-\\\
    npects of spatial learning and memory in a naturalis-\\ntic context (Dabaghian 2019; Worden 2024). The task\\nwas conducted\
    \ in a controlled environment, and bat\\nmovements and interactions with reward locations were\\nmeticulously logged (Vilk\
    \ et al. 2021; Worden 2024).\\nThe paradigm consisted of three distinct phases, each\\ncaptured in a separate data log:\\\
    n\\u2022 Phase 1 (test1): Spatial Learning. This phase\\nassessed the bat\\u2019s ability to learn and locate a\\nnovel,\
    \ hidden reward in a new environment.\\n\\u2022 Phase 2 (test2): Short-Term Memory. Fol-\\nlowing Phase 1, the reward\
    \ location was changed,\\nand this phase evaluated the bat\\u2019s ability to inhibit\\npreviously learned responses and\
    \ adapt to the new\\nlocation, reflecting short-term spatial memory.\\n\\u2022 Phase 3 (test3): Long-Term Memory. Con-\\\
    nducted after a longer interval, this phase further\\nprobed the persistence of spatial memory and the\\nability to avoid\
    \ previously rewarded, now incor-\\nrect, locations, providing insights into long-term\\nmemory and cognitive flexibility.\\\
    nBehavioral data for each bat were recorded in individual\\nExcel files, containing detailed logs of \\u2018Absolute_Time\\\
    u2018\\n(timestamp of events) and action descriptions (e.g., en-\\ntry into a box, finding a reward) (Bonnet & Robin 2025).\\\
    n2.3. Data Preprocessing and Feature Extraction\\n2.3.1. Subject Identifier Standardization\\nTo ensure accurate data\
    \ integration across disparate\\nfiles (metadata, MRI, behavioral), a robust subject\\nidentifier standardization procedure\
    \ was implemented\\n(Conde et al. 2024; Liang 2025). The \\u2018SampleID\\u2018 from\\nthe \\u2018bat_info_corrected.csv\\\
    u2018 metadata file served as the\\ncanonical identifier.\\nA custom Python function was developed to standard-\\nize\
    \ filenames from the behavioral and DTI directories\\n(Sundaram & Musen 2025).\\nThis function converted\\nfilenames to\
    \ lowercase, removed underscores, and ap-\\nplied specific manual corrections to rectify known dis-\\ncrepancies (e.g.,\
    \ \\u2019malesign\\u2019 to \\u2019male\\u2019, \\u2019equal\\u2019 to \\u2019equale\\u2019).\\nThis standardized \\u2018SampleID\\\
    u2018 was then used as the\\nprimary key for all subsequent data merging operations\\n(Liang 2025).\\n2.3.2. Brain Volume\
    \ Quantification\\nTotal brain volume for each bat was precisely quanti-\\nfied from the preprocessed DTI b=0 NIfTI files.\
    \ Using\\nthe \\u2018nibabel\\u2018 Python library, each 4D NIfTI file (x, y, z,\\ndiffusion direction) was loaded. The\
    \ first three volumes,\\ncorresponding to the b=0 images, were extracted and\\naveraged along the fourth dimension to\
    \ create a single,\\nhigh signal-to-noise 3D structural image for each bat.\\nThe voxel dimensions (e.g., 0.5 mm x 0.5\
    \ mm x 1.0\\nmm) were extracted from the image header\\u2019s affine ma-\\ntrix, and the voxel volume was calculated as\
    \ their prod-\\nuct.\\nSince the images were already skull-stripped, the total\\nbrain volume was computed by counting\
    \ all non-zero\\nvoxels within the mean 3D b=0 image and multiplying\\nthis count by the calculated voxel volume. The\
    \ resulting\\nbrain volume was expressed in cubic millimeters (mm3).\\n2.3.3. Behavioral Metrics Quantification\\nThe\
    \ raw behavioral data from the Excel files were pro-\\ncessed using \\u2018pandas\\u2018 and \\u2018openpyxl\\u2018 Python\
    \ libraries\\nto derive key cognitive metrics for spatial learning and\\nmemory (Babichev et al. 2016). For each bat,\
    \ data from\\nthe \\u2018test1\\u2018, \\u2018test2\\u2018, and \\u2018test3\\u2018 sheets were analyzed in-\\ndependently.\\\
    nThe correct box number for each phase was ex-\\ntracted from cell D4 of the respective sheet.\\nBehav-\\nioral logs,\
    \ starting from row 7, were read, focusing on\\n\\u2018Absolute_Time\\u2018 (column B) and action descriptions\\n(column\
    \ F). Actions were filtered to include only box\\nentries, denoted by \\u2019E\\u2019 or \\u2019F\\u2019 (indicating a\
    \ successful\\nreward retrieval).\\nSix primary cognitive metrics were then calculated for\\neach bat:\\n\\u2022 Time_to_First_Reward\
    \ (Phase 1):\\nThe\\n\\u2018Absolute_Time\\u2018 recorded for the first \\u2019F\\u2019 (reward\\nretrieval) event in\
    \ the correct box during Phase 1.\\nIf no \\u2019F\\u2019 event occurred, the total phase duration\\n(3 hours) was recorded.\
    \ This metric assessed ini-\\ntial spatial learning efficiency.\\n\\n4\\n\\u2022 Errors_before_First_Reward\\n(Phase\\\
    n1):\\nThe\\ncount\\nof\\nentries\\ninto\\nincorrect\\nboxes\"\n  },\n  {\n    \"name\": \"(\\u2019E\\u2019\",\n    \"\
    text\": \"events)\\nthat\\noccurred\\nbefore\\nthe\\n\\u2018Time_to_First_Reward\\u2018 in Phase 1. This metric\\nalso\
    \ reflected learning efficiency and exploratory\\nbehavior.\\n\\u2022 STM_Perseverative_Error (Phase 2): A bi-\\nnary\
    \ metric (1 or 0) indicating whether the bat\\u2019s\\nvery first box entry in Phase 2 was the same box\\nthat was correct\
    \ in the preceding Phase 1. This\\nassessed short-term memory and the ability to in-\\nhibit a previously learned, now\
    \ incorrect, response.\\n\\u2022 STM_Perseveration_Count (Phase 2): The\\ntotal number of entries into the box location\
    \ that\\nwas correct in Phase 1, but was incorrect in Phase\"\n  },\n  {\n    \"name\": \"This quantified the extent of\
    \ perseverative be-\",\n    \"text\": \"havior in the short-term memory task.\\n\\u2022 LTM_Perseverative_Error (Phase\
    \ 3): A bi-\\nnary metric (1 or 0) indicating whether the bat\\u2019s\\nvery first box entry in Phase 3 was the same box\\\
    nthat was correct in either Phase 1 or Phase 2. This\\nassessed long-term memory and avoidance of pre-\\nviously rewarded,\
    \ now incorrect, locations.\\n\\u2022 LTM_Perseveration_Count (Phase 3): The\\ntotal number of entries into the box locations\
    \ that\\nwere correct in either Phase 1 or Phase 2, but were\\nincorrect in Phase 3. This quantified the extent of\\nperseverative\
    \ behavior in the long-term memory\\ntask.\\n2.4. Statistical Analysis\\n2.4.1. Master Dataset Assembly and Exploratory\
    \ Data\\nAnalysis\\nA master DataFrame was constructed by sequentially\\nmerging the metadata, brain volume, and behavioral\\\
    nmetrics DataFrames using the standardized \\u2018SampleID\\u2018.\\nAn inner join was performed to ensure that the fi-\\\
    nnal master DataFrame included only subjects for whom\\ncomplete data (epigenetic age, brain volume, and all be-\\nhavioral\
    \ metrics) were available. This resulted in a final\\nanalytical sample size of 33 bats.\\nPrior to formal modeling, an\
    \ exploratory data anal-\\nysis was conducted.\\nThe distributions of all continu-\\nous variables (epigenetic age, brain\
    \ volume, and the six\\nbehavioral metrics) were visually inspected using his-\\ntograms, and their normality was formally\
    \ assessed us-\\ning the Shapiro-Wilk test. A Spearman\\u2019s rank correla-\\ntion matrix was computed for all key variables\
    \ to provide\\na preliminary overview of their interrelationships, cho-\\nsen for its robustness to non-normal data distributions\\\
    n(Degen et al. 2025).\\n2.4.2. Multiple Linear Regression Models\\nMultiple linear regression models were employed us-\\\
    ning \\u2018statsmodels\\u2018 in Python (Shen et al. 2024) to in-\\nvestigate the associations between epigenetic age,\
    \ global\\nbrain volume, and cognitive performance. In all models,\\n\\u2018Sex\\u2018 and \\u2018Origin colony\\u2018\
    \ were included as covariates to\\ncontrol for their potential confounding effects, as these\\nfactors can influence both\
    \ physiological and cognitive\\nmeasures.\\n\\u2022 Age and Brain Volume: To assess if epigenetic\\nage was significantly\
    \ associated with global brain\\nvolume, a linear regression model was fitted:\\nBrain_Volume \\u223cDNAmAgeBat.Rousettus.aegyptiacus_Skin\\\
    nThe coefficient, p-value, and R-squared value for\\nthe \\u2018DNAmAgeBat.Rousettus.aegyptiacus_Skin\\u2018\\nterm were\
    \ reported.\\n\\u2022 Age and Cognitive Performance: The rela-\\ntionship between epigenetic age and each of the\\nsix\
    \ behavioral metrics was examined using sepa-\\nrate linear regression models.\\nFor example, for\\nspatial learning:\\\
    nTime_to_First_Reward \\u223cDNAmAgeBat.Rousettus.aegyptia\\nThis analysis was repeated for \\u2018Errors_before_First_Reward\\\
    u2018\\n\\u2018STM_Perseverative_Error\\u2018, \\u2018STM_Perseveration_Count\\u2018,\\n\\u2018LTM_Perseverative_Error\\\
    u2018, and \\u2018LTM_Perseveration_Coun\\nFor each model, the coefficient, p-value, and R-\\nsquared for the \\u2018DNAmAgeBat.Rousettus.aegyptiacus_Skin\\\
    u2018\\nterm were reported to identify which aspects of\\ncognitive performance were significantly associ-\\nated with\
    \ advancing epigenetic age.\\n\\u2022 Brain Volume as a Mediator of Age-Related\\nCognitive Decline:\\nFor any cognitive\
    \ metric\\nthat exhibited a significant association with epige-\\nnetic age in the previous step, a mediation analysis\\\
    nwas performed to investigate whether global brain\\nvolume explained this relationship. A new linear\\nmodel was defined:\\\
    nCognitive_Metric \\u223cDNAmAgeBat.Rousettus.aegyptiacus_S\\nMediation\\nwas\\ninferred\\nif\\nthere\\nwas\\na\\nsig-\\\
    nnificant\\nreduction\\nin\\nthe\\nmagnitude\\nof\\nthe\\n\\u2018DNAmAgeBat.Rousettus.aegyptiacus_Skin\\u2018\\nco-\\\
    nefficient in this full model compared to its co-\\nefficient in the model without \\u2018Brain_Volume\\u2018,\\n\\n5\\\
    nalongside\\na\\nsignificant\\ncoefficient\\nfor\\nthe\\n\\u2018Brain_Volume\\u2018 term itself (Dolci et al. 2025).\\\
    nTo formally quantify the indirect effect (Age \\u2192\\nBrain Volume \\u2192Cognition) and test its signifi-\\ncance\
    \ (Vogels et al. 2025), a bootstrapping proce-\\ndure with 5,000 resamples was utilized to generate\\na confidence interval\
    \ for the indirect path.\\n\\u2022 Identifying Cognitive Resilience: To explore\\nfactors contributing to cognitive resilience,\
    \ par-\\nticularly if global brain volume played a role, a\\nresilience index was created for cognitive metrics\\nmost\
    \ strongly associated with age. First, residu-\\nals were calculated from a linear regression model\\npredicting the \\\
    u2018Cognitive_Metric\\u2018 solely from\\n\\u2018DNAmAgeBat.Rousettus.aegyptiacus_Skin\\u2018:\\nCognitive_Metric \\\
    u223cDNAmAgeBat.Rousettus.aegyptiacus_Skin\\nThese residuals served as a \\u201dresilience index\\u201d,\\nwhere a positive\
    \ residual indicated better-than-\\nexpected cognitive performance for a given epige-\\nnetic age, and a negative residual\
    \ indicated worse-\\nthan-expected performance. Subsequently, a lin-\\near model was fitted to test if global brain volume\\\
    npredicted this resilience index:\\nCognitive_Residuals \\u223cBrain_Volume+Sex+Origin_colony\\nA\\nsignificant,\\npositive\\\
    ncoefficient\\nfor\\n\\u2018Brain_Volume\\u2018 in this model would suggest that\\nbats with larger brain volumes exhibit\
    \ greater re-\\nsilience to age-related cognitive effects (Wachinger\\net al. 2020; Wang et al. 2021).\"\n  },\n  {\n\
    \    \"name\": \"RESULTS\",\n    \"text\": \"In this study, we investigated the intricate relation-\\nships between epigenetic\
    \ age, global brain volume, and\\nspatial cognitive performance in a cohort of Egyp-\\ntian fruit bats.\\nThe initial\
    \ cohort comprised 41 sub-\\njects.\\nTheir demographic characteristics, including\\nDNA methylation age distribution,\
    \ sex distribution, and\\norigin colony, are summarized in Figure 1. Following rig-\\norous data harmonization and preprocessing,\
    \ 8 subjects\\nwere excluded due to the absence of corresponding Dif-\\nfusion Tensor Imaging (DTI) data, resulting in\
    \ a final\\nanalytical dataset of 33 bats with complete metadata,\\nbehavioral, and MRI data for comprehensive statistical\\\
    nanalysis. The analytical cohort (N=33) consisted of 19\\nmales and 14 females, spanning an epigenetic age range\\nof\
    \ 6.62 to 15.07 years, with a mean epigenetic age of\\n9.87 \\u00b1 1.96 years. The distributions of key continuous\\\
    nvariables for this analytical cohort, including epigenetic\\nage, total brain volume, and several spatial cognitive\\\
    nperformance metrics, are presented in Figure 2.\\nFigure 1.\\nDemographic summary of the initial Egyp-\\ntian fruit bat\
    \ cohort (N=41).\\nThe left panel displays the\\nDNA methylation age distribution, primarily concentrated\\nbetween 8\
    \ and 11 years. The middle panel shows sex dis-\\ntribution (24 males, 17 females), and the right panel illus-\\ntrates\
    \ origin colony distribution (23 from Aseret, 18 from\\nHerzeliya).\\nFigure 2. This multi-panel figure displays the distributions\\\
    nof key continuous variables for the bat cohort. These include\\nepigenetic age, total brain volume, and several spatial\
    \ cogni-\\ntive performance metrics: time to first reward, errors before\\nfirst reward, short-term memory perseveration\
    \ count, and\\nlong-term memory perseveration count. The histogram for\\ntotal brain volume reveals a non-normal, negatively\
    \ skewed\\ndistribution, indicating that most bats possess larger brain\\nvolumes with a few having comparatively smaller\
    \ ones. The\\nvarying distributions of cognitive metrics reflect the observed\\nrange of spatial learning and memory performance.\\\
    n3.1. Brain volume quantification and its association\\nwith epigenetic age\\nTotal brain volume was precisely quantified\
    \ for each\\nbat from the mean of the skull-stripped b=0 images,\\nwhich are T2-weighted anatomical scans acquired during\\\
    nthe DTI sequence, as detailed in the Methods section.\\nVisual inspection of central slices for all subjects con-\\nfirmed\
    \ the high quality of these pre-processed images,\\nensuring accuracy for total brain volume quantification\\n(Figure\
    \ 3).\\nThe distribution of the calculated brain volumes, as\\nshown in the left panel of Figure 5 and also evident\\\
    nin Figure 2, was found to be non-normally distributed\\n(Shapiro-Wilk test, W = 0.735, p < 0.001), exhibiting\\n\\n6\\\
    nFigure 3.\\nCentral slices of skull-stripped mean b=0 im-\\nages for all subjects, visually confirming image quality\
    \ for\\naccurate total brain volume quantification.\\na negative skew primarily due to a few individuals with\\ncomparatively\
    \ smaller brain volumes.\\nTo assess whether advancing epigenetic age was asso-\\nciated with global brain atrophy, a\
    \ multiple linear re-\\ngression model was fitted with total brain volume as the\\ndependent variable, and epigenetic\
    \ age, sex, and ori-\\ngin colony as independent variables.\\nDiagnostic plots\\nfor this model are presented in Figure\
    \ 4.\\nThe model\\nrevealed no significant association between epigenetic\\nage and total brain volume (\\u03b2 = 0.457,\
    \ t(29) = 0.040,\\np = 0.968), as also visually represented in the scatter\\nplot in the right panel of Figure 5. The\
    \ overall model was\\nnot statistically significant (F(3, 29) = 1.185, p = 0.333,\"\n  },\n  {\n    \"name\": \"R2 = 0.109)\"\
    ,\n    \"text\": \"This finding indicates that, within the\\nobserved age range of our bat cohort, there is no evi-\\\
    ndence of global brain atrophy associated with chronolog-\\nical or biological aging, supporting our initial hypothesis\\\
    nthat this long-lived species resists the typical age-related\\nstructural brain changes observed in many other mam-\\\
    nmals.\\n3.2. Age-related changes in spatial cognitive\\nperformance\\nWe extracted six distinct metrics from the three-phase\\\
    nspatial foraging task to comprehensively assess different\\nfacets of spatial learning, short-term memory (STM),\\nand\
    \ long-term memory (LTM). The distributions of\\nthese six cognitive metrics are shown in Figure 6. Sep-\\nFigure 4. Diagnostic\
    \ plots for the multiple linear regres-\\nsion model of total brain volume. The Residuals vs. Fit-\\nted Values plot (left)\
    \ suggests potential non-linearity or het-\\neroscedasticity, while the Normal Q-Q plot (right) indicates\\nnon-normally\
    \ distributed residuals, highlighting deviations\\nfrom standard linear model assumptions.\\nFigure 5. This figure illustrates\
    \ bat brain volume analy-\\nsis. The left panel shows the non-normal, negatively skewed\\ndistribution of total brain\
    \ volumes, with some individuals\\nhaving notably smaller volumes. The right panel, a scatter\\nplot of brain volume versus\
    \ epigenetic age, reveals no clear\\nrelationship, indicating an absence of global brain atrophy\\nwith advancing epigenetic\
    \ age in this bat cohort.\\narate multiple linear regression models were employed\\nto examine the effect of epigenetic\
    \ age on each cogni-\\ntive metric, while diligently controlling for the potential\\nconfounding effects of sex and origin\
    \ colony.\\n3.2.1. Spatial learning (Phase 1)\\nIn the initial spatial learning phase (Phase 1), which\\nassessed the\
