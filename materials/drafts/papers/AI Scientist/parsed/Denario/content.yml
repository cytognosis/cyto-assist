    \ parameters\\nOur initial exploratory data analysis, utilizing sum-\\nmary statistics and pairwise statistical divergence\
    \ met-\\nrics as outlined in Section 2.2, immediately revealed sub-\\nstantial disagreements among the five waveform mod-\\\
    nels regarding the inferred astrophysical parameters for\"\n  },\n  {\n    \"name\": \"GW231123\",\n    \"text\": \"As\
    \ summarized in Table 1 and visually\\npresented through one-dimensional marginal posterior\\ndistributions in Figure\
    \ 1, key source parameters exhibit\\nsignificant model-dependent variations.\\nThe most pronounced discrepancy, evident\
    \ in both\\nTable 1 and Figure 1, is observed in the compo-\\nnent masses, particularly for mass_2_source.\\nWhile\\nNRSur7dq4,\\\
    nSEOBNRv5PHM,\\nand\\nIMRPhenomT-\\nPHM\\ninfer\\na\\nrelatively\\nsymmetric\\nbinary\\nsystem\\nwith mass_2_source medians\
    \ ranging from 110.04 M\\u2299\\nto 111.10 M\\u2299, IMRPhenomXO4a predicts a signifi-\\ncantly more asymmetric configuration,\
    \ with a median\\nmass_2_source of only 55.08 M\\u2299. IMRPhenomXPHM\\nalso infers a lower secondary mass (93.33 M\\\
    u2299) compared\\nto the first group, further highlighting model-dependent\\nvariations. This fundamental disagreement\
