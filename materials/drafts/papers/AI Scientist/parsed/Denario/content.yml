    \ some peaking in later pseudotime bins\\n(e.g., bin 17) before the activation of downstream mod-\\nules (e.g., bin 18).\
    \ Figure 21 provides an example of\\nsuch a relationship. This timing likely corresponds to\\nthe regulatory events controlling\
