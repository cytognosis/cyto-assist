    \ clusters and a continuous struc-\\nture reflecting the asexual intraerythrocytic development cy-\\ncle (IDC) and separate\
    \ sexual stages, confirming the quality\\nof the data and stage annotations.\\nFigure 3.\\nUMAP embedding of single cells\
    \ colored by\\nsource (Field or Lab). The plot shows both shared cell pop-\\nulations and distinct clusters unique to\
