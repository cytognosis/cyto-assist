    \ This provides crucial structural signatures of in-\\nstability that can be potentially used to predict frag-\\nmentation\
    \ events.\\n3.6. Summary of key findings\\nThis multiscale graph analysis framework has pro-\\nvided a quantitative lens\
    \ through which to view peptide\\naggregate structure and dynamics. We found that the\\nsystem exhibits a dynamic equilibrium\
    \ with a prominent\\naggregate. The CG peptide network is moderately con-\\nnected with fluctuating stability (e.g., Figure\
    \ 4, Figure\\n7). The FG amino acid network within aggregates is no-\\ntably sparse (Figure 9, Figure 11) and often structurally\\\
    nfragmented (low Fiedler value, Figure 10), although lo-\\ncalized dense contacts (high clustering) exist. The com-\\\
    nposite order parameter combining LCC_size (Figure 5)\\nand FG_density (Figure 9) proved to be a more stable\\nmeasure\
    \ of the aggregated state than size alone (Fig-\\nure 13).\\nWhile average structural properties showed\\nonly weak correlations\
    \ with longevity (Figure 15\\u201320),\\nthe analysis of splitting events revealed significant struc-\\ntural precursors:\\\
    naggregates with lower CG_Density\\nand lower algebraic connectivity at the peptide level,\\nand lower FG_Density at the\
    \ amino acid level, were\\nmore prone to fragmentation. These results highlight\\nthe importance of considering structure\
    \ across multiple\\nscales to understand peptide aggregate behavior and sta-\\nbility.\"\n  },\n  {\n    \"name\": \"\
    CONCLUSIONS\",\n    \"text\": \"In this study, we addressed the challenge of quantita-\\ntively characterizing the complex,\
    \ dynamic structure of\\npeptide aggregates across multiple scales using molecu-\\nlar dynamics simulations. We introduced\
    \ a novel frame-\\nwork based on dynamic multiscale graph analysis, repre-\\nsenting peptide aggregates as evolving networks\
    \ at both\\na coarse-grained (peptide-level) and fine-grained (amino\\n\\n13\\nacid-level) resolution. This approach allowed\
    \ us to move\\nbeyond simple measures and probe the intricate connec-\\ntivity and structural properties of aggregates\
    \ over time.\\nUsing extensive simulations of the KYFIL pentapep-\\ntide, we applied this framework to analyze the system\\\
    u2019s\\nbehavior during its equilibrium phase.\\nOur analysis\\nrevealed a dynamic equilibrium characterized by the\\\
    npersistent presence of a dominant aggregate undergo-\\ning continuous structural fluctuations. At the coarse-\\ngrained\
    \ level, the peptide network exhibited moderate\\nconnectivity and significant temporal variations in its\\nstructural\
    \ integrity, as reflected by fluctuations in the\\nFiedler value.\\nAt the fine-grained level within aggre-\\ngates, the\
    \ amino acid contact network was found to be\\nrelatively sparse and structurally fragmented (indicated\\nby near-zero\
    \ Fiedler values), yet possessing significant\\nlocal structuring (high clustering coe\\ufb00icient), suggesting\\nlocalized\
    \ dense interactions within a loosely connected\\noverall network.\\nA valuable outcome of this multiscale perspective\
    \ was\\nthe development of a composite order parameter, com-\\nbining the size of the largest aggregate with its internal\\\
    nfine-grained density. This composite parameter demon-\\nstrated significantly greater stability over time com-\\npared\
    \ to aggregate size alone, offering a potentially more\\nrobust metric for characterizing the aggregated state in\\ndynamic\
    \ systems.\\nCrucially, by tracking individual aggregates and an-\\nalyzing dynamic events, we established a direct link\\\
    nbetween multiscale structural properties and aggregate\\nstability.\\nSpecifically, we found that aggregates ex-\\nhibiting\
    \ significantly lower density and lower algebraic\\nconnectivity (Fiedler value) at the coarse-grained pep-\\ntide level,\
    \ coupled with lower density at the fine-grained\\namino acid level, were considerably more prone to split-\\nting events.\
    \ These findings provide clear, quantitative\\nstructural signatures of aggregate instability across dif-\\nferent levels\
    \ of organization.\\nOverall, this work demonstrates the power of dynamic\\nmultiscale graph analysis as a quantitative\
    \ tool for dis-\\nsecting the complex structure and dynamics of peptide\\nself-assembly.\\nWe have learned that aggregate\
    \ stabil-\\nity is not solely determined by size or overall compact-\\nness but is intimately linked to the specific network\\\
    nof contacts at both the peptide and amino acid lev-\\nels. Structural deficits, particularly reduced connectiv-\\nity\
    \ and packing density across these scales, predispose\\naggregates to fragmentation. These insights provide a\\nfundamental\
    \ understanding of the molecular underpin-\\nnings of aggregate instability and offer valuable guidance\\nfor the rational\
    \ design of peptide sequences with tailored\\nself-assembly pathways and enhanced aggregate stabil-\\nity for applications\
    \ in biomaterials and beyond.\"\n  },\n  {\n    \"name\": \"REFERENCES\",\n    \"text\": \"Airale, L., Longa, A., Rigon,\
