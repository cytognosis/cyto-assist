    \ Analysis of Ground Level\\nEnhancement of Cosmic Ray Events,\\ndoi: https://doi.org/10.1088/1674-4527/acba65\\n\\u00c7ak\\\
    u0131r, U., & Buck, T. 2024, MEGS: Morphological\\nEvaluation of Galactic Structure,\\ndoi: https://doi.org/10.1051/0004-6361/202451262\\\
    n\\nA.2\\nPlanetary science\\n90\\n\\nDraft version June 27, 2025\\nTypeset using LATEX twocolumn style in AASTeX631\\\
    nThe Spatial Architecture of the Main Asteroid Belt: Size, Composition, and Dynamical Gradients\\nDenario1\\n1Anthropic,\
    \ Gemini & OpenAI servers. Planet Earth.\"\n  },\n  {\n    \"name\": \"ABSTRACT\",\n    \"text\": \"The asteroid belt\\\
    u2019s structure provides a window into its formation and long-term evolution.\\nTo\\nunderstand how dynamical processes\
    \ have shaped this population, we mapped the joint distribution of\\nasteroid size and composition with orbital elements\
    \ (semimajor axis, eccentricity, inclination). Using\\na dataset of 35,623 main-belt asteroids with measured properties,\
    \ we applied a suite of statistical and\\nmachine learning techniques, including one- and two-dimensional binning, Kernel\
    \ Density Estimation,\\nunsupervised clustering (DBSCAN, Gaussian Mixture Models), and predictive modeling (regression\\\
    nand classification). Our analysis reveals profound structural gradients: asteroid size systematically\\nincreases with\
    \ increasing semimajor axis, and a stark compositional zoning transitions from S-type\\ndominated populations in the inner\
    \ belt to C-type dominated populations in the outer belt. Kernel\\nDensity Estimation highlights the fine-scale density\
    \ variations in orbital space, while clustering suc-\\ncessfully identifies distinct dynamical groups, many corresponding\
    \ to known asteroid families, each\\nexhibiting characteristic size and compositional distributions. Predictive modeling\
    \ demonstrates that\\nwhile orbital location predicts population-level trends, it provides limited predictive power for\
    \ the\\nproperties of individual asteroids, emphasizing the role of stochastic processes like collisions. Further-\\nmore,\
    \ analysis of mean-motion resonance regions reveals they act as dynamic filters, preferentially\\ndepleting smaller asteroids\
    \ and altering the local compositional mix, consistent with the influence of\\nsize-dependent non-gravitational forces\
    \ such as the Yarkovsky effect. This comprehensive mapping\\nprovides a detailed view of the asteroid belt\\u2019s architecture,\
    \ illustrating how primordial conditions,\\ncollisional evolution, and dynamical sculpting have jointly shaped its present-day\
    \ configuration.\\nKeywords: Semimajor axis, Astronomical techniques, Regression, Asteroid dynamics, Small Solar Sys-\\\
    ntem bodies\"\n  },\n  {\n    \"name\": \"INTRODUCTION\",\n    \"text\": \"The main asteroid belt, located between the\
    \ orbits of\\nMars and Jupiter, represents a crucial remnant popula-\\ntion from the epoch of planet formation. Its structure\\\
    nand composition preserve information about the physi-\\ncal and dynamical conditions of the early solar system\\nand\
    \ the subsequent evolutionary processes that have\\nshaped this population over billions of years.\\nUnder-\\nstanding\
    \ the distribution of asteroids in orbital space\\nwith respect to their intrinsic properties provides a fun-\\ndamental\
    \ window into these processes, bridging the gap\\nbetween initial formation locations and their present-day\\nconfigurations.\\\
    nDeciphering the intricate architecture of the main as-\\nteroid belt is a complex challenge. The observed distri-\\nbution\
    \ of asteroids is a cumulative outcome of several\\nintertwined factors: the initial mass and compositional\\ngradients\
    \ within the protoplanetary disk (DeMeo et al.\\n2015), the gravitational influence of giant planets (par-\\nticularly\
    \ Jupiter) (Morbidelli et al. 2015; Raymond &\\nNesvorny 2021), ongoing collisional fragmentation and\\naggregation (Morbidelli\
    \ et al. 2015), non-gravitational\\nforces such as the Yarkovsky effect that cause orbital\\ndrift, and the long-term\
    \ effects of mean-motion and sec-\\nular resonances which can sculpt the distribution by re-\\nmoving or concentrating\
    \ objects in specific orbital re-\\ngions (Raymond & Nesvorny 2021).\\nDisentangling the relative contributions of these\
    \ di-\\nverse processes requires a detailed, quantitative charac-\\nterization of the asteroid population across its full\
    \ or-\\nbital state space. Asteroid size and composition are two\\nkey properties that serve as tracers of both primordial\\\
    nconditions and evolutionary pathways. Larger asteroids\\nare generally more resilient to collisional disruption and\\\
    nless susceptible to orbital changes induced by the size-\\ndependent Yarkovsky effect. Compositional types, typ-\\nically\
    \ determined from spectroscopic observations, are\\n\\n2\\nbelieved to broadly reflect the temperature and mate-\\nrial\
    \ gradients present in the protoplanetary disk during\\ntheir formation, although subsequent dynamical mixing\\nhas significantly\
    \ altered the initial distribution (DeMeo\\net al. 2015).\\nWhile general trends, such as the prominent compo-\\nsitional\
    \ gradient transitioning from S-type dominated\\npopulations in the inner belt to C-type dominated pop-\\nulations in\
    \ the outer belt, have been established (DeMeo\\net al. 2015), a comprehensive and quantitative mapping\\nof the *joint*\
    \ distribution of asteroid size and composi-\\ntion as a function of orbital elements (semimajor axis,\\neccentricity,\
    \ and inclination) is essential to reveal finer\\nstructures and rigorously test theoretical models of solar\\nsystem\
    \ evolution.\\nThe difficulty lies not only in the complexity of the un-\\nderlying physics but also in analyzing a large,\
    \ potentially\\nincomplete, and heterogeneous astronomical dataset to\\nextract statistically significant patterns amidst\
    \ inherent\\nobservational biases and stochastic effects (Ofek et al.\\n2024).\\nIn this paper, we address this challenge\
    \ by conducting\\na detailed, data-driven analysis of the spatial architec-\\nture of the main asteroid belt (Roh et al.\
    \ 2021; Shuai\\net al. 2024). Leveraging a large dataset of over 35,000\\nmain-belt asteroids with measured orbital elements,\
    \ es-\\ntimated diameters, and compositional classifications, we\\nsystematically map how asteroid size distribution and\\\
    nspectral types vary across the multi-dimensional orbital\\nparameter space (DeMeo et al. 2015; Roh et al. 2021;\\nMarsset\
    \ et al. 2022).\\nOur approach employs a suite of state-of-the-art sta-\\ntistical and machine learning techniques, including\
    \ one-\\nand two-dimensional binning, Kernel Density Estima-\\ntion to visualize density variations, unsupervised clus-\\\
    ntering (DBSCAN, Gaussian Mixture Models) to iden-\\ntify distinct dynamical groups, and predictive modeling\\n(regression\
    \ and classification) to quantify the relation-\\nship between orbital location and asteroid properties.\\nThese methods\
    \ allow us to move beyond simple univari-\\nate or pairwise trends and explore the intricate corre-\\nlations between\
    \ physical properties and the full orbital\\nstate (Baluev & Rodionov 2020; Roh et al. 2021).\\nThe insights derived from\
    \ this comprehensive map-\\nping are then interpreted in the context of known dy-\\nnamical processes and theories of\
    \ asteroid belt evolution\\n(DeMeo & Carry 2014; Morbidelli et al. 2015). By ex-\\namining the properties of asteroids\
    \ within and adjacent\\nto prominent resonant regions, analyzing the character-\\nistics of identified dynamical families,\
    \ and quantifying\\nthe gradients across major compositional zones, we seek\\nto understand how processes such as resonant\
    \ depletion,\\ncollisional evolution, and non-gravitational forces have\\nsculpted the asteroid belt into its present-day\
    \ configu-\\nration (DeMeo & Carry 2014,?; Morbidelli et al. 2015;\\nDeienno et al. 2024).\\nThe robustness of our findings\
    \ is assessed through the\\napplication of multiple analytical techniques and the sta-\\ntistical significance of the\
    \ observed patterns across our\\nlarge sample (DeMeo & Carry 2014; Morbidelli et al.\\n2015). This work provides a detailed,\
    \ quantitative map\\nof the asteroid belt\\u2019s size, compositional, and dynam-\\nical architecture, offering a foundation\
    \ for refining our\\nunderstanding of the solar system\\u2019s formation and evolu-\\ntionary history (DeMeo & Carry 2014;\
    \ Morbidelli et al.\\n2015; Raymond & Nesvorny 2021).\"\n  },\n  {\n    \"name\": \"METHODS\",\n    \"text\": \"2.1. Data\
    \ Acquisition and Preparation\\nThe dataset used in this study was compiled from mul-\\ntiple sources, representing a\
    \ comprehensive collection of\\nphysical properties and orbital elements for main-belt\\nasteroids. The raw data were\
    \ provided in separate CSV\\nfiles, each containing a specific property linked by a\\nunique asteroid identifier. These\
    \ files included data on\\nasteroid name, diameter, semimajor axis, eccentricity,\\ninclination, argument of periapsis,\
    \ longitude of ascend-\\ning node, spin period, obliquity, spectral type, asteroid\\nfamily membership, and estimated\
    \ age.\\nInitial data processing involved loading each CSV file\\ninto a pandas DataFrame, ensuring the asteroid iden-\\\
    ntifier column was correctly recognized (Mozzillo et al.\\n2024,?). A master DataFrame was then constructed by\\nsequentially\
    \ merging these individual DataFrames using\\nan outer join on the asteroid identifier (Mozzillo et al.\\n2024). This\
    \ approach preserved all asteroids present in\\nany of the source files, allowing for subsequent analysis\\nof data availability\
    \ for different properties. The result-\\ning merged DataFrame served as the primary working\\ndataset.\\nFollowing the\
    \ merge, an initial cleaning step was per-\\nformed. Data types for each column were verified and\\ncorrected where necessary,\
    \ ensuring numerical proper-\\nties were stored as floating-point numbers and categori-\\ncal properties as strings or\
    \ objects. Common placehold-\\ners for missing values (e.g., -999, \\u2019NaN\\u2019 strings) were\\nidentified and converted\
    \ to the standard \\u2018numpy.nan\\u2018\\nrepresentation (Zhang et al. 2024).\\n2.2. Exploratory Data Analysis and Data\
    \ Refinement\\nExploratory Data Analysis (EDA) was conducted to\\nunderstand the distributions of variables, identify\
    \ pat-\\nterns of missing data, and detect potential outliers\\n(Agarwal et al. 2024).\\nFor continuous variables (di-\\\
    n\\n3\\nameter, semimajor axis, eccentricity, inclination, argu-\\nment of periapsis, longitude of ascending node, spin\
    \ pe-\\nriod, obliquity, age), descriptive statistics (count, mean,\\nmedian, standard deviation, min, max, quartiles)\
    \ were\\ncomputed (Agarwal et al. 2024). Histograms and box\\nplots were generated to visualize their distributions and\\\
    nidentify skewness or the presence of outliers (Agarwal\\net al. 2024).\\nThe number and percentage of missing\\nvalues\
    \ were recorded for each variable (Agarwal et al.\\n2024).\\nFor categorical variables (spectral type, family name),\\\
    nvalue counts were calculated to understand the fre-\\nquency of different categories.\\nBar charts were used\\nfor visualization\
    \ (Schonlau & Yang 2025; Branson et al.\\n2025), and the proportion of missing values was deter-\\nmined (Schonlau & Yang\
    \ 2025).\\nBased on the EDA, a strategy for handling missing\\ndata was implemented. For the core analysis focusing\\\
    non the joint distribution of size, composition, and or-\\nbital elements, we required complete data for diame-\\nter,\
    \ semimajor axis, eccentricity, inclination, and spec-\\ntral type. Records with missing values in any of these\\nfive\
    \ key variables were removed from the dataset using\\nlistwise deletion (Zhou et al. 2024), creating a refined\\nDataFrame,\
    \ \\u2018df_analysis\\u2018, specifically for this analysis.\\nThe number of records removed during this filtering step\\\
    nwas documented (Zhou et al. 2024). Auxiliary variables\\nwith missing data were handled on a case-by-case basis\\nin\
    \ specific sub-analyses where they were relevant.\\nOutlier treatment focused on ensuring the dataset rep-\\nresented\
    \ the main asteroid belt population (Hendler &\\nMalhotra 2020; Deienno et al. 2024).\\nAsteroids with\\norbital elements\
    \ (semimajor axis, eccentricity, inclina-\\ntion) falling outside typical main-belt bounds (specifi-\\ncally, semimajor\
    \ axis between 2.0 AU and 3.5 AU, ec-\\ncentricity less than 0.4, and inclination less than 30 de-\\ngrees) were excluded\
    \ from \\u2018df_analysis\\u2018, while noting\\ntheir characteristics for potential future study (Hendler\\n& Malhotra\
    \ 2020; Deienno et al. 2024).\\nDiameter values were examined, and while extreme\\nvalues were noted, they were generally\
    \ retained af-\\nter a log-transformation. Asteroid diameters were log-\\ntransformed (log _diameter = log10(diameter_km))\
    \ for\\nanalysis involving size, as asteroid size distributions are\\noften better represented on a logarithmic scale\
    \ (Hendler\\n& Malhotra 2020).\\nBivariate analysis included generating scatter plot ma-\\ntrices for the key continuous\
    \ variables (semimajor axis,\\neccentricity, inclination, and log_diameter) to visual-\\nize pairwise correlations (Makarov\
    \ 2025a,b). The Pear-\\nson correlation matrix was calculated for these vari-\\nables. Relationships between orbital elements\
    \ and spec-\\ntral types were explored using grouped box plots (e.g.,\\ndistribution of semimajor axis for each spectral\
    \ type).\\nFor subsequent modeling tasks, spectral types were\\ngrouped.\\nMinor spectral types occurring in less than\\\
    n1% of the population were consolidated into an \\u2019Other\\u2019\\ncategory to manage the number of classes for classifica-\\\
    ntion models.\\n2.3. Analysis of Spatial Distributions and Gradients\\nTo quantitatively map the distribution of asteroid\
    \ size\\nand composition across orbital space, the orbital param-\\neter space was discretized using bins. Semimajor axis\\\
    nwas binned with a width of 0.1 AU, eccentricity with a\\nwidth of 0.05, and inclination with a width of 2.5 de-\\ngrees.\
    \ These bin widths were selected based on the data\\ndensity observed in the EDA to ensure a sufficient num-\\nber of\
    \ asteroids in most bins for meaningful statistical\\nanalysis (Parker et al. 2008).\\n2.3.1. Diameter Gradients\\nWithin\
    \ each defined bin of semimajor axis, the mean,\\nmedian, and standard deviation of both \\u2018log_diameter\\u2018\\\
    nand the raw diameter were calculated (Wiegert et al.\\n2006; Kazantsev & Kazantseva 2016,?). The number of\\nasteroids\
    \ in each bin was also recorded (Wiegert et al.\\n2006; Hendler & Malhotra 2020). These statistics were\\nplotted as a\
    \ function of semimajor axis to visualize the\\nsize gradient (Kazantsev & Kazantseva 2016,?).\\nThe\\nstatistical\\nsignificance\\\
    nof\\nthe\\nvariation\\nin\\nmean/median diameter across semimajor axis bins was\\nassessed using appropriate tests (e.g.,\\\
    nANOVA or\\nKruskal-Wallis test, depending on the normality of the\\ndiameter distribution within bins) (Wiegert et al.\
    \ 2006;\\nHendler & Malhotra 2020).\\nThis analysis was extended to two-dimensional bins\\ncombining semimajor axis with\
    \ eccentricity and semi-\\nmajor axis with inclination (Kenyon & Bromley 2025).\\nFor these 2D bins, the average \\u2018log_diameter\\\
    u2018 was calcu-\\nlated and visualized using heatmaps, where color inten-\\nsity represented the average size in that\
    \ region of orbital\\nspace (Kenyon & Bromley 2025).\\n2.3.2. Spectral Type Gradients\\nFor each semimajor axis bin, the\
    \ proportion of major\\nspectral types (specifically focusing on the most common\\ntypes like C, S, M, V, and the \\u2019Other\\\
    u2019 category) was cal-\\nculated. These proportions were plotted as stacked bar\\ncharts or line plots against semimajor\
    \ axis to illustrate\\nthe compositional gradient. Chi-squared tests were per-\\nformed to determine if the distribution\
    \ of spectral types\\nvaried significantly across semimajor axis bins (Sturrock\\n& Wheatland 2003; Zhong et al. 2024).\\\
    n\\n4\\nSimilar to the diameter analysis, compositional gradi-\\nents were also explored in 2D bins (semimajor axis vs.\\\
    neccentricity, semimajor axis vs. inclination). Heatmaps\\nwere generated to visualize these distributions, with\\ncolor\
    \ representing the dominant spectral type or the pro-\\nportion of a specific type within each 2D bin (Albert\\net al.\
    \ 2022).\\n2.4. Advanced Statistical and Machine Learning\\nAnalyses\\nMore sophisticated techniques were employed to\
    \ re-\\nveal fine-scale structures and quantify relationships\\nwithin the asteroid belt\\u2019s architecture (DeMeo &\
    \ Carry\\n2014; Morbidelli et al. 2015).\\n2.4.1. Kernel Density Estimation\\nKernel Density Estimation (KDE) was applied\
    \ to\\npairs of orbital parameters (semimajor axis vs.\\nec-\\ncentricity, semimajor axis vs.\\ninclination, eccentric-\\\
    nity vs.\\ninclination) to visualize the density distri-\\nbution of asteroids in these 2D orbital planes, pro-\\nviding\
    \ a smoother representation than simple bin-\\nning (Vida et al. 2017; D\\u2019Emilio et al. 2021).\\nThe\\n\\u2018sklearn_neighbors.KernelDensity\\\
    u2018 implementation was\\nused.\\nBandwidth optimization for the KDE models\\nwas performed using cross-validation techniques\
    \ (specif-\\nically, employing \\u2018GridSearchCV\\u2018 to search for the op-\\ntimal bandwidth parameter). Contour\
    \ plots were gen-\\nerated from the fitted KDE models to illustrate density\\nvariations (D\\u2019Emilio et al. 2021).\\\
    nThese density plots were then integrated with infor-\\nmation about asteroid properties by overlaying contours\\ncolored\
    \ according to the average \\u2018log_diameter\\u2018 or dom-\\ninant spectral type in the corresponding orbital regions.\\\
    nAlternatively, separate KDEs were computed for major\\nspectral types to directly compare their spatial distribu-\\ntions.\\\
    n2.4.2. Clustering in Orbital Parameter Space\\nUnsupervised clustering algorithms were applied to\\nthe 3D orbital parameter\
    \ space defined by semimajor\\naxis, eccentricity, and inclination to identify dynami-\\ncal groupings (Margot et al.\
    \ 2024). Prior to clustering,\\nthese orbital elements were standardized (mean-centered\\nand scaled to unit variance)\
    \ to ensure that distance cal-\\nculations were not dominated by the variable with the\\nlargest range.\\nTwo clustering\
    \ algorithms were used: (Wegmann et al.\\n2021; Yin et al. 2024)\\n\\u2022 DBSCAN (Density-Based Spatial Cluster-\\ning\
    \ of Applications with Noise): This algo-\\nrithm was chosen for its ability to find clusters\\nof arbitrary shape and\
    \ identify outliers as noise.\\nThe key parameters, \\u2018eps\\u2018 (maximum distance be-\\ntween two samples for one\
    \ to be considered as in\\nthe neighborhood of the other) and \\u2018min_samples\\u2018\\n(number of samples in a neighborhood\
    \ for a point\\nto be considered as a core point), were explored.\\nHeuristics, such as analyzing the k-distance graph,\\\
    nguided the selection of appropriate \\u2018eps\\u2018 values.\\n\\u2022 Gaussian Mixture Models (GMM): GMM\\nmodels assume\
    \ the data points are generated from\\na mixture of a finite number of Gaussian distri-\\nbutions with unknown parameters.\
    \ This approach\\nprovides probabilistic assignments of asteroids to\\nclusters. The optimal number of Gaussian compo-\\\
    nnents was determined by fitting models with vary-\\ning numbers of components and evaluating them\\nusing the Bayesian\
    \ Information Criterion (BIC)\\nand Akaike Information Criterion (AIC).\\nFor the clusters identified by both methods,\
    \ the mean\\norbital parameters were calculated (Jopek 2020; Ciacci\\net al. 2023). The distribution of \\u2018log_diameter\\\
    u2018 (mean,\\nmedian, standard deviation) and the proportions of dif-\\nferent spectral types were analyzed within each\
    \ cluster\\nto characterize their physical and compositional proper-\\nties (Ivezic et al. 2002a,b).\\nThe identified\
    \ clusters were compared with known as-\\nteroid families (using the provided family membership\\ndata) to assess the\
    \ extent to which the clustering re-\\ncovered known dynamical groups (Ivezic et al. 2002a,b;\\nJopek 2020). Cluster assignments,\
    \ summary statistics\\nper cluster, and visualizations (e.g., 3D scatter plots of\\norbital elements colored by cluster)\
    \ were saved.\\n2.4.3. Regression Modeling\\nPredictive modeling was employed to quantify the re-\\nlationship between\
    \ orbital location and asteroid proper-\\nties (Santana-Ros et al. 2017; Bolin et al. 2025; Tang\\net al. 2025).\\n\\\
    u2022 Predicting Diameter: Regression models were\\ndeveloped to predict \\u2018log_diameter\\u2018 using orbital\\nelements\
    \ (semimajor axis, eccentricity, inclina-\\ntion) as features. Initial exploration used Multiple\\nLinear Regression.\
    \ Generalized Additive Models\\n(GAMs) were also fitted to capture potential non-\\nlinear relationships between orbital\
    \ elements and\\n\\u2018log_diameter\\u2018. More complex ensemble methods,\\nspecifically Gradient Boosting Regressors\
    \ (e.g.,\\nXGBoost, LightGBM), were trained for improved\\npredictive performance.\\nHyperparameter tun-\\ning for these\
    \ models was performed using cross-\\nvalidation techniques (e.g., \\u2018GridSearchCV\\u2018, \\u2018Ran-\\n\\n5\\ndomizedSearchCV\\\
    u2018) on a training set. Model per-\\nformance was evaluated on a held-out test set\\nusing metrics such as R-squared,\
    \ Mean Abso-\\nlute Error (MAE), and Root Mean Squared Error\\n(RMSE). Feature importance scores or partial de-\\npendence\
    \ plots were analyzed to interpret the con-\\ntribution of each orbital element to the predicted\\ndiameter.\\n\\u2022\
    \ Predicting Spectral Type: Classification mod-\\nels were built to predict the spectral type of an as-\\nteroid based\
    \ on its orbital elements. This analysis\\nfocused on discriminating between the major spec-\\ntral classes. Multinomial\
    \ Logistic Regression and\\nensemble classifiers like Random Forest and Gra-\\ndient Boosting Classifiers were trained.\
    \ Hyperpa-\\nrameter tuning using cross-validation was applied\\nto the ensemble models. Model evaluation on a\\nheld-out\
    \ test set utilized metrics including accu-\\nracy, precision, recall, F1-score (macro-averaged\\nfor handling class imbalance),\
    \ and confusion ma-\\ntrices.\\nTrained models,\\nevaluation results,\\nand diagnostic\\nplots were saved for further\
    \ analysis and interpretation\\n(Raschka 2020; van Breugel et al. 2023; Ferrer et al.\\n2024).\\n2.5. Linking to Dynamical\
    \ Processes\\nTo interpret the observed patterns in the context of as-\\nteroid belt evolution, the spatial distributions\
    \ and prop-\\nerties derived from the analyses were examined in rela-\\ntion to known dynamical features. Major mean-motion\\\
    nresonances with Jupiter (e.g., the 3:1, 5:2, 7:3, 2:1 Kirk-\\nwood gaps) and significant secular resonances were iden-\\\
    ntified based on locations reported in the astrophysical\\nliterature (DeMeo & Carry 2014). Windows around the\\nsemimajor\
    \ axis values corresponding to these resonances\\nwere defined.\\nThe binned statistics, KDE results, and cluster prop-\\\
    nerties were then specifically analyzed within and imme-\\ndiately adjacent to these resonance regions.\\nCompar-\\nisons\
    \ were made between the asteroid density, average\\ndiameter, and spectral type distributions inside reso-\\nnances versus\
    \ in the surrounding non-resonant regions to\\nassess the influence of resonant dynamics on the asteroid\\npopulation\
    \ structure (DeMeo & Carry 2014; Morbidelli\\net al. 2015).\\n2.6. Computational Implementation\\nAll data processing\
    \ and analysis steps were imple-\\nmented in Python using standard scientific libraries in-\\ncluding pandas for data\
    \ manipulation, numpy for nu-\\nmerical operations, matplotlib and seaborn for visual-\\nization, scipy for statistical\
    \ functions (Virtanen et al.\\n2019), and scikit-learn for machine learning algorithms.\\nFor computationally intensive\
    \ tasks, particularly hy-\\nperparameter tuning of machine learning models and\\ncross-validation, parallel processing\
    \ was utilized across\\nmultiple CPU cores to accelerate computation.\\nCode\\nwas structured modularly, and intermediate\
    \ results and\\nplots were saved in an organized directory structure.\"\n  },\n  {\n    \"name\": \"RESULTS\",\n    \"\
    text\": \"3.1. Global properties and bivariate correlations of the\\nmain-belt population\\nThe initial data collection\
    \ process yielded a large\\ndataset, which was subsequently refined to a high-\\nquality sample of 35,623 main-belt asteroids.\
    \ This re-\\nfined sample includes complete information for diame-\\nter, semimajor axis, eccentricity, inclination, and\
    \ spec-\\ntral type, and is restricted to the typical main-belt or-\\nbital bounds (2.0 < a < 3.5 AU, e < 0.4, i < 30\\\
    u25e6). This\\nstringent filtering ensures that the subsequent analysis\\nfocuses on the primary population of the main\
    \ asteroid\\nbelt, minimizing potential biases from incomplete data\\nor non-main-belt objects.\\nThe fundamental properties\
    \ of this population exhibit\\ndistinct distributions. As shown in Figure 1, asteroid\\ndiameters follow an approximately\
    \ log-normal distribu-\\ntion, a characteristic feature of populations shaped by\\ncollisional processes. This finding\
    \ supports the use of\\nthe logarithm of diameter (log10(diameter_km)) in sub-\\nsequent analyses, as it yields a more\
    \ symmetric distribu-\\ntion. The orbital parameters are, by definition, confined\\nto the main-belt region, with their\
    \ distributions reflect-\\ning this selection.\\nThe compositional makeup of the\\nsample is dominated by S-type (silicaceous)\
    \ asteroids,\\nwhich comprise 44.8% of the population, followed by C-\\ntype (carbonaceous) at 17.8%, and X-type at 12.0%,\
    \ as\\ndetailed in Figure 2. Other significant groups include\\nV-type (7.0%) and B-type (4.6%) asteroids.\\nTo explore\
    \ the relationships between these proper-\\nties, we performed a bivariate analysis, summarized in\\nFigure 3.\\nThe diagonal\
    \ panels of this plot reaffirm\\nthe univariate distributions shown previously, while the\\noff-diagonal scatter plots\
    \ reveal the belt\\u2019s large-scale\\nstructure.\\nA moderately strong positive Pearson cor-\\nrelation coefficient\
    \ of r = 0.427 is observed between\\nlog10(diameter_km) and semimajor axis, indicating a\\nsystematic tendency for larger\
    \ asteroids to be located\\nfurther from the Sun.\\nA weaker but statistically sig-\\nnificant positive correlation (r\
    \ = 0.251) exists between\\nsemimajor axis and inclination, suggesting that aster-\\noids in the outer belt tend to occupy\
    \ more inclined or-\\n\\n6\\nFigure 1. Univariate distributions of key physical and or-\\nbital parameters for the asteroid\
    \ sample. The diameter dis-\\ntribution (top left) is approximately log-normal, dominated\\nby smaller bodies. The shapes\
    \ of the semimajor axis, eccen-\\ntricity, and inclination distributions (top row) are defined by\\nthe sample\\u2019s\
    \ confinement to the main belt.\\nFigure 2.\\nDistribution of the 20 most frequent spectral\\ntypes within the main-belt\
    \ asteroid sample.\\nThe popula-\\ntion is heavily skewed, with S-type (silicaceous) asteroids\\ncomprising the largest\
    \ fraction, followed by C-type (carbona-\\nceous) and X-type asteroids.\\nbits. The scatter plots also clearly show the\
    \ voids corre-\\nsponding to the Kirkwood gaps, which will be analyzed\\nin detail later.\\nA preliminary investigation\
    \ into how composition re-\\nlates to orbital location reveals a clear compositional\\nFigure 3.\\nBivariate analysis\
    \ of key physical and orbital\\nparameters for 35,623 main-belt asteroids. Diagonal panels\\nshow the univariate distribution\
    \ of each parameter (loga-\\nrithmic diameter, semimajor axis, eccentricity, and inclina-\\ntion). Off-diagonal scatter\
    \ plots reveal the belt\\u2019s structure,\\nhighlighting a positive correlation between asteroid size and\\nsemimajor\
    \ axis, and the clear voids of the Kirkwood gaps.\\nzoning across the main belt. As shown in Figure 4, S-\\ntype asteroids\
    \ are concentrated in the inner belt (low\\nsemimajor axis), while C- and X-types are predomi-\\nnantly found in the outer\
    \ belt.\\nV-type asteroids ex-\\nhibit a distinct, compact distribution in both semima-\\njor axis and inclination, characteristic\
    \ of a collisional\\nfamily. These initial findings highlight the presence of\\nlarge-scale structural gradients that\
    \ warrant more de-\\ntailed investigation.\\n3.2. Spatial gradients of asteroid size and composition\\nTo systematically\
    \ map the asteroid belt\\u2019s architec-\\nture, we analyzed the distribution of asteroid properties\\nwithin discrete\
    \ bins of orbital elements, as described in\\nthe methods. This approach allows for a quantitative\\nassessment of how\
    \ size and composition vary across or-\\nbital space.\\n3.2.1. One-dimensional gradients along the semimajor axis\\nAnalysis\
    \ of asteroid properties binned by semimajor\\naxis reveals two profound and statistically significant\\ngradients that\
    \ are visualized in Figure 5. The first is\\na clear trend of increasing asteroid size with increasing\\nsemimajor axis.\
    \ A Kruskal-Wallis H-test confirmed that\\n\\n7\\nFigure 4. Distributions of orbital parameters\\u2014semimajor\\naxis\
    \ (left), eccentricity (middle), and inclination (right)\\u2014for\\nthe major asteroid spectral types. The plots reveal\
    \ a clear\\ncompositional zoning across the main belt. S-type asteroids\\nare concentrated in the inner belt (low semimajor\
    \ axis), while\\nC- and X-types are predominantly found in the outer belt.\\nV-type asteroids exhibit a distinct, compact\
    \ distribution in\\nboth semimajor axis and inclination, characteristic of a col-\\nlisional family.\\nthe differences\
    \ in log10(diameter_km) across semimajor\\naxis bins are highly significant (p \\u22480). Quantitatively,\\nthe mean log10(diameter_km)\
    \ increases from approxi-\\nmately 0.56 (\\u223c3.6 km geometric mean diameter) in the\\ninner belt (2.1-2.4 AU) to over\
    \ 0.88 (\\u223c7.6 km) in the\\nouter belt (3.1-3.2 AU). This may reflect variations in\\nprotoplanetary disk conditions\
    \ or be a consequence of\\nmore intense collisional evolution in the denser inner\\nbelt, which grinds bodies down to\
    \ smaller sizes.\\nThe second major gradient, also shown in Figure 5,\\nis a striking compositional zoning. A Chi-squared\
    \ test\\nconfirmed a highly significant variation in spectral type\\ndistribution with orbital distance (p \\u22480).\
    \ The inner\\nbelt is overwhelmingly dominated by S-types (\\u223c75% at\\n2.2 AU), whose proportion steadily declines\
    \ to less than\\n10% by 3.2 AU. Conversely, C-types are rare in the inner\\nbelt (< 5% at 2.2 AU) but become the dominant\
    \ class\\nin the outer belt (\\u223c47% at 3.2 AU). This is widely in-\\nterpreted as a relic of the protoplanetary disk\\\
    u2019s thermal\\nstructure, with rocky S-types forming inside the \\u201dsnow\\nline\\u201d and primitive, carbonaceous\
    \ C-types forming be-\\nyond it. The distinct peak of V-type asteroids around\\n2.3-2.4 AU is also clearly visible, corresponding\
    \ to the\\nVesta family.\\n3.2.2. Two-dimensional distribution in orbital space\\nExtending the analysis to two-dimensional\
    \ bins (semi-\\nmajor axis vs. eccentricity, and semimajor axis vs. incli-\\nnation) provides a more detailed view of\
    \ these gradients.\\nThe heatmaps in Figure 6 confirm the primary trend of\\nincreasing size with semimajor axis across\
    \ all eccentrici-\\nties and inclinations (top row). These maps also vividly\\ndisplay the compositional zoning (bottom\
    \ row). S-types\\nare predominantly located at low semimajor axes across\\nall inclinations. C-types dominate the outer\
    \ belt and\\nshow a tendency to be more prevalent at higher inclina-\\ntions within that region. These visualizations\
    \ highlight\\nFigure 5. Physical and compositional gradients across the\\nmain asteroid belt as a function of semimajor\
    \ axis. The top\\npanel shows that the mean asteroid diameter (blue line) sys-\\ntematically increases towards the outer\
    \ belt. The grey bars\\nindicate the asteroid number distribution, peaking in the in-\\nner belt. The bottom panel reveals\
    \ a strong compositional\\nzoning: silicaceous S-type asteroids (light green) dominate\\nthe inner belt, while carbonaceous\
    \ C-type asteroids (dark\\nblue) become prevalent in the outer belt. These concurrent\\ngradients reflect fundamental\
    \ differences in formation and\\ncollisional evolution across the belt.\\nhow the belt\\u2019s fundamental gradients manifest\
    \ across\\nthe full range of orbital parameters.\\n3.3. Advanced structural and predictive modeling\\nMoving beyond simple\
    \ binning, we employed ad-\\nvanced statistical and machine learning techniques to\\nuncover finer structures and quantify\
    \ the relationship\\nbetween orbital location and physical properties.\\n3.3.1. Kernel density estimation of orbital space\\\
    nKernel Density Estimation (KDE) provides a smooth,\\ncontinuous representation of asteroid density in orbital\\nparameter\
    \ space. The resulting density maps, shown in\\nFigure 7, reveal that the highest concentrations of as-\\nteroids are\
    \ found in the inner-to-central main belt (2.2\\nto 2.8 AU) at low eccentricities (e < 0.2) and inclina-\\ntions (i <\
    \ 10\\u25e6). When colored by size, the points on the\\nKDE plots show that these dense regions are populated\\nby small-to-intermediate-sized\
    \ bodies. In contrast, the\\nlargest asteroids appear more sparsely distributed, pref-\\nerentially occupying the less\
    \ dense, outer regions of the\\nbelt, consistent with the observed size gradient.\\n\\n8\\nFigure 6. Two-dimensional distribution\
    \ of asteroid physi-\\ncal properties across orbital space. The heatmaps show mean\\nlogarithmic diameter (top row), S-type\
    \ proportion (bottom\\nleft), and C-type proportion (bottom right) as a function of\\nsemimajor axis versus eccentricity\
    \ (left column) and incli-\\nnation (right column). These visualizations reveal the main\\nbelt\\u2019s large-scale structure:\
    \ a clear trend of increasing as-\\nteroid size with semimajor axis, and a pronounced compo-\\nsitional zoning with S-types\
    \ concentrated in the inner belt\\nand C-types in the outer belt.\\nFigure 7. Kernel Density Estimation (KDE) of main-belt\\\
    nasteroids in semimajor axis\\u2013eccentricity (left) and semimajor\\naxis\\u2013inclination (right) space. Color contours\
    \ show asteroid\\ndensity, while individual points are colored by their loga-\\nrithmic diameter. The plots reveal that\
    \ the highest density\\nregions in the inner-central belt are populated by small-to-\\nintermediate-sized bodies. In contrast,\
    \ the largest asteroids\\n(brighter points) are sparsely distributed, preferentially oc-\\ncupying less dense regions\
    \ in the outer belt.\\n3.3.2. Unsupervised clustering: identifying dynamical\\ngroupings\\nTo objectively identify dynamically\
    \ coherent groups,\\nwe applied unsupervised clustering algorithms to the\\nthree standardized orbital parameters. First,\
    \ we used\\nthe density-based algorithm DBSCAN. The crucial\\nneighborhood radius parameter, \\u03f5, was determined by\\\
    nexamining the k-distance plot (Figure 8), where the\\n\\u2019elbow\\u2019 indicates the optimal threshold distinguishing\\\
    ndense clusters from the sparser background. The DB-\\nSCAN analysis successfully identified 38 distinct, dense\\nclusters,\
    \ with 14.25% of asteroids classified as \\u2019noise\\u2019.\\nThis result supports the view of the belt as numerous\\\
    ncompact families embedded within a diffuse background\\npopulation.\\nFigure 8.\\nDetermination of the neighborhood radius\
    \ (\\u03f5)\\nfor the DBSCAN clustering algorithm. The plot shows the\\ndistance to the 5th nearest neighbor for each\
    \ asteroid in\\nthe orbital parameter space, with points sorted by this dis-\\ntance. The distinct \\u2019elbow\\u2019\
    \ in the curve indicates the optimal\\ndistance threshold that distinguishes dense clusters, corre-\\nsponding to asteroid\
    \ families, from the sparser background\\npopulation.\\nAs a complementary approach, we used Gaussian Mix-\\nture Models\
    \ (GMM), which model the data as a mix-\\nture of Gaussian distributions. Based on the Bayesian\\nInformation Criterion\
    \ (BIC), an optimal number of 10\\ncomponents was identified.\\nThese 10 clusters, visual-\\nized in 3D orbital space\
    \ in Figure 9, align remarkably\\nwell with known dynamical regions and prominent as-\\nteroid families. For instance,\
    \ Cluster 7 (mean a = 2.30\\nAU) is enriched in V-types (25%), corresponding to the\\nVesta family.\\nOuter belt components\
    \ like Cluster 6\\n(mean a = 3.14 AU) and Cluster 9 (mean a = 3.15 AU)\\nare dominated by C-types (55% and 43%, respectively),\\\
    nlikely encompassing the Themis and Hygiea families.\\nThe GMM analysis effectively partitions the belt into\\nmeaningful\
    \ dynamical units, each with distinct compo-\\nsitional and size signatures.\\n\\n9\\nFigure 9. Gaussian Mixture Model\
    \ (GMM) clustering of\\nasteroids in 3D orbital space (semimajor axis, eccentricity,\\ninclination). The 10 identified\
    \ clusters, represented by dif-\\nferent colors, reveal the main belt\\u2019s structure as a complex\\ntapestry of distinct,\
    \ overlapping dynamical groups. These\\ndata-driven clusters correspond well with known asteroid\\nfamilies and compositional\
    \ zones, highlighting the belt\\u2019s in-\\ntricate structure shaped by formation history and subsequent\\nevolution.\\\
    n3.3.3. Predictive modeling: the limits of location\\nTo quantify how well an asteroid\\u2019s orbital location de-\\\
    ntermines its physical properties, we built two machine\\nlearning models. First, an XGBoost regression model\\ntrained\
    \ to predict log10(diameter_km) from orbital el-\\nements achieved a coefficient of determination (R2) of\\nonly 0.22.\
    \ As shown in the feature importance analysis\\n(Figure 10, left), all three orbital parameters contribute\\nto the prediction.\
    \ However, the low R2 value is a crit-\\nical finding: while a clear statistical trend exists at the\\npopulation level,\
    \ an individual asteroid\\u2019s specific size is\\npoorly predicted by its orbit, highlighting the dominant\\nrole of\
    \ its unique, stochastic collisional history.\\nSecond, a Random Forest classification model at-\\ntempting to predict\
    \ spectral type from orbital elements\\nachieved a modest overall accuracy of 53%. Feature im-\\nportance analysis (Figure\
    \ 10, right) shows that semima-\\njor axis is overwhelmingly the most influential predictor.\\nThe model performed reasonably\
    \ well for spatially seg-\\nregated types like S-types (F1-score of 0.70), but poorly\\nfor less common or intermixed\
    \ types (macro-averaged\\nF1-score of 0.16). This indicates that while orbital lo-\\ncation provides strong probabilistic\
    \ clues about compo-\\nsition, it is not a definitive predictor due to significant\\ndynamical mixing.\\nFigure 10.\\\
    nRelative importance of orbital parameters in\\npredicting asteroid physical properties. (Left) For predict-\\ning asteroid\
    \ diameter using an XGBoost regression model,\\nall three orbital parameters\\u2014eccentricity, inclination, and\\nsemimajor\
    \ axis\\u2014contribute almost equally. (Right) For pre-\\ndicting spectral type using a Random Forest classification\\\
    nmodel, semimajor axis is overwhelmingly the most impor-\\ntant feature. This contrast highlights that while an aster-\\\
    noid\\u2019s composition is strongly linked to its location, its size\\nis poorly constrained by orbital parameters alone,\
    \ reflecting\\nthe stochastic nature of its collisional history.\\n3.4. The influence of mean-motion resonances\\nThe\
    \ Kirkwood gaps, depleted zones associated with\\nmean-motion resonances with Jupiter, provide a natu-\\nral laboratory\
    \ for studying dynamical sculpting. As ex-\\npected, asteroid density drops sharply within these gaps\\n(Figure 11, top\
    \ panel).\\nMore revealingly, a Kruskal-\\nWallis test showed a highly significant difference (p \\u2248\\n10\\u2212174)\
    \ in the size distribution between asteroids in-\\nside, adjacent to, and far from the gaps.\\nAs seen in\\nFigure 11,\
    \ the mean log10(diameter_km) is higher for\\nasteroids in regions \\u2019Adjacent to Gaps\\u2019 (0.739) and \\u2019In-\\\
    nside Gaps\\u2019 (0.722) compared to the \\u2019Background\\u2019 pop-\\nulation (0.670).\\nThis indicates that smaller\
    \ asteroids\\nare preferentially cleared from resonant regions, a size-\\ndependent filtering consistent with the Yarkovsky\
    \ effect,\\nwhich causes smaller bodies to drift more rapidly into\\nunstable resonant orbits.\\nFurthermore, the compositional\
    \ mix is also signifi-\\ncantly altered near resonances (Chi-squared test, p \\u2248\\n10\\u2212129). The proportion of\
    \ X-type asteroids is signifi-\\ncantly enhanced \\u2019Inside Gaps\\u2019 (18.2%) compared to the\"\n  },\n  {\n    \"\
    name\": \"background (9.8%), while S-types are slightly depleted\",\n    \"text\": \"This suggests that the dynamical\
    \ clearing mechanisms\\nare not compositionally neutral, possibly because dif-\\nferent spectral types have different\
    \ physical properties\\n(e.g., thermal inertia) that affect their response to non-\\ngravitational forces like the Yarkovsky\
    \ effect.\\n3.5. Synthesis\\nThis comprehensive analysis provides a detailed, data-\\ndriven view of the main asteroid\
    \ belt\\u2019s spatial architec-\\nture, revealing it as a complex structure shaped by mul-\\ntiple evolutionary processes.\
    \ The most prominent fea-\\n\\n10\\nFigure 11.\\nThe influence of Kirkwood gaps on asteroid\\nsize and spatial distribution.\\\
    nTop: Asteroid count (bars)\\nand mean log-diameter (line) as a function of semimajor\\naxis, with major mean-motion resonances\
    \ indicated.\\nBot-\\ntom: Comparison of the size distribution for asteroids lo-\\ncated inside versus adjacent to these\
    \ gaps. The figure demon-\\nstrates that while asteroid density is significantly depleted\\nwithin the gaps, the asteroids\
    \ that remain in these dynam-\\nically unstable regions are, on average, larger, suggesting\\na size-dependent clearing\
    \ mechanism that preferentially re-\\nmoves smaller bodies.\\ntures are the large-scale gradients in composition and\\\
    nsize along the semimajor axis, reflecting initial condi-\\ntions in the protoplanetary disk and subsequent col-\\nlisional\
    \ evolution.\\nSuperimposed on these gradients\\nare finer structures created by gravitational dynam-\\nics, such as the\
    \ sculpting effects of mean-motion reso-\\nnances and the localized concentrations corresponding\\nto asteroid families.\\\
    nThe analysis of resonant regions\\nhighlights their role as dynamic filters that preferen-\\ntially remove smaller asteroids,\
    \ likely mediated by size-\\ndependent non-gravitational forces, and also subtly al-\\nter the local compositional mix.\
    \ While population-level\\ntrends are clear and statistically significant, the limited\\npredictive power of orbital location\
    \ for the properties\\nof individual asteroids underscores the importance of\\nstochastic events, particularly collisions,\
    \ in determining\\nthe specific characteristics of each body. The observed\\narchitecture is thus the integrated outcome\
    \ of primordial\\nformation, ongoing collisional grinding, and the long-\\nterm dynamical sculpting by planetary resonances\
    \ and\\nnon-gravitational forces.\"\n  },\n  {\n    \"name\": \"CONCLUSIONS\",\n    \"text\": \"The spatial architecture\
    \ of the main asteroid belt, as\\nrevealed by this comprehensive data-driven analysis, is\\na complex tapestry woven from\
    \ primordial conditions,\\nsubsequent collisional evolution, and long-term dynam-\\nical sculpting. This study leveraged\
    \ a large dataset of\\n35,623 main-belt asteroids with measured size, compo-\\nsition, and orbital elements, applying\
    \ a suite of statis-\\ntical and machine learning techniques to map the joint\\ndistribution of these properties in orbital\
    \ space and un-\\nderstand the underlying physical processes.\\nThe problem addressed is the intricate nature of the\\\
    nasteroid belt\\u2019s structure, which holds clues to its for-\\nmation and evolution. Disentangling the contributions\\\
    nof initial formation gradients, giant planet migration,\\ncollisions, and non-gravitational forces requires a de-\\ntailed,\
    \ quantitative characterization of the population.\\nThis paper aimed to provide such a characterization\\nby systematically\
    \ analyzing the distribution of asteroid\\nsize and composition across the orbital parameter space\\n(semimajor axis,\
    \ eccentricity, inclination).\\nUsing methods including one- and two-dimensional\\nbinning, Kernel Density Estimation,\
    \ unsupervised clus-\\ntering (DBSCAN, Gaussian Mixture Models), and pre-\\ndictive modeling (regression, classification),\
    \ we analyzed\\na refined dataset of main-belt asteroids. This allowed\\nus to move beyond simple correlations and explore\
    \ the\\nmulti-dimensional relationships between physical prop-\\nerties and orbital dynamics.\\nThe analysis of mean-\\\
    nmotion resonance regions provided specific insights into\\nthe effects of dynamical filtering.\\nThe results reveal profound\
    \ structural gradients and\\nfine-scale features. We confirmed a highly statistically\\nsignificant trend of increasing\
    \ asteroid size with increas-\\ning semimajor axis, suggesting either primordial differ-\\nences in accretion or differential\
    \ collisional processing\\nacross the belt. A stark compositional zoning was clearly\\nmapped, showing a transition from\
    \ S-type dominated\\npopulations in the inner belt to C-type dominated pop-\\nulations in the outer belt, a strong indicator\
    \ of the ther-\\nmal gradient in the protoplanetary disk during planetes-\\nimal formation. Kernel Density Estimation\
    \ provided a\\nsmooth visualization of density variations, highlighting\\nregions of high asteroid concentration and less\
    \ popu-\\nlated zones. Unsupervised clustering successfully iden-\\ntified numerous distinct dynamical groups, many cor-\\\
    nresponding to known asteroid families, each exhibiting\\ncharacteristic size and compositional distributions that\\nreflect\
    \ their parent body properties and formation his-\\ntory. Predictive modeling demonstrated that while or-\\nbital location\
    \ predicts population-level trends, its abil-\\nity to predict the size or spectral type of an individual\\nasteroid is\
    \ limited, underscoring the dominant role of\\n\\n11\\nstochastic events like collisions in shaping individual as-\\nteroid\
    \ properties. Analysis of mean-motion resonance\\nregions showed they are significantly depleted of smaller\\nasteroids,\
    \ consistent with size-dependent orbital drift\\nmechanisms like the Yarkovsky effect, and also exhibit\\naltered compositional\
    \ mixes compared to the surround-\\ning regions, suggesting non-uniform removal efficiencies\\nacross spectral types.\\\
    nFrom these results, we have learned that the main\\nasteroid belt\\u2019s present-day architecture is the cumula-\\ntive\
    \ outcome of multiple interacting processes.\\nThe\\nbroad compositional gradient reflects initial conditions,\\nwhile\
    \ the size gradient likely results from a combination\\nof initial conditions and subsequent collisional grind-\\ning,\
    \ which is more efficient in the inner, denser re-\\ngions.\\nGravitational dynamics, particularly planetary\\nresonances,\
    \ act as powerful filters, sculpting the dis-\\ntribution by preferentially removing objects based on\\ntheir size (via\
    \ non-gravitational forces) and potentially\\ncomposition. The identification of numerous dynamical\\nfamilies through\
    \ clustering highlights the ongoing im-\\nportance of catastrophic collisions in creating localized,\\ncoherent groups.\
    \ The limited predictability of individual\\nasteroid properties from their current orbit emphasizes\\nthat each asteroid\\\
    u2019s history, particularly its collisional\\npast, is a crucial determinant of its final state.\\nThis\\nstudy provides\
    \ a detailed quantitative map that serves\\nas a foundation for refining models of asteroid belt for-\\nmation, evolution,\
    \ and the interplay between physical\\nproperties and dynamical processes over solar system\\nhistory.\"\n  },\n  {\n\
