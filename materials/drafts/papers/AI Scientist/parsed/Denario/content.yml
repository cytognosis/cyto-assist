    \ links. Simi-\\nlar to the asexual lab trajectory, many candidate regu-\\nlators were found to exhibit peak expression\
    \ at the ear-\\nliest pseudotime bins of the sexual trajectory (Figure\\n20 shows an example), suggesting a concentrated\
    \ regu-\\nlatory cascade initiating sexual commitment and early\\ngametocyte development in culture.\\nThe Sexual Field\
    \ trajectory presented a dramatically\\ndifferent picture of the regulatory landscape, aligning\\nwith the expanded trajectory\
