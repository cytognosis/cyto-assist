    \ of\\nthe models, which was instead solely presented in graphs. For other papers, the plots and tables had\\nformatting\
    \ issues, like using too small a font, tables overlapping with text, the lack of use of standard\\nplotting techniques\
    \ such as box plots and a lack of attaching some extra plots as supplementary\\nmaterial.\\n42\\n\\n\\u2022 Reporting\
    \ of data handling errors: In some cases, Denario failed to read some data files. Instead of\\nthe model failing to produce\
    \ a manuscript, this was reported as part of the results; in some cases,\\na full section was created reporting these\
    \ failures.\\n\\u2022 Preference for walking classification over step counting: Many of the models produced by Denario\\\
    ninitially had a bias towards building 2-second walking detectors, rather than step counters, despite\\nthe prompt clearly\
    \ indicating this was the intention of the study. This is likely due to this being a\\nmore common approach in literature,\
    \ as there are very few step-counting datasets available.\\n\\u2022 Trade-off between novelty and manuscript quality:\
    \ There was a noticeable trade-off between the\\nnovelty of the research questions, and the quality of the methods and\
