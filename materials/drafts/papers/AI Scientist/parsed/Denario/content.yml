    \ from the more complete\\ndynamical evolution captured by numerical relativity\\n(NR) surrogates like NRSur7dq4 and effective-one-body\\\
    n(EOB) models like SEOBNRv5PHM. The relative agree-\\nment within the core cluster suggests that for a high-\\nmass, potentially\
    \ precessing system like GW231123,\\nthe NR-calibrated and EOB-based time-domain models,\\nalong with the time-domain\
    \ phenomenological model\\nIMRPhenomTPHM, provide more consistent descrip-\\ntions of the underlying physical dynamics.\
