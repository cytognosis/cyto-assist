    ntally alters the inferred parameter space for GW231123.\\n3.3. Physics-informed discrepancy decomposition\\nTo\\nsystematically\\\
    nattribute\\nthe\\nobserved\\nhigh-\\ndimensional disagreements to specific physical effects\\nand the corresponding approximations\
    \ within the wave-\\nform models, we performed a physics-informed dis-\\ncrepancy decomposition. As described in Section\
    \ 2.4,\\nthis involved quantifying the multi-dimensional Jensen-\\nShannon Divergence (JSD) between model pairs within\\\
    nfour predefined physical parameter subspaces: Mass &\\nDistance, Effective Spin, Individual Spin & Orientation,\\nand\
    \ Remnant Properties. The results are presented as\\npairwise JSD heatmaps in Figure 4.\\n3.3.1. Mass & distance subspace\\\
    n\\n9\\nFigure 4.\\nPairwise Jensen-Shannon Divergence (JSD)\\nheatmaps quantify disagreements between five waveform\\\
    nmodels for GW231123 across four distinct astrophysical pa-\\nrameter subspaces.\\nHigher JSD values (yellow) indicate\\\
    ngreater model discrepancy, while lower values (dark blue)\\nindicate agreement. The individual spin and orientation sub-\\\
    nspace exhibits the most severe model dependence, with JSD\\nvalues approaching the theoretical maximum.\\nSignificant\\\
    ndiscrepancies are also observed in the mass, distance, effec-\\ntive spin, and remnant properties subspaces, demonstrating\\\
    nthat the inferred astrophysical properties for GW231123 are\\nhighly sensitive to the chosen waveform model.\\nThis\\\
    nsubspace,\\ncomprising\\nmass_1_source,\\nmass_2_source, and redshift, exhibits extremely high\\nJSD values (many exceeding\
    \ 0.6) across various model\\npairs, as seen in the top-left heatmap of Figure 4. This\\nconfirms that the models fundamentally\
    \ disagree on the\\nintrinsic masses and the distance to the source. The sys-\\ntemic nature of this disagreement suggests\
    \ that the way\\nspin and orientation are modeled is strongly degenerate\\nwith the inferred masses and redshift. This\
    \ leads to\\nlarge systematic shifts in these fundamental parameters,\\nhighlighting that even basic source properties\
    \ are not\\nrobustly constrained without accounting for waveform\\nmodel systematics.\\n3.3.2. Effective spin subspace\\\
    nDiscrepancies\\nin\\nthe\\nEffective\\nSpin\\nsubspace\\n(chi_eff, chi_p) are also substantial, as shown in\\nthe top-right\
    \ heatmap of Figure 4. Notably, the JSD\\nbetween IMRPhenomXPHM and IMRPhenomTPHM\\nfor this subspace is 0.636, reflecting\
    \ their starkly oppos-\\ning conclusions on the effective spin parameter.\\nThis\\ndivergence directly points to differences\
    \ in how mod-\\nels treat spin-orbit coupling and its influence on the\\ninspiral rate.\\nConversely, SEOBNRv5PHM and\
    \ IM-\\nRPhenomTPHM show remarkable agreement in this\\nsubspace (JSD = 0.043), indicating that their modeling\\nof orbit-averaged\
    \ spin effects is highly consistent, de-\\nspite representing different modeling paradigms (EOB\\nvs. phenomenological).\\\
    n3.3.3. Individual spin & orientation subspace\\nThe 6-dimensional Individual Spin & Orientation sub-\\nspace (a1, a2,\
    \ cos_tilt_1, cos_tilt_2, cos_theta_jn,\\nphi_jl) reveals the most severe and widespread dis-\\nagreement among all subspaces,\
    \ with JSD values for\\nmany model pairs approaching the theoretical maxi-\\nmum of approximately 0.693 (bottom-left heatmap\
    \ in\\nFigure 4). This is a critical finding: the detailed, multi-\\ndimensional configuration of the individual black\
    \ hole\\nspins and the binary\\u2019s orientation relative to the ob-\\nserver is the most model-dependent aspect of the\
    \ in-\\nference for GW231123. This profound divergence is the\\nexpected signature of differing treatments of spin preces-\\\
    nsion. Models that employ simplified \\u201dtwisting-up\\u201d for-\\nmalisms (e.g., IMRPhenomXPHM, IMRPhenomXO4a)\\ninherently\
    \ produce different posterior distributions for\\nthese parameters compared to models that capture the\\nfull dynamical\
    \ evolution of precessing spins (e.g., NR-\\nSur7dq4, SEOBNRv5PHM). This directly impacts the\\nability to infer the true\
    \ spin configuration of the binary.\\n3.3.4. Remnant properties subspace\\nThe inferred properties of the final remnant\
    \ black\\nhole (final_mass_source, final_spin) are also highly\\nmodel-dependent, as illustrated in the bottom-right\\\
    nheatmap of Figure 4. The JSD values in this subspace\\nare large, particularly for pairs involving IMRPhenomX-\\nPHM,\
    \ which consistently predicts a much lower final\\nspin compared to the other models (median 0.71 vs.\\n0.81 \\u22120.89,\
    \ as shown in Table 1). This suggests signifi-\\ncant differences in the modeling of the merger-ringdown\\nphase of the\
    \ gravitational-wave signal and the calibra-\\ntion against numerical relativity simulations. The ac-\\ncurate inclusion\
    \ of higher-order waveform modes, which\\nbecome more prominent during the merger and ring-\\ndown, is crucial for precisely\
    \ predicting remnant prop-\\nerties. The close agreement between SEOBNRv5PHM\\nand IMRPhenomTPHM (JSD = 0.051) in this\
    \ subspace\\nis again notable, as both models incorporate a more\\ncomprehensive treatment of higher-order modes and ap-\\\
    npear to have a more consistent description of the final\\nstate of the binary.\\n3.4. Robust astrophysical inference\
    \ for GW231123\\n\\n10\\nThe culmination of our analysis was to synthe-\\nsize the findings from the baseline comparisons,\
    \ high-\\ndimensional embedding, and physics-informed discrep-\\nancy decomposition to determine the robustness of as-\\\
    ntrophysical constraints for GW231123.\\nAs defined in\\nSection 2.5, a parameter was considered \\u201drobust\\u201d\
    \ if the\\nmaximum pairwise JSD across all models was below 0.05\\nand the relative range of median values was less than\\\
    n10%.\\nOur primary conclusion, summarized in Table 3, is\\nthat no key astrophysical parameter for GW231123\\nmeets these\
    \ criteria for robustness. The systematic dif-\\nferences between the waveform models are significant\\nenough to preclude\
    \ a single, consensus measurement for\\nany of the analyzed properties.\\nThis finding carries a crucial astrophysical\
    \ implica-\\ntion: for high-mass, potentially precessing binary black\\nhole mergers like GW231123, the signal is often\
    \ rela-\\ntively short in the detector\\u2019s band and dominated by the\\nhighly non-linear merger and ringdown phases.\
    \ In such\\ncases, the systematic errors arising from the choice of\\nwaveform model can be comparable to, or even exceed,\\\
    nthe statistical uncertainties inherent in the observational\\ndata.\\nThe wide range of inferred values, particularly\\\
    nfor the mass ratio (e.g., mass_2_source varying from\\n55.1 M\\u2299to 111.1 M\\u2299) and the effective spin (chi_eff\\\
    nfrom 0.04 to 0.44), means that drawing firm conclusions\\nabout the source\\u2019s formation history (e.g., distinguishing\\\
    nbetween isolated binary evolution and dynamical cap-\\nture in a dense stellar environment) is severely hampered\\nwithout\
    \ a robust method to account for these waveform\\nsystematics. Our analysis unequivocally demonstrates\\nthat for GW231123,\
    \ the choice of waveform model is\\nnot merely a technical detail but a dominant factor in\\nthe scientific interpretation\
    \ of the event, precluding firm\\nastrophysical conclusions about its nature or origin.\"\n  },\n  {\n    \"name\": \"\
    CONCLUSIONS\",\n    \"text\": \"4.1. Problem Statement and Our Approach\\nThe\\nrobust\\nastrophysical\\ninterpretation\\\
    nof\\ngravitational-wave (GW) events,\\nparticularly those\\nfrom complex binary black hole (BBH) mergers like\"\n  },\n\
    \  {\n    \"name\": \"GW231123,\",\n    \"text\": \"is fundamentally challenged by model-\\ndependent biases arising from\
    \ the use of approximate\\nwaveform models. These models, while computationally\\ne\\ufb00icient, incorporate varying\
    \ levels of physical fidelity,\\nleading to systematic uncertainties that can often ex-\\nceed statistical measurement\
    \ errors.\\nThis paper ad-\\ndressed this critical challenge by introducing a novel,\\nphysics-informed framework for\
    \ systematically decom-\\nposing and attributing discrepancies among multiple\\ngravitational-wave waveform models. Our\
    \ methodology\\nwent beyond simple global comparisons by quantifying\\nmulti-dimensional divergences within physically\
    \ mo-\\ntivated parameter subspaces, thereby linking model\\ndifferences to specific physical approximations.\\n4.2. Summary\
    \ of Findings\\nOur comprehensive analysis of GW231123, utilizing\\nfive distinct waveform models (NRSur7dq4, IMRPhe-\\\
    nnomXO4a, SEOBNRv5PHM, IMRPhenomXPHM, IM-\\nRPhenomTPHM), yielded several key findings:\"\n  },\n  {\n    \"name\": \"\
    Significant Baseline Disagreements:\",\n    \"text\": \"Initial\\nexploratory data analysis revealed substantial dis-\\\
    ncrepancies in 1D marginal posterior distributions\\nfor key astrophysical parameters, most notably for\\ncomponent masses\
    \ (especially mass_2_source),\\neffective inspiral spin (chi_eff),\\nand redshift.\\nThe Jensen-Shannon Divergence (JSD)\
    \ and 1-\\nWasserstein distance metrics frequently indicated\\nnear-complete non-overlap between certain model\\npairs.\"\
    \n  },\n  {\n    \"name\": \"High-Dimensional Model Clustering:\",\n    \"text\": \"Uni-\\nform Manifold Approximation\
    \ and Projection\\n(UMAP) confirmed that these discrepancies are\\nnot isolated but permeate the high-dimensional\\nparameter\
    \ space. The UMAP embedding clearly\\nseparated\\nthe\\nmodels\\ninto\\ndistinct\\nclusters,\\nwith NRSur7dq4, SEOBNRv5PHM,\
    \ and IMRPhe-\\nnomTPHM forming a core cluster, while IMRPhe-\\nnomXO4a and IMRPhenomXPHM occupied sig-\\nnificantly isolated\
    \ regions. This clustering directly\\nreflects fundamental differences in how these mod-\\nels describe the underlying\
    \ physical dynamics of\"\n  },\n  {\n    \"name\": \"GW231123\",\n    \"text\": \"\"\n  },\n  {\n    \"name\": \"Physics-Informed\
    \ Discrepancy Attribution:\",\n    \"text\": \"Our core Physics-Informed Discrepancy Decompo-\\nsition successfully attributed\
    \ these model differ-\\nences to specific physical approximations:\\n\\u2022 The Mass & Distance subspace showed high\\\
    nJSD values, indicating that even fundamental\\nsource properties like masses and redshift are\\nstrongly degenerate with\
    \ and sensitive to the\\noverall waveform modeling.\\n\\u2022 The Effective Spin subspace exhibited sub-\\nstantial disagreements,\
    \ particularly between\\nIMRPhenomXPHM\\nand\\nIMRPhenomT-\\nPHM, highlighting differing treatments of\\nspin-orbit coupling.\\\
