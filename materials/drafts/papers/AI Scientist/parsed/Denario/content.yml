    \ . . . . . . . . . . . . . . . . . 258\\n1\"\n  },\n  {\n    \"name\": \"Introduction\",\n    \"text\": \"Modern science\
    \ has been built on the rules of the scientific method [1]. This empirical and iterative\\nmethod begins by formulating\
    \ an idea or hypothesis, which represents the foundation for the entire\\nresearch endeavor. This initial idea might arise\
    \ from a variety of sources: a theoretical question, an\\nunexplained phenomenon, an unexpected result in prior work,\
    \ or a curiosity-driven exploration of a\\ndataset or simulation.\\nThe hypothesis can aim to explain an observed behavior\
    \ in nature, test the\\nvalidity of a theoretical model, or uncover new patterns or relationships within existing data.\\\
    nOnce the idea is identified, it is often refined through collaboration discussions, preliminary literature\\nreviews,\
    \ and feasibility assessments. Researchers seek to understand the broader context of the problem,\\nwhat has already been\
    \ studied, and where the current knowledge gaps lie. This step is crucial for ensuring\\nthat the proposed work is novel,\
    \ feasible, and impactful.\\nNext, a detailed plan is developed to execute the project and investigate the proposed idea.\
    \ This stage\\ninvolves identifying the necessary data, selecting or designing appropriate methodologies, and outlining\\\
    nthe sequence of steps required for the analysis. Depending on the nature of the research, this may include\\ndata collection\
    \ or simulation, data preprocessing and cleaning, implementing algorithms or analytical\\nmodels, and performing statistical\
    \ or computational analyses. Along this process, scientists may use\\nlower-dimensional representations of the data, e.g.,\
    \ via plots or diagrams, to help interpret intermediate\\n3\"\n  },\n  {\n    \"name\": \"results and to communicate findings\
    \ effectively\",\n    \"text\": \"The ultimate goal of this phase is to systematically\\nexplore the hypothesis, extract\
    \ meaningful insights, and arrive at scientifically sound conclusions.\\nFinally, a scientific paper or report is written\
    \ describing in detail the problem or hypothesis, the\"\n  },\n  {\n    \"name\": \"methods used, the results obtained,\
    \ and the conclusions reached, describing how the research has advanced\",\n    \"text\": \"knowledge and its connections\
    \ with previous works.\\nEach of the above steps is a highly sophisticated task that requires extensive time for highly\
    \ skilled\\ndomain experts. Because of this, the generation of a scientific paper can take from months to years.\\nUnfortunately,\
    \ a significant fraction of that time is consumed on tasks such as literature search, learning\\nnew methods, debugging\
    \ code, and writing text. These are tasks where recent advances in Artificial\\nIntelligence (AI), such as large language\
    \ models and AI agents, can help. Thus, developing AI tools\\nthat can assist scientists with some or all of the tasks\
    \ involved in the generation of new knowledge can\\naccelerate scientific discovery by enabling scientists to formulate\
    \ new hypotheses and test those faster\\nthan in the traditional method.\\nIn this work, we introduce and describe Denario,\
    \ an AI multi-agent system designed to serve as a\\nscientific research assistant. Denario can generate ideas, check the\
    \ literature to evaluate the novelty of\\nthose, develop research plans, write and execute code, make plots, and draft\
    \ and review scientific papers.\\nIt can also perform end-to-end scientific research by carrying out, sequentially, all\
    \ the above tasks. We\\nevaluate the capabilities and limitations of Denario by generating paper drafts from a very diverse\
    \ set of\\ndisciplines, from biology to astrophysics, and reporting the positive and negative aspects of these papers,\\\
    nas judged by domain experts. Hoping to be a tool that can accelerate scientific discovery, we also make\\nDenario publicly\
    \ available.\\nWe want to stress that Denario is not the first attempt at building tools to help researchers perform\\\
    nend-to-end research. The idea of having machines perform research is much older. For instance, the robot\\nscientist\
    \ (also known as Adam) [2] was able to formulate hypotheses, plan and run experiments (physically\\nvia robotics), interpret\
    \ the results, and repeat the cycle. Adam was designed to study functional genomics\\nand was the first machine to generate\
    \ scientific knowledge independently of humans. The same group\\nlater developed Eve [3], another robot scientist tailored\
    \ towards drug discovery. Another early important\\nwork is the Automated Statistician [4], which was able to perform\
    \ a detailed statistical analysis of some\\ndata and provide a report about its findings. More recently, lots of recent\
    \ work on AI assistants for\\nresearch has been done by many different teams, such as Sakana AI-scientist [5, 6], Google\
    \ co-scientist\\n[7], AI-cosmologist [8], Curie [9], and Agent laboratory [10].\\nWe note that lots of works are also\
    \ developing tools to help scientists with increasingly sophisticated\\ntasks. For instance, AutoWEKA was developed to\
    \ identify the best machine learning model to tackle a\\nparticular problem [11]. ResearchAgent [12] was able to formulate\
    \ new hypotheses and design experiments\\nby checking their novelty with the literature. [13] created a self-driving lab\
    \ to re-engineer enzymes without\\nhuman intervention, while [14] created a virtual lab with several AI-scientist experts\
    \ in different areas\\ncapable of creating nanobodies. Another example is AstroAgents [15], a multi-agent system designed\
    \ to\\ntest and consolidate many different hypotheses about the origins of life on Earth. Recent works have also\\nshown\
    \ that AI systems can write expert-level scientific software and discover new algorithms [16, 17, 18].\\nOther works are\
    \ exploring the capabilities of agentic systems via graphs [19, 20]. We also note that\\nAgentRxiv [21] is a framework\
    \ for Agents to learn from previous works.\\nWhile some of these technologies have the potential to accelerate scientific\
    \ discovery \\u2013for instance,\\n[22] designed an autonomous system combining AI with robotics to discover new materials\
    \ a lot of serious\\ndebates about human standards for validation sparked [23]. These are very important considerations\
    \ and\\nwe discuss them in detail, for the case of Denario. Furthermore, given the ethical considerations raised\\nby\
    \ such a technology, we devote a paper section to discuss ethical aspects, along with how this technology\\nfits within\
    \ the philosophy of science.\\nWe note that in scientific research, there is usually a tradeoff between depth and breadth,\
    \ given a fixed\\namount of time to carry out a task or study. We believe that AI systems like Denario can help researchers\\\
    nexplore a wide range of possibilities, at a more superficial level, while researchers can go deeper into the\\nmost interesting\
    \ or promising ones. We emphasize that the goal of Denario is not to automate science,\\nbut to develop a research assistant\
    \ that can accelerate scientific discovery. By making Denario publicly\\navailable and user-friendly, we hope it will\
    \ become a standard tool that benefits the scientific community\\nin their enterprises.\\nThis paper is organized as follows.\
    \ In Section 2, we introduce the different pieces that made our system,\\nsuch as LLMs, AI agents, and agentic orchestration.\
    \ In Sec. 3 we describe in detail the different modules\\nin Denario and show the different ways to run the system in\
    \ Sec. 4. In Sec. 5, we show different AI-\\ngenerated papers from many different disciplines and discuss the positive\
    \ and negative aspects of those.\\n4\\n\\nWe then present in Sec. 6 some of the observed failure modes of Denario together\
    \ with advantages,\\nlimitations, and future directions. We discuss the ethical considerations that systems like Denario\
    \ raise\\nand how the technology powering is seen from the philosophy of science in Sec. 7. We conclude in Sec.\\n8.\\\
    n2\\nAI multi-agent systems\\nDenario is an AI multi-agent framework designed to function as a scientific research assistant.\
    \ It is built\\nwith AG2 and LangGraph, and designed to assist in different stages of the research process. It can also\\\
    nexecute multiple tasks sequentially, enabling it to perform end-to-end scientific research.\\nThe system is composed\
    \ of several modules, each focused on a specific task. Within each module, there\\nare agents\\u2014autonomous or semi-autonomous\
    \ computational entities that perceive their environment,\\nprocess information, and take actions to achieve defined goals.\\\
    nSome of these are AI agents, which\\nleverage Large Language Models (LLMs) to perform specialized tasks. Agents can communicate\
    \ and\\ncollaborate to solve complex problems, while orchestration manages their interactions\\u2014determining task\\\
    norder, information flow, and overall coordination. The system takes some input text and returns one or\\nseveral outputs\
    \ depending on how Denario is run. We show a cartoon representation of the system in\\nFig. 1.\\nIn this section, we describe\
    \ the different components relevant to setting the agents, including the LLM\\nmodels and the orchestration.\\nFigure\
    \ 1:\\nThis cartoon shows the different components of Denario and their interplay. The system is\\nshown as an orange\
    \ circle, and it takes some input text and data (left side), and can generate one or\\nseveral outputs (red icons on the\
    \ right). The system is composed of different modules (yellow shapes),\\nwhich can exchange messages among them (blue\
    \ arrows outside modules). The modules are composed of\\nmultiple agents (bots icons), that can communicate with each\
    \ other (blue arrows inside modules).\\n2.1\\nLarge Language Models\\nThe majority of the agents in Denario are AI-agents\
    \ that typically call Large Language Models (LLMs)\\n[24], including multi-modal ones, with a very specialized prompt\
    \ that may depend on the output of other\\nagents. Denario allows the user to choose among many different models, including:\\\
    n\\u2022 gpt-5, gpt-5-mini, gpt-4o, gpt-4.1, gpt-4.1-mini, o3-mini from OpenAI,\\n\\u2022 gemini-2.5-pro, gemini-2.5-flash,\
    \ gemini-2.0-flash from Google,\\n5\\n\\n\\u2022 claude-3-7-sonnet, claude-4-Opus, claude-4.1-Opus, claude-4.5 from Anthropic.\\\
    nWe note that Denario is not limited to these LLMs, and new models, or models from other providers,\\ncan easily be incorporated\
    \ into the system. Our choice of models has so far been made based on trial\\nand error rather than systematic evaluation.\
    \ For example, for coding, our primary models of choice\\nare gemini-2.5-pro, gpt-4.1, and o3-mini. For critiquing and\
    \ reviewing, our default choice is Claude\\nmodels or reasoning models from OpenAI.\\n2.2\\nMulti-Agent Orchestration\
    \ and Strategy\\nIn Denario, the agent orchestration is carried out with two different frameworks: AG21 and LangGraph2.\\\
    nSome modules (e.g.\\nidea module) are implemented in both frameworks, while others (e.g.\\nanalysis\\nmodule) are only\
    \ implemented in one framework. Some modules implemented in AG2 follow the Planning\\n& Control strategy as implemented\
    \ in Cmbagent that we describe below.\\n2.2.1\\nOrchestration\\n\\u2022 AG2. AG2 is an open-source AgentOS that supports\
    \ advanced agentic AI applications and research.\\nIt offers an agentic abstraction that unifies AI foundation models\
    \ like LLMs, non-LLM tools and\\nhuman inputs, and intuitive conversation programming to orchestrate multiple agents.\
    \ Stronger\\nagents or agentic systems can be composed recursively using primitive agents and basic conversation\\npatterns\
    \ like sequential chats, group chats, nested chats. This modular architecture also enables\\nrich agentic design patterns\
    \ such as advanced tool use, structured context, conditional handoffs,\\ndynamic updates, dynamic task decomposition and\
    \ team building, guardrails, and many other\\nextensions. All agents using AG2 are part of Cmbagent [25, 26, 27], an open\
    \ source and publicly\\navailable3 multi-agent system designed to perform a variety of scientific research-related tasks.\\\
    n\\u2022 LangGraph. LangGraph is based on LangChain4 and is an open-source Python framework de-\\nsigned to orchestrate\
    \ agents through directed graphs. In LangGraph, the graph nodes represent\\ncallable units, such as agents, functions,\
    \ and tools. The edges between nodes represent the way the\\nflow of the computation is carried out. Another important\
    \ component of LangGraph is the graph\\nstate, an object (typically a Python class) passed through the different nodes\
    \ and enabling agent\\ncommunication, memory, coordination, etc. LangGraph supports both static and dynamic graphs.\\\
    nFor instance, depending on the outcome of an agent, one may want to call a particular agent. Loops\\nand interrupts are\
    \ also allowed in LangGraph.\\n2.2.2\\nPlanning and Control Strategy\\nPlanning & Control, a fundamental concept in robotics,\
    \ refers to strategies for orchestrating decision-\\nmaking and action execution.\\nThe basic idea is that during the\
    \ planning phase, a complex task is\\ndecomposed into smaller, manageable subtasks, and a strategy is defined for achieving\
    \ them. During the\\ncontrol phase, these subtasks are executed, with monitoring and adjustments as needed to ensure the\\\
    noverall goal is achieved. Some modules in Denario follow this strategy, as implemented in Cmbagent. We\\nnow briefly\
    \ describe the Cmbagent Planning & Control implementation and refer the reader to [26] for\\nfurther details. The strategy\
    \ is illustrated in figure 2.\\nIn Cmbagent, during the planning phase, the main task is broken down into sub-tasks, and\
    \ an agent\\nis assigned to each of them. During control, the agent responsible for a sub-task executes its instructions\\\
    nuntil completion. Once a sub-task is complete, a control agent records its status and proceeds to the next\\nsub-task,\
    \ continuing until the entire plan is complete.\\nThe Planning stage starts with a call to a plan setter agent, whose\
    \ task is to select the set of\\nagents that should be involved during the session. This function call stores into the\
    \ context detailed\\ninstructions for the plan (namely, the agents and description of agents that should be involved)\
    \ and\\nends on the next agent target, which is the planner agent. Then, the elaboration of a plan is done via\\na two-agent\
    \ conversation where a planner agent suggests plans and a plan reviewer agent suggests\\nrecommendations on the plan.\
