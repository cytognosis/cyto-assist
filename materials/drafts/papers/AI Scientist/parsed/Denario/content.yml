    \ limited\\nliterature regarding how to go about these investigations, leading to poorer decisions by the model.\\nIn\
    \ summary, Denario showed clear capabilities for wearable monitoring in the digital health domain,\\nto produce useful\
    \ research questions, conduct this research, and analyze the output data. It is noted,\\nhowever, that there are quite\
