    \ Unexpected water-hydroxide ion structure and diffusion behavior in low hydration\\nmedia (2018), arXiv:1812.06961 [cond-mat.soft].\\\
    n[15] T. Kistwal, K. Kanhaiya, A. Buchmann, C. Ma, J. Nikolic, J. Ackermann, P. Galonska, S. S. Nalige, M. Havenith,\\\
    nM. Sulpizi, and S. Kruss, Light-induced quantum friction of carbon nanotubes in water (2025), arXiv:2503.12580\\n[physics.optics].\\\
    n[16] Z. Dang and M. Ishii, A physics-informed reinforcement learning approach for the interfacial area transport in two-phase\\\
    nflow (2020), arXiv:1908.02750 [physics.comp-ph].\\n[17] Y. Li, How machine learning predicts fluid densities under nanoconfinement\
    \ (2025), arXiv:2508.17732 [cond-mat.soft].\"\n  },\n  {\n    \"name\": \"A.12\",\n    \"text\": \"Astrophysics: black\
    \ hole-stellar mass relation\\n241\\n\\nDraft version May 14, 2025\\nTypeset using LATEX twocolumn style in AASTeX631\\\
    nMapping the Diversity of the Black Hole-Stellar Mass Relation: The Role of Feedback and\\nCosmology in Simulated Galaxies\\\
    nAstroPilot1\\n1Anthropic, Gemini & OpenAI servers. Planet Earth.\"\n  },\n  {\n    \"name\": \"ABSTRACT\",\n    \"text\"\
    : \"Understanding the diversity of the black hole\\u2013stellar mass (MBH\\u2013Mstar) relation and its physical\\ndrivers\
    \ is crucial for galaxy evolution models but challenging due to the complex interplay of physical\\nprocesses across large\
    \ parameter spaces. We systematically quantify how the slope, normalization,\\nintrinsic scatter, and occupation fraction\
    \ of this relation depend on variations in cosmological and\\nfeedback parameters using a large suite of 1,000 simulated\
    \ galaxy catalogs at redshift zero, comprising\\napproximately 720,000 galaxies. Each catalog is characterized by six\
    \ global parameters: matter den-\\nsity (\\u2126m), density fluctuation amplitude (\\u03c38), and supernova (ASN1, ASN2)\
    \ and active galactic nucleus\\n(AAGN1, AAGN2) feedback e\\ufb00iciencies. For each catalog, we fit the MBH\\u2013Mstar\
    \ relation using robust\\nlinear regression within three stellar mass bins, estimating uncertainties via bootstrapping.\
    \ We then\\nemploy advanced statistical and machine learning techniques, including hierarchical linear modeling,\\nrandom\
    \ forest regression, gradient boosting, permutation importance, SHAP values, and partial de-\\npendence plots, to map\
    \ the derived scaling relation parameters and occupation fractions to the global\\ncatalog parameters. Our analysis reveals\
    \ substantial diversity in the MBH\\u2013Mstar relation across cat-\\nalogs and mass bins. Supernova feedback (ASN1) is\
    \ the dominant driver of the relation\\u2019s properties\\nand scatter at low stellar masses, where the relation is typically\
    \ shallower and the occupation fraction\\nlower. Active galactic nucleus feedback, particularly AAGN1, becomes the primary\
    \ driver at interme-\\ndiate and high masses, with its influence transitioning from promoting black hole growth (steepening\\\
    nthe relation) at intermediate masses to potentially suppressing it (changing the sign of dependence) at\\nthe highest\
    \ masses. Cosmological parameters (\\u2126m, \\u03c38) play a secondary, modulating role, primarily\\naffecting normalization\
    \ and scatter. The black hole occupation fraction increases strongly with stellar\\nmass and is significantly suppressed\
    \ by feedback at low mass. Simulated relations broadly agree with\\nobservational constraints at high mass but predict\
    \ greater diversity and lower occupation at low mass,\\nconsistent with recent dwarf galaxy studies. This work provides\
    \ a comprehensive, statistically rigorous\\nmapping of the MBH\\u2013Mstar relation\\u2019s diversity across a wide parameter\
    \ space, highlighting the criti-\\ncal, mass-dependent role of feedback physics in shaping black hole-galaxy coevolution\
    \ and offering a\\ndetailed framework for interpreting observed scaling relation diversity.\\nKeywords: Confidence interval,\
    \ Cosmological parameters, Dwarf galaxies, Galaxy evolution, Hierar-\\nchical models, Linear regression, Matter density,\
    \ Principal component analysis, Robust\\nregression, Scaling relations\"\n  },\n  {\n    \"name\": \"INTRODUCTION\",\n\
    \    \"text\": \"The observed tight correlations between the mass of\\nsupermassive black holes (SMBHs) and the properties\
    \ of\\ntheir host galaxies, such as stellar mass (Mstar), velocity\\ndispersion (\\u03c3), and luminosity, represent fundamental\\\
    nevidence for the intertwined evolution of SMBHs and\\ngalaxies. The black hole\\u2013stellar mass relation (MBH\\u2013\\\
    nMstar) is a particularly important cornerstone, provid-\\ning a direct link between the growth of the central\\nblack\
    \ hole and the overall stellar content of its host\\ngalaxy.\\nWhile a general scaling relation of the form\\nlog10 MBH\
    \ \\u221dlog10 Mstar is widely observed in the local\\nuniverse, it is known to exhibit significant intrinsic scat-\\\
    nter. Furthermore, there is growing evidence suggesting\\nthat the relation may vary depending on galaxy proper-\\nties\
    \ like morphology, environment, and potentially red-\\nshift, especially at lower stellar masses where observa-\\ntional\
    \ constraints are more challenging. Understanding\\nthe origin of this diversity \\u2013 the variations in slope, nor-\\\
    n\\n2\\nmalization, and scatter of the relation, as well as the\\nfraction of galaxies hosting a black hole (the occupation\\\
    nfraction) \\u2013 is crucial for robustly constraining theoretical\\nmodels of galaxy formation and evolution.\\nTheoretical\
    \ models and cosmological hydrodynamical\\nsimulations are powerful tools for studying the coevolu-\\ntion of black holes\
    \ and galaxies (Ni et al. 2024b). These\\nsimulations naturally produce scaling relations akin to\\nthose observed, as\
    \ they include complex physical pro-\\ncesses such as gas accretion onto the black hole, stellar\\nfeedback from supernovae\
    \ (SN), and active galactic nu-\\ncleus (AGN) feedback (Ni et al. 2024b). These feedback\\nmechanisms are key regulators\
    \ of both star formation\\nand black hole growth, shaping the properties of galaxies\\nand their central black holes (Ni\
    \ et al. 2024b). However,\\nthe precise implementation and strength of these feed-\\nback processes, along with the underlying\
    \ cosmological\\nparameters that govern the large-scale structure of the\\nuniverse, can vary significantly between different\
    \ sim-\\nulation codes and parameter choices (Ni et al. 2024b).\\nThe parameter space describing these physical inputs\
    \ is\\nvast, and the interplay between cosmological structure\\nformation, baryonic processes, and feedback is highly\\\
    nnon-linear (Ni et al. 2024b). This complexity makes it\\nexceedingly challenging to isolate and quantify the im-\\npact\
    \ of individual physical drivers on the emergent black\\nhole scaling relations and their observed diversity (Ni\\net\
    \ al. 2024b).\\nPrevious simulation studies have explored the MBH\\u2013\\nMstar relation, often focusing on a limited\
    \ set of feedback\\nprescriptions or cosmological scenarios (Winkel et al.\\n2024).\\nWhile these works have successfully\
    \ demon-\\nstrated the general importance of feedback in shaping\\nthe relation (Lamastra et al. 2010; Pacucci & Loeb\\\
    n2024), a comprehensive, systematic quantification of\\nhow the key properties of the relation \\u2013 its slope, nor-\\\
    nmalization, intrinsic scatter, and the black hole occu-\\npation fraction \\u2013 vary across a wide range of feedback\\\
    nand cosmological parameters has been lacking (Winkel\\net al. 2024). Such a systematic mapping is essential for\\nunderstanding\
    \ which physical processes are primarily re-\\nsponsible for shaping the relation and its diversity across\\ndifferent\
    \ galaxy mass scales, and how their relative in-\\nfluence changes (Lamastra et al. 2010; Pacucci & Loeb\\n2024).\\nIn\
    \ this paper, we address this challenge by leveraging\\nan unprecedented suite of 1,000 simulated galaxy cata-\\nlogs\
    \ at redshift zero. Each catalog is generated using a\\nunique combination of six global parameters that gov-\\nern the\
    \ underlying physics: the matter density (\\u2126m),\\nthe amplitude of density fluctuations (\\u03c38), and the ef-\\\
    nficiencies of two distinct modes each of supernova feed-\\nback (ASN1, ASN2) and active galactic nucleus feedback\\n(AAGN1,\
    \ AAGN2) (Crain & van de Voort 2023). This\\nlarge and diverse parameter space provides a unique op-\\nportunity to systematically\
    \ explore the dependencies of\\nthe MBH\\u2013Mstar relation (Jung et al. 2024).\\nFor each\\nof these catalogs, we robustly\
    \ quantify the properties of\\nthe relation within different stellar mass bins, account-\\ning for measurement uncertainties\
    \ and the black hole oc-\\ncupation fraction. We then employ a suite of advanced\\nstatistical and machine learning techniques,\
    \ including\\nhierarchical linear modeling, random forest regression,\\ngradient boosting, permutation importance, SHAP\
    \ val-\\nues, and partial dependence plots, to map the derived\\nscaling relation parameters and occupation fractions\
    \ to\\nthe input cosmological and feedback parameters. This\\nrigorous approach allows us to identify the dominant\\ndrivers\
    \ of the relation\\u2019s diversity, quantify their relative\\nimportance, and characterize their mass-dependent ef-\\\
    nfects. By systematically quantifying these dependencies\\nand comparing the resulting diversity landscape in sim-\\nulations\
    \ to observational constraints (Filipp et al. 2023),\\nwe provide a detailed framework for interpreting the\\ncomplexities\
    \ of the observed MBH\\u2013Mstar relation and\\nguiding future theoretical developments in galaxy for-\\nmation modeling\
    \ (Crain & van de Voort 2023).\"\n  },\n  {\n    \"name\": \"METHODS\",\n    \"text\": \"This section details the methodology\
    \ employed to sys-\\ntematically quantify and map the diversity of the black\\nhole\\u2013stellar mass (MBH\\u2013Mstar)\
    \ relation and black hole\\noccupation fraction across a large suite of simulated\\ngalaxy catalogs. Our approach involves\
    \ characterizing\\nthe scaling relation within distinct stellar mass bins for\\neach catalog, followed by a comprehensive\
    \ statistical and\\nmachine learning analysis to identify and quantify the\\ninfluence of underlying cosmological and\
    \ feedback pa-\\nrameters on the relation\\u2019s properties.\\n2.1. Simulated Galaxy Catalogs\\nWe utilize a collection\
    \ of 1,000 galaxy catalogs gen-\\nerated from a cosmological hydrodynamical simulation\\nframework (de Santi et al. 2025,?).\
    \ Each catalog rep-\\nresents the state of the universe at redshift z = 0 and\\nis characterized by a unique combination\
    \ of six global\\ninput parameters. These parameters govern the large-\\nscale structure formation and the key baryonic\
    \ physics\\nprocesses included in the simulation: the matter density\\nparameter \\u2126m, the amplitude of linear density\
    \ fluctua-\\ntions \\u03c38, and the e\\ufb00iciency parameters for two modes of\\nsupernova feedback (ASN1, ASN2) and\
    \ two modes of ac-\\ntive galactic nucleus feedback (AAGN1, AAGN2) (de Santi\\net al. 2025,?).\\n\\n3\\nThe parameter\
    \ space spanned by these six variables\\nis designed to broadly cover plausible ranges informed\\nby observations and\
    \ theoretical uncertainties, enabling\\na systematic exploration of their impact (de Santi et al.\\n2025,?). Each catalog\
    \ contains a large number of simu-\\nlated galaxies, totaling approximately 720,000 galaxies\\nacross the entire suite.\
    \ For each galaxy, key properties\\nsuch as stellar mass (Mstar) and the mass of its central\\nblack hole (MBH) are extracted\
    \ (de Santi et al. 2025,?).\\nOur analysis focuses exclusively on galaxies identified at\\nz = 0 (de Santi et al. 2025,?).\\\
    n2.2. Quantifying the MBH\\u2013Mstar Relation and\\nOccupation Fraction\\nTo characterize the MBH\\u2013Mstar relation\
    \ and the black\\nhole occupation fraction, we process each of the 1,000\\ncatalogs independently (Reines & Volonteri\
    \ 2015; Zhang\\net al. 2023; Sturm & Reines 2024). For this analysis, we\\npartition galaxies into three distinct stellar\
    \ mass bins to\\ninvestigate potential mass-dependent variations in the\\nrelation (Zhang et al. 2023; Sturm & Reines\
    \ 2024).\\n\\u2022 Low Stellar Mass: Galaxies with Mstar < 109 M\\u2299.\\n\\u2022 Intermediate Stellar Mass: Galaxies\
    \ with 109 \\u2264\\nMstar < 1010 M\\u2299.\\n\\u2022 High Stellar Mass:\\nGalaxies with Mstar\\n\\u2265\"\n  },\n  {\n\
    \    \"name\": \"M\\u2299\",\n    \"text\": \"For each catalog and within each stellar mass bin, we\\nperform the following\
    \ steps: (Mishra et al. 2023; Priva-\\ntus & Goswami 2025; Wang et al. 2025)\\n2.2.1. Fitting the MBH\\u2013Mstar Relation\\\
    nFor fitting the scaling relation, we consider only galax-\\nies that host a black hole with MBH > 0. We model\\nthe relation\
    \ as a linear trend in log-log space (Reines &\\nVolonteri 2015; Davis et al. 2019; Jin & Davis 2023):\\nlog10 MBH = \\\
    u03b1 + \\u03b2 log10 Mstar\\nwhere \\u03b2 is the slope and \\u03b1 is related to the normaliza-\\ntion.\\nTo mitigate\
    \ the potential influence of outlier galaxies\\non the fit, we employ robust linear regression. Specif-\\nically, we use\
    \ the Huber loss function, which is less\\nsensitive to extreme values compared to ordinary least\\nsquares (Herbel et\
    \ al. 2018; Sweet 2024; Ni et al. 2024a).\\nThis yields estimates for the slope (\\u03b2) and intercept\\n(\\u03b1) for\
    \ each catalog within each mass bin (Herbel et al.\\n2018).\\nThe intrinsic scatter (\\u03c3int) of the relation within\\\
    neach catalog and mass bin is estimated as the stan-\\ndard deviation of the residuals (log10 MBH,obs \\u2212(\\u03b1\
    \ +\\n\\u03b2 log10 Mstar,obs)) around the best-fit robust regression\\nline (Torbaniuk et al. 2023; Pacucci & Loeb 2024,?).\\\
    nA minimum sample size criterion is applied: a fit is\\nonly performed and recorded for a specific catalog and\\nmass\
    \ bin if there are at least 10 galaxies with MBH > 0\\nin that bin (Li et al. 2024). If this criterion is not met,\\nthe\
    \ fit parameters (\\u03b1, \\u03b2, \\u03c3int) are recorded as missing\\nvalues for that catalog-mass bin.\\n2.2.2. Black\
    \ Hole Occupation Fraction\\nThe black hole occupation fraction (focc) in each cata-\\nlog and mass bin is calculated\
    \ as the ratio of the number\\nof galaxies hosting a black hole (MBH > 0) to the to-\\ntal number of galaxies in that\
    \ bin (including those with\\nMBH = 0) (Gallo et al. 2019, 2023; Tremmel et al. 2024).\\nThis fraction provides a measure\
    \ of how common black\\nholes are as a function of stellar mass and the underlying\\nphysics parameters (Gallo et al.\
    \ 2019, 2023; Tremmel\\net al. 2024).\\n2.2.3. Uncertainty Estimation\\nTo quantify the uncertainty in the estimated \\\
    u03b1, \\u03b2, and\\n\\u03c3int values for each catalog and mass bin fit, we utilize\\nbootstrap resampling (Feigelson\
    \ & Babu 2004, 2012).\\nFor each fit, we generate 1,000 bootstrap samples by\\nrandomly sampling galaxies with replacement\
    \ from the\\noriginal set of galaxies used for the fit. Robust linear re-\\ngression is performed on each bootstrap sample,\
    \ yielding\\na distribution of parameter estimates.\\nWe then report the median of these bootstrap esti-\\nmates as the\
    \ best-fit value and use the 16th and 84th\\npercentiles of the distribution to define the 68% confi-\\ndence interval\
    \ as the uncertainty.\\n2.3. Mapping Relation Properties to Catalog\\nParameters\\nThe results from the per-catalog, per-mass-bin\
    \ anal-\\nysis (\\u03b1, \\u03b2, \\u03c3int, and focc for each of the 1,000 catalogs\\nand three mass bins) are aggregated\
    \ into a comprehen-\\nsive dataset (Li et al. 2024). This dataset is structured\\nsuch that each entry corresponds to\
    \ a specific catalog-\\nmass bin combination and includes the estimated rela-\\ntion properties alongside the six catalog-level\
    \ parame-\\nters (\\u2126m, \\u03c38, ASN1, ASN2, AAGN1, AAGN2) that define\\nthat catalog (Lin et al. 2025).\\nWe then\
    \ employ a suite of statistical and machine\\nlearning techniques to model the relationship between\\nthe derived MBH\\\
    u2013Mstar relation properties (slope, nor-\\nmalization, scatter, occupation fraction) and the six\\nglobal input parameters\
    \ (Winkel et al. 2024). This al-\\nlows us to identify which parameters are the dominant\\ndrivers of the observed diversity\
    \ and quantify their rel-\\n\\n4\\native importance and functional dependencies (Pacucci\\n& Loeb 2024). The primary techniques\
    \ used are:\\n2.3.1. Statistical Modeling\\nWe fit statistical models (e.g., linear regression, hier-\\narchical linear\
    \ models) for each outcome variable (\\u03b1, \\u03b2,\\n\\u03c3int, focc) within each mass bin, using the six catalog\
    \ pa-\\nrameters as predictors. Hierarchical linear modeling is\\nparticularly useful here as it can account for the nested\\\
    nstructure of the data (galaxies within catalogs) and al-\\nlow for varying relationships across catalogs or mass bins\\\
    nwhile partially pooling information (Berek et al. 2023).\\nWe also assess potential multicollinearity among the\\ninput\
    \ parameters using variance inflation factors (VIFs)\\nto understand potential issues in interpreting linear\\nmodel coe\\\
    ufb00icients, though the machine learning meth-\\nods provide a more robust assessment of overall param-\\neter importance\
    \ even in the presence of correlations.\\n2.3.2. Machine Learning Regression\\nTo capture potential non-linear relationships\
    \ and com-\\nplex interactions between the input parameters and the\\noutput relation properties, we train ensemble machine\\\
    nlearning models, specifically Random Forest and Gradi-\\nent Boosted Trees (e.g., using XGBoost or LightGBM)\\n(Kar et\
    \ al. 2024; Hesar et al. 2024). These models are\\ntrained independently for each outcome variable and\\nmass bin, using\
    \ the six catalog parameters as features.\\nThe high dimensionality and non-linearity of the param-\\neter space make\
    \ these methods well-suited for mapping\\nthe complex dependencies (Hesar et al. 2024; Dainotti\\net al. 2024).\\n2.3.3.\
    \ Feature Importance and Interpretation\\nTo understand which of the six input parameters\\nare most influential in shaping\
    \ the MBH\\u2013Mstar relation\\nproperties, we utilize feature importance metrics derived\\nfrom the trained machine\
    \ learning models (Narkedimilli\\net al. 2025,?; Sanchez et al. 2025).\\n\\u2022 Permutation\\nFeature\\nImportance:\\\
    nThis\\nmodel-agnostic technique measures the decrease\\nin model performance (e.g., mean squared error)\\nwhen the values\
    \ of a single feature are randomly\\nshuffled, effectively breaking the relationship be-\\ntween that feature and the\
    \ outcome. A larger de-\\ncrease indicates higher importance.\"\n  },\n  {\n    \"name\": \"\\u2022 SHAP\",\n    \"text\"\
    : \"(SHapley\\nAdditive\\nexPlanations)\\nValues: SHAP values provide a unified measure\\nof feature importance by assigning\
    \ to each feature\\nan importance value for a particular prediction.\\nThese values quantify how much each feature con-\\\
    ntributes to pushing the model output from the\\nbase value to the predicted value.\\nAggregating\\nSHAP values across\
    \ the dataset provides a global\\nmeasure of feature importance and allows for ex-\\nploring the direction and magnitude\
    \ of feature ef-\\nfects.\\nThese methods provide a robust ranking of the relative\\nimportance of \\u2126m, \\u03c38,\
    \ ASN1, ASN2, AAGN1, and AAGN2\\nin determining the slope, normalization, scatter, and\\noccupation fraction across different\
    \ stellar mass scales\\n(Hern\\u00e1ndez-Mart\\u00ednez et al. 2024).\\n2.3.4. Visualizing Parameter Dependencies\\nTo\
    \ visualize the functional form of the relationship\\nbetween key input parameters and the output rela-\\ntion properties,\
    \ we generate Partial Dependence Plots\\n(PDPs) (Heyl et al. 2023). PDPs show the marginal ef-\\nfect of one or two features\
    \ on the predicted outcome of\\na trained model, averaging over the effects of all other\\nfeatures (Heyl et al. 2023).\\\
    nThis allows us to see, for example, how the slope of\\nthe MBH\\u2013Mstar relation changes on average as AAGN1\\nincreases,\
    \ holding other parameters constant (in a prob-\\nabilistic sense via averaging). For exploring interactions\\nbetween\
    \ two parameters, we generate 2D heatmap ver-\\nsions of PDPs (Heyl et al. 2023).\\nBy combining robust fitting of the\
    \ scaling relation\\nand occupation fraction with advanced statistical and\\nmachine learning techniques for mapping dependencies,\\\
    nour methodology provides a powerful framework to sys-\\ntematically explore the drivers of diversity in the MBH\\u2013\\\
    nMstar relation across a vast parameter space, directly\\naddressing the complexity highlighted in the Introduc-\\ntion\
    \ (Pacucci & Loeb 2024; Winkel et al. 2024).\"\n  },\n  {\n    \"name\": \"RESULTS\",\n    \"text\": \"3.1. Overview and\
    \ methodological recap\\nOur analysis leverages a large suite of 1,000 cosmo-\\nlogical hydrodynamical simulations, yielding\
    \ 1,000 dis-\\ntinct galaxy catalogs at redshift z = 0.\\nThese cata-\\nlogs collectively contain approximately 720,000\
    \ galax-\\nies, each characterized by intrinsic properties such as\\nstellar mass (Mstar) and black hole mass (MBH). Cru-\\\
    ncially, each catalog is associated with a unique set of six\\nglobal input parameters: the matter density \\u2126m, the\\\
    namplitude of linear density fluctuations \\u03c38, and the e\\ufb00i-\\nciency parameters for two modes of supernova\
    \ feedback\\n(ASN1, ASN2) and two modes of active galactic nucleus\\nfeedback (AAGN1, AAGN2).\\nAs detailed in Section\
    \ 2,\\nour approach involved first quantifying the black hole\\u2013\\nstellar mass (MBH\\u2013Mstar) relation and black\
    \ hole occu-\\npation fraction within three distinct stellar mass bins\\nfor each of the 1,000 catalogs.\\nWe employed\
    \ robust\\n\\n5\\nlinear regression with Huber loss to fit the log-log re-\\nlation log10 MBH = \\u03b1 + \\u03b2 log10\
    \ Mstar for galaxies with\\nMBH > 0. The intrinsic scatter was measured from the\\nresiduals. The black hole occupation\
    \ fraction was calcu-\\nlated as the ratio of galaxies with MBH > 0 to the total\\nnumber of galaxies in each bin. Bootstrap\
    \ resampling\\nwas used to estimate uncertainties for the fitted parame-\\nters (\\u03b1, \\u03b2, scatter). Subsequently,\
    \ we applied a suite of\\nstatistical and machine learning techniques, including\\nhierarchical linear modeling, random\
    \ forest regression,\\ngradient boosting, permutation importance, SHAP val-\\nues, and partial dependence plots, to map\
    \ the derived\\nscaling relation properties and occupation fractions to\\nthe six global catalog parameters. This section\
    \ presents\\nthe key findings from this comprehensive analysis, de-\\ntailing the diversity of the MBH\\u2013Mstar relation\
    \ and its\\ndependencies on the underlying physical parameters.\\n3.2. Diversity in the MBH\\u2013Mstar scaling relation\\\
    nThe analysis of the 1,000 simulated catalogs reveals\\nsignificant diversity in the properties of the MBH\\u2013Mstar\\\
    nrelation and the black hole occupation fraction at z = 0.\\nThis diversity is strongly dependent on the stellar mass\\\
    nrange considered, as well as varying substantially from\\none simulation catalog to another due to the different\\ninput\
    \ parameters.\\n3.2.1. Distributions by stellar mass bin\\nThe properties of the MBH\\u2013Mstar relation and the\\nblack\
    \ hole occupation fraction show distinct character-\\nistics across the three stellar mass bins defined in Sec-\\ntion\
    \ 2.2: Low (Mstar < 109 M\\u2299), Intermediate (109 \\u2264\\nMstar < 1010 M\\u2299), and High (Mstar \\u22651010 M\\\
    u2299).\\nFigure 1 and Figure 2 show the distributions of the\\nfitted intercept \\u03b1 and slope \\u03b2, respectively,\
    \ across the\\nthree mass bins for the 1,000 catalogs.\\nThese figures\\nillustrate the significant variation in the scaling\
    \ rela-\\ntion parameters across different galaxy mass regimes\\nand simulation physics.\\nIn the Low Stellar Mass bin,\
    \ we find a broad dis-\\ntribution of fitted parameters across the 1,000 catalogs.\\nThe intercept \\u03b1 shows a wide\
    \ range, with a median value\\naround \\u22120.35, but extending significantly from approx-\\nimately \\u221215.25 to\
    \ +6.20. The slope \\u03b2 is generally shal-\\nlower than observed in more massive galaxies, with a\\nmedian of about\
    \ 0.76 and a mean of approximately 0.73.\\nThe standard deviation of the slope distribution is rel-\\natively large, around\
    \ 0.53, indicating substantial varia-\\ntion in the steepness of the relation at low masses across\\ndifferent feedback\
    \ and cosmological parameter combina-\\ntions. The intrinsic scatter in this bin is modest, with a\\nmedian of approximately\
    \ 0.27 dex and a standard devia-\\ntion of \\u223c0.15 dex. The black hole occupation fraction in\\nFigure 1. Distributions\
    \ of the intercept (\\u03b1) of the black\\nhole\\u2013stellar mass relation fitted to galaxies in 1,000 simu-\\nlated\
    \ catalogs. Histograms show the distribution of \\u03b1 val-\\nues for fits performed within three stellar mass bins:\
    \ Low\\n(Mstar < 109M\\u2299), Intermediate (109 \\u2264Mstar < 1010M\\u2299),\\nand High (Mstar \\u22651010M\\u2299).\
    \ Overlaid curves represent ker-\\nnel density estimates, and dashed red lines mark the mean\\nof each distribution.\\\
    nThe figure illustrates the significant\\nvariation in the normalization of the scaling relation across\\ndifferent galaxy\
    \ mass regimes, with the distribution shifting\\nto lower values and changing shape as stellar mass increases.\\nFigure\
    \ 2. Distributions of the fitted slope (\\u03b2) for the black\\nhole\\u2013stellar mass relation in three stellar mass\
    \ bins across\\n1,000 simulated catalogs.\\nEach histogram shows the fre-\\nquency of catalogs yielding a specific slope\
    \ value within that\\nmass bin.\\nThe mean slope for each bin is indicated by a\\ndashed red line. The distributions reveal\
    \ a systematic depen-\\ndence of the MBH\\u2013Mstar relation on stellar mass, with the\\nslope increasing significantly\
    \ from low to high mass galaxies.\\nlow-mass galaxies is notably lower than in higher mass\\nbins, averaging approximately\
    \ 0.84 across the catalogs.\\nOutlier analysis indicates a significant number of cata-\\nlogs ( 129 out of 1,000 reliable\
    \ fits) exhibiting \\u03b1 values\\nfar from the median, and similarly for \\u03b2 ( 131 outliers),\\nsuggesting that\
    \ the relation can be highly variable or\\npoorly defined in this mass regime depending on the\\nphysics inputs.\\nFor\
    \ the Intermediate Stellar Mass bin, the distri-\\nbutions of scaling relation parameters are considerably\\ntighter compared\
    \ to the low-mass bin. The median val-\\nues for both \\u03b1 and \\u03b2 are found to be closer to the typical\\nvalues\
    \ reported for the MBH\\u2013Mstar relation of observed\\nmassive galaxies. Notably, our outlier analysis detected\\nalmost\
    \ no significant outliers for \\u03b1 or \\u03b2 in this mass\\nrange across the entire suite of 1,000 catalogs, highlight-\\\
    ning a remarkable consistency in the scaling relation at\\nintermediate masses regardless of the specific parameter\\\
    nchoices within the explored range. The intrinsic scatter\\nin this bin is slightly higher than in the low-mass bin,\\\
    nwith a median of approximately 0.30 dex.\\nThe black\\n\\n6\\nhole occupation fraction rises to an average of around\\\
    n0.87.\\nIn the High Stellar Mass bin, the median slope\\nof the MBH\\u2013Mstar relation increases further, typically\\\
    nfound to be near 1.22. The intrinsic scatter is largest\\nin this bin, with a median of approximately 0.40 dex.\\nThese\
    \ trends of steepening slope and increasing scatter\\nwith mass are generally consistent with observational\\nfindings\
    \ for massive galaxies. The black hole occupation\\nfraction in this highest mass regime is very high, averag-\\ning close\
    \ to 0.96, with minimal catalog-to-catalog varia-\\ntion. This suggests that galaxies above 1010 M\\u2299almost\\nuniversally\
    \ host a central black hole in these simulations,\\nregardless of the specific parameter combination.\\nThese distributions\
    \ collectively illustrate a systematic\\ntransition with increasing stellar mass: the MBH\\u2013Mstar\\nrelation becomes\
    \ steeper and the black hole occupa-\\ntion fraction approaches unity. However, the significant\\nspread in parameters,\
    \ particularly in the low-mass bin,\\nunderscores the substantial diversity predicted by sim-\\nulations across different\
    \ physical parameter spaces.\\n3.2.2. Catalog-to-catalog diversity and fit reliability\\nOur analysis pipeline successfully\
    \ attempted fits for\\n2,991 out of the 3,000 possible catalog\\u2013mass bin combi-\\nnations (1,000 catalogs \\u00d7\
    \ 3 mass bins). Fits were only\\nconsidered reliable if the stellar mass bin in a given cat-\\nalog contained at least\
    \ 10 galaxies with MBH > 0, a cri-\\nterion met in the vast majority of cases. The bootstrap\\nresampling performed to\
    \ estimate uncertainties yielded\\nhigh success rates (approximately 100\\nThe outlier analysis, based on the interquartile\
    \ range\\n(IQR) of the parameter distributions across the 1,000\\ncatalogs, revealed greater diversity in the low- and\
    \ high-\\nmass bins compared to the intermediate-mass bin. As\\nnoted above, the low-mass bin shows a substantial num-\\\
    nber of outliers in both \\u03b1 and \\u03b2, indicating that certain\\nparameter combinations can lead to significantly\
    \ differ-\\nent scaling relations or even poorly constrained relations\\ndue to the nature of black hole seeding and early\
    \ growth\\nin shallow potential wells. The high-mass bin also ex-\\nhibits some outliers, though fewer than the low-mass\\\
    nbin. In stark contrast, the intermediate-mass bin showed\\nremarkable uniformity, with almost no outliers, suggest-\\\
    ning that the physical processes governing the MBH\\u2013Mstar\\nrelation in this mass range are less sensitive to the\
    \ spe-\\ncific feedback or cosmological parameter values within\\nthe explored range, or that the relation is more robustly\\\
    nestablished. This observed catalog-to-catalog variation\\nis a direct manifestation of the impact of varying in-\\nput\
    \ physics on the emergent galaxy properties and high-\\nFigure 3.\\nComparative MBH\\u2013Mstar relation across stel-\\\
    nlar mass bins for galaxies in catalogs with low (blue) and\\nhigh (red) values of the supernova feedback parameter ASN1.\\\
    nScatter points represent individual galaxies, and solid lines\\nshow the robust linear fits for each catalog and mass\
    \ bin.\\nThe strong dependence of the relation on ASN1 is most ev-\\nident in the low-mass bin, consistent with ASN1\\\
    u2019s dominant\\ninfluence in this regime, while its effect diminishes in inter-\\nmediate and high-mass galaxies.\\\
    nlights the potential range of MBH\\u2013Mstar relations possi-\\nble within plausible cosmological and feedback scenarios.\\\
    nFigure 3 provides a visual illustration of the diversity\\nin the MBH\\u2013Mstar relation across mass bins by compar-\\\
    ning two catalogs with extreme values of the ASN1 pa-\\nrameter. This figure demonstrates how varying a single\\nparameter,\
    \ ASN1, can significantly alter the fitted MBH\\u2013\\nMstar relation, particularly in the low-mass regime.\\n3.3. Dependence\
    \ on feedback and cosmological\\nparameters\\nA primary objective of this study is to quantify how\\nthe diversity observed\
    \ in the MBH\\u2013Mstar relation prop-\\nerties and occupation fraction is driven by variations in\\nthe six global catalog\
    \ parameters (\\u2126m, \\u03c38, ASN1, ASN2,\"\n  },\n  {\n    \"name\": \"AAGN1, AAGN2)\",\n    \"text\": \"Our analysis\
    \ using both hierarchi-\\ncal linear modeling and various machine learning tech-\\nniques, including permutation importance,\
    \ SHAP val-\\nues, and partial dependence plots, provides detailed in-\\nsights into these dependencies, which are strongly\
    \ mass-\\ndependent.\\n3.3.1. Feature importance in low-mass galaxies\\nFor galaxies in the low-mass bin (Mstar < 109\
    \ M\\u2299),\\nthe properties of the MBH\\u2013Mstar relation and the oc-\\ncupation fraction are primarily driven by\
    \ feedback pa-\\nrameters, particularly supernova feedback. Our machine\\nlearning models (Random Forest and Gradient\
    \ Boost-\\ning) achieve high R2 values (up to 0.97), indicating that\\nthe variation in the six input parameters explains\
    \ a large\\nfraction of the variance observed in \\u03b1, \\u03b2, scatter, and\\noccupation fraction across the 1,000\
    \ catalogs.\\nPermutation importance analysis consistently ranks\\nASN1 (related to SN wind energy per SFR) as the most\\\
    ninfluential parameter for predicting the slope \\u03b2, with\\nimportance values around 1.04 (normalized relative to\\\
    nother features). AAGN1 (related to AGN feedback en-\\n\\n7\\nFigure 4. SHAP feature importance for the intercept (\\\
    u03b1)\\nof the MBH\\u2013Mstar relation in low-mass galaxies (Mstar <\\n109M\\u2299). The bars show the average absolute\
    \ SHAP value\\nfor each catalog parameter, indicating its influence on \\u03b1.\\nThe supernova feedback parameter ASN1\
    \ and AGN feedback\\nparameter AAGN1 are the primary drivers of the variation in\\n\\u03b1 in this mass regime.\\nergy\
    \ per accretion) is the second most important param-\\neter, with substantial importance values around 0.70 for\\n\\u03b2.\
    \ SHAP summary plots for \\u03b1 and \\u03b2 in the low-mass\\nbin corroborate these findings, showing that ASN1 and\\\
    nAAGN1 have the largest average absolute SHAP values,\\nindicating their strong influence on the predicted val-\\nues\
    \ of the scaling relation parameters. Figure 4 shows\\nthe SHAP feature importance for the intercept \\u03b1 in this\\\
    nmass bin, clearly highlighting the dominance of ASN1\\nand AAGN1.\\nThe functional form of these dependencies can be\
    \ ex-\\nplored using partial dependence plots. Figure 5 shows\\nthe marginal effect of each parameter on the intercept\\\
    n\\u03b1.\\nIncreasing ASN1 and AAGN1 generally leads to a\\nlower normalization (\\u03b1). Similarly, partial dependence\\\
    nplots reveal that increasing ASN1 generally leads to a\\nshallower slope (\\u03b2).\\nThis is physically interpreted\
    \ as\\nstronger supernova feedback expelling gas from shal-\\nlow potential wells, suppressing both star formation and\\\
    nblack hole accretion, leading to lower black hole masses\\nat a given stellar mass and a less steep relation. Figure\
    \ 6\\nillustrates the joint impact of cosmological parameters\\n\\u2126m and \\u03c38 on the slope \\u03b2, showing a\
    \ comparatively\\nsmaller influence than feedback parameters.\\nCosmological parameters (\\u2126m, \\u03c38) have a compara-\\\
    ntively smaller, though non-negligible, influence on the\\nscaling relation parameters in this mass bin. \\u2126m shows\\\
    nsome importance (around 0.40 for \\u03b2) and has a moderate\\npositive effect on the black hole occupation fraction\
    \ in\\nthis regime, likely by influencing the overall availability\\nof baryonic matter.\\nThe intrinsic scatter in the\
    \ low-mass relation is also\\nsignificantly influenced by feedback.\\nPermutation im-\\nportance and SHAP values show\
    \ that ASN1 is a ma-\\nFigure 5. One-dimensional partial dependence plots show-\\ning the marginal effect of each global\
    \ catalog parameter on\\nthe intercept (\\u03b1) of the MBH\\u2013Mstar relation for low-mass\\ngalaxies (Mstar < 109M\\\
    u2299). The plots reveal that ASN1 and\\nAAGN1 are the primary drivers of variations in \\u03b1, with the\\nintercept\
    \ decreasing as these feedback parameters increase,\\nwhile other parameters show weaker dependencies.\\nFigure 6. 2D\
    \ partial dependence plot illustrating the joint\\ninfluence of cosmological parameters \\u2126m and \\u03c38 on the fitted\\\
    nslope (\\u03b2) of the MBH\\u2013Mstar relation for low-mass galaxies\\n(Mstar < 109M\\u2299).\\nThe contours show how\
    \ variations in\\nthese parameters modulate the slope.\\njor driver of the scatter, which is consistent with the\\nstochastic\
