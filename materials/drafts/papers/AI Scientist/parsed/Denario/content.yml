    n3.3\\nLiterature module\\nThe goal of the literature module is to search the literature to determine whether an idea,\
    \ in combination\\nwith the input text, is new or not. This module takes as input the input text together with the idea\\\
    n(usually in the form of the idea.md file). The module then searches the literature for papers similar to\\nthe proposed\
    \ idea and evaluates whether the project idea is new or not. The input text is taken into\\nconsideration when evaluating\
    \ the idea. We do this because in some research areas, standard techniques\\napplied to new datasets may be seen as novel\
    \ research. For instance, even if graph neural networks are\\nvery standard in deep learning, they may not have been applied\
    \ to cosmological datasets, and this may be\\nseen as novel in the cosmology research area. The module returns a file,\
    \ literature.md, that contains a\\nreport on whether the idea is new or not. Denario provides two different implementations\
    \ of this module:\\nFigure 5:\\nThis diagram shows the semantic scholar implementation of the literature module. The module\\\
    ntakes as input the input text and the idea. These files are then passed to a novelty agent whose task is\\nto determine\
    \ if the idea is new or not. This agent can output 1) idea new, 2) idea not new, or 3) query.\\nThe agent will choose\
    \ the later if it does not enough information to make a yes/no decision. In that case,\\nit will generate a query that\
    \ will be sent to the semantic scholar agent who will search the literature\\nwith it. This agent will then retrieve a\
    \ series of papers (including titles and abstracts) and will send\\nthis information back to the novelty agent. This process\
    \ is repeated several times until the relevant\\nliterature is well sampled. If no relevant papers are found after a number\
    \ of iterations, the novelty agent\\nwill conclude that the idea is new. Once the novelty agent has determined that the\
    \ idea is new/not\\nnew, all the papers found, the queries, and the responses will be sent to a summary agent that will\
    \ write\\na report stating why the idea is new (or not new) and the most relevant papers.\\n\\u2022 Semantic scholar.\
    \ In this implementation, carried out with LangGraph, we follow the workflow\\nintroduced in [5].\\nThe module consist\
