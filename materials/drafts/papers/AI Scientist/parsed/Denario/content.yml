    \ asteroid\\n\\u2022 asteroid family.csv: number + family name of the asteroid (The family name corresponds\\nto the largest\
    \ member of the family)\\n\\u2022 asteroid age.csv: number + age of the asteroid in gigayears (Gyr)\\nPlease come up with\
