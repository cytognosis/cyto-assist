    : \"A.13\",\n    \"text\": \"Quantum physics, deep learning and cosmology\\n258\\n\\nDraft version May 27, 2025\\nTypeset\
    \ using LATEX twocolumn style in AASTeX631\\nQITT-Enhanced Multi-Scale Substructure Analysis with Learned Topological\
    \ Embeddings for\\nCosmological Parameter Estimation from Dark Matter Halo Merger Trees\\nAstroPilot1\\n1Anthropic, Gemini\
    \ & OpenAI servers. Planet Earth.\"\n  },\n  {\n    \"name\": \"ABSTRACT\",\n    \"text\": \"Estimating cosmological parameters\
    \ from dark matter halo merger trees is a crucial task. We in-\\ntroduce a novel approach that leverages Quantum-Inspired\
    \ Tensor Trains (QITT) on multi-scale sub-\\nstructure features, incorporating learned topological embeddings, for enhanced\
    \ cosmological parameter\\nestimation. We identify substructures within merger trees from a dataset of 1000 trees based\
    \ on mass\\naccretion rates and significant changes in halo properties. For each substructure, we extract physical\\nfeatures\
    \ and learn a topological embedding using a Graph Neural Network (GNN). These features\\nare then organized into a tensor,\
    \ and QITT decomposition is applied to compress this information.\\nThe resulting QITT cores serve as input features to\
    \ regression models, including Linear Regression,\\nRandom Forest, and XGBoost. Our results demonstrate that QITT-based\
    \ models achieve competi-\\ntive performance, with QITT-XGBoost significantly outperforming models using flattened combined\\\
    nfeatures, highlighting the benefit of QITT decomposition for feature compression and representation.\\nHowever, a simple\
    \ baseline using global aggregate tree features achieves the best performance for\\nOmegam, suggesting that global properties\
    \ are highly informative for this parameter. The combination\\nof learned topological embeddings and QITT decomposition\
    \ offers a promising avenue for extracting\\ncomplex information from merger trees, with potential for advancing data-driven\
    \ cosmology.\\nKeywords: Stellar evolution, Cosmological parameters, Astronomical simulations, Solar system, Ob-\\nservational\
    \ astronomy\"\n  },\n  {\n    \"name\": \"INTRODUCTION\",\n    \"text\": \"Estimating cosmological parameters, such as\
    \ the mat-\\nter density of the Universe (\\u2126m) and the amplitude of\\nthe matter power spectrum (\\u03c38), is a\
    \ cornerstone of\\nmodern cosmology. These parameters dictate the for-\\nmation and evolution of large-scale structures,\
    \ including\\nthe ubiquitous dark matter halos. These halos, the grav-\\nitational homes of galaxies and galaxy clusters,\
    \ assem-\\nble hierarchically over cosmic time, leaving a detailed\\nrecord of their formation history encoded within\
    \ their\\nmerger trees. These merger trees, representing the an-\\ncestry of dark matter halos, offer a rich source of\
    \ infor-\\nmation about the underlying cosmology. Extracting this\\ncosmological information effectively from merger trees,\\\
    nhowever, remains a formidable challenge.\\nThe primary hurdle lies in the inherent complexity of\\ndark matter halo merger\
    \ trees. Their intricate branching\\npatterns, reflecting the hierarchical nature of structure\\nformation, make it difficult\
    \ to discern the most salient\\nfeatures relevant for cosmological parameter estimation\\n(Parkinson et al. 2007; Jiang\
    \ & van den Bosch 2013).\\nTraditional approaches often resort to using global prop-\\nerties of the trees, such as total\
    \ mass or average concen-\\ntration, or simple summary statistics of halo properties\\n(Jiang & van den Bosch 2013). While\
    \ computationally\\nefficient, these methods risk overlooking crucial informa-\\ntion encoded in the detailed substructure\
    \ and merger\\nhistory of individual halos (Benson et al. 2012; Jiang\\net al. 2025b).\\nIdentifying and characterizing\
    \ these substructures\\nacross multiple scales is not only computationally de-\\nmanding but also requires sophisticated\
    \ techniques ca-\\npable of navigating the high-dimensional parameter\\nspace (\\u00c1ngel Chandro-G\\u00f3mez et al.\
    \ 2025; Jiang et al.\\n2025b). Furthermore, capturing the complex topological\\nrelationships within these merger trees\
    \ is a non-trivial\\ntask, as these relationships can be both intricate and\\nhigh-dimensional, defying simple characterization\
    \ (\\u00c1n-\\ngel Chandro-G\\u00f3mez et al. 2025; Jiang et al. 2025b).\\nTo address these challenges, we introduce a\
    \ novel ap-\\nproach that leverages Quantum-Inspired Tensor Trains\\n(QITT) on multi-scale substructure features, incorpo-\\\
    nrating learned topological embeddings, for enhanced\\n\\n2\\ncosmological parameter estimation from dark matter\\nhalo\
    \ merger trees (Parkinson et al. 2007; Jiang &\\nvan den Bosch 2013). Our method begins by identify-\\ning significant\
    \ substructures within merger trees based\\non both mass accretion rates and significant changes in\\nhalo properties\
    \ such as concentration and maximum cir-\\ncular velocity (Jiang & van den Bosch 2013). For each\\nidentified substructure,\
    \ we extract physically motivated\\nfeatures, such as mass ratios and merger times, captur-\\ning key aspects of their\
    \ formation history (Parkinson\\net al. 2007; Jiang & van den Bosch 2013). Crucially, we\\nalso learn a topological embedding\
    \ for each substructure\\nusing a Graph Neural Network (GNN). This GNN, pre-\\ntrained on a large ensemble of graphs,\
    \ is designed to\\ncapture the essential topological characteristics of the\\nsubstructure, providing a low-dimensional\
    \ representa-\\ntion of its connectivity and overall structure (Jiang &\\nvan den Bosch 2013; Jiang et al. 2025b).\\nThese\
    \ physical features and topological embeddings\\nare then organized into a tensor, representing the collec-\\ntion of\
    \ substructures within each merger tree. We apply\\nQITT decomposition to compress this tensor, effectively\\nextracting\
    \ the most important information while simul-\\ntaneously reducing dimensionality. The resulting QITT\\ncores, encapsulating\
    \ the compressed representation of\\nsubstructure features and topology, serve as input fea-\\ntures to various regression\
    \ models, including Linear Re-\\ngression, Random Forest, and XGBoost, to predict cos-\\nmological parameters. By leveraging\
    \ the power of QITT\\nto compress and represent complex data, we aim to im-\\nprove the accuracy and efficiency of cosmological\
    \ param-\\neter estimation.\\nTo validate the effectiveness of our approach, we train\\nand evaluate our QITT-based models\
    \ on a dataset of\\n1000 merger trees extracted from cosmological simula-\\ntions (Tweed et al. 2009; Han et al. 2017;\
    \ Rangel et al.\\n2020). We compare their performance against several\\ncarefully chosen baselines, including models using\
    \ ag-\\ngregate graph-level features, raw substructure features\\nwithout topological information, and graphlet counts,\
    \ a\\nmeasure of basic topological structure. We assess the\\nperformance of each model using Root Mean Squared\\nError\
    \ (RMSE) and R-squared, and we perform statis-\\ntical tests to determine the significance of any perfor-\\nmance differences.\
    \ By demonstrating that our QITT-\\nbased models achieve competitive or superior perfor-\\nmance compared to these baselines,\
    \ we aim to establish\\nthe potential of our approach for advancing data-driven\\ncosmology and unlocking the wealth of\
    \ information en-\\ncoded within dark matter halo merger trees.\"\n  },\n  {\n    \"name\": \"METHODS\",\n    \"text\"\
    : \"This section details the methodology employed to\\ninvestigate the relationship between dark matter halo\\nmerger\
    \ trees and cosmological parameters (\\u2126m, \\u03c38) us-\\ning Quantum-Inspired Tensor Trains (QITT) enhanced\\nwith\
    \ learned topological embeddings. Our approach ad-\\ndresses the challenges of extracting cosmological infor-\\nmation\
    \ from the complex branching patterns of merger\\ntrees, as highlighted in the introduction, by focusing on\\nmulti-scale\
    \ substructure analysis and advanced feature\\nrepresentation techniques.\\n2.1. Data loading and preprocessing\\nThe\
    \ dataset consists of 1000 dark matter halo merger\\ntrees, each represented as a PyTorch Geometric \\u2018Data\\u2018\\\
    nobject.\\nThese trees were extracted from cosmological\\nsimulations (Parkinson et al. 2007; Han et al. 2017). The\\\
    ndataset was loaded using the following code:\\nimport torch\\nimport numpy as np\\nf_tree = '/mnt/home/fvillaescusa/public_www/Pablo_Bermej\\\
    ndataset = torch.load(f_tree, weights_only=False)\\n(Elahi et al. 2019; Nadler et al. 2023; Jung et al. 2024;\\nPorter\
    \ & Scaife 2023; Do et al. 2024)\\nPrior to model training, the data underwent several\\npreprocessing steps to ensure\
    \ optimal performance (Ichi-\\nnohe et al. 2018; Li et al. 2024; Tak et al. 2024).\\n2.1.1. Node feature normalization\\\
    nEach\\nnode\\nin\\nthe\\nmerger\\ntree\\nis\\ncharacterized\\nby four features:\\nlog10(mass), log10(concentration),\\\
    nlog10(Vmax), and the scale factor (Robles et al. 2019;\\nTang & Ting 2022). To mitigate the impact of differing\\nscales\
    \ and distributions, each feature was normalized to\\nhave a mean of 0 and a standard deviation of 1 (Tang\\n& Ting 2022).\
    \ The mean and standard deviation were\\ncomputed across all nodes in the entire training dataset\\nto ensure consistent\
    \ normalization (Tang & Ting 2022).\\nThe normalization was performed as follows:\\nxnormalized = x \\u2212\\u00b5x\\\
    n\\u03c3x\\nwhere x represents the original feature value, \\u00b5x is the\\nmean of the feature across all nodes in the\
    \ training set,\\nand \\u03c3x is the standard deviation of the feature across\\nall nodes in the training set.\\n2.1.2.\
    \ Target variable handling\\nThe target variables, \\u2126m and \\u03c38, represent the matter\\ndensity of the Universe\
    \ and the amplitude of the matter\\npower spectrum, respectively. These variables were used\\ndirectly for regression\
    \ without further transformation,\\nas their ranges are well-defined and physically meaning-\\nful (Thing & Koksbang 2024).\\\
    n\\n3\\n2.1.3. Data splitting\\nThe dataset was partitioned into training, validation,\\nand testing sets to facilitate\
    \ model training, hyperpa-\\nrameter tuning, and unbiased performance evaluation\\n(Zuo et al. 2024). A 70-15-15 split\
    \ was employed, re-\\nsulting in 700 trees for training, 150 trees for validation,\\nand 150 trees for testing. To prevent\
    \ data leakage due to\\npotential correlations between trees originating from the\\nsame cosmological simulation, all\
    \ 25 trees from a given\\nsimulation were kept within the same split (Buchner &\\nFotopoulou 2025).\\nThis ensured that\
    \ the model was\\nevaluated on unseen cosmological parameters. Given the\\n1000 trees come from 40 unique simulations,\
    \ we assigned\\n28 simulations for training (700 trees), 6 for validation\\n(150 trees), and 6 for testing (150 trees).\\\
    n2.2. Multi-scale substructure identification\\nA key aspect of our methodology is the identifica-\\ntion of significant\
    \ substructures within each merger tree\\n(Robles et al. 2019; \\u00c1ngel Chandro-G\\u00f3mez et al. 2025).\\nThis allows\
    \ us to capture the detailed formation history\\nof dark matter halos, addressing the limitations of tra-\\nditional approaches\
    \ that rely on global tree properties\\n(Robles et al. 2019; \\u00c1ngel Chandro-G\\u00f3mez et al. 2025).\\nA substructure\
    \ is defined as a branch of the merger tree\\noriginating from a merger event or a significant change in\\nhalo properties,\
    \ extending down to its leaf nodes (Robles\\net al. 2019; \\u00c1ngel Chandro-G\\u00f3mez et al. 2025; Gannon\\net al.\
    \ 2025).\\n2.2.1. Traversal\\nEach merger tree was traversed starting from the main\\nroot halo, defined as the halo at\
    \ the scale factor closest to\\n1 (Nadler et al. 2023; Jung et al. 2024; \\u00c1ngel Chandro-\\nG\\u00f3mez et al. 2025).\
    \ The \\u2018edge_index\\u2018 attribute of the\\nPyTorch Geometric \\u2018Data\\u2018 object defines the parent-\\nchild\
    \ relationships within the tree, enabling efficient\\ntraversal (Jespersen et al. 2022; Jung et al. 2024).\\n2.2.2. Identifying\
    \ merger events\\nMerger events were identified as halos with multi-\\nple direct progenitors (Pearson et al. 2024).\\\
    nThese\\nevents mark the confluence of multiple branches within\\nthe merger tree, indicating significant accretion events\\\
    n(Pearson et al. 2024).\\n2.2.3. Substructure definition\\nSubstructures were defined based on two criteria:\\nmass accretion\
    \ rates (Lucia et al. 2003; Soltis et al. 2024)\\nand significant changes in halo properties (Yencho et al.\\n2006; Soltis\
    \ et al. 2024).\\n\\u2022 Mass accretion rate: The mass accretion rate\\nfor each progenitor branch leading into a merger\\\
    nwas calculated as:\\nMass Accretion Rate = Mdescendant \\u2212Mprogenitor\\nSFdescendant \\u2212SFprogenitor\\nwhere\
    \ M\\nrepresents the mass and SF\\nrep-\\nresents\\nthe\\nscale\\nfactor\\n(Soltis\\n&\\nGarrison\\n2024).\\nWe\\nalso\\\
    nconsidered\\nthe\\nmass\\nratio\\nlog10(Mprogenitor/Mdescendant) (Soltis & Garrison\\n2024).\\n\\u2022 Significant\\\
    nchanges\\nin\\nhalo\\nproperties:\\nChanges in normalized log10(concentration) and\\nlog10(Vmax) were monitored along\
    \ each branch.\\nA significant change was defined as a deviation\\ngreater than a dynamically determined threshold.\\\
    n\\u2022 Adaptive\\nthresholds:\\nThresholds for iden-\\ntifying significant mass accretion or property\\nchanges\\nwere\\\
    ndetermined\\ndynamically\\nbased\\non the distribution of these quantities within\\neach\\ntree.\\nFor\\nexample,\\nmajor\\\
    nmergers\\nwere defined as those where the mass ratio\\n(Mprogenitor/Mless_massive_progenitor_at_merger) fell\\nwithin\
    \ the top X-percentile within each tree.\\n2.2.4. Substructure graph creation\\nEach identified substructure was represented\
    \ as a sep-\\narate PyTorch Geometric \\u2018Data\\u2018 object, inheriting node\\nfeatures and connectivity from the\
    \ original tree (Garuda\\net al. 2024). The root of the substructure graph was de-\\nfined as the halo immediately preceding\
    \ its merger into\\na more massive branch or the halo where a significant\\nproperty change was initiated (Garuda et al.\
    \ 2024; Ma\\net al. 2025).\\n2.3. Feature extraction for substructures\\nFor each identified substructure, we extracted\
    \ two\\ntypes of features: physical features (Lisanti et al. 2015;\\nRuiz-Lara et al. 2022) and learned topological embed-\\\
    ndings (Tsang et al. 2024). These features capture com-\\nplementary aspects of the substructure\\u2019s formation his-\\\
    ntory and internal structure.\\n2.3.1. Physical features\\nThe following physical features were extracted for each\\nsubstructure:\
    \ (Mondino et al. 2020; Ruiz-Lara et al.\\n2022; Tsang et al. 2024)\\n\\u2022 Mass ratio: For substructures originating\
    \ from\\nmergers, log10(Msubstructure_root/Mmain_branch_at_merger)\\nwas calculated.\\n\\n4\\n\\u2022 Merger scale factor:\
    \ The scale factor at which\\nthe substructure\\u2019s root halo merges into a larger\\nbranch was recorded.\\n\\u2022\
    \ Property differences: The difference in normal-\\nized log10(concentration) and log10(Vmax) between\\nthe substructure\\\
    u2019s root and its parent in the main\\nbranch at the time of merging was calculated.\\n\\u2022 Substructure intrinsic\
    \ properties: Aggregate\\nproperties of the substructure itself were com-\\nputed, including its total mass, average concen-\\\
    ntration of its halos, and the range of scale factors\\nit spans. The mean and standard deviation of the\\nnormalized\
    \ node features within the substructure\\nwere also calculated.\\nThese features were combined into a fixed-length fea-\\\
    nture vector (e.g., 5-10 dimensions) for each substructure\\n(Fagin et al. 2024; Ma et al. 2025).\\n2.3.2. Learned topological\
    \ embeddings\\nTo capture the topological characteristics of each sub-\\nstructure, we employed a Graph Neural Network\
    \ (GNN)\\nto generate learned topological embeddings (Roncoli\\net al. 2024; Zhu et al. 2024; Ma et al. 2025).\\n\\u2022\
    \ GNN architecture: A GraphSAGE model was\\nused for its inductive capabilities and efficiency in\\ngenerating node embeddings\
    \ by sampling and ag-\\ngregating features from a node\\u2019s local neighbor-\\nhood.\\nThe model consisted of 2-3 GraphSAGE\\\
    nlayers with ReLU activations and mean aggrega-\\ntion. The output dimension of the GNN for each\\nnode in the substructure\
    \ graph was set to 64.\\n\\u2022 GNN application: The GNN, pre-trained on a\\nlarge ensemble of graphs, was applied to\
    \ each sub-\\nstructure graph. The input features for the GNN\\nwere the same four normalized halo features used\\nfor\
    \ the node features in the merger trees.\\n\\u2022 Graph-level embedding: A graph-level embed-\\nding for each substructure\
    \ was obtained by ap-\\nplying a global mean pooling layer to the node\\nembeddings generated by the GNN. This resulted\\\
    nin a fixed-size vector (64 dimensions) representing\\nthe topology and properties of the substructure.\\n2.4. Tensor\
    \ construction\\nTo represent the collection of substructures within\\neach merger tree, a 3D tensor was constructed (Zhou\\\
    net al. 2025; Jiang et al. 2025a). This tensor captures\\nboth the physical features and topological embeddings\\nof each\
    \ substructure (Chittenden et al. 2025).\\n2.4.1. Feature concatenation\\nFor each substructure, its physical feature\
    \ vector and\\ntopological embedding vector were concatenated. If the\\nphysical feature vector had P dimensions and the\
    \ topo-\\nlogical embedding had T dimensions, each substructure\\nwas represented by a vector of P +T dimensions (K\\\
    u00fcgler\\net al. 2015; Horta et al. 2025).\\n2.4.2. Tensor dimensions\\nThe tensor for each tree had dimensions (Nsub,\
    \ Dfeat),\\nwhere Nsub is the number of substructures identified in\\nthat tree and Dfeat = P + T is the dimensionality\
    \ of\\nthe combined feature vector per substructure (Jermyn\\n2019).\\n2.4.3. Padding strategy\\nSince Nsub varies across\
    \ trees, a padding strategy was\\nemployed to ensure a consistent tensor shape for batch\\nprocessing and QITT input (Wu\
    \ & Jespersen 2023). The\\nmaximum number of substructures, max_Nsub, was de-\\ntermined across the training set based\
    \ on the 95th per-\\ncentile of substructure counts.\\nFor trees with fewer\\nthan max_Nsub substructures, padding was\
    \ applied us-\\ning a learned embedding from a \\u201dpadding graph.\\u201d This\\n\\u201dpadding graph\\u201d was a single\
    \ node with average feature\\nvalues, and its embedding was generated by the same\\npre-trained GNN (Jagvaral et al. 2022).\
    \ Zero vectors\\nwere used for its physical features. This combined vec-\\ntor was used for padding, ensuring that all\
    \ tensors had\\na shape of (max_Nsub, Dfeat).\\n2.5. Quantum-inspired tensor train (QITT)\\ndecomposition\\nThe TensorLy\
    \ library was used for QITT opera-\\ntions.\\nThe tensor for each tree,\\nXtree of shape\\n(max_Nsub, Dfeat), was treated\
    \ as a matrix. These ma-\\ntrices from all trees in the training set were combined\\ninto a batch, Xbatch of shape (Ntrees,\
    \ max_Nsub, Dfeat).\\nThe goal was to predict Ybatch of shape (Ntrees, 2) (for\\n\\u2126m, \\u03c38).\\nTo apply QITT,\
    \ we flattened the (max_Nsub, Dfeat)\\ntensor for each tree into a vector V\\nof size L\\n=\\nmax_Nsub\\u00d7Dfeat. This\
    \ vector was then reshaped into a\\nhigher-order tensor. For example, if L = 72\\u00d740 = 2880,\\nwe found factors n1\
    \ \\u00d7 n2 \\u00d7 ... \\u00d7 nd = L. Assuming Dfeat\\nitself is factorizable Dfeat = f1 \\u00d7 f2 \\u00d7 ... \\\
    u00d7 fk, the tensor\\nper tree became (max_Nsub, f1, ..., fk), a (k + 1)-order\\ntensor (Gorodetsky et al. 2025).\\nThe\\\
    nTT\\ndecomposition\\nwas\\napplied\\nto\\nthis\\n(max_Nsub, f1, ..., fk) tensor using tensorly.decomposition.tens\\n(Gorodetsky\
    \ et al. 2025):\\ncores = tensor_train(tensor, rank)\\n\\n5\\n(Gorodetsky et al. 2025)\\nThe rank parameter is crucial\
    \ and was a hyperpa-\\nrameter selected via cross-validation on the validation\\nset. Ranks can be mode-dependent (r0,\
    \ r1, ..., rd). We\\nstarted with a single scalar rank r, where r0 and rd must\\nbe 1.\\nThe resulting TT-cores were flattened\
    \ and concate-\\nnated to form a new feature vector for each tree:\\nfeature_vector = np.concatenate([core.flatten() for\
    \ core in cores])\\n2.6. Regression models\\nThe concatenated and flattened QITT cores served as\\ninput features to various\
    \ regression models to predict\\n\\u2126m and \\u03c38 (Villaescusa-Navarro et al. 2021; Balla et al.\\n2024; Makinen\
    \ et al. 2024).\\n2.6.1. Models\\nThe\\nfollowing\\nregression\\nmodels\\nwere\\nemployed:\\n(Stoppa et al. 2023; Jing\
    \ & Li 2024; Martin & Mort-\\nlock 2024; Narkedimilli et al. 2024; Martin & Mortlock\\n2024)\\n\\u2022 Linear Regression:\
    \ As a baseline to understand\\nlinear relationships.\\n\\u2022 Random Forest Regressor: To capture non-\\nlinear relationships\
    \ and feature importances.\\n\\u2022 Gradient Boosting Regressor (e.g.,\\nXG-\\nBoost): For high performance, capable\
    \ of han-\\ndling complex interactions.\\n2.6.2. Training and hyperparameter tuning\\nEach model was trained on the training\
    \ set (features\\nderived from QITT cores). Hyperparameters for each\\nmodel (e.g., number of trees, depth for Random\
    \ Forest;\\nlearning rate, n_estimators for Gradient Boosting; TT-\\nranks for QITT decomposition) were tuned using k-fold\\\
    ncross-validation (e.g., k=5) on the training set, optimiz-\\ning for Mean Squared Error (MSE) or R-squared on the\\nvalidation\
    \ folds (Buchner & Fotopoulou 2025). The fi-\\nnal QITT rank was selected based on the performance of\\nthe downstream\
    \ regression task on the main validation\\nset (Soo et al. 2023).\\n2.7. Comparison with baselines\\nThe performance of\
    \ the QITT-based models was com-\\npared against several baselines (Wynne & Schechter\\n2018; Schechter & Wynne 2019;\
    \ Witt et al. 2022).\\n2.7.1. Aggregate graph-level features\\n2.7.2. Raw substructure features (no QITT, no topology\\\
    nembedding)\\nOnly the physical features extracted from substruc-\\ntures were used.\\nFor each tree, these features were\\\
    nconcatenated up to max_Nsub (with padding for phys-\\nical features, e.g., zeros).\\nThis resulted in a vector\\nof size\
    \ max_Nsub \\u00d7 P. Regressors were then trained\\non these flattened raw physical substructure features\\n(Tsang et\
    \ al. 2024; Gannon et al. 2025).\\n2.7.3. Model using graphlet counts\\nFor each full merger tree, the frequency of small\
    \ graph\\nmotifs (graphlets) up to a certain size (e.g., 3 or 4 nodes)\\nwas computed (Robles et al. 2022). This provided\
    \ a ba-\\nsic topological signature. Regressors were then trained\\non these graphlet count vectors.\\n2.7.4. Model with\
    \ topology embedding but no QITT\\nThe concatenated physical features and GNN-derived\\ntopological embeddings for each\
    \ substructure were used\\n(Farsian et al. 2022; Wu & Jespersen 2023).\\nThis\\n(max_Nsub, Dfeat) tensor per tree was\
    \ flattened, and\\nregressors were trained directly on these flattened com-\\nprehensive substructure features (Garuda\
    \ et al. 2024).\\n2.8. Evaluation metrics and statistical significance\\nPerformance was primarily evaluated using Root\\\
    nMean Squared Error (RMSE) (Lue et al. 2025) and\\nR-squared (coefficient of determination) for both \\u03a9m\\nand \\\
    uffff8 on the held-out test set. Paired t-tests (or non-\\nparametric equivalents like the Wilcoxon signed-rank\\ntest\
    \ if normality assumptions were violated) were per-\\nformed on the prediction errors from different models on\\nthe test\
    \ set to assess whether performance differences\\nwere statistically significant, using a p-value threshold\\nof 0.05.\\\
    nThis comprehensive methodology allowed us to rig-\\norously evaluate the efficacy of using QITT-enhanced\\nmulti-scale\
    \ substructure features,\\nincluding learned\\ntopological embeddings, for cosmological parameter es-\\ntimation (Fluri\
    \ et al. 2021; Mediato-Diaz & Handley\\n2025).\"\n  },\n  {\n    \"name\": \"RESULTS\",\n    \"text\": \"This section\
    \ presents the results of applying the\\nQuantum-Inspired\\nTensor\\nTrain\"\n  },\n  {\n    \"name\": \"(QITT)\",\n \
    \   \"text\": \"enhanced\\nmulti-scale substructure analysis, incorporating learned\\ntopological embeddings, for cosmological\
    \ parameter es-\\ntimation from dark matter halo merger trees. We eval-\\nuate the performance of this approach against\
    \ several\\nbaseline methods and delve into the interpretation of\\nthe learned representations and QITT components.\\\
    n3.1. Data Processing, Substructure Characterization,\\nand Feature Engineering Summary\\n\\n6\\nThe\\ninitial\\ndataset\\\
    nconsisted\\nof\\n1000\\nmerger\\ntrees. Node features (log10(mass), log10(concentration),\\nlog10(Vmax), scale_factor)\
    \ were normalized based on the\\nstatistics derived from the training set (700 trees). For\\ninstance, the original mean\
    \ log10(mass) was 11.14 and\\nscale_factor was 0.37, which were transformed to have\\nzero mean and unit standard deviation\
    \ for subsequent\\nprocessing.\\nSubstructures were identified within each merger tree\\nby traversing from merger events\
    \ and applying an\\nadaptive threshold based on the 20th percentile of\\nlog10(Msub_progenitor/Mmain_progenitor) within\
    \ each tree.\\nThis resulted in an average of 47.45 substructures per\\ntree, with a median of 32 and a range from 2 to\
    \ 563\\nsubstructures. For each substructure, a 10-dimensional\\nphysical feature vector was extracted, capturing prop-\\\
    nerties such as mass ratios, merger scale factors, dif-\\nferences in normalized halo properties (concentration,\\nVmax)\
    \ between merging progenitors, and intrinsic prop-\\nerties of the substructure branch (e.g., mean normalized\\nconcentration/Vmax,\
    \ scale factor span, number of halos).\\nThe num_halos_in_branch feature, for example, had a\\nmean of 21.4 and a standard\
    \ deviation of 54.0 across all\\nidentified substructures.\\nA GraphSAGE-based autoencoder was trained on all\\nsubstructures\
    \ from the training set (33,759 substruc-\\ntures) in a self-supervised manner to reconstruct node\\nfeatures.\\nThe encoder\
    \ part, consisting of two SAGE-\\nConv layers (input 4 features \\u2192128 hidden \\u219264\\noutput), was then used to\
    \ generate a 64-dimensional\\ntopological embedding for each substructure graph via\\nglobal mean pooling of its node\
    \ embeddings. The GNN\\ntraining achieved a final average loss of approximately\\n0.00014 after 5 epochs.\\nFor each merger\
    \ tree, the physical features and the 64-\\ndimensional topological embedding for each of its sub-\\nstructures were concatenated,\
    \ forming a 74-dimensional\\nfeature vector per substructure (Dfeat_combined = 10 +\\n64).\\nThese\\nlists\\nof\\nsubstructure\\\
    nfeature\\nvectors\\nwere then padded or truncated to a fixed length of\\nMAX_N_SUB = 60 substructures per tree. Padding\\\
    nwas achieved using a canonical null substructure repre-\\nsentation (zero physical features and the GNN embed-\\nding\
    \ of a single null node). This resulted in a tensor of\\nshape (60, 74) for each merger tree.\\n3.2. QITT Decomposition\
    \ and Feature Generation\\nThe (60, 74) feature tensor for each tree was then\\nprepared for Quantum-Inspired Tensor Train\
    \ (QITT)\\ndecomposition using the TensorLy library (backend:\\nNumPy).\\nThe 74-dimensional feature space per sub-\\\
    nstructure (Dfeat_combined) was reshaped into two factors\\n(2, 37), resulting in a 3rd-order tensor of shape (60, 2,\\\
    n37) for each tree.\\nTensor Train (TT) decomposition was applied to this\\n3rd-order tensor. The TT-ranks were selected\
    \ via cross-\\nvalidation on the validation set (150 trees) by optimizing\\nthe sum of RMSEs for \\u2126m and \\u03c38\
    \ prediction using a\\nRidge regression model. The candidate internal ranks\\nr1 (connecting mode 0 of size 60 to mode\
    \ 1 of size 2)\\nand r2 (connecting mode 1 of size 2 to mode 2 of size\\n37) were swept through values [2, 4, 6, 8]. The\
    \ optimal\\nranks were found to be r1 = 2 and r2 = 2, yielding a full\\nTT-rank tuple of (1, 2, 2, 1). This rank configuration\\\
    nachieved the best sum RMSE of 0.0925 on the validation\\nset during rank search.\\nThe TT-cores resulting from this decomposition\
    \ were\\nflattened and concatenated to form a single feature vec-\\ntor for each merger tree. With the optimal ranks (1,\\\
    n2, 2, 1) and tensor dimensions (60, 2, 37), the re-\\nsulting QITT feature vector had a dimension of 202\\n(60\\u00d72+2\\\
    u00d72\\u00d72+2\\u00d737\\u00d71 = 120+8+74 = 202). This\\nQITT-derived feature vector served as the input for the\\\
    nfinal regression models.\\n3.3. Cosmological Parameter Estimation Performance\\nThe efficacy of the QITT-derived features\
    \ was eval-\\nuated by training Linear Regression, Random Forest,\\nand XGBoost models to predict \\u2126m and \\u03c38.\
    \ These were\\ncompared against four baseline feature sets:\\n\\u2022 B1_Aggregate: 11 global aggregate features per\\\
    ntree (e.g., total mass, mean normalized node fea-\\ntures).\\n\\u2022 B2_RawSubPhys: Flattened raw physical fea-\\ntures\
    \ from substructures (60 substructures * 10\\nphysical features/substructure = 600 features).\\n\\u2022 B3_GraphletCounts:\
    \ (Skipped due to imple-\\nmentation complexity in the automated pipeline).\\n\\u2022 B4_FlatCombined: Flattened combined\
    \ physi-\\ncal and topological features from substructures (60\\nsubstructures * 74 features/substructure = 4440\\nfeatures),\
    \ without QITT decomposition.\\nAll input features were standardized before train-\\ning. Hyperparameters for Random Forest\
    \ and XGBoost\\nmodels were tuned using 5-fold cross-validation on the\\ncombined training and validation sets (850 trees),\
    \ op-\\ntimizing a custom scorer based on the negative sum of\\nRMSEs for \\u2126m and \\u03c38. The test set performance\
    \ of all\\nmodels is summarized in Table 1.\\n3.3.1. Overall Model Comparison\\n\\n7\\nTable 1. Test Set Performance of\
    \ Regression Models for Cosmological Parameter Estimation\\nModel Configuration\\nRMSE \\u2126m\\nRMSE \\u03c38\\nR\\\
    u00b2 \\u2126m\\nR\\u00b2 \\u03c38\\nQITT_LinearRegression\\n0.0246\\n0.0658\\n0.9231\\n0.6206\\nQITT_RandomForest\\n0.0320\\\
    n0.0763\\n0.8696\\n0.4896\\nQITT_XGBoost\\n0.0303\\n0.0711\\n0.8834\\n0.5577\\nB1_Aggregate_LinearRegression\\n0.0155\\\
    n0.0654\\n0.9696\\n0.6257\\nB1_Aggregate_RandomForest\\n0.0404\\n0.0750\\n0.7924\\n0.5070\\nB1_Aggregate_XGBoost\\n0.0304\\\
    n0.0759\\n0.8822\\n0.4951\\nB2_RawSubPhys_LinearRegression\\n0.1711\\n0.1973\\n-2.7180\\n-2.4075\\nB2_RawSubPhys_RandomForest\\\
    n0.0648\\n0.0935\\n0.4672\\n0.2347\\nB2_RawSubPhys_XGBoost\\n0.0553\\n0.0891\\n0.6109\\n0.3042\\nB4_FlatCombined_LinearRegression\\\
    n0.0404\\n0.1486\\n0.7928\\n-0.9339\\nB4_FlatCombined_RandomForest\\n0.0452\\n0.0826\\n0.7401\\n0.4024\\nB4_FlatCombined_XGBoost\\\
    n0.0377\\n0.0817\\n0.8194\\n0.4159\\nA visual representation of the RMSE and R2 values\\nfor each model is given in Figure\
    \ 1 and Figure 2, respec-\\ntively. These figures complement Table 1 in illustrating\\nthe relative performance of each\
    \ model configuration.\\nFigure 1.\\nComparison of Root Mean Squared Error\\n(RMSE) across different regression models\
    \ for estimating \\u2126m\\nand \\u03c38. The models using QITT-derived features show com-\\npetitive performance, particularly\
    \ QITT_LinearRegression,\\nindicating that QITT decomposition provides a compact and\\neffective representation of substructure\
    \ data.\\n3.3.2. Performance of QITT-based Models\\nAmong the models using QITT-derived features,\\nQITT_LinearRegression\
    \ surprisingly shows the best\\nperformance for \\u2126m (RMSE 0.0246, R\\u00b2 0.9231) and com-\\npetitive performance\
    \ for \\u03c38 (RMSE 0.0658, R\\u00b2 0.6206).\\nThe\\nQITT_XGBoost\\nmodel\"\n  },\n  {\n    \"name\": \"(RMSE\",\n \
    \   \"text\": \"\\u2126m=0.0303,\"\n  },\n  {\n    \"name\": \"R\\u00b2=0.8834;\",\n    \"text\": \"\"\n  },\n  {\n  \
    \  \"name\": \"RMSE\",\n    \"text\": \"\\u03c38=0.0711,\"\n  },\n  {\n    \"name\": \"R\\u00b2=0.5577)\",\n    \"text\"\
    : \"and\\nQITT_RandomForest (RMSE \\u2126m=0.0320, R\\u00b2=0.8696;\\nRMSE \\u03c38=0.0763, R\\u00b2=0.4896) perform slightly\
    \ worse\\nthan the linear model on this particular feature set.\\nFigure 2. Comparison of the coefficient of determination\\\
    n(R2) for different regression models in predicting cosmolog-\\nical parameters \\u2126m and \\u03c38. The models using\
    \ raw physical\\nsubstructure features (B2) performed poorly, while QITT-\\nbased models achieved competitive performance,\
    \ demon-\\nstrating the effectiveness of the QITT decomposition for fea-\\nture extraction.\\nThis suggests that the QITT\
    \ transformation, with the\\nchosen ranks, might be effectively linearizing the rela-\\ntionship between the complex substructure\
    \ information\\nand the cosmological parameters, or that the 202 QITT\\nfeatures are already well-suited for linear separation.\\\
    n3.3.3. Comparison with Baselines\\n\\u2022 B1_Aggregate (Aggregate Features):\\nThe\\nB1_Aggregate_LinearRegression model\
    \ achieved\\nthe overall best performance for \\u2126m (RMSE\\n0.0155, R\\u00b2 0.9696) and very strong performance\\\
    nfor \\u03c38 (RMSE 0.0654, R\\u00b2 0.6257). This indicates\\nthat simple global properties of the merger trees\\nare\
    \ highly informative, especially for \\u2126m.\\nThe\\nQITT_LinearRegression model is competitive but\\ndoes not surpass\
    \ this simple baseline.\\n\\n8\\n\\u2022 B2_RawSubPhys (Raw Substructure Phys-\\nical Features): This baseline performed\
    \ poorly.\\nThe B2_RawSubPhys_LinearRegression model\\nyielded negative R\\u00b2 values, indicating it performed\\nworse\
    \ than a mean predictor.\\nWhile Random\\nForest and XGBoost improved upon this, their\\nR\\u00b2 values (e.g., XGBoost:\\\
    n\\u2126m R\\u00b2=0.6109, \\u03c38\\nR\\u00b2=0.3042) were substantially lower than those\\nachieved by QITT-based models\
    \ or B1/B4. This\\nhighlights the difficulty of directly using high-\\ndimensional, potentially noisy raw substructure\\\
    nfeatures without further processing like topolog-\\nical embedding or QITT.\\n\\u2022 B4_FlatCombined\\n(Flattened\\\
    nCombined\\nPhysical and Topological Features):\\nThis\\nbaseline\\nuses\\nthe\\nsame\\nper-substructure\\nin-\\nformation\\\
    nas\\nthe\\ninput\\nto\\nthe\"\n  },\n  {\n    \"name\": \"QITT\",\n    \"text\": \"pro-\\ncess\\n(physical\\nfeatures\\\
    n+\\nGNN\\ntopological\\nembeddings)\\nbut\\nsimply\\nflattens\\nthem\\ninto\\na\\nvery\\nhigh-dimensional\\nvector\\\
    n(4440\\nfea-\\ntures).\\nThe\\nB4_FlatCombined_XGBoost\\nmodel (RMSE \\u2126m=0.0377, R\\u00b2=0.8194; RMSE\\n\\u03c38=0.0817,\\\
    nR\\u00b2=0.4159) performed worse than\\nthe QITT_XGBoost model.\\nThis suggests that\\nthe QITT decomposition provides\
    \ a more ef-\\nfective and compact representation of the (60,\\n74) tensor than simple flattening, leading to bet-\\nter\
    \ generalization for the XGBoost model.\\nThe\\nB4_FlatCombined_LinearRegression model also\\nstruggled, especially with\
    \ \\u03c38 (R\\u00b2=-0.9339), likely\\ndue to the high dimensionality and multicollinear-\\nity.\\n3.3.4. Statistical\
    \ Significance\\nPaired t-tests were performed on the squared errors of\\nthe test set predictions to compare the QITT_XGBoost\\\
    nmodel (as a representative advanced QITT model)\\nagainst the XGBoost models from key baselines.\\n\\u2022 QITT_XGBoost\
    \ vs. B1_Aggregate_XGBoost:\\n\\u2013 \\u2126m: p-value = 0.9537. No significant differ-\\nence.\\n\\u2013 \\u03c38: p-value\
    \ = 0.1734. No significant differ-\\nence.\\nThis suggests that for XGBoost, the QITT fea-\\ntures do not offer a statistically\
    \ significant im-\\nprovement over simple aggregate features, which\\nare already very powerful.\\n\\u2022 QITT_XGBoost\
    \ vs. B2_RawSubPhys_XGBoost:\\n\\u2013 \\u2126m: p-value = 1.8866e-08. QITT_XGBoost\\nis significantly better.\\n\\u2013\
    \ \\u03c38: p-value = 2.8041e-05. QITT_XGBoost\\nis significantly better.\\nThis confirms that the feature engineering\
    \ pipeline\\n(including GNN embeddings and QITT) signifi-\\ncantly improves upon using raw physical substruc-\\nture features.\\\
    n\\u2022 QITT_XGBoost vs. B4_FlatCombined_XGBoost:\\n\\u2013 \\u2126m: p-value = 0.0104. QITT_XGBoost is\\nsignificantly\
    \ better.\\n\\u2013 \\u03c38: p-value = 0.0014. QITT_XGBoost is sig-\\nnificantly better.\\nThis is a crucial result,\
    \ indicating that the QITT\\ndecomposition provides a statistically significant\\nadvantage over simply using the flattened\
    \ high-\\ndimensional feature tensors that include topolog-\\nical information.\\nThe QITT method effectively\\ncompresses\
    \ and structures these features.\\n3.3.5. Predicted vs. True Values\\nThe scatter plots of predicted versus true values\
    \ for\\n\\u2126m and \\u03c38 using the QITT_XGBoost model are shown\\nin Figures 3 and 4, respectively. These plots provide\
    \ a\\nvisual assessment of the model\\u2019s predictive accuracy and\\npotential biases.\\nFor \\u2126m, the predictions\
    \ align closely with the y=x\\nline, reflecting the high R\\u00b2 value of 0.8834. The scatter\\nis noticeably larger\
    \ for \\u03c38, consistent with the lower R\\u00b2\\nof 0.5577, indicating greater difficulty in constraining\\nthis parameter\
    \ with the current feature set and models.\\nNo strong systematic biases are apparent in these plots,\\nthough the variance\
    \ in \\u03c38 predictions is higher.\\n3.4. Analysis of Learned Representations\\n3.4.1. Topological Embeddings\\nThe\
    \ GNN-derived topological embeddings aim to\\ncapture structural information from the substructure\\ngraphs.\\nA t-SNE\
    \ projection of 10,000 such 64-\\ndimensional embeddings, subsampled from the training\\nset substructures, is shown in\
    \ Figure 5. The points are\\ncolored by the number of halos in their respective sub-\\nstructure branches (log scale).\\\
    nThe t-SNE plot reveals some diffuse clustering. While\\ndistinct, well-separated clusters are not immediately ob-\\nvious,\
    \ there are regions with higher densities of points.\\nThe color gradient, representing the number of halos,\\nshows some\
    \ coherence across the t-SNE space, suggest-\\ning that substructures with similar sizes (in terms of\\n\\n9\\nFigure\
    \ 3. Scatter plot of the predicted \\u2126m values versus the\\ntrue values for the QITT_XGBoost model. The clustering\\\
    nof points around specific true values indicates the model\\u2019s\\nability to predict \\u2126m with some accuracy, though\
    \ the spread\\nsuggests a degree of uncertainty.\\nFigure 4. Scatter plot of predicted versus true values for \\u03c38\\\
    nusing the QITT_XGBoost model, showing a moderate cor-\\nrelation with a tendency for greater variance in predictions\\\
    ncompared to \\u2126m, as indicated by its lower R2 value.\\nFigure 5. t-SNE projection of topological embeddings for\\\
    nsubstructures, colored by the number of halos in the sub-\\nstructure branch (log scale). The plot shows that the GNN\\\
    nhas learned to encode information related to the size of the\\nsubstructures within its topological embeddings.\\nhalo\
    \ count) tend to be mapped to nearby regions in\\nthe embedding space. For example, regions with pre-\\ndominantly blue/purple\
    \ hues (fewer halos) can be dis-\\ntinguished from regions with yellow/green hues (more\\nhalos). This indicates that\
    \ the GNN has learned to en-\\ncode information related to the size and extent of the\\nsubstructures within its topological\
    \ embeddings, which\\nis a physically meaningful property. The range of halos\\nin the plotted substructures was from\
    \ 1 to 1178, with a\\nmedian of 10.\\n3.4.2. QITT Core Analysis\\nThe QITT decomposition transforms the (60, 2, 37)\\\
    ntensor for each tree into three cores with shapes deter-\\nmined by the optimal ranks (1, 2, 2, 1): Core 0: (1, 60,\\\
    n2), Core 1: (2, 2, 2), Core 2: (2, 37, 1). The distribution\\nof magnitudes of the elements within each of these three\\\
    ncores for an example tree tensor from the training set is\\nshown in Figure 6.\\n\\u2022 Core 0 (Shape: (1, 60, 2)):\
    \ The magnitudes\\nare relatively concentrated around zero, with a\\nrange from approximately -0.16 to 0.65. This core\\\
    ninterfaces the \\u2018max_N_sub\\u2018 dimension (60 sub-\\nstructures) with the first internal TT bond rank\\n(2).\\\
    n\\u2022 Core 1 (Shape: (2, 2, 2)): This small internal\\ncore also shows values mostly near zero but with\\nsome elements\
    \ approaching 1.0. Its values range\\nfrom approximately -0.03 to 1.0.\\n\\n10\\nFigure 6. Distribution of element magnitudes\
    \ within the\\nthree Tensor Train cores for an example merger tree, af-\\nter Quantum-Inspired Tensor Train (QITT) decomposition.\\\
    nThe element values of these cores are flattened and concate-\\nnated to form the QITT-derived features used for cosmolog-\\\
    nical parameter estimation.\\n\\u2022 Core 2 (Shape:\\n(2, 37, 1)):\\nThis core ex-\\nhibits the widest range of magnitudes,\
    \ from ap-\\nproximately -66.6 to 302.3. It connects the second\\ninternal TT bond rank (2) to the last dimension\\nof\
    \ the reshaped features (size 37). The presence of\\nlarge magnitude values suggests that certain com-\\nbinations of\
    \ features along this dimension, as me-\\ndiated by this core, are particularly significant.\\nThe distributions suggest\
    \ that the TT representation\\nis not excessively sparse for these low ranks, but Core 2\\nclearly carries elements with\
    \ larger leverage. The flat-\\ntened and concatenated elements of these cores form the\\n202 features used by the regression\
    \ models.\\nFeature importance plots for QITT_RandomForest\\n(Figure 7) and QITT_XGBoost (Figure 8) show the top\\n20\
    \ most important features out of the 202 QITT-derived\\nfeatures. For comparison, feature importances for the\\nB4_FlatCombined\
    \ models (Figures 9 and 10) are also\\nprovided, which operate on a much larger, uncompressed\\nfeature space. A direct\
    \ physical interpretation of indi-\\nvidual QITT features is challenging because each feature\\nis an element from one\
    \ of the TT-cores, representing a\\ncomplex, compressed interaction term. However, these\\nplots demonstrate that the\
    \ models rely on a subset of\\nthese compressed features. Future work could involve\\nattempting to deconstruct the high-importance\
    \ QITT\\nfeatures back to understand which original substructure\\nproperties or interactions they represent.\\n3.4.3.\
    \ Qualitative View of Substructures\\nA qualitative visualization of two example substruc-\\ntures extracted from the\
    \ first training tree is given in\\nFigure 11. Nodes are colored by their scale factor.\\nThe first example is a large\
    \ substructure with 200\\nnodes, spanning a scale factor range from approximately\\n0.13 to 0.71. The second is a much\
    \ smaller substruc-\\nture with 12 nodes, existing over a narrower scale factor\\nrange (0.34 to 0.45). These visualizations\
    \ illustrate the\\ndiversity in size and temporal extent of the substructures\\nthat are processed by the GNN to generate\
    \ topological\\nFigure 7. Top 20 most important features out of the 202\\nQITT-derived features for the Random Forest\
    \ model, show-\\ning that the model relies on a subset of the compressed QITT\\nfeatures to estimate cosmological parameters.\\\
    nFigure 8. Top 20 most important QITT-derived features for\\nthe QITT_XGBoost model, showing the reliance on a subset\\\
    nof the 202 compressed features for cosmological parameter\\nestimation.\\nFigure\\n9.\\nTop 20 most important features\
    \ for the\\nB4_FlatCombined_RandomForest model. The model uses\\nflattened physical and topological features from substruc-\\\
    ntures.\\n\\n11\\nFigure 10.\\nTop 20 most important flattened combined\\nfeatures (physical and topological) from substructures\
    \ used\\nby the B4_FlatCombined_XGBoost model to estimate cos-\\nmological parameters.\\nThis baseline uses the same per-\\\
    nsubstructure information as the input to the QITT process\\nbut simply flattens them into a very high-dimensional vector.\\\
    nFigure 11. Qualitative visualization of two example sub-\\nstructures from a merger tree, illustrating the diversity\
    \ in\\nsize and temporal extent (scale factor, colored nodes) of sub-\\nstructures processed by the GNN and contributing\
    \ to QITT\\nfeatures for cosmological parameter estimation.\\nembeddings and subsequently contribute to the QITT\\nfeatures.\\\
    n3.5. Discussion\\n3.5.1. Efficacy of the QITT-Enhanced Approach\\nThe primary goal was to assess if a QITT-enhanced\\\
    nmulti-scale substructure analysis, incorporating learned\\ntopological embeddings, could effectively estimate cos-\\\
    nmological parameters.\\nThe results present a nuanced\\npicture.\\nThe QITT-based models, particularly QITT_LinearRegression\\\
    nand QITT_XGBoost, demonstrated strong predictive\\npower, achieving R\\u00b2 values for \\u2126m up to 0.9231 and for\\\
    n\\u03c38 up to 0.6206 (see Table 1 and Figures 1, 2). Crucially,\\nthe QITT_XGBoost model significantly outperformed\\\
    nthe B4_FlatCombined_XGBoost model (which uses\\nthe same input information prior to QITT but in a flat-\\ntened, uncompressed\
    \ form) for both \\u2126m (p=0.0104) and\\n\\u03c38 (p=0.0014). This highlights the benefit of the QITT\\ndecomposition\
    \ in creating a more compact and effective\\nfeature representation from the high-dimensional per-\\nsubstructure data\
    \ (physical + topological features). The\\nQITT approach compresses 4440 features (60 substruc-\\ntures * 74 features/substructure)\
    \ down to 202 features\\nwhile improving, or at least maintaining, predictive\\nperformance for non-linear models.\\nHowever,\
    \ the very simple B1_Aggregate_LinearRegression\\nmodel, using only 11 global tree features, achieved the\\nhighest R\\\
    u00b2 for \\u2126m (0.9696) and was highly competitive\\nfor \\u03c38 (R\\u00b2 0.6257). This suggests that for the current\\\
    ndataset and feature engineering, global properties of the\\nmerger trees are extremely informative, especially for\\\
    n\\u2126m. While the QITT approach processes much richer,\\nfine-grained substructure information, it did not, in its\\\
    ncurrent implementation, surpass this simpler baseline in\\nterms of raw predictive accuracy on the test set. The\\nQITT_XGBoost\
    \ model was not statistically different\\nfrom the B1_Aggregate_XGBoost model.\\n3.5.2. Role of Topological Information\
    \ and Substructure\\nAnalysis\\nThe inclusion of GNN-derived topological embeddings\\nwas intended to capture complex\
    \ structural information\\nbeyond simple physical features of substructures. The\\nt-SNE visualization in Figure 5 indicated\
    \ that these em-\\nbeddings do capture aspects related to substructure size\\n(number of halos).\\nThe significant outperformance\
    \ of QITT_XGBoost\\nover\\nB2_RawSubPhys_XGBoost\\n(which\\nuses\\nonly\\nphysical substructure features, without topological\
    \ em-\\nbeddings or QITT on the combined set) strongly sug-\\ngests that the combination of topological embeddings\\nand\
    \ the subsequent QITT processing is beneficial. The\\nB2 baseline, relying on 600 raw physical features, strug-\\ngled\
    \ significantly, indicating that these features alone\\nare either too noisy or not sufficiently expressive without\\\
    nfurther abstraction or combination. The GNN embed-\\ndings provide this abstraction for the topological aspect.\\nThe\\\
    ncomparison\\nbetween\\nQITT_XGBoost\\nand\\nB4_FlatCombined_XGBoost (both use topological em-\\nbeddings) isolates the\
    \ effect of QITT. The superior per-\\nformance of QITT_XGBoost indicates that the tensor\\ndecomposition is a more effective\
    \ way to handle the\\n(max_N_sub, D_feat_combined) structure than sim-\\nple flattening, especially for subsequent non-linear\
    \ mod-\\nels.\\n3.5.3. Interpretation of Model Performance Differences\\nThe strong performance of B1_Aggregate_LinearRegression,\\\
    nespecially for \\u2126m, implies that \\u2126m imprints a strong,\\nrelatively simple signal on the global characteristics\
    \ of\\n\\n12\\nmerger trees (like total mass, average node properties, or\\ntree size). \\u03c38, which relates to the\
    \ amplitude of matter\\nfluctuations, might be expected to influence more subtle\\naspects of substructure and merger\
    \ histories, potentially\\nexplaining why it is generally harder to constrain (lower\\nR\\u00b2 values across most models).\\\
    nThe\\nQITT_LinearRegression\\nmodel\\u2019s\\nsurprising\\nstrength compared to QITT_RandomForest/XGBoost\\ncould imply\
    \ that the QITT features (with ranks\\n(1,2,2,1)) are already in a space where linear relation-\\nships to cosmological\
    \ parameters are dominant, or that\\nthe non-linear models were not able to exploit further\\nnon-linearities effectively\
    \ within this 202-dimensional\\nQITT feature space without more extensive tuning or\\ndifferent architectures.\\nThe LinAlgWarnings\
    \ during\\nRidge regression for rank cross-validation and some ill-\\nconditioning/singularity warnings during some model\\\
    nfits suggest potential multicollinearity or numerical sta-\\nbility issues with some feature sets/ranks, which might\\\
    naffect model training and interpretation.\\n3.5.4. Limitations\\n\\u2022 Interpretability of QITT Features:\\nWhile\\\
    nQITT provides effective compression, the resulting\\nfeatures are elements of TT-cores and lack direct\\nphysical interpretability.\
    \ Understanding precisely\\nwhich physical interactions are captured requires\\nfurther investigation. The distributions\
    \ of the TT-\\ncore element magnitudes for an example merger\\ntree are shown in Figure 6.\\n\\u2022 GNN Training: The\
    \ GNN was trained for a lim-\\nited number of epochs (5) for pipeline efficiency.\\nMore extensive training or different\
    \ self-supervised\\nobjectives might yield even more informative topo-\\nlogical embeddings.\\n\\u2022 Substructure Definition:\
    \ The definition of sub-\\nstructures and the choice of physical features,\\nwhile physically motivated, are not exhaustive.\\\
    nOther definitions or features might capture differ-\\nent aspects of merger tree evolution. An illustra-\\ntion of the\
    \ diversity in size and temporal extent of\\nsubstructures is shown in Figure 11.\\n\\u2022 Dataset Size: While 1000 trees\
    \ provide a good\\nstarting point, larger datasets could enable the\\ntraining of more complex models and potentially\\\
    nreveal more subtle relationships.\\n\\u2022 Computational Cost of Baselines: Baseline\\nB3 (Graphlet Counts) was skipped.\
    \ A full compar-\\nison would ideally include it. Some baselines in-\\nvolve very high-dimensional feature spaces, which\\\
    ncan be computationally intensive for certain model\\ntypes.\\n3.6. Summary of Results\\nIn summary, this work presents\
    \ a novel approach\\nfor cosmological parameter estimation using QITT-\\nenhanced multi-scale substructure analysis with\
    \ learned\\ntopological embeddings. The QITT decomposition ef-\\nfectively compresses high-dimensional substructure in-\\\
    nformation, leading to statistically significant improve-\\nments over models using flattened features. However,\\na simple\
    \ baseline using global aggregate tree features\\nachieves the best performance for \\u2126m, suggesting that\\nglobal\
    \ properties are highly informative for this param-\\neter. The QITT-based approach shows promise for cap-\\nturing more\
    \ subtle effects related to \\u03c38 and other cos-\\nmological parameters. Future work should focus on en-\\nhancing\
    \ the interpretability of QITT features, exploring\\nmore advanced GNNs, and applying this framework to\\nlarger datasets\
    \ and a wider range of cosmological and\\nastrophysical applications.\"\n  },\n  {\n    \"name\": \"CONCLUSIONS\",\n \
    \   \"text\": \"This paper addresses the challenge of extracting cos-\\nmological information from the complex structure\
    \ of\\ndark matter halo merger trees, specifically focusing on\\nestimating the matter density of the Universe (\\u2126m)\
    \ and\\nthe amplitude of the matter power spectrum (\\u03c38). The\\nproposed solution leverages Quantum-Inspired Tensor\\\
    nTrains (QITT) to compress multi-scale substructure fea-\\ntures, incorporating learned topological embeddings ob-\\ntained\
    \ through Graph Neural Networks (GNNs).\\nThe study utilized a dataset of 1000 dark matter halo\\nmerger trees extracted\
    \ from cosmological simulations.\\nSubstructures within these trees were identified based on\\nmass accretion rates and\
    \ changes in halo properties. For\\neach substructure, physical features were extracted, and\\na GNN was employed to generate\
    \ a topological embed-\\nding. These features were then organized into a tensor,\\nwhich was subsequently decomposed using\
    \ QITT. The\\nresulting QITT cores served as input features for several\\nregression models, including Linear Regression,\
    \ Random\\nForest, and XGBoost. The performance of these models\\nwas compared to baselines that used aggregate graph-\\\
    nlevel features, raw substructure features, and flattened\\ncombined features.\\nThe results demonstrated that QITT-based\
    \ models\\nachieved competitive performance in estimating cosmo-\\nlogical parameters. Notably, the QITT-XGBoost model\\\
    nsignificantly outperformed the baseline model that used\\nflattened combined features, highlighting the effective-\\\
    nness of QITT decomposition for feature compression and\\n\\n13\\nrepresentation.\\nHowever, a simple Linear Regression\\\
    nmodel using global aggregate tree features achieved the\\nbest performance for \\u2126m, suggesting that global proper-\\\
    nties are highly informative for this parameter. Statistical\\nsignificance tests confirmed that the QITT-enhanced ap-\\\
    nproach significantly improved upon using raw physical\\nsubstructure features and provided a more effective rep-\\nresentation\
    \ compared to simply flattening the combined\\nphysical and topological features.\\nFrom the results, we learned that\
    \ QITT decomposi-\\ntion offers a promising avenue for extracting complex in-\\nformation from merger trees, with potential\
    \ for advanc-\\ning data-driven cosmology. The combination of learned\\ntopological embeddings and QITT decomposition\
    \ en-\\nables the capture of intricate relationships within the\\nmerger trees, leading to improved performance in cos-\\\
    nmological parameter estimation compared to methods\\nthat rely on raw substructure features or flattened rep-\\nresentations.\
    \ However, the study also highlighted the\\nimportance of global tree properties, particularly for es-\\ntimating \\u2126m,\
    \ and suggested that future research should\\nfocus on further enhancing the interpretability of QITT\\nfeatures and exploring\
    \ more advanced GNN architec-\\ntures to capture even more nuanced information from\\nmerger trees.\"\n  },\n  {\n   \
