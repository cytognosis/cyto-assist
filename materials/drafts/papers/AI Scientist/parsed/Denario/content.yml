    n18https://denario.readthedocs.io\\n19https://denario.readthedocs.io\\n21\\n\\n4.2\\nGraphical User Interface\\n4.2.1\\\
    nLaunch locally\\nDenario also provides a Graphical User Interface (GUI) to facilitate its usage, which is shown in Fig.\\\
    n9. It can be installed from pypi with the extension pip install denario[app]. The GUI can be then\\nlaunched running\
    \ denario run, which will open a tab in the browser with the application. Its repository\\nis also publicly available\
