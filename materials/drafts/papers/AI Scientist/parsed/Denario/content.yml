    \ detection.\\nhttps://arxiv.org/abs/2412.21130\\nZhou, Y., Aryal, S., & Bouadjenek, M. R. 2024, Review for\\nHandling\
    \ Missing Data with special missing mechanism.\\nhttps://arxiv.org/abs/2404.04905\\n\\nA.3\\nMedicine and Health Services\
    \ Research\\n103\\n\\nDraft version June 16, 2025\\nTypeset using LATEX twocolumn style in AASTeX631\\nCharacterizing\
    \ the Variability and Correlates of U.S. ART Clinic Performance During the COVID-19\\nPandemic (2020-2022)\\nDenario1\\\
    n1Anthropic, Gemini & OpenAI servers. Planet Earth.\"\n  },\n  {\n    \"name\": \"ABSTRACT\",\n    \"text\": \"Understanding\
    \ the variability in Assisted Reproductive Technology (ART) clinic performance is\\ncrucial for patients and practitioners,\
    \ particularly during periods of potential disruption such as the\\nCOVID-19 pandemic (2020-2022). This study aimed to\
    \ characterize the year-to-year variability in key\\nU.S. ART clinic success and e\\ufb00iciency metrics between 2020\
    \ and 2022 and identify associated clinic-level\\nfactors. Utilizing clinic-level data from the National ART Surveillance\
    \ System (NASS) for these years,\\nwe analyzed variability in metrics including live birth rates per retrieval and average\
    \ retrievals/transfers\\nper live birth, stratified by patient age group and egg source (own vs. donor). Variability was\
    \ quantified\\nusing the Coe\\ufb00icient of Variation and Standard Deviation for each clinic across the three-year period.\\\
    nAssociations between this variability and clinic volume (average cycle count) and geographic location\\n(state) were\
    \ explored using Spearman correlations and Ordinary Least Squares regression models.\\nWhile limitations precluded analysis\
    \ of live birth per transfer and a significant anomaly was noted in\\n2022 donor egg reporting, analysis of available\
    \ metrics revealed substantial year-to-year variability in\\nclinic performance and e\\ufb00iciency. Counterintuitively,\
    \ higher clinic volume was consistently associated\\nwith higher relative and absolute variability in own-egg and donor-egg\
    \ success rates, while showing\\nnegative associations with variability in some e\\ufb00iciency metrics. Geographic location\
    \ demonstrated\\nsome state-specific associations with variability, but these were not uniform across all metrics or patient\\\
    ngroups, and overall, clinic volume and state explained only a modest portion of the observed variability.\\nThese findings\
    \ highlight complex dynamics in ART clinic performance variability during the pandemic\\nera, suggesting that higher volume\
    \ clinics may experience larger fluctuations in success rates, and\\nunderscore the importance of considering clinic characteristics\
    \ and data reporting challenges in national\\nART surveillance.\\nKeywords: Computational methods, Multivariate analysis,\
    \ F test, Linear regression, Regression\"\n  },\n  {\n    \"name\": \"INTRODUCTION\",\n    \"text\": \"Assisted Reproductive\
    \ Technology (ART) represents a\\ncritical advancement in addressing infertility, providing\\npathways to parenthood for\
    \ millions globally. The suc-\\ncess and e\\ufb00iciency of ART procedures, commonly quan-\\ntified by metrics such as\
    \ live birth rates per cycle and\\nthe average number of treatment cycles required for a\\nsuccessful outcome, are paramount\
    \ concerns for both\\npatients and healthcare providers. However, it is widely\\nacknowledged that performance can exhibit\
    \ considerable\\nvariation among different ART clinics.\\nComprehend-\\ning the nature, magnitude, and underlying factors\
    \ con-\\ntributing to this inter-clinic variability is essential for\\nempowering patients to make informed decisions,\
    \ guid-\\ning quality improvement initiatives within clinics, and\\nfacilitating effective public health surveillance\
    \ of ART\\noutcomes.Characterizing ART clinic performance vari-\\nability is inherently challenging due to its multifacto-\\\
    nrial nature. Success rates are influenced by a complex\\ninterplay of patient-specific attributes (e.g., age, diag-\\\
    nnosis), clinic-specific factors (e.g., experience, protocols,\\nlaboratory practices, volume of cycles performed), and\\\
    nexternal environmental conditions. Analyzing these in-\\nfluences requires access to comprehensive, standardized\\ndata\
    \ collected consistently across a large number of clin-\\nics over extended periods.\\nFurthermore, healthcare systems,\
    \ including elective\\nmedical services like ART, are susceptible to disrup-\\ntions from external shocks. The period\
    \ between 2020\\nand 2022 was profoundly marked by the global COVID-\\n19 pandemic, which imposed unprecedented challenges\\\
    nsuch as temporary clinic closures, supply chain interrup-\\ntions, shifts in patient behavior, and the necessity for\\\
    n\\n2\\nrapid adaptation of clinical workflows and safety proto-\\ncols (Irons & Raftery 2024; Oveson et al. 2025). These\\\
    ndisruptions could plausibly impact clinic operations and\\nperformance metrics, potentially altering or exacerbat-\\\
    ning existing patterns of variability.\\nInvestigating ART clinic performance specifically dur-\\ning this turbulent period\
    \ offers a unique opportunity to\\nassess the dynamics of variability under stress and iden-\\ntify clinic-level characteristics\
    \ associated with greater re-\\nsilience or vulnerability to such external pressures (Har-\\nris et al. 2024).\\nDespite\
    \ the recognized importance of variability, few\\nstudies have systematically characterized the year-to-\\nyear fluctuations\
    \ in ART clinic performance, particu-\\nlarly in the context of a major systemic shock like the\\nCOVID-19 pandemic (Parker\
    \ et al. 2024). The specific\\nways in which pandemic-related disruptions might have\\naffected different performance\
    \ metrics (success vs. e\\ufb00i-\\nciency) and different patient groups (e.g., those using\\nown eggs vs.\\ndonor eggs,\
    \ different age groups), and\\nwhether certain clinic characteristics influenced the de-\\ngree of this variability, remain\
    \ underexplored (Caldera\\net al. 2024).\\nThis study aims to bridge this gap by systematically\\ncharacterizing the year-to-year\
    \ variability in key U.S.\\nART clinic success and e\\ufb00iciency metrics during the\\nCOVID-19 pandemic years (2020,\
    \ 2021, and 2022).\\nWe attempt to address this problem by leveraging\\nclinic-level data from the National ART Surveillance\\\
    nSystem (NASS) for the specified period (Bandara et al.\\n2020). We analyze fluctuations in key performance in-\\ndicators,\
    \ including success rates such as the percent-\\nage of cycles resulting in a live birth per retrieval, and\\ne\\ufb00iciency\
    \ metrics such as the average number of re-\\ntrievals or transfers required per live birth. We examine\\nthis variability\
    \ at the clinic level, stratifying our analy-\\nsis to account for important patient subgroups, specif-\\nically differentiating\
    \ between cycles utilizing patients\\u2019\\nown eggs versus donor eggs, and further stratifying own-\\negg cycles by\
    \ patient age group.\\nTo quantify the year-to-year variability for each clinic\\nwithin these specific patient strata\
    \ across the three-\\nyear period, we calculate standard statistical measures:\\nthe Coe\\ufb00icient of Variation (CV)\
    \ and the Standard De-\\nviation (SD). Beyond merely describing the extent of\\nthis variability, we investigate whether\
    \ readily available\\nclinic-level factors are associated with the degree of per-\\nformance fluctuation observed during\
    \ this pandemic era.\\nSpecifically, we explore the relationships between the\\ncalculated variability measures and clinic\
    \ volume, mea-\\nsured by the average cycle count over the 2020-2022 pe-\\nriod for the relevant stratum, and geographic\
    \ location,\\nindicated by the state in which the clinic is located.\\nThrough\\nthis\\nsystematic\\napproach,\\nutilizing\\\
    nro-\\nbust data and statistical methods to quantify clinic-\\nspecific, stratum-specific year-to-year variability (Ogan-\\\
    nisian et al. 2024) and analyze its correlates, this study\\nseeks to provide novel insights into the complex dynam-\\\
    nics of ART clinic performance during a period of signif-\\nicant external disruption (Montoya et al. 2025).\\nBy characterizing\
    \ these patterns and identifying\\nclinic-level factors associated with variability (Oganisian\\net al. 2024), we aim\
    \ to contribute to a better understand-\\ning of how ART clinics navigated the challenges of the\\npandemic and inform\
    \ future efforts in ART surveillance,\\nquality assessment, and potentially clinic management\\nstrategies to mitigate\
    \ performance fluctuations (?).\"\n  },\n  {\n    \"name\": \"METHODS\",\n    \"text\": \"2.1. Data Source and Study Population\\\
    nThis study utilized publicly available, clinic-level ag-\\ngregate data from the National ART Surveillance Sys-\\ntem\
    \ (NASS), maintained by the Centers for Disease\\nControl and Prevention (CDC). NASS collects data on\\nnearly all ART\
    \ cycles performed in the United States.\\nFor the purpose of characterizing performance variabil-\\nity during the COVID-19\
    \ pandemic, we focused on data\\nreported for the years 2020, 2021, and 2022. The dataset\\nrepresents clinic-level aggregated\
    \ outcomes stratified by\\nvarious factors, including patient age group and egg\\nsource, rather than individual patient\
    \ data.\\nThe ini-\\ntial dataset was loaded from a comma-separated values\\n(CSV) file (\\u2018art_data_2020_2024.csv\\\
    u2018) and filtered to\\ninclude only records pertaining to reporting years 2020,\\n2021, and 2022.\\n2.2. Outcome Measures\
    \ and Clinic Characteristics\\nThe primary outcome measures were key ART clinic\\nperformance and e\\ufb00iciency metrics\
    \ reported in NASS.\\nThese metrics were identified within the dataset by com-\\nbining information from columns such\
    \ as \\u2018Topic\\u2018, \\u2018Ques-\\ntion\\u2018, \\u2018Type\\u2018, \\u2018Filter\\u2018, \\u2018Breakout_Category\\\
    u2018, and \\u2018Break-\\nout\\u2018 (Abbasian et al. 2024; Chen et al. 2025). The spe-\\ncific metrics analyzed were:\\\
    n\\u2022 Percentage of live births per intended retrieval (%\\nLive Birth per Intended Retrieval)\\n\\u2022 Percentage\
    \ of live births per transfer (% Live Birth\\nper Transfer)\\n\\u2022 Percentage of live births per actual retrieval (%\\\
    nLive Birth per Actual Retrieval)\\n\\n3\\n\\u2022 Average number of transfers per intended retrieval\\n(Avg Transfers\
    \ per Intended Retrieval)\\n\\u2022 Average number of intended retrievals per live\\nbirth (Avg Intended Retrievals per\
    \ Live-Birth)\\nThese\\nmetrics\\nwere\\nextracted\\nfrom\\nthe\\n\\u2018Data_Value_num\\u2018 column.To account for important\\\
    npatient subgroups known to influence ART outcomes\\n(Silver et al. 2020), analyses were stratified by egg source\\nand\
    \ patient age.\\nEgg source was differentiated based\\non \\u2018Topic\\u2018 or \\u2018Type\\u2018 values indicating\
    \ \\u201dpatients using\\ntheir own eggs\\u201d or \\u201dpatients using donor eggs,\\u201d creat-\\ning an \\u2018EggSource\\\
    u2018 variable (\\u2019Own\\u2019 or \\u2019Donor\\u2019).\\nFor\\ncycles using own eggs, patient age groups (<35, 35-37,\\\
    n38-40, >40) were identified from the \\u2018Breakout\\u2018 column\\nwhere \\u2018Breakout_Category\\u2018 was \\u2019Age\
    \ group of patient\\u2019,\\nstandardizing age group labels. For donor egg cycles,\\na general \\u2019All Ages Donor\\\
    u2019 stratum was used.Clinic-\\nlevel characteristics explored as potential correlates of\\nvariability were clinic volume\
    \ and geographic location.\\nClinic volume for a given stratum (clinic, egg source,\\nage group) in a given year was represented\
    \ by the\\n\\u2018Cycle_Count\\u2018 reported for that specific stratum and\\nyear.\\nGeographic location was indicated\
    \ by the state\\nin which the clinic was located, using the \\u2018Location-\\nAbbr\\u2018 column (Dai et al. 2025). Each\
    \ unique clinic was\\nidentified by its \\u2018ClinicId\\u2018.\\n2.3. Data Processing and Structuring\\nThe raw NASS\
    \ data was in a long format, with\\nmultiple rows per clinic-year combination, each corre-\\nsponding to a specific metric\
    \ or stratum.\\nTo enable\\nclinic-level analysis of metrics over the three-year pe-\\nriod (2020-2022), the data was\
    \ restructured into a wide\\nformat.\\nThis involved pivoting the data such that\\neach row represented a unique clinic-stratum\
    \ combina-\\ntion (\\u2018ClinicId\\u2018, \\u2018EggSource\\u2018, \\u2018AgeGroup\\u2018), and columns\\ncontained the\
    \ values for each of the selected per-\\nformance and e\\ufb00iciency metrics (\\u2018Data_Value_num\\u2018),\\n\\u2018Cycle_Count\\\
    u2018, and \\u2018LocationAbbr\\u2018 for each of the\\nthree years (2020, 2021, 2022).\\nSpecifically, for each\\ncombination\
    \ of \\u2018ClinicId\\u2018, \\u2018Year\\u2018, \\u2018EggSource\\u2018, \\u2018Age-\\nGroup\\u2018, and \\u2018LocationAbbr\\\
    u2018, relevant metric values\\nand the corresponding \\u2018Cycle_Count\\u2018 were extracted.\\nA \\u2018pivot_table\\\
    u2018 operation was used with \\u2018[\\u2019ClinicId\\u2019,\\n\\u2019Year\\u2019, \\u2019EggSource\\u2019, \\u2019AgeGroup\\\
    u2019, \\u2019LocationAbbr\\u2019]\\u2018 as the\\nindex and metric identifiers (derived from descriptive\\ncolumns) as\
    \ columns, populated by \\u2018Data_Value_num\\u2018\\nand \\u2018Cycle_Count\\u2018.Data cleaning involved converting\\\
    nmetric values to a consistent numeric format (float),\\nensuring percentages were represented uniformly (0-100\\nscale)\
    \ (Goyle et al. 2023; Bendinelli et al. 2025). Miss-\\ning values (\\u2018NaN\\u2018) in metric columns were retained\
    \ as\\nsuch, as they indicate years where a clinic did not report\\ndata for a specific metric within a given stratum\
    \ (Lee\\net al. 2021; Goyle et al. 2023). No imputation of missing\\nmetric values was performed.\\n2.4. Quantification\
    \ of Year-to-Year Variability\\nYear-to-year variability in each performance and e\\ufb00i-\\nciency metric was quantified\
    \ for each clinic within each\\ndefined stratum (\\u2018EggSource\\u2018, \\u2018AgeGroup\\u2018) (Tran et al.\\n2022;\
    \ Jones et al. 2025).\\nTo calculate variability, a\\nclinic-stratum had to have reported data for the specific\\nmetric\
    \ in at least two of the three years (2020, 2021,\\n2022) (Guan et al. 2022; Bedi et al. 2025). Clinics or\\nstrata with\
    \ data for fewer than two years for a given\\nmetric were excluded from the variability calculation for\\nthat metric\
    \ (Bedi et al. 2025).For each eligible clinic-\\nstratum and for each metric, two measures of variability\\nwere calculated\
    \ across the available years (2020, 2021,\\n2022):\\n\\u2022 Coe\\ufb00icient of Variation (CV): Calculated as\\n( Standard\
    \ Deviation\\nMean\\n)\\n\\u00d7 100.\\nThe CV is a measure\\nof relative variability, expressing the standard de-\\nviation\
    \ as a percentage of the mean.\\nIt is use-\\nful for comparing the degree of variation between\\ndatasets, even if their\
    \ means are drastically differ-\\nent.\\n\\u2022 Standard Deviation (SD): Calculated as the\\nstandard deviation of the\
    \ metric values across the\\navailable years. The SD is a measure of absolute\\nvariability, indicating the typical distance\
    \ of the\\ndata points from the mean.\\nThese calculations resulted in a new dataset where\\neach\\nrow\\nrepresented\\\
    na\\nclinic-stratum\\nand\\nin-\\ncluded the calculated CV and SD for each met-\\nric,\\nalong\\nwith\\nthe\\nclinic\\\
    u2019s\\n\\u2018LocationAbbr\\u2018\\nand\\nthe average \\u2018Cycle_Count\\u2018 for that stratum across\\nthe 2020-2022\
    \ period (\\u2018Avg_Clinic_Volume\\u2018).\\nThe\\n\\u2018Avg_Clinic_Volume\\u2018 was calculated as the mean of the\\\
    nreported \\u2018Cycle_Count\\u2018 values for that clinic-stratum\\nacross the years for which metric data was available.\\\
    n2.5. Statistical Analysis\\nStatistical analyses were conducted to describe the\\ndistribution of performance metrics\
    \ and variability mea-\\nsures and to explore their association with clinic-level\\nfactors (Noori et al. 2025; Lara-Cabrera\
    \ et al. 2025).\\n2.5.1. Exploratory Data Analysis\\nPrior to variability analysis, descriptive statistics\\n(mean, median,\
    \ standard deviation, interquartile range,\\n\\n4\\nminimum, maximum) were calculated for each perfor-\\nmance and e\\\
    ufb00iciency metric for each year (2020, 2021,\\n2022), stratified by \\u2018EggSource\\u2018 and \\u2018AgeGroup\\u2018\
    \ (Otieno\\net al. 2024). The distribution of \\u2018Cycle_Count\\u2018 and the\\ngeographic distribution of clinics were\
    \ also summarized.\\n2.5.2. Association with Clinic Volume\\nThe association between the calculated variability\\nmeasures\
    \ (CV and SD) and \\u2018Avg_Clinic_Volume\\u2018 was\\nassessed using Spearman\\u2019s rank correlation coe\\ufb00icient.\\\
    nSpearman correlation was chosen for its robustness to\\nnon-normal distributions and potential non-linear re-\\nlationships\
    \ between variability and volume (Stepanov\\n2024; de Winter et al. 2024).\\nCorrelation coe\\ufb00icients\\n(\\u03c1)\
    \ and associated p-values were reported for each vari-\\nability measure and stratum.\\n2.5.3. Association with Geographic\
    \ Location\\nThe association between variability measures and ge-\\nographic location (\\u2018LocationAbbr\\u2018) was\
    \ investigated us-\\ning the Kruskal-Wallis test (Fruchter et al. 2015). This\\nnon-parametric test compares the median\
    \ variability\\nacross different states (Haruki et al. 2025).\\nAnalyses\\nwere limited to states with a minimum number\
    \ of clin-\\nics (e.g., > 5 or > 10, depending on data availability\\nper stratum) to ensure su\\ufb00icient sample size\
    \ per group.\\nTest statistics and p-values were reported.\\n2.5.4. Multivariable Regression Analysis\\nTo examine the\
    \ independent contributions of clinic\\nvolume and geographic location to performance vari-\\nability, Ordinary Least\
    \ Squares (OLS) linear regres-\\nsion models were developed. Separate models were fit-\\nted for each variability measure\
    \ (CV and SD) within\\neach stratum (\\u2018EggSource\\u2018, \\u2018AgeGroup\\u2018) as the de-\\npendent variable.\\\
    nIndependent variables included\\n\\u2018Avg_Clinic_Volume\\u2018 (treated as a continuous predic-\\ntor) and \\u2018LocationAbbr\\\
    u2018 (treated as a categorical pre-\\ndictor, represented by dummy variables with a refer-\\nence state). Model diagnostics,\
    \ including linearity, ho-\\nmoscedasticity, and normality of residuals, were exam-\\nined (Christodoulou et al. 2024).\
    \ Regression coe\\ufb00icients,\\nstandard errors, and p-values were reported for each pre-\\ndictor.\\n2.6. Computational\
    \ Environment\\nAll data processing and statistical analyses were per-\\nformed using Python (version 3.9) with standard\
    \ li-\\nbraries including pandas (version 1.3.4) for data ma-\\nnipulation, NumPy (version 1.21.5) for numerical op-\\\
    nerations, SciPy (version 1.7.3) for statistical functions\\n(including Kruskal-Wallis) (Virtanen et al. 2019), and\\\
    nstatsmodels (version 0.13.2) for regression modeling.\\nParallel processing capabilities, where applicable, were\\nutilized\
    \ using libraries like \\u2018joblib\\u2018 or \\u2018multiprocessing\\u2018\\nto enhance computational e\\ufb00iciency\
    \ given the size of the\\ndataset and the number of analyses performed. Code\\nand intermediate data files were managed\
    \ to ensure re-\\nproducibility.\"\n  },\n  {\n    \"name\": \"RESULTS\",\n    \"text\": \"This study aimed to characterize\
    \ the year-to-year vari-\\nability in key U.S. Assisted Reproductive Technology\\n(ART) clinic performance and e\\ufb00iciency\
    \ metrics between\\n2020 and 2022, a period marked by the COVID-19 pan-\\ndemic, and to identify associated clinic-level\
    \ factors us-\\ning data from the National ART Surveillance System\"\n  },\n  {\n    \"name\": \"(NASS)\",\n    \"text\"\
    : \"3.1. Data cohort and preparation\\nThe analysis utilized clinic-level aggregate data from\\nthe NASS for the reporting\
    \ years 2020, 2021, and 2022.\\nThe initial dataset comprised 1,126,080 records.\\nKey\\nperformance and e\\ufb00iciency\
    \ metrics were identified and\\nextracted based on combinations of descriptive columns.\\nAn important limitation encountered\
    \ during data prepa-\\nration was the inability to map the metric \\u201dPercentage of\\nlive births per transfer\\u201d\
    \ (Perc_LB_Transfer) from the\\nsource data for the specified years and strata, leading to\\nits exclusion from subsequent\
    \ analysis.\\nThe\\nmetrics\\nsuccessfully\\nextracted\\nand\\nana-\\nlyzed included:\\nPercentage of live births per\
    \ in-\\ntended\\nretrieval\\n(Perc_LB_IntendedRetrieval),\\nPercentage\\nof\\nlive\\nbirths\\nper\\nactual\\nre-\\ntrieval\\\
    n(Perc_LB_ActualRetrieval),\\nAverage\\nnumber\\nof\\ntransfers\\nper\\nintended\\nretrieval\\n(Avg_Transfers_IntendedRetrieval),\\\
    nAverage\\nnumber\\nof\\nintended\\nretrievals\\nper\\nlive\\nbirth\\n(Avg_IntendedRetrievals_LB),\\nand\\nPercentage\\\
    nof\\ndonor-egg embryo transfer cycles leading to live births\\n(Donor_Egg_LB_Rate).\\nData were stratified by egg source\
    \ (\\u2019Own\\u2019 or \\u2019Donor\\u2019)\\nand patient age group (<35, 35-37, 38-40, >40 for own\\neggs; \\u2019All\
    \ Ages Donor\\u2019 for donor eggs). Clinic volume\\nwas represented by the maximum cycle count reported\\nfor a given\
    \ clinic-year-stratum (Stratum_Cycle_Count).\\nThe distribution of clinic stratum cycle count across\\nthe 2020-2022 period\
    \ is shown in Figure 2, illustrat-\\ning a highly right-skewed distribution with many low-\\nvolume strata and a few high-volume\
    \ ones.\\nGeo-\\ngraphic location was represented by the state abbrevia-\\ntion (LocationAbbr). A total of 510 unique\
    \ clinics were\\nidentified across the U.S. states and territories. The geo-\\ngraphic distribution of these clinics by\
    \ state is presented\\n\\n5\\nin Figure 3, showing an uneven concentration in certain\\nstates. The data were reshaped\
    \ into a wide format, with\\neach row representing a unique clinic-year-stratum com-\\nbination, totaling 6,800 such combinations.\\\
    n3.2. Descriptive analysis of ART metrics (2020-2022)\\nDescriptive statistics for the key ART metrics were\\ncomputed\
    \ for each year, stratified by egg source and age\\ngroup.\\nFor patients using their own eggs, success rates\\n(Perc_LB_IntendedRetrieval,\
    \ Perc_LB_ActualRetrieval)\\nconsistently decreased with advancing maternal age\\nacross all three years, as expected.\\\
    nFor example, in\\n2020, the mean Perc_LB_IntendedRetrieval ranged\\nfrom 15.9% for the <35 age group to 1.3% for the\
    \ >40\\nage group.\\nSimilar patterns were observed in 2021.\\nHowever, the 2022 data showed notable shifts in these\\\
    npercentages for some age groups, with a marked in-\\ncrease in mean Perc_LB_IntendedRetrieval for the\\n35-37 group (27.2%)\
    \ compared to previous years, while\\nother groups showed smaller changes.\\nThe distribu-\\ntions within each stratum,\
    \ as visualized in boxplots\\n(not shown for all metrics, but illustrative examples of\\nmetric distributions are provided\
    \ later when discussing\\nvariability), indicated considerable inter-clinic variabil-\\nity in performance within each\
    \ year.\\nE\\ufb00iciency metrics for own-egg cycles also varied\\nby age.\\nThe average number of intended retrievals\\\
    nper live birth (Avg_IntendedRetrievals_LB) tended\\nto increase with age,\\nsuggesting more cycles are\\nneeded for a\
    \ successful outcome in older patients.\\nThe average number of transfers per intended re-\\ntrieval (Avg_Transfers_IntendedRetrieval)\
    \ was gen-\\nerally below 1.0 across strata, indicating that not all\\nretrieval cycles proceed to transfer. The distribution\
    \ of\\nthis metric across years and age groups is shown in Fig-\\nure 1.\\nFor donor egg cycles, the mean Donor_Egg_LB_Rate\\\
    nwas 3.2% in 2020 and 3.9% in 2021 across reporting\\nclinics.\\nA significant data anomaly was observed for\\n2022, where\
    \ the Donor_Egg_LB_Rate was reported as\\n0.0% for all 457 clinic-year-stratum instances available\\nin the descriptive\
    \ analysis. This finding suggests a po-\\ntential systemic data issue for this specific metric in 2022\\nwithin the NASS\
    \ dataset, rendering direct comparisons\\nand trend analysis for this metric involving 2022 data\\nunreliable.\\n3.3.\
    \ Variability in ART clinic performance\\n(2020-2022)\\nYear-to-year variability in each performance and e\\ufb00i-\\\
    nciency metric was quantified for each clinic-stratum with\\nFigure 1. Distribution of average embryo transfers per in-\\\
    ntended egg retrieval for Own Egg cycles by Year (2020-2022)\\nand Age Group. Boxplots illustrate that this metric is\
    \ gen-\\nerally below 1.0 across years and age groups, indicating that\\nnot all intended retrievals resulted in a transfer,\
    \ with varia-\\ntion within each group.\\nFigure 2. Distribution of clinic stratum cycle count from\\n2020-2022. The histogram,\
    \ with a log-scaled frequency axis,\\nshows a highly right-skewed distribution, indicating that the\\nmajority of clinic-year-egg\
    \ source-age group strata have low\\ncycle volumes, while a small proportion have very high vol-\\numes.\\ndata in at\
    \ least two of the three years (2020-2022). Vari-\\nability was measured using the Coe\\ufb00icient of Variation\\n(CV)\
    \ and Standard Deviation (SD).\\nSummary statistics for the calculated CVs and SDs\\nhighlighted substantial variability.\\\
    nFor own-egg suc-\\ncess rates (Perc_LB_IntendedRetrieval), the median\\nSD across clinic-strata was 3.70, reflecting\
    \ the typi-\\ncal absolute fluctuation in percentage points. The me-\\ndian CV was 86.6%, indicating high relative variabil-\\\
    n\\n6\\nFigure 3. Geographic distribution of unique ART clinics by\\nstate/territory (2020-2022). The figure shows the\
    \ number of\\nclinics per state or territory, indicating an uneven distribu-\\ntion with major hubs in states like California,\
    \ Texas, and\\nNew York.\\nity, particularly pronounced when mean success rates\\nare low. Similarly, Perc_LB_ActualRetrieval\
    \ showed\\na median SD of 3.56 and a median CV of 25.1%. For\\ne\\ufb00iciency metrics, Avg_Transfers_IntendedRetrieval\\\
    nhad a median SD of 0.25 and CV of 53.9%, while\\nAvg_IntendedRetrievals_LB showed a median SD of\\n1.62 and a high median\
    \ CV of 92.9%.\\nThe distribution of CVs for own-egg ART metrics\\nacross age groups is visualized in Figure 4, and the\
    \ distri-\\nbution of corresponding SDs is shown in Figure 5. These\\nfigures illustrate that the magnitude and distribution\
    \ of\\nvariability differ by metric and age group. CVs for suc-\\ncess rates tended to be higher in older age groups,\
    \ likely\\ndue to lower mean success rates in these strata mak-\\ning the CV more sensitive to absolute variations. SDs,\\\
    nrepresenting absolute variability, showed less consistent\\nage-related patterns but were substantial across all age\\\
    ngroups.\\nFor the Donor_Egg_LB_Rate, the median SD and CV\\nwere reported as 0.0%, heavily influenced by the 2022\\ndata\
    \ anomaly where all reported rates were 0%. How-\\never, the mean SD (3.70%) and mean CV (22.96\\n3.4. Correlates of performance\
