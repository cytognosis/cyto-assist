    n# Generate a research idea from the input text\\nden.get_idea()\\n# check whether the idea is new or not\\nden.check_idea()\\\
    n# Generate a research plan to carry out the idea\\nden.get_method()\\n# Follow the research plan, write and execute code,\
    \ make plots, and summarize the results\\nden.get_results()\\n# Write a paper for the APS journal\\nden.get_paper(journal=Journal.APS)\\\
    n# Review the paper\\nden.referee()\\nThe Python API also allows to set research idea and methods provided by the user:\\\
    n# Set the idea given by a text file in the project folder\\nden.set_idea()\\n# or providing an input string\\nden.set_idea(\\\
    \"Write a research idea here\\\")\\n# Similarly, set the methods given by a text file in the project folder (or providing\
    \ an input string)\\nden.set_method()\\nIt is possible to select between the different backends, Cmbagent and the default\
    \ fast method based\\non LangGraph for idea and method generation:\\n# Generate an idea using the fast method based on\
