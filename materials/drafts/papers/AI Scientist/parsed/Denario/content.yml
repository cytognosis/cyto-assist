    \ most separated models, IMRPhenomXO4a and\\nIMRPhenomXPHM, are both frequency-domain phe-\\nnomenological models, but\
    \ they incorporate different\\nphysical approximations, particularly in their treatment\\nof higher-order modes and spin\
