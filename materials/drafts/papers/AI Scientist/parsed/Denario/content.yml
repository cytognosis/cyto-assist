    \ in a later section. As AI agents such as Denario continue to\\nimprove, we expect them to become transformational tools\
    \ for training and research in biological sciences.\\n5.8\\nDigital Health. Developing and evaluating step-counting algorithms\
    \ from\\nwrist- and hip-worn accelerometers\\nWearable monitoring is a popular, emerging research field within the digital\
    \ health domain, for the\\nobjective, passive monitoring of biosignals, which may offer insights into health outcomes\
    \ [62].\\nThis\\nfield has particularly grown with the increased use of smart devices such as phones and watches [63,\
    \ 64].\\nThese devices use a variety of sensors to extract digital measures, such as total sleep time, sleep efficiency,\\\
    nheart rate, and daily step count, among others [65]. Of these measures, the daily step count, particularly\\nachieving\
    \ 10,000 steps a day, has become one of the hallmark approaches to monitoring one\\u2019s activity\\nlevels. However,\
    \ this measure still has a high degree of skepticism, due to a lack of transparency of many\\nstep counting algorithms,\
    \ and known tricks to trigger false counting of steps, through arm movements\\n[66, 67].\\nIn this study, Denario was\
    \ used to read, process, and investigate research questions using a publicly\\navailable accelerometer dataset. This data\
    \ contains raw wrist and hip accelerometer data from 39 Oxford-\\nbased participants over 1 hour. The raw data was collected\
    \ from 2 devices at each location, set to sampling\\nfrequencies of 25 and 100Hz; therefore, four monitoring devices in\
    \ total. A hip-mounted, foot-facing\\ncamera was used to record the timings of each step taken by participants, allowing\
    \ for the annotation of\\nan indication of the timing of each heel strike, corresponding to each step. The dataset is\
    \ explained in\\nfurther detail in the published work of Small et al. (2024) [67]. This dataset could primarily be used\
    \ to\\ntrain or validate models/algorithms used to count steps. Moreover, given the data collection from four\\ndifferent\
    \ devices, it is possible to compare how the performance of these step-counting algorithms differs\\nbetween the wrist\
    \ and the hip, and at different sampling frequencies. Using the metadata file, we can\\nfurther explore if there are noted\
    \ differences in different age groups or sexes, though limited to just 39\\nparticipants [67].\\n5.8.1\\nInput data\\\
