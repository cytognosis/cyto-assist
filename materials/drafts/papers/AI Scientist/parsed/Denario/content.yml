    \ },\n  {\n    \"name\": \"ABSTRACT\",\n    \"text\": \"Understanding the structure, dynamics, and stability of peptide\
    \ aggregates formed during self-\\nassembly is crucial for designing functional biomaterials. We introduce a novel multiscale\
    \ dynamic\\ngraph analysis framework to characterize peptide self-assembly using molecular dynamics simulations\\nof the\
    \ KYFIL pentapeptide. Our approach represents peptide aggregates as dynamic graphs at two\\nlevels: a coarse-grained graph\
    \ where nodes are peptides and edges represent inter-peptide heavy atom\\ncontacts, and a fine-grained graph within each\
    \ aggregate where nodes are amino acids and edges rep-\\nresent intra- and inter-peptide residue contacts. We analyzed\
    \ the temporal evolution and fluctuations\\nof diverse graph-theoretic properties (including size, density, centrality,\
    \ and spectral properties like\\nthe Fiedler value) at both scales during the equilibrium phase (from 100 ns). This analysis\
    \ revealed a\\ndynamic equilibrium characterized by a dominant aggregate with fluctuating peptide-level connectivity\\\
    nand a relatively sparse, locally clustered internal amino acid network (low fine-grained Fiedler value).\\nWe developed\
    \ a composite order parameter combining the size of the largest aggregate with its internal\\nfine-grained density, demonstrating\
    \ enhanced stability compared to aggregate size alone. Crucially, by\\ntracking aggregates and analyzing splitting events,\
    \ we found that aggregates exhibiting significantly\\nlower density and spectral connectivity at both the peptide and\
    \ amino acid levels in the frames pre-\\nceding a split were more prone to fragmentation. These findings provide a quantitative,\
    \ multiscale\\nperspective on peptide aggregate structure and dynamics, offering structural insights into aggregate\\\
    ninstability that can inform the rational design of more stable self-assembling peptide biomaterials.\\nKeywords: Transient\
    \ detection, Astronomical object identification, Algorithms, Computational astron-\\nomy, Multivariate analysis\"\n  },\n\
    \  {\n    \"name\": \"INTRODUCTION\",\n    \"text\": \"Peptide self-assembly, the spontaneous organization of\\npeptides\
    \ into ordered structures, is a fundamental pro-\\ncess in biological systems and a powerful strategy for the\\nrational\
    \ design of functional biomaterials. These self-\\nassembled structures span a wide range of morpholo-\\ngies, from transient\
    \ oligomers to extensive fibrils and\\nhydrogels, exhibiting diverse structural motifs and phys-\\nical properties. A\
    \ comprehensive understanding of the\\nmolecular mechanisms governing the formation, intri-\\ncate structure, dynamic\
    \ evolution, and ultimately, the\\nstability of these aggregates is paramount for controlling\\ntheir functional outcomes\
    \ in applications such as drug\\ndelivery, tissue engineering, and for addressing protein\\naggregation-related diseases.\\\
    nHowever, characterizing the complex and dynamic na-\\nture of peptide aggregates at a molecular level poses sig-\\nnificant\
    \ challenges.\\nAggregates are inherently hetero-\\ngeneous and undergo continuous structural rearrange-\\nments, growth\
    \ through monomer addition or aggregate\\nmerging, and fragmentation or dissolution. Experimen-\\ntal techniques often\
    \ provide ensemble-averaged infor-\\nmation or static snapshots, lacking the detailed, dy-\\nnamic atomic-level insight.\
    \ Molecular dynamics (MD)\\nsimulations offer atomic-resolution trajectories of self-\\nassembly, but extracting meaningful,\
    \ quantitative mea-\\nsures that capture the complex internal connectivity\\nand its temporal changes, and critically,\
    \ relating these\\nmeasures to aggregate stability and dynamic events like\\nsplitting or merging, remains a major hurdle.\\\
    nTradi-\\ntional MD analysis often focuses on macroscopic prop-\\nerties such as aggregate size or shape, or on simple\
    \ con-\\ntact counts, but lacks a comprehensive framework to\\ndescribe the system\\u2019s structure across different\
    \ organi-\\nzational scales simultaneously and dynamically.\\nTo overcome this challenge, we introduce a novel\\nframework\
    \ based on dynamic multiscale graph analy-\\n\\n2\\nsis applied to molecular dynamics simulations of pep-\\ntide self-assembly.\\\
    nGraph theory provides a powerful\\nmathematical language to represent complex networks\\nof interactions and quantify\
    \ their structural properties\\nbeyond simple proximity (Pavlou et al. 2023; Sun et al.\\n2024). By applying graph-theoretic\
    \ concepts to peptide\\naggregates, we can move beyond simple distance cutoffs\\nor aggregate size to characterize the\
    \ dynamic network\\nof contacts at different levels of resolution (Sun et al.\\n2024).\\nOur approach represents peptide\
    \ aggregates as dy-\\nnamic graphs at two distinct scales: a coarse-grained\\n(CG) level where each node represents an\
    \ entire pep-\\ntide and edges denote inter-peptide heavy atom con-\\ntacts, and a fine-grained (FG) level within each\
    \ aggre-\\ngate where nodes are individual amino acids and edges\\nrepresent intra- or inter-peptide residue contacts.\
    \ This\\nmultiscale representation allows us to simultaneously\\nprobe the peptide-level organization and the detailed\\\
    ninternal amino acid packing and interaction network\\nwithin aggregates (Sun et al. 2024).\\nIn this work, we leverage\
    \ extensive molecular dynam-\\nics simulations of the self-assembling pentapeptide KY-\\nFIL to demonstrate the utility\
    \ and power of this mul-\\ntiscale dynamic graph analysis framework. We analyze\\nthe temporal evolution and fluctuations\
    \ of a comprehen-\\nsive set of graph-theoretic properties at both the CG and\\nFG scales during the equilibrium phase\
    \ of self-assembly\\n(from 100 ns onwards). These properties include stan-\\ndard measures like size, density, and centrality,\
    \ as well\\nas spectral properties derived from the Graph Laplacian,\\nsuch as the Fiedler value (algebraic connectivity),\
    \ which\\nprovides insights into graph fragmentation. By tracking\\naggregates over time and identifying specific dynamic\\\
    nevents, particularly splitting events, we investigate how\\ndistinct multiscale structural features correlate with ag-\\\
    ngregate stability and fragmentation proneness. We ex-\\ntract graph properties in the frames preceding a split\\nand\
    \ compare them to stable aggregates to identify struc-\\ntural signatures of instability. Furthermore, we explore\\nthe\
    \ development of a more robust order parameter for\\naggregation by combining information from both scales,\\nsuch as\
    \ aggregate size from the CG graph and internal\\ndensity or spectral connectivity from the FG graph, and\\nvalidate its\
    \ enhanced stability compared to size alone.\\nThrough this rigorous, quantitative analysis, we aim\\nto reveal structural\
    \ signatures at both the peptide and\\namino acid levels that dictate aggregate stability and\\ndynamic behavior. This\
    \ work establishes a novel, quan-\\ntitative, and multiscale perspective on peptide aggregate\\nstructure and dynamics,\
    \ providing fundamental insights\\nthat can inform the rational design of peptide sequences\\nwith tailored assembly and\
    \ stability properties for a wide\\nrange of biomaterial applications.\"\n  },\n  {\n    \"name\": \"METHODS\",\n    \"\
    text\": \"2.1. Molecular Dynamics Simulation Data\\nThe dataset for this study consists of a 500 ns molec-\\nular dynamics\
    \ (MD) simulation trajectory of 30 KYFIL\\npentapeptides in explicit water solvent, previously gen-\\nerated using standard\
    \ simulation protocols. The simu-\\nlation data included atomic coordinates, velocities, and\\ntopology information. The\
    \ trajectory and topology files,\\nnamed stripped.nc and stripped.parm7 respectively,\\nwere loaded using the MDAnalysis\
    \ Python library for\\ninitial processing and data extraction. All subsequent\\nanalyses were performed using custom scripts\
    \ leverag-\\ning NumPy, SciPy, and graph analysis libraries.\\n2.2. Data Preparation and Equilibrium Identification\\\
    nTo ensure our analysis focuses on the system\\u2019s be-\\nhavior at or near equilibrium (Wang et al. 2015; Voit\\net\
    \ al. 2024), we first performed exploratory data analy-\\nsis (EDA) on the full 500 ns trajectory.\\n2.2.1. Loading and\
    \ Trajectory Segmentation\\nThe simulation trajectory was loaded, and per-frame\\natomic coordinates, atom types, residue\
    \ identities, and\\npeptide segment information were extracted.\\nBased\\non preliminary analysis (detailed below), the\
    \ system\\nreached a stable state after approximately 100 ns. Con-\\nsequently, all subsequent detailed graph analyses\
    \ were\\nperformed exclusively on the trajectory segment start-\\ning from 100 ns up to the end of the simulation (500\
    \ ns).\\nThe frame corresponding to the 100 ns mark was iden-\\ntified by examining the time attribute of the trajectory\\\
    nframes.\\n2.2.2. Exploratory Data Analysis for Equilibration and\\nContact Definition\\nTo confirm system equilibration\
    \ and determine a suit-\\nable distance cutoff for defining inter-atomic contacts,\\nwe performed the following analyses:\\\
    nRoot Mean Square Deviation (RMSD): \\u2014The RMSD of\\nall heavy atoms (Carbon, Nitrogen, Oxygen) across all\\n30 peptides\
    \ was calculated relative to the heavy atom\\ncoordinates of the first frame (0 ns) as a reference struc-\\nture. For\
    \ each subsequent frame, the heavy atom coor-\\ndinates were aligned to the reference using the Kabsch\\nalgorithm (implemented\
    \ using SciPy\\u2019s capabilities) to\\nminimize translational and rotational differences before\\ncalculating the RMSD.\
    \ The time evolution of the heavy\\natom RMSD was plotted to assess global system stabil-\\nity. A plateau in RMSD over\
    \ time indicates that the\\n\\n3\\nsystem has reached a relatively stable conformational\\nensemble, supporting the choice\
    \ of the equilibrium anal-\\nysis window.\\nRadius of Gyration (Rg): \\u2014The radius of gyration was cal-\\nculated\
    \ for the entire system (all heavy atoms of all 30\\npeptides) and averaged over individual peptides (heavy\\natoms of\
    \ each peptide) for every frame of the full tra-\\njectory (Wadhwa et al. 2024,?). The system Rg reflects\\nthe overall\
    \ compactness of the peptide ensemble and ag-\\ngregate formation (Claret 2023), while the average indi-\\nvidual peptide\
    \ Rg indicates changes in peptide confor-\\nmation. Plotting Rg values over time provided further\\ninsights into the\
    \ system\\u2019s dynamic state and supported\\nthe identification of the equilibrium phase marked by a\\nplateau in system\
    \ Rg (Li et al. 2021).\\nDetermination of Heavy Atom Contact Cutoff: \\u2014To define\\nthe edges in our graph representations,\
    \ we needed a con-\\nsistent distance cutoff for heavy atom contacts. We cal-\\nculated the pairwise distances between\
    \ all non-bonded\\nheavy atoms belonging to different peptides for a rep-\\nresentative set of frames sampled from the\
    \ equilibrium\\nphase (after 100 ns). A Radial Distribution Function\\n(RDF), g(r), was computed for these inter-peptide\
    \ heavy\\natom pairs (Pan et al. 2011; Dong et al. 2025).\\nThe\\nfirst minimum after the first peak in the RDF, which\\\
    ntypically corresponds to the boundary of the first sol-\\nvation shell, was used to define the maximum distance\\nat\
    \ which two heavy atoms are considered to be in \\u201dcon-\\ntact\\u201d. Based on this analysis, a cutoff distance of\
    \ 4.0\\n\\u00c5 was determined and used consistently throughout the\\nstudy for defining heavy atom contacts.\\n2.3. Dynamic\
    \ Multiscale Graph Construction\\nFor each frame within the equilibrium trajectory seg-\\nment (from 100 ns to 500 ns),\
    \ we constructed dynamic\\ngraph representations of the peptide system at two dis-\\ntinct scales: a coarse-grained (CG)\
    \ peptide level and a\\nfine-grained (FG) amino acid level.\\n2.3.1. Coarse-Grained Peptide-Level Graph Construction\\\
    nAt the coarse-grained level, each of the 30 KYFIL pep-\\ntides was represented as a single node in the graph. An\\nundirected\
    \ edge was placed between two peptide nodes\\n(Peptide i and Peptide j) if the minimum distance be-\\ntween any heavy\
    \ atom in Peptide i and any heavy atom\\nin Peptide j was less than or equal to the predeter-\\nmined contact cutoff distance\
    \ of 4.0 \\u00c5. This was im-\\nplemented by extracting the heavy atom coordinates for\\neach peptide in a given frame\
    \ and computing the pair-\\nwise distance matrix between all heavy atoms of Peptide\\ni and Peptide j using scipy.spatial.distance.cdist.\\\
    nIf any distance within this matrix was found to be less\\nthan or equal to 4.0 \\u00c5, an edge was added between nodes\\\
    ni and j. The resulting graph for each frame was stored\\nas an adjacency matrix.\\n2.3.2. Fine-Grained Amino-Acid-Level\
    \ Graph Construction\\nWithin each identified peptide aggregate from the CG\\ngraph, a fine-grained graph was constructed\
    \ to represent\\nthe internal connectivity at the amino acid level.\\nAggregate Identification: \\u2014For each frame,\
    \ connected\\ncomponents in the CG peptide graph were identified.\\nEach connected component represents a distinct peptide\\\
    naggregate.\\nFG Graph Construction per Aggregate: \\u2014For each identi-\\nfied aggregate, a new graph was constructed.\
    \ The nodes\\nof this graph were the individual amino acids (Lysine,\\nTyrosine, Phenylalanine, Isoleucine, Leucine) belonging\\\
    nto the peptides within that specific aggregate. An undi-\\nrected edge was placed between two amino acid nodes\\n(Amino\
    \ Acid A and Amino Acid B) if the minimum\\ndistance between any heavy atom of Amino Acid A and\\nany heavy atom of Amino\
    \ Acid B was less than or equal\\nto the 4.0 \\u00c5 contact cutoff.\\nThis definition included\\nboth intra-peptide contacts\
    \ (between amino acids within\\nthe same peptide) and inter-peptide contacts (between\\namino acids belonging to different\
    \ peptides but within\\nthe same aggregate). The heavy atom coordinates for all\\namino acids within the aggregate were\
    \ extracted, and\\npairwise distances between heavy atoms of potentially\\ninteracting amino acid pairs were calculated\
    \ to deter-\\nmine edge presence.\\n2.4. Calculation of Graph-Theoretic Properties\\nFor each frame in the equilibrium\
    \ trajectory, a com-\\nprehensive set of graph-theoretic properties was calcu-\\nlated for both the CG peptide graph and\
    \ the FG amino\\nacid graphs (one for each aggregate) (Pavlou et al. 2023;\\nStrey et al. 2024; Sun et al. 2024).\\n2.4.1.\
    \ Properties for CG Peptide Graphs\\nFor the CG graph representing the entire system of 30\\npeptides, we calculated:\
    \ the number of nodes (fixed at\\n30), the total number of edges, the graph density (ratio\\nof existing edges to maximum\
    \ possible edges), the num-\\nber of connected components (representing the number\\nof distinct aggregates) (Airale et\
    \ al. 2025,?; Coupette\\net al. 2025), and the size (number of peptide nodes) of\\neach connected component. For each\
    \ peptide node, its\\ndegree (number of direct peptide neighbors) was calcu-\\nlated. For the largest connected component\
    \ (the domi-\\nnant aggregate), we calculated its average clustering co-\\ne\\ufb00icient, which measures the local density\
    \ of connections\\n\\n4\\naround nodes. We also computed the Graph Laplacian\\nmatrix (L = D \\u2212A, where D is the\
    \ diagonal degree\\nmatrix and A is the adjacency matrix) for the largest\\ncomponent. The eigenvalues of the Laplacian\
    \ were cal-\\nculated using scipy.linalg.eigh for symmetric matri-\\nces. The second smallest eigenvalue (\\u03bb2), also\
    \ known\\nas the algebraic connectivity or Fiedler value, was ex-\\ntracted as a measure of graph connectivity and robust-\\\
    nness to fragmentation. The corresponding eigenvector\\n(Fiedler vector) was also computed. Additional central-\\nity\
    \ measures, such as betweenness, closeness, and eigen-\\nvector centrality, were calculated for each peptide node\\nwithin\
    \ the largest aggregate using NetworkX.\\n2.4.2. Properties for FG Amino-Acid Graphs\\nFor each fine-grained graph representing\
    \ an individual\\naggregate, we calculated: the number of nodes (total\\namino acids in the aggregate), the number of\
    \ edges (to-\\ntal intra-aggregate amino acid contacts), and the graph\\ndensity (reflecting the packing e\\ufb00iciency\
    \ within the ag-\\ngregate) (Zhang et al. 2025). For each amino acid node,\\nits degree was calculated.\\nWe computed\
    \ the average\\nclustering coe\\ufb00icient for the FG graph. Similar to the\\nCG graph, the Graph Laplacian and its eigenvalues,\
    \ in-\\ncluding the Fiedler value (\\u03bb2), were calculated for each\\nFG graph using NumPy and scipy.linalg.eigh (Maki-\\\
    nnen et al. 2024).\\nCentrality measures were also com-\\nputed for amino acid nodes (Zhang et al. 2025).\\n2.4.3. Implementation\
    \ Details for Graph Analysis\\nGraph objects were constructed and manipulated us-\\ning either the NetworkX or igraph_python\
    \ libraries,\\nwhich provide e\\ufb00icient algorithms for calculating stan-\\ndard graph metrics like density, clustering\
    \ coe\\ufb00icients,\\nand centrality measures. Spectral properties (Laplacian,\\neigenvalues, eigenvectors) were computed\
    \ using NumPy\\nfor matrix operations and scipy.linalg.eigh for e\\ufb00i-\\ncient eigenvalue decomposition of the symmetric\
    \ Lapla-\\ncian matrix (Eld\\u00e9n 2023).\\n2.5. Temporal Analysis of Graph Properties\\nThe calculated graph properties\
    \ for the CG and FG\\ngraphs were recorded for each frame from 100 ns to 500\\nns, generating time series for each property\
    \ (e.g., CG\\ngraph density vs.\\ntime, FG \\u03bb2 of the largest aggre-\\ngate vs. time) (Yang & Yu 2023). For each\
    \ time series,\\nwe calculated the mean value, standard deviation (as\\na measure of fluctuation), and coe\\ufb00icient\
    \ of variation\\n(standard deviation divided by the mean) over the equi-\\nlibrium time window (Roncoli et al. 2024).\
    \ Histograms\\nwere generated to visualize the distributions of key prop-\\nerties, such as aggregate sizes and FG densities,\
    \ over the\\nequilibrium phase (Yang & Yu 2023). The time evolu-\\ntion of selected properties was plotted to identify\
    \ trends,\\ndynamic fluctuations, and transitions (Yang & Yu 2023).\\n2.6. Development of a Stable Aggregation Order\\\
    nParameter\\nRecognizing that simple aggregate size can be highly\\ndynamic, we aimed to develop a more stable order pa-\\\
    nrameter for characterizing the aggregated state by com-\\nbining information from both the CG and FG scales.\\nCandidate\
    \ internal stability measures derived from the\\nFG graph properties of aggregates were considered, in-\\ncluding the\
    \ average Fiedler value (\\u03bb2), average density,\\nand average clustering coe\\ufb00icient of the FG graph(s)\\nwithin\
    \ an aggregate. We proposed composite order pa-\\nrameters (OPs) that combine the size of the largest CG\\naggregate with\
    \ a measure of its internal FG structural\\nintegrity. Examples included OPs defined as the prod-\\nuct of the size of\
    \ the largest CG aggregate and the FG\\n\\u03bb2 or density of that same aggregate. A global OP was\\nalso considered,\
    \ defined as the sum of the products of ag-\\ngregate size and its FG property (e.g., \\u03bb2), normalized\\nby the total\
    \ number of peptides.\\nThe time evolution\\nof these proposed OPs was analyzed, and their stability\\nwas quantitatively\
    \ compared to that of simpler measures\\nlike the size of the largest aggregate alone, primarily us-\\ning the coe\\ufb00icient\
    \ of variation over the equilibrium time\\nwindow.\\n2.7. Correlation of Multiscale Graph Features with\\nAggregate Dynamics\\\
    nTo understand the relationship between multiscale\\nstructural features and aggregate stability, we tracked\\nthe dynamics\
    \ of individual peptide aggregates over time.\\n2.7.1. Identification of Aggregate Events\\nAggregates (connected components\
    \ in the CG graph)\\nwere tracked across consecutive frames by identifying\\nmaximum overlap in their constituent peptide\
    \ lists. This\\nallowed us to follow the \\u201dlife history\\u201d of individual ag-\\ngregates.\\nSpecific dynamic events\
    \ were identified and\\ntimestamped: formation (appearance of a new aggre-\\ngate), dissolution (disappearance of an aggregate),\
    \ split-\\nting (an aggregate at frame t fragments into two or more\\nsmaller aggregates at frame t + 1), and merging\
    \ (two or\\nmore aggregates at frame t combine into a single larger\\naggregate at frame t + 1). The longevity of aggregates\\\
    nwas defined as the duration from their formation to their\\ndissolution or splitting.\\n2.7.2. Feature Extraction and\
    \ Correlation Analysis\\nFor each identified aggregate instance that persisted\\nfor a minimum duration, we calculated\
    \ the average val-\\n\\n5\\nues of its key CG and FG graph properties (e.g., CG\\n\\u03bb2, FG density, FG \\u03bb2) over\
    \ its lifetime.\\nTo investi-\\ngate the structural signatures preceding aggregate frag-\\nmentation, we specifically\
    \ focused on splitting events.\\nFor each aggregate that underwent a split, we extracted\\nits CG and FG graph properties\
    \ within a defined time\\nwindow immediately preceding the split frame. These\\nproperties were then compared to the properties\
    \ of ag-\\ngregates that remained stable throughout the same time\\nwindow or for a significantly longer duration. Statisti-\\\
    ncal comparisons (e.g., t-tests or Mann-Whitney U tests)\\nwere performed to identify properties that were signif-\\nicantly\
    \ different in aggregates prone to splitting com-\\npared to stable ones. Correlation analysis (e.g., Pearson\\nor Spearman\
    \ correlation coe\\ufb00icients) was used to quan-\\ntify the relationship between aggregate longevity and its\\naverage\
    \ multiscale graph properties.\\n2.8. Computational Workflow and Data Management\\nThe entire analysis pipeline was implemented\
    \ us-\\ning Python 3.x (Parsotan et al. 2023, 2025).\\nCore\\nlibraries included NumPy for numerical computations\\nand\
    \ array manipulation, and SciPy for spatial dis-\\ntance calculations, sparse matrices, and advanced lin-\\near algebra\
    \ routines, particularly eigenvalue decompo-\\nsition.\\nGraph construction and property calculation\\nrelied on NetworkX\
    \ or igraph_python.\\nData visual-\\nization was performed using Matplotlib and Seaborn\\n(Deal & Espinoza 2024). Given\
    \ the frame-by-frame na-\\nture of the analysis, the computational workload was\\nparallelized across the available 128\
    \ CPU cores using\\nPython\\u2019s multiprocessing or joblib library. The loop\\nover trajectory frames was distributed\
    \ among worker\\nprocesses, with each process handling a batch of frames\\nindependently.\\nCalculated time series data\
    \ and sum-\\nmary statistics were saved in structured formats such as\\nCSV or HDF5 for e\\ufb00icient storage and subsequent\
    \ analy-\\nsis (Parsotan et al. 2023, 2025). Comprehensive logging\\nwas implemented using print statements to track the\\\
    nprogress of the analysis, report completion of key stages,\\nand output essential summary statistics and shapes of\\\
    ngenerated data arrays for verification.\"\n  },\n  {\n    \"name\": \"RESULTS\",\n    \"text\": \"Our analysis employed\
    \ a novel multiscale dynamic\\ngraph approach to investigate the structural and dy-\\nnamic properties of KYFIL pentapeptide\
    \ aggregates\\nduring the equilibrium phase of a 500 ns molecular dy-\\nnamics simulation. The framework allowed us to\
    \ repre-\\nsent peptide aggregates as dynamic networks at both the\\ncoarse-grained (peptide) and fine-grained (amino\
    \ acid)\\nlevels, providing a quantitative means to characterize\\ntheir evolving structure and relate it to dynamic events.\\\
    n3.1. System equilibration and simulation setup\\nPrior to detailed graph analysis, we assessed the sim-\\nulation trajectory\
    \ for equilibration.\\nThe Root Mean\\nSquare Deviation (RMSD) of heavy atoms, calculated\\nrelative to the initial frame,\
    \ showed an initial rise fol-\\nlowed by a plateauing behavior, as depicted in Figure\"\n  },\n  {\n    \"name\": \"The\
    \ standard deviation of the RMSD significantly\",\n    \"text\": \"decreased after approximately 100 ns (from 9.496 \\\
    u00c5 in\\nthe first 100 ns to 5.080 \\u00c5 in the subsequent 400 ns), in-\\ndicating that the system reached a relatively\
    \ stable con-\\nformational ensemble. Similarly, the system\\u2019s Radius of\\nGyration (Rg), reflecting the overall\
    \ compactness, also\\nstabilized after 100 ns, as shown in Figure 2. While the\\nstandard deviation of the system Rg increased\
    \ slightly\\nin the latter phase, this is consistent with the expected\\ndynamic fluctuations of large aggregates forming\
    \ and re-\\narranging in equilibrium. Based on these indicators, the\\ntrajectory segment from 100 ns\\u2013500 ns was\
    \ identified as\\nthe equilibrium phase and used for all subsequent anal-\\nyses, encompassing 66,772 frames.\\nFigure\
    \ 1.\\nHeavy atom Root Mean Square Deviation\\n(RMSD) of the entire system relative to the initial frame\\n(Frame 0) as\
    \ a function of simulation time. The red dashed\\nline at 100 ns marks the defined start of the equilibrium\\nphase. The\
    \ plot shows that the RMSD stabilizes after ap-\\nproximately 100 ns, indicating system equilibration, while\\ncontinued\
    \ fluctuations in the equilibrium phase reflect the\\ndynamic nature of aggregate formation and rearrangement.\\nDefining\
    \ inter-atomic contacts is crucial for graph con-\\nstruction. We attempted to determine an optimal heavy\\natom contact\
    \ cutoff by analyzing the Radial Distribu-\\ntion Function (RDF) of inter-peptide heavy atom pairs.\\nHowever, this analysis\
    \ did not yield a distinct first sol-\\nvation shell minimum.\\nConsequently, based on com-\\nmon practice in molecular\
    \ simulations for defining non-\\nbonded contacts, a standard cutoff distance of 4.0 \\u00c5\\nwas adopted for all graph\
    \ constructions. Peptide enti-\\nties were successfully defined as contiguous blocks of 5\\n\\n6\\nFigure 2. Radius of\
    \ gyration over time for the molecular\\ndynamics simulation of KYFIL pentapeptide self-assembly.\\nTop panel shows the\
    \ system radius of gyration (Rg) of heavy\\natoms. Bottom panel shows the average radius of gyration\\nfor individual\
    \ peptides (heavy atoms). The dashed red line\\nat 100 ns indicates the start of the equilibrium phase. The\\nsystem Rg\
    \ stabilizes overall but exhibits increased fluctua-\\ntions after 100 ns, reflecting dynamic aggregate formation\\nand\
    \ rearrangement, while the average individual peptide Rg\\nremains relatively constant, supporting the designation of\\\
