    \ be-\\ntween sexual life cycle stages of P. falciparum field isolates.\\nNodes represent gametocyte stages, including\
    \ late-stage (LE)\\nforms. Edges indicate strong connections, revealing progres-\\nsion from female and male gametocytes\
    \ to their respective\\nLE stages in field isolates.\\nFigure 17. PAGA graph of sexual stage development\\nin field isolates.\\\
    nNodes represent distinct gametocyte\\nstages, including late-stage (\\u2019LE\\u2019) male and female popula-\\ntions\
    \ unique to field samples. Edges indicate inferred devel-\\nopmental connections, revealing progression to later stages\\\
    nand an extended developmental pathway in the host envi-\\nronment.\\nIn the Asexual Lab trajectory, we identified 17\
    \ dis-\\ntinct gene modules exhibiting coordinated expression\\ndynamics along pseudotime. Our analysis of transient\\\
    nregulators predicted a remarkable 3,428 putative regula-\\ntory links. A large number of candidate regulators were\\\
    nFigure 18. Force-directed layout (FR) of single-cell tran-\\nscriptomes from sexual stage Plasmodium falciparum field\\\
    nisolates colored by annotated life cycle stage (left) and in-\\nferred developmental pseudotime (right). The trajectory\
    \ re-\\nveals progression from earlier gametocytes to late-stage (LE)\\npopulations, illustrating extended maturation\
    \ observed only\\nin field isolates.\\npredicted to have peak expression at the very beginning\\nof the trajectory (pseudotime\
    \ bin 0), immediately pre-\\nceding the activation of multiple gene modules in sub-\\nsequent bins (e.g., bin 1). This\
    \ pattern suggests that\\nthe initiation of the asexual IDC in laboratory culture\\nis driven by a major, coordinated\
    \ wave of regulatory\\nactivity involving numerous factors acting early in the\\ncycle.\\nFor the Asexual Field trajectory\
    \ (limited to late ring\\nand early trophozoite stages), we identified 13 gene mod-\\nules. However, the analysis predicted\
    \ significantly fewer\\nputative regulatory links (945) compared to the lab asex-\\nual trajectory. The timing of peak\
    \ expression for top\\ncandidate regulators in the field asexual trajectory ap-\\npeared different, with some predicted\
    \ to peak later in\\nthe observed trajectory segment (e.g., bin 5). An exam-\\nple showing the expression profile of a\
    \ candidate regu-\\nlator and its target module activation along pseudotime\\nis presented in Figure 19. This suggests\
    \ that the reg-\\nulatory triggers and dynamics within the observed late\\nring and early trophozoite stages may differ\
    \ in field par-\\nasites, or that the key initiating regulatory events of the\\nasexual cycle occur in the unobserved\
