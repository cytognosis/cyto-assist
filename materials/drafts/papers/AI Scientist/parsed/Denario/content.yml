    u2019game-\\ntocyte (female)\\u2019 (reflecting the initial abundance), pre-\\nsented a more complex structure. This trajectory\
    \ not\\nonly showed the separation into male and female popula-\\ntions but also extended significantly to include the\
    \ \\u2019LE\\u2019\\n(late-stage) gametocyte populations that were unique to\\nthe field dataset. The PAGA analysis confirmed\
