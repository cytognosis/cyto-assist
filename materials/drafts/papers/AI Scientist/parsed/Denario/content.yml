    \ it is a file called idea.md that stores the generated idea. We now describe in detail\\nhow this module works.\\n7https://github.com/AstroPilot-AI/DenarioExamplePapers\\\
    n10\\n\\nFigure 4:\\nThe Idea module is a propose-critique block consisting of two agents: idea maker and\\nidea hater.\
    \ The system first calls the idea maker agent, that will generate an idea given the input text.\\nNext, the idea is sent\
    \ to the idea hater, who will critique the generated idea. The idea maker will then\\ntake the input text, the generated\
    \ idea, and the critique and will improve the idea. This process is then\\nrepeated several times until the final idea\
    \ is generated.\\nA critical part of scientific research is the generation and refinement of ideas. In any ambitious project,\\\
    nit\\u2019s not enough to simply work on a fixed plan \\u2013 creativity and adaptability are needed to explore the\\\
    nbest possible directions. However, creativity must be balanced by careful critique to ensure ideas are\\nrealistic, impactful,\
    \ and tightly connected to the available data. To systematize this process, our pipeline\\nincludes specialized agents\
    \ dedicated to idea generation (idea maker) and idea critique (idea hater).\\nIn this pipeline, the idea maker agent generates\
    \ creative and feasible research project ideas based on\\nthe input text and any feedback from the idea hater agent. Its\
    \ goal is to propose diverse approaches\\nfor extracting new information, considering the current plan, task, and instructions.\
    \ However, simply\\ngenerating ideas is not enough \\u2013 to ensure that only the strongest, most relevant ideas move\
    \ forward,\\neach proposal must undergo careful evaluation. This is where the idea hater agent steps in, critically\\\
    nreviewing each idea for feasibility, scientific value, and relevance to the dataset. By identifying weaknesses\\nand\
    \ suggesting improvements, the idea hater ensures that no idea is accepted blindly without scrutiny.\\nFigure 4 provides\
    \ a schematic of the conversation between the idea maker and idea hater agents. This\\nloop can be repeated as many times\
    \ as requested.\\nThis setup mirrors the natural human process of idea development, where individuals brainstorm\\nconcepts\
    \ and refine them through feedback and discussion. Just like in human teams, iteration is key:\\nthe idea maker improves\
    \ its proposals based on the critiques received from the idea hater, leading\\nto a cycle of continuous refinement. This\
    \ multi-agent dialogue helps distill raw ideas into well-formed,\\nrobust research directions, ultimately ensuring that\
    \ the final projects are both innovative and grounded\\nin realistic scientific practice. The concept of multi-agent systems\
    \ to produce ideas has been motivated\\nby previous works such as [29], who used reinforcement learning between agents,\
    \ and [30], who showed\\nthat a large team of agents produced better ideas than a single agent. In its current version,\
    \ Denario\\nhas two different implementations (see Section 2.2) for this module:\\n\\u2022 Fast idea. In this case, a\
    \ single idea is generated by the idea maker agent and then improved\\n(or completely changed) after receiving feedback\
