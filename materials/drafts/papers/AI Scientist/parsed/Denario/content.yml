    n3.6. Demographic analysis\\nA demographic analysis was conducted to investigate\\nwhether model performance varied by\
    \ participant sex\\nor age group. This analysis was performed on the Com-\\npactCNN model under the Hip_100Hz condition,\
    \ which,\\ndespite its practical failure, nominally had the highest\\n(though still negligible) mean F1-score among the\
    \ deep\\n\\n13\\nlearning models. The demographic analysis results are\\nvisually presented in Figure 21.\\nFigure 21.\\\
    nBox plots illustrating the Mean Absolute\\nPercentage Error (MAPE) of the CompactCNN model\\n(Hip_100Hz) by participant\
    \ sex (left) and age group (right).\\nThe uniformly high MAPE, consistently at 100% across all\\ndemographic categories,\
    \ visually confirms the model\\u2019s uni-\\nversal failure to detect steps, indicating no meaningful per-\\nformance\
    \ variation based on participant demographics.\\nThe Mann-Whitney U test for sex and the Kruskal-\\nWallis test for age\
    \ groups yielded no statistically sig-\\nnificant differences in MAPE (sex:\\np = 0.605; age:\\np = 0.349). However, this\
    \ finding is not meaningful for\\npractical interpretation. As visually confirmed in Fig-\\nure 21, the deep learning\
    \ model consistently predicted\\nzero steps for all participants, resulting in a MAPE\\nof 100% for every individual,\
    \ regardless of their de-\\nmographic profile. Therefore, the statistical tests were\\ncomparing identical distributions\
    \ of 100% error, which\\nnaturally led to the conclusion of no difference. This\\nhighlights that while demographic analysis\
    \ is crucial for\\nrobust models, it becomes moot when the foundational\\nmodel performance is non-existent.\\nIn summary,\
    \ the experimental results demonstrate\\nthat a traditional, well-tuned signal processing algo-\\nrithm can provide viable\
    \ step count estimates from hip-\\nworn sensors, achieving relatively low MAPE. However,\\nits performance significantly\
    \ degrades when applied to\\nmore complex wrist-worn data, indicating its limitations\\nin handling noisier and more varied\
    \ signal characteris-\\ntics. In stark contrast, the deep learning approaches,\\ndespite their theoretical capabilities\
    \ and efficient archi-\\ntectures, universally failed to detect steps across all con-\\nditions.\\nThis comprehensive\
    \ failure, characterized by\\nnear-zero F1-scores and 100% MAPE (as shown in Ta-\\nble 3 and Figure 1), occurred because\
    \ the models con-\\nverged to a trivial solution of predicting no steps (Fig-\\nure 5), an outcome driven by the extreme\
    \ class imbal-\\nance inherent in the step detection task. Even the appli-\\ncation of Focal Loss could not adequately\
    \ mitigate this\\nchallenge.\\nThis underscores a critical learning point:\\nwhile deep learning models can achieve low\
    \ loss values\\nduring training (as exemplified in Figure 6 and related\\nfigures), this does not guarantee meaningful\
    \ task perfor-\\nmance, especially in scenarios with highly imbalanced\\nphysiological time-series data where sparse event\
    \ detec-\\ntion is required.\\nThe computational efficiency of the\\ndeep learning models, while promising, becomes irrele-\\\
    nvant in the absence of practical detection capability.\"\n  },\n  {\n    \"name\": \"CONCLUSIONS\",\n    \"text\": \"\
    4.1. Problem and objectives\\nAccurate and resource-efficient step counting from\\nwearable devices in free-living conditions\
    \ presents signif-\\nicant challenges, primarily stemming from variability in\\nsensor placement (e.g., hip versus wrist),\
    \ data sampling\\nrates, and individual demographic differences.\\nCriti-\\ncally, the inherent sparsity of step events\
    \ within con-\\ntinuous accelerometer data streams leads to an extreme\\nclass imbalance, posing a substantial hurdle\
    \ for machine\\nlearning models. This study aimed to comprehensively\\ncompare the performance of a traditional peak-detection\\\
    nalgorithm against two lightweight deep learning archi-\\ntectures (a compact 1D Convolutional Neural Network\\nand a\
    \ MobileNet-inspired CNN) for step counting. Our\\nprimary objectives were to evaluate their accuracy, com-\\nputational\
    \ efficiency, and generalizability across varying\\nsensor locations and sampling frequencies, with a par-\\nticular focus\
    \ on understanding how data imbalance im-\\npacts deep learning performance for precise, sparse event\\ndetection.\\n4.2.\
    \ Datasets and methods used\\nWe utilized a robust dataset of three-axis accelerom-\\neter data collected from 39 participants,\
    \ encompassing\\nboth hip and wrist placements, at 100Hz and 25Hz sam-\\npling frequencies. Ground-truth step annotations\
    \ pro-\\nvided the basis for evaluation.\\nData preparation in-\\nvolved segmenting continuous recordings into 2-second\\\
    nwindows with 90% overlap, generating binary labels\\nfor step events. A rigorous subject-independent 5-fold\\ncross-validation\
    \ scheme was employed to assess model\\ngeneralizability. The traditional baseline model relied\\non vector magnitude\
    \ calculation, band-pass filtering,\\nand a tuned peak-finding algorithm. The deep learning\\nmodels, a Compact 1D-CNN\
    \ and a MobileNet-inspired\\n1D-CNN, were trained using the Adam optimizer with\\nan initial learning rate of 0.001, a\
    \ \\u2018ReduceLROnPlateau\\u2018\\nscheduler, and early stopping.\\nCrucially, Focal Loss\\n(\\u03b3 = 2, \\u03b1 = 0.25)\
    \ was implemented to address the se-\\nvere class imbalance.\\nPost-processing for deep learn-\\ning models involved stitching\
    \ window-level probabili-\\nties and applying a peak-detection algorithm to iden-\\ntify steps.\\nPerformance was evaluated\
    \ using F1-score\\n\\n14\\nand Mean Absolute Percentage Error (MAPE) for accu-\\nracy, and model parameters and CPU inference\
    \ time for\\ncomputational efficiency.\\nStatistical analyses, includ-\\ning Wilcoxon signed-rank tests for location/frequency\\\
    neffects and Mann-Whitney U/Kruskal-Wallis for demo-\\ngraphic impacts, were performed.\\n4.3. Results obtained\\nThe\
    \ traditional peak-detection baseline demonstrated\\nmoderate performance for hip-worn data, achieving F1-\\nscores of\
    \ approximately 0.42-0.44 and MAPE values\\naround 10-11%.\\nHowever, its accuracy significantly\\ndegraded for wrist-worn\
    \ data, with MAPE surging to\\nover 50%, highlighting its sensitivity to complex sig-\\nnal patterns.\\nIn stark contrast,\
    \ both deep learning\\nmodels, the CompactCNN and the MobileNet-inspired\\nCNN, universally failed across all conditions\
    \ (hip/wrist,\\n100Hz/25Hz). They consistently predicted zero steps,\\nresulting in F1-scores of effectively 0.000 and\
    \ MAPE\\nvalues of 100%. This comprehensive failure occurred de-\\nspite seemingly successful training, where both training\\\
    nand validation loss converged to very low values. This\\nindicates that the models learned a trivial solution by\\npredicting\
    \ the majority class (\\u201dno step\\u201d) to minimize\\noverall loss, without effectively identifying the sparse\\\
    npositive (step) events.\\nWhile the deep learning mod-\\nels were computationally efficient, with the MobileNet-\\ninspired\
    \ CNN being particularly lightweight (12,252 pa-\\nrameters) and both exhibiting fast inference times suit-\\nable for\
    \ real-time applications, their lack of practical\\nstep detection capability rendered this efficiency moot.\\nStatistical\
    \ analyses confirmed the significant impact of\\nsensor location on the baseline model\\u2019s performance but\\nyielded\
    \ no meaningful differences for the deep learning\\nmodels due to their pervasive failure.\\n4.4. What we have learned\\\
    nThis study provides critical insights into the chal-\\nlenges of wearable step counting. First, traditional sig-\\nnal\
    \ processing methods can provide viable performance\\nfor well-behaved signals (e.g., hip-worn sensors) but are\\nlimited\
    \ by their fixed-rule nature when confronted with\\ncomplex, noisy signals from alternative placements (e.g.,\\nwrist-worn\
    \ sensors). Second, and most importantly, our\\nfindings highlight a profound challenge for deep learn-\\ning in highly\
    \ imbalanced physiological time-series data\\nwhere sparse event detection is required.\\nDespite us-\\ning a specialized\
    \ loss function (Focal Loss) designed to\\nmitigate class imbalance, the deep learning models con-\\nverged to a trivial\
    \ solution, effectively learning to predict\\nonly the dominant \\u201dno step\\u201d class. This demonstrates\\nthat\
    \ optimizing loss functions alone, even those tailored\\nfor imbalance, does not guarantee meaningful task per-\\nformance\
    \ when the minority class is extremely rare. The\\napparent success in loss reduction during training can be\\nmisleading\
    \ and does not necessarily translate into the\\ndesired practical utility for event detection. This neces-\\nsitates a\
    \ re-evaluation of current deep learning strategies\\nfor such tasks, potentially requiring more advanced tech-\\nniques\
    \ for handling extreme imbalance, such as sophisti-\\ncated data augmentation for the minority class, novel ar-\\nchitectural\
    \ designs specifically for sparse event recogni-\\ntion, or hybrid approaches that combine the strengths of\\nsignal processing\
    \ with deep learning. While the compu-\\ntational efficiency of the deep learning models is promis-\\ning for wearable\
    \ device deployment, it is irrelevant with-\\nout the foundational capability to accurately detect the\\ntarget events.\
    \ This work underscores the need for robust\\nvalidation strategies that go beyond loss metrics, par-\\nticularly for\
    \ applications involving highly imbalanced\\nphysiological event detection.\"\n  },\n  {\n    \"name\": \"REFERENCES\"\
