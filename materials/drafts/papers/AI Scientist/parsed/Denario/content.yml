    n5.9\\nBiophysics. Mechanistic understanding of protein folding pathways via\\ndimensionality reduction methods\\nCharacterizing\
    \ protein folding and unfolding is one of the key challenges in theoretical and computational\\nbiophysics [68], as it\
    \ requires an understanding of the associated high-dimensional energy landscapes and\\nthe kinetics of transitions between\
    \ different metastable states. Long timescale simulations (microseconds\\nand beyond) are therefore required to observe\
    \ protein (un)folding events on an experimentally relevant\\ntimescale, leading to an understanding of the associated\
    \ mechanistic pathways, identification of transient\\nmicrostates, hidden allostery, and quantification of the kinetics\
    \ of such processes. The N-terminal do-\\nmain of ribosomal protein L9 (NTL9) is chosen as the model protein for this\
    \ study since it undergoes\\nmicrosecond-scale folding reversible folding with a well-characterized two-state folding\
    \ mechanism. NTL9\\nhas a well-characterized and experimentally validated folded structure that allows new algorithms\
    \ and\\nenhanced sampling schemes to reproduce the free energy landscape, intermediate ensembles, and rate\\nconstants.\
    \ This suits the purpose of benchmarking studies due to its small size of 39 amino acid residues,\\nabsence of disulfide\
    \ bonds, and lack of any complex post-translational modifications. This makes NTL9\\nan ideal candidate for developing\
    \ new dimensional reduction methods to identify progress coordinates\\nand understand mechanistic insights into protein\
    \ folding and unfolding.\\n5.9.1\\nData generation\\nMolecular dynamics (MD) simulations were performed using the OpenMM\
    \ engine [69] with the Am-\\nber14SB force field and the OBC2 implicit solvent model at 300 K, employing Langevin dynamics\
    \ with a\\nfriction coefficient of 5 ps\\u22121. The protein was subjected to energy minimization to remove steric clashes,\\\
    nfollowed by a 10 \\u00b5s production run with an integration timestep of 2 fs. Protein coordinates were then\\nsaved\
    \ every 2 ns for subsequent analyses.\\n5.9.2\\nProject description\\nDenario was given the task to automate the post-simulation\
    \ analysis of NTL9 protein (un)folding from\\nMD simulation trajectories.\\nThe objective was to write a manuscript with\
    \ detailed methodologies,\\ndimensionality-reduction and clustering approaches, estimation of the free-energy landscape\
    \ and kinetic\\nrate constants (if possible), employ Markov state modeling to identify relevant low-dimensional progress\\\
    ncoordinates that can characterize the mechanism of protein (un)folding, and establish scalable strategies\\nfor complex\
    \ biomolecules. The input text to the system was this:\\nInput text\\nN-terminal domain of ribosomal protein L9 (NTL9)\
    \ is a fast-folding protein domain that folds re-\\nversibly and is often used as a model to understand protein folding\
    \ pathways. We aim to explore\\nits unfolding thermodynamics and kinetics using an automated, generalizable pipeline.\
    \ We have\\n43\\n\\na 10 \\u00b5s molecular dynamics (MD) simulation trajectory of the NTL9 protein undergoing folding.\\\
    nSimulation conditions for the trajectory obtained: Amber14SB force field with OBC2 implicit\\nsolvent, 300 K Langevin\
    \ dynamics, 2 fs timestep, 2 nm nonbonded cutoff, and H-bond constraints.\\nData: The simulation data is located at /mnt/home/aojha/AstroPilot/Project10.\
    \ There are\\ntwo files in the dataset, i.e., the simulation trajectory (an implicit-solvent 10 \\u00b5s MD trajectory\\\
    nconsisting of 5000 frames saved every 2 ns (ntl9 trajectory.dcd) and its corresponding topol-\\nogy PDB file (ntl9 topology.pdb).\
    \ The simulation begins from an unfolded state of the NTL9\\nprotein, while the topology file is a folded structure of\
    \ the protein.\\nMotivation: Understanding how NTL9 unfolds and, by extension, how small single-domain pro-\\nteins navigate\
    \ their energy landscape reveals general principles of protein folding. Tracking down\\nfolding/unfolding pathways provides\
    \ essential knowledge related to energy barriers, intermediates,\\ntransition states, and allostery involved in the process.\
