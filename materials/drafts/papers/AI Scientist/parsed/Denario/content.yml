    ABSTRACT\",\n    \"text\": \"Robust astrophysical interpretations from gravitational-wave parameter inference critically\
    \ depend\\non understanding model-dependent biases. We introduce a novel physics-informed framework to sys-\\ntematically\
    \ decompose and attribute discrepancies among five gravitational-wave waveform models\\n(NRSur7dq4, IMRPhenomXO4a, SEOBNRv5PHM,\
    \ IMRPhenomXPHM, IMRPhenomTPHM) for the\\nGW231123 event. Our methodology involves extensive exploratory data analysis\
    \ using Jensen-Shannon\\nDivergence and Wasserstein distance, high-dimensional degeneracy analysis via Uniform Manifold\
    \ Ap-\\nproximation and Projection (UMAP), and a core Physics-Informed Discrepancy Decomposition. This\\ndecomposition\
    \ quantifies multi-dimensional divergences within physically motivated parameter sub-\\nspaces (mass and distance, effective\
    \ spin, individual spin and orientation, remnant properties), en-\\nabling us to link model differences to specific physical\
    \ approximations. Our analysis reveals significant\\ndisagreements in inferred parameters, notably for component masses,\
    \ effective spin, and redshift, with\\nUMAP embedding clearly separating models into distinct clusters in the high-dimensional\
    \ parameter\\nspace. The physics-informed decomposition attributes these discrepancies: the individual spin and ori-\\\
    nentation subspace exhibits the most severe model dependence, directly linked to differing treatments\\nof spin precession,\
    \ while remnant properties are sensitive to merger-ringdown modeling. Crucially,\\nwe find that no key astrophysical parameter\
    \ for GW231123 is robustly constrained across all five\\nmodels, demonstrating that systematic waveform model uncertainties\
    \ often exceed statistical uncer-\\ntainties. This work underscores that for high-mass, precessing binary black hole mergers,\
    \ waveform\\nmodel choice is a dominant factor, precluding firm astrophysical conclusions without accounting for\\nthese\
    \ model-dependent biases.\\nKeywords: Credible region, Relativistic binary stars, Black holes, Compact binary stars, Astrostatistics\"\
    \n  },\n  {\n    \"name\": \"INTRODUCTION\",\n    \"text\": \"The advent of gravitational-wave (GW) astronomy,\\ninitiated\
    \ by the direct detection of binary black hole\\n(BBH) mergers by the LIGO-Virgo-KAGRA (LVK) col-\\nlaboration, has fundamentally\
    \ reshaped our understand-\\ning of the most energetic astrophysical events. Through\\nthe meticulous analysis of these\
    \ GW signals, we can in-\\nfer fundamental properties of black holes, explore their\\nformation mechanisms, and probe\
    \ the nature of space-\\ntime under extreme conditions. However, the reliability\\nand precision of these astrophysical\
    \ interpretations are\\ncritically dependent on the theoretical waveform models\\nemployed to describe the intricate dynamics\
    \ of merging\\ncompact objects.\\nThese models, which are computa-\\ntionally e\\ufb00icient approximations of Einstein\\\
    u2019s field equa-\\ntions, inherently incorporate varying levels of physical\\nfidelity, ranging from highly accurate\
    \ but computation-\\nally expensive numerical relativity (NR) simulations to\\nmore e\\ufb00icient analytical and phenomenological\
    \ approx-\\nimations.\\nThe inherent complexity of BBH dynamics, particu-\\nlarly for systems characterized by high masses,\
    \ signifi-\\ncant spins, and orbital precession, necessitates the use of\\nsuch approximate models. While NR simulations\
    \ serve\\nas invaluable benchmarks, their immense computational\\ncost prohibits their routine application in large-scale\
    \ pa-\\nrameter inference campaigns. Consequently, a diverse\\nsuite of semi-analytical and phenomenological models\\\
    nhas been developed, each presenting unique trade-offs\\nin terms of computational e\\ufb00iciency, the inclusion of\\\
    nhigher-order waveform modes, and the treatment of spin\\nprecession.\\nThis inherent diversity among waveform models\
    \ in-\\nevitably introduces model-dependent biases into the in-\\nferred astrophysical parameters. This poses a substan-\\\
    n\\n2\\ntial challenge to deriving robust scientific conclusions,\\nparticularly for events like GW231123, which exhibits\\\
    ncharacteristics indicative of a high-mass and potentially\\nhighly precessing system.\\nFor such events, the sys-\\ntematic\
    \ uncertainties arising from waveform modeling\\ncan become a dominant factor, potentially outweighing\\nthe statistical\
    \ uncertainties inherent in the measurement\\nprocess itself. The core problem extends beyond merely\\nobserving discrepancies\
    \ between models; it demands an\\nunderstanding of *why* these models yield different re-\\nsults, and crucially, which\
    \ specific physical aspects of\\nthe source are most sensitive to these model approxima-\\ntions.\\nWithout a clear and\
    \ systematic understanding\\nof these dependencies, our capacity to confidently con-\\nstrain astrophysical properties\
    \ is severely hampered.\\nIn this paper, we introduce and implement a novel,\\nphysics-informed framework designed to\
    \ systematically\\ndecompose and attribute discrepancies among multiple\\ngravitational-wave waveform models for the GW231123\\\
    nevent (Li et al. 2025).\\nWe rigorously investigate\\nfive distinct waveform models: NRSur7dq4, IMRPhe-\\nnomXO4a, SEOBNRv5PHM,\
    \ IMRPhenomXPHM, and\\nIMRPhenomTPHM (Li et al. 2025).\\nOur central innovation, termed \\u201dPhysics-Informed\\nDiscrepancy\
    \ Decomposition,\\u201d transcends simple global\\ncomparisons of posterior distributions. Instead, we de-\\nfine a set\
    \ of physically motivated parameter subspaces,\\nspecifically those related to the binary\\u2019s mass and dis-\\ntance,\
    \ the effective spin, the individual spin compo-\\nnents and orbital orientation, and the properties of the\\nfinal remnant\
    \ black hole.\\nBy meticulously quantify-\\ning multi-dimensional divergences within these targeted\\nsubspaces, our aim\
    \ is to establish direct correlations be-\\ntween observed discrepancies in inferred parameters and\\nknown differences\
    \ in the underlying physical approxima-\\ntions of the waveform models, such as their treatment of\\nspin precession or\
    \ the inclusion of higher-order waveform\\nmodes (Li et al. 2025).\\nTo verify the e\\ufb00icacy and provide comprehensive\
    \ in-\\nsights into our approach, we first perform extensive ex-\\nploratory data analysis. This includes computing one-\\\
    ndimensional marginal posterior comparisons using ad-\\nvanced statistical metrics such as the Jensen-Shannon\\nDivergence\
    \ (JSD) and the 1-Wasserstein distance, es-\\ntablishing a baseline of model agreement and disagree-\\nment. We then employ\
    \ Uniform Manifold Approxima-\\ntion and Projection (UMAP) to visualize and analyze\\nthe complex high-dimensional degeneracies\
    \ and discrep-\\nancies across the full parameter space, revealing how\\ndifferent models occupy and cluster within this\
    \ space.\\nThe subsequent physics-informed decomposition pro-\\nvides quantitative metrics of disagreement within each\\\
    nof our predefined physical subspaces. By systematically\\ncorrelating these subspace-specific discrepancies with\\nthe\
    \ known physical characteristics and approximation\\nschemes of the waveform models, we robustly identify\\nwhich astrophysical\
    \ properties of GW231123 are consis-\\ntently constrained across all models and which remain\\nhighly sensitive to specific\
    \ waveform model approxima-\\ntions.\\nThis comprehensive methodology allows us to\\nprovide clear, interpretable insights\
    \ into the robustness\\nof astrophysical inferences and to derive a more reliable\\nset of consensus constraints for GW231123,\
    \ thereby ad-\\nvancing our ability to extract confident scientific knowl-\\nedge from complex gravitational-wave signals.\"\
    \n  },\n  {\n    \"name\": \"METHODS\",\n    \"text\": \"2.1. Data Acquisition and Pre-processing\\nOur\\nanalysis\\ninitiates\\\
    nwith\\nthe\\nacquisition\\nand\\nmeticulous pre-processing of posterior samples de-\\nrived from the gravitational-wave\
    \ event GW231123.\\nThese samples,\\nrepresenting the probability distri-\\nbutions\\nof\\nvarious\\nsource\\nparameters,\\\
    nwere\\ngen-\\nerated using five distinct gravitational-wave wave-\\nform models: NRSur7dq4, IMRPhenomXO4a, SEOB-\\nNRv5PHM,\
    \ IMRPhenomXPHM, and IMRPhenomT-\"\n  },\n  {\n    \"name\": \"PHM\",\n    \"text\": \"Each\\nmodel\\u2019s\\nposterior\\\
    nsamples\\nwere\\npro-\\nvided as individual CSV files, specifically located at\\n\\u2018/mnt/ceph/users/fvillaescusa/AstroPilot/GW/Iteration1/data/GW\\\
    n\\u2018/mnt/ceph/users/fvillaescusa/AstroPilot/GW/Iteration1/data/GW\\n\\u2018/mnt/ceph/users/fvillaescusa/AstroPilot/GW/Iteration1/data/GW\\\
    n\\u2018/mnt/ceph/users/fvillaescusa/AstroPilot/GW/Iteration1/data/GW\\nand \\u2018/mnt/ceph/users/fvillaescusa/AstroPilot/GW/Iteration1/data\\\
    nUpon loading, each CSV file was parsed into a sep-\\narate pandas DataFrame (Shanbhag & Chimalakonda\\n2022).\\nTo facilitate\
    \ unified analysis while preserving\\nmodel attribution, a \\u2019model\\u2019 column was appended to\\neach DataFrame,\
    \ explicitly identifying the waveform\\nmodel from which the samples originated. These indi-\\nvidual DataFrames were\
    \ then consolidated into a single,\\nmaster Python dictionary, with model names serving as\\nkeys, providing a structured\
    \ and accessible representa-\\ntion of the entire dataset.\\nA critical step in pre-processing involved thorough\\ndata\
    \ cleaning and verification (Khan et al. 2019; Lima\\net al. 2024). This included confirming the consistency of\\ncolumn\
    \ names across all files, checking for the presence\\nof any \\u2018NaN\\u2018 or missing values (none were found, as\
    \ ex-\\npected for posterior samples of this nature) (Khan et al.\\n2019), and verifying the sensible range of log_likelihood\\\
    nvalues.\\n2.2. Exploratory Data Analysis and Baseline\\nComparison\\n\\n3\\nPrior to undertaking advanced discrepancy\
    \ decompo-\\nsition, we performed an extensive exploratory data anal-\\nysis to establish a baseline understanding of\
    \ the agree-\\nments and disagreements among the five waveform mod-\\nels. This phase provided initial quantitative insights\
    \ into\\nthe parameter inferences for GW231123 (Cuceu et al.\\n2025; Collaboration et al. 2025).\\n2.2.1. Summary Statistics\\\
    nFor each of the five waveform models, we computed\\nkey summary statistics for the following astrophysi-\\ncal parameters:\
    \ mass_1_source (primary component\\nmass), mass_2_source (secondary component mass),\\nchi_eff (effective inspiral spin\
    \ parameter), chi_p (pre-\\ncessing spin parameter), redshift, final_mass_source\\n(remnant black hole mass), and final_spin\
    \ (remnant\\nblack hole spin). Specifically, we calculated the median\\nand the 90% credible interval (defined by the\
    \ 5th and\\n95th percentiles) for the 1D marginal posterior distri-\\nbution of each parameter. These statistics were\
    \ com-\\npiled into a comprehensive table, offering an immediate,\\nquantitative overview of the central tendencies and\
    \ un-\\ncertainties predicted by each model.\\n2.2.2. Pairwise Statistical Divergence\\nTo rigorously quantify the disagreement\
    \ between the\\n1D marginal posterior distributions of each parameter\\nacross all model pairs, we employed two robust\
    \ statisti-\\ncal divergence metrics: the Jensen-Shannon Divergence\\n(JSD) (Nielsen 2022; Hoyos-Osorio & Sanchez-Giraldo\\\
    n2024) and the 1-Wasserstein distance.For each parame-\\nter, and for every unique pair of waveform models, the\\nfollowing\
    \ procedure was applied:\"\n  },\n  {\n    \"name\": \"The 1D marginal posterior samples for the given\",\n    \"text\"\
    : \"parameter from each model were extracted.\"\n  },\n  {\n    \"name\": \"A Kernel Density Estimator (KDE) was used\
    \ to\",\n    \"text\": \"estimate the Probability Density Function (PDF)\\nfor each set of samples.\\nA common, optimized\\\
    nbandwidth (e.g., determined by Scott\\u2019s rule or Sil-\\nverman\\u2019s rule) was applied across all PDFs for a\\\
    ngiven parameter to ensure consistent smoothing.\"\n  },\n  {\n    \"name\": \"The JSD was calculated between the estimated\"\
    ,\n    \"text\": \"PDFs of the two models. The JSD is a symmetric\\nand finite measure of the similarity between two\\\
    nprobability distributions, ranging from 0 (identi-\\ncal distributions) to 1 (maximally divergent dis-\\ntributions),\
    \ and is based on the Kullback-Leibler\\ndivergence.\"\n  },\n  {\n    \"name\": \"The 1-Wasserstein distance (also known\
    \ as Earth\",\n    \"text\": \"Mover\\u2019s Distance) was computed between the em-\\npirical distributions of the two\
    \ models. This met-\\nric quantifies the minimum cost of transforming\\none distribution into the other, effectively mea-\\\
    nsuring the \\u201ddistance\\u201d between probability distri-\\nbutions.\\nThis process yielded two 5x5 symmetric matrices\
    \ for\\neach key astrophysical parameter, one for JSD values\\nand one for 1-Wasserstein distances.\\nThese matrices\\\
    nserved as a quantitative baseline for understanding the\\ndegree of agreement or disagreement between models on\\na parameter-by-parameter\
    \ basis, highlighting where sig-\\nnificant univariate discrepancies first emerge.\\n2.3. High-Dimensional Degeneracy\
    \ and Discrepancy\\nAnalysis\\nTo gain a holistic understanding of how the different\\nwaveform models populate the high-dimensional\
    \ param-\\neter space and to visualize complex degeneracies, we em-\\nployed Uniform Manifold Approximation and Projection\\\
    n(UMAP) (Ghojogh et al. 2021; Vela et al. 2024).\\n2.3.1. Data Preparation for UMAP\\nAll posterior samples from the five\
    \ waveform models\\nwere combined into a single, large DataFrame.\\nThis\\nconsolidated dataset included all 13 physical\
    \ parame-\\nters typically inferred for binary black hole mergers. To\\nensure that parameters with differing scales did\
    \ not dis-\\nproportionately influence the dimensionality reduction,\\nall parameter columns were standardized using z-scoring\\\
    n(subtracting the mean and dividing by the standard de-\\nviation across the combined dataset). The \\u2019model\\u2019\
    \ col-\\numn was retained to allow for post-projection attribu-\\ntion and analysis.\\n2.3.2. Uniform Manifold Approximation\
    \ and Projection\"\n  },\n  {\n    \"name\": \"(UMAP)\",\n    \"text\": \"The UMAP algorithm was applied to the standard-\\\
    nized, high-dimensional parameter space.\\nUMAP is\\na non-linear dimensionality reduction technique that\\nconstructs\
    \ a high-dimensional graph representing the\\ndata\\u2019s topological structure and then optimizes a low-\\ndimensional\
    \ graph to be as structurally similar as pos-\\nsible (Wang 2024). Our primary goal was to project the\\nhigh-dimensional\
    \ parameter space (encompassing all 13\\nphysical parameters) down to a 2D space, thereby en-\\nabling intuitive visualization\
    \ of the complex, non-linear\\nrelationships and degeneracies inherent in the posterior\\ndistributions (Wang et al. 2021;\
    \ Wang 2024).\\nWe utilized the \\u2018umap-learn\\u2018 library for this imple-\\nmentation.\\nKey hyperparameters, n_neighbors\
    \ (con-\\ntrolling the balance between local and global structure\\npreservation) and min_dist (controlling how tightly\\\
    n\\n4\\npoints are packed together), were tuned to optimize the\\nembedding quality (Liao et al. 2023,?).\\nInitial values\\\
    nof n_neighbors = 50 and min_dist = 0.1 were used\\nas a starting point (Yang et al. 2024; Jung et al. 2025),\\nwith iterative\
    \ adjustments made to achieve a robust rep-\\nresentation that captures both the local clustering and\\nglobal separation\
    \ of the data (Lin & Fukuyama 2024).\\nThe output of the UMAP transformation was a set of\\n2D coordinates (UMAP_1, UMAP_2)\
    \ for each pos-\\nterior sample, representing its position in the learned\\nlow-dimensional manifold.\\n2.3.3. Analysis\
    \ of UMAP Embedding\\nThe generated 2D UMAP embedding provided a pow-\\nerful visual and analytical tool to assess the\
    \ high-\\ndimensional discrepancies (Negro et al. 2025). By filter-\\ning the UMAP coordinates by their associated \\\
    u2019model\\u2019\\nlabel, we could qualitatively and quantitatively exam-\\nine how the posterior samples for each waveform\
    \ model\\noccupy and cluster within this reduced space (Dimple\\net al. 2023; Bufano et al. 2024).\\nWe specifically in-\\\
    nvestigated whether the point clouds corresponding to\\ndifferent models exhibited systematic shifts, changes in\\noverall\
    \ shape, or differences in density concentration.\\nFor instance, we analyzed if models with fundamen-\\ntally different\
    \ physical approximations, such as IMR-\\nPhenomXPHM (which includes a \\u201dtwisting-up\\u201d preces-\\nsion formalism)\
    \ and NRSur7dq4 (a numerical relativity\\nsurrogate), showed distinct, non-overlapping regions in\\nthe UMAP space (Houba\
    \ 2025), indicating significant\\nhigh-dimensional disagreements.\\n2.4. Physics-Informed Discrepancy Decomposition\\\
    nThe core of our methodology lies in the Physics-\\nInformed Discrepancy Decomposition (Dick et al. 2025),\\nwhich systematically\
    \ dissects the overall model disagree-\\nments and attributes them to specific physical effects\\n(Dick et al. 2025) and\
    \ the corresponding approximations\\nwithin the waveform models (Mu et al. 2025). This ap-\\nproach goes beyond global\
    \ comparisons by focusing on\\nphysically motivated parameter subspaces (Dick et al.\\n2025).\\n2.4.1. Definition of Physical\
    \ Parameter Subspaces\\nBased on our understanding of binary black hole\\nphysics and the known characteristics and approxima-\\\
    ntion schemes of the waveform models (Liu et al. 2023;\\nMukherjee et al. 2024; Kapil et al. 2024), we meticu-\\nlously\
    \ defined four distinct parameter subspaces. These\\nsubspaces were designed to isolate specific physical as-\\npects\
    \ of the binary merger that are known to be treated\\ndifferently across waveform models (Kapil et al. 2024).\\nFor each\
    \ subspace, we created subsets of the posterior\\ndata, containing only the relevant parameters.\"\n  },\n  {\n    \"\
    name\": \"Mass & Distance Subspace:\",\n    \"text\": \"This subspace\\nincludes\\n(mass_1_source,\\nmass_2_source,\\\
    nredshift).\\nThese parameters are fundamental\\nto the overall amplitude and frequency evolution\\nof the gravitational-wave\
    \ signal. Discrepancies in\\nthis subspace can often be attributed to differ-\\nences in the leading-order inspiral dynamics\
    \ or\\nthe calibration against astrophysical priors.\"\n  },\n  {\n    \"name\": \"Effective\",\n    \"text\": \"Spin\\\
    nSubspace:\\nComprising\\n(chi_eff, chi_p), this subspace captures the\\ndominant, orbit-averaged effects of spin. chi_eff\\\
    nprimarily influences the inspiral rate, while chi_p\\nquantifies the strength of orbital plane precession.\\nDisagreements\
    \ here reflect how models approx-\\nimate the average spin effects throughout the\\ninspiral.\"\n  },\n  {\n    \"name\"\
    : \"Individual Spin & Orientation Subspace:\",\n    \"text\": \"This\\nis\\na\\nhigh-dimensional\\nsubspace\\nconsist-\\\
    ning\\nof\\n(a_1,\\na_2,\\ncos_tilt_1,\\ncos_tilt_2,\\ncos_theta_jn, phi_jl).\\nThese parameters de-\\nscribe the detailed\
    \ magnitudes and orientations of\\nthe individual black hole spins, as well as the orien-\\ntation of the binary\\u2019s\
    \ orbital angular momentum\\nrelative to the line of sight. This subspace is par-\\nticularly sensitive to the treatment\
    \ of spin preces-\\nsion, including the full precessional dynamics (as\\nin NRSur7dq4 and SEOBNRv5PHM) versus sim-\\nplified\
    \ \\u201dtwisting-up\\u201d formalisms (as in IMRPhe-\\nnomXPHM and IMRPhenomTPHM). Significant\\ndiscrepancies in this\
    \ subspace directly indicate dif-\\nferences in how models handle the complex inter-\\nplay of spins and orbital dynamics.\"\
    \n  },\n  {\n    \"name\": \"Remnant Properties Subspace: This subspace\",\n    \"text\": \"includes\\n(final_mass_source,\\\
    nfinal_spin).\\nThese parameters represent the predicted proper-\\nties of the final black hole formed after the merger.\\\
    nThey are highly sensitive to the modeling of the\\nmerger-ringdown phase of the waveform, as well\\nas the accurate inclusion\
    \ of higher-order waveform\\nmodes, which become more prominent during this\\nphase.\\n2.4.2. Quantifying Subspace-Specific\
    \ Discrepancies\\nFor each of the four defined physical subspaces, and for\\nevery pairwise combination of the five waveform\
    \ mod-\\nels, we quantified the multi-dimensional disagreement\\nusing the multi-dimensional Jensen-Shannon Divergence\\\
    n(JSD) (Nielsen 2022; Hoyos-Osorio & Sanchez-Giraldo\\n\\n5\\n2024).The procedure for computing multi-dimensional\\nJSD\
    \ for a given subspace between two models (e.g.,\\nModel A and Model B) was as follows:\"\n  },\n  {\n    \"name\": \"\
    The posterior samples for the parameters within\",\n    \"text\": \"the specific subspace were extracted for both\\nModel\
    \ A and Model B.\"\n  },\n  {\n    \"name\": \"A multi-dimensional Kernel Density Estimator\",\n    \"text\": \"(KDE)\
    \ was employed to estimate the joint PDF for\\neach model\\u2019s samples within that subspace. This\\ninvolves estimating\
    \ the probability density across\\nthe entire multi-dimensional space spanned by the\\nsubspace parameters.\"\n  },\n\
    \  {\n    \"name\": \"The multi-dimensional JSD was then computed\",\n    \"text\": \"between the two estimated joint\
    \ PDFs. This met-\\nric provides a single scalar value quantifying the\\noverall divergence of the two models\\u2019 posterior\
    \ dis-\\ntributions within that specific physical subspace.\\nThis process resulted in four separate 5x5 discrepancy\\\
    nmatrices (Tsagris 2024), one for each physical subspace.\\nEach matrix element represented the multi-dimensional\\nJSD\
    \ (Alagoz 2024; Chanda et al. 2025) between a pair\\nof models within that particular subspace, thereby pro-\\nviding\
    \ a targeted measure of disagreement.\\n2.4.3. Correlation of Discrepancies with Model Physics\\nThe resulting discrepancy\
    \ matrices from the physics-\\ninformed decomposition were critically analyzed to es-\\ntablish direct links between the\
    \ magnitude of the ob-\\nserved discrepancies and the known physical differences\\nin the underlying waveform models.\\\
    nFor instance, we specifically compared the JSD val-\\nues in the \\u2019Individual Spin & Orientation\\u2019 matrix with\\\
    nthose in the \\u2019Mass & Distance\\u2019 matrix. We hypothe-\\nsized that models with fundamentally different treat-\\\
    nments of spin precession (e.g., IMRPhenomXPHM ver-\\nsus NRSur7dq4) would exhibit significantly larger JSD\\nvalues in\
    \ the highly sensitive spin and orientation sub-\\nspace compared to the more universally agreed-upon\\nmass and distance\
    \ subspace.\\nSimilarly, we examined\\nthe \\u2019Remnant Properties\\u2019 discrepancy matrix, anticipat-\\ning that\
    \ models incorporating a more complete treat-\\nment of higher-order modes (such as SEOBNRv5PHM\\nand IMRPhenomXPHM) would\
    \ show greater consis-\\ntency among themselves, while displaying larger diver-\\ngences with models that have a less\
    \ comprehensive rep-\\nresentation of the merger-ringdown phase, like IMRPhe-\\nnomXO4a. This systematic correlation allowed\
    \ us to at-\\ntribute discrepancies to specific physical approximations\\nwithin the models, moving beyond mere observation\
    \ of\\ndisagreement to understanding its underlying causes.\\n2.5. Robust Astrophysical Inference\\nThe final stage of\
    \ our analysis involved synthesiz-\\ning the findings from the exploratory data analysis,\\nhigh-dimensional embedding,\
    \ and physics-informed de-\\ncomposition to derive robust astrophysical constraints\\nfor GW231123 (Yuan et al. 2025;\
    \ Caputo et al. 2025;\\nTanikawa et al. 2025).\\n2.5.1. Identification of Robustly Constrained Parameters\\nA key objective\
    \ was to identify which astrophysical pa-\\nrameters for GW231123 are robustly constrained across\\nall five waveform\
    \ models, meaning their inferred pos-\\nterior distributions show high consistency regardless of\\nthe model choice (Aswathi\
    \ et al. 2025; Bartos & Haiman\\n2025). A parameter was deemed \\u201drobust\\u201d if the max-\\nimum pairwise Jensen-Shannon\
    \ Divergence (JSD) and\\n1-Wasserstein distance values among all model pairs (as\\ncalculated in Section 2.2) fell below\
    \ a pre-defined thresh-\\nold (e.g., JSD < 0.01). Furthermore, strong overlap in\\nthe medians and 90% credible intervals\
    \ across all mod-\\nels, as observed in the summary statistics, served as an\\nadditional indicator of robustness (Aswathi\
    \ et al. 2025).\\n2.5.2. Identification of Model-Dependent Parameters\\nConversely, parameters that failed to meet the\
    \ ro-\\nbustness criteria were classified as \\u201dmodel-dependent.\\u201d\\nFor these parameters, the systematic uncertainties\
    \ intro-\\nduced by waveform model choice were found to be sig-\\nnificant.\\nCrucially, our Physics-Informed Discrepancy\\\
    nDecomposition (Section 4.3) allowed us to pinpoint the\\nprimary physical origin of these discrepancies. For ex-\\nample,\
    \ if chi_p was identified as model-dependent, the\\nanalysis would then attribute this discrepancy to differ-\\ning treatments\
    \ of spin precession between phenomeno-\\nlogical and NR-calibrated models, based on the high\\nJSD values observed in\
    \ the \\u2019Individual Spin & Orien-\\ntation\\u2019 subspace.\\n2.5.3. Derivation of Consensus Astrophysical Constraints\\\
    nFor those parameters identified as robustly con-\\nstrained, we derived a final consensus measurement\\nfor GW231123\
    \ (Collaboration et al. 2025).\\nThis was\\nachieved by combining the posterior samples for that\\nspecific parameter\
    \ from all five waveform models into\\na single, aggregated dataset. From this combined dis-\\ntribution, the final consensus\
    \ median and 90% credible\\ninterval were computed, representing our most reliable,\\nmodel-agnostic measurement for that\
    \ property of the bi-\\nnary black hole system (Collaboration et al. 2025).\\n2.5.4. Final Results Compilation\\n\\n6\\\
    nThe comprehensive findings were compiled into a final\\nsummary table. This table explicitly listed all key astro-\\\
    nphysical parameters of GW231123. For each parameter,\\nit provided the derived consensus median and 90% cred-\\nible\
    \ interval if the parameter was deemed robust.\\nIf a parameter was classified as model-dependent, the\\ntable reported\
    \ the range of medians observed across\\nthe different models instead of a single consensus value,\\nclearly marking it\
    \ as such. An additional column pro-\\nvided a concise statement on whether the parameter\\nconstraint was \\u2019Robust\\\
    u2019 or \\u2019Model-Dependent\\u2019, along\\nwith a brief, physics-informed note explaining the ori-\\ngin of any significant\
    \ model dependency, directly link-\\ning back to the insights gained from the discrepancy de-\\ncomposition. This structured\
    \ presentation allowed for a\\nclear and interpretable assessment of the astrophysical\\ninferences for GW231123.\"\n\
