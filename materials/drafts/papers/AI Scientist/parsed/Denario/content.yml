    nWearable Step Counting: A Comparative Analysis of Deep Learning and Traditional Methods\\nHighlighting Data Imbalance\
    \ Challenges\\nDenario1\\n1Anthropic, Gemini & OpenAI servers. Planet Earth.\"\n  },\n  {\n    \"name\": \"ABSTRACT\"\
    ,\n    \"text\": \"Accurate and resource-efficient step counting from wearable devices in free-living conditions is crucial\\\
    nfor health monitoring, yet it presents challenges related to sensor placement, data sampling rates, and\\nindividual\
    \ demographics. This study investigated the trade-offs between accuracy and computational\\nefficiency for step counting,\
    \ evaluating lightweight deep learning models (a compact 1D Convolu-\\ntional Neural Network and a MobileNet-inspired\
    \ architecture) alongside a traditional peak-detection\\nalgorithm. We utilized accelerometer data from 39 participants,\
    \ collected from both hip and wrist lo-\\ncations at 100Hz and 25Hz sampling frequencies, employing a robust subject-independent\
    \ 5-fold cross-\\nvalidation scheme to assess generalizability. While the traditional peak-detection baseline achieved\\\
    nmoderate accuracy (approximately 10-11% Mean Absolute Percentage Error) for hip-worn data, its\\nperformance significantly\
    \ degraded on wrist-worn data.\\nUnexpectedly, both deep learning models\\nuniversally failed across all conditions, consistently\
    \ predicting zero steps, resulting in near-zero F1-\\nscores and 100% Mean Absolute Percentage Error. This failure occurred\
    \ despite successful training\\nloss reduction, indicating the models converged to a trivial solution due to extreme class\
    \ imbalance,\\nwhich Focal Loss could not adequately mitigate. Although the deep learning models were computa-\\ntionally\
    \ efficient with significantly fewer parameters and fast inference times, their lack of practical\\nstep detection capability\
    \ rendered further demographic analysis meaningless. These findings highlight\\na critical challenge in applying deep\
    \ learning to highly imbalanced physiological time-series for sparse\\nevent detection, emphasizing that optimizing loss\
    \ does not guarantee meaningful task performance.\\nKeywords: Convolutional neural networks, Cross-validation, GPU computing,\
    \ Neural networks, Time\\nseries analysis\"\n  },\n  {\n    \"name\": \"INTRODUCTION\",\n    \"text\": \"Physical activity\
    \ monitoring via wearable devices has\\nbecome a cornerstone of modern health management,\\noffering accessible and continuous\
    \ insights into an in-\\ndividual\\u2019s lifestyle.\\nAmong various physiological met-\\nrics, step counting stands out\
    \ as a fundamental and\\nwidely adopted indicator of daily physical activity. Ac-\\ncurate and reliable step detection,\
    \ particularly in uncon-\\nstrained free-living conditions, is therefore paramount\\nfor deriving meaningful health recommendations\
    \ and in-\\nterventions, crucial for promoting public health, aiding\\nin disease prevention, and supporting rehabilitation\
    \ pro-\\ngrams.\\nDespite its apparent simplicity, achieving robust and\\nprecise step counting from wearable sensor data\
    \ presents\\nsignificant challenges. The variability introduced by dif-\\nferent sensor placements, such as the wrist\
    \ versus the\\nhip, dramatically alters the characteristics of the raw\\naccelerometer signal due to varying movement\
    \ kinemat-\\nics and noise profiles (Pillai et al. 2020). Furthermore,\\nthe choice of data sampling rate introduces a\
    \ critical\\ntrade-off: higher frequencies capture richer signal detail\\nbut demand greater computational resources and\
    \ stor-\\nage, while lower frequencies conserve resources but risk\\nlosing critical information necessary for accurate\
    \ event\\ndetection. Individual differences in gait patterns, influ-\\nenced by factors such as age and sex, add another\
    \ layer\\nof complexity, making it difficult for models to general-\\nize across diverse user populations and necessitating\
    \ a\\ndemographic-aware approach (Pillai et al. 2020; Khan\\n& Abedi 2022).\\nBeyond these practical data acquisition\
    \ challenges, the\\nvery nature of step events within continuous accelerom-\\neter streams poses a profound challenge\
    \ for machine\\nlearning approaches: extreme class imbalance.\\nSteps\\nare discrete, transient events, meaning that the\
    \ vast\\nmajority of time points in a continuous recording corre-\\n\\n2\\nspond to \\u201dno step,\\u201d while actual\
    \ \\u201dstep\\u201d instances are\\nsparse.\\nThis severe imbalance, where non-step data\\npoints vastly outnumber actual\
    \ steps, can lead mod-\\nels to converge to trivial solutions (e.g., predicting no\\nsteps at all) and poses a considerable\
    \ hurdle for effec-\\ntive model training and performance in precise event de-\\ntection. Traditional signal processing\
    \ techniques, such\\nas peak detection algorithms, have historically been em-\\nployed for step counting due to their\
    \ interpretability and\\ncomputational lightness (Abadleh et al. 2018). While\\noften effective for well-behaved signals\
    \ (e.g., hip-worn\\nsensors during steady walking), their performance fre-\\nquently degrades in more dynamic or noisy\
    \ scenarios,\\nparticularly with wrist-worn devices where signal pat-\\nterns are more complex (Abadleh et al. 2018; Chen\
    \ &\\nPan 2024).\\nConcurrently, deep learning architectures\\nhave demonstrated remarkable capabilities in complex\\\
    ntime-series analysis, offering the potential to learn in-\\ntricate patterns directly from raw sensor data, poten-\\\
    ntially overcoming the limitations of fixed-rule algorithms\\n(Khan & Abedi 2022; Chen & Pan 2024).\\nHowever,\\ntheir\
    \ application to resource-constrained wearable de-\\nvices and, crucially, their robustness against challenges\\nlike\
    \ severe data imbalance for sparse physiological event\\ndetection, remain largely underexplored (Khan & Abedi\\n2022;\
    \ Chen & Pan 2024).\\nThis paper addresses these critical gaps by conducting\\na comprehensive comparative analysis of\
    \ step counting\\nperformance using both a traditional peak-detection al-\\ngorithm and lightweight deep learning models\
    \ (Abadleh\\net al. 2018; Khan & Abedi 2022; Koffman et al. 2024).\\nSpecifically, we investigate the trade-offs between\
    \ accu-\\nracy, measured by individual step detection (F1-score)\\nand total count error (Mean Absolute Percentage Error,\\\
    nMAPE), and computational efficiency (model size, in-\\nference time) (Pillai et al. 2020; Khan & Abedi 2022).\\nOur study\
    \ systematically evaluates these models across\\nvarying sensor locations (hip and wrist) and sampling\\nfrequencies (100Hz\
    \ and 25Hz) using accelerometer data\\ncollected from a diverse cohort of 39 participants in\\nfree-living conditions\
    \ (Pillai et al. 2020; Koffman et al.\\n2024). A key objective is to critically examine how ex-\\ntreme data imbalance\
    \ impacts the training and practical\\nutility of deep learning models for precise event detec-\\ntion, even when advanced\
    \ loss functions like Focal Loss\\nare employed (Pillai et al. 2020; Khan & Abedi 2022).\\nWe compare a compact 1D Convolutional\
    \ Neural Net-\\nwork (CNN) and a resource-efficient MobileNet-inspired\\narchitecture against a tuned peak-detection baseline\\\
    n(Abadleh et al. 2018; Khan & Abedi 2022).\\nTo rigorously assess generalizability and provide prac-\\ntical guidelines\
    \ for designing robust and resource-\\nconstrained wearable step counters, all models are sub-\\njected to a robust subject-independent\
    \ 5-fold cross-\\nvalidation scheme (Pillai et al. 2020,?).\\nPerformance\\nmetrics are meticulously calculated for both\
    \ individual\\nstep detection accuracy and overall step count precision,\\nalongside detailed measurements of model size\
    \ and in-\\nference speed. Furthermore, we investigate the impact\\nof participant demographics (age and sex) on model\
    \ per-\\nformance. By thoroughly comparing the strengths and\\nlimitations of traditional and deep learning approaches\\\
    nunder various real-world conditions, this work aims to\\nhighlight critical challenges in applying deep learning to\\\
    nhighly imbalanced physiological time-series data and of-\\nfer insights into designing more reliable and deployable\\\
    nwearable step counters (Pillai et al. 2020,?; Sedaghati\\net al. 2024).\"\n  },\n  {\n    \"name\": \"METHODS\",\n  \
    \  \"text\": \"This study employed a comprehensive methodology to\\ncompare deep learning and traditional signal processing\\\
    napproaches for step counting from wearable accelerom-\\neter data. The methods encompassed data preparation,\\nmodel\
    \ development and training, and a rigorous evalu-\\nation framework, all designed to address the challenges\\nof sensor\
    \ placement, sampling rates, and data imbalance\\nin free-living conditions.\\n2.1. Data preparation and exploratory data\
    \ analysis\\nThe initial phase involved loading, consolidating, and\\nthoroughly characterizing the collected accelerometer\\\
    ndata and associated metadata (Huang et al. 2022; Zhang\\net al. 2024).\\n2.1.1. Data loading and consolidation\\nAccelerometer\
    \ data were collected from 39 partici-\\npants using wearable devices, specifically from hip and\\nwrist locations, at\
    \ two distinct sampling frequencies:\\n100Hz and 25Hz. This resulted in four primary data con-\\nditions: Hip 100Hz, Hip\
    \ 25Hz, Wrist 100Hz, and Wrist\\n25Hz. Each participant\\u2019s data for each condition was\\nstored in separate files.\\\
    nA central \\u2018metadata_csv\\u2018 file contained demographic\\ninformation for all participants, including sex and\
    \ age\\nrange. A custom script was developed to parse all 39\\nparticipant files from each of the four conditions, load-\\\
    ning the three-axis accelerometer data (x, y, z) and merg-\\ning it with their corresponding demographic informa-\\ntion\
    \ from \\u2018metadata_csv\\u2018. This process created a uni-\\nfied data structure, linking each time-series recording\
    \ to\\nits specific condition (sensor location and sampling fre-\\nquency) and participant demographics (Haresamudram\\\
    net al. 2024).\\n\\n3\\n2.1.2. Exploratory analysis\\nPrior to any model development, a thorough ex-\\nploratory data\
    \ analysis (EDA) was conducted to under-\\nstand the dataset\\u2019s characteristics and identify poten-\\ntial anomalies\
    \ (Agarwal et al. 2024). Summary statis-\\ntics were computed to characterize participant demo-\\ngraphics and data recording\
    \ properties (Agarwal et al.\\n2024). The participant demographics are summarized\\nin Table 1. The average recording\
    \ duration and anno-\\nTable 1. Participant Demographics Summary (N=39)\\nCharacteristic\\nValue\\nSearch Methods\\nMultiple\
    \ approaches including paper-based, abstract-based, keyword-based, and natural lan-\\nguage queries (An et al. 2024).\
    \ Keyword extraction from abstracts and re-ranking based on\\nuser input (Agarwal et al. 2025,?).\\nRetrieval Techniques\\\
    nRAG architecture with vector databases and spatial visualization (An et al. 2024). Special-\\nized prompting and instructing\
    \ for context-aware generation (Agarwal et al. 2025,?).\\nDatabase Size\\n66,692 papers from 38 visualization venues (An\
    \ et al. 2024).\\nToolkit Availability\\nOpen-source on GitHub and Hugging Face (Agarwal et al. 2025,?).\\nSex (Female/Male)\\\
    n21 / 18 (Bingol & Basar 2012; Ding et al. 2025; Chen et al. 2025)\\nAge Range (18-25)\\n15 (Errey et al. 2025; Anda et\
    \ al. 2019; Yu et al. 2025; Siu et al. 2025; Yu et al. 2025)\\nAge Range (26-40)\\n14 (Pabico 2015; Das et al. 2025)\\\
    nAge Range (41+)\\n10 (Yucedag & Jatowt 2025,?)\\ntated step counts for each condition are presented in\\nTable 2 (Peddi\
    \ et al. 2024).\\nAdditionally, a meticu-\\nTable 2. Data Recording and Annotation Summary (Mean\\n\\u00b1 SD across participants)\\\
    nCondition\\nRecording Duration (min)\\nAnnotated Steps\\nHip 100Hz\\n55.4 \\u00b1 8.1\\n2810 \\u00b1 954\\nHip 25Hz\\\
    n55.4 \\u00b1 8.1\\n2810 \\u00b1 954\\nWrist 100Hz\\n54.9 \\u00b1 8.9\\n2785 \\u00b1 961\\nWrist 25Hz\\n54.9 \\u00b1 8.9\\\
    n2785 \\u00b1 961\\nlous check for missing values within the time-series ac-\\ncelerometer files was performed across\
    \ all conditions to\\nensure data integrity. No significant anomalies or miss-\\ning data points were identified that\
    \ would compromise\\nthe analysis (Sedaghati et al. 2024).\\n2.1.3. Data segmentation and labeling\\nTo enable the detection\
    \ of individual step events\\nwithin continuous accelerometer streams, a sliding win-\\ndow approach was applied to segment\
    \ the raw data\\n(Zhang et al. 2018; Tello et al. 2023; Marquez-Carpintero\\net al. 2025).\"\n  },\n  {\n    \"name\"\
    : \"Windowing:\",\n    \"text\": \"Each continuous three-axis ac-\\ncelerometer signal was segmented into fixed-size\\\
    nwindows. A window size of 2 seconds was chosen\\nto adequately capture a full gait cycle. This trans-\\nlated to 200\
    \ samples for data collected at 100Hz\\nand 50 samples for data collected at 25Hz.\"\n  },\n  {\n    \"name\": \"Overlap:\
    \ To ensure that step events were fully\",\n    \"text\": \"captured within multiple windows and to prevent\\nevents from\
    \ being missed at window boundaries, a\\nhigh degree of overlap was implemented. A 90%\\noverlap was used, meaning the\
    \ stride (the shift\\nbetween consecutive windows) was 20 samples for\\n100Hz data and 5 samples for 25Hz data.\"\n  },\n\
    \  {\n    \"name\": \"Label Generation: For each segmented window\",\n    \"text\": \"of raw accelerometer data, a corresponding\
    \ target\\nvector of the same length was created. This binary\\ntarget vector was derived directly from the ground-\\\
    ntruth step annotations. At every time index where\\na step event was annotated as \\u201d1\\u201d, the correspond-\\\
    ning index in the target vector was also set to \\u201d1\\u201d.\\nAll other indices in the target vector were set to\\\
    n\\u201d0\\u201d. This process generated a sparse binary time-\\nseries target for the deep learning models, where\\n\\\
    u201d1\\u201d indicated the precise moment of a step and\\n\\u201d0\\u201d indicated no step, reflecting the inherent\
    \ class\\nimbalance of step events within continuous physi-\\nological data.\\n2.1.4. Data splitting\\nTo rigorously assess\
    \ the generalizability of the mod-\\nels to unseen individuals, a subject-independent cross-\\nvalidation scheme was employed\
    \ (Dehghani et al. 2019).\\nA 5-fold group cross-validation strategy was imple-\\nmented, ensuring that all data from\
    \ a single participant\\nbelonged exclusively to one fold.\\nIn each iteration of\\nthe cross-validation, approximately\
    \ 31 participants (four\\nfolds) were used for model training, and the remaining\\napproximately 8 participants (one fold)\
    \ were reserved\\nfor testing. This process was repeated five times, with\\neach fold serving as the test set exactly\
    \ once (Yates et al.\\n2022; Gorriz et al. 2024).\\nThis entire cross-validation procedure was performed\\nindependently\
    \ for each of the four data conditions (Hip\\n100Hz, Hip 25Hz, Wrist 100Hz, Wrist 25Hz), allowing\\nfor a comprehensive\
    \ evaluation of model performance\\nunder varying sensor placements and sampling rates.\\n2.2. Model development and training\\\
    nThree distinct models were developed for step count-\\ning:\\na traditional signal processing baseline and two\\nlightweight\
    \ deep learning architectures, addressing the\\ntrade-offs between accuracy and computational effi-\\nciency (Chen 2018;\
    \ Khan & Abedi 2022).\\n\\n4\\n2.2.1. Baseline: peak-detection algorithm\\nAs a non-machine learning baseline, a traditional\\\
    npeak-detection algorithm was implemented. This algo-\\nrithm processes the accelerometer data in the following\\nsequence\
    \ for each time-series recording:\\nThe algorithm first detects peaks by analyzing dy-\\nnamic time windows and tracking\
    \ consecutive magni-\\ntude values to identify potential step events (Abadleh\\net al. 2018).\\nIt then applies thresholds\
    \ to filter valid\\npeaks, ensuring they exceed predefined minimum values\\nand maintain appropriate time intervals between\
    \ steps\\n(Klein 2024; Wei 2024).\\nAfter peak identification, the algorithm calculates step\\nlength using vertical acceleration\
    \ patterns between con-\\nsecutive valid peaks (Wei 2024).\"\n  },\n  {\n    \"name\": \"Vector Magnitude Calculation:\
    \ The Vector\",\n    \"text\": \"Magnitude (VM) of the three-axis acceleration\\nsignal was computed using the formula:\
    \ V M =\\np\\nx2 + y2 + z2. This provides a single scalar rep-\\nresentation of overall movement intensity.\"\n  },\n\
    \  {\n    \"name\": \"Band-Pass Filtering: The VM signal was then\",\n    \"text\": \"subjected to a 4th-order Butterworth\
    \ band-pass\\nfilter. The cutoff frequencies were set at 0.5 Hz\\nand 3 Hz.\\nThis filtering step is crucial for iso-\\\
    nlating the dominant frequency components asso-\\nciated with human walking, effectively removing\\nlow-frequency drift\
    \ and high-frequency noise.\"\n  },\n  {\n    \"name\": \"Peak Finding: A robust peak-finding algorithm,\",\n    \"text\"\
    : \"specifically \\u2018scipy.signal.find_peaks\\u2018, was applied\\nto the filtered VM signal.\\nTo optimize its per-\\\
    nformance for step detection, two critical param-\\neters were tuned: an appropriate height (ampli-\\ntude threshold)\
    \ to identify significant peaks corre-\\nsponding to steps, and a minimum distance (min-\\nimum separation between consecutive\
    \ peaks) to\\nprevent multiple detections for a single step and\\nensure physiological plausibility (e.g., preventing\\\
    ndetection of steps occurring faster than humanly\\npossible).\\nThese parameters were optimized by\\ntuning on a subset\
    \ of the training data within each\\ncross-validation fold to ensure adaptability to dif-\\nferent signal characteristics.\\\
    n2.2.2. Deep learning model 1: compact 1D-CNN\\nA compact 1D Convolutional Neural Network (CNN)\\nwas designed to learn\
    \ intricate patterns directly from the\\nraw, windowed accelerometer data (Shengwei & Jianjie\\n2018; Yampolsky et al.\
    \ 2025; Renault et al. 2025). The\\narchitecture was structured as follows:\\n\\u2022 Input Layer: The model accepts an\
    \ input win-\\ndow of accelerometer data with dimensions (N, 3),\\nwhere N represents the number of samples within\\nthe\
    \ 2-second window (200 for 100Hz data or 50 for\\n25Hz data), and 3 corresponds to the x, y, and z\\naccelerometer axes.\\\
    n\\u2022 Body: The core of the network consists of three\\nsequential blocks of 1D convolutional layers, each\\nfollowed\
    \ by Batch Normalization and ReLU ac-\\ntivation to introduce non-linearity and stabilize\\ntraining:\\n\\u2013 1D Convolutional\
    \ Layer with 32 filters, a ker-\\nnel size of 5, and ReLU activation.\\n\\u2013 Batch Normalization layer.\\n\\u2013 1D\
    \ Convolutional Layer with 64 filters, a ker-\\nnel size of 5, and ReLU activation.\\n\\u2013 Batch Normalization layer.\\\
    n\\u2013 1D Convolutional Layer with 128 filters, a\\nkernel size of 5, and ReLU activation.\\n\\u2013 Batch Normalization\
    \ layer.\\n\\u2022 Head: A final 1D Convolutional Layer served as\\nthe output layer. It used 1 filter, a kernel size\
    \ of\\n1, and a Sigmoid activation function. This con-\\nfiguration ensures that the output is a vector of\\nthe same\
    \ length as the input window, with each\\nvalue representing the predicted probability of a\\nstep occurring at that specific\
    \ time point.\\n2.2.3. Deep learning model 2: resource-efficient 1D-CNN\\n(MobileNet-inspired)\\nTo explore models with\
    \ reduced computational com-\\nplexity suitable for resource-constrained wearable de-\\nvices, a 1D-CNN architecture inspired\
    \ by MobileNet\\u2019s\\ndepthwise separable convolutions was developed.\\n\\u2022 Input Layer: Similar to the compact\
    \ CNN, the\\ninput is a window of size (N, 3), representing the\\naccelerometer data.\\n\\u2022 Body:\\nThe network\\\
    u2019s body comprises a series\\nof three depthwise separable convolution blocks.\\nEach block is designed to first perform\
    \ spatial\\nconvolution independently on each input chan-\\nnel (depthwise convolution) and then combine the\\noutputs\
    \ across channels using a pointwise convolu-\\ntion (1\\u00d71 convolution). This significantly reduces\\nthe number of\
    \ parameters and computational cost\\ncompared to standard convolutions. Each block\\nconsists of:\\n\\n5\\n\\u2013 1D\
    \ Depthwise Convolutional Layer with a\\nkernel size of 5 and ReLU activation.\\n\\u2013 1D Pointwise Convolutional Layer\
    \ (kernel\\nsize 1) to project to a higher dimension. The\\nnumber of filters for these pointwise layers\\nwere 32, 64,\
    \ and 128 for the first, second, and\\nthird blocks, respectively, effectively control-\\nling the output depth of each\
    \ block.\\n\\u2013 Batch Normalization layer.\\n\\u2022 Head: The output layer is identical to that of\\nthe compact CNN:\
    \ a final 1D Convolutional Layer\\nwith 1 filter, a kernel size of 1, and Sigmoid acti-\\nvation, producing a probability\
    \ time-series for the\\ninput window.\\n2.2.4. Training protocol\\nThe two deep learning models were trained within the\\\
    nestablished 5-fold subject-independent cross-validation\\nframework on available GPU resources (M\\u00fcller &\\nKramer\
    \ 2019; Liu et al. 2021).\\n\\u2022 Loss Function: Given the severe class imbalance\\ninherent in step detection (where\
    \ non-step time\\npoints vastly outnumber actual step events), a Fo-\\ncal Loss function was employed. This loss function\\\
    ndown-weights the contribution of easy-to-classify\\nexamples and focuses training on hard, misclassi-\\nfied examples.\
    \ The hyperparameters were set to\\n\\u03b3 = 2 and \\u03b1 = 0.25, where \\u03b3 controls the rate\\nat which easy examples\
    \ are down-weighted, and \\u03b1\\nbalances the importance of positive and negative\\nexamples.\\n\\u2022 Optimizer: The\
    \ Adam optimizer was used for\\nmodel weight updates, with an initial learning rate\\nof 0.001.\\n\\u2022 Learning Rate\
    \ Schedule: To optimize conver-\\ngence and prevent oscillations, a \\u2018ReduceLROn-\\nPlateau\\u2018 scheduler was\
    \ implemented. This sched-\\nuler automatically reduces the learning rate if the\\nvalidation loss stagnates for a predefined\
    \ number\\nof epochs.\\n\\u2022 Epochs and Early Stopping:\\nModels were\\ntrained for a maximum of 50 epochs.\\nTo pre-\\\
    nvent overfitting and optimize training time, an\\nearly stopping criterion was applied. Training was\\nhalted if the\
    \ validation loss did not improve for 5\\nconsecutive epochs (patience of 5 epochs).\\nImportantly, a separate set of\
    \ deep learning models\\nwas trained independently for each of the four data\\nconditions (Hip-100Hz, Hip-25Hz, Wrist-100Hz,\
    \ Wrist-\\n25Hz) to ensure optimal performance specific to the sen-\\nsor placement and sampling frequency (Goodarzi et\
    \ al.\\n2023).\\n2.3. Evaluation and statistical analysis\\nFollowing the training and testing phases across all\\ncross-validation\
    \ folds, a comprehensive evaluation and\\nstatistical analysis were performed to assess model per-\\nformance, computational\
    \ efficiency, and the impact of\\ndemographic factors (Ferrer et al. 2024; Beddar-Wiesing\\net al. 2025,?).\\n2.3.1. Post-processing\
    \ and step identification\\nThe deep learning models output a probability time-\\nseries for each input window, indicating\
    \ the likelihood\\nof a step at each time point. To convert these proba-\\nbilities into discrete step events and reconstruct\
    \ the full\\nrecording\\u2019s predictions: (Foumani et al. 2023)\"\n  },\n  {\n    \"name\": \"Stitching: The probability\
    \ outputs from all over-\",\n    \"text\": \"lapping windows were meticulously stitched to-\\ngether to reconstruct a\
    \ continuous probability\\ntime-series for the entire recording duration. For\\ntime points that were covered by multiple\
    \ over-\\nlapping windows, the probabilities from these win-\\ndows were averaged to produce a refined, consoli-\\ndated\
    \ probability estimate.\"\n  },\n  {\n    \"name\": \"Peak Detection: A peak-finding algorithm was\",\n    \"text\": \"\
    then applied to this reconstructed, full-length\\nprobability time-series.\\nA step was identified if\\na peak in the\
    \ probability signal exceeded a prede-\\nfined threshold of 0.5. Additionally, a minimum\\ndistance constraint was applied\
    \ between identified\\npeaks to ensure that each detected peak corre-\\nsponded to a distinct step and to adhere to physio-\\\
    nlogical walking rates. This minimum distance was\\nset to 25 samples for 100Hz data (corresponding\\nto approximately\
    \ 0.25 seconds, or a maximum of 4\\nsteps/second) and 6 samples for 25Hz data (simi-\\nlarly representing approximately\
    \ 0.24 seconds).\\n2.3.2. Performance metrics\\nTwo primary categories of performance metrics were\\ncalculated for each\
    \ model on each test participant to\\nprovide a holistic view of accuracy and efficiency (Naser\\n& Alavi 2020; Blagec\
    \ et al. 2021; Terven et al. 2025).\"\n  },\n  {\n    \"name\": \"Step Detection Performance: This set of met-\",\n  \
    \  \"text\": \"rics focused on the precise identification of individ-\\nual step events. Predicted steps were matched\
    \ to\\nground-truth annotated steps within a tolerance\\nwindow of \\u00b1150ms. Based on this matching, True\\n\\n6\\\
    nPositives (TP - correctly identified steps), False\\nPositives (FP - incorrectly identified steps), and\\nFalse Negatives\
    \ (FN - missed ground-truth steps)\\nwere determined. From these counts, the following\\nmetrics were calculated:\\n\\\
    u2022 Precision:\\nThe proportion of correctly\\nidentified steps among all predicted steps\"\n  },\n  {\n    \"name\"\
    : \"(TP/(TP + FP))\",\n    \"text\": \"\\u2022 Recall:\\nThe proportion of correctly iden-\\ntified steps among all actual\
    \ ground-truth\\nsteps (TP/(TP + FN)).\\n\\u2022 F1-Score: The harmonic mean of Precision\\nand Recall, providing a balanced\
    \ measure\\nof step detection accuracy (2 \\u00d7 (Precision \\u00d7\\nRecall)/(Precision + Recall)).\"\n  },\n  {\n \
    \   \"name\": \"Step Count Accuracy: These metrics evaluated\",\n    \"text\": \"the overall accuracy of the total step\
    \ count for each\\nparticipant\\u2019s recording:\\n\\u2022 Total Predicted Steps vs.\\nTotal True\\nSteps:\\nA direct\
    \ comparison of the abso-\\nlute number of steps predicted by the model\\nagainst the total number of ground-truth\\nsteps.\\\
    n\\u2022 Mean Absolute Error (MAE): The aver-\\nage absolute difference between the predicted\\nand true step counts per\
    \ recording.\\n\\u2022 Mean\\nAbsolute\\nPercentage\\nError\"\n  },\n  {\n    \"name\": \"(MAPE):\",\n    \"text\": \"\
    The\\naverage\\nabsolute\\nper-\\ncentage difference between the predicted\\nand\\ntrue\\nstep\\ncounts,\\ncalculated\\\
    nas\\n1\\nn\\nPn\\ni=1\\nTrueStepsi\\u2212PredictedStepsi\\nTrueStepsi\\n\\n\\u00d7\\n100%.\\nThis metric provided a relative\
    \ error mea-\\nsure, crucial for understanding practical util-\\nity.\"\n  },\n  {\n    \"name\": \"Computational Efficiency:\
    \ To assess the prac-\",\n    \"text\": \"tical deployability on wearable devices, computa-\\ntional efficiency metrics\
    \ were recorded:\\n\\u2022 Model Size: The total number of trainable\\nparameters for each deep learning model was\\nrecorded,\
    \ indicating the memory footprint.\\n\\u2022 Inference Time: The average time required\\nfor each model to process a full\
    \ 1-hour record-\\ning on a CPU was measured, providing an\\nestimate of real-time processing capabilities.\\n2.3.3. Statistical\
    \ analysis\\nAll performance metrics aggregated from the test folds\\nacross the 5-fold cross-validation were used for\
    \ final sta-\\ntistical analysis (Yates et al. 2022; Mahoney et al. 2023;\\nLeinonen et al. 2024).\"\n  },\n  {\n    \"\
    name\": \"Overall Performance: For each of the four data\",\n    \"text\": \"conditions (Hip-100Hz, Hip-25Hz, Wrist-100Hz,\\\
    nWrist-25Hz), a summary table was presented.\\nThis table compared the mean and standard devi-\\nation of the F1-Score,\
    \ MAPE, Model Size, and In-\\nference Time for the three evaluated models: the\\nPeak-Detection Baseline, the Compact\
    \ 1D-CNN,\\nand the Resource-Efficient 1D-CNN.\"\n  },\n  {\n    \"name\": \"Impact of Location and Frequency: To statis-\"\
    ,\n    \"text\": \"tically assess the influence of sensor placement and\\nsampling frequency on model performance, paired\\\
    nWilcoxon signed-rank tests were conducted on the\\nper-participant evaluation metrics (F1-score and\\nMAPE). Significance\
    \ was set at p < 0.05. Specifi-\\ncally, comparisons were made between:\\n\\u2022 Wrist vs.\\nHip performance, analyzed\
    \ sepa-\\nrately for 100Hz and 25Hz data.\\n\\u2022 100Hz vs. 25Hz performance, analyzed sepa-\\nrately for Wrist and\
    \ Hip data.\"\n  },\n  {\n    \"name\": \"Demographic Analysis: For the best perform-\",\n    \"text\": \"ing deep learning\
    \ model (if any showed practical\\nutility, as highlighted in the abstract), the test\"\n  },\n  {\n    \"name\": \"results\
    \ were stratified by participant sex and age\",\n    \"text\": \"group. To determine if there were statistically sig-\\\
    nnificant differences in model performance (specifi-\\ncally MAPE) across these demographic subgroups,\\nMann-Whitney\
    \ U tests were employed for com-\\nparing performance between sexes, and Kruskal-\\nWallis tests were used for comparing\
    \ performance\\nacross the three age groups.\\nAll generated data, including model weights from each\\ncross-validation\
    \ fold and detailed evaluation results,\\nwere systematically saved to ensure reproducibility and\\nfacilitate comprehensive\
    \ reporting (Kn\\u00fcpfer & Callow\\n2025; Li et al. 2025).\"\n  },\n  {\n    \"name\": \"RESULTS\",\n    \"text\": \"\
    This section details the outcomes of the comparative\\nanalysis between a traditional signal processing baseline\\nand\
    \ two lightweight deep learning architectures for step\\ncounting. The evaluation was conducted across four dis-\\ntinct\
    \ conditions, varying by sensor location (hip, wrist)\\nand sampling frequency (100Hz, 25Hz). We present re-\\nsults for\
    \ step detection accuracy (F1-Score), step count\\n\\n7\\nerror (Mean Absolute Percentage Error, MAPE), and\\ncomputational\
    \ efficiency (model size, inference time),\\nfollowed by a statistical investigation into the effects of\\nsensor placement,\
    \ sampling rate, and participant demo-\\ngraphics.\\nThe initial data preparation steps, including loading,\\nconsolidation,\
    \ segmentation, and the establishment of\\nthe 5-fold subject-independent cross-validation scheme,\\nwere successfully\
    \ completed as described in the Methods\\nsection. This robust cross-validation approach ensured\\nthat data from any\
    \ single participant was confined to\\na single fold, preventing data leakage and enabling a\\nreliable evaluation of\
    \ model generalization to unseen in-\\ndividuals.\\n3.1. Overall model performance\\nThe performance of the three models\
    \ was rigor-\\nously evaluated using a 5-fold subject-independent cross-\\nvalidation protocol. The aggregated results,\
    \ presenting\\nthe mean and standard deviation for key metrics across\\nall test folds, are summarized in Table 3. Visual\
    \ rep-\\nresentations of these performance distributions are pro-\\nvided in Figure 1.\\nFigure 1. Performance distributions\
    \ of step counting mod-\\nels across sensor locations and sampling frequencies.\\nThe\\nleft panel shows F1-score and\
    \ the right panel shows Mean\\nAbsolute Percentage Error (MAPE). Deep learning models\\n(CompactCNN, MobileNetCNN) consistently\
    \ exhibit near-\\nzero F1-scores and 100% MAPE, indicating a complete fail-\\nure in step detection. The Baseline algorithm\
    \ performs mod-\\nerately with hip-worn sensors but shows significant degrada-\\ntion with wrist-worn sensors, demonstrating\
    \ the strong in-\\nfluence of sensor placement on its accuracy.\\n3.2. Baseline peak-detection algorithm performance\\\
    nThe\\ntraditional\\npeak-detection\\nalgorithm,\\nimple-\\nmented as our non-machine learning baseline, demon-\\nstrated\
    \ moderate success, particularly when processing\\ndata from hip-worn sensors, as summarized in Table 3\\nand visually\
    \ represented in Figure 1. For the Hip_100Hz\\nand Hip_25Hz conditions, it achieved mean F1-scores of\\n0.420 and 0.436,\
    \ respectively. Crucially, the Mean Abso-\\nlute Percentage Error (MAPE) for these conditions was\\nrelatively low, approximately\
    \ 10\\u201311%.\\nThis indicates\\nthat while not perfectly precise, the baseline algorithm\\noffered a reasonable capability\
    \ to detect and count steps\\nfrom hip-worn accelerometer data.\\nThis performance\\naligns with expectations, as hip-worn\
    \ sensors typically\\ncapture clearer, less noisy gait signals compared to other\\nlocations, as discussed in the introduction.\
    \ An exam-\\nple of the baseline algorithm\\u2019s performance on hip-worn\\ndata is shown in Figure 2.\\nFigure 2.\\\
    nFiltered accelerometer vector magnitude data\\nfrom a hip-worn sensor at 25Hz (P01), illustrating the base-\\nline peak-detection\
    \ algorithm. Detected peaks are marked.\\nThis example corresponds to a condition where the algorithm\\ndemonstrated moderate\
    \ step detection accuracy.\\nHowever, the algorithm\\u2019s performance degraded dra-\\nmatically when applied to wrist-worn\
    \ data. As shown in\\nTable 3 and Figure 1, the MAPE surged to over 50% for\\nboth Wrist_100Hz (57.62%) and Wrist_25Hz\
    \ (54.69%)\\nconditions. This significant increase in error underscores\\nthe challenge of distinguishing true step-related\
    \ move-\\nments from other wrist activities using simple peak de-\\ntection on the accelerometer vector magnitude.\\nThe\\\
    ncomplex and variable signal patterns inherent to wrist\\nmovements, as highlighted in the introduction, evidently\\noverwhelm\
    \ the fixed-rule approach of the peak-detection\\nalgorithm, leading to a substantial number of misclassi-\\nfications\
    \ (false positives and false negatives). Figure 3\\nillustrates the difficulties encountered when applying the\\npeak\
    \ detection to wrist-worn data, with another exam-\\nple provided in Figure 4.\\n3.3. Deep learning models: CompactCNN\
    \ and\\nMobileNetCNN performance\\nA striking and unexpected outcome of this study was\\nthe complete failure of both\
    \ deep learning models, the\\nCompactCNN and the MobileNet-inspired CNN, across\\nall evaluated conditions (Hip 100Hz,\
    \ Hip 25Hz, Wrist\\n100Hz, Wrist 25Hz). As detailed in Table 3 and visually\\nconfirmed in Figure 1, the F1-scores for\
    \ both architec-\\ntures were effectively zero (0.000 \\u00b1 0.000 or 0.001), and\\nthe MAPE was consistently 100% (or\
    \ very close to it,\\n\\n8\\nTable 3. Overall Performance Summary (Mean \\u00b1 SD) Across All Models and Conditions\\\
