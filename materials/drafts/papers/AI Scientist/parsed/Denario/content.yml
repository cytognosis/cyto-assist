    \ Denario can be run in two different ways:\\n\\u2022 Python API\\n\\u2022 Graphical User Interface (GUI)\\n20\\n\\nThe\
    \ Python API can be run in Python scripts or Jupyter notebooks, while the GUI can be run either\\nlocally or through a\
    \ web application. In the following subsections we detail the usage of each case.\\n4.1\\nPython API\\nThe main entrypoint\
    \ of Denario is its Python API, which allows the user to call the different modules.\\nFor that, the user firstly needs\
