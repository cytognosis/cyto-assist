    \   \"name\": \"ABSTRACT\",\n    \"text\": \"Understanding how Physics-Informed Neural Networks (PINNs) encode complex\
    \ physical systems\\nand the influence of parameters like initial conditions within their latent representations is crucial\
    \ for\\ninterpretability and application. This study investigates the geometric structure of the 10-dimensional\\nlatent\
    \ space generated by a PINN solving the 2D Burger\\u2019s equation across 25 different initial con-\\nditions. Using Principal\
    \ Component Analysis and subspace similarity measures, we analyze the set\\nof latent vectors for each initial condition\
    \ as a potential low-dimensional manifold embedded in R10,\\ncomparing and contrasting these structures across the dataset\
    \ of simulated solutions. The analysis\\nreveals a highly organized latent space; globally, the latent vectors occupy\
    \ an effectively 6-dimensional\\nsubspace capturing over 99% of variance. For each individual initial condition, the latent\
    \ vectors form\\na distinct, approximately 3-dimensional a\\ufb00ine manifold, a structure remarkably consistent across\
    \ all\\ntested conditions. Crucially, the primary effect of changing the initial condition is encoded as a trans-\\nlation\
    \ of this 3D manifold along a nearly one-dimensional path within the 10-dimensional latent space,\\nstrongly aligned with\
    \ the global principal component. Furthermore, these 3D manifolds are remark-\\nably parallel to each other, exhibiting\
    \ an average subspace similarity exceeding 0.98, with only subtle,\\nlow-dimensional variations in their orientation.\
    \ These findings demonstrate that the PINN learns a\\nhighly structured and e\\ufb00icient parameterization where initial\
    \ conditions select specific, geometrically\\nsimple, and highly related low-dimensional structures within the overall\
    \ latent space, offering valuable\\ninsights into the network\\u2019s internal encoding mechanisms and suggesting potential\
    \ avenues for model\\ninterpretation and compression.\\nKeywords: Neural networks, Computational astronomy, Principal\
    \ component analysis, Astronomy data\\nanalysis, Computational methods\"\n  },\n  {\n    \"name\": \"INTRODUCTION\",\n\
    \    \"text\": \"Physics-Informed Neural Networks (PINNs) represent\\na significant advancement in solving partial differential\\\
    nequations (PDEs) by embedding the governing physical\\nlaws directly into the neural network architecture and\\ntraining\
    \ objective.\\nThis approach offers compelling advantages, such as\\nthe ability to handle complex geometries and scenarios\\\
    nwith limited observational data, providing a mesh-free\\nalternative to traditional numerical techniques.\\nHow-\\never,\
    \ despite their successes, PINNs, like many deep\\nlearning models, often function as \\u201dblack boxes,\\u201d ob-\\\
    nscuring the precise mechanisms by which they learn and\\nrepresent the underlying physical phenomena. Under-\\nstanding\
    \ how these networks encode complex solution\\nlandscapes and incorporate the influence of problem pa-\\nrameters, such\
    \ as initial and boundary conditions, is\\nparamount for enhancing their reliability, interpretabil-\\nity, and facilitating\
    \ downstream applications like model\\ncompression or transfer learning.\\nA central element within many neural network\
    \ ar-\\nchitectures,\\nincluding PINNs,\\nis the latent space.\\nThis intermediate representation layer compresses high-\\\
    ndimensional input data into a more abstract, often\\nlower-dimensional, form. In the context of a PINN solv-\\ning a\
    \ PDE, the latent space typically holds a learned\\nencoding of the physical state of the system at specific\\npoints\
    \ in space and time (x, t).\\nInvestigating the structure of this latent space pro-\\nvides a window into how the network\
    \ perceives and pro-\\ncesses the physics. A fundamental challenge lies in deci-\\nphering how the latent representation\
    \ varies across the\\nphysical domain (x, t) and, critically, how this variation\\nchanges in response to modifications\
    \ in the problem\\u2019s\\nparameters, such as the initial condition. The di\\ufb00iculty\\n\\n2\\nis compounded by the\
    \ potentially high dimensionality\\nof the latent space (10 dimensions in this study) and\\nthe unknown, potentially complex\
    \ non-linear geometric\\nstructures formed by the collection of latent vectors cor-\\nresponding to a given physical solution.\
    \ For a specific\\ninitial condition, the set of latent vectors {L(x, t)} sam-\\npled over a grid of (x, t) points forms\
    \ a point cloud in\\nthis 10-dimensional space, whose intrinsic structure and\\nrelationship to other such point clouds\
    \ generated by dif-\\nferent initial conditions are not a priori understood.\\nThis study focuses on dissecting the geometric\
    \ struc-\\nture of the 10-dimensional latent space generated by a\\nPINN trained to solve the 2D Burger\\u2019s equation.\
    \ The 2D\\nBurger\\u2019s equation is a canonical non-linear PDE widely\\nused as a simplified model for complex fluid\
    \ dynamics\\nphenomena like turbulence and shock formation, known\\nfor its rich dynamic behavior highly sensitive to\
    \ initial\\nconditions.\\nWe specifically examine how the PINN\\u2019s\\nlatent representation of the solution changes\
    \ across 25\\ndistinct initial conditions. For each initial condition, we\\ntreat the collection of latent vectors {L(x,\
    \ t)} sampled\\nacross a discrete grid of (x, t) points as a dataset forming\\na point cloud in R10. Our primary objective\
    \ is to analyze\\nthe geometric properties of these point clouds, charac-\\nterizing their effective dimensionality, shape,\
    \ and how\\nthese characteristics compare and contrast across the\\nensemble of 25 initial conditions. We hypothesize\
    \ that\\ndespite the complexity of the Burger\\u2019s equation and the\\nhigh dimensionality of the latent space, the\
    \ network may\\nlearn a structured and perhaps simple encoding where\\nthe latent point clouds exhibit low-dimensional\
    \ geomet-\\nric properties and are related across initial conditions by\\nsimple transformations.\\nTo achieve this, we\
    \ employ a suite of geometric analy-\\nsis techniques. Principal Component Analysis (PCA) is\\nutilized extensively to\
    \ quantify the dominant directions\\nof variation and determine the effective low dimensional-\\nity of the latent vector\
    \ point clouds, both for the global\\ncollection of all latent vectors across all initial condi-\\ntions, and for the\
    \ point cloud corresponding to each\\nindividual initial condition.\\nFurthermore, we employ\\nsubspace similarity measures\
    \ to quantitatively compare\\nthe orientations of the principal subspaces learned for\\ndifferent initial conditions.\
    \ By systematically analyzing\\nthe centroids of these point clouds and the relationship\\nbetween their principal components\
    \ and the global la-\\ntent space structure, we aim to build a comprehensive\\npicture of how the PINN encodes the effect\
    \ of varying\\ninitial conditions within its learned representation. This\\napproach allows us to test whether changes\
    \ in initial\\nconditions correspond to simple, predictable geometric\\ntransformations, such as translations or rotations,\
    \ of a\\nfundamental latent structure.\\nOur analysis reveals a highly structured organization\\nwithin the latent space.\
    \ We find that, while the latent\\nspace is 10-dimensional, the entire collection of latent\\nvectors across all initial\
    \ conditions occupies an effec-\\ntively 6-dimensional subspace, capturing over 99% of the\\ntotal variance.\\nStrikingly,\
    \ for each individual initial condition, the\\ncorresponding set of latent vectors forms a distinct, ap-\\nproximately\
    \ 3-dimensional a\\ufb00ine manifold.\\nThis 3D\\nstructure is remarkably consistent in its intrinsic dimen-\\nsionality\
    \ and variance distribution across all 25 tested\\ninitial conditions. Crucially, the primary effect of chang-\\ning the\
    \ initial condition is encoded as a translation\\nof this consistent 3D manifold.\\nThese manifold cen-\\ntroids trace\
    \ a nearly one-dimensional path within the\\n10-dimensional latent space, strongly aligned with the\\ndominant global\
    \ principal component.\\nMoreover, the\\norientations of these 3D manifolds are exceptionally sim-\\nilar, exhibiting\
    \ an average subspace similarity exceeding\\n0.98, indicating they are nearly parallel with only sub-\\ntle, low-dimensional\
    \ variations in their alignment. These\\nfindings demonstrate that the PINN learns a highly e\\ufb00i-\\ncient and structured\
    \ parameterization where initial con-\\nditions select specific, geometrically simple, and highly\\nrelated low-dimensional\
    \ structures within the overall la-\\ntent space, offering valuable insights into the network\\u2019s\\ninternal encoding\
    \ mechanisms and suggesting potential\\navenues for model interpretation and compression.\"\n  },\n  {\n    \"name\":\
    \ \"METHODS\",\n    \"text\": \"The objective of this study is to dissect the geomet-\\nric structure of the 10-dimensional\
    \ latent space gen-\\nerated by a Physics-Informed Neural Network (PINN)\\ntrained to solve the 2D Burger\\u2019s equation.\
    \ We investi-\\ngate how the latent representations corresponding to dif-\\nferent initial conditions are organized within\
    \ this space\\nand how their structure relates across an ensemble of\\n25 distinct initial conditions. Our methodology\
    \ involves\\ndata preparation, applying Principal Component Anal-\\nysis (PCA) to characterize the dimensionality and\
    \ vari-\\nance distribution of latent vector sets, and employing\\nsubspace similarity measures to compare the orienta-\\\
    ntions of principal subspaces across different initial con-\\nditions.\\n2.1. Latent Space Data Preparation\\nThe data\
    \ used in this analysis originates from a pre-\\ntrained PINN solving the 2D Burger\\u2019s equation over a\\nspecified\
    \ spatiotemporal domain.\\nThe data was pro-\\nvided as a NumPy array data_bundle with dimensions\\n\\n3\\n(101, 103,\
    \ 25, 13). These dimensions correspond to spa-\\ntial grid points (x-coordinate), time steps (t), initial con-\\ndition\
    \ index, and features, respectively. The spatial grid\\nconsists of 101 points along the x-axis, and the temporal\\ndomain\
    \ is discretized into 103 time steps. The dataset\\nincludes solutions and latent space representations for 25\\ndifferent\
    \ initial conditions. The features dimension (size\\n13) contains the predicted solution components (e.g.,\\nvelocity\
    \ fields u and v) and the 10-dimensional latent\\nvector output by an intermediate layer of the PINN for\\neach spatial\
    \ point (x) and time step (t) under a specific\\ninitial condition.\\nThe 10-dimensional latent space data was extracted\\\
    nfrom the last 10 components of the features dimen-\\nsion.\\nThis resulted in a tensor latent_space_data\\nwith\\ndimensions\\\
    n(101, 103, 25, 10).\\nEach\\nelement\\nlatent_space_data[i, j, k, :]\\nrepresents the 10-\\ndimensional latent vector\
    \ L(xi, tj, ICk) corresponding to\\nthe spatial point xi, time tj, and the k-th initial condi-\\ntion ICk. For each initial\
    \ condition k, the set of latent\\nvectors {L(xi, tj, ICk)} over all i = 0..100 and j = 0..102\\nforms a collection of\
    \ 101\\u00d7103 = 10403 points in the 10-\\ndimensional latent space R10. This collection is treated\\nas a point cloud\
    \ representing the PINN\\u2019s latent encoding\\nof the physical solution for initial condition ICk.\\n2.2. Geometric\
    \ Analysis Techniques\\nTo analyze the structure of these point clouds and\\ntheir relationships, we employed Principal\
    \ Component\\nAnalysis (PCA) (Ferreras et al. 2006; Ugwoke et al.\\n2023; Nandi & Pandey 2025) and subspace similarity\\\
    nmeasures.\\n2.2.1. Principal Component Analysis (PCA)\\nPCA is a statistical procedure that uses an orthogo-\\nnal transformation\
    \ to convert a set of observations of\\npossibly correlated variables into a set of values of lin-\\nearly uncorrelated\
    \ variables called principal components\\n(Ferreras et al. 2006; McGurk et al. 2010). This trans-\\nformation is defined\
    \ in such a way that the first prin-\\ncipal component has the largest possible variance (that\\nis, accounts for as much\
    \ of the variability in the data as\\npossible), and each succeeding component in turn has\\nthe highest variance possible\
    \ under the constraint that\\nit is orthogonal to the preceding components (Ferreras\\net al. 2006). The principal components\
    \ are the eigen-\\nvectors of the data\\u2019s covariance matrix, and their corre-\\nsponding eigenvalues represent the\
    \ variance along those\\ndirections (Ferreras et al. 2006; McGurk et al. 2010).\\nIn this study, PCA was applied in several\
    \ contexts:\\n(Paraficz et al. 2016; Hatipo\\u011flu 2022; Cretignier et al.\\n2022; Sharma & Jassal 2024)\\n\\u2022 Global\\\
    nPCA: PCA was applied to the en-\\ntire collection of latent vectors across all spatial\\npoints, time steps, and initial\
    \ conditions.\\nThe\\nlatent_space_data tensor was reshaped into a\\n2D matrix of size (101 \\u00d7 103 \\u00d7 25, 10),\
    \ effectively\\ntreating all 10403\\u00d725 = 260075 latent vectors as a\\nsingle dataset in R10. This global PCA reveals\
    \ the\\noverall dimensionality and dominant directions of\\nvariation within the latent space spanned by all\\nobserved\
    \ states. The eigenvalues were used to cal-\\nculate the percentage of total variance explained\\nby each principal component\
    \ and the cumulative\\nvariance, providing an estimate of the effective\\nglobal dimensionality.\\n\\u2022 Per-Initial\
    \ Condition PCA: For each of the 25\\ninitial conditions, PCA was applied independently\\nto the set of 10403 latent vectors\
    \ {L(xi, tj, ICk)}\\ncorresponding to that specific initial condition k.\\nFor each IC k, the data latent_space_data[:,\\\
    n:, k, :] was reshaped into a 2D matrix of size\\n(10403, 10).\\nThis per-IC PCA characterizes the\\nintrinsic dimensionality\
    \ and shape of the point\\ncloud associated with a single physical solution.\\nThe centroid (mean vector) Ck of the point\
    \ cloud\\nfor IC k was calculated, and the eigenvalues and\\neigenvectors (principal components) of its covari-\\nance\
    \ matrix were obtained.\\nThe eigenvalues in-\\ndicate the variance along the principal directions,\\nand the eigenvectors\
    \ form an orthonormal basis for\\nthe principal subspace capturing the data\\u2019s varia-\\ntion.\\nThe cumulative variance\
    \ explained by the\\nprincipal components for each IC was analyzed to\\ndetermine the effective intrinsic dimensionality\
    \ of\\nthe manifold for that specific initial condition.\\n\\u2022 PCA on Centroids: The centroids Ck for each\\nof the\
    \ 25 initial conditions are 10-dimensional vec-\\ntors. These 25 centroid vectors were collected into\\na 2D matrix of\
    \ size (25, 10). PCA was applied to\\nthis matrix to analyze the geometric arrangement\\nof the manifold centroids in\
    \ the latent space. This\\nreveals whether the variation in initial conditions\\nprimarily translates the latent manifold\
    \ along a\\nlow-dimensional path or occupies a more complex\\nstructure in the latent space.\\nFor all PCA applications,\
    \ the data was centered by\\nsubtracting the mean before computing the covariance\\nmatrix and performing the eigenvalue\
    \ decomposition\\n(Hatipo\\u011flu 2023; \\u00c7ak\\u0131r & Buck 2024).\\n2.2.2. Subspace Similarity Measures\\n\\n4\\\
    nTo compare the orientations of the principal sub-\\nspaces identified by the per-IC PCA, we employed sub-\\nspace similarity\
    \ measures.\\nFor each initial condition\\nk, the per-IC PCA yields a set of principal compo-\\nnents {vk,1, vk,2, . .\
    \ . , vk,10} ordered by their correspond-\\ning eigenvalues. Based on the cumulative variance ex-\\nplained, we determined\
    \ an effective intrinsic dimension-\\nality dic for the individual manifolds (e.g., the number of\\ncomponents capturing\
    \ 95% of variance) (Ferreras et al.\\n2006; Nandi & Pandey 2025). The principal subspace\\nfor IC k is then approximated\
    \ by the span of its first dic\\nprincipal components, span{vk,1, . . . , vk,dic}.\\nTo quantify the similarity between\
    \ the principal sub-\\nspaces of two initial conditions k and j, we com-\\npared their sets of principal vectors {vk,1,\
    \ . . . , vk,dic} and\\n{vj,1, . . . , vj,dic}.\\nA quantitative measure of subspace\\nsimilarity is given by the principal\
    \ angles between the\\ntwo subspaces. Alternatively, for small dic, the similar-\\nity can be approximated by comparing\
    \ corresponding\\nprincipal vectors.\\nFor instance, the alignment of the\\nprimary direction of variation is measured\
    \ by the abso-\\nlute dot product |vk,1 \\u00b7 vj,1|. A value close to 1 indicates\\nstrong alignment, while a value\
    \ close to 0 indicates or-\\nthogonality. We computed these measures for pairs of\\ncorresponding principal vectors (e.g.,\
    \ vk,1 vs vj,1, vk,2\\nvs vj,2) across all pairs of initial conditions to assess the\\nconsistency in manifold orientation.\\\
    nA high average subspace similarity across all pairs of\\nICs indicates that the principal directions of variation\\nfor\
    \ the latent manifolds are largely parallel, implying\\nthat the manifolds are primarily translated versions of\\neach\
    \ other.\\n2.3. Analysis Workflow\\nThe analysis was structured in a sequence of steps to\\nprogressively reveal the geometric\
    \ structure of the latent\\nspace (Shukla et al. 2021; Rissaki et al. 2024) and the\\nencoding of initial conditions:\\\
    n2.3.1. Initial Exploratory Data Analysis\\nWe began by performing global PCA on the entire\\ncollection of latent vectors\
    \ to understand the overall dis-\\ntribution and effective dimensionality of the combined\\ndataset (Ferreras et al. 2006;\
    \ Nandi & Pandey 2025).\\nConcurrently, we performed per-IC PCA for each of\\nthe 25 initial conditions to obtain individual\
    \ centroids\\nand principal components, characterizing the typical in-\\ntrinsic dimensionality and variance structure\
    \ of a single\\nmanifold (Damiano et al. 2019). Finally, PCA was ap-\\nplied to the set of 25 centroids to understand\
    \ how the\\nmean positions of the manifolds are organized (Nandi &\\nPandey 2025).\\n2.3.2. Characterization of Individual\
    \ Manifolds\\nBased on the per-IC PCA results, we determined the\\neffective intrinsic dimensionality dic for the latent\
    \ point\\ncloud of each initial condition. We approximated each\\npoint cloud as an a\\ufb00ine subspace defined by its\
    \ centroid\\nCk and the span of its first dic principal component vec-\\ntors Vk = [vk,1, . . . , vk,dic] (Ferreras et\
    \ al. 2006; Dami-\\nano et al. 2019; Nandi & Pandey 2025). The eigenval-\\nues associated with these vectors provided\
    \ insight into\\nthe extent of the manifold along each principal direction\\n(Ferreras et al. 2006; Nandi & Pandey 2025).\\\
    n2.3.3. Comparative Analysis Across Initial Conditions\\nWe systematically compared the characterized man-\\nifolds across\
    \ the 25 initial conditions.\\nThe analysis\\nof centroids (PCA on {Ck}) revealed the structure of\\nthe path traced by\
    \ the manifold centers as the initial\\ncondition changes (Nandi & Pandey 2025).\\nSubspace\\nsimilarity measures were\
    \ computed for pairs of princi-\\npal subspaces span(Vk) to quantify how similarly ori-\\nented the manifolds are (Ferreras\
    \ et al. 2006; Nandi &\\nPandey 2025). By combining the information from cen-\\ntroid locations and manifold orientations,\
    \ we assessed\\nwhether the primary effect of changing the initial condi-\\ntion is a simple translation, a rotation,\
    \ or a more com-\\nplex transformation of a fundamental latent structure\\n(Nandi & Pandey 2025). We also specifically\
    \ analyzed\\nthe set of first principal vectors {vk,1} across all ICs us-\\ning PCA to see if the dominant direction of\
    \ variation\\nfor individual manifolds exhibits a structured, possibly\\nlow-dimensional, variation across ICs (Nandi\
    \ & Pandey\\n2025).\\n2.3.4. Relation to Global Latent Space Structure\\nFinally, we related the local structures (individual\\\
    nmanifolds) to the global structure identified by the\\nglobal PCA. We projected the centered latent vectors\\n(Lk \\\
    u2212Ck) for each IC k onto the dominant subspace\\nidentified by the global PCA to see how much of the\\nper-IC variance\
    \ is aligned with the global principal di-\\nrections. We also examined the alignment between the\\nper-IC principal subspaces\
    \ span(Vk) and the global prin-\\ncipal subspace span(Uglob).\\n2.3.5. Synthesis\\nThe findings from these analyses were\
    \ synthesized to\\nprovide a comprehensive geometric description of the\\nPINN\\u2019s latent space (Clemente et al. 2025,?).\
    \ We de-\\nscribed the typical intrinsic dimensionality of the latent\\nrepresentation for a single solution, the extent\
    \ to which\\nthese representations form a\\ufb00ine manifolds, how these\\nmanifolds are related across different initial\
    \ conditions\\n\\n5\\n(e.g., by translation along a low-dimensional path, by\\nconsistent orientation), and how these\
    \ local structures\\nrelate to the overall structure of the latent space. This\\nsynthesis allowed us to draw conclusions\
    \ about how the\\nPINN e\\ufb00iciently encodes the initial condition within its\\ninternal representation (Cuomo et al.\
    \ 2022).\"\n  },\n  {\n    \"name\": \"RESULTS\",\n    \"text\": \"The objective of this study was to investigate the\
    \ geo-\\nmetric structure of the 10-dimensional latent space gen-\\nerated by a PINN solving the 2D Burger\\u2019s equation,\
    \ fo-\\ncusing on how different initial conditions are encoded\\nwithin this space. Using Principal Component Analysis\\\
    n(PCA) and subspace similarity measures, we analyzed\\nthe latent vectors corresponding to 25 distinct initial\\nconditions.\\\
    n3.1. Global structure of the latent space\\nWe began by analyzing the overall structure of the la-\\ntent space by performing\
    \ PCA on the entire collection\\nof latent vectors generated across all spatial points, time\\nsteps, and the 25 initial\
    \ conditions. This global analysis,\\nas described in the Methods, treats all 101 \\u00d7 103 \\u00d7 25 =\\n260075 latent\
    \ vectors as a single dataset in R10. The\\nvariance explained by each principal component (PC)\\nprovides insight into\
    \ the intrinsic dimensionality and\\ndominant directions of variation within the aggregated\\nlatent representation.\\\
    nThe results of this global PCA reveal a significant\\nconcentration of variance in the leading principal com-\\nponents.\
    \ As shown in the scree plot in Figure 1, the\\nfirst principal component (PC1) alone captures 60.12%\\nof the total variance.\
    \ The second (PC2) and third (PC3)\\ncomponents capture an additional 23.44% and 12.93%,\\nrespectively.\\nCumulatively,\
    \ the first three global PCs\\naccount for 96.48% of the total variance. Including the\\nfourth (1.30%), fifth (1.17%),\
    \ and sixth (0.76%) com-\\nponents brings the cumulative variance explained to\\n99.72%.\\nThe remaining four components\
    \ individually\\nexplain less than 0.3% of the variance each.\\nThis strong concentration of variance within the first\\\
    nsix principal components demonstrates that the entire\\ncollection of latent vectors, despite residing in a 10-\\ndimensional\
    \ space, effectively occupies a much lower-\\ndimensional subspace. The vast majority (>99%) of the\\nvariability observed\
    \ in the latent representations across\\nall tested physical states and initial conditions is cap-\\ntured by a 6-dimensional\
    \ linear subspace.\\nThis sug-\\ngests that the PINN learns an overall e\\ufb00icient encoding,\\nwhere the complex dynamics\
    \ across different conditions\\nare constrained to a relatively low-dimensional manifold\\nwithin the full latent space.\\\
    nFigure 1. Scree plot showing the individual and cumula-\\ntive explained variance from the global Principal Component\\\
    nAnalysis of all latent vectors. The variance is highly con-\\ncentrated in the first three components, which capture\
    \ over\\n96% of the variance, revealing the low-dimensional structure\\nof the global latent space.\\n3.2. Intrinsic dimensionality\
    \ of per initial condition\\nmanifolds\\nNext, we investigated the structure of the latent space\\ncorresponding to individual\
    \ initial conditions. For each\\nof the 25 initial conditions (ICk, k = 0, . . . , 24), we per-\\nformed PCA independently\
    \ on the 101 \\u00d7 103 = 10403\\nlatent vectors {L(xi, tj, ICk)} associated with that spe-\\ncific condition. This analysis\
    \ aims to characterize the\\nintrinsic dimensionality and shape of the latent point\\ncloud representing the PINN\\u2019s\
    \ encoding of the solution\\nfor a fixed initial state.\\nThe results show a remarkable consistency across all\\n25 initial\
    \ conditions.\\nAs shown by the average scree\\nplot in Figure 2 and the intrinsic dimensionality distri-\\nbution in\
    \ Figure 3, for every single IC, precisely 3 prin-\\ncipal components were su\\ufb00icient to explain over 95%\\nof the\
    \ variance within its corresponding latent point\\ncloud. Quantitatively, the average cumulative variance\\nexplained\
    \ by the first three per-IC principal components\\nis 97.48%, with a very low standard deviation (0.15%).\\nThe average\
    \ variance explained by the first, second, and\\nthird per-IC PCs were 59.61%, 23.72%, and 14.15%, re-\\nspectively. The\
    \ variance captured by the fourth per-IC\\nPC and beyond drops sharply, with the average variance\\nfor the fourth PC\
    \ being below 2%.\\nThese findings strongly suggest that, for any given ini-\\ntial condition within the tested set, the\
    \ PINN\\u2019s latent\\nrepresentation of the spatiotemporal solution {L(x, t)}\\nforms an effectively 3-dimensional structure\
    \ embedded\\nin the 10-dimensional latent space. The high percentage\\nof variance captured by the leading three components\
    \ in-\\ndicates that these structures are well-approximated by 3-\\ndimensional a\\ufb00ine manifolds (shifted linear\
    \ subspaces),\\n\\n6\\nFigure 2.\\nAverage explained variance by principal com-\\nponents for the latent space of each\
    \ initial condition, aver-\\naged across 25 initial conditions.\\nBlue bars show the av-\\nerage individual explained\
    \ variance per component; the red\\nline shows the average cumulative explained variance with\\nstandard deviation (shaded).\
    \ This analysis reveals that the\\nlatent representation for each initial condition is consistently\\nlow-dimensional,\
    \ with the first three components capturing\\nnearly 97.5% of the variance on average.\\nFigure 3. Distribution of the\
    \ intrinsic dimensionality for\\nthe latent representations of each of the 25 initial conditions\\n(ICs).\\nIntrinsic\
    \ dimensionality is defined as the minimum\\nnumber of principal components required to capture over\\n95% of the variance\
    \ for each IC\\u2019s latent vectors. The plot\\nshows that all 25 ICs result in latent manifolds with an in-\\ntrinsic\
    \ dimensionality of 3.\\nexhibiting limited non-linear deviations from this linear\\napproximation within the scope of\
    \ the tested conditions.\\nThis implies that the network has learned a consistent,\\nlow-dimensional basis for representing\
    \ the state of the\\nsystem over space and time for a fixed initial condition.\\n3.3. Geometric arrangement of manifold\
    \ centroids\\nTo understand how the latent representations differ\\nacross initial conditions, we analyzed the geometric\
    \ ar-\\nrangement of the centroids Ck of the per-IC latent point\\nclouds. Each centroid Ck is a 10-dimensional vector\
    \ rep-\\nresenting the mean position of the latent manifold for\\ninitial condition ICk.\\nWe collected these 25 centroid\\\
    nvectors and performed PCA on this (25 \\u00d7 10) matrix.\\nThe results of this centroid PCA are striking, as shown\\\
    nin the scree plot in Figure 4. The first principal compo-\\nnent of the centroids (CPC1) explains an overwhelming\\n99.86%\
    \ of the total variance in the centroid positions.\\nThe second component (CPC2) explains only 0.10%,\\nand the third\
    \ (CPC3) explains 0.02%.\\nFigure 4.\\nScree plot showing the variance explained by\\nprincipal components of the initial\
    \ condition (IC) centroids.\\nThe first principal component captures over 99% of the vari-\\nance, indicating that the\
    \ centroids are arranged along an\\neffectively one-dimensional structure in the latent space.\\nProjecting the centroids\
    \ onto their principal compo-\\nnents, as depicted in Figure 5 (2D projection) and Fig-\\nure 6 (3D projection), reveals\
    \ that they form an almost\\nperfectly linear arrangement in the latent space. The\\ncentroids corresponding to initial\
    \ conditions indexed 0\\nthrough 24 are ordered sequentially along this dominant,\\nnearly one-dimensional direction defined\
    \ by CPC1.\\nThis finding is crucial: it indicates that the primary\\neffect of changing the initial condition within\
    \ this en-\\nsemble is to translate the entire 3D latent manifold cor-\\nresponding to that condition along a specific,\
    \ nearly\\none-dimensional path within the 10-dimensional latent\\nspace. This suggests that the PINN encodes the differ-\\\
    nence between initial conditions predominantly as a shift\\nin the mean position of the learned solution manifold.\\n3.4.\
    \ Comparison of manifold orientations\\nWhile the centroids reveal the translational differences\\nbetween the manifolds,\
    \ we also investigated whether\\nthe orientation or \\u201dshape\\u201d of the 3D manifolds changes\\nacross initial conditions.\
    \ For each ICk, the per-IC PCA\\nyields a set of principal vectors {vk1, vk2, vk3} spanning\\nthe approximate 3D a\\ufb00ine\
    \ manifold. We compared these\\nprincipal subspaces across different initial conditions.\\n\\n7\\nFigure 5.\\nInitial\
    \ condition (IC) manifold centroids pro-\\njected onto their first two principal components (CPC1 and\\nCPC2). Each point\
    \ represents the centroid for a specific IC,\\nlabeled and colored by its index (0-24).\\nThe points form\\na clear, near-linear\
    \ trajectory predominantly along CPC1,\\nindicating that changing the IC primarily translates the cor-\\nresponding latent\
    \ manifold along a dominant direction.\\nFigure 6. Three-dimensional scatter plot showing the pro-\\njection of the 25\
    \ per-initial condition (IC) latent manifold\\ncentroids onto their first three principal components (CPC1,\\nCPC2, and\
    \ CPC3). Each point represents the centroid for\\na unique initial condition and is colored according to its\\ncorresponding\
    \ IC index (0 to 24).\\nThe plot demonstrates\\nthat the centroids are arranged along a predominantly one-\\ndimensional\
    \ path, strongly aligned with CPC1, indicating\\nthat the primary effect of varying the initial condition is to\\ntranslate\
    \ the latent manifold along a specific direction.\\nWe\\nquantified\\nthe\\nsimilarity\\nbetween\\nthe\\n3-\\ndimensional\\\
    nprincipal\\nsubspaces\\nspanned\\nby\\n{vk1, vk2, vk3} for pairs of initial conditions (ICk, ICl)\\nusing subspace similarity\
    \ measures based on principal\\nangles.\\nThe results, shown in the heatmap in Figure\\n7, indicate that the average subspace\
    \ similarity score\\nacross all pairs of initial conditions was exceptionally\\nhigh, measuring 0.986, with a standard\
    \ deviation of only\\n0.014. The minimum observed similarity was 0.954. A\\nsimilarity score close to 1 indicates that\
    \ the two sub-\\nspaces are nearly parallel.\\nFigure 7. Subspace similarity between 3D latent manifolds\\nfor different\
    \ initial conditions. The heatmap shows the aver-\\nage squared cosine of the principal angles between the sub-\\nspaces\
    \ spanned by the top three principal components for\\neach pair of initial conditions (ICk and ICl). High values\\n(bright\
    \ yellow) indicate strong alignment. The consistently\\nhigh similarity across all pairs demonstrates that the 3D la-\\\
    ntent manifolds associated with different initial conditions are\\nhighly parallel.\\nTo further understand the subtle\
    \ variations in orien-\\ntation, we performed PCA separately on the set of first\\nprincipal vectors {vk1}24\\nk=0, the\
    \ set of second principal\\nvectors {vk2}24\\nk=0, and the set of third principal vectors\\n{vk3}24\\nk=0 across all initial\
    \ conditions. As shown in Fig-\\nure 8 (dot product heatmaps) and Figure 9 (PCA of\\nprincipal vectors), for the set of\
    \ first principal vectors\\n{vk1}, the first PC explained 85.45% of their variance.\\nFor {vk2}, the first PC explained\
    \ 80.04%. Most notably,\\nfor {vk3}, the first PC explained 97.67% of the variance.\\nThis indicates that the variations\
    \ in the orientations of\\nthe principal axes of the 3D manifolds are themselves\\nhighly structured and change in a low-dimensional\
    \ man-\\n\\n8\\nner, effectively tracing out nearly one-dimensional paths\\nin the space of orientation vectors as the\
    \ initial condition\\nindex changes.\\nFigure 8. Heatmaps show the absolute dot product between\\ncorresponding principal\
    \ vectors (PC1, PC2, PC3) from per-\\ninitial condition PCA for all pairs of initial conditions. High\\nvalues (yellow)\
    \ indicate strong alignment. The plots demon-\\nstrate substantial alignment across initial conditions, partic-\\nularly\
    \ for PC3, indicating that the 3D latent manifolds for\\ndifferent initial conditions are largely parallel.\\nFigure 9.\
    \ Principal Component Analysis (PCA) of the sets\\nof per-initial condition (IC) principal vectors. Top row shows\\nscree\
    \ plots for the collection of first (vk1), second (vk2), and\\nthird (vk3) per-IC principal vectors across all 25 ICs,\
    \ indi-\\ncating high variance capture by the first component in each\\nset. Bottom row shows the 2D projection of these\
    \ vector sets\\nonto their respective first two principal components, colored\\nby IC index, revealing a structured, low-dimensional\
    \ varia-\\ntion in the orientation of the 3D per-IC manifolds.\\nIn summary, the 3D latent manifolds are not only\\ntranslated\
    \ versions of each other but also exhibit a very\\nhigh degree of parallelism. The minor deviations in their\\norientations\
    \ are systematic and follow a simple, low-\\ndimensional pattern correlated with the initial condition\\nindex.\\n3.5.\
    \ Relationship between per initial condition\\nstructures and global structure\\nFinally, we related the geometrically\
    \ characterized\\nper-IC manifolds to the overall structure of the global\\nlatent space. The global PCA identified a\
    \ 6-dimensional\\nsubspace capturing 99.72% of the total variance (Figure\\n1). We projected the centered latent vectors\
    \ (Lk \\u2212Ck)\\nfor each initial condition k onto this 6D global principal\\nsubspace. As shown in Figure 10, on average,\
    \ 99.66%\\nof each individual IC\\u2019s intrinsic variance (the variance\\nwithin its 3D manifold) was captured by this\
    \ 6D global\\nsubspace, with a minimum capture of 99.24%. This con-\\nfirms that the individual 3D manifolds are almost\
    \ en-\\ntirely embedded within the common, higher-dimensional\\nsubspace occupied by the entire dataset.\\nFigure 10.\\\
    nPercentage of the intrinsic variance for each\\ninitial condition (IC) latent manifold captured by the 6-\\ndimensional\
    \ global principal subspace. The consistently high\\nvalues demonstrate that the individual 3D manifolds are ef-\\nfectively\
    \ embedded within this common global subspace.\\nFurthermore, we projected the per-IC centroids Ck\\nonto the global principal\
    \ components. This analysis, vi-\\nsualized in Figure 11 (2D projection) and Figure 12 (3D\\nprojection), showed that\
    \ the trajectory of the centroids\\naligns strongly with the first global principal component\\n(Global PC1). The initial\
    \ condition index (0-24) maps\\nalmost linearly to the position along Global PC1. This\\ndemonstrates that the dominant\
    \ mode of variation in\\nthe entire latent space (Global PC1) is directly asso-\\nciated with the primary way the initial\
    \ conditions are\\nencoded \\u2013 as translations of the latent manifold along\\nthis direction.\\nThese results highlight\
    \ a hierarchical structure:\\na\\nglobal 6D subspace accommodates all learned represen-\\ntations. Within this subspace,\
    \ each specific initial condi-\\ntion selects a 3D a\\ufb00ine manifold whose position is deter-\\nmined by a translation\
    \ along a nearly 1D path strongly\\naligned with the global PC1.\\nThe orientation of this\\n3D manifold is remarkably\
    \ consistent across ICs, with\\nsubtle, structured, low-dimensional variations.\\n3.6. Synthesis and interpretation\\\
    nThe collective findings from our geometric analysis\\nprovide a clear and compelling picture of how the PINN\\nstructures\
    \ its latent space to represent solutions of the\\n\\n9\\nFigure 11. Projection of per-initial condition latent mani-\\\
    nfold centroids onto the first two global principal components.\\nEach point, labeled and colored by initial condition\
    \ index,\\nreveals a near-linear arrangement predominantly along the\\nfirst global component.\\nThis indicates that the\
    \ PINN en-\\ncodes variations due to initial conditions primarily by trans-\\nlating the corresponding latent manifolds\
    \ along a structured,\\nlow-dimensional trajectory within the global latent space.\\nFigure 12. Centroids of the 25 per-initial\
    \ condition (IC)\\nlatent manifolds projected onto the first three global princi-\\npal components (PCs). Points are colored\
    \ by IC index (0-\\n24). The centroids form a near-linear path, primarily along\\nGlobal PC1, indicating that different\
    \ initial conditions pri-\\nmarily translate the latent manifolds along this dominant\\ndirection in the global latent\
    \ space.\\n2D Burger\\u2019s equation across varying initial conditions.\\nThe latent space is not a complex, entangled\
    \ high-\\ndimensional mess but rather exhibits a highly organized\\ngeometric structure.\\nFor a given initial condition,\
    \ the network learns a rep-\\nresentation that effectively lies on a 3-dimensional a\\ufb00ine\\nmanifold within the 10-dimensional\
    \ latent space. This\\nintrinsic dimensionality is strikingly consistent across all\\n25 tested initial conditions, as\
    \ shown in Figure 3. The\\nprimary effect of changing the initial condition is not to\\ndrastically alter the structure\
    \ or dimensionality of this\\nmanifold, but rather to translate it within the latent\\nspace.\\nThese translations occur\
    \ along a well-defined,\\nnearly one-dimensional path (Figures 5, 6), which is it-\\nself strongly aligned with the dominant\
    \ direction of vari-\\nation in the overall latent space (Figures 11, 12). More-\\nover, the orientation of these 3D manifolds\
    \ is remarkably\\nsimilar across different initial conditions, indicating they\\nare nearly parallel (Figure 7). The subtle\
    \ variations in\\ntheir orientation are not random but follow a structured,\\nlow-dimensional pattern related to the initial\
    \ condition\\n(Figure 9).\\nThis suggests that the PINN has learned a form of\\ndisentangled representation.\\nThe network\
    \ appears to\\nseparate the influence of the initial condition from the\\nintrinsic spatiotemporal evolution of the solution.\
    \ The\\nintrinsic dynamics for a fixed initial condition are en-\\ncoded within the 3D structure of the manifold, while\\\
    nthe specific initial condition primarily acts as a parame-\\nter that translates this fundamental 3D structure in the\\\
    nlatent space. This organization is highly e\\ufb00icient; in-\\nstead of learning 25 distinct, unrelated high-dimensional\\\
    nstructures, the network leverages a common 3D \\u201dtem-\\nplate\\u201d and uses a simple, low-dimensional transforma-\\\
    ntion (translation and minor orientation adjustment) to\\nadapt it for different initial conditions. This geometric\\\
    nsimplicity in the latent space provides valuable insights\\ninto the network\\u2019s internal encoding mechanisms, sug-\\\
    ngesting that the PINN captures the essential physics in\\na structured and interpretable manner, at least within\\nthis\
    \ learned latent representation.\\n3.7. Limitations and future directions\\nWhile the findings reveal a surprisingly simple\
    \ and\\nstructured latent space geometry, it is important to con-\\nsider potential limitations and avenues for future\
    \ re-\\nsearch.\\nOur analysis heavily relies on PCA, which is\\na linear technique.\\nAlthough the high variance cap-\\\
    nture suggests that a\\ufb00ine manifolds are good approxima-\\ntions, non-linear manifold learning techniques could po-\\\
    ntentially uncover finer, non-linear structures within the\\n3D manifolds or in the arrangement of centroids and ori-\\\
    n\\n10\\nentations. The study was conducted for a fixed viscos-\\nity parameter; exploring how the latent space structure\\\
    nchanges with varying viscosity would be a crucial ex-\\ntension, providing insights into how the PINN encodes\\nphysical\
    \ parameters beyond initial conditions. A larger\\nand more diverse set of initial conditions could further\\nvalidate\
    \ the observed low-dimensional nature of the cen-\\ntroid path and orientation variations, potentially reveal-\\ning more\
    \ complex patterns if the range of initial condi-\\ntions were significantly expanded. Furthermore, corre-\\nlating the\
    \ specific characteristics of the initial conditions\\n(e.g., amplitude, frequency content) with their positions\\nalong\
    \ the centroid trajectory and their manifold orien-\\ntations would provide deeper physical meaning to the\\nlearned latent\
    \ structure. Finally, investigating whether\\nsimilar structured latent spaces are learned by PINNs\\nfor other types\
    \ of PDEs or with different network ar-\\nchitectures is essential to assess the generalizability of\\nthese findings.\"\
    \n  },\n  {\n    \"name\": \"CONCLUSIONS\",\n    \"text\": \"This study investigated the geometric structure of\\nthe\
    \ 10-dimensional latent space generated by a Physics-\\nInformed Neural Network (PINN) trained to solve the\\n2D Burger\\\
    u2019s equation across a set of 25 distinct initial\\nconditions. Our goal was to understand how the PINN\\nencodes the\
    \ physical state of the system and how vari-\\nations in the initial condition are reflected in the net-\\nwork\\u2019s\
    \ internal representation.\\nWe hypothesized that\\nthe latent space might exhibit a structured, potentially\\nlow-dimensional,\
    \ organization related to the problem\\nparameters.\\nTo address this, we employed Principal Component\\nAnalysis (PCA)\
    \ and subspace similarity measures to an-\\nalyze the collections of latent vectors.\\nWe performed\\nPCA on the entire\
    \ dataset of latent vectors (global\\nPCA), on the latent vectors for each individual initial\\ncondition (per-IC PCA),\
    \ and on the centroids of the\\nper-IC latent point clouds. Subspace similarity was used\\nto compare the orientations\
    \ of the principal subspaces\\nidentified by the per-IC PCA. The dataset comprised 10-\\ndimensional latent vectors extracted\
    \ from a pre-trained\\nPINN solution for 25 initial conditions, sampled over a\\nspatial and temporal grid.\\nOur analysis\
    \ yielded several key findings regarding the\\ngeometric organization of the latent space.\\nGlobally,\\nthe latent vectors\
    \ across all initial conditions occupy an\\neffectively 6-dimensional subspace, capturing over 99%\\nof the total variance,\
    \ indicating an overall e\\ufb00icient rep-\\nresentation. More specifically, for each individual ini-\\ntial condition,\
    \ the set of latent vectors forms a distinct,\\napproximately 3-dimensional a\\ufb00ine manifold embedded\\nwithin the\
    \ 10-dimensional space. This intrinsic dimen-\\nsionality and the distribution of variance along the prin-\\ncipal components\
    \ were remarkably consistent across all\\n25 initial conditions.\\nCrucially, the primary effect of\\nchanging the initial\
    \ condition is encoded as a transla-\\ntion of this consistent 3D manifold within the latent\\nspace. The centroids of\
    \ these manifolds trace a nearly\\none-dimensional path, strongly aligned with the dom-\\ninant global principal component,\
    \ as the initial condi-\\ntion changes.\\nFurthermore, the 3D manifolds for dif-\\nferent initial conditions are remarkably\
    \ parallel to each\\nother, exhibiting an average subspace similarity exceed-\\ning 0.98, with only subtle, low-dimensional\
    \ variations in\\ntheir orientation.\\nFrom these results, we learned that the PINN devel-\\nops a highly structured and\
    \ geometrically simple rep-\\nresentation of the Burger\\u2019s equation solutions. Instead\\nof learning entirely distinct\
    \ high-dimensional represen-\\ntations for each initial condition, the network appears\\nto learn a fundamental, low-dimensional\
    \ (3D) structure\\nrepresenting the spatiotemporal evolution of the system\\nfor a fixed initial state.\\nThe specific\
    \ initial condition\\nthen acts primarily as a parameter that translates this\\nbase structure along a specific direction\
    \ in the latent\\nspace. This suggests a form of disentangled representa-\\ntion, where the network separates the influence\
    \ of the\\ninitial condition (encoded as a translation) from the in-\\ntrinsic dynamics (encoded within the 3D manifold\
    \ struc-\\nture). This geometric organization is highly e\\ufb00icient and\\noffers valuable insights into the network\\\
    u2019s internal en-\\ncoding mechanisms, suggesting that the PINN captures\\nthe essential physics in a structured and\
    \ potentially in-\\nterpretable manner within this latent space.\\nWhile our findings reveal a compelling geometric\\\
    nstructure, it is important to acknowledge the limita-\\ntions of relying primarily on linear techniques like PCA,\\nwhich\
    \ might miss finer non-linear structures.\\nFuture\\nwork could explore non-linear manifold learning tech-\\nniques to\
    \ further probe the geometry. Expanding the\\nstudy to include variations in physical parameters, such\\nas viscosity,\
    \ and analyzing a larger, more diverse set of\\ninitial conditions would be crucial to assess the general-\\nizability\
    \ of these findings and potentially uncover more\\ncomplex organizational principles. Correlating specific\\nproperties\
    \ of the initial conditions with the latent space\\nfeatures (centroid position, manifold orientation) would\\nprovide\
    \ deeper physical meaning. Finally, investigating\\nwhether similar structured latent spaces are learned by\\nPINNs for\
    \ other types of PDEs and with different net-\\nwork architectures is essential to determine the broader\\napplicability\
    \ of these observed geometric principles.\\n\\n11\"\n  },\n  {\n    \"name\": \"REFERENCES\",\n    \"text\": \"Clemente,\
