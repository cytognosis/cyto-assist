    nmological parameters play a secondary, modulating role.\\n3.4. Catalog-to-catalog variations, uncertainties, and\\noutlier\
    \ analysis\\nThe existence of significant catalog-to-catalog varia-\\ntion across the 1,000 simulations is a central finding\\\
    nof this study.\\nThis variation is a direct consequence\\nof exploring a wide range of cosmological and feedback\\nparameters.\\\
    nAs discussed in Section 3.2.1 and illus-\\ntrated by Figure 1 and Figure 2, the low-mass bin ex-\\nhibits the greatest\
    \ diversity in the fitted parameters \\u03b1\\nand \\u03b2, with a substantial number of catalogs classified\\nas outliers\
    \ according to our IQR-based method. This\\nhighlights the sensitivity of the MBH\\u2013Mstar relation in\\ndwarf galaxies\
    \ to the specific feedback implementations\\nand strengths (as further demonstrated by Figure 3).\\nThe intermediate-mass\
    \ bin, in contrast, shows remark-\\nable uniformity with very few outliers, suggesting a more\\nstable and universally\
    \ established relation in this mass\\nrange across the explored parameter space. The high-\\nmass bin shows intermediate\
    \ levels of variation and out-\\nliers.\\nThe bootstrap resampling procedure, applied to each\\nper-catalog, per-mass-bin\
    \ fit, provided robust estimates\\nof the uncertainties for \\u03b1, \\u03b2, and scatter. The consis-\\ntently high bootstrap\
    \ success rates (approximately 100\\nThe small number of mass bins (9 for fitting, 8 for\\noccupation fraction) that did\
    \ not meet the minimum\\nsample size criterion (NBH>0 \\u226510) were flagged and\\nexcluded from the fitting analysis,\
    \ ensuring that our re-\\nsults are based on statistically robust per-catalog esti-\\nmates. The vast majority of catalog-mass\
    \ bin combina-\\ntions (2,991 out of 3,000) provided reliable data points\\nfor the subsequent mapping analysis.\\nThe\
    \ observed catalog-to-catalog variation underscores\\nthat the MBH\\u2013Mstar relation is not a single, universal\\nrelation\
    \ in these simulations, but rather a family of re-\\nlations whose specific properties are determined by the\\nunderlying\
    \ physical parameters.\\n3.5. Comparison with observational constraints and\\nphysical interpretation\\nComparing our\
    \ simulation results with observational\\nconstraints provides a crucial test of the physical pro-\\ncesses included in\
    \ the simulations. The median slopes\\nderived in the intermediate-mass (\\u223c1.06) and high-mass\\n(\\u223c1.22) bins\
    \ are broadly consistent with the slopes re-\\nported in observational studies of the MBH\\u2013Mstar rela-\\ntion for\
    \ massive galaxies (e.g., Kormendy & Hu 2013;\\nMcConnell & Ma 2013). The intrinsic scatter in these\\nbins (median \\\
    u223c0.30 \\u22120.40 dex) also aligns well with\\nobserved scatter values. The black hole occupation frac-\\ntion is\
    \ near unity in the high-mass bin, consistent with\\nobservations.\\nHowever, our simulations predict greater diversity\\\
    nin the MBH\\u2013Mstar relation, particularly at low stellar\\nmasses, than is currently constrained by observations.\\\
    nThe shallower median slope (\\u223c0.76), significant scat-\\nter, and lower occupation fraction (\\u223c0.84) in the\
    \ low-\\nmass bin are consistent with recent observational efforts\\nfocusing on dwarf galaxies, which suggest incomplete\\\
    nblack hole occupation and potentially different scaling\\nrelations compared to massive galaxies (e.g., Greene et\\nal.\
    \ 2020). The large catalog-to-catalog variation in the\\nlow-mass bin (as seen in Figure 1 and Figure 2, and illus-\\\
    ntrated by Figure 3) implies that the MBH\\u2013Mstar relation\\nin dwarf galaxies might be highly sensitive to the spe-\\\
    ncific feedback physics, potentially explaining some of the\\nscatter and apparent diversity in observational samples.\\\
    nPhysically, our findings support a mass-dependent pic-\\nture of black hole and galaxy coevolution driven by feed-\\\
    nback, as quantified by the machine learning analysis and\\nshown in the partial dependence plots (e.g., Figure 5,\\nFigure\
    \ 15, Figure 17).\\n\\u2022 In low-mass galaxies with shallow potential wells,\\nsupernova feedback (ASN1) is the dominant\
    \ reg-\\nulator.\\nStrong SN feedback can expel gas, in-\\nhibiting both star formation and black hole accre-\\ntion.\
    \ This leads to a shallower MBH\\u2013Mstar relation\\nand a lower black hole occupation fraction. The\\nstochastic nature\
    \ of SN feedback in these systems\\ncontributes significantly to the scatter (Figure 7).\\n\\u2022 In intermediate-mass\
    \ galaxies, deeper potential\\nwells retain gas more effectively. AGN feedback\\n(AAGN1) becomes the primary driver, regulating\\\
    nboth star formation and black hole growth (Fig-\\nure 13, Figure 14). The strong correlation between\\nAAGN1 and the\
    \ slope suggests that AGN feedback\\nin this regime helps establish the tight scaling re-\\nlation, potentially by channeling\
    \ gas flows towards\\nthe central black hole.\\n\\u2022 In high-mass galaxies, the deepest potential wells\\nare less\
    \ susceptible to stellar feedback. AGN feed-\\nback (AAGN1) continues to dominate (Figure 20),\\nbut its role may shift\
    \ towards self-regulation and\\nquenching. The potential for AAGN1 to negatively\\nimpact the slope in this regime (Figure\
    \ 17) sug-\\ngests that very strong AGN feedback can suppress\\nfurther black hole accretion, limiting their growth\\\
    nand contributing to the increased scatter as some\\n\\n13\\nblack holes grow faster before quenching.\\nThe\\nhigh occupation\
    \ fraction reflects the near-universal\\npresence of black holes in these massive systems.\\nCosmological parameters (\\\
    u2126m, \\u03c38) modulate these pro-\\ncesses by influencing the cosmic assembly history and\\nthe availability of matter,\
    \ thereby affecting the timing\\nand environment of galaxy and black hole growth, which\\ncan subtly alter the normalization\
    \ and scatter of the\\nscaling relations, particularly at higher masses (e.g., Fig-\\nure 19, Figure 21).\\n3.6. Comparison\
    \ with previous methodologies and new\\ninsights\\nThis study significantly advances upon previous anal-\\nyses of MBH\\\
    u2013Mstar relations in simulations, including\\nour own prior work, primarily through a more sophis-\\nticated and robust\
    \ methodological framework. Earlier\\nstudies often relied on simpler linear regression and ba-\\nsic statistical descriptions\
    \ of the relation. Our current\\napproach incorporates several key enhancements:\\n\\u2022 Robust Regression and Uncertainty\
    \ Quan-\\ntification: The use of Huber loss for robust re-\\ngression makes the fitting less sensitive to outliers\\nwithin\
    \ a given catalog, providing more reliable es-\\ntimates of \\u03b1 and \\u03b2. Bootstrap resampling provides\\nrigorous,\
    \ per-catalog uncertainty estimates, which\\nwere previously less systematically quantified.\\n\\u2022 Comprehensive\\\
    nParameter\\nSpace\\nExplo-\\nration:\\nLeveraging 1,000 catalogs spanning a\\nwide range of six key parameters allows\
    \ for a much\\nmore thorough exploration of the parameter space\\nthan previous studies, which typically varied only\\\
    na few parameters or focused on a single simulation\\nsuite.\\n\\u2022 Advanced Machine Learning for Mapping:\\nThe application\
    \ of ensemble methods (Random\\nForest, Gradient Boosting) and interpretability\\ntools (Permutation Importance, SHAP\
    \ values,\\nPartial Dependence Plots) provides a powerful,\\nnon-linear mapping from the input parameters to\\nthe output\
    \ relation properties. This goes beyond\\nsimple linear correlations, allowing us to iden-\\ntify the relative importance\
    \ of parameters even in\\ncomplex, interacting systems (e.g., Figure 4, Fig-\\nure 14) and visualize non-linear dependencies\
    \ (e.g.,\\nFigure 5, Figure 17).\\nThese methodological improvements yield several new\\ninsights that were not apparent\
    \ from simpler analy-\\nses.\\nWe have been able to clearly and quantitatively\\ndemonstrate the distinct mass-dependent\
    \ roles of SN\\n(ASN1) and AGN (AAGN1) feedback, showing a clear\\ntransition in dominance around Mstar \\u223c109 \\\
    u22121010 M\\u2299.\\nThe potential sign reversal in the influence of AAGN1 on\\nthe slope at high masses, indicative\
    \ of quenching (Fig-\\nure 17), is a subtle but important finding enabled by\\nthe detailed analysis of parameter dependencies.\
    \ Fur-\\nthermore, the robust quantification of catalog-to-catalog\\nvariation (Figure 1, Figure 2) and the identification\
    \ of\\nmass bins with high outlier rates provide direct evidence\\nfor how stochastic processes and parameter choices\
    \ con-\\ntribute to the diversity of the MBH\\u2013Mstar relation. The\\nuse of partial dependence plots specifically\
    \ allows us to\\nvisualize how, for instance, the slope changes as a func-\\ntion of AAGN1, averaged over all other parameters,\
    \ re-\\nvealing the overall trend and potential non-linearities.\\nIn summary, the refined methodology has provided a\\\
    nmuch more detailed and nuanced understanding of how\\ncosmological and feedback physics shape the MBH\\u2013Mstar\\nrelation\
    \ and its diversity across different mass scales in\\nsimulations.\"\n  },\n  {\n    \"name\": \"CONCLUSIONS\",\n    \"\
    text\": \"In this paper, we conducted a comprehensive study\\nto quantify the diversity of the black hole\\u2013stellar\
    \ mass\\n(MBH\\u2013Mstar) relation and its physical drivers across\\na large parameter space of cosmological and feedback\\\
    nphysics. Understanding this diversity is critical for ad-\\nvancing models of galaxy and black hole coevolution, but\\\
    nthe complex interplay of physical processes has made\\nsystematic investigation challenging. We addressed this\\nby analyzing\
    \ 1,000 simulated galaxy catalogs at redshift\\nzero, each characterized by a unique combination of six\\nglobal parameters:\
    \ matter density (\\u2126m), density fluctu-\\nation amplitude (\\u03c38), and supernova (ASN1, ASN2) and\\nactive galactic\
    \ nucleus (AAGN1, AAGN2) feedback e\\ufb00i-\\nciencies.\\nOur methodology involved robustly fitting the MBH\\u2013\\\
    nMstar relation and calculating the black hole occupation\\nfraction within three stellar mass bins for each catalog,\\\
    nemploying bootstrap resampling to estimate uncertain-\\nties. We then leveraged a suite of advanced statistical\\nand\
    \ machine learning techniques, including hierarchi-\\ncal linear modeling, random forest regression, gradient\\nboosting,\
    \ permutation importance, SHAP values, and\\npartial dependence plots, to map the derived relation\\nproperties (slope,\
    \ normalization, intrinsic scatter) and\\noccupation fractions to the six input parameters. This\\nallowed us to identify\
    \ the dominant drivers and quantify\\ntheir mass-dependent effects.\\nOur results reveal substantial diversity in the\
    \ MBH\\u2013\\nMstar relation across the explored parameter space, with\\n\\n14\\nproperties varying significantly between\
    \ catalogs and\\nstellar mass bins.\\nWe found a clear mass-dependent\\ntransition in the primary drivers of this diversity.\\\
    nAt low stellar masses (< 109 M\\u2299), supernova feed-\\nback, particularly ASN1, is the dominant factor shap-\\ning\
    \ the relation\\u2019s slope, normalization, scatter, and the\\nblack hole occupation fraction. Stronger SN feedback\\\
    ngenerally leads to shallower slopes, lower normalizations,\\nincreased scatter, and significantly suppressed occupa-\\\
    ntion fractions. This is consistent with SN feedback effec-\\ntively expelling gas from shallow potential wells, hinder-\\\
    ning both star formation and black hole growth in dwarf\\ngalaxies. Cosmological parameters play a secondary role\\nin\
    \ this mass range. The low-mass bin exhibits the largest\\ncatalog-to-catalog variation and the highest number of\\noutlier\
    \ relations, highlighting its sensitivity to feedback\\nphysics and potentially stochastic growth processes.\\nIn the\
    \ intermediate stellar mass range (109 \\u2264Mstar <\"\n  },\n  {\n    \"name\": \"M\\u2299), active galactic nucleus\
    \ feedback, specifically\",\n    \"text\": \"AAGN1, becomes the overwhelmingly dominant driver.\\nAAGN1 strongly influences\
    \ both the slope and normal-\\nization of the relation, with stronger AGN feedback gen-\\nerally leading to steeper slopes.\
    \ This suggests a regime\\nwhere AGN feedback plays a crucial role in establishing\\nthe tight MBH\\u2013Mstar correlation,\
    \ possibly by regulating\\ngas flows that fuel both star formation and black hole\\naccretion. This mass bin shows remarkable\
    \ uniformity\\nacross the 1,000 catalogs, with almost no outliers in the\\nscaling relation parameters, indicating a more\
    \ robustly\\nestablished relation less sensitive to the specific param-\\neter choices within the explored range.\\nAt\
    \ high stellar masses (\\u22651010 M\\u2299), AGN feedback\\n(AAGN1) remains the most important driver. However,\\nthe\
    \ analysis suggests a potential shift in the nature of\\nits influence on the slope, with very strong AAGN1 po-\\ntentially\
    \ leading to a flattening or even a negative cor-\\nrelation with the slope, consistent with self-regulation\\nand quenching\
    \ of black hole growth in massive galaxies.\\nCosmological parameters (\\u2126m, \\u03c38) have a more notice-\\nable\
    \ modulating effect on the normalization and scatter\\nin this regime. The intrinsic scatter is highest in this\\nbin,\
    \ and the black hole occupation fraction is near unity,\\nshowing minimal dependence on the input parameters.\\nComparing\
    \ our results to observations, the simula-\\ntions broadly agree with the slopes and scatter observed\\nfor massive galaxies.\
    \ Crucially, the simulations predict\\ngreater diversity and lower occupation fractions at low\\nstellar masses, aligning\
    \ with recent observational find-\\nings for dwarf galaxies and suggesting that the MBH\\u2013\\nMstar relation in this\
    \ regime is more sensitive to the\\nspecific physical conditions and feedback strengths.\\nThis study provides a detailed,\
    \ quantitative mapping\\nof how the properties of the MBH\\u2013Mstar relation and\\nblack hole occupation fraction are\
    \ shaped by underly-\\ning cosmological and feedback parameters. We have ro-\\nbustly demonstrated the critical, mass-dependent\
    \ roles\\nof SN and AGN feedback, transitioning from SN dom-\\ninance at low masses to AGN dominance at higher\\nmasses.\\\
    nThe systematic analysis using advanced ma-\\nchine learning techniques allowed us to uncover and\\nquantify these complex,\
    \ often non-linear, dependencies\\nacross a wide parameter space. Our findings offer a de-\\ntailed framework for interpreting\
    \ the observed diversity\\nin black hole scaling relations and underscore the neces-\\nsity of accurately modeling feedback\
    \ processes across dif-\\nferent mass scales for realistic simulations of black hole-\\ngalaxy coevolution. The substantial\
    \ diversity predicted,\\nespecially at low masses, highlights the challenges and\\nopportunities for future observational\
    \ campaigns aiming\\nto constrain the physical mechanisms driving black hole\\ngrowth in the smallest galaxies.\"\n  },\n\
