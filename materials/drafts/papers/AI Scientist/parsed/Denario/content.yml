    \ methods. In this case, Denario will generate a new methodology,\\nnew analysis, and new paper, but the essence of the\
    \ paper will remain intact. The generated paper,\\ntitled Mapping the diversity of the black hole-stellar mass relation:\
    \ the role of feedback and cosmology in\\nsimulated galaxies, can be found in the Appendix A.12.\\nIn this paper Denario\
    \ investigated the impact of cosmological and astrophysical parameters on the\\nMBH \\u2212M\\u2217relationship in simulated\
    \ galaxies. In particular, the paper models the relation between black-\\n58\\n\\nhole mass and stellar mass in galaxies,\
    \ as log10(MBH) = \\u03b1 + \\u03b2 log10(M\\u2217). The paper splits the galaxy\\npopulation into three different stellar\
    \ mass bins: Low-mass galaxies (M\\u2217< 109 M\\u2299), Intermediate-mass\\ngalaxies (109 \\u2264M\\u2217\\u22641010\
    \ M\\u2299), and High-mass galaxies (> 1010 M\\u2299). Next, it studies the dependence\\nof \\u03b1, \\u03b2, and the\
    \ scatter in the relation as a function of the cosmological and astrophysical parameters.\\nIn the first pass, it used\
    \ both linear regression and random forest to determine which parameter affects\\nthe data the most in the different regimes.\
    \ But in the second pass, it used XGBoost and SHAP values.\\nFurthermore, in this latest version of the paper, linear\
    \ regression is carried out with the Huber loss to\\nminimize the impact of outliers.\\nThe paper finds that for low stellar\
    \ mass galaxies, supernova feedback is the physical process that\\nimpacts the MBH \\u2212M\\u2217relationship most, while\
    \ AGN feedback becomes the main factor for massive\\ngalaxies. It also finds that cosmological parameters play a secondary,\
    \ but still important, factor. As\\nfar as we know, this is a completely new result not explored before with CAMELS data.\
    \ According to\\nexperts in the field, the results are particularly sensitive and have important theoretical implications.\
    \ We\\nbelieve that this paper may be what an undergraduate or graduate student does in a period of weeks to\\nmonths\
    \ (depending on experience and familiarity with the data and machine learning techniques). While\\nnot groundbreaking\
    \ research, Denario showed that it is capable of generating new knowledge that may\\nbe relevant for future investigations.\\\
    n5.13\\nQuantum physics, machine learning & cosmology. Cosmological param-\\neters from merger trees\\nA powerful facet\
    \ of Denario is its ability to combine ideas from different scientific fields. To illustrate\\nthis, we have asked Denario\
    \ to write a paper that uses ideas from quantum physics to analyze cosmolog-\\nical data. The generated paper, titled\
    \ QITT-Enhanced Multi-Scale Substructure Analysis with Learned\\nTopological Embeddings for Cosmological Parameter Estimation\
    \ from Dark Matter Halo Merger Trees,\\nis shown in the appendix. For this paper, we gave Denario merger trees from the\
    \ CAMELS-SAM [78]\\ncosmological N-body simulations, post-processed and curated as in CosmoBench28 [79] and asked it to\\\
    nwrite a paper using that data that uses ideas from Quantum Tensor Trains (QTTs) [80]. The exact input\\ntext used was\
    \ this:\\nInput text\\nWe have a file containing 1000 merger trees from cosmological N-body simulations. The file is\\\
    nlocated in\\n/mnt/home/fvillaescusa/public_www/Pablo_Bermejo/Pablo_merger_trees2.pt\\nThe data is stored in PyTorch Geometric\
    \ format, and can be read as:\\nimport torch\\nf_tree = \\u2019/mnt/home/fvillaescusa/public_www/Pablo_Bermejo/Pablo_merger_trees2.pt\\\
    u2019\\ntrainset = torch.load(f_tree, weights_only=False)\\ntrainset is now a collection of 1000 PyTorch Geometric graphs.\
    \ For instance, trainset[0] represents\\nthe first merger tree and contains the data in this format:\\nData(x=[382, 4],\
    \ edge_index=[2, 381], edge_attr=[381, 1], y=[1, 2], num_nodes=382, lh_id=100,\\nmask_main=[93], node_halo_id=[382, 1])\\\
    nx represents the node features.\\ny is the value of the cosmological parameters, Omega m and\\nsigma 8. The node features\
    \ are mass, concentration, vmax, scale factor. The first property is\\nlog10(mass), the second is log10(concentration),\
    \ the third one is log10(Vmax), and the fourth one\\nis the scale factor.\\nThe scale factor ranges from 0 (beginning\
    \ of the universe) to 1 (current time). The mass goes\\nfrom 10 to 15. Each node represents a dark matter halo and is\
    \ characterized by the four values\\nmentioned above: halo mass, halo concentration, halo Vmax (maximum circular velocity),\
    \ and\\nscale factor. You may want to normalize each feature to have mean 0. Omega m ranges from\\n0.1 to 0.5, while sigma\
    \ 8 goes from 0.6 to 1.0. For each simulation, i.e. a given value of the\\ncosmological parameters, there are 25 different\
    \ merger trees chosen randomly.\\n28https://cosmobench.streamlit.app/\\n59\\n\\nPlease come up with an idea to explore\
    \ this data using methods from Quantum Tensor Trains.\\nNote that PyTorch and PyTorch Geometric are already installed.\
    \ The system has 16 cpus and 1\\ngpu. Please make some plots to illustrate your findings.\\nThe generated paper, QITT-Enhanced\
    \ Multi-Scale Substructure Analysis with Learned Topological\\nEmbeddings for Cosmological Parameter Estimation from Dark\
    \ Matter Halo Merger Tree, can be found\\nin the Appendix A.13. In it, Denario analyzes cosmological merger trees, firstly\
    \ performing a multi-scale\\nsubstructure identification for each merger tree.\\nThis step identifies branches of a merger\
    \ tree (that\\nrepresent sub-graphs by themselves) where a merger happens or a significant change in halo properties\\\
    noccurs. Next, it extracts features for the substructure: 1) physical features such as the scale factor when\\na merger\
    \ takes place and the total mass in the substructure, and 2) topological embeddings from each\\nsubstructure extracted\
    \ using graph neural networks. All these features were then used to construct a 3D\\ntensor for each merger tree that\
    \ contains the physical and topological properties for all its substructures.\\nThe dimension of this tensor was (60,74),\
    \ i.e. 60 substructures (some merger trees may contain fewer,\\nbut 0-padding was used) and 74 topological plus physical\
    \ features.\\nThat 3D tensor is relatively big, which makes it difficult to use for downstream tasks. Because of\\nthat,\
    \ it reduces its representation using tensor trains that the paper refers to as QITT (Quantum-inspired\\ntensor trains)\
    \ since these are methods commonly used in some areas of quantum physics. QITT aims\\nto compress high-dimensional tensors\
    \ (e.g., representing high-dimensional functions), producing a low-\\nrank decomposition of the original tensors into\
    \ tensors with smaller ranks. For instance, in the case of\\nsmooth functions, QITT has been shown to achieve an optimal\
    \ approximation order. This is the case\\nof any univariate polynomial of degree p, which can be represented by a QITT\
    \ of rank at most (1 + p)\\n[81], where the number of tensors in the tensor train dictates the resolution within the discretized\
    \ grid.\\nHere, we would expect contiguous merger trees to possess similar characteristics, and hence a sense of\\nsmoothness\
    \ that could be translated into low-rank tensors describing such features.\\nThe result of compressing the original 3D\
    \ feature tensor with QITT is the latent representation of\\neach merger tree and is used as input for different regression\
    \ models, including linear regression, random\\nforest, and gradient boosted trees. The optimal dimensionality of this\
    \ reduced tensor was found to be 202.\\nOne could expect that the decomposition algorithm, factoring out the tensor chain,\
    \ could still benefit\\nfrom a more refined breakdown, probably using a higher number of tensors connected through bonds\\\
    nwith lower ranks.\\nThe paper then compares the results obtained against several baselines, including 1) physical features\\\
    nof the substructures (i.e., no topological or QITT compression), 2) global features of each global tree,\\nand 3) topological\
    \ features from each substructure but no QITT compression.\\nThe paper finds that linear regression with QITT features\
    \ performs very well and can constrain the\\nvalue of both \\u2126m and \\u03c38 with high accuracy. The paper also finds\
    \ that linear regression with the global\\nfeatures of the trees performs slightly better, indicating that simple tree-level\
    \ features may be enough\\nto regress the parameters. The paper also shows some interesting results, such as the graph\
    \ topological\\nembedding containing information about the number of halos in the substructure.\\nWe were impressed by\
    \ this paper, which required the expertise of researchers in cosmology, machine\\nlearning, and quantum physics to evaluate\
    \ its relevance. The fact that Denario was able to perform such\\ncomplex analysis, which includes a non-trivial decomposition\
    \ of merger trees into substructures, training\\ngraph neural networks in an unsupervised setup, and compressing data\
    \ with quantum-inspired tensor\\ntrains.\\nWe note that this paper was generated on a MacBook Pro without using GPUs and\
    \ with a very\\nlimited dataset. Therefore, we believe the results can be substantially improved; for instance, training\\\
    nwas only done for five epochs. Given its originality, interesting results, and methods, we believe that this\\npaper,\
    \ with a few improvements and a reliable scaling analysis, could be considered for submission to an\\ninternational journal.\\\
    nWe note that this paper was accepted for publication in the Agents4Science 2025 conference, the first\\nopen conference\
    \ where AI serves as both primary authors and reviewers of research papers29. We note\\nthat around 250 submissions were\
    \ made, with 48 acceptances, and only 5 fully AI-generated papers were\\naccepted, including this one, reaching the maximum\
    \ score [82].\\n29https://agents4science.stanford.edu/\\n60\\n\\n6\"\n  },\n  {\n    \"name\": \"Discussion\",\n    \"\
    text\": \"In this section, we describe important aspects related to Denario such as failure modes, validation and\\nevaluation,\
    \ advantages and limitations, and future directions.\\n6.1\\nFailure modes\\nBy running Denario many times over many different\
    \ datasets from different disciplines, we have identified\\na couple of severe failure modes. We now describe them here\
    \ in detail:\\n6.1.1\\nCylic peptide generation\\nIn this case, we asked Denario to solve a computational biology problem\
    \ of generating molecular struc-\\ntures for cyclic peptides. After multiple failed attempts, the agents hallucinated\
    \ an entire paper without\\nimplementing the necessary numerical solver. The problem itself has well-established solutions\
    \ in the\\nliterature [83, 84], involving linear algebra computations and optimization algorithms. While the agents\\\
    nwere able to outline plausible solution strategies by either mimicking known methods or proposing novel\\nmachine-learning\
    \ approaches, their actual code implementations consistently produced structures with\\nsignificant geometric flaws, and\
    \ adding detailed geometry requirements did not help.\\nFurthermore, after several tries, Denario came up with a paper\
    \ claiming solutions were successfully\\nfound, and data plots were provided to show the successful results. However,\
    \ upon inspection, we could\\nnot locate the solutions referenced in the paper, and the corresponding source code lacked\
    \ a crucial\\nnumerical solver.\\nEven in the paper, the section describing this missing solver was very vague and\"\n\
    \  },\n  {\n    \"name\": \"abstract. This was a surprising case, and such \\u201ccheating\\u201d only appeared once in\
    \ our experiments. We\",\n    \"text\": \"suspect this could be due to the easily accessible solution descriptions and\
    \ datasets in the literature, while\\nthe actual codes, in contrast, were embedded in large software packages that have\
    \ license requirements.\\nThis case underscores the importance of scrutinizing agent-generated research with the same\
    \ rigor applied\\nto human-generated work: verifying source codes and raw data is essential for ensuring the validity\
    \ of\\nscientific claims.\\n6.1.2\\nPure Mathematics\\nAs part of our evaluation of Denario\\u2019s capabilities, we tested\
    \ its performance on an open-ended research\\nproblem in pure mathematics. The problem concerned the representability\
    \ of simplicial complexes as\\nnerves of collections of unit balls in Euclidean space, and a related question on approximating\
    \ semi-\\nalgebraic sets by unions of balls [85, 86].\\nThe input text asked whether every finite abstract simplicial\
    \ complex can be realized as the nerve of\\na collection of closed unit balls in some Euclidean space, and whether a compact\
    \ semi-algebraic set in\\nEuclidean space can be approximated \\u2014 up to homotopy \\u2014 by a union of balls of fixed\
    \ radius. While\\nsome partial results are known in special cases \\u2014 for example, in the one-dimensional case, or\
    \ for sets\\nwith positive reach or defined in general position \\u2014 the problem remains unsolved in general.\\nWe\
    \ used both a concise and an extended version of the input text to generate five research papers.\\nThe outputs were then\
    \ analyzed in detail, evaluating their mathematical rigor, conceptual coherence, use\\nof references, and stylistic authenticity.\
    \ The results revealed several fundamental shortcomings:\\n1. Superficial structure. The papers resembled mathematical\
    \ writing on the surface \\u2014 with titles,\"\n  },\n  {\n    \"name\": \"abstracts, and phrases like \\u201cmain theorem\\\
    u201d \\u2014 but lacked real internal logic. There were no formal\",\n    \"text\": \"statements or proofs, and the flow\
    \ of ideas was loose or incoherent.\\n2. Misuse of citations. Foundational references were often missing, while others\
    \ were used decora-\\ntively \\u2014 cited as support for claims introduced in the same paragraph, or with no clear connection\\\
    nto the text.\\n3. Template-like prose. Sentences like \\u201cwe propose a novel invariant\\u201d or \\u201cwe provide\
    \ computational\\nevidence\\u201d were repeated across papers, detached from any technical substance. This led to a sense\\\
    nof scripted, ritual language rather than genuine mathematical argumentation.\"\n  },\n  {\n    \"name\": \"Mathematically\
    \ vacuous results\",\n    \"text\": \"One example involved a seemingly new property \\u2014 the\\n\\u201cControlled Local\
    \ Intersections\\u201d condition \\u2014 that turned out to be either trivially true or trivially\\nfalse depending on\
    \ interpretation. The paper contained no real proofs, only vague commentary and a\\nsingle non-example. A few incidental\
    \ signs \\u2014 such as unusual font choices or two-column layouts \\u2014\\n61\\n\\nfurther contributed to a sense of\
    \ unfamiliarity. While not central, these cosmetic features reinforced\\nthe impression that the texts were not fully\
    \ integrated into the stylistic norms of mathematical\\nwriting. Some local ideas had superficial plausibility, but none\
    \ were developed in a mathematically\\nmeaningful way. The outputs resembled a stream of initial intuitions that a human\
    \ mathematician\\nmight have before formalizing anything \\u2014 but without the subsequent refinement or insight.\\nThis\
    \ case study highlights a central limitation: the system can imitate the form of mathematical writing,\\nbut not yet its\
    \ function. Mathematics is not merely a collection of symbols or formulas, but a social\\nand rhetorical practice governed\
    \ by implicit conventions. Validity in mathematics is not conferred by\\nstructure alone, but by participating convincingly\
    \ in a shared discourse \\u2014 one that includes expectations\\nof clarity, responsibility, and logical development.\\\
    nWhile the experiment did not uncover any convincing or usable results, it revealed how close the\\nsystem is to replicating\
    \ outward patterns of mathematical behavior.\\nThe fact that it can generate\\nseemingly plausible definitions or mimic\
    \ standard stylistic elements is nontrivial. Still, the outputs lacked\\nthe clarity, progression, and internal necessity\
    \ that characterize mathematics, at least as conventionally\\nrecognized within the mathematical community.\\n6.2\\nValidation\
    \ and Evaluation\\nFormally, validation is the act of providing objective evidence that a system, model, or method is\
    \ fit\\nfor its intended purpose. In the case of AI-generated papers, validation should be understood as the\\nprocess\
    \ of checking whether the claims made in the paper are true or not. In other words, validation\\ntasks include verifying\
    \ that the codes written are correct and that the results obtained contain enough\\nevidence to support the claims in\
    \ the paper. For standard papers, this process is called peer review.\\nWe note that LLM hallucination is a well-known\
    \ problem that can cause agents write incorrect code,\\nreach conclusions or make claims that do not have enough evidence.\
    \ In other cases, they can simply\\nmake up things. This problem can occur at any stage, from the generation of ideas\
    \ and coding to paper\\nwriting. While Denario contains multiple agents whose role is to check the work of others, ultimately,\
    \ a\\nhuman expert should be responsible for checking and verifying all steps involved in the process.\\nWe have performed\
    \ an exhaustive validation of some of the papers generated by Denario. We now\\ndiscuss two particular examples:\\n\\\
    u2022 For the cyclic peptide generation mentioned above, we found that even if all the agents involved in\\ncoding failed,\
    \ the paper-writing agent wrote an entire paper claiming things without any evidence\\nat all, likely being dominated\
    \ by its prior knowledge and not the evidence from its calculations.\\n\\u2022 To evaluate the scientific integrity of\
    \ one of the generated papers in astrophysics, in person, our\\nteam read the paper in detail and wrote code to reproduce\
    \ the figures and claims in the paper.\\nWe note that we did not provide access to the codes written by Denario for that\
    \ paper.\\nThe\\ndomain expert was able to reproduce very similar metrics for the correlation and validate that an\\nindependent\
    \ human reviewer can arrive at the same conclusion and scientific discovery.\\nAn obvious conclusion is that a human expert\
    \ should always check the codes and claims made by\\nDenario written papers. However, we also note that this should also\
    \ be done for standard human-created\\npapers. We note that there have been multiple cases of standard papers that have\
    \ passed peer-review\\nvalidation and have lately been found to be wrong due to authors modifying or inventing data in\
    \ order\\nto provide evidence for a preconceived idea.\\nAnother important aspect in the revision of scientific papers\
    \ is evaluation. In this context, we un-\\nderstand evaluation as the process of determining the quality of the paper,\
    \ its value in comparison with\\nprevious works, and its contribution to the field. We note that evaluating the quality\
    \ of scientific papers\\nis a highly non-trivial and likely subjective task. In his current form, the evaluation of AI-generated\\\
    npapers by Denario is done by human domain experts30\\nFor the papers discussed in this paper (the ones located in the\
    \ Appendix) we have asked the domain\\nexperts in our team to evaluate them and to provide a numerical score to them.\
    \ The range was from\\n0 (for really bad papers) to 10 (really good papers). We show the distribution of the numerical\
    \ scores\\nprovided by the experts in Fig. 11. We note that a numerical score of 5 represents a \\u201dnormal\\u201d paper.\
    \ As\\ncan be seen, 3 papers were ranked below the average, while the majority of them were above. In some\\ncases, the\
    \ human experts provided scores as large as 8 and 9. From this experiment, we can conclude\\n30Although we note that Denario\
    \ contains the reviewer module that is designed to provide a referee-report-like as a proxy\\nfor performing evaluation.\\\
    n62\\n\\nthat Denario has the capacity of producing \\u201dreasonable\\u201d and \\u201dinteresting\\u201d papers, given\
    \ all the caveats\\ndiscussed in Sec. 5. We note that this score is highly subjective and does not pretend to be a rigorous\\\
    ncriterion, but to provide some insight into the generative capabilities of Denario.\\nFigure 11:\\nWe have assigned each\
    \ of the papers in the Appendix to a domain expert for evaluation.\\nEach expert, knowing that these are AI-generated\
    \ papers, was tasked with providing a numerical score\\nto quantify the quality of the paper, from 0 (really bad paper)\
    \ to 10 (really good paper). This graph\\nshows the distribution of the scores. As can be seen, while some papers are\
    \ ranked below average, most\\npapers are above average, and some of them were highly ranked.\\n6.3\\nAdvantages and limitations\\\
    nAccording to the analysis of the example papers discussed in Sec. 5, we believe agentic systems like\\nDenario will bring\
    \ some important positive aspects to science in general:\\n\\u2022 The ideas generated by Denario can enhance the researcher\\\
    u2019s capabilities by unveiling concepts\\n(from mathematics, machine learning, or other disciplines) unknown to the\
    \ researcher. We believe\\nthis may help researcher be more creative and discover techniques that may be relevant to their\\\
    nparticular problem.\\n\\u2022 System like Denario excel at performing shallow research very quickly.\\nIn other words,\
    \ while\\ncurrent LLMs may not have the capabilities to abstract the solution to a problem to something\\nfundamental\
    \ (e.g., a single mathematical equation governing the physics of many different systems),\\nthey are very good at performing\
    \ relatively simple analyses and reaching very useful conclusions.\\nThis capability may enable researchers to identify\
    \ promising research avenues and focus on those\\nfaster than with traditional human approaches.\\n\\u2022 All text, plots,\
    \ and code are output by Denario and therefore provide a high level of transparency\\nand enable reproducibility. This\
    \ is an important step for many disciplines, where calculations are\\ncomplex and results cannot easily be reproduced.\\\
    n\\u2022 The potential connection with other fields at the level of ideas of methods may enable more collab-\\noration\
    \ and interdisciplinary work.\\n\\u2022 Systems like Denario are excellent at exploring risky ideas.\\nFor instance, if\
    \ a study is highly\\nuncertain, and the outcome may not be very rewarding (e.g., exploring an idea that even if it\\\
    nworks, may not lead to a publication), many researchers will feel discouraged from pursuing it.\\nHowever, that study\
    \ may be very useful for other analyses, perhaps completely unrelated.\\nWe\\nbelieve researchers may consider exploring\
    \ such ideas if the effort required is significantly reduced,\\nas tools like Denario can do.\\n\\u2022 We believe that\
    \ systems like Denario can help researchers in many different tasks, from idea\\ngeneration to method implementation.\
    \ Ultimately, if we lead AI to perform some of these tasks,\\n63\\n\\nunder our supervision, scientists will have more\
    \ time to think deeply and perform higher-level\\nresearch. This could make science deeper, broader, and more robust.\\\
    nIt is also important to discuss the current limitations associated to Denario\\n\\u2022 Citations. The citations in both\
    \ papers typically refer to relevant papers for the considered sentence,\\nbut perhaps not the most relevant ones. An\
    \ expert reader can easily spot an Denario AI-generated\\npaper from a human one just from the citations.\\n\\u2022 Depth.\
    \ From the generated papers, we can see that the explanations of the results tend to be\\nrelatively shallow and not comparable\
    \ to what an experienced researcher would write. As we show\\nin the discussion of many papers in Sec. 5, current system\
    \ behaves more like a good undergraduate\\nor early graduate student rather than a full professor in terms of big picture,\
    \ connecting results...\\netc.\\n\\u2022 LaTeX. Sometimes, figures are generated with non-LaTeX y/x labels or legends.\
    \ For instance, some\\nfigures have omega m in the y-axis instead of \\u2126m. Another problem is that the paper writing\
    \ agent,\\nmore rarely, makes small mistakes in LaTeX, e.g., dealing with underscores in equations, text, and\"\n  },\n\
    \  {\n    \"name\": \"references. These errors usually prevent the paper from being compiled properly, although they are\"\
    ,\n    \"text\": \"easy to fix.\\n\\u2022 Coding. In its current form, Denario sometimes may struggle with writing and\
    \ executing code.\\nThis may happen for multiple reasons, such as changes in the API for recent packages and failures\\\
    nwhen running code in parallel. This behavior may cause the system to crash during the analysis\\nmodule.\\nWe believe\
    \ all the above points can be addressed, or at least significantly improved, by improving the\\nagents in charge of some\
    \ tasks (e.g. citations), by advances in LLMs (e.g. reasoning), or by including\\nmore agents to fix the small mistakes\
    \ made by the other agents (LaTeX).\\n6.4\\nFuture directions\\nThere are numerous ways to improve Denario, which we plan\
    \ to implement in the near future:\\n\\u2022 While in its current version Denario made some asynchronous LLM calls, it\
    \ does not fully exploit\\nits potential. Reformatting some agents to make more asynchronous calls can significantly speed\\\
    nup the time spent on the different tasks and lower the cost.\\n\\u2022 In its current form, Denario may fail or significantly\
    \ deviate from its goals at several stages of the\\nprocess. Adding new agents that can provide feedback on the outcome\
    \ of some agents will improve\\nthe stability of the framework and make it more robust.\\n\\u2022 Parallelization and\
    \ optimization. Our current workflows are sequential: we deal with tasks step-by-\\nstep, doing one thing at a time. Efficiency\
    \ will be greatly improved using parallelization strategies,\\ne.g., [87] or massgen31.\\n\\u2022 Adaptive Planning &\
    \ Control. Currently, once a plan is fixed, it is executed until the end. This is\\nnot how research is done. Next steps\
    \ are always conditioned, or even determined, by past ones. A\\nmore refined Planning & Control strategy will have adaptive\
    \ planning so that after each task, the\\nnew steps left to be done can be re-assessed and potentially changed, removed,\
    \ or some new steps\\ncan be added.\\n\\u2022 The paper writing module can be significantly improved by adding more context\
    \ information about\\nthe code written and the figures created. Furthermore, specialized agents to check claims and put\\\
    nthem in touch with literature agents can significantly help write things with a broader perspective.\\n\\u2022 Currently,\
    \ Denario only supports paid LLM providers through their API, but there are plenty of\\nopen-source models that can be\
    \ installed and run locally. We plan to provide support to run our\\nagents with locally installed LLMs, which will give\
    \ the user more freedom to choose among the\\navailable LLMs, use custom models, and get more control over their resources.\\\
    n31https://docs.massgen.ai/en/latest/\\n64\\n\\n\\u2022 We keep working on easing access to Denario. Besides improving\
    \ the Python API and the GUI, we\\nplan to include a Command Line Interface (CLI) to run the different modules of the\
    \ multi-agent\\nsystem without the need to write code explicitly.\\n\\u2022 Develop evaluation frameworks that will allow\
    \ us to improve the quality of the research assistance\\ntools in a systematic way. This will rely on extended benchmark\
    \ datasets, following the efforts of\\nTPBench [88] or ReplicationBench [89].\\n7\\nEthical implications and scientific\
    \ challenges\\nSystems like Denario are designed to facilitate the work of scientists. However, the powerful technology\\\
    nbehind them raises many ethical considerations.\\nIn this section, we describe some of them and also\\ndiscuss how AI\
    \ agents fit in the way we do science from a historical perspective.\\n7.1\"\n  },\n  {\n    \"name\": \"Ethics\",\n \
    \   \"text\": \"We now describe a few points where the usage of systems like Denario will lead to ethical considerations.\\\
    n\\u2022 Quality of research: Generative AI tools such as Denario allow users to easily and quickly generate\\nlarge numbers\
    \ of potentially low-quality papers.\\nSome of the incentive structures of academic\\nresearch may lead to individuals\
    \ using generative AI tools to artificially increase their research\\noutput and/or inflate citation numbers for their\
    \ own articles.\\n\\u2022 Implications for scientific training and education: Tools such as Denario have the potential\\\
    nto make it easy to write an entire paper with just a few lines of description about a project idea,\\nits methods, results,\
    \ and the plots made. This poses questions and challenges for scientific training\\nand education. In what ways are scientific\
    \ writing and creativity in data analysis valuable as skills\\ninherent to the researcher? To what degree or in what fashion\
    \ should AI tools play a role in helping\\nresearchers carry out this type of work to begin with? How should we teach\
    \ students the skills they\\nwill need to succeed as producers and interpreters of research?\\n\\u2022 Assessment of quality\
    \ and legitimacy: If these tools start being used widely, there may be a\\nrisk of trusting results from agents without\
    \ any validation. For instance, an agent may perform\\nsome calculation and decide that it is not interesting. Without\
    \ validation, that result may block a\\npotentially interesting research direction. Indeed, as AI agents become both increasingly\
    \ common\\nproducers and consumers of research, we are faced with important questions about the nature of\\nquality and\
    \ legitimacy in research. How is quality and correctness defined, and by whom? If AI\\nagents become the standard by which\
    \ to assess the quality of a paper or whether it is \\u201ccorrect\\u201d\\nor \\u201cwrong\\u201d, how does one assess\
    \ which AI agent to trust? We can therefore fall into a situation\\nof crisis with respect to responsible scientific working\
    \ guidelines. If anyone can use AI to generate\\npaper, and if no one can control this process and oversee standards of\
    \ originality, who can be held\\nresponsible?\\n\\u2022 Homogenization: A pattern seen across some of the application\
    \ cases presented is Denario\\u2019s\\ndifficulty proposing new research questions or identifying serendipitous, potentially\
    \ novel findings.\\nThis is representative of a greater concern that AI agent-driven research might be biased towards\\\
    nproducing research that confirms and aligns with the existing scientific literature of its training\\ndataset, potentially\
    \ leading to homogenized research and stifling innovation. Further experimen-\\ntation with model architectures, such\
    \ as the multi-agent frameworks implemented here, could help\\naddress this issue.\\n\\u2022 Access: AI tools such as\
    \ Denario require significant investment in computational infrastructure\\nand energy for their training and operation.\
    \ These constraints shape which actors have access to\\ntheir use and operation, affecting the fields of science being\
    \ chosen for AI agent-driven research, the\\ntypes of problems being tackled, and the methods used to do so. We must take\
    \ deliberate steps to\\ndemocratize both access to the benefits of AI agent-driven research and participation in its creation\\\
    nand training, in order to make sure science addresses the full breadth of interests and problems\\nacross societies.\\\
    n65\\n\\n\\u2022 Authorship: Generative AI has already sparked debates over the nature of scientific authorship\\nand\
    \ Denario is no different. A key requirement for understanding the debate is a careful definition of\\nthe roles of authorship\
    \ in the scientific literature. One clear role of authorship is its use to allocate\\nprofessional credit and recognition\
    \ for doing work, which is important for career development.\\nThis aspect of authorship raises important questions that\
    \ we must build answers to as a scientific\\ncommunity: if a human author uses AI agents to aid their research, in what\
    \ ways is that different\\nfrom previous research tools, and should that change the way we attribute professional credit\
    \ to the\\nhuman author? Should AI systems be assigned that kind of professional credit, and if so, for what\\npurpose?\
    \ How should the corpus of work used to train the AI agent be recognized, and what kind\\nof professional credit should\
    \ be used? Moreover, a second role of authorship implies responsibility\\nfor the quality and some implications of the\
    \ results presented, an aspect that also raises critical\\nquestions for both the scientific community and wider society.\\\
    nWho should bear the ultimate\\nresponsibility for the work presented in a paper?\\nWhat kind of guarantees and accountability\\\
    nshould be upheld by the individuals and organizations training the model? A valuable but certainly\\ninsufficient step\
    \ to addressing these issues would be to clearly state when a research article has been\\ngenerated by agentic systems,\
    \ which would have the added benefit of flagging the article as such\\nwhen considering the training datasets of future\
    \ AI agents, improving their performance [90].\\n\\u2022 Misalignment of incentives in scientific publishing: Given the\
    \ speed and volume with which\\nresearch articles can be generated using agentic tools like Denario and the career incentives\
    \ that\\nare associated with inflated publishing statistics in our current academic system, the proliferation\\nof AI\
    \ agent-driven research may lead to a deluge of low-quality papers overwhelming scientific\\npublishing and readership\
    \ capabilities. This misalignment of career incentives with the purposes of\\nproductively advancing scientific knowledge\
    \ can also lead to situations in which users maliciously\\ngenerate research articles that purposefully cite their own\
    \ previous research. These challenges pose\\nquestions not only about the incentive structure in academic publishing and\
    \ career building, but\\nalso about what the role of a \\u201cresearch article\\u201d is in the age of generative AI and\
    \ what form or\\nmedium can most effectively communicate and evaluate science in this new regime.\\n\\u2022 Environmental\
    \ concerns: Training and running LLMs come at a significant cost in the consump-\\ntion of energy, water, coolant, and\
    \ rare earth metals, among others [91, 92]. As with other massive\\napplications of machine learning, the scale of this\
    \ resource consumption is far from sustainable at\\nthe time of writing. Researchers must take active roles in advocating\
    \ for and developing solutions\\nto address this major issue.\\n\\u2022 Malicious use: AI agents could be used to quickly\
    \ flood the scientific literature with claims driven\\nby a particular political agenda or specific commercial or economic\
    \ interests. The volume of papers\\ncreated could then influence the corpus used to train non-malicious AI agents, reinforcing\
    \ and\\neffectively \\u201claundering\\u201d facts. Developing ways to detect this at the technical level and discuss\
    \ it\\nat the societal level is critical.\\nOverall, tools like Denario can enhance researchers\\u2019 capabilities by\
    \ helping them in tasks that require\\na significant amount of time, such as writing papers, debugging code, or exploring\
    \ ideas. We believe the\\nbest usage of Denario would be as an AI-assistant for different tasks. For instance, it can\
    \ be used to\\nimprove an idea (by exploiting methods not known to the researcher), or help with the writing of the\\\
    npaper once the results are in place. Denario is able to perform complex tasks orders of magnitude faster\\nthan humans.\
    \ We think the quality of the research papers will crucially depend on how the system is\\nused:\\n\\u2022 Responsible\
    \ usage. We believe that under responsible usage, the quality of the research papers will\\nimprove. In order to explain\
    \ this apparently contradictory logic (fast generation vs quality), we\\nbelieve that researchers are usually time-limited;\
    \ e.g., an undergraduate needs to graduate or a\\ngraduate student needs to apply for postdoc/faculty jobs. Given a fixed\
    \ amount of time, the fact\\nthat a very small fraction of that time goes into generating a draft with all associated\
    \ codes and\\nplots, will enable the researcher to dedicate more time to thinking deeper, improving the quality of\\nthe\
    \ paper, improving the methods, than if the user needs a very large fraction of the time to just\\nproduce a first draft.\\\
    n\\u2022 Irresponsible usage. If the usage takes place in an irresponsible manner, i.e. just generating papers\\nwithout\
    \ or little validation, then given the current capabilities of systems like Denario, the quality\\nof the papers will\
    \ degrade.\\n66\\n\\nWhile we expect both usage modes, we think most researchers will make use of these tools responsibly.\\\
    nFinally, we would like to stress that systems like Denario will further emphasize the need to give more\\nweight to quality\
    \ rather than quantity when evaluating scientists\\u2019 careers. However, given the fact that\\nquality is very hard\
    \ to quantify and likely subjective, the current system may need to reshape itself for\\nthe benefit of science and society.\\\
    n7.2\\nEpistemic changes in a science driven by AI agents\\nThe integration of LLMs and AI agents into scientific practice\
    \ marks a profound inflection point in the\\nphilosophy of science. These systems are not mere computational tools; they\
    \ increasingly participate\\nin the core activities of science\\u2014formulating hypotheses, synthesizing literature,\
    \ generating theoretical\\nconnections, falsification procedures, theory choice, epistemic virtue-discussions, and even\
    \ simulating\\nreasoning.\\nThis shift forces us to re-examine long-standing philosophical frameworks concerning the\\\
    nnature of scientific rationality, understanding, and progress. In particular, the proliferation of AI agents\\nin scientific\
    \ research poses questions regarding the nature of scientific knowledge, its legitimacy, its quality,\\nand its ultimate\
    \ purpose.\\n7.2.1\\nThe nature of scientific knowledge in AI-driven science\\nTo examine this, we can first turn to the\
    \ notion of \\u201cresearch programmes\\u201d as defined by Imre Lakatos\\n(1978) [93]: long-term, theoretical frameworks\
    \ with a stable \\u201chard core\\u201d and evolving \\u201cprotective belts\\u201d\\nof auxiliary hypotheses. Lakatos\
    \ argued that scientific rationality lies in comparing the relative progress\\nof these programmes: a progressive programme\
    \ predicts novel facts and accommodates anomalies, while\\na degenerative one merely accommodates data retrospectively.\
    \ Within this framework, LLMs raise fun-\\ndamental questions.\\nAre they simply auxiliary tools bolstering existing programmes\\\
    u2014helping refine\\ntheories, conduct literature reviews, and test hypotheses more efficiently? Or do they represent\
    \ the birth\\nof a new kind of research programme altogether\\u2014one not driven by causal explanation, but by linguistic\\\
    nmodeling, probabilistic reasoning, and massive-scale pattern recognition?\\nIf the latter is true, then LLMs bring with\
    \ them a new type of \\u201chard core\\u201d: the assumption that\\nknowledge is fundamentally representable and usable\
    \ in statistical-linguistic form.\\nThis new type of\\nhardcore could be ultimately defined as the model embeddings of\
    \ a training dataset and interpreted in\\nhuman terms as the weighted aggregate of a body of scientific literature. Weighted\
    \ how? Nobody can\\nfully understand, because understanding mechanistically is no longer the goal. This contrasts sharply\\\
    nwith traditional programmes based on mechanistic or formal-logical representations. Moreover, LLMs\\nproduce novel predictions,\
    \ connections, and reformulations\\u2014yet not always in a way that is interpretable\\nor falsifiable in Lakatosian terms.\
    \ As such, they may challenge the very criteria by which progress in\\nscience is traditionally measured. Lakatos maintained\
    \ a vision of rational science driven by theoretically\\nmotivated explanations; LLMs, in contrast, are increasingly effective\
    \ despite their lack of explicit theory.\\nTheir success poses a challenge: can a research programme be progressive even\
    \ if it lacks a human-\\nunderstandable theoretical core?\\nW.V.O. Quine\\u2019s epistemology\\u2014particularly as articulated\
    \ in \\u201dTwo Dogmas of Empiricism\\u201d (1951)\\n[94] and his broader naturalized epistemology\\u2014offers a subtle\
    \ but profound framework for understanding\\nthe epistemic disruptions caused by LLMs. Quine rejected the analytic-synthetic\
    \ distinction and argued\\nfor a holistic view of knowledge, where statements face the tribunal of experience not in isolation,\
    \ but\\nonly as part of an interconnected web of belief. In this view, revision is always possible, even for logical\\\
    nor mathematical statements, and empirical data can force changes anywhere in the system.\\nFrom this perspective, LLMs\
    \ do not simply introduce new tools into the scientist\\u2019s arsenal; they\\nreconfigure the web itself. LLMs are not\
    \ theory-driven or tethered to empirical input in the traditional\\nsense. They model language, not the world\\u2014but\
    \ through language, they influence belief revision, hy-\\npothesis generation, and theoretical framing. As such, they\
    \ intervene in science at the level of conceptual\\nstructure, shifting what is considered coherent, plausible, or meaningful\
    \ within the web of scientific belief.\\n7.2.2\\nThe nature of scientific legitimacy, quality, and purpose in AI-driven\
    \ science\\nThe notion that science is a historically contingent and socially negotiated enterprise, insisted upon\\nby\
    \ writers such as Paul Feyerabend (1975) [95], finds new relevance in the age of AI. As LLMs are\\nintegrated into research\
    \ workflows, they begin to shape what is seen as legitimate knowledge, not through\\nphilosophical argument but through\
    \ infrastructural embedding\\u2014by determining what is written, cited,\\nor ignored. This has deep implications for\
    \ the sociology of knowledge: the epistemic authority of LLMs\\n67\\n\\nmay evolve not because they \\u201cknow\\u201d\
    \ in any human sense, but because they shape the conditions under\\nwhich knowledge is produced and circulated.\\nAdditionally,\
    \ Quine\\u2019s naturalized epistemology\\u2014his call to study knowledge using the methods of\\nscience itself\\u2014opens\
    \ the door to seeing LLMs as epistemic agents within a naturalized framework. They\\nare not mere passive instruments\
    \ but active components in the scientific ecosystem, akin to laboratories,\\nstatistical methods, or even communities\
    \ of inquirers. Yet they differ in one crucial way: they operate in a\\nnon-transparent manner, lacking not only introspection\
    \ but causal understanding. This opacity generates\\nan ontological challenge: What is the status of knowledge produced\
    \ by a system that lacks grounding in\\nexperience or semantics, and whose justification lies in performance rather than\
    \ comprehension? How is\\nthe quality of this mode of scientific knowledge judged, and should it be judged differently\
    \ at all?\\nFrom a Quinean standpoint, LLMs are both natural extensions of scientific inquiry and radical dis-\\nruptors\
    \ of its structure. They unsettle the boundary between tool and theorist, instrument and agent.\\nThey force us to reconsider\
    \ what counts as observation, evidence, and explanation, and they deepen the\\nholistic fluidity of the scientific web\\\
    u2014potentially accelerating progress, but also undermining the inter-\\npretive clarity on which much of science has\
    \ historically depended. Ultimately, AI-driven research opens\\n(or reopens) a question on the fundamental purpose and\
    \ value of scientific knowledge and enterprise,\\nhighlighting a tension between the goal of a mechanistic, human understanding\
    \ of the world and the goal\\nof achieving statistical practical utility first and foremost.\\nAn interesting situation\
    \ in which this tension surrounding the ultimate purpose of agentic AI research\\nmanifests is the Turing Trap [96]. The\
    \ term \\u201cTuring Trap\\u201d refers to the tendency to develop AI systems\\nthat mimic or replace human cognition,\
    \ instead of enhancing or complementing it. Named in reference to\\nAlan Turing\\u2019s famous test for machine intelligence,\
    \ the trap emerges when passing as human becomes the\\nbenchmark for success, thus narrowing the scope of what AI can\
    \ and should do. In science, this translates\\ninto a shift from tools that assist human reasoning toward agents that\
    \ simulate it. LLMs such as GPT-5\\nare increasingly being used not merely for clerical tasks, but for co-authoring papers,\
    \ generating reviews,\\nor even proposing research directions. This then underscores the question: if AI agents have the\
    \ potential\\nto exceed human capabilities in at least certain regards, should we reevaluate the basic tasks and units\\\
    nof how science is practiced, communicated, and evaluated in non-human terms?\\n7.3\\nThe impact of AI agent-driven science\
    \ on the structure of scientific work\\nBesides the questions raised regarding epistemic changes in the nature of science\
    \ and scientific knowledge,\\nagentic AI-driven research also appears poised to reconfigure the structure of scientific\
    \ practice.\\nTo\\nunderstand the ways in which this may occur, it is helpful to use the framework developed by Thomas\\\
    nKuhn (1975) [97] according to which science develops through periods of \\u201cnormal science\\u201d in which\\nknowledge\
    \ is incorporated into existing theoretical frameworks, alternated by \\u201cparadigm shifts\\u201d during\\nwhich those\
    \ frameworks are overhauled.\\n7.3.1\\nAI agent-driven science as an enabler of innovation\\nFrom a Kuhnian perspective,\
    \ LLMs could be seen as catalysts for a paradigm shift. Kuhn emphasized\\nthat science does not evolve through continuous\
    \ accumulation of knowledge, but rather through disruptive\\nrevolutions in which one paradigm is replaced by another,\
    \ reshaping the methods, standards, and even\\nthe very questions that science considers meaningful. LLMs introduce precisely\
    \ this kind of rupture: they\\nnot only change how science is done, but what it means to do science. Their ability to\
    \ generate plausible\\nhypotheses, summarize vast literatures, and recombine knowledge across disciplinary boundaries\
    \ at scales\\nand speeds beyond the capabilities of a single human researcher challenges the prevailing paradigm in\\\
    nwhich singular human cognition, creativity, and interpretive judgment are central to scientific discovery.\\nKuhn\\u2019s\
    \ notion of \\u201cnormal science\\u201d, routine puzzle-solving within an accepted paradigm, may become\\ndestabilized\
    \ as LLMs increasingly participate in tasks once thought uniquely human. Moreover, their\\nepistemic style is deeply different:\
    \ LLMs operate not on causal mechanisms but on statistical and linguistic\\nassociations. Insofar as LLMs begin to influence\
    \ theory choice, experimental design, or even what is\\nconsidered an interesting or valid research question, they may\
    \ be ushering in a new epistemic regime,\\none where prediction trumps explanation, pattern overrules theory, and where\
    \ coherence across texts\\nreplaces ontological depth. Kuhn\\u2019s framework helps us see that the rise of LLMs may not\
    \ be a simple\\ntechnological enhancement. It could even bring us to a deep transformation of the values and structures\\\
    nthat undergird scientific practice. This presents a challenge for the very practice of science.\\nPaul Feyerabend\\u2019s\
    \ radical critique of scientific rationality offers another perspective.\\nIn Against\\nMethod (1975) [95], Feyerabend\
    \ argued that science does not\\u2014and should not\\u2014operate according to\\n68\\n\\nfixed methodological rules. Progress,\
    \ he claimed, often occurs when conventions are violated and when\\nheterodox or even \\u201cirrational\\u201d approaches\
    \ are permitted to flourish. From this viewpoint, LLMs may\\nbe the ultimate Feyerabendian agents.\\nThey defy the norms\
    \ of methodological consistency, rely on\\nopaque black-box architectures, and generate insights not through logic or\
    \ controlled experimentation\\nbut through stochastic generation and pattern inference across language corpora. Precisely\
    \ because of this\\ntransgressive character, LLMs may serve as engines of epistemic pluralism and innovation. They break\\\
    ndown disciplinary barriers, resurface forgotten ideas, and draw novel analogies that human researchers\\nmay overlook.\
    \ Feyerabend\\u2019s critique of scientific monism\\u2014the idea that there is one best method or\\none correct epistemic\
    \ framework\\u2014is echoed in the way LLMs expose the contingencies and limits of\\nhuman-centric scientific norms. In\
    \ his terms, they have the potential to be tools that reassert the chaotic,\\ncultural, and creative dimensions of science,\
    \ reminding us that genuine progress often arises not from\\nstrict adherence to method but from bold and unpredictable\
    \ departures from it.\\n7.3.2\\nAI agent-driven science as a stifling, homogenizing force\\nDespite this potential, an\
    \ argument can also be made that AI agent-driven science risks minimizing\\ninnovation rather than enhancing it. In Kuhnian\
    \ terms, AI agent-driven scientist could lead to a reduction\\nin paradigm shifts and a slump into \\u201dperpetual normal\
    \ science\\u201d. When AI agents carry out entire cycles of\\nknowledge production, we risk creating a system that perpetually\
    \ produces research extending the status\\nquo, the risk of homogeneity. Given that these agents are by design trained\
    \ on broadly similar bodies of\\nknowledge, one wonders to what degree they are intrinsically biased towards what Kuhn\
    \ calls \\u201dnormal\\nscience production\\u201d, tending to generate output that fits well to knowledge available in\
    \ the training set.\\nIn Feyerabendian terms, the nightmare of total scientific monism could be a possible outcome of\
    \ AI-driven\\nhomogenization if AI agent research converges on the same training data sets, architectures, and desired\\\
    noutcomes.\\nIn addition to the biases inherent in their own architecture, AI agent-driven research can also reinforce\\\
    nbiases in the structures of scientific institutions. The ease with which agentic AI can be used to produce\\nscientific\
    \ output that easily conforms to existing dogma\\u2014useful in some environments to inflate statistics\\nvaluable for\
    \ career advancement\\u2014could result in less paradigm-shifting work. Furthermore, the potential\\nfor a rapid feedback\
    \ loop in which future agentic AI is training on AI-generated scientific literature with\\nthe same bias towards \\u201dextending\\\
    u201d existing theory (rather than disrupting it) could accelerate this trend.\\nHowever, this doesn\\u2019t have to be\
    \ the case: we can build in statistical and agent-level architectures\\nthat minimize this bias towards normal science\
    \ and emphasize the role of human scientists within the\\nloop of AI-assisted knowledge production. Achieving this implies\
    \ an active effort from all parts of the\\nscientific enterprise, from the computer science behind the design of AI agents\
    \ to the career incentives for\\nindividuals and funding mechanisms used to encourage scientific production. It is crucial\
    \ to democratize\\nboth access to the tools themselves as well as the skills and infrastructure for their development,\
    \ and to\\nbe deliberate and conscientious when compiling training data.\\n7.4\"\n  },\n  {\n    \"name\": \"Conclusions\
    \ from philosophy of science\",\n    \"text\": \"LLMs do not merely support current scientific practice; they transform\
    \ it. Through the lens of Kuhn [97],\\nthey potentially inaugurate a new paradigm of machine-augmented science\\u2014or\
    \ plunge us into perpetual\\nnormal science. Through Lakatos [93], they challenge existing research programmes and perhaps\
    \ herald\\na new one grounded in probabilistic modeling rather than explanatory theory, with the potential to\\nbring\
    \ about unprecedented pragmatic relevance\\u2014and perhaps a vision of science divorced from human\\nunderstanding. And\
    \ through Feyerabend [95], they emerge as agents of epistemic disorder and creativity,\\nunsettling dogma and enabling\
    \ new modes of inquiry\\u2014or trap us in sterile, homogenized scientific monism.\\nAs the transformation of science\
    \ and its practice by AI tools continues, it is worth remembering that an\\nLLM is ultimately an \\u201cuniversal interpolator\\\
    u201d that retrieves information\\u2014directly or interpolated\\u2014from\\na body of knowledge, with all the advantages\
    \ and flaws that this entails.\\nUltimately, AI agent-driven science raises crucial but uncomfortable questions at the\
    \ heart of sci-\\nence: are we outsourcing not just labor, but judgment and meaning? When the outputs of LLMs are\\ntreated\
    \ as autonomous knowledge contributions\\u2014rather than the mediated results of probabilistic as-\\nsociations\\u2014they\
    \ can displace the interpretive and evaluative labor that defines good science. Scientific\\nrationality becomes performative:\
    \ coherence, plausibility, and citation density stand in for theoretical\\ndepth, causal understanding, or experimental\
    \ validation. To engage seriously with the implications of\\nLLMs, we must therefore go beyond technical or instrumental\
    \ perspectives and grapple with the philo-\\nsophical foundations of science itself. What counts as knowledge, explanation,\
    \ or progress may no longer\\n69\\n\\nbe what it once was\\u2014and it is only by revisiting and reevaluating previous\
    \ frameworks of science that\\nwe can begin to navigate this new epistemic terrain.\\n8\\nSummary and Conclusions\\nIn\
    \ this work, we have introduced Denario, an AI multi-agent system designed as a research assistant.\\nDenario is built\
    \ in a modular way, and can perform many different tasks, such as\\n\\u2022 Generate novel or refine existing research\
    \ ideas\\n\\u2022 Check the literature to determine whether an idea is new and its potential interest\\n\\u2022 Develop\
    \ detailed research plans\\n\\u2022 Write and execute code, make plots, and summarize results\\n\\u2022 Draft a scientific\
    \ paper\\n\\u2022 Review a scientific paper\\nDenario can also perform end-to-end scientific research by running all the\
    \ above modules sequentially.\\nDifferent modules require different inputs and produce different outputs (see Table 1).\
    \ When run in\\nend-to-end mode, the system only requires an input text containing general instructions to the system\\\
    n(e.g., describing the data to be used). We emphasize that the goal of Denario is not to automate science,\\nbut rather\
    \ to serve as a powerful tool to help researchers across disciplines accelerate scientific discovery.\\nIn Section 2,\
    \ we described the different components needed for creating multi-agent systems, from\\nLarge Language Models (LLMs) to\
    \ agentic orchestration. In Section 3, we presented in detail the different\\nmodules in Denario and the tasks they carry\
    \ out. We have illustrated the capabilities of Denario in\\nSection 5 by evaluating papers generated by it in many different\
    \ scientific disciplines, from astrophysics\\nto biology. From the expert evaluation of these manuscripts, we conclude\
    \ that the generated papers are\\nat the level of what a good undergraduate or early graduate student could achieve after\
    \ weeks or a few\\nmonths of work. In comparison, it took Denario around 30 minutes per paper and a cost of around $4.\\\
    nWe have discussed the failure modes, the importance of validation and evaluation, and the advantages\\nand limitations\
    \ of Denario in Sec. 6. Finally, in Sec. 7 we discussed the ethical considerations that\\nagentic systems like Denario\
    \ lead to and discussed how these technological advances could be perceived\\nfrom a philosophy of science perspective.\\\
    nWe note that we have not discussed important aspects related to AI agents such as benchmarking\\n[98] and risks [99].\
    \ However, these are active areas of research.\\nWe conclude by stating that Denario represents one more example that\
    \ the latest advances in deep\\nlearning, in particular in large-language models and AI agents, may help scientists with\
    \ their work [5, 8].\\nAs we mentioned above, the papers that Denario can generate right now do not have the breadth and\\\
    nreach of those written by the more experienced researchers in the field. Whether future LLMs or more\\nsophisticated\
    \ systems with more specialized agents can achieve that remains an open question.\\nWe believe that tools like Denario\
    \ can open up new ways of doing science. Traditionally, researchers\\nfocus deeply on a small set of questions, since\
    \ tasks such as coding, reviewing the literature, and learning\\nnew concepts or tools require significant time and effort.\
    \ By contrast, Denario excels at rapidly exploring\\na broad range of ideas, albeit at a more superficial level. These\
    \ approaches are highly complementary:\\nAI can scan widely and highlight promising directions, while human experts can\
    \ select the most relevant\\nideas and pursue them in depth to achieve a deeper understanding.\"\n  },\n  {\n    \"name\"\
