    \ relevant for the development of step counting algorithms in phones, which could\\nbe located either in the hand, hence\
    \ close to the wrist, or in the pocket, close to the hip. Unfortunately,\\nfor these more novel research questions, the\
    \ model struggled to build insightful manuscripts, following\\nthis research question.\\n5.8.3\\nAssessment of research\
    \ output\\nFor the processing of wearables data, we identified the following strengths and limitations:\\nStrengths:\\\
    n\\u2022 Able to follow and understand the provided prompts: The Denario model followed the tasked prompt\\nas expected.\
    \ After noticing common errors in the first iteration and adjusting the prompt to avoid\\nthese errors in the following\
    \ outputs, these errors were successfully avoided.\\n\\u2022 Opportunity to iteratively improve prompts: As previously\
    \ noted, the first input to the Denario\\nmodel did not match our expectations of output manuscripts, but explored useful\
    \ ideas. These\\nideas and failures could then be used to better prompt the model in future attempts, iteratively\\nproducing\
    \ better results.\\n\\u2022 Able to produce novel and useful research questions: Some of the research questions explored\
    \ by\\nthe model provided a novel use of the dataset. Some of these insights have been stored as ideas for\\nfuture fellowship\
    \ applications.\\n\\u2022 Built on existing practices in the field: In many cases, the outputs of Denario are built on\
    \ the use\\nof existing models from published literature. In some cases, the research question involved the use\\nof new\
    \ approaches in machine learning, not yet applied to wearable data, but showed advanced\\ndomain knowledge in new machine\
    \ learning approaches. In other cases, the evaluation metrics,\\nand window segmenting approaches followed by Denario\
    \ match that as standard in the wearable\\nmonitoring domain.\\nLimitations:\\n\\u2022 Use of jargon not relevant to the\
    \ research question: It was noted that in several manuscripts\\nproduced by Denario, some methods or results chapters\
    \ would consist of words and concepts that\\nare relevant to the wearable monitoring space, but not relevant to the particular\
    \ research question.\\nOne example manuscript explored how signal features differed between device locations, but results\\\
    npresented AUC scores, which would be expected to report the performance of a classification model,\\nwhich was not developed\
