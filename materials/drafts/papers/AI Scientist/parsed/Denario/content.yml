    \ in a 2D layout\\n(FR1/FR2) and colored by annotated stage (left) or calcu-\\nlated pseudotime (right).\\nThe plot shows\
    \ the progression\\nfrom late ring to early trophozoite stages, reflecting the lim-\\nited asexual stages captured from\
    \ field samples.\\nFigure 13.\\nPAGA graph showing the asexual trajectory\\nin field isolates. Strong connectivity between\
    \ late ring and\\nearly trophozoite stages reflects the limited asexual stages\\ncaptured in the field data.\\nconnections\
    \ from the main male and female gametocyte\\nclusters to their respective \\u2019LE\\u2019 counterparts (Figure\\n17),\
    \ indicating that these late-stage cells represent a fur-\\nther point in the maturation trajectory occurring in the\\\
    nhuman host. This finding provides compelling evidence\\nthat the sexual development pathway in field isolates\\nis more\
    \ prolonged or involves distinct late maturation\\nsteps that are typically not completed or maintained in\\nstandard\
    \ laboratory culture conditions.\\n3.5. Identification of candidate master regulators and\\ninferred regulatory networks\\\
    nTo investigate the potential regulatory mechanisms\\nunderlying the observed differences in developmental\\ntrajectories\
    \ and transcriptional programs, we applied a\\nFigure 14.\\nPAGA graph visualizing the sexual develop-\\nment trajectory\
    \ in laboratory-adapted P. falciparum strains.\\nNodes represent life cycle stages, and edges indicate inferred\\ntranscriptional\
    \ connectivity. The graph shows a clear bifur-\\ncation from developing gametocytes into distinct male and\\nfemale lineages.\\\
    nFigure 15. PAGA graph of the sexual development trajec-\\ntory in lab-adapted Plasmodium falciparum. Nodes represent\\\
    ncell stages, colored by pseudotime, with edges indicating con-\\nnectivity. The graph shows the bifurcation from developing\\\
