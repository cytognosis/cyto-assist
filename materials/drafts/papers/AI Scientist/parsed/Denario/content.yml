    \ Question\\nAnswering. https://arxiv.org/abs/2408.07888\\n\\n13\\nYuan, C., Chen, Z.-C., & Liu, L. 2025, GW231123 Mass\\\
    nGap Event and the Primordial Black Hole Scenario.\\nhttps://arxiv.org/abs/2507.15701\\n\\nA.6\\nAstrophysics: stellar\
    \ physics\\n146\\n\\nDraft version August 5, 2025\\nTypeset using LATEX twocolumn style in AASTeX631\\nConvection, Radiation,\
    \ and the Instantaneous Mass Transfer in Red Supergiant Binaries: A 3D\\nSimulation Analysis\\nDenario1\\n1Anthropic,\
    \ Gemini & OpenAI servers. Planet Earth.\"\n  },\n  {\n    \"name\": \"ABSTRACT\",\n    \"text\": \"Understanding mass\
    \ transfer in Red Supergiant (RSG) binary systems is challenged by the dynamic,\\nthree-dimensional nature of stellar\
    \ convection and radiation, which are often simpli\\ufb01ed or time-averaged\\nin traditional models. This study addresses\
    \ this by performing an in-depth spatial statistical analysis\\nof instantaneous mass transfer, leveraging a unique, high-resolution\
    \ 3D simulation snapshot of an RSG\\ndonor. We comprehensively characterized the instantaneous mass \\ufb02ux using probability\
    \ distribution\\nfunctions and higher-order moments, identi\\ufb01ed coherent hydrodynamic structures via vortex identi\\\
    ufb01-\\ncation and spectral analysis, classi\\ufb01ed \\ufb02ow regimes with unsupervised machine learning, mapped mass\\\
    ntransfer pathways through streamline tracing, and quanti\\ufb01ed the radiative in\\ufb02uence by local force\\nbalance\
    \ calculations. Our results reveal that mass transfer is highly intermittent and clumpy, with\\ndensity and mass \\ufb02ux\
    \ distributions exhibiting high kurtosis, indicative of spatially localized, dense out-\\n\\ufb02ows. Surprisingly, despite\
    \ signi\\ufb01cant stellar convection, our detailed streamline tracing shows that,\\nat this speci\\ufb01c instant, no\
    \ stable, coherent accretion stream crosses the inner Lagrangian (L1) point;\\ninstead, mass is ejected in broad, relatively\
    \ straight, plume-like structures, resembling a convection-\\ndriven wind. Crucially, we \\ufb01nd that while initially\
    \ dynamically insigni\\ufb01cant near the stellar surface,\\nradiation pressure becomes the dominant accelerating force\
    \ in the lower-density regions away from the\\nstar, profoundly shaping the out\\ufb02ow morphology and e\\ufb03ciency.\
    \ This multi-faceted analysis provides\\nunprecedented insights into the fundamental physics governing instantaneous mass\
    \ transfer in massive\\nbinaries, serving as a critical benchmark for future time-dependent simulations and binary evolution\\\
    nmodels.\\nKeywords: Gravitational interaction, Radiative transfer equation, Common envelope evolution, New-\\ntonian\
    \ gravitation, Stellar accretion\"\n  },\n  {\n    \"name\": \"INTRODUCTION\",\n    \"text\": \"Mass transfer in binary\
    \ star systems is a pivotal pro-\\ncess that dictates the evolution of a vast array of astro-\\nphysical objects, ranging\
    \ from Type Ia supernovae pro-\\ngenitors and X-ray binaries to the progenitors of gravi-\\ntational wave sources formed\
    \ by compact object merg-\\ners. Among these systems, Red Supergiant (RSG) stars\\npresent a particularly challenging,\
    \ yet crucial, phase.\\nRSGs possess extended, convective envelopes that can\\nexpand to \\ufb01ll their Roche lobes,\
    \ initiating dynamic mass\\ntransfer onto a companion. Accurately modeling the in-\\ntricate details of this process is\
    \ fundamental for predict-\\ning the evolutionary pathways and observable signatures\\nof such massive binaries.\\nHowever,\
    \ capturing the nuances of mass transfer from\\nRSGs poses signi\\ufb01cant theoretical and computational\\nhurdles.\\\
    nThe deep envelopes of RSGs are character-\\nized by vigorous, large-scale convection, which generates\\ncomplex, three-dimensional\
    \ (3D), and inherently time-\\ndependent \\ufb02ow patterns. Traditional stellar evolution\\nmodels often resort to simpli\\\
    ufb01ed, one-dimensional (1D)\\nor time-averaged prescriptions for convection, such as\\nmixing-length theory. These simpli\\\
    ufb01cations, while com-\\nputationally expedient, fundamentally miss the instan-\\ntaneous, spatially heterogeneous,\
    \ and turbulent nature\\nof the stellar out\\ufb02ow. Furthermore, radiation, a criti-\\ncal component of the energy balance\
    \ and dynamics in\\nmassive stars, can exert substantial pressure and con-\\ntribute signi\\ufb01cantly to the forces\
    \ driving mass trans-\\nfer.\\nIts transport through an optically thick, turbu-\\nlent medium is computationally demanding,\
    \ often lead-\\ning to approximations like di\\ufb00usion or local thermody-\\nnamic equilibrium. Such approximations\
    \ frequently ne-\\nglect the dynamic interplay between the radiation \\ufb01eld\\nand the gas. Consequently, the precise\
    \ morphology, e\\ufb03-\\nciency, and underlying physical drivers of instantaneous\\n\\n2\\nmass transfer from convective\
    \ RSGs in binaries remain\\npoorly understood. Existing models often simplify the\\nprocess to a smooth, quasi-steady\
    \ \\ufb02ow primarily chan-\\nneled through the inner Lagrangian (L1) point, over-\\nlooking the potential for highly\
    \ intermittent, clumpy,\\nand non-canonical mass loss mechanisms driven by the\\nintrinsic stellar hydrodynamics and radiative\
    \ forces.\\nThis paper directly addresses these limitations by\\nperforming an unprecedented, in-depth spatial statis-\\\
    ntical analysis of the instantaneous mass transfer pro-\\ncess in a Red Supergiant binary system. Leveraging a\\nunique,\
    \ high-resolution 3D simulation snapshot of an\\nRSG donor, our study moves beyond time-averaged or\\nsimpli\\ufb01ed\
    \ models to unravel the intricate, spatially het-\\nerogeneous nature of the mass \\ufb02ux and its underlying\\nphysical\
    \ drivers at a speci\\ufb01c moment in time.\\nOur\\nmethodology is structured around four key thrusts de-\\nsigned to\
    \ provide a comprehensive understanding: First,\\nwe conduct a comprehensive 3D statistical characteriza-\\ntion of the\
    \ instantaneous local mass \\ufb02ux vector, \\u03c1\\u20d7v. This\\nincludes computing Probability Distribution Functions\\\
    n(PDFs) and higher-order moments (such as skewness\\nand kurtosis) to quantify the intermittency and clumpi-\\nness of\
    \ the \\ufb02ow, alongside multi-scale spatial correla-\\ntion functions (e.g., two-point correlations and velocity\\\
    nstructure functions) to identify characteristic scales and\\nanisotropies across critical regions, including the stellar\\\
    nsurface and the vicinity of the L1 point.\\nSecond, we\\nidentify and quantify the coherent hydrodynamic struc-\\ntures\
    \ that instantaneously drive or modify mass transfer.\\nThis involves employing advanced techniques like vortex\\nidenti\\\
    ufb01cation (e.g., the Q-criterion) to map turbulent ed-\\ndies and performing spectral analysis (3D power spectra\\nfor\
    \ density, kinetic energy, and mass \\ufb02ux) to pinpoint\\ndominant spatial scales. Furthermore, we apply unsu-\\npervised\
    \ machine learning techniques to classify distinct\\n\\ufb02ow regimes based on local hydrodynamic and radiative\\nproperties.\
    \ Third, we map and quantify the instanta-\\nneous mass transfer pathways by performing extensive\\n3D streamline tracing\
    \ from numerous systematically dis-\\ntributed seed points on the RSG surface. This allows us\\nto rigorously delineate\
    \ how mass instantaneously leaves\\nthe donor and enters the binary environment, quanti-\\nfying the spatial density,\
    \ coherence, and tortuosity of\\nthese pathways. Finally, we conduct a detailed quanti-\\ntative analysis of the radiative\
    \ in\\ufb02uence on the instan-\\ntaneous \\ufb02ow morphology.\\nThis involves a local force\\nbalance calculation, comparing\
    \ the magnitudes of ra-\\ndiation pressure gradients (\\u2207\\u00b7 Pr) with gas pressure\\ngradients (\\u2207Pg), gravitational\
    \ forces, and inertial terms\\n(\\u03c1(\\u20d7v \\u00b7 \\u2207)\\u20d7v), to identify regions where radiation e\\ufb00ects\\\
    nare dominant. We also examine the spatial correlation\\nbetween radiation \\ufb01elds (energy density, \\ufb02ux, and\
    \ pres-\\nsure tensor) and the gas density, velocity, and mass \\ufb02ux\\n\\ufb01elds, alongside an analysis of radiative\
    \ heating/cooling\\nrates (\\u2207\\u00b7 \\u20d7Fr).\\nBy integrating these advanced computational hydro-\\ndynamic and\
    \ statistical analysis techniques, this re-\\nsearch provides unprecedented insights into the fun-\\ndamental physics\
    \ governing instantaneous mass trans-\\nfer in massive binaries.\\nOur \\ufb01ndings reveal that the\\nprocess is far\
    \ more complex and dynamic than previ-\\nously assumed, characterized by highly intermittent and\\nclumpy out\\ufb02ows,\
    \ often resembling a convection-driven\\nwind rather than a stable accretion stream across the\\nL1 point. Crucially,\
    \ we demonstrate how radiation pres-\\nsure, initially dynamically insigni\\ufb01cant near the stel-\\nlar surface, becomes\
    \ the dominant accelerating force in\\nlower-density regions away from the star, profoundly\\nshaping the out\\ufb02ow\
    \ morphology and e\\ufb03ciency.\\nThis\\nmulti-faceted analysis serves as a critical benchmark for\\nfuture time-dependent\
    \ simulations and binary evolution\\nmodels, paving the way for a more accurate understand-\\ning of the evolution of\
    \ massive binary systems.\"\n  },\n  {\n    \"name\": \"METHODS\",\n    \"text\": \"The intricate nature of instantaneous\
    \ mass transfer\\nin Red Supergiant (RSG) binaries, driven by the in-\\nterplay of convection and radiation, necessitates\
    \ a so-\\nphisticated suite of computational and analytical tech-\\nniques. This study leverages a high-resolution 3D\
    \ sim-\\nulation snapshot to perform a detailed spatial statisti-\\ncal analysis, moving beyond traditional time-averaged\\\
    nor simpli\\ufb01ed models to unravel the complex, spatially\\nheterogeneous characteristics of the mass \\ufb02ux. All\
    \ com-\\nputationally intensive tasks were designed for parallel\\nexecution across 128 CPUs, employing frameworks such\\\
    nas Dask or \\u2018mpi4py\\u2018 to optimize performance.\\n2.1. Data preparation and exploratory data analysis\\nThe\
    \ foundation of our analysis is a single, high-\\nresolution 3D simulation snapshot of an RSG donor,\\nstored in the HDF5\
    \ \\ufb01le \\u2018star.out1 16543.athdf\\u2018.\\nThis\\ndataset was loaded using the custom \\u2018athena read.py\\\
    u2018\\nmodule, which facilitates access to the simulation\\u2019s grid\\nand physical variables. While the simulation\
    \ inherently\\noperates in normalized units, we maintained these units\\nfor internal consistency throughout the analysis,\
    \ keep-\\ning their physical scales in mind. Key physical quan-\\ntities extracted from the snapshot include the gas den-\\\
    nsity (\\u03c1), gas pressure (Pg), the three components of the\\ngas velocity vector (\\u20d7v = (vel1, vel2, vel3)),\
    \ and the com-\\nponents of the radiation energy density (Er), radiation\\n\\ufb02ux (\\u20d7Fr = (Fr1, Fr2, Fr3)), and\
    \ radiation pressure tensor\\n(Pr = (Pr11, Pr12, . . . , Pr33)).\\n\\n3\\n2.1.1. Coordinate system transformation\\nThe\
    \ simulation\\u2019s native computational grid is based\\non spherical coordinates (r, \\u03b8, \\u03c6), corresponding\
    \ to the\\nvariables \\u2018x1v\\u2018, \\u2018x2v\\u2018, and \\u2018x3v\\u2018 respectively. However,\\nmany aspects\
    \ of our analysis, particularly the de\\ufb01nition\\nof the L1 Lagrange point vicinity and the computation\\nof spatial\
    \ gradients, are more naturally expressed in a\\nCartesian coordinate system (x, y, z). Therefore, for ev-\\nery cell\
    \ center in the 3D grid, we computed and stored\\nits Cartesian coordinates using the standard transfor-\\nmation formulae:\\\
    nx = r sin(\\u03b8) cos(\\u03c6)\\ny = r sin(\\u03b8) sin(\\u03c6)\\nz = r cos(\\u03b8)\\nwhere r = x1v, \\u03b8 = x2v,\
    \ and \\u03c6 = x3v. For this binary\\nsystem, the orbital plane is assumed to be the x\\u2212y plane\\n(\\u03b8 = \\\
    u03c0/2), with the donor star positioned at the origin\\n(0, 0, 0) and the companion star located along the posi-\\ntive\
    \ x-axis at (rm2, 0, 0), where rm2 = 2000 simulation\\nunits.\\n2.1.2. De\\ufb01nition of analysis regions\\nTo facilitate\
    \ a focused analysis on critical areas of the\\nbinary system, three distinct spatial regions were pre-\\ncisely de\\\
    ufb01ned using boolean masks:\"\n  },\n  {\n    \"name\": \"RSG Stellar Surface: This region represents the\",\n    \"\
    text\": \"outer layers of the donor star where mass transfer\\noriginates. It was de\\ufb01ned as a spherical shell en-\\\
    ncompassing cells where the radial coordinate \\u2018x1v\\u2018\\nfalls between 650 and 684 simulation units. This\\nrange\
    \ corresponds to approximately 5% of the\\nnominal RSG radius (RRSG \\u2248rm2/3 \\u2248667 so-\\nlar radii), capturing\
    \ the dynamic interface of the\\nstellar envelope.\"\n  },\n  {\n    \"name\": \"L1 Point Vicinity: The inner Lagrangian\
    \ point\",\n    \"text\": \"(L1) is traditionally considered the primary con-\\nduit for mass transfer in binary systems.\
    \ Based\\non the binary parameters, the L1 point is located\\nat approximately rl1 = 0.536974 \\u00d7 rm2 = 1073.9\\nsimulation\
    \ units along the axis connecting the two\\nstars. In Cartesian coordinates, this corresponds\\nto (1073.9, 0, 0). We\
    \ de\\ufb01ned the L1 vicinity as a\\ncubic volume of side length 200 simulation units,\\ncentered on this point, to capture\
    \ the \\ufb02ow dynam-\\nics in this crucial region.\"\n  },\n  {\n    \"name\": \"Accretion Stream: Initially, this region\
    \ was de-\",\n    \"text\": \"\\ufb01ned heuristically to identify potential mass trans-\\nfer pathways.\\nIt includes\
    \ all cells beyond the\\nRSG surface (x1v > 684) that exhibit a signi\\ufb01-\\ncant outward radial velocity (vel1 > 0.1\
    \ in simu-\\nlation units) and a gas density above a threshold\\n(\\u03c1 > 1e-4 in simulation units). This preliminary\\\
    nde\\ufb01nition allowed for initial exploration and was\\nsubsequently re\\ufb01ned through detailed streamline\\ntracing\
    \ (Section 4).\\n2.1.3. Initial statistical characterization\\nA preliminary statistical analysis was performed on\\nthe\
    \ full simulation box and the two statically de\\ufb01ned\\nregions (RSG Surface and L1 Vicinity).\\nThis initial\\npass\
    \ provided a baseline understanding of the global and\\nlocalized properties of the primary hydrodynamic vari-\\nables,\
    \ con\\ufb01rming the highly strati\\ufb01ed nature of the RSG\\nenvelope and the presence of signi\\ufb01cant out\\ufb02ow\
    \ veloci-\\nties near the L1 point. This foundational step informed\\nthe subsequent, more detailed statistical investigations.\\\
    n2.2. Comprehensive 3D statistical characterization of\\nmass \\ufb02ux\\nTo quantitatively assess the instantaneous mass\
    \ trans-\\nfer process, we performed a detailed statistical charac-\\nterization of the mass \\ufb02ux vector \\ufb01eld.\
    \ This approach\\nallowed us to quantify the intermittency and clumpi-\\nness of the \\ufb02ow, which are often overlooked\
    \ in simpli\\ufb01ed\\nmodels.\\n2.2.1. Mass \\ufb02ux calculation\\nThe instantaneous 3D mass \\ufb02ux vector \\ufb01eld,\
    \ \\u20d7J, was\\ncomputed for the entire simulation domain as the prod-\\nuct of the local gas density and velocity:\\\
    n\\u20d7J = \\u03c1\\u20d7v = (\\u03c1 \\u00b7 vel1, \\u03c1 \\u00b7 vel2, \\u03c1 \\u00b7 vel3)\\nThe three components\
    \ of \\u20d7J and its magnitude, | \\u20d7J| =\\nq\\nJ2x + J2y + J2z , were stored as new 3D arrays for sub-\\nsequent\
    \ analysis.\\n2.2.2. Probability distribution functions (PDFs)\\nUsing the region masks de\\ufb01ned in Section 1.3, we\
    \ ex-\\ntracted data from the RSG Surface, L1 Vicinity, and\\nthe initial Accretion Stream. For each region, Probabil-\\\
    nity Distribution Functions (PDFs) were computed for\\nthe following quantities: gas density (\\u03c1), individual ve-\\\
    nlocity components (vel1, vel2, vel3), the magnitude of\\nthe mass \\ufb02ux (| \\u20d7J|), and the radial component of\
    \ the\\nmass \\ufb02ux (Jr = \\u03c1 \\u00b7 vel1). For quantities spanning sev-\\neral orders of magnitude, such as density\
    \ and pressure,\\nlogarithmic binning was employed to accurately capture\\nthe distribution across the full range of values.\\\
    n\\n4\\n2.2.3. Higher-order moments\\nBuilding upon the computed PDFs, the \\ufb01rst four sta-\\ntistical moments were\
    \ calculated for each distribution:\\nmean, variance, skewness, and kurtosis. The mean and\\nvariance describe the central\
    \ tendency and spread of the\\ndata, respectively. Skewness quanti\\ufb01es the asymmetry\\nof the distribution, providing\
    \ insights into whether the\\n\\ufb02ow preferentially exhibits out\\ufb02ows or in\\ufb02ows. Kurto-\\nsis, a measure\
    \ of the \\u201dtailedness\\u201d or \\u201dpeakedness\\u201d of the\\ndistribution, was particularly crucial for identifying\
    \ the\\nlevel of intermittency and the presence of spatially local-\\nized, dense out\\ufb02ows, as highlighted in the\
    \ abstract. High\\nkurtosis values are indicative of rare, extreme events,\\nsuggesting a clumpy, rather than smooth,\
    \ mass transfer\\nprocess.\\n2.2.4. Spatial correlation functions\\nTo identify characteristic scales and anisotropies\\\
    nwithin the \\ufb02ow, particularly in the L1 Vicinity, we com-\\nputed spatial correlation functions. This inherently\
    \ par-\\nallel task was distributed across the available CPUs.\"\n  },\n  {\n    \"name\": \"Two-Point Correlation Function:\"\
    ,\n    \"text\": \"The 3D\\ntwo-point correlation function of the density \\ufb02uc-\\ntuation \\ufb01eld, \\u03b4 = (\\\
    u03c1 \\u2212\\u27e8\\u03c1\\u27e9)/\\u27e8\\u03c1\\u27e9, was computed\\nusing an e\\ufb03cient Fast Fourier Transform\
    \ (FFT)\\nbased approach. The procedure involved comput-\\ning the 3D FFT of \\u03b4, obtaining the power spectrum\\n(the\
    \ squared magnitude of the FFT coe\\ufb03cients),\\nand then performing an inverse FFT of the power\\nspectrum to yield\
    \ the correlation function. Analy-\\nsis of this function along di\\ufb00erent spatial directions\\nrevealed signs of\
    \ anisotropy within the \\ufb02ow.\"\n  },\n  {\n    \"name\": \"Velocity\",\n    \"text\": \"Structure\\nFunctions:\\\
    nWe\\ncom-\\nputed the second-order velocity structure function,\\nS2(\\u20d7l) = \\u27e8|\\u20d7v(\\u20d7x + \\u20d7l)\
    \ \\u2212\\u20d7v(\\u20d7x)|2\\u27e9, as a function of the\\nseparation vector \\u20d7l. This metric is fundamental for\\\
    nprobing the turbulent energy cascade and iden-\\ntifying characteristic scales of turbulent motion.\\nThis computation\
    \ involved iterating over numer-\\nous pairs of points within the L1 Vicinity, necessi-\\ntating extensive parallelization.\\\
    n2.3. Identi\\ufb01cation and quanti\\ufb01cation of coherent\\nstructures\\nUnderstanding the instantaneous morphology\
    \ and ef-\\n\\ufb01ciency of mass transfer requires identifying the under-\\nlying hydrodynamic structures that drive\
    \ or modify the\\n\\ufb02ow.\\n2.3.1. Velocity gradient tensor calculation\\nA prerequisite for identifying turbulent\
    \ structures is\\nthe computation of the velocity gradient tensor, \\u2207\\u20d7v, at\\nevery grid point. This 3 \\u00d7\
    \ 3 tensor, with 9 components,\\ndescribes the local deformation of the \\ufb02uid. Its com-\\nputation in spherical coordinates\
    \ from the discrete grid\\ndata required careful implementation of \\ufb01nite-di\\ufb00erence\\nderivatives with respect\
    \ to \\u2018x1v\\u2018, \\u2018x2v\\u2018, and \\u2018x3v\\u2018. This\\ncalculation is local to each cell and was e\\\
    ufb03ciently paral-\\nlelized by dividing the computational grid into chunks.\\n2.3.2. Vortex identi\\ufb01cation\\nWith\
    \ the velocity gradient tensor, we identi\\ufb01ed turbu-\\nlent eddies and coherent vortical structures. The veloc-\\\
    nity gradient tensor was decomposed into its symmetric\\npart, the strain-rate tensor (S), and its anti-symmetric\\npart,\
    \ the vorticity tensor (\\u2126). The Q-criterion, a widely\\nused method for vortex identi\\ufb01cation, was then calcu-\\\
    nlated as:\"\n  },\n  {\n    \"name\": \"Q = 1\",\n    \"text\": \"\"\n  },\n  {\n    \"name\": \"(\\u2225\\u2126\\u22252\"\
    ,\n    \"text\": \"\"\n  },\n  {\n    \"name\": \"F \\u2212\\u2225S\\u22252\",\n    \"text\": \"F )\\nwhere \\u2225\\\
    u00b7\\u2225F denotes the Frobenius norm. Regions where\\nQ > 0 indicate areas where rotational motion domi-\\nnates over\
    \ straining motion, signifying the presence of\\na vortex. A 3D boolean mask was generated to delin-\\neate these vortical\
    \ regions, providing a spatial map of\\ninstantaneous turbulent eddies.\\n2.3.3. Spectral analysis\\nTo pinpoint the dominant\
    \ spatial scales of convective\\nand turbulent motions, we performed 3D spectral anal-\\nysis on key physical quantities\
    \ within the L1 Vicinity\\ncube. This involved:\"\n  },\n  {\n    \"name\": \"Extracting the data for density (\\u03c1),\
    \ kinetic en-\",\n    \"text\": \"ergy (Ek = 1\\n2\\u03c1|\\u20d7v|2), and mass \\ufb02ux magnitude (| \\u20d7J|)\\nwithin\
    \ the de\\ufb01ned L1 Vicinity sub-cube.\"\n  },\n  {\n    \"name\": \"Applying a 3D Fast Fourier Transform (FFT) to\"\
    ,\n    \"text\": \"these quantities using a parallel FFT library.\"\n  },\n  {\n    \"name\": \"Calculating the power\
    \ spectrum P(k) by averaging\",\n    \"text\": \"the squared magnitude of the FFT coe\\ufb03cients in\\nspherical shells\
    \ in k-space (wavenumber space).\\nThe resulting P(k) versus k plots revealed the charac-\\nteristic scales at which energy\
    \ and mass \\ufb02ux are dis-\\ntributed, o\\ufb00ering insights into the turbulent cascade and\\nthe sizes of dominant\
    \ convective cells.\\n2.3.4. Unsupervised \\ufb02ow regime classi\\ufb01cation\\nTo objectively classify the complex \\\
    ufb02ow into distinct\\nregimes, we employed K-means clustering, an unsuper-\\nvised machine learning technique.\\n\\\
    n5\"\n  },\n  {\n    \"name\": \"Feature Engineering: For each grid cell in the\",\n    \"text\": \"domain, a feature\
    \ vector was constructed from lo-\\ncal, normalized scalar physical quantities that cap-\\nture di\\ufb00erent aspects\
    \ of the \\ufb02ow. These features\\nincluded: the logarithm of density (log(\\u03c1)), the\\nlogarithm of gas pressure\
    \ (log(Pg)), the local Mach\\nnumber (M = |\\u20d7v|/cs, where cs =\\np\\n\\u03b3Pg/\\u03c1 with an\\nadiabatic index\
    \ \\u03b3 = 5/3), the velocity divergence\\n(\\u2207\\u00b7 \\u20d7v), and the Q-criterion value. Normalization\\nensured\
    \ that each feature contributed equally to\\nthe clustering process.\"\n  },\n  {\n    \"name\": \"Clustering: The optimal\
    \ number of clusters, k,\",\n    \"text\": \"was determined using established methods such as\\nthe elbow method and silhouette\
    \ scores. The K-\\nmeans algorithm was then applied to the feature\\ndata for all grid cells. This computationally inten-\\\
    nsive step was parallelized to distribute the work-\\nload across multiple CPUs. Analysis: The result-\\ning clusters\
    \ were analyzed to understand the phys-\\nical characteristics of each identi\\ufb01ed \\ufb02ow regime.\\nFor each cluster,\
    \ we calculated the average values\\nof the input physical properties, allowing us to in-\\nterpret what each cluster\
    \ represents (e.g., \\u201dhigh-\\nvelocity, low-density out\\ufb02ow,\\u201d \\u201dturbulent convec-\\ntive plume,\\\
    u201d \\u201dquasi-static envelope\\u201d). A 3D map\\nwas then generated, coloring each cell by its as-\\nsigned cluster\
    \ ID, providing a visual representa-\\ntion of the spatially distinct \\ufb02ow regimes.\\n2.4. Mapping and quantifying\
    \ instantaneous mass\\ntransfer pathways\\nA central objective of this study was to rigorously de-\\nlineate how mass\
    \ instantaneously leaves the donor star\\nand enters the binary environment, moving beyond the\\nsimpli\\ufb01ed notion\
    \ of \\ufb02ow solely through the L1 point.\\nThis was achieved through extensive 3D streamline trac-\\ning.\\n2.4.1.\
    \ Streamline seeding\\nTo comprehensively map the mass transfer pathways,\\na set of 10,000 seed points was generated.\
    \ These points\\nwere distributed uniformly on the RSG surface, specif-\\nically on the spherical shell at x1v = 684 simulation\\\
    nunits, representing the e\\ufb00ective boundary from which\\nmass transfer can originate.\\n2.4.2. Parallel streamline\
    \ tracing\\nFrom each of the 10,000 seed points, streamlines\\nwere traced for the mass \\ufb02ux vector \\ufb01eld,\\\
    n\\u20d7J\\n=\\n\\u03c1\\u20d7v.\\nA 4th-order Runge-Kutta integrator was em-\\nployed for its accuracy in numerical integration.\\\
    nAt\\neach step of the integration, the \\u20d7J vector \\ufb01eld was\\ninterpolated at the current streamline position\
    \ us-\\ning \\u2018scipy.interpolate.RegularGridInterpolator\\u2018 to en-\\nsure smooth and accurate path delineation.\\\
    nTo man-\\nage the computational load, the 10,000 seed points were\\ndistributed across the 128 CPUs, with each CPU trac-\\\
    ning its assigned subset of streamlines. The full 3D path\\nfor each computed streamline was stored for subsequent\\nanalysis.\\\
    n2.4.3. Pathway analysis\\nThe collection of computed streamlines provided rich\\ndata for analyzing the instantaneous\
    \ mass transfer path-\\nways.\"\n  },\n  {\n    \"name\": \"Dominant Pathways: A 3D histogram of the\",\n    \"text\"\
    : \"streamline coordinates was constructed to create a\\nspatial density map of the mass transfer pathways.\\nRegions\
    \ with a high density of streamlines indi-\\ncated the dominant channels and preferred routes\\nof instantaneous mass\
    \ \\ufb02ow.\"\n  },\n  {\n    \"name\": \"Tortuosity: For each traced streamline, its tor-\",\n    \"text\": \"tuosity\
    \ was calculated as the ratio of its total path\\nlength to the straight-line distance between its\\nstart and end points.\
    \ This metric quanti\\ufb01es the\\ncomplexity and winding nature of the \\ufb02ow paths.\\nThe Probability Distribution\
    \ Function (PDF) of\\nthese tortuosity values was computed to provide\\na statistical measure of the \\ufb02ow\\u2019s\
    \ coherence and\\nturbulence.\"\n  },\n  {\n    \"name\": \"Flux Quanti\\ufb01cation: To estimate the contribu-\",\n \
    \   \"text\": \"tion of speci\\ufb01c pathways to the total mass transfer\\nrate, a control surface was de\\ufb01ned.\
    \ For instance,\\na plane at the x-coordinate of the L1 point was\\nused. All streamlines that crossed this de\\ufb01ned\
    \ sur-\\nface were identi\\ufb01ed, and the mass \\ufb02ux associated\\nwith these streamlines was summed to quantify\\\
    nthe instantaneous mass transfer rate through that\\nspeci\\ufb01c region.\\n2.5. Quantitative analysis of radiative in\\\
    ufb02uence\\nA critical aspect of this study was to quantify the pro-\\nfound in\\ufb02uence of radiation on the instantaneous\
    \ \\ufb02ow\\nmorphology and e\\ufb03ciency, particularly in regions away\\nfrom the stellar surface.\\n2.5.1. Force balance\
    \ calculation\\nTo determine the relative importance of various forces\\nshaping the instantaneous \\ufb02ow, a detailed\
    \ local force\\nbalance calculation was performed at every grid point.\\nThis highly parallel operation involved computing\
    \ the\\nvector components of the dominant force densities:\\n\\n6\"\n  },\n  {\n    \"name\": \"Gas Pressure Gradient\
    \ Force: \\u20d7Fgas = \\u2212\\u2207Pg\",\n    \"text\": \"This force drives expansion in regions of high pres-\\nsure.\"\
    \n  },\n  {\n    \"name\": \"Gravitational Force:\",\n    \"text\": \"\\u20d7Fgrav = \\u2212\\u03c1\\u2207\\u03a6.\\nThe\\\
    ngravitational potential \\u03a6 was computed on the\\ngrid using the simulation parameters \\u2018gm\\u2018 (gravi-\\\
    ntational constant times primary mass), \\u2018gm com\\u2018\\n(gravitational constant times companion mass),\\nand \\\
    u2018omega\\u2018 (orbital angular velocity). Its gradi-\\nent was then calculated to obtain the gravitational\\nforce.\"\
    \n  },\n  {\n    \"name\": \"Inertial Term: \\u20d7Finertial = \\u2212\\u03c1(\\u20d7v\\u00b7\\u2207)\\u20d7v. This term\"\
    ,\n    \"text\": \"represents the advective acceleration of the \\ufb02uid\\nand was computed by reusing the previously\
    \ cal-\\nculated velocity gradient tensor from Section 3.1.\"\n  },\n  {\n    \"name\": \"Radiation Force: \\u20d7Frad\
    \ = \\u2207\\u00b7 Pr. This is the di-\",\n    \"text\": \"vergence of the radiation pressure tensor, whose\\ncomponents\
    \ (\\u2018Pr11\\u2018, \\u2018Pr12\\u2018, etc.)\\nwere directly\\navailable from the simulation data. The full for-\\\
    nmula for the divergence of a symmetric tensor in\\nspherical coordinates was implemented to accu-\\nrately compute this\
    \ force.\\n2.5.2. Force dominance mapping\\nTo visually and quantitatively identify regions where\\nradiation force plays\
    \ a dominant role, 3D scalar \\ufb01elds\\nwere generated representing the ratio of the magnitudes\\nof these forces.\\\
    nSpeci\\ufb01cally, maps of (|\\u20d7Frad|/|\\u20d7Fgas|)\\nand (|\\u20d7Frad|/|\\u20d7Fgrav|) were created. These maps\
    \ provided\\nclear spatial delineation of regions where radiation pres-\\nsure gradients signi\\ufb01cantly in\\ufb02uence,\
    \ or even dictate,\\nthe local gas dynamics, revealing its profound shaping\\ne\\ufb00ect on out\\ufb02ow morphology.\\\
    n2.5.3. Radiative-hydrodynamic correlation\\nTo quantify the coupling between the radiation \\ufb01eld\\nand the gas dynamics,\
    \ Pearson correlation coe\\ufb03cients\\nwere computed within the key analysis regions.\\nWe\\nspeci\\ufb01cally examined\
    \ the correlation between:\"\n  },\n  {\n    \"name\": \"The radiation energy density (Er) and the gas den-\",\n    \"\
    text\": \"sity (\\u03c1).\"\n  },\n  {\n    \"name\": \"The magnitude of the radiation force (|\\u20d7Frad|) and\",\n\
    \    \"text\": \"the magnitude of the mass \\ufb02ux (| \\u20d7J|).\\nA strong positive correlation would provide quantitative\\\
    nevidence of the direct in\\ufb02uence of radiation on the den-\\nsity and \\ufb02ow characteristics of the mass transfer\
    \ stream.\\n2.5.4. Radiative heating/cooling analysis\\nFinally, we analyzed the net energy exchange between\\nradiation\
    \ and gas by calculating the divergence of the\\nradiation \\ufb02ux, Qrad = \\u2207\\u00b7 \\u20d7Fr. The components\
    \ of the\\nradiation \\ufb02ux vector (\\u2018Fr1\\u2018, \\u2018Fr2\\u2018, \\u2018Fr3\\u2018) were provided\\nby the\
    \ simulation. This scalar quantity, Qrad, represents\\nthe local radiative heating (Qrad < 0, energy absorbed\\nby gas)\
    \ or cooling (Qrad > 0, energy radiated away by\\ngas) rate.\"\n  },\n  {\n    \"name\": \"A 3D map of Qrad was generated\
    \ to visualize re-\",\n    \"text\": \"gions of energy exchange.\"\n  },\n  {\n    \"name\": \"This map was then correlated\
    \ with the gas tem-\",\n    \"text\": \"perature \\ufb01eld (approximated as T \\u221dPg/\\u03c1) and\\nthe velocity divergence\
    \ \\ufb01eld (\\u2207\\u00b7 \\u20d7v). This correla-\\ntion analysis investigated how radiative heating or\\ncooling\
    \ in\\ufb02uences the thermal structure and com-\\npressibility of the mass transfer stream, providing\\ninsights into\
    \ the overall energy budget and its im-\\npact on the \\ufb02ow.\"\n  },\n  {\n    \"name\": \"RESULTS\",\n    \"text\"\
    : \"This study presents a comprehensive analysis of a sin-\\ngle, high-resolution 3D simulation snapshot of a Red\\nSupergiant\
    \ (RSG) in a binary system, aiming to charac-\\nterize the instantaneous physical mechanisms governing\\nmass transfer.\\\
    nMoving beyond time-averaged models,\\nour approach explores the spatial heterogeneity and un-\\nderlying drivers of the\
    \ process through statistical char-\\nacterization of the \\ufb02ow, identi\\ufb01cation of coherent struc-\\ntures, mapping\
    \ of mass transfer pathways, and a quan-\\ntitative assessment of the role of radiation.\\n3.1. Global morphology and\
    \ statistical properties of the\\n\\ufb02ow\\nA preliminary visual inspection of the simulation do-\\nmain reveals the\
    \ complex, multi-scale nature of the RSG\\nenvelope and its immediate surroundings. As illustrated\\nin Figure ??, slices\
    \ of the density and radial velocity\\n\\ufb01elds in spherical coordinates show that the RSG is not\\na smooth sphere\
    \ but is characterized by large, prominent\\nconvective cells that create signi\\ufb01cant surface topology.\\nThese structures\
    \ are associated with powerful up- and\\ndown-drafts, as indicated by the heterogeneous radial\\nvelocity \\ufb01eld at\
    \ the stellar surface (bottom panel of Fig-\\nure ??). Similarly, Figure ?? displays slices of the den-\\nsity and radial\
    \ velocity \\ufb01elds in the equatorial plane,\\nfurther highlighting the highly structured surface of the\\nRSG due\
    \ to these prominent convective cells. Notably,\\nmass is ejected in dense, clumpy plumes that are not\\ndirected towards\
    \ the inner Lagrangian (L1) point, and\\nthe L1 vicinity shows instantaneous in\\ufb02ow towards the\\n\\n7\\ndonor, suggesting\
    \ a non-classical mass transfer mecha-\\nnism.\\nTo quantitatively assess the properties of this com-\\nplex \\ufb02ow,\
    \ we performed a detailed statistical analysis on\\nthree key regions as de\\ufb01ned in Section 1.3: the RSG sur-\\nface,\
    \ the vicinity of the inner Lagrangian (L1) point, and\\na heuristically de\\ufb01ned \\u201daccretion stream\\u201d region\
    \ charac-\\nterized by high-velocity, high-density out\\ufb02ow.\\n3.1.1. Statistical moments of hydrodynamic quantities\\\
    nThe \\ufb01rst four statistical moments (mean, variance,\\nskewness, and kurtosis) were calculated for density (\\u03c1),\\\
    nthe three spherical velocity components (vel1, vel2,\\nvel3), the radial mass \\ufb02ux (Jr = \\u03c1 \\u00b7 vel1),\
    \ and the mass\\n\\ufb02ux magnitude (| \\u20d7J|). A summary of these moments is\\npresented in Table 1.\\nSeveral key\
    \ physical insights emerge from these statis-\\ntics:\"\n  },\n  {\n    \"name\": \"Intermittency and Clumpiness: As shown\
    \ in\",\n    \"text\": \"Table 1, the kurtosis values for density (\\u03c1) and ra-\\ndial mass \\ufb02ux (Jr) are extremely\
    \ high across all re-\\ngions, particularly on the RSG surface (101.85 for\\n\\u03c1) and in the \\u201daccretion stream\\\
    u201d region (42.62 for\\nJr). A high positive kurtosis signi\\ufb01es a \\u201dleptokur-\\ntic\\u201d distribution, characterized\
    \ by a sharp peak\\nand \\u201dfat tails.\\u201d Physically, this indicates that the\\nmass distribution and transfer\
    \ are highly intermit-\\ntent and clumpy. Rather than a smooth, uniform\\n\\ufb02ow, the mass is concentrated in dense,\
    \ spatially\\nlocalized clumps, with vast regions of much lower\\ndensity in between. This is a direct statistical sig-\\\
    nnature of the convective, clumpy nature of the\\nRSG envelope, which fundamentally contradicts\\nsimpli\\ufb01ed models\
    \ assuming smooth, quasi-steady\\nmass transfer.\"\n  },\n  {\n    \"name\": \"Out\\ufb02ow vs. In\\ufb02ow Dynamics:\
    \ The skewness\",\n    \"text\": \"of the radial velocity (vel1) and radial mass \\ufb02ux\\n(Jr) in Table 1 reveals the\
    \ dominant direction of\\nmotion.\\nOn the RSG surface, vel1 has a nega-\\ntive skewness (\\u22120.79), indicating a prevalence\
    \ of\\nstrong downdrafts (in\\ufb02ow) from convective over-\\nturn. However, the radial mass \\ufb02ux Jr has a strong\\\
    npositive skewness (3.21).\\nThis apparent contra-\\ndiction is resolved by noting that Jr = \\u03c1 \\u00b7 vel1.\\nThe\
    \ positive skewness of Jr implies that the out-\\n\\ufb02ow events, while perhaps having lower velocities\\nthan the strongest\
    \ in\\ufb02ows, occur in signi\\ufb01cantly\\ndenser regions, thus dominating the overall mass\\n\\ufb02ux.\\nThis means\
    \ that even if there are strong\\ndowndrafts, the net mass \\ufb02ux is outward due to\\nthe density contrast.\\nIn the\
    \ \\u201daccretion stream\\u201d\\nregion, both vel1 and Jr have positive skewness,\\ncon\\ufb01rming its nature as a\
    \ region of net outward\\n\\ufb02ow. Conversely, in the L1 vicinity, Jr has a neg-\\native skewness (\\u22123.17), suggesting\
    \ that at this in-\\nstant, material in this speci\\ufb01c region is, on average,\\n\\ufb02owing back towards the donor\
    \ star, rather than\\n\\ufb02owing towards the L1 point and the companion.\\nThis hints at the non-traditional nature\
    \ of mass\\ntransfer at this speci\\ufb01c snapshot.\\n3.1.2. Probability distribution functions (PDFs)\\nThe PDFs, computed\
    \ as described in Section 2.2 for\\neach region, provide a more detailed view of the dis-\\ntributions, visually con\\\
    ufb01rming the statistical moments\\npresented in Table 1. As shown in Figure ?? (RSG sur-\\nface), Figure ?? (L1 vicinity),\
    \ and Figure ?? (\\u201dAccretion\\nStream\\u201d region), the PDFs for density (\\u03c1) and mass \\ufb02ux\\nmagnitude\
    \ (| \\u20d7J|) are nearly linear on a log-log plot. This\\nsuggests they follow a power-law or log-normal distribu-\\\
    ntion over several orders of magnitude, which is character-\\nistic of quantities arising from multiplicative processes\
    \ in\\nturbulent \\ufb02ows, further supporting the interpretation of\\na highly heterogeneous and intermittent medium.\
    \ The\\nvelocity distributions are markedly non-Gaussian, with\\nthe asymmetries (skewness) and heavy tails (kurtosis)\\\
    nclearly visible.\\nThese non-Gaussian features are cru-\\ncial for understanding the extreme events (dense clumps,\\\
    nstrong out\\ufb02ows) that dominate the instantaneous mass\\ntransfer. Speci\\ufb01cally, for the RSG surface (Figure\
    \ ??),\\nthe positive skewness of the Jr PDF indicates that out-\\n\\ufb02ow events, despite potentially lower velocities,\
    \ occur\\nin signi\\ufb01cantly denser regions, dominating the net mass\\n\\ufb02ux, which contrasts with the prevalence\
    \ of strong down-\\ndrafts seen in the negative skewness of radial velocity\\n(v1). In the L1 vicinity (Figure ??), the\
    \ negative skew-\\nness of Jr re\\ufb02ects the complex, non-uniform dynamics\\nand a net mass \\ufb02ow back towards\
    \ the donor star at this\\ninstant. For the \\u201dAccretion Stream\\u201d region (Figure ??),\\nthe positive skewness\
    \ for radial velocity (v1) and radial\\nmass \\ufb02ux (Jr) con\\ufb01rms this region is dominated by net\\nout\\ufb02ow.\\\
    n3.2. Coherent structures, turbulence, and \\ufb02ow regimes\\nTo understand the physical structures responsible for\\\
    nthe observed statistics, we performed a series of anal-\\nyses to identify vortices, characterize turbulent scales,\\\
    nand classify the \\ufb02ow into distinct regimes.\\nThis pro-\\nvides a bridge between the statistical properties and\
    \ the\\nunderlying hydrodynamics.\\n3.2.1. Vortex identi\\ufb01cation and turbulence\\nAs described in Section 3.2, the\
    \ Q-criterion was com-\\nputed across the domain to identify regions where rota-\\n\\n8\\nTable 1. Summary of the \\ufb01rst\
    \ four statistical moments for key hydrodynamic quantities in the three de\\ufb01ned analysis regions.\\nKurtosis is the\
    \ excess kurtosis (Fisher\\u2019s de\\ufb01nition).\\nRegion\\nQuantity\\nMean\\nVariance\\nSkewness\\nKurtosis\\nRSG\
    \ Surface\\n\\u03c1\\n8.49 \\u00d7 10\\u22124\\n5.57 \\u00d7 10\\u22126\\n8.06\\n101.85\\nvel1\\n\\u22120.115\\n0.070\\\
    n\\u22120.79\\n0.81\\nJr\\n9.32 \\u00d7 10\\u22126\\n7.98 \\u00d7 10\\u22128\\n3.21\\n40.78\"\n  },\n  {\n    \"name\"\
    : \"| \\u20d7J|\",\n    \"text\": \"3.70 \\u00d7 10\\u22124\\n9.64 \\u00d7 10\\u22127\\n6.48\\n58.14\\nL1 Vicinity\\n\\\
    u03c1\\n1.18 \\u00d7 10\\u22127\\n3.31 \\u00d7 10\\u221214\\n3.26\\n11.90\\nvel1\\n\\u22120.433\\n0.016\\n0.40\\n\\u22120.31\\\
    nJr\\n\\u22123.93 \\u00d7 10\\u22128\\n2.50 \\u00d7 10\\u221215\\n\\u22123.17\\n13.35\"\n  },\n  {\n    \"name\": \"|\
    \ \\u20d7J|\",\n    \"text\": \"9.10 \\u00d7 10\\u22128\\n1.65 \\u00d7 10\\u221214\\n2.96\\n9.78\\nAccretion Stream\\\
    n\\u03c1\\n5.13 \\u00d7 10\\u22123\\n2.02 \\u00d7 10\\u22124\\n4.91\\n30.57\\nvel1\\n0.512\\n0.112\\n0.87\\n0.16\\nJr\\\
    n4.01 \\u00d7 10\\u22123\\n1.81 \\u00d7 10\\u22124\\n5.85\\n42.62\"\n  },\n  {\n    \"name\": \"| \\u20d7J|\",\n    \"\
    text\": \"6.62 \\u00d7 10\\u22123\\n3.97 \\u00d7 10\\u22124\\n5.13\\n32.62\\nFigure 1.\\nSlices of the density (top) and\
    \ radial velocity\\n(bottom) \\ufb01elds in spherical coordinates (\\u03c6 = 0). The image\\nreveals the complex, multi-scale\
    \ morphology of the Red Su-\\npergiant (RSG) envelope, showing large convective cells that\\ngenerate signi\\ufb01cant\
    \ surface topology. These structures drive\\npowerful up- and down-drafts at the stellar surface (bottom\\npanel), leading\
    \ to the highly intermittent and clumpy ejec-\\ntion of mass into the surrounding binary environment, rather\\nthan a\
    \ smooth, uniform \\ufb02ow.\\ntional motion dominates over straining motion, indica-\\ntive of vortex cores.\\nThe analysis\
    \ revealed that only\\nFigure 2.\\nSlices of the density (top) and radial velocity\\n(bottom) \\ufb01elds in the equatorial\
    \ plane (z = 0) of the Red\\nSupergiant (RSG) simulation. The RSG (at the origin) ex-\\nhibits a highly structured surface\
    \ due to prominent convec-\\ntive cells, with powerful up- and down-drafts. Mass is ejected\\nin dense, clumpy plumes\
    \ that are not directed towards the\\ninner Lagrangian (L1) point, indicating a non-classical mass\\ntransfer. The L1\
    \ vicinity shows instantaneous in\\ufb02ow towards\\nthe donor.\\n2.50% of the simulation volume consists of vortex cores\\\
    n(regions where Q > 0). While this percentage may seem\\nsmall, it signi\\ufb01es a pervasive background of turbulence,\\\
    nparticularly within the stellar envelope where vigorous\\nconvective motions generate signi\\ufb01cant vorticity. These\\\
    nturbulent eddies are the fundamental building blocks of\\n\\n9\\nFigure 3.\\nProbability Distribution Functions (PDFs)\
    \ of\\ndensity (\\u03c1), spherical velocity components (v1, v2, v3), radial\\nmass \\ufb02ux (Jr), and total mass \\\
    ufb02ux (Jmag) at the Red Super-\\ngiant (RSG) surface. The log-log plots for \\u03c1 and Jmag show\\npower-law or log-normal\
    \ distributions, re\\ufb02ecting the inter-\\nmittent and clumpy nature of the RSG envelope. Velocity\\nPDFs are non-Gaussian\
    \ with clear asymmetries and heavy\\ntails. The positive skewness of the Jr PDF indicates that\\nout\\ufb02ow events,\
    \ despite potentially lower velocities, occur in\\nsigni\\ufb01cantly denser regions, dominating the net mass \\ufb02ux.\\\
    nThis contrasts with the prevalence of strong downdrafts seen\\nin the negative skewness of radial velocity (v1).\\nFigure\
    \ 4.\\nProbability Distribution Functions (PDFs) of\\ndensity (\\u03c1), velocity components (vel1, vel2, vel3), radial\\\
    nmass \\ufb02ux (Jr), and mass \\ufb02ux magnitude (Jmag) in the vicin-\\nity of the inner Lagrangian (L1) point. The\
    \ PDFs for \\u03c1 and\\nJmag suggest power-law or log-normal distributions, charac-\\nteristic of turbulent, clumpy \\\
    ufb02ows. The non-Gaussian veloc-\\nity distributions and the negative skewness of Jr re\\ufb02ect the\\ncomplex, non-uniform\
    \ dynamics and a net mass \\ufb02ow back\\ntowards the donor star at this instant.\\nconvective energy transport and play\
    \ a crucial role in\\nlifting material from the stellar surface.\\nTheir pres-\\nence indicates that the \\ufb02ow is\
    \ far from laminar, with\\nlocal swirling motions contributing to the complex mass\\ntransport.\\nFurthermore, 3D power\
    \ spectra of density, kinetic en-\\nergy, and mass \\ufb02ux magnitude within the L1 vicinity\\nwere computed using FFT-based\
    \ methods (Section 3.3).\\nFigure 5.\\nProbability Distribution Functions (PDFs) for\\nhydrodynamic quantities in the\
    \ \\u201dAccretion Stream\\u201d region.\\nThe PDFs of density (\\u03c1) and mass \\ufb02ux magnitude (| \\u20d7J|) ex-\\\
    nhibit power-law behavior, indicating the highly intermittent\\nand clumpy nature of mass transfer. Velocity distributions\\\
    nare non-Gaussian with heavy tails and asymmetries, particu-\\nlarly the positive skewness for radial velocity (v1) and\
    \ radial\\nmass \\ufb02ux (Jr), con\\ufb01rming this region is dominated by net\\nout\\ufb02ow.\\nAs shown in Figure ??,\
    \ these spectra exhibit a power-\\nlaw decay over a range of wavenumbers, characteristic\\nof a turbulent energy cascade.\\\
    nWhile a precise slope\\nis di\\ufb03cult to determine without a more extensive in-\\nertial range, the observed shape\
    \ is consistent with en-\\nergy being injected at large scales (low k), correspond-\\ning to the large convective cells\
    \ within the RSG, and\\nthen cascading down to smaller, dissipative scales (high\\nk).\\nThis con\\ufb01rms that the \\\
    ufb02ow is indeed turbulent,\\nwith energy being transferred across a wide range of\\nspatial scales, impacting the instantaneous\
    \ properties of\\nthe mass transfer.\\n3.2.2. Unsupervised \\ufb02ow regime classi\\ufb01cation\\nTo objectively classify\
    \ the complex \\ufb02ow into distinct\\nregimes, we employed K-means clustering on a \\ufb01ve-\\ndimensional feature\
    \ space, including log(\\u03c1), log(Pg),\\nMach number, velocity divergence, and the Q-criterion,\\nas detailed in Section\
    \ 3.4. The analysis identi\\ufb01ed an op-\\ntimal number of four clusters. The mean properties of\\nthese clusters provide\
    \ a clear physical interpretation:\"\n  },\n  {\n    \"name\": \"Cluster\",\n    \"text\": \"0\\n(Quasi-hydrostatic\\\
    nEnvelope):\\nThis cluster is characterized by the highest density\\nand pressure, very low Mach number, and near-\\nzero\
    \ velocity divergence. It represents the deep,\\nquasi-static layers of the RSG envelope, where the\\ndominant forces\
    \ are gravity and gas pressure, and\\nmotion is minimal.\"\n  },\n  {\n    \"name\": \"Cluster 1 (Supersonic, Low-Density\
    \ Out-\",\n    \"text\": \"\\ufb02ow): This regime exhibits extremely low den-\\nsity and pressure, a high Mach number\
    \ (> 1), and\\n\\n10\\nFigure 6. Power spectra of density, kinetic energy, and mass\\n\\ufb02ux magnitude in the L1 vicinity.\
    \ The observed power-law\\ndecay with increasing wavenumber is characteristic of a tur-\\nbulent energy cascade, where\
    \ energy from large-scale convec-\\ntive motions dissipates at smaller scales. This con\\ufb01rms the\\nturbulent nature\
    \ of the \\ufb02ow in this region.\\na large positive velocity divergence (expansion).\\nThis cluster clearly identi\\\
    ufb01es the fastest, expand-\\ning out\\ufb02ow material that has escaped the imme-\\ndiate vicinity of the star, indicative\
    \ of a strong,\\npossibly radiation-driven, wind-like \\ufb02ow.\"\n  },\n  {\n    \"name\": \"Cluster 2 (Turbulent Convective\
    \ Surface):\",\n    \"text\": \"This cluster exhibits high density (though lower\\nthan Cluster 0), high Q-criterion values,\
    \ and sig-\\nni\\ufb01cant velocity divergence (both positive and\\nnegative).\\nThis represents the turbulent surface\\\
    nlayers of the RSG, where vigorous convection and\\nrotation are most active, driving the initial ejec-\\ntion of material.\\\
    nThis is the region where the\\nhigh kurtosis of density and mass \\ufb02ux is most pro-\\nnounced.\"\n  },\n  {\n   \
    \ \"name\": \"Cluster\",\n    \"text\": \"3\\n(Subsonic\\nCircum-binary\\nMedium): Characterized by intermediate den-\\\
    nsity and pressure, subsonic velocities, and low\\nQ-criterion values. This regime likely represents\\nthe ambient, slower-moving\
    \ material that \\ufb01lls the\\nbinary environment, potentially originating from\\nprevious mass loss events or simply\
    \ quiescent re-\\ngions of the Roche lobe.\\nThis classi\\ufb01cation provides a powerful, quantitative map\\nof the di\\\
    ufb00erent physical environments within the simu-\\nlation, clearly delineating the stellar interior, the tur-\\nbulent\
    \ surface, and the escaping out\\ufb02ow. It validates\\nthe conceptual regions used for statistical analysis by\\nproviding\
    \ an objective, data-driven segmentation of the\\n\\ufb02uid dynamics.\\n3.3. Mapping instantaneous mass transfer pathways\\\
    nA central objective of this study was to rigorously de-\\nlineate how mass instantaneously leaves the donor star\\nand\
    \ enters the binary environment, moving beyond the\\nsimpli\\ufb01ed notion of \\ufb02ow solely through the L1 point.\\\
    nThis was achieved through extensive 3D streamline trac-\\ning of the mass \\ufb02ux vector \\ufb01eld ( \\u20d7J = \\\
    u03c1\\u20d7v) from 10, 000\\nseed points uniformly distributed on the RSG surface at\\nr = 684 simulation units, as detailed\
    \ in Section 4.\\n3.3.1. The absence of a stable L1 accretion stream\\nThe most signi\\ufb01cant and surprising result\
    \ from this\\nanalysis is that zero out of 10, 000 streamlines\\ncrossed the control surface at the L1 point\\u2019s x-\\\
    ncoordinate (x = 1073.9 simulation units). This is a\\ncritical \\ufb01nding that directly challenges the traditional\\\
    nRoche Lobe Over\\ufb02ow (RLOF) paradigm, which posits a\\nstable, coherent accretion stream \\ufb02owing from the donor\\\
    nto the companion via the L1 point. At this speci\\ufb01c mo-\\nment in time, our high-resolution simulation snapshot\\\
    nshows no such stream.\\nThe streamline density map (Figure ??) and the 3D\\nstreamline plot (Figure ??) visually reinforce\
    \ this. As\\ndepicted in Figure ??, the mass \\ufb02ux is directed outwards\\nfrom the stellar surface in broad, plume-like\
    \ structures.\\nHowever, these plumes do not converge towards the L1\\npoint. Instead, they appear to be expanding into\
    \ the\\nsurrounding volume, contributing to a circum-primary\\nor circum-binary envelope rather than directly feeding\\\
    nthe companion. Figure ?? further illustrates the short,\\ndispersed nature of these streamlines, with no paths\\ndirected\
    \ towards the L1 point, revealing the instanta-\\nneous absence of a stable RLOF accretion stream. This\\nsuggests that\
    \ instantaneous mass transfer from an RSG\\nwith vigorous convection may operate via mechanisms\\nmore akin to a wind\
    \ or transient ejections than a steady,\\ngravitationally channeled \\ufb02ow.\\n3.3.2. Pathway complexity\\nThe tortuosity\
    \ of the streamlines, de\\ufb01ned as the ra-\\ntio of the total path length to the straight-line distance\\nbetween endpoints,\
    \ was calculated for each path. The\\nresulting PDF, shown in Figure ??, demonstrates that\\nthe vast majority of streamlines\
    \ have a tortuosity very\\nclose to 1.0 (mean = 1.000009).\\nThis indicates that\\nthe initial paths of the ejected material\
    \ are remarkably\\nstraight.\\nThis is consistent with the visual evidence\\nfrom Figure ??: the streamlines are relatively\
    \ short,\\nrepresenting the initial ballistic ejection of material from\\nthe convective surface before it has had time\
    \ to inter-\\nact signi\\ufb01cantly with the complex gravitational poten-\\ntial or surrounding medium and develop more\
    \ contorted\\n\\n11\\nFigure 7. Streamline density map projected onto the equa-\\ntorial plane, showing the instantaneous\
    \ pathways of mass\\n\\ufb02ux originating from the Red Supergiant (RSG) surface. The\\nmass is ejected outwards in broad,\
    \ plume-like structures,\\nrather than converging towards the inner Lagrangian (L1)\\npoint, demonstrating the absence\
    \ of a stable Roche Lobe\\nOver\\ufb02ow stream at this speci\\ufb01c moment.\\npaths. This low tortuosity further supports\
    \ the interpre-\\ntation that the instantaneous mass loss is more akin to\\na \\u201dconvection-driven wind\\u201d or\
    \ localized eruptive events\\nrather than a gravitationally focused over\\ufb02ow. The ma-\\nterial is launched in relatively\
    \ straight lines, driven by\\nthe underlying convective dynamics.\\n3.4. The quantitative role of radiation in shaping\
    \ the\\n\\ufb02ow\\nThe \\ufb01nal stage of our analysis focused on quantifying\\nthe in\\ufb02uence of radiation on the\
    \ gas dynamics by calcu-\\nlating the dominant force densities at every point in the\\ndomain, as outlined in Section\
    \ 5.\\n3.4.1. Force balance analysis\\nWe computed the forces due to the gas pressure gra-\\ndient (\\u20d7Fgas = \\u2212\\\
    u2207Pg), gravity (\\u20d7Fgrav = \\u2212\\u03c1\\u2207\\u03a6), in-\\nertia (\\u20d7Finertial = \\u2212\\u03c1(\\u20d7v\
    \ \\u00b7 \\u2207)\\u20d7v), and radiation pressure\\n(\\u20d7Frad = \\u2207\\u00b7 Pr). The analysis of the ratios of\
    \ the mag-\\nnitudes of these forces provides a clear picture of where\\nradiation becomes dynamically important.\\nAs\
    \ shown in Table 2, the radiation force is dynami-\\ncally insigni\\ufb01cant compared to gas pressure and grav-\\nity\
    \ deep inside the star and on its immediate surface.\\nFigure 8. Three-dimensional mass \\ufb02ux streamlines origi-\\\
    nnating from the Red Supergiant (RSG) surface. The short,\\ndispersed nature of these streamlines, with no paths directed\\\
    ntowards the L1 point, reveals the instantaneous absence of a\\nstable Roche Lobe Over\\ufb02ow accretion stream. Instead,\
    \ mass\\nis ejected in brief, nearly straight paths, characteristic of a\\nconvection-driven out\\ufb02ow.\\nFigure 9.\\\
    nProbability distribution function of streamline\\ntortuosity. The dominant peak at a tortuosity of 1.0 demon-\\nstrates\
    \ that the initial paths of the ejected material are re-\\nmarkably straight. This indicates that mass is lost ballisti-\\\
    ncally, consistent with a convection-driven wind rather than\\na gravitationally-focused over\\ufb02ow.\\nFor example,\
    \ in the RSG Surface region, the mean ratio\\n|\\u20d7Frad|/|\\u20d7Fgas| is only \\u22480.005, indicating that gas pres-\\\
    n\\n12\\nsure gradients are overwhelmingly dominant in the stel-\\nlar interior and at the surface. This is visually repre-\\\
    nsented by the dark regions near the stellar surface in\\nFigure ??, where the radiation force ratios are very low.\\\
    nFigure 10. Slices in the equatorial plane showing the ratio\\nof the magnitude of the radiation force density to the\
    \ gas\\npressure force density (left) and gravitational force density\\n(right). Radiation force is dynamically insigni\\\
    ufb01cant near the\\nstellar surface (dark regions), but becomes dominant over\\ngas pressure and signi\\ufb01cant compared\
    \ to gravity in the lower-\\ndensity, expanding regions away from the star (yellow-orange\\nregions), highlighting its\
    \ crucial role in accelerating the out-\\nward mass \\ufb02ow.\\nHowever, this balance shifts dramatically in the lower-\\\
    ndensity regions away from the star.\\nAs quanti\\ufb01ed in\\nTable 2, in the L1 vicinity, the radiation force is, on\\\
    naverage, 3.5 times stronger than the gas pressure force,\\nand up to 210 times stronger in localized regions. While\\\
    ngravity remains dominant in the L1 vicinity, radia-\\ntion pressure is a signi\\ufb01cant accelerating force.\\nCru-\\\
    ncially, in the \\u201daccretion stream\\u201d region (which represents\\nthe actual out\\ufb02owing material), this ratio\
    \ becomes ex-\\ntreme, with radiation pressure dominating gas pressure\\nby many orders of magnitude (mean ratio 5\\u00d7106).\
    \ Fig-\\nure ?? clearly illustrates this shift, with yellow-orange\\nregions away from the star indicating where radiation\\\
    nforce becomes dominant over gas pressure and signi\\ufb01-\\ncant compared to gravity. This demonstrates a critical\\\
    nphysical process: while convection and gas pressure are\\nresponsible for lifting material o\\ufb00the dense stellar\
    \ sur-\\nface, once this material expands and its density drops,\\nradiation pressure becomes a dominant force in\\naccelerating\
    \ the out\\ufb02ow. This profound shaping ef-\\nfect of radiation pressure is key to understanding the\\nmorphology and\
    \ e\\ufb03ciency of the mass loss, explaining\\nwhy the material can achieve high velocities despite not\\nbeing gravitationally\
    \ funneled towards the companion.\\n3.4.2. Radiative-hydrodynamic correlations and energetics\\nThe coupling between radiation\
    \ and hydrodynamics\\nwas further explored via Pearson correlation coe\\ufb03cients,\\nas described in Section 5.3. A\
    \ moderate positive corre-\\nlation between the radiation force magnitude |\\u20d7Frad| and\\nthe mass \\ufb02ux magnitude\
    \ | \\u20d7J| was found in all regions\\n(e.g., r = 0.43 on the RSG surface, r = 0.30 in the\\naccretion stream). This\
    \ statistically con\\ufb01rms the visual\\nimplication of the force balance analysis: radiation is ac-\\ntively doing\
    \ work on the out\\ufb02owing gas, providing mo-\\nmentum and accelerating the mass \\ufb02ux.\\nThe divergence of the\
    \ radiation \\ufb02ux, Qrad = \\u2207\\u00b7 \\u20d7Fr,\\nrepresents the net rate of energy exchange between the\\nradiation\
    \ \\ufb01eld and the gas (Section 5.4). As shown in\\nFigure ??, the map of this quantity reveals a complex\\npatchwork\
    \ of heating (Qrad < 0, energy absorbed by\\ngas) and cooling (Qrad > 0, energy radiated away by\\ngas) throughout the\
    \ domain. The correlation analysis\\nshows that in the L1 vicinity, Qrad is positively corre-\\nlated with the velocity\
    \ divergence (\\u2207\\u00b7 \\u20d7v), suggesting\\nthat expanding regions tend to be radiatively heated\\nwhile compressing\
    \ regions are cooled. This points to a\\ncomplex thermodynamic feedback loop where radiation\\nnot only provides momentum\
    \ but also actively alters the\\nthermal state of the gas, which in turn a\\ufb00ects its com-\\npressibility and dynamics.\
    \ This highlights the intricate\\ninterplay between radiative transport and hydrodynam-\\nics in shaping the out\\ufb02ow.\\\
    nFigure 11. Map of the radiative \\ufb02ux divergence (Qrad) in\\nthe equatorial plane, indicating net radiative heating\
    \ (red)\\nand cooling (blue) rates. This complex pattern reveals radia-\\ntion\\u2019s active role in exchanging energy\
    \ with the gas, thereby\\nin\\ufb02uencing its thermal state and dynamics.\\nIn summary, this multi-faceted analysis of\
    \ a single sim-\\nulation snapshot paints a vivid picture of instantaneous\\nmass transfer in a massive binary system.\
    \ The process\\nis not a steady, smooth over\\ufb02ow but a highly intermit-\\n\\n13\\nTable 2. Ratios of the magnitude\
    \ of the radiation force density to the gas pressure and gravitational force densities in the key\\nanalysis regions.\\\
    nRegion\\nMean | \\u20d7Frad|/| \\u20d7Fgas|\\nMax | \\u20d7Frad|/| \\u20d7Fgas|\\nMean | \\u20d7Frad|/| \\u20d7Fgrav|\\\
    nMax | \\u20d7Frad|/| \\u20d7Fgrav|\\nRSG Surface\\n0.0048\\n1.29\\n0.0043\\n4.11\\nL1 Vicinity\\n3.51\\n210.5\\n1.66\\\
    n9.72\\nAccretion Stream\\n5.00 \\u00d7 106\\n1.27 \\u00d7 1010\\n0.0015\\n0.13\\ntent, turbulent phenomenon driven by\
    \ stellar convec-\\ntion.\\nMass is ejected in dense, clumpy plumes that,\\nat this moment, are not directed towards the\
    \ L1 point.\\nOnce this material is lifted from the star and its den-\\nsity decreases, radiation pressure becomes a dominant\\\
    naccelerating agent, profoundly shaping the out\\ufb02ow mor-\\nphology and e\\ufb03ciency. These \\ufb01ndings underscore\
    \ the\\nnecessity of detailed 3D, time-dependent models to cap-\\nture the true, complex physics of binary mass transfer,\\\
    nmoving beyond simpli\\ufb01ed analytical or 1D approaches.\"\n  },\n  {\n    \"name\": \"CONCLUSIONS\",\n    \"text\"\
    : \"Mass transfer in Red Supergiant (RSG) binary sys-\\ntems is a fundamental process governing the evolution\\nof massive\
    \ stars and their compact remnants. However,\\naccurately modeling this phenomenon has been signi\\ufb01-\\ncantly challenged\
    \ by the inherent complexities of stellar\\nconvection and radiation, which are often oversimpli\\ufb01ed\\nin traditional,\
    \ time-averaged approaches.\\nThis paper\\naddressed these limitations by performing an unprece-\\ndented, in-depth spatial\
    \ statistical analysis of instanta-\\nneous mass transfer, leveraging a unique, high-resolution\\n3D simulation snapshot\
    \ of an RSG donor.\\nOur pri-\\nmary goal was to unravel the intricate, spatially het-\\nerogeneous nature of the mass\
    \ \\ufb02ux and its underlying\\nphysical drivers at a speci\\ufb01c moment in time, moving\\nbeyond the idealized notion\
    \ of a smooth, steady accre-\\ntion stream.\\n4.1. Datasets and methods\\nOur analysis was founded upon a single,\\nhigh-\\\
    nresolution 3D simulation snapshot of an RSG in a bi-\\nnary system, which provided detailed information on gas\\ndensity,\
    \ velocity, pressure, and the full radiation \\ufb01eld\\n(energy density, \\ufb02ux, and pressure tensor). To compre-\\\
    nhensively characterize the instantaneous mass transfer,\\nwe employed a multi-faceted methodological approach.\\nWe performed\
    \ a rigorous 3D statistical characteriza-\\ntion of the instantaneous mass \\ufb02ux vector, computing\\nProbability Distribution\
    \ Functions (PDFs) and higher-\\norder moments (mean, variance, skewness, and kurtosis)\\nacross key regions including\
    \ the RSG surface and the\\nL1 point vicinity.\\nCoherent hydrodynamic structures\\nwere identi\\ufb01ed using vortex\
    \ identi\\ufb01cation (Q-criterion)\\nand 3D power spectral analysis to pinpoint dominant\\nturbulent scales.\\nUnsupervised\
    \ machine learning (K-\\nmeans clustering) was applied to classify distinct \\ufb02ow\\nregimes based on local physical\
    \ properties. Crucially, we\\nmapped instantaneous mass transfer pathways through\\nextensive 3D streamline tracing from\
    \ 10,000 seed points\\non the RSG surface.\\nFinally, we quanti\\ufb01ed the pro-\\nfound in\\ufb02uence of radiation\
    \ by performing detailed local\\nforce balance calculations, comparing radiation pressure\\ngradients with gas pressure,\
    \ gravitational, and inertial\\nforces, and analyzing radiative-hydrodynamic correla-\\ntions and energy exchange rates.\
    \ All computationally\\nintensive tasks were designed for parallel execution to\\nmanage the signi\\ufb01cant data volume\
    \ and complexity.\\n4.2. Results obtained\\nOur detailed analysis yielded several critical insights\\ninto the instantaneous\
    \ mass transfer process. Statisti-\\ncally, we found that mass transfer is highly intermittent\\nand clumpy, with density\
    \ and mass \\ufb02ux distributions\\nexhibiting extremely high kurtosis values, indicative of\\nspatially localized, dense\
    \ out\\ufb02ows rather than a smooth,\\nuniform \\ufb02ow. The skewness of the radial mass \\ufb02ux sug-\\ngested that\
    \ even in the presence of strong downdrafts,\\nnet mass \\ufb02ux is outward due to the higher density of\\nout\\ufb02owing\
    \ material. We con\\ufb01rmed the pervasive turbu-\\nlent nature of the \\ufb02ow, with a signi\\ufb01cant fraction of\
    \ the\\nvolume exhibiting vortical structures and power spectra\\nconsistent with a turbulent cascade. Our unsupervised\\\
    nclassi\\ufb01cation successfully delineated four distinct \\ufb02ow\\nregimes: a quasi-hydrostatic envelope, a supersonic\
    \ low-\\ndensity out\\ufb02ow, a turbulent convective surface, and a\\nsubsonic circum-binary medium, providing an objective\\\
    nsegmentation of the dynamic environment.\\nThe most surprising and signi\\ufb01cant result emerged\\nfrom our streamline\
    \ tracing: at this speci\\ufb01c snapshot,\\nzero out of 10,000 traced streamlines crossed the\\ninner Lagrangian (L1)\
    \ point.\\nThis directly chal-\\nlenges the traditional Roche Lobe Over\\ufb02ow (RLOF)\\nparadigm, which typically assumes\
    \ a stable, coherent\\naccretion stream through L1. Instead, mass was ejected\\nfrom the RSG surface in broad, plume-like\
    \ structures\\nthat appeared to be expanding into the surrounding\\nvolume rather than converging towards the companion.\\\
    nThe low tortuosity of these streamlines further indicated\\n\\n14\\nthat the initial paths of the ejected material were\
    \ re-\\nmarkably straight, resembling a convection-driven wind.\\nCrucially, our quantitative force balance analysis re-\\\
    nvealed the profound role of radiation. While radiation\\npressure was dynamically insigni\\ufb01cant near the dense\\\
    nstellar surface, it became the overwhelmingly dominant\\naccelerating force in the lower-density regions away from\\\
    nthe star, particularly within the out\\ufb02owing material.\\nFor instance, in the \\u201daccretion stream\\u201d region,\
    \ radiation\\npressure was found to be orders of magnitude stronger\\nthan gas pressure gradients.\\nThis demonstrates\
    \ that\\nwhile convection and gas pressure are responsible for\\ninitially lifting material o\\ufb00the stellar surface,\
    \ radiation\\npressure takes over to accelerate and shape the out\\ufb02ow,\\nexplaining its high velocities and wind-like\
    \ morphology.\\nFurthermore, we found moderate positive correlations\\nbetween radiation force and mass \\ufb02ux, con\\\
    ufb01rming radi-\\nation\\u2019s active role in driving momentum, and observed\\ncomplex radiative heating/cooling patterns\
    \ that in\\ufb02u-\\nence the thermal and dynamic state of the gas.\\n4.3. What we have learned\\nThis\\nstudy\\nprovides\\\
    nunprecedented\\ninsights\\ninto\\nthe fundamental physics governing instantaneous mass\\ntransfer in massive binaries,\
    \ moving beyond simpli\\ufb01ed\\ntime-averaged or 1D models. We have learned that:\"\n  },\n  {\n    \"name\": \"Instantaneous\
    \ mass transfer from a vigorously con-\",\n    \"text\": \"vective RSG is a highly intermittent, clumpy, and\\nturbulent\
    \ process, fundamentally di\\ufb00erent from a\\nsmooth, quasi-steady \\ufb02ow.\\nIts statistical prop-\\nerties are\
    \ non-Gaussian, characterized by strong\\nskewness and high kurtosis.\"\n  },\n  {\n    \"name\": \"At least at this speci\\\
    ufb01c moment in time, the\",\n    \"text\": \"traditional picture of a stable, coherent accre-\\ntion stream channeled\
    \ through the L1 point is\\nnot observed. Instead, mass is ejected in broad,\\nrelatively straight, plume-like structures,\
    \ resem-\\nbling a convection-driven wind or transient erup-\\ntive events.\"\n  },\n  {\n    \"name\": \"Radiation pressure,\
    \ initially negligible at the stel-\",\n    \"text\": \"lar surface, becomes the dominant accelerating\\nforce in the\
    \ lower-density regions away from the\\nstar.\\nThis profoundly shapes the out\\ufb02ow mor-\\nphology and e\\ufb03ciency,\
    \ enabling the material to\\nachieve high velocities despite not being gravita-\\ntionally funneled towards the companion.\"\
    \n  },\n  {\n    \"name\": \"The interplay between vigorous stellar convection\",\n    \"text\": \"(driving initial ejection)\
    \ and strong radiation pres-\\nsure (driving subsequent acceleration) is crucial for\\nunderstanding the true nature of\
    \ mass loss from\\nRSGs in binary systems.\\nThese \\ufb01ndings underscore the necessity of detailed 3D,\\ntime-dependent,\
    \ radiation-hydrodynamic simulations to\\naccurately capture the complex physics of binary mass\\ntransfer.\\nThis multi-faceted\
    \ analysis serves as a crit-\\nical benchmark for future time-dependent simulations\\nand binary evolution models, paving\
    \ the way for a more\\naccurate understanding of the evolution and observable\\nsignatures of massive binary systems.\\\
    n\\nA.7\\nBiology\\n161\\n\\nDraft version June 25, 2025\\nTypeset using LATEX twocolumn style in AASTeX631\\nSingle-cell\
    \ analysis reveals divergent developmental trajectories and regulatory networks in\\n*Plasmodium falciparum* lab strains\
    \ and field isolates\\nDenario1\\n1Anthropic, Gemini & OpenAI servers. Planet Earth.\"\n  },\n  {\n    \"name\": \"ABSTRACT\"\
    ,\n    \"text\": \"Adaptation of *Plasmodium falciparum* to distinct environments, such as laboratory culture versus\\\
    nthe dynamic human host, leads to significant changes in parasite development and fate determina-\\ntion, but the underlying\
    \ dynamic transcriptional programs and regulatory networks governing these\\nprocesses remain poorly understood.\\nTo\
    \ elucidate these differences, we employed single-cell RNA\\nsequencing to dissect and compare the dynamic transcriptional\
    \ programs and inferred regulatory net-\\nworks controlling stage transitions in laboratory-adapted strains and field\
    \ isolates. We analyzed a\\ncomprehensive dataset of over 45,000 single cells from both sources, reconstructing developmental\\\
    ntrajectories, characterizing gene expression dynamics along pseudotime, identifying co-expressed gene\\nmodules, and\
    \ inferring candidate regulators exhibiting transient expression patterns. Our analysis\\nrevealed marked differences\
    \ in cellular composition and extensive differential gene expression between\\nlab and field parasites, even within shared\
    \ life cycle stages. Trajectory inference highlighted divergent\\ndevelopmental paths, most notably an extended sexual\
    \ development program in field isolates that pro-\\ngresses to late-stage gametocytes not typically observed in standard\
    \ laboratory culture. Furthermore,\\nanalysis of gene modules and transiently expressed regulators indicated substantial\
    \ rewiring of the\\nregulatory networks controlling stage transitions, suggesting differences in the timing and complexity\\\
    nof regulatory events, particularly a potentially more complex regulatory landscape governing gameto-\\ncytogenesis in\
    \ field parasites. These findings provide a high-resolution, dynamic perspective on how\\nadaptation shapes *Plasmodium\
    \ falciparum* development and identify key transcriptional regulators\\npotentially mediating host-specific developmental\
    \ control.\\nKeywords: Clustering, Dimensionality reduction, Regression, Smoothing, Principal component analysis\"\n \
    \ },\n  {\n    \"name\": \"INTRODUCTION\",\n    \"text\": \"Malaria, a disease caused by the eukaryotic para-\\nsite Plasmodium\
    \ falciparum, remains a significant global\\nhealth burden. The parasite\\u2019s complex life cycle involves\\ndistinct\
    \ developmental stages within both mosquito vec-\\ntors and human hosts. Within human red blood cells,\\nP. falciparum\
    \ undergoes rapid asexual multiplication,\\nwhich is responsible for the clinical manifestations of\\nmalaria. A crucial\
    \ aspect of the parasite\\u2019s life cycle is\\nits ability to differentiate from the asexual proliferative\\nstage into\
    \ sexual precursor stages called gametocytes.\\nThese gametocytes are essential for transmission to the\\nmosquito vector,\
    \ making the decision to commit to sex-\\nual development and the subsequent maturation pro-\\ncess critical determinants\
    \ of parasite fitness and disease\\nspread.\\nPrecise control over the timing and regulation of\\nthese developmental\
    \ stage transitions is paramount for\\nparasite survival and transmission success.\\nHowever,\\nstudying these dynamic\
    \ processes presents significant\\nchallenges.\\nP. falciparum populations are inherently\\nasynchronous, comprising cells\
    \ at various developmen-\\ntal stages simultaneously, making bulk analyses inher-\\nently limited.\\nFurthermore, the\
    \ parasite\\u2019s biology is\\nprofoundly influenced by its environment. Laboratory-\\nadapted strains, maintained under\
    \ stable in vitro cul-\\nture conditions, often diverge significantly in their de-\\nvelopmental characteristics and gene\
    \ expression pat-\\nterns compared to field isolates circulating in diverse\\nhuman populations, which are exposed to\
    \ varying host\\nimmune responses, drug pressures, and nutrient avail-\\nability. While it is recognized that adaptation\
    \ to these\\ndistinct environments leads to changes in parasite devel-\\nopment and fate determination, the underlying\
    \ dynamic\\n\\n2\\ntranscriptional programs and the regulatory networks\\nthat govern these differences at the single-cell\
    \ level are\\nnot well understood. Resolving the heterogeneity within\\nparasite populations and capturing the continuous\
    \ pro-\\ngression through developmental stages requires high-\\nresolution approaches capable of analyzing individual\\\
    ncells.\\nSingle-cell RNA sequencing (scRNA-seq) has emerged\\nas a transformative technology for dissecting complex\\\
    nbiological systems, particularly those involving dynamic\\nprocesses like differentiation and development in hetero-\\\
    ngeneous cell populations. (Flores et al. 2021; Patel et al.\\n2024) By providing transcriptome-wide data from in-\\ndividual\
    \ cells, scRNA-seq enables the reconstruction of\\ndevelopmental trajectories and the detailed characteri-\\nzation of\
    \ gene expression dynamics along these inferred\\npaths, often referred to as pseudotime.\\n(Flores et al.\\n2021; Patel\
    \ et al. 2024)\\nIn this study, we leveraged the power of scRNA-seq\\nto provide a high-resolution, dynamic perspective\
    \ on P.\\nfalciparum development and to compare the transcrip-\\ntional landscapes and inferred regulatory networks be-\\\
    ntween laboratory-adapted strains and field isolates (Li\\n2018; Zitnik et al. 2024). We analyzed a comprehensive\\ndataset\
    \ comprising over 45,000 single cells originating\\nfrom both sources. To dissect the differences shaped by\\nlaboratory\
    \ adaptation versus natural in vivo conditions,\\nwe employed advanced computational methods. These\"\n  },\n  {\n   \
    \ \"name\": \"methods allowed us to reconstruct the developmental\",\n    \"text\": \"trajectories of the parasites, characterize\
    \ the dynamic\\nchanges in gene expression along pseudotime, identify\\nmodules of co-expressed genes representing coordinated\\\
    nbiological processes (Zitnik et al. 2024), and infer can-\\ndidate regulatory factors exhibiting transient expression\\\
    npatterns associated with stage transitions (Li 2018). We\\nensured the robustness of our findings through rigorous\\\
    ndata quality control, statistical analysis, and compara-\\ntive examination across multiple levels of biological or-\\\
    nganization, from overall cellular composition and differ-\\nential gene expression within stages to the fine-grained\\\
    ndynamics of gene expression and inferred regulatory in-\\nteractions along the developmental paths.\\nOur analysis revealed\
    \ striking differences in cellular\\ncomposition and extensive differential gene expression\\nbetween lab and field parasites,\
    \ even within nominally\\nshared life cycle stages. Trajectory inference highlighted\\nsignificant divergences in developmental\
    \ paths, most no-\\ntably demonstrating a more pronounced and extended\\nsexual development program in field isolates\
    \ that pro-\\ngresses to late-stage gametocytes, which are typically\\nabsent or rare in standard laboratory cultures\
    \ (Cao et al.\\n2016).\\nFurthermore, by analyzing gene co-expression\\nmodules and identifying candidate transiently\
    \ expressed\\nregulators, we found evidence for substantial rewiring\\nof the regulatory networks controlling stage transitions\\\
    n(Ditz et al. 2023).\\nThese findings suggest differences\\nin the timing, complexity, and key players involved in\\nregulatory\
    \ events, particularly indicating a potentially\\nmore complex regulatory landscape governing gameto-\\ncytogenesis in\
    \ field parasites (Cao et al. 2016).\\nCollectively, our results provide a detailed, dynamic\\nperspective on how adaptation\
    \ shapes P. falciparum de-\\nvelopment and pinpoint key transcriptional regulators\\nthat may mediate host-specific developmental\
    \ control,\\noffering valuable insights into parasite biology and iden-\\ntifying potential targets for future interventions\
    \ (Cao\\net al. 2016; Ditz et al. 2023).\"\n  },\n  {\n    \"name\": \"METHODS\",\n    \"text\": \"Here we describe the\
    \ experimental data and the\\ncomputational methods employed to analyze single-\\ncell RNA sequencing data from Plasmodium\
    \ falciparum\\nlaboratory-adapted strains and field isolates. The goal\\nwas to reconstruct and compare developmental\
    \ trajecto-\\nries, characterize gene expression dynamics, identify co-\\nexpressed gene modules, and infer candidate\
    \ transcrip-\\ntional regulators controlling stage transitions, thereby\\nproviding a dynamic, high-resolution view of\
    \ differences\\nshaped by adaptation.\\n2.1. Data Source and Initial Processing\\nThe dataset analyzed in this study consists\
    \ of single-\\ncell RNA sequencing data from P. falciparum.\\nThe\\nraw input data were provided as a gene expression\
    \ ma-\\ntrix and associated cell metadata. The gene expression\\nmatrix, provided in \\u2018gene_expression.csv\\u2018,\
    \ contained\\nnormalized expression values for genes across individ-\\nual cells. The cell metadata, provided in \\u2018labels_csv\\\
    u2018,\\nincluded crucial annotations for each cell, such as a\\nunique cell identifier (\\u2018CELL_ID\\u2018), assigned\
    \ life cycle\\nstage (e.g., Ring, Trophozoite, Schizont, Gametocyte)\\n(Motta et al. 2024), the parasite strain, and the\
    \ source\\n(laboratory-adapted or field isolate), along with spe-\\ncific identifiers for field isolates (MSC1, MSC3,\
    \ MSC13,\\nMSC14) and days in culture for laboratory strains.\\nData loading was performed using standard bioinfor-\\\
    nmatics libraries (e.g., in Python or R). The gene expres-\\nsion matrix was ingested and subsequently merged with\\nthe\
    \ cell metadata based on the common \\u2018CELL_ID\\u2018.\\nFor compatibility with common single-cell analysis\\nworkflows,\
    \ the expression matrix was transposed such\\nthat rows represented individual cells and columns rep-\\nresented genes\
    \ (Riffle et al. 2025).\\n2.2. Quality Control and Filtering\\n\\n3\\nInitial quality control steps were performed to\
    \ ensure\\nthe reliability of the single-cell data. Genes with mini-\\nmal expression across the entire dataset were removed;\\\
    nspecifically, genes detected in fewer than 3 cells or ex-\\nhibiting zero total expression counts were filtered out\\\
    n(Dajani et al. 2025; Dandala et al. 2025).\\nWhile the provided data was pre-processed, standard\\ncell-level quality\
    \ metrics were assessed, including the to-\\ntal number of detected genes per cell and the total nor-\\nmalized expression\
    \ per cell (Dajani et al. 2025; Dandala\\net al. 2025).\\nCells that presented as extreme outliers in these distri-\\\
    nbutions were considered for potential exclusion, though\\nprimary reliance was placed on the provided metadata\\nfor\
    \ cell quality status (Dajani et al. 2025; Dandala et al.\\n2025). The sparsity of the expression matrix (percent-\\nage\
    \ of zero values) was also calculated to understand the\\nnature of the single-cell data.\\n2.3. Normalization and Feature\
    \ Selection\\nThe provided \\u201dnormalized expression value\\u201d was\\ntreated as the primary expression metric.\\\
    nAssuming\\nthese values represented library-size corrected counts,\\na log-transformation (specifically, loge(x + 1)\
    \ or \\u2018log1p\\u2018)\\nwas applied to the expression matrix.\\nThis transfor-\\nmation is standard practice in scRNA-seq\
    \ analysis to\\nstabilize variance across the range of expression values\\nand render the data distribution more suitable\
    \ for linear\\ndimensionality reduction techniques. To reduce compu-\\ntational complexity and focus on biologically relevant\\\
    nvariation, highly variable genes (HVGs) were identified\\nacross all cells. These genes, exhibiting significant vari-\\\
    nance in expression relative to their mean expression, are\\ntypically more informative for distinguishing cell states.\\\
    nThe identified HVGs were then used for subsequent di-\\nmensionality reduction and downstream analyses.\\n2.4. Dimensionality\
    \ Reduction and Visualization\\nPrincipal Component Analysis (PCA) was applied to\\nthe scaled expression matrix of the\
    \ selected HVGs (Ali\\net al. 2017). PCA identifies the principal components\\n(PCs) that capture the maximum variance\
    \ in the dataset\\n(Ali et al. 2017). The number of PCs to retain for subse-\\nquent steps was determined by examining\
    \ an elbow plot\\nof the explained variance per PC, selecting the point\\nwhere the gain in explained variance plateaus.\
    \ To visu-\\nalize the cellular landscape in two dimensions, Uniform\\nManifold Approximation and Projection (UMAP) was\\\
    napplied to the selected PCs. UMAP is a non-linear di-\\nmensionality reduction technique that aims to preserve\\nlocal\
    \ and global relationships between cells.\"\n  },\n  {\n    \"name\": \"UMAP\",\n    \"text\": \"plots were generated\
    \ and colored by various metadata\\nattributes, including the assigned life cycle stage, source\\n(lab vs.\\nfield), specific\
    \ parasite strain or field isolate\\nidentifier, and days in culture. This visualization facil-\\nitated the assessment\
    \ of cellular heterogeneity, the sep-\\naration of distinct cell populations, potential batch ef-\\nfects, and the overall\
    \ structure of the dataset.\\n2.5. Cell Stage Annotation\\nThe primary annotation for cell identity relied on the\\n\\\
    u201dlife cycle stage\\u201d column provided in the \\u2018labels_csv\\u2018\\nmetadata.\\nThese labels represent the\
    \ developmental\\nstage assigned to each cell based on prior information or\\nsorting. To verify the consistency and accuracy\
    \ of these\\nannotations within the scRNA-seq data, the expression\\npatterns of well-established stage-specific marker\
    \ genes\\nfor *P. falciparum* were examined and visualized on\\nthe UMAP embeddings. This step confirmed that cells\\\
    nclustered broadly according to their assigned biological\\nstage.\\n2.6. Differential Gene Expression Analysis\\nTo\\\
    nidentify\\ntranscriptional\\ndifferences\\nbetween\\nlaboratory-adapted strains and field isolates, differ-\\nential\
    \ gene expression (DGE) analysis was performed.\\nComparisons were conducted for each major life cycle\\nstage (e.g.,\
    \ Ring, Trophozoite, Schizont, and poten-\\ntially early/late Gametocytes if sufficient numbers were\\npresent and distinguishable)\
    \ that was represented in\\nboth lab and field datasets. For each stage, gene ex-\\npression levels in cells from lab\
    \ strains were statistically\\ncompared to those from field isolates. Statistical tests\\nrobust to the characteristics\
    \ of single-cell data, such as\\nthe Wilcoxon rank-sum test or methods based on neg-\\native binomial distributions (e.g.,\
    \ using tools designed\\nfor scRNA-seq DGE), were employed.\\nP-values were\\nadjusted for multiple comparisons using\
    \ the Benjamini-\\nHochberg method to control the false discovery rate\\n(FDR), with a threshold (e.g., FDR < 0.05) used\
    \ to de-\\nfine statistical significance. Additionally, stage-specific\\nmarker genes were identified separately within\
    \ the lab\\nand field datasets by comparing cells of a given stage\\nagainst all other cells within the same source group\\\
    n(Birkholtz et al. 2006).\\n2.7. Developmental Trajectory Inference and\\nPseudotime Assignment\\nTo reconstruct the continuous\
    \ progression of P. falci-\\nparum through its developmental cycle and capture the\\ndynamics of stage transitions, developmental\
    \ trajectory\\ninference was performed. Cells identified as belonging to\\nthe asexual intraerythrocytic cycle (Ring,\
    \ Trophozoite,\\nSchizont) were subsetted for asexual trajectory recon-\\nstruction. Similarly, if a sufficient number\
    \ and diversity\\n\\n4\\nof gametocyte stages were present, a separate trajec-\\ntory focusing on sexual commitment and\
    \ development\\nwas inferred. Trajectories were reconstructed indepen-\\ndently for the combined laboratory strains and\
    \ the com-\\nbined field isolates using a suitable trajectory inference\\nalgorithm (e.g., Monocle 3, Slingshot, or graph-based\"\
    \n  },\n  {\n    \"name\": \"methods like PAGA implemented in Scanpy). The in-\",\n    \"text\": \"ferred trajectories\
    \ represent a principal path through the\\nhigh-dimensional gene expression space, ordered by an\"\n  },\n  {\n    \"\
    name\": \"abstract measure of progress called pseudotime\",\n    \"text\": \"The\\nstarting point (root) of the trajectories\
    \ was set based\\non biological knowledge, typically anchoring the asexual\\ncycle at the Ring stage. Each cell was assigned\
    \ a pseu-\\ndotime value reflecting its position along the inferred\\npath.\\n2.8. Comparative Trajectory Analysis and\\\
    nPseudotemporal Dynamics\\nThe inferred developmental trajectories were com-\\npared between laboratory-adapted strains\
    \ and field iso-\\nlates at multiple levels (Zhou et al. 2024; Hutton &\\nMeyer 2025; Zhang et al. 2025). The overall\
    \ topology\\nof the trajectories, including linearity, branching points\\n(such as the putative branch towards sexual\
    \ develop-\\nment), and the relative density of cells along different\\npaths, was compared (Zhou et al. 2024; Zhang et\
    \ al.\\n2025). Graph-based approaches (e.g., comparing PAGA\\ngraphs) were used where appropriate to quantitatively\\\
    nassess differences in trajectory structure (Zhang et al.\\n2025).\\nA key aspect of the comparative analysis involved\\\
    nexamining the dynamics of gene expression along the\\npseudotime axis (Chen et al. 2025,?). For genes iden-\\ntified\
    \ as differentially expressed or as stage markers,\\ntheir expression levels were modeled as a function of\\npseudotime\
    \ for both lab and field trajectories (Chen\\net al. 2025,?). Gene expression profiles along pseudo-\\ntime were smoothed\
    \ (e.g., using Generalized Additive\\nModels (GAMs) or LOESS regression) to capture under-\\nlying trends. These smoothed\
    \ dynamics were then com-\\npared between conditions to identify differences in the\\ntiming of gene activation or repression,\
    \ the magnitude\\nof expression changes during transitions, and the over-\\nall shape of the expression profile (Chen\
    \ et al. 2025,?).\\nThis analysis allowed for a detailed comparison of how\\ntranscriptional programs unfold dynamically\
    \ in different\\nadaptive contexts (Chen et al. 2025,?).\\n2.9. Identification and Characterization of Gene\\nModules\\\
    nModules of co-expressed genes were identified along\\nthe inferred pseudotime trajectories for both labora-\\ntory and\
    \ field isolates. This was achieved by clustering\\ngenes based on the similarity of their smoothed pseu-\\ndotemporal\
    \ expression patterns. Methods such as hier-\\narchical clustering or k-means were applied to the fit-\\nted gene expression\
    \ profiles along pseudotime.\\nAlter-\\nnatively, graph-based clustering methods on gene cor-\\nrelation networks derived\
    \ from pseudotime-ordered cells\\nwere used. Each identified module represents a set of\\ngenes with coordinated expression\
    \ dynamics, potentially\\nreflecting shared regulatory control or involvement in a\\ncommon biological process. For each\
    \ module, functional\\nenrichment analysis was performed using resources like\\nGene Ontology (GO) and KEGG pathways,\
    \ leveraging\\nannotations available in databases such as PlasmoDB.\\nThis step aimed to assign biological meaning to\
    \ the\\nco-expressed gene sets. The composition of gene mod-\\nules (which genes belong to which module) and their\\npseudotemporal\
    \ expression profiles were then compared\\nbetween lab and field isolates to identify conserved or\\ncondition-specific\
    \ modules and differences in their tim-\\ning or prominence.\\n2.10. Identification of Candidate Transient Regulators\\\
    nA specific analysis was conducted to identify candi-\\ndate transcriptional regulators hypothesized to exhibit\\ntransient\
    \ expression patterns associated with develop-\\nmental transitions, as suggested by their potential role\\nin initiating\
    \ or coordinating downstream transcriptional\\nchanges.\\nThis approach focused on genes with rela-\\ntively low overall\
    \ expression but showing significant,\\ntransient increases in expression immediately preceding\\nmajor transcriptional\
    \ shifts or stage transitions.\\nFirst, genes were filtered based on their mean expres-\\nsion across cells within a relevant\
    \ trajectory (e.g., asex-\\nual cycle), retaining those with mean expression below\\na defined threshold (e.g., the 25th\
    \ percentile of all gene\\nmeans) to focus on genes that are not constitutively\\nhighly expressed.\\nFor these low-expression\
    \ genes, their smoothed expres-\\nsion profiles along pseudotime were analyzed for signif-\\nicant peaks. A peak was defined\
    \ as a local maximum\\nin the smoothed profile where the expression level ex-\\nceeded a threshold relative to the gene\\\
    u2019s baseline expres-\\nsion within that trajectory (e.g., a fold change greater\\nthan 2 relative to the gene\\u2019s\
    \ median expression).\\nCandidate regulators were prioritized if their tran-\\nsient expression peaks occurred immediately\
    \ prior to\\nknown life cycle stage transitions (as defined by cell la-\\nbels and marker gene expression) or the activation\
    \ of\\nmajor gene modules identified in the previous step (Gr-\\nishechkin et al. 2025).\\nFunctional annotations from\
    \ PlasmoDB and other rel-\\nevant databases were used to filter candidates for known\\n\\n5\\nor predicted regulatory\
    \ functions (e.g., transcription fac-\\ntors, kinases, phosphatases, chromatin modifiers).\\nThe sets of identified candidate\
    \ regulators and the\\ntiming of their transient expression were compared be-\\ntween lab and field isolates to highlight\
    \ potential differ-\\nences in regulatory control.\\n2.11. Inference of Putative Regulatory Interactions\\nTo gain insight\
    \ into the potential regulatory networks,\\na simplified approach was used to infer putative down-\\nstream targets of\
    \ the identified candidate transient reg-\\nulators.\\nFor each high-confidence candidate regulator\\nexhibiting a transient\
    \ peak in expression, the expression\\ndynamics of other genes were examined in the pseudo-\\ntime window immediately\
    \ following the regulator\\u2019s peak.\\nGenes whose expression significantly changed (either up-\\nregulated or downregulated)\
    \ in the period immediately\\nafter the regulator\\u2019s peak were considered putative tar-\\ngets.\\nThis inference\
    \ was based on the principle that\\na regulator\\u2019s transient activation often precedes changes\\nin the expression\
    \ of its target genes (Kommu et al. 2024;\\nHegde et al. 2025).\\nStatistical methods, such as correlation analysis con-\\\
    nsidering a potential time lag or differential expression\\ntesting between cells before and after the regulator\\u2019s\\\
    npeak within a defined pseudotime window, were em-\\nployed to identify these putative target genes (Kommu\\net al. 2024;\
    \ Hegde et al. 2025).\\nBy comparing the sets of inferred targets for con-\\nserved and condition-specific regulators\
    \ between lab and\\nfield conditions, potential rewiring of regulatory net-\\nworks controlling specific developmental\
    \ transitions was\\nassessed (Kommu et al. 2024; Hegde et al. 2025).\\n2.12. Statistical Analysis and Reproducibility\\\
    nAll statistical analyses, including differential expres-\\nsion testing, trajectory inference, module detection, and\\\
    nregulator identification, were performed with attention\\nto statistical rigor.\\nMultiple testing correction (e.g.,\\\
    nBenjamini-Hochberg FDR) was applied where appropri-\\nate to control the rate of false positives (Sarkar & Tang\\n2021;\
    \ He et al. 2024; Timans et al. 2025). A significance\\nlevel, typically FDR < 0.05 or FDR < 0.01, was used\\nto determine\
    \ statistical significance. All computational\\nanalyses were performed in a reproducible manner, with\\ncode and parameters\
    \ used for each step documented.\"\n  },\n  {\n    \"name\": \"RESULTS\",\n    \"text\": \"3.1. Dataset overview and quality\
    \ control\\nWe analyzed a single-cell RNA sequencing dataset\\ncomprising 45,691 individual Plasmodium falciparum\\ncells.\\\
    nFollowing initial processing and quality control\\nsteps, which included filtering genes detected in fewer\\nthan three\
    \ cells, the dataset retained expression profiles\\nfor 5,274 genes.\\nThese cells originated from two dis-\\ntinct sources:\
    \ laboratory-adapted strains and field iso-\\nlates. The majority of cells (37,624, or 82.3%) were de-\\nrived from laboratory\
    \ cultures, while 8,067 cells (17.7%)\\nwere obtained from field isolates from four asymp-\\ntomatic patients in Mali.\
    \ After normalization and log-\\ntransformation as described in the Methods, the re-\\nsulting gene expression matrix\
    \ exhibited a sparsity of\\n80.25%, consistent with the nature of single-cell tran-\\nscriptomic data. To inform subsequent\
    \ dimensionality\\nreduction, we examined the variance explained by prin-\\ncipal components (PCs), as shown in Figure\
    \ 1.\\nFigure 1. Variance ratio explained by principal components\\n(PCs) ranked by importance. This plot illustrates\
    \ the pro-\\nportion of total variance captured by each PC, informing the\\nselection of components used for subsequent\
    \ dimensionality\\nreduction.\\nA comparison of basic dataset characteristics revealed\\nnotable differences between the\
    \ lab and field populations\\n(Table 1). Cells from laboratory strains generally dis-\\nplayed a higher median number\
    \ of detected genes per\\ncell (954 vs. 802) and a higher median total normalized\\nexpression per cell (2093.79 vs. 1813.51)\
    \ compared to\\nfield isolates. These differences might reflect variations\\nin parasite health, transcriptional activity,\
    \ or RNA in-\\ntegrity influenced by the distinct environments of labo-\\nratory culture versus the human host.\\n\\n6\\\
    nA critical divergence between the two datasets was ob-\\nserved in the distribution of cells across the parasite\\u2019s\
    \ life\\ncycle stages (Table 2). The laboratory dataset provided\\na comprehensive representation of the asexual intraery-\\\
    nthrocytic development cycle (IDC), encompassing early\\nring, late ring, early trophozoite, late trophozoite, early\\\
    nschizont, and late schizont stages, alongside developing\\nand mature male and female gametocytes. In stark con-\\ntrast,\
    \ the field isolates predominantly consisted of sex-\\nual stages (gametocytes), with asexual stages limited to\\nlate\
    \ rings and early trophozoites. Early ring, early sch-\\nizont, and late schizont stages were entirely absent from\\nthe\
    \ field samples. Furthermore, very late-stage gameto-\\ncytes, specifically annotated as \\u2019LE\\u2019 (likely representing\\\
    nstage V gametocytes), were exclusively identified within\\nthe field isolate population. This striking difference in\\\
    nstage composition highlights that standard laboratory\\nculture conditions, while supporting the asexual cycle\\nand\
    \ early sexual development, do not fully recapitu-\\nlate the conditions necessary for progression to the most\\nmature\
    \ gametocyte stages observed in the human host.\\nThis observation underscores the importance of analyz-\\ning field isolates\
    \ to capture the full spectrum of parasite\\ndevelopment relevant to transmission.\\n3.2. The transcriptional landscape\
    \ of lab and field\\nparasites\\nTo visualize the global transcriptional landscape and\\nassess the relationships between\
