    \  \"name\": \"Background\\u2002 Quantitative kinetic models of biological regulatory processes play an\",\n    \"text\"\
    : \"important role in understanding disease mechanisms. However, their simulation and\\nanalysis require specialized domain\
    \ expertise.\"\n  },\n  {\n    \"name\": \"Results\\u2002 In this study, we present Talk2Biomodels (T2B), an open-source,\
    \ user-friendly,\",\n    \"text\": \"large language model-based agentic AI platform designed to facilitate access to\\\
    ncomputational models of biological systems and promote the FAIRification (Findability,\\nAccessibility, Interoperability,\
    \ and Reusability) principles in systems biology. T2B allows\\nusers to interact with and analyse mathematical models\
    \ of biological systems through\\nconversations in natural language, thereby lowering the barrier to entry for model\\\
    ninterpretation and hypothesis-driven exploration. The platform natively supports\\nmodels encoded in the Systems Biology\
    \ Markup Language, a widely adopted standard\\nin the computational biology community. T2B is integrated with the BioModels\\\
    ndatabase (https://www.ebi.ac.uk/biomodels/), enabling retrieval, simulation, and\\nanalysis of curated systems biology\
    \ models. We illustrate the platform\\u2019s capabilities\\nthrough use cases in precision medicine, infectious disease\
    \ epidemiology, and the\\nstudy of emergent network-level properties in cellular systems \\u2014 demonstrating how\\nboth\
    \ computational experts and domain scientists without formal modelling training\\ncan derive actionable insights from\
    \ complex biological models. Talk2Biomodels is\\navailable at \\u200bh\\u200bt\\u200bt\\u200bp\\u200bs\\u200b:\\u200b/\\\
    u200b/\\u200bg\\u200bi\\u200bt\\u200bh\\u200bu\\u200bb\\u200b.\\u200bc\\u200bo\\u200bm\\u200b/\\u200bV\\u200bi\\u200br\\\
    u200bt\\u200bu\\u200ba\\u200bl\\u200bP\\u200ba\\u200bt\\u200bi\\u200be\\u200bn\\u200bt\\u200bE\\u200bn\\u200bg\\u200bi\\\
    u200bn\\u200be\\u200b/\\u200bA\\u200bI\\u200bA\\u200bg\\u200be\\u200bn\\u200bt\\u200bs\\u200b4\\u200bP\\u200bh\\u200ba\\\
    u200br\\u200bm\\u200ba. Detailed\\ndocumentation and use cases are available at \\u200bh\\u200bt\\u200bt\\u200bp\\u200bs\\\
    u200b:\\u200b/\\u200b/\\u200bv\\u200bi\\u200br\\u200bt\\u200bu\\u200ba\\u200bl\\u200bp\\u200ba\\u200bt\\u200bi\\u200be\\\
    u200bn\\u200bt\\u200be\\u200bn\\u200bg\\u200bi\\u200bn\\u200be\\u200b.\\u200bg\\u200bi\\u200bt\\u200bh\\u200bu\\u200bb\\\
    u200b.\\u200bi\\u200bo\\u200b/\\u200bA\\u200bI\\u200b\\nA\\u200bg\\u200be\\u200bn\\u200bt\\u200bs\\u200b4\\u200bP\\u200bh\\\
    u200ba\\u200br\\u200bm\\u200ba\\u200b/\\u200bt\\u200ba\\u200bl\\u200bk\\u200b2\\u200bb\\u200bi\\u200bo\\u200bm\\u200bo\\\
    u200bd\\u200be\\u200bl\\u200bs\\u200b/\\u200bi\\u200bn\\u200bt\\u200br\\u200bo\\u200b/.\"\n  },\n  {\n    \"name\": \"\
    Conclusions\\u2002 In summary, T2B lowers the barrier for non-experts to engage with and\",\n    \"text\": \"extract insights\
    \ from computational models of biological systems, while simultaneously\\nproviding experts with a streamlined interface\
    \ for analysing models and overall\\ncontributes to the FAIRification of models.\\nKeywords\\u2002 Agentic AI, Systems\
    \ biology, Foundational models, Ordinary differential\\nequation models\\n\\nPage 2 of 9\\nWehling et al. BMC Bioinformatics\
    \          (2025) 26:276\"\n  },\n  {\n    \"name\": \"Background\",\n    \"text\": \"Recent developments in generative\
    \ artificial intelligence (AI), particularly in large lan\\u00ad\\nguage models (LLMs), have demonstrated substantial\
    \ progress. Noteworthy advances\\nin both algorithmic innovation and data-driven biomedical discovery are showcased by\\\
    nthe advent of foundational learning models for protein structure, single cell omics and\\ngenomic data across species,\
    \ such as, AlphaFold, scGPT, and Evo 2, to name a few [2, 4,\\n10]. While LLMs' role is currently confined to narrow,\
    \ task-specific applications, efforts\\nare underway to enable open-source LLM-driven agentic workflows in biomedical\
    \ dis\\u00ad\\ncovery [15]. Collaborative AI agents, with their task orchestration, reflective learning\\nand sophisticated\
    \ reasoning capabilities, have the potential to revolutionize biomedical\\nresearch and patient treatment [6].\\nQuantitative\
    \ mathematical models have become a crucial component in enhancing\\nour understanding of biological systems. Besides\
    \ encapsulating the qualitative knowl\\u00ad\\nedge of biological interactions, they serve as analytical tools to test\
    \ the theoretical under\\u00ad\\nstanding of the dynamics within biological systems [21].The most common frameworks\\\
    nin systems biology modeling include kinetic, constraint-based, logic, and agent-based\\nmodeling. The present study specifically\
    \ focuses on ordinary differential equation (ODE)\\nmodels, a subset of kinetic models, due to their widespread application\
    \ and significance\\nin the field. ODE models represent the most popular modeling approach, with approxi\\u00ad\\nmately\
    \ 1662 models1 currently deposited in the BioModels database [16] and a multi\\u00ad\\ntude of models in scientific literature.\
    \ These models cover a wide range of domains, as\\ndemonstrated by their use cases in precision medicine (e.g., inflammatory\
    \ bowel disease\\ntreatment) [5], COVID-19 pandemic studies [23], and theoretical analysis of dynamic\\nsystems [18].\
    \ Furthermore, ODEs are a standard tool in pharmaceutical research, partic\\u00ad\\nularly in the development of physiologically\
    \ based pharmacokinetic/pharmacodynamic\\n(PBPK/PD) and quantitative systems pharmacology and toxicology (QSP/QST) models\\\
    n[3, 13].\\nTo interact with mathematical models of biological systems, several popular graphical\\nuser interface (GUI)-based\
    \ ODE modelling frameworks exist. These include proprietary\\nsoftware such as the MATLAB toolbox SimBiology [24] and\
    \ Berkley Madonna [17], as\\nwell as open-source alternatives like COPASI [8], the Open Systems Pharmacology Suite\\n[13]\
    \ and RunBioSimulations [22]. However, both proprietary and open-source solutions\\ntypically require software installation,\
    \ specialized training, and domain knowledge for\\neffective simulation and analysis of models.\\nTo overcome the barriers\
    \ of existing modelling frameworks, we propose Talk2Bio\\u00ad\\nmodels (T2B), an easily accessible chatbot-based ODE\
    \ modelling platform built using\\nagentic AI (Fig.\\u00a01). The T2B platform supports the import of models encoded in\
    \ SBML\\n[12] and ensures cross-platform interoperability. T2B also provides access to the Bio\\u00ad\\nModels database,\
    \ which hosts the largest collection of curated quantitative mathemati\\u00ad\\ncal models [16].\\nBesides the conventional\
    \ model analysis functionality, such as simulation, param\\u00ad\\neter scanning, and steady state analysis, T2B can (i)\
    \ retrieve and display model anno\\u00ad\\ntations using standardized names and identifiers, and (ii) perform retrieval-augmented\"\
    \n  },\n  {\n    \"name\": \"Viewed on 24.02.2025\",\n    \"text\": \"Page 3 of 9\\nWehling et al. BMC Bioinformatics\
    \          (2025) 26:276\\ngeneration (RAG) over PDF documents to extract additional insights that inform model\\ninterpretation\
    \ and analysis.\\nBy facilitating the sharing and simulation of mathematical models, T2B contributes\\nto the FAIR principles\
    \ of data exchange. Furthermore, T2B helps non-experts to inter\\u00ad\\nact with ODE models and pose simulation-related\
    \ questions directly in natural language\\nthus offering an engaging environment for teaching and exploring diversity\
    \ of models.\\nImplementation\\nWe developed the T2B application using the LangGraph library (v0.3.2),2 which provides\\\
    na framework for constructing stateful computational graphs. In this architecture, each\\nnode represents a discrete computational\
    \ step, while the edges define the relationships\\nbetween these steps. The application maintains a global state\\u2014a\
    \ snapshot of the applica\\u00ad\\ntion\\u2014which is propagated and updated throughout the execution process (Fig.\\\
    u00a01).\\n2\\u2009https://github.com/langchain-ai/langgraph\\nFig.\\u00a01\\u2002 Architecture diagram and user interface\
    \ of Talk2Biomodels. A Users can prompt the T2B agent to invoke\\nvarious tools for model search, simulation and plotting,\
    \ stability analysis, annotation extraction and retrieval-aug\\u00ad\\nmented generation (RAG) on uploaded scientific\
    \ articles. B The T2B GUI supports both open and closed-source\\nLLMs, enables users to upload mathematical models in\
    \ SBML-format and scientific articles as PDFs (a). T2B allows\\nnatural language prompts via the chat box interface (b).\
    \ The GUI features a chat history window (c) displaying\\nquestion-and-answer conversations (d, e). Additionally, T2B\\\
    u2019s GUI allows dynamic user feedback through upvote\\nand downvote buttons. (f). Here, we exemplify search models tool\
    \ for keyword-based searches in the BioModels\\ndatabase (e)\\n\\n\\nPage 4 of 9\\nWehling et al. BMC Bioinformatics \
    \         (2025) 26:276\\nIn the case of T2B, the computational nodes consist of a prebuilt reasoning and action\\n(ReAct)-based\
    \ agent, implemented following the ReAct paradigm [27], and a suite of\\ntools available to the agent (Fig.\\u00a0 1).\
    \ Each tool is annotated with metadata describing\\nits capabilities and input/output schema. Upon receiving a user query\
    \ in natural lan\\u00ad\\nguage, the LLM interprets the intent, selects the appropriate tool(s), and dynamically\\nconstructs\
    \ a sequence of calls to fulfill the request. These agentic AI tools interactively\\nengage with external resources, including\
    \ BioModels, Ontology Lookup Service (OLS)\\nand UniProt databases [11, 25]. T2B maintains the global state of the agent\
    \ throughout\\nthe chat history. BioModel search, simulations, annotation extraction and stability anal\\u00ad\\nysis\
    \ are carried out using the BASICO library (v0.78) [1]. Directed edges in the graph\\nstructure facilitate interactions\
    \ between the agent and these tools. The agent autono\\u00ad\\nmously selects and executes tool invocations based on user\
    \ input, dynamically updating\\nthe global state during execution. The state management mechanism tracks key-value\\npairs\
    \ storing messages, analysis outputs, and intermediate results, ensuring contextual\\ncoherence throughout the workflow.\
    \ Upon computation completion, the last updated\\nstate is parsed to extract relevant information and render it for the\
    \ user.\\nFor configuring agent-based text generation tasks, users can select between two\\nLLMs: OpenAI\\u2019s GPT-4o-mini\
    \ [19] and NVIDIA NIM-optimized Meta/Llama-3.3-\\n70B-Instruct.3 For text-to-embedding transformations, the application\
    \ supports two\\nembedding models: OpenAI\\u2019s text-embedding-ada-002 and NVIDIA NIM-optimized\\nLlama-3.2-NV-EmbedQA-1B-V2.4\
    \ The backend of T2B is implemented in Python 3.12,\\nwhile the front end was developed using Streamlit5 (v1.39.0) and\
    \ Plotly6 (v5.24.1) for an\\ninteractive and user-friendly interface.\\nTo evaluate the performance of T2B, we designed\
    \ a benchmarking strategy utilizing\\nthe Task Completion metrics from DeepEval [9], which captures the overall effective\\\
    u00ad\\nness of the agent in solving user queries, using LLM-as-a-judge to account for semantic\\naccuracy of responses.\
    \ To generate evaluation data, we created two synthetic datasets,\\ncontaining 312 question\\u2013answer (Q&A) pairs covering\
    \ tools search_models, simulate_\\nmodel, ask_question, steady_state, custom_plotter and get_modelinfo (Table S2). Both\\\
    ndatasets were designed with textual answers as expected outputs, capturing the hetero\\u00ad\\ngeneous nature of tool\
    \ responses in real-world use cases. For each question, we obtained\\nthe agent\\u2019s ground-truth outputs using BASICO\
    \ library [1] and assessed performance\\nusing the DeepEval library [9], which allowed us to compute the metrics consistently\\\
    nacross all datasets.\\nT2B provides optional integration with LangSmith to enable detailed tracing, debug\\u00ad\\nging,\
    \ and performance evaluation of agentic workflows. Users can provide feedback in\\nthe chat interface through thumbs-up\
    \ and thumbs-down buttons directly connected to\\nLangSmith, allowing for real-time capture of user satisfaction and facilitating\
    \ continuous\\nimprovement of the agent\\u2019s performance and reliability. T2B is hosted on GitHub, facili\\u00ad\\\
    ntating open-source contributions and discussions, and is linked to BioModels repository.\\n3\\u2009\\u200bh\\u200bt\\\
    u200bt\\u200bp\\u200bs\\u200b:\\u200b/\\u200b/\\u200bb\\u200bu\\u200bi\\u200bl\\u200bd\\u200b.\\u200bn\\u200bv\\u200bi\\\
    u200bd\\u200bi\\u200ba\\u200b.\\u200bc\\u200bo\\u200bm\\u200b/\\u200bm\\u200be\\u200bt\\u200ba\\u200b/\\u200bl\\u200bl\\\
    u200ba\\u200bm\\u200ba\\u200b-\\u200b3\\u200b_\\u200b3\\u200b-\\u200b7\\u200b0\\u200bb\\u200b-\\u200bi\\u200bn\\u200bs\\\
    u200bt\\u200br\\u200bu\\u200bc\\u200bt\\u200b/\\u200bm\\u200bo\\u200bd\\u200be\\u200bl\\u200bc\\u200ba\\u200br\\u200bd\\\
    n4\\u2009\\u200bh\\u200bt\\u200bt\\u200bp\\u200bs\\u200b:\\u200b/\\u200b/\\u200bb\\u200bu\\u200bi\\u200bl\\u200bd\\u200b.\\\
    u200bn\\u200bv\\u200bi\\u200bd\\u200bi\\u200ba\\u200b.\\u200bc\\u200bo\\u200bm\\u200b/\\u200bn\\u200bv\\u200bi\\u200bd\\\
    u200bi\\u200ba\\u200b/\\u200bl\\u200bl\\u200ba\\u200bm\\u200ba\\u200b-\\u200b3\\u200b_\\u200b2\\u200b-\\u200bn\\u200bv\\\
    u200b-\\u200be\\u200bm\\u200bb\\u200be\\u200bd\\u200bq\\u200ba\\u200b-\\u200b1\\u200bb\\u200b-\\u200bv\\u200b2\\n5\\u2009https://streamlit.io/\\\
    n6\\u2009\\u200bh\\u200bt\\u200bt\\u200bp\\u200bs\\u200b:\\u200b/\\u200b/\\u200bp\\u200bl\\u200bo\\u200bt\\u200bl\\u200by\\\
    u200b.\\u200bc\\u200bo\\u200bm\\u200b/\\u200bc\\u200bh\\u200ba\\u200br\\u200bt\\u200b-\\u200bs\\u200bt\\u200bu\\u200bd\\\
    u200bi\\u200bo\\u200b-\\u200bh\\u200be\\u200bl\\u200bp\\u200b/\\u200bc\\u200bi\\u200bt\\u200ba\\u200bt\\u200bi\\u200bo\\\
    u200bn\\u200bs\\u200b/\\n\\nPage 5 of 9\\nWehling et al. BMC Bioinformatics          (2025) 26:276\"\n  },\n  {\n    \"\
    name\": \"Results and discussion\",\n    \"text\": \"T2B offers a comprehensive suite of functions for biological and\
    \ translational ODE\\nmodels. T2B reduces the risk of inexact responses and hallucinations arising from mis\\u00ad\\ninterpreting\
    \ user-defined simulation requirements through model simulation-specific\\ntool calling and visual representation of the\
    \ simulation results. Users can upload ODE\\nmodels in SBML format or retrieve curated models from the BioModels database\
    \ using\\nthe search models tool (Fig.\\u00a01). The get model information tool extracts model details,\\nincluding species,\
    \ parameters, and model abstract. Concurrently, the get annotations\\ntool retrieves and displays model species\\u2019\
    \ identifiers by dynamically accessing Ontology\\nLookup Service (OLS) and UniProt data bases [11, 25]. This capability\
    \ enables research\\u00ad\\ners to thoroughly explore and interpret the specific nomenclature of the model.\\nIn T2B,\
    \ SBML models can be directly accessed, simulated, and analyzed. The platform\\nsupports time-course simulations with\
    \ adjustable time steps, initial concentrations and\\ndurations (simulate model tool), presenting results in dynamic tables\
    \ and graphs that\\ncan be interactively modified (custom plotter tool). Additionally, users can interrogate\\nmodel description\
    \ and simulation results (ask questions tool) and alter model param\\u00ad\\neters using natural language.\\nMoreover,\
    \ T2B offers several tools for model analysis: the steady state tool computes\\nwhether a model reaches equilibrium, while\
    \ the parameter scan tool performs multi\\u00ad\\nple simulations by systematically varying model initial conditions or\
    \ parameter values\\nwithin user-specified range and intervals (Fig.\\u00a0 2). In addition, the query article tool\\\
    nleverages retrieval-augmented generation (RAG) framework [14] to extract supple\\u00ad\\nmentary information from user-uploaded\
    \ research articles. Finally, the save model tool\\nallows users to save the model they are working with to disk for later\
    \ modification and\\nreference.\\nOverall, this suite of agentic AI-driven tools offers a unique platform for working\\\
    nwith ODE models, combining user-friendliness and interactive features. In addition, the\\nversatility of agentic-AI framework\
    \ enables integration of T2B with additional agents,\\npotentially facilitating coordination with tools such as literature\
    \ search platforms\\nFig.\\u00a02\\u2002 Parameter scan of a precision medicine model within T2B GUI [5]. A parameter\
    \ \\u2018kIL6Unbind\\u2019 is varied in steps\\nof 40 units from 2 to 242 to simulate an unbinding event of an antibody\
    \ from its target interleukin 6 receptor (IL6R).\\nEach curve represents CRP levels in serum during a separate simulation\
    \ of this model.\\n\\n\\nPage 6 of 9\\nWehling et al. BMC Bioinformatics          (2025) 26:276\\n(Talk2Scholars) and\
    \ knowledge graphs (Talk2KnowledgeGraphs), thereby enhancing the\\nmodeling process and providing modelers with relevant\
    \ background information.7\\nUse-cases\\nWe present use cases in precision medicine (Table S1), epidemiology, and emergent\
    \ sys\\u00ad\\ntems properties of biological networks and make them available on GitHub. With these\\nuse cases we demonstrate\
    \ broad applicability of T2B across different biological domains\\nand how experts and non-experts in computational biology\
    \ can benefit from T2B. All\\nthree examples illustrate the processes of loading, simulating, interactively plotting,\\\
    nand editing models, as well as how LLMs assist in drawing conclusions from the model\\nsimulations.\\nTypically, when\
    \ a user downloads and simulates a model, they may lack contextual\\nknowledge regarding the simulation duration or the\
    \ intended objectives of the model.\\nBy uploading the associated PDF documentation, such as publication associated with\\\
    nthis model, users can enhance their understanding of the simulations of this model. In\\nthis context, employing a RAG\
    \ system on the uploaded PDF assists users in extracting\\nrelevant information and identifying key aspects of the model.\\\
    nMoreover, T2B enables efficient translation of model annotations identifiers to a stan\\u00ad\\ndard names of the species\
    \ by communicating with external databases, such as UniProt\\nand EMBL-EBI Ontology Lookup Service over API calls [11,\
    \ 25]. For instance, get_\\nannotations tool could identify the species as a complex or specific isoform (e.g., soluble\\\
    nor not soluble isoform of a cytokine), which could define the scope of the model and\\nhave implications in downstream\
    \ experimental validation tasks.\\nPrecision medicine\\nThis example is based on a published study of a multiscale model\
    \ of interleukin 6 (IL-\\n6) mediated immune regulation in Crohn's disease to examine drug-disease interaction\\nmechanisms\
    \ and tocilizumab, an anti-interleukin 6 receptor monoclonal antibody drug,\\ntreatment prediction [5].\\nHere we show\
    \ how users can simulate and analyze this model via natural language\\nprompting.8 Within the RAG framework, T2B determines\
    \ the model\\u2019s specified simula\\u00ad\\ntion time of 2016\\u00a0h as reported in the publication. In addition, the\
    \ LLM assists users in\\nidentifying parameters related to the drug dosing regimen by querying species names\\nand providing\
    \ description of model species. Also, T2B optimizes retrieval of model\\nannotations, facilitated drug dose adjustment\
    \ and streamline model simulation. With\\nT2B users can simulate drug administration at intervals of either 2 or 4\\u00a0weeks\
    \ and view\\nthe value of the clinical readout parameter (CRP in serum) at any given time point. Addi\\u00ad\\ntionally,\
    \ users can determine the time required for the depletion of serum anti-IL6R\\u03b1\\nconcentration by replicating the\
    \ published figure [5]. The effect on CRP suppression can\\nalso be compared by simulating different antibodies with varying\
    \ dissociation affinities,\\nthereby performing in silico tests for potential antibodies (Fig.\\u00a02).\\n7\\u2009\\\
    u200bh\\u200bt\\u200bt\\u200bp\\u200bs\\u200b:\\u200b/\\u200b/\\u200bg\\u200bi\\u200bt\\u200bh\\u200bu\\u200bb\\u200b.\\\
    u200bc\\u200bo\\u200bm\\u200b/\\u200bV\\u200bi\\u200br\\u200bt\\u200bu\\u200ba\\u200bl\\u200bP\\u200ba\\u200bt\\u200bi\\\
