    u200bn\\u200bt\\u200bs\\u200b4\\u200bP\\u200bh\\u200ba\\u200br\\u200bm\\u200ba\\n8\\u2009Detailed prompts are available\
    \ at Table S1 and at \\u200bh\\u200bt\\u200bt\\u200bp\\u200bs\\u200b:\\u200b/\\u200b/\\u200bv\\u200bi\\u200br\\u200bt\\\
    u200bu\\u200ba\\u200bl\\u200bp\\u200ba\\u200bt\\u200bi\\u200be\\u200bn\\u200bt\\u200be\\u200bn\\u200bg\\u200bi\\u200bn\\\
    u200be\\u200b.\\u200bg\\u200bi\\u200bt\\u200bh\\u200bu\\u200bb\\u200b.\\u200bi\\u200bo\\u200b/\\u200bA\\u200bI\\u200bA\\\
    u200bg\\u200be\\u200bn\\u200bt\\u200bs\\u200b4\\u200bP\\u200bh\\u200ba\\u200br\\u200bm\\u200ba\\u200b/\\u200bt\\u200ba\\\
    u200bl\\u200bk\\u200b2\\u200bb\\u200bi\\u200bo\\u200b\\nm\\u200bo\\u200bd\\u200be\\u200bl\\u200bs\\u200b/\\u200bc\\u200ba\\\
    u200bs\\u200be\\u200bs\\u200b/\\u200bC\\u200ba\\u200bs\\u200be\\u200b_\\u200b1\\u200b/.\\n\\nPage 7 of 9\\nWehling et\
    \ al. BMC Bioinformatics          (2025) 26:276\\nEpidemiology\\nThis example utilizes an epidemiological model to predict\
    \ the spread of COVID-19[23].9\\nT2B enables users to evaluate the effectiveness of quarantine as a COVID-19 contain\\\
    u00ad\\nment measure by simulating its impact on the number of infected cases over time,\\nthereby reproducing published\
    \ findings [23]. Here, specifically, T2B offers a concise rep\\u00ad\\nresentation of model elements and translates parameter\
    \ names into a user-friendly rep\\u00ad\\nresentation, thereby facilitating understanding of the model dynamics.\\nEmergent\
    \ properties of biological networks\\nThis example10 explores intracellular signaling of the MAP kinase pathway [18] to\
    \ illus\\u00ad\\ntrate emergent behaviors such as hysteresis induced by covalent modifications of pro\\u00ad\\nteins,\
    \ which serve as widespread regulatory mechanisms in living systems. T2B can\\nfacilitate understanding of the description\
    \ of model components and demonstrate hys\\u00ad\\nteresis by performing steady-state analysis for two different stable\
    \ states. In this case\\nstudy, depending on the initial parameters of two simulation runs, the system can reach\\ntwo\
    \ distinct steady states. This observation provides an intuitive, hands-on way to dem\\u00ad\\nonstrate complex system-level\
    \ behaviors.\\nWhile T2B is a significant step in providing access to systems biology models, there\\nare several limitations\
    \ that would have to be addressed in the future releases. Although,\\nT2B framework facilitates rapid reuse of ODE models\
    \ by querying models on BioModels\\ndatabase or by directly uploading any ODE model in SBML format, it currently lacks\\\
    nfunctionality for expanding these models. The initial release of T2B is primarily designed\\nfor model screening and\
    \ executing functional models.\\nOur benchmarking results revealed good Task Completion metrics score, averaging\\n0.7\
    \ across both sets of questions (Table S3). Here, a score of 0 represents failing the task,\\nwhile a score of 1 indicates\
    \ perfect accordance with the expected output. The slightly\\nlower average reflects cases where minor variations in the\
    \ phrasing of a prompt or rep\\u00ad\\nresentation of species\\u2019 name affected the results. To achieve optimal performance,\
    \ we\\nrecommend the users to adjust their prompts based on guidelines provided on our doc\\u00ad\\numentation page. For\
    \ future work, we plan to expand the benchmarking suite to also\\nevaluate tool and argument correctness for a more comprehensive\
    \ evaluation of T2B\\u2019s\\nperformance. We also plan to apply approaches commonly used to train AI agents, such\\nas\
    \ reinforcement learning, supervised fine-tuning, and LoRA, to improve T2B\\u2019s task\\ncompletion and tool-selection\
    \ capabilities [7], [20].\"\n  },\n  {\n    \"name\": \"Conclusions\",\n    \"text\": \"T2B is an open-source, user-friendly\
    \ agentic AI platform designed to facilitate access\\nto computational models of biological systems. By providing a natural\
    \ language inter\\u00ad\\nface, supporting open-source community standards, and integrating with BioModels\\ndata base,\
    \ T2B reduces the barrier for non-experts to benefit from computational biol\\u00ad\\nogy models and overall contributes\
    \ to the FAIRification of models [26]. Furthermore,\\nT2B supports computational modelers by simplifying testing and validation\
    \ during\\n9\\u2009Detailed prompts and their description are available at \\u200bh\\u200bt\\u200bt\\u200bp\\u200bs\\\
