  abstract: 'RelevanceVeriﬁcation systematically assesses the relevance of a paper to the research objec-

    tive using an LLM. For each retrieved publication, the tool analyzes its title, abstract, and metadata

    to assess study characteristics (e.g., species, disease, cell type context), and generates a binary

    relevance label and a detailed relevance summary.

    OpenScholarReasoning synthesizes evidence from the curated collection of papers using

    the OpenScholar framework [49] with integrated reranking capabilities. The process involves:

    (1) initializing a BGE reranker model [139] to identify and prioritize the most informative pas-

    sages via semantic similarity to the user instruction; and (2) using OpenScholar [49] to generate a

    literature-grounded report (with proper citation formatting) that addresses the user instruction.

    1.5

    MultiRoundDiscussion module

    The MultiRoundDiscussion module conducts a multi-round deliberation over the outputs of the

    Analysis module, LiteratureReasoning module, and backbone LLM to generate a consensus

    that addresses the user input. It adapts a ReConcile-style panel discussion [55] with standardized

    inputs, independent judgments, weighted reconciliation, iterative debate, and ﬁnal synthesis.

    Before deliberation, each module’s output is normalized into an evidence-grounded argument

    28


    via a template with a ﬁxed token budget and uniﬁed format. The deliberation has four main stages:

    (1) independent evaluation by each LLM panelist, (2) preliminary consensus among the panelists,

    (3) iterative discussion between the panelists until consensus is achieved, and (4) summarization

    of the panelists’ decision. In the ﬁrst stage, three distinct LLMs independently evaluate each 300-

    word argument against the evaluation criteria (e.g., evidence strength, logical consistency, scientiﬁc

    rigor) to generate structured responses containing their preferred argument (i.e., from the Analysis

    module, LiteratureReasoning module, or backbone LLM), explanations, and conﬁdence scores.

    The verdict of each LLM is saved in a JSON format. The three LLMs are conﬁgurable; by de-

    fault, we use the backbone LLM, Gemini-ﬂash-2.0 [140], and o3-mini [141]. In the second stage,

    preliminary consensus is determined by aggregating the verdicts from stage one via conﬁdence-

    weighted voting using each panelist’s conﬁdence score, which ranges from 0 to 1. If consensus is

    not achieved in stage two, the module initiates R (default is 2) rounds of debate. For each round,

    every panelist receives a debate prompt containing the arguments from each module and an audit

    trail summarizing the verdicts from the other panelists. Panelists reassess and update their own

    verdicts. When the panelists reach a consensus, the backbone LLM synthesizes the ﬁnal response.

    1.6

    Implementation details

    Base LLM conﬁguration. MEDEA can be ﬂexibly integrated with any LLM that supports function-

    calling and reasoning. Here, our experiments utilize Azure OpenAI GPT-4o (v2024-11-21; knowl-

    edge cutoff Sep 30, 2023) [142] and Claude Sonnet 3.7 (knowledge cutoff Feb 2025) [143] as

    backbone LLMs. Sampling temperatures are set to 0.4 for agent reasoning, 0.6 for tool invocations,

    and 1.0 for panel discussion modules; the remaining parameters are set to the default settings.

    AgentLite framework. MEDEA is developed using the AgentLite framework (v0.1.12) [144].

    Each agentic module operates independently using the ReAct [145] architecture, performing an

    observe-act-reﬂect cycle for iterative tool-augmented reasoning. Individual modules maintain their

    own task-speciﬁc prompting schemas and memory modules for short-term trajectory tracking and

    long-term observation retrieval. As such, MEDEA’s architecture enables separation between rea-

    soning logic, tool interaction, and task specialization.

    2

    Therapeutic target nomination

    Nominating therapeutic targets requires reasoning about the candidate gene/protein in the dis-

    ease and cellular contexts of interest. This is a biological question-answering task (Supplemen-

    tary Table 1). We select ﬁve disease atlases from CELLxGENE [121, 146] for rheumatoid arthritis

    (RA) [64], type 1 diabetes mellitus (T1DM) [65], Sj¨ogren’s syndrome (SS) [66], hepatoblastoma

    (HB) [67], and follicular lymphoma (FL) [68]. We process these disease atlases to identify disease-

    speciﬁc marker genes for each cell type (Section 2.1). With these marker genes and OpenTargets,

    we construct a benchmark dataset for therapeutic target nomination (Section 2.2).

    29


    2.1

    Single-cell disease atlas processing

    We process disease atlases from CELLxGENE [121, 146] using the standard scanpy [147] pipeline.

    First, we remove cells with fewer than 200 expressed genes. To control cell-level quality across

    the disease atlases, we apply thresholds on mitochondrial read fraction and detected gene count.

    For T1DM, we use a mitochondrial threshold of 25% and a gene-count cap of 6,000; for RA, 20%

    and 800; for SS, 0% and 3,000; for FL, 15% and 5,000; and for HB, 8% and 8,000. Next, we ﬁlter

    out genes that are expressed in fewer than 3 cells and that are among the 10% least variable genes.

    Then, we normalize the total UMI counts to a scaling factor of 10,000 reads per cell, apply log

    normalization, and scale each gene to unit variance (and clip values exceeding 10 standard devia-

    tions). We also ﬁlter out genes with missing or duplicated NCBI IDs, Entrez IDs, or gene symbols.

    To evaluate the processing quality, we perform UMAP dimensionality reduction on the processed

    data. We visualize cell clustering with respect to known biological and technical metadata, includ-

    ing cell type, donor identity, and other dataset-speciﬁc annotations. These embeddings allow us to

    assess whether biologically meaningful groupings are preserved while identifying potential batch

    effects, indicated by clustering due to technical rather than biological factors. Finally, to identify

    disease-speciﬁc marker genes for each cell type, we perform differential expression analysis using

    a one-vs-all Wilcoxon rank-sum test. For each cell type within a given disease context, expression

    is compared against all other cells belonging to different disease statuses. This approach identiﬁes

    genes that are speciﬁcally enriched in particular cell type and disease combinations.

    2.2

    Dataset construction

    Dataset construction follows a three-step procedure. First, we analyze the processed single-cell

    disease atlases from CELLxGENE [121] to identify disease-speciﬁc cell marker genes, which are

    signiﬁcant differentially expressed genes (Wilcoxon rank-sum test with Bonferroni correction at

    ↵0.05) within a cell type and disease context [148, 149]. Second, we collect 2,415 disease-

    associated genes/proteins from the Open Targets Platform [39]. We keep genes/proteins with either

    a genetic evidence score >0 [150] or ChEMBL evidence score >0 [70]. Third, we deﬁne ground-

    truth cell type speciﬁc disease targets as the genes/proteins satisfying the criteria from both steps

    1 and 2. For each cell type context, we sample one target (i.e., positive gene/protein) and four

    negative genes/proteins that do not meet the criteria to form ﬁve-gene candidate lists. Prompts are

    paraphrased with o3-mini-0131 (temperature = 1.0) under a “biologist” role. Using three random

    seeds, we generate 20 samples per cell type per disease, producing 2,400 analyses: 420 for RA, 600

    for T1DM, 360 for SS, 180 for HB, and 840 for FL (Figure 3b; Figure 4b; Supplementary Table 1).

    3

    Synthetic lethality prediction

    Predicting synthetic lethality (SL) requires reasoning about genetic dependencies in a certain cel-

    lular context to infer whether perturbing two genes together reduces cellular viability substantially

    more than perturbing either gene alone [94, 95]. This is an open-ended reasoning task.

    30


    3.1

    Dataset construction

    We curate experimentally-validated (via combinatorial genetic screening [96]) SL gene pairs and

    matched negative gene pairs. Gene pairs are collected from seven cell lines (six tumor-derived

    and one non-tumorigenic control from distinct genomic contexts) to capture diverse genomic de-

    pendencies [151]: KRAS gain-of-function mutations (MDAMB231, A427, A549), PIK3CA gain-

    of-function mutations (MCF7, CAL33), TP53 mutations (MDAMB231, CAL27, CAL33), and no

    such mutations (MCF10A) [96]. These cell lines represent contexts in which cancer therapeutic tar-

    gets have been extensively characterized using CRISPR screens [152]. For each positive gene pair

    in a speciﬁc cell line, (genea, geneb, cellx), two negative gene pairs are generated via random sub-

    stitution from a pool of 9,987 reported non-SL pairs, (genea, genec, cellx) and (geneb, gened, cellx).

    The substituted genes (genec and gened) are experimentally-validated to not have a synthetic lethal

    interaction with the positive genes (genea and geneb) in any of the cell line contexts [96]. This

    strategy preserves structural similarity to the positive pairs while ensuring non-lethality. With these

    triplets of gene pairs and cell line context, we construct an open-ended reasoning benchmark for

    context-speciﬁc SL prediction (Figure 5b; Supplementary Table 1). Prompts are paraphrased with

    o3-mini-0131 (temperature = 1.0) under a “biologist” role. The dataset contains 1,855 analyses.

    4

    Immunotherapy response prediction

    Predicting personalized immunotherapy response requires reasoning about each patient’s clinical

    features, genomic proﬁle (e.g., tumor mutational burden), and tumor microenvironment [104, 106,

    107]. This is an open-ended reasoning task on multimodal inputs.

    4.1

    Dataset construction

    We construct the dataset using the IMvigor210 cohort (N = 298) [105], a single-arm phase II study

    of anti-PD-L1 atezolizumab in patients with metastatic urothelial carcinoma. For each patient,

    we create a user instruction containing the patient’s clinical metadata: tumor mutational burden

    (TMB) [153], demographics (sex, race), tissue source, and treatment regimen (Figure 6b; Supple-

    mentary Table 1). We create two additional prompt templates that contain the user instruction and

    an experiment instruction to analyze the patient’s transcriptomic proﬁle (Figure 6c). Prompts are

    paraphrased with o3-mini-0131 (temperature = 1.0) under a “clinician” role. Using three random

    seeds, we generate 2,682 analyses (3 seeds ⇥298 patients ⇥3 prompt templates).

    5

    Evaluation of model outputs

    We provide details about model evaluation, performance metrics, and statistical analyses.

    5.1

    LLM judge

    We use an LLM-as-a-Judge (or LLM judge) framework [115, 154] to assess model outputs. No-

    tably, we incorporate mechanisms for selective prediction [155, 156] to handle three special cases:

    (1) Abstain, where the model explicitly admits insufﬁcient evidence or inconclusive analyses [157];

    (2) Failed, where the model does not return any substantive analysis; and (3) None, where the

    31


    model systematically evaluates and rejects all candidates based on context-speciﬁc criteria.

    Multiple choice evaluation. For therapeutic target nomination (Section 2; Supplementary Fig-

    ure 1) and immunotherapy response prediction (Section 4; Supplementary Figure 2), the LLM

    judge examines the model output to classify the prediction as one of the predeﬁned categories. For

    therapeutic target nomination, the LLM judge either provides the target gene name or classiﬁes the

    output into one of three categories (Supplementary Figure 1): Abstain, None, or Failed. For im-

    munotherapy response prediction, the LLM judge classiﬁes the output into one of four categories

    (Supplementary Figure 2): R (responder), NR (non-responder), Abstain, or Failed.

    Open-ended reasoning. The LLM judge uses structured prompt templates that provide label def-

    initions with examples [158]. This approach mirrors established methodologies for research claim

    veriﬁcation, where the models must discern whether the evidence supports or refutes a hypoth-

    esis [159]. For synthetic lethality prediction (Section 3), the LLM judge evaluates the model’s

    open-ended reasoning trace to classify it as one of four categories (Supplementary Figure 3):

    (1) Synthetic lethality, (2) Non-SL, (3) Abstain, or (4) Failed.

    5.2

    Model evaluation

    MEDEA is benchmarked against ﬁve large language models (LLMs) and one biomedical agent.

    Large Language Models (LLMs). We evaluate MEDEA against ﬁve state-of-the-art LLMs: GPT-

    4o [142], o1-mini [160], o3-mini [141], DeepSeek-R1:671B [161], and Claude-3.7-Sonnet [143].

    Biomedical AI Agents. CellVoyager is designed to reproduce single-cell analyses from scientiﬁc

    papers [21]. We evaluate its ability to nominate therapeutic targets for rheumatoid arthritis [26].

    5.3

    Accuracy metric

    We adopt the selective prediction evaluation protocol [162, 163]. We deﬁne accuracy as the propor-

    tion of analyses for which the model output contains a deﬁnitive and correct answer (Section 5.1).

    Formally, given Ntotal analyses, the accuracy (or selective risk) is calculated as:

    Accuracy =

