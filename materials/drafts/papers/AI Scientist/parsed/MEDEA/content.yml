    truth label (case-insensitive) and 0 otherwise, and Nabstain denotes the total number of analyses

    classiﬁed as Abstain (Section 5.1). Abstain cases occur when models explicitly acknowledge in-

    sufﬁcient evidence or uncertainty in their reasoning. As abstentions are not incorrect predictions,

    we exclude them from accuracy calculations, decoupling correctness from coverage [155]. We

