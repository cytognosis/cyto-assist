    ndoi:\\nbioRxiv preprint\\n\\nability [36]. Second, performance for some tasks is judged with an LLM-based rubric and\
    \ human\\nadjudication [115]. Although we track abstention and failures, experimental follow-ups remain\\nessential [116].\
    \ Third, tools can encode assumptions, including cell type granularity and batch\\nstructure. MEDEA mitigates this with\
    \ context checks and execution diagnostics, yet mismatches\\ncan still bias outputs. Finally, the consensus stage relies\
    \ on panel LLMs and con\\ufb01dence weighting,\\nand correlated errors across panelists or adversarial prompts could in\\\
    ufb02uence results [117].\\nFuture work can treat perturbations as the central object that links omics objectives to read-\\\
    nouts from omics datasets, enabling MEDEA to complete these objectives using experimental datasets\\nrather than relying\
    \ primarily on internet search. Adding measurements that resolve tissue context,\\nincluding spatial transcriptomics [118\\\
    u2013120] and disease-matched single-cell readouts [121, 122],\\ncan broaden the range of omics objectives supported by\
    \ MEDEA. Looking ahead, extending eval-\\nuations to new biological domains will be important to establish general principles\
    \ for AI agents.\\n14\\n.\\nCC-BY 4.0 International license\\navailable under a\\n(which was not certified by peer review)\
