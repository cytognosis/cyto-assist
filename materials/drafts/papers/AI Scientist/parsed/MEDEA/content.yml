    \ subgroup.\\n21\\n\\nOnline Methods\\n1\\nOverview of MEDEA\\nMEDEA is an omics AI agent for therapeutics discovery.\
    \ MEDEA uses a global tool space of\\ndatabases, APIs, machine learning models, and agents (Section 1.1). It consists\
    \ of a Research-\\nPlanning module (Section 1.2), an Analysis module (Section 1.3), a LiteratureReasoning mod-\\nule (Section\
    \ 1.4), and a MultiRoundDiscussion module (Section 1.5).\\n1.1\\nGlobal tool space\\nMEDEA features a global tool space\
    \ comprising 20 tools from 17 sources (13 databases/APIs\\nand 4 machine learning models or agents). These tools are accessible\
    \ to ResearchPlanning and\\nAnalysis modules throughout MEDEA\\u2019s runs.\\nRetrieve Disease Targets tool identi\\ufb01es\
    \ and retrieves a disease\\u2019s protein targets through a\\ntwo-step approach. Given a disease name, the tool \\ufb01rst\
    \ queries the EMBL-EBO API [38] to retrieve\\nan Experimental Factor Ontology (EFO) ID for the disease. It then uses the\
    \ EFO ID to interrogate\\nthe OpenTargets GraphQL API [39], extracting a list of associated protein targets based on speci\\\
    ufb01c\\nevidence categories, such as genetic associations or approved therapeutic indications. By applying\\nevidence-based\
    \ \\ufb01ltering criteria, the tool outputs a curated list of protein targets.\\nLoad PINNACLE Embeddings obtains pretrained\
    \ cell type speci\\ufb01c protein embeddings\\nfrom PINNACLE [26]. PINNACLE integrates single-cell transcriptomics data\
    \ with protein-protein\\ninteraction networks, resulting in 394,760 protein embeddings from 156 cell type contexts across\\\
    n24 tissues. Given protein(s) and cell type context(s) of interest, this tool retrieves their corre-\\nsponding cell type\
    \ speci\\ufb01c protein embeddings from PINNACLE. The \\ufb01nal output is a dictionary\\ncontaining context-speci\\ufb01c\
    \ protein embeddings, where keys are cell type contexts and values are\\ncell type speci\\ufb01c protein embeddings.\\\
    nLoad TranscriptFormer Embeddings retrieves cell type speci\\ufb01c gene embeddings from\\nTranscriptFormer [27], a single-cell\
    \ transformer-based foundation model that models gene-gene\\ninteractions in single-cell transcriptomics data. The tool\
    \ obtains precomputed Contextual Gene\\nEmbeddings (CGE) generated from single-cell atlases for rheumatoid arthritis [64],\
    \ type 1 diabetes\\nmellitus [123], Sj\\u00a8ogren\\u2019s Syndrome [124], hepatoblastoma [67], and follicular lymphoma\
    \ [125]\\n(accessed via CELLxGENE [121]). Concretely, we perform TranscriptFormer inference on each\\ncell type and disease\
    \ combination using 16-bit mixed precision. As a result, we collect 2.1 million\\nprecomputed gene embeddings across 138\
    \ cell type and diseases. Given a list of gene names\\n(of\\ufb01cial gene symbols or Ensembl IDs) along with disease\
    \ and cell type contexts, the \\ufb01nal output\\nis a dictionary where keys are gene names and values are TranscriptFormer\
    \ embeddings.\\nRetrieve HumanBase PPI retrieves tissue-speci\\ufb01c protein-protein interaction networks, where\\nnodes\
    \ represent proteins and edges denote tissue-speci\\ufb01c interactions annotated with con\\ufb01dence\\nscores. Given\
    \ a list of gene names and a tissue context, the tool \\ufb01rst queries the Entrez API [126]\\nto obtain the corresponding\
    \ NCBI Entrez gene identi\\ufb01ers. It then calls the HumanBase RESTful\\nAPI [37] to retrieve the relevant tissue-speci\\\
    ufb01c PPI network. From this network, an induced sub-\\n22\\n\\ngraph is generated based on the input gene list. The\
    \ \\ufb01nal output includes (i) a NetworkX [127]\\ngraph object representing the induced subgraph and (ii) a set of associations\
    \ between the queried\\ngenes within the speci\\ufb01ed tissue context.\\nHumanBase Co-Expression Analyzer identi\\ufb01es\
    \ genes that are co-regulated within a given\\ntissue context. The tool accepts a gene list and a target tissue as inputs,\
    \ and then queries the Human-\\nBase API [37] to retrieve tissue speci\\ufb01c co-expression interactions. Retrieved interactions\
    \ undergo\\nsequential quality control: raw correlation with coef\\ufb01cients \\uf8ff0.2 are excluded while those \\\
    u22650.7\\nare considered further. To ensure interpretability, the analysis does not rely solely on correlation\\nstrength:\
    \ \\ufb01rst, interactions lacking meaningful biological support are \\ufb01ltered out (evidence score\\n\\uf8ff0.1);\
    \ then, the top three most common evidence types behind the association are examined. The\\ntool outputs a summary including\
    \ co-expression network topology, network strength rating, ranked\\ninteractions with associated weights and supporting\
    \ evidence, and a list of biological processes that\\nare enriched in the co-expressed genes.\\nHumanBase Protein Interaction\
    \ Analyzer identi\\ufb01es tissue-speci\\ufb01c protein interactions by\\nquerying the HumanBase API, which integrates\
    \ protein interaction data curated from BioGRID [128],\\nIntAct [100], MINT [129], and MIPS [130]. Each protein pair is\
    \ assigned a posterior probability\\nweight based on experimental evidence. The tool retains edges with posterior probability\
    \ \\u22650.1\\nand prioritize those with \\u22650.6 as high-con\\ufb01dence. Given a gene list, tissue name, and optionally\\\
    nthe maximum number of interactions, the tool returns a summary of interaction types, con\\ufb01dence-\\nweighted interaction\
    \ pairs with supporting evidence, and a list of enriched biological functions.\\nHumanBase Transcription Factor Analyzer\
    \ reconstructs tissue-speci\\ufb01c regulatory net-\\nworks for the genes of interest by analyzing transcription factor\
    \ (TF)-gene relationships. Given\\na gene list, a target tissue, and optionally the maximum number of interactions, the\
    \ tool queries\\nthe HumanBase API to retrieve a tissue-speci\\ufb01c regulatory network derived from JASPAR motif\\npredictions\
    \ [37, 131]. TF-gene associations are identi\\ufb01ed through the scoring of binary motifs,\\nwith interactions \\ufb01ltered\
    \ by evidence scores >0.1 to retain high-con\\ufb01dence predictions. The tool\\nprioritizes TFs that may regulate the\
    \ genes of interest in a given tissue context. The output includes\\nthe inferred TF-gene interactions, network connectivity\
    \ scores, and enriched biological processes.\\nHumanBase microRNA Target Analyzer evaluates how microRNAs modulate gene\
    \ ex-\\npression in speci\\ufb01c tissue environments. Given a set of genes and a tissue context, the tool queries\\nthe\
    \ HumanBase API for microRNA target interactions curated from MSigDB (c3:MIR) [101], and\\nconstructs the corresponding\
    \ regulatory network. The tool aggregates evidence types across inter-\\nactions, and summarizes primary evidence categories.\
    \ It returns a summary of observed microRNA\\ntargeting patterns, key regulators, and associated functional pathways.\\\
    nHumanBase Perturbation Analyzer extracts tissue-speci\\ufb01c perturbation relationships from\\na given list of genes\
    \ and tissue context. The tool retrieves perturbation data from MSigDB (c2:\\nCGP) [101] via the HumanBase API, and retains\
    \ only high-con\\ufb01dence associations (interaction\\nweight \\u22650.6) that are supported by evidence (evidence score\
    \ > 0.1). Each association is evaluated\\nfor functional relevance by aggregating and interpreting the underlying evidence\
    \ types. The tool\\nreturns: (1) perturbation response of gene pairs from MSigDB (e.g., gene A knockdown affects\\n23\\\
    n\\ngene B expression), ranked by HumanBase interaction con\\ufb01dence scores; and (2) Gene Ontol-\\nogy biological process\
    \ terms annotated to the query genes, retrieved from HumanBase\\u2019s curated\\nannotations.\\nEnrichr Gene Enrichment\
    \ Analyzer uses Enrichr RESTful APIs [98] to perform func-\\ntional enrichment analysis for a given gene pair across multiple\
    \ curated libraries: WikiPathways\\n2024 [99], Reactome 2024 [40], MSigDB Hallmark 2020 [41], and the 2023 releases of\
    \ GO Molec-\\nular Function and GO Biological Process [42, 132]. Given a pair of genes, the tool retains terms\\nwith\
    \ Benjamini\\u2013Hochberg adjusted P \\uf8ff0.05 as \\u201cenriched\\u201d terms (reported by Enrichr). It also\\nrecords\
    \ Enrichr\\u2019s combined score for each gene\\u2013term association, and constructs a bipartite graph\\nwhere nodes\
    \ are the two genes and the set of \\u201cenriched\\u201d terms. Each gene-to-term edge is weighted\\nby Enrichr\\u2019s\
    \ combined score, which integrates Fisher\\u2019s exact P with a z-score (c = ln(P) \\u21e5z) [98,\\n133] to capture both\
    \ statistical signi\\ufb01cance and effect size. The tool then aggregates the combined\\nscores and counts shared terms\
    \ to assign an overall con\\ufb01dence level, and labels the putative interac-\\ntion mechanism (e.g., signalling, metabolic,\
    \ regulatory, complex) based on the biological context\\nof those terms. It returns a structured report containing: (i)\
    \ a summary of the inferred gene\\u2013gene\\nrelationship in natural language, (ii) an overall con\\ufb01dence based\
    \ on aggregated combined scores\\nand shared-term counts, and (iii) the \\ufb01ve most signi\\ufb01cant shared pathways\
    \ or GO terms.\\nWikiPathways Co-Pathway Inspector examines whether two genes participate in shared\\nbiological pathways\
    \ by querying the community-curated WikiPathways 2024 Human corpus [99].\\nGiven a pair of genes, the tool uses the Enrichr\
    \ REST API to retrieve all human pathways that\\ncontain each gene in the WikiPathways 2024 Human corpus, and intersects\
    \ these sets to pinpoint\\npathways in which the genes co-occur. For every shared pathway, it derives an interaction-context\\\
    nlabel (e.g., signalling cascade, metabolic chain) from edge metadata, and a con\\ufb01dence score of\\nthe interaction\
    \ based on node proximity, edge evidence, and annotation depth. The output is a\\nstructured list of pathway names, their\
    \ interaction classi\\ufb01cations, and their con\\ufb01dence scores.\\nReactome Co-Pathway Analyzer queries the Enrichr\
    \ REST API to identify genes involved\\nin shared molecular reactions based on the Reactome Pathways 2024 database [40].\
    \ The tool deter-\\nmines functional associations between the given genes by analyzing whether two genes participate\\\
    nin the same reaction events (e.g., phosphorylation, complex formation, direct binding, enzymatic\\nactivity). It takes\
    \ a pair of genes as input and returns a summary of overlapping biochemical\\ninteractions, including the classi\\ufb01cation\
    \ of the molecular mechanism and a con\\ufb01dence estimate.\\nHallmark Co-Pathway Analyzer identi\\ufb01es functional\
    \ relationships between genes based\\non shared involvement in cancer hallmark processes, using the MSigDB Hallmark 2020\
    \ collec-\\ntion [41] obtained via the Enrichr REST API. Given two genes, the tool evaluates whether they\\nco-occur in\
    \ curated hallmark pathways associated with oncogenic processes (e.g., apoptosis, pro-\\nliferation, metabolic reprogramming,\
    \ immune signaling, DNA repair, angiogenesis). Outputs are\\na summary of shared hallmark processes, mechanism classi\\\
    ufb01cations, and con\\ufb01dence annotations.\\nGO Molecular Function Checker evaluates whether two genes share similar\
    \ molecular\\nfunctions by querying curated annotations from GO Molecular Function 2023 [42, 132]. Given a\\ngene pair,\
    \ the tool accesses the GO molecular function annotations via Enrichr REST API calls,\\n24\\n\\nand searches for convergent\
    \ functional assignments, mechanism categories, and relative con\\ufb01-\\ndence scores. The outputs are a list of shared\
    \ functional terms, associated weights, and relevant\\nmechanism labels drawn from GO\\u2019s standardized molecular vocabulary.\\\
    nGO Biological Process Checker analyzes the enrichment of biological processes among\\nthe input genes by querying curated\
    \ annotations from GO Biological Process (GO-BP) 2023 [42,\\n98, 132]. Through Enrichr REST API calls, the tool tests\
    \ each gene separately and intersects the\\nsigni\\ufb01cant GO-BP terms (Benjamini\\u2013Hochberg adjusted p \\uf8ff0.05).\
    \ For every shared term, the tool\\nrecords the GO ID and Enrichr\\u2019s combined score. It then summarizes the overlap\
    \ into an overall\\ncon\\ufb01dence (e.g., number of shared terms, distribution of combined scores). The tool\\u2019s\
    \ outputs are\\na list of shared GO-BP terms (names and GO IDs), per-gene statistics (adjusted p-value, combined\\nscore),\
    \ mechanism labels, and an overall con\\ufb01dence summary.\\nRetrieve DepMap Correlations obtains pairwise co-dependency\
    \ statistics using Chronos\\ngene-effect pro\\ufb01les from the DepMap 24Q2 CRISPR dataset [43]. The tool accesses preprocessed\\\
    nChronos gene scores derived from CRISPR-Cas9 knockout screens across 1,320 cancer cell lines.\\nFor each pair of genes,\
    \ it calculates the Pearson correlation coef\\ufb01cients [134] and the BH-adjusted\\np-values between the Chronos scores\
    \ of the two genes [135]. A Chronos dependency score of a\\ngene estimates the likelihood that the gene is essential in\
    \ a cell line (0 indicates not essential, and\\n-1 suggests comparable essentiality to the median of all pan-essential\
    \ genes) [136].\\nGenerate COMPASS Predictions applies the COMPASS model to predict immunotherapy\\nresponse based on\
    \ a patient\\u2019s transcriptomic pro\\ufb01le [36]. Given a patient\\u2019s transcriptomic pro\\ufb01le\\n(TPM) and\
    \ cancer type, the tool calls COMPASS to (1) predict the scores of 44 biologically-\\ngrounded immune concepts, capturing\
    \ immune cell states, tumor microenvironment interactions,\\nand signaling pathways, and (2) predict the likelihood of\
    \ the patient responding to immune check-\\npoint inhibitors (ICIs).\\nSearch Scienti\\ufb01c Literature retrieves and\
    \ synthesizes relevant scienti\\ufb01c literature to answer\\nthe user query. It queries the Semantic Scholar API to collect\
    \ candidate papers [47], and \\ufb01lters for\\nmethodological soundness and direct relevance. The resulting set of papers\
    \ is fed into an Open-\\nScholar reasoning module [49], which synthesizes their key \\ufb01ndings into a concise response\
    \ with\\ncitations to address the query. The output is either a structured dictionary containing the literature-\\ngrounded\
    \ summary with inline citations or, if the search yields nothing suitable, an explicit note\\nthat no suf\\ufb01ciently\
    \ relevant study is found.\\nHPA Biological Processes Analysis performs functional characterization of individual genes\\\
    nby querying the Human Protein Atlas (HPA) API [44\\u201346], which integrates expression data from\\n44 human tissues,\
    \ 10 cancer cell lines, 8 blood cell types, and 7 regions of the brain. The tool\\nprocesses these data to generate three\
    \ outputs. The tool retrieves tissue-speci\\ufb01c expression data\\n(nTPM), experimentally validated Gene Ontology (GO)\
    \ annotations, and protein-protein interac-\\ntion (PPI) datasets. It maps the retrieved GO annotations to ten canonical\
    \ biological categories\\n(e.g., cell cycle, apoptosis, metabolism) to stratify the gene\\u2019s involvement in core cellular\
    \ mecha-\\nnisms. Additionally, the PPI datasets retrieved from the HPA API are used to identify functionally\\nsimilar\
    \ proteins, quantifying similarity via a Jaccard index of shared biological process pro\\ufb01les.\\n25\\n\\nFinally,\
    \ for genes with tissue-speci\\ufb01c expression data, the tool calculates fold changes between\\ncancer cell lines and\
    \ healthy tissues to quantify the magnitude of differential expression. The \\ufb01nal\\nreport includes the categorized\
    \ GO annotations, functionally similar proteins identi\\ufb01ed by over-\\nlapping biological processes, and calculated\
    \ fold changes across cancer cell lines for the queried\\ngenes.\\nHPA Comparative Expression Analysis performs comparative\
    \ gene expression analysis on\\n10 cancer cell lines against healthy tissues [44\\u201346]. For each gene, the tool retrieves\
    \ normalized\\nTranscripts Per Million (nTPM) values via the Human Protein Atlas (HPA) API, and performs sev-\\neral comparative\
    \ analyses, including fold-change calculation, statistical signi\\ufb01cance assessment,\\nand expression level categorization.\
    \ The tool reports per-tissue nTPM, per-cell-line nTPM, and\\ntissue-vs-cell-line fold-changes. By default, the tool summarizes\
    \ results from a panel of 10 cell\\nlines (HeLa, MCF-7, A549, HepG2, Jurkat, PC-3, RH-30, SiHa, U-251 MG, Ishikawa). Expres-\\\
    nsion levels are binned into analysis-de\\ufb01ned ranges (from very low <0.1 to very high \\u226550 nTPM).\\nTo prioritize\
    \ candidates, the tool calculates a differential expression score based on magnitude\\n(>3-fold = high, >2-fold = moderate)\
    \ and \\ufb02ags highly upregulated targets, returning a summary\\nreport containing HPA metadata and fold-change metrics.\\\
    n1.2\\nResearchPlanning module\\nGiven free-form user input, consisting of a user instruction and an optional experimental\
    \ instruc-\\ntion, the ResearchPlanning module iteratively transforms it into in silico research plans (Figure\\n2b).\
    \ It leverages three module-speci\\ufb01c tools: ResearchPlanDraft, ContextVeri\\ufb01cation, and Integri-\\ntyVeri\\\
    ufb01cation. ResearchPlanDraft generates a multi-step research plan that explicitly states the ob-\\njectives of the analyses,\
    \ the selected tools, and the tools\\u2019 expected inputs, parameters, and outputs;\\nContextVeri\\ufb01cation validates\
    \ each biological entity and parameter choice against tool knowledge\\nbases to con\\ufb01rm data availability and compatibility;\
    \ and IntegrityVeri\\ufb01cation checks the speci\\ufb01city,\\ntechnical feasibility, and logical consistency of the\
    \ research plan.\\nResearchPlanDraft transforms free-form user input into a structured multi-step research\\nplan, which\
    \ consists of sequential computational analyses that address the research objective. Each\\nstep speci\\ufb01es the analysis\
    \ objective, selected tool, required inputs and parameters, and expected\\noutputs. The procedure is: (1) apply an LLM\
    \ to distill the objectives of the research plan based on\\nthe given instructions; (2) perform LLM-augmented retrieval\
    \ (RAG) to identify relevant tools and\\nobtain their metadata from the global tool space; and (3) assemble the objectives,\
    \ relevant tools,\\nand tool metadata into a coherent, stepwise research plan.\\nContextVeri\\ufb01cation ensures that\
    \ all biological entities and parameter choices in the plan\\nare compatible with the available tools and datasets from\
    \ the global tool space. The procedure is:\\n(1) apply an LLM to extract the names and parameters of the tools speci\\\
    ufb01ed in the plan; (2) verify\\nthe tools\\u2019 availability in the global tool space; (3) invoke each tool\\u2019s\
    \ internal context checker\\nfunction, when available, to validate the parameter choices in the plan; and (4) if the required\\\
    ncontext is missing or invalid, use an LLM to recommend a set of tool-supported alternatives.\\nIntegrityVeri\\ufb01cation\
    \ acts as the \\ufb01nal audit of the completeness, coherence, and logical\\n26\\n\\nsoundness of the research plan. An\
    \ LLM judge, guided by a rubric-style systems prompt, eval-\\nuates: (1) clarity of the plan; (2) tool-use \\ufb01delity,\
    \ ensuring that each tool\\u2019s usage aligns with the\\ndocumented functionality and parameter speci\\ufb01cation; (3)\
    \ parameter precision, con\\ufb01rming that the\\ninputs follow the documentation and best practices; (4) hallucination\
    \ risk, \\ufb02agging elements unsup-\\nported by the provided data or tool instructions; and (5) logical coherence, verifying\
    \ that the steps\\nare sequential, build upon each other appropriately, and follow a clear step-by-step progression to-\\\
    nward addressing the objective. Failure on any criterion triggers a revision request (i.e., returning a\\nmessage that\
    \ asks for another re\\ufb01nement cycle to improve the plan). The tool outputs an evaluation\\nreport that summarizes\
    \ the unmet criteria and provides concrete recommendations for revision.\\n1.3\\nAnalysis module\\nThe Analysis module\
    \ translates the research plans from the ResearchPlanning module into\\nwell-documented, executable code for computational\
    \ experiments. It coordinates four module-\\nspeci\\ufb01c tools: CodeGenerator, AnalysisExecution, CodeDebugger, and\
    \ AnalysisQualityChecker.\\nCodeGenerator produces code snippets that implement the analyses speci\\ufb01ed in the research\
    \ plan;\\nAnalysisExecution runs the code in a sandboxed environment with resource and timeout controls,\\ncapturing standard\
    \ output, error streams, and generated artifacts (e.g., tables, plots); CodeDebugger\\ndiagnoses runtime failures and\
    \ revises code snippets using LLM-assisted debugging; and Analy-\\nsisQualityChecker performs post-execution evaluation,\
    \ using structured criteria to assess correct-\\nness, reproducibility, parameter/provenance logging, and output informativeness\
    \ against the user\\ninput and the research plan\\u2019s stated objectives. Altogether, the module operates through an\
    \ au-\\ntonomous iterative cycle, delivering executable code and in silico experimental results that address\\nthe user\
    \ input and research plan without human intervention.\\nCodeGenerator uses a two-stage approach to generate executable\
    \ code snippets for the anal-\\nyses speci\\ufb01ed in the research plan. First, a ToolSelector component applies an LLM\
    \ to identify\\nthe necessary tools and retrieve their associated metadata from the global tool space. Then, a sep-\\\
    narate LLM instance synthesizes code under a code-generation systems prompt that integrates the\\nselected tools as outlined\
    \ in the step-by-step research plan. Each generated code snippet undergoes\\na rubric-guided pre-execution check (e.g.,\
    \ syntax, interface compliance, parameter validity) using\\nan LLM with a quality-check systems prompt; failures trigger\
    \ bounded retries before returning a\\ncode snippet. This tool-aware code synthesis with iterative self-re\\ufb01nement\
    \ is aligned with existing\\nwork on LLM tool-use and feedback-driven re\\ufb01nement [137, 138].\\nAnalysisExecution\
    \ writes each code snippet to a temporary Python \\ufb01le and launches a\\nPython subprocess with a 10-minute wait time\
    \ to execute the code. Standard output and error\\nstreams are captured. Upon timeout, the tool captures the return code\
    \ from the subprocess with the\\nfull traceback and logs attached for downstream analysis and debugging.\\nCodeDebugger\
    \ is an LLM-based debugging tool. It analyzes the problematic code snippet\\nand error messages, the user instructions,\
    \ the research plan, and the tool speci\\ufb01cations to identify\\nthe root cause. The CodeDebugger then generates corrected\
    \ code snippets that address the errors\\nwhile maintaining alignment with the research objectives and tool constraints,\
    \ enabling iterative\\n27\\n\\nre\\ufb01nement until successful execution is achieved.\\nAnalysisQualityChecker evaluates\
    \ the scienti\\ufb01c validity and completeness of the success-\\nfully executed code using an LLM judge [115]. The tool\
    \ analyzes the generated code and its\\nexecution outputs against the user instruction and research plan, examining code\
    \ informativeness\\n(i.e., outputs provide meaningful insights that are relevant to the research question), logical correct-\\\
    nness (i.e., proper implementation of analytical work\\ufb02ows), and alignment with research objectives.\\nThe evaluation\
    \ process uses structured LLM prompts that assess the quality of the analysis, and\\nprovides feedback in the tool\\u2019s\
    \ output for iterative re\\ufb01nement if quality standards are not met.\\n1.4\\nLiteratureReasoning module\\nThe LiteratureReasoning\
    \ module performs autonomous retrieval, relevance appraisal, and syn-\\nthesis of peer-reviewed publications to produce\
    \ literature-grounded analysis using three module-\\nspeci\\ufb01c tools: LiteratureSearch, RelevanceVeri\\ufb01cation,\
    \ and OpenScholarReasoning. Literature-\\nSearch executes structured searches across academic journal indices (e.g., Semantic\
    \ Scholar [47],\\nOpenAlex [48]) to collect candidate papers. RelevanceVeri\\ufb01cation performs study quality screen-\\\
    ning, scoring each paper for topical relevance and study type and returning a compact evidence\\npro\\ufb01le per paper.\
    \ OpenScholarReasoning synthesizes the screened set of papers into a literature-\\ngrounded report to address the research\
    \ objective in user instruction.\\nLiteratureSearch conducts literature searches across Semantic Scholar [47] and OpenAlex\
    \ [48]\\ndatabases. The process involves: (1) using an LLM to extract domain-speci\\ufb01c search terms from\\nthe user\
    \ instruction; (2) conducting literature searches in parallel with Semantic Scholar and Ope-\\nnAlex tools; (3) aggregating\
    \ the retrieved papers and their metadata, and performing deduplication\\nbased on exact title matching and DOI comparison;\
    \ and (4) returning a curated collection of paper\"\n  },\n  {\n    \"name\": \"References\",\n    \"text\": \"1.\\nLee,\
