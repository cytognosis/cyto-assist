    ,\n    \"text\": \"MEDEA is an agent that completes omics-based objectives for therapeutic discovery across biolog-\\\
    nical contexts. Across three open-ended domains, cell type speci\\ufb01c target nomination (2,400 analy-\\nses across\
    \ \\ufb01ve diseases), synthetic lethality reasoning (2,385 analyses across seven cell lines), and\\npatient-level immunotherapy\
    \ response prediction (894 patient analyses), MEDEA achieves strong\\nperformance while maintaining low failure rates\
    \ and calibrated abstention. These results re\\ufb02ect a\\nveri\\ufb01cation-aware design that speci\\ufb01es biological\
    \ context, executes tool-grounded analyses with\\npre-run and post-run checks, evaluates and screens literature, and reconciles\
    \ evidence or abstains\\nwhen evidence is insuf\\ufb01cient. In target nomination, MEDEA links candidates to disease-relevant\\\
    ncell types rather than tissue-level averages. In synthetic lethality, it integrates dependency sig-\\nnals with pathway\
    \ context. In immunotherapy, it connects tumor microenvironment programs to\\npersonalized treatment response.\\n12\\\
    n.\\nCC-BY 4.0 International license\\navailable under a\\n(which was not certified by peer review) is the author/funder,\
    \ who has granted bioRxiv a license to display the preprint in perpetuity. It is made\\nThe copyright holder for this\
    \ preprint\\nthis version posted January 20, 2026.\\n;\\nhttps://doi.org/10.64898/2026.01.16.696667\\ndoi:\\nbioRxiv preprint\\\
    n\\nContext veri\\ufb01cation yields biologically speci\\ufb01c interpretations. In rheumatoid arthritis, MEDEA\\nties\
    \ targets to myeloid dendritic cells, na\\u00a8\\u0131ve and effector-memory CD4+ \\u21b5\\u03b2 T cells, and na\\u00a8\\\
    u0131ve\\nCD8+ \\u21b5\\u03b2 T cells rather than bulk tissue signals, improving accuracy within each cell type (e.g.,\
    \ by\\n28.9% in myeloid dendritic cells and 21.1% in effector memory CD4+ \\u21b5\\u03b2 T cells) while abstain-\\ning\
    \ when the speci\\ufb01ed context is ambiguous. In follicular lymphoma, MEDEA nominates targets\\nwithin disease-relevant\
    \ B cell compartments and highlights pathways linked to germinal center\\nbiology, including B cell receptor signaling\
    \ and immune synapse organization. Planning and ex-\\necution checks further reduce failures by validating that the selected\
    \ resources and model inputs\\nmatch the speci\\ufb01ed context and data structure, avoiding common errors in agents [110].\\\
    nThe performance of AI agents on long-horizon tasks depends on verifying intermediate\\nsteps [111, 112]. In practice,\
    \ tool-augmented agents often fail when tools time out, raise API\\nexceptions, or return inconsistent outputs, which\
    \ can trigger cascading errors and task abandon-\\nment. MEDEA adds explicit checks in planning and execution to detect\
    \ tool malfunctions, apply\\nstructured retries, and update downstream reasoning. Because agentic training pipelines typically\\\
    noptimize for success trajectories and rarely expose models to tool failures [113], early mistakes\\nin multi-step analyses\
    \ can propagate and compound. In MEDEA, ablations show distinct roles for\\nplanning checks, execution diagnostics, and\
    \ literature retrieval. A literature-only agent abstains in\\n77.6% of disease contexts and often withholds useful conclusions.\
    \ An LLM-only agent abstains in\\n1.8% of analyses, but contributes the largest share of errors (69.2% on average across\
    \ \\ufb01ve diseases).\\nThe full MEDEA agent achieves the best performance with the lowest failure rate. In head-to-head\\\
    ncomparisons with a biomedical agent, it fails to return outputs in 39.3% of rheumatoid arthritis\\ncases due to preprocessing\
    \ issues; among the remaining cases, MEDEA is 2.1 times more accurate.\\nAnalyses of synthetic lethality and immunotherapy\
    \ response further illustrate the bene\\ufb01ts of\\ncontext veri\\ufb01cation in MEDEA. For synthetic lethality, MEDEA\
    \ surfaces lineage-aware genetic in-\\nteractions whose joint inhibition is predicted to disrupt compensatory circuits,\
    \ including pairs that\\ncouple DNA damage response or metabolic co-dependencies observed within speci\\ufb01c cancer\
    \ cell\\nlines, with accuracy gains up to 22.0% across seven lines. For immunotherapy response, MEDEA\\nstrati\\ufb01es\
    \ patients by tumor mutational burden and tumor microenvironment features, and links\\nresponse to antigen presentation,\
    \ interferon signaling, and T-cell exhaustion programs. Prompt-\\nrobust behavior suggests that reconciliation steps reduce\
    \ variance in conclusions that would other-\\nwise arise from minor prompt changes [114].\\nOur study has limitations.\
    \ First, the benchmarks rely on curated atlases, genetic dependency\\nresources, and an immune checkpoint inhibitor na\\\
    u00a8\\u0131ve cohort, which may not capture the full di-\\nversity of tissues, lineages, or clinical settings; additional\
    \ cohorts will be needed to test generaliz-\\n13\\n.\\nCC-BY 4.0 International license\\navailable under a\\n(which was\
    \ not certified by peer review) is the author/funder, who has granted bioRxiv a license to display the preprint in perpetuity.\
