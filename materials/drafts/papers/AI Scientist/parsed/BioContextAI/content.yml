  sections: "[\n  {\n    \"name\": \"Methods). At its core sits the Registry (Fig. 1b),\",\n    \"text\": \"which leverages\
    \ Schema.org ontology terms11\\nto catalog community-developed MCP servers\\nin a public repository with rich metadata\
    \ while\\nenforcing documentation and open-source\\nlicensing standards. These MCP servers allevi-\\nate the burden on\
    \ developers of agentic sys-\\ntems and unlock synthesis and recombination\\npotential by eliminating the need to reimple-\\\
    nment the layers through which LLMs access\\ndomain-specific resources.\\nMCP server developers can use an inter-\\nactive\
    \ online editor to seamlessly create\\nmetadata files to add their MCP server to the\\nRegistry, contributing it through\
    \ the Registry\\u2019s\\nGitHub repository (Supplementary Fig. 2).\\nResearchers can interact with the Registry\\nthrough\
    \ a downloadable index, a REST API\\nor the interactive web interface available at\\nhttps://biocontext.ai/. In addition,\
    \ the com-\\nmunity can identify the most helpful MCP\\nservers for different use cases through a\\nreview system and\
    \ shareable collections. To\\nfacilitate the exploration of biomedical MCP\\nservers, the web application provides access\\\
    nto BioContextAI Chat, a chatbot capable of\\nconnecting to any remote MCP server in our\\nRegistry, offering an accessible\
    \ way of trying\\nout remote MCP servers. Furthermore, online\\ndocumentation provides useful resources for\\nMCP server\
    \ development and usage tips for\\nBioContextAI. As a practical starting point,\\na feature-rich MCP server cookiecutter\
    \ tem-\\nplate further streamlines the development\\nof new MCP servers in accordance with\\nBioContextAI\\u2019s standards.\\\
    nAs a foundation for full-featured MCP\\nserver development and as an interactive\\nexample, BioContextAI offers the Knowledge-\\\
    nbase MCP. This MCP server implementation\\nexposes functionality from over 15 biomedical\\nresources, including UniProt12\
    \ and Open Tar-\\ngets13 (Supplementary Note 2). It is available\\nas an open-source software package for local\\ndeployment\
    \ through the PyPI Python software\\nregistry, enabling flexible combination with\\nexisting MCP servers to enhance agentic\
    \ sys-\\ntems with extended biomedical capabilities.\\nA remote-hosted version can be integrated\\nsetup-free across an\
    \ array of generative arti-\\nficial intelligence applications.\\nDespite these advances, challenges per-\\nsist. Reliance\
    \ on commercial LLMs and use\\nof remote-hosted MCP servers present secu-\\nrity, authentication, financial, data privacy\\\
    nand maintenance concerns14, which could\\nput them out of reach for certain research\\napplications. Future developments\
    \ in hybrid\\nlocal\\u2013cloud architectures, community-driven\\ngovernance models and privacy-preserving\\ncomputation\
    \ will be vital to overcoming\\nthese limitations.\\nIn this light, BioContextAI is a core compo-\\nnent of an emerging\
    \ open-source ecosystem\\nof agentic systems for biomedical research.\\nGiven the rapid progress of open-weights\\nreasoning\
    \ LLMs and optimizations such\\nas quantization and mixture-of-experts\\narchitectures15, combined with improvements\\\
    nin hardware throughput, the deployment of\\nprivacy-preserving, performant, transparent\\nand reproducible agentic systems\
    \ in academic\\nresearch is becoming increasingly feasible.\\nLooking ahead, agent-supported research\\nmay involve systems\
    \ that operate beyond\\nknowledge retrieval and standardized data\\nanalysis. Future systems may touch on all\\nphases\
    \ of scientific discovery (Fig. 2), auton-\\nomously researching literature to identify\\ngaps in current knowledge, aiding\
    \ in experi-\\nmental design, composing analysis code, sup-\\nporting analysis by enhancing outputs with\\ndata obtained\
    \ from knowledgebases and\\nbiomedical software, and incorporating find-\\nings into an ever-expanding body of biomedi-\\\
    ncal literature. Importantly, human researchers\\nmust stay in the loop to verify the accuracy\\nof outputs and ensure\
    \ that proposed experi-\\nments are both innovative and scientifically\\nsound. Equitable access to these emerging\\ntechnologies\
    \ will be key to leveraging existing\\nexpertise and ensuring that developments\\nreflect the richness of the scientific\
    \ commu-\\nnity and its members.\\nWe are committed to the continued develop-\\nment of BioContextAI as a community hub\
    \ for\\nLLM-supported biomedical research. As addi-\\ntional MCP servers are developed, a growing\\ncollection of biomedical\
    \ tools with relevant\\ntechnical capabilities will be made broadly\\naccessible through the Registry. Researchers\\nand\
    \ developers will be supported in creating,\\nevaluating, and deploying MCP-augmented\\nagentic systems through common\
    \ stand-\\nards, best-practice guides, templates, and\\nintegration tests. To enhance visibility and\\nengagement and\
    \ strive for an interoperable\\necosystem, BioContextAI will partner with\\nexisting communities, including BioCypher\\\
    nand the scverse, and use open communication\\nchannels to foster exchange between users\\nand developers. Finally, researchers\
    \ and devel-\\nopers can begin to engage with BioContextAI\\nHypothesis generation\\nResult\\nverification\\nWriting and\\\
    npublishing\\nData analysis\\nand interpretation\\nExperimental\\ndesign\\nFilter by relevance\\nand potential novelty\\\
    nRun experiment\\n...\\nHuman-led tasks\\nAgentic system-supported tasks\\nLarge language models\\nMultimodal datasets\\\
    nScientific literature\\nBiomedical software\\nscverse ecosystem\\nBioContextAI\\nKnowledgebases\\nFig. 2 | Toward reliable\
    \ agentic system supported biomedical research. Agentic systems, relying on\\nBioContextAI to find and develop MCP servers,\
    \ integrate scientific literature, knowledgebases, biomedical\\nsoftware (for example, scverse ecosystem packages) and\
    \ multimodal datasets. In an iterative agent\\u2013\\nhuman research loop, these systems could be used to support key\
    \ stages, such as hypothesis generation,\\nexperimental design and data analysis. Human researchers would assume a more\
    \ supervisory role, ensuring\\nrelevance, validity of results and accurate communication of findings to the wider scientific\
    \ community.\\n\\nnature biotechnology\\nVolume 43 | November 2025 | 1755\\u20131757 | 1757\\nCorrespondence\\nby interacting\
    \ with the community, contribut-\\ning MCP servers, developing agentic systems\\nand integrating available tools into\
    \ research\\nworkflows to help advance the understanding\\nof health and disease.\"\n  },\n  {\n    \"name\": \"Code availability\"\
