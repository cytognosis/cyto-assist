    \ \\u00b1 0.13\\u2217\\nTable 4: Human ratings on hypotheses generated by\\nHYPOREFINE, NOTEBOOKLM, and HYPERWRITE. *\\\
    nindicates that the difference between the rating with\\nHYPOREFINE is statistically significant (p <0.001).\\nOur hypothesis\
    \ generation method is robust to\\ndifferent prompts and hyperparameters, and\\nit is effective for smaller models.\\\
    nWe conduct\\nadditional experiments to test the robustness of\\nour method with different prompts, hyperparame-\\nters,\
    \ and with LLAMA-3.1-8B-INSTRUCT. For the\\nOOD setting, in Table 11 and Table 13, we show\\nthat the average performance\
    \ of our method only\\ndrop by 0.20% and 0.07% with different prompts\\nand hyperparameters, respectively. In Table 10,\
    \ we\\nfurther show that with LLAMA-3.1-8B-INSTRUCT,\\nour literature + data approach outperforms all\\nbaselines, with\
    \ an average accuracy improvement\\nof 15.27%, 13.04%, and 4.88% over few-shot,\\nliterature-based methods, and HYPOGENIC,\
    \ re-\\nspectively. These results highlight the robustness\\nof our method and its scalability and reproducibil-\\nity\
    \ with smaller models. Full details are in Ap-\\npendix D.\\n4.2\\nHuman Evaluation\\nGenerated hypotheses improve human\
    \ decision-\\nmaking in both AIGC Detection and Deception\\nDetection.\\nWe experiment with the GPTGC task\\nfor AIGC\
    \ Detection, and the average human ac-\\ncuracy improves by 14.19% (58.86% \\u219273.05%)\\nwhen we provide hypotheses\
    \ as assistance. We per-\\nform a statistical t-test and obtain a p-value of 0.01,\\nindicating that the improvement is\
    \ significant. In\\nDeception Detection, the introduction of hypothe-\\nses boosts human accuracy by 7.44% (57.14% \\\
    u2192\\n64.58%), with a p-value of 0.04.\\nWhen hypotheses are present, participants would\\nuse them to assist decision-making\
    \ for over 90%\\nof the time. All three presented hypotheses are\\nselected to be used with frequency greater than\\n30%\
    \ (Table 5, Table 6 in the Appendix). For ex-\\nample, the most used hypothesis, with frequency\\nof 44.55%, in AIGC detection\
    \ is \\u201cHuman-written\\ntexts tend to have a more conversational tone and\\ncolloquial language, while AI-generated\
    \ texts tend\\nto be more formal and lack idiomatic expressions.\\u201d\\nFor both tasks, 100% of the participants find\
    \ the\\nhypotheses to be helpful, and over 40% find them\\nto be \\u201cVery helpful\\u201d or \\u201cExtremely helpful\\\
    u201d.\\nHYPOREFINE hypotheses are rated higher in\\nclarity and plausibility compared to those gener-\\nated by existing\
    \ methods (Table 4).\\nHypotheses\\ngenerated by HYPOREFINE achieve statistically\\nsignificantly higher clarity and plausibility\
    \ scores\\nthan those generated by NOTEBOOKLM and HY-\\nPERWRITE. In terms of novelty, NOTEBOOKLM\\nreceives slightly\
    \ higher ratings; however, the dif-\\nference between NOTEBOOKLM and HYPORE-\\nFINE is not statistically significant.\
    \ Recall that hy-\\npotheses generated by NOTEBOOKLM do not have\\nstrong predictive power. In other words, gener-\\nating\
    \ \\u201cnovel\\u201d hypotheses is easier if they are not\\nconstrained by plausibility.\\nHumans rate literature-based\
    \ and data-driven\\nhypotheses as distinct.\\nWe assign novelty labels\\nto hypothesis pairs based on a majority vote\
    \ from\\nthree human annotators, who evaluate whether a\\nhypothesis give meaningfully different information\\n(\\u201cnovel\\\
    u201d) from another. 84% and 80% of the hy-\\npotheses are rated novel for Deception Detection\\nand AIGC Detection, respectively,\
    \ demonstrating\\nthe complementarity between literature-based and\\ndata-driven approaches.\\n\\nHypotheses\\nFrequency\
    \ of Selection\\nHypothesis 1: AI-generated texts tend to use more elaborate and descriptive\\nlanguage, including adjectives\
    \ and adverbs, to create a sense of atmosphere and\\nimmersion. Human-written texts, on the other hand, tend to be more\
    \ concise\\nand straightforward in their language use.\\n38.79%\\nHypothesis 2: Human-written texts are more likely to\
    \ contain errors or id-\\niosyncrasies in grammar and punctuation, reflecting the natural imperfections\\nof human writing,\
    \ while AI-generated texts typically maintain a higher level of\\ngrammatical accuracy.\\n34.55%\\nHypothesis 3: Human-written\
    \ texts tend to have a more conversational tone\\nand colloquial language, while AI-generated texts tend to be more formal\
    \ and\\nlack idiomatic expressions.\\n44.55%\\nNo hypothesis selected\\n3.94%\\nTable 5: How often participants use hypotheses\
    \ in AIGC Detection. We allow users to select multiple hypotheses\\nfor each instance they make prediction on, so the\
    \ total frequency can exceed 100%.\\n5\\nRelated Work\\nLiterature-based research idea generation.\\nBaek et al. (2024),\
    \ Wang et al. (2024), and Gha-\\nfarollahi and Buehler (2024) use LLMs to build\\nknowledge graphs from literature and\
    \ generate re-\\nsearch ideas, such as proposing new problem se-\\ntups, methodologies, or evaluation frameworks.\\nUnlike\
    \ their focus on ideation, our work gener-\\nates hypotheses to explain a phenomenon with real\\nobservations (see Appendix\
    \ E.1 for detailed com-\\nparison). Yang et al. (2024b) generates hypothe-\\nses from raw web data but relies on annotated\
    \ hy-\\npotheses from literature. These methods require\\nextensive adaptation, so we developed our own\\nliterature-based\
    \ approach.\\nData-driven hypothesis generation.\\nBesides\\nHYPOGENIC, we review additional works on dis-\\ncovering\
    \ unseen patterns from data. Zhong et al.\\n(2023) discovers patterns by analyzing difference\\nbetween large corpora.\
    \ Pham et al. (2024) makes\\ndiscovery by generating and refining interpretable\\ntopics. Romera-Paredes et al. (2024)\
    \ uncovers new\\nsolutions in open math problems by iteratively up-\\ndating programs. Qiu et al. (2024) and Yang et al.\\\
    n(2024a) evaluate LLMs\\u2019 ability in performing in-\\nductive reasoning in synthetic settings. Batista and\\nRoss\
    \ (2024) uses LLMs to generate hypotheses\\nand conducts comprehensive experiments to study\\nhuman engagements with headlines.\
    \ We choose\\nHYPOGENIC as the backbone for data-driven hy-\\npothesis generation as their tasks are most similar\\nto\
    \ ours, and their approach to hypothesis updates\\nintegrates naturally into our refinement process.\\nAutomated scientific\
    \ research with LLMs.\\nThere is growing interest in developing LLM-\\npowered methods and multi-agent frameworks to\\\
    nassist scientific research. Lu et al. (2024) designs\\nan LLM agent to generate full research papers. Li\\net al. (2024)\
    \ proposes a method to generate research\\nideas from existing literature and automatically im-\\nplement and execute\
    \ experiments. In contrast, our\\nwork focuses primarily on hypothesis generation,\\nas we believe it is crucial to preserve\
    \ human agency\\nand oversight in the scientific research process.\\nTo evaluate LLM generated hypotheses, Qi et al.\\\
    n(2023) examines whether they contain novel infor-\\nmation not found in existing literature. Si et al.\\n(2024) asks\
    \ experts to rate the novelty of LLM-\\nproposed research ideas in the NLP domain. While\\nthese studies highlight LLMs\\\
    u2019 ability to generate\\nnovel hypotheses, they do not conduct human sub-\\nject experiments to validate the effectiveness\
    \ of hy-\\npotheses. To this end, we conduct the first human\\nstudy to test the utility of LLM-generated hypothe-\\nses\
    \ in supporting human decision-making.\\nSignificant efforts have also been made to evalu-\\nate and benchmark multi-agent\
    \ frameworks on data\\nanalysis tasks (Majumder et al., 2024; Gu et al.,\\n2024; Hu et al., 2024; Chen et al., 2024; Huang\\\
    net al., 2024; Guo et al., 2024), literature processing\\nand information retrieval tasks (Press et al., 2024;\\nAjith\
    \ et al., 2024; Kang and Xiong, 2024; Zhang\\net al., 2024), and more general research tasks (Tian\\net al., 2024; Jansen\
    \ et al., 2024).\\n6\"\n  },\n  {\n    \"name\": \"Conclusion\",\n    \"text\": \"We propose a novel approach that integrates\
    \ litera-\\nture and data to generate hypotheses, with extensive\\nand systematic evaluations. Our method consis-\\ntently\
    \ outperforms all baselines, including existing\\nliterature-based and data-driven approaches. Fur-\\n\\nthermore, human\
    \ evaluations reveal that our gen-\\nerated hypotheses also improve human decision-\\nmaking in challenging tasks.\\n7\\\
    nLimitations\\nOur automated evaluation uses two recent mod-\\nels on datasets across various domains, showing\\nthe effectiveness\
    \ of our method across diverse set-\\ntings. However, we did not further evaluate our hy-\\npotheses on some tasks that\
    \ require representations\\nbeyond natural language, such as math problem\\nsolving and code generation.\\nThe literature\
    \ corpus used for literature-based\\nhypothesis generation is limited in terms of size and\\ncollection method. The collection\
    \ is carried out by\\nmanually searching and collecting up to 10 papers\\non Semantic Scholar or Google Scholar. Though\\\
    nwith the limited literature corpus we already show\\nthat our methods yield competent performance, a\\nnatural future\
    \ direction is to enhance the literature\\ncomponent with automatic and scalable retrieval.\\nSimilarly, we achieved satisfactory\
    \ performance\\nacross different models and tasks with the initial set\\nof hyperparameters. However, we did not perform\\\
    nan exhaustive hyperparameter search, which may\\nhave yielded further enhancements to the perfor-\\nmance of our methods.\
    \ This represents a limitation\\nof our study that could be addressed in future work.\\nOur experiments with human subjects\
    \ is a proof\\nof concept. The number of participants in our hu-\\nman evaluation is relatively small. As a result, we\\\
    ndo not believe that we have the statistical power to\\ndistinguish, for example, the difference between\\nHYPOGENIC and\
    \ HYPOREFINE. Although this\\nis not the focus of our study, we encourage fu-\\nture work to conduct large-scale experiments\
    \ in\\nfocused domains to validate the hypotheses gener-\\nated through human-AI collaboration.\\nLast but not least,\
    \ we manually chose three hy-\\npotheses through ablation-style study and subjec-\\ntive judgment for experiments with\
    \ human subjects.\\nWe believe this process is the essence of human-\\nAI collaboration in future scientific processes.\
    \ It\\nrequires future exploration to identify the optimal\\ncollaboration regime.\"\n  },\n  {\n    \"name\": \"Acknowledgments\"\
