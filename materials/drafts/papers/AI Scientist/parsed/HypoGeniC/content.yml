    u201d\\n\\u2014Albert Einstein\\nLarge language models (LLMs) excel at syn-\\nthesizing information and hold promise for\
    \ trans-\\nforming hypothesis generation, a critical yet un-\\nderstudied step in scientific discoveries. Many re-\\ncent\
    \ studies recognize this potential and use LLMs\\nto generate hypotheses (e.g., Yang et al., 2024b;\\nBatista and Ross,\
    \ 2024). We broadly categorize\\nthem into theory-driven and data-driven methods.\\n*Equal contributions.\\nOn one hand,\
    \ theory-driven approaches leverage\\nLLMs to review existing literature and generate\\nnovel hypotheses/ideas (Yang et\
    \ al., 2024b; Baek\\net al., 2024). These methods have shown promising\"\n  },\n  {\n    \"name\": \"results in terms\
    \ of the hypotheses\\u2019 novelty, valid-\",\n    \"text\": \"ity, and usefulness to researchers, while remain-\\ning\
    \ grounded in established human knowledge (Si\\net al., 2024). However, they come with notable lim-\\nitations: they require\
    \ high-quality literature, strug-\\ngle to adapt to new data, and lack empirical support.\\nData-driven approaches, on\
    \ the other hand, propose\\nhypotheses by discovering patterns in data (Zhou\\net al., 2024; Qiu et al., 2024). These\
    \ hypotheses are\\ndata-adaptive and can exhibit strong performance\\nin explaining the data. However, they could be too\\\
    noverly tailored to the specific datasets used, which\\ncan hinder their generalizability.\\nWe hypothesize that theory\
    \ can guide the discov-\\nery from data and propose to integrate literature-\\nbased and data-driven hypothesis generation\
    \ (see\\nFigure 1). For the data-driven component, we use\\nHYPOGENIC as the backbone (Zhou et al., 2024).\\nHYPOGENIC\
    \ leverages an LLM to initialize hy-\\npotheses from a small number of examples and\\nthen updates them iteratively to\
    \ improve the qual-\\nity of hypotheses. To enhance this process with\\nliterature insights, we introduce a literature-based\\\
    nhypothesis agent. This agent interacts with the\\ndata-driven hypothesis agent (HYPOGENIC), refin-\\ning and maintaining\
    \ a shared pool of hypotheses\\nthrough continuous collaboration, ensuring that the\\nhypotheses benefit from both data-driven\
    \ adaptabil-\\nity and the grounding of existing scientific knowl-\\nedge. In addition to the refinement approach, we\\\
    nalso propose to directly unionize literature-based\\nand data-driven hypotheses.\\nTo comprehensively evaluate these\
    \ hypotheses,\\nwe conduct automatic and human evaluation to as-\\nsess their generalizability, utility, and novelty.\
