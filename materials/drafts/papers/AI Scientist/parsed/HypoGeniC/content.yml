    : \"for LLAMA-70B-I), demonstrating the benefit of\\nincorporating literature with data.\\nFor DECEPTIVE REVIEWS, PERSUASIVE\
    \ PAIRS,\\nand DREADDIT, refining the hypotheses with lit-\\nerature consistently improves inference accuracy\\ncompared\
    \ to HYPOGENIC, with a 3.92% improve-\\nment on average. On the other hand, refining the hy-\\npotheses with literature\
    \ does not help with GPTGC\\nand LLAMAGC, but the union of HYPOGENIC and\\nhypotheses generated from literature consistently\\\
    nperforms the best. Comparing with HYPOGENIC\\nfor these two tasks, refining the hypotheses with\\nliterature actually\
    \ results in an accuracy drop by\\n13.64%. This is likely due to that the literature for\\nAIGC detection has relatively\
    \ few insights on inter-\\npretable features to detect AI generated contents,\\nand refining the data-driven hypotheses\
    \ with that\\ninformation degrades performance.\\nTo further illustrate our approach, we present\\na case study of our\
    \ generated hypotheses in Ta-\\nble 2. For most cases, LITERATURE-ONLY and HY-\\nPOGENIC generate different hypotheses\
    \ as in Case\\nI: one is about first-person singular pronouns, while\\nthe other one is about past experiences. We include\\\
    nmore details on the differences between hypothe-\\nses generated by different methods in \\u00a7 4.2. More\\nexamples\
    \ of hypotheses generated using LITERA-\\nTURE\\u222aHYPOREFINE are in Table 16. Under some\\ncases, the methods can generate\
    \ similar hypotheses,\\nand HYPOREFINE improves the quality of the hy-\\n\\nCase I: LITERATURE-ONLY and HYPOGENIC generate\
    \ different hypotheses\\nLITERATURE-ONLY: Deceptive reviews often contain a higher frequency of first-person singular\
    \ pro-\\nnouns, while truthful reviews may use these pronouns less frequently.\\nHYPOGENIC: Reviews that reference the\
    \ reviewer\\u2019s previous experiences with the hotel brand or similar\\nhotels are more likely to be truthful, while\
    \ reviews that do not provide any context or comparison to past\\nexperiences are more likely to be deceptive.\\nCase\
    \ II: LITERATURE-ONLY and HYPOGENIC generate similar hypotheses\\nLITERATURE-ONLY: Truthful reviews often provide a balanced\
    \ perspective, while deceptive reviews\\nmay seem overly promotional or biased towards a competitor.\\nHYPOGENIC: Reviews\
    \ that express a balanced perspective, mentioning both positive and negative\\naspects of the stay, are more likely to\
    \ be truthful, whereas reviews that are overly positive or negative\\nwithout nuance tend to be deceptive.\\nHYPOREFINE:\
    \ Reviews that present a balanced perspective by discussing both positive and negative\\naspects of the stay, particularly\
    \ with specific examples (e.g., \\\"The location was fantastic, but the air\\nconditioning was broken\\\"), are more likely\
    \ to be truthful, while reviews that are excessively positive or\\nnegative without acknowledging any redeeming qualities\
    \ (e.g., \\\"This is the best hotel ever!\\\" or \\\"I will\\nnever stay here again!\\\") tend to be more deceptive, as\
    \ they may reflect an attempt to manipulate reader\\nemotions rather than provide an honest assessment.\\nTable 2: Examples\
    \ of generated hypotheses from different methods. We show cases where LITERATURE-ONLY and\\nHYPOGENIC generate different\
    \ hypotheses or similar hypotheses, and how HYPOREFINE combines them in the\\ncase if they express unifiable ideas.\\\
    npothesis. In Case II, all three hypotheses focus on\\nbalanced perspectives being indicative of truthful\\nreviews. HYPOREFINE\
    \ incorporates the \\u201creviews\\nthat seem to be promoting a competitor\\u201d insight\\nfrom LITERATURE-ONLY, while\
    \ also capturing the\\nemphasis on \\u201clack of nuance\\u201d from HYPOGENIC.\\nBy doing so, HYPOREFINE offers a more\
    \ nuanced\\nhypothesis that not only explains how deceptive\\nreviews may manipulate reader emotions, but also\\nprovides\
    \ specific examples to illustrate how bal-\\nanced perspectives can contribute to truthful assess-\\nments. This combination\
    \ of insights from litera-\\nture and data allows HYPOREFINE to offer a more\\ncomprehensive and explanatory hypothesis.\
    \ We in-\\nclude another case study to compare the generated\\nhypotheses from SciMON (Wang et al., 2024) and\\nHYPOREFINE\
    \ in Appendix E.1, demonstrating the\\ndifference between research idea generation and\\nthe hypothesis generation task\
    \ we focus on.\\nPerformance on IND held-out datasets.\\nSimilar\\nto Table 1, combining literature and data achieves\\\
    nthe best accuracy and F1 scores in most cases on\\nthe held-out IND datasets (see Table 9 in the Ap-\\npendix). For some\
    \ cases, such as using Llama on\\nthe IND datasets for GPTGC, LLAMAGC, and\\nPERSUASIVE PAIRS, HYPOGENIC gets the top\\\
    nperformance compared to other methods. This is\\nnot surprising, since HYPOGENIC generates hy-\\npotheses by looking\
    \ at IND data only. In contrast,\\nour methods that take information from both liter-\\nature and data may generate hypotheses\
    \ that are\\nmore generally applicable but with slightly worse\\nperformance on the IND data. Thus in Table 1, the\\nhypotheses\
    \ generated from both literature and data\\nperforms the best on all methods for OOD datasets.\\nGenerated hypotheses\
    \ can be effectively trans-\\nferred to a different model.\\nTo further check\\nthe generalization behavior of our generated\
    \ hy-\\npotheses, we take the hypotheses from the best-\\nperforming method with our literature+data ap-\\nproach and\
    \ then use the other model to perform\\ninference. Table 3 shows that the generated hy-\\npotheses from one model remain\
    \ effective for the\\nother model, the performance exhibits no signifi-\\ncant change in most cases (drop <5% in 11 out\
    \ of\\n20 cases). Even with this performance drop, our\"\n  },\n  {\n    \"name\": \"methods still outperform the few-shot\
