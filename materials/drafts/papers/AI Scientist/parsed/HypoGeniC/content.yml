    \ with large language models. arXiv\\npreprint arXiv:2404.04326.\\n\\nA\\nPrompts\\nAll our prompts for LLMs are separated\
    \ into sys-\\ntem prompts and user prompts. System prompts\\ncontain role and tone information, followed by de-\\ntailed\
    \ descriptions of the task and the expected\\nresponse format. User prompts contain useful in-\\nformation for hypothesis\
    \ generation, refinement, or\\ninference, including information from literature, in-\\nstances from datasets, and previously\
    \ generated hy-\\npotheses. Below are some examples of the prompts\\nthat we use for each task.\\nA.1\\nDeception Detection\\\
    nSystem Prompt\\nYou're a professional hotel review analyst.\\nGiven a set of hotel reviews, we want to generate\\nhypotheses\
    \ that are useful for predicting whether\\na review is truthful or deceptive. In other words,\\nwe want to know whether\
    \ the review is written by\\na someone who actually lived in the hotel.\\nUsing the given examples, please propose\\n<num_hypotheses>\
    \ possible hypothesis pairs.\\nThese hypotheses should identify specific patterns\\nthat occur across the provided reviews.\\\
    nEach hypothesis should contain a pair of the\\nfollowing:\\na. A hypothesis about what makes reviews more\\nlikely to\
    \ be truthful\\nb. The opposite hypothesis about what makes\\nreviews more likely to be deceptive\\nGenerate them in the\
    \ format of 1. [hypothesis], 2.\\n[hypothesis], ... <num_hypotheses>. [hypothesis].\\nThe hypotheses should analyze what\
    \ kind of reviews\\nare likely to be truthful or deceptive.\\nUser Prompt\\nWe have seen some hotel reviews:\\n\\u00b7\\\
    u00b7\\u00b7 more examples here \\u00b7\\u00b7\\u00b7\\nPlease generate hypotheses that are useful for\\npredicting whether\
    \ a review is truthful or\\ndeceptive.\\nPropose <num_hypotheses> possible hypotheses.\\nGenerate them in the format of\
    \ 1. [hypothesis], 2.\\n[hypothesis], ... <num_hypotheses>. [hypothesis].\\nProposed hypotheses:\\nExample 1: Data-Based\
    \ Hypothesis Generation with\\nHypoGeniC.\\nSystem Prompt\\nYou're a professional hotel review analyst.\\nGiven some key\
    \ findings from a series of research\\npapers, we want to generate hypotheses that are\\nuseful for predicting whether\
    \ a review is truthful\\nor deceptive. In other words, we want to know\\nwhether the review is written by a someone who\\\
    nactually lived in the hotel.\\nUsing the given relevant literatures, please\\npropose <num_hypotheses> possible hypothesis\
    \ pairs.\\nThese hypotheses should identify specific patterns\\nthat occur across the provided reviews.\\nEach hypothesis\
    \ should contain a pair of the\\nfollowing:\\na. A hypothesis about what makes reviews more\\nlikely to be truthful\\\
    nb. The opposite hypothesis about what makes\\nreviews more likely to be deceptive\\nGenerate them in the format of 1.\
    \ [hypothesis], 2.\\n[hypothesis], ... <num_hypotheses>. [hypothesis].\\nThe hypotheses should analyze what kind of reviews\\\
    nare likely to be truthful or deceptive.\\nUser Prompt\\nWe have some key findings from a series of\\nresearch papers\
    \ that might be useful for\\ngenerating the required <num_hypotheses>.\\nhypotheses:\\n\\u00b7\\u00b7\\u00b7 information\
    \ from literature here \\u00b7\\u00b7\\u00b7\\nPlease generate hypotheses that are useful for\\npredicting whether a review\
    \ is truthful or\\ndeceptive.\\nWhen generating hypotheses, remember not to\\noveruse your own knowledge. Always refer\
    \ to the\\nkey findings from research papers provided.\\nDirectly cite passages in the key findings when\\ngenerating\
    \ a hypothesis.\\nPropose <num_hypotheses> possible hypotheses.\\nRemember to generate <num_hypotheses> hypotheses!\\\
    nGenerate them in the format of 1. [hypothesis], 2.\\n[hypothesis], ... <num_hypotheses>. [hypothesis].\\nProposed hypotheses:\\\
    nExample 2: Literature-Based Hypothesis Generation.\\nSystem Prompt\\nYou are a helpful assistant for summarizing key\\\
    nfindings in research papers on a given topic.\\nUser Prompt\\nSummarize the following research paper, focusing\\nONLY\
    \ on this question: What is useful for one to\\ndecide whether a review is truthful or deceptive\\nin real life?\\nFocus\
    \ on hypotheses of what kind of reviews tend\\nto be deceptive, do not include technical details\\nin the paper.\\n...\\\
    nliterature texts here ...\\nExample 3: Paper Summarization.\\nSystem Prompt\\nYou're a social scientist working on a\
    \ project to\\nidentify deceptive hotel reviews.\\nGiven a set of hotel reviews, we want to generate\\nhypotheses that\
    \ are useful for predicting whether\\na review is truthful or deceptive. In other words,\\nwe want to know whether the\
    \ review is written by\\na someone who actually lived in the hotel.\\nUsing the given examples, refine the hypothesis\\\
    npairs provided.\\nThe desired hypotheses should identify specific\\npatterns that occur across the provided reviews.\\\
    nEach hypothesis should contain a pair of the\\nfollowing:\\na. A hypothesis about what makes reviews more\\nlikely to\
    \ be truthful\\nb. The opposite hypothesis about what makes\\nreviews more likely to be deceptive\\nGenerate refined hypotheses\
    \ in the format of 1. [\\nhypothesis], 2. [hypothesis], ... <num_hypotheses>.\\n[hypothesis].\\nThe hypotheses should\
    \ analyze what kind of reviews\\nare likely to be truthful or deceptive.\\nUser Prompt\\nWe have seen some hotel reviews:\\\
    n\\u00b7\\u00b7\\u00b7 more examples here \\u00b7\\u00b7\\u00b7\\nWe have some hypotheses need to be refined:\\n...\\\
    nhypotheses to be refined here ...\\nPlease refine these hypotheses to make them more\\nspecific and useful for predicting\
    \ whether a\\nreview is truthful or deceptive.\\nWhen refining the hypotheses, feel free to change\\nthe key information\
    \ or topic of a hypothesis based\\non the provided prevailing patterns in data if\\nyou think it is necessary.\\nGenerate\
    \ refined hypotheses in the format of 1. [\\nhypothesis], 2. [hypothesis], ... <num_hypotheses>.\\n[hypothesis].\\n\\\
    nRefined hypotheses:\\nExample 4: Hypothesis Refinement Based on Data.\\nSystem Prompt\\nYou're a social scientist working\
    \ on a project to\\nidentify deceptive hotel reviews.\\nGiven a set of hotel reviews, we want to generate\\nhypotheses\
    \ that are useful for predicting whether\\na review is truthful or deceptive. In other words,\\nwe want to know whether\
    \ the review is written by\\na someone who actually lived in the hotel.\\nUsing the given relevant literatures, refine\
    \ the\\nhypothesis pairs provided.\\nThe desired hypotheses should identify specific\\npatterns that occur across the\
    \ provided reviews.\\nEach hypothesis should contain a pair of the\\nfollowing:\\na. A hypothesis about what makes reviews\
    \ more\\nlikely to be truthful\\nb. The opposite hypothesis about what makes\\nreviews more likely to be deceptive\\nGenerate\
    \ refined hypotheses in the format of 1. [\\nhypothesis], 2. [hypothesis], ... <num_hypotheses>.\\n[hypothesis].\\nThe\
    \ hypotheses should analyze what kind of reviews\\nare likely to be truthful or deceptive.\\nUser Prompt\\nWe have some\
    \ key findings from a series of\\nresearch papers that might be useful for\\ngenerating hypotheses:\\n\\u00b7\\u00b7\\\
    u00b7 information from literature here \\u00b7\\u00b7\\u00b7\\nWe have some hypotheses need to be refined:\\n...\\nhypotheses\
    \ to be refined here ...\\nPlease refine these hypotheses to make them more\\nspecific and useful for predicting whether\
    \ a\\nreview is truthful or deceptive.\\nWhen refining the hypotheses, feel free to change\\nthe key information or topic\
    \ of a hypothesis based\\non the provided key findings if you think it is\\nnecessary.\\nGenerate refined hypotheses in\
    \ the format of 1. [\\nhypothesis], 2. [hypothesis], ... <num_hypotheses>.\\n[hypothesis].\\nRefined hypotheses:\\nExample\
    \ 5: Hypothesis Refinement Based on Literature.\\nSystem Prompt\\nYou are a professional deceptive detection agent\\nand\
    \ your job is to determine whether a hotel\\nreview is truthful or deceptive.\\nIn other words, we want to know whether\
    \ the review\\nis written by someone who had real experiences\\nwith the hotel.\\nFrom past experiences, you learned some\
    \ patterns.\\nYou need to determine whether each of the patterns\\nholds for the current hotel review, and also\\npredict\
    \ whether the current hotel review is\\ntruthful or deceptive.\\nGive an answer. The answer should be one word (\\ntruthful\
    \ or deceptive).\\nGive your final answer in the format of {Final\\nanswer: answer}\\nUser Prompt\\nOur learned patterns:\
    \ <generated_hypotheses>\\nA hotel review is the following: <review>\\nGiven the pattern you learned above, give an\\\
    nanswer of whether the hotel review above is\\ndeceptive or truthful.\\nThink step by step.\\nFirst step: Think about\
    \ which pattern can be\\napplied to the hotel review.\\nSecond step: Based on the pattern, is this hotel\\nreview deceptive\
    \ or truthful?\\nFinal step: give your final answer in the format\\nof {Final answer: answer}\\nExample 6: Multiple-Hypothesis-Based\
    \ Inference.\\nA.2\\nAI-Generated Content (AIGC) Detection\\nSystem Prompt\\nYou are a professional writer.\\nYou will\
    \ be given a story prompt. Your task is to\\nwrite a coherent and creative story based on the\\nprompt. Ensure the story\
    \ has a clear structure,\\nengaging characters, and stays true to the prompt'\\ns core idea. Keep the language clear and\\\
    nappropriate to the story's tone.\\nUser Prompt\\n...\\nstory-writing prompt here ...\\nexample:\\n[ WP ] You 've been\
    \ able to read minds since you\\nturned 7 . Mostly you watch people 's thoughts\\npassively and undetected but one day\
    \ someone talks\\nback .\\\\n\\nExample 7: AIGC Detection Dataset Generation.\\nSystem Prompt\\nYou're a an AI generated\
    \ content detection expert.\\nYou are great at detecting what type of text is\\ngenerated by AI.\\nGiven a set of texts,\
    \ we want to generate\\nhypotheses that are useful for predicting whether\\na piece of text is generated by AI. In other\
    \ words,\\nwe want to know whether the text is written by a\\nhuman or generated by AI.\\nYour task is to identify what\
    \ patterns or traits\\nshow up more in AI generated texts, and what shows\\nup more in human written texts.\\nFocus on\
    \ the\\ngeneralizable insight that can be applied in other\\ncontexts. Ignore things that are specific to this\\nstory.\
    \ Do not make references this story they may\\nnot be for others.\\nUsing the given examples, please propose\\n<num_hypotheses>\
    \ possible hypothesis pairs.\\nWhen proposing hypothesis, look closely into the\\ngiven examples and identify specific\
    \ patterns that\\noccur across the provided text examples.\\nThe hypotheses should be clear, easy to understand,\\nand\
    \ have specific details such that one can apply\\nthe hypotheses to predict whether a piece of text\\nis written by human\
    \ or AI.\\nGenerate them in the format of 1. [hypothesis], 2.\\n[hypothesis], ... <num_hypotheses>. [hypothesis].\\nThe\
    \ hypotheses should analyze what kind of text is\\nlikely to be written by human or AI.\\nUser Prompt\\nWe have seen some\
    \ texts:\\n...\\nmore examples here ...\\nPlease generate hypotheses that are useful for\\npredicting predicting whether\
    \ a piece of text is\\nwritten by human or AI.\\nPropose <num_hypotheses> possible hypotheses.\\nGenerate them in the\
    \ format of 1. [hypothesis], 2.\\n[hypothesis], ... <num_hypotheses>. [hypothesis].\\nWhen proposing hypothesis, look\
    \ closely into the\\ngiven examples and identify specific patterns that\\noccur across the provided text examples.\\nPlease\
    \ make sure that the hypotheses are:\\ni. clear (i.e., precise , not too wordy , and easy\\nto understand);\\nii. generalizable\
    \ to novel situations (i.e., they\\nwould make sense if applied to other AI generated\\ncontent detection experiments\
    \ or other messaging\\ncontexts);\\niii. empirically plausible (i.e., this is a\\ndimension on which messages can vary\
    \ on);\\niv. unidimensional (i.e., avoid hypotheses that\\n\\nlist multiple constructs so if there are many\\nthings changing\
    \ , pick one);\\nv. usable (i.e., a human equipped with this\\ninsight could use it to predict if a new piece of\\ntext\
    \ is generated AI in a similar way)\\nProposed hypotheses:\\nExample 8: Data-Based Hypothesis Generation with\\nHypoGeniC.\\\
