    \ when removed from\\nthe hypotheses pool during multi-hypothesis in-\\nference. In addition, to motivate participants\
    \ to\\nperform at their best, we offer a bonus of $0.1 for\\neach correctly predicted instance.\\nAt the end of the study,\
