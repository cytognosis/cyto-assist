    nThe chosen hypotheses for Deception Detection\\nand AIGC Detection can be found in Table 5 and\\nTable 6.\\nWe recruit\
    \ 30 participants for the control group\\nand 30 for the experimental group. For the control\\ngroup, 4 people timed out,\
    \ and 25 out of the remain-\\ning 26 participants passed attention checks. For the\\nexperimental group, 3 people timed\
    \ out, and 22\\nout of the remaining 27 passed attention checks.\\nWe compute human accuracy based on responses\\nfrom\
    \ people who finished tasks in time and passed\\nattention checks. The average time spent is around\\n25 minutes and participants\
    \ are timed out by the\\nsystem if they spend more than 60 minutes in the\\nstudy, which can happen when they accidentally\\\
    nleave the study website tab open but forget to do\\nthe task.\\nC.2\\nLikert Rating Survey Details\\nWe provide summaries\
    \ of existing findings in De-\\nception Detection to annotators and ask them to\\nrate the hypotheses in terms of clarity,\
    \ novelty, and\\nplausibility. Each metric has five scales, which we\\ninclude in Table 7. In particular, we manually\
    \ se-\\nlect five representative hypotheses from the set of\\nhypotheses generated by the different methods. We\\nreport\
    \ the average human ratings in Table 4. The\\ninstructions can be found in figure Figure 2, and the\\ninterface for annotation\
    \ can be found in Figure 3.\\nC.3\\nNovelty and Nuance Study Details\\nFor the Novelty and Nuance Study, we present\\\
    nthe instructions for AIGC Detection in Figure 4.\\nWe showcase the interfaces for AIGC Detection in\\nFigure 5.\\nFor\
    \ both Deception Detection and AIGC Detec-\\ntion, the two hypothesis banks compared are gener-\\nated using LITERATURE-ONLY\
    \ and HYPOGENIC\\nrespectively.\\nWe recruit 10 participants each task and all par-\\nticpants passed attention the check\
    \ question.\\n\\nCriteria\\nTexts\\nClarity\\n1. Highly ambiguous (The hypothesis is presented in a highly ambiguous manner,\
    \ lacking clear\\ndefinition and leaving significant room for interpretation or confusion.)\\n2. Somewhat clear but vague\
    \ (The hypothesis is somewhat defined but suffers from vague terms\\nand insufficient detail, making it challenging to\
    \ grasp its meaning or how it could be tested.)\\n3. Moderately clear (The hypothesis is stated in a straightforward manner,\
    \ but lacks the depth or\\nspecificity needed to fully convey its nuances, assumptions, or boundaries.)\\n4. Clear and\
    \ precise (The hypothesis is clearly articulated with precise terminology and suffi-\\ncient detail, providing a solid\
    \ understanding of its assumptions and boundaries with minimal\\nambiguity.)\\n5. Exceptionally clear (The hypothesis\
    \ is exceptionally clear, concise, and specific, with every\\nterm and aspect well-defined, leaving no room for misinterpretation\
    \ and fully encapsulating its\\nassumptions, scope, and testability.)\\nNovelty\\n1. Not novel (The hypothesis has already\
    \ been shown, proven, or is widely known, closely\\nmirroring existing ideas without introducing any new perspectives.)\\\
    n2. Minimally novel (The hypothesis shows slight novelty, introducing minor variations or\\nnuances that build upon known\
    \ ideas but do not offer significant new insights.)\\n3. Moderately novel (The hypothesis demonstrates moderate novelty,\
    \ presenting some new\\nperspectives or angles that provide meaningful, but not groundbreaking, avenues for exploration.)\\\
    n4. Notably novel (The hypothesis is notably novel, offering unique nuances or perspectives that\\nare well-differentiated\
    \ from existing ideas, representing valuable and fresh contributions to the\\nfield.)\\n5. Highly novel (The hypothesis\
    \ is highly novel, introducing a pioneering perspective or idea\\nthat has not been previously explored, opening entirely\
    \ new directions for future research.)\\nPlausibility\\n1. Not plausible (The hypothesis does not make sense at all, lacking\
    \ logical or empirical\\ngrounding and failing to align with established knowledge or principles.)\\n2. Minimally plausible\
    \ (The hypothesis has significant plausibility challenges, making sense\\nin limited contexts but contradicting existing\
    \ evidence or lacking coherence with established\\ntheories.)\\n3. Moderately plausible (The hypothesis makes sense overall\
    \ and aligns with general principles\\nor existing knowledge but has notable gaps or uncertainties that raise questions\
    \ about its validity.)\\n4. Mostly plausible (The hypothesis is mostly plausible, grounded in logical reasoning and exist-\\\
    ning evidence, with only minor uncertainties or assumptions that could reasonably be addressed.)\\n5. Highly plausible\
    \ (The hypothesis is highly plausible, fully aligning with established knowledge\\nand logical reasoning, will likely\
    \ be supported in experiments or theoretical consistency, and\\nhighly likely to be true.)\\nTable 7: Criteria used for\
    \ human evaluation of the generated hypotheses.\\nC.4\\nIRB\\nWe received IRB exempt (and will provide study\\nnumber\
    \ in the non-anonymous version of the pa-\\nper). For both of the human studies, we present a\\ndetailed description of\
    \ the study, incentives, risks\\nand benefits, confidentiality, and contacts & ques-\\ntions in our consent form. The\
    \ study proceeds only\\nif the participant agrees to give consent.\\nD\\nAdditional Experiments\\nIn this section, we\
    \ include more analysis on the\\nrobustness of our hypothesis generation methods.\\nD.1\\nLlama-3.1-8B-Instruct Results\\\
    nIn Table 10, we show the performance of Llama-\\n3.1-8B-Instruct on the OOD and IND datasets for\\nall tasks. We show\
    \ that our approach with literature\\n+ data outperforms all other methods in 8 of the\\n10 total configurations. Across\
    \ the 10 configura-\\ntions, our method outperforms few-shot inference\\nby 15.27% on average, and it outperforms the\
    \ best\\nof literature-based methods and HYPOGENIC by\\n13.04% and 4.88%, respectively. This result fur-\\nther shows\
    \ the effectiveness of our approach and\\nprovides evidence that our method can be applied\\nwith smaller models, highlighting\
    \ its scalability\\nand reproducibility.\\nD.2\\nRobustness to Prompt Variations\\nSince our framework heavily relies\
    \ on LLMs, we\\nperform a robustness test of our hypothesis gen-\\neration method with different prompt variations.\\\
    nCompared with the original prompts, we consider\\nthree prompt variations: modifying the hypothe-\\nsis generation prompt\
    \ for MG, inference prompt\\n\\nFigure 2: Instruction page for likert rating.\\nfor MI, and both prompts. We show performance\\\
    nof all model and task configurations using these\\nprompt variations in Table 11 and Table 12 for\\nOOD and IND settings,\
    \ respectively. For the OOD\\ndatasets, the accuracy only decreases by 0.20% on\\naverage. For the 90 different configurations,\
    \ 71 of\\nthem have a performance drop of less than 5%, and\\n48 of them get an accuracy improvement. Addition-\\nally,\
    \ with the IND datasets, the average accuracy\\ngets an increase of 0.01%. 74 out of the 90 con-\\nfigurations have a\
    \ performance drop of less than\\n5%, where 50 of them get an improvement. These\\nadditional results further illustrate\
    \ the robustness\\nof our method against variations of prompts.\\nD.3\\nHyperparameter Search\\nAs introduced in \\u00a7\
    \ 2 and Appendix B.6, our hy-\\npothesis generation methods have some hyperpa-\\nrameters. Throughout all main experiments\
    \ in \\u00a7 4,\\nwe use the same set of hyperparameters, which is\\nadopted from HYPOGENIC. As we show in \\u00a7 4,\\\
    nthis default choice of hyperparameters works con-\\nsistently well across all different model and task\\nconfigurations,\
    \ highlighting the robustness of our\\nframework. Here we conduct an additional hyper-\\nparameter search of Hmax. We\
    \ show the results of\\nusing Hmax = 10, 20, 30 in Table 13 and Table 14,\\nfor the OOD and IND settings, respectively.\\\
    nFor the OOD datasets, changing Hmax\\n=\\n10, 20, 30 results in an average accuracy decrease\\nof only 0.07%. Out of\
    \ the 60 different configu-\\nrations, 51 of them get an accuracy drop of less\\nthan 5%, where 31 of them get an increase.\
    \ More-\\nover, with the IND datasets, different choices of\\nHmax = 10, 20, 30 degrades average accuracy by\\n0.23%.\
    \ In 51 out of 60 cases, we get a performance\\ndrop of less than 5%, and we get an improvement\\nfor 26 cases. These\
    \ results suggest that although\\nour default choice of hyperparameters may not be\\noptimal for all tasks, our method\
    \ is able to perform\\nconsistently well. This again highlights the robust-\\nness of our hypothesis generation framework\
    \ with\\ndifferent hyperparameters.\\nE\\nExamples of Generated Hypotheses\\nand Qualitative Analysis\\nE.1\\nComparing\
