    \ label.\\n3.2\\nTasks\\nWe consider four tasks in social sciences.\\nDeception Detection is a widely studied problem\\\
    nin psychology and other social sciences (Granhag\\nand Vrij, 2005). We use the dataset introduced by\\nOtt et al. (2013)\
