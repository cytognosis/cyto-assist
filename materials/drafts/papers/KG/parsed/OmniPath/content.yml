  abstract: 'Analysis and interpretation of omics data largely benefit from the use of prior kno wledge. Ho w e v er, this
    kno wledge is fragmented across

    resources and often is not directly accessible for analytical methods. We de v eloped OmniPath ( https:// omnipathdb.org/
    ), a database combining

    diverse molecular knowledge from 168 resources. It covers causal protein–protein, gene regulatory, microRNA, and enzyme–post-translational

    modification interactions, cell–cell communication, protein comple x es, and inf ormation about the function, localization,
    str uct ure, and many

    other aspects of biomolecules. It prioritizes literature curated data, and complements it with predictions and large scale
    databases. To enable

    interactiv e bro wsing of this large corpus of kno wledge, w e de v eloped OmniPath Explorer, which also includes a large
    language model agent

    that has direct access to the database. Python and R/Bioconductor client packages and a Cytoscape plugin create easy access
    to customized

    prior knowledge for omics analysis environments, such as scverse. OmniPath can be broadly used for the analysis of bulk,
    single-cell, and spatial

    multi-omics data, especially for mechanistic and causal modeling.

