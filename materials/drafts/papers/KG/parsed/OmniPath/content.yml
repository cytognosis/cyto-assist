  sections: "[\n  {\n    \"name\": \"D 653\",\n    \"text\": \"Gr aphical abstr act\"\n  },\n  {\n    \"name\": \"Introduction\"\
    ,\n    \"text\": \"Bulk, single-cell, and spatial omics technologies provide rich\\ninformation for understanding biological\
    \ processes, but inter-\\npreting molecular mechanisms and their deregulation in dis-\\nease remains a challenge. The\
    \ use of prior knowledge within\\nanalytical methods largely expands the extractable informa-\\ntion and broadens the\
    \ scope of testable hypotheses. In partic-\\nular, by estimating the activity [ 1 ] of key processes using prior\\nknowledge\
    \ of signatures\\u2014pathway [ 2 ], transcription factor\\n(TF) [ 2 , 3 ], kinase [ 5 ], receptor [ 6 ], or ligand\\\
    u2013receptor [ 7 ]\\nactivities\\u2014the biological interpretability is greatly enhanced\\nand potential causal drivers\
    \ can be more easily identified,\\nwhile the dimensionality of the data is reduced, increasing the\\nstatistical power\
    \ [ 8 ]. Furthermore, the integrated outcome of\\nthese estimations can be connected by a variety of network in-\\nference\
    \ methods [ 9 , 10 ] to derive context-specific mechanisms.\\nDatabases of prior knowledge have therefore become essential\\\
    nresources for omics data analysis.\\nMaking prior knowledge available for analysis pipelines is\\na challenge on its\
    \ own: it is scattered across many databases\\nand it is not clear which ones are the best suited for the appli-\\ncation\
    \ at hand. Furthermore, each requires different and of-\\nten significant effort to input into the tools. Excellent origi-\\\
    nnal [ 11 \\u201314 ] and combined [ 15 ] databases exist, each with a\\ndifferent focus. Nevertheless these are often\
    \ limited by var-\\nious caveats, such as lack of domain knowledge, coverage\\nrequired by analysis workflows, in particular\
    \ literature cu-\\nrated, as well as causal interactions, and ease of integration\\nto analysis tools. This challenge\
    \ prompted us to develop Om-\\nniPath, a database combining a growing number of diverse,\\ncurated and complementary resources.\
    \ When first published\\n[ 16 ], it only covered causal signaling interactions, and over\\nthe years it expanded to include\
    \ TF\\u2013target (regulons) and\\nenzyme\\u2013post-translational modification (PTM) relationships,\\nmolecular function\
    \ and localization, intercellular communi-\\ncation, protein complexes, and various other types of molecu-\\nlar knowledge,\
    \ as described in a subsequent publication [ 17 ].\\nSince then, we included 65 new resources, developed an in-\\nteractive\
    \ web page, extended the features of the web API (in-\\ncluding provenance details and license support), implemented\\\
    na higher performance server and added numerous convenient\\nutilities to the Python and R client packages (e.g. identi-\\\
    nfier and orthology translation). Here we present these nov-\\nelties and briefly outline our ongoing and future development\\\
    nplans.\\nData content\\nOmniPath consists of five major database domains: interac-\\ntions, enzyme\\u2013substrate, complexes,\
    \ annotations , and inter-\\ncellular (Fig. 1 A). These domains are integrated databases\\nthat we build by combining\
    \ source databases\\u2014what we re-\\nfer to as resources (for a complete list of resources, see\"\n  },\n  {\n    \"\
    name\": \"Supplementary Table S1 ); while within the domains we also\",\n    \"text\": \"define application-specific subsets\
    \ of resources, which we call\\ndatasets. Licensing conditions are included for each resource,\\nwith the majority of\
    \ them being available for commercial use\\n(Fig. 1 B\\u2013C and Supplementary Table S1 ). We also classified\\nresources\
    \ by their maintenance status, i.e. updates happen-\\ning frequently, infrequently or never. Strikingly, the majority\\\
    nof interaction resources and literature references come from\\ndatabases which have been published only once without\
    \ sub-\\nsequent updates (Fig. 1 B\\u2013D and Supplementary Table S1 ).\\nIn the integrated database multiple resources\
    \ supporting the\\nsame record suggest a higher confidence, while combining the\\nunique content from each resource increases\
    \ the coverage. In\\nthe interactions domain only 22% of the records are unique\\nto a single resource, while in the complexes\
    \ domain > 60%,\\nlargely due to a lack of agreement between complex predic-\\ntion methods (Fig. 1 E).\\nThe interactions\
    \ domain contains 1419 006 unique molec-\\nular interactions from 115 different resources: it covers signal-\\ning, gene\
    \ regulatory (TF\\u2013target gene), microRNA (miRNA)\\u2013\\ngene, and a limited set of drug\\u2013target interactions.\
    \ Within\\nthese interaction types, various datasets are available: the\\ncore omnipath dataset contains literature-curated,\
    \ causal\\nprotein\\u2013protein interactions (PPIs), while further interactions\\nwithout literature references are provided\
    \ in separate datasets:\\npathwayextr a (causal) , kinaseextr a (kinase\\u2013substrate), and li-\\ngrecextra (ligand\\\
    u2013receptor). The largest sources of curated\\ncausal signaling interactions are the SIGNOR [ 11 ], SignaLink\\n[ 18\
    \ ], and SPIKE [ 19 ] databases (Fig. 1 A). Within TF reg-\\nulons, the tf_target dataset contains literature-curated\
    \ TF\\u2013\\ntarget interactions, while collectri and dorothea datasets rep-\\nresent comprehensive gene regulatory networks\
    \ from Collec-\\nTRI [ 3 ] and DoRothEA [ 4 ], respectively, compiled from sev-\\neral curated, high-throughput and predicted\
    \ sources. Each in-\\nteraction includes information about its direction and whether\\nit has a stimulatory or inhibitory\
    \ effect. Hereafter, we refer to\\nthis information as \\u201ccausality\\u201d, as they are direct, physical in-\\nteractions\
    \ with known biochemical background, though we\\nnote that it reflects only putative causal effects.\\nDownloaded from\
    \ https://academic.oup.com/nar/article/54/D1/D652/8326458 by guest on 04 March 2026\"\n  },\n  {\n    \"name\": \"D 654\"\
    ,\n    \"text\": \"T\\u00fcrei et al.\\nFigure 1. Data content of OmniPath. ( A ) Resource distribution across database\
    \ categories\\u2014Treemap showing relative sizes of individual resources\\nwithin their database domain and subcategory.\
    \ The size of each cell is proportional to the number of records. ( B ) Number of resources in each database\\ndomain,\
    \ by maintenance and license categories. ( C ) Percentage of records by database domain and by maintenance and license\
    \ category. ( D ) Literature\\nreference count by database and maintenance status. ( E ) Resource overlap within the databases:\
    \ percentage of entries appearing in 1, 2, 3, 4, or 5 +\\nresources. Interactive versions of these visualizations are\
    \ available at https:// explore.omnipathdb.org / .\\nThe enzyme\\u2013substrate domain is a collection of 115 215\\nenzyme\\\
    u2013PTM interactions from 18 resources. Each record de-\\nscribes the residue, site, and type of modification, most pre-\\\
    ndominantly phosphorylation, followed by dephosphorylation\\nand acetylation. PhosphoSitePlus [ 20 ] contributes the major-\\\
    nity of curated evidence, complemented by further curated and\\nprediction-based resources.\\nThe complexes database enumerates\
    \ 52 086 human pro-\\ntein complexes, integrating 18 resources, annotated with sto-\\nichiometry and literature references.\
    \ CORUM [ 21 ] and Com-\\nplex Portal [ 22 ] are the primary sources of curated complexes,\\naccompanied by several smaller\
    \ or prediction-based resources.\\nThe largest database domain in OmniPath is the annota-\\ntions with its 5895 462 entries,\
    \ providing a broad variety\\nDownloaded from https://academic.oup.com/nar/article/54/D1/D652/8326458 by guest on 04 March\
    \ 2026\\n\\nOmniPath: integrated knowledgebase for multi-omics analysis\"\n  },\n  {\n    \"name\": \"D 655\",\n    \"\
    text\": \"of protein and gene function, localization, structure, and ex-\\npression information. This includes pathway\
    \ memberships,\\nroles in biological processes and diseases, for example, the\\nfunctional gene sets from MSigDB [ 23\
    \ ]; various classifica-\\ntions, such as the protein families from HGNC [ 24 ]; protein\\nlocalizations\\u2014for example,\
    \ CSPA [ 25 ] to annotate cell sur-\\nface proteins; and weighted functional signatures, such as the\\npathway response\
    \ scores from PROGENy [ 2 ] or cytokine re-\\nsponses from CytoSig [ 26 ]. The data extracted from the 67\\nresources\
    \ ( Supplementary Table S1 ) is provided as it is, with-\\nout integration across resources.\\nThe intercell domain integrates\
    \ annotation resources into\\na curated atlas of cell\\u2013cell communication. Using the func-\\ntion, localization and\
    \ structure annotations described above,\\nit classifies proteins into categories such as ligand, receptor,\\ntransporter,\
    \ matrix protein, or secreted enzyme, and tags them\\nwith membrane associations and subcellular localization [ 17 ].\\\
    nIn the R and Python clients, these annotations can be merged\\nwith molecular interactions, enabling application-specific\
    \ cus-\\ntomization, for example, by establishing tissue-specific ligand\\u2013\\nreceptor networks [ 27 ].\\nThe interactions\
    \ and enzyme\\u2013substrate database domains,\\nbuilt with human data, are translated to mouse and rat by or-\\nthologous\
    \ gene pairs. For this translation, we used NCBI Ho-\\nmoloGene [ 28 ], Ensembl [ 29 ], and the Orthologous Matrix\\n(OMA;\
    \ 9). Our translation utilities are available in the py-\\npath and OmnipathR packages, allowing translation to other\\\
    norganisms.\\nWeb page\\nWith the current update, we introduce OmniPath Explorer, an\\ninteractive web application ( https://\
    \ explore.omnipathdb.org/ )\\nto access the OmniPath resource. OmniPath Explorer consists\\nof browsable pages of database\
    \ content and a chat assistant\\n(Fig. 2 A\\u2013C).\\nThe first allows users to search for protein and gene names\\nand\
    \ explore the data through an easy-to-use but comprehen-\\nsive graphical interface. Contents of the five database do-\\\
    nmains are presented in five different views. The left side con-\\ntrol panel enables filtering by a broad range of variables,\\\
    nfor example, type, causality, amount of evidence for interac-\\ntions (Fig. 2 A), or location, scope and causality for\
    \ intercell.\\nIn the interactions part, all partners of a given molecule ap-\\npear as a list, with the interaction type\
    \ and causality encoded\\nby colors and symbols. The provenances are also included\\nfor each interaction, with links\
    \ to the original databases\\nand articles in PubMed. The annotations part groups the re-\\nsources by topic, and presents\
    \ data from the selected ones\\nin tabular format. Alternatively, free text search in annota-\\ntion records is also available\
    \ (Fig. 2 B). In all views, proteins\\nof interest are presented at the top, with a basic overview\\nfrom UniProt [ 31\
    \ ]: the organism, molecular weight, polypep-\\ntide length, and literature statements about the functions,\\nlocalization,\
    \ function, classification, Gene Ontology, PTM\\ninformation, and links to PubMed and further resources\\n(Fig. 2 D).\\\
    nThe chat part integrates an LLM assistant that accepts nat-\\nural language questions, writes and executes SQL queries,\
    \ and\\ninterprets the results to provide answers. The generated SQL\\nqueries and their output are shown alongside the\
    \ answers,\\nthese can be checked for correctness, edited, and exported as\\ntables (Fig. 2 C). The LLM is provided with\
    \ an expanding set of\\nquery templates which guide it to formulate queries. This en-\\nables noncomputational users to\
    \ explore the database content\\nand flexibly access and integrate data across multiple tables or\\nresources.\\nWeb API\\\
    nThe web service serves data in tabular or JSON format, and\\nconsists of five main endpoints (query types), corresponding\\\
    nto the five database domains of OmniPath. It supports the fil-\\ntering of records by practically any of the variables:\
    \ by re-\\nsources, molecules, organisms, and other variables specific for\\nthe database domains, for example, filter\
    \ TF regulons accord-\\ning to specific confidence levels [ 4 ], or PTM residues at the\\nenzyme\\u2013substrate domain,\
    \ or cell\\u2013cell communication roles at\\nthe intercell domain. Optional columns can be selected by the\\nfields parameter.\
    \ Annotations are returned as a long-format\\ndata frame and require pivoting into wide format, which is\\nsupported by\
    \ the client packages.\\nWe recently added two new columns to the interaction\\nrecords, both containing JSON blobs. The\
    \ extra_attrs column\\nincludes resource-specific interaction attributes, such as the\\nmechanism or detection method\
    \ of the interaction. The client\\npackages are able to extract specific variables from the JSON\\nblob to data frame\
    \ columns. The evidences column contains\\nthe provenance information in full detail. This enables the\\nclient packages\
    \ to do precise filtering, for example, discard-\\ning all information that is not licensed for commercial use.\\nLicense-based\
    \ filtering is also supported by the web API\\u2019s li-\\ncense parameter.\\nCausality of interactions is represented\
    \ by three columns\\n(is_directed, is_stimulation, is_inhibition) ; in addition, \\u201ccon-\\nsensus\\u201d alternatives\
    \ of these columns provide a majority vote\\nacross all resources.\\nThe web service also features a few auxiliary queries\
    \ that\\nprovide meta-information about the contents. The databases\\nand datasets queries return the list of resources\
    \ and datasets\\nin the interactions domain, the queries query returns the list\\nof valid parameters for each query,\
    \ while the resources query\\nmaps the use of resources within the databases, and also in-\\ncludes license information.\
    \ The annotations_summary and in-\\ntercell_summary queries, for each resource, list all variables\\nand all possible\
    \ values.\\nPython, R, and Cytoscape clients\\nThe omnipath Python package is available in the PyPI\\nrepository ( https://\
    \ pypi.org/ project/ omnipath/ ), while the\\nOmnipathR R package ( https:// bioconductor.org/ packages/\\nOmnipathR )\
    \ is part of Bioconductor [ 33 ]. Query types, inter-\\naction types and interaction datasets are represented in the\\\
    nPython package by classes, in the R package by functions. All\\nweb service query parameters can be provided as arguments\\\
    nto the \\u201cget\\u201d method of the Python classes and similarly to\\nthe functions in the R package. The results\
    \ are returned as\\ndata frames. Both packages provide utilities to pivot the\\nannotation data frames from long to wide\
    \ format, combine\\nnetworks and annotations, translate data to other organisms\\nby orthologous gene pairs, and update\
    \ the causality of inter-\\nactions based on detailed provenance data in the evidences\\ncolumn.\\nDownloaded from https://academic.oup.com/nar/article/54/D1/D652/8326458\
    \ by guest on 04 March 2026\"\n  },\n  {\n    \"name\": \"D 656\",\n    \"text\": \"T\\u00fcrei et al.\\n(A)\\n(C)\\n(D)\\\
    n(B)\\nFigure 2. The OmniPath Explorer web application. ( A ) Interaction browser. ( B ) Annotation browser. ( C ) Chat\
    \ interface to the OmniPath large language\\nmodel (LLM) agent. ( D ) Main page search and menu; protein datasheet.\\\
    nBesides the OmniPath client functionalities, OmnipathR\\nprovides direct access to 26 resources ( Supplementary Table\\\
    nS1 ), among them several metabolomics related ones, such\\nas MetalinksDB [ 34 ], a network of annotated metabolite-\\\
    nprotein interactions combining 14 resources, or RaMP-\\nDB [ 35 ], a comprehensive resource of metabolite identi-\\nfiers\
    \ and structures. OmnipathR also comes with a prior\\nknowledge processing toolkit, including translation utilities\\\
    nfor 102 identifier types, orthologous gene pair translation\\n(by HomoloGene, Ensembl [ 29 ], and OMA [ 30 ]), transla-\\\
    ntion ambiguity analysis, handling of organism names, traver-\\nsal of the Gene Ontology [ 36 ] tree, full featured clients\\\
    nto the Ensembl BioMart [ 29 ], KEGG [ 37 ], and UniProt\\n[ 32 ] APIs. It is able to convert interaction data frames\
    \ to\\nigraph [ 38 ] networks or deliver them to Bio Model Analyzer\\n[ 39 ].\\nDownloaded from https://academic.oup.com/nar/article/54/D1/D652/8326458\
    \ by guest on 04 March 2026\\n\\nOmniPath: integrated knowledgebase for multi-omics analysis\"\n  },\n  {\n    \"name\"\
    : \"D 657\",\n    \"text\": \"Figure 3. Technical architecture of OmniPath. The combined database, built from 168 different\
    \ resources by the pypath Python software suite, is publicly\\na v ailable through the HTTP API at https:// omnnipathdb.org/\
    \ . The OmniPath Explorer web app allows interactive browsing with LLM assistance, while\\nclient packages for R, Python,\
    \ and Cytoscape provide convenient access and utilities for seamless integration into analysis workflows. The components\\\
    nnew or largely renewed in the current update are highlighted in orange boxes and marked with orange stars.\\nThe OmniPath\
    \ Cytoscape app [ 40 ] supports the interac-\\ntions, enzyme\\u2013substrate, and a limited set of the annotations\\ndatabase\
    \ domains. It imports the data directly into Cytoscape\\nfrom the datasets and resources specified by the user.\\nImplementation\\\
    nThe database build and the web API of OmniPath are im-\\nplemented in a suite of Python packages (Fig. 3 ). The py-\\\
    npath package is responsible for resource-specific parsing and\\ncompiling the combined databases. It features a number\
    \ of\\nprocessing utilities, most importantly, the identifier and or-\\nthologous gene pair translation. The pypath.inputs\
    \ module\\nis a collection of clients for 200 original resources. These\\nclients use the download-manager and cache-manager\
    \ pack-\\nages for robust network transactions and local caching.\\nThe pypath.core module builds the OmniPath databases.\
    \ All\\nclients and the complete database build are tested daily by an\\nautomated pipeline and a status report is published\
    \ at https:\\n// status.omnipathdb.org/ . For original resources that became\\ntemporarily or permanently inaccessible,\
    \ we host these on\\nour own server at https:// rescued.omnipathdb.org/ . Another\\nPython package, the omnipath-server\
    \ loads the databases into\\nPostgreSQL and operates the web service. OmniPath Ex-\\nplorer is a TypeScript application\
    \ built with the Next.js frame-\\nwork, and uses the same PostgreSQL database as the web API\\n(Fig. 3 ). The database\
    \ is updated periodically, with the old\\nversions archived at https:// archive.omnipathdb.org/ . By de-\\nfault, the\
    \ LLM agent uses the openly-accessible Google Gem-\\nini Flash 2.5 model.\"\n  },\n  {\n    \"name\": \"Discussion\",\n\
    \    \"text\": \"OmniPath is an integrated database combining 168 molecular\\nresources into a single, continuously updated\
    \ framework, in-\\ncluding signed and directed PPIs, enzyme\\u2013PTM relationships,\\nligand\\u2013receptor pairs, protein\
    \ complexes, and extensive func-\\ntional annotations. By harmonizing data from all these diverse\\nresources, OmniPath\
    \ facilitates access to prior-knowledge for\\na broad range of use cases. The OmniPath Explorer presents\\nall evidence\
    \ for molecular interactions and comprehensive an-\\nnotations in one place. This allows users to explore interac-\\ntively\
    \ the complete knowledgebase and quickly look up spe-\\ncific information and find the most suitable resources for their\\\
    nanalysis. The web API and its clients for popular bioinfor-\\nmatics environments (Python, R, Cytoscape) enable effort-\\\
    nless creation of customized prior knowledge for diverse ap-\\nplications. With its coverage of small and curated resources,\\\
    nOmniPath also fills a critical gap among other large meta-\\nresources, such as STRING [ 13 ] or PathwayCommons [ 15\
    \ ],\\nand major interaction or pathway databases with original cu-\\nration effort, like IntAct [ 12 ] or Reactome [\
    \ 14 ]. The heteroge-\\nneous curation protocols and quality of constituting resources\\ncan be seen as a potential weakness\
    \ of OmniPath as an inte-\\ngrated database; however, alternatives\\u2014literature mined net-\\nworks [ 41 ], high-throughput\
    \ screens [ 12 ], correlation-based\\nDownloaded from https://academic.oup.com/nar/article/54/D1/D652/8326458 by guest\
    \ on 04 March 2026\"\n  },\n  {\n    \"name\": \"D 658\",\n    \"text\": \"T\\u00fcrei et al.\\napproaches [ 13 ]\\u2014come\
    \ with their own limitations, while an\\nintegrated database creates new opportunities to search for\\npotentially erroneous\
    \ records, and also to compile on demand\\nany custom combination of the resources.\\nIntegrating a multitude of resources\
    \ in a uniform format\\nopens the way towards their benchmarking, as it is done,\\nfor example, in NetworkCommons [ 10\
    \ ] to evaluate the per-\\nformance of network inference methods. Including various\\ninteraction types\\u2014signaling\
    \ pathways, transcriptional, and\\nmiRNA regulation, ligand\\u2013receptor, etc\\u2014in a uniform net-\\nwork, together\
    \ with the annotations and the above mentioned\\ninference methods, enables the generation and investigation\\nof complex,\
    \ multilayered hypotheses that would be limitedly\\npossible with other resources.\\nThe integrative design of OmniPath\
    \ translates into prac-\\ntical impact across diverse tasks in the analysis of omics\\ndata. The client packages feature\
    \ integrations with several\\ndownstream analysis tools. For example, integration with\\nthe enrichment package Decoupler\
    \ [ 1 ] enables seamless use\\nof signature-based TF, pathway, kinase, and cytokine activ-\\nity estimations in bulk and\
    \ single-cell workflows, including\\nwithin scverse [ 42 ], as well as automated cell type anno-\\ntations using PanglaoDB\
    \ [ 43 ]. Similarly, OmniPath delivers\\nhighly customizable ligand\\u2013receptor networks directly into\\nthe LIANA\
    \ + [ 7 ] cell\\u2013cell communication inference frame-\\nwork, also part of the scverse ecosystem. Networks from Om-\\\
    nniPath are readily available in the CORNETO [ 44 ] network\\noptimization framework, its multi-omics causal variant COS-\\\
    nMOS [ 45 ], and further network inference methods in Net-\\nworkCommons [ 10 ], to derive context-specific mechanisms\\\
    nfrom omics data. For metabolism, OmniPath not only deliv-\\ners prior knowledge in the MetaProViz R package [ 46 ], but\\\
    nalso enables connecting knowledge and metabolomics fea-\\ntures with its extensive identifier translation utilities.\
    \ Omni-\\nPath is also connected to other prior-knowledge processing\\nsystems: the curated knowledge from OmniPath is\
    \ presented\\nin the INDRA natural language processing system for molec-\\nular interactions [ 41 ]; a script is available\
    \ to write OmniPath\\ninteractions into neo4j importable CSV using the BioCypher\\nlibrary [ 47 ]; while OmniPath\\u2019s\
    \ prior-knowledge processing\\ntoolkit is used in building the CROssBARv2 database [ 48 ].\\nThe server-client architecture\
    \ isolates resource-specific\\ndownload and processing from analysis workflows, for a re-\\nduced complexity and enhanced\
    \ robustness. Built-in support\\nfor resource license constraints facilitates applications in com-\\nmercial settings\
    \ by keeping compliance straightforward. Om-\\nniPath Explorer\\u2019s LLM agent turns text-based questions into\\nSQL\
    \ queries. This user-friendly mode of operation assists both\\nnew and advanced users to design database queries, while\
    \ di-\\nrectly answering natural language questions for noncompu-\\ntational users. We are integrating OmniPath into BioContex-\\\
    ntAI, a collection of biomedical LLM agents [ 49 ], to facilitate\\nintegration with LLMs via the model context protocol.\
    \ We\\nconsider the current implementation to be only a first step to-\\nwards LLM assistance. Through an improved integration\
    \ with\\nthe knowledge contained in OmniPath, and access to addi-\\ntional computational tools, our LLM agent may evolve\
    \ to an-\\nswer more complex questions and contribute to larger tasks\\ntogether with other LLMs. We aim to iterate on\
    \ our imple-\\nmentation by continuously learning about its current utility\\nand limitations from user feedback.\\nIn\
    \ our future work, we also plan covering more metabolite,\\ndrug, and microbiome-related knowledge, with special focus\\\
    non causal relationships and functional annotations. We intend\\nto further develop OmniPath Explorer with more views,\
    \ richer\\ninteractivity, and information presented in each view. In the\\nPython client side, we have plans to further\
    \ improve the in-\\ntegration with network inference methods in NetworkCom-\\nmons and single-cell workflows of the scverse\
    \ ecosystem.\\nWe remain committed to developing OmniPath as a free\\nopen-source resource for the community, particularly\
    \ for re-\\nsearchers analyzing omics data. We welcome feedback, con-\\ntent suggestions, feature requests, and bug reports,\
    \ which can\\nbe submitted via GitHub ( https:// github.com/ saezlab ) or email\\n( omnipathdb@gmail.com ).\"\n  },\n\
