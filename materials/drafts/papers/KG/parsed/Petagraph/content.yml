    \ scripts to prepare datasets ingested into Petagraph. All scripts can be found under\\nhttps://github.com/TaylorResearchLab/Petagraph/tree/main/Scientific_Data_2024/code/preprocessing/.\\\
    n\\n8\\nScientific Data |         (2024) 11:1338  | https://doi.org/10.1038/s41597-024-04070-w\\nwww.nature.com/scientificdata\\\
    nwww.nature.com/scientificdata/\\nthrough the has_signature_gene and reverse as inverse_has_signature_gene edge types.\
    \ The\\nMSIGDB Term names were also compiled according to the MSigDB generic entity names. Collectively, MSigDB\\nadds\
    \ 2,598,060 Concept-to-Concept direct and inverse relationships to Petagraph. Details on MSigDB relation-\\nships types\
    \ connecting the Concept nodes are found in Table 7. Preprocessing scripts for MSIGDB relationships\\nare deposited in\
    \ GitHub (Table 9).\\nHuman-to-rat ENSEMBL mappings (RATHCOP).\\u2003 The source of the human-to-rat ENSEMBL40 ortholog\
    \ map-\\npings was from the HGNC Comparisons of Orthology Predictions tool (HCOP)32 (https://www.genenames.org/\\ntools/hcop/)\
    \ downloaded on 2023-11-16.\\nSupporting genomics data sets.\\nSummary details for each mapping and quantitative dataset\
    \ are featured\\nin Tables 3, 4.\\n4D Nucleome program (4DN).\\u2003 We obtained 21 loop files (Table 8) stored in dot\
    \ call format from the 4D nucle-\\nome project41 website (https://www.4dnucleome.org) on 2023-01-05. The loop files were\
    \ further processed for\\ningestion by first creating dataset nodes (SAB: 4DND) with the respective terms containing the\
    \ dataset infor-\\nmation (assay type, lab and cell type involved), file nodes (SAB: 4DNF). The respective terms containing\
    \ the file\\ninformation, loop nodes (SAB: 4DNL) were attached to HSCLO38 nodes at 1kpb resolution level corresponding\\\
    nto upstream start and end and downstream start and end nodes of the characteristic anchor of the loop and\\nq-value nodes\
    \ (SAB: 4DNQ) corresponding to donut q-value of the loops. Preprocessing scripts to format the\\nloop and q-value data\
    \ were deposited in GitHub (Table 9).\\nSingle cell fetal heart data (ASP2019).\\u2003 This dataset includes single cell\
    \ RNA-seq data from human fetal\\nheart tissue as described in Asp et al.42. The data was downloaded on 2021-08-10 (https://www.spatialresearch.\\\
    norg/resources-published-datasets/doi-10-1016-j-cell-2019-11-025/) The average gene expression of each\\nauthor-supplied\
    \ cell type cluster was calculated and used to represent each gene within the cluster with a pre-\\nprocessing script\
    \ (Table 9). Single cell fetal heart Concept nodes were created and connections to cell type nodes\\nfrom the Cell Ontology\
    \ (CL) and HGNC nodes connections were made. There were cell types defined in the Asp\\net al. paper that do not currently\
    \ exist in the CL. We created our own cell type Concept nodes for these cell types\\nwith an SAB of ASP2019CLUSTER. The\
    \ Single cell heart Code nodes have an SAB of ASP2019.\\nClinVar (CLINVAR).\\u2003 The ClinVar43 human genetic variants-phenotype\
    \ submission summary dataset was\\nutilized to define relationships between human genes and phenotypes and was downloaded\
    \ on (2023-01-05)\\nfrom the FTP site (https://ftp.ncbi.nlm.nih.gov/pub/clinvar/tab_delimited/variant_summary.txt.gz)\
    \ and pre-\\nprocessed to create edge files (Table 9). As a preprocessing step, we imported only genes with single nucle-\\\
    notide variants (SNVs) annotated as pathogenic, likely pathogenic and pathogenic/likely pathogenic variants.\\nDiseases\
    \ and phenotypes included from ClinVar were sourced from MEDGEN44, MONDO45, HPO33, EFO46\\nand MESH47. Diseases and phenotypes\
    \ were linked to genes with the 'gene_associated_with_dis-\\nease_or_phenotype' edge type and reverse as 'inverse_gene_associated_with_disease_\\\
    nor_phenotype.' As a result, ClinVar represents 214,040 relationships (including reverse) connecting genes\\nto diseases\
    \ and/or phenotypes, thus connecting HGNC and MEDGEN, MONDO, HPO, EFO, and MSH Concept\\nnodes. Preprocessing scripts\
    \ for CLINVAR relationships were deposited in GitHub (Table 9).\\nConnectivity MAP (CMAP).\\u2003 We obtained the edge\
    \ lists of the CMAP Signatures of Differentially Expressed\\nGenes for Small Molecules dataset from the Harmonizome database\
    \ (https://maayanlab.cloud/Harmonizome/\\ndataset/CMAP+Signatures+of+Differentially+Expressed+Genes+for+Small+Molecules)48,49.\
    \ These edge\\nlists combine chemical data from CHEBI50 with HGNC gene IDs. The dataset features genes from microarray\\\
    ngene expression molecular signatures that were responsive to a chemical perturbation introduced to selected\\nhuman cell\
    \ lines. CHEBI and HGNC connectors in CMAP have edge types 'positively_correlated_\\nwith_gene' and 'negatively_correlated_with_gene'\
    \ plus their inverses. The dataset added\\n2,625,336 relationships (including reverse). Preprocessing scripts for CMAP\
    \ relationships were deposited in\\nGitHub (Table 9).\\nGTEx, Expression and eQTL data (GTEXEXP and GTEXEQTL).\\u2003\
    \ Human gene expression per tissue data\\nwas obtained from Genotype-Tissue Expression (GTEx) Portal (Version 8) (https://gtexportal.org/home/\\\
    ndatasets) on 2023-04-10. We preprocessed the gene expression dataset (GTEx_Analysis_2017-06-05_v8_\\nRNASeQCv1.1.9_gene_median_tpm),\
    \ as well as the expression quantitative trait loci (eQTL) dataset (GTEx_\\nAnalysis_v8_eQTL) (Table 9). The gene expression\
