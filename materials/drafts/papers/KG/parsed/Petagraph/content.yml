    \ we put all data into the nodes and edge file\\nformats as described.\\nStep 3: Convert nodes and edges files into UBKG\
    \ CSV format.\\u2003 The UBKG generation framework converts the\\ncontent of a collection of edge and node files into\
    \ a set of ontology CSV files. The ontology CSV files represent\\nthe entities, relationships, and metadata that will\
    \ be in the UBKG. The ontology CSV files conform to the format\\nrecognized by the neo4j-admin import utility67. Importing\
