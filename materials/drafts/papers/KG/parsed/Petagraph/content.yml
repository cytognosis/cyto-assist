    nTable 1.\\u2002 Summary of checks and analyses performed during the ingestion of new data into UBKG: information\\nassessed,\
    \ their purpose, and comments on potential actions.\\n\\n3\\nScientific Data |         (2024) 11:1338  | https://doi.org/10.1038/s41597-024-04070-w\\\
    nwww.nature.com/scientificdata\\nwww.nature.com/scientificdata/\\nincorporation enables any user to add and/or subset\
    \ data on top of Petagraph\\u2019s omics-rich data structure for\\ntheir particular use case. Petagraph is therefore distinguished\
    \ by its generalizable schema and richly annotated\\nstructure, which will allow for the subsetting of highly integrated\
    \ omics data for a myriad of use cases.\\nIn choosing datasets for Petagraph, we prioritized the integration of interpreted\
    \ knowledge over raw experi-\\nmental data. The genomic and related datasets within Petagraph have been curated, harmonized,\
    \ and interpreted\\nthrough thousands of hours of expert effort, ensuring that users have access to high-quality data\
    \ for their queries\\nand thus increasing the likelihood of generating meaningful insights. We show that queries on Petagraph\
    \ can, in\\nfact, rapidly return meaningful results for a diverse set of example use cases, including those for annotation\
    \ and\\nanalysis. The integration of large datasets into Petagraph has the potential to advance how biomedical and bio-\\\
    nmolecular data is mined and analyzed. By harmonizing diverse data types, including genomics, transcriptomics,\\nproteomics,\
    \ and clinical data, Petagraph supports system-wide approaches to analysis.\\nUse cases for Petagraph include but are\
    \ not limited to identifying genomic features functionally linked to\\ngenes or diseases, linking across genetics data\
    \ between human and animal models, linking transcriptional per-\\nturbations by compound in tissues of interest, or identifying\
    \ cell types from single-cell data that are most asso-\\nciated with diseases or genes. Analytical use cases for Petagraph\\\
    u2019s data collection include applying machine\\nlearning methods or topological analyses to predict relationships such\
    \ as link prediction, or predicting new\\nproperties on biomedical data types, such as node property prediction.\\nThe\
    \ scalable and modular design of Petagraph allows for continuous incorporation of new datasets.\\nPetagraph\\u2019s mature\
    \ architecture is designed to be extended easily by users wishing to build their own custom\\nknowledge graph. Utilizing\
    \ the Unified Biomedical Knowledge Graph (UBKG) ingestion protocols, Petagraph\\nusers can easily integrate additional\
    \ data sources, whether they are publicly available or proprietary. This modu-\\nlarity ensures that researchers can curate\
    \ the knowledge graph to include specific builds relevant to their unique\\napplications. The node and edge CSV files\
    \ that are used to construct Petagraph are 12.5 GB in size and can be\\nused to reconstruct the database or can be used\
    \ with our instructions to expand or change the knowledge graph\\nwith the UBKG as the base scaffold. We provide a 4.5\\\
    u2009GB database dump of Petagraph that can be installed on\\nlocal laptops with at least 16\\u2009GB of memory. Petagraph\
    \ is currently being utilized as a base module by the NIH\\nCommon Fund Data Ecosystem (CFDE) Data Distillery Project\
    \ to integrate Common Fund omics data from\\ntwelve data coordination centers25.\\nFuture work will focus on expanding\
    \ Petagraph\\u2019s capabilities, enhancing automated validation techniques,\\nand developing standardized benchmarks\
    \ for knowledge graph comparisons. Another emerging and important\\nresearch area is in the integration of knowledge graphs\
    \ with Large Language Models (LLMs) to enhance biomed-\\nical data analysis. Curated knowledge graphs like Petagraph provide\
    \ a curated source of structured knowledge\\nthat can improve LLMs\\u2019 understanding and generation of biomedical knowledge.\
    \ LLMs can use Petagraph to\\ngenerate more accurate and contextually relevant responses to complex biomedical queries,\
    \ with many potential\\napplications in personalized medicine, drug discovery, and clinical outcome prediction.\\nIn conclusion,\
    \ Petagraph represents a significant advancement in the integration and analysis of multi-omics\\nand biomedical data.\
    \ Its robust framework, extensive dataset integration, and advanced analytical capabilities\\nposition it as a valuable\
    \ resource for the biomedical research community, enabling new discoveries and fostering\\na deeper understanding of complex\
