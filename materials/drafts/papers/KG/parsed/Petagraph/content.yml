    \ converge. For example\\nthe Concept node for Type 2 diabetes (T2D) may have many different definitions and codings across\
    \ multiple\\nsystems such as ICD10, MONDO, HPO, or SNOMED that can all link to one Concept node for T2D. Each\\nsystem\
