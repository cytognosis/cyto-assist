    \ consumers of the UBKG must have a UMLS license83.\\nThe UBKG\\u2019s Neo4j database, which contains licensed UMLS content,\
    \ should not be stored in public repositories.\\nSoftware Versions: We used Neo4j Desktop 1.5.7 for general development,\
    \ analyses, and prototyping for the\\nanalyses in this paper. We used Neo4j 5.14 for server-side hosting of Petagraph\
