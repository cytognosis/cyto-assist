    \ of the UBKG.\\nThe UBKG generation framework builds a set of ontology CSV files iteratively, starting with an initial\
    \ set of\\nCSV files extracted from a release of the UMLS. The framework extends the content from the UMLS with that\\\
    nfrom another data source by appending to the ontology CSVs data that it extracts from files in UBKG Edge Node\\nformat.\\\
    nFig. 3\\u2002 Dataset connectivity. Querying across datasets in Petagraph requires connecting relationships. A\\nhallmark\
