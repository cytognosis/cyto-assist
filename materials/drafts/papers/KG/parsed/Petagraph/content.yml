    \ used the Neo4j bulk import\\ntool (neo4j-admin database import) to build the graph on the Neo4j Desktop platform using\
    \ Neo4j v5.\\nSchema structure.\\nPetagraph\\u2019s data records arise from a heterogeneous collection of datasets that\
    \ each have\\ntheir own schema representing the underlying dataset structure.\\nNode types.\\nThere are five main data-specific\
    \ types of nodes within Petagraph: Concept, Code, Term,\\nDefinition, and Semantic Type. These node types are discussed\
    \ in further detail in the UMLS Metathesaurus69.\\nWithin Petagraph, the most important node type is the Concept node,\
    \ as they form the central backbone of the\\nentire graph model. All other node types are essentially metadata attached\
    \ to Concept nodes.\\nConcept nodes represent a node nexus for organizing on a particular conceptual meaning. For example,\
    \ a\\nConcept node for a particular gene will include references to many different representations of that gene from\\\
    nresources such as HGNC34, Ensembl40, and ENTREZ70. Every Concept node has just one property called the\\nConcept Unique\
    \ Identifier (CUI). CUIs are alphanumeric identifiers and are not informative outside of their use\\nas unique identifiers.\
    \ For example, the CUI for the concept for the H. sapiens TP53 gene is C0079419.\\nCode nodes identify the reference IDs\
    \ for a given Code in a particular ontology or standard. Several Code\\nnodes can share associations with the same Concept.\
    \ It is this one-to-many relationship between Concept and\\nCode nodes that allows for traversal of the graph between\
    \ data sources: if a Code in one source is linked to the\\nsame Concept as a Code in another source, then it may be possible\
    \ to propose an equivalence between the two\\nCodes. The only relationship between Concept nodes and their respective\
    \ Code nodes is the CODE relation-\\nship. All Code nodes have three properties: (1) the source abbreviation (SAB), (2)\
    \ the Code from the reference\\nsource, and (3) the CodeID which is the SAB and the Code separated by a colon. In Petagraph\\\
    u2019s schema, the\\nSAB signifies the identity of the originating dataset or ontology. Examples of three CodeIDs supporting\
