    \ (SAB) property, which is particularly useful for quick\\ninclusion or exclusion of edge-only data sources when querying\
    \ the graph. Petagraph also extensively uses edge\\nidentifiers between Concepts from the Relations Ontology64 whenever\
    \ possible. The Concept to Concept relation-\\nship network serves as the primary traversable component of Petagraph and\
    \ constitutes the graph\\u2019s fundamental\\nstructural backbone.\\nThere are five other main non-(Concept to Concept)\
    \ relationship types in Petagraph that add metadata to\\nthe Concept nodes. These relationships are always unidirectional\
    \ and point away from their respective Concept\\nnodes. These relationships include: the Concept node to Code node relationship\
    \ (relationship type\\u2009=\\u2009CODE), the\\nConcept node to Term node relationship (relationship type\\u2009=\\u2009PREF_TERM),\
    \ the Code node to Term node rela-\\ntionship(s) (relationship types\\u2009=\\u2009PT, SYN, ACR which stand for \\u201cpreferred\
    \ term\\u201d, \\u201csynonym\\u201d and \\u201cacronym\\u201d,\\nrespectively), the Concept node to Definition node relationship\
    \ (relationship type\\u2009=\\u2009DEF) and the Concept node\\nto Semantic node relationship (relationship type\\u2009=\\\
    u2009STY which stands for \\u201cSemantic Type\\u201d). There are an addi-\\ntional 180 relationship types between Codes\
    \ and Terms that are used with much lower frequency.\\nFig. 6\\u2002 Heatmap representation of relationship type statistics\
