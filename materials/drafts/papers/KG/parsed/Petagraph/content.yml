  sections: "[\n  {\n    \"name\": \"Background & Summary\",\n    \"text\": \"The annual increase in the volume and complexity\
    \ of biomedical data has posed significant challenges for ana-\\nlysts interested in comprehensive data integration, and\
    \ requires advanced tools to harness the potential of bio-\\nmedical datasets that include omics data. Knowledge graphs\
    \ are the best near-term solutions for the integration\\nand analysis of heterogeneous data within and between large biomedical\
    \ datasets1. Knowledge graphs can effec-\\ntively integrate and analyze heterogeneous data sources within and across large\
    \ biomedical datasets. Methods\\nsuch as node and link prediction algorithms, supervised and unsupervised machine learning\
    \ can be applied to\\nbiomedical knowledge graphs for many types of use cases.\\nMost biomedical knowledge graphs are\
    \ customized for particular use cases. In recent years, knowledge\\ngraphs have witnessed a rapid proliferation in their\
    \ adoption, with applications spanning drug discovery, drug\\nrepurposing, and the prediction of drug targets2\\u20136.\
    \ Other biomedical knowledge graphs gave integrated hetero-\\ngeneous COVID-19 data7\\u201313, oncology datasets14\\u201316,\
    \ and gene-disease associations3,17. These knowledge graphs\\nare very application-specific, which is expected for efficiency\
    \ and analysis. General genomic data-integrated\\nknowledge graphs such as Petagraph and GenomicKB18 are expected to increase\
    \ in number, helped in no small\\npart by the maturation of projects on ontological unification such as the Monarch Initiative19\
    \ and on genomics\\ndata standards such as GA4GH20.\\nTo facilitate the widespread adoption of knowledge graphs in the\
    \ biomedical research community, we aimed\\nto develop a modular knowledge graph framework comprising ontologies, vocabularies,\
    \ standards, and com-\\nmonly used data resources including omics data. This framework would enable the efficient creation\
    \ of knowl-\\nedge graphs for diverse applications. Our requirements for this knowledge graph framework included the need\\\
    nto accommodate various omics data types within a network of interconnected standards and ontology systems\\nto ingest\
    \ and seamlessly link experimentally-derived data to other data sources within the graph.\\n1Department of Biomedical\
    \ and Health Informatics (DBHI), The Children\\u2019s Hospital of Philadelphia, Philadelphia,\\nPA, USA. 2Department of\
    \ Biomedical Informatics, School of Medicine, The University of Pittsburgh, Pittsburgh,\\nPA, USA. 3Department of Biomedical\
    \ Informatics, Columbia University Irving Medical Campus, New York, NY, USA.\\n4Department of Pediatrics, University of\
    \ Pennsylvania Perelman Medical School, Philadelphia, PA, USA. 5These\\nauthors contributed equally: Benjamin J. Stear,\
    \ Taha Mohseni Ahooyi. \\u2709e-mail: taylordm@chop.edu\\nData Descriptor\"\n  },\n  {\n    \"name\": \"OPEN\",\n    \"\
    text\": \"2\\nScientific Data |         (2024) 11:1338  | https://doi.org/10.1038/s41597-024-04070-w\\nwww.nature.com/scientificdata\\\
    nwww.nature.com/scientificdata/\\nIn order to support these requirements, we created the Unified Biomedical Knowledge\
    \ Graph (UBKG)21.\\nThe UBKG takes the form of a property graph, based on the NIH Unified Medical Language Service (UMLS)22,\\\
    nand incorporates 105 English language-based ontologies and standards updated regularly from the biannual\\nUMLS releases.\
    \ The UBKG extends the content from the UMLS by adding biomedical data from a variety of\\nother sources, including both\
    \ standard ontologies and custom reference data. UBKG offers adaptability for var-\\nious biomedical ontological knowledge\
    \ graph construction. It has already been adapted for projects such as\\nHuBMAP23, SenNet24, and the NIH Common Fund Data\
    \ Ecosystem Data Distillery Project25. Table 2 provides\\na list of additional ontologies that the UBKG contributes to\
    \ the UMLS ontology collection, which will enhance\\nsupport for building knowledge graphs and supporting future omics\
    \ initiatives.\\nAdopting the UBKG as a base ontological scaffold, we constructed Petagraph, a biomedical knowledge graph\\\
    nthat embeds and connects omics and related data into the UBKG\\u2019s ontological structure, effectively \\u2018bringing\
    \ the\\ndata to the ontologies\\u2019 by embedding these data within a richly connected annotation environment. Petagraph\\\
    nhas added over 12 million nodes to the UBKG, an increase of almost 44%, more than doubling the number of\\nrelationships\
    \ from 52 million to 118 million. Petagraph increases independent relationship types to 1,861 versus\\nUBKG\\u2019s 1,756.\
    \ Petagraph was originally piloted as a resource for rapid feature selection to identify, annotate, and\\nexplore gene\
    \ candidates for human diseases, and has since expanded to act as a base module for user-customized\\nknowledge graphs\
    \ for other types of biomedical use cases. To create Petagraph, we added 21 sources of support-\\ning omics and annotation\
    \ to UBKG (Tables 2 and 3). Among these additions is the Homo sapiens Chromosomal\\nLocation Ontology (HSCLO38), developed\
    \ to allow Petagraph queries to easily link relevant genomics features\\nacross different resolutions by chromosome position\
    \ and chromosomal vicinity26. The modular design for data\\nSAB\\nName\\nData Type\\nPlatform\"\n  },\n  {\n    \"name\"\
