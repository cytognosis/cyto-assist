    \ synonyms,\\ndefinitions, and cross-references to Codes from other sources.\\nFor ingestion of genomics and related datasets\
    \ into the UBKG scaffold, we wrote a continuous integration\\n(CI) workflow using Github Actions to ensure that the final\
    \ Petagraph product contains the correct schema\\nas well as the correct types and counts of nodes and edges. Our Github\
    \ Actions CI downloads the latest stable\\nrelease of Neo4j, downloads the latest version of the Petagraph CSVs from the\
    \ Open Science Framework website\\nand then builds Petagraph. Then we run tests comparing the count of node and edge types\
    \ from the Petagraph\\nCSVs and the Petagraph graph to confirm that the graph has been built as expected.\\nFor reviewing\
    \ the integrity and accuracy of ingested data, the UBKG framework generates a summary report. This\\nreport helps identify\
    \ potential issues and opportunities for alignment before finalizing the ingestion process (Table 1).\\nFAIR validation.\\\
    nWhen building Petagraph we adhered strictly to findability, accessibility, interoperability\\nand reusability (FAIR)\
    \ data principles (https://www.nature.com/articles/sdata201618). Petagraph is findable by\\nFig. 11\\u2002 Validation\
