    nway of GitHub, the Open Science Framework (https://osf.io/search)77 and any major search engine. Metadata\\nin the form\
    \ of a data dictionary is available on the project GitHub, which describes the schema of every indi-\\nvidual dataset\
    \ that has been ingested. The data dictionary also contains detailed descriptions of preprocessing\\nand formatting that\
    \ was done to the data prior to ingestion. Descriptions of the ingested datasets and ontologies\\nare also present in\
    \ the Methods section of this paper. Petagraph is accessible by being freely downloadable and\\nsmall enough (4.5GB) that\
    \ a dump of the entire database can easily fit onto a user\\u2019s personal computer. Whether\\nbuilding from source or\
    \ from the database dump file, our build process is OS-agnostic. Petagraph, and the UBKG,\\nare built on top of the UMLS,\
    \ so they are inherently interoperable. The UMLS alone harmonizes hundreds of\\nbiomedical vocabularies and ontologies\
    \ so that users can easily query across standards.\\nAdding new data to Petagraph is straightforward. Ontologies or datasets\
    \ that are in OWL, RDF/XML, OBO\\nor Turtle format can be incorporated into the graph automatically using our ingestion\
    \ workflow, outlined in\\ndetail in the Methods section. Datasets that are not in one of these formats can be added to\
    \ the graph after some\\nsimple preprocessing steps. Lastly, all data sources and Petagraph releases are versioned and\
    \ the entire process of\\ndownloading the dump file and building the Neo4j database locally can easily be automated using\
    \ the OSF and\\nNeo4j APIs which helps ensure reproducibility and consistency for Petagraph users.\\nStructural validation.\\\
    nValidation through link prediction.\\u2003 As a link prediction-based validation, we com-\\nputed the Common Neighbors\
    \ scores for about 500,000 pairs of gene-to-gene direct connections and compared\\nthe results to the distribution of\
    \ Common Neighbors scores for random selections of pairs of genes. As shown in\\nFigure 9, the Common Neighbors of genes\
    \ with direct connection in Petagraph are approximately three orders\\nof magnitude greater than randomly selected genes.\
    \ This analysis has two implications. First, it suggests that the\\northogonal datasets ingested in Petagraph could effectively\
    \ be used for link prediction. Second, the links in the\\ngraph can be cross-validated using the information in the graph\
    \ data sources from independent datasets.\\nValidation using analysis of local structures (transitivity and triangle counts).\\\
    u2003 We analyzed the Petagraph\\nConcept-to-Concept subgraph nodes in terms of transitivity (the probability of nodes\
    \ adjacent to a nominal\\nnode are connected to each other) and triangle counts (the number of triangles or 3-cliques\
    \ each node is a part\\nof). We compared the distribution of these measures of local structure connectivity derived from\
    \ Petagraph with\\na randomized graph created with the same number of nodes and relationships and node degrees but with\
    \ ran-\\ndom connections to other nodes (Figure 10). As portrayed by the distributions of transitivity (ranging between\\\
    n0 and 1) and triangle counts, the Petagraph Concept-to-Concept subgraph presents a shift towards higher val-\\nues of\
    \ both node transitivity and triangle counts. These meaningful shifts provide an insight into less-random\\norganization\
    \ in Petagraph Concept nodes connectivity as opposed to the randomized graph, therefore showing\\ninformational consistency\
    \ in the data ingested in Petagraph.\\nValidation through low dimensional visualization of high dimensional graph embeddings.\\\
    u2003  We visualized the\\nUMAP components of a 100-dimensional embedding of the subgraph of Petagraph consisting ~400,000\
    \ nodes\\nand ~12,000,000 relationships (bidirectional). This was derived from a query that extracts all nodes one or\
    \ two\\nhops away from 12 abnormal heart morphology and 2 blood cancer phenotypes (Methods) and all their inter-\\nconnections.\
    \ This included Concept nodes from all 127 Semantic Types including ~10,000 genes and ~10,000\\nphenotypes. It visualizes\
    \ the results for a selection of Concept nodes from major Semantic Types including Gene\\nor Genome, Disease or Syndrome,\
    \ Neoplastic Process, Clinical Drug, Cells and Molecular Processes (Figure 11).\\nIn this figure, UMAP low-dimensional\
    \ visualizations illustrate the spatial distribution of major Semantic\\nType-related Concept nodes. Nodes belonging to\
    \ the same STYs are shown to cluster together, indicating their\\nrelative proximity and suggesting a higher likelihood\
    \ of connections within the graph. Conversely, nodes from\\ndifferent STY groups are distinctly separated, although nodes\
    \ that are adjacent in the graph may still appear\\nclose to each other in the embedding space, indicating potential linkages.\\\
    nAssessing major dataset contributions to link prediction.\\u2003 We analyzed the influence of major datasets on link\\\
    nprediction by using two graph-wide connectivity metrics: transitivity and assortativity (Figure 12). Transitivity\\nmeasures\
    \ the likelihood of new connections based on existing local patterns, such as the probability that two\\nnodes sharing\
    \ a neighbor will be directly connected. This is linked to the formation of triangles in the graph,\\nindicated by metrics\
    \ like the clustering coefficient and triangle count. Utilizing transitivity helps predict poten-\\ntial links based on\
    \ the current graph structure. Assortativity evaluates the tendency of nodes with similar\\nattributes or degrees to connect,\
    \ offering insights into Petagraph's structural patterns. Including assortativity\\nin predictive models enhances accuracy\
    \ in forecasting future link formations. Together, these metrics provide\\ninsights into graph connectivity dynamics and\
    \ link prediction capabilities.\\nTo assess the impact of individual datasets on global transitivity and degree assortativity\
    \ within subgraphs\\naround human genes in Petagraph, we systematically removed our largest gene-related datasets from\
    \ the graph.\\nThis approach allows us to measure each dataset\\u2019s contribution to overall connectivity and structural\
    \ features.\\nFigure 12a shows that excluding the GTEXCOEXP dataset significantly reduces global transitivity, indicating\\\
    ndecreased local clustering. Figure 12b reveals that removing most major datasets generally decreases degree\\nassortativity,\
    \ except for the GTEXEQTL dataset. Removal of the GTEXEQTL dataset leads to an increase in\\ndegree assortativity as a\
    \ GTEXEQTL node connects terminally to a gene target node thus not providing links\\nbetween genes.\\nThese findings underscore\
    \ the specific contributions of each dataset to the graph\\u2019s structural properties and\\nfunctional relationships\
    \ among human genes.\\n\\n22\\nScientific Data |         (2024) 11:1338  | https://doi.org/10.1038/s41597-024-04070-w\\\
