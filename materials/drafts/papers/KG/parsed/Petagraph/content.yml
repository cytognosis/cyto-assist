    \ which allows for more informative results with queries spanning more intermediate relationships.\\nData Records\\nInstalling\
    \ Petagraph from a Neo4j dump file.\\nUsers with a UMLS license can follow site instructions\\nto obtain and utilize a\
    \ UMLS license key at https://ubkg-downloads.xconsortia.org/ to download the most recent\\nPetagraph dump file (currently\
    \ 4.5 GB). The dump file can be used with Neo4j Desktop to build Petagraph quickly\\nand easily. Detailed instructions\
    \ on building the database with the dump file can be found on the Petagraph\\nGithub README60 or users can follow the\
    \ standard procedure for loading Neo4j dump files from the vendor.\\nPetagraph installation from source.\\nBuilding Petagraph\
    \ from the source files can take several hours but\\nallows for build customization. The instructions can also be used\
    \ for ingesting new data into any Petagraph build. The\\ncode and instructions to recreate Petagraph from source data\
    \ is on the project\\u2019s Github site60. The process for building\\nfrom source consists of two stages: establishing\
    \ the source framework and then the generation framework. In the\\nsource framework stage a user downloads the UMLS Metathesaurus\
    \ and Semantic Network files from the UMLS web-\\nsite76 and then runs a set of SQL queries to extract data to build the\
    \ UMLS base CSVs. In the generation framework\\nstage, the ingestion pipeline will add additional ontologies and datasets\
    \ into the UMLS base. The same scripts are then\\nrun to add additional datasets onto the UBKG CSV files, creating Petagraph.\
    \ We provide the source files for Petagraph\\nat https://ubkg-downloads.xconsortia.org/ on the project\\u2019s Open Science\
    \ Framework site (https://osf.io/6jtc9/)77.\\nTechnical Analysis and Validation\\nUBKG Generation framework ingestion\
    \ validation.\\nThe heterogeneous and often custom nature of\\ndata sources means that the validation of ingestion from\
    \ a particular data source involves analysis that is not\\nobviously amenable to automation. The generation framework\
    \ generates basic analytical reports during ingestion\\nto aid manual validation; however, manual validation by a subject\
    \ matter expert is still necessary.\\nBasic content and consistency requirements.\\nA source for ingestion into UBKG represents\
    \ a set of asser-\\ntions. Each assertion involves two nodes (entities) and an edge (relationship). In the UBKG Edge Node\
    \ format,\\n\\u2022\\nThe edge file represents assertions as triplets in which both nodes and edges are represented with\
    \ Codes.\\n\\n19\\nScientific Data |         (2024) 11:1338  | https://doi.org/10.1038/s41597-024-04070-w\\nwww.nature.com/scientificdata\\\
    nwww.nature.com/scientificdata/\\n\\u2022\\nThe node file decodes nodes with metadata such as terms and definitions.\\\
    nTo be represented properly in the UBKG, the edge and node files must satisfy basic requirements for content\\nand internal\
    \ consistency. These requirements include:\\n\\u2022\\nEvery node in the edge file must either be described explicitly\
    \ in the node file or already exist in the UBKG.\\n\\u2022\\nIf a node in the node file has a cross-reference to another\
    \ Code, the cross-referenced Code should already\\nexist in the UBKG.\\nIngestion validation.\\nMost data quality problems\
    \ in the assertion files arise from missing node references,\\nsuch as:\\n\\u2022\\nAn assertion includes a Code for a\
    \ node that is neither defined in the node file or previously ingested into\\nthe UBKG.\\n\\u2022\\nA node has a cross-reference\
    \ to a Code that is not in the UBKG.\\nData ingestion validation.\\nAfter a set of assertions from a source is ingested,\
    \ the resulting ontology CSVs\\nare imported into a Neo4j instance. Using the Neo4j browser, nodes and relationships from\
    \ the source are com-\\npared in the UBKG with the corresponding edge and node files, using tools such as shortest path\
    \ queries. For\\nexample, if the edge file asserts that SAB1:CodeA has_relationship_X_with SAB2:CodeB, then\\na\\nb\\\
    nc\\nd\\nTransitivity\\nTriangles\\nPetagraph\\nRandomized Graph\\nFig. 10\\u2002 Validation using local structure. Here\
    \ we show a comparison between Petagraph and a random graph\\nwith the same number of relationships and nodes degrees\
    \ as Petagraph but randomized Concept-to-Concept\\nconnections in terms of Concept node transitivity and number of triangles\
    \ each node belongs to indicates a shift\\ntowards lower means for both measures as a result of randomization.\\n\\n20\\\
    nScientific Data |         (2024) 11:1338  | https://doi.org/10.1038/s41597-024-04070-w\\nwww.nature.com/scientificdata\\\
    nwww.nature.com/scientificdata/\\nthere should be a shortest path that connects the Code nodes SAB1:CodeA and SAB2:CodeB\
    \ with a relation-\\nship of type has_relationship_X_with. Additional queries validate information from the node file\
