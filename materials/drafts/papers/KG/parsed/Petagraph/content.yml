    \ million eQTLs from 49 tissues. GTEx includes HGNC\\ngene IDs and Uberon tissue names51. We created Concept nodes for\
    \ each eQTL and each tissue-gene expression\\npair. The eQTL Concepts were then connected to their corresponding tissue\
    \ node (UBERON), gene node (HGNC)\\nand genomic location node (HSCLO38). The gene expression nodes are connected to their\
    \ corresponding tissue\\nnode and gene node. We also integrated quantitative data from GTEx including p-values for the\
    \ eQTL data and\\ntranscripts per million (TPM) for the gene expression data into the graph. In order to reduce redundancy\
    \ of\\nnodes we created bin Concept nodes for these quantitative data types. For example, if the gene TP53 has a TPM\\\
    nof 10.5 in the heart, the GTEx Concept for TP53 - Heart will be connected to the \\u2018[10.0.11.0]\\u2019 TPM bin\\\
    n\\n9\\nScientific Data |         (2024) 11:1338  | https://doi.org/10.1038/s41597-024-04070-w\\nwww.nature.com/scientificdata\\\
    nwww.nature.com/scientificdata/\\nConcept node. Similarly, if an eQTL has a p-value of 0.0005 it will be connected to\
    \ the \\u2018[0.0001.0.001]\\u2019 p-value\\nbin Concept node.\\nGTEx, Coexpression data (GTEXCOEXP).\\u2003 Coexpression\
    \ of human genes was computed using the GTEx gene\\nTPM (transcript per million) normalized data (GTEx_Analysis_2017-06-05_v8_RNASeQCv1.1.9_gene_tpm)\\\
    n(https://gtexportal.org/home/datasets) by first computing the correlation matrix for each of the GTEx tissues\\nand selecting\
