    \ (CHEBI:8887) in LINCS (L1000, CMAP) to all tissue transcriptional profiles in GTEx with\\nexpression higher than a minimum\
    \ level (TPM\\u2009>\\u20095) (GTEXEXP). Once we extracted such genes, we computed\\nNormalized Gene Interaction Counts\\\
    nCorrelated with Rofecoxib\\nNormalized Gene\\nCount\\n0.8\\n0.85\\n0.9\\n0.95\\n1\\nTissue\\nRight auricular appendage\\\
    nStructure of cortex of kidney\\nomental fat pad\\nTransverse colon\\nLeft colic exure\\nbreast epithelium\\nFallopian\
    \ Tubes\\nMyocardium of left ventricle\\nSubcutaneous Fat\\nTibial Arteries\\nStructure of posterior tibial artery\\nStructure\
    \ of anterior tibial artery\\nVagina\\nCoronary artery\\nVaginal part of cervix\\nExocervix\\nStructure of putamen\\nAscending\
    \ aorta structure\\nStomach\\nFig. 14\\u2002 Validation with Use Case 2. Querying possible drug-tissue interactions for\
    \ rofecoxib using CMAP,\\nLINCS L1000 and GTEX_EXP datasets. Top 19 tissues with the highest ratio of genes correlated\
    \ with rofecoxib\\n(LINCS L1000) to all genes (TPM\\u2009>\\u20095).\\n\\n24\\nScientific Data |         (2024) 11:1338\
    \  | https://doi.org/10.1038/s41597-024-04070-w\\nwww.nature.com/scientificdata\\nwww.nature.com/scientificdata/\\nthe\
    \ number of shared genes as a ratio for each tissue with respect to the total number of genes with TPM\\u2009>\\u20095\
    \ and\\nthen normalized the value to the highest value in all tissues and ranked them accordingly.\\nFigure 14 summarizes\
    \ the result of the query used to extract the shared genes in the transcriptional profiles\\nfrom rofecoxib and human\
    \ tissues. This query is based on the genes with expression levels higher than a pre-\\ndefined threshold (TPM\\u2009>\\\
    u20095) with relationships with rofecoxib in the LINCS dataset. As shown in Figure 14,\\nthe ranked tissues point to different\
    \ organs; the LINCS data provides a correct prediction that heart and blood\\nvessels in the GTEx dataset are most closely\
    \ related to perturbation gene profiles in rofecoxib (e.g. right auricular\\nappendage, myocardium of left ventricle,\
    \ coronary arteries). These predictions are not obvious by just examining\\nwhere rofecoxib\\u2019s target gene, PTGS2,\
    \ is expressed.\\nFig. 15\\u2002 Validation through shortest path analysis. Analysis of connections between HPO terms\
    \ in a Petagraph\\nsubgraph between abnormal central nervous system (CNS) morphology and CNS neoplastic processes (a)\
    \ An\\nexample Petagraph subgraph consisting of shortest paths connecting 54 abnormal CNS morphology and 54\\nCNS neoplasms,\
    \ containing a total of 777 nodes including 191 human genes. Colors reflect the edge traversal\\ncounts and node degree\
    \ centralities. (b) Node degree histogram of the subgraph. (c) Edge traversal count\\nfrequencies for the subgraph. (d)\
    \ Shortest path length distribution of the subgraph.\\n\\n25\\nScientific Data |         (2024) 11:1338  | https://doi.org/10.1038/s41597-024-04070-w\\\
    nwww.nature.com/scientificdata\\nwww.nature.com/scientificdata/\\nUse Case 3: Validation through shortest path analysis\
    \ of subgraphs.\\u2003 Epidemiological analysis has shown that\\nbrain tumors are more common in children with CNS abnormalities\
    \ than in the general population79,80. In this\\nanalysis, we focused on constructing and examining a subgraph derived\
    \ from Petagraph, specifically targeting\\nthe connections between HPO Concept nodes related to abnormal CNS morphology\
    \ and CNS neoplastic pro-\\ncesses. The subgraph, comprising 777 nodes as shown in Figure 15a, was formed by identifying\
    \ all shortest paths\\nlinking a selected set of 54 CNS morphology abnormalities with 54 CNS neoplastic process nodes.\
    \ Upon analyz-\\ning this subgraph, we observed particular patterns in node degree distribution, link traversal frequencies,\
    \ and\\nshortest path lengths, as detailed in Figure 15b\\u2013d. The distributions observed align with a scale-free structure,\\\
    nwhich has been recurrently identified within various segments of Petagraph. This type of structure is significant\\nbecause\
    \ scale-free networks are known for few highly connected nodes (hubs) amidst many nodes with fewer\\nconnections, which\
    \ allows for shorter direct paths between nodes as compared to randomly configured graphs\\nof the same size. Scale-free\
    \ graph structures are prevalent in many biological systems and data collections.\\nInvestigation into the node degrees\
    \ within this subgraph allowed us to rank human genes based on their con-\\nnectivity. Genes with common links between\
    \ CNS phenotypic abnormalities and brain cancers could be impli-\\ncated in both conditions with origins in perturbed\
    \ developmental processes. The top-ranked genes, as listed in\\nTable 6, offer potential targets for further research\
    \ into their relevance to both CNS disorders and neoplasms.\\nLimitations.\\nDespite its strengths, Petagraph has certain\
    \ limitations. Inherent complexity and variabil-\\nity of the data sources integrated into the graph will always be a\
    \ challenge. Ensuring the accuracy and consist-\\nency of data ingestion and mapping processes requires expert curation,\
    \ continuous refinement and validation.\\nAdditionally, the scalability of Petagraph, while robust, may face constraints\
    \ with the incorporation of increas-\\ningly large and diverse datasets, necessitating ongoing optimization of computational\
    \ resources and algorithms.\\nAnother limitation is the potential bias introduced by the selection and integration of\
    \ specific datasets. While\\nPetagraph aims to be comprehensive for general use, the inclusion of certain data and the\
    \ exclusion of others can\\ninfluence the results and interpretations derived from the graph. Biomedical data also tends\
    \ to be sparse which\\ncan compound biases in available data. Careful consideration and transparency in the data selection\
    \ process is\\nsuggested for those who extend Petagraph with additional data for their own purposes.\\nUsage Notes\\nUsage\
    \ documentation.\\nTo help aid users who would like to query Petagraph we have written a user guide\\nwith example queries\
    \ available at https://github.com/TaylorResearchLab/Petagraph/blob/main/petagraph/user_\\nguide.md.\\nFig. 16\\u2002 Recursive\
    \ queries on ontologies allow for returning results and increasing search depths. This is\\nan example of a recursive\
    \ (transitive closure) search using the mammalian phenotype (MP) Atrial Septal\\nDefects (ASD) as the parent phenotype.\
    \ This query returns all of the eQTLs (p-value\\u2009<\\u20090.05) from ASD\\n(MP:00110403) and its direct child phenotypes,\
    \ based on genes that are expressed in the GTEx heart data.\\nConcept nodes are in blue, Code nodes in purple.\\n\\n26\\\
    nScientific Data |         (2024) 11:1338  | https://doi.org/10.1038/s41597-024-04070-w\\nwww.nature.com/scientificdata\\\
    nwww.nature.com/scientificdata/\\nAnalysis considerations.\\nBefore employing Petagraph for analytical use, users should\
    \ consider several fac-\\ntors in setting up their analyses. After finding a use case, users may want to identify and\
    \ familiarize themselves\\nwith the datasets and ontologies that their use case will include (if they are known). This\
    \ is helpful for two reasons.\\nFirst, stating explicitly what datasets or relationships to search for in the Cypher query\
    \ can drastically speed up\\nquery run time. Secondly, including a predefined set of datasets and relationships can help\
    \ with interpretability\\nof results. Furthermore, to avoid writing nonsensical queries and to be able to correctly interpret\
    \ results, it is\\nimportant to consult the data dictionary and to understand the basic preprocessing and data modeling\
    \ decisions\\nthat took place while creating Petagraph. Located on the Petagraph Github71, the data dictionary includes\
    \ detailed\\ndescriptions of the datasets, preprocessing steps, as well as images and descriptions of how each dataset\
    \ has been\\nmodeled. Users also need to be wary of comparing quantitative results from different data sources. For example,\\\
    np-values from two separate sources should not be directly compared with each other. For more complex use cases\\n(and\
    \ queries) it may be helpful to define a projected subgraph using function(s) from Neo4j GDS: Graph Data\\nScience library81.\
    \ A graph projection creates an in-memory graph that can be queried more quickly than the\\ndatabase and may help to speed\
    \ up analysis.\\nCareful selection of Cypher query strategies can aid in returning rapid results. For example, recursive\
    \ queries\\ncan be performed on OBO-compliant ontologies in Petagraph. Ontologies like HPO, MP, UBERON can be que-\\nried\
    \ recursively to include child nodes at any specified level. This can be useful, for example, when a user wants\\nto include\
    \ information about a general disease condition instead of just a single phenotype term. In Figure 16 we\\nshow how this\
    \ can be done by querying and returning eQTLs for the term Atrial Septal Defects in addition to all\\nof its direct child\
    \ terms. When writing a Cypher statement, a user can query recursively be using the \\u2018*\\u2019 operator\\ninside\
    \ a relationship definition.\"\n  },\n  {\n    \"name\": \"Data availability\",\n    \"text\": \"UMLS licensing information:\
