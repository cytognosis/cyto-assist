    \  | https://doi.org/10.1038/s41597-024-04070-w\\nwww.nature.com/scientificdata\\nwww.nature.com/scientificdata/\\nData\
    \ modeling.\\nData modeling was a major consideration in how we introduced quantitative data within\\nthe structure supported\
    \ by the UBKG. The Petagraph schema supports quantitative values as node and edge\\nproperties. Under the framework of\
    \ the UMLS and UBKG, the properties for each node type are well defined:\\nevery Concept node has a CUI property; every\
    \ Code node has SAB, Code and CodeID properties and every\\nTerm node has a name property. However, Code nodes can have\
    \ an extra quantitative attribute called value.\\nFor example, GTEx eQTL Code nodes have a value property corresponding\
    \ to their p-values. We also wanted\\nto integrate quantitative data within the categorial and conceptual framework of\
    \ the UMLS schema. This allows\\nquery results to be returned rapidly, even for multidimensional, numerical searches.\
    \ We accomplished this by\\ncreating Concept nodes representing interval bins of numerical ranges, for example, p-values,\
    \ expression TPM,\\nand log2FC. Nodes with a quantitative value can then be assigned to the appropriate bin node allowing\
    \ for rapid\\nselection of numerical values within the graph. As many bioinformatics analyses are performed with results\
    \ that\\nmeet a certain threshold, the numerical bin nodes are especially useful for thresholding data in biologically\
    \ mean-\\ningful queries (e.g. return all data points with p-value\\u2009<\\u20090.05).\\nIn order for Petagraph to more\
    \ fully support the use of experimental omics data, we also included dozens\\nof relationship-only (\\u201cmapping\\u201d)\
    \ datasets that may come from observational data themselves, many of which\\nmap to and within genomic and phenotypic\
