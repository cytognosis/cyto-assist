    \ rela-\\ntionships linking UNIPROTKB nodes with a relationship property from the STRING combined score as evi-\\ndence\
    \ of the interaction. The preprocessing script for STRING relationships was deposited in GitHub (Table 9).\\nKnowledge\
    \ graph construction.\\nHere, we discuss how we built Petagraph from each of its individual\\ncomponents. Petagraph\\\
    u2019s ingestion workflow facilitates the integration of large-scale, biomolecular, and biomedi-\\ncal data sets. The\
    \ basic steps we took to build Petagraph were: (1) obtain a UMLS license from NIH, (2) build the\\nUBKG from ingestion\
    \ processing scripts, and (3) ingest the Petagraph CSVs into the UBKG base release. Users\\n\\n10\\nScientific Data |\
    \         (2024) 11:1338  | https://doi.org/10.1038/s41597-024-04070-w\\nwww.nature.com/scientificdata\\nwww.nature.com/scientificdata/\\\
    ninterested in building Petagraph from source can follow the same process, however we supply a database dump\\ndiscussed\
    \ in the Usage Notes section.\\nPetagraph is built on a Neo4j graph database, version 5, community edition. The scripts\
    \ for data ingestion\\nwere developed as part of the UBKG project and can be found on the UBKG project\\u2019s GitHub\
    \ repository21. The\\ningestion scripts require any new data ingestion to utilize identifiers for the data sources and\
    \ Codes supported\\nby UBKG59 with examples such as HGNC symbols and Human Phenotype Ontology IDs. If a Concept identifier\\\
    nis already in the UBKG, the scripts identify the existing Concept and any new Code(s) and Term(s) are attached.\\nIn\
    \ cases where there are no existing Concepts for newly introduced ontologies or data sources, the UBKG inges-\\ntion process\
    \ will automatically generate a new Concept node along with its unique identifier. We have made\\nminor adaptations in\
    \ the UBKG scripts for loading biomolecular data for Petagraph, and those scripts have been\\nincluded in the Petagraph\
    \ GitHub repository60.\\nThe Petagraph ingestion pipeline we created contains four major steps (Figure 1). These are:\
    \ (1) data selection\\nand modeling, (2) cleaning and formatting data, (3) running the appropriate UBKG ETL scripts to\
    \ convert data\\ninto UBKG CSV format, and (4) building Petagraph with the Neo4j bulk import tool. We discuss each of\
    \ these\\nsteps in detail below.\\nStep 1: Data selection and modeling.\\u2003 The selection, sourcing, review, and modeling\
    \ of data appropriate for the\\nknowledge graph required a comprehensive understanding of the knowledge graph\\u2019s\
    \ existing model and struc-\\nture. When creating a model that merges disparate types of biomolecular data, there should\
    \ be an emphasis on\\nmodeling relationships between discrete entities in a biologically meaningful way. For example,\
    \ when modeling\\nrelationships between Concepts for genes and Concepts for associated regulatory motifs, biological context,\\\
    nsuch as the proximity of a regulatory motif to a gene within the genome should be considered. Therefore, instead\\nof\
    \ just attaching the regulatory motif to a gene, we created the HSCLO38 in order to map genomic elements at\\nany size\
    \ scale to their location on the chromosomes.\\nStep 2: Cleaning and formatting of raw data.\\u2003 In the second step,\
    \ cleaning and formatting the data was per-\\nformed. The UBKG generation framework designed by our team converts data\
    \ from a variety of data sources\\ninto a triplet representation based on the OWL NEtwork Transformation for Statistical\
    \ Learning (OWLNETS)\\nformat61. The ingestion process is optimized for working with ontology data provided in Web Ontology\\\
    nLanguage (OWL) format. OWL format, which is based on the resource description framework (RDF), is a set of\\nstandards\
    \ designed for creating formal, structured knowledge representations62).\\nThe UBKG generation framework employs the Phenotype\
    \ Knowledge Translator (PheKnowLator) Python\\npackage when ingesting OWL files63. The PheKnowLator package converts semantic\
    \ information from an OWL\\nfile into a set of files in OWLNETS format. The UBKG generation framework works with OWL files\
    \ in a variety\\nFig. 1\\u2002 Petagraph Data Ingestion Workflow. The data ingestion workflow starts with Step 1 by downloading\
    \ the\\nUBKG base CSVs and the dataset(s) that will be integrated. Then in Step 2, the raw dataset (or ontology) must\\\
    nbe formatted into nodes and edges files according to guidelines found in the UBKG user guide. If the import\\nfile is\
    \ in OWL format then the user can jump to Step 3 which involves running the OWLNETS Python script to\\nconvert the edges\
    \ and nodes files into the UBKG format and simply appended to the base UBKG files. Lastly, for\\nStep 4k,Neo4js command-line\
    \ bulk import tool is used to build the graph database.\\n\\n11\\nScientific Data |         (2024) 11:1338  | https://doi.org/10.1038/s41597-024-04070-w\\\
    nwww.nature.com/scientificdata\\nwww.nature.com/scientificdata/\\nof serializations. Currently supported serialization\
    \ syntaxes are Turtle and RDF/XML, which seems to be the\\nnorm for ontology files published to repositories such as the\
    \ Open Biological and Biomedical Foundry64 or the\\nNational Center for Biomedical Ontology\\u2019s BioPortal29. If the\
    \ source data is already in the UBKG Edge Node\\nformat65 (derived from the OWLNETS format), then the conversion to OWLNETS\
    \ format is not necessary.\\nThe UBKG generation framework also obtains biomedical reference data from sources other than\
    \ OWL files,\\nincluding data downloaded from GENCODE31, HUGO34, UniProtKB30, and RefSeq66, converting this data into\\\
    nfiles in the UBKG edge and node formats. To ingest genomics data into Petagraph, we must clean and reformat\\nthe data.\
    \ The main quantitative data types selected from genomics datasets are: p-values, log2 fold changes, and\\ngene expression\
    \ data. Genomics data cleaning generally involves removing missing or irrelevant data points, and\\nformatting the data\
    \ according to the specific dataset schema that was decided on in Step 1.\\nThe required edges file asserts a set of relationships\
    \ between entities using triples, each consisting of a subject,\\na predicate, and an object. The subject and object of\
    \ an assertion represent the starting node and ending node\\nof a relationship and the predicate represents the relationship.\
    \ The nodes file describes the nodes that comprise\\nthe subjects and objects in the triples of the edge file, providing\
    \ information about nodes such as Codes for\\nFig. 2\\u2002 Petagraph dataset schema. (a) General schema design. Schematic\
