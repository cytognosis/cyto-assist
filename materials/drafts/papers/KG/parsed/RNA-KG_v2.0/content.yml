    : \"available at https:// RNA-KG.biodata.di.unimi.it/ api/ v1/ docs ,\\nwith details of usage and outputs.\\nApplications\
    \ and use cases\\nRNA-KG v2.0 enhances its utility in multiple ways. First, it en-\\nables fine-grained queries, allowing\
    \ users to filter interactions\\nnot only by molecular entities but also by context, experimen-\\ntal method, or supporting\
    \ literature. Furthermore, node and\\nedge properties can also be leveraged as additional features\\nto improve the performance\
    \ of ML models across different\\n\\nEnhancing RNA-KG with Properties\\n9\\nListing 2. Query to retrie v e interactions\
    \ between miRNAs and genes\\nv alidated b y a w estern blotting assa y in RNA-KG (and e x cerpt of the\\nresult).\\nListing\
    \ 3. Query to retrie v e miRNAs whose uracile percentage is abo v e\\n55% (and e x cerpt of the result).\\ntasks. Finally,\
    \ bio-entities interactions can be integrated with\\ninformation from external sources (e.g. RNAcentral) via the\\nRNA-KG\
    \ API, enabling further analysis. In the remainder, dif-\\nferent applications and use cases will be discussed. The corre-\\\
    nsponding code is available in the experiments directory of\\nthe GitHub repository.\\nContext-aware Cypher queries\\\
    nCypher can be exploited for extracting node properties, direct\\nand indirect relationships among bio-entities, and subgraphs.\\\
    nSeveral conditions can be easily expressed depending on the\\nresearch questions the biologists have in mind.\\nExample\
    \ 4. Suppose biologists are interested in identifying\\nthe interactions between miRNAs and genes that western blot-\\\
    nting assays have experimentally validated. Listing 2 shows the\\nCypher query and an excerpt of the corresponding result\
    \ to\\nretriev e relationships betw een miRNAs and genes. Whenev er\\nthe relationship r has been confirmed by western\
    \ blotting as-\\nsays, the query returns the label of the miRNA molecule, the\\ntype of interaction, and the label of\
    \ the target gene. By its ex-\\necution, w e discov er that regulates activity of is the only rela-\\ntionship type between\
    \ them. Furthermore, the query retrieves\\n2,738 interactions involving 651 miRNAs and 1,032 genes,\\nconfirming that\
    \ a single miRNA can regulate multiple target\\ngenes [ 1 ] . Only mature miRNAs are inv olv ed as they are in-\\ncorporated\
    \ into the RISC complex and are functionally active\\nin the recognition and regulation of target genes.\\nExample 5.\
    \ Suppose biologists wish to retrieve miRNAs that\\nare rich in uracil, which may be relevant for structure, stabil-\\\
    nity, and molecular netw or k studies. This request requires im-\\nposing conditions on the miRNA sequences. Listing 3\
    \ shows\\nthe corresponding query and an excerpt of the result. We first\\ndetermine for each miRNA molecule the total\
    \ number of\\nListing 4. Query to retrie v e miRNA-gene-disease triples with shared\\nPubMedIDs (and excerpt of the result).\\\
    nuracil bases contained in its sequence (using the WITH clause).\\nThen, miRNAs\\u2019 label and sequence whose uracil\
    \ (\\u2018U\\u2019) content\\nexceeds 55% are returned.\\nIn RNA-KG, many of these uracil-rich miRNAs are con-\\nnected\
    \ to specific transcription factors and regulate genes. For\\nexample, hsa-miR-3613-5p interacts with metal-response\\\
    nelement-binding transcription factor 2 ( MTF2 ) while also reg-\\nulate a large set of ribosomal protein genes, translation\
    \ factors,\\nand pseudogenes, including RPL26P6 , RPS4XP22 , ETF1P3 ,\\nEIF4EP2 , UBE2D3P1 , and MYL6P5 . This pattern\
    \ suggests\\nthat uracil-rich miRNAs ma y preferentiall y interact with TFs\\nwith a primary role in histone and repressor\
    \ binding activ-\\nity (such as MTF2 ) and regulate genes inv olv ed in ribosomal\\nand pseudogene netw or ks. Associations\
    \ betw een miRNA se-\\nquences and the functional pathways of their targets have been\\nreported in [ 70 ] , indicating\
    \ that GU-rich motifs are often in-\\nv olv ed in specific regulatory mechanisms.\\nExample 6. Suppose biologists are\
    \ interested in identifying\\nPubMed articles that describe how miRNAs regulate the ac-\\ntivity of genes known to cause\
    \ or contribute to the develop-\\nment of a specific disease. In this case, we need to identify a\\npath of length 2 in\
    \ RNA-KG where the first entity is a miRNA\\nthat is connected through a relationship regulates activity of\\nwith a Gene\
    \ that in turn is connected through a relationship\\ncauses or contributes to condition with a Disease . When\\nthis pattern\
    \ is identified, the common PubMed articles that\\nsupport both interactions are retrieved. Listing 4 shows the\\ncorresponding\
    \ query and an excerpt of the result. The MATCH\\nclause reports the identification of the path among miRNA ,\\nGene ,\
    \ and Disease . Then, the WITH clause computes the in-\\ntersection of PubMed IDs between the two relationships for\\\
    neach miRNA\\u2013gene\\u2013disease triple. Only ternary relationships\\nwith at least one shared PubMed ID are returned,\
    \ along with\\nthe miRNA, gene, disease, and supporting PubMed IDs.\\nFrom the execution of this query, we observed that:\
    \ (i ) in\\nPubMed article 23834033 , the miRNA hsa-miR-34a-5p is\\nassociated with inherited obesity when it regulates\
    \ the gene\\nNAMPT , (ii ) in PubMed article 19839049 , the miRNAs hsa-\\nmiR-200c-3p and hsa-miR-200b-3p regulate the\
    \ gene\\nZEB2 , contributing to breast carcinoma.\\nThus, RNA-KG 2.0 allows: (i ) given a PubMed article, to\\nidentify\
    \ relationships without having to read the full text, and\\n(ii ) given specific relationships (e.g. miRNA\\u2013gene\\\
    u2013disease as-\\nsociations), to determine the articles supporting them.\\nAll these queries allow the extraction of\
    \ tabular data that\\ncan be used for conducting different kinds of analyses. They\\n\\n10\\nCavalleri et al.\\ncan be\
    \ used to train supervised ML techniques or to group\\ndata according to specific hypotheses or research questions.\\\
    nContent-aware KG pruning and clustering\\nTraditional approaches to KG pruning (i.e. the process of con-\\nflating or\
    \ removing nodes and edges that are irrelevant to a\\nspecific analysis [ 71 ]) and clustering (i.e. grouping highly sim-\\\
    nilar nodes) typically rely on topological criteria [ 72 , 73 ] or\\nincorporate \\u2018domain-aware\\u2019 knowledge\
    \ [ 74 , 75 ]. For exam-\\nple, the GRAPE [ 76 ] library identifies \\u2018topological oddities\\u2019\\nof a graph, that\
    \ is, nodes that are topologically indistinguish-\\nable because they share the same type and neighbors. More-\\nover,\
    \ nodes can be clustered together to discover communi-\\nties relying on connected components, clustering coefficients,\\\
    nand neighborhood similarity, as well as low-dimensional pro-\\njections via dimensionality reduction techniques like\
    \ t-SNE.\\nHowever, in many use cases, it is desirable to complement\\nstructural information with the semantic content\
    \ encoded in\\nthe node and edge attributes. For example, \\u2018biologically simi-\\nlar\\u2019 RNA molecules can be\
    \ clustered by considering sequence\\nalignment techniques [ 77 , 78 ] or according to the tissue in\\nwhich they are\
    \ expressed or active, allowing the discovery of\\ntissue-specific and functionally-related entities.\\nIn all these situations,\
    \ the rich set of properties that are\\nmade available in RNA-KG v2.0 can be exploited to define\\napproaches that are\
    \ both topological and content-aware.\\nExample 7. Suppose we are interested in studying physical in-\\nteractions involving\
    \ sncRNAs. The subgraph of interest con-\\nsists of approximately 9.8k nodes, 244.8k edges, and 4 edge\\ntypes: interacts\
    \ with , genetically interacts with , molecularly\\ninteracts with , and directly regulates activity of . In this sub-\\\
    ngraph, we identified 177 isomorphic node groups involv-\\ning 2.8k nodes (mainly miRNA and tsRNA sequences) and\\n139.3k\
    \ edges (56.9% of the total). This high density can be\\nexplained by the biological tendency of tsRNAs to act in co-\\\
    nordinated groups [ 79 ] . A topological pruning approach would\\ncollapse all nodes in each group into a single representative,\\\
    npotentially reducing the edges to 48k. Although this strategy\\nwould greatly reduce the size of the graph, it would\
    \ also risk\\ndiscarding biologically significant differences among the se-\\nquences.\\nTo mitigate this phenomenon,\
    \ the average global sequence\\nalignment scores can be computed within each group using the\\nNeedleman\\u2013Wunsc h\
    \ alg orithm [ 78 ] . Fig. 9 shows the distri-\\nbution of alignment scores across groups. A total of 78 groups\\n(49.7%)\
    \ involving 596 sequences exhibit a score exceeding\\nthe median (highlighted in red in the boxplot). By only col-\\nlapsing\
    \ nodes within groups whose members show high bio-\\nlogical similarity (i.e. groups with alignment scores above the\\\
    nmedian), the graph size is reduced to 9 . 3 k nodes and 196 . 3 k\\nedges (a 19.8% reduction) while preserving both topological\\\
    nand content-aware information.\\nTopological and context-aware link predictions\\nLink prediction is a core task in KG\
    \ analysis, aiming to in-\\nfer new plausible edges between entities based on the graph\\nstructure and content. Existing\
    \ approaches only exploit the\\nnetwork topology (homogeneous methods), the topology and\\nthe nodes\\u2019 and edges\\\
    u2019 types (heterogeneous methods), or that\\nalso combine the node and edge properties (multimodal meth-\\nods).\\nFigure\
    \ 9. Alignment scores distribution of sncRNA isomorphic groups.\\nWe have recently demonstrated [ 24 ] that when interested\\\
    nin identifying the existence of an edge between two KG\\nnodes, simple homogeneous graph representation learning\\n(GRL)\
    \ methods (e.g. LINE [ 80 ] and node2vec [ 81 ]) com-\\nbined with Random Forests (RF) achieve a balanced accuracy\\nabove\
    \ 80% for homogeneous link prediction tasks involving\\nmiRNA-miRNA, miRNA-gene, and lncRNA-disease relation-\\nships.\
    \ Thus, these approaches can be used when we are inter-\\nested in the existence of a link or when the KG is quite homo-\\\
    ngeneous and a few types of edges occur between the same pair\\nof node types.\\nWhen we wish to identify the existence\
    \ of an edge between\\ntwo KG nodes and the type of their relationship, heteroge-\\nneous GRL methods (e.g. TransE [ 82\
    \ ], ComplEx [ 83 ], and\\nMetapath2Vec [ 84 ]) can be employed. These methods embed\\nboth node and edge types, thus\
    \ predicting the existence of\\na link and the specific interaction type. These methods are\\nrelevant when we need to\
    \ discriminate among multiple se-\\nmantic relations that may exist between the same types of\\nentities. For example,\
    \ when studying RNA\\u2013disease interac-\\ntions, we might be interested in determining whether an RNA\\nmolecule is\
    \ over-expressed in , under-expressed in , contributes\\nto , or causes a given disease.\\nMultimodal link prediction\
    \ methods [ 85 ] further extend\\nhomogeneous and heterogeneous approaches by incorpo-\\nrating complementary information\
    \ contained in nodes\\u2019 and\\nedges\\u2019 attributes in the learning process. For instance, fine-\\ntuned transformers\
    \ like BioBERT [ 86 ] or DNABERT [ 87 ]\\ncan be used to embed textual biomedical descriptions and se-\\nquences. These\
    \ embeddings can be concatenated with those\\nobtained by GRL methods to enhance the topologically based\\nprediction\
    \ method with biological and contextual informa-\\ntion.\\nExample 8. To evaluate the behavior of the link prediction\\\
    napproaches on RNA-KG, we generated a view, named miR-\\nNAdisease , with 105 k nodes and 1 . 6 M edges that aims to\\\
    nrepresent the biological and functional context of miRNAs\\nby including their interactions with diseases, phenotypes,\
    \ epi-\\ngenetic changes, and genes. miRNAs and genes are enhanced\\nwith sequences, while diseases and phenotypes are\
    \ enhanced\\nwith ontological descriptions. Supplementary Fig. S1 reports\\ndetails on node distribution and edge cardinality\
    \ (only edges\\nwith more than 1 k occurrences are shown for the sake of read-\\nability).\\nTable 2 reports the balanced\
    \ accuracy on our view. We dis-\\ntinguish between homogeneous link prediction (denoted Hom ,\\npredicting the existence\
    \ of an edge, regardless of its type), het-\\n\\nEnhancing RNA-KG with Properties\\n11\\nTable 2. Link prediction results\
