    \ among the miRNA hsa-let-7a-\\n5p , the protein-coding gene CDC34 , and the small compound\\nmetformin (for simplicity,\
    \ labels are used instead of identi-\\nfiers). Node properties provide biological information to be\\n\\n6\\nCavalleri\
    \ et al.\\nFigure 4. Hierarchy of RNA molecules with associated properties.\\nFigure 5. Edge type distribution.\\nFigure\
    \ 6. Edge property distribution.\\n\\nEnhancing RNA-KG with Properties\\n7\\nFigure 7. Excerpt of an RNA-KG subgraph.\\\
    nexploited in downstream analyses. Species and descrip-\\ntion are associated with miRNAs and genes and facilitate\\nthe\
    \ disambiguation, curation, and filtering of nodes by or-\\nganism or functional role. Genomic coordinates and se-\\nquence\
    \ can support sequence-based analyses such as RNA-\\ntarget binding prediction, isoform comparison, and integra-\\ntion\
    \ with data coming from omic studies. Metformin is an-\\nnotated with attributes derived from the ChEBI ontology,\\nincluding\
    \ formula , SMILES , mass , and charge . Combin-\\ning these features with topological metrics (e.g. node degree,\\ncentrality,\
    \ closeness) enables chemo-informatics analyses that\\nintegrate chemical and network-based evidence to prioritize\\nmolecules.\\\
    nEdge properties enrich the semantics of interactions. The\\nedge regulates activityof between hsa-let-7a-5p, and\\nCDC34\
    \ includes the properties method , PubMedID , and\\nsource . These attributes assess the reliability of interactions\\\
    nand can be used in inter action-r anking applications [ 69 ] . The\\nedge hsa-let-7a-5p interacts with metformin presents\\\
    nthe context (i.e. the cancer cells where the interaction was\\nobserved) and the sources confirming the interaction.\
    \ Dur-\\ning views generation, this knowledge can be used to weigh\\ninteractions and prioritize them.\\nRNA-KG v2.0 also\
    \ integrates entity linking and ontology\\nnodes and edges (pink relations). hsa-let-7a-5p is linked\\nto its corresponding\
    \ SO class miRNA via a rdfs:subClassOf\\nrelation. This allows hierarchical querying in Cypher and the\\nretrieval of\
    \ entities based on their ontology categories. The SO\\nhierarchy includes links between ontology terms (e.g. miRNA\\\
    nand small regulatory ncRNA ) that can be used for rea-\\nsoning tasks. Furthermore, ontology nodes\\u2019 properties\
    \ (e.g.\\nlabel , description , and synonyms ) facilitate entity nor-\\nmalization, mapping, and semantic search.\"\n\
    \  },\n  {\n    \"name\": \"Results\",\n    \"text\": \"The Web portal and API\\nA web portal is available at https://RNA-KG.biodata.di.\\\
    nunimi.it and provides several facilities for working with RNA-\\nKG v2.0. As shown in Fig. 8 (a), the portal provides\
    \ a browsing\\ninterface for exploring the KG structure. Starting from a node\\nof the graph, it is possible to expand\
    \ the visualization with\\nits neighboring nodes and see the properties associated with\\nnodes and edges. Moreover, through\
    \ the interface in Fig. 8 (b),\\nthe user can generate a customized view by specifying the kind\\nof nodes and edges to\
    \ be included. Customized and predefined\\nListing 1. API JSON response for the EZR-201 transcript.\\nviews (prepared\
    \ by our team) can also be downloaded in CSV\\nformat from the web portal. RNA-KG v2.0 is also accessi-\\nble via a RESTful\
    \ API. The API exposes endpoints to retrieve\\nthe properties of a given entity, incoming and outgoing rela-\\ntionships\
    \ for an entity, to run Cypher queries on the Neo4j\\ndatabase, and to access metadata and schema-level informa-\\ntion.\
    \ It also supports filtering options (e.g. for RNAcentral-\\nderived relationships or for including/excluding specific\
    \ fields)\\nand provides JSON-formatted responses, making it easier to\\nintegrate with other tools.\\nExample 2. Suppose\
    \ we are interested in the Ensembl tran-\\nscript EZR-201 (with identifier ENST00000337147). The\\nfollowing API can be\
    \ inv ok ed to obtain the JSON in Listing 1\\nwith the genomic coordinates, description, and sequence.\\nhttps://rna-kg.biodata.di.unimi.it/api/v1/\\\
    nnode/id?node _ id=ENST00000337147&node _ id _\\nscheme=Ensembl\\nThe RNA-KG v2.0 API also enables the retrieval of topo-\\\
    nlogical information, sequence-based evidence, and node- and\\nedge-level properties of an RNA molecule to prioritize\
    \ the\\nmost promising candidates for experimental validation.\\nExample 3. T he following API call makes easy to prioritize\\\
