    \ multimodal\\nvariants ( MHom and MHet ). DNABERT was used to embed\\nsequences and BioBERT for descriptions. We concatenated\\\
    nthese embeddings with those produced by LINE, node2vec\\n( n2v ), and TransE.\"\n  },\n  {\n    \"name\": \"Results confirm\
    \ that node2vec outperforms LINE and\",\n    \"text\": \"TransE in homogeneous prediction; TransE outperforms\\nLINE and\
    \ node2vec in heterogeneous link prediction tasks\\nwhen more than one edge type is present at sc hema-lev el (i.e.\\\
    nmiRNA-gene and miRNA-disease). TransE ac hiev es better re-\\nsults by disambiguating the four semantically distinct\
    \ edge\\ntypes between miRNAs and diseases. Finally, the multi-modal\\napproac h improv es the performance in 9 out of\
    \ 15 cases for\\nthe homogeneous link prediction task and in 8 cases for the\\nheterogeneous task (highlighted in bold),\
    \ with gains up to\\n+ 5% in balanced accuracy observed for RNA-gene predic-\\ntions in both LINE and TransE. Supplementary\
    \ material re-\\nports the used parameters.\\nTime-stratified link prediction.\\nA key property introduced in RNA-KG 2.0\
    \ is the PubMed\\nidentifier of scientific articles that support the existence of rela-\\ntions among bio-entities ( 14\
    \ . 3 M edges have been annotated).\\nFrom these identifiers, we can extract the publication year that\\ncan be exploited\
    \ for observing the content of the KG at differ-\\nent instants of time.\\nExample 9. To show the relevance of the publication\
    \ date\\nwhen c hec king for new advancements on regulatory RNA\\nmolecules for the development of new therapies and vaccines,\\\
    nwe extr acted inter actions from RNA-KG involving miRNA,\\ngene, diseases, phenotypes, and epigenetic modifications.\
    \ They\\nare supported by 52 k PubMed articles that we grouped to-\\ngether relying on the year of publication. Starting\
    \ from the\\ngraphical distribution of articles per year reported in Fig.\\n10 , w e can observ e that more than 84% of\
    \ the relations\\nw ere discov ered after 2019, the y ear mar king the emergence\\nof COVID-19 and a subsequent surge\
    \ in RNA-related studies.\\nTime-stratified link prediction can be realized by training\\nmodels with the knowledge available\
    \ up to a given instant of\\nFigure 10. Distribution of articles per year in miRNAdisease .\\ntime and then evaluate their\
    \ ability to predict links discovered\\nlater. KG quality can be validated through this approach, as\\nit is expected\
    \ to support the discovery of future knowledge\\nbased on past evidence.\\nExample 10. To validate the miRNAdisease view\
    \ using a\\ntime-stratified scenario, we trained a ML model on its relations\\nsupported by articles published before\
    \ 2022. Interactions dis-\\ncovered after 2022 are used as a test set. These links repre-\\nsent knowledge that w as not\
    \ av ailable at training time and to\\nwhic h w e aim to assign high probability scores. The model has\\nbeen conceived\
    \ through node2vec embeddings coupled with a\\nRF classifier, following our link prediction pipeline [ 24 ] .\\nFig. 11\
    \ reports the distributions of probability scores for\\ninteractions involving miRNA molecules in the test set. Re-\\\
    nsults show that 82% of the predicted links ac hiev e prediction\\nscores well above 0.5 (highlighted in red), with median\
    \ scores\\nexceeding 0.6. The boxes corresponding to years 2023 and\\n2024 appear wider, possibly due to a larger number\
    \ of novel\\ninteractions and/or increased variability in their nature. This\\nsuggests that the KG can support meaningful\
    \ predictive infer-\\n\\n12\\nCavalleri et al.\\nFigure 11. node2vec probabilities for relations discovered after 2022.\\\
    nence, as the model can anticipate future associations relying\\non prior evidence.\\nHypothesis generation through RNA-KG\\\
    nRNA-KG v2.0 facilitates the generation of new, testable bi-\\nological hypotheses by integrating molecular interaction\
    \ and\\nsequence information, allowing researchers to identify candi-\\ndate molecules, regulatory mechanisms, and disease\
    \ associa-\\ntions for further investigation.\\nExample 11. Using the API call of Example 2, we discover\\nthe existence\
    \ of a siRNA sequence ( https:// web.mit.edu/ sirna/\\nsequences/results-1061.html) that represses EZR-201 with a\\nreported\
    \ knockdown percentage of 70\\u201380%. The presence of\\na siRNA targeting the transcript may contribute to hypothesis\\\
    ngeneration in two wa ys: (i ) anal yzing the siRNA sequence can\\nguide the design or discovery of novel siRNAs or ASOs\
    \ with\\nstronger regulatory effects; (ii ) using the RNAcentral \\u2018Search\\u2019\\ntool, this siRNA is found to share\
    \ similarity with four poorly\\ncharacterized human sRNAs, potentially worth further inves-\\ntigation. Interestingly,\
    \ these sRNAs interact with several lncR-\\nNAs in RNA-KG.\\nML models trained on RNA-KG can be used to generate\\nhypotheses\
    \ by predicting novel RNA\\u2013disease associations that\\nare not documented in RNA-KG. Articles associated with can-\\\
    ndidate RNAs can be explored through the RNAcentral \\u2018Pub-\\nlications\\u2019 tab to assess involvement in diseases\
    \ of interest.\\nExample 12. Using a node2vec + RF model trained on the\\nmiRNAdisease view, we infer that hsa-miR-345-5p\
    \ is as-\\nsociated with ovarian cancer with a prediction score of 0.80.\\nAlthough this association is not represented\
    \ in RNA-KG, a\\nresearcher finds that this claim is supported by the literature\\nusing the RNAcentral \\u2018Publications\\\
    u2019 tab with \\u2018ovarian cancer\\u2019\\nas filter. Experimental studies can be prioritized based on the\\ninv olv\
    \ ement of this miRNA in ovarian cancer over other can-\\ndidate miRNAs/diseases.\\nIntegr ating RN A-KG with external\
    \ -omics sources\\nSeveral types of analyses can be performed by integrating\\nthe information available in RNA-KG and\
    \ other -omics data\\nsources, leveraging the provided API. Such integration enables\\nthe combination of structural,\
    \ functional, interaction-based,\\nexpression, and literature-derived facts about RNA molecules,\\nwhich are often not\
    \ available in a single resource.\\nUsing the recent integration of RNA-KG relationships in\\nthe RNAcentral portal [\
    \ 19 ], a biologist interested in a spe-\\ncific molecule, such as the human microRNA hsa-miR-183-5p\\ninvolved in cancer\
    \ progression, can visually explore its inter-\\naction network through the RNAcentral \\u2018Relationships\\u2019 tab\\\
    n(highlighted in red in Fig. 12 ). From this view, rapid hypoth-\\nesis generation can be performed without requiring\
    \ API calls\\nor programming skills.\\nMoreover, additional mRNA interactions from IntAct [ 88 ],\\nconserved sequence\
    \ annotations, RNA editing annotations\\nfrom REDIportal, and functional GO annotations can be eas-\\nily accessed and\
    \ integrated with the interactions contained in\\nRNA-KG. Cross-referencing these annotations compensates\\nfor information\
    \ intentionally omitted from RNA-KG to re-\\nduce the graph size (e.g. A-to-I editing events would dominate\\nthe graph\
    \ structure if represented as relationships), allowing\\ntheir retrieval \\u2018on-the-fly\\u2019 only when actually needed.\\\
    nFurthermore, the RNAcentral \\u2018Search\\u2019 tool can be used to\\nretrieve candidate ASO, siRNA, and miRNA sequences,\
    \ ex-\\npanding sets with conserved homologs or natural counter-\\nparts similar to synthetic inputs. By cross-referencing\
    \ these\\nsequences with RNA-KG relationships, researchers can as-\\nsess potential participation in regulatory networks,\
    \ interac-\\ntions with disease targets, or shared functional annotations,\\nhelping prioritize candidates for experimental\
    \ validation or\\ntherapeutic design.\\nFinally, additional RNAcentral functionalities (e.g. the new\\n\\u2018Gene\\u2019\
    \ tab, expression profiles across tissues from Expres-\\nsion Atlas [ 27 ] accessible within the \\u2018Expression\\u2019\
    \ tab, Lit-\\nSumm [ 89 ], R2DT [ 90 ]) and complementary prediction tools\\n(e.g. DIANA-microT) can be exploited to further\
    \ enrich the\\ncharacterization of RNA molecules, providing insights into\\nfamily relationships, structural and expression\
    \ features, and\\npredicted binding sites and binding types (e.g. 6mer, 9mer).\\nThese data can also be incorporated into\
    \ multimodal ML\\nmodels to complement interaction- and property-based evi-\\ndence, similarly to what has been done in:\
    \ (i ) MMnc [ 91 ],\\nwhich proposes a deep-learning framework that classifies non-\\ncoding RNAs into functional groups\
    \ by leveraging sequences,\\nsecondary structures, and expression profiles; (ii ) MolFM\\n(Multimodal Molecular Foundation\
    \ Model [ 92 ]), which inte-\\ngrates molecular structure, biomedical literature, and KG data\\nthrough a cross-modal\
    \ attention mechanism for performing\\nproperty prediction, drug\\u2013target interaction prediction, and\\nmolecule\\\
    u2013text retrieval; and (iii ) M2REMAP [ 93 ], which em-\\nbeds chemical structures, patient records, and drug\\u2013disease\
    \ re-\\nlationships to prioritize molecule\\u2013disease associations.\\nExample 13. Suppose a biologist wishes to extract\
    \ a subnet-\\nw or k of lncRNA\\u2013miRNA interactions associated with cancer-\\nrelated processes and identify a molecular\
    \ relationship be-\\ntween the lncRNA TSIX and the miRNA hsa-miR-155-\\n5p . This interaction, imported from LncBase [\
    \ 94 ] and char-\\nacterized by a DIANA-microT score of 0.82, indicates a high-\\nconfidence for playing a role in post-transcriptional\
    \ regulation\\nrelevant to oncogenic mechanisms, and thus warrants further\\nexperimental validation. To enrich this relationship\
    \ with con-\\ntextual biological evidence, complementary data can be re-\\ntrieved from external sources. For example,\
    \ RNAcentral pro-\\nvides conserved sequence motifs for both molecules and a tex-\\ntual summary for TSIX , while REDIportal\
    \ characterizes RNA\\nediting events occurring on the sequence of TSIX and that may\\naffect the binding affinity between\
    \ them.\\n\\nEnhancing RNA-KG with Properties\\n13\\nFigure 12. RNAcentral \\u2018Relationships\\u2019 tab for hsa-miR-183-5p\
    \ .\\nFig. 13 shows the pipeline for integrating this complemen-\\ntary evidence within the subgraph extracted from RNA-KG.\\\
    nMotifs and editing events are modeled as nodes connected to\\nTSIX and hsa-miR-155-5p through the relationship char-\\\
    nacteristic of part of (annotated with the nucleotide interval\\nwhere the motif occurs e.g. \\u20181\\u201323\\u2019)\
    \ and involved in (annotated\\nwith the positions of editing events e.g. \\u20181828\\u2019, \\u20181840\\u2019). More-\\\
    nover, introducing a property to the TSIX node with the text\\n\\u2018 TSIX is a non-coding RNA that plays a crucial role\
    \ in the\\nregulation of X chromosome inactivation, particularly by re-\\npressing the expression of its antisense transcript\
    \ XIST. It is\\ninvolved in a complex regulatory network where its expres-\\nsion can be influenced by factors such as\
    \ REX1 and OCT4.\\u2019,\\nreinforces the hypothesis that TSIX participates in complex\\npost-transcriptional netw or\
    \ ks and interact with specific miR-\\nNAs.\\nThe integrated subgraph can be generated \\u2018on-the-fly\\u2019 and\\\
    nlever aged to acceler ate hypothesis gener ation by assessing\\nwhether interactions are consistent with known regulatory\\\
    nmec hanisms suc h as the sponge-lik e function of lncRNAs in\\nmiRNA-mediated regulation (ceRNA). This supports the pri-\\\
    noritization of the most plausible candidates for experimen-\\ntal validation. Finally, the enriched subgraph can serve\
    \ as\\ninput for downstream ML models that encode topological,\\nsequence-, text-, and event-based features, injecting\
    \ further\\ncontext into RNA\\u2013RNA interaction prediction and improv-\\ning explainability of inferred relationships.\"\
    \n  },\n  {\n    \"name\": \"Discussion\",\n    \"text\": \"In this paper, we presented the new characteristics of the\
    \ en-\\nhanced version of RNA-KG. It now contains properties as-\\nsociated with bio-entities and their interactions that\
    \ can be\\nexploited for various kinds of analysis and research activities.\\nWe described various use cases that leverage\
    \ the new informa-\\ntion contained in this version of the system. The KG is pub-\\nlicly accessible, can be easily queried,\
    \ and is integrated in the\\nRNAcentral portal.\\nWe are currently working on enhancing RNA-KG in dif-\\nferent directions.\
    \ While the current version focuses on human\\nmolecules, entities and relationships from other species should\\nbe included,\
    \ along with additional information extracted from\\nexternal sources. This expansion will increase the RNA-KG\\ncoverage\
    \ and enable comparative and cross-species analyses.\\nThe use of automatic techniques to incorporate additional\\nfacts\
    \ into RNA-KG may propagate errors already present in\\nthe original sources. In future work, we plan to adopt anomaly\\\
    ndetection techniques [ 95 ] for KGs to prevent the introduction\\nof potential false-positive relationships. Moreover,\
    \ RNA-KG\\nis static while biological networks are context-dependent and\\nrelationships among molecules often hold only\
    \ within spe-\\ncific subsystems (e.g. n-ary interactions such as ceRNA mecha-\\nnisms) or temporal windows. Incorporating\
    \ temporal dimen-\\nsions and contextual constraints would allow modeling dy-\\nnamic changes in RNA interactions. To\
    \ further enhance rela-\\ntionship representation, a hypergraph model should be used.\\nThe integration of external -omics\
    \ or predictive resources\\nmay require additional normalization and mapping efforts.\\nAlthough many lookup tables are\
    \ provided to support this\\nprocess, they are static and must be regularly updated to re-\\nflect evolving identifiers\
    \ and naming conventions. The devel-\\nopment of an RNA ontology could mitigate this limitation by\\nproviding an up-to-date\
    \ mapping framework.\\nThe presence of an ontology is of paramount importance\\nfor the description of the characteristics\
    \ of coding and non-\\ncoding RNA molecules. However, the current tentative pro-\\nposals do not take the heterogeneity\
    \ of identification schemes\\nacross RNA sources into account, do not provide mapping\\n\\n14\\nCavalleri et al.\\nFigure\
    \ 13. Example of data integration pipeline in v olving relationships from RNA-KG v2.0.\\nrules between identification\
    \ systems, and do not include prop-\\nerties that characterize RNA molecules (e.g. sequences, struc-\\ntures, and descriptions).\
    \ Moreover, they fail to capture recent\\nadvancements in RNA research. The Non-Coding RNA On-\\ntology (NCRO [ 96 ])\
    \ was published over eight years ago and\\nfocuses on the classification of non-coding RNA molecules\\nwith an emphasis\
    \ on representation of the over 2 k human\\nstem-loop miRNAs. However, cross-references are not up-\\nto-date and relevant\
    \ properties (like the sequence) are not\\nprovided. NCRO also lacks representation of other ncRNA\\nmolecules (e.g. lncRNA,\
    \ circRNA) now recognized as pivotal\\nin therapeutic and diagnostic contexts. The RNA Ontology\\n(RNAO [ 97 ]) was published\
    \ more than fifteen years ago and\\nfocuses on 3D RNA structures, including classes about bio-\\nchemical and molecular\
    \ types but does not include RNA se-\\nquences, limiting its utility in sequence-specific applications.\\nFor these reasons,\
    \ we would like to develop a new ontol-\\nogy that leverages the knowledge contained in RNA-KG v2.0\\nand complements\
    \ existing RNA sequence repositories such as\\nRNAcentral and Ensembl by providing an ontological repre-\\nsentation of\
    \ RNA transcripts. The new \\u2018Gene\\u2019 feature recently\\nintroduced in RNAcentral already moves in this direction,\
    \ as\\nit clusters similar transcripts into gene-level entries with their\\nown identifier. Such structured information\
    \ could serve as a\\nfoundation for building the new RNA ontology and better\\nannotate many experiments about RNA interactions\
    \ that op-\\nerate at the gene level rather than the transcript level.\\nA c kno wledg ements\\nThis research was in part\
    \ supported by the \\u2018National Cen-\\nter for Gene Therapy and Drugs based on RNA Technology\\u2019,\\nPNRR-NextGeneration\
    \ EU program [G43C22001320007],\\nand in part by the MUSA - Multilayered Urban Sustainabil-\\nity Action - Project, funded\
    \ by the PNRR-NextGeneration EU\\nprogram ([G43C22001370007], Code ECS00000037). The\\nauthors wish to thank Prof. Giorgio\
    \ Valentini for mentoring\\nus in the \\u2018RNA world\\u2019 and Dr. Blake Sweeney for his valuable\\ncomments on the\
    \ use cases presented in this paper. We also\\nthank the anonymous reviewers whose insightful comments\\nhelped improve\
    \ the quality of the manuscript.\"\n  },\n  {\n    \"name\": \"Author contributions : E.C. and M.M. conceived the experi-\"\
    ,\n    \"text\": \"ment(s), E.C. conducted the experiment(s), E.C. and P .P . devel-\\noped the RNA-KG web portal, E.C.\
    \ and M.M. analysed the re-\\nsults. E.C., P .P ., and M.M. wrote and reviewed the manuscript.\"\n  },\n  {\n    \"name\"\
    : \"Supplementary data\",\n    \"text\": \"\"\n  },\n  {\n    \"name\": \"Supplementary data is available at NAR Genomics\
    \ & Bioin-\",\n    \"text\": \"formatics online.\\nConflict of interest\\nNone declared.\"\n  },\n  {\n    \"name\": \"\
    Funding\",\n    \"text\": \"This research was in part supported by the \\u2018National Cen-\\nter for Gene Therapy and\
    \ Drugs based on RNA Technology\\u2019,\\nPNRR-NextGeneration EU program [G43C22001320007],\\nand in part by the MUSA\
    \ - Multilayered Urban Sustainabil-\\nity Action - Project, funded by the PNRR-NextGeneration EU\\nprogram ([G43C22001370007],\
    \ Code ECS00000037).\"\n  },\n  {\n    \"name\": \"Data availability\",\n    \"text\": \"The new release of RNA-KG is\
    \ stored as a property graph\\ndatabase. A web portal is available at https://RNA-KG.\\nbiodata.di.unimi.it and provides\
    \ several facilities for work-\\ning with RNA-KG v2.0, and a public Neo4j query endpoint\\nhas been realized and made\
    \ available at https://neo4j.biodata.\\ndi.unimi.it with username and password rnakgv20 . Data\\nand code for reproducing\
    \ experiments are available in Zen-\\nodo and GitHub at the links: https:// doi.org/ 10.5281/ zenodo.\\n10078876 ; https://\
    \ github.com/ AnacletoLAB/ RNA-KG . The\\nGitHub repository provides Python scripts and Jupyter note-\\nbooks (stored\
    \ in the notebooks directory) to process from\\nscratch the 91 linked open data repositories and ontologies\\nthat compose\
    \ the current release of RNA-KG. These scripts\\ncan be applied to process similar sources, and the GitHub\\nrepository\
    \ can be used to suggest new data providers to our\\nteam via the Issues tab. Code is available for each of the fol-\\\
    nlowing KG construction steps: (i ) Download, clean, and merge\\nthe 11 ontologies describing RNA-KG v2.0 schema (ontolo-\\\
    ngies are processed according to PheKnowLator\\u2018s implementa-\\ntion of OWL-NETS [ 12 , 66 ]); (ii ) define and generate\
    \ lookup\\ntables for normalizing entities according to standard identi-\\n\\nEnhancing RNA-KG with Properties\\n15\\\
    nfiers; (iii ) process entities, relationships, and their properties\\nfrom the 80 linked open data repositories. Finally,\
    \ a bash com-\\nmand is provided to import the generated files ( nodes.csv and\\nedges.csv ) into a Neo4j server storage.\\\
    nThe Zenodo repository provides: (i ) descriptive statis-\\ntics about RNA-KG v2.0, (ii ) a copy of the intermediate\\\
    nnodes.csv and edges.csv files to reduce the need for re-\\nrunning the entire pipeline, (iii ) a Neo4j dump of the full\\\
    ndatabase, and (iv ) a resources.zip archive containing addi-\\ntional intermediate files relevant for constructing the\
    \ KG. The\\nlatter may be particularly useful for reusing pre-processed\\nlookup tables (e.g. ones involving RNAcentral\
    \ or OBO on-\\ntologies identifiers) and building other biomedical KGs from\\nscratch.\"\n  },\n  {\n    \"name\": \"\
