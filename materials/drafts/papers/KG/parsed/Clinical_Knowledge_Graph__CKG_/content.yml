    \ These analyses are predefined using configuration files\\nthat break down the steps of the complete analysis workflow\
    \ in a\\nstandardized, flexible and scalable manner. They describe the input\\ndata, the analysis to be performed and\
    \ the parameters to be used as\\nwell as how the results are visualized. The final report is then the\\nsequence of created\
    \ visualizations for each data type divided into\\ndifferent tabs in the dashboard (plots and tables).\\nApart from being\
    \ viewable in the browser, all reports, analy-\\nsis results and visualizations can be downloaded as a single com-\\npressed\
    \ file containing tables and figures in ready-to-publish\\nformat. Moreover, they are also available in hierarchical data\
