    \ This design\\nfacilitates continuous integration of newly developed analyses and\\nvisualizations (Supplementary Fig.\
    \ 4). Furthermore, configuration\\nfiles can be shared, which fosters transparency and facilitates repli-\\ncability and\
    \ reproducibility.\\nAutomated CKG analysis for liver disease biomarker discovery.\\nTo show how CKG accelerates and extends\
    \ both the analysis and\\ninterpretation of the data, we use its default pipeline on a proteomics\\nstudy of nonalcoholic\
    \ fatty liver disease (NAFLD)41 (Fig. 3).\\nFor the clinical data, the CKG default analysis pipeline automati-\\ncally\
    \ summarized clinical characteristics of the cohort and high-\\nlighted variables with significant variances between the\
    \ studied\\ngroups (healthy and normal glucose tolerance (NGT), type 2 dia-\\nbetes (T2D), NGT with NAFLD and T2D with\
    \ NAFLD and cirrho-\\nsis). This confirmed significant differences in the levels of the liver\\nenzymes alanine aminotransferase,\
    \ aspartate aminotransferase and\\nalkaline phosphatase measurement or hemoglobin A1c (HbA1c),\\namong others.\\nThe proteomics\
    \ default analysis started with an overview of the\\nidentified peptides and proteins as well as a detailed summary of\\\
    ndescriptive statistics of the proteomics data matrix. The CKG con-\\ntinued with a visualization of proteome coverage,\
    \ dynamic range,\\nprotein coefficients of variation (CVs) among samples and sample\\nquality control based on known tissue\
    \ quality markers42. These\\nrankings were automatically annotated with curated information\\nmined from the knowledge\
    \ graph, in this case highlighting mark-\\ners already used in the clinic linked to NAFLD or cirrhosis\\n(Supplementary\
    \ Fig. 5).\\nThe default data analysis uses principal component analysis to\\nreduce the dimensionality of features for\
    \ an overview of the data.\\nANOVA with post hoc tests then determines statistically signifi-\\ncant differences across\
    \ all studied groups and between particular\\npairs of groups (post hoc analysis). Post hoc tests are presented as\\ninteractive\
    \ volcano plots, with information about upregulated and\\ndownregulated proteins with a predefined significance threshold\\\
    n(that is, fold change > 2 and false discovery rate (FDR)\\u2009<\\u20090.05) (Fig.\\n3a). The CKG automatically reproduced\
    \ our previous results show-\\ning dysregulation of proteins involved in immune system regulation\\nand inflammation,\
    \ such as C7, JCHAIN, PIGR and A2M, a known\\nmarker of liver fibrosis for which CKG reported 14 publications,\\nconfirming\
    \ this connection. In addition, the CKG highlighted the\\nTTR-RBP complex (TTR and RBP4) as downregulated in patients\\\
    nwith cirrhosis compared to healthy individuals. This complex is\\ninvolved in retinoid metabolism, whose dysregulation\
    \ is linked to\\nhepatic diseases and alteration of the extracellular matrix deposi-\\ntion, leading to fibrosis43. Furthermore,\
    \ the report revealed litera-\\nture and database associations among the regulatory role of CD5L\\nand cirrhosis, hepatocellular\
    \ carcinoma and other liver diseases44.\\nThese metabolically interesting findings were missed in our man-\\nual analyses\
    \ but were prioritized by the CKG\\u2019s automated pipeline,\\nwhich extracted significantly regulated proteins in the\
    \ different\\nconditions. To visualize correlated protein changes as a network,\\nthe default analysis connected proteins\
    \ with significant associations\\n(Pearson correlation coefficient > 0.5 and FDR\\u2009<\\u20090.05). Using the\\nLouvain\
    \ algorithm to detect clusters of highly correlating proteins45\\nrevealed potentially clinically relevant connections,\
    \ such as an asso-\\nciation of a cluster composed by PIGR, and DPP4 and TGFBI with\\nliver fibrosis. The background knowledge\
    \ of millions of protein\\ninteractions enabled the CKG to identify six main clusters grouping\\nextracellular matrix\
    \ remodelers, complementary components and\\ninflammation markers, which connected two of the candidate bio-\\nmarkers\
    \ (PIGR and JCHAIN).\\nAssociating the differentially regulated proteins to drugs, dis-\\neases and publications and to\
    \ enriched biological processes and\\npathways identified additional dysregulated pathways in NAFLD\\nthat were overlooked\
    \ in our previous analysis. These included \\u2018reg-\\nulation of insulin-like growth factor (IGF-1) transport\\u2019\
    \ and \\u2018uptake\\nby insulin-like growth factor binding proteins (IGFBPs)\\u2019, which\\nwere linked to changes in\
    \ IGFBP3 acid-labile subunit (IGFALS).\\nNotably, such associations have recently been investigated for\\ncausal relationships\
    \ and therapeutic potential in NAFLD46,47.\\nThe CKG also reported protein\\u2013disease associations, indicating\\npossible\
    \ shared disease mechanisms with liver cancer, hepatitis and\\npancreas disease.\\nThe presence of various data types\
    \ in the project triggered the\\ndefault multi-omics analysis pipeline. In a global clinical proteomics\\ncorrelation\
    \ analysis48, clinical liver enzyme values clustered with\\nHbA1c, fasting glucose levels and several candidate biomarkers\\\
    nof liver fibrosis and cirrhosis (such as PIGR, TGFBI, ANPEP and\\nC7) (Fig. 3b). The CKG also used WGCNA to obtain modules\
    \ of\\nco-expressed proteins instead of individual proteins that are related\\nto clinical variables (Fig. 3c).\\nFinally,\
    \ the automated analysis pipeline summarized all clinical,\\nproteomics and multi-omics analyses as a graph with all the\
    \ regu-\\nlated proteins and the relationships extracted from the knowledge\\ngraph (such as diseases, drugs, interactions\
    \ and pathways) using\\nbetweenness centrality to prioritize and reduce the number of nodes\\npresented (Fig. 3d).\\nThe\
    \ entire default pipeline took less than 5 min but captured\\nbasically all insights gleaned from our previous manual\
    \ analysis,\\nwhich had taken weeks. The interpretation of the differentially\\nabundant proteins had comprised time-consuming\
    \ literature and\\ndatabase searches for known/published protein\\u2013disease associa-\\ntions and knowledge gathering41,\
    \ but the CKG revealed them to be\\nto be incomplete.\\nCKG enables multi-proteomics data integration for cancer bio-\\\
    nmarker discovery and validation. To explore the multi-analysis\\ncapabilities of the CKG, we reanalyzed a recent study\
    \ in which we\\nidentified cancer/testis antigen family 45 (CT45) as a biomarker for\\nlong-term survival in ovarian serus\
    \ adenocarcinoma and described\\nits mode of action3. Multi-dimensional proteomics, phosphopro-\\nteomics and interactomics\
    \ were modeled as different connected\\nprojects in the CKG and analyzed independently using the default\\nanalysis adapted\
    \ to each data type (proteomics, interactomics and\\nphosphoproteomics). The CKG reproduced CT45 as significantly\\nhigher\
    \ expressed in patients with long-term remission after chemo-\\ntherapy (Fig. 4a,b). The CKG also confirmed that there\
    \ was virtually\\nno previous knowledge about cellular roles and functions of CT45\\nbut produced 24 potential interactors\
    \ of CT45, four of them belong-\\ning to the PP4 complex and contributed by a human interaction\\nmap49 (Fig. 4c).\\nThe\
    \ PP4 complex has been linked to DNA damage repair50, which,\\ntogether with the fact that patients had undergone chemotherapy\\\
    ninducing DNA interstrand crosslinks, prompted us to investigate\\nthe phosphoproteome in cell line models3. The CKG\\\
    u2019s default analyis\\nof the signaling response of CT45-expressing cells versus controls\\nindeed revealed activation\
