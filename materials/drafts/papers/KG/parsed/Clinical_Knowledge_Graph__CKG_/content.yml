    \   \"text\": \"intelligence for proteomics and biomarker discovery. Cell Syst. 12,\\n759\\u2013770 (2021).\\nPublisher\\\
    u2019s note Springer Nature remains neutral with regard to jurisdictional claims in\\npublished maps and institutional\
    \ affiliations.\\nOpen Access This article is licensed under a Creative Commons\\nAttribution 4.0 International License,\
    \ which permits use, sharing, adap-\\ntation, distribution and reproduction in any medium or format, as long\\nas you\
