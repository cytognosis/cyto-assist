    nLung\\ncancer\\nO\\nH\\nN\\nN\\nH\\nOH\\nO\\nOH\\nO\\nO\\nN\\nH\\nN\\nH3C\\nCH3\\nCH3\\nH3C\\nH\\nFig. 5 | CKG helps\
    \ to prioritize alternative treatments. a, Re-analysis of Doll et al.2 resulted in more than 300 significantly regulated\
    \ proteins differentially\\nexpressed in uracal carcinoma, and the analysis was then extended to prioritize candidate\
    \ drug targets and treatments. b, Simplified representation of the\\nmajor steps included in the extended downstream analysis.\
    \ The pipeline mined the CKG database to identify upregulated proteins known to be linked to the\\nstudied disease, found\
    \ inhibitory drugs for these proteins, retrieved reported side effects and ultimately identified possible combinations\
    \ of the prioritized\\ndrugs based on co-mentioning in scientific literature. A Jupyter notebook with the complete analysis\
    \ pipeline to prioritize candidate treatments can be\\nfound in notebooks/reporting, with the name Urachal Carcinoma Case\
    \ Study.ipynb. LC\\u2013MS/MS, liquid chromatography with tandem mass spectrometry.\\nNature Biotechnology | VOL 40 |\
    \ May 2022 | 692\\u2013702 | www.nature.com/naturebiotechnology\\n699\\n\\nArticles\\nNaTUre BIoTeCHnoloGy\\nhighlights\
    \ several inflammation processes and connections to amy-\\nloidosis that had previously escaped our attention (Supplementary\\\
    nFig. 7). Next, the CKG analyzed three studies external to our\\ngroup, starting with a longitudinal COVID-19 Olink dataset\
    \ where\\nwe reproduced the results comparing COVID-19-positive and\\nCOVID-19-negative61 and also investigated proteomic\
    \ differences\\nbetween the severity groups within the cohort. This analysis high-\\nlighted upregulation in proteins\
    \ such as IL-6, IL-17C, CXCL10\\nand CCL7, among others, that generally increased with severity\\nand shows that CKG is\
    \ not limited to MS-based proteomics data.\\nA medulloblastoma multi-level proteomics dataset reanalyzed a\\ntandem mass\
    \ tag proteomics dataset and employed similarity net-\\nwork fusion to integrate proteomics, PTMs and RNA sequencing\\\
    ndata to reveal medulloblastoma subgroups as well as the features\\nthat drive these subgroups (Supplementary Table 5)62.\
    \ Finally, in\\nour reanalysis of the CPTAC glioblastoma discovery study (https://\\ncptac-data-portal.georgetown.edu/study-summary/S048),\
    \ we used\\nthe knowledge graph to explore possible drug inhibitors for the list\\nof significantly upregulated proteins\
    \ found when comparing tumor\\nand normal brain tissue (Supplementary Table 6). This exploratory\\nanalysis connected\
    \ many of the upregulated proteins in tumors to\\npirfenidone, a drug generally used for idiopathic pulmonary fibrosis\\\
    nknown to inhibit TGF-\\u03b2 signaling, a pathway de-regulated in malig-\\nnant gliomas, and also to reduce the tumor\
    \ extracellular matrix63,64.\\nAll these notebooks are part of the CKG\\u2019s code repository and docu-\\nmentation and\
    \ can be visualized at https://CKG.readthedocs.io/en/\\nlatest/advanced_features/ckg-notebooks.html.\"\n  },\n  {\n  \
    \  \"name\": \"Discussion\",\n    \"text\": \"The CKG represents prior knowledge, experimental data and\\nde-identified\
    \ clinical patient information in a large network. It har-\\nmonizes proteomics data with all this information using a\
    \ graph\\nstructure that naturally provides immediate connections to the\\nidentified proteins. We found that its automated,\
    \ instantaneous\\nand iterative nature helps in revealing pertinent biological con-\\ntext for better understanding and\
    \ generation of new hypotheses.\\nFurthermore, the graph structure provides a flexible data model\\nthat is easily extendable\
    \ to new nodes and relationships. Although\\nthe CKG was particularly designed for answering clinically relevant\\nquestions,\
    \ it is equally applicable to other organisms and to any bio-\\nlogical study65.\\nThe CKG\\u2019s analytics core has\
    \ an open modular design fully\\nimplemented in Python, exploiting open-source libraries that are\\nwidely employed and\
    \ well maintained and that cover a broad data\\nscience ecosystem: statistics, network analysis, machine learning\\nand\
    \ visualization. Using these libraries ensures the quality, robust-\\nness and efficiency of the underlying algorithms\
    \ and methods.\\nIt also enables incorporation of new developments in data science,\\nwhich can quickly be adapted to\
    \ specifically support proteomics\\ndata analysis. Increasing concerns about reproducibility of scien-\\ntific results66,67\
    \ are also addressed by the CKG. We employ Jupyter\\nnotebooks to generate shareable analysis pipelines that make results\\\
    nreproducible and replicable and envision widespread adoption of\\nthis framework by the proteomic community and beyond.\\\
    nTo stimulate the adoption of the CKG, we integrated\\ncommunity-developed standards, such as mzTab and the Sample\\nand\
    \ Data Relationship Format (SDRF)68, for metadata, as well as\\nmultiple proteomics data formats generated by commercial\
    \ or\\nopen-source software. Furthermore, the CKG\\u2019s modular design\\nfacilitates changing these formats and the\
    \ incorporation of new\\nones. This flexibility ensures that the CKG will be able to follow\\nan ever-expanding and active\
    \ MS-based proteomics community as\\nwell as other omics initiatives.\\nThe different components of the CKG allow individual\
    \ research\\ngroups to analyze, integrate and build a database of their proteomics\\nand other omics projects. Reports\
    \ and notebooks can readily be\\nshared to replicate the analyses, thereby contributing to reproduc-\\nible science (Fig.\
    \ 6a). Beyond this, the open nature and free availabil-\\nity of the CKG could allow the aggregation of data and knowledge\
    \ in\\nwhat we term a community graph (Fig. 6b). This would ensure that\\nthe community benefits from similar proteomics\
    \ or omics projects\\nperformed elsewhere. For biomarker discovery, this constitutes an\\nextension of the \\u2018rectangular\
    \ strategy\\u201969, allowing direct and deep\\nproject comparison and leading to increasingly more robust and\\npowerful\
    \ analysis and knowledge generation.\\nWe envision that different groups and institutions will have their\\nown local\
    \ version of the CKG, protecting the sensitive nature of\\nhealthcare data, but in a way that still enables cross-platform\
    \ analy-\\nses. New approaches, such as differential privacy and federated\\nlearning70,71, would allow researchers to\
    \ use the CKG to train models\\niteratively across institutions without direct access to the sensitive\\ndata (Fig. 6c).\
    \ Artificial intelligence is set to play an increasing role\\nin MS-based proteomics and biomarker discovery72, and we\
    \ look\\nforward to integrating the CKG with these capabilities as well as\\ntaking advantage of novel graph deep learning\
    \ capabilities.\\nIn conclusion, we describe the CKG, an open, robust framework\\nfor transparent, automated and integrated\
    \ analysis of proteomics\\nand multi-level omics data, designed to incorporate all the prereq-\\nuisites for reproducible\
    \ science. The CKG thus directly addresses\\nsome of the major bottlenecks toward personalized medicine and\\nthe rigorous,\
    \ data-driven, clinical decision-making process. We\\nexpect that others in the biomedical and clinical research com-\\\
    nmunity will be encouraged to contribute to and further develop\\nthis platform.\\na\\nb\\nc\\nUpload\"\n  },\n  {\n \
