  sections: "[\n  {\n    \"name\": \"Results\",\n    \"text\": \"Overview of CKG architecture. The CKG includes several inde-\\\
    npendent functional modules that (1) format and analyze pro-\\nteomics data (analytics_core); (2) construct a graph database\\\
    nA knowledge graph to interpret clinical\\nproteomics data\\nAlberto Santos\\u200a \\u200a1,2,3\\u2009\\u2709, Ana R.\
    \ Cola\\u00e7o1, Annelaura B. Nielsen1, Lili Niu1, Maximilian Strauss1,4,\\nPhilipp E. Geyer1,4,5, Fabian Coscia\\u200a\
    \ \\u200a1,5, Nicolai J. Wewer Albrechtsen\\u200a \\u200a1,6,7, Filip Mundt1,\\nLars Juhl Jensen\\u200a \\u200a1 and Matthias\
    \ Mann\\u200a \\u200a1,5\\u2009\\u2709\\nImplementing precision medicine hinges on the integration of omics data, such\
    \ as proteomics, into the clinical decision-making\\nprocess, but the quantity and diversity of biomedical data, and the\
    \ spread of clinically relevant knowledge across multiple bio-\\nmedical databases and publications, pose a challenge\
    \ to data integration. Here we present the Clinical Knowledge Graph (CKG),\\nan open-source platform currently comprising\
    \ close to 20 million nodes and 220 million relationships that represent relevant\\nexperimental data, public databases\
    \ and literature. The graph structure provides a flexible data model that is easily extendable\\nto new nodes and relationships\
    \ as new databases become available. The CKG incorporates statistical and machine learning\\nalgorithms that accelerate\
    \ the analysis and interpretation of typical proteomics workflows. Using a set of proof-of-concept\\nbiomarker studies,\
    \ we show how the CKG might augment and enrich proteomics data and help inform clinical decision-making.\\nNature Biotechnology\
    \ | VOL 40 | May 2022 | 692\\u2013702 | www.nature.com/naturebiotechnology\\n692\\n\\nArticles\\nNaTUre BIoTeCHnoloGy\\\
    nby integrating available data from a range of publicly accessible\\ndatabases, user-conducted experiments, existing ontologies\
    \ and sci-\\nentific publications (graphdb_builder); (3) connect and query this\\ngraph database (graphdb_connector);\
    \ and (4) facilitate data visual-\\nization, repository and analysis via online reports (report_manager)\\nand Jupyter\
    \ notebooks (Fig. 1a,b). This architecture seamlessly\\nharmonizes and integrates data as well as user-supplied analysis.\
    \ It\\nalso facilitates data sharing and visualization as well as interpreta-\\ntion based on detailed statistical reports\
    \ annotated with biomedical\\nknowledge, generating clinically relevant results. In the next several\\nsections, we describe\
    \ individual modules and the knowledge graph\\nconstruction process.\\nThe analytics core as an open proteomics analysis\
    \ framework.\\nThe first step in downstream analysis of proteomics data requires a\\ncomprehensive and versatile collection\
    \ of statistical, machine learn-\\ning and visualization methods. MSstats and Perseus have advanced\\nproteomics by providing\
    \ multi-purpose statistical and bioinfor-\\nmatics tools for the analysis of quantitative MS-based proteomics\\ndata7,8.\
    \ Taking these and other efforts as a reference, we developed\\nthe analytics core of CKG that encompasses the desired\
    \ functional-\\nity in a transparent and efficient manner. We chose Python and its\\nassociated scientific stack because\
    \ this allows us to adopt well-tested\\nand up-to-date algorithms while avoiding reimplementing already\\nexisting methods.\
    \ The functionality implemented in the analytics\\ncore centers on statistical and visual data representation and covers\\\
    nall main computational areas, such as expression, interaction and\\npost-translational, modification-based proteomics\
    \ (Fig. 1b).\\nWe designed the analytics core to comprise the main steps in\\na data science pipeline: data preparation\
    \ (filtering, normalization,\\nimputation and data formating), data exploration (summary sta-\\ntistics, ranking and distributions),\
    \ data analysis (dimensionality\\nreduction, hypothesis testing and correlations) and visualization.\\nThe analytics core\
    \ goes beyond previous efforts by integrating\\nthe analysis of other data types in addition to proteomics (that is,\\\
    nclinical data, multi-omics, biological context and text mining).\\nFurthermore, to complement the extensive Python portfolio,\
    \ we\\nincorporated functions optimized in the R language (that is, SAMR\\nand WGCNA21\\u201323) (Supplementary Table\
    \ 2).\\nWe included a visualization module (viz) that covers both\\nbasic plots (for example, bar plot or scatter plot)\
    \ and more com-\\nplex ones (for example, network, Sankey or polar plots) using the\\ngraphing library Plot.ly (https://plot.ly/),\
    \ a graphing library com-\\npatible with Python and R. This way, visualizations created by the\\nCKG framework can be\
    \ easily exported and used from other lan-\\nguages (Methods).\\nOwing to its modular design, the analytics core can be\
    \ used\\nwithin the CKG framework but also independently by importing\\nit from Python. Similarly, the analysis and visualization\
    \ function-\\nalities are not limited to proteomics data but can handle any type\\nof data in matrix format. The open\
    \ design promotes easy integra-\\ntion of new analysis methods and visualizations. Our integration\\nof Jupyter notebooks,\
    \ an open-source tool that allows mixing of\\ntext, graphics, code and data in a single document24\\u201327, enables\\\
    nstandard or bespoke analysis pipelines, including addition of\\nexisting or user-implemented functionality from the Python\
    \ or R\\necosystems (Methods).\\nBuilding and populating a graph database. To achieve seamless\\nannotation and integration\
    \ of proteomics data with other omics\\nexperiments and/or literature information, we constructed a graph\\ndatabase that\
    \ naturally connects large and heterogeneous data\\n(Supplementary Fig. 1a). We chose the open-source Neo4J database\\\
    nplatform as our current backend because of its performance, indus-\\ntry acceptance and associated Cypher query language\
    \ (https://neo4j.\\ncom/) (Supplementary Fig. 1b). To build the knowledge graph, we\\nfirst wrote a library of parsers\
    \ (graphdb_builder) with associated\\nconfigurations for each ontology, database and type of experiment.\\nThese parsers\
    \ download the data from online resources, extract\\ninformation and generate entities (nodes) and relationships, both\
    \ of\\nwhich can have attributes, such as name or description, in protein\\nnodes. The parsers use paired configuration\
    \ files that specify how\\nontologies, databases or experiments need to be interpreted. This\\ndesign allows unrestricted\
    \ integration of new resources or process-\\ning tools. Their output formats tend to change from time to time, but\\nthis\
    \ only affects one parser/configuration that can be easily adapted.\\nFor example, the current CKG\\u2019s proteomics\
    \ parser accepts output\\ndata from data-dependent or data-independent acquisition modes\\nfrom commonly used programs,\
    \ such as MaxQuant, Spectronaut,\\nFragPipe or DIA-NN28\\u201331, or the community standard format mzTab\\nfor MS-based\
    \ proteomics and metabolomics data32. The CKG can\\nbe easily extended to accept additional data outputs as new process-\\\
    ning programs emerge.\\nOnce the ontology, database and experiment files are stan-\\ndardized, formatted and imported,\
    \ the graphdb_builder module\\nloads them into the graph database with a set of Cypher queries\\nthat create the corresponding\
    \ nodes and relationships (Methods).\\nOur data model connects 36 different node labels with 47 differ-\\nent relationship\
    \ types (Fig. 1c). To make experimental proteomics\\ndata33, we designed a data model capable of supporting storage\\\
    nof standardized metadata (such as studied disease and interven-\\ntions) around each research project, defining unique\
    \ identifiers for\\nenrolled individuals, collected biological samples and analyzed\\nsamples (Supplementary Fig. 2a).\
    \ It enables predefined queries\\nabout experimentally determined protein hits, regarding their\\nassociation to the diseases\
    \ studied (ontological associations), drugs\\nor annotated Gene Ontology terms and pathways. These types of\\nqueries\
    \ provide insights into altered functions, suggesting drugs for\\nregulated proteins and connections to metabolites to\
    \ reveal possible\\nconfounding factors.\\nCKG includes millions of nodes and relationships. The CKG\\ndatabase is continuosly\
    \ growing and currently collects annotations\\nfrom 26 biomedical databases using ten ontologies and organizes\\nthis\
    \ information into almost 20 million nodes connected by 220\\nmillion relationships (Supplementary Fig. 1a). More than\
    \ 50 mil-\\nlion of these relationships involve \\u2018Publication\\u2019 nodes linking sci-\\nentific publications about\
    \ studies in the human system, coded\\nwith PubMed identifiers, to proteins, drugs, diseases, functional\\nregions and\
    \ tissues (Supplementary Fig. 3a). They were derived\\nFig. 1 | The clinical knowledge graph architecture. a, The CKG\
    \ architecture is implemented in Python and contains several independent modules\\nresponsible for connecting to the graph\
    \ database (graphdb_connector), building the graph (graphdb_builder), analyzing and visualizing experimental\\ndata (analytics_core),\
    \ displaying and launching multiple applications (report_manager); it also contains a repository of Jupyter notebooks\
    \ with analysis\\nexamples (notebooks). The code is accessible at https://github.com/MannLabs/CKG or as a complete Docker\
    \ container. b, The CKG analytics core\\nimplements multiple up-to-date data science algorithms for statistical analysis\
    \ and visualization of proteomics data: data preparation, exploration, analysis\\nand visualization. This library can\
    \ also be used directly within Jupyter notebooks, independently of the other CKG modules, and to analyze other omics\\\
    ntypes. c, The CKG graph database data model was designed to integrate multi-level clinical proteomics experiments and\
    \ to annotate them with biomedical\\ndata. It defines different nodes (for example, Protein, Metabolite and Disease) and\
    \ the types of relationship connecting them (for example, HAS_PARENT\\nand HAS_QUANTIFIED_PROTEIN). FC, fold change; Src,\
    \ source code.\\nNature Biotechnology | VOL 40 | May 2022 | 692\\u2013702 | www.nature.com/naturebiotechnology\\n693\\\
