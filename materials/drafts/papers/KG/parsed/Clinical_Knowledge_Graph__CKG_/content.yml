    nAmong 328 differentially regulated proteins, 188 were upreg-\\nulated (paired t-test; Supplementary Table 2), and 69\
    \ had a\\nknown association to lung cancer. The CKG not only automati-\\ncally connected LSD1/KDM1A to tranylcypromine,\
    \ the drug\\napproved by the tumor board for our patient, but also indicated\\ntrans-2-phenylcyclopropylamine, a known\
    \ potent inhibitor of\\nthe demethylase, as another treatment option55. We identified\\n60 potential drugs targeting 19\
    \ of the prioritized proteins. After\\nretrieving reported side effects associated with the chemothera-\\npeutic regimens\
    \ used and the identified inhibitors, the CKG\\nre-ranked the remaining drugs according to dissimilar side effects\\n(Jaccard\
    \ index). A cutoff of less than 0.2 resulted in six drugs (cho-\\nlic acid, dATP, resveratrol, calcitriol, vorinostat\
    \ and trichostatin A)\\ntargeting six proteins (HDAC1, THBS1, CDH1, CDH17, PTGES\\nand TXN).\\nAdditionally, the CKG suggested\
    \ publications that co-mention\\nthese drugs with their protein targets and the disease and affected\\ntissue, which highlighted\
    \ the combination of vorinostat and tricho-\\nstatin A in more than 30 publications. These drugs inhibit HDAC1,\\na histone\
    \ deacetylase that induces epigenetic repression linked to\\ntumor progression. Combinations of such inhibitors can inhibit\\\
    nepigenetic silencing and its malignant effects56\\u201358. Primed by the\\ninvolvement of both HDAC1 and LSD1/KDM1A in\
    \ histone modi-\\nfications, we extended the analysis to find possible connections\\nbetween these proteins, which revealed\
    \ that they are subunits of the\\nCoREST complex, which has recently attracted therapeutic interest\\nand for which the\
    \ CKG retrieved a paper describing the inhibition\\nof both HDAC1 and LSD1 (ref. 59).\\nCase studies exemplifiying the\
    \ capabilities of CKG in sharable\\nnotebooks. Our reports directory (Supplementary Fig. 6) includes\\nthe sequence of\
    \ analyses to reproduce the NAFLD and the urachal\\ncarcinoma studies described above as well as reanalysis of four\\\
    nadditional datasets exemplifying the CKG\\u2019s functionality in differ-\\nent contexts. First, we reanalyzed our proteomics\
    \ investigation of\\nthe differences between brown and white adipocytes60, prioritizing\\nand annotating significantly\
    \ regulated proteins known to be asso-\\nciated with metabolic diseases. The resulting knowledge subgraph\\na\\nb\\nGraph\
