    nfrom named-entity recognition on almost 7 million abstracts and\\nfull-text articles (8.5% of overall publications based\
    \ on full text but\\n20.4% from the past 10 years)34,35, thus encapsulating aspects of the\\naccumulated biomedical knowledge\
    \ in peer-reviewed publications.\\nWe found the graph structure to be easily scalable, facilitat-\\ning the integration\
    \ of new ontologies, databases and experiments.\\nFurthermore, this inherent flexibility allows nodes and relation-\\\
    nships originally designed to provide biomedical context primarily for\\nlarge-scale proteomics data interpretation to\
    \ be readily remodeled to\\nintegrate other omics datasets. For instance, to integrate metabolo-\\nmics data, we can link\
    \ metabolite nodes already present in the data-\\nbase to analytical samples. The existing relationships connecting\\\
    nmetabolites to nodes, such as pathways, proteins, tissue or disease,\\naid interpretation and seamless integration with\
    \ proteomics results.\\nThe CKG framework provides an infrastructure that facilitates\\nexploiting the existing connections\
    \ in the graph and the already\\nimplemented and optimized graph algorithms in Neo4j and\\nPython libraries, such as NetworkX36.\
    \ For example, when a new\\nproject is integrated, the default analysis can identify similar proj-\\nects in the graph,\
    \ and the results of these comparisons are shown in\\nthe project report. This functionality compares projects based on\\\
    nthe overlap of identified proteins (Jaccard and overlap similarity)\\nor similar protein profiles (Pearson correlation).\
    \ In addition, the\\nCKG provides a framework for the application of network analysis\\nand machine learning algorithms.\
    \ Learning on the graph structure\\nusing graph representation learning37,38 can enhance the prediction\\nof new links,\
    \ a strategy known as link prediction or graph comple-\\ntion39,40 (Methods).\\nA framework to extract actionable knowledge.\
    \ A main goal of\\nthe CKG is to combine the power of the analytics module with the\\nmassive prior information integrated\
    \ into the graph database to\\nbest interpret MS-based proteomics or other omics experiments.\\nHarmonization of these\
    \ heterogeneous but connected data sources\\nenables standard analysis pipelines that report results automaticaly,\\nreplacing\
    \ weeks of manual work in a more consistent format. These\\nstandard reports provide an initial evaluation of the quality\
    \ of the\\ngenerated data, highlight relevant hits and contextualize these hits\\nin relation to different biomedical\
    \ components in the graph. The\\nreport manager component (report_manager) orchestrates the cre-\\nation and updates experimental\
    \ projects and the automatic analysis,\\nvisualization and knowledge extraction (Fig. 2).\\nThe report manager was implemented\
    \ as a collection of dash-\\nboard applications that interface with the database for an overview\\nof the knowledge graph\
    \ (Home), to create and upload new clini-\\ncal proteomics projects (Project Creation and Data Upload) and\\nto run automated\
    \ analysis pipelines (ProjectApp). This defines a\\nworkflow from project idea to knowledge-based analysis report\\n(Supplementary\
    \ Fig. 2b). The Project Creation and Data Upload steps\\ngenerate the nodes and unique identifiers in the CKG for the\
    \ project,\\nthe enrolled cohort individuals (if applicable), biological samples col-\\nlected and analytical samples\
    \ analyzed by MS-based proteomics. This\\nalso includes connections to diseases, tissues and clinical interven-\\ntions\
    \ (Supplementary Fig. 2c), which provide prior knowledge, such\\nas known proteins associated with these diseases and\
    \ tissues or lit-\\nerature related to them. Once the clinical and/or proteomics data are\\nready and processed, they\
    \ are integrated into the graph by the \\u2018Data\\nUpload\\u2019 dashboard app (Supplementary Fig. 2d).\\nUploading\
    \ the data triggers the builder\\u2019s import and load process\\nand generates all the necessary relationships within\
    \ the new proj-\\nect, including the links to proteins, peptides and protein modifica-\\ntions quantified in the project.\
