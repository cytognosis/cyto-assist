    \ in\\nthe article\\u2019s Creative Commons license and your intended use is not permitted by statu-\\ntory regulation\
    \ or exceeds the permitted use, you will need to obtain permission directly\\nfrom the copyright holder. To view a copy\
    \ of this license, visit http://creativecommons.\\norg/licenses/by/4.0/.\\n\\u00a9 The Author(s) 2022\\nNature Biotechnology\
    \ | VOL 40 | May 2022 | 692\\u2013702 | www.nature.com/naturebiotechnology\\n702\\n\\nArticles\\nNaTUre BIoTeCHnoloGy\"\
    \n  },\n  {\n    \"name\": \"Methods\",\n    \"text\": \"Graph database. Graph databases are NoSQL databases that represent\
    \ and store\\ndata using graph structures. The graph structure is a collection of nodes and edges\\nthat represent relationships\
    \ between the nodes and properties. Storage of data in\\nsuch a structure facilitates access to densely connected data\
    \ by providing graph\\ntraversal linear times. The CKG implements a graph database that contains close to\\n20 million\
    \ nodes (36 labels) and more than 200 million relationships (47 different\\ntypes). The database is built using Neo4j\
    \ Community Edition (https://neo4j.com/),\\na scalable native graph database that allows storage, management and analysis\
    \ of\\ninterconnected data. Neo4j provides a query language specific for graph structures,\\nCypher, and an extensive\
    \ library of procedures and functions (APOC library and\\nthe Data Science library) that can be used for data integration,\
    \ data conversion\\nor graph analysis. Furthermore, Neo4j makes the database available via several\\nprotocols (bolt,\
    \ http or https) and provides a mission control center that interfaces\\nwith the database and helps manage it.\\nData\
    \ integration. Ontologies. To build the CKG database, we selected the different\\nnode labels (36 labels) and relationship\
    \ types (47 types) between them to design\\nthe graph data model (Fig. 1c). These nodes and relationships were defined\
    \ based\\non the type of biological or clinical questions or the problems set out to respond to\\nor solve. For each node\
    \ label, we defined the identifiers by using commonly used\\nbiomedical ontologies or standard terminologies. Ontologies\
    \ denote concepts,\\nin this case nodes (for example, diseases), and provide an acyclic graph structure\\nthat describes\
    \ how these concepts are related. We benefited from this underlying\\nstructure to integrate these concepts and relationships\
    \ (\\u2018is_a\\u2019 relationships) directly\\ninto the knowledge graph. Likewise, we integrated the terms and relationships\\\
    nstandardized in terminologies such as SNOMED-CT, which defines clinical terms\\nand their associative relationships.\\\
    nSome of the nodes in our graph data model could not be described using\\nontologies or existing terminologies, and they\
    \ needed to be standardized using\\nidentifiers from the selected biomedical databases (for example, UniProt for\\nproteins,\
    \ HMDB for metabolites and DrugBank for drugs) (Supplementary Table 1).\\nDuring the update of the knowledge graph database\
    \ (graphdb_builder), the\\nreference ontologies, terminologies and databases are updated first and generate\\ndynamically\
    \ mapping files that are used to standardize the rest of the data. These\\nmapping files are basically dictionaries built\
    \ using external references (xref\\nattributes) or synonyms provided in the reference ontologies and databases.\\nThis\
    \ system automatically standardizes the different data sources and facillitates\\nupdates.\\nDatabases. Once the graph\
    \ data model and the node label identifiers were defined,\\nwe selected multiple well-known and used biomedical databases\
    \ (25 databases)\\n(Supplementary Table 1) to feed the CKG. The selection of databases to be\\nintegrated responded to\
    \ the type of nodes and relationships in the model and\\nwas also based on criteria such as access, usability, stability\
    \ and acceptance by the\\nresearch community. However, the flexible design of the graph database and the\\nCKG platform\
    \ allows quick integration of new databases, ontologies, terminologies\\nor even modifications in the original data model\
    \ (new nodes or relationships) (see\"\n  },\n  {\n    \"name\": \"Methods, \\u2018graphdb_builder\\u2019 section)\",\n\
    \    \"text\": \"We purposely built in some redundancy by including biomedical databases\\n(for example, DISEASES73 and\
    \ DisGeNET74) that provide the same type of\\nrelationships, which we used to assess overlap and disagreement of sources\\\
    n(Supplementary Fig. 3b).\\nExperiments. The CKG database models multiple node types, which, in principle,\\nallows integration\
    \ of different data types: genomics, transcriptomics, proteomics\\nor metabolomics. However, the focus of the graph is\
    \ initially the integration of\\nquantitative MS-based proteomics data. This might have influenced the structure\\nof\
    \ the data model specifically on how experimental projects are defined and stored.\\nSimilarly, the clinical context in\
    \ which the database was built limits the data to\\nhuman, whereas other species are not covered by the graph yet.\\nProteomics\
    \ data can be integrated by creating a new project, which requires\\ndefining new nodes in the database: enrolled individuals,\
    \ biological samples\\ncollected from these individuals and analytical samples extracted from those\\nbiological samples.\
    \ Analytical samples correspond to the actual sample analyzed\\nin the mass spectrometer. All these nodes will have external\
    \ identifiers, and they\\nwill be mapped to unique internal identifiers in the knowledge graph. Internal\\nidentifiers\
    \ will then be used to integrate experimental and clinical data seamlessly.\\nThe relationship between analyzed samples\
    \ and proteins ((Analytical_sample)-\\n[:HAS_QUANTIFIED]-(protein)) will have the quantification (that is, label-free\\\
    nquantification (LFQ) intensity) stored as a property/attribute of the relationship\\n(value). Currently, MaxQuant, Spectronaut,\
    \ FragPipe, DIA-NN output files and\\nmzTab format or tabular files can be automatically loaded into the database using\
    \ a\\nspecific configuration (YAML file) for each format.\\nSimilarly, clinical data\\u2014clinical variables collected\
    \ for each individual or\\nbiological sample (in case of longitudinal studies or multi-specimen studies)\\u2014can\\nalso\
    \ be automatically loaded into the database using SDRF68 or in tabular format.\\nWhen the data are provided in tabular\
    \ format, all clinical variables need to follow\\nthe SNOMED-CT standard.\\nCKG platform. Software architecture. The CKG\
    \ platform was designed using a\\nmodular architecture that divides the platform into functional compartments:\\ngraphdb_connector,\
    \ graphdb_builder, report_manager and analytics_core\\n(Fig. 1a). Each module can be used independently, which provides\
    \ a flexible\\nenvironment to cover different scenarios and different needs: direct programmatic\\ninteraction with the\
    \ database, deployment of a local knowledge graph database,\\nvisualization of automatically analyzed data from the database\
    \ or just data analysis\\nand visualization through Jupyter notebooks.\\nIn combination, all modules provide a full workflow\
    \ from project ideation\\nand creation to analysis and visualization of results (Supplementary Fig. 2).\\nAdditionally,\
    \ we included Jupyter notebooks as another layer of functionality,\\nwhich allow further and specific analyses and serve\
    \ as a playground for continuous\\nimprovement of the analysis and visualization functionality. Furthermore,\\nnotebooks\
    \ will support replicability, reproducibility and reusability of analysis in\\nthe CKG.\\nAll modules were developed in\
    \ Python 3.7.9. Some of the analyses are\\nperformed using R packages (for example, SAMR and WGCNA) called from\\nPython\
    \ using the Rpy2 library. The library version used in the CKG (rpy2\\u2009==\\n3.0.5) is not compatible with Windows,\
    \ and these analyses are not available in\\ninstallations on this operating system. Alternatively, we created a Dockerfile,\\\
    nwhich holds all the necessary instructions to generate a complete container with\\nall the requirements. In this setup,\
    \ Windows users have all analyses available.\\nWhen running the Docker container, four ports will be available: (1) Neo4j\
    \ HTTP\\nport (7474); (2) Neo4j bolt port (7687); (3) CKG Dash server (8050); and (4)\\nJupyterHub server (8090) (Supplementary\
    \ Fig. 8). The entry point to the container\\n(docker_entrypoint.sh) defines all the steps needed: start the required\
    \ services\\n(Neo4j, JupyterHub, redis and celery) and run the report manager dash app. This\\ninstallation is the easiest\
    \ and can be used to quickly set up a server version of the\\nCKG with all its components (Python, Neo4j and JupyterHub).\
    \ Admin users can\\nstill customize these services by modifying how the container is built.\\nAll the code can be accessed\
    \ at https://github.com/MannLabs/CKG, and the\\ndocumentation is available at https://CKG.readthedocs.io.\\ngraphdb_connector.\
    \ The graphdb_connector provides functionality to connect\\nand query the CKG database. This module is Neo4j dependent.\
    \ It uses the Python\\nlibrary py2neo, but it is independent from the other functionality in the platform,\\nwhich allows\
    \ an agnostic interaction with the database and facilitates adaptation\\nand scalability. Likewise, queries to the database\
    \ in Cypher language across the\\nplatform have been defined as YAML objects with a structure that makes them\\nfindable\
    \ (name, involved nodes and relationships), understandable (description)\\nand easily replaceable.\\ngraphdb_builder.\
    \ This functional module can be used to generate the CKG\\ndatabase. It is divided into two steps: importing and loading.\
    \ The import (importer.\\npy) downloads the ontologies, terminologies and biomedical databases into the\\ndata directory\
    \ (Supplementary Fig. 6) and formats the data into tabular files (nodes\\nand relationships). The tabular files created\
    \ by the importer are also stored in the\\ndata directory under the Imports folder and organized into ontologies, databases\\\
    nand experiments. Furthermore, the import step generates some statistics (HDF)\\nregarding the number of nodes and relationships\
    \ formatted as well as file sizes\\nfor each ontology, database or experiment. These statistics can be used to track\\\
    npossible errors in the import process (Data/Imports/Stats).\\nOnce the import process finishes, data can be loaded into\
    \ the graph database\\nby the loader (loader.py), which runs several Cypher queries defined as YAML\\nobjects (cypher.yml)\
    \ and loads the tabular files located in the import folder into\\nthe running database. To facilitate this two-step process,\
    \ we implemented a module\\ncalled builder (builder.py), which can be used to perform either both steps or one\\nor the\
    \ other. This module also allows importing or loading of specific ontologies,\\ndatabases or experiments. After running\
    \ the two steps, the running database\\nshould contain all the nodes and relationships harmonized from the different\\\
    nsources of data.\\nAnalytics core. The analytics core is divided into two main functionalities: analytics\\nand visualization.\
    \ Both modules are independent of the CKG database and can\\nbe used to analyze and/or visualize data. The analytics functionality\
    \ uses Python\\nstatistics and Data Science libraries to implement the state-of-the-art analyses of\\nproteomics data\
    \ (Supplementary Table 2) and incorporates some recent relevant\"\n  },\n  {\n    \"name\": \"methods, such as WGCNA or\
    \ Similarity Network Fusion analysis. Moreover,\",\n    \"text\": \"to ensure the correct use of these functions, they\
    \ are designed to identify the\\nexperimental design automatically and, consequently, define the appropriate\\nstatistical\
    \ analysis to perform. The visualization library (viz) uses Plot.ly, an\\ninteractive graphing library for Python and\
    \ R, which opens the possibility to save\\nplots in a format compatible with both programming languages (JSON format).\\\
    nReport manager. The report manager is a tool to interface with the existing projects\\nin the CKG database. This functional\
    \ module makes use of the analytics core to\\nanalyze the project data and generate interactive graphs and then to create\
    \ detailed\\nreports with these analyses. These reports can be accessed through dashboard apps\\nimplemented in Plot.ly\
    \ Dash (https://plot.ly/dash/). The Dash server can be started\\nNature Biotechnology | www.nature.com/naturebiotechnology\\\
    n\\nArticles\\nNaTUre BIoTeCHnoloGy\\nby running the index module (index.py) and accessed at http://localhost:5000.\\\
    nThe initial app (Home) redirects to the login page, and, once logged in, it shows\\nthe current data model and statistics\
    \ about the database, such as the number of\\nnodes and relationships of each type. Furthermore, this app also links to\
    \ the other\\nexisting pages\\u2014Admin, Project Creation, Data Upload and Imports\\u2014and lists all\\nthe existing\
    \ projects in the database. The Admin page helps to create new users\\nand update the database by running the importing\
    \ and loading steps\\n(Supplementary Fig. 9).\\nWhen a link to an existing project is accessed for the first time, the\
    \ report\\nmanager runs the automated analyses for each data type in the project using the\\ndefault configuration. Reports\
    \ for each data type are shown in tabs in the Project\\napp, and two extra tabs are also present: the multiomics tab,\
    \ if there is more than\\none data type (for example, clinical and proteomics data), and the knowledge graph\\ntab, which\
    \ shows a summarization figure of all the other tabs.\\nNew report pipelines can be defined using configuration files\
    \ (YAML format)\\ndescribing the arguments to be used in the data processing, as well as the sequence\\nof analyses to\
    \ be performed. The structure requires the user, for each analysis\\u2019\\nconfiguration, to specify which data to use\
    \ (name of the dataframe(s)), a list of\\nanalyses and plots to visualize results (functions in the analytics core: analytics\
    \ and\\nviz, respectively), whether to store the results as dataframes and the arguments\\nneeded for analysis and visualization.\\\
    nOnce generated, project reports are stored in HDF5 format so that they can be\\nquickly shown when accessed again. Project\
    \ reports can be regenerated either with\\ndefault configuration or by providing specific configuration files using the\
    \ \\u2018Change\\nAnalysis\\u2019 Configuration\\u2019 option in the Project app. The saved reports can also be\\neasily\
    \ accessed programmatically with functionality within the report manager\\n(project.load_project_report()) or using the\
    \ R library rhdf5 (see \\u2018Notebooks\\u2019\\nsection).\\nReports can be downloaded in a compressed file (zip), which\
    \ contains one\\nfolder for each generated tab, and, inside, all the dataframes created during the\\nanalyses (tab separated\
    \ format, tsv), all the plots as vector and png format and all\\nnetworks in Graph Modeling Language compatible with Cytoscape\
    \ and JSON75,\\nJSON or the nodes and edges tables.\\nNotebooks. We included Jupyter notebooks as another component of\
    \ the CKG\\nplatform. This component serves three purposes: (1) a playground to test and\\ndevelop new analyses and visualizations;\
    \ (2) a collection of recipes that explain\\nhow to use CKG\\u2019s Python library; and (3) a repository of reanalyses\
    \ of already\\npublished case studies that can be shared, reproduced and reused. The structure\\nof the notebook directory\
    \ (Supplementary Fig. 6) distinguishes these purposes\\ndefining three folders: development, recipes and reports. In the\
    \ recipes folder, you\\ncan find several Jupyter notebooks showing simple functionality and analyses using\\nCKG\\u2019s\
    \ library: how to work with reports in R; how to build a project and generate\\nand visualize a report; how to download\
    \ and analyze data from PRIDE; how to run\\npower analyses; how to perform batch correction; or how to extract data from\
    \ the\\ngraph database. In the reports directory (Supplementary Fig. 6), we included the\\nsequence of analyses to reproduce\
    \ the NAFLD and the urachal carcinoma study\\nstudies described in the Results.\\nDefault analytical pipeline. The initial\
    \ data preparation step structures the\\nquantified measurements (filtering, imputation, formatting, and normalization),\\\
    nstarting with filtering out proteins identified in only a few of the samples\\n(Supplementary Table 2). This filtering\
    \ step can be specified as a maximum\\npercentage of missing values (default) or as a minimum number of values present\\\
    nper condition (group) or in the entire dataset. For imputation, we implemented\\nseveral methods that account for missing\
    \ values of different nature, including the\\nk-nearest neighbors (KNN) imputation method, which assumes that the values\\\
    nare missing completely at random (MCAR), and the probabilistic minimum\\nimputation (MinProb) approach for missing values\
    \ that are considered missing\\nnot at random (MNAR) (default)76. These two methods can also be combined in\\na mixed\
    \ imputation method that considers the percentage of missing values to\\nassume missingness due to MCAR (that is, missingnes\
    \ <50%) or MNAR otherwise\\nand applies KNN or MinProb, respectively. This step results in a complete matrix\\ncalled\
    \ the \\u2018processed data frame\\u2019 and forms the basis for downstream analysis.\\nNext, we implemented the data\
    \ exploration step into the workflow to collect\\nsummary statistics from the original data (such as number of proteins\
    \ and\\npeptides). Additionally, it ranks identified proteins according to their average\\nquantified intensity (LFQ77)\
    \ and calculates protein CVs, which can serve as a\\nquality metric.\\nThe subsequent data analysis part includes a dimensionality\
    \ reduction step\\nand enables visualization of the high-dimensional proteomic datasets using two-\\nor three-dimensional\
    \ representations. We implemented linear dimensionality\\nreduction (principal component analysis (default)) and nonlinear\
    \ approaches\\n(t-distributed stochastic neighbor embedding (t-SNE)) and uniform manifold\\napproximation and projection.\\\
    nThe analytics core enables hypothesis testing, particularly methods for\\nidentifying proteins changing significantly\
    \ between conditions (groups). The\\ndefault method is ANOVA, but others, such as ANOVA for repeated measurements\\n(ANOVA-rm),\
    \ t-test (independent or paired) or significance analysis of\\nmicroarrays (SAM), are also available21. By default, the\
    \ analytics core identifies\\nthe appropriate test based on the experimental design (for example, independent\\nversus\
    \ paired and ANOVA versus ANOVA-rm). We also implemented several\"\n  },\n  {\n    \"name\": \"methods to correct for\
    \ multiple hypothesis testing, such as Benjamini\\u2013Hochberg\",\n    \"text\": \"(BH) FDR (default) or permutation-based\
    \ FDR, which is used only if the\\nnumber of permutations specified (default set to 250) is sufficiently large to avoid\\\
    noverestimating false positives.\\nStrategies for global protein\\u2013protein correlation analysis include as default\\\
    nPearson correlation analysis corrected for multiple testing, which returns a network\\nwith identified clusters of correlating\
    \ proteins (Louvain clustering method).\\nFurthermore, functional enrichment analysis (Gene Ontology and Pathways)\\nenables\
    \ extraction of potential hypothesis-generating information regarding the\\nfunctional consequences of proteomics perturbation\
    \ as an ultimate step in the\\nproteomics analysis (Supplementary Table 2).\\nMachine learning on graphs. The CKG provides\
    \ functionality to apply machine\\nlearning algorithms based on the relationships existing in the knowledge graph.\\nOn\
    \ the one hand, the CKG provides a library of optimized graph algorithms\\nthat run within the database framework (using\
    \ the NetworkX Python library).\\nThese algorithms efficiently implement graph analysis tools such as path finding,\\\
    ncentrality measurements, community detection and similarity functions, among\\nothers. All these algorithms are either\
    \ directly available in the CKG or through the\\nGraph Data Science library in Neo4j and can be used to effectively identify\
    \ hidden\\npatterns and generate predictions based on the connected data. Graph-based\\npredictions have been used in\
    \ multiple scenarios, including drug repurposing,\\nprotein\\u2013protein interaction (PPI) prediction, disease comorbidity\
    \ risks or\\ndiet-based cancer therapy associations78\\u201380. All the types of relationships mined\\nin those studies\
    \ are part of the CKG and can repeatedly be modeled in the same\\nmanner every time new data are integrated. For instance,\
    \ we used this functionality\\nto map Gene Ontology biological processes to metabolic pathways (Supplementary\\nTable\
    \ 3). This helps to better interpret functional enrichment results or to\\nconnect currently disconnected nodes and extend\
    \ their annotations\\u2014that is,\\n(Biological_processes-[:ASSOCIATED_WITH]-(Metabolite)).\\nAdditionally, application\
    \ of machine learning algorithms directly on CKG\\u2019s\\ngraph structure can improve prediction and classification tasks,\
    \ for instance by\\nusing Graph Representation Learning algorithms37. To provide an example of\\nthe potential of these\
    \ methods on the CKG\\u2019s structure, we used the embedding\\nalgorithm Node2Vec (dimensions\\u2009=\\u2009100, walk\
    \ length = 30, number of walks =\\n200, P\\u2009=\\u20091, Q\\u2009=\\u20092.0, weight key = score) to represent disease\
    \ nodes81. For that,\\nwe first obtained disease-specific subgraphs connecting disease nodes to their\\nassociated proteins,\
    \ modified proteins, metabolites and genomic variants and\\ntheir relationships (that is, PPIs) from the CKG. We then\
    \ applied the embedding\\nalgorithm to obtain high-dimensional vectors, preserving the properties of\\nthese subgraphs\
    \ for each disease node. When visualizing these embedding\\nrepresentations using t-SNE, diseases cluster according to\
    \ the Disease Ontology\\nanatomical entities that they are annotated to, showing that biological meaning is\\npreserved\
    \ in these representations (Supplementary Fig. 10). These representations\\ncould be used in a variety of machine learning\
    \ problems, such as node and link\\nprediction, graph classification or graph similarity. When applied to biomedicine,\\\
    nthese learning techniques can help stratify patients, build comorbidity networks or\\nrepurpose drugs.\\nCase studies.\
    \ NAFLD study. We use a previously published internal proteomics\\ndataset41 (PXD011839) as a showcase of the capabilities\
    \ of the CKG. In this\\npublication, Niu et al. studied the plasma proteome profiles of 48 patients with and\\nwithout\
    \ cirrhosis or NAFLD and identified several statistically significantly changing\\nproteins, some of which were already\
    \ linked to liver disease. We aimed to reproduce\\nthe results obtained using the automated default analysis pipeline\
    \ of the CKG.\\nDownstream rapid proteomics analysis. We used a previously published internal\\nproteomics dataset2 (PXD008713).\
    \ This study presents a rapid proteomics analysis\\nthat identified a possible alternative treatment for a patient with\
    \ end-stage cancer.\\nWe built a downstream analysis pipeline to accelerate and prioritize alternative\\ncandidate drug\
    \ treatments using the CKG. We provide a Jupyter notebook to show\\nhow functionality implemented in the graphdb_connector\
    \ module (query_utils.py)\\ncan be used to single out queries that can help find known links between identified\\nupregulated\
    \ proteins and inhibitory drugs and between those drugs and known\\nside effects and publications as well as how to use\
    \ this knowledge to prioritize drug\\ncandidates.\\nMulti-level proteomics analysis. We reanalyzed and extended a multi-level\\\
    nproteomics study, including interactomics and phosphoproteomics, that provides\\ninsights into the mechanisms of resistance\
    \ to platinum-based chemotherapy in\\nhigh-grade ovarian serus adenocarcinoma3 (PXD010372). The CKG reproduces\\nthe findings\
    \ and extends them with deeper analysis of the protein complexes\\nidentified82 and substrate and PhosphoSite-specific\
    \ annotations83,84.\\nCKG update. Databases and ontologies integrated in the CKG can be updated\\nusing the graphdb_builder.\
    \ There are two options: full update or partial update. A\\nNature Biotechnology | www.nature.com/naturebiotechnology\\\
    n\\nArticles\\nNaTUre BIoTeCHnoloGy\\nfull update, which will regenerate the entire database with newly downloaded data\\\
    nfrom the sources, the number of nodes and relationships, will vary from version to\\nversion according to changes in\
    \ these data. On a partial update, the sources to be\\nimported and loaded into the graph need to be specified. The partial\
    \ update can\\nalso be used to extend the graph when a new database or ontology is added. When\\nrunning a full update,\
    \ it is recommended to create a different graph database,\\nconfirm that the generated graph is correct and then switch\
    \ to the new database.\\nExperiments can be updated using the \\u2018Data Upload\\u2019 functionality in the\\ndashboard\
    \ app by indicating the project identifier and uploading the new data.\\nWhen a full update is performed in the CKG\\\
    u2019s graph, which involves upgrading\\nthe version of essential databases, such as UniProt85, it is highly recommended\
    \ to\\nprocess the raw proteomics data, searching with the new version of the proteome,\\nand to generate again all the\
    \ project reports with the new data. When this is not\\npossible, we provide a Jupyter notebook to generate a mapping\
    \ between UniProt\\nversions based on sequence alignment (CKG mapping from fasta.ipynb).\\nThe CKG is an open-source project,\
    \ and its code will continue to grow and\\nimprove through version control in the GitHub repository (https://github.com/\\\
    nMannLabs/CKG). Currently, version 1.0.0 is available, and new releases will\\nbe made available in a controlled manner\
    \ and named following the PEP 440\\nspecification (https://www.python.org/dev/peps/pep-0440/). Because the CKG\\nis an\
    \ open-source project, contributions can help the framework grow with\\nadditional ontology, database or experimental\
    \ parsers, improved documentation,\\nincreased testing and feedback. Specific details on how to contribute can be found\\\
    nin the CKG\\u2019s documentation.\\nInstallation and hardware requirements. The CKG\\u2019s purpose and architecture\\\
    ndefine it as a multi-user platform that requires installation in a server-like setup\\nand with systems administration\
    \ knowledge. However, individual users can\\nhave a local installation, making sure hardware and software requirements\
    \ are\\nfullfiled. The simplest installation is by using the Docker container and running\\nthe \\u2018minimal\\u2019\
    \ update in the Admin app (https://ckg.readthedocs.io/en/latest/intro/\\ngetting-started-with-docker.html). This installation\
    \ requires getting access to the\\nlicensed databases (SNOMED-CT, DrugBank and PhosphoSitePlus). For specific\\nrequirements\
    \ and installation steps, consult the CKG\\u2019s documentation at https://\\nckg.readthedocs.io/en/latest/intro/getting-started-with-requirements.html.\\\
