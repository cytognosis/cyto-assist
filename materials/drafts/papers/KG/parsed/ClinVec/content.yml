    ,\n    \"text\": \"15\\n8 Predictive Medicine Group, Computational Health Informatics Program, Boston Children\\u2019s\
    \ Hospital, Boston, MA,\\n16\\nUSA\\n17\\n9 Faculty of Health Sciences, School of Public Health, Ben Gurion University\
    \ of the Negev, Be\\u2019er Sheva, Israel\\n18\\n10 Software and Information Systems Engineering, Ben Gurion University,\
    \ Be\\u2019er Sheva, Israel\\n19\"\n  },\n  {\n    \"name\": \"Harvard Data Science Initiative, Cambridge, MA, USA\",\n\
    \    \"text\": \"20\"\n  },\n  {\n    \"name\": \"Broad Institute of MIT and Harvard, Cambridge, MA, USA\",\n    \"text\"\
    : \"21\\n13 Kempner Institute for the Study of Natural and Artificial Intelligence, Harvard University, Allston, MA, USA\\\
    n22\\n*  Joint correspondence: noada@clalit.org.il and marinka@hms.harvard.edu\\n23\\n\\n24\\n\\n25\\nIntegrating structured\
    \ clinical knowledge into artificial intelligence (AI) models remains a major\\n26\\nchallenge. Medical codes primarily\
    \ reflect administrative workflows rather than clinical reason-\\n27\\ning, limiting AI models\\u2019 ability to capture\
    \ true clinical relationships and undermining their gen-\\n28\\neralizability. To address this, we introduce ClinGraph,\
    \ a clinical knowledge graph that integrates\\n29\\neight EHR-based vocabularies, and ClinVec, a set of 153,166 clinical\
    \ code embeddings derived\\n30\\nfrom ClinGraph using a graph transformer neural network. ClinVec provides a machine-readable\\\
    n31\\nrepresentation of clinical knowledge that captures semantic relationships among diagnoses, med-\\n32\\nications,\
    \ laboratory tests, and procedures. Panels of clinicians from multiple institutions evalu-\\n33\\nated the embeddings\
    \ across 96 diseases and more than 3,000 clinical codes, confirming their\\n34\\nalignment with expert knowledge. In a\
    \ retrospective analysis of 4.57 million patients from Clalit\\n35\\nHealth Services, we show that ClinVec supports phenotype\
    \ risk scoring and stratifies individuals\\n36\\nby survival outcomes. We further demonstrate that injecting ClinVec into\
    \ large language models\\n37\\nimproves performance on medical question answering, including for region-specific clinical\
    \ sce-\\n38\\nnarios. ClinVec enables structured clinical knowledge to be injected into predictive and genera-\\n39\\\
    ntive AI models, bridging the gap between EHR codes and clinical reasoning.\\n\\n40\\n\\n\\n2\"\n  },\n  {\n    \"name\"\
    : \"Introduction\",\n    \"text\": \"41\\nMedicine builds on centuries of accumulated knowledge and the goal of individualized\
    \ patient\\n42\\ncare through clinical reasoning and evidence-based practice1. Over time, medical vocabularies\\n43\\\
    nand ontologies have been developed to represent clinical information, fostering interoperability\\n44\\nand data exchange\
    \ across healthcare systems2\\u20134. However, these standardized coding systems re-\\n45\\nmain fragmented, with each\
    \ vocabulary designed for specific use cases. This fragmentation lim-\\n46\\nits their integration into artificial intelligence\
    \ (AI) models and introduces a gap between clinical\\n47\\nknowledge and its computational representation in precision\
    \ medicine.\\n48\\nThe widespread adoption of electronic health records (EHRs) and data standardization initiatives\\\
    n49\\nhas accelerated the use of structured clinical data in AI models5,6, with more than half of\\n50\\nhealthcare foundation\
    \ AI models relying on structured clinical codes, such as billing data and\\n51\\nmedication records7. These models implicitly\
    \ assume that EHRs contain information sufficient to\\n52\\ncapture the clinical concepts relevant to patient care. In\
    \ practice, this assumption often fails.\\n53\\nModels trained on EHR data frequently learn patterns specific to a single\
    \ healthcare system ra-\\n54\\nther than generalizable medical relationships8\\u201311. The variability of clinical codes\
    \ across institu-\\n55\\ntions further limits the transferability of prediction models12\\u201315. Many codes are selected\
    \ or rec-\\n56\\norded for operational rather than clinical reasons16, influenced by geographic factors17\\u201319, na-\\\
    n57\\ntional policies20\\u201323, insurance requirements24\\u201326, physician practices27\\u201329, and other features\
    \ of lo-\\n58\\ncal healthcare delivery30\\u201334. EHR-based models, as a result, often fail to reflect consistent clinical\\\
    n59\\ndefinitions or relationships among codes35\\u201339.\\n60\\nThe lack of alignment between EHR-based prediction models\
    \ and clinical knowledge also intro-\\n61\\nduces concerns about model bias and transparency40. Although large language\
    \ models (LLMs)\\n62\\noffer implicit access to clinical knowledge embedded within their training data, unvetted datasets\\\
    n63\\nfrom biological data repositories and scientific articles used to train LLMs can increase the risk\\n64\\nof bias\
    \ and mistakes in generated outputs41\\u201343. LLMs can struggle to represent clinical codes44\\u201346,\\n65\\nespecially\
    \ rare or highly specific codes, resulting in inaccuracies, over-generalizations, or hallu-\\n66\\ncinations during inference47.\
    \ This can be concerning given that a large portion of medical codes\\n67\\nmay not be used in everyday clinical practice\
    \ where, for example, fewer than 5% of SNOMED\\n68\\nCT codes account for 95% of usage in healthcare institutions48, creating\
    \ a mismatch between\\n69\\nwhat is modeled and what is clinically relevant.\\n70\\n\\n\\n3\\nMost AI models lack mechanisms\
    \ to integrate clinical knowledge, limiting their ability to align\\n71\\nwith medical best practices49,50. Clinical researchers\
    \ have published over 3,700 evidence-based\\n72\\nguidelines across 39 countries51\\u201354, yet this structured knowledge\
    \ remains largely unused in\\n73\\nmodel development. Most AI models rely on statistical patterns in patient data or text\
    \ corpora,\\n74\\nbut these approaches do not capture the clinical knowledge embedded in structured EHR codes.\\n75\\\
    nBridging this gap requires consistent, machine-readable representations that reflect how clinical\\n76\\ncodes relate\
    \ to real-world medical practice. While embeddings exist for text and images55\\u201360, no\\n77\\ncomparable resource\
    \ captures structured clinical knowledge for use in AI models.\\n78\\nTo address the gap between clinical knowledge and\
    \ structured EHR data, we developed a\\n79\\nClinGraph, a clinical knowledge graph spanning eight standardized medical\
    \ vocabularies, and\\n80\\nClinVec, a set of 153,166 clinical code embeddings derived from ClinGraph. ClinVec defines\
    \ a\\n81\\nunified, machine-readable latent space that captures relationships among diagnoses, medications,\\n82\\nlaboratory\
    \ tests, and procedures. This approach generates clinically meaningful representations\\n83\\nof medical codes in a hypothesis-free\
    \ manner and provides a resource for integrating structured\\n84\\nclinical knowledge into predictive models for precision\
    \ medicine. The learned embeddings re-\\n85\\nveal patterns aligned with human anatomy and disease phenotypes and were\
    \ validated by panels\\n86\\nof clinical experts across 96 diseases and more than 3,000 clinical codes. We further demonstrate\\\
    n87\\nthe predictive utility of ClinVec through phenotype risk score analyses for chronic kidney dis-\\n88\\nease, chronic\
    \ obstructive pulmonary disease, and heart failure, using EHR data from 4.57 million\\n89\\npatients in Clalit Health\
    \ Services. Finally, we show that integrating ClinVec into large language\\n90\\nmodels improves medical question answering\
    \ across a range of clinical scenarios. ClinGraph and\\n91\\nClinVec provide a foundation for embedding structured clinical\
    \ knowledge into AI models, sup-\\n92\\nporting interpretability, cross-institutional transferability, and alignment with\
    \ clinical practice.\\n93\"\n  },\n  {\n    \"name\": \"Results\",\n    \"text\": \"94\\nClinGraph and ClinVec: Representing\
    \ structured medical knowledge for AI\\n95\\nMany efforts have focused on structuring clinical knowledge for enhanced\
    \ interoperability and\\n96\\ndata harmonization. Clinical knowledge has been traditionally structured using Common Data\\\
    n97\\nModels (CDMs), which standardize data by mapping diverse coding systems into a unified\\n98\\nschema61. Alternatively,\
    \ biomedical ontologies organize information in a hierarchical structure to\\n99\\nfacilitate semantic interoperability\
    \ and reasoning across coding systems. However, both rely on\\n100\\nfixed schemas and expert-defined relationships that\
    \ limit their contextual richness and\\n101\\n\\n\\n4\\nadaptability to real-world data. KGs offer a more flexible approach\
    \ by integrating diverse\\n102\\nknowledge sources without rigid schema constraints. However, most knowledge graphs do\
    \ not\\n103\\nexplicitly incorporate standard clinical vocabularies and instead focus on biological processes62\\u2013\\\
    n104\\n64, therapeutics55,65,66, genetic phenotypes67\\u201370, or a combination thereof71\\u201373. KGs that incorpo-\\\
    n105\\nrate clinical vocabularies are often restricted to ICD codes (diagnosis codes) or rely on medical\\n106\\nterminologies\
    \ like HPO74 and MONDO75, which are not standard in most EHRs76\\u201378. Several ap-\\n107\\nproaches construct KGs directly\
    \ from patient data79\\u201381, but this process is highly sensitive to the\\n108\\nsource patient population, potentially\
    \ limiting generalizability.\\n109\\nWe develop a resource consisting of ClinGraph, a knowledge graph consisting of 153,166\
    \ nodes\\n110\\nand 2,873,025 edges spanning eight clinical vocabularies (Figure 1A, 1B), and ClinVec, a set of\\n111\\\
    nhigh-dimensional, vector representations (embeddings) of clinical knowledge that can be inte-\\n112\\ngrated into AI\
    \ models (Figure 1C, 1D). ClinGraph incorporates diagnosis codes (ICD9CM,\\n113\\nICD10CM, phecodes), laboratory tests\
    \ (LOINC), medications (RxNorm, ATC), procedures\\n114\\n(CPT), and other controlled clinical vocabularies (SNOMED CT,\
    \ UMLS), and represents each\\n115\\nconcept in the KG as a medical code (Supplementary Table S1). Relational information\
    \ is de-\\n116\\nrived from multiple databases, including ontologies such as Unified Medical Language System82\\n117\\\
    n(UMLS) and empirically constructed knowledge bases such as PheMap83, which derives relation-\\n118\\nships from the large-scale\
    \ mining of biomedical literature (Supplementary Table S2).\\n119\\n\\n\\n5\\n120\\nFigure 1: Overview of approach. (A)\
    \ Meta-graph showing the structure of ClinGraph and the edge relationships\\n121\\nbetween clinical vocabularies shown\
    \ as node types. (B) An example local neighborhood of ClinGraph. Each clinical\\n122\\ncode is represented as a node,\
    \ and the color denotes the clinical vocabulary. (C) Workflow for generating clinical\\n123\\nknowledge embeddings: building\
    \ the clinical knowledge graph, constructing a graph transformer model, and gener-\\n124\\nating embeddings through self-supervised\
    \ learning. (D) Clinical AI applications of ClinGraph and ClinVec.\\n125\\nA key feature of ClinGraph is that it represents\
    \ clinical concepts using their original coding sys-\\n126\\ntems, rather than aggregating them into a common vocabulary.\
    \ This design preserves coding-spe-\\n127\\ncific structures such as hierarchical relationships and clinically meaningful\
    \ groupings and avoids\\n128\\nthe information loss that can occur when mapping between vocabularies. To evaluate the\
    \ cover-\\n129\\nage of EHR coding systems, we compared ClinGraph to six existing KGs. For each KG, we\\n130\\nmapped\
    \ its node identifiers to EHR codes and calculated the proportion of coverage for common\\n131\\ncoding systems (Supplementary\
    \ Table S3). ClinGraph is the only resource that integrates diag-\\n132\\nnoses, medications, laboratory tests, and procedures\
    \ in a unified framework based on structured\\n133\\nEHR data. Other KGs do not include nodes for procedures or laboratory\
    \ tests. While ClinGraph,\\n134\\nPrimeKG76, and PharMeBINet84 capture similar proportions of ICD10CM codes, ClinGraph\\\
    n135\\nspans a broader range of diagnoses. By evaluating the number of distinct ICD10CM root codes\\n136\\n(for example,\
    \ J45), we found that ClinGraph includes 35% more disease areas than other graphs.\\n137\\nThis likely reflects the clinical\
    \ orientation of ClinGraph, in contrast to other resources that em-\\n138\\nphasize biological and genetic phenotypes.\\\
