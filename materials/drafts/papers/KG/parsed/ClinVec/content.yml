    \ features is\\n602\\ninitialized using Xavier noise. The embedding represents the relational information learned from\\\
    n603\\nthe knowledge graph without additional information from the node features.\\n604\\nMulti-head attention mechanism\\\
    n605\\nThe HGT uses  multi-head attention, which is a key feature of transformer architecture87. Multi-\\n606\\nhead attention\
    \ utilizes multiple attention mechanisms, or heads, in parallel to tend to different\\n607\\nparts of the input, where\
    \ each head has its own set of learnable weights (parameters). Updating a\\n608\\nnode\\u2019s embedding involves aggregating\
    \ messages across all \\u210e heads and weighting each mes-\\n609\\nsage by its attention score. This mechanism essentially\
    \ up- and down-weights messages based on\\n610\\ntheir importance so that only necessary information is propagated to\
    \ the target node. Although\\n611\\nthe original HGT architecture allows the modeling of different relation types within\
    \ heterogene-\\n612\\nous graphs, we treat all nodes and edges as a single type during inference to maximize infor-\\\
    n613\\nmation sharing across the knowledge graph.\\n614\\n\\n\\n26\\nFor a target node \\ud835\\udc61, a single attention\
    \ head is a series of linear projections of the embedding from\\n615\\nthe previous layer, normalized by the embedding\
    \ dimension. Here, a linear projection for an in-\\n616\\nput \\ud835\\udc99\\u2208\\u211d%, is defined as an affine linear\
    \ transformation, \\ud835\\udc9a= \\ud835\\udc7e\\ud835\\udc7b\\ud835\\udc99+ \\ud835\\udc83 where \\ud835\\udc83 is a\
    \ bias term\\n617\\nand \\ud835\\udc7e is a learnable weight matrix. For convenience, we drop the bias term in the following\
    \ der-\\n618\\nivations, but in practice, the parameter corresponding to the bias term is absorbed into the esti-\\n619\\\
    nmation of \\ud835\\udc7e.\\n620\\nThe series of linear projections mirror the standard query, key, and value vectors\
    \ used in the\\n621\\nstandard transformer architecture. The attention score vector corresponding to the edge between\\\
    n622\\nsource node s and target node t, represented as \\ud835\\udc00\\ud835\\udc13\\ud835\\udc13(\\ud835\\udc60, \\ud835\\\
