    \ Disease\\nLupus\\nC\\n\\n\\n13\\nperforming a vector sum across the embeddings for each symptom. (C) Heatmap showing\
    \ cosine similarity between\\n303\\neach disease embedding and the aggregation of symptoms. Sizes of circles correspond\
    \ to the magnitude of the co-\\n304\\nsine similarity.\\n305\\nWe assess this pattern by examining nine diseases with\
    \ significant health implications across dif-\\n306\\nferent clinical specialties. Five conditions are among the top non-communicable\
    \ diseases with\\n307\\nthe highest mortality rate identified by the World Health Organization92 and four are among the\\\
    n308\\nmost common autoimmune disorders in adult populations93. Using clinical descriptions of dis-\\n309\\neases from\
    \ the Mayo Clinic94\\u201398 and the manual translation of symptom lists to diagnosis codes,\\n310\\nwe aggregate all\
    \ disease symptoms in the form of ICD-9 code embeddings (Supplementary Ta-\\n311\\nble S5). Computing the cosine similarity\
    \ between the disease symptom embedding and the target\\n312\\ndisease embedding across all nine diseases, we find that\
    \ all pairs have positive similarity scores\\n313\\n(mean-cos-similarity: 0.77, SD: 0.13) (Supplementary Table S7). Moreover,\
    \ conditions with\\n314\\noverlapping symptoms also exhibit high similarity scores. For instance, the phecode embedding\\\
    n315\\nfor multiple sclerosis also has a high similarity score with the disease composition embedding for\\n316\\nlupus\
    \ (cos-similarity=0.58), as both diseases share symptoms such as fatigue and muscle pain.\\n317\\nWe observe high levels\
    \ of congruence between diseases affecting the same organ system, such as\\n318\\nlung cancer (target disease) and COPD\
    \ (symptom embedding), which both affect the respiratory\\n319\\nsystem (cos-similarity=0.86).\\n320\\nAfter identifying\
    \ this pattern, we evaluated whether individual symptoms exhibit consistent syn-\\n321\\ntactic and semantic structure\
    \ within the embedding space. To approximate the disease specificity\\n322\\nof each symptom, we ranked symptoms by their\
    \ frequency in a sample of patients from Clalit\\n323\\nHealth Services (CHS), from most to least common. For each of\
    \ the nine diseases, we incremen-\\n324\\ntally aggregated symptom embeddings in order of decreasing frequency. As less\
    \ common symp-\\n325\\ntoms were added, the combined symptom embedding progressively aligned more closely with\\n326\\\
    nthe target disease embedding (Supplementary Figures S2, S3). To test the robustness of this\\n327\\ntrend, we perturbed\
    \ key components of the embedding aggregation process. Across variations,\\n328\\nincluding swapping the target disease,\
    \ substituting related symptoms, and introducing randomly\\n329\\nselected symptoms to mimic real-world variability, the\
    \ symptom embedding consistently moved\\n330\\ncloser to the corresponding disease embedding in the latent space (Supplementary\
    \ Figure S4).\\n331\\nThis process can help study diseases with similar symptoms by revealing subtle differences in\\\
    n332\\nclinical presentations. This level of granularity can be observed when comparing various autoim-\\n333\\nmune diseases\
    \ due to the presentation of overlapping symptoms. For Graves\\u2019 disease, we\\n334\\n\\n\\n14\\ncompute the initial\
    \ cosine similarity between the disease embedding for each of the four diseases\\n335\\nand the first symptom embedding,\
    \ \\u201cpalpitations\\u201d, (the Graves\\u2019 symptom found to be most preva-\\n336\\nlent in the sampled patient population),\
    \ but no disease has a cosine similarity score > 0.40 (Fig-\\n337\\nure 3B). Given the relatively high prevalence of this\
    \ symptom in the general patient population\\n338\\nand lack of disease specificity (freq=0.232), it is unsurprising that\
    \ initial symptoms do not show\\n339\\na high correlation with any of the immune conditions. However, as we add symptoms\
    \ that are\\n340\\nrelatively less common within the general population, such as \\u2018goiter\\u2019 (freq=0.029), the\
    \ composi-\\n341\\ntion of symptoms becomes increasingly similar to the representation of Graves\\u2019 disease, and the\\\
    n342\\nsimilarity with the other three autoimmune conditions begins to diverge. These patterns mirror\\n343\\nhow individual\
    \ symptoms may not provide sufficient information to assess the probability of a\\n344\\nspecific condition, but as a\
    \ patient accumulates more symptoms over time, the aggregation of\\n345\\nthese symptoms can stratify patients by disease\
    \ risk.\\n346\\nClinical knowledge embeddings stratify patients by disease risk and severity\\n347\\nWe next investigate\
    \ how ClinVec can be utilized in the context of patient outcome prediction, in-\\n348\\ncluding disease progression and\
    \ disease risk. Using only information derived from ClinVec, we\\n349\\ncompute a disease-specific risk score for various\
    \ conditions and the relative disease risk for each\\n350\\npatient. Analogous to polygenic risk score frameworks99, we\
    \ compute a phenotype risk score100\\n351\\nby scanning a patient\\u2019s EHR and aggregating the embeddings across conditions\
    \ with the highest\\n352\\nsimilarity to the disease of interest (Methods). We validated our approach using retrospective\\\
    n353\\nEHR data from 4.57 million individuals101 at CHS and specifically focused on patients listed in\\n354\\nthe CHS\
    \ chronic registry, a registry maintained by CHS that monitors individuals with specific\\n355\\nchronic conditions102.\
    \ We examine three clinical conditions with the largest sample sizes within\\n356\\nthe chronic registry: chronic kidney\
    \ disease (CKD), chronic obstructive pulmonary disease\\n357\\n(COPD), and heart failure.\\n358\\n\\n\\n15\\n\\n359\\\
    nFigure 5: Clinical code embedding risk scores correlate with disease prevalence and severity. (A-C) We pro-\\n360\\nvide\
    \ scatter plots showing the risk score percentiles of each disease versus the disease prevalence within each bin.\\n361\\\
    nDots are shaded according to disease prevalence. Columns are divided by diseases: heart failure, CKD, and COPD.\\n362\\\
    nFor each condition, we constructed a matched case-control cohort (Supplementary Table S6,\\n363\"\n  },\n  {\n    \"\
    name\": \"Supplementary Figure S5) and used 5 years of clinical history to compute a relative risk score for\",\n    \"\
    text\": \"364\\neach patient. For a target disease (here represented by an ICD10CM embedding), we identify\\n365\\nembeddings\
    \ (features) most relevant to the disease by selecting all codes within a given radius in\\n366\\nthe embedding space\
    \ (see Methods). Each patient\\u2019s score is computed as a weighted sum of these\\n367\\nfeatures, where the weight\
    \ is calculated as the cosine similarity between the feature embedding\\n368\\nand target disease embedding. In practice,\
    \ the size of the radius (k-neighbors) can be selected by\\n369\\ncomparing a validation patient dataset, similar to choosing\
    \ the optimal performing p-value\\n370\\nthreshold in PRS103. This approach eliminates the need to pre-specify a list\
    \ of features useful for\\n371\\ndiseases with heterogeneous presentations and highly variable symptoms, such as many\
    \ chronic\\n372\\nconditions.\\n373\\nQuantifying patients\\u2019 disease risk according to their risk score percentile\
    \ of the total score distri-\\n374\\nbution, we observe the separation of patients according to disease status across\
    \ all three condi-\\n375\\ntions, particularly at the extreme end of the risk distribution (Figure 5). Within the group\
    \ of indi-\\n376\\nviduals in the 10th percentile of the risk score distribution for CKD, there is a disease prevalence\\\
    n377\\nof 6.2%. For patients above the 99th percentile, the disease prevalence increases to 23.4%. Top-\\n378\\nidentified\
    \ clinical code embeddings are consistent with each disease's known comorbidities, lab\\n379\\ntest results, and medication\
    \ usage. For example, among the top features of chronic kidney dis-\\n380\\nease is Diabetes mellitus, which is a well-documented\
    \ risk factor for the disease, and Pro-\\n381\\nteinuria, which can be an early disease indicator. Although we assess\
    \ the population-level corre-\\n382\\nlation between disease prevalence and risk score percentile, these results suggest\
    \ opportunities to\\n383\\nA\\nB\\nC\\n\\n\\n16\\nleverage clinical knowledge embeddings for patient monitoring in a way\
    \ that is independent of\\n384\\nany training dataset.\\n385\\nGiven the marked stratification by disease status, we evaluate\
    \ whether the computed risk scores\\n386\\ncould provide disease subtyping information. Intuitively, suppose individuals\
    \ acquire a greater\\n387\\nnumber of highly relevant clinical conditions. In that case, this trend may indicate a later\
    \ disease\\n388\\nstage and increased mortality rates. To prevent confounding from disease-specific effects with\\n389\\\
    nage and sex, we restrict the assessment to individuals of the same sex and diagnosed at a similar\\n390\\nage (Methods).\
    \ For each of the three conditions, we compute the mode age and sex and use this\\n391\\nas inclusion criteria for the\
    \ survival analysis. Re-calibrating score percentiles based on the final\\n392\\nset of patients, we observe a striking\
    \ stratification by 6-year survival rate (Supplementary Figure\\n393\\nS6). For CKD (age=72 sex=Male), individuals within\
    \ the top quintile of this score distribution\\n394\\nfor CKD had a relative 42.6% lower 6-year survival compared to those\
    \ in the bottom quartile\\n395\\n(top-quartile: 56.8.3%, bottom-quartile: 76.5%). This trend is particularly remarkable\
    \ consider-\\n396\\ning the risk scores were inferred without any institution-specific, disease-specific, or patient-\\\
    n397\\nlevel information during training.\\n398\\nClinVec provides structured clinical knowledge to improve LLM performance\\\
    n399\\nClinical embeddings provide a structured approach to incorporate domain-specific knowledge\\n400\\ninto foundation\
    \ models such as LLMs. One common strategy is knowledge injection, where em-\\n401\\nbeddings from external knowledge\
    \ sources are appended to the LLM input. Recent studies show\\n402\\nthat this approach improves performance on tasks\
    \ such as medical question answering by\\n403\\ngrounding LLM outputs in a clinically relevant context104\\u2013107. We\
    \ adapt MMed-Llama106, an\\n404\\nopen-source LLM composed of 8 billion parameters. To test whether ClinVec embeddings\
    \ im-\\n405\\nprove LLM performance beyond what can be achieved with domain-specific training data alone,\\n406\\nwe evaluated\
    \ our knowledge token injection approach using an LLM already trained on medical\\n407\\ncontent. We used parameter-efficient\
    \ fine-tuning to integrate 42,883 clinical knowledge tokens\\n408\\ninto the LLM, where each token corresponded to a ClinVec\
    \ embedding of a UMLS concept\\n409\\n(Supplementary Figure S7). This approach allows domain adaptation without retraining\
    \ the en-\\n410\\ntire model or requiring a labeled clinical dataset. It provides a resource-efficient strategy for in-\\\
    n411\\ncorporating structured clinical knowledge into LLMs.\\n412\\nTo assess the impact of clinical knowledge embeddings\
    \ on LLM performance, we used the\\n413\\nMedQA1\\u20134 dataset, which contains questions from the US Medical Licensing\
    \ Exams (USMLE).\\n414\\n\\n\\n17\\nWe applied the UMLS MetaMap API to map question text to UMLS concepts, then retrieved\
    \ the\\n415\\ncorresponding ClinVec embeddings and appended them to the tokenized prompt (see Methods).\\n416\\nThis approach\
    \ incorporates structured, clinically grounded knowledge without retraining the un-\\n417\\nderlying LLM. Instead, ClinVec\
    \ supports retrieval-augmented generation, where embeddings rel-\\n418\\nevant to the input are used to guide the LLM\
    \ response.\\n419\\nAssessing performance with a held-out test set of MedQA (N=1,247 questions), we find a 10.3%\\n420\\\
    nincrease in question-answering accuracy when incorporating the clinical knowledge embeddings\\n421\\n(acc=0.64) compared\
    \ to question answering without it (acc=0.58). We observe the largest perfor-\\n422\\nmance gains when questions are short,\
    \ likely because the language model has limited contextual\\n423\\ninformation to generate accurate answers. Adding just\
    \ one or two clinical knowledge embed-\\n424\\ndings leads to an average improvement of 11.7%, suggesting that the relationship\
    \ information\\n425\\nencoded in these embeddings helps compensate for missing context. Performance continues to\\n426\\\
    nimprove as more tokens are added, reaching a peak at around 9 to 10 tokens. Beyond this point,\\n427\\nadditional embeddings\
    \ introduce less relevant or less specific information, which reduces overall\\n428\\naccuracy.\\n429\\n\\n430\\nFigure\
    \ 5: Integrating ClinVec with large language models improves medical question-answering. (A) Over-\\n431\\nview diagram\
    \ of question-answering with knowledge injection using ClinVec. (B) We report the accuracy of\\n432\\nRheumatoid arthritis\\\
    nCongestive heart disease\\nGastroesophageal reflux disease\\nUpper respiratory infection\\nA)\\nB)\\nC)\\nD)\\n\\u201cAnswer:\
    \ B\\u201d\\nQuestion:\\nAnswer options:\\nTokenizer:\\nParameter efficient fine-tuning:\\nLLM\\nProjector\\nOutput\\\
    n!\\\"#$\\n!\\\"%&\\n!\\\"#'\\n!\\\"%&\\nB\\nC\\n!\\\"#$%&'()!\\n%&')!\\nA\\nA 77 year old man comes in with complaints\
    \ of\\ndifficulty breathing, fatigue, and swollen ankles.\\nHe has been previously diagnosed with hypertension\\nand currently\
    \ takes Atorvastatin.  What is a potential\\ndiagnosis for the patient?\\n[\\u2019A\\u2019 , \\u201877\\u2019,...,\\u2018takes\\\
    u2019,\\u2018At\\u2019,\\u2018or\\u2019,\\u2018vas\\u2019,\\u2018tatin\\u2019,...,\\u2018A\\u2019,\\u2018Rheum\\u2019,\\\
    u2018atoid\\u2019,\\n\\u2018arthritis\\u2019,\\u2018B\\u2019, \\u2018Congestive\\u2019, \\u2018heart\\u2019,\\u2018disease\\\
    u2019,\\u2018C\\u2019,\\u2018Gastro\\u2019,\\u2018esoph\\u2019,\\n\\u2018ageal\\u2019, \\u2018reflux\\u2019, \\u2018disease\\\
    u2019, \\u2018D\\u2019, \\u2018Upper\\u2019, \\u2018respiratory\\u2019, \\u2018infection\\u2019,\\nSNOMEDCT:Dyspnea, SNOMEDCT:Fatigue,\
    \ SNOMEDCT:Ankle edema, ICD10CM:I10,\"\n  },\n  {\n    \"name\": \"ATC:C10AA05, UMLS:C0003873, UMLS:C0018802, UMLS:C0017168,\
    \ UMLS:C0041912]\",\n    \"text\": \"LLM\\nLLM+ClinVec\\nLLM\\nLLM+ClinVec\\n\\n\\n18\\nN=1,247 medical questions in the\
    \ MedQA dataset. The red line denotes random performance with four candidate\\n433\\nanswer options. (C) Accuracy of N=3,724\
    \ multiple-choice questions from AfriMed-QA dataset. The red line de-\\n434\\nnotes baseline performance with five answer\
    \ options.\\n435\\nTo assess generalizability across different clinical scenarios, we also examined the recently re-\\\
    n436\\nleased AfriMed-QA dataset109, which consists of 3,724 multiple-choice questions collected from\\n437\\nhealthcare\
    \ settings across 16 African countries. Since the dataset was released in early 2025,\\n438\\nthere is no data leakage\
    \ between the training and fine-tuning datasets. We observe a similar mag-\\n439\\nnitude of performance improvement where\
    \ we observe accuracy of 0.64 with the addition of\\n440\\nclinical knowledge embeddings compared to 0.59 without\\u2014a\
    \ 8.5% increase. Breaking down per-\\n441\\nformance by clinical specialty (a label provided in the original dataset),\
    \ we identify the special-\\n442\\nties with the greatest performance gains, including hematology (+37.0%) and ophthalmology\\\
    n443\\n(+20.3%). Given the specificity of these fields, the addition of clinical knowledge yields the most\\n444\\nsubstantial\
    \ improvements in question-answering performance. Hematology shows the largest\\n445\\ngains, likely due to the distinct\
    \ disease presentations encountered in African settings that are un-\\n446\\nderrepresented in the training data of most\
    \ large language models. For instance, one correctly an-\\n447\\nswered question concerns antiretroviral treatment regimens\
    \ for HIV-associated anemia, a clinical\\n448\\nscenario more common in regions with high HIV prevalence. This example\
    \ illustrates how an-\\n449\\nchoring model responses in structured, domain-specific knowledge from ClinVec helps address\\\
    n450\\nregional variation and improves accuracy in specialized medical contexts. We observe consistent\\n451\\nperformance\
    \ improvements across both U.S.- and Africa-based clinical questions, suggesting\\n452\\nthat ClinVec supports generalizable\
    \ medical reasoning.\\n453\"\n  },\n  {\n    \"name\": \"Discussion\",\n    \"text\": \"454\\nWe introduce ClinGraph,\
    \ a clinical knowledge graph, and ClinVec, a corresponding set of\\n455\\n153,166 clinical vocabulary embeddings, that\
    \ together translate structured clinical information\\n456\\ninto a machine-readable format for use in AI models. These\
    \ embeddings capture patterns among\\n457\\nclinical codes that reflect human anatomy, disease presentation, and healthcare\
    \ organization.\\n458\\nThey encode semantic relationships that support the combination and comparison of clinical con-\\\
    n459\\ncepts. We demonstrate that the embeddings enable patient-level prediction across diverse condi-\\n460\\ntions without\
    \ using patient data during training. Evaluations by inter-institutional panels of clini-\\n461\\ncians from the United\
    \ States and Israel confirm that the embeddings align with current clinical\\n462\\n\\n\\n19\\nknowledge and practice.\
    \ This resource offers a generalizable framework for sharing clinical\\n463\\nknowledge and developing transferable, knowledge-grounded\
    \ AI models.\\n464\\nClinical code embeddings offer a way to represent structured clinical knowledge for use in AI\\n465\\\
    nmodels. By encoding relationships among diagnoses, procedures, medications, and laboratory\\n466\\ntests, the embeddings\
    \ create a knowledge-grounded representation of clinical data that can be\\n467\\nused in downstream machine learning\
    \ applications. These representations are well-suited to serve\\n468\\nas inputs to foundation models, large-scale models\
    \ pre-trained on unlabeled data and adapted to\\n469\\nspecific tasks through fine-tuning with labeled datasets110. The\
    \ foundation model approach has\\n470\\nshown success in natural language processing and computer vision, supported in\
    \ part by the\\n471\\navailability of publicly shared models such as DeepSeek111 and LLaMA112. Our resource can be\\n472\\\
    nused in retrieval-augmented generation113 systems where embeddings serve as a structured\\n473\\nknowledge base. In this\
    \ setting, relevant embeddings can be retrieved based on a user prompt to\\n474\\nprovide clinical context and support\
    \ more accurate and informed model outputs41.\\n475\\nWhile this resource offers a foundation for advancing precision\
    \ medicine, it has several limita-\\n476\\ntions. First, the current knowledge representations do not model uncertainty.\
    \ Clinical knowledge\\n477\\nis derived from heterogeneous sources, and the frequency or relevance of specific observations\\\
    n478\\ncan vary across populations. For example, while disease guidelines may list several symptoms,\\n479\\ntheir prevalence\
    \ and clinical importance often differ between individuals. Second, the quality of\\n480\\nthe embeddings depends on the\
    \ accuracy of the underlying KG. Errors such as incorrect or in-\\n481\\ncomplete edges can introduce noise and distort\
    \ the learned representations. As clinical\\n482\\nknowledge evolves, the graph must be regularly updated to reflect current\
    \ clinical standards and\\n483\\npractice. Third, the embeddings do not incorporate contextual information, such as age\
    \ or sex,\\n484\\nwhich can influence the presentation and interpretation of clinical concepts. For example, the\\n485\\\
    nclinical presentation of a heart attack can vary significantly between males and females114, but\\n486\\nthis delineation\
    \ is not considered in the construction of the embeddings.\\n487\\nClinVec embeddings cover common and chronic diseases,\
    \ with limited representation of genetic\\n488\\ndisorders and Mendelian conditions. Future work will incorporate codes\
    \ from phecodeX115, an\\n489\\nupdated vocabulary that includes chromosomal anomalies, as well as resources focused on\
    \ Men-\\n490\\ndelian diseases, such as the Online Mendelian Inheritance in Man (OMIM)116 and Human Pheno-\\n491\\ntype\
    \ Ontology (HPO)74. We also plan to integrate databases that capture biological mechanisms,\\n492\\n\\n\\n20\\nincluding\
    \ those involving genes and proteins, to improve the representation of disease with com-\\n493\\nplex or poorly defined\
    \ clinical features.\\n494\\nClinGraph consolidates fragmented coding systems into a unified representation of clinical\\\
    n495\\nknowledge, addressing interoperability challenges while protecting patient privacy. The embed-\\n496\\ndings are\
    \ designed to capture clinical knowledge that generalizes across care settings and aligns\\n497\\nwith established medical\
    \ practices. Unlike datasets that only reflect recorded health states, Clin-\\n498\\nVec embeddings incorporate information\
    \ about clinical guidelines, mechanistic associations, and\\n499\\ndisease-treatment pathways. Because the embeddings\
    \ are derived from structured vocabularies\\n500\\nand not patient-level data, they can be shared across institutions\
    \ without risk of exposing identifi-\\n501\\nable information. Unlike models pre-trained on patient records, which may\
    \ inadvertently retain\\n502\\nor memorize sensitive information117,118, ClinVec embeddings can be shared across healthcare\\\
    n503\\nsystems without risking patient privacy. This approach also reduces dependence on specific pa-\\n504\\ntient populations\
    \ and supports diverse clinical applications. By embedding structured clinical\\n505\\nknowledge into AI models, this\
    \ resource helps ensure that predictions are grounded in estab-\\n506\\nlished medical understanding119. Resources such\
    \ as unified clinical vocabulary embeddings can\\n507\\nstrengthen the reliability and generalizability of AI models.\\\
    n\\n508\\n\\n\\n21\"\n  },\n  {\n    \"name\": \"Methods\",\n    \"text\": \"509\\nStandardized medical vocabularies\\\
    n510\\nWe use standardized medical vocabularies to construct all clinical concepts in ClinGraph and\\n511\\nClinVec, supporting\
    \ broad applicability across clinical use cases:  Unified Medical Language\\n512\\nSystem (UMLS), International Classification\
    \ of Diseases (ICD)120, Anatomical Therapeutic\\n513\\nChemical (ATC) Classification121, RxNorm122, Systemized Nomenclature\
    \ of Medicine \\u2013 Clinical\\n514\\nTerms (SNOMED CT)123, Current Procedural Terminology (CPT)124, Logical Observation\
    \ Iden-\\n515\\ntifiers Names and Codes (LOINC)125, and phecodes126. Here, we define a clinical code as an en-\\n516\\\
    ntry within a medical vocabulary with a unique identifier.\\n517\\nWe begin by integrating the clinical codes and relationships\
    \ defined in the UMLS vocabulary.\\n518\\nWe incorporate all UMLS CUIs (concept unique identifier) with a source vocabulary\
    \ in\\n519\\nICD10CM, SNOMED CT, LOINC, RxNorm, ATC, or CPT (N=42,883 nodes). Next, we inte-\\n520\\ngrate all ICD10CM\
    \ codes up to 2 decimal places (N=34,842) and all ICD9CM codes. We also\\n521\\nadd information from the phecode coding\
    \ system which represents clinical phenotypes as phe-\\n522\\ncodes, formed by aggregating groups of diagnostic codes\
    \ (i.e., ICD codes) into clinical sub-\\n523\\ngroupings (N=1,817) 127\\u2013129. Phecodes were developed to facilitate\
    \ the secondary use of EHRs\\n524\\nfor biomedical research rather than for patient monitoring or hospital administration.\
    \ Numbers\\n525\\nafter the decimal point reflect a hierarchical structure similar to the ICD code hierarchy. Under\\\
    n526\\neach leaf phecode is the set of corresponding ICD-9/10 codes where each phecode has between 1\\n527\\n\\u2013 20+\
    \ associated ICD-9/10 codes. Next, we add nodes representing LOINC Part codes, which are\\n528\\nstandardized attribute\
    \ values used to construct the LOINC codes that specify a given laboratory\\n529\\ntest. We restrict our inclusion to\
    \ only LOINC Part component codes which refer to the substance\\n530\\nbeing tested (N=14,399). We also incorporate all\
    \ CPT codes (N=4,377), ATC codes (levels 3-5:\\n531\\nN=5,179), and RxNorm drug groups (N=10,130).\\n532\\nNext, we integrate\
    \ a subset of SNOMED CT codes as nodes in ClinGraph. Because the\\n533\\nSNOMED CT vocabulary includes many codes (>350,000),\
    \ we wanted to restrict the inclusion\\n534\\nto the most clinically relevant codes. We begin by selecting all SNOMED\
    \ CT codes from the\\n535\\nCORE (Clinical Observations Recording and Encoding) Subset, a set of most frequently used\\\
    n536\\ncodes provided by UMLS constructed to maximize data interoperability across institutions. Next,\\n537\\nwe include\
    \ SNOMED CT codes from the Convergent Medical Terminology subset diagnosis list,\\n538\\n\\n\\n22\\na set of core terms\
    \ originally curated by Kaiser Permanente and now used across numerous\\n539\\nhealthcare systems.\\n540\\nRelationships\
    \ between clinical concepts\\n541\\nTo construct edges between pairs of clinical concepts (nodes), we first incorporate\
    \ relationships\\n542\\ndefined by the PheMap database, an existing knowledge base of biomedical knowledge that de-\\\
    n543\\nfines a set of relationships between the codes and various clinical vocabularies83. This database\\n544\\noffers\
    \ relationship pairs linking phecodes and clinical codes from other medical vocabularies, in-\\n545\\ncluding RxNorm,\
    \ CPT, LOINC, and SNOMED CT. Relationships defined in PheMap were de-\\n546\\ntermined through text mining and natural\
    \ language processing of open-source biomedical litera-\\n547\\nture. These relationships can be interpreted as a phenotype\
    \ being \\u201cassociated with\\u201d a given clini-\\n548\\ncal concept. To construct relationships between different\
    \ medication codes, we use ATCPROD,\\n549\\na product-level mapping of RxNorm to ATC-4 classes. Edges between ICD9CM and\
    \ ICD10CM\\n550\\ncodes are derived from the General equivalence mappings (GEM), the official crosswalk map-\\n551\\nping\
    \ diagnoses codes to and from ICD9CM and ICD10CM.\\n552\\nConstructing ClinGraph\\n553\\nTo efficiently represent clinical\
    \ knowledge in a format optimized for machine learning, we for-\\n554\\nmally organize the clinical codes and relationships,\
    \ as described above, into a heterogenous\\n555\\nknowledge graph130 (KG) called ClinGraph. We draw an undirected edge\
    \ between two clinical\\n556\\ncodes if they have a pairwise relationship as described above in the clinical vocabulary\
    \ aggrega-\\n557\\ntion process. Multiple edges are drawn if two nodes have a relationship defined multiple times\\n558\\\
    n(e.g., a relationship between a phecode and ICD-9CM code derived from the phecode hierarchy\\n559\\nand the PheMap knowledge\
    \ base). The final graph comprises 153,166 nodes across seven node\\n560\\ntypes and 2,873,025 edges, and the distribution\
    \ of nodes and edges can be found in Supplemen-\\n561\\ntary Table S1, S2.\\n562\\nWe model 4 distinct node types: diagnosis\
    \ codes (ICD9CM, ICD10CM, phecodes), medications\\n563\\n(ATC, RxNorm), laboratory tests/procedures (LNC, CPT), and clinical\
    \ concepts/vocabularies\\n564\\n(SNOMED CT, UMLS). By grouping similar vocabularies (e.g., RxNorm and ATC), we allow\\\
    n565\\nfor information sharing across similar nodes. However, modeling distinct edge types would re-\\n566\\nquire the\
    \ harmonization of relationship types across databases. For databases without defined\\n567\\nedge type semantics, such\
    \ as PheMap, this harmonization process would likely require additional\\n568\\n\\n\\n23\\nresources and clinical expertise.\
    \ For this reason, we only model distinct node types and leave the\\n569\\nimplementation of edge-type specific embeddings\
    \ as future work.\\n570\\nHeterogenous graph transformer\\n571\\nGraph notation\\n572\\nA heterogeneous graph, \\ud835\\\
    udca2= (\\ud835\\udcb1, \\u2130), is defined by a set of nodes \\ud835\\udcb1 and edges \\u2130. We define a\\n573\\nmapping\
    \ function \\ud835\\udc53!: \\ud835\\udcb1\\u2192\\ud835\\udcaf!where each node \\ud835\\udc63\\u2208\\ud835\\udcb1 has\
    \ an assigned node type \\ud835\\udc53!(\\ud835\\udc63) \\u2208\\ud835\\udcaf!.\\n574\\nHere, the node types represent\
    \ different clinical vocabularies. For a given graph, \\ud835\\udca2, we denote\\n575\\nthe graph neural network, \\u210b\\\
    ud835\\udca2, as a function that maps a vector of features for a node \\ud835\\udc62, written\\n576\\nas \\ud835\\udc99\\\
    ud835\\udc96 \\u2208\\u211d%, to a vector of real numbers representing the latent space:\\n577\\n\\u210b\\ud835\\udca2:\
    \ \\ud835\\udc99\\ud835\\udc96\\u2192\\ud835\\udc9b\\ud835\\udc96 .\\n578\\nHere, \\ud835\\udc51 is the dimension of the\
    \ input vector. This resulting mapped vector (also called an embed-\\n579\\nding) is denoted by \\ud835\\udc9b\\u2208\\\
