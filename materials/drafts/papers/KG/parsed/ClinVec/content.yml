    ning to the order in which each variable is introduced.\\n\\n586\\n\\n\\n25\\nOverview\\n587\\nWe model the architecture\
    \ of our graph neural network (GNN) after the heterogeneous graph\\n588\\ntransformer (HGT)86. In this work, we briefly\
