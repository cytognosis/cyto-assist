    \ \"L$+)#0/05\",\n    \"text\": \".1%\\\"0/01%\\n>*$(\\\"#1+5\\nClinGraph: unified clinical knowledge graph for EHRs\"\
    \n  },\n  {\n    \"name\": \"H-+-5(\",\n    \"text\": \"%$+)#0/05\\n.1%\\\"0/01%\\n\\n\\n6\\nWhile KGs represent information\
    \ as discrete nodes and edges, embedding-based representations\\n140\\ncreate a machine-readable form of information that\
    \ encodes clinical concepts and their contex-\\n141\\ntual information into continuous vectors. Transforming discrete\
    \ KGs into continuous embed-\\n142\\ndings enables complex inference tasks, such as grounding AI models in clinical knowledge85,\\\
    n143\\nthat are not possible using only node-and-edge graph representations. Using a heterogenous\\n144\\ngraph transformer\
    \ (HGT)86, we learn a function that maps each node (medical code) in the KG to\\n145\\nlow-dimensional representations\
    \ (embeddings). The KG determines how information is shared\\n146\\nbetween nodes throughout the KG, while a multi-head\
    \ attention mechanism enhances the\\n147\\nmodel\\u2019s ability to up-weight and down-weight different parts of the topological\
    \ space87. We\\n148\\nmodel four distinct node types\\u2014diagnosis codes, medications, laboratory tests/procedures,\
    \ and\\n149\\nclinical concepts/vocabularies\\u2014where grouping similar vocabularies (e.g., RxNorm and ATC)\\n150\\\
    nenables information sharing across related nodes while preserving enough type-specific infor-\\n151\\nmation to support\
    \ effective parameter learning (Methods). We train the model for edge predic-\\n152\\ntion through self-supervised learning\
    \ via contrastive edge masking88. This approach generates\\n153\\nembeddings for each clinical code such that codes located\
    \ near one another in the knowledge\\n154\\ngraph are also positioned closely in the latent space, reflecting their semantic\
    \ similarity.\\n155\\nTo support the integration of ClinVec into AI models, the learned embeddings must be consistent\\\
    n156\\nwith current clinical knowledge and reflect information used in routine healthcare. Existing ref-\\n157\\nerence\
    \ datasets for evaluating the semantic relatedness of clinical terms are limited in size (fewer\\n158\\nthan 1,500 data\
    \ points) and based on outdated coding systems that include obsolete codes. We\\n159\\nconstructed a new validation dataset\
    \ consisting of 96 diseases across 10 major disease categories,\\n160\\nsuch as circulatory and respiratory disorders,\
    \ and over 3,000 SNOMED CT codes. A panel of ex-\\n161\\npert clinicians from Israel and the United States annotated the\
    \ dataset. Based on clinician input,\\n162\\nwe selected 96 phecodes representing conditions that are clinically relevant\
    \ to general adult pa-\\n163\\ntient populations. For each phecode, we identified the 20 SNOMED CT codes with the highest\\\
    n164\\ncosine similarity to the phecode embedding and randomly sampled an additional 20 SNOMED\\n165\\nCT codes as controls\
    \ (Figure 2A).\\n166\\nCodes already forming an edge with the disease node within the knowledge graph were excluded\\\
    n167\\nfrom the analysis. The final evaluation dataset comprises 96 disease lists, each with 40\\n168\\nSNOMED CT codes\
    \ for a total of 3,680 data points, almost 3 times the size of existing bench-\\n169\\nmarks combined.\\n170\\n\\n\\n7\\\
    n171\\nFigure 2: Concordance between ClinVec embedding similarity and clinical expert scores. (A) Overview of clin-\\\
    n172\\nical expert review process. (B) We report the mean cosine similarity across all disease-term pairs stratified by\
    \ clini-\\n173\\ncal expert scores 1-5. (C) We stratify cosine similarity scores across four disease categories and show\
    \ examples of\\n174\\nSNOMED CT codes that were assigned a clinical expert score of 5.\\n175\\nTo assess the relevance\
    \ of each clinical code to a given disease, clinicians graded SNOMED CT\\n176\\ncodes on a scale from 1 (unrelated) to\
    \ 5 (very relevant), evaluating both accuracy and applicabil-\\n177\\nity to clinical practice (Figure 2B). Clinicians\
    \ graded each SNOMED CT code on a scale from 1\\n178\\nto 5, where 1 indicated the code was unrelated to the target disease\
    \ and 5 indicated it was highly\\n179\\nrelevant and frequently observed in clinical practice. We compared these expert\
    \ ratings to the co-\\n180\\nsine similarity between the corresponding ClinVec embeddings. Grouping similarity scores\
    \ by\\n181\\nclinician rating revealed a positive correlation, with mean cosine similarity increasing across\\n182\\nscores\
    \ 1 to 5 (0.30, 0.53, 0.58, 0.63, 0.61). When stratifying by disease category, we observed\\n183\\nlower alignment for\
    \ neoplasms compared to other categories. In this case, high embedding simi-\\n184\\nlarity was often assigned a low clinical\
    \ relevance score by reviewers. This misalignment likely\\n185\\nreflects the heterogeneity of neoplasms, which vary by\
