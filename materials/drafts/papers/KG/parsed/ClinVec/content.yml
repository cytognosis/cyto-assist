    udc62).\\n681\\nNode type-aware sampling of positive and negative edges\\n682\\nThe contrastive learning requires specifying\
    \ positive and negative edges during training, where a\\n683\\npositive edge is defined as a pair of nodes with an existing\
    \ edge in ClinGraph, and a negative\\n684\\nedge is a pair of nodes that are not connected by an edge. To generate a training\
    \ tuple comprised\\n685\\nof a single positive edge and a set of corresponding negative edges, we randomly sample an ex-\\\
    n686\\nisting edge within ClinGraph denoted as (\\ud835\\udc62, \\ud835\\udc63) and \\ud835\\udcafF(\\ud835\\udc63) is\
    \ the node type of target node \\ud835\\udc63. To\\n687\\ncreate a negative sample, we select a node \\ud835\\udc5f such\
    \ that \\ud835\\udcafF(\\ud835\\udc5f) = \\ud835\\udcafF(\\ud835\\udc63) and \\ud835\\udc5f\\u2209\\ud835\\udca9(\\ud835\\\
    udc62).\\n688\\nStochastic mini-batch training with neighbor sampling\\n689\\nBecause the topology and size of the GNN\
    \ are determined by the KG, storing the entire network\\n690\\nand its hidden states onto a single GPU is impossible.\
    \ Although training with mini-batches alle-\\n691\\nviates some of this issue, the computation graph (the set of nodes\
    \ involved in message passing in\\n692\\n\\n\\n29\\neach iteration) for a GNN with L layers often still includes millions\
    \ of parameters. To circumvent\\n693\\nthis, we use node neighbor sampling to select only a subset of nodes to include\
    \ at each layer\\n694\\nwhen computing a node\\u2019s message vector. Specifically, we take a sample n of neighbors at\
    \ each\\n695\\nk-hop neighborhood at each gradient descent step when computing messages during optimiza-\\n696\\ntion.\
    \ Node types with a smaller set of nodes ClinGraph are upweighted to ensure they are repre-\\n697\\nsented in the sampling.\
    \ The number of samples at each layer is a hyperparameter selected\\n698\\nthrough hyperparameter tuning. The final training\
    \ was performed on an H100 GPU for ten\\n699\\nepochs, during which we trained on all 2,873,025 edges of the KG.\\n700\\\
    nHyperparameter tuning\\n701\\nWe perform hyperparameter tuning in 2 steps: first for the model architecture and then\
    \ for the\\n702\\nparameters involved in the contrastive learning objective. We select a random subset of 500,000\\n703\\\
    nedges for training and 100,000 for validation from ClinGraph. We perform hyperparameter tun-\\n704\\ning using Raytune\
    \ where we fix the learning rate (1e-4), number of negative samples (10), batch\\n705\\nsize (100), and sampling neighborhood\
    \ (10) and vary the following parameters: number of layers\\n706\\n(2, 3, 4), input feature dimension (128, 256, 512),\
    \ output embedding dimension (128, 256, 512),\\n707\\nhead dimension (128, 256, 512), number of heads (2, 3, 4), and dropout\
    \ (0, 0.1, 0.2). Perfor-\\n708\\nmance is assessed by measuring the prediction accuracy on the set of 100,000 validation\
    \ edges\\n709\\nand 100,000 node pairs that are not linked in the KG (negative edges). The optimal set of GNN\\n710\\\
    nparameters is 4 layers, 128 input dimensions, 128 output embedding dimensions, 512-dimension\\n711\\nhead size, three\
    \ heads, and a dropout of 0.0.\\n712\\nWe repeat the hyperparameter selection process by fixing the parameters selected\
    \ above and vary\\n713\\nthe following: learning rate (1e-3, 1e-4, 1e-5), neighborhood sampling (5, 10, 20), and number\
    \ of\\n714\\nnegative samples (3, 5, 10). The final hyperparameter set selected is a learning rate of 1e-5,\\n715\\nneighborhood\
    \ sampling of 20 nodes, and three negative samples. All experiments were per-\\n716\\nformed using the Ray Tune software\
    \ (https://docs.ray.io/en/latest/tune/index.html).\\n717\\nClinical evaluation study\\n718\\nA key transferability aspect\
    \ is demonstrating that the inferred clinical knowledge embeddings\\n719\\ncapture medical insights that align with established\
    \ clinical consensus. Although the knowledge\\n720\\ngraph construction was based on mined biomedical literature, the\
    \ inferred embeddings and latent\\n721\\nspace offer insight into relationships between codes beyond the direct edges\
    \ in the KG. To\\n722\\n\\n\\n30\\nvalidate this, we perform a human pilot evaluation with groups of clinical experts\
    \ from Brigham\\n723\\nWomen\\u2019s (N=1), Mass General (N=1), Boston Children\\u2019s Hospital (N=1), and CHS (N=3).\\\
    n724\\nTo systematically assess this, we evaluate the association between different diseases and\\n725\\nSNOMEDCT US codes.\
    \ We restrict the set of SNOMED codes to the Clinical Observations Re-\\n726\\ncordings and Encoding (CORE) Problem List\
    \ Subset of SNOMED CT48. This subset of codes\\n727\\nhas been identified as most informative in documenting and encoding\
    \ clinical information. We\\n728\\nsurvey clinicians to select 90 disease phenotypes (phecodes) that broadly capture major\
    \ disease\\n729\\nareas and are clinically relevant for potential clinical AI applications. For each disease, we com-\\\
    n730\\npute the cosine similarity between each SNOMED CT code that does not already form an edge\\n731\\nwith the target\
    \ phecode. We select the top 20 SNOMED CT codes for evaluation. A control set is\\n732\\nconstructed by randomly selecting\
    \ 20 SNOMED CT codes that are not in the top 20 nor already\\n733\\nform an edge in the KG. To prevent biases due to differences\
    \ in the frequency of symptoms or\\n734\\nhigh degree and low degree within ClinGraph, we match control SNOMED CT codes\
    \ based on\\n735\\nthe case code\\u2019s node degree.\\n736\\nClinicians were provided with shuffled disease lists of\
    \ case and control codes. For a given dis-\\n737\\nease, a single clinician evaluated the full list of codes. They were\
    \ provided a brief background of\\n738\\nSNOMED CT codes and a scoring rubric where they were asked to evaluate each SNOMED\
    \ CT\\n739\\ncode according to how related each code is to the given disease phenotype. We utilize a Likert\\n740\\nscale134\
    \ based on scores 1 \\u2013 5: \\u2018unrelated\\u2019 (0) and ' highly related\\u2019 (5). If a code is too broad or\\\
    n741\\nnon-specific (e.g. \\u2018Clinical evaluation\\u2019), these are assigned a 0.\\n742\\nVisualizing the latent space\\\
    n743\\nTo visualize the ClinVec embedding space, we perform UMAP135 directly on the embedding vec-\\n744\\ntors and plot\
    \ the first two dimensions. When performing dimensionality reduction, we use phe-\\n745\\ncodes, ICD10CM, ATC, LOINC,\
    \ CPT, and SNOMED CT embeddings. Phecode categorizations\\n746\\nare pre-defined from the phecode v1.2 mapping136. To\
    \ visualize the latent space of phecodes\\n747\\nwithin the digestive system, we performed UMAP only on the subset of\
    \ ICD10CM embeddings\\n748\\nwithin the \\u2018Digestive\\u2019 category. We highlight ICD10CM codes broadly corresponding\
    \ to\\n749\\nmouth/teeth conditions (phecodes 520-530), functional digestive disorders (560-570), and biliary\\n750\\\
    ntract disorders (570-580). To highlight embeddings related to specific diseases, we compute the\\n751\\ncosine similarity\
    \ between an ICD10CM embedding (representing a disease) and each embedding\\n752\\nwithin the latent space. We visualize\
    \ this relationship by shading each embedding within the\\n753\\n\\n\\n31\\nUMAP space according to the cosine similarity.\
    \ We highlight relevant codes for lupus and type 1\\n754\\ndiabetes to provide additional interpretation of the latent\
    \ space map. This information was de-\\n755\\nrived from the guidelines provided by the National Resource Center on Lupus137\
    \ and the Centers\\n756\\nfor Disease Control and Prevention138.\\n757\\nComparing embeddings from PrimeKG and SNOMED-CT\
    \ KG\\n758\\nWe generate embeddings for PrimeKG and SNOMED-CT KG using the same graph transformer\\n759\\narchitecture\
    \ and hyperparameters as ClinGraph. For PrimeKG, we modeled 10 node types as de-\\n760\\nfined by the KG. For SNOMED-CT\
    \ KG, we only used a single node type (i.e. homogenous\\n761\\ngraph) since all nodes represent SNOMED CT codes. We trained\
    \ both models for 5 epochs and\\n762\\ngenerated embeddings of size 128 for all SNOMED CT codes in SNOMED-CT KG and all\
    \ dis-\\n763\\neases (MONDO, HPO nodes) and drugs (DrugBank nodes) for PrimeKG. Clustering metrics, in-\\n764\\ncluding\
    \ silhouette score and adjusted mutual information, were computed according to ATC\\n765\\nlevel 1 and phecode category.\\\
    n766\\nBecause neither KG have ICD or ATC codes, we mapped the nodes as follows. For SNOMED-\\n767\\nCT KG, we mapped\
    \ each SNOMED CT code to its UMLS CUI and then to its corresponding\\n768\\nICD10CM code if present. If a UMLS CUI does\
    \ not have a corresponding source ICD10CM\\n769\\ncode, we removed the node embedding from the cluster calculation. To\
    \ map SNOMED CT to\\n770\\nATC, we first mapped SNOMED CT codes to its UMLS CUI. We then used UMLS to identify\\n771\\\
    nUMLS CUI codes with \\u2018ingredient-of\\u2019 relationships that describe the active ingredient (repre-\\n772\\nsented\
    \ as ATC) present in a given UMLS CUI drug. SNOMED CT codes that did not have a\\n773\\nmapped ATC ingredient were removed\
    \ from the clustering calculation. Clustering metrics were\\n774\\ncomputed using all 128 dimensions from each set of\
    \ embeddings, and cluster visualizations were\\n775\\nproduced using UMAP.\\n776\\nZero-shot embedding retrieval tasks\\\
    n777\\nWe downloaded embeddings from snomed2vec\\n778\\n(https://github.com/KhushbuAgarwal/Snomed2Vec) and cui2vec (https://github.com/beaman-\\\
    n779\\ndrew/cui2vec) directly from the original publications. We formulated a set of 12 retrieval tasks\\n780\\nusing\
    \ well-established disease-symptom and disease-indication lists (Supplementary Table S8).\\n781\\nTop ranked neighbors\
    \ are determined using cosine similarity between embeddings. We report\\n782\\n\\n\\n32\\neach model\\u2019s performance\
    \ using \\u2018hits @ k\\u2019 which measures the proportion of diseases where a\\n783\\nrelevant symptom/drug is ranked\
    \ among the top k items within the embedding space.\\n784\\nDisease embedding arithmetic\\n785\\nConstructing disease\
    \ symptom embeddings\\n786\\nTo demonstrate the syntactic and semantic properties of ClinVec, we use vector-level arithmetic\\\
    n787\\nto aggregate together disease symptoms to form a \\u2018disease symptom embedding\\u2019. Aggregation is\\n788\\\
    nperformed using sum pooling, but any vector-level aggregation method could be used in practice.\\n789\\nFor a given disease,\
    \ we retrieve the list of symptoms from the Mayo Clinic Disease Description\\n790\\nGuidelines139. A clinician manually\
    \ translates each symptom into its corresponding ICD10CM\\n791\\ncode. We provide these translations for all nine diseases\
    \ discussed within this analysis (Supple-\\n792\\nmentary Table S5). To demonstrate the trend of increased similarity\
    \ between a disease embed-\\n793\\nding and the disease symptom embedding, we order symptoms from highest to lowest preva-\\\
    n794\\nlence. We approximate population prevalence using a random sample of 200,000 patients from\\n795\\nthe CHS database.\\\
    n796\\nDisease symptom embeddings are first initialized with a vector of zeros. We then add the embed-\\n797\\ndings from\
    \ all symptoms (represented by an ICD10CM embedding). For visualization, we com-\\n798\\npute the cosine similarity between\
    \ the disease symptom embedding at each step and the target\\n799\\ndisease embedding, represented using an ICD10CM embedding.\
    \ Across diseases, we see a broad\\n800\\ntrend of increased similarity with the disease embedding as more symptoms are\
    \ aggregated.\\n801\\nRobustness analysis\\n802\\nTo assess the robustness and generalizability of these trends, we perform\
    \ the same analysis under\\n803\\nvarious conditions while perturbing different variables in the framework. This includes\
    \ analyses\\n804\\nassessing the uncertainty in selecting disease symptoms, incorrect disease specification, and the\\\
    n805\\nimpact of random symptoms. First, due to the noise and uncertainty associated with using diag-\\n806\\nnosis codes\
    \ as proxies for disease symptoms13, we tried to model real-world circumstances by\\n807\\nvarying the ICD10CM code used\
    \ to represent each symptom. We selected a set of candidate\\n808\\nICD10CM codes for each symptom by taking the original\
    \ code from the clinician review and se-\\n809\\nlecting all ICD10CM codes with the same parent code by removing one decimal\
    \ place. For ex-\\n810\\nample, for code \\u2018786.2\\u2019 (Cough), the candidate set would include \\u2018786.1\\u2019\
    \ (Stridor), \\u2018786.0\\u2019\\n811\\n\\n\\n33\\n(Dyspnea and respiratory abnormalities), etc. Then, when selecting\
    \ each symptom for aggrega-\\n812\\ntion, a random code from the candidate set is selected. This process is repeated 10\
    \ times, yielding\\n813\\nsimilarity curves constructed from 10 different disease symptoms.\\n814\\nNext, we wanted to\
    \ simulate when the disease of interest is mis-specified compared to the symp-\\n815\\ntom list. This reflects situations\
    \ where the symptoms do not describe the target disease of interest\\n816\\nbut, instead, a closely related condition.\
    \ To imitate this, we selected a set of diseases similar to\\n817\\nthe target disease; this was done by looking at other\
    \ ICD10CM with the same parent code. When\\n818\\ncomputing the similarity between symptom embedding and disease embedding\
    \ composition, we\\n819\\nused the phecode embedding of the alternative disease. Finally, we wanted to assess the situation\\\
    n820\\nwhere incorrect information is included in the symptom list. We simulated this by adding a ran-\\n821\\ndomly selected\
    \ ICD10CM code to the symptom list and included it in the computation of the ag-\\n822\\ngregated symptoms. Because we\
    \ use vector addition to aggregate symptoms and addition is com-\\n823\\nmutative, we place the random symptom at the\
    \ beginning of the aggregation procedure.\\n824\\nPhenotype risk score\\n825\\nCase/control construction\\n826\\nTo define\
    \ cases, we first selected all patients with at least one ICD9CM code from the list of in-\\n827\\nclusion codes (CHS\
    \ encodes their EHR using ICD9CM). We then filter patients to include only\\n828\\npatients listed on the CHS chronic\
    \ registry to confirm they have received the disease diagnosis.\\n829\\nBecause patients are not guaranteed to be added\
    \ to the chronic registry when they are first diag-\\n830\\nnosed, we treat the first occurrence of the inclusion ICD9CM\
    \ code as the date of diagnosis. For\\n831\\neach patient, we set the index date as January 1 of the year of diagnosis,\
    \ where only information\\n832\\noccurring before the index date will be included in the risk score computation. For prediction,\
    \ we\\n833\\nselect all EHRs recorded within the past 5 years of the index date.\\n834\\nTo define controls, we begin\
    \ with the phecode exclusion criteria provided by the phecode map-\\n835\\nping v1.2. For each phecode, the mapping provides\
    \ a list of exclusion phecodes that are typically\\n836\\nsimilar conditions or overlap with the target disease. We begin\
    \ by selecting all individuals who\\n837\\nhave never received any exclusion diagnoses at any point in their EHR. We also\
    \ remove individ-\\n838\\nuals from the chronic disease registry for the specified disease. We select a matched control\
    \ from\\n839\\nthis set of candidate control patients for each case. Matching is based on the following criteria: 1)\\\
    n840\\nsame sex, 2) year of birth \\u00b12 years, and 3) number of recorded diagnoses in the EHR (with at\\n841\\n\\n\\\
    n34\\nleast 1 diagnosis in the EHR). The complete case-control process is illustrated in Supplementary\\n842\\nFigure\
    \ S5.\\n843\\nRisk score computation\\n844\\nFor a given disease, a risk score is computed as the weighted sum of relevant\
    \ clinical codes,\\n845\\nwhere the weight is the cosine similarity between the embedding of each code and the disease\\\
    n846\\nembedding. We restricted the set of potential features to laboratory tests, medications, and\\n847\\nICD9CM codes\
    \ with at least a 0.1% prevalence within the CHS patient population. The CHS\\n848\\nEHR did not have SNOMED CT or CPT\
    \ codes for analysis. To determine the clinical codes re-\\n849\\nlated to each disease, we compute the cosine similarity\
    \ between all clinical codes within the la-\\n850\\ntent space and the target disease embedding, represented by a phecode.\
    \ The final set of features\\n851\\nis the top k codes, where k=20, and the feature weights are the cosine similarity\
    \ scores. In prac-\\n852\\ntice, the choice of k can be treated as a hyper-parameter and optimized with a validation dataset,\\\
    n853\\nsimilar to the p-value thresholding of polygenic risk scores. Patient risk scores are computed as a\\n854\\nweighted\
    \ sum where the associated weight is added to the sum if the patient has the given code\\n855\\nin their EHR and given\
    \ a 0 otherwise. Features are counted once in the score computation, even\\n856\\nif a patient receives the codes multiple\
    \ times.\\n857\\nSurvival analysis\\n858\\nFor each disease, we computed the most common age at diagnosis and the sex\
    \ with the highest\\n859\\ndisease prevalence. We restricted the survival analysis to patients meeting these age/sex criteria\\\
    n860\\nand those with a diagnosis date from 2016 or earlier. We re-computed risk score quantiles based\\n861\\nonly on\
    \ this restricted set of patients. We looked at the 6 years of EHR after each patient\\u2019s index\\n862\\ndate and denoted\
    \ a patient as deceased if they had a non-null death date. Patients were stratified\\n863\\ninto risk score quartiles\
    \ based on the risk score computed at the index date. Confidence intervals\\n864\\nfor the survival curves were computed\
    \ using 10,000 bootstrapped samples.\\n865\\nIntegrating ClinVec with LLMs\\n866\\nWe augment MMed-Llama106\\u2014an 8-billion-parameter\
    \ open-source medical foundation model\\n867\\nthat already incorporates domain-specific knowledge through pre-training\\\
    u2014with 42,883 ClinVec\\n868\\nembeddings and a 4-layer MLP projector module to align embedding dimensions which is\\\
    n869\\ntrained with parameter efficient fine-tuning. We download the pre-trained model from Hugging\\n870\\n\\n\\n35\\\
    nFace (https://huggingface.co/Henrychur/MMed-Llama-3-8B) and use the authors\\u2019 fine-tuning\\n871\\npipeline to perform\
    \ parameter efficient fine-tuning with LoRA140 (https://github.com/MAGIC-\\n872\\nAI4Med/MMedLM/tree/main). We used the\
    \ same prompts and sets of hyper-parameters pro-\\n873\\nvided by MMed-Llama, specifically tuning the following target\
    \ modules: \\u2018q_proj\\u2019, \\u2018v_proj\\u2019,\\n874\\n\\u2018v_proj\\u2019, \\u2018mlp\\u2019. Fine-tuning was\
    \ performed on the training English subset of multiple-choice\\n875\\nquestions from the MedQA dataset (https://huggingface.co/datasets/VodLM/medqa).\\\
    n876\\nMetaMap\\n877\\nWe annotate each multiple-choice question using the MetaMap141 tool, which annotates natural\\\
    n878\\nlanguage text with UMLS CUI codes. For each question, we concatenated the text from the ques-\\n879\\ntion and\
    \ the answer options and submitted the text to the MetaMapLite REST API\\n880\\n(https://ii.nlm.nih.gov/metamaplite/rest).\
    \  We limit the choice of UMLS CUI codes to the follow-\\n881\\ning semantic types: \\u201cSign or Symptom\\u201d, \\\
    u201cDisease or Syndrome\\u201d, \\u201cPharmacological Substance\\u201d,\\n882\\n\\u201cMental or Behavioral Dysfunction\\\
    u201d, \\u201cChemical\\u201d, \\u201cAnatomical Structure\\u201d.\\n883\\nAfriMed-QA\\n884\\nWe also perform a validation\
    \ study on the AfriMed-QA109 dataset (https://huggingface.co/da-\\n885\\ntasets/intronhealth/afrimedqa_v2). We restricted\
    \ to only multiple-choice questions and removed\\n886\\nquestions that had more than one assigned correct answer. The\
    \ original dataset provides clinical\\n887\\nsubspecialty information for each question.\\n888\\nInstitutional Review\
    \ Board approval\\n889\\nParts of this study that relate to the use of CHS data (for evaluating the predictive ability\
    \ of the\\n890\\nKG-derived concept embeddings) were approved by the CHS Institutional Review Board (Hel-\\n891\\nsinki)\
    \ committee.\\n\\n892\\n\\n\\n36\"\n  },\n  {\n    \"name\": \"Data availability\",\n    \"text\": \"893\\nData and clinical\
    \ concept embeddings, as well as the ClinGraph knowledge graph, are available\\n894\\nvia Harvard Dataverse https://doi.org/10.7910/DVN/Z6H1A8.\
    \ Due to national and organiza-\\n895\\ntional data privacy regulations, CHS individual-level data from this study cannot\
    \ be shared pub-\\n896\\nlicly.\\n897\"\n  },\n  {\n    \"name\": \"Code availability\",\n    \"text\": \"898\\nThe Python\
    \ implementation of the heterogeneous graph transformer and the associated codebase\\n899\\nfor model training, (non-individual-level)\
    \ analyses, and embedding evaluations are available at\\n900\\nhttps://github.com/mims-harvard/Clinical-knowledge-embeddings.\
    \ The project website is at\\n901\\nhttps://zitniklab.hms.harvard.edu/projects/Clinical-knowledge-embeddings.\\n902\"\n\
