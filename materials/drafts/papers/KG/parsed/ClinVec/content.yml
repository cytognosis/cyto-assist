    \ \"name\": \":&'#':'%#*.:/$\\\".*V1[BLFKCW\",\n    \"text\": \"8\\nbehavior. Among disease-code pairs with low clinician\
    \ scores (\\u22642) and high cosine similarity\\n187\\n(>0.8), many mismatches involved anatomical proximity rather than\
    \ clinical relevance. For ex-\\n188\\nample, top-scoring terms for \\u201ccancer of salivary glands\\u201d included thyroid\
    \ conditions. Although\\n189\\nthese organs are anatomically adjacent and involved in autoimmune diseases such as Sj\\\
    u00f6gren\\u2019s\\n190\\nsyndrome or Hashimoto\\u2019s thyroiditis, they are not directly related in the context of salivary\
    \ gland\\n191\\ncancer. These findings suggest that embeddings for highly specific diseases could benefit from\\n192\\\
    nfine-tuning on subgraphs of the KG to improve granularity and clinical alignment.\\n193\\nAnatomical and medical subspecialty\
    \ structure emerge in the embedding space\\n194\\nClinical knowledge embeddings must capture patterns that align with\
    \ human biology, disease\\n195\\npresentation, and clinical workflows. Although ClinGraph shares some content with other\
    \ bio-\\n196\\nmedical KGs, its integration of clinical vocabularies and relationship types produces embeddings\\n197\\\
    nthat more effectively represent clinically meaningful structure in the latent space. To evaluate\\n198\\nthis, we trained\
    \ heterogeneous graph transformers on PrimeKG and a SNOMED CT-based KG\\n199\\nusing the same model architecture and training\
    \ setup as for ClinGraph, and compared the result-\\n200\\ning embedding spaces (Methods).\\n201\\nWe characterize the\
    \ breadth and granularity of the clinical knowledge represented in the learned\\n202\\nembeddings. Visualizing the latent\
    \ space of disease (Figure 3A, Supplementary Figure S1A-C)\\n203\\nand drug embeddings (Figure 3B, Supplementary Figure\
    \ S1D-F) generated by each KG, the em-\\n204\\nbeddings derived from ClinGraph broadly maintain groupings of diseases\
    \ by organ system, mir-\\n205\\nroring the organization of clinical care. However, embeddings produced by PrimeKG and\\\
    n206\\nSNOMED-CT KG do not exhibit this distinct clustering pattern. This observation is supported\\n207\\nwhen comparing\
    \ silhouette scores and adjusted mutual information (AMI) where embedding\\n208\\nclusters from ClinGraph (silhouette:\
    \ 0.54, AMI: 0.31) produce metrics at the same value or\\n209\\ngreater than clusters produced from other KGs (PrimeKG\
    \ - silhouette: 0.54, AMI: 0.02;\\n210\\nSNOMED-CT KG - silhouette: 0.15, AMI: -1e-4). Further examining the clusters\
    \ of phecode\\n211\\nembeddings from ClinGraph, although some phenotypes deviate from these main clusters, many\\n212\\\
    ndeviations reflect known distinctions within clinical care. For example, most endocrine condi-\\n213\\ntions cluster\
    \ together (Figure 3A: orange cluster), but some phenotypes cluster more closely with\\n214\\nsense organ conditions (Figure\
    \ 3A: green cluster). However, this small set of endocrine pheno-\\n215\\ntypes includes mainly eye-related conditions\
    \ resulting from complications from endocrine disor-\\n216\\nders, such as diabetic retinopathy and exophthalmos.\\n217\\\
