    n<3/10).%;)08;)-);\\n#;-3>*\\n();1/:,/;%16%0*;*7\"\n  },\n  {\n    \"name\": \".*I)-4\",\n    \"text\": \"10\\nhighlight\
    \ the following phenotype subcategories: functional digestive disorders \\u2013 phecodes, teeth and mouth disor-\\n224\\\
    nders (center), and biliary system (right). (C) Visualization of embedding space overlaid with ICD10CM, ATC,\\n225\\nSNOMEDCT,\
    \ and CPT codes. Codes are shaded based on cosine similarity with type 1 diabetes (left) and system-\\n226\\natic lupus\
    \ erythematosus (right), and the target disease embedding is denoted with a black diamond. The black stars\\n227\\nindicate\
    \ a subset of codes related to each disease. These are presented along with other codes in their proximity but\\n228\\\
    nare not directly related to the disease of interest.\\n229\\nExtending this clustering analysis to drug categories based\
    \ on the ATC-1 level, embeddings gen-\\n230\\nerated by both ClinGraph and PrimeKG show clustering by drug category although\
    \ ClinGraph\\n231\\nhas a higher silhouette score (0.71 vs. 0.64). In contrast, embeddings from the SNOMED-CT\\n232\\\
    nknowledge graph do not produce distinct clusters and have an AMI score close to zero. This is\\n233\\nlikely attributable\
    \ to the more extensive drug coverage in ClinGraph compared to SNOMED-CT\\n234\\nKG. Again, we also find that deviations\
    \ in the expected cluster labeling according to the ATC-1\\n235\\nclassification in ClinGraph reflect known artifacts\
    \ of the ATC coding system. For example, the\\n236\\nembeddings for ATC-4 codes G01AA (antibiotics) and D06AX (antibiotics\
    \ for topical use) are\\n237\\nlocated nearby in the embedding space despite being in different ATC-1 categories. These\
    \ anal-\\n238\\nyses demonstrate that the effectiveness of clinical embeddings depends on the design of the un-\\n239\\\
    nderlying KG. ClinGraph\\u2019s integration of clinically grounded vocabularies and relationship types\\n240\"\n  },\n\
    \  {\n    \"name\": \"results in more accurate representations, outperforming existing KGs across multiple evaluation\"\
    ,\n    \"text\": \"241\\nmetrics.\\n242\\nA unified clinical vocabulary latent space must capture patterns at broad anatomical\
    \ levels while\\n243\\nalso identifying discernible relationships at clinical subspecialty levels. To illustrate the granular-\\\
    n244\\nity of ClinVec clinical vocabulary embeddings, we perform a separate dimensionality reduction\\n245\\nanalysis\
    \ using only phecodes of the digestive system (Figure 3B). We find that conditions within\\n246\\nthe same subspecialty\
    \ are significantly closer together compared with all other conditions of the\\n247\\ndigestive system, where codes describing\
    \ functional digestive disorders (p-value=3.65\\u00d710-45;\\n248\\ntwo-sided Mann-Whitney U test), biliary system (p-value=6.38\\\
    u00d710-44), and conditions of mouth\\n249\\nand teeth (p-value=1.05\\u00d710-74) are separated within the latent space.\
    \ Although these codes all\\n250\\nfall under the practice of gastroenterology, the embeddings exhibit distinct clustering\
    \ patterns\\n251\\nthat reflect their unique clinical presentations and organ systems. This finding show that ClinVec\\\
    n252\\nembeddings to capture fine-grained distinctions within broader medical categories.\\n253\\nA key advantage of ClinVec\
    \ embedding space is that it allows direct comparison of clinical\\n254\\ncodes across different vocabularies, bridging\
    \ gaps between otherwise disconnected coding\\n255\\n\\n\\n11\\nsystems. We compare ClinVec to two state-of-the-art open-source\
    \ clinical embeddings,\\n256\\nsnomed2vec89 and cui2vec90, in a set of zero-shot retrieval tasks. For a given disease,\
    \ we select\\n257\\nthe top k closest codes within the embedding space and compare with these with the diseases\\u2019\\\
    n258\\nsymptom list as listed in the Mayo Clinic disease description. We report each model\\u2019s perfor-\\n259\\nmance\
    \ using \\u2018hits @ k\\u2019 which measures the proportion of diseases where a relevant symptom is\\n260\\nranked among\
    \ the top k items within the embedding space. We find that the ClinVec embeddings\\n261\\noutperform other approaches\
    \ across a variety of values of k (Supplementary Table S4A). While\\n262\\nhierarchical structures explain some of the\
    \ clustering, the embeddings also capture meaningful\\n263\\npatterns in cross-domain relationships, such as between diseases\
    \ and their associated treatments,\\n264\\nwhich are not strictly hierarchical. We perform a similar analysis for drug\
    \ indications with estab-\\n265\\nlished first-line drug treatments. For example, non-Hodgkin\\u2019s lymphoma and CHOP\
    \ (cyclophos-\\n266\\nphamide, doxorubicin, vincristine, prednisone), testicular cancer and BEP (bleomycin, etoposide,\\\
    n267\\ncisplatin), and major depressive disorder and selective serotonin reuptake inhibitors. Limiting re-\\n268\\ntrieval\
    \ over codes exclusively describing ATC5-level medications, for each disease, we perform\\n269\\nzero-shot retrieval across\
    \ >2,000 drug codes and assess the codes with the highest cosine similar-\\n270\\nity with the disease embedding. We find\
    \ that the ClinVec embeddings outperform other ap-\\n271\\nproaches across a variety of values of k (Supplementary Table\
    \ S4B).\\n272\\nEmbedding space reveals clinically grounded diagnostic and symptom patterns\\n273\\nMany clinical applications\
    \ require disease-level resolution, where models must distinguish be-\\n274\\ntween specific diagnoses and their associated\
    \ symptom profiles. To evaluate how ClinVec cap-\\n275\\ntures these diagnostic patterns, we examine type 1 diabetes (T1D)\
    \ and systemic lupus erythema-\\n276\\ntosus (Figure 3C). We compute the cosine similarity between the T1D embedding and\
    \ ICD10CM\\n277\\ncodes, CPT, LOINC, and SNOMED CT codes within the embedding space and visualize these\\n278\\npatterns\
    \ by projecting the computed cosine similarity onto the latent space. Broadly, near the em-\\n279\\nbedding of T1D, we\
    \ observe regions of high cosine similarity as shaded in red and orange. We\\n280\\nfind that many codes within this region\
    \ are consistent with relevant T1D laboratory tests, such as\\n281\\n\\u2018insulin tolerance panel\\u2019, and common\
    \ complications, including cardiovascular diseases (Meth-\\n282\\nods). We also identify a cluster of eye-related tests\
    \ for T1D, including codes for eye exams and\\n283\\nmacular edema. This highlights the embedding space's ability to capture\
    \ nuanced patterns that\\n284\\nextend beyond identifying codes associated with the same organ system, recapitulating\
    \ patterns\\n285\\naligned with established disease presentations. Repeating this process for lupus, regions with\\n286\\\
    n\\n\\n12\\nhigh cosine similarity highlight relevant tests such as erythrocyte sedimentation rate, which is\\n287\\nused\
    \ to assess systemic inflammation and nephritis, a common complication.\\n288\\nClinVec contains the expressivity and\
    \ flexibility to describe a wide range of clinical scenarios\\n289\\nwithin the embedding space. Through embedding arithmetic,\
    \ embeddings can be combined\\n290\\nmathematically to form new meanings. For example, the similarity between the vector\
    \ summa-\\n291\\ntion of common heart disease symptoms (e.g., shortness of breath, chest pain) and the disease\\n292\\\
    nembedding of common heart disease yields a cosine similarity score of 0.66. These observations\\n293\\nmirror the geometric\
    \ properties of word embeddings in natural language processing91, effectively\\n294\\ncapturing the relationship between\
    \ concepts without explicitly defining it in the original vocabu-\\n295\\nlary. We refer to the aggregation of symptom\
    \ embeddings in this manner as a disease symptom\\n296\\nembedding\\u2014denoting that the resulting vector is a composition\
    \ of the symptoms of a given dis-\\n297\\nease (Figure 4A, 4B).\\n298\\n\\n299\\nFigure 4: Embedding operations mirror\
    \ symptomatic manifestations of clinical conditions. (A) Overview of\\n300\\nthe approach for constructing disease symptom\
    \ embeddings. (B) Line plot showing the cosine similarity across four\\n301\\nautoimmune diseases and the aggregation\
    \ of Graves\\u2019 disease symptoms. Aggregated embeddings are computed by\\n302\\n+\\n+\\nOrdered by highest to\\nlowest\
