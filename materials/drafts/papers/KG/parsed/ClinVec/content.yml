    ud835\\udc9b:D\\ud835\\udc9b6)\\n\\ud835\\udc52\\ud835\\udc65\\ud835\\udc5d(\\ud835\\udc9b:D\\ud835\\udc9b6 + \\ud835\\\
    udc9b:D\\ud835\\udc9b'\\n7 + \\u22ef+ \\ud835\\udc9b:D\\ud835\\udc9b57) .\\n679\\nGiven a dataset of N source nodes, each\
    \ with a corresponding set of candidate nodes as described\\n675\\nabove, the negative log-likelihood over the dataset\
    \ is equivalent to the cross-entropy loss where\\n676\\nthe true \\\"class\\\" always corresponds to the positive node\
    \ \\ud835\\udc636. This type of contrastive loss func-\\n677\\ntion is well-established88,131\\u2013133 and is formulated\
