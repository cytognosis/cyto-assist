content:
  abstract: 'Biomedical knowledge graphs (KGs) are widely used across research and translational settings,

    yet their design decisions and implementation are often opaque. Unlike ontologies that more

    frequently adhere to established creation principles, biomedical KGs lack consistent practices

    for construction, documentation, and dissemination. To address this gap, we introduce a set of

    evaluation criteria grounded in widely accepted data standards and principles from related

    fields. We apply these criteria to 16 biomedical KGs, revealing that even those that appear to

    align with best practices often obscure essential information required for external reuse.

    Moreover, biomedical KGs, despite pursuing similar goals and ingesting the same sources in

    some cases, display substantial variation in models, source integration, and terminology for

    node types. Reaping the potential benefits of knowledge graphs for biomedical research while

    reducing duplicated effort requires community-wide adoption of shared criteria and maturation of

    standards such as Biolink and KGX. Such improvements in transparency and standardization

    are essential for creating long-term reusability, improving comparability across resources,

    providing a rigorous foundation for artificial intelligence models, and enhancing the overall utility

    of KGs within biomedicine.'
  sections: "[\n  {\n    \"name\": \"TISLab, Department of Genetics, University of North Carolina at Chapel Hill\",\n    \"\
    text\": \"4 Environmental Genomics and Systems Biology, Lawrence Berkeley National Laboratory\\n5 Curriculum in Bioinformatics\
    \ and Computational Biology, University of North Carolina at Chapel Hill\"\n  },\n  {\n    \"name\": \"Department of Pediatrics,\
    \ University of Chicago\",\n    \"text\": \"\"\n  },\n  {\n    \"name\": \"Renaissance Computing Institute, University\
    \ of North Carolina at Chapel Hill\",\n    \"text\": \"\"\n  },\n  {\n    \"name\": \"Eshelman School of Pharmacy, University\
    \ of North Carolina at Chapel Hill\",\n    \"text\": \"\"\n  },\n  {\n    \"name\": \"Background and Previous Work\",\n\
    \    \"text\": \"Knowledge graphs (KGs) have gained popularity in recent years for their ability to connect\\ndifferent\
    \ types and sources of data, offering a powerful computational framework to uncover\\nnovel biological hypotheses.  Biomedical\
    \ KG entities consist of disease, gene, mechanism, and\\nother biological types. \\u201cProperties\\u201d linking entities\
    \ include relationships such as \\u2018expressed in,\\u2019\\n\\u2018has phenotype\\u2019, or \\u2018interacts with.\\\
    u2019 Biomedical KGs are typically constructed by aggregating and\\nharmonizing existing curated knowledge bases and ontologies,\
    \ supplemented by additional\\ninformation that may come from text mining, data analyses, or case-level information. By\\\
    ningesting and harmonizing many sources of knowledge, KGs are able to connect knowledge\\n\\n\\nacross biological domains\
    \ leveraging existing research. For instance, the ROBOKOP\\n(Reasoning Over Biomedical Objects linked in Knowledge Oriented\
    \ Pathways)[1,2] KG platform\\nenables researchers to query complex biomedical questions, such as \\u201cWhat environmental\\\
    nexposures are associated with asthma through intermediate biological processes?\\u201d, by\\nintegrating data from curated\
    \ databases like CTD, DrugBank, and gene ontology (GO)\\nannotations [3\\u20135]. KGs have gained particular traction\
    \ in biomedical research domains including\\ndrug repurposing, disease mechanism discovery, and rare disease illumination.\
    \ Previous\\napproaches have included using embeddings, vector representations of the nodes and edges\\nwhich can then\
    \ be used as input for artificial intelligence (AI) algorithms, of these KGs[6\\u20139].\\nOther examples include the\
    \ Monarch Initiative KG connects genotypic and phenotypic data\\nacross species to assist in the diagnosis of rare diseases,\
    \ enabling clinicians to match patient\\nsymptoms with relevant genes even when traditional diagnostic methods fail [10,11].\
    \ Similarly,\\nOpenTarget\\u2019s KG prioritizes drug targets by synthesizing genetic associations, expression data,\\\
    nand pathway information [12]. Many methods have been proposed to link knowledge graphs\\nwith large language models (LLMs)\
    \ to reduce hallucinations and improve scientific utility[13\\u201315].\\nAs LLMs become more widely used in biomedicine,\
    \ KGs can further support them through\\nretrieval-augmented generation (KG-RAG), helping to normalize and ground generative\
    \ outputs.\\nEarly efforts, such as pairing BioGPT and SciSpaCy[16,17] with structured KG-based retrieval,\\ndemonstrated\
    \ how graphs could enhance scientific question answering and mechanistic\\nreasoning. Today, more advanced approaches,\
    \ such as DRAGON-AI, OntoGPT, AMG-RAG,\\nDR.KNOWS, and KGARevion [18\\u201322], illustrate a new generation of agentic\
    \ KG-LLM\\nintegrations. These systems extend beyond retrieval to provide reliability, provenance,\\nreasoning transparency,\
    \ and medical context. Graph-based approaches offer scalable, efficient,\\nand cost-effective ways to generate testable\
    \ hypotheses, often uncovering unexpected\\ncross-domain relationships that would be difficult to detect manually. By\
    \ integrating structured\\nknowledge from genetics, clinical records, literature, pathways, and curated knowledge bases,\\\
    nknowledge graphs (KGs) enable a more comprehensive and mechanistic understanding of\\nbiology and disease [7,8,23\\u201329].\\\
    nThe biomedical knowledge graph (KG) landscape has been described as a \\u201cwild west\\u201d of\\ninconsistent standards\
    \ and practices [30,31]. Many KGs are developed with bespoke methods\\nand evaluated using metrics specific to narrow\
    \ applications, which severely limits interoperability\\nand reuse. This fragmentation leads to redundant reconstruction\
    \ of many similar graphs,\\nrestricts feedback to upstream data providers, and diminishes opportunities for data\\nharmonization\
    \ and quality improvement. Reuse is further constrained by incomplete\\ndocumentation, infrequent updates, and insufficient\
    \ evaluation, factors that collectively\\nundermine confidence and incentivize the creation of new KGs, often as fundable\
    \ but\\nduplicative deliverables.\\nOntologies provide a semantic hierarchical structure and vocabulary for integrating\
    \ data. Using\\nontologies in KGs allows complex relationships and links to different concepts, such as genes,\\ntraits,\
    \ or phenotypes, to be represented in a standardized and computable manner [4,32]. For\\nontology creation, there are\
    \ defined standards and guidance such as OWL, DOS-DP and\\nROBOT templates[33\\u201335]. The OBO Foundry provides ontology\
    \ best practice metrics such as\\nresponsiveness, maintenance, format, and others[36]. The Bioregistry is an open source\\\
    ncurated database of prefixes and metadata for ontologies, controlled vocabularies, and other\\nsemantic types[37]. Bioportal\
    \ encourages reuse of ontologies through an open source\\nrepository[38]. These resources have encouraged rigorous creation\
    \ and maintenance of\\n\\n\\nontologies in order to ensure that data can be shared across projects. KGs, built from ontologies\\\
    nand data sources, are now experiencing similar issues as ontologies were before these\\nstandards and resources were\
    \ built. While the ontologies and data sources generally maintain\\nconsistent versioning, detailed documentation, and\
    \ structured formatting, these features are not\\noften retained in the KGs assembled from these parts. It is time that\
    \ we have the same level of\\nstandards for KGs.\\n\\nNon-biomedical KGs can also provide important lessons in data management\
    \ and graph\\ncreation. Google, Facebook, IBM and others use KGs to organize and deliver information. The\\nsize of these\
    \ KGs necessitates a consistent underlying schema or structure[39]. Without a\\nconsistent underlying structure, it would\
    \ be nearly impossible to create reliable graphs of these\\nmagnitudes. Standards in KG development are similarly important\
    \ in industry and other\\nscholarly domains [40,41], and although use cases vary, the principles are applicable to\\nbiological\
    \ domains as well. Unlike social graphs such as Facebook\\u2019s, which are largely centered\\non people and their interactions,\
    \ biomedical KGs must capture a far more complex landscape.\\nIn biomedicine, the same two entities can be linked by different\
    \ types of relationships depending\\non the context, and those relationships may change as new evidence is discovered.\
    \ In some\\ncases, the relationships may even appear contradictory but remain accurate within their specific\\nexperimental\
    \ or biological setting. Additionally, biomedical KGs must also integrate across\\nmultiple biological scales (from molecules\
    \ to cells to organisms to populations) and capture\\nqualifiers such as tissue, species, or regulatory direction. Combined\
    \ with the need for high\\naccuracy, since an incorrect relation could directly influence scientific or clinical decisions,\
    \ this\\nsemantic diversity and multi-scale integration make their construction and maintenance uniquely\\nchallenging.\\\
    nTo address these limitations, a number of community efforts, prominently including contributions\\nfrom the Monarch Initiative,\
    \ have developed resources to enhance the accessibility, reusability,\\nand standardization of biomedical KGs. KG-Hub\
    \ provides community practices and tooling for\\nKG discovery, harmonization, and reuse, in a manner analogous to the\
    \ role of the OBO Foundry\\nin ontology development [36]. Within this framework, the KG-Registry catalogs metadata\\ndescribing\
    \ graph creators, data sources, organizations, and associated code, thereby facilitating\\nidentification and reuse of\
    \ existing KGs[42]. Complementary initiatives include the (Re)usable\\nData Project, which evaluates and clarifies licensing\
    \ to promote responsible distribution of\\nbiomedical data\\u2014an important consideration given that KGs typically integrate\
    \ sources with\\nheterogeneous reuse conditions[43]. The Biolink Model is a standardized framework for\\nrepresenting\
    \ biological entities, their attributes, and relationships[44]. Adoption of Biolink has\\nbeen critical to ensuring interoperability,\
    \ and associated standards such as KGX exchange\\nformat leverage Biolink to enable subgraph extraction and integration\
    \ across resources. Broader\\ncommunity efforts, including the NCATS Biomedical Data Translator Consortium[45], and\\\
    nTranslator KGs such as RTX-KG2, ROBOKOP, Clinical KG, and SPOKE[1,46\\u201348], demonstrate\\nhow strong, schema-driven\
    \ approaches based on shared formats and registries provide the\\nfoundation for disseminating standardized and reusable\
    \ KGs.\\nVersioning is critical for the reliability and reuse of KGs. Lessons from ontologies illustrate this\\nneed:\
    \ a longitudinal study of the Gene Ontology (GO) showed that annotation changes over a\\ndecade produced divergent interpretations\
    \ of biological experiments, with enrichment results\\ndiffering substantially between earlier and later GO releases[49].\
    \ Such discrepancies arose from\\nbiases including annotation and literature bias, underscoring the dynamic nature of\
    \ biological\\n\\n\\ndata and the necessity of regular updates. Outdated KGs risk propagating obsolete or\\nmisleading\
    \ results, particularly when based on stale source data. To support reproducibility, it is\\ndesirable for past KG versions\
    \ to remain accessible for comparison with newer iterations.\\nHowever, practical barriers\\u2014most notably the large\
    \ size of KGs and the resource demands of\\nhosting and bandwidth\\u2014make comprehensive version archiving difficult.\\\
    nGuidance can be drawn from standards used in other data domains. The FAIR, TRUST, and O3\\nprinciples provide frameworks\
    \ for sustainable, interoperable data resources[50\\u201352],. FAIR is\\nFindability, Accessibility, Interoperability,\
    \ and Reusability, and its recommendations include use\\nof controlled vocabularies for metadata, schematic interoperability\
    \ across sources, and modular\\ndesign to enhance flexibility. Vogt et al. (2024) argue that modularity-oriented approaches\
    \ to KG\\nconstruction improve compatibility, findability, and reproducibility[50]. TRUST principles extend\\nFAIR by\
    \ emphasizing long-term stewardship of digital repositories, while O3 highlights\\nsustainability through open data, code,\
    \ and infrastructure. Yet, none of these frameworks fully\\naddress the unique requirements of KG assembly and reuse.\
    \ For this reason, we defined\\ncriteria tailored to KGs and applied them to a set of prominent, publicly available graphs.\\\
    nSeveral biomedical KG reviews have focused on KG use cases and methods; but not their\\ncreation and reusability [6,53\\\
    u201355]. We were inspired by Bonner et. al [54], where they examined\\nschema, relations and data mappings, and licensure\
    \ for six drug discovery KGs, but not KG\\nevaluation and examples on their intended purpose. They concluded that three\
    \ main things\\nmissing from these KGs are sufficient documentation, regular updates, and consistent dataset\\nversioning.\
    \ In response, we present a systematic approach and set of KG metrics designed to\\nimprove interoperability, rigor, reuse,\
    \ and reproducibility. By addressing these foundational\\nissues, we aim to foster more collaborative and modular development\
    \ across the community\\nand to enable researchers to focus on applying KGs to drive new discoveries and achieve\\nreal-world\
    \ impact.\"\n  },\n  {\n    \"name\": \"Methods\",\n    \"text\": \"Here, we review a subset of 16 biomedical KGs[1,7\\\
    u201310,23,46\\u201348,56\\u201362] with a focus on\\nreusability, data standards and openness. All metrics are evaluated\
    \ through the lens of \\u201cis it\\npublicly accessible/true?\\u201d  Features only accessible through subscription or\
    \ membership in a\\nspecific group are not counted. The features were assessed as a strictly \\u201cyes\\u201d or \\u201cno\\\
    u201d system;\\npartial compliance counted as a full \\u201cyes.\\u201d Only features that were completely missing or\
    \ could\\nnot be found were counted as a \\u201cno.\\u201d Due to the variation in how KGs define, represent and\\napproach\
    \ concepts we kept our criteria intentionally broad to avoid penalizing approaches\\nfollowing different standards. Our\
    \ goal was to give credit for efforts towards implementing or\\nadhering to standards.\\n\\nKGs were evaluated manually\
    \ by domain-expert curators addressing specific subcriteria for\\neach Principle (see below). For each KG, one of a team\
    \ of six reviewers retrieved the most\\nrecently available version of the KG\\u2019s website as well as the contents of\
    \ any associated\\nsoftware repositories (e.g., from GitHub) and scholarly publications. The review was then\\nsecondarily\
    \ reviewed by another team member. A critical review of KG code and files is outside\\nthe scope of this work and was\
    \ not performed (e.g., we did not determine how much time was\\nrequired to build any KG). As with the OBO Dashboard and\
    \ the ReusableData initiatives[36,43]\\n\\n\\n24,33, it is our hope that this review process will encourage KG stewards\
    \ to improve their\\ndocumentation and promote reuse and interoperability.\\nPrinciples\\nWe developed specific evaluation\
    \ criteria to assess the accessibility, reusability, and\\nstandardization of publicly-accessible KGs. The primary goal\
    \ of these principles is to determine\\nif one can easily access and gain specific information about a given KG so as\
    \ to determine its\\nutility for reuse. Our criteria are arranged according to six principles:\\nA.\\u200b Access Level\
    \ and Type\\nB.\\u200b Provenance of Nodes and Edges\\nC.\\u200b Documented Standards, Schema, and Construction\\nD.\\\
    u200b Update Frequency and Versioning\\nE.\\u200b Evaluation by Metrics and Fitness for Purpose\\nF.\\u200b Licensing\\\
    nA. Access Level and Type\\nWe evaluated each KG\\u2019s ability to be accessed easily and without barriers by members\
    \ of the\\ngreater scientific community. We considered direct access to the KG and its code as well as\\nadjacent interfaces\
    \ (e.g., a REST API) and derived products (e.g., embeddings, paths). The\\nsubcriteria are:\\nA.1 Additional KG product\
    \ accessible such as embeddings or paths\\nA.2 API, Neo4j or other online hosted graph database accessible\\nA.3 Multiple\
    \ ways to download or access\\nA.4 Source code for making the KG is publicly accessible\\nA.5 KG is downloadable in its\
    \ entirety\\nB. Provenance of Nodes and Edges\\nKG sources can vary noticeably in structure and information content. Having\
    \ access to original\\ndata sources can help users understand the importance of different edges and nodes,\\nincreasing\
    \ biological plausibility and classification for drug repurposing tasks[63]. Knowledge of\\ndata sources can also inform\
    \ choices about a KG\\u2019s reusability: some data sources may be more\\nor less stringent than a user may prefer, so\
    \ documentation of the process from source to KG\\ncan help users to evaluate the graph\\u2019s suitability for new purposes.\
    \ The subcriteria are:\\nB.1 List of sources provided\\nB.2 Sources have versions/dates/file names used\\nB.3 Import dependencies\
    \ declared\\nB.4 Nodes and edges have source information\\nB.5 Duplicate edge management taken into consideration\\nB.6\
    \ Provenance of edge creation\\nB.7 Schema for how edge types are created; where are they coming from\\n\\n\\nC. Documented\
    \ Standards, Schema, and Construction\\nKGs gain much of their value from being reusable across different applications\
    \ and research\\ncontexts. For this to happen, the KG\\u2019s identifiers need to be resolvable in the greater biomedical\\\
    ndomain. In addition, how the graph is created may change the way a user employs it. Here, we\\nassess how the documentation\
    \ of the KG best supports this. The subcriteria are:\\nC.1 Entities and nodes are human readable and usable in biological\
    \ applications outside of\\nKG\\nC.2 Identifiers support entity resolution (external identity links such as Ensembl\\\
    nIDs[64])\\nC.3 Documentation on construction is provided\\nC.4 Documented data transforms (for example, removed general\
    \ terms from ontologies)\\nC.5 Uses a documented schema for construction\\nD. Update Frequency and Versioning\\nAs KGs\
    \ are created from current \\u201cknown\\u201d knowledge, they risk missing new information if not\\nupdated regularly;\
    \ timely, well-documented updates are necessary. This is analogous to\\nsoftware versioning in that knowledge of the version\
    \ used in a given process encourages\\nreproducibility and more informative evaluation of the resource\\u2019s reuse in\
    \ new applications. The\\nsubcriteria are:\\nD.1 Clearly identified stable versions\\nD.2 Public tracker for requests\\\
    nD.3 Contact indicated for the KG; either organization or person\\nD.4 Updated more than once per year\\nD.5 Prior versions\
    \ accessible with clearly documented changes\\nE. Evaluation by Metrics and Fitness for Purpose\\nMany KGs claim they\
    \ will help scientists in the broader biological community in a spectrum of\\nuse cases. Formal evaluations, detailed\
    \ examples, and quantifiable measures of confidence are\\nnecessary to establish the community\\u2019s trust in the KG\\\
    u2019s value and applicability to its intended\\nuse cases. The subcriteria are:\\nE.1 Case study/example of use provided\\\
    nE.2 KG utility evaluated against other methods (can include other KGs)\\nE.3 Clearly defined scope\\nE.4 Multiple types\
    \ of evaluation methods\\nE.5 One or more ways of measuring accuracy/confidence\\nF. Licensing\\nKnowledge Graph data\
    \ licensing is important because it clearly defines what users are legally\\nallowed to do with the data, such as reuse,\
    \ redistribution, or modification. Without proper\\nlicensing, even openly available data may not be legally reusable,\
    \ creating barriers to\\ncollaboration and scientific innovation. Clear licenses enable interoperability, sharing, and\
    \ the\\ncreation of tools and resources that advance research and improve human health.\\n\\nF.1 KG licensing is clearly\
    \ stated and unambiguous\"\n  },\n  {\n    \"name\": \"Results\",\n    \"text\": \"KG Evaluation\\nThe sixteen chosen\
    \ KGs are shown below in Figure 1 along with how they did on the criteria\\nfrom above. We chose biomedical KGs of varying\
    \ purposes, sizes, and creators, including those\\nthat have been widely cited such as Hetionet and Bioteque and those\
    \ already in our\\nKG-Registry. The reviewers for the Monarch Initiative\\u2019s KG, were experts outside of the\\nMonarch\
    \ Initiative in order to reduce bias.\\n\\n\\n\\n\\n\\nFigure 1. The left side lists the KGs reviewed.The top indicates\
    \ the different criteria by category with\\neach color referring to a different category. The criteria are numbered A.1,\
    \ B.1,.... according to the\\nnumbering above. Blue squares indicate the KG met this principle, red indicates it did not.\
    \ Licensing is\\nnot shown as it is not a binary category. Find a detailed breakdown of why each KG was assigned\\nblue/red\
    \ in the Supplemental Table Detailed Principle Analysis tab.\\n\\n\\n\\nFigure 2. The x-axis shows the number of update\
    \ frequency and versioning principles that a KG\\nfollowed out of a five. The y-axis shows the number of KGs that we reviewed\
    \ for each criteria in\\ncategory D.\\n\\n\\nOf note, KGs such as EmBiology and SPOKE are largely accessible only through\
    \ a paywall,\\nwhich has resulted in lower scores. RTX-KG2 was the only knowledge graph that scored yes on\\nevery criteria.\\\
    n\\nFigure 2 shows how many KGs follow principles of update frequency and versioning. Only\\nMonarch KG, Clinical KG,\
    \ and RTX-KG2 scored yes on all update frequency and version\\nprinciples. All KGs except for GNBR have a contact person\
    \ or organization indicated. The\\nprinciples which were followed the least are having a public tracker for requests (7/16)\
    \ followed\\nby clearly identified stable versions and having prior versions accessible with clearly\\ndocumented changes\
    \ (9/16). This creates a lack of transparency in how KGs are maintained\\nand improved, and contributes to problems with\
    \ reproducible workflows.\\nKG Nodes Types\\nFrom the 16 KGs we reviewed the number of node types included ranged from\
    \ many (52) to\\nvery few (3) with many KGs falling somewhere in between (Figure 3). Common node types\\nwere chemicals/drugs,\
    \ genes and diseases. Some KGs had more custom node types such as\\nHRA KG which used digital objects (DOs) instead of\
    \ standard nodes. This design enables HRA\\nKG to incorporate experimental data, research settings, and even 3D spatial\
    \ references, giving\\nit a distinct focus compared with KGs that limit themselves to curated biomedical entities such\\\
    nas genes, proteins, and diseases, without experimental data. In the case of EmBiology, publicly\\navailable information\
    \ is limited: based on their website we infer that their KG includes genes,\\nproteins, and diseases, but the details\
    \ remain inaccessible because of a paywall. To better\\ncompare what kinds of nodes are used across KGs, we leveraged\
    \ ChatGPT to map each node\\nlabel supplied by the different KGs to the Biolink Model\\u2019s node types. The full list\
    \ is provided in\\nthe Supplemental Table Node Types tab. Figure 3B shows how the different KGs cluster,\\naccording to\
    \ seaborn clustermap, when node types have been mapped to BioLink. For example,\\nthe node type \\u201cTissues\\u201d,\
    \ present in GenomicKB, Bioteque and NCATS GARD was mapped to\\n\\u201canatomical entity\\u201d, these KGs did not have\
    \ node type \\u201canatomical entity\\u201d in their original list.\\n\\n\\nThis mapping allows us to compare KG content\
    \ as RTX-KG2, ROBOKOP and Monarch all had\\n\\u201canatomical entity\\u201d.\\nKG Sources\\nJust as the number of node\
    \ types varied, the number and diversity of sources also differed\\nwidely across KGs, encompassing both primary sources\
    \ (original databases or ontologies) and\\naggregated sources (resources that themselves integrate multiple databases).\
    \ As most KGs did\\nnot differentiate between primary and aggregated sources they are counted equally. Of the KGs\\nthat\
    \ we evaluated (Figure 4), Monarch ingested the most number of sources at 87, with the next\\nhighest being RTX-KG2, ROBOKOP\
    \ and SPOKE with 63, 50 and 47, respectively. PharmKG\\nand GNBR had the fewest sources with seven and one. Due to EmBiology\\\
    u2019s paywall it is unclear\\nexactly how many sources they ingest, although we can deduce there are at least six. GNBR\
    \ is\\na literature based knowledge graph, although constructed from many sources (papers) we\\nclassify it as having\
    \ one source \\u201cother\\u201d. Some KGs included experimental data or text mined\\ndata not found in a database, which\
    \ we classified under the source type \\u201cother.\\u201d. KGs that\\nincluded \\u201cother\\u201d source data include\
    \ ROBOKOP, Bioteque, DrugMechDB, EmBiology, and\"\n  },\n  {\n    \"name\": \"GNBR\",\n    \"text\": \"Figure 3. (A) X-axis\
    \ shows the KG, y-axis shows the number of node types reported by each\\nrespective KG. EmBiology is not included in this\
    \ figure as their node types are not publicly available.\\nSee Supplemental Table Node Types tab for more info. (B) Heatmap\
    \ showing the KGs and their\\nnode types after BioLink mapping. The columns represent the KGs, the rows represent the\
    \ BioLink\\nnode types. Darker blue indicates KG has more of the specific node type while green indicates the KG\\ndoes\
    \ not have the node type. Dendrogram across the top shows which KGs are more similar based on\\nbinomial clustering.\\\
    n\\n\\n\\n\\n\\nFigure 4. (A) x-axis shows the KG, y-axis shows the corresponding number of sources the KG ingests.\\\
    nSources have been divided into two categories: ontologies (in purple) and non-ontology data sources\\n(in blue). (B)\
    \ The right side of the table shows the different KGs, the top indicates the top 10 most\\ningested ontology sources.\
    \ A blue check indicated the KG ingested the source. (C) The right side of the\\ntable shows the different KGs, the top\
    \ indicates the top 10 most ingested non ontology sources. A blue\\ncheck indicated the KG ingested the source. More information\
    \ about the KG Sources can be found in\\nthe Supplemental Table Sources tab.\"\n  },\n  {\n    \"name\": \"Discussion\"\
    ,\n    \"text\": \"When a researcher is deciding to use a knowledge graph for an analysis or experiment, they\\nface a\
    \ decision: to create a custom graph tailored to their purpose or use an existing resource\\n\\n\\nand try to adapt it\
    \ to fit their use case. There are advantages and disadvantages to each\\napproach; however, given the rapidly growing\
    \ number of biomedical KGs and lack of apparent\\nreuse, it appears that there is a tendency to create one\\u2019s own.\
    \ There are several reasons for\\nthis, despite the high overlap in content and sources across existing graphs. First,\
    \ it is often\\nconsidered easier to make something from scratch and fully understand how it works and\\nensure compatibility\
    \ with existing or planned workflows. This need for understanding is why\\ndocumentation on KG construction is so important\
    \ - and based on our evaluation, often not\\nsufficient - to convince users to trust the creators enough to reuse. A commonly\
    \ encountered\\nchallenge is that the necessary information is not consolidated or easy to find. When assessing\\na KG\
    \ and its principles, the reviewers often had to look in multiple places such as publications,\\nwebsites, and github\
    \ repositories to find the relevant information. Even if the KG scored \\u2018yes\\u2019 on\\na principle does not mean\
    \ it was easily scored. Second, creating novel KGs is more compatible\\nwith the way research is funded and rewarded.\
    \ It may be more impressive to say \\u201cwe made a\\nthing\\u201d than it is to say \\u201cwe adapted this existing data\
    \ and framework\\u201d, unless there is prior\\nevidence that reuse has a measurable benefit, research tends to follow\
    \ funding priorities that\\nincentivize creation rather than reuse or validation. As such, there has been a steady stream\
    \ of\\nsimilar KGs being built. While this expansion might seem productive, it often comes at the\\nexpense of exploring\
    \ novel methods that could make better use of existing KGs or evaluation of\\napplying existing KGs to novel areas of\
    \ exploration. The result is a cycle of effort duplication\\nrather than innovation. If the field eventually turns away\
    \ from KGs due to limited meaningful\"\n  },\n  {\n    \"name\": \"results, the real loss will be the missed opportunity\
    \ to advance methods and applications that\",\n    \"text\": \"could have demonstrated their value. By continually rebuilding\
    \ what we already have, we risk\\nexhausting interest before KGs reach their full potential.\\n\\nAs a community, we are\
    \ not generating the evidence needed that reuse actually helps advance\\nthe field because of the lack of trust in any\
    \ given KG. This paper aims to help build a set of\\ncriteria to evaluate the trustworthiness of KGs in order to help\
    \ researchers better build upon\\neach other's work. Each KG was assessed against our criteria with a simple \\u201cyes/no\\\
    u201d scoring\\nsystem, where the number of \\u201cyes\\u201d answers provides an overall score of transparency and\\\
    nreusability. Well documented code and explicit descriptions of the data structure encourages\\nmethodological innovation\
    \ by computational biologists. Additionally, being able to contact the\\nauthors to ask for clarity or suggestions offers\
    \ another layer of trust. A good way to build trust\\nwould be for KGs to have a machine readable overview file dictating\
    \ things about the KG such\\nas date updated, authors, size, sources, etc. In this study, we do not set a strict cutoff\
    \ for what\\nconstitutes a \\u201ctrusted\\u201d KG (e.g., requiring a minimum number of \\u201cyes\\u201d scores), but\
    \ we propose\\nthat higher scores across these criteria reflect greater trustworthiness. We also report scores\\nacross\
    \ the criteria in Figure 1 to enable head-to-head comparison.\\n\\nEven if users do trust existing KGs, the next question\
    \ is which one do they pick? Not all KGs are\\ncreated equal for all biomedical tasks. In order to confidently choose\
    \ a KG or set of them,\\nresearchers need to know the different data types in the graph and the data sources used to\\\
    nbuild it. As shown in Figure 3 and 4, KGs have a varying number of node types and sources\\ningested. When an outside\
    \ user looks to repurpose an existing KG, it needs to be clear which\\ninformation is already represented and where it\
    \ came from. Data transparency enables a user to\\ntake an existing KG and add or remove their own data sources in a compatible\
    \ way, making it\\neasier to repurpose. Figure 4 shows that many KGs ingest similar sources. However, this does\\nnot\
    \ guarantee that the content is of equal quality once it is aggregated into a KG. An equally\\nimportant aspect of KG\
    \ trustworthiness is the accuracy of resource ingestion. Even when two\\n\\n\\nKGs draw from the same source, they may\
    \ ingest and represent the dataset in different ways.\\nFor instance, while both ROBOKOP and Monarch KG ingest some of\
    \ the same sources, they\\noften pull from different tables within those sources, leading to differences in coverage and\\\
    nemphasis. In another instance, PharmKG focuses on diseases above the fifth hierarchical level\\nin MeSH while Monarch\
    \ KG makes use of all diseases in MONDO. While cutting more general\\nterms could be useful in specific tasks it would\
    \ lose information content inherent to the source\\nontologies. Knowing these KG design choices, influences the choice\
    \ of both KG and methods to\\nuse for a specific use case.\\n\\nEmbedding KGs may be a useful strategy for data that cannot\
    \ be publicly available, such as\\nsensitive clinical data. However, without excellent documentation, frequent updates,\
    \ and robust\\nevaluation and validation, embeddings as the sole shareable artifact have little practical value..\\nEmbeddings\
    \ are constrained to the version of information and embedding strategy used at the\\ntime of creation. There is no way\
    \ for an outside user to add new information or generate\\nembeddings using alternative techniques. Additionally, embeddings\
    \ also lose the data\\nprovidence and explainability that are inherent to well constructed KGs.  We urge the community\\\
    nto further define best practices and approaches to sharing and validating embeddings, much in\\nthe same way that is\
    \ currently done for bringing models to data[65,66].\\n\\nWhen evaluations of biomedical KGs are provided, they vary greatly\
    \ in scope, application and\\nrigour. More general evaluations of a KG, such as agreement with other sources, can increase\\\
    ntrust in the information contained, but do not provide insights into how the KG may be useful for\\nspecific analysis.\
    \ Conversely, some evaluations only consider a specific use case, for example,\\ninsights into a specific disease (e.g.,\
    \ Alzheimer's, epilepsy) or drug. This level of specificity\\ninherently limits what the KG is likely to be used for in\
    \ the future. A robust analysis that includes\\nboth general domain-agnostic evaluations and nuanced use-cases comparing\
    \ a novel KG to\\nexisting methods or knowledge sources will generate more trust and opportunities for reuse.\\n\\nWhen\
    \ assessing performance of KGs on machine learning applications like drug repurposing,\\nfairness in evaluation is critical.\
    \ Using a validation set drawn from one of the KGs inevitably\\nskews results towards that KG, since the topological structure\
    \ of each KG differs. This bias is\\nparticularly pronounced in machine learning tasks such as link prediction, where\
    \ the KG that\\nsupplied the validation set will closely resemble the topology of the known connected pairs. The\\nother\
    \ KG, by contrast, may appear to underperform simply because its structure reflects\\ndifferent sources and ingestion\
    \ protocols. To mitigate this bias and enable more meaningful\\ncomparisons, external validation sets curated independently\
    \ of either KG should be used.\\n\\nMany of the KGs have overlaps in sources and node types, as expected. However, there\
    \ is no\\nguarantee that the node type in KG (a) is the same as node type in KG(b) even if they have the\\nsame name.\
    \ Conversely, node type \\u2018a\\u2019 in KG(a) may have a different name than node type \\u2018b\\u2019 in\\nKG(b) but\
    \ be essentially the same data. The same source can also be ingested differently\\nmaking two seemingly similar graphs\
    \ more different than one would expect. Two KGs can ingest\\nthe same data but from two different places such as a primary\
    \ data source (the original\\nontology) vs an aggregated source that has many ontologies. For example, one can ingest\
    \ the\\nprimary source such as the Basic Formal Ontology (BFO) as opposed to OBO Foundry which\\ningests many ontologies\
    \ including BFO. Primary vs aggregated source reporting could make\\ntwo KGs look different on the surface when in fact\
    \ they are quite similar. As KGs follow different\\nstandards and data models, there is not a good way to compare the\
    \ sources and nodes in\\n\\n\\ndifferent KGs in a robust non biased way. Currently it is nontrivial to compare different\\\
    nknowledge graphs however, if all KGs followed similar construction methods and were in the\\nsame format such as KGX\
    \ with the same metadata stored in machine readable files,\\ncomparison would not only be easier, but standard.\"\n  },\n\
    \  {\n    \"name\": \"Conclusion\",\n    \"text\": \"In conclusion, for KGs to reach their full potential in the biomedical\
    \ landscape we must shift from\\nthe fragmented landscape of reinvention and come together as a community towards collective\\\
    nstewardship. Strengthening existing KGs through rigorous documentation, transparent\\nstandards, and shared evaluation\
    \ frameworks will make reuse not just possible, but preferable\\nto building yet another graph with overlapping content.\
    \ By embracing common principles of\\nconstruction and machine-readable metadata, researchers will be empowered to compare,\\\
    nadapt, and extend KGs with confidence. The result will not only be greater trust in individual\\nKGs, but also a fertile\
    \ ecosystem where innovation flourishes because energy is spent\\nadvancing methods and applications, rather than duplicating\
    \ what already exists. Only by\\nuniting around shared standards can we ensure that KGs mature into reliable, reusable,\
    \ and\\nindispensable infrastructure for the biomedical sciences.\"\n  },\n  {\n    \"name\": \"Funding\",\n    \"text\"\
