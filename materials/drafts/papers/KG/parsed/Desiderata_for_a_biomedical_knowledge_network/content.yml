  abstract: 'Knowledge graphs, collectively as a knowledge network, have become critical tools for knowledge

    discovery in computable and explainable knowledge systems. Due to the semantic and structural

    complexities of biomedical data, these knowledge graphs need to enable dynamic reasoning over large

    evolving graphs and support fit-for-purpose abstraction, while establishing standards, preserving

    provenance and enforcing policy constraints for actionable discovery. A recent meeting of leading

    scientists discussed the opportunities, challenges and future directions of a biomedical knowledge

    network. Here we present six desiderata inspired by the meeting: (1) inference and reasoning in

    biomedical knowledge graphs need domain-centric approaches; (2) harmonized and accessible

    standards are required for knowledge graph representation and metadata; (3) robust validation of

    biomedical knowledge graphs needs multi-layered, context-aware approaches that are both rigorous

    and scalable; (4) the evolving and synergistic relationship between knowledge graphs and large

    language models is essential in empowering AI-driven biomedical discovery; (5) integrated

    development environments, public repositories, and governance frameworks are essential for secure

    and reproducible knowledge graph sharing; and (6) robust validation, provenance, and ethical

    governance are critical for trustworthy biomedical knowledge graphs. Addressing these key issues will

    be essential to realize the promises of a biomedical knowledge network in advancing biomedicine.





    Desiderata for a biomedical knowledge network

