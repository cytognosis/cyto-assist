    \ Vol. 53, Database issue\"\n  },\n  {\n    \"name\": \"Introduction\",\n    \"text\": \"Despite many advances in drug\
    \ discovery and development,\\nour collective ability to develop safe and effective medicines\\nis still limited by an\
    \ incomplete understanding of disease bi-\\nology. For every 10 drugs that enter clinical trials, only one\\nwill reach\
    \ regulatory approval ( 1 ), with 79% of the programs\\nclosing due to efficacy or safety concerns ( 2 ). Studies indicate\\\
    nthat an enhanced understanding of the disease-causal mecha-\\nnisms at the target discovery stage can double the success\
    \ rate\\nand halve the early stoppage of clinical studies ( 3 ,4 ). How-\\never, the information required to formulate\
    \ precise therapeu-\\ntic hypotheses is still sparse, or we lack the understanding to\\nconvert the data into the knowledge\
    \ necessary to inform deci-\\nsions ( 5 ). In recent times, several resources have attempted to\\nconsolidate the publicly\
    \ available information into web ser-\\nvices aimed to assist the identification of drug targets using\\na diverse set\
    \ of sources for one or several therapeutic areas\\n( 6\\u20139 ).\\nOpen Targets ( https:// www.opentargets.org/ ) is\
    \ a pre-\\ncompetitive partnership combining expertise from academia\\nand the pharmaceutical industry to support the\
    \ systematic\\nidentification and prioritisation of drug targets. One axis of\\nthe consortium\\u2019s research programme\
    \ provides open-source\\ndata and informatics tools for the global scientific community,\\nwith the Open Targets Platform\
    \ ( https://platform.opentargets.\\norg/) as its flagship resource ( 10 ). In our last NAR update,\\nwe described how\
    \ the Platform was undergoing a complete\\nrebuild, aiming to streamline data integration and harmoni-\\nsation, expand\
    \ users\\u2019 data exploration, and improve the user\\nexperience ( 10 ). This enabled us to develop features for users\\\
    nto more dynamically prioritise targets and build therapeutic\\nhypotheses beyond the evidence for target\\u2013disease\
    \ associa-\\ntion to progressability factors. Here, we describe the signifi-\\ncant changes and improvements we have implemented\
    \ in the\\nOpen Targets Platform since our last database update, cov-\\nering data updates, frontend tools, backend technologies\
    \ and\\nusability enhancements.\\nEnhancing the ability to identify, explore and\\npr ior itise target\\u2013disease associations\\\
    nEstablishing a causal link between the drug target and the\\nindication constitutes a fundamental step in drug discov-\\\
    nery. The Open Targets Platform aims to contextualise the\\navailable evidence by describing the relationship between\
    \ tar-\\ngets and diseases carefully curated in 23 independent pub-\\nlic sources ( 11 ). These sources cover different\
    \ angles of our\\nunderstanding of disease biology, spanning germline or so-\\nmatic variation, perturbation experiments\
    \ in cellular or ani-\\nmal models, affected pathways, known drugs or clinical can-\\ndidates, and information extracted\
    \ from literature mining.\\nTargets and diseases are mapped to Ensembl gene identi-\\nfiers ( 12 ) and Experimental Factor\
    \ Ontology terms ( 13 ), re-\\nspectively, and evidence is scored and aggregated to build\\na ranked list of associations\
    \ summarising our confidence\\nin the causal relationship between both entities ( 11 ,14 ). In\\nFigure 1 , we provide\
    \ an overview of new sources of evi-\\ndence and annotation integrated into the Platform since our\\nlast update, which\
    \ contribute to this causal and support-\\ning evidence for target\\u2013disease associations. Complementary\\nto this,\
    \ Supplementary Table S1 provides a more quanti-\\ntative view of the Platform data expansion since the last\\nreport.\\\
    nEnhancing common and rare variation evidence for\\ntarget\\u2013disease associations\\nDistinctive genetic variations\
    \ associated with a given disease\\nor phenotype can be leveraged to establish a likely causal\\nmechanism leading to\
    \ the identification of novel drug targets\\n( 15 ). Retrospective analysis indicates that genetic evidence can\\nbe found\
    \ for up to two-thirds of FDA approvals ( 16 ). Thus,\\nthe Platform aims to systematically integrate publicly avail-\\\
    nable human germline and somatic genetic variation associ-\\nated with diseases or traits, centralising evidence of varying\\\
    nallelic frequencies reported in different resources for target\\nprioritisation.\\nSince the last update, we have expanded\
    \ our understanding\\nof common disease genetics by including the latest Open Tar-\\ngets Genetics post-genome-wide association\
    \ studies (GWAS)\\nanalysis data release ( 17 ). This iteration analyses 6591 addi-\\ntional GWAS Catalog studies from\
    \ 70 publications, as well\\nas summary statistics and credible sets from 2861 endpoints\\nphenotyped across 260 000 individuals\
    \ in the FinnGen data\\nfreeze 6 ( 18 ). Moreover, we expanded the GWAS / molecular\\ntrait colocalisation results by\
    \ including splicing QTLs from\\nGTEx version 8 ( 19 ), increasing our power to nominate likely\\ncausal genes through\
    \ the Locus2Gene (L2G) machine learning\\nmethod ( 20 ).\\nInterpreting rare protein-coding events through gene-level\\\
    nanalysis complements the ability of GWAS to depict the ge-\\nnetic architecture of common conditions. Recently, we ex-\\\
    npanded our curation of Gene Burden results to include a se-\\nlection of large scale cohort studies. For example, we\
    \ up-\\ndated the gene-level analysis from AstraZeneca\\u2019s PheWAS\\nPortal to version 5, enhancing the collapsing\
    \ analysis de-\\nrived from 470 000 individuals in the UKBiobank ( 21 ).\\nOther updates to our Gene Burden evidence include\
    \ evi-\\ndence informing about circulating metabolic biomarkers for\\ncardiovascular disease from the INTERVAL cohort\
    \ ( 22 ),\\nschizophrenia from the SCHEMA consortium ( 23 ), Parkin-\\nson\\u2019s disease from AMP-PD ( 24 ), ancestry-specific\
    \ evidence\\nfor prostate cancer in Black South African men ( 25 ) and\\nthe new FinnGen R11 dataset ( 18 ). In total,\
    \ our Gene Bur-\\nden data updates resulted in 2584 new gene-disease associ-\\nations not previously covered by our gene\
    \ burden or GWAS\"\n  },\n  {\n    \"name\": \"results\",\n    \"text\": \"By definition, rare diseases occur in fewer\
    \ than 1 in 2000\\nindividuals and are often driven by rare genetic variants;\\ntherefore, dedicated resources aim to\
    \ capture the genes in-\\nvolved in clinically characterised diseases, preserving the pri-\\nvacy of individual genotypes.\
    \ Among other updates since the\\nlast NAR report, the Platform now includes 173 signed-off\\npanels related to genomic\
    \ tests listed in the NHS National\\nGenomic Test Directory, as reported by Genomics England\\nPanelApp ( 26 ). Updates\
    \ from Gene2Phenotype now include\\nclinical curation of musculoskeletal panels, bringing the list\\nof curated gene-disease\
    \ pairs to 2697 ( 27 ). Further improve-\\nments to the ClinVar ingestion pipeline throughout this period\\nresulted in\
    \ the swift integration of germline and somatic vari-\\nation submissions fully mapped to EFO ( 28 ,29 ). Additional\\\
    ndisease-causing somatic variation was expanded to cover ad-\\nditional curation by the Cancer Gene Census and cancer\
