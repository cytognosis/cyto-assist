    \ \"text\": \"loss-of-function-protective. A full description of the rules used\\nto perform each assessment is available\
    \ in the Platform docu-\\nmentation [ https:// platform-docs.opentargets.org/ evidence ].\\nTo better understand the effect\
    \ of coding variation on pro-\\ntein function, we have also incorporated a link to EMBL-EBI\\nProtVar in all evidence\
    \ widgets, which contain genetic vari-\\nants. This new resource, funded through an Open Targets\\nproject ( 35 ) (Figure\
    \ 2 A), includes predicted effects of missense\\nvariation based on AlphaMissense ( 36 ), interaction interfaces\\nderived\
    \ from AlphaFold ( 37 ) and protein abundance and sta-\\nbility based on protein structures using FoldX ( 38 ). This anno-\\\
    ntation complements the Ensembl VEP annotations previously\\ndisplayed on all our variant-based evidence ( 27 ). A better\
    \ un-\\nderstanding of the variant effect on genes and proteins and\\nits directional effect on gene function and trait\
    \ expands our\\nknowledge of the target\\u2013disease relationship, offering new av-\\nenues to think about therapeutic\
    \ intervention.\\nExtracting biomedical knowledge from the\\nscientific literature\\nA large fraction of the knowledge\
    \ that can help nominate drug\\ntargets for particular indications remains in unstructured text.\\nThe Platform has continued\
    \ to expand its capacity to extract\\ninformation from text resources by starting to mine preprints\\nand patents included\
    \ in the EuropePMC corpus ( 39 ). En-\\nhancements to our natural entity recognition and normalisa-\\ntion pipelines have\
    \ resulted in extraction of 440 million recog-\\nnised entities from over 14.7 million publications (Tirunagari\\nS, Saha\
    \ S, Venkatesan A, Suveges D, Buniello A, Ochoa D, et al.\\nLit-OTAR Framework for Extracting Biological Evidences\\nfrom\
    \ Literature. bioRxiv. 2024. p. 2024.03.06.583722). Addi-\\ntionally, we continue to report and score 73.6 million target\\\
    u2013\\ndisease co-occurrences, building additional evidence to sup-\\nport target nomination. To enhance how users digest\
    \ this\\nvast amount of information, we have developed new features\\nwithin the Bibliography widget, such as filtering\
    \ the mined lit-\\nerature by date.\\nFurther, the Platform now leverages OpenAI\\u2019s \\u2018GPT4o-\\nmini\\u2019 model\
    \ to summarise target\\u2013disease evidence from all\\ndata sources when a full-text article is available ( 40 ). In\
    \ detail,\\nthe Platform creates a chain of queries to the Open AI API us-\\ning Langchain, providing the publication\
    \ content as context.\\nThe relationship between a target and a disease is summarised\\nwith the following prompt: \\\
    u2018Can you provide a concise sum-\\nmary about the relationship between [target] and [disease] ac-\\ncording to this\
    \ study?\\u2019. The resulting text is presented to the\\nuser. For example, when a user browses through literature ev-\\\
    nidence for association between CFTR and cystic fibrosis, this\\nnew feature can summarise the gene-disease relationship,\
    \ pro-\\nviding context beyond the scope of an abstract by utilising the\\nfull-text article when available (see also\
    \ our dedicated docu-\\nmentation page). This feature is also accessible through the\\nAPI. When we initially developed\
    \ the tool we chose to adopt\\nGPT-3.5 due to the easy integration of the OpenAI API, which\\nalso provided accurate results\
    \ based on empirical quality con-\\ntrol at a relatively low cost. As part of our benchmarking ef-\\nfort, we have migrated\
    \ to GPT-4o-mini mainly due to better\\nperformance from the larger LLM context window.\\nAssociations on the Fly\\nDesigned\
    \ and built upon extensive user experience, the new\\n\\u2018Associations on the Fly\\u2019 dashboard allows the Platform\
    \ user\\nto customise our disease and target association views to help\\nanswer more advanced therapeutic hypotheses queries\
    \ (Fig-\\nure 2 ). In the recently introduced data source-based heatmap,\\nthe user can alter the relative weight of individual\
    \ evidence\\nsources ( 11 ) based on their relevance to the specific user ques-\\ntion (evidence with expected weaker\
    \ causal links are down-\\nweighted by default). This results in dynamically generated\\nassociation scores that update\
    \ the ranked lists. For example,\\nusers can require evidence from particular data sources, such\\nas OT Genetics (Figure\
    \ 2 A). They can also exclude known\\ndrugs or clinical candidates in ChEMBL ( 41 ) to rank associ-\\nations that ignore\
    \ previous drug development efforts (Figure\"\n  },\n  {\n    \"name\": \"A). Moreover, the user can now click on the\
    \ computed asso-\",\n    \"text\": \"ciations to immediately view and understand the underlying\\nevidence from the primary\
    \ source, such as the sample size of\\na GWAS Catalog study ( 42 ) (Figure 2 A). As additional cus-\\ntomisations, users\
    \ can pin targets / diseases from the ranked\\nassociations to move them to the top of the list for review.\\nThen, to\
    \ allow users to start their journey with a predefined\\nlist of targets or diseases of interest, the associations page\
    \ al-\\nlows the upload of a list of entities in multiple compatible\\nidentifiers, including Ensembl, Uniprot, HGNC or\
    \ Experimen-\\ntal Factor Ontology (7,8,43,42) (Figure 2 A). Moreover, en-\\nhanced data-sharing capabilities through\
    \ URL, text-file down-\\nload, and API playground support the redesigned associations\\ndashboard (Figure 2 A).\\nProgressing\
    \ therapeutic hypothesis through\\ntarget pr ior itisation\\nWhile many targets can present compelling evidence of asso-\\\
    nciation with a given disease, not all are equally amenable to\\ntherapeutic intervention. Potential drug targets initially\
    \ iden-\\ntified through causal evidence or analogous hypothesis build-\\ning require additional prioritisation for drug\
    \ discovery based\\non their suitability for drug discovery pipelines. Evaluating the\\nunfavourable and favourable factors\
    \ for drug discovery is crit-\\nical to understanding the risk-benefit of a given therapeutic\\nstrategy.\\nTarget prioritisation\\\
    nThe Platform recently introduced a Target Prioritisation view\\nto complement the target\\u2013disease association view.\
    \ Using a\\ntraffic light colouring schema, this heatmap captures pre-\\ncomputed target-specific properties that could\
    \ favour or dis-\\nfavour drug development (Figure 2 B). The target properties\\nare classified based on whether the target\
    \ has been drugged\\nbefore (clinical precedence), information that might influence\\nthe selection of a specific modality\
    \ (tractability), whether there\\nare models, tools and / or reagents that allow target assess-\\nment in preclinical\
    \ settings to enable exploration of a given\\ntarget (doability), and whether there are likely risks to mod-\\nulating\
    \ a target (safety) ( 5 ). Each factor in each category is\\nevaluated individually. For example, a target could be con-\\\
    nsidered unfavourable if highly constrained in human popula-\\ntions according to gnomAD ( 44 ), if it presents dependencies\\\
    nacross all CancerDepMap cell lines ( 32 ) or if it has poor tissue\\nexpression selectivity according to Expression Atlas\
    \ and Hu-\\nman Proteome Atlas ( 45 ,46 ). Conversely, a molecule targeted\\nwith previously approved drugs for any indication,\
    \ presenting\\nhigh-quality predicted pockets or selectively expressed in the\\ncell membrane (Figure 2 B), will be regarded\
    \ as a favourable\\nDownloaded from https://academic.oup.com/nar/article/53/D1/D1467/7917960 by guest on 04 March 2026\"\
