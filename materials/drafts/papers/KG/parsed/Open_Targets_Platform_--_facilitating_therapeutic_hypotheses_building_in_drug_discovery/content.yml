    \ as a drug target ( 41 , 43 , 46 ). While none of these factors\\nwould discard a therapeutic hypothesis alone, understanding\\\
    nthe risks derived from otherwise disparate information helps\\nto contextualise drug discovery decision-making.\\nHypothesis-building\
    \ using clinical candidates and\\napproved drugs\\nSelecting new strategies to discover safe and effective drug tar-\\\
    ngets requires a comprehensive understanding of prior clinical\\nefforts. Since the last update, the Platform has promptly\
    \ re-\\nflected every drug or clinical candidate reported by all releases\\nof the ChEMBL database, including updates\
    \ in the mecha-\\nnisms of action, black-box warnings or withdrawn status ( 47 ).\\nAll chemical probes in ChEMBL\\u2014as\
    \ reported in Probes &\\nDrugs Portal\\u2014qualify for inclusion in the Platform, raising\\nthe availability of potent\
    \ and selective tool molecules for as-\\nsay consideration ( 48 ). The curation of antibody-drug conju-\\ngates as a distinct\
    \ modality has also enhanced the cellular con-\\ntext of the drug modulation. Additionally, the clinical indica-\\ntions\
    \ sourced from ChEMBL now incorporate drug approvals\\nfrom the European Medicines Agency, reporting 49 drugs ex-\\nclusively\
    \ authorised in Europe. Further enhancements of the\\nclinical study information capture Early Phase I trials as a dis-\\\
    ntinct category complementing ongoing efforts such as classify-\\ning clinical trial stop reasons retrieved from ClinicalTrials.gov.\\\
    nOverall, drug and clinical candidate annotation, their indica-\\ntions and side effects represent the closest information\
    \ to the\\ntherapeutic context, potentially informing about all stages of\\nour target prioritisation framework: precedence,\
    \ tractability,\\ndoability , and safety .\\nDrug responses and toxicity using\\npharmacogenetics\\nSince the last update,\
    \ we have also introduced pharmacoge-\\nnetic (PGx) evidence from PharmGKB, capturing the conse-\\nquences of genetic\
    \ variation on drug efficacy, dosing and ad-\\nverse events ( 49 ). PharmGKB manually curates the evidence\\nfor a given\
    \ variant and drug response, providing annotation\\nfor each patient genotype and an overarching level of evidence\\nbased\
    \ on published literature and clinical guidelines. The Plat-\\nform further enriches the PGx data by including Ensembl\
    \ vari-\\nant effect predictions, extracting drug response from the phe-\\nnotype description, drug information, and whether\
    \ the vari-\\nation occurs in the direct drug target ( 12 ,27 ). The PGx data\\nwidget appears on drug and target pages\
    \ to inform patients\\nabout stratification, responses, and toxicity. They also con-\\ntribute to our target prioritisation\
    \ view by informing the safety\\nattributes (Figure 2 B).\\nMulti-modal target safety assessment\\nNominating drug targets\
    \ with lower risks of target safety can\\nsignificantly impact portfolio management. The Platform col-\\nlates several\
    \ data sources informing about the possible safety\\nconsequences of target modulation. For example, we kept\\nexpanding\
    \ the list of targets with well-characterised safety\\nevents. Well-characterised safety events are presented in the\\\
    nSafety widget, to which we added curated (experimentally val-\\nidated) evidence from Adverse Outcome Pathways (Society\\\
    nfor Advancement of A OPs, A OP-Wiki 2023). Available from\\naopwiki.org, a relevant publication including a list of com-\\\
    nmonly screened targets for secondary pharmacology ( 50 ), as\\nwell as genes in which variation causes increased toxicity\
    \ ac-\\ncording to PGx evidence. While the strength of evidence of\\nthe various data sources incorporated into the Safety\
    \ widget\\nvaries, the 941 targets currently covered by the Safety widget\\ncompromise a set of targets with known safety\
    \ events, mak-\\ning them unfavourable for pipeline progression. This dataset\\nis available for download at https://platform.opentargets.org/\\\
    ndownloads through our \\u2018target\\u2019 object.\\nIn addition to the known safety events, the Target Priori-\\ntisation\
    \ view presents a range of in vitro and in vivo fea-\\ntures for ranking target safety. To better understand cellu-\\\
    nlar gene essentiality, we have incorporated fitness dependen-\\ncies exhibited when performing CRISPR-Cas9 genome-wide\\\
    nknock-out screenings on 900 cell lines, as reported by the Can-\\ncer DepMap ( 32 ). Targets catalogued as \\u2018Core\
    \ Essential\\u2019 due\\nto their pan-cancer dependencies are flagged as unfavourable\\ntargets in the Target Prioritisation\
    \ view (Figure 2 B). To com-\\nplement this information with in vivo assays, we developed a\\nscore for the severity of\
    \ observed phenotypes in mouse knock-\\nouts ( 51 ). In addition, target RNA expression is ranked based\\non tissue distribution\
    \ and specificity, further enabling targets\\nto be flagged as unfavourable for safety.\\nTo w ar ds a more FAIR platform\\\
    nBuilt upon FAIR principles ( 52 ), the Open Targets Platform\\ncontinues to adhere to its foundational open-source practices.\\\
    nSince the last update, we have updated the licence to CC0\\nv1.0, allowing unlimited access to our data ( 53 ). The Platform\\\
    nhas now been included as a Microsoft Azure Open Dataset,\\nfurther expanding Cloud accessibility for our data. The data\\\
    npipelines and services have been consolidated, and technolo-\\ngies have been updated to minimise adoption restrictions,\
    \ such\\nas our recent migration to OpenSearch. Moreover, we have\\nsimplified the method for creating a standalone deployment,\\\
    nproviding more accessible protocols for users generating their\\nown version of the Open Targets Platform. To maximise\
    \ con-\\ntributions from the open-source community, standards have\\nbeen raised across all Github repositories, allowing\
    \ the devel-\\nopment of third-party applications such as wrappers around\\nour GraphQL APIs ( 54 ). Feedback on the infrastructure\
    \ and\\nbusiness logic has been incorporated into data, backend, and\\nfrontend applications, the latter benefiting from\
    \ extensive UX\\nsessions. One example of a UX-driven feature is the redesigned\\nPlatform search, which now features\
    \ entity descriptions, can\\nbe accessed through a keyboard shortcut, and provides a his-\\ntory of recent searches to\
    \ assist users.\\nEngaging the Open Targets community\\nThe Open Targets Platform is dedicated to deepening our\\ncollective\
    \ understanding of target identification and priori-\\ntisation by leveraging the expertise of our partner institu-\\\
    ntions and the increasingly collaborative community of users.\\nAlways supported by our extensive documentation ( https:\\\
    n//platform-docs.opentargets.org ), we have continued to pro-\\nmote user engagement through outreach activities, up-to-\\\
    ndate training materials, and the development of fora to col-\\nlect user feedback. The Open Targets Community ( https://\\\
    ncommunity.opentargets.org ) has grown in users and function-\\nalities and now includes a dedicated feature requests\
    \ section.\\nFor each release, new Platform features and data have been de-\\nscribed on our blog ( https:// blog.opentargets.org/\
    \ ) and com-\\nplemented with regular deep dives on significant topics, in-\\nDownloaded from https://academic.oup.com/nar/article/53/D1/D1467/7917960\
    \ by guest on 04 March 2026\\n\\nNucleic Acids Research , 2025, Vol. 53, Database issue\"\n  },\n  {\n    \"name\": \"\
    D 1473\",\n    \"text\": \"cluding gene burden analyses, pharmacogenetics, provenance\\nmetadata, and standalone deployment,\
    \ as well as case stud-\\nies to showcase how Platform data and code can be built\\non. Lastly, we have expanded our use\
    \ of video tutorials to\\nguide users through new functionalities, trying to maximise\\nthe accessibility and training\
    \ experience for users with differ-\\nent backgrounds.\"\n  },\n  {\n    \"name\": \"Discussion and future plans\",\n\
    \    \"text\": \"As the wealth of data grows in different domains to enhance\\nour understanding of disease biology, there\
    \ continues to be a\\nneed to integrate and evaluate the evidence that can identify\\npromising drug targets and prioritise\
    \ therapeutic hypotheses\\nthat will lead to new safe and effective medicines. Through-\\nout the last two years, the\
    \ Open Targets Platform has con-\\ntinued to progress its capabilities to provide a more complete\\nand user-friendly\
    \ view of the evidence that associates target to\\ndisease and the evidence that can be used for target prioritisa-\\\
    ntion. New experimental data \\u2013 such as the updated Project\\nScore ( 55 ) or AstraZeneca\\u2019s gene burden tests\
    \ on 470k in-\\ndividuals ( 21 ) \\u2013 have been rapidly integrated and presented\\nfor the immediate benefit of the\
    \ global community. As new\\ndata modalities emerge, such as single-cell transcriptomics, the\\nPlatform has served as\
    \ a gold standard for understanding the\\nimpact of additional layers of information on drug discovery\\nand development\
    \ (Dann E, Teeple E, Elmentaite R, Meyer KB,\\nGaglia G, Nestle F, et al. Single-cell RNA sequencing of hu-\\nman tissue\
    \ supports successful drug targets. medRxiv. 2024.\\np. 2024.04.04.24305313). The overall harmonised data con-\\ntinues\
    \ to be a public reference, enabling multiple retrospec-\\ntive studies on the value of human genetics for drug discov-\\\
    nery ( 3 , 15 , 16 , 56 ). Several examples have also demonstrated the\\nvalue of the Platform data in building more specialised\
    \ appli-\\ncations or AI solutions ( 57 ,58 ). Ultimately, publicly available,\\nstructured datasets such as those offered\
    \ by the Platform, can\\ncatalyse the development of further AI applications for early\\ndiscovery ( 59 ).\\nThe Platform\\\
    u2019s ability to rapidly assist hypotheses through\\nthe dynamic web interface enables a broad community of\\nusers to\
    \ work on both broad and very specific questions.\\nThe Platform is often referenced as a gold-standard resource\\nto\
    \ help pinpoint previously identified genetic associations,\\nknown drugs, or clinical candidates and understand novel\\\
    nfindings ( 60 ,61 ). The ability to address systematic queries\\nand simultaneously enable more detailed, bespoke queries\\\
    nhas been the focus of new feature development, resulting in\\nthe Associations on the Fly and Target Prioritisation views.\\\
    nOpen Targets intention is to continue the development of\\nthese recently introduced frameworks, allow more tailored\\\
    nand context-specific queries, to expand on the availability of\\ncausal evidence and develop further refinements to showcase\\\
    nthe factors that influence the prioritisation of drug targets for\\nprogression. One of the most significant upcoming\
    \ efforts in\\nthis regard will be the tighter integration of Open Targets Ge-\\nnetics ( 17 ) to provide a more integrated,\
    \ comprehensive view\\nof common disease genetics within Open Targets Platform.\"\n  },\n  {\n    \"name\": \"Data availability\"\
