  abstract: 'The Open Targets Platform ( https://platform.opentargets.org ) is a unique, open-source, publicly-available knowledge
    base providing data and

    tooling for systematic drug target identification, annotation, and prioritisation. Since our last report, we have expanded
    the scope of the Platform

    through a number of significant enhancements and data updates, with the aim to enable our users to formulate more flexible
    and impactful

    therapeutic hypotheses. In this context, we have completely revamped our target–disease associations page with more interactive
    facets and

    built-in functionalities to empo w er users with additional control o v er their e xperience using the Platf orm, and
    added a ne w Target P rioritisation

    vie w. T his enables users to prioritise targets based upon clinical precedence, tract abilit y, doabilit y and safet
    y attributes. We ha v e also imple-

    mented a direction of effect assessment for eight sources of target–disease association e vidence, sho wing the effect
    of genetic variation on

    the function of a target is associated with risk or protection for a trait to inform on potential mechanisms of modulation
    suitable for disease

    treatment. These enhancements and the introduction of new back and front-end technologies to support them ha v e increased
    the impact and

    usability of our resource within the drug disco v ery community.

    Gr aphical abstr act

