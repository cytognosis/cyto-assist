    \ by any other data source, demonstrating the poten-\\ntial value of orthogonal information informing the effects of\\\
    ngene modulation.\\nIntroducing a better understanding of the effect of\\nmodulation and direction of disease-causing\\\
    nmechanisms\\nUnderstanding the extent and direction in which a gene or\\nprotein modulation affects the disease or phenotype\
    \ is es-\\nsential in formulating therapeutic hypotheses. For example,\\nwhere a reduction in protein activity confers\
    \ protection for a\\ndisease, an inhibitor drug may benefit the patient population.\\nConversely, where an increase in\
    \ protein activity confers pro-\\ntection for a disease, an agonist might represent a more suit-\\nable hypothesis. Since\
    \ the last update, we have assessed all of\\nour current sources that might inform the direction-of-effect\\nto assist\
    \ in this decision. In every evidence widget with avail-\\nable assessments, we now present an indicative suggestion\\\
    non the likely directionality of the effect on the gene / protein\\nexpression / function; gain-of-function, loss-of-function,\
    \ or in-\\nconclusive, as well as of the likely impact on the trait due to\\nthis effect; protect, risk or inconclusive\
    \ (Figure 2 A). A total\\nof 2.3 million assessments corresponding to 865, 816 unique\\ntarget\\u2013disease pairs were\
    \ performed across eight different data\\nsources to interpret the nature of the evidence in terms of its\\nimpact on\
    \ gene / protein function (gain-of-function / Loss-of-\\nfunction) and disease impact (protective / risk). For example,\\\
    nall evidence derived from IMPC mouse knockouts ( 34 ) was\\nconsidered loss-of-function-risk, while an inhibitor drug\
    \ that\\nhas passed through clinical evaluation would be regarded as\\nDownloaded from https://academic.oup.com/nar/article/53/D1/D1467/7917960\
