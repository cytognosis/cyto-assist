    ,\n    \"text\": \"Limitations and future directions for the PKG dataset.\\nPKG 2.0 has several limitations. In terms\\\
    nof data access, currently, the knowledge graph is mainly offered in TSV and SQL formats. However, we are well\\naware\
    \ that to more effectively meet the diverse needs of the research community, enhanced flexibility is indispen-\\nsable.\
    \ Bearing this in mind, we have plans to investigate alternative data access methods, such as the development\\nof a user\
    \ interface. This initiative is intended to streamline the data querying process, facilitating easier access for\\nusers,\
    \ especially those without sophisticated technical capabilities, to explore the extensive information within\\nthe dataset.\
    \ Furthermore, PKG2.0 dataset involves probabilistic and statistical models for tasks such as knowledge\\nentity extraction,\
    \ author disambiguation, and institutional disambiguation. While the current results represent\\nthe best achievable outcomes\
    \ given the state-of-the-art methodologies, certain biases remain inevitable due to the\\ninherent limitations of these\
    \ models. We remain committed to the continuous improvement of these processes\\nand will strive to further refine the\
    \ dataset in future iterations.\\nThe PKG dataset updating is a complex task that demands substantial computational resources\
    \ and careful\\nconsideration of various factors. Firstly, it involves updates from multiple diverse data sources. Each\
    \ update\\nentails not only the downloading of data from these sources and authorization verification but also meticulous\\\
    nsource data formatting and comprehensive quality checks. Additionally, significant code refactoring and data\\ncomputation\
    \ are required, which incur considerable computational costs. For example, the formatting process\\nmay involve converting\
    \ data from different file formats and structures into a unified format suitable for integra-\\ntion into the PKG dataset,\
    \ while the quality checks involve running multiple validation algorithms to ensure data\\nintegrity and accuracy. The\
    \ code refactoring is essential to adapt to changes in the data sources and to optimize\\nthe processing pipeline for\
    \ efficiency. As the dataset grows with each update and potential future expansions,\\nthe computational requirements\
    \ will increase proportionally. Larger-scale applications that might utilize the\\nPKG dataset, such as complex data analytics\
    \ or machine learning models, will place even greater demands on\\ncomputational resources. We need to consider how the\
    \ current infrastructure and algorithms will scale to handle\\nthese increased loads.\\nIn the future, we plan to update\
    \ the dataset annually using the latest files from PubMed, PatentsView,\\nClinicalTrials.gov, and other related sources.\
    \ To ensure ongoing data consistency and accuracy, we will imple-\\nment a multi-step quality control process. Firstly,\
    \ before each update, we will conduct a thorough review of the\\nsource data to identify and rectify any potential errors\
    \ or inconsistencies. During the update process, we will use\\nadvanced data validation algorithms to cross-check and\
    \ verify the new data against the existing dataset. After\\nthe update, we will perform post-update audits to confirm\
    \ that the integrity of the dataset has been maintained.\\nIn addition to the annual updates based on PubMed, USPTO, and\
    \ ClinicalTrials.gov update files and other\\nreliable sources, we will establish a detailed monitoring mechanism. This\
    \ mechanism will keep a close eye on\\nsignificant changes in the biomedical field, such as emerging research trends,\
    \ new data sources, and regulatory\\n\\n17\\nScientific Data |         (2025) 12:1018  | https://doi.org/10.1038/s41597-025-05343-8\\\
    nwww.nature.com/scientificdata\\nwww.nature.com/scientificdata/\\nrequirements. If there are any substantial developments\
    \ that necessitate more frequent updates than the annual\\nschedule, we will adjust the update frequency accordingly.\\\
    nFig. 4\\u2002 Evaluation of author name disambiguation results for different feature groups. The Base group contains\\\
    nfive commonly used features in the author name disambiguation task as a baseline; the Patent-based group and\\nTrial-based\
    \ group, respectively, incorporate features related to patents and clinical trial studies, which improve\\nauthor disambiguation\
    \ performance; after adding all features, the performance of the Comprehensive group\\nreaches a relatively optimal level.\\\
