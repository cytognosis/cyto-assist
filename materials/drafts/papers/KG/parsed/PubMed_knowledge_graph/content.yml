    nwww.nature.com/scientificdata/\\nIn PKG, we established links between PubMed articles and USPTO patents through citations.\
    \ We used the\\nV64 version of the PCS dataset (https://zenodo.org/records/11461587/)68 as the base data. By mapping Digital\\\
    nObject Identifiers (DOIs) to PubMed Identifiers (PMIDs), we were able to filter and identify USPTO patent\\ncitations\
    \ that were specifically related to PubMed articles. Through this meticulous process, we compiled a com-\\nprehensive\
    \ dataset comprising a total of 25,597,962 rows of data. This dataset encompasses 2,400,855 unique\\nUSPTO patents and\
    \ 3,112,470 distinct PubMed articles. The integration of these two significant data sources\\nprovides a robust framework\
    \ for analyzing the interplay between scientific research and technological innova-\\ntion, facilitating a deeper understanding\
    \ of the citation dynamics between academic publications and patent\\nliterature.\\nCitations between papers and clinical\
    \ trials.\\nJournal articles tend to report the results of experiments,\\nwhile detailed experimental procedures and additional\
    \ information are often documented in clinical trial reports.\\nIn the United States, primary trial researchers funded\
    \ by the National Institutes of Health (NIH) are actively\\nencouraged to publish trial results in journal articles69.\
    \ The reporting of trial results is accomplished through\\npublishing journal articles containing trial results and submitting\
    \ summaries to trial registries. Ideally, each\\ntrial should have at least one article about the results, even if the\
    \ trial outcomes are non-significant or negative.\\nHowever, scientists often tend to publish only their positive findings,\
    \ leading to a biased exploration of trial pro-\\ngress based solely on published papers. This approach may even result\
    \ in significant errors in conclusions.\\nAnalyzing clinical trial registrations fundamentally helps mitigate this bias70.\
    \ In PKG, we addressed this publi-\\ncation bias issue by incorporating Clinical Trial data. The Clinical Trial dataset\
    \ is sourced from ClinicalTrials.gov\\nand provides information to the public, researchers, and healthcare professionals\
    \ regarding clinical studies and\\ntheir outcomes. Aggregate Analysis of ClinicalTrials.gov (AACT) Database (https://aact.ctti-clinicaltrials.org/)71\\\
    nprocessed ClinicalTrials.gov data, organizing it into 54 relational data tables that are updated daily. We selected\"\
    \n  },\n  {\n    \"name\": \"references related to PubMed articles from the AACT dataset. In addition, the Uniform Requirements\
    \ for\",\n    \"text\": \"Manuscripts (URM)72 requires timely trial registration before recruiting the first trial participant\
    \ and ensuring\\naccurate linkage between published journal articles and trial registration records. PubMed includes trial\
    \ reg-\\nistration numbers in its provided XML files, and we processed this data to as links between clinical trials and\\\
    npapers in PKG.\\nBy incorporating clinical trial reports into PKG, we can trace the origins of research outcomes in papers\
    \ and\\nalso retrospectively explore the academic theoretical foundations of clinical experiments, thus fostering cyclical\\\
    nadvancement in biomedical scientific research.\\nCitations between patents and clinical trials.\\nWe have established\
    \ links between patents and clinical\\nliterature through citations. Specifically, if a patent citation contains the character\
    \ \\u201cCT\\u201d followed by an 8-digit\\nnumber, or if a clinical trial citation includes \\u201cus\\u201d or \\u201cpatent\\\
    u201d followed by an 8-digit number, the corresponding\\ncitation is extracted. It is important to note that the number\
    \ of citation links between patents and clinical litera-\\nture is relatively small.\\nLinkages based on projects.\\nThe\
    \ NIH Exporter serves as a valuable resource, offering a wealth of infor-\\nmation about NIH-funded projects. This includes\
    \ not only the metadata of the projects themselves but also the\\nassociated scholarly outputs in the form of papers,\
    \ patents, and clinical trials. The annual publication of the latest\\ndata ensures that the information remains current\
    \ and relevant, providing a comprehensive overview of the land-\\nscape of NIH-funded research. According to our investigation,\
    \ NIH-funded research accounts for a significant\\nproportion of all grants recorded in PubMed.\\nBy linking the metadata\
    \ of NIH-funded projects with the corresponding papers, patents, and clinical trials,\\nwe establish a detailed and interconnected\
    \ view of the research landscape. This integration not only enriches the\\ndata within PKG but also enhances its analytical\
    \ capabilities. It allows for a deeper understanding of the rela-\\ntionships and impacts of NIH-funded research across\
    \ different types of literature. This comprehensive approach\\nis crucial for facilitating advanced analyses and uncovering\
    \ insights that were previously hidden due to the\\nfragmented nature of scientific literature.\"\n  },\n  {\n    \"name\"\
    : \"Supplementary and extended works\",\n    \"text\": \"In this section, we outline the supplementary and extended works\\\
    nthat enhance the functionality and comprehensiveness of PKG. This section will cover the processes of supple-\\nmenting\
    \ journal information by year of publication, institution name disambiguation, and calculation of com-\\nmonly used measurements.\\\
    nAuthor name disambiguation.\\nThe issue of name ambiguity in scholarly publications is one of the most\\ncomplex and\
    \ highly scrutinized aspects of disambiguation. Based on our investigation, by integrating existing\\nAND datasets such\
    \ as Author-ity (https://databank.illinois.edu/datasets/IDB-2273402/)73 and Semantic Scholar\\n(https://www.semanticscholar.org/)74,\
    \ a comprehensive and high-quality disambiguation result for PubMed\\nauthor names can be obtained.\\nWe selected the\
    \ Author-ity dataset\\u2019s author disambiguation results as the primary author identify (AND_ID)\\nand supplemented\
    \ it with Semantic Scholar\\u2019s AND results for author instances after 2018. Due to variations in\\ndisambiguation\
    \ results from different sources, a single AND_ID in Semantic Scholar may simultaneously map\\nto multiple AND_IDs in\
    \ the Author-ity dataset. This occurs due to Author-ity assigning different AND_IDs to\\nthe same author or AND_IDs being\
    \ incorrectly assigned by Semantic Scholar. To address this propagation of\\nerrors during the integration process, we\
    \ additionally trained a deep neural network (DNN) model to merge\\nconflicting AND_IDs using information such as author\
    \ names, institutions, emails, countries, additional name\\n\\n12\\nScientific Data |         (2025) 12:1018  | https://doi.org/10.1038/s41597-025-05343-8\\\
    nwww.nature.com/scientificdata\\nwww.nature.com/scientificdata/\\ninformation from OpenAlex, and title and abstract embeddings,\
    \ etc. The entire author disambiguation process\\ncan be outlined in the following steps, as shown in Fig.\\u00a03:\\\
    nAs illustrated in Fig.\\u00a03, the author name disambiguation process in PKG involves the following steps:\\n(1)\\t\
    \ We assigned a unique ID to each author instance based on the Author-ity AND results, ensuring that au-\\nthors from\
    \ the Author-ity dataset (before 2018) have distinct IDs. This guarantees the highest accuracy for\\nauthor instances\
    \ within the Author-ity dataset.\\n(2)\\t For authors with the same Semantic Scholar AND_ID who never appeared in the\
    \ Author-ity dataset, we\\ncreated a new AND_ID to label them. For instance, author \\u201cFlorian Bucher\\u201d published\
    \ two papers in\\n2021, resulting in two corresponding author instances. Because all papers that \\u201cFlorian Bucher\\\
    u201d published\\nwere after 2018, they were not included in the Author-ity dataset and thus had no AND_ID assigned by\\\
    nAuthor-ity. However, authors correctly disambiguated by Semantic Scholar were given unique AND_IDs\\nin Semantic Scholar.\
    \ To maintain consistent labeling, we generated a new AND_ID, continuing from the\\nAuthor-ity AND_IDs, to label these\
    \ two author instances as disambiguated by Semantic Scholar.\\n(3)\\t For author instances with a unique AND_ID in Semantic\
    \ Scholar that also have the same AND_ID in the\\nAuthor-ity dataset, we assigned the Author-ity AND_ID to all instances\
    \ as their unique ID. For example,\\n\\u201cThomas Hofbeck\\u201d published nine papers between 2010 and 2021. The first\
    \ eight instances had a unique\\nAuthor-ity AND_ID, but the last one did not, as it was beyond the Author-ity dataset\\\
    u2019s time coverage.\\nHowever, based on the AND results from Semantic Scholar, all nine instances had the same AND_ID.\\\
    nTherefore, the last instance without an Author-ity AND_ID was labeled with the same ID as the other eight\\ninstances.\\\
    n(4)\\t For authors instances with a unique AND_ID in Semantic Scholar but have different AND_IDs in the\\nAuthor-ity\
    \ dataset, we trained a DNN model to handle this conflict to allocate a best AND_ID. The model\\ntreats author instances\
    \ with the same AND_ID as author groups and determines the most likely author\\ngroup for the conflicting author instance.\
    \ We trained the DNN model using the LAGOS-AND dataset\\n(https://zenodo.org/records/6731767/)75, creating approximately\
    \ a 1:1 ratio of positive and negative sam-\\nples. The model features include author names, institutions, emails, countries,\
    \ additional name informa-\\ntion from OpenAlex, and title and abstract embeddings. The validation results show that PKG\
    \ significantly\\nimproves recall and F1 scores while maintaining precision.\\nAdditionally, we utilized this trained\
    \ model to conduct name disambiguation for patent inventors and clin-\\nical trial investigators. By applying the similar\
    \ set of features and the learned disambiguation model, we aim to\\nidentify and disambiguate individuals in these literatures.\
    \ It should be noted that since the AND_ID in PKG\\nis the result of a probabilistic learning model, the disambiguation\
    \ result is not recommended for individual\\nresearch.\\nInstitution name disambiguation.\\nUnified names and identifiers\
    \ are essential for ensuring the reliability\\nof institution-related studies. However, there is a lack of institution\
    \ name disambiguation in the affiliations of\\npaper authors, clinical trial investigators, and patent assignees in general.\
    \ Performing institution disambigua-\\ntion ensures that researchers accurately refer to the same institutions when analyzing\
    \ and comparing data from\\npapers, clinical trials, and patents.\\nWhile institution name repetition is not as frequent\
    \ as that of author names, it remains a challenging task.\\nThe first hurdle lies in extracting institutional information\
    \ because author affiliations are often unstructured. A\\ngenuine affiliation may encompass various elements, including\
    \ country, state, city, institution, and department.\\nThese affiliations are influenced by individual author\\u2019s\
    \ habits and publisher formatting styles. To gain a better\\nunderstanding of author affiliations, we employed the MapAffil76,77\
    \ for affiliation extraction. This tool automat-\\nically parses information from free-text affiliation fields, extracting\
    \ details such as country, state, city, location,\\ninstitution, and department.\\nDespite the MapAffil effectively captures\
    \ various aspects of authorship at the individual level, further insti-\\ntution disambiguation is necessary for analyzing\
    \ institutions at a higher level (e.g., institutional rankings).\\nDifferent scholars may employ distinct writing styles\
    \ and coding conventions when referring to the same insti-\\ntution78. For instance, variations like \\u201cuniv instelling\
    \ antwerp,\\u201d \\u201cuniv antwerpen ua,\\u201d \\u201cuniv antwerpen cde,\\u201d \\u201cuniv\\nantwerp vib,\\u201d\
    \ and \\u201cuniv antwerp uia\\u201d all correspond to \\u201cuniv antwerp.\\u201d Additionally, due to translation errors\\\
    nand misspellings, institutional ambiguity is prevalent in academic literature datasets79. Without institution name\\\
    ndisambiguation, institutions with irregularly written names may appear weaker in rankings compared to equally\\ncapable\
    \ counterparts. Therefore, instituting further disambiguation processes is crucial for accurate and con-\\nsistent representation\
    \ of institutions in scholarly assessments. We used OpenAlex\\u2019s solution to solve this prob-\\nlem. OpenAlex addresses\
    \ this issue by combining two independent classification models80. These models were\\ntrained on extensive historical\
    \ MAG81 data and ROR82 data. According to the model\\u2019s report80, its precision is\\n0.96, and its recall is 0.95.\\\
    nWe implemented this institution disambiguation work on the affiliations of paper authors, clinical trial inves-\\ntigators,\
    \ and patent assignees. This application to these three types of literature data-related affiliations helps to\\nensure\
    \ the accuracy and consistency of institutional representation in various academic and research contexts.\\nSupplementing\
    \ specific information of the journal by year of publication.\\nIn the assessment of\\nscientific capabilities for research\
    \ institutions and individuals, the primary focus is on the achievements of pub-\\nlicly published papers. The relative\
    \ quality of the journals where these papers are published serves as a direct,\\ncrucial, and popular evaluation criterion.\
    \ For complex scientific research questions that cannot be adequately\\n\\n13\\nScientific Data |         (2025) 12:1018\
    \  | https://doi.org/10.1038/s41597-025-05343-8\\nwww.nature.com/scientificdata\\nwww.nature.com/scientificdata/\\naddressed\
    \ within a single field, interdisciplinary research often provides more effective solutions83. Consequently,\\nunderstanding\
    \ the quality of journals in other fields has become increasingly important.\\nPubMed provides information on the source\
    \ journals for each indexed article. However, PubMed encom-\\npasses over thirty thousand different journals, and even\
    \ seasoned scholars may struggle to recall the quality\\nlevels of journals across various domains. Therefore, quantitative\
    \ evaluation of journals becomes essential.\\nSCImago is a publicly accessible portal that provides journal metrics calculated\
    \ based on information from the\\nScopus database. These metrics serve for evaluating and analyzing scientific fields.\
    \ We linked SCImago data to\\nPKG through the following steps:\\n(1)\\t Completing ISSN Fields in PubMed Journals: The\
    \ ISSN (International Standard Serial Number) uniquely\\nidentifies journals and facilitates convenient and accurate cross-database\
    \ linking. Approximately 1% of\\njournals in PubMed lack an ISSN field. To address this, we supplemented the ISSN data\
    \ using other journal\\nnames as references.\\n(2)\\t Linking PKG with SCImago Using ISSN and PubYear Fields: We believe\
    \ that evaluating paper quality\\nbased on journal information should not be static. Instead, it should consider the journal\\\
    u2019s status in the\\nyear of publication. Rankings of different journals within the same field can fluctuate significantly\
    \ across\\nyears. When specific journal information is unavailable for the publication year, we use data from the near-\\\
    nest adjacent year.\\n(3)\\t Supplementing Data Based on the Linked Results: Using the results from the second step, we\
    \ added data\\nfor the publication year, including SJR (Scientific Journal Rankings), impact factor, h-index, total publica-\\\
    ntions, journal categories, publishers, and geographic regions.\\nCalculation of commonly used measurements.\\nUnderstanding\
    \ the contributions and impact of indi-\\nvidual researchers is crucial for evaluating scientific progress and identifying\
    \ areas of disparity. By accurately\\ndisambiguating authors and calculating key scientific metrics, we can gain deeper\
    \ insights into the academic\\nlandscape. This work not only helps in recognizing the achievements of individual researchers\
    \ but also sheds light\\non broader trends and patterns within the scientific community. Based on the author disambiguation\
    \ results, we\\ncalculated scientific metrics for each author. Specifically:\\n(1)\\t Counting of the author\\u2019s publications:\
    \ This is based solely on articles indexed in PubMed. If an author\\u2019s\\narticles are not included in PubMed, the\
    \ calculated results may be lower than the actual count. However,\\nconsidering PKG\\u2019s focus on biomedical literature,\
    \ we find this approach reasonable.\\n(2)\\t Calculation of the h-index: This is a comprehensive metric that evaluates\
    \ an author\\u2019s scholarly impact by\\nconsidering both the number of publications and the number of citations received.\
    \ It is widely used to\\nassess academic capabilities.\\nData Records\\nThe dataset is available at Figshare84, and keep\
    \ update on GitHub at https://PubMedKG.github.io. The statistics\\nand descriptions of the main nodes and relationships\
    \ in PKG are presented in Tables\\u00a02 and 3, respectively. See\\nthe \\u201cPKG 2.0 Database Description.pdf\\u201d\
    \ at Figshare84 for more details of PKG. To help users organize and utilize\\nthe dataset more effectively, we have added\
    \ serial numbers to the table names in the file available on Figshare.\\nWe performed biomedical entity extraction on\
    \ articles, clinical trials, and patents. Table\\u00a04 presents statistical\\ndata on nine types of entities extracted\
    \ from the three types of literature. The extraction results for each of the\\nthree types of literature are stored in\
    \ separate data tables.\\nEach data field is self-explanatory, and fields with the same names in other tables adhere to\
    \ a consistent\\ndata format that allows cross-table linking. Tables\\u00a05\\u201324 provide details on the essential\
    \ field names, formats,\\nnon-empty data counts, and brief descriptions for each data file.\\nTechnical Validation\\nValidation\
    \ of author name disambiguation.\\nWe validate our disambiguation results using the LAGOS-\\nAND dataset. This dataset\
    \ is a recently published high-quality collection of author name disambiguation data,\\nautomatically constructed using\
    \ authoritative sources such as ORCID and DOI. According to its reported valida-\\ntion information, the LAGOS-AND dataset\
    \ is highly credible. The 2.0 version of the LAGOS-AND dataset is built\\non the OpenAlex database\\u2019s April 2022\
    \ baseline version.\\nAccording to the evaluation results presented in Table 25, the Author-ity dataset exhibits the highest\
    \ pre-\\ncision. Our integrated results ensure credible precision while significantly improving the recall and F1 score.\\\
    nValidation of citations.\\nThe combined data table \\u201cReferenceList_Papers\\u201d contains 774,810,780 citation\\\
    nrelationships across 30,695,697 articles. Compared to PubMed\\u2019s native citation data (268,400,936 entries), the\\\
    ncumulative supplementation amounts to 506,409,844 additional citations. Validations of cross-type citations are\\nas\
    \ follows:\\nValidation of paper-patent citations.\\nMatt76 provided a high-quality PCS dataset. We selected a portion\\\
    nof the data from USPTO to PubMed for validation in our dataset. This dataset contains only positive annotations\\nand\
    \ covers citations from 183 patents, which can be used to calculate recall. However, to evaluate precision, we\\n\\n14\\\
    nScientific Data |         (2025) 12:1018  | https://doi.org/10.1038/s41597-025-05343-8\\nwww.nature.com/scientificdata\\\
    nwww.nature.com/scientificdata/\\nneed negative annotations. Therefore, we supplemented the labeled data for these 183\
    \ patents to compute accu-\\nracy. For each confidence level, we randomly extracted 100 annotation samples. During the\
    \ annotation process,\\nwe primarily used auxiliary information such as author names, publication year, article title,\
    \ journal, issue, and\\nvolume. Each annotated data point underwent verification by two research assistants.\\nBased on\
    \ the known good dataset provided by Matt76, we extracted the relevant portion related to PubMed\\n(4,223 rows) and calculated\
    \ the recall of the PCS dataset in PKG at different confidence levels.\\nAccording to the evaluation\\u00a0results\\u00a0in\
    \ Table 26 for precision and recall, when the confidence level is between\\n4 and 10, the recall significantly decreases,\
    \ while precision only shows a slight improvement. It appears that the\\naccuracy of the PCS dataset on PubMed performs\
    \ similarly to its performance on MAG. We agree with Matt\\u2019s76\\nsuggestion that most scholars should focus on citations\
    \ with a confidence level greater than or equal to 4. For\\nthose aiming to minimize erroneous data, citations with a\
    \ confidence level of 10 can be used, as they exhibit both\\nhigh precision and decent recall.\\nValidation of paper-clinical\
    \ trial citations.\\nWe evaluated the linkage of clinical trial data through\\ncross-validation with SciSciNet, as shown\
    \ in Table 27. Due to differences in data time intervals, we validated the\\nnct_id from the PKG dataset against SciSciNet.\\\
    nThere is a remarkable consistency between the two datasets, with 98.99% of the linkages in SciSciNet also\\npresent in\
    \ PKG.\\nHolistic validation of PKG 2.0.\\nHolistic validation aims to assess the accuracy of interconnected linkages\\\
    nacross papers, patents, and clinical trials. To validate the holistic accuracy of PKG 2.0, we conducted a manual\\nverification\
    \ process. For each project, we manually verified the linkages by accessing the original documents on\\nPubMed, ClinicalTrials.gov,\
    \ and USPTO\\u2019s Patent Public Search platform (https://ppubs.uspto.gov/). The vali-\\ndation focused on citation relationships,\
    \ and project-literature connections. For instance, among the randomly\\nselected 100 patent-project linkages, upon checking\
    \ on the USPTO\\u2019s Patent Public Search platform, we found that\\n82 of them were indeed mentioned in the \\u201cGOVERNMENT\
    \ INTEREST\\u201d section of the patent texts. By dividing\\nthe number of checked linkages (82) by the total number of\
    \ linkages in the sample (100), we calculated the accu-\\nracy to be 82%. Regarding the performance of bioentity extraction,\
    \ which also serves as a crucial linkage among\\npapers, patents, and clinical trials, detailed information can be found\
    \ in the \\u201cResults\\u201d section of the BERN270.\\nAs shown in Table\\u00a028, the accuracy of these linkages ranged\
    \ from 82% to 100%, with most exceeding 95%.\\nHowever, patent-project linkages showed relatively lower precision (82%).\
    \ This is likely because although the\\nNIH Exporter might have included relevant data, the funding source information\
    \ may not be mentioned in the\\npatent texts. This validation confirms the robustness of PKG 2.0 in integrating multi-source\
    \ biomedical literature\\nand underscores its reliability for cross-domain scientometric analysis.\\nUsage Notes\\nIn\
    \ the field of biomedicine, scholarly outputs are mainly presented in the form of clinical trials, patents, and aca-\\\
    ndemic papers. These different types of documentary data are complementary to each other. By comprehensively\\nanalyzing\
    \ these literatures, it is possible to track the flow path of knowledge more accurately and deeply and then\\nunderstand\
    \ the characteristics and laws of knowledge flow. For example, the clinical trial results of vaccines and\\ndrugs may\
    \ prompt patent applications and patent information may be introduced into papers to demonstrate\\ntheir application prospects.\
    \ This cross-literature knowledge flow not only helps scientists discover new research\\ndirections but also provides\
    \ practical guidance for clinical doctors, ultimately promoting the overall progress\\nof the medical field. This requires\
    \ a multi-perspective, fine-grained connection to the three types of literature.\\nWe attempt to explore the optimization\
    \ of the multi-literature dataset and the analysis of knowledge flow\\nthrough the following use cases using the PKG dataset:\
    \ integrating features from patents and clinical trials into\\ntraditional author disambiguation methods; using COVID-19\
    \ vaccine research as a case study to transcend\\nliterature type limitations and more comprehensively explore knowledge\
    \ flow.\\nEnhancing data quality through multi-source fine-grained linkages.\\nIn academic datasets, author\\ndisambiguation\
    \ has always been one of the key challenges. Although many algorithms and models have been\\nproposed and implemented\
    \ with relatively good results, these methods seem to have reached their performance\\nlimits. This study combines information\
    \ from different sources and integrates and deeply correlates multiple data-\\nsets, which can more accurately capture\
    \ the unique content features of authors, providing possibilities for further\\noptimizing author disambiguation tasks.\\\
    nSpecifically, this study constructed pairwise experimental data from the Author-ity 2018 dataset based on\\nauthors with\
    \ the same Initial, using whether they have the same links to patents or clinical trials as the standard.\\nName similarity,\
    \ Publication year gap, Venue similarity, Affiliation similarity, and Content features commonly\\nused in author disambiguation\
    \ research were used as baseline model features (BF), and features with the same\\nclinical trial links and the same patent\
    \ links were subsequently added.\\nAs shown in Fig.\\u00a04, We report the accuracy (P), recall rate (R), F1, and Macro-F1\
    \ metrics based on the\\nclassification-based method. The reason for using the additional metric Macro-F1 is that the\
    \ datasets in the\\nauthor\\u2019s disambiguation research generally have natural skewness. As shown in the table above,\
    \ the disambigua-\\ntion result has been greatly improved after adding the Clinical trial and Patent features. This example\
    \ provides us\\nwith ideas for cross-iterating the overall optimization of the dataset using multiple types of data.\\\
    nRevealing knowledge flow through Multi-source literature.\\nThe outbreak of the COVID-19 pan-\\ndemic has not only posed\
    \ unprecedented challenges to global public health but also sparked an unprecedented\\nresearch boom in the academic community.\
    \ The large number of patent applications, publication of papers, and\\n\\n15\\nScientific Data |         (2025) 12:1018\
    \  | https://doi.org/10.1038/s41597-025-05343-8\\nwww.nature.com/scientificdata\\nwww.nature.com/scientificdata/\\nconduct\
    \ of clinical trials all represent scientific efforts to combat the pandemic. The rich literature resources have\\nplayed\
    \ a promoting role in research, and some scholars have conducted quantitative analysis and exploration of\\nthe literature.\
    \ Despite the large number of literatures, most studies are based on a single type of literature resource,\\nleading to\
    \ an incomplete understanding of key areas such as vaccine and drug research. Analyzing multiple types\\nof literature\
    \ simultaneously, leveraging the PKG 2.0 dataset, can help to understand the development process of\\nthis research more\
    \ accurately and reveal important synergies among different types of knowledge.\\nAs a case study, we utilized the bioentity\
    \ data and source institution data of the trials in PKG 2.0 to screen\\nout the earliest ten COVID-19 clinical trials\
    \ sponsored by BioNTech SE. Then, by leveraging the linkages within\\nPKG 2.0, we identified their earliest relevant papers\
    \ and patents. As depicted in Fig.\\u00a05, when these are plotted on\\nthe timeline of the same graph for analysis, the\
    \ flow of knowledge across different types of literature becomes\\nclearly visible.\\nFor a significant portion of these\
    \ trials, the timeline indicates a relatively short interval between the start of\\nthe trial and the publication of related\
    \ papers. This rapid dissemination of trial results through academic papers\\nis crucial for sharing scientific findings\
    \ within the research community. Moreover, the earliest trials in the data-\\nset even led to patent applications. This\
    \ example showcases a significant synergy that goes beyond simply point-\\ning to individual papers or studies. It reveals\
    \ how different types of knowledge from clinical trials, academic\\npapers, and patents interact and build upon each other.\
    \ By integrating and analyzing these three different data-\\nsets within PKG 2.0, we can understand not only the specific\
    \ process of vaccine research but also the knowledge\\nflow in a more comprehensive and accurate manner. For instance,\
    \ we can observe how early clinical findings led\\nto academic publications that then guided the development of patented\
    \ vaccination techniques, highlighting the\\nseamless flow of knowledge and innovation within the COVID-19 vaccine research\
    \ domain.\\nTaking one of the COVID-19 vaccine research projects as an example, as shown in the Fig.\\u00a06, its clinical\
    \ trials\\nfor vaccine safety and immunogenicity began on April 29, 2020. The clinical trial results were reported in\
