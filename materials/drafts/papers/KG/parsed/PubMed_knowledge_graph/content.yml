    \ and methods\\nentities.\\nBiomedical entity extraction and relation mapping.\\nKnowledge entities provide a quick understand-\\\
    ning of the research content or topics within the literature, facilitating further literature management and pattern\\\
    nanalysis. Interactions between genes, proteins, or drugs in specific biological contexts are central to many biomed-\\\
    nical studies. However, the vast volume and rapid publication rate of biomedical literature make manual identifica-\\\
    ntion of these content elements impractical52. To address this challenge, named entity recognition techniques are\\nemployed\
    \ to automatically identify domain-specific terms in PubMed articles.\\nWe propose a biomedical text mining tool, BERN2\
    \ (http://bern2.korea.ac.kr/)53, for accurate and efficient\\nbiomedical Named Entity Recognition (NER) and named entity\
    \ normalization (NEN). BERN2 has been used\\nto extract biomedical entities from the titles and abstracts of papers, clinical\
    \ trials, and patents in this study. The\\nextracted entities include nine categories: gene/protein, disease, drug/chemical,\
    \ species, mutation, cell line, cell\\ntype, DNA, and RNA. The bio-entity extraction component comprises two models: a\
    \ multi-task NER model that\\nidentifies named entities in papers, clinical trials, and patents, and a multi-type normalization\
    \ model that links\\nthese biomedical entities to unique concept identifiers. After performing biomedical entity extraction,\
    \ we used\\nthe iBKH dataset to map the relationships between the extracted entities.\\nNamed entity recognition. BERN2\
    \ employs a multi-task NER model to simultaneously extract all entity types\\nexcept for mutations. Multi-task learning\
    \ (MTL)54 aims to improve performance by allowing models to share\\nrepresentations across related tasks. In biomedical\
    \ NER, MTL often outperforms single-task learning (STL)\\nbecause it enables models to leverage shared word semantics\
    \ across different tasks55. Due to the lack of a publicly\\navailable training set specifically for mutations, BERN2 utilizes\
    \ tmVar 2.056 as the NER model for mutation-type\\nbiomedical entities. Cross-entropy objectives were used to optimize\
