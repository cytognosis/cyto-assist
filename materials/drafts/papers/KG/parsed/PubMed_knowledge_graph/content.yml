    nwww.nature.com/scientificdata/\\npublished in Nature on August 12, 2020, followed by a patent application submitted to\
    \ the USPTO on April\\n16, 2021 (granted on Jan 10, 2023). These three types of documents are interrelated: clinical trial\
    \ reports cite\\npapers, papers register clinical trial numbers, and there are citations among patents, papers, and clinical\
    \ trials.\\nAdditionally, these documents often share common biomedical entities.\\nThe clinical trial sponsored by BioNTech\
    \ SE (ClinicalTrials.gov ID NCT04368728) was a comprehensive\\nstudy evaluating multiple aspects of different RNA vaccine\
    \ candidates against COVID-19. In this trial, various\\nparameters like the safety, tolerability, immunogenicity, and\
    \ efficacy of vaccine candidates were investigated.\\nFor instance, it explored different doses of vaccine candidates\
    \ such as BNT162b1 and BNT162b2 in different\\nage groups and also considered aspects like booster doses and potential\
    \ protection against emerging variants.\\nThis clinical trial was closely related to a paper published in Nature titled\
    \ \\u201cPhase I/II study of COVID-19\\nRNA vaccine BNT162b1 in adults\\u201d. The paper reported the available safety,\
    \ tolerability, and immunogenicity\\ndata from an ongoing placebo-controlled, observer-blinded dose-escalation study,\
    \ which was precisely the clin-\\nical trial with the identifier NCT04368728. The findings in the paper, such as the dose-dependent\
    \ nature of local\\nreactions and systemic events, and the increase in RBD-binding IgG concentrations and SARS-CoV-2 neutral-\\\
    nizing titres after vaccination, provided crucial insights based on the clinical trial data. This synergy between the\\\
    nclinical trial and the paper shows how real-world data from the trial was analyzed and presented in an academic\\npaper,\
    \ contributing to the scientific understanding of the vaccine\\u2019s characteristics.\\nSubsequently, a patent titled\
    \ \\u201cCoronavirus vaccine\\u201d filed by BioNTech SE. This patent related to methods and\\nagents for vaccination\
    \ against coronavirus infection and inducing effective coronavirus antigen-specific immune\\nresponses. It built upon\
    \ the knowledge gained from the clinical trial and the paper, translating the scientific\\nfindings about the vaccine\\\
    u2019s potential and its effects on immune responses into a protectable intellectual property\\nrelated to vaccination\
    \ methods.\\nPrevious efforts in knowledge graphs, such as the Fine-grained single-type literature knowledge graph and\\\
    nCoarse-grained Integrated multi-type academic graph, have their limitations. For example, the Fine-grained\\nsingle-type\
    \ literature knowledge graph focuses on only one type of literature, if we were relying solely on a\\nsingle-type literature\
    \ knowledge graph, we would miss out on crucial connections. For instance, we wouldn\\u2019t be\\nable to see how the\
    \ clinical trial results directly influenced the patent application or how the patent\\u2019s proposed vac-\\ncination\
    \ methods were rooted in the real-world data from the clinical trial and the theoretical basis provided by the\\nacademic\
    \ paper. The Coarse-grained Integrated multi-type academic graph, although integrating multiple types of\\nliterature,\
    \ lacks the fine-grained comprehensive links that PKG 2.0 offers. In the context of our COVID-19 vaccine\\nexample, it\
    \ might show general associations between the clinical trial, paper, and patent but would fail to cap-\\nture the detailed\
    \ entity-level relationships. Through PKG 2.0, the linkages among these three types of documents\\nbecome evidence. For\
    \ example, in PKG 2.0, we can trace how specific bioentities, projects, and even the researchers\\ninvolved were consistently\
