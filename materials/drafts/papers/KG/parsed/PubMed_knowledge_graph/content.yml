    n(2)\\t NIH Open Citation Collection (NIH-OCC)65: NIH-OCC data consists of PMID-to-PMID citation rela-\\ntionships. The\
    \ non-structured citation text from articles is initially extracted and matched with relevant\\narticles, alongside details\
