    \ is generated from unrestricted sources such as MedLine, PubMed\\nCentral (PMC), and CrossRef, resulting in higher data\
    \ completeness.\\nDuring the integration process, through manual verification, we found that some citation data might\
    \ have\\nincorrect links. For example, some data from earlier years in PubMed contain obvious errors, especially where\\\
    nthe publication year of the citing literature is several years later than that of the cited literature. To address this,\\\
    nwe removed citation data with a negative difference of more than 1 year.\\nCitations between papers and patents.\\nTechnological\
    \ innovation serves as the foundation for eco-\\nnomic growth, and many valuable innovations rely on scientific discoveries66.\
    \ In fact, science can be considered\\na \\u2018map\\u2019 for business inventors who seek to leverage original technologies\
    \ or ignite their own research and devel-\\nopment efforts67. The citations between scientific papers reflect mutual influences\
    \ among research endeavors.\\nAdditionally, the direct citation of patents in academic papers (patent-to-paper citations)\
    \ provides a supplemen-\\ntary measure of the impact of fundamental research on commercialization. However, extracting\
    \ patent-to-paper\\ncitations poses challenges. Non-patent literature citations recorded by the United States Patent and\
    \ Trademark\\nOffice (USPTO) do not always adhere to standard citation formats, and a significant number of citations\
    \ exist\\nonly within the main text, not in the patent metadata. Consequently, systematically identifying referenced articles\\\
    nremains a complex task.\\nIndex\\nFormat\\nShort description\\nPatentId\\nString\\nUnique ID of patent in USPTO.\\ninventor_id\\\
