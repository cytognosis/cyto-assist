  sections: "[\n  {\n    \"name\": \"Background & Summary\",\n    \"text\": \"The rapid expansion of digital data in scholarly\
    \ domains has unlocked new horizons for exploring patterns\\ncharacterizing the structure and evolution of science1. Academic\
    \ papers, patents, and clinical trials are three\\ndistinct yet interconnected components in the realm of scholarly communication\
    \ of medicine. Each serves a\\nunique purpose and follows a specific structure, yet they all share the common goal of\
    \ disseminating knowl-\\nedge and findings. Academic papers aim to further science through the dissemination of original\
    \ research,\\noften peer-reviewed to ensure validity and quality2\\u20135. They provide detailed descriptions of research\
    \ methods\\nand results, serving as valuable references for other researchers. However, the impact of academic papers\
    \ is\\noften confined to the academic community, making it challenging to translate findings directly into practical\\\
    napplications. In contrast, patents offer significant advantages in protecting innovation as legal documents that\\nestablish\
    \ intellectual property rights for new inventions and processes6\\u201310. They can reveal technological trends\\nand\
    \ directions in industry research, providing insights into the commercialization of academic inquiries11\\u201313.\\nHowever,\
    \ patents generally lack extensive experimental data, theoretical insights, and comprehensive discus-\\nsions of scientific\
    \ principles that are characteristic of papers and clinical trial studies, which can lead to a gap in\\nthe detailed understanding\
    \ of technological developments14\\u201318. Clinical trial records provide a comprehensive\\noverview of all aspects of\
    \ the clinical trials, producing study records including discussions and conclusions that\\nsupply context to the results.\
    \ The results of clinical trials are crucial for regulatory approval and clinical adop-\\ntion. These records, while rich\
    \ in procedural detail and regulatory compliance, typically lack the exploratory\\nscientific narratives and theoretical\
    \ underpinnings that academic papers elaborate on19\\u201321. Similarly, they do not\\ndelve into the technical specifications\
    \ and potential commercial applications that are the focus of patents22,23.\\n1School of Information Management, Sun Yat-sen\
    \ University, Guangzhou, China. 2School of Information, University\\nof Texas at Austin, Austin, TX, USA. 3School of Information\
    \ Sciences, University of Illinois at Urbana-Champaign,\\nChampaign, IL, USA. 4Department of Computer Science and Engineering,\
    \ Korea University, Seoul, South Korea.\\n5School of Computing, Kyung Hee University, Seoul, South Korea. 6Department\
    \ of Library and Information Science,\\nYonsei University, Seoul, South Korea. 7Department of Information Management,\
    \ Peking University, Beijing, China.\\n8Dell Medical School, University of Texas at Austin, Austin, TX, USA. \\u2709e-mail:\
    \ issxj@mail.sysu.edu.cn; ying.ding@\\naustin.utexas.edu\\nData Descriptor\"\n  },\n  {\n    \"name\": \"OPEN\",\n   \
    \ \"text\": \"2\\nScientific Data |         (2025) 12:1018  | https://doi.org/10.1038/s41597-025-05343-8\\nwww.nature.com/scientificdata\\\
    nwww.nature.com/scientificdata/\\nThis absence of information can create a disconnect between the practical execution\
    \ of clinical trials and the\\nbroader scientific and commercial context of medical research24\\u201329.\\nWhile each\
    \ type of scholarly document\\u2014be it academic papers, patents, or clinical trial records\\u2014serves a\\nunique function\
    \ within the scientific landscape, the potential synergies between them are often not fully real-\\nized. Establishing\
    \ a more integrated approach to these diverse knowledge repositories could significantly enrich\\nour comprehension of\
    \ the scientific ecosystem. By fostering a more interconnected framework, we can facilitate\\na multidimensional perspective\
    \ that enhances innovation, accelerates the translation of research into practical\\napplications, and promotes a more\
    \ collaborative environment for scientific discovery30\\u201333. This holistic view\\nwould not only bridge the existing\
    \ gaps but also pave the way for a more cohesive and progressive scientific\\ncommunity. Some studies have obtained interesting\
    \ findings using data from various types of literature. For\\nexample, a study on Bee Pollen has effectively utilized\
    \ academic papers, patents, and clinical trials to present a\\ncomprehensive view of its health benefits34; Meyer et al.35\
    \ used both patent and paper literature for scientometric\\nanalysis and found that inventor-authors tend to be more productive\
    \ and academically influential than ordinary\\nauthors; Thelwall et al.36 conducted citation analysis on clinical trials\
    \ and papers and found that articles cited by\\nclinical trials are usually more likely to have long-term impact.\\nThe\
    \ efforts in constructing knowledge graphs from academic literature can be categorized as follows:\\n(1)\\t Fine-grained\
    \ single-type literature knowledge graph. This category refers to works that utilize only one\\ntype of scholarly output,\
    \ either academic papers, patents, or clinical trials. Each type provides unique\\ninsights and data that contribute to\
    \ the construction of knowledge graphs. Chen et al.37 constructed a\\npublicly available Clinical Trial Knowledge Graph\
    \ (CTKG), including nodes representing medical entities\\nin clinical trials (such as studies, drugs, and conditions)\
    \ and edges representing relationships between\\nthese entities (such as drugs used in studies). Patent data is often\
    \ used to build engineering knowledge\\ngraphs38,39. Zou et al.40 constructed a patent-based knowledge graph, patent-KG,\
    \ to represent knowledge\\nfacts in engineering design patents. Knowledge graphs like the Clinical Trial Knowledge Graph\
    \ (CTKG)\\nand patent-KG serve as specialized repositories that capture the nuances of their respective domains.\\nCTKG,\
    \ for instance, provides a structured representation of clinical trials, offering insights into the rela-\\ntionships\
    \ between medical entities such as drugs and conditions. This specificity is invaluable for research-\\ners focusing on\
    \ clinical outcomes and drug efficacy. Similarly, patent-KG encapsulates the inventive steps\\nand technical details of\
    \ engineering design patents, illuminating the pathways of technological innovation.\\nHowever, because they are independent\
    \ knowledge graphs summarized from the single-type literature,\\nthey cannot provide the association of knowledge among\
    \ theoretical, clinical, and commercial research.\\nConsequently, scientometrics analysis and knowledge discovery research\
    \ based on such a graph are subject\\nto certain constraints.\\n(2)\\t Coarse-grained Integrated multi-type academic graph.\
    \ This type of graph involves the fusion of differ-\\nent types of scholarly outputs. SciSciNet41, a large-scale open\
    \ data lake for scientific research, contains a\\ndatabase that captures scientific publications, researchers, and institutions\
    \ and tracks their connections\\nto related entities, including citations to patents, scientific publications in clinical\
    \ trials, and social media\\nmentions. The Dimensions database42 indexes papers and their citations and uniquely connects\
    \ publica-\\ntions to their related grants, funding agencies, patents, and clinical trials. Bibliometric networks like\
    \ Di-\\nmensions and SciSciNet offer a more holistic view of scholarly communication by integrating diverse types\\nof\
    \ literature. However, while these knowledge graphs have significantly advanced our understanding of\\nscholarly communication,\
    \ they lack a more refined, multi-perspective linking approach between different\\ntypes of scientific literature and\
    \ evaluative entities.\\nOverall, the current knowledge graph, whether it is a fine-grained knowledge graph based on knowledge\\\
    nentities like gene, drug, and disease or a coarse-grained knowledge graph based on evaluation entities like paper,\\\
    nauthor, and journal, lacks multi-perspective and fine-grained comprehensive links to create stronger associ-\\nations\
    \ between different knowledge. This limitation prevents the full utilization of the interconnectedness of\\nvarious types\
    \ of scholarly outputs, thereby restricting the potential for more holistic scientometrics analysis and\\nknowledge discovery.\\\
    nIn 2020, we developed a PubMed knowledge graph (referred to as PKG 1.0)43 based on the PubMed 2019\\ndataset (https://pubmed.ncbi.nlm.nih.gov/).\
    \ PKG 1.0 created connections among the bio-entities, authors,\\narticles, affiliations, and funding. It facilitates measuring\
    \ scholarly impact, knowledge usage, and knowledge\\ntransfer, as well as profiling authors and organizations based on\
    \ their connections with bio-entities. Recognized\\nfor its utility, PKG 1.0 was supplemented by Scientific Data with\
    \ \\u201ca detailed open access model of the PubMed\\nliterature\\u201d, enhancing its reach and applicability44. Over\
    \ the subsequent years, PKG 1.0 has been utilized across\\ndifferent research domains such as artificial intelligence33,45,\
    \ information retrieval46,47, and scientometrics48,49.\\nAs shown in Table\\u00a01, PKG 1.0 has been cited more than 100\
    \ times in Web of Science, with the citation fields\\npredominantly in Computer Science, Information Science Library Science,\
    \ and Mathematical Computational\\nBiology.\\nThe table illustrates the distribution of citation fields of PKG 1.0 within\
    \ the Web of Science database. Each\\nline represents a different research field, with the number of citations, example\
    \ of specific studies, and purpose of\\nusing PKG 1.0. Computer Science leads with 83 citations, followed by Information\
    \ Science Library Science with\\n52 citations. Other notable fields include Mathematical Computational Biology, Mathematics,\
    \ and Health Care\\nSciences Services. This data was queried from Web of Science on January 06, 202550.\\nHowever, PKG\
    \ 1.0 only focused on paper data, which presents limitations when compared to integrating\\npapers, patents, and clinical\
    \ trials. This focus restricts the ability to support comprehensive research across\\n\\n3\\nScientific Data |       \
    \  (2025) 12:1018  | https://doi.org/10.1038/s41597-025-05343-8\\nwww.nature.com/scientificdata\\nwww.nature.com/scientificdata/\\\
    ndifferent types of academic literature. The connections between these three types of literature are also crucial for\\\
    na holistic understanding of knowledge transfer and innovation pathways. The necessity for PKG 2.0 arises from\\nthe ever-growing\
    \ complexity of biomedical research and the increasing interdependence of scientific literature.\\nPKG 2.0 is designed\
    \ to address these challenges by integrating papers, patents, and clinical trials as core data,\\nestablishing fine-grained\
    \ connections between these document types through bioentities, citations, and projects.\\nAdditionally, based on this\
    \ linked dataset, we have conducted supplementary and extended works, including\\ninstitution disambiguation, calculating\
    \ commonly used measurements of authors, integrating citation data from\\nmultiple sources, and supplementing detailed\
    \ information of journals annually (see Fig.\\u00a01 for more details). By\\nintegrating these diverse sources of knowledge,\
    \ PKG 2.0 aims to provide a holistic view of the research land-\\nscape, enabling researchers to uncover patterns and\
    \ insights that were previously obscured by the siloed nature\\nof data.\\nThe core of PKG includes the entirety of PubMed\
    \ papers, all clinical trial studies from ClinicalTrials.\\ngov (https://clinicaltrials.gov/), and biomedical-related\
    \ patents from USPTO (https://www.uspto.gov/) and\\nPatentsView (https://patentsview.org/). PKG establishes connections\
    \ between papers, patents, and clinical tri-\\nals through bioentities, projects, authors, and citations. It integrates\
    \ extended metadata from multiple sources,\\nincluding iCite (https://icite.od.nih.gov/), and SciMago (https://www.scimagojr.com/).\
    \ This results in a biomed-\\nical knowledge graph that not only features rich metadata but also provides fine-grained\
    \ knowledge annotations\\nand tightly interconnected relationships. Figure\\u00a02 shows the logical model of PKG in a\
    \ relational database.\\nIn practice, PKG 2.0 is expected to benefit a diverse range of users across multiple fields.\
    \ For those in the\\ninformation retrieval domain, researchers can access a wealth of related information from different\
    \ types of\\nliterature, which significantly enhances the comprehensiveness and accuracy of knowledge retrieval compared\\\
    nto traditional search methods. In the field of scientometrics, the integrated nature of PKG 2.0 allows scholars to\\\
    nanalyze the relationships between different types of scholarly outputs, such as citation patterns, collaboration\\nnetworks,\
    \ and knowledge transfer mechanisms among papers, patents, and clinical trials. This holistic view can\\nuncover previously\
    \ hidden patterns and trends, facilitating more profound scientometric analysis and research.\\nIn the realm of machine\
    \ learning and artificial intelligence, PKG 2.0 offers high-quality linked datasets that are\\nhighly conducive to knowledge\
    \ reasoning. The well-structured and interrelated data can be used to train mod-\\nels, enabling machines to better understand\
    \ complex relationships within biomedical research and ultimately\\nimproving the performance and accuracy of machine-learning\
    \ algorithms in tasks such as prediction, classifica-\\ntion, and decision-making in the biomedical field.\"\n  },\n \
