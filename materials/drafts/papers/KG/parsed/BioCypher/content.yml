  sections: "[\n  {\n    \"name\": \"Modularity. To rationalize efforts across\",\n    \"text\": \"the community, we propose\
    \ a modular\\narchitecture that maximizes reuse of data\\nand code in three ways: input, ontology\\nand output (Fig. 1a).\
    \ Input adapters al-\\nlow delegating maintenance work to one\\ncentral place for each resource, ontol-\\nogy adapters\
    \ give access to the wealth\\nof structured information curated by the\\nontology community, and output adapt-\\ners allow\
    \ benchmarking and selection of\\ndatabase management systems. Togeth-\\ner, these mechanisms enable a workflow\\nthat\
    \ reduces the time and effort to de-\\nvelop and deploy custom KGs.\"\n  },\n  {\n    \"name\": \"Harmonization. By using\
    \ ontologies as\",\n    \"text\": \"expertly crafted repositories of concep-\\ntual hierarchies, we facilitate harmoni-\\\
    nzation from a biological perspective. We\\nhelp with the technical aspects of using\\nand manipulating ontologies \\\
    u2014 for in-\\nstance, by flexibly extending or hybrid-\\nizing complementary ontologies.\"\n  },\n  {\n    \"name\"\
    : \"Reproducibility. By sharing the map-\",\n    \"text\": \"ping of KG contents to ontologies, we fa-\\ncilitate reproduction\
    \ of the structure of\\nthe corresponding database without ac-\\ncess to the primary data, which may be\\nprohibited by\
    \ license or privacy issues.\\nWe also enable extraction of subgraphs,\\neffectively converting storage-oriented\\nto\
