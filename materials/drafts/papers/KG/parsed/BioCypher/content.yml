    Fig. 1 | The BioCypher framework. a, Threefold modularity: resources (left) and

    ontologies (bottom left) are combined to yield a knowledge graph (right). The

    mapping of entities to ontology concepts is realized by shareable configuration,

    which can be iteratively optimized. b, Initially, we transform commonly used,

    curated ‘secondary’ resources into configurable, task-specific knowledge graphs

    in various output formats. Incrementally, these secondary adapters will be

    replaced by primary resource adapters (Supplementary Fig. 1). Colored panels

    in a,b indicate parts of the BioCypher ecosystem. c, Agreeing on a common

    representational framework allows harmonization of task-specific data sources

    to answer complex queries across biomedical domains. For instance, starting

    at mass spectrometry measurements of a patient’s tumor (left), one could go

    through clinical annotations to genetic dependencies from the Dependency

    Map project to identify potential drug targets or through pathway or process

    annotations in Reactome and IntAct, identify relevant ligand–receptor pairs

    using OmniPath, and use CROssBAR to perform drug discovery or repurposing

    for these receptors. Panels correspond to resources; although we work on most

    of the displayed resources, the figure is used for illustrative purposes and does

    not depict an existing pipeline.


    nature biotechnology

    Volume 41 | August 2023 | 1056–1059 | 1058

    Correspondence

    By providing access to a range of modular

    output adapters, we facilitate the project-

    specific benchmarking and selection of suit-

    able database management systems. For

    instance, a Neo4j adaptor provides rapid

    access to extensive databases for mainte-

    nance of knowledge and enables queries from

    analysis (Jupyter) notebooks. Switching to

    alternative graph or relational databases (for

    example, ArangoDB or PostgreSQL) allows

    task-specific performance optimization.

    A comma-separated values (CSV) writer and

    Python-native adapters (for example, Pandas,

    sparse matrix or NetworkX formats) yield

    knowledge representations that can directly

    be used programmatically by a wide range of

    machine learning frameworks. As a result of

    BioCypher’s modular nature, more output

    adapters can quickly be added.

    Application programming interfaces (APIs)

    built on top of the BioCypher KGs enable

    complex and versatile queries and simplify

    the interaction of users with the knowledge.

    For example, web widgets and apps (such as

    drug discovery and repositioning with https://

    crossbar.kansil.org and analysis workflows

    with https://drugst.one) allow researchers to

    browse and customize the database and to

    plug it into standard pipelines. Additionally, a

    structured, semantically enriched knowledge

    representation facilitates connection to and

    improves performance of modern natural lan-

    guage processing applications such as GPT12,

    which can be specifically tuned for biomedi-

    cal research13. The use of common standards

    enables sharing of tools across projects and

    communities or in cloud-based services

    that preserve sensitive patient data (Supple-

    mentary Note 3).

    There have been numerous attempts at

    standardizing KGs and making biomedi-

    cal data stores more interoperable. We can

    identify three general types of approaches,

    in increasing order of abstraction: centrally

    maintained databases, explicit standard

    formats (modeling languages) and KG frame-

    works. With BioCypher, we aim to improve

    user-friendliness on all three levels of abstrac-

    tion (see Supplementary Note 4). Despite

    many efforts, there is no widely accepted

    solution. Very often, resources take the ‘path

    of least resistance’ in adopting their own, arbi-

    trary formats of representation. To our knowl-

    edge, no framework provides easy access to

    state-of-the-art KGs to the average biomedi-

    cal researcher, a gap that BioCypher aims

    to fill. We demonstrate some key advantages

    of BioCypher by case studies in Supplemen-

    tary Note 5.

    We believe that creating a more interopera-

    ble biomedical research community is as much

    a social effort as it is a scientific software prob-

    lem. To facilitate adoption of any approach,

    the process must be made as simple as possi-

    ble, and it must yield tangible rewards, such as

    substantial savings in developer time. We will

    provide hands-on training for all interested

    researchers, and we invite all database and

    tool developers to join our collective effort.

    Sebastian Lobentanzer

