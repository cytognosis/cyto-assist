    \   \"name\": \"Reusability and accessibility. The sus-\",\n    \"text\": \"tainability of research software is strong-\\\
    nly related to adoption in \\u2014 and contribu-\\ntions from \\u2014 the community. BioCypher is\\ndeveloped as a TRUSTworthy\
    \ open-source\\nsoftware, applying methods of conti\\u00ad\\nnuous integration and deployment and\\nincluding a diverse\
    \ community of re-\\nsearchers and developers from the begin-\\nning. This facilitates workflows that are\\ntested end-to-end,\
    \ including the integrity\\nof the scientific data. We operate under\\nthe permissive MIT license and provide\\ncommunity\
    \ members with guidelines for\\ntheir contributions and a code of conduct\\n(https://github.com/biocypher).\\nDifferent\
    \ measures further increase the\\naccessibility and FAIRness of our framework.\\nFor example, we provide a template repository\\\
    nfor a BioCypher pipeline with adapters, includ-\\ning a Docker Compose setup. To enable learn-\\ning by example, we curate\
    \ existing pipelines,\\nas well as all adapters they use, in our GitHub\\norganization. Using the GitHub API and a\\nBioCypher\
    \ pipeline, we build a \\u2018meta-graph\\u2019\\nfor the simple browsing and analysis of BioCy-\\npher workflows (https://meta.biocypher.org).\\\
    nTo inform the contents of this meta-graph,\\nwe have reactivated and now maintain the\\nBiomedical Resource Ontology8,\
    \ which\\nhelps to categorize pipelines and adapters\\ninto research areas, data types and purposes\\n(Supplementary Note\
    \ 2).\\nBioCypher is implemented as a Python library\\nthat provides a low-code access point to data\\nprocessing and\
    \ ontology manipulation, empha-\\nsizing the reuse of existing resources to the high-\\nest extent possible. We have begun\
    \ to open the\\nplatform to other bioinformatics ecosystems,\\nstarting with R/Bioconductor (https://biocypher.\\norg/r-bioc.html).\
    \ By our design principles and\\nthe automation of data management tasks, we\\naim to free up developer time and guide\
    \ deci-\\nsion making on how to represent knowledge,\\nbridging the gap between the field of\\nbiomedical ontology and\
    \ the broad application\\nof databases in research.\\nBy abstracting the KG build process as a\\ncombination of modular\
    \ input adapters, we\\nsave developer time in the maintenance of\\nCheck for updates\\n\\nnature biotechnology\\nVolume\
    \ 41 | August 2023 | 1056\\u20131059 | 1057\\nCorrespondence\\nintegrative resources built from overlap-\\nping primary\
    \ sources (Fig. 1b): for instance,\\nOmniPath9, Bioteque2, CROssBAR DB10 and\\nthe Clinical Knowledge Graph11.\\nBy mapping\
    \ the contents of those resources\\nonto a common ontological space, we gain\\ninteroperability between the different\
