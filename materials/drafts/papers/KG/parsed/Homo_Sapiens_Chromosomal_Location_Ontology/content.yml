    \  },\n  {\n    \"name\": \"Results\",\n    \"text\": \"HSCLO effectively maps chromosomal locations across five genomic\
    \ resolution levels: whole chromosome, 1\\nMbp, 100 kbp, 10 kbp, and 1 kbp. Over 3.4 million nodes are interconnected\
    \ to enable detailed mapping and\\nquerying within the knowledge graph environment. The hierarchical relationships allow\
    \ seamless transitions\\nbetween different scales of genomic data, supporting complex queries such as those involving\
    \ 1 kbp nodes and\\ntheir positional relationships within larger chromosomal contexts (Table\\u00a01).\\nHSCLO38 defines\
    \ chromosomal locations within the GRCh38 release for chr 1\\u201322, X, Y, and mtDNA (Fig.\\u00a01).\\nIt provides hierarchical\
    \ relationships across five genomic resolution levels: whole chromosome, 1 megabase pair\\n(Mbp), 100 kilobase pairs (kbp),\
    \ 10 kbp, and 1 kbp. Each node within these class levels is interconnected to its\\nscale parent and the immediate neighbors\
    \ on either side to support mapping and association between genomic\\ndatasets and features. For example, the 1kbp element\
    \ HSCLO38:chr1.20517001\\u201320518000 is connected to its\\n\\u201cscale parent\\u201d at a lower resolution, HSCLO38:chr1.20510001\\\
    u201320520000 through the \\u201cbelow_1kbp_band\\u201d\\nrelationship as well as to its immediate neighbors: its 5\\\
    u2032 neighbor HSCLO38:chr1.20516001\\u201320517000 and 3\\u2032\\nneighbor HSCLO38:chr1.20518001\\u201320519000 through\
    \ \\u201cprecedes_1kbp_band\\u201d relationships. Using\\nhuman genome version GRCh38, the HSCLO38 schema results in 3,431,155\
    \ nodes and 6,862,195 relationships\\n(Table\\u00a01). Similarly, the summary statistics of GRCh37 are provided in Table\\\
    u00a02.\\nWe provide a use case for linking biodata at different resolutions to demonstrate the practical application\
    \ of\\nHSCLO38 in knowledge organization and discovery. A researcher may be interested in identifying genes found\\nFile\
