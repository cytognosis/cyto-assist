  sections: "[\n  {\n    \"name\": \"Introduction\",\n    \"text\": \"Knowledge graphs (KGs) have become important tools in\
    \ integrating and analyzing heterogeneous biomedi-\\ncal data, enabling the linkage of diverse datasets in a structured\
    \ and semantically enriched manner. However,\\nintegrating genomic feature data into KGs presents significant challenges\
    \ due to the need for precise alignment\\nacross varying chromosomal resolutions, from entire chromosomes to individual\
    \ base pairs. Current methods\\nfor identifying overlapping genomic features can involve computationally intensive searches,\
    \ particularly when\\napplied to large-scale biomedical knowledge graphs containing millions of data nodes. This highlights\
    \ the need\\nfor an ontological framework that could readily be integrated and utilized in knowledge graphs (in the form\
    \ of\\nsubject/predicate/object triples) that standardizes the representation of chromosomal locations and reduces\\ncomputational\
    \ complexity during data integration.\\nIn biomedical research, analyzing chromosomal locations of genomic features and\
    \ their positional relationships\\nis critical for understanding disease mechanisms, guiding therapeutic development,\
    \ and personalizing medical treat-\\nments. An ontology that systematically catalogs and categorizes chromosomal positions\
    \ is essential for supporting\\nthese research endeavors. For example, a researcher may wish to rapidly interrogate a\
    \ knowledge graph for all genomic\\nfeatures and annotations that are proximal to a chromosomal variant. Such a framework\
    \ would enable these queries\\nby linking variants to associated genes, regulatory elements, or chromatin interaction\
    \ data across different resolution\\nlevels, thereby expediting complex analyses and supporting hypothesis generation\
    \ and experimental validation.\\nExisting ontologies have contributed significantly to the standardization of genomic\
    \ data, particularly in\\nannotating specific genomic features or chromosomal structures1\\u20134. However, these ontologies\
    \ are not optimized\\nfor integrating positional information at multiple chromosomal resolutions within KGs, with a standing\
    \ gap in\\nthe ability to link genomic data across different resolution scales efficiently.\\n1The Department of Biomedical\
    \ and Health Informatics, The Children\\u2019s Hospital of Philadelphia, Philadelphia, PA,\\nUSA. 2Department of Biomedical\
    \ Informatics, School of Medicine, The University of Pittsburgh, Pittsburgh, PA, USA.\\n3Department of Pediatrics, University\
    \ of Pennsylvania Perelman Medical School, Philadelphia, PA, USA. \\u2709e-mail:\\ntaylordm@chop.edu\\nArticle\"\n  },\n\
    \  {\n    \"name\": \"OPEN\",\n    \"text\": \"2\\nScientific Data |           (2025) 12:52  | https://doi.org/10.1038/s41597-024-04358-x\\\
    nwww.nature.com/scientificdata\\nwww.nature.com/scientificdata/\\nTo address this gap, we introduce the Homo sapiens Chromosomal\
    \ Location Ontology (HSCLO), developed\\nfor the GRCh375 (HSCLO37)\\u00a0and GRCh386 \\u00a0(HSCLO38)\\u00a0genome assemblies\\\
    u00a0(Fig. 1). HSCLO is specifically\\ndesigned to facilitate the integration of positional information into biomedical\
    \ knowledge graphs, support-\\ning rapid querying and efficient data linkage across diverse experimental datasets. In\
    \ this study, we detail the\\nconstruction of HSCLO, present its application in a knowledge graph environment, and demonstrate\
    \ its utility\\nthrough a case study involving high-resolution chromatin interaction data integration.\\nThe HSCLO is\
    \ currently utilized in two knowledge graph projects, Petagraph7 and the Common Fund Data\\nEcosystem\\u2019s Data Distillery\
    \ Project8. In the Data Distillery project, HSCLO has been indispensable in integrating\\nCommon Fund genomic datasets\
    \ across different resolution levels, for example, in connecting 4DN chromo-\\nsomal loop data9 to individual genes or\
    \ variants from sources such as GTEx10 or Kids First11.\"\n  },\n  {\n    \"name\": \"Methods\",\n    \"text\": \"Building\
    \ HSCLO versions.\\nTo construct the HSCLO versions for GRCh37 and GRCh38, we downloaded\\neach genomic coordinate file\
    \ from the UCSC website (https://hgdownload.soe.ucsc.edu/goldenPath/hg19/bigZips/\\nhg19.chrom.sizes and https://hgdownload.soe.ucsc.edu/goldenPath/hg38/bigZips/hg38.chrom.sizes).\
    \ We parsed\\nthem into binned location nodes that were organized by chromosome size and scale using custom R scripts\
    \ (https://\\ngithub.com/TaylorResearchLab/HSCLO/blob/main/Codes/HSCLO38.R). The nodes were defined at five resolution\\\
    nlevels (1\\u2009kbp, 10\\u2009kbp, 100\\u2009kbp, 1\\u2009Mb, chromosome) and connected through hierarchical relationships\
    \ reflecting their\\nchromosomal positioning. Each level in the ontology was linked to both its parent level and neighboring\
    \ nodes\\nusing specific edge names (e.g., \\u201cabove_1Mbp_band,\\u201d \\u201cprecedes_10kbp_band\\u201d). Nodes were\
    \ named using\\na UCSC coordinate format-like structure12\\u00a0as for example HSCLO38:chrN:nnnn-nnnn. The preprocessing\
    \ scripts\\nare available on GitHub (https://github.com/TaylorResearchLab/HSCLO/blob/main/Codes/HSCLO38.R).\\nUse-case\
    \ methodology.\\nFor our use case, we show how we establish the intersection between the 4DN\\ndataset and Gencode to\
    \ profile the overlap between 4DN loops and human genes in GRCh38.\\u00a0Once ingested in a\\nknowledge graph in the Neo4j\
    \ database management environment (Neo4j Desktop Community Edition 1.5.7),\\nwe used the Cypher query language to query\
    \ ENSEMBL nodes\\u00a0in Gencode12 and their corresponding HSCLO\\nHuman\\nGenome\\nchr#\\nChr#:1-1000000\\nChr#:\\n1000001-2000000\\\
