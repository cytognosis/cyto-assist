    \    \"text\": \"11\\n7.7\\n\\u22124\\n\\u22121.1\\nTable 6.\\u2002 Using HSCLO38, we found 10 single cell types from\
    \ MSigDB c8 gene sets most associated with the\\nset of genes overlapping 4DN chromosomal loop 4DNFIIQP46FO.chr12.3050000\\\
