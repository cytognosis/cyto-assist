    nTable 3.\\u2002 List of the 4DN dot calls files\\u00a0used in the examples shown in Figs. 2 and 3, their descriptions\
    \ and\\ndownload URLs.\\n\\n6\\nScientific Data |           (2025) 12:52  | https://doi.org/10.1038/s41597-024-04358-x\\\
    nwww.nature.com/scientificdata\\nwww.nature.com/scientificdata/\\nwithin large-scale chromatin organization features,\
    \ such as Hi-C data hosted by the 4DN project9. We began\\nby importing HSCLO38 into Petagraph, our custom biomedical\
    \ KG7, and then creating edges in the KG to link\\nall gene nodes from GENCODE v4116 to their respective 1 kbp HSCLO38\
    \ nodes. We then created edges for\\nthe chromosomal loops from a set of files at the 4DN project9 to their respective\
    \ 1 kbp locations in HSCLO38.\\nUsing a Cypher query in the Neo4j v5 environment, we retrieved the overlap in 1 kbp nodes\
    \ between the spans\\nof the GENCODE gene definitions and the start and end points of the 4DN loops. Figure\\u00a02 depicts\
    \ the example\\nquery results outlined above. Figure\\u00a02A provides a sequence of HSCLO38 connecting the start and\
    \ end of a 4DN\\nloop upstream anchor. Figure\\u00a02B shows how HSCLO38 can extract the corresponding 1 kbp nodes, such\
    \ as for\\na human transcript location. Figure\\u00a03A illustrates the frequency distribution of human genes overlapping\
    \ the\\n4DN loops provided by the 4DN dot call dataset 4DNFIIQP46FO as a function of chromosome 1 coordinates\\nas an\
    \ example of how HSCLO38 could be utilized to bridge independent datasets in a knowledge graph context.\\nFigure\\u00a03\
    \ shows the distribution of 4DN loop sizes (Fig.\\u00a03B) and the number of GENCODE-defined genes over-\\nlapping the\
    \ 4DN dataset loops in 4DNFIIQP46FO (Fig.\\u00a03C,D, respectively). Further analysis of this data reveals\\n~36,000 loops\
    \ (from 4DNFIIQP46FO) that overlap at least one gene. To explore the biological relevance of this\\nanalysis, we performed\
    \ functional annotation of the gene list from the loop 4DNFIIQP46FO.chr12.3050000\\u2013\\n3060000.chr12.10310000\\u201310320000,\
    \ which was identified as having the highest number of overlapping genes\\n(173). The analysis provides the top 10 enriched\
    \ pathways (Table\\u00a04), top 10 DisGenNet diseases (Table\\u00a05), and\\ntop 10 MSigDB cell types (Table\\u00a06),\
    \ implying the disruption in the loop structure and, subsequently, the expres-\\nsion regulation of the overlapping genes\
    \ could be associated with developmental disorders primarily related to\\nmuscular development.\"\n  },\n  {\n    \"name\"\
    : \"Discussion\",\n    \"text\": \"The HSCLO is a structured ontological framework essential for organizing and categorizing\
    \ information on\\nthe precise physical positions of genes, genetic markers, and other genomic elements along chromosomes\
    \ in\\ntwo human genome versions (GRCh37 and GRCh38). This ontology establishes a standardized vocabulary and\\nhierarchical\
    \ structure for accurately describing chromosomal positions\\u00a0in knowledge graphs, ensuring uniform-\\nity in data\
    \ representation and sharing across diverse databases and research endeavors. Given the sizable and\\nheterogeneous character\
    \ of genomic data from multiple sources and studies, HSCLO functions as a unifying\\nframework to enable the integration\
    \ of datasets based on chromosomal coordinates.\\nHSCLO offers several advantages that enhance its utility for graphs\\\
    u00a0in biomedical research. The design spe-\\ncifically addresses the challenge of integrating genomic data across multiple\
    \ resolution levels within knowledge\\ngraphs, which supports accurate data alignment across scales, from entire chromosomes\
    \ to\\u00a01kbp segments. This\\nFig. 3\\u2002 Use case distributions.\\u00a0(A) Frequency distribution of genes overlapping\
    \ the 4DN-computed loops in the\\n4DN dot call dataset 4DNFIIQP46FO ingested in Petagraph plotted for human chromosome\
    \ 1 as a function\\nof loop midpoints. (B) Loop size distribution according to 4DNFIIQP46FO dataset (in base-pairs), (C)\
    \ gene\\ncount per loop distribution and (D) distribution of averaged gene count per 100\\u2009kbp of loop span derived\
    \ from\\nthe intersection of 4DN loops recorded in 4DNFIIQP46FO and GENCODE genes identified through their\\nconnection\
    \ to HSCLO38.\\n\\n7\\nScientific Data |           (2025) 12:52  | https://doi.org/10.1038/s41597-024-04358-x\\nwww.nature.com/scientificdata\\\
