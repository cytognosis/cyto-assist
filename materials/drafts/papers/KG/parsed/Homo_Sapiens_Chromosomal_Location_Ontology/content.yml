    \ the number of genes\\noverlapping the loop that are associated with the specified ontology term. Percent indicates the\
    \ percentage of\\nthe total genes that are associated with the ontology term (calculations include only genes with at\
    \ least only\\none ontology term annotation). Column log10(p) is the p-value expressed in base 10 logarithm, while log10(q)\\\
    ndenotes the Metascape provided multi-test corrected p-value.\\n\\n8\\nScientific Data |           (2025) 12:52  | https://doi.org/10.1038/s41597-024-04358-x\\\
    nwww.nature.com/scientificdata\\nwww.nature.com/scientificdata/\\ncapability is particularly valuable when integrating\\\
    u00a0large-scale studies where different datasets must be linked\\nat varying feature\\u00a0resolutions. HSCLO\\u2019s\
    \ hierarchical structure also enables rapid querying and efficient data\\nretrieval, which are essential for handling\
    \ the vast amounts of data typically involved in genomic studies.\\nDespite these strengths, HSCLO does have certain limitations.\
    \ The only currently available versions are based\\non GRCh37 and GRCh38 genome assemblies, which may limit its applicability\
    \ for other assemblies until an\\nupdate is made to accommodate additional reference genomes. Another limitation inherent\
    \ to large reference\\ndatasets in graphs is the computational demand associated with maintaining and querying the large\
    \ number of\\nnodes and relationships, especially at HSCLO\\u2019s finer resolution of 1 kbp. Large-scale analyses at\
    \ a finer resolu-\\ntion can be resource-intensive and may pose challenges for researchers working in environments with\
    \ limited\\ncomputational infrastructure.\\nAnother potential\\u00a0limitation of employing HSCLO is inherent to the complexity\
    \ involved in its implemen-\\ntation and use. While HSCLO is designed to facilitate data integration, the initial setup\
    \ process\\u00a0to annotate a\\nnew dataset\\u00a0\\u2014such as mapping and linking\\u00a0data coordinates to the ontology\\\
    u2014can require data preparation\\nand standardization efforts. To address these challenges, future developments will\
    \ focus on creating more\\nuser-friendly tools and documentation and releasing prepared datasets that simplify the process\
    \ of using HSCLO.\\nIn clinical and biomedical research contexts, understanding the chromosomal locations of genes associated\\\
    nwith diseases or genetic variants assumes critical importance. HSCLO38 and HSCLO37 facilitate the systematic\\ncataloging\
    \ and classification of such pertinent genetic information, thereby supporting investigations into dis-\\nease genetics\
    \ and personalized medicine applications. Furthermore, due to the reliance of computational tools\\nand algorithms on\
    \ structured data, HSCLO can be a foundational resource for developing robust computational\\nmethodologies for genomic\
    \ analysis and interpretation. Thus, HSCLO can play a pivotal role in harmoniz-\\ning, integrating, and standardizing\
    \ genomic data, enhancing data interoperability, fostering interdisciplinary\\nresearch collaborations, and catalyzing\
    \ advancements in computational tools essential for fundamental research\\nand applied biomedical applications.\\nHSCLO\
    \ stands out from earlier ontologies by focusing on ontologized genomic coordinate binning, facili-\\ntating integration\
    \ across various resolution levels in biomedical knowledge graphs. It addresses the challenge of\\nhandling genomic data\
    \ with differing experimental resolutions while ensuring compatibility with the GRCh38\\nand GRCh37\\u00a0genome assemblies.\
    \ HSCLO can be a valuable tool for researchers and data scientists aiming to\\nintegrate and analyze genomic data in large-scale\
    \ biomedical knowledge environments.\"\n  },\n  {\n    \"name\": \"Data availability\",\n    \"text\": \"Knowledge-graph-ready\
    \ edgelists (triple format) can be found on the HSCLO project page at the OSF website:\\nhttps://osf.io/pe8v7/, https://doi.org/10.17605/OSF.IO/PE8V7.\"\
