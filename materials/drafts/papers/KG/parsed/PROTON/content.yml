  abstract: 'Neurological diseases are the leading global cause of disability, yet most lack disease-modifying treat-

    ments. We present Proton, a heterogeneous graph transformer that generates testable hypotheses

    across molecular, organoid, and clinical systems. To evaluate Proton, we apply it to Parkinson’s dis-

    ease (PD), bipolar disorder (BD), and Alzheimer’s disease (AD). In PD, Proton linked genetic risk loci

    to genes essential for dopaminergic neuron survival and predicted pesticides toxic to patient-derived

    neurons, including the insecticide endosulfan, which ranked within the top 1.29% of predictions. In

    silico screens performed by Proton reproduced six genome-wide 𝜶-synuclein experiments, including

    a split-ubiquitin yeast two-hybrid system (normalized enrichment score [NES] = 2.30, FDR-adjusted

    1

    arXiv:2512.13724v1  [q-bio.QM]  13 Dec 2025


    𝒑< 1 × 10−4), an ascorbate peroxidase proximity labeling assay (NES = 2.16, FDR < 1 × 10−4),

    and a high-depth targeted exome sequencing study in 496 synucleinopathy patients (NES = 2.13,

    FDR < 1 × 10−4). In BD, Proton predicted calcitriol as a candidate drug that reversed proteomic

    alterations observed in cortical organoids derived from BD patients. In AD, we evaluated Proton

    predictions in health records from 𝒏= 610,524 patients at Mass General Brigham, confirming that five

    Proton-predicted drugs were associated with reduced seven-year dementia risk (minimum hazard

    ratio = 0.63, 95% CI: 0.53–0.75, 𝒑< 1 × 10−7). Proton generated neurological hypotheses that were

    evaluated across molecular, organoid, and clinical systems, defining a path for AI-driven discovery in

    neurological disease.

    Main

    Neurological diseases affect more than 3 billion people worldwide, cause over 11 million deaths

    each year, account for roughly one in three years lived with disability, and contribute to more

    than 400 million prevalent cases and tens of millions of new cases annually [1, 2]. Yet for most

    neurological diseases, there are no treatments that slow or halt disease progression [3]. AI holds

    promise to accelerate the development of new therapies [4], but AI predictions are rarely tested

    in disease-relevant systems that quantify their therapeutic potential. AI models are evaluated on

    computational benchmarks [5–9], an approach that measures internal model performance but does

    not test at scale whether AI predictions can translate into biological insight [10]. A challenge is

    how to develop disease-modifying treatments for neurological disease by effectively coupling AI

    with molecular, cellular, and clinical systems so that AI predictions can be prospectively generated

    and experimentally tested.

    Advances in experimental systems [11–14] now make it possible to evaluate AI predictions

    across the scales at which therapies must act [15, 16]. Single-nucleus and single-cell atlases map

    millions of neurons and glia in the adult human brain, providing cell-type context for neurological

    disease [17, 18]. Genome-wide perturbation screens and protein-protein interaction assays reveal

    molecular mechanisms [19, 20], while environmental toxicology [21], deep proteomics [22], and

    large clinical datasets [23–25] extend analyses from cellular to patient phenotypes. Each of these

    data scales captures a different dimension of brain disease biology, but these datasets are typically

    used in isolation. Graph-based AI models can reason over relations that link these dataset scales [26,

    27], but integration alone does not show whether AI predictions are biologically and clinically

    meaningful. The difficulty lies in the complexity of disease mechanisms [28, 29]: computational

    benchmarks based on retrospective label recovery can inflate performance through information

    leakage or task-specific artifacts [5, 30], and in brain disease, this limitation is pronounced because

    2


    mechanisms are distributed across genes, cells, and patient phenotypes [31, 32].

    To generate AI predictions that withstand validation across molecular, cellular, and clinical

    systems in neurology, we developed Proton, a pre-trained relational transformer for neurology

    (Figure 1). Proton is a 578-million-parameter relational transformer [33] trained on NeuroKG,

    a knowledge graph contextualized to the adult human brain. Transformers are model architectures

    that use self-attention and next token prediction objectives [34] and underpin many large-scale

    foundation models [5]. In biology, transformer models have been trained on genomic and protein

    sequences to learn representations that capture structure and function [35, 36], and on molecular

    structures to predict interactions [37]. Transformers trained on single-cell expression datasets learn

    latent states and cell-type programs [38], and transformers trained on longitudinal personal health

    data learn the natural history of human disease [39, 40]. Proton is a transformer architecture

    trained on a multimodal, multi-scale graph that links genes, proteins, cell types, brain regions, en-

    vironmental exposures, phenotypes, and drugs, and performs relational reasoning across biological

    levels in neurological disease.

    We used Proton to generate hypotheses and tested them for three neurological diseases:

    Parkinson’s disease (PD), bipolar disorder (BD), and Alzheimer’s disease (AD), each evaluated

    in an independent biological system (Figure 1a). In PD, Proton reproduced the findings of six

    genome-scale 𝛼-synuclein studies and linked genome-wide association loci to genes essential for

    dopaminergic neuron survival. After few-shot adaptation, Proton also prioritized pesticides toxic

    to patient-derived dopaminergic neurons. In BD, Proton nominated a compound that restored

    disrupted proteomic programs in cortical organoids from patients, producing effects distinct from

    and partly overlapping with lithium, the current frontline treatment for BD. In AD, Proton predicted

    drugs associated with reduced seven-year dementia risk in survival analyses on 610,524 patients.

    Proton generates hypotheses that we validated in molecular, organoid, and clinical systems,

    defining a path for AI-driven discovery in neurology.'
