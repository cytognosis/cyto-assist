    \ closely with controls than with untreated BD\\norganoids, indicating a substantial normalization of the BD proteome\
    \ following calcitriol treatment.\\nFurther analysis of these proteins highlighted key processes implicated in BD pathophysi-\\\
    nology: ribosomal function and mRNA processing [110\\u2013112], metabolic and protein homeostasis\\n(including fructose\
    \ and amino acid metabolism) [113], and synaptic adhesion and plasticity (Fig-\\nure 3h). Specifically, studies have shown\
    \ an association between BD and RNA alterations by\\nepitranscriptomic mechanisms [114], including RNA methylation, microRNAs\
    \ [115], and RNA\\nediting [112]. Among these RNA processes, the adenosine (A)-to-inosine (I) conversion is fre-\\nquently\
    \ studied; these conversions are mediated by ADARs (Adenosine Deaminase Acting on\\nRNA), which bind to double-stranded\
    \ RNA stem loops and modify A to I by deamination. It was\\npreviously shown that the RNA editome could be used to differentiate\
    \ BD from unipolar, strongly\\nimplicating ADAR dysregulation in BD [112]. Notably, calcitriol treatment reversed ADAR\
    \ over-\\nexpression in our cortical organoid model, suggesting a potential therapeutic role for vitamin D\\nsignaling\
    \ in modulating RNA editing in BD (Figure 3h). In addition, calcitriol treatment reversed\\nexpression of PDE6D, REV3L,\
    \ and thymosin \\ud835\\udefd4 proteins, whose corresponding genes have also\\nbeen shown to be dysregulated in genome-wide\
    \ expression studies of the postmortem bipolar brain\\n[116]. Lastly, we also conducted comparative proteomic analyses\
    \ of BD cortical organoids follow-\\ning treatment with calcitriol and lithium orotate (Figure 3i). Each drug affected\
    \ distinct clusters\\nof proteins, with only partial overlap between the two, suggesting that calcitriol and lithium act\\\
    nthrough substantially different mechanisms of action.\\nPROTON predicts drugs linked to lower Alzheimer\\u2019s dementia\
    \ risk\\nWe next sought to evaluate Proton-predicted drugs in real-world patient data. We applied Proton\\nto Alzheimer\\\
    u2019s disease and related dementias (ADRD) using retrospective analyses of longitudinal\\npersonal health data from 610,524\
    \ patients in the Mass General Brigham (MGB) healthcare system.\\nWe evaluated whether candidate drugs predicted by Proton\
    \ were associated with reduced ADRD\\n11\\n\\nrisk (Figure 4a). Candidate drugs were selected through a multi-stage filtering\
    \ process. First,\\nProton performed an in silico screen to rank all 8,160 drugs in NeuroKG by predicted likelihood\\\
    nfor ADRD. We then considered drugs with Proton-predicted ranks < 60 that were FDA approved\\nfor non-dementia indications\
    \ associated with specific ICD-10 diagnosis codes in the personal health\\ndata (Supplementary Table 4); this step excluded,\
    \ for example, antibiotics, sedatives, anticoagulants,\\nand analgesics. Indications for each drug were determined by\
    \ LLM query [117] and manual expert\\nreview. Finally, to ensure sufficient statistical power, we retained only those\
    \ drugs for which more\\nthan 1,000 patients at MGB received treatment, yielding \\ud835\\udc5b= 8 drugs predicted by\
    \ Proton.\\nFor each drug, we constructed a retrospective cohort of individuals aged \\u226550 years who\\nhad the relevant\
    \ primary disease indication, defined by the corresponding ICD-10 diagnosis code\\nin MGB\\u2019s electronic health record\
    \ (EHR) system. Patients prescribed the candidate drug formed\\nthe treatment group; the control group comprised patients\
    \ with the same indication who were\\nnot prescribed the candidate drug or any other drug ranked highly by Proton for\
    \ that indication.\\nWe used Cox proportional hazards models to estimate the association between drug exposure and\\nincident\
    \ dementia, comparing ADRD-free survival between treatment and control groups. Study\\nentry was the date of indication\
    \ diagnosis for controls and the first prescription date for treated\\npatients. Participants were followed until the\
    \ first dementia diagnosis (any of 22 ADRD-associated\\nICD-10 codes, which were curated by expert neurologists) or were\
    \ censored at death or at last\\nencounter within the MGB healthcare system. To address confounding by indication, we\
    \ used\\ninverse probability treatment weighting (IPTW) to balance treatment and control groups on age at\\nentry and\
    \ sex, and also included these covariates in the doubly robust Cox regression model.\\nFive of the eight evaluated drugs\
    \ were associated with a significantly reduced risk of ADRD\\n(Figure 4b-d). Total \\ud835\\udc5b= 610, 524 patients were\
    \ included in the analysis (Figure 4c). The strongest\\nprotective association was observed for aflibercept (indicated\
    \ for wet age-related macular degen-\\neration), which was linked to a 37% reduction in dementia risk (hazard ratio [HR]\
    \ = 0.63, 95%\\nCI [0.53 \\u22120.75], \\ud835\\udc5d-value = 1.1 \\u00d7 10\\u22127; Figure 4e). The SGLT-2 inhibitor\
    \ dapagliflozin (in-\\ndicated for type 2 diabetes) was also strongly associated with a lower risk (HR = 0.70, 95%\\nCI\
    \ [0.57 \\u22120.86], \\ud835\\udc5d= 7.9 \\u00d7 10\\u22124; Figure 4f).\\nAmong the antihypertensives, valsartan (HR\\\
    n= 0.83, 95% CI [0.79 \\u22120.88], \\ud835\\udc5d= 1.2 \\u00d7 10\\u221210; Figure 4g), spironolactone (HR = 0.89, 95%\
    \ CI\\n[0.84 \\u22120.95], \\ud835\\udc5d= 1.8 \\u00d7 10\\u22124), and metoprolol (HR = 0.96, 95% CI [0.93 \\u22120.99],\
    \ \\ud835\\udc5d= 0.004) all\\nshowed significant protective associations. The remaining three drugs (antihypertensive\
    \ ramipril\\nand cholesterol-lowering medications rosuvastatin and ezetimibe) did not significantly increase or\\ndecrease\
    \ ADRD risk.\\n12\"\n  },\n  {\n    \"name\": \"Discussion\",\n    \"text\": \"Neurological diseases are the leading cause\
    \ of disability and the second leading cause of death\\nworldwide, yet for most, there are no treatments that slow or\
    \ halt disease progression. We developed\\nProton, a graph AI model that generates hypotheses for neurological disease\
    \ by operating on\\nNeuroKG, a brain-centered multimodal knowledge graph contextualized with snRNA-seq of the\\nadult\
    \ human brain. We used Proton to generate predictions in Parkinson\\u2019s disease, bipolar disorder,\\nand Alzheimer\\\
    u2019s disease and related dementias, and tested these predictions in genome-scale\\nmolecular screens, patient-derived\
    \ organoids, and longitudinal electronic health record analyses.\\nWe paired Proton with experiments and clinical analyses\
    \ in PD, BD, and AD to test its\\npredictions in diverse systems. In PD, Proton linked genes essential for dopaminergic\
    \ neuron\\nsurvival to genome-wide association hits and produced ranked lists that were significantly enriched\\nfor hits\
    \ from six genome-scale \\ud835\\udefc-synuclein studies in in silico screens. It connected DA-essential\\ngenes to PD\
    \ GWAS loci more strongly than to GWAS hits from other diseases and highlighted\\nspecific genes that bridge common and\
    \ rare variant signals. After few-shot fine-tuning, Proton\\nalso prioritized pesticides toxic to patient-derived dopaminergic\
    \ neurons, including endosulfan,\\nranked in the top 1.29% of predictions. In BD, Proton predicted drug candidates that\
    \ could\\nreverse disease-associated molecular programs, and experiments in cortical organoids derived from\\npatients\
    \ showed that calcitriol partially restored the BD proteome. In AD, Proton predicted eight\\ndrugs associated with reduced\
    \ dementia risk, which we evaluated in EHR data from \\ud835\\udc5b= 610,524\\npatients; five drugs were linked to a lower\
    \ seven-year risk of dementia.\\nProton is applied to three neurological diseases, and extending it to the full spectrum\\\
    nof neurological conditions will require broader data coverage and additional validation. Many\\nconditions, particularly\
    \ rare and understudied diseases, are sparsely represented in datasets, which\\nlimits the scope of current predictions.\
    \ Despite efforts to harmonize biomedical data, NeuroKG\\nitself remains incomplete. Gaps may arise from publication bias,\
    \ underreporting of negative results,\\nor uneven research focus that inflates connectivity for well-studied genes or\
    \ diseases. Because\\nProton is trained on NeuroKG, such biases can propagate into its predictions. Transformer-based\\\
    nmodels on graphs, including Proton, can be sensitive to node degree and may assign higher\\nconfidence to well-connected\
    \ nodes [118\\u2013120]. We mitigated this effect by upweighting rare edge\\ntypes and optimizing across relation classes,\
    \ yet predictions may still favor high-degree nodes. In\\nbiomedical contexts where interpretability is essential, this\
    \ tendency can be useful, but the balance\\nbetween reliability and novelty remains unresolved.\\nAddressing these limitations\
    \ will require\\n13\\n\\ncontinually updated knowledge graphs that evolve with new neurological data, support ongoing\\\
    nmodel retraining, and enable Proton to generalize across a wider range of neurological diseases.\\nAI models trained\
    \ on biomedical data can generate hypotheses that are testable across molec-\\nular, cellular, and clinical systems. Our\
    \ results suggest that, in PD, BD, and AD, multimodal data\\nreconciled by AI can reveal how distinct biological factors\
    \ converge on disease mechanisms and\\nneuroprotective pathways. More broadly, Proton illustrates how AI can propose testable\
    \ hypothe-\\nses and candidate interventions in neurology, and points toward AI-experiment discovery loops that\\nconnect\
    \ molecular data, experimental systems, and patient outcomes in human brain disease.\\n14\"\n  },\n  {\n    \"name\":\
