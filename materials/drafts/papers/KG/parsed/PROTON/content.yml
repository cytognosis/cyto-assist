    2.2\nSelf-supervised pre-training\nPre-training was formulated as a binary link prediction task where, for a given edge\
    \ type \U0001D45F∈R and\nnodes \U0001D462, \U0001D463∈V, Proton learns to predict the existence or non-existence of the\
    \ relationship (\U0001D462, \U0001D45F, \U0001D463)\nin NeuroKG.\nNegative edge construction. For each positive (i.e.,\
