    nNeighborhood sampling. In message-passing neural networks with \\ud835\\udc3flayers, the embedding\\nof any node recursively\
    \ depends on its \\ud835\\udc3f-hop neighborhood. For an \\ud835\\udc3f-layer GNN with hidden state\\nsize \\ud835\\udc51trained\
    \ on a KG with |V| nodes, representing all hidden states requires O(\\ud835\\udc3f\\u00d7 \\ud835\\udc51\\u00d7 |V|) GPU\\\
    nmemory. As NeuroKG contains |V| = 147, 020 nodes, the full message-passing graph cannot be\\ntractably stored in memory\
    \ all at once.\\nInstead, mini-batch sampling [213] was employed, where for each step of gradient descent,\\n512 edges\
    \ were selected to comprise a batch. Then, messages were only passed among the \\ud835\\udc3f-hop\\nneighborhoods of the\
    \ head and tail nodes upon which the edges of the batch are incident (as well\\nas any negative edges constructed as described\
    \ above); this subgraph of NeuroKG is referred to as\\nthe message-flowing graph (MFG). Since Proton has three layers,\
    \ \\ud835\\udc3f= 3. Recall that NeuroKG\\nis undirected; therefore, an edge of type \\ud835\\udc5fbetween nodes \\ud835\\\
    udc62, \\ud835\\udc63\\u2208V is represented as both a forward\\nedge (\\ud835\\udc62, \\ud835\\udc5f, \\ud835\\udc63)\
    \ and a corresponding reverse edge (\\ud835\\udc63, \\ud835\\udc5f\\u22121, \\ud835\\udc62). To prevent information leakage,\
    \ for\\nany edge in the batch, its reverse edge was excluded from the MFG. This prevents Proton from\\nreceiving direct\
    \ information about the relationship it is trying to predict, prompting it to learn from\\nstructural patterns in the\
    \ graph rather than memorize direct connections.\\nDuring neighborhood construction, the size of the MFG grows exponentially\
    \ with \\ud835\\udc3f. There-\\n37\\n\\nfore, even for small \\ud835\\udc3f\\u2013 and especially in dense graphs, see\
    \ Supplementary Table 2 \\u2013 the MFG\\nmay quickly expand to encompass the entire graph, which is known as the \\u201cneighbor\
    \ explosion\\u201d\\nphenomenon [214, 215]. To solve this challenge, various neighborhood sampling algorithms have\\nbeen\
    \ proposed to stochastically subsample the MFG [216\\u2013219]. Motivated by this prior work,\\nwe designed a heterogeneous\
    \ neighborhood sampling algorithm that, at each layer of the MFG,\\nsamples nodes from the frontier until a fixed budget\
    \ is reached per node type. To upsample rare\\nnode types, nodes are sampled proportional to the square root of their\
    \ relative prevalence in the\\nMFG. An implementation of this heterogeneous neighborhood sampling algorithm was made pub-\\\
    nlicly available as a contribution to the Deep Graph Library, a Python package for deep learning on\\ngraphs (see pull\
    \ request #6668 in the dmlc/dgl repository on GitHub).\\nModel instantiation. Embeddings of all nodes \\ud835\\udc62\\\
    u2208V were initialized with random values\\nx0\\n\\ud835\\udc62\\u2208R\\ud835\\udc510 drawn from the Gaussian distribution\
    \ N (0, 1) and biases were zeroed. Following Glorot\\ninitialization [220], learnable relation and attention weights w\
    \ were sampled from the Xavier\\nUniform distribution. That is, w \\u223cUniform(\\u2212\\ud835\\udc5e, \\ud835\\udc5e)\
    \ where:\\n\\ud835\\udc5e= \\ud835\\udefe\\u00d7\\n\\u221a\\ufe04\\n6\\n|input| + |output|\\nHere, |input| is the number\
    \ of input neurons in a given layer, |output| is the number of output\\nneurons, and \\ud835\\udefeis a gain factor. Since\
    \ the Leaky ReLU activation function was used, \\ud835\\udefewas defined\\nas:\\n\\ud835\\udefe=\\n\\u221a\\ufe02\\n2\\\
    n1 + \\ud835\\udc4e2\\nwhere \\ud835\\udc4e= 0.01, the same small positive constant used for the activation function.\
    \ This gain factor\\nis used to scale the weights appropriately so that activations maintain a stable variance as they\\\
    npropagate through the network, preventing vanishing or exploding gradients.\\nModel pre-training.\\nProton was constructed\
    \ and trained on NeuroKG using the PyTorch\\n(version 2.3.0) [221], PyTorch Lightning (version 2.5.6), and Deep Graph\
    \ Library (version 2.2.1)\\nsoftware packages [222]. To measure pre-training performance, the NeuroKG training data was\\\
    nrandomly partitioned into training (80%), validation (15%), and test (5%) sets. Importantly, to\\nprevent information\
    \ leakage, corresponding forward and reverse edges were assigned to the same\\ndata partition.\\nDuring pre-training,\
    \ message passing was only permitted over training edges;\\nduring validation, message passing was permitted over both\
    \ training and validation edges; and\\n38\\n\\nduring evaluation on the independent test set, message passing was performed\
    \ over all edges.\\nHyperparameter optimization. Hyperparameters were selected via a Bayesian hyperparameter\\noptimization\
    \ search using the Weights & Biases [223] experiment tracking platform (Supplementary\\nFigure 7). The search aimed to\
    \ maximize the area under the receiver operating characteristic\\ncurve (AUROC) measured on the validation set. Hyperparameter\
    \ values were sampled as follows:\\nembedding size \\ud835\\udc510 \\u2208{512, 1024, 2048}; hidden dimension of the first\
    \ HGT convolutional layer \\ud835\\udc511 \\u2208\\n{256, 512, 1024}; output dimensionality \\u2208{64, 128, 256}; number\
    \ of attention heads \\u210e\\u2208{2, 4};\\ndropout probability \\u223cUniform(0.2, 0.5); learning rate \\ud835\\udf00\\\
    u223cLogUniform(1 \\u00d7 10\\u22122, 1 \\u00d7 10\\u22125); and\\nweight decay \\u223cLogUniform(1 \\u00d7 10\\u22123,\
    \ 1 \\u00d7 10\\u22126) (Supplementary Figure 7d). Note that when\\nsampling from a log-uniform distribution, the natural\
    \ logarithm of the sampled values follows a\\nuniform distribution within the specified range. For all trials, the Adam\
    \ optimization algorithm\\nwas used [224]. During the first 10 epochs, the learning rate was linearly decayed with each\
    \ epoch\\nby a factor of 1\\n3. Unless otherwise stated, a random seed of 42 was used for training and evaluation\\nacross\
    \ all trials, including the final models.\\nModel performance was evaluated at both aggregate and edge-type-specific levels\
    \ across the\\ntraining, validation, and test sets. Accuracy, AUROC, average precision, F1 score, and loss were\\nmeasured.\
    \ A total of 55 hyperparameter tuning trials were completed; for each trial, a model\\nwas trained for up to the earlier\
    \ of 48 hours or three epochs. Each trial was assigned a unique\\nalphanumeric ID. Performance on the validation set was\
    \ assessed every quarter training epoch. An\\nearly stopping criteria was implemented based on maximum validation AUROC\
    \ with a patience of\\nfour validation checks. Therefore, for any given trial, if validation performance did not improve\\\
    nover a full pass over NeuroKG (including all positive edges and all negatively sampled edges), then\\npre-training was\
    \ halted for that trial. The parameter counts of trained models ranged from less than\\n100 million to over 2 billion\
    \ parameters.\\nThe importance of each parameter with respect to the optimization objective was evaluated\\nby training\
    \ a random forest model to predict the validation AUROC from hyperparameter con-\\nfigurations across all 55 trials (Supplementary\
    \ Figure 7e). The feature importance of the trained\\nrandom forest model was considered as a measure of hyperparameter\
    \ importance. In addition,\\nthe linear correlation between each hyperparameter and validation AUROC was also calculated\\\
    n(Supplementary Figure 7e). After the completion of all trials, the best-performing hyperparameter\\nconfiguration was\
    \ selected based on link prediction AUROC measured on the independent test set.\\nThis configuration was then used to\
    \ train the final version of Proton on the entire NeuroKG graph.\\nAs additional trials were instantiated, the optimization\
    \ strategy improved model performance,\\n39\\n\\nas assessed by both validation accuracy and AUROC. For the best-performing\
    \ trials, the training\\nand validation AUROC and accuracy consistently increased over training, while the loss decreased\\\
    n(Supplementary Figures 7b and 7c). Performance metrics are reported in Supplementary Table 5.\\nMost trials achieved\
    \ strong performance, with AUROC on the independent test set exceeding 0.90\\nand accuracy exceeding 82%. The sampled\
    \ hyperparameter configurations across all 55 trials are\\nshown in Supplementary Figure 7d, while the importance of each\
    \ hyperparameter with respect to\\ntest AUROC, as well as correlation with test AUROC, is shown in Supplementary Figure\
    \ 7e.\\nThe final model architecture was selected based on performance on the independent test\\nset. We sought to identify\
    \ a hyperparameter configuration that performed well across all edge\\ntypes rather than only the most prevalent.\\nNote\
    \ that the average test AUROC can be biased\\nby prevalent edge types in NeuroKG. Therefore, model performance was evaluated\
    \ at an edge-\\ntype-specific level; that is, for each edge type, all 55 trials were ranked based on test AUROC.\\nThen,\
    \ the top 3 trials per edge type with the highest performance were identified. Trials were\\nranked based on the number\
    \ of edge types for which they achieve within the top 3 test AUROC\\nperformance (Supplementary Figure 7a). This metric,\
    \ which is unbiased by edge type prevalence,\\nclosely correlates with average test AUROC, with a Spearman\\u2019s rank\
    \ correlation coefficient of\\n\\ud835\\udf0c= 0.9057. The best performing trial was hvkp2hjs, with 578 million parameters\
    \ and the\\nfollowing hyperparameter configuration: embedding size \\ud835\\udc510 = 1024, hidden dimension \\ud835\\\
    udc511 = 256,\\noutput dimension = 128, number of attention heads \\u210e= 4, dropout probability = 0.4547, learning\\\
    nrate \\ud835\\udf00= 2.00\\u00d710\\u22124, and weight decay = 5.80\\u00d710\\u22125. On the independent test set, trial\
    \ hvkp2hjs\\nreached 0.9145 AUROC, 82.23% accuracy, 0.9085 precision, and 0.8223 F1 score (Supplementary\\nTable 5). This\
    \ hyperparameter configuration was adopted as the final Proton model and re-trained\\non the full KG.\\nEmbedding generation.\
    \ Finally, we computed and analyzed the learned embedding space of\\nProton (Supplementary Note 1). For each node \\ud835\\\
    udc62\\u2208V, the final representation x\\ud835\\udc3f\\n\\ud835\\udc62produced\\nby message passing over the neighborhood\
    \ N\\ud835\\udc62using the three-layer HGT architecture (without\\nthe bilinear decoder) was extracted and considered\
    \ as the embedding for that node. Embeddings\\nwere generated via message passing over the entire graph using a deterministic\
    \ \\ud835\\udc3f-hop sampler\\nfrom ShaDow-GNN [225]. To mitigate the \\u201cneighbor explosion\\u201d phenomenon, nodes\
    \ with degrees\\ngreater than 4,000 were excluded. Of the 147,020 nodes in the KG, only 289 nodes (0.1966%) were\\nexcluded\
    \ at inference time, including 1 gene/protein node, 7 disease nodes, 1 molecular function\\nnode, 4 cellular component\
    \ nodes, and 276 anatomy nodes.\\nHardware. Models were predominantly trained on NVIDIA H100 HBM3 chips with 100 gigabytes\\\
    n40\\n\\n(GB) CPU RAM and 80 GB GPU RAM within the AI Cluster at the Kempner Institute for the\\nStudy of Natural and\
    \ Artificial Intelligence at Harvard University. In addition, NVIDIA A100\\nSXM4 chips with 40 GB GPU RAM within the Kempner\
    \ AI Cluster were used, as well as NVIDIA\\nQuadro RTX 8000 chips with 48 GB GPU RAM within the O2 high-performance computing\
    \ (HPC)\\nenvironment at Harvard Medical School. CPU-intensive computation \\u2013 for example, for inference\\nor embedding\
    \ generation \\u2013 was also performed on the O2 HPC cluster, including on high memory\\nnodes with up to 750 GB RAM\
    \ to support message passing over the KG.\\n3\\nExperimental studies for PROTON evaluation\\nNext, we describe the experimental\
    \ studies conducted to generate independent datasets for model\\nevaluation. Note, Proton makes predictions on nodes in\
    \ NeuroKG; therefore, it was necessary to\\nmap biomedical entities in the evaluation datasets to corresponding NeuroKG\
    \ nodes.\\n3.1\\n\\ud835\\udf36-synuclein-associated screens\\nWe considered six \\ud835\\udefc-synuclein-associated experimental\
    \ screens, including \\ud835\\udefc-synuclein interactome\\nprofiling screens and \\ud835\\udefc-synuclein genetic screens\
    \ in humans or disease models. Top hits from these\\nscreens were reviewed and curated by PD experts.\\nMYTH system interactome.\
    \ 260 proteins from a split-ubiquitin protein complementation assay\\nusing a membrane-based yeast two-hybrid (MYTH) system\
    \ to detect \\ud835\\udefc-synuclein interactions at\\nthe membrane [226, 227]. 249 proteins (95.76%) were represented\
    \ in NeuroKG.\\nAPEX2 proximity labeling. 212 proteins from an \\ud835\\udefc-synuclein proximity-dependent biotiny-\\\
    nlation labeling assay using an engineered ascorbate peroxidase (APEX2) to capture proteins that\\nare spatially co-localized\
    \ with \\ud835\\udefc-synuclein in PD primary neurons [226]. Proximity-dependent\\nbiotinylation has an effective radius\
    \ of approximately 10 nm around the \\ud835\\udefc-synuclein bait protein\\n[228]; therefore, this method identifies direct\
    \ binding interactors of \\ud835\\udefc-synuclein as well as indirect\\ninteractors in the intracellular neighborhood\
    \ [229]. 200 proteins (94.34%) were represented in\\nNeuroKG.\\nSILAC immunoprecipitation mass spectrometry. 50 \\ud835\\\
    udefc-synuclein interactors were identi-\\nfied using stable isotope labeling by amino acids in cell culture (SILAC) [230].\
    \ HEK 293 cells\\nstably expressing GFP or \\ud835\\udefc-synuclein-GFP were metabolically labeled, lysed, and subjected\
    \ to\\n41\\n\\nco-immunoprecipitation using anti-GFP antibodies. Immunoprecipitated proteins were digested\\nwith trypsin\
    \ and analyzed via liquid chromatography-mass spectrometry. 45 proteins (90%) were\\nrepresented in NeuroKG.\\nTargeted\
    \ deep exome sequencing. 27 gene hits from a targeted exome screen to identify\\ngenetic variants that contribute to synucleinopathy\
    \ risk [69]. Human homologs of 430 genetic\\noverexpression modifiers of \\ud835\\udefc-synuclein and \\ud835\\udefd-amyloid\
    \ cytotoxicity in yeast (see below) as well as\\nknown PD, AD, and ataxia risk genes were sequenced in \\ud835\\udc5b=\
    \ 496 patients with synucleinopathies\\n(i.e., PD, Lewy body dementia, and multiple system atrophy) at high depth (100x).\
    \ 25 proteins\\n(92.59%) were represented in NeuroKG.\\nProteotoxicity genetic modifiers (yeast::human transposition).\
    \ A network of 437 genes\\nlinked to \\ud835\\udefc-synuclein proteotoxicity. 318 modifiers of \\ud835\\udefc-synuclein\
    \ toxicity were identified through\\ngenome-wide screens of approximately 10,000 genetic interactions in yeast, including\
    \ a deletion\\nscreen for nonessential genes that increase sensitivity to low levels of \\ud835\\udefc-synuclein and a\
    \ galactose-\\ninducible overexpression screen in yeast HiTox strains with over six copies of \\ud835\\udefc-synuclein\
    \ [231].\\nThese 318 modifiers were combined with an additional 14 modifiers derived from separate exper-\\niments in\
    \ yeast and PD patient-derived neurons [19, 232, 233]. The total 332 genetic modifiers\\nof \\ud835\\udefc-synuclein toxicity\
    \ were mapped to human counterparts using the TransposeNet algorithm\\nthat considers sequence homology, structural similarity,\
    \ and overlap in the interactome. Finally,\\nin addition to the experimentally validated interactors, candidate modifiers\
    \ predicted by the prize-\\ncollecting Steiner forest algorithm were also included. 413 genes (94.51%) were represented\
    \ in\\nNeuroKG.\\nModifier gene overexpression (yeast::human transposition).\\nHits overexpressed in\\ngenome-wide array\
    \ screens in yeast to identify enhancement or suppression of \\ud835\\udefc-synuclein neuro-\\ntoxicity [231]. Modifiers\
    \ of \\ud835\\udefc-synuclein toxicity (see above) were humanized using TransposeNet\\nand expanded with the prize-collecting\
    \ Steiner forest algorithm to yield 245 hits, all of which were\\nrepresented in NeuroKG.\\nRandom genes. For reference,\
    \ we also included a set of 500 genes randomly sampled from the\\n35,198 genes in NeuroKG, excluding those already connected\
    \ to PD or \\ud835\\udefc-synuclein in NeuroKG.\\n42\\n\\n3.2\\nEssentiality screen in patient-derived dopaminergic neurons\\\
    nA guide RNA (gRNA) library of 19,993 genes was transduced into H9 human embryonic stem\\ncells, which were then differentiated\
    \ into midbrain dopaminergic neurons. During the differentiation\\nprocess, expression of the Cas9 protein was induced\
    \ via doxycycline addition, thereby knocking\\nout constituent genes of the gRNA library in the pre-dopaminergic neural\
    \ progenitors (Figure 2e).\\nWhole-genome sequencing was performed on samples from differentiated neurons at days 26 and\\\
    n42. gRNA representation was used to identify genes essential for neuronal survival with FDR-\\nadjusted \\ud835\\udc5d-value\
    \ < 0.05 and \\ud835\\udefd< \\u22120.58. After removing broadly essential genes not specific to\\ndopaminergic neurons\
    \ [234], 693 dopaminergic essentiality genes remained; of these, 681 were\\nrepresented in NeuroKG.\\n3.3\\nPesticide-wide\
    \ association study in PD\\nTo evaluate Proton\\u2019s ability to predict neurotoxicity, we used data from a pesticide-wide\
    \ association\\nstudy (PWAS) [21] conducted on PD patients (\\ud835\\udc5b= 829) and controls (\\ud835\\udc5b= 824) in\
    \ the Parkinson\\u2019s\\nEnvironment and Genes study [81]. This work identified 68 pesticides associated with PD, which\
    \ we\\nrefer to as \\u201cPWAS hits.\\u201d This study also tested the toxicity of \\u201cPWAS hits\\u201d in iPSC-derived\
    \ midbrain\\ndopaminergic neurons from a PD patient overexpressing wild-type \\ud835\\udefc-synuclein, identifying ten\\\
    npesticides that led to cell death > 3 standard deviations above the DMSO control mean at a\\nconcentration of 30 \\ud835\\\
    udf07M. We mapped all 68 pesticides back to one of the 860 pesticide or exposure\\nnodes in NeuroKG. To do so, we applied\
    \ a fuzzy string matching algorithm based on Levenshtein\\ntext edit distance on pesticide names, with a score cutoff\
    \ of 80. The 68 PWAS hits were mapped to\\n41 matches in NeuroKG composed of 33 unique nodes, and the 10 PWAS hits toxic\
    \ to dopaminergic\\nneurons were mapped to 6 matches in NeuroKG with 5 unique nodes. One pesticide, trifluralin, was\\\
    nexcluded to minimize data leakage as it was already connected to PD in the NeuroKG pre-training\\ndata, leaving 32 pesticides\
    \ overall and 4 pesticides toxic to dopaminergic neurons.\\n3.4\\nProteomic profiling of drug-treated human brain organoids\\\
    n3.4.1\\niPSC culture\\nGeneration and validation of the BD and control induced pluripotent stem cell (iPSC) lines was\\\
    npreviously published [104] (Supplementary Table 3). The iPSC lines underwent stringent quality\\n43\\n\\ncontrol to confirm\
    \ pluripotency and a normal karyotype. This included alkaline phosphatase assay,\\nkaryotype analysis, and differentiation\
    \ into the three germ layers. They were cultured feeder-free\\non Geltrex LDEV-Free Reduced Growth Factor Basement Membrane\
    \ Matrix (Gibco) coated plates\\nin mTeSRTM Plus Basal Media (Stem Cell Technologies). Extended culturing and maintenance\\\
    nprotocols are available at http://doi.org/10.17504/protocols.io.261ge8b9jg47/v2.\\n3.4.2\\nGeneration of cerebral organoids\
    \ and drug treatment\\nCerebral organoids were differentiated using an approach adapted from a previously described\\\
    nprotocol with modifications [235]. Briefly, 9,000 hiPSCs were seeded into each well of a Corning\\u00ae\\n96-well clear\
    \ round-bottom ultra-low attachment microplate (Corning #7007) to form embryoid\\nbodies (EBs) in the presence of 50 \\\
    u00b5M ROCK inhibitor (Sigma #Y-27632). When EBs reached\\n600 \\u00b5m in diameter, media was replaced with neural induction\
    \ media for four days before embedding\\nthe EBs in Matrigel (Corning #354234). Embedded EBs were grown in ultra-low attachment\
    \ plates\\nin differentiation media without vitamin A for five days without shaking. Differentiation media\\ncontaining\
    \ vitamin A was used for long-term maintenance with shaking on an orbital shaker at\\n90 rpm. Media was changed every\
    \ 2\\u20133 days.\\nSince in vitro cultured cells lack the enzymes needed to metabolize precursor forms of vitamin\\nD,\
    \ we selected the physiologically active hormone calcitriol for treatment of both BD and control\\ncortical organoids.\
    \ Cortical organoids derived from \\ud835\\udc5b= 5 patient and \\ud835\\udc5b= 4 control iPSC lines\\nwere treated with\
    \ 5 nM calcitriol, a concentration significantly lower than those reported in other\\nin vitro protocols [236, 237] to\
    \ ensure sufficient biological activity during prolonged treatment.\\nHowever, the concentration is higher than physiological\
    \ calcitriol levels in CSF, which range from\\napproximately 0.005 nM to 0.094 nM [238]. Organoids were treated with calcitriol\
    \ starting on\\nday 46. The drug was replenished every two days. After one week of treatment, three organoids\\nper each\
    \ iPSC line were pooled, washed, flash-frozen in liquid nitrogen, and processed for deep\\nproteomic profiling. The extended\
    \ protocol is available at http://doi.org/10.17504/protocols.io.\\nkxygx4mb4l8j/v3.\\n3.4.3\\nTissue preparation and mass\
    \ spectrometry analysis\\nOrganoid brain tissue was stored at \\u221280 \\u25e6C in 2 mL Eppendorf tubes.\\nProtein extraction\
    \ protocol. Samples were kept on dry ice, and the frozen brain tissue was\\n44\\n\\nground in the tube using a pestle.\
    \ 130 \\u00b5L of 5 % SDS was added to the ground tissue. Samples were\\ncentrifuged at 15.000 g for 5 min using an Eppendorf\
    \ Centrifuge 5420. The supernatant (100 \\u00b5L)\\nwas transferred to new 2 mL Eppendorf tubes, while the remaining 30\
    \ \\u00b5L was stored at \\u221280 \\u25e6C for\\nfuture work.\\nReduction, alkylation, and acidification. 8.7 \\u00b5L\
    \ of 10 mM TCEP was added to each sample.\\nSamples were then shaken and mixed for 30 min at 350 rpm on an Eppendorf ThermoMixer\
    \ C.\\nSubsequently, 8.7 \\u00b5L of 10 mM IAA was added to the reduced samples, which were shaken and\\nmixed for an\
    \ additional 10 min at 350 rpm. Then, 21.7 \\u00b5L of 12.5 % phosphoric acid was added.\\nTrapping and cleaning proteins.\
    \ 1522 \\u00b5L of binding and wash buffer (100 mM TEAB in\\n90 % methanol) was added to the sample and immediately vortexed;\
    \ the sample visually appeared\\nas a milky colloidal suspension. The suspension was transferred to an ProtiFi S-TrapTM\
    \ mini spin\\ncolumn and centrifuged at 4000 g for 30 s (Eppendorf Centrifuge 5420), and the flow-through was\\ndiscarded.\
    \ Proteins were washed on the S-Trap mini spin column with 1522 \\u00b5L binding and wash\\nbuffer, followed by centrifugation\
    \ at 4000 g for 30 s. This wash step was repeated three times, and\\neach flow-through was discarded. Triple washing at\
    \ this step is critical to ensure SDS removal from\\nthe protein sample.\\nDigestion.\\nA stock solution of Trypsin Platinum,\
    \ Mass Spectrometry Grade (Promega) was\\nprepared at 100 \\u00b5g mL\\u22121 in 50 mM TEAB. Stock trypsin was added to\
    \ each S-Trap Mini column at\\na 1:50 (trypsin:protein) ratio. Samples were incubated for 2 h at 50 \\u25e6C with shaking\
    \ and mixing at\\n350 rpm on an Eppendorf ThermoMixer C.\\nPeptide elution. Elution 1: After digestion was completed,\
    \ 80 \\u00b5L of 50 mM TEAB in water (pH\\n8.5) was added to each S-Trap mini spin column and centrifuged at 4000 g for\
    \ 1 min; the peptide-\\ncontaining flow-through was collected. Elution 2: 80 \\u00b5L of 0.2 % formic acid was added directly\\\
    nto each spin column and centrifuged at 4000 g for 1 min; the flow-through was collected. Elution 3:\\n80 \\u00b5L of\
    \ 50 % acetonitrile in water was added directly to each spin column and centrifuged at 4000 g\\nfor 1 min; the flow-through\
    \ was collected. For each sample, the three eluates were combined. All\\nsamples were dried using an Eppendorf Vacufuge\
    \ Plus and resuspended in 6 \\u00b5L of 0.1 % formic\\nacid in ultrapure HPLC-grade water before LC-MS/MS injection.\\\
    nMass spectrometry.\\nAfter separation, each fraction was subjected to a single LC-MS/MS\\nexperiment on an Orbitrap Astral\
    \ Mass Spectrometer (Thermo Scientific) equipped with a NEO\\n(Thermo Scientific) nanoHPLC pump. Peptides were separated\
    \ on a 300 \\u00b5m \\u00d7 5 mm PepMap C18\\n45\\n\\ntrapping column (Thermo Scientific, Lithuania) followed by a PepSep\
    \ 75 \\u00b5m \\u00d7 150 mm analytical\\ncolumn (Bruker, USA). Separation was achieved by applying a gradient of 5\\\
    u201325% acetonitrile in\\n0.1 % formic acid over 45 min at 250 nL min\\u22121.\\nElectrospray ionization was enabled\
    \ by applying 1.8 kV using a PepSep electrode junction\\nat the end of the analytical column, spraying from a stainless\
    \ steel PepSep emitter SS 30 \\u00b5m LJ\\n(Odense, Denmark). The Exploris Orbitrap was operated in data-dependent mode.\
    \ The survey\\nscan was performed in the Orbitrap across an 400 m/z to 900 m/z range at a resolution of 1.2 \\u00d7\\\
    n105, followed by selection of DIA 2 Da windows in the TOF section of the Orbitrap for MS2 spectra\\ncollection. The fragment\
    \ ion isolation width was 2 m/z, AGC was 250 %, maximum ion time was\\n5 ms, and normalized collision energy was 25 V.\\\
    nMass spectrometry data analysis.\\nRaw data were analyzed using Proteome Discoverer\\n3.2.023 (Thermo Scientific) with\
    \ CHIMERYS\\u2122and PEAKS Studio 12.5 (Toronto, Canada). As-\\nsignment of MS/MS spectra was performed by searching against\
    \ a protein sequence database\\nincluding all entries from the Human UniProt database (SwissProt, 19,768 entries, 2019)\
    \ and other\\nknown contaminants, such as human keratins and common laboratory contaminants. Database\\nsearches used\
    \ a 10 ppm precursor ion tolerance and required peptide N and C termini to adhere\\nto trypsin protease specificity, allowing\
    \ up to two missed cleavages. Carbamidomethylation of\\ncysteine amino acids (+57.021464 Da) was set as a static modification,\
    \ and methionine oxidation\\n(+15.99492 Da) as a variable modification. A 1% false discovery rate (FDR) at the protein\
    \ level\\nwas achieved via a target-decoy database search. Filtering was performed using Percolator (64-bit\\nversion)\
    \ [239].\\nQuantitative proteomics data were pre-processed in Python using the Wyss Analysis Software\\nfor Proteomics\
    \ (WASP) Version 3. Briefly, peptide-level abundances were filtered for intragroup\\ncompleteness, normalized by Trimmed\
    \ Mean of M-values (TMM), imputed by left-tail sampling,\\nre-filtered by peptide intensity and intragroup CV, and aggregated\
    \ to the protein level by the mean\\nof the top three most intense peptides. The differential expression analysis was\
    \ done in R using the\\nlimma package (version 3.64.1).\\n4\\nPROTON evaluation protocols\\nThe experimental results described\
    \ in Section 3 serve as ground truth data for assessing Proton\\u2019s\\nperformance. In Section 4, we detail the protocols\
    \ developed to use these and other datasets for\\n46\\n\\nmodel evaluation.\\n4.1\\nFine-tuning PROTON for PD pesticide\
    \ prediction\\nA fine-tuning task was implemented to predict which pesticides described in Section 3.3 were\\nPWAS hits.\\\
    nTo avoid overfitting on the small number of labeled observations, we performed\\nprincipal component analysis on Proton\
    \ embeddings for all pesticide nodes in NeuroKG. The top\\nsix components were used as input features for a classifier\
    \ consisting of a two-layer feed-forward\\nneural network with a ReLU activation and a final sigmoid output. The model\
    \ was trained to predict\\nthe binary label of PWAS association using a binary cross-entropy loss function. The network\
    \ was\\nfine-tuned for 400 epochs with a batch size of 8 using the Adam optimizer with a learning rate of\\n1 \\u00d7\
    \ 10\\u22123.\\n4.2\\nConstructing disease-centric data splits\\nTo construct the disease-centric data splits, for each\
    \ disease in the evaluation set, we removed all\\ndrug-disease edges involving that disease from NeuroKG before training.\
    \ However, immediate\\nneighborhood edge deletion may not be sufficient to prevent data leakage. For example, in the\\\
    ncase of PD, even if direct drug\\u2013PD edges are removed, Proton could still access edges linked\\nto closely related\
    \ conditions such as postencephalitic Parkinsonism, juvenile-onset Parkinson\\u2019s, or\\nParkinsonian-pyramidal syndrome,\
    \ which may share treatment strategies. Therefore, we aimed to\\nremove drug-related information not only for each of\
    \ the 17 evaluation diseases but also for related\\ndiseases that could leak indirect information into the training process.\
    \ However, defining disease\\nsimilarity is inherently challenging as diseases can be related along many biological, clinical,\\\
    nand semantic dimensions. To address this, we designed a two-stage approach (Supplementary\\nFigure 8b). In the first\
    \ stage, all 377,400 possible non-self disease-disease pairs (i.e., \\ud835\\udc37\\u00d7 \\ud835\\udc51\\u2212\\ud835\\\
    udc51,\\nwhere \\ud835\\udc37= 22,201 diseases in NeuroKG and \\ud835\\udc51= 17 evaluation diseases) were assessed using\\\
    nthree lightweight nomination models to identify candidate related diseases. These models were:\\n(1) cosine similarity\
    \ of disease name embeddings generated using Clinical BioBERT [240]; (2)\\nLevenshtein token set ratio, a string similarity\
    \ metric based on edit distance between disease names;\\nand (3) one-hop neighborhood overlap in NeuroKG, quantified using\
    \ the Jaccard similarity index.\\nClinical BioBERT is a biomedical large language model [241] trained on PubMed abstracts\
    \ (4.5B\\nwords), PubMed Central full-text articles (13.5B words) [242], and clinical text from 2 million\\nnotes (approximately\
    \ 880 million words) in the MIMIC-III EHR database [243]. Disease pairs\\n47\\n\\nwere nominated for further review if\
    \ they exceeded empirically determined thresholds on any of the\\nthree metrics: Clinical BioBERT similarity > 0.98, Levenshtein\
    \ token set ratio > 80, or Jaccard\\nneighborhood similarity > 0.1.\\nIn the second stage, nominated disease pairs were\
    \ reviewed by GPT-4o [117], an LLM\\nused as a semantic rater. GPT-4o was prompted (see Supplementary Figure 8c) to score\
    \ each\\ncandidate disease on a scale from 1 to 5 based on its clinical, biological, and therapeutic similarity\\nto the\
    \ held-out evaluation disease. Of the 615 nominated diseases across all 17 disease splits,\\n453 received an LLM similarity\
    \ rating \\u22653 and were retained; the remaining 162 received scores\\n< 3 and were excluded. For example, the BD split\
    \ included: alcohol abuse, alcohol dependence,\\nbipolar depression, bipolar disorder, bipolar I disorder, bipolar II\
    \ disorder, cocaine dependence,\\ndepressive disorder, dysthymic disorder, endogenous depression, epilepsy, major affective\
    \ disorder,\\nmajor depressive disorder, manic bipolar affective disorder, schizophrenia, and unipolar depression\\n(Figure\
    \ 3a).\\nFinally, although we initially constructed disease-centric splits for 25 neurological diseases,\\nseveral of\
    \ these diseases had insufficient drug evidence for meaningful evaluation. Specifically,\\nwe excluded any disease that\
    \ had fewer than five drugs supported by indication, strong clinical\\nevidence, or off-label use evidence. After applying\
    \ this criterion, 17 neurological diseases remained\\nand constituted the final evaluation set.\\n4.3\\nPROTON prediction\
    \ of a drug candidate for BD\\nTo identify a drug candidate for testing in human brain organoids, Proton first performed\
    \ an in\\nsilico screen to rank all 8,160 drugs in NeuroKG by the likelihood of indication for BD. The top\\n200 drugs\
    \ ranked by Proton for BD were then reviewed by GPT-4o [117], which scored each\\nprediction from 1 (undesirable) to 5\
    \ (desirable) along four axes, with the following prompts:\\nLikelihood of efficacy. \\u201cHow likely is it that {drug}\
    \ would be effective in treating bipolar\\ndisorder, based on current biomedical knowledge? Rate from 1 (very unlikely)\
    \ to 5 (very likely).\\u201d\\nNovelty. \\u201cHow novel is the idea of using {drug} to treat bipolar disorder? Rate from\
    \ 1 (already\\nwell-established) to 5 (completely novel, with no prior reports).\\u201d\\nContraindication likelihood.\
    \ \\u201cIs {drug} contraindicated for patients with bipolar disorder?\\nRate from 1 (definitely contraindicated) to 5\
    \ (definitely not contraindicated).\\u201d\\n48\\n\\nMechanistic rationale. \\u201cHow strong is the mechanistic rationale\
    \ for using {drug} to treat\\nbipolar disorder? Rate from 1 (no known mechanism) to 5 (clear and well-supported mechanism).\\\
    u201d\\nThe LLM was instructed to answer with a single number from 1 to 5. Finally, Proton rankings\\nand LLM scores were\
    \ reviewed by a panel of domain experts to identify notable candidates. Experts\\nwere provided with Proton rankings for\
    \ all 200 drugs, optionally filtered by LLM output based on\\nempirically determined thresholds: likelihood score \\u22652,\
    \ novelty score \\u22653, contraindication score\\n\\u22653, and mechanistic rationale score \\u22652. Filtering by these\
    \ thresholds yielded 57 drugs for human\\nreview, from which calcitriol was selected.\\n49\"\n  },\n  {\n    \"name\"\
