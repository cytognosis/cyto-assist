    Author contributions. A.N. and M.Z. conceived the study. A.N. and M.Z. designed the ex-\",\n    \"text\": \"periments,\
    \ together with V.K. for PD-related experiments; K.M., B.B., J.M.T., and G.M.C. for\\nBD-related experiments; and S.D.\
    \ for AD-related experiments. A.N. collected and processed the\\nNeuroKG pre-training data. A.N. developed the Proton\
    \ model as well as the training, inference,\\nand evaluation codebase, with support from J.P., I.A., L.V., and M.M.L.\
    \ A.N. conducted the experi-\\nments and interpreted the results, together with X.W., S.N., and R.C.K for PD-related experiments;\\\
    nK.M., S.M., and M.W. for BD-related experiments; and Y.H. for AD-related experiments. D.R.,\\nJ.A., A.B.H.H., and L.S.\
    \ conducted the genome-wide CRISPR/Cas9 screen in midbrain dopamin-\\nergic neurons and analyzed the results. N.L., M.M.L,\
    \ N.D., G.M.C., and D.A.C. provided feedback\\non the analyses. T.K. and E.M. provided and analyzed snRNA-seq data from\
    \ patients with PD and\\nmatched controls. S.G.R. and A.W. supported PaperQA2 analyses. A.N., K.M., B.B., S.D., and\\\
    nM.Z. wrote the manuscript with input from all co-authors. D.A.C., G.M.C., S.D., J.M.T., V.K., and\\nM.Z. supervised the\
    \ research, with M.Z. leading the study.\"\n  },\n  {\n    \"name\": \"Competing interests. R.C.K. serves as an expert\
    \ consultant and expert witness in litigation\",\n    \"text\": \"related to environmental toxicant exposure and Parkinson\\\
    u2019s disease, and is a topic editor in Movement\\nDisorders for EBSCO DynaMed. G.M.C. has a financial interest in Lila.ai\
    \ and Glottatech.com.\\nV.K. is a co-founder of and senior advisor to DaCapo Brainscience, a company focused on CNS\\\
    ndrug discovery.\\n16\\n\\nFigure 1: Overview of PROTON. Proton is a graph AI model for neurological disease. (a) We demonstrate\\\
    ndiverse disease-specific applications of Proton using experimental and clinical data in three neurological conditions:\\\
    nParkinson\\u2019s disease (PD), bipolar disorder (BD), and Alzheimer\\u2019s disease (AD). Proton nominates candidate\
    \ drugs,\\nforecasts drug approvals, prioritizes pesticides, and identifies genetic, proteomic, and protein-protein interaction\
    \ links\\nacross multiple biological scales. (b) To develop Proton, we first constructed NeuroKG, a heterogeneous biomedical\\\
    nknowledge graph with 147,020 nodes (16 types) and 7,366,745 edges (47 types). Diseases have unique connectivity\\npatterns\
    \ in NeuroKG; for example, 200 type-balanced neighbors from the two-hop neighborhoods of PD, BD, and AD\\nare shown on\
    \ a single shared layout. The one-hop neighborhood of each disease node is rendered in full color; two-\\nhop and out-of-neighborhood\
    \ nodes are rendered faintly. (c) We pre-trained a 578-million-parameter heterogeneous\\ngraph transformer (HGT) on NeuroKG\
    \ with a self-supervised link-prediction objective. Node and edge type-aware\\nmulti-head attention enabled neighborhood\
    \ integration across modalities.\\n17\\n\\nFigure 2: PROTON prioritizes genes and pesticides linked to Parkinson\\u2019s\
    \ disease. (a) Proton conducted\\nthree proteome-scale in silico screens: genetic relationship with PD, protein\\u2013protein\
    \ interaction with \\ud835\\udefc-synuclein, and\\na combined prediction. (b) Proton predictions were compared to six\
    \ genome-wide experimental \\ud835\\udefc-synuclein studies.\\n(c) Gene set enrichment analysis (GSEA) demonstrated that\
    \ Proton predictions were significantly enriched for\\nexperimental hits, outperforming a graph random walk baseline.\
    \ Results are grouped by experiment class: \\ud835\\udefc-synuclein\\ninteractome profiling or \\ud835\\udefc-synuclein\
    \ genetic studies in humans or disease models. N.S. = not significant. (d) We\\ncompiled 288 PD GWAS-linked genes across\
    \ multiple genetic study types and contrasted them against 8,976 GWAS\\nhits from 10 other diseases. (e) An unbiased whole-genome\
    \ CRISPR screen in human midbrain dopaminergic (DA)\\nneurons identified genes essential for neuronal survival. (f) For\
    \ each essential gene, Proton performed a proteome-\\nwide in silico screen to rank likely protein\\u2013protein interactors;\
    \ the median rank of disease GWAS hits showed the\\nstrongest association for PD compared with other diseases. (g) For\
    \ 14 essential genes enriched in autophagy regulation\\nand previously implicated in PD by NERINE, an independent network-based\
    \ method for rare variant burden\\n18\\n\\nanalysis [70], Proton\\u2019s minimum PD GWAS association rank per gene was\
    \ compared to an empirical null, highlighting\\nEXOC4 and HAX1. (h) Fine-tuning dataset constructed from the Parkinson\\\
    u2019s Environment and Genes (PEG) study\\n(\\ud835\\udc5b= 829 PD patients and \\ud835\\udc5b= 824 controls), comprising\
    \ 28 pesticides linked to PD and 100 negative samples. (i)\\nThe held-out test dataset consisted of four pesticides toxic\
    \ to iPSC-derived midbrain DA neurons from a PD patient.\\n(j) Schematic of the Proton pesticide prediction pipeline.\
    \ (k) Proton prioritized pesticides toxic to patient-derived\\ndopaminergic neurons, including endosulfan, dicofol, Naled,\
    \ and copper sulfate.\\n19\\n\\nFigure 3: PROTON-nominated drug reverses proteomic alterations in patient-derived organoid\
    \ mod-\\nels of bipolar disorder. (a) For each of 17 neurological diseases, we constructed disease-centric data splits\
    \ by\\nwithholding drug information from the training set for the disease of interest and all related diseases. An example\\\
    ndisease-centric data split is shown for BD. (b) Across 17 neurological diseases, Proton demonstrates strong perfor-\\\
    nmance at recovering drugs that are FDA approved, in late-stage clinical trials, or prescribed off-label, as measured\\\
    n20\\n\\nby macro-averaged recall (\\ud835\\udc45) at \\ud835\\udc58. (c) Proton highlighted calcitriol as a candidate\
    \ therapeutic for BD. (d) Human\\ncortical organoids derived from BD patients and healthy controls were treated with calcitriol,\
    \ followed by deep\\nproteomic profiling. (e\\u2013f) Volcano plots show differentially expressed proteins (DEPs) in BD\
    \ versus control organoids\\n(512 DEPs, \\ud835\\udc5d< 0.05) and in BD versus drug-treated BD organoids (633 DEPs, \\\
    ud835\\udc5d< 0.05). (g) Expression levels of 73\\nproteins dysregulated in BD organoids were normalized by calcitriol\
    \ treatment, as demonstrated by the unsupervised\\nclustering of calcitriol-treated BD organoids with control organoids\
    \ versus untreated BD organoids. (h) Key pathways\\naffected by calcitriol treatment include metabolism and protein homeostasis,\
    \ RNA processing, and synaptic adhesion.\\n(i) Comparative proteomics revealed both distinct and overlapping proteomic\
    \ effects of calcitriol and lithium in patient-\\nderived organoids.\\nAbbreviations: attention deficit hyperactivity\
    \ disorder (ADHD), amyotrophic lateral sclerosis\\n(ALS), autism spectrum disorder (ASD), X-linked dystonia-parkinsonism\
    \ (XDP).\\n21\\n\\nFigure 4: PROTON predicts drugs that reduce the risk of Alzheimer\\u2019s disease and related dementias\\\
    nin EHR analyses of 610,524 patients. (a) To evaluate Proton drug repurposing predictions, we conducted\\nretrospective\
    \ analyses of Mass General Brigham health records data across \\ud835\\udc5b= 610, 524 patients. For each candidate\\\
    ndrug, patients with the relevant primary indication were divided into treatment and control cohorts. We compared\\nADRD-free\
    \ survival between cohorts using Cox proportional hazards models with inverse probability treatment\\nweighting for age\
    \ and sex. (b) Five of eight model-predicted drugs were significantly associated with reduced ADRD\\nrisk (\\ud835\\udc5d<\
    \ 0.05). The other three drugs neither significantly increased nor decreased risk (\\ud835\\udc5d> 0.05). (c) Cohort\\\
    nsizes for treatment and control groups across retrospective EHR analyses. (d) Cox hazard ratios and \\ud835\\udc5d-values.\
    \ (e\\u2013g)\\nKaplan\\u2013Meier survival curves show reduced ADRD incidence for aflibercept, dapagliflozin, and valsartan.\
    \ Log-rank\\n\\ud835\\udc5d-values and \\ud835\\udf122 statistics are reported.\\n22\\n\\nOnline Methods\\nThe Online\
    \ Methods are organized into four sections. First, we describe the pre-training data,\\ndetailing the construction of\
    \ the Neurological Disease Knowledge Graph (NeuroKG) and its\\ncontextualization with human brain single-cell RNA-sequencing\
    \ atlases (Section 1). Second, we\\noutline the Proton architecture and its self-supervised pre-training procedure (Section\
    \ 2). Third,\\nwe describe the experimental studies conducted to generate independent datasets for evaluation\\n(Section\
    \ 3).\\nFinally, we specify the methods used to assess Proton\\u2019s performance on these\\ndatasets (Section 4).\\n1\\\
    nPre-training data\\n1.1\\nBuilding a heterogeneous biomedical knowledge graph\\nGraphs are an attractive choice as a\
    \ data model to describe the interacting elements in biomedical\\ndata, where networks are pervasive across multiple scales\
    \ [122]. For example, gene regulatory\\nnetworks [123], protein-protein interaction networks [124], cell-cell interactions,\
    \ tissue spatial\\norganization [125], hierarchies of clinical knowledge, patient relationships in the electronic health\\\
    nrecord (EHR) [126], and other complex associations in the biological interactome can all be natively\\nrepresented as\
    \ graphs [127]. In particular, such graphs with knowledge-informed node and edge\\ntypes are often referred to as knowledge\
    \ graphs (KGs).\\nKGs are fundamental data structures\\nrepresented by the tuple G = (V, E), which is defined by a set\
    \ of nodes V and a set of edges E.\\nNodes in V have different types A; for example, in biomedical KGs, nodes can represent\
    \ proteins,\\ndiseases, cell types, or brain regions, among many other possibilities. Formally, let A be the set of\\\
    nnode types with mapping function \\ud835\\udf19: V \\u2192A and let R be the set of edge types. Then, the edges\\nare\
    \ represented as\\nE \\u2286{{\\ud835\\udc62, \\ud835\\udc63} \\u00d7 R | \\ud835\\udc62, \\ud835\\udc63\\u2208V, \\ud835\\\
    udc62\\u2260\\ud835\\udc63},\\nwhere each edge is a pair \\u0000{\\ud835\\udc62, \\ud835\\udc63}, \\ud835\\udc5f\\u0001\
    \ consisting of an unordered set of nodes {\\ud835\\udc62, \\ud835\\udc63}, each belonging\\nto a specific node type \\\
    ud835\\udf19(\\ud835\\udc62), \\ud835\\udf19(\\ud835\\udc63) \\u2208A, and connected to each other by an undirected edge\
    \ of type\\n\\ud835\\udc5f\\u2208R. The classes, or types, of nodes and edges often indicate the nature of their relationships;\
    \ for\\nexample, in a biomedical KG, nodes of type \\u201cdrug\\u201d and \\u201cdisease\\u201d may be connected by edges\
    \ of\\ntype \\u201cindication,\\u201d \\u201ccontraindication,\\u201d or other relation types.\\n23\\n\\nEspecially in\
    \ biology and medicine, KGs have emerged as important data structures to rep-\\nresent and operate on complex data. Examples\
    \ of biomedical KGs include the Precision Medicine\\nKnowledge Graph (PrimeKG), a KG with 129,375 nodes and 4,050,249\
    \ edges created by integrating\\n20 primary source biomedical datasets, ontologies, and knowledge bases [121]; ogbl-biokg,\\\
    na heterogeneous KG from the Open Graph Benchmark compiled from various biorepositories\\nwith 93,773 nodes and 5,088,434\
    \ edges [128]; BioGrakn, a graph-based deductive database that\\nincludes a collection of biomedical knowledge graphs\
    \ [129]; Hetionet, a heterogeneous biomedi-\\ncal KG created by integrated 29 public biomedical resources [130]; the Clinical\
    \ Knowledge Graph\\n(CKG), an open-source KG with 19,405,058 nodes and 217,341,612 edges that aims to capture clin-\\\
    nically relevant information [131]; the integrative Biomedical Knowledge Hub (iBKH), constructed\\nby merging 18 biomedical\
    \ knowledge sources [132]; PharmKG, a biomedical knowledge graph\\nwith 7,603 nodes and 500,958 edges for drug repurposing\
    \ and target prediction [133]; BioKG, a\\nbiomedical knowledge graph that draws from 14 biological databases [134]; the\
    \ Drug Repurposing\\nKnowledge Graph (DRKG), a KG with 97,238 nodes and 5,874,261 edges assembled from six\\ndatabases\
    \ and recent publications on COVID-19 [135]; and many other KGs. However, existing\\nKGs suffer from various drawbacks:\
    \ their indiscriminate \\u201ckitchen sink\\u201d construction methodologies\\noften lead to noisy or incomplete graphs\
    \ with erroneous or missing edges [136, 137]. Further, no\\ncurrent KG exists that captures neurological and neuroscientific\
    \ knowledge across multiple scales,\\nincluding the molecular (e.g., protein-protein interactions), cellular (e.g., brain\
    \ single-cell RNA-\\nsequencing data), genetic, anatomical, and clinical levels. Thus, we sought to integrate diverse\\\
    npublic information about neurobiological relationships into the Neurological Disease Knowledge\\nGraph (NeuroKG), a harmonized\
    \ data platform suitable for training AI models.\\n1.2\\nUnifying 36 large-scale biomedical data sources\\nNeuroKG is\
    \ a heterogeneous biomedical knowledge graph created by unifying 36 high-quality,\\npublicly available primary data sources.\
    \ Each dataset was processed to construct both nodes and\\nedges in NeuroKG, where nodes represent objects in the datasets\
    \ harmonized by mapping their\\nvarious unique identifiers onto each other, and edges represent relationships between\
    \ the objects\\nsimilarly extracted from the primary data sources. Building on Chandak et al. [121], we first\\nanalyzed\
    \ and integrated data from 20 knowledge bases and ontologies, including human expression\\ndata from the Bgee gene expression\
    \ knowledge base [138]; environmental exposure data from\\nthe Comparative Toxicogenomics Database (CTD) [139]; the DisGeNET\
    \ knowledge base of gene-\\ndisease associations [140]; the Disease Ontology database of human disease relationships [141];\
    \ the\\n24\\n\\nDrugBank pharmaceutical database [90]; the Drug Central database of drug-disease interactions\\n[91];\
    \ the Entrez gene database of gene-specific information [142]; the Gene Ontology (GO) pathway\\ndatabase, from which biological\
    \ processes, cellular components, and molecular functions were all\\nincluded [143, 144]; the Human Phenotype Ontology\
    \ (HPO) [145]; the Mayo Clinic knowledge\\nbase of information on human diseases and conditions; the MONDO Disease Ontology\
    \ [146,\\n147]; the Orphanet database on rare diseases and orphan drugs [148]; the human protein-protein\\ninteraction\
    \ (PPI) network, which includes PPI information from Menche et al. [149], BioGRID\\n[150], STRING [151], and the human\
    \ reference interactome generated by Luck et al. [124]; the\\nReactome pathway knowledge base [152]; the Side Effect Resource\
    \ (SIDER) for data on adverse\\ndrug reactions [153, 154]; the Uberon anatomical ontology [155, 156]; and the Unified\
    \ Medical\\nLanguage System (UMLS) knowledge base [157].\\nThese datasets were carefully analyzed in a semi-automated\
    \ fashion to extract and retain only\\nhigh-quality associations. Analysis details follow those described in Chandak et\
    \ al. [121], updated\\nto the latest versions of the datasets at the time of analysis and automated for reproducibility.\\\
    nBriefly, human gene expression data from Bgee was subset to retain Uberon-coded anatomical\\nentities, gold quality calls\
    \ with an adjusted \\ud835\\udc5d-value of \\u22640.01, and data with an expression rank\\nless than 25,000, producing\
    \ 5,198,776 raw anatomy-gene associations where gene expression was\\neither present or absent in certain tissues or cell\
    \ types. CTD exposure data was similarly processed\\nto obtain 206,586 associations; DisGeNET data contained 84,038 associations\
    \ between genes and\\ndiseases or phenotypes; and DrugBank pharmaceutical data (version 5.1.10) yielded 2,867,056\\nsynergistic\
    \ drug-drug interactions and 27,250 drug-protein associations, including carrier, enzyme,\\ntarget, and transporter relationships.\
    \ The Drug Central database (version released on May 10th,\\n2023) was processed to extract 41,971 relationships among\
    \ drugs and diseases, including 27,671\\ncontraindications, 11,775 indications, and 2,525 records of off-label use. The\
    \ Entrez database\\nwas processed with the GOATOOLS package [158] to yield 291,835 associations of genes with\\nGO pathways,\
    \ including 138,367 associations with biological processes, 83,125 associations with\\ncellular components, and 70,343\
    \ associations with molecular functions. The GOATOOLS pack-\\nage was also used to process the GO database itself, producing\
    \ 68,651 ontological relationships\\namong these pathways. From the HPO ontology, 256,768 positive associations and 554\
    \ negative\\nassociations between diseases and phenotypes were constructed. The MONDO disease ontol-\\nogy was used to\
    \ construct 37,810 disease-disease associations, while 2,647 pathway-pathway and\\n44,865 pathway-gene associations were\
    \ constructed from the Reactome database. Finally, SIDER\\nproduced 202,736 drug-phenotype associations, while Uberon\
    \ produced 24,800 anatomical rela-\\ntionships. After pre-processing, data harmonization was performed to map database-level\
    \ objects\\n25\\n\\nwith shared identifiers to common nodes in the KG and then construct edges of various types from\\\
    nrelationships among those nodes. Additionally, 88 nodes with duplicate names were identified and\\nharmonized. Altogether,\
    \ from these original 20 databases, 143,186 nodes connected by 6,817,223\\nedges were constructed, forming the backbone\
    \ of NeuroKG.\\nIn addition to these original 20 data resources, we also included 16 databases from the Open\\nTargets\
    \ Platform [92, 93], a large-scale public-private partnership for drug target identification and\\nprioritization that\
    \ includes data about targets, diseases, phenotypes, and drugs. Datasets analyzed\\nfrom Open Targets included the Cancer\
    \ Gene Census [159], ChEMBL (for both drug-disease and\\ndrug-gene edges) [160, 161], Clinical Genome Resource (ClinGen)\
    \ [162], Project Score [163, 164],\\nCRISPR screens [165], Expression Atlas [166, 167], Gene Burden, Gene2Phenotype (G2P)\
    \ [168],\\nGenomics England PanelApp [169], IntOGen [170], Orphanet [148], PROGENy [171], Reactome\\n[152], SLAPenrich\
    \ [172], systems biology gene signatures [173\\u2013176], and UniProt literature [177,\\n178]. These 16 Open Targets databases\
    \ were analyzed to extract edges to enrich NeuroKG. The\\nprocessing steps and decisions taken when analyzing each database\
    \ were as follows. Of note, Open\\nTargets databases were used to construct edges rather than nodes. Thus, prior to any\
    \ downstream\\nfiltering or analysis, candidate edges were first subset to those incident on nodes already in the KG.\\\
    nFirst, from the Cancer Gene Census, 76,289 gene-disease associations were extracted, of\\nwhich 71,791 were incident\
    \ on nodes in the KG. These associations were scored according to\\nthe Cancer Gene Census tier system [159], where the\
    \ score of each gene-disease association is\\nincremented or decremented by multiples of 0.25 based on the strength of\
    \ the supporting evidence.\\nTo extract only the associations of the highest strength and quality, we filtered for edges\
    \ with scores\\n> 0.5, indicating that the gene is mutated more frequently in that particular disease compared to\\nother\
    \ diseases, and that mutations in the gene occur more frequently than in other genes of similar\\nlength in the same disease.\
    \ Next, 625,734 associations between drugs and diseases or genes were\\nretrieved from the ChEMBL database of drug-like\
    \ molecules \\u2013 including both compounds approved\\nfor marketing by the U.S. Food and Drug Administration (FDA) and\
    \ clinical candidates \\u2013 of which\\n410,317 edges were incident on nodes in the KG. We then consulted Open Targets\
    \ scores for\\neach association, which were determined using a machine learning analysis that categorized each\\ncorresponding\
    \ clinical trial into 17 possible reasons for termination. First, scores were assigned\\nbased on clinical precedence,\
    \ i.e., scores of 0.05 were assigned for trials concluding before Phase I,\\n0.1 for post-Phase I termination, 0.2 for\
    \ Phase II, 0.7 for Phase III, and 1 for Phase IV. Next, for trials\\nthat stopped early, scores were decremented by 0.5\
    \ if trials terminated due to negative outcomes,\\nsafety concerns, or side effects. We filtered for edges with scores\
    \ > 0.05, then constructed edges of\\n26\\n\\ntype \\u201cweak clinical evidence\\u201d for score \\u2208(0.05, 0.5),\
    \ \\u201cstrong clinical evidence\\u201d for score \\u2208[0.5, 1),\\nand \\u201cindication\\u201d for score = 1, ultimately\
    \ producing 403,866 new edges in NeuroKG.\\nThe next dataset to be processed was the ClinGen Gene-Disease Validity Curation,\
    \ from\\nwhich 2,183 gene-disease associations were retrieved that described whether variance in a given\\ngene is causative\
    \ of a given disease. Of these, 2,039 were incident on edges in the KG. Edges were\\nassigned scores based on the supporting\
    \ evidence, where 0.01 indicates limited, refuted, disputed, or\\nnon-existent evidence; 0.5 suggests moderate evidence;\
    \ and 1 indicates strong or definite evidence\\n[162]. Again, to retain only high-quality edges, we filtered for edges\
    \ with scores of 1 for only strong\\nor definite genetic associations, leaving 1,299 edges to be included in NeuroKG.\
    \ The Project Score\\ndatabase from the Wellcome Sanger Institute \\u2013 which analyzed 930 genome-wide CRISPR-Cas9\\\
    nfunctional genomics screens to identify gene dependencies in 27 cancer types \\u2013 contained 1,838\\ngene-disease associations\
    \ [163]. Associations with Project Score priority scores greater than 41.5\\nwere included as evidence, all of which were\
    \ incident on edges in the KG. The CRISPR screens\\ndatabase contained 24,907 gene-disease associations, of which 21,721\
    \ were incident on gene and\\ndisease nodes in the KG. Associations were derived from genome-wide CRISPR interference,\\\
    nactivation, and knock-out screens in differentiated human brain cell types, including glutamatergic\\nneurons, astrocytes,\
    \ microglia, and hematopoietic stem and progenitor cells.\\nFollowing Tian\\net al. [165], the 21,721 candidate edges\
    \ were scored as the product of the phenotype score and\\n\\u2212log10(\\ud835\\udc5d-value), representing both effect\
    \ size and statistical significance. To extract only the\\nmost robust associations, we filtered for the 7,088 gene-disease\
    \ edges with a score of 1, which\\nincluded 1,830 upregulated (i.e., fold-change of the given gene\\u2019s expression\
    \ in the given disease\\nis > 0) and 5,258 downregulated (i.e., fold-change < 0) edges. The Expression Atlas database\\\
    ncontained 230,893 gene-disease associations, of which 197,107 were incident on gene and disease\\nnodes in the KG. Duplicate\
    \ edges were collapsed by computing the mean log2(fold-change) across\\nmultiple observations of the same gene-disease\
    \ pair. To extract strong associations, we filtered for\\nthe 132,219 edges with fold-change of 2 (i.e., | log2(fold-change)|\
    \ = 1), which included 66,706\\nupregulated and 65,513 downregulated edges.\\nNext, we considered the Gene Burden dataset,\
    \ which contains gene-disease edges derived\\nfrom association tests in rare variant collapsing analyses, including and\
    \ especially those related\\nto neurological disease. Burden tests were integrated across various studies, including a\
    \ whole-\\nexome sequencing (WES) study of 454,787 UK Biobank (UKB) participants [179]; the AstraZeneca\\nPheWAS Portal,\
    \ a WES study of 269,171 UKB participants [180], the Gene-Based Association\\nSummary Statistics (Genebass) WES study\
    \ of 394,841 UKB participants [181]; a whole-exome and\\n27\\n\\nwhole-genome sequencing study of 42,607 autism spectrum\
    \ disorder (ASD) cases in the Simons\\nFoundation Powering Autism Research for Knowledge (SPARK) cohort [182]; the Schizophrenia\\\
    nExome Sequencing Meta-Analysis (SCHEMA) WES study of 24,248 individuals with schizophre-\\nnia and 97,322 controls from\
    \ seven continental populations [183]; the Epi25 Collaborative WES\\nstudy of 9,170 individuals with epilepsy and 8,436\
    \ controls [184]; the Autism Sequencing Consor-\\ntium WES study of 35,584 individuals, including 21,219 family-based\
    \ samples (6,430 ASD cases,\\n2,179 unaffected siblings, and both parents) and 14,365 case-control samples (5,556 ASD\
    \ cases,\\n8,809 controls) [185]; a whole-genome and whole-exome sequencing study of 7,184 PD cases,\\n6,701 proxy cases\
    \ and 51,650 controls from AMP-PD [64]; and several other studies [186\\u2013188]. A\\ntotal of 27,381 gene-disease and\
    \ gene-phenotype associations were retrieved from the Gene Burden\\ndataset, of which 7,540 had gene and either disease\
    \ or phenotype representations in the KG (where\\nphenotypes were identified by the \\u201cHP\\u201d prefix in their Open\
    \ Targets identifier). Edges integrated\\ninto NeuroKG included 1,032 gene-phenotype edges and 6,508 gene-disease edges\
    \ across 371\\ndiseases.\\nAfter Gene Burden, we analyzed the G2P database of gene-disease panels curated from the\\nliterature\
    \ by clinical geneticists. A total of 3,011 gene-disease or gene-phenotype associations were\\nretrieved from G2P, of\
    \ which 2,195 were incident on genes and either diseases or phenotypes in the\\nKG. These associations were assigned the\
    \ following evidence scores: 0.01 for limited evidence,\\n0.5 for moderate evidence, and 1 for strong or definitive evidence\
    \ (or for genotypes associated\\nwith both the relevant disease of that edge as well as another disease that represents\
    \ an incidental\\nfinding) [168]. To select only the edges supported by strong or definitive evidence, we filtered\\nfor\
    \ edges with scores of 1, leaving 1,992 gene-disease or gene-phenotype edges. Next, 31,394\\ngene-disease associations\
    \ were retrieved from Genomics England PanelApp, a knowledge base\\nof gene-disease relationships crowdsourced from and\
    \ curated by clinical and scientific experts.\\nOf the original 31,394 associations, 22,724 were incident on nodes in\
    \ the KG. Gene-disease\\nassociations were assigned three possible classifications in Genomics England PanelApp based\\\
    non the level of supporting evidence: red, indicating low confidence; amber, indicating moderate\\nconfidence; and green,\
    \ indicating strong or diagnostic-grade confidence [169]. We filtered for\\ngreen-level associations, which require \\\
    u201cevidence from three or more unrelated families or from\\ntwo or three unrelated families where there is strong additional\
    \ functional data,\\u201d leaving 20,324\\ngene-disease edges to be added to the KG. Finally, from the IntOGen, Orphanet,\
    \ PROGENy,\\nReactome, SLAPenrich, systems biology gene signatures, and UniProt literature databases, 4,359,\\n6,342,\
    \ 378, 10,095, 72,440, 389, and 4,135 associations were retrieved, respectively, of which\\n4,296, 5,156, all 378, 9,897,\
    \ 72,272, 309, and 2,948 associations were incident on nodes in the KG\\n28\\n\\nand were thus included.\\nOf note, some\
    \ Open Targets databases were excluded as they did not meet our inclusion\\ncriteria of (1) direct clinical or experimental\
    \ evidence; (2) human data rather than animal models;\\n(3) binary associations between two nodes in the KG; and (4) for\
    \ genetic associations, gene-level\\nrather than variant-level relationships (to prevent dominance of variant nodes in\
    \ the KG). For\\nexample, Cancer Biomarkers was excluded because it contains information about relationships\\nbetween\
    \ drugs, biomarkers, targets, and cancer subtypes, which would require the construction of\\nhyperedges connecting several\
    \ nodes in the KG rather than a binary edge connecting two nodes\\n[189].\\nThe EMBL-EBI Europe PubMed Central database\
    \ was excluded as associations were\\nderived from text co-occurrences in the literature identified by deep learning-based\
    \ named entity\\nrecognition rather than experimental or clinical evidence [190, 191]. The International Mouse\\nPhenotypes\
    \ Consortium data was excluded as associations were derived from phenotypic effects\\nof gene knockouts in mice rather\
    \ than humans [192]. Finally, the ClinVar [193\\u2013196] and UniProt\\nvariants [177, 178] datasets were excluded because\
    \ they contained variant-level rather than gene-\\nlevel relationships. With the inclusion of the Open Targets Platform,\
    \ the number of biomedical\\nrelationships in NeuroKG increased to 7,048,887 edges.\\nIn building NeuroKG, the July 2023\
    \ versions of all databases were used, with the exception\\nof Open Targets Platform, for which version 23.09 was used,\
    \ retrieved in January 2024. Unless\\notherwise indicated, all code was written and executed in Python (version 3.11.10)\
    \ and R (version\\n4.4.0).\\n1.3\\nContextualizing NEUROKG to the human brain\\nWith the datasets described in Section\
    \ 1.2 alone, NeuroKG already included relevant information\\nabout the nervous system; for example, the Gene Burden dataset\
    \ included whole-exome and\\nwhole-genome studies from individuals with ASD, schizophrenia, epilepsy, and PD among other\\\
    nconditions. To further capture the rich molecular interactions and unique cellular relationships\\nrelevant to neurological\
    \ disease, we contextualized the KG to the brain by including data from\\napproximately 3.7 million cells from single-cell\
    \ RNA sequencing (scRNA-seq) atlases of the adult\\nhuman brain.\\nFirst, we analyzed a single-nucleus RNA sequencing\
    \ (snRNA-seq) atlas of the adult human\\nbrain [17]. This atlas was constructed by sequencing postmortem tissue from 606\
    \ samples in three\\nadult human donors dissected from 112 anatomically-distinct locations across 14 brain regions \\\
    u2013\\n29\\n\\nincluding the telencephalon, diencephalon, midbrain, hindbrain, and cervical spinal cord. This\\ndataset\
    \ was also enriched for neurons using fluorescence-activated cell sorting. In Siletti et al. [17],\\nHarmony [197] was\
    \ used to integrate cells across donors; then, the Paris algorithm [198] was used\\nto build a dendrogram that defined\
    \ 31 cell types (referred to by Siletti et al. as \\u201csuperclusters\\u201d),\\n461 subtypes, and 3,313 subclusters\
    \ (Figure 4a). Using the scanpy package [199] in Python, we\\nanalyzed this data from 2,480,956 neurons and 888,263 non-neuronal\
    \ cells. Non-neuronal cell types\\nincluded astrocytes, microglia, oligodendrocytes, oligodendrocyte precursor cells,\
    \ ependymal cells,\\nBergmann cells, vascular cells, and choroidal epithelial cells. Briefly, mitochondrial genes were\\\
    nannotated, and quality control metrics were computed \\u2013 including the number of genes expressed\\nin the count matrix,\
    \ the total counts per cell, and the percentage of counts in mitochondrial genes.\\nTo remove cells with stress or damage,\
    \ poor quality cells, and potential doublets or multiplets,\\n40,627 neuronal and 2,965 non-neuronal cells exceeding 12,000\
    \ total counts for neurons, 7,000\\ntotal counts for non-neuronal cells, or with greater than 5% mitochondrial gene expression\
    \ were\\nremoved. Next, each cell was normalized by total counts over all genes to 10,000 counts per cell,\\nafter which\
    \ a logarithmic transformation was applied. All 29,921 human genes with valid Entrez\\ngene identifiers were retrieved\
    \ from BioMart [200] and were used to filter the genes in the Siletti\\net al. [17] snRNA-seq data. From the original\
    \ 59,480 genes, 33,683 genes without Entrez gene\\nidentifiers, 1,158 genes with missing gene symbols, and 138 genes with\
    \ duplicated gene symbols\\nwere removed. Finally, each gene was scaled to zero mean and unit variance, and values that\\\
    nexceeded a standard deviation of 10 were truncated. The final dataset consisted of 24,501 genes\\nassayed across 2,387,555\
    \ neurons and 885,298 non-neuronal cells. The numbers of cells by each\\ncell type are shown in Supplementary Table 1.\\\
    nNext, differential expression analysis was performed to identify marker genes distinguishing\\n31 cell types, 461 subtypes,\
    \ and 3313 subclusters. Marker genes were identified using a Student\\u2019s\\n\\ud835\\udc61-test applied on the raw\
    \ (i.e., unscaled) data [201]. For cell types, marker genes were those with in-\\ncreased or decreased expression in each\
    \ cell type relative to all other cell types; for subtypes, marker\\ngenes were those with differential expression in\
    \ each subtype relative to all other subtypes from\\nthe same parent cell type; and for subclusters, marker genes were\
    \ those with differential expression\\nin each subcluster relative to all other subcluster with the same parent subtype.\
    \ The numbers of\\nsubtypes and subclusters belonging to each supercluster are also shown in Supplementary Table 1.\\\
    nWe validated that cell type annotations in Siletti et al. were well-constructed by visualizing\\nthe expression of known\
    \ marker genes of neurons (INA), glutamatergic (SLC17A6, SLC17A7) and\\nGABAergic (SLC31A1) neurons, microglia (PTPRC),\
    \ astrocytes (AQP4), oligodendrocytes (PLP1),\\n30\\n\\nand oligodendrocyte precursor cells (PDFGRA) (Supplementary Figures\
    \ 4b and 4c). The expression\\nof these literature-derived marker genes was visualized as scatter plots in the t-distributed\
    \ stochastic\\nneighbor embedding (t-SNE) basis, which were compared to Figure 1b of Siletti et al. [17]. We\\nalso validated\
    \ marker genes identified by the differential expression analysis using gold-standard\\nmarkers of astrocytes and microglia\
    \ previously published in the literature and in our prior work.\\nFor example, in Viejo and Noori et al. [202], we performed\
    \ a systematic review of 306 astrocyte\\nimmunohistochemical studies in postmortem AD brains followed by bioinformatics\
    \ analyses. Our\\nreview identified 196 proteins dysregulated in reactive astrocytes of AD brains, which we refer to\\\
    nas the \\u201cADRA\\u201d protein set. Proteins in the ADRA protein set were also significantly upregulated\\nor downregulated\
    \ in astrocytes in Siletti et al. (Supplementary Figure 4d); that is, astrocyte marker\\ngenes identified from the snRNA-seq\
    \ human brain atlas were significantly enriched for known\\nADRA immunohistochemical markers of astrocytes as assessed\
    \ by gene set enrichment analysis\\n(\\ud835\\udc5d= 1.612 \\u00d7 10\\u22124, ES = 0.545, NES = 1.623) [50, 203, 204].\\\
    nFinally, the brain regions, brain structures, cell types, subtypes, and subclusters were used to\\ndefine new nodes in\
    \ NeuroKG. Then, based on the differentially expressed marker genes and cell\\ntype proportions, new edges were created\
    \ from brain regions to brain structures, cell types to cell\\nsubtypes, brain structures to cell subtypes, cell subtypes\
    \ to cell subclusters, cell types to marker\\ngenes, cell subtypes to marker genes, and cell subclusters to marker genes\
    \ (Supplementary Figure\\n4a). First, new nodes were created for all 14 brain regions (i.e., the amygdaloid complex, basal\\\
    nforebrain, basal nuclei, cerebellum, cerebral cortex, claustrum, extended amygdala, hippocampus,\\nhypothalamus, midbrain,\
    \ myelencephalon, pons, spinal cord, and thalamus) and 112 brain struc-\\ntures (i.e., anatomically-distinct dissections\
    \ in Siletti et al.), which were defined by the Allen Brain\\nAtlas. Edges between each brain structure and their parent\
    \ brain region were constructed, and\\nhuman readable names of all 112 brain structure nodes were created by manual review\
    \ using neu-\\nroanatomical reference atlases. Next, for each cell subtype, the proportions of cells of that subtype\\\
    npresent across each brain structure were calculated and visualized in a histogram (Supplementary\\nFigure 4e). Based\
    \ on this histogram, a membership threshold of 5% was determined; therefore,\\nedges were constructed between a cell subtype\
    \ and a brain structure if at least 5% of the total\\ncells belonging to that subtype were present in that brain structure.\
    \ A total of 1,820 edges were\\nconstructed between brain structures and cell subtypes. Additionally, 450 parent-child\
    \ edges were\\nconstructed between cell types and cell subtypes, and 3,244 edges were constructed between cell\\nsubtypes\
    \ and cell subclusters. Lastly, 12,334 edges were constructed between cell types and their\\ntop 400 marker genes, 89,288\
    \ edges were constructed between cell subtypes and their top 200\\nmarker genes, and 160,634 edges were constructed between\
    \ cell subclusters and their top 50 marker\\n31\\n\\ngenes (Supplementary Figure 4a). In sum, 3,851 new nodes and 267,882\
    \ edges were instantiated\\nin NeuroKG from this single-cell transcriptomic atlas of the adult human brain.\\nAlthough\
    \ the snRNA-seq atlas published by Siletti et al. features rich information about\\nthe healthy human brain, we also sought\
    \ to incorporate transcriptomic data from neurological\\ndisease settings into NeuroKG. Therefore, we analyzed 202,810\
    \ nuclei from the postmortem\\nsubstantia nigra pars compacta of ten donors with pathological midbrain DA neuron loss\
    \ and a\\nclinical diagnosis of either PD or Lewy body dementia (LBD), as well as 184,673 nuclei from eight\\nage-matched\
    \ and postmortem-interval-matched neurotypical donors [18]. Nuclei were enriched\\nfor those from dopaminergic neurons\
    \ using fluorescence-activated nuclei sorting. As described in\\nKamath et al., differential expression analysis across\
    \ eight cell types and 68 subtypes was performed\\nusing model-based analysis of single-cell transcriptomes (MAST), a\
    \ two-part generalized linear\\nmodel designed for scRNA-seq data [205]. Fixed-effect covariates \\u2013 including log-transformed\\\
    nUMI counts, sex, mitochondrial read percentage per nucleus, and disease status \\u2013 were controlled\\nfor. Of note,\
    \ for each cell type and subtype, this analysis identified differentially expressed genes\\n(DEGs) both in comparison\
    \ against all other cells (i.e., marker genes) and in comparison between\\nPD or LBD brains and control brains (i.e.,\
    \ PD-related DEGs). Within each cell type and subtype,\\nmarker and PD-related genes were ranked by \\ud835\\udc67-score,\
    \ which integrates changes in the discrete and\\ncontinuous components of expression.\\nThe eight cell types included\
    \ were astrocytes, microglia, endothelial cells, oligodendrocytes,\\noligodendrocyte precursor cells, excitatory neurons,\
    \ inhibitory neurons, and dopaminergic neurons.\\nAs before, 68 edges were constructed between cell types and subtypes,\
    \ 3,200 edges were constructed\\nbetween cell types and their top 400 marker genes, and 13,600 edges were constructed\
    \ between\\nsubtypes and their top 200 marker genes. In addition, 6,400 edges were constructed between cell\\ntypes and\
    \ the top 800 (i.e., 400 upregulated and 400 downregulated) PD-related DEGs in each cell\\ntype, and 26,800 edges were\
    \ constructed between subtypes and the top 400 (i.e., 200 upregulated\\nand 200 downregulated) PD-related DEGs in each\
    \ subtype. Edges derived from disease-associated\\nDEGs were assigned types based on their direction of effect, labeled\
    \ as either \\u201cupregulated in PD\\u201d\\nor \\u201cdownregulated in PD.\\u201d Altogether, 76 new nodes and 50,068\
    \ new edges were constructed from\\nthe 387,483 nuclei in this snRNA-seq study of the neurodegenerating PD brain.\\nFinally,\
    \ to remove isolated pockets of nodes or prune any nodes without edges connecting\\nthem to the rest of the KG, the largest\
    \ weakly connected component of the KG was extracted\\nusing the igraph software package for network analysis. In the\
    \ resulting connected component,\\n99.9368% of the nodes and 99.9988% of the edges were retained; this connected component\
    \ was\\n32\\n\\nadopted as the final NeuroKG knowledge graph. As NeuroKG is undirected, reverse edges were\\nadded to\
    \ ensure that relationships in NeuroKG were bidirectional.\\n2\\nPROTON architecture and optimization\\n2.1\\nModel architecture\\\
    nTo learn representations on NeuroKG, graph neural networks (GNNs) \\u2013 an extension of neural\\nnetworks to the graph\
    \ domain \\u2013 were used [206]. Proton learns weight matrices that define a series\\nof differentiable functions mapping\
    \ node and edge features to link prediction probabilities. During\\ntraining, nodes update their vector representations,\
    \ or embeddings, in each layer by aggregating\\nmessages received from their neighbors (Figure 1c). In a standard GNN,\
    \ for node \\ud835\\udc62\\u2208V with\\none-hop neighborhood N\\ud835\\udc62and node features in the (\\u2113\\u22121)-th\
    \ layer as x\\u2113\\u22121\\n\\ud835\\udc62\\n, the \\u2113-th message passing\\nlayer in a GNN can compute the new embedding\
    \ x\\u2113\\n\\ud835\\udc62as follows [207]:\\nx\\u2113\\n\\ud835\\udc62= \\ud835\\udf0c\\n\\nx\\u2113\\u22121\\n\\ud835\\\
    udc62\\n,\\n\\u00ca\\n\\ud835\\udc63\\u2208N\\ud835\\udc62\\n\\ud835\\udf13(x\\u2113\\u22121\\n\\ud835\\udc62\\n, x\\\
    u2113\\u22121\\n\\ud835\\udc63\\n)\\n!\\n,\\nwhere \\ud835\\udf0cand \\ud835\\udf13are the differentiable update and message\
    \ functions, respectively, while \\u00c9 is a\\npermutation invariant aggregation operator. Then, to produce \\ud835\\\
    udc5d(\\ud835\\udc62, \\ud835\\udc5f, \\ud835\\udc63), the final node embeddings\\nin an \\ud835\\udc3f-layer GNN can\
    \ be combined through a decoder function, such as the dot product x\\ud835\\udc3f\\n\\ud835\\udc62\\u00b7 x\\ud835\\udc3f\\\
    n\\ud835\\udc63.\\nFor Proton, two important considerations were made in the design of the GNN encoder:\\nattention and\
    \ relation heterogeneity. First, instead of using standard averaging or maximum pooling\\nover all neighbors in the \\\
    u00c9 aggregation operator, attention mechanisms can allow a node to update\\nits representation by only considering important\
    \ neighbors. That is, rather than treat all neighbors\\nequally during message passing, each node can compute a weighted\
    \ average of its neighbors\\u2019\\nrepresentations, where the weights, or attention scores \\ud835\\udefc, are adaptively\
    \ learned. In this manner,\\neach node in the GNN can focus on its most relevant neighbors in the KG [208]. This approach\
    \ is\\ninspired by human cognitive systems that, when presented with large data streams, focus only on\\nsubsets of information\
    \ as needed. Attention mechanisms \\u2013 and the popular transformer architecture\\n[34] that they have enabled \\u2013\
    \ have underpinned advances in deep learning on language, vision, and\\ngraphs [209]; thus, we sought to select a transformer-based\
    \ GNN design with attention mechanisms.\\nIt is also critical to recognize that NeuroKG is a heterogeneous graph composed\
    \ of different\\n33\\n\\nnode types and edge types, given by the sets A and R. This diversity of possible relations represents\\\
    nan important source of biomedical knowledge encoded in the graph. For instance, when predicting\\ndrug-disease relations\
    \ to match candidate therapeutics to the diseases they may treat, not only do\\ndrugs and diseases in NeuroKG share edges\
    \ with non-drug and non-disease neighbors, but drug-\\ndisease relations themselves are of multiple types in the knowledge\
    \ graph. These edge types include\\ncontraindications, indications, and off-label use. High contraindication likelihood\
    \ suggests that a\\ndrug would not represent an attractive drug repurposing target, while indication and off-label use\\\
    npredictions suggest the opposite; however, traditional GNN methods for homogenous graphs would\\nfail to differentiate\
    \ between these three relationships. Thus, when learning both node embeddings\\nand attention weights to model NeuroKG,\
    \ it is necessary to leverage the heterogeneity of possible\\nrelations in the KG and preserve the complex structural\
    \ information encoded therein. As different\\ntypes of nodes and edges encode different information, they may require\
    \ separate representation\\nspaces.\\nTo incorporate both attention mechanisms and type-specific representation spaces\
    \ in Proton,\\nwe selected a heterogeneous graph transformer (HGT) [33] architecture with three layers and\\n578,083,992\
