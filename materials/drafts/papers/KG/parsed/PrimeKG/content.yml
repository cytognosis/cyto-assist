    \  {\n    \"name\": \"OPEN\",\n    \"text\": \"2\\nScientific Data |           (2023) 10:67  | https://doi.org/10.1038/s41597-023-01960-3\\\
    nwww.nature.com/scientificdata\\nwww.nature.com/scientificdata/\\nclinical guidelines. Rather than have a standardized\
    \ disease ontology, database developers select the ontology\\nthat best suits their function from a multitude of biorepositories44\\\
    u201354. Because each set of disease vocabulary\\nwas tailored for some to serve a unique purpose, their disease encodings\
    \ overlap unsystematically and are\\noften in conflict. For instance, International Classification of Diseases (ICD) codes50\
    \ are optimized for med-\\nical billing whereas MedGen53, PhenoDB51, and Orphanet48 focus on rare and genetic diseases.\
    \ Moreover,\\nexpertly curated disease descriptions in medical repositories do not follow any naming conventions48,55.\
    \ The\\nlack of standardized disease representations and the multimodal nature of the datasets makes it challenging\\\
    nto harmonize biomedical knowledge at scale. Third, the definition of diseases as discrete and distinct units\\nof analysis\
    \ remains medically and scientifically ambiguous. For instance, while autism spectrum disorder is\\nconsidered a medical\
    \ diagnosis, the condition has many subtypes linked to clinically divergent manifesta-\\ntions56,57. Clinically studied\
    \ disease subtypes often do not correlate clearly with those defined in disease ontol-\\nogies. Although only three subtypes\
    \ of autism have been clinically identified57, the Unified Medical Language\\nSystem (UMLS)46 describes 192 subtypes,\
    \ the Monarch Disease Ontology (MONDO)44 describes 37 subtypes,\\nand finally, Orphanet48 contains 6 disease entries for\
    \ autism. The challenge in reconciling disease entities is\\nonly exacerbated by the variety of synonyms and abbreviations\
    \ available for any particular disease58 and the\\ndifficulty in linking structured disease entities to unstructured names\
    \ in text59. Meaningful disease entity res-\\nolution across multimodal, non-standardized datasets is critical for developing\
    \ resources useful for precision\\nmedicine tasks.\\nWhile drug repurposing remains the focus of knowledge graph development33,37,39,42,60\\\
    u201362, considerable effort\\nhas been devoted to building knowledge graphs from biomedical literature28,31,40 and clinical\
    \ records29,30,34,63.\\nAs early efforts to investigate the connection between clinical manifestations of diseases and\
    \ their underlying\\nmolecular interactions, the Human diseases network (HDN) and Human symptoms-disease network (HSDN)\\\
    nhave been influential in demonstrating the relevance of disease-centric knowledge graphs64,65. Scalable Precision\\nMedicine\
    \ Open Knowledge Engine (SPOKE) network is a seminal effort that linked many heterogeneous bio-\\nmedical databases to\
    \ build a knowledge graph focused on diseases38. Although SPOKE is limited to 137 diseases\\nand lacks multimodal connections\
    \ between textual clinical guidelines and tabular molecular data, it has enabled\\nmany precision medicine efforts, including\
    \ overlaying individual patient information onto the SPOKE\\u2019s graph35.\\nAnother knowledge graph focused exclusively\
    \ on rare diseases, Genetic and Rare Diseases Information Center\\n(GARD)34, has advanced understanding of unmet medical\
    \ needs and evidence-based studies for patients with\\nunder-diagnosed diseases66,67. Most recently, a White House initiative\
    \ led the development of the COVID-19\\nOpen Research Dataset (CORD-19)68. CORD-19 is designed to empower data-driven\
    \ medicine during the pan-\\ndemic by powering neural search engines for healthcare workers69,70 and providing insights\
    \ into drug repur-\\nposing opportunities71. Collectively, biomedical knowledge graphs have lent themselves to a variety\
    \ of scientific\\ndiscoveries72,73, methodological innovations74\\u201376 and coordinated initiatives for model evaluation\
    \ and bench-\\nmarking32,36,77. Further, knowledge graphs facilitated research across various problems faced by the biomedical\\\
    ncommunity. Nevertheless, due to the medical heterogeneity of diseases, the multimodal nature of disease infor-\\nmation,\
    \ and the incompatibility of existing disease repositories, knowledge graphs focused on diseases have not\\nyet achieved\
    \ the scale or impact of biomedical efforts.\\nPrecision Medicine Knowledge Graph (PrimeKG) is a knowledge graph providing\
    \ a holistic and multimodal\\nview of diseases. We integrate 20 high-quality resources, biorepositories, and ontologies\
    \ to curate this knowledge\\ngraph. Across 129,375 nodes and 4,050,249 relationships, PrimeKG captures information on\
    \ ten major biolog-\\nical scales, including disease-associated perturbations in the proteome, biological processes, molecular\
    \ path-\\nways, anatomical and phenotypic scales, environmental exposures, and the range of approved and experimental\\\
    ndrugs together with their therapeutic action (Fig.\\u00a01a,b). We demonstrate that PrimeKG improves on coverage of\\\
    ndiseases, both rare and common, by one-to-two orders of magnitude compared to existing knowledge graphs.\\nMoreover,\
    \ disease nodes in PrimeKG are densely connected to many other node types, including phenotypes,\\nexposures, and drugs.\
    \ We tune PrimeKG specifically to support artificial intelligence analyses to understand\\nhow drugs target disease-associated\
    \ molecular perturbations by including an abundance of \\u2018indications\\u2019, \\u2018contra-\\ndictions\\u2019, and\
    \ \\u2018off-label use\\u2019 drug-disease edges, which are usually missing or sparse in other knowledge graphs.\\nWe\
    \ supplement PrimeKG\\u2019s graph structure with textual descriptions of clinical guidelines for drug and disease\\nnodes\
    \ to enable multimodal analyses (Fig.\\u00a01c). Finally, we address the disease entity resolution challenge by\\nimproving\
    \ the correspondence between diseases in PrimeKG and disease subtypes found in the clinic to enable\\nPrimeKG-powered\
    \ analyses in precision medicine.\"\n  },\n  {\n    \"name\": \"Methods\",\n    \"text\": \"We proceed with a detailed\
    \ description of the 20 primary data resources used to build PrimeKG. Table\\u00a01 lists\\nprimary data resources organized\
