    \ information such as hierarchical relationships and extracting pathway-protein interactions.\\nThe processed data contains\
    \ 5,070 pathway-pathway and 85,292 protein-pathway edges.\\nSide effect knowledgebases.\\u2003 The Side Effect Resource\
    \ (SIDER)96 contains data about adverse drug reactions.\\nWe retrieved side-effect data (SIDER 4.1 version) from http://sideeffects.embl.de/media/download/meddra_\\\
    nall_se.tsv.gz and SIDER\\u2019s drug to Anatomical Therapeutic Chemical (ATC) classification mapping from http://\\nsideeffects.embl.de/media/download/drug_atc.tsv\
    \ on 31 May 2021. Processing involved extracting all side\\neffects where the MedDRA term was coded at the preferred term\
    \ level and then mapping drugs from STITCH\\nidentifiers97 to ATC identifiers. The processed data 202,736 contains drug-phenotype\
    \ associations.\\nUberon multi-species anatomy ontology.\\u2003 Uberon98 is an ontology that contains information about\
    \ the human anat-\\nomy. We retrieved the ontology from http://purl.obolibrary.org/obo/uberon/ext.obo on 31 May 2021.\
    \ Processing\\ninvolved extracting information about anatomy nodes and the relationships between them. The processed\\\
    ndata contains 28,064 hierarchical relationships between anatomy nodes.\\nUMLS knowledgebase.\\u2003 The Unified Medical\
    \ Language System (UMLS) Knowledge Source46 contains infor-\\nmation about biomedical and health-related concepts. We\
    \ retrieved the complete UMLS Metathesauras from\\nhttps://download.nlm.nih.gov/umls/kss/2021AA/umls-2021AA-metathesaurus.zip\
    \ on 31 May 2021 in \\u2018.RRF\\u2019\\nformat. To map UMLS CUI terms to the MONDO Disease Ontology, we used the \\u2018MRCONSO.RRF\\\
