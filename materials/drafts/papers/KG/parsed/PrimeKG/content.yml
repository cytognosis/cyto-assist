    nwww.nature.com/scientificdata\\nwww.nature.com/scientificdata/\\nTechnical Validation\\nAs part of the technical validation,\
    \ we explore the structure and connectivity of PrimeKG.\\nDistinguishing properties of PrimeKG.\\nHere, we highlight four\
    \ distinguishing properties of PrimeKG.\\nWe provide evidence and statistical support for these claims about PrimeKG in\
    \ juxtaposition with three seminal\\nbiomedical knowledge graphs SPOKE38, HSDN65, and GARD34. Firstly, PrimeKG provides\
    \ coverage for an exten-\\nsive range of diseases. Our knowledge graph comprises 22,236 disease terms that are then grouped\
    \ into 17,080\\nclinically meaningful diseases. Compared to existing graphs such as SPOKE, HSDN, and GARD, PrimeKG pro-\\\
    nvides an improvement in disease coverage by one to two orders of magnitude. Next, while these existing resources\\nprimarily\
    \ contain \\u201ctreats\\u201d or indication edges between drugs and diseases, PrimeKG provides more intricate\\nrelationships\
    \ with indication, contraindication, and off-label use edges.\\nMoreover, PrimeKG provides incredible coverage of rare\
    \ diseases while remaining integrated with the entire\\nrange of diseases. Orphanet48 is considered the definitive authority\
    \ on rare diseases. Of 9,348 rare diseases in\\nOrphanet, 90.8% are present in PrimeKG as disease nodes. Previously, knowledge\
    \ graphs have either scarce\\ncoverage of rare diseases (e.g., SPOKE, HSDN) or an exclusive focus on them (e.g., GARD).\
    \ PrimeKG embraces\\nthe entire range of conditions from rare to prevalent across its 22,236 disease terms. Finally, PrimeKG\
    \ is multi-\\nmodal and contains clinical features for drugs and diseases. Traditionally, knowledge graphs have been defined\\\
    nsolely as relationships between their nodes. These graph relationships tend to encode biological and molecular\\ninformation\
    \ but lack medically relevant descriptions. PrimeKG integrates clinically meaningful text descrip-\\ntions for drug and\
    \ disease nodes. This multimodality of PrimeKG enables the fusion of medical and molecular\\nknowledge.\\nPrimeKG is easy\
    \ to use and update.\\nPrimeKG is available as a single set of triplets of source nodes,\\nrelations, and target nodes.\
    \ This data structure is agnostic to computing preferences and can be read using any\\nprogramming language. We use Harvard\
    \ Dataverse102 to make PrimeKG available in a single user-friendly CSV\\nfile so that there is no need for the user to\
    \ connect to any external databases. Although PrimeKG has millions of\\nedges, it can be loaded into memory using a standard\
    \ CPU in less than 5.18\\u2009seconds\\u2009\\u00b1\\u200951.9\\u2009milliseconds. Queries\\non the knowledge graph generally\
    \ take less than 1\\u2009second. Once loaded, PrimeKG can be converted into a graph\\nstructure through various commonly\
    \ used libraries (such as iGraph or NetworkX for Python). We also provide\\ntutorials for getting started and links to\
    \ community data loaders on our GitHub repository.\\nThe provenance of PrimeKG can be easily tracked on Harvard Dataverse102.\
    \ All our data curation and pro-\\ncessing approaches are transparent, fully reproducible, and can be continually adapted\
    \ as data resources evolve\\nand new data become available. We have provided detailed instructions on \\u201cBuilding\
    \ an updated PrimeKG\\u201d\\non our PrimeKG GitHub repository. Complete information is given here for (a) downloading\
    \ primary data\\nrecords, (b) processing data for each primary record along with script names and expected outputs, and\
    \ (c) a\\nready-to-run Jupyter notebook to build an updated PrimeKG. After building an initial version of PrimeKG,\\nusers\
    \ can update individual resources as necessary.\\nA case study to evaluate the relevance of PrimeKG to the clinical presentation\
