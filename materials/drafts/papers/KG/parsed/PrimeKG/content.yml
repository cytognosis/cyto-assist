  sections: "[\n  {\n    \"name\": \"Background & Summary\",\n    \"text\": \"Precision medicine takes an approach to disease\
    \ diagnosis and treatment that accounts for the variability in\\ngenetics, environment, and lifestyle across individuals1.\
    \ To be precise, medicine must revolve around data and\\nlearn from biomedical knowledge and health information2. Nevertheless,\
    \ many barriers to efficiently exploiting\\ninformation across biological scales slow down the research and development\
    \ of individualized care2. While\\nmany have acknowledged the difficulties in linking biomedical knowledge to patient-level\
    \ health informa-\\ntion2\\u20135, few realize that biomedical knowledge is itself fragmented. Biomedical knowledge about\
    \ complex dis-\\neases comes from different organizational scales, including genomics, transcriptomics, proteomics, molecular\\\
    nfunctions, intra- and inter-cellular pathways, phenotypes, therapeutics, and environmental effects. For any given\\ndisease,\
    \ information from these organizational scales is scattered across publications, non-standardized data\\nrepositories,\
    \ evolving ontologies, and clinical guidelines. Developing networked relationships between these\\nsources can support\
    \ research in precision medicine.\\nA resource that comprehensively describes the relationships of diseases to biomedical\
    \ entities would enable\\nsystematic study of human disease. Understanding the connections between diseases, drugs, phenotypes,\
    \ and\\nother entities could open the doors for many types of research, including but not limited to the study of phe-\\\
    nnotyping6\\u20138, disease etiology9, disease similarity10, diagnosis11\\u201313, treatments14, drug-disease relationships15\\\
    u201317,\\nmechanisms of drug action18 and resistance3, drug repurposing19\\u201321, drug discovery22,23, adverse events24,25,\
    \ and\\ncombination therapies26. Knowledge graphs developed for individual diseases have yielded insights into respec-\\\
    ntive disease areas27\\u201342. Nevertheless, the costs and extended timelines of these individual efforts point to a\
    \ need\\nfor a resource that would unify biomedical knowledge and enable the investigation of diseases at scale.\\nWhile\
    \ many primary data resources contain information about diseases, consolidating them into a com-\\nprehensive, disease-rich,\
    \ and functional knowledge graph presents three challenges. First, existing approaches\\nto network analysis of diseases\
    \ require expert review and curation of data in the knowledge graph29,30,43. While\\nincredibly detailed, such efforts\
    \ require substantial manual labor and expensive expert input, making them\\ndifficult to scale. Second, there lacks a\
    \ consistent representation of diseases across biomedical datasets and\\n1Harvard-MIT Program in Health Sciences and Technology,\
