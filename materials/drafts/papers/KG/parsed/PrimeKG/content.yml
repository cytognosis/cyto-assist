    \ features\\ninclude the disease prevalence information, symptoms, causes, risk factors, epidemiology, clinical description,\\\
    nmanagement and treatment, complications, prevention, and when to see a doctor. Drug features include molec-\\nular weight\
    \ of chemical compounds, indications, mechanisms of action, pharmacodynamics, protein binding\\nevents, and pathway information.\
    \ Figure\\u00a01c provides an example of the supporting information available across\\nthese features.\\nThe PrimeKG knowledge\
    \ graph has nodes of 10 types and uses the following terminologies and ontologies\\nto describe the nodes. The node types\
