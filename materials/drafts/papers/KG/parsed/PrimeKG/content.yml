    u2019s repository as \\u2018kg_raw.csv\\u2019. To ensure that PrimeKG is well-connected and\\nhas no isolated pockets,\
    \ we extracted its largest connected component using the iGraph package100. Intuitively,\\nextracting the largest connected\
