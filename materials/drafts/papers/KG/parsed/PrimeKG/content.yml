    nheterogeneity has also been studied to identify clinically meaningful subtypes56,57. We gauged the relevance of\\ndisease\
    \ nodes related to autism in PrimeKG in two steps: first, by performing the entity resolution for autism\\nconcepts across\
    \ all relevant primary data resources (see Data Record), and second, by examining the relationship\\nbetween these autism\
    \ concepts and clinical subtypes of autism.\\nWe start by exploring whether autism disease nodes in PrimeKG reconciled\
    \ the variation in autism concepts\\nacross databases and ontologies. For example, as demonstrated in Fig.\\u00a03a, MONDO\
    \ disease ontology has 37\\ndisease concepts related to autism, whereas the UMLS has 192 autism-associated concepts, and\
    \ Orphanet has\\n6 autism-associated concepts. Although it is not immediately clear how these concepts relate to each\
    \ other, we\\ncannot develop a coherent knowledge graph without establishing connections between them. To this end, we\\\
    novercome this challenge by defining all nodes using the MONDO disease ontology and mapping all other vocab-\\nularies\
    \ to diseases in MONDO as outlined in Fig.\\u00a03a.\\nFinally, before using MONDO disease concepts as disease nodes in\
    \ PrimeKG, we need to assess whether\\nautism disease concepts in MONDO correlate with clinical subtypes of autism. Autism\
    \ has been shown to man-\\nifest as three clinical subgroups characterized primarily by seizures, multisystem and gastrointestinal\
    \ disorders,\\nand psychiatric disorders57. However, it was unclear how MONDO\\u2019s 37 autism disease concepts (Fig.\\\
    u00a03a) relate\\nto the three clinically defined subtypes. In addition, there were many disease concepts in autism, such\
    \ as \\u2018Autism,\\nsusceptibility to, 1\\u2019, \\u2018Autism, susceptibility to, 2\\u2019, \\u2018Autism, susceptibility\
    \ to, x-linked\\u2019, etc., with no apparent clinical\\nmeaning, suggesting that disease nodes in MONDO do not correspond\
    \ one-to-one to clinical manifestation of\\nautism. For this reason, we developed a strategy to group diseases from MONDO\
    \ into medically relevant and\\ncoherent nodes in PrimeKG. We proceed with describing and evaluating that strategy.\\\
    nComputational approaches to grouping disease nodes.\\nAs demonstrated in our case study of autism,\\ndisease concepts\
    \ in MONDO may not correlate well with medical subtypes. MONDO contains many repetitive\\ndisease entities with no apparent\
    \ clinical correlation. For this reason, we were motivated to group diseases in\\nMONDO into medically relevant entities.\
    \ Ideally, we would have preferred leveraging expertise across various\\ndisease areas when grouping these concepts. However,\
    \ this approach was time-consuming, expensive, and chal-\\nlenging to execute at scale. Further, disease sub-phenotyping\
    \ is a relatively new paradigm, so we anticipated low\\nconsensus among medical experts on what constitutes a unique disease.\\\
    nSince manually grouping diseases with expert supervision was not feasible, we took a semi-automated unsu-\\npervised\
    \ approach to group disease concepts in PrimeKG. Advances in natural language processing, specifically\\nthe Bidirectional\
    \ Encoder Representations from Transformers (BERT) model101, allowed us to study the similar-\\nity between disease concept\
    \ names. We grouped disease concepts with nearly identical names into a single node\\nwith string matching and BERT embedding\
    \ similarity101,106\\u2013109.\\nWe identified disease groups using a string-matching strategy across disease names110.\
    \ In this strategy, we\\nselected a disease that ended with a number, a roman numeral, or any alphanumeric phrase with\
    \ a length of\\nless than 2, or \\u2018type\\u2019 as the second-last word. Once such a disease was selected, we extracted\
    \ the primary disease\\nphrase by dropping the ending and used this phrase to find matches. Matches included diseases\
    \ with the same\\ninitial phrase and those containing all phrase words with no other words, regardless of word order.\
    \ The words\\n\\u2018type\\u2019 and \\u2018(disease)\\u2019 were ignored for the latter matching criteria. In this manner,\
    \ we grouped disease concepts\\nin MONDO with string matching.\\nWe further tightened groupings identified using string\
    \ matching by exploring word embedding similarities\\nbetween disease names, which is visualized in Fig.\\u00a03b. In\
    \ natural language processing, word embeddings have\\nbeen widely and successfully used to resolve conflicting and redundant\
    \ entities in an unsupervised manner110\\u2013112,\\nand deep language models such as BERT101 can produce semantically\
    \ meaningful word embeddings. Specifically,\\nClinicalBERT113 is a BERT language model that encodes medical notions of\
    \ semantics because it has been\\npre-trained on biomedical knowledge from PubMed114 and discharge summaries from MIMIC-III115.\
    \ We used\\nClinicalBERT to extract word embeddings for disease group names identified during string matching. We also\\\
    ndefined the similarity between two disease names as the cosine distance between their ClinicalBERT embeddings.\\nThen,\
    \ after applying an empirically chosen cutoff of similarity \\u22650.98, we manually approved the suggested disease\\\
    nmatches and assigned names to the new groups. Finally, these groupings were applied to the knowledge graph.\\nFinally,\
    \ 22,205 disease concepts in MONDO were collapsed into 17,080 grouped diseases, which has resulted\\nin a higher average\
    \ edge density across diseases and more clinically relevant disease nodes. We anticipate that\\nPrimeKG is a powerful\
    \ dataset with this grouping because disease representations are dense and robust.\\nSystematic evaluation of PrimeKG.\\\
    nGiven the substantial investment and time required to develop a\\nnovel drug, network analysis has long been used to\
    \ identify opportunities for expanding the use of already avail-\\nable drugs116. We demonstrate that PrimeKG can help\
    \ detect drug repurposing opportunities. For this validation,\\nwe systematically retrieved 40 novel therapies approved\
    \ by the FDA since June 2021. PrimeKG contains informa-\\ntion up to 1 June 2021, limiting data leakage from PrimeKG to\
    \ these therapies.\\nOf these 40 recent FDA-approved therapies, we identified 11 repurposed drugs in PrimeKG as listed\
    \ in\\nTable\\u00a05 and the remaining were novel compounds. We identified the disease corresponding to the indication\
    \ for\\neach drug and conducted network proximity calculations between relevant drug-disease pairs. As a first step,\\\
    nwe would expect that only a few drug-disease pairs would have direct indication edges between them. However,\\nas shown\
    \ in Table\\u00a05, only one pair has such an edge, confirming that there has been no temporal data leakage.\\nWe conducted\
    \ network analysis on these pairs by studying the shortest path distance between the repurposed\\ndrug and indicated disease.\
    \ For each drug, we conducted permutation analysis by sampling 1000 non-indicated\\ndiseases and calculating the mean\
    \ randomized shortest path distance with 95% confidence intervals between these\\n\\n12\\nScientific Data |          \
    \ (2023) 10:67  | https://doi.org/10.1038/s41597-023-01960-3\\nwww.nature.com/scientificdata\\nwww.nature.com/scientificdata/\\\
    npairs. Further, we applied a non-parametric statistical analysis that tested the number of times the indicated short-\\\
    nest path distance was greater than the random shortest path distance and applied a Bonferroni correction to obtain\\\
    nthe significance. At a threshold of P\\u2009\\u2264\\u20090.05, relevant drugs are much closer to the indicated diseases\
    \ than expected\\nby random chance in 8 out of 10 cases (Table\\u00a05). For example, in the case of familial hypercholesterolemia,\
    \ one\\nwould need to parse through only 3.4% of drugs in PrimeKG to find a positive hit. This analysis demonstrates the\\\
    nutility of PrimeKG for drug repurposing and provides additional evidence that PrimeKG is a high-quality dataset.\\nThe\
    \ potential uses of PrimeKG are vast. PrimeKG describes drug features on a deeper biological level and\\ndisease features\
    \ on a deeper clinical level, which can be used to explain genotype-phenotype associations in\\nterms of genes, pathways,\
    \ or any other nodes in an extensive knowledge graph, like PrimeKG. Consequently,\\nPrimeKG can be paired with deep graph\
    \ neural networks117 to help identify disease biomarkers, characterize\\ndisease processes, hone disease classification,\
    \ identify phenotypic traits, and repurpose drugs. With the imple-\\nmentation of machine learning functionality, we anticipate\
    \ that PrimeKG and similar knowledge graphs will\\nbecome critical tools in advancing precision medicine.\\na\\nb\\nStandardized\
    \ ontologies and databases\\nMedical literature\\nClinical subtypes\\nof autism\\nMONDO [37 terms]\\nUMLS [92 terms]\\\
