    \ metabolic-pathway, kinase-substrate and protein complex interactions, which are\\nconsidered unweighted and undirected.\
    \ We use the human PPI network compiled by Menche et al.87 as the start-\\ning resource. This resource integrates several\
    \ protein-protein interaction databases, including TRANSFAC for\\nregulatory interactions88, MINT and IntAct for yeast\
    \ to hybrid binary interactions89,90, and CORUM for protein\\ncomplex interactions91. Additionally, we retrieve protein-protein\
    \ interaction information from from BioGRID92\\nand STRING93 databases. We also consider the human reference interactome\
    \ (HuRI) generated by Luck et al.94,\\nspecifically, we use the high throughput investigation (HI) union, a combination\
    \ of HuRI and several related\\nefforts to systematically screen for protein-protein interactions. The processed data\
    \ contains 642,150 edges.\\nReactome pathway database.\\u2003 Reactome95 is an open-source, curated database for pathways.\
