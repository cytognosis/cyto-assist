    nvocabulary from https://go.drugbank.com/releases/5-1-8/downloads/all-drugbank-vocabulary on 31 May 2021.\\nThese were\
    \ used to map nodes in PrimeKG to consistent ontologies.\\nB. Standardizing and harmonizing data resources.\\nTo harmonize\
    \ these primary resources into\\nPrimeKG, we selected ontologies for each node type, harmonized datasets into a standardized\
    \ format, and\\nresolved overlap across ontologies. The process of defining node types and selecting common ontologies\
    \ is illus-\\ntrated in Fig.\\u00a02a where primary data records are colored if they are used to define unique identifiers\
    \ for a node\\ntype. In the remainder of this study, we interchangeably refer to \\u2018gene/protein\\u2019 nodes as proteins\
    \ and \\u2018effect/\\nphenotype\\u2019 nodes as phenotypes. We mapped the aforementioned processed resources to ensure\
    \ that all nodes\\nwere defined using unique identifiers from their respective ontologies and databases. Next, we identified\
    \ sources\\nof information across different primary resources for each node type to maximize the number of relationships\
    \ in\\nPrimeKG (Fig.\\u00a02b).\\nResolving overlap between phenotype and disease nodes.\\u2003 Since both the MONDO Disease\
    \ Ontology44 and\\nHuman Phenotype Ontology45 were developed by the Monarch Initiative, there exists a considerable overlap\\\
    nbetween phenotype nodes and disease nodes across the various datasets. Overlapping nodes were defined as\\neffect/phenotype\
    \ nodes in HPO that (i) had the same ID number as disease nodes in MONDO and (ii) could\\nbe mapped from HPO to MONDO\
    \ using cross-references found in MONDO. These overlapping phenotype\\nnodes were converted to disease nodes by manipulating\
    \ edges in various datasets to avoid duplicate nodes. Let\\nus define the set of overlapping phenotype nodes as P. Phenotype-phenotype\
    \ edges extracted from HPO were\\nconverted to phenotype-disease edges if one phenotype node was in P and to disease-disease\
    \ edges if both phe-\\nnotype nodes were in P. Protein-phenotype edges extracted from DisGeNet78 were converted to protein-disease\\\
    nrelations if the phenotype node was in P and removed from the group of protein-phenotype edges. Finally, for\\ndisease-phenotype\
    \ and drug-phenotype relations, we dropped any edges where the phenotype was in P. Adding\\nthese edges to drug-disease\
    \ relations would only introduce unnecessary noise to the indication, contraindica-\\ntion, and off-label use edges.\\\
    nC. Building precision medicine knowledge graph (PrimeKG).\\nTo create PrimeKG\\u2019s graph, we merged\\nthe harmonized\
    \ primary data resources into a graph and extracted its largest connected component as shown in\\nFig.\\u00a02c. We integrated\
