    \ 10 types of nodes, 30 types of undirected edges, and nat-\\nural language descriptions for disease and drug nodes. PrimeKG\
    \ contains 129,375 nodes and 4,050,249 edges.\\nFigure\\u00a01a shows a schematic overview of the graph structure. We\
