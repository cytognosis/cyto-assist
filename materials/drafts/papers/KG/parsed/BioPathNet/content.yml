    \ and density\\ninstead of uniformly sampling negative triplets.\\nBioPathNet accurately predicts links across different\\\
    nbiomedical tasks\\nOverview of the different LP tasks. We evaluate BioPathNet on bio-\\nmedical LP across four distinct\
    \ tasks, framing the problem as learning\\nthe distribution of logical rules from a KG, and use the learned rules to\\\
    nperform inference, that is, predict new links on the same graph (trans-\\nductive setting) or on a new graph (inductive\
    \ setting). We evaluate\\nBioPathNet across diverse biomedical tasks, testing its adaptability to\\nKGs of varying size,\
    \ complexity, sparsity, noise and bias.\\nThe first LP task we evaluate with BioPathNet is \\u2018gene function\\nprediction\\\
    u2019, which consists of assigning biological terms, such as\\nmolecular pathways, to specific genes (Fig. 2a). We use\
    \ as G1, a KG\\nlinking genes to pathway terms from KEGG via the \\u2018function of\\u2019 rela-\\ntion, sourced from\
    \ ConsensusPathDB58 and consisting of 32,000\\nedges (Supplementary Table 1). G1 is then split into training, valida-\\\
    ntion and testing edges. During training, training triplets are used for\\nmessage passing (that is, referred to as training\
    \ graph from G1), while\\nremoving the specific triplets of the batch for learning path repre-\\nsentations. This graph\
    \ is also used during validation and testing, in\\naddition to a potential G2/BRG (see below). In this context, if gene\
    \ x\\nhas functions y and z, and gene w is assigned to function z, then gene\\nw is also likely to have function y, and\
    \ we can think of BioPathNet as\\nlearning logical rules such as: \\u2018function_of(y, x) \\u2227 function_of(z, x) \\\
    u2227\\nfunction_of(z, w) \\u2192 function_of(y, w)\\u2019 (Fig. 2a). Introducing a BRG for\\nmessage passing (G2) (connected\
    \ to the original G1, extracted from\\nPathway Commons59\\u201361 encompassing ~1.8 million edges and 13 dif-\\nferent\
    \ relation types between genes and chemicals, including PPIs\\n(Supplementary Tables 1 and 2)) allows BioPathNet to infer\
    \ gene\\u2013\\nfunction links through alternative paths, enabling the learning of\\nmore expressive rules. For example,\
    \ if gene x has function k, inter-\\nacts with gene k in a PPI network, and gene z phosphorylates gene\\nw, then gene\
    \ w is also likely to be assigned to function y. This can be\\nexpressed as the following logical rule: \\u2018function_of(y,\
    \ x) \\u2227 interact(x,\\nk) \\u2227 phosphorylation(k, w) \\u2192 function(y, w)\\u2019 (Fig. 2a).\\nThe next LP task\
    \ predicts disease\\u2013drug indications by repurpos-\\ning existing drugs for new conditions using PrimeKG (Supplementary\\\
    nFig. 1a)53 (see Methods). This task is more challenging than the previous\\none, as it is conducted in a zero-shot setting\\\
    u2014where the target disease\\nhas minimal molecular characterization and no existing treatments\\u2014\\nfollowing the\
    \ approach from TxGNN54, a state-of-the-art node- and\\nrelation-based embedding method for this task (see Methods). We\\\
    napplied BioPathNet to five disease areas: \\u2018adrenal gland,\\u2019 \\u2018anaemia,\\u2019\\n\\u2018cardiovascular,\\\
    u2019 \\u2018cell proliferation,\\u2019 and \\u2018mental health\\u2019, splitting the\\ntask into corresponding subtasks.\
    \ BioPathNet was trained on drug\\u2013\\ndisease edges (for example, \\u2018indication\\u2019, \\u2018contraindication\\\
    u2019) of all other\\ndiseases except for the disease area of interest, while the remaining\\nPrimeKG graph served as\
    \ the BRG (G2) for message passing. A BRG with\\n~5.7 million edges and 30 relation types for message passing, including\\\
    ndrug\\u2013drug, protein\\u2013protein and disease\\u2013disease interactions from\\nPrimeKG, was solely used for message\
    \ passing (Supplementary Table 3).\\nIn this zero-shot prediction context (Fig. 2b), if drug x is indicated\\nfor disease\
    \ y, which shares the same disease protein k with disease\\nw, then drug x is probably an indication for w: \\u2018indication(x,\
    \ y) \\u2227 dis-\\nease_protein(y, k) \\u2227 disease_protein(w, k) \\u2192 indication(x, w)\\u2019.\\nThe third LP task\
    \ focuses on predicting links between synthetic\\nlethality gene pairs (Fig. 2c). SL occurs when the simultaneous muta-\\\
    ntion of two genes leads to cell death, while the mutation of either gene\\nalone is non-lethal62, and this is of high\
    \ interest in anti-cancer therapies.\\nData from SynLethDB-v.2.0, pre-processed by KR4SL55, includes SL\\npairs curated\
    \ from biochemical assays, databases, predictions and text\\nmining, with confidence scores prioritizing experimental\
    \ evidence.\\nThe G1 graph contains ~20,000 gene\\u2013gene SL edges, and learning logi-\\ncal rules in this setting (without\
    \ a BRG) corresponds to, for example:\\n\\u2018synth_leth(x, z) \\u2227 synth_leth(z, y) \\u2192 synth_leth(x, y)\\u2019,\
    \ that is, if x and z are\\nan SL pair and z and y are an SL pair, then x and y are likely to be an SL pair.\\nWhen including\
    \ a BRG (G2), this adds ~380,000 connections across 48\\nrelation types, including additional SL links and gene\\u2013Gene\
    \ Ontology\\n(GO) term association links under \\u2018molecular function\\u2019, \\u2018cellular pro-\\ncess\\u2019 and\
    \ \\u2018cellular compartment\\u2019 categories on top of the training graph\\nfrom G1. In this case, BioPathNet can learn\
    \ more sophisticated rules of\\nthe type: \\u2018synth_leth(x, z) \\u2227 contributes_to(z, w) \\u2227 contributes_to(y,\
    \ w)\\n\\u2192 synth_leth(x, y)\\u2019, where a path through genes z and y and their shared\\nmolecular function k under\
    \ the relation \\u2018contributes_to\\u2019 is chosen to\\ninfer an SL relationship between x and y.\\nThe final LP task\
    \ applies BioPathNet to predicting regulatory\\ninteractions between long non-coding RNAs (lncRNAs) and genes\\n(Fig.\
    \ 2d). LncRNAs\\u2014transcripts over 200 nucleotides long that do not\\nencode proteins\\u2014play essential roles in\
    \ gene regulatory networks and\\nare implicated in numerous diseases. However, most remain function-\\nally non-characterized\
    \ despite genomic consortia63 estimating over\\n200,000 potential transcripts. Identifying lncRNA targets is a crucial\\\
    nstep in understanding their functions, and predictive methods are\\ninvaluable in this process to guide experiments.\
    \ The G1 graph for this\\ntask was built from regulatory lncRNA\\u2013target (gene\\u2013mRNA) interac-\\ntions sourced\
    \ from LncTarD (2.0)64, which contains ~6,000 experi-\\nmentally validated lncRNA\\u2013target interactions in human diseases,\\\
    ncategorized into seven regulatory mechanisms (including \\u2018epigenetic\\u2019,\\n\\u2018transcriptional\\u2019 and\
    \ \\u2018sponge regulation\\u2019) (Supplementary Tables 4\\nand 5). The BRG (G2), sourced from Pathway Commons, is the\
    \ same G2\\nused for gene function prediction. Since small chemical molecules lack\\ndirect links to lncRNAs, we included\
