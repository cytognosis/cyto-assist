    \ as illustrated in Fig. 1d, when predicting the missing link\\nbetween a head node and a tail node, messages can be passed\
    \ between\\ntype 1 and type 2 nodes, resulting in a certain prediction path (Fig. 1d).\\nAlternatively, as illustrated\
    \ in Fig. 1e, a BRG can be integrated, and\\npredictions are made going through the relation edges involving node\\ntypes\
    \ 2 and 3. The integration of a BRG in BioPathNet enhances both\\nprediction accuracy and interpretability, demonstrated\
    \ in the follow-\\ning sections, by enriching the representation of the primary task. This\\nenables the exploration of\
    \ subnetworks, such as interaction partners\\naround specific node pairs, facilitating the derivation of mechanistic\\\
