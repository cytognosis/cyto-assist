  sections: "[\n  {\n    \"name\": \"methods are limited in capturing this complexity. We present BioPathNet,\",\n    \"text\"\
    : \"a graph neural network framework based on the neural Bellman\\u2013Ford\\nnetwork (NBFNet), addressing limitations\
    \ of traditional representation-based\\nlearning methods through path-based reasoning for LP in biomedical\\nknowledge\
    \ graphs. Unlike node-embedding frameworks, BioPathNet learns\\nrepresentations between node pairs by considering all\
    \ relations along paths,\\nenhancing prediction accuracy and interpretability, and allowing visualization\\nof influential\
    \ paths and biological validation. BioPathNet leverages a\"\n  },\n  {\n    \"name\": \"background regulatory graph for\
    \ enhanced message passing and uses\",\n    \"text\": \"stringent negative sampling to improve precision and scalability.\
    \ BioPathNet\\noutperforms or matches existing methods across diverse tasks including\\ngene function annotation, drug\\\
    u2013disease indication, synthetic lethality\\nand lncRNA\\u2013target interaction prediction. Our study identifies promising\\\
    nadditional drug indications for diseases such as acute lymphoblastic\\nleukaemia and Alzheimer\\u2019s disease, validated\
    \ by medical experts and clinical\\ntrials. In addition, we prioritize putative synthetic lethal gene pairs and\\nregulatory\
    \ lncRNA\\u2013target interactions. BioPathNet\\u2019s interpretability will\\nenable researchers to trace prediction\
    \ paths and gain molecular insights.\\nBiological entities interact in complex ways, crucial for sustaining life1.\\nUnderstanding\
    \ these interactions is central to systems biology, with\\nnetwork analysis playing a key role2. Biological networks are\
    \ repre-\\nsented as graphs, where nodes can represent genes, proteins, diseases\\nand more, and edges denote associations\
    \ between them. Edges in a\\nbiological graph can signify co-regulation between genes or causal\\nrelationship (regulatory\
    \ network)3,4, physical interactions (in protein\\u2013\\nprotein interaction networks (PPI)5,6), as well as disease\\\
    u2013gene associa-\\ntions (such as in disease\\u2013gene networks7,8), among many.\\nDespite increasing high-throughput\
    \ experiments, our grasp of\\nbiological networks is incomplete, leaving many interactions undis-\\ncovered. Due to the\
    \ expense and time involved in wet lab experiments,\\ncomputational methods such as link prediction (LP) are very important\\\
    nfor inferring potential associations within these networks based on the\\nunderlying topology9. LP is applied across\
    \ network biology for diverse\\ntasks ranging from predicting protein interactions to inferring gene\\nregulatory networks10.\
    \ By revealing hidden connections, LP facilitates\\nthe discovery of biomarkers, drug targets and insights into biological\\\
