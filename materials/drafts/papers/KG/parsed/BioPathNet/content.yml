    \ Annalisa Marsico.\\ne-mail: annalisa.marsico@helmholtz-munich.de\\n\\nNature Biomedical Engineering\\nArticle\\nhttps://doi.org/10.1038/s41551-025-01598-z\\\
    nedge-specific attention mechanism. This approach preserves distinct\\nrepresentations for nodes and edges while leveraging\
    \ its architecture\\nto incorporate information from higher-order neighbourhoods to be\\nused in downstream tasks44.\\\
    nWith the rapid accumulation of biomedical data, understanding\\ndisease biology and molecular factors\\u2019 roles in\
    \ phenotypic outcomes\\nis crucial for personalized diagnostics and treatments. KGs have also\\nbecome the dominant knowledge\
    \ representation in biomedicine, lever-\\naging databases such as UniProt45, Gene Ontology46,47 and DrugBank48.\\nLP tasks\
    \ in biomedical KGs, such as the COVID-19 drug candidate explo-\\nration49 with RotatE and DistMult, OntoProtein\\u2019s\
    \ Gene Ontology-based\\nKG for protein language model pretraining50, and the node-embedding\\nalgorithms for multimodal\
    \ biomedical KGs51, enhance drug discovery\\nand predict disease co-morbidities. Further, task-specific KGs and\\nframeworks\
    \ such as BioCypher52 further support KG construction,\\naiding predictive modelling for drug adverse reactions, repurposing\\\
    nand biological concept associations. One of the latest state-of-the-art\\nbiomedical KG, PrimeKG, integrates 20 primary\
    \ resources including\\nDisGeNet, MONDO Disease Ontology and DrugBank53, encompass-\\ning 17,080 diseases and 4 million\
    \ relationships. It includes diverse\\ndisease-associated data such as protein perturbations, biological pro-\\ncesses,\
    \ pathways, phenotypes and drug therapeutic actions, including\\n\\u2018indications\\u2019 and \\u2018contraindications\\\
    u2019 drug\\u2013disease edges. The method\\nTxGNN54 leverages PrimeKG via the R-GCN framework, to perform\\nzero-shot\
    \ inference of drug\\u2013disease indications and contraindica-\\ntions on diseases with no known treatment and minimal\
    \ molecular\\nunderstanding, efficiently handling therapeutic tasks through adaptive\\naggregation and iterative optimization\
    \ of embeddings.\\nOn the basis of the assumption that representing head entities in a\\ngraph while considering their\
    \ path to specific tail nodes might enhance\\nrepresentation learning and lead to more accurate LPs, researchers\\nstarted\
    \ developing representation learning frameworks for LP based\\non the paths between two nodes. The first application of\
    \ this concept is\\nthe study from ref. 55, which introduce KG4SL, a graph neural network\\n(GNN) model that integrates\
    \ KG message-passing for synthetic lethal-\\nity (SL) prediction, leveraging a KG with 11 entity types and 24 relevant\\\
    nrelationships associated with SL. Further, the neural Bellman\\u2013Ford\\nnetwork (NBFNet) introduces a framework for\
    \ LP inspired by tradi-\\ntional path-based methods56. It represents node pairs as the sum of\\nall path representations\
    \ (of a given length), each derived from edge\\nrepresentations, and it employs a graph neural network with learned\\\
    noperators for efficient path formulation solutions, scalable to large\\ngraphs with low time complexity. NBFNet works\
    \ with both homogene-\\nous and multirelational graphs, supporting LP across different graph\\ntypes. Combining traditional\
    \ path-based methods with GNNs, NBFNet\\ndemonstrates superior performance compared with node-embedding\"\n  },\n  {\n\
    \    \"name\": \"methods. In addition, path-embedding methods offer better interpret-\",\n    \"text\": \"ability by visualizing\
    \ important paths used for prediction, facilitating\\nverification of biological plausibility.\\nTo tackle LP in biological\
    \ KGs, we introduce BioPathNet, a message-\\npassing neural network for path representation learning, built on\\nNBFNet.\
    \ As opposed to node-embedding approaches, BioPathNet\\nuses path-based reasoning to learn representations between source\\\
    nand target nodes on the basis of relations along the path. We introduce\\nkey design choices in BioPathNet to adapt and\
    \ extend the NBFNet algo-\\nrithm for LP tasks on biomedical KGs, which are inherently \\u2018noisy\\u2019 due\\nto false\
    \ positives from experiments, data sparsity, redundant edges\\nand relations, and knowledge bias (for example, well-studied\
    \ disease\\ngenes being overrepresented and highly connected). A crucial enhance-\\nment is the incorporation of a background\
    \ regulatory graph (BRG) for\\nmessage passing, which not only improves BioPathNet\\u2019s performance\\nbut also enhances\
    \ its scalability. This makes biomedical LP feasible\\nfor tasks such as drug repurposing, where running NBFNet out of\\\
    nthe box is computationally prohibitive. In addition, we implement a\\nbiological entity-type-aware negative sampling\
    \ scheme, which can\\ninteractions11,12. To predict potential relationships between uncon-\\nnected nodes, one prevalent\
    \ class of methods uses similarity metrics\\nfrom traditional graph analysis, such as Personalized PageRank, Jaccard\\\
    nor Katz index13,14. These metrics have been used for predicting disease\\u2013\\ngene associations15, including non-coding\
    \ RNA\\u2013disease relationships\\nand drug\\u2013disease associations16.\\nWhile traditional graph metrics have been\
    \ successful in biological\\nLP, representation-based learning offers greater expressiveness for\\ncapturing the nuances\
    \ and complexity of nodes in a graph. Nodes are\\nmapped to low-dimensional vector representations called embeddings\\\
    nusing shallow and deep nonlinear transformations. Optimized embed-\\ndings position nodes with similar network neighbourhoods\
    \ closely in\\nthe embedding space so that links between nodes can be predicted\\non the basis of their similarity in\
    \ this space17. Methods include matrix\\nfactorization (for example, Mashup18) and random walk approaches\\n(for example,\
    \ DeepWalk19, node2vec20, struc2vec21).\\nNetwork embedding techniques have been successful in drug\\nrepurposing, adverse\
    \ drug reaction prediction, gene function pre-\\ndiction and protein\\u2013protein interaction network completion22\\\
    u201325. For\\ninstance, ref. 26 introduced the multiscale interactome, integrating\\ndisease-associated proteins, drug\
    \ targets and biological functions\\nusing biased random walks for node embeddings. GeneWalk predicts\\ngene functions\
    \ via network representation learning with random\\nwalks27. Reference 28 constructed a multimodal network of genes\\\
    nand polygenic risk scores for diseases to uncover associations between\\nCOVID-19 genes, co-morbidities and genetic predispositions28\\\
    u201330.\\nRecent efforts use heterogeneous multirelational networks, more\\nspecifically knowledge graphs (KGs), to better\
    \ represent biological\\ncomplexities by modelling facts as subject\\u2013predicate\\u2013object (SPO)\\ntriplets. KG\
    \ research is increasingly applied to tasks such as question\\nanswering and information retrieval, with a key challenge\
    \ being LP by\\nestimating missing triplet components. Knowledge Graph Embedding\\n(KGE) effectively learns low-rank representations\
    \ of entities and rela-\\ntions, preserving graph structure and encoding relation semantics by\\noptimizing a training\
    \ loss that maximizes scores for positive triplets\\nwhile minimizing those for corrupted triplets31. KGE methods, such\\\
    nas TransE31, DistMult32, ComplEx33 and RotatE34, have shown notable\\nperformance in several benchmark tests, but they\
    \ are often limited\\nto one-hop relations. In large biomedical KGs, relationships between\\nentities are intricate and\
    \ may involve multihop paths. Methods such\\nas SEAL35 and Grail36 address this by embedding subgraph structures\\naround\
    \ links, but their scalability is limited due to the need to generate\\nsubgraphs for each link, creating bottlenecks\
    \ in large-scale predictions.\\nUnlike KGEs, deep learning methods\\u2014particularly graph con-\\nvolutional networks\
    \ (GCNs)37, a class of message passing neural\\nnetworks (MPNNs)\\u2014have substantially advanced KGEs38,39. These\\\
    nmodels have greatly improved performance in biological tasks such\\nas drug\\u2013target interaction prediction40,41,\
    \ polypharmacy side effect\\nmodelling25, tissue-specific protein function prediction23,24 and drug\\u2013\\ndisease indication\
    \ discovery42. In addition, they have been applied to\\nmultirelational and heterogeneous graphs to capture diverse entity\\\
    nassociation semantics.\\nFor example, the relational graph convolutional network (R-GCN)\\nfor multirelational KGs38\
    \ learns node embeddings by aggregating\\ntransformed feature vectors of neighbouring nodes via a normalized\\nsum and\
    \ uses the DistMult factorization model for LP. While R-GCN\\nincorporates relation-specific transformations based on\
    \ edge type\\nand direction, making it well suited for multirelational data in KGs, it\\ndoes not explicitly learn a representation\
    \ for relations. More expressive\"\n  },\n  {\n    \"name\": \"methods include relation-aware graph attention network\
    \ (RAGAT), a\",\n    \"text\": \"GAT-based model that utilizes relation-specific network parameters to\\nlearn embeddings\
    \ for both entities and relations, combining them into\\njoint embeddings for each relation type43. Similarly, the heterogeneous\\\
    ngraph transformer (HGT) models graph heterogeneity by employing\\nnode- and edge-type-dependent parameters, including\
    \ a node- and\\n\\nNature Biomedical Engineering\\nArticle\\nhttps://doi.org/10.1038/s41551-025-01598-z\\nbe combined\
    \ with adaptive sampling based on local graph density.\\nThis improves decision boundary accuracy across tasks and further\\\
    nboosts BioPathNet\\u2019s performance. We evaluated BioPathNet on diverse\\nbiomedical KGs with varying network properties,\
    \ relation types and\\nnode types, demonstrating its effectiveness in LP across multiple tasks,\\nincluding gene function\
    \ prediction, zero-shot disease\\u2013drug target\\ninteraction prediction, SL gene pair identification and long non-coding\\\
    nRNA (lncRNA)\\u2013gene regulatory inference. We show that the BRG not\\nonly improves BioPathNet\\u2019s scalability\
    \ over NBFNet but also enhances\\nperformance across all tasks. In addition, the node-type-aware (NTA)\\nnegative sampling\
    \ scheme improves decision boundary accuracy and\\nfurther boosts performance in most LP tasks.\\nBioPathNet was benchmarked\
    \ against the original NBFNet,\\nthree KGE baselines and seven state-of-the-art methods, including\\ntask-agnostic models\
    \ for heterogeneous graphs and long-range rela-\\ntionship learning, as well as LP task-specific approaches. We show that\\\
    nBioPathNet consistently outperforms these methods across tasks or,\\nin a few cases, achieves comparable performance.\\\
    nFinally, we showcase BioPathNet\\u2019s ability to naturally interpret\\npredictions through biological pathways and\
    \ uncover biological knowl-\\nedge. We illustrate this with two examples in disease\\u2013drug indication\\nprediction,\
    \ focusing on acute lymphoblastic leukaemia (ALL) and\\nAlzheimer\\u2019s disease (AD).\"\n  },\n  {\n    \"name\": \"\
    Results\",\n    \"text\": \"BioPathNet: path embedding as alternative to node\\nembedding for graph completion on biomedical\
    \ KGs\\nA KG is a heterogeneous directed graph comprising various types of\\nentity (nodes) connected by relationships\
    \ (edges). For instance, nodes\\nmight represent diseases, genes and drugs, and relationships such\\nas \\u2018indication\
    \ for\\u2019 or \\u2018involved in\\u2019. KGs are typically structured as tri-\\nplets (head node, relationship, tail\
    \ node), such as (drug A, indication,\\ndisease B) or (gene C, involved in, disease D). The task of KG comple-\\ntion\
    \ involves estimating the missing components of these triplets.\\nFor example, one might predict the tail entities given\
    \ a head entity\\nand a specific relationship, such as predicting drugs as indications\\nfor diseases, on the basis of\
    \ existing triplets (that is, existing know\\u00ad\\nledge). KG completion methods can be broadly categorized into\\nembedding-based\
    \ and path-based approaches (Fig. 1a). Embedding-\\nbased approaches encode entities in a KG into lower-dimensional\\\
    nspaces, preserving graph structure by minimizing distances or maxi-\\nmizing similarities between head, relation and\
    \ tail embeddings.\\nA path embedding-based LP approach, instead, captures the struc-\\ntural information of KGs by learning\
    \ representations for pairs of nodes\\n(instead of single nodes) through paths. Intuitively, path embeddings\\ncapture\
    \ logical relationships between head and tail nodes in a graph.\\nInstead of explicitly enumerating rules, as in traditional\
    \ logic-based LP,\\nthey represent paths as high-dimensional vectors and leverage neural\\nnetworks for a nonlinear learning\
    \ process. NBFNet56 learns node pair\\nrepresentations by parameterizing them as the generalized sum of\\npath representations,\
    \ with each path representation as the general-\\nized product of edge representations along the path (Figs. 1b and 7).\\\
    nThis path formulation can be efficiently solved using the generalized\\nBellman\\u2013Ford algorithm based on dynamic\
    \ programming. Moreover,\\nthe efficiency is further enhanced by learning the operators of the\\ngeneralized Bellman\\\
    u2013Ford algorithm with a message-passing graph\\nneural network (see Methods).\\nBioPathNet extends the NBFNet framework\
    \ to address the\\nunique challenges of biomedical KGs, which are large, incomplete,\\nprone to noisy relations due to\
    \ experimental errors or false positive\\nPath\\nrepresentation\\nNode\\nrepresentation\\nPrediction\\nof relationship\\\
    na    Two ways of KG completion\\nWithout BRG\\nWith BRG\\nBRG\\nc    Features of Biomedical KG\\nd    Link prediction\
    \ without BRG\\ne    Link prediction with BRG\\nh\\nr\\nt\\nh\\nt\\ng    SANS\\nh\\nt\\n1-hop neighbours from node h\\\
    n2-hop neighbours from node h\\nk-hop neighbourhood (k = 2)\\n.........\\nNegative triplets\\nInput\\nOutput\\nMessage\
    \ passing\\nb    Path-representation learning with BioPathNet\\nf    NTA negative sampling\"\n  },\n  {\n    \"name\"\
