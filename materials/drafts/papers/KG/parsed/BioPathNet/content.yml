    \ between a\\nsource node and other nodes, the source node is initialized with the query\\nembedding, while others are\
    \ set to zero (boundary condition). Message passing\\nis performed over t GNN layers (for example, t = 4), producing embeddings\
    \ that\\nrepresent paths from the source node. These embeddings are then fed into a\\nmultilayer perceptron (MLP) to predict\
    \ the query relation. b, Message passing\\n(for example, using the DistMult function (multiplication) for messages and\\\
    nsummation for aggregation): the embedding of node v (relative to source node u)\\nis updated on the basis of incoming\
    \ messages from neighbours x1, x2 and the\\nboundary condition. Messages are computed by multiplying neighbour\\nembeddings\
    \ (h(t\\u22121)\\nx1\\n, h(t\\u22121)\\nx2\\n) with relation embeddings (wq(x1, r1, v), wq(x2, r2, v))\\n(purple), aggregated\
    \ via summation (pink) and combined with h(0)\\nv  through a\\nlinear layer, layer norm and activation function (blue).\
    \ Relation embeddings\\n(wq(x1, r1, v), wq(x2, r2, v)) can be learned dynamically dependently on the query\\nq as Wrq\
    \ + br.\\n\\nNature Biomedical Engineering\\nArticle\\nhttps://doi.org/10.1038/s41551-025-01598-z\\nprediction (LP) methods\
    \ are crucial for inferring missing or potential\\nassociations by analysing network topology.\\nIn this work, we introduce\
    \ BioPathNet, in which we extend\\nNBFNet56, a message-passing neural network designed to leverage\\nthe power of path\
    \ representation learning for LP on biomedical KGs.\\nBioPathNet introduces several advancements compared to NBFNet,\\\
    nincluding the use of a BRG for improved message passing and a NTA\\nnegative sampling strategy to improve learning precision\
    \ and address\\ngraph heterogeneity, design choices that were crucial to improving\\nthe performance of specific tasks.\
    \ We evaluated BioPathNet on LP\\ntasks across diverse biomedical KGs, varying in size, sparsity and qual-\\nity, including\
    \ gene function assignment using KEGG pathways from\\nPathway Commons, zero-shot disease\\u2013drug indication prediction\\\
    nfrom PrimeKG, SL gene pair prediction from SynLethDB, and infer-\\nence of regulatory relationships between lncRNAs and\
    \ target genes\\nfrom LncTarD 2.0. Our results demonstrate BioPathNet\\u2019s versatility\\nin biomedical LP, consistently\
    \ performing better than random, with\\nvarying degrees of success depending on the task. Ablation studies\\nfurther highlight\
    \ the advantages of key design choices, such as NTA\\nnegative sampling and the use of a BRG for message passing. Unlike\\\
    nstandard NBFNet, NTA enables biologically meaningful sampling by\\nensuring that negative triplets share the same node\
    \ type as positives,\\nimproving MRR performance by 5\\u20139% across tasks and up to 15\\u201320% for\\nHits@1\\u20133\
    \ in specific cases. Since Hits@k measures how often positive\\ntriplets rank among the top predictions, this improvement\
    \ is espe-\\ncially crucial for biological practical applications, where top-ranked\\npredictions may be prioritized for\
    \ experimental validation. The SANS\\nprocedure, which dynamically adjusts negative sample selection based\\non graph\
    \ density, modestly improved BioPathNet\\u2019s performance in\\ntasks such as gene function prediction, lncRNA\\u2013target\
    \ prediction and\\nSL. However, its impact on drug\\u2013disease indication and contraindica-\\ntion prediction was variable,\
    \ enhancing performance in some cases\\nwhile proving detrimental in others. Among the four tasks used to\\nevaluate BioPathNet,\
    \ two (gene function prediction and lncRNA\\u2013tar-\\nget prediction) use Pathway Commons as a BRG for message passing.\\\
    nThe other two (drug repurposing and SL prediction) leverage unused\\nedges (excluding those in supervised training) as\
    \ the BRG. Our ablation\\nstudy confirms the BRG\\u2019s impact across all tasks. For gene function\\nprediction, the\
    \ Pathway Commons-derived BRG significantly boosted\\nperformance (16\\u201324% improvement in MRR, Hits@1-3-10), while\
    \ its\\neffect on lncRNA\\u2013target prediction was more modest (1.5\\u20136.3%), sug-\\ngesting that a tailored BRG,\
    \ perhaps incorporating a chromatin graph\\nto account for lncRNA nuclear regulatory functions, could further\\nenhance\
    \ results for this task. The ablation of the BRG was especially\\ncrucial for the zero-shot drug repurposing task, where\
    \ its removal\\nseverely disrupted PrimeKG\\u2019s connectivity, leading to poor perfor-\\nmance (although still above\
    \ random). For SL, other BRG relations did\\nnot directly benefit the task, but the additional SL links within the BRG\\\
    nwere essential, as demonstrated by full BRG ablation and individual\\nedge-type ablation experiments. Perturbation experiments\
    \ across the\\nfour tasks further revealed that no single relation type within the BRG\\nsignificantly impacted performance,\
    \ except for minor effects in a few\\ncases. This suggests that graphs often contain redundancy and noise,\\nunderscoring\
    \ the need for the biomedical KG community to focus on\\nKG denoising techniques and manual curation (for example, filtering\
    \ SL\\nlinks in SynLethDB improved performance). In addition, connectivity\\nbetween the training graph from G1 and the\
    \ BRG is the most critical fac-\\ntor, with a strong positive correlation between their connectivity and\\nmodel performance\
    \ (MRR). BioPathNet\\u2019s performance was minimally\\naffected by redundant connections, demonstrating its robustness\
    \ to\\nnoise. This suggests that meaningful paths between head and tail nodes\\ncan still be identified using path-embedding\
    \ methods, even in noisy or\\nprogressively sparser graphs. Since other path-based and KGE-based\"\n  },\n  {\n    \"\
    name\": \"methods lack ablation analyses on edges and relation types, it is dif-\",\n    \"text\": \"ficult to generalize\
    \ this conclusion, highlighting the need for further\\nbaseline evaluations in this area. The advantage of using the BRG\
    \ in\\nBioPathNet extends beyond improving LP task performance. While\\nNBFNet could theoretically be trained on the full\
    \ training graph from\\nG1+BRG graph (as attempted here) to achieve comparable or slightly\\nlower performance than BioPathNet,\
    \ doing so is computationally\\nimpractical\\u2014even across multiple GPUs\\u2014except perhaps for SL, as\\ndemonstrated\
    \ by our runtime and resource consumption analysis. As\\na result, training NBFNet on G1 alone remains the only viable\
    \ option.\\nBy leveraging the BRG solely for message passing (without evaluating\\nBRG edges in the loss), BioPathNet\
    \ not only improves or maintains\\nperformance but also ensures a feasible training process. This is one\\nof the key\
    \ advantages of BioPathNet, which ensures not only sustain-\\nability and lower infrastructure costs but also scalability,\
    \ guaranteeing\\nits future use on even larger datasets and evolving biomedical KGs\\nwithout becoming prohibitive.\\\
    nWhen benchmarked against general-purpose baselines, BioPath-\\nNet not only outperformed one-hop KGE methods such as\
    \ TransE,\\nDistMult and RotatE, as expected, but also consistently surpassed\\nmore expressive node-embedding models\
    \ such as R-GCN, RAGAT and\\nHGT across all tasks, with performance gains in MRR ranging from\\n2% for gene function prediction\
    \ to 87% for drug repurposing. This\\nunderscores the strength and expressiveness of path representation\\nlearning over\
    \ methods that compute node and relation embeddings\\nseparately, even when incorporating graph heterogeneity in their\\\
    nrepresentations. However, the superior accuracy and performance of\\npath representation learning in BioPathNet come\
    \ at the cost of higher\\ncomputational training time and resource requirements compared\\nwith node embedding methods,\
    \ which are faster to train (for example,\\nHGT is up to 20 times faster, while R-GCN is 3 times faster on the gene\\\
    nfunction prediction task). However, BioPathNet was the most efficient\\namong path-based baselines, with a per-epoch\
    \ training time 23 times\\nshorter than that of KR4SL and, on average, 9\\u201380 times lower than that\\nof NBFNet across\
    \ tasks.\\nWhen compared against task-specific baselines across the four dif-\\nferent LP tasks, BioPathNet outperformed\
    \ drug repurposing-specific\\nbaselines DREAMwalk and state-of-the-art TxGNN across all five\\nzero-shot disease splits\
    \ (adrenal gland, anaemia, cardiovascular, cell\\nproliferation and mental health), with an average AUPRC increase of\\\
    n60.8% over DREAMwalk and 23.2% increase over TxGNN. In addition,\\nBioPathNet achieved higher Recall@k values, prioritizing\
    \ known treat-\\nments better in the top predictions. Specifically, BioPathNet recovered\\n61.9% of known treatments at\
    \ k\\u2009=\\u200920, compared with 53.9% with TxGNN.\\nThis is especially valuable in biology, as BioPathNet\\u2019s\
    \ enhanced prior-\\nitization reduces the number of predictions requiring verification for\\nbiological plausibility during\
    \ hypothesis generation or experimental\\nvalidation. It must be noted that performance on the drug indication\\ntask\
    \ varies markedly across disease splits, with MRR ranging from\\n>0.6\\u20130.8 for cell proliferation and adrenal gland\
    \ to 0.23\\u20130.36 for\\ncardiovascular and mental health. Similar trends were reported in\\nthe original TxGNN paper54,\
    \ suggesting that this variability reflects\\nintrinsic properties of the disease splits, such as disease complexity\\\
    nand the amount of available knowledge (for example, known drugs\\nor molecular mechanisms in the graph), rather than\
    \ differences in\\nmodelling approaches. Supporting this, we observed a strong Pearson\\ncorrelation (r\\u2009=\\u20090.81)\
    \ between task performance and the average con-\\nnectivity of drugs in the G1 graph (Supplementary Fig. 8), indicating\\\
    nthat performance is closely tied to how well subdiseases are linked to\\ndrugs known from other indications. While in\
    \ predicting contraindica-\\ntions, BioPathNet largely outperformed DREAMwalk which largely fails\\non this task, it showed\
    \ comparable or slightly worse results compared\\nwith TxGNN (BioPathNet MRR of 0.53 vs 0.56 for TxGNN) and higher\\nperformance\
    \ variance.\\nBioPathNet outperforms both general and task-specific GNN\"\n  },\n  {\n    \"name\": \"methods due to its\
    \ unique encoding approach, which captures\",\n    \"text\": \"path representations rather than individual entity embeddings.\
    \ Its\\n\\nNature Biomedical Engineering\\nArticle\\nhttps://doi.org/10.1038/s41551-025-01598-z\\nbiomedical KG-specific\
    \ design and enhanced scalability improve upon\\nits NBFNet baseline (Fig. 4b). When compared to node embedding\"\n  },\n\
    \  {\n    \"name\": \"methods such as DREAMwalk and TxGNN, additional advantages and\",\n    \"text\": \"limitations emerge.\
    \ BioPathNet\\u2019s superior prediction accuracy comes\\nat the cost of longer training time. DREAMwalk, while the least\
    \ accu-\\nrate for drug indication prediction, is extremely fast to train, making\\nit valuable for practical applications.\
    \ TxGNN, although slower than\\nDREAMwalk due to its pre-training phase, enhances disease nodes with\\nlimited molecular\
    \ characterization using a gated auxiliary embedding.\\nIn contrast, BioPathNet leverages non-drug\\u2013disease triplets\
    \ for mes-\\nsage passing within a BRG but does not require separate pre-training\\nand fine-tuning, offering greater\
    \ flexibility across different regulatory\\ngraphs. However, its higher variance compared with TxGNN may result\\nfrom\
    \ the absence of pre-training, which helps stabilize predictions.\\nPath-embedding methods such as BioPathNet enhance\
    \ represen-\\ntations with multihop relationships and offer greater interpretability\\nthan node embeddings by tracing\
    \ and visualizing paths as well as\\ninfluent nodes, which aids in verifying predictions and hypothesis\\ngeneration.\
    \ Incorporating a BRG further improves path expressiveness\\nand interpretability, revealing crucial paths and validating\
    \ predic-\\ntions, such as in the case of Alzheimer\\u2019s disease. Node-embedding\"\n  },\n  {\n    \"name\": \"methods,\
    \ although easy to understand (via t-distributed stochastic\",\n    \"text\": \"neighbor embedding or uniform manifold\
    \ approximation and projec-\\ntions), lack intrinsic interpretability, requiring post hoc frameworks\\nsuch as TxGNN.\
    \ Path embeddings capture richer context and can be\\ninterpreted more easily, but are more abstract and less intuitive\
    \ for\\ndownstream tasks.\\nWe demonstrate the versatility of BioPathNet in addressing diverse\\nproblems across various\
    \ KGs and in SL, also in the inductive setting.\\nHowever, the task of inferring lncRNA\\u2013target regulatory relationship\\\
    nis the hardest for all methods, including BioPathNet, maybe due to\\nthe quality and uncertainty of both training data\
    \ and BRG. Here we\\nattempt this task making use of an lncRNA\\u2013target-specific KG coupled\\nwith a BRG. Despite\
    \ a test MRR of 0.19 (lower than for tasks such as\\ndrug repurposing or SL) indicating that BioPathNet could probably\\\
    nbenefit from more training data, BioPathNet still strongly learns the\\nstructure of the lncRNA\\u2013targets regulatory\
    \ graph by leveraging mul-\\ntiple paths in the sparse graph and by that, compensating for the lack\\nof direct connections.\\\
    nAs an additional remark, under the open-world assumption, evalu-\\nating model performance on incomplete KGs may not\
    \ fully reflect their\\ncapabilities. Metrics, such as MRR, can degrade in scenarios with high\\nincompleteness, where\
    \ missing links correlate with specific entities, as\\ndiscussed in ref. 100. Biomedical KGs exhibit uneven gaps in knowledge\\\
    ndistribution, influenced by factors such as prevalence and complexity,\\npotentially underestimating BioPathNet\\u2019s\
    \ performance, particularly\\nin tasks such as lncRNA\\u2013target prediction.\\nLimitations of BioPathNet include potential\
    \ biases in the training\\ndata. For example, while BioPathNet successfully retrieved almost all\\nknown treatments for\
    \ AD in its top predictions, it missed FDA-approved\\ndrugs such as pramiracetam, memantine and lecanemab, which were\\\
    nnot listed in the PrimeKG database and lacked disease indications. As a\\nresult, the model could not learn their connections\
    \ and did not identify\\nthem as potential treatments. Predictions for known symptom-treating\\ndrugs focused on neuropsychiatric-related\
    \ diseases, but emphasizing\\nmolecular interactions could uncover more disease-modifying treat-\\nments. Future improvements\
    \ might involve excluding message passing\\nover dominant relations such as indications and prioritizing molecular\\ninteractions\
    \ to elucidate mechanisms underlying less-understood\\ndiseases such as Alzheimer\\u2019s. Lastly, BioPathNet uses a distinct\
    \ BRG\\nfor each task, which may introduce biases based on the chosen BRG.\\nWhile we assess the impact of node degree,\
    \ relation type removal and\\nrandom edge perturbations, task performance may highly depend on\\nBRG selection. Although\
    \ an ideal solution would be a unified, denoised\\nbiomedical KG for all tasks, the complexity of biomedical KGs makes\\\
    nthis challenging. Preliminary results suggest that task-specific BRGs\\nyield better performance. For instance, replacing\
    \ the SL BRG with the\\ngene function BRG led to comparable or lower MRR, while substituting\\nthe PrimeKG portion with\
    \ Pathway Commons dramatically reduced\\ndrug repurposing performance due to missing drug\\u2013gene connections.\\nAs\
    \ highlighted in ref. 52, task-specific KGs are crucial for the success of\\ncertain tasks, and future work should explore\
    \ in more detail the extent\\nto which different tasks benefit from distinct previous knowledge.\\nIn summary, BioPathNet\
    \ is a path-embedding method for link\\nprediction on biological KGs, achieving state-of-the-art performance\\nin tasks\
    \ such as gene function prediction, drug indication, synthetic\\nlethality and mRNA\\u2013lncRNA interactions. Its interpretability\
    \ frame-\\nwork highlights key prediction paths, improving biological plausibility\\nand bias detection. Future directions\
    \ include refining and denoising\\nbiomedical KGs, leveraging condition-specific knowledge and integrat-\\ning node features.\
    \ Ultimately, BioPathNet could serve as a foundation\\nfor predictive models in biomedical KGs, accelerating hypothesis\\\
    ngeneration across biology and medicine.\"\n  },\n  {\n    \"name\": \"Methods\",\n    \"text\": \"KG completion\\nA knowledge\
    \ graph KG = {(u, r, v)}u,v\\u2208E,r\\u2208R is a heterogeneous directed\\ngraph where nodes E represent entities, relations\
    \ R represent edges,\\nand triplets (u, r, v) define connections, with u (head) linking to v (tail)\\nvia r (relation).\
    \ The graph is considered heterogeneous because differ-\\nent entities may have different types, for example, a node representing\\\
    na gene versus a node representing a disease. The graph is directed\\nbecause (u, r, v) being in the KG does not imply\
    \ (v, r, u) is contained as\\nwell. KG completion involves predicting the missing links, that is, tail\\nprediction (u,\
    \ r, ?), predicting the tail entity given the head entity and\\nthe relationship101.\\nNBFNet\\nBioPathNet is a path-representation\
    \ learning-based method for graph\\ncompletion built upon the NBFNet framework56, which performs link\\nprediction (LP)\
    \ by learning representations for each path from the\\nquery entity u to potential tail entities v. More specifically,\
    \ in NBFNet,\\nthe path formulation is represented by a generalized sum of path repre-\\nsentations between u and v (Fig.\
    \ 7a,b and neural Bellman\\u2013Ford network\\n(NBFNet) in Extended Methods).\\nNBFNet\\u2019s learning framework relies\
    \ on the generalized Bellman\\u2013\\nFord algorithm for path representation and its neural abstraction.\\nGeneralized\
    \ Bellmann\\u2013Ford path representation. To achieve a scal-\\nable path formulation, NBFNet utilizes a generalized version\
    \ of the\\nBellman\\u2013Ford dynamic programming algorithm102.\\nThis generalization transforms the original Bellman\\\
    u2013Ford algo-\\nrithm for shortest path calculation into a versatile framework that\\nsimultaneously computes pair representations\
    \ hq(u, v) for a given entity\\nu, query relation q, and all entities v in a graph.\\nh(0)\\nq (u, v) \\u2190\\u0001q(u\
    \ = v)\\n(1)\\nh(t)\\nq (u, v) \\u2190(\\u2a01(x,v)\\u2208\\u2130h(t\\u22121)\\nq\\n(u, x) \\u2297wq(x, r, v)) \\u2295h(0)\\\
    nq (u, v)\\n(2)\\nIn this formulation, the first equation initializes the boundary\\ncondition on the source node (equation\
    \ (1)), representing the shortest\\npath between u and v at the start. If the head and tail nodes coincide\\n(u = v),\
    \ the boundary condition is set to the generalized \\u0001, which cor-\\nresponds to 0 in the shortest path context (that\
    \ is, the shortest distance\\nbetween a node and itself is zero) and to \\u221e in the case u \\u2260 v. Equation\\n(2)\
    \ describes the Bellman\\u2013Ford iteration, updating the shortest\\npath distance between u and v. In each iteration,\
    \ the representation\\nfrom the previous layer (t \\u2212 1) is multiplied by the transition edge\\n\\nNature Biomedical\
    \ Engineering\\nArticle\\nhttps://doi.org/10.1038/s41551-025-01598-z\\nrepresentation wq to obtain the new representation\
    \ hq(u, v). The algo-\\nrithm propagates the boundary condition from the source node to its\\nneighbours. It is important\
    \ to note that there is a distinction between\\nquery relation q and the relation r in the graph. The query relation q\
    \ is\\nused to initialize the source node (boundary condition), while the\\ntransition edge representations wq(x, r, v)\
    \ are obtained by the multi-\\nplication of relation r in the graph. Both embeddings are learned. Using\\nthe distributive\
    \ properties of multiplication, all prefixes are computed\\nsimultaneously. This iterative process continues, assessing\
    \ potential\\ntarget nodes, until all paths from the source to the tail node are covered\\nafter t iterations, where t\
    \ is the path length (Fig. 7b). For a more detailed\\ndescription, see Extended Methods in Supplementary Information.\\\
    nNeural formulation. By abstracting the boundary condition in equa-\\ntion (1) to an indicator function, the multiplication\
    \ operator in equation\\n(2) to a message passing formulation, and the summation operator\\nto a general aggregation function,\
    \ NBFNet extends the generalized\\npath formulation of the Bellman\\u2013Ford algorithm into a graph neural\\nnetwork\
    \ framework.\\nh(0)\\nv\\n\\u2190Indicator(u, v, q)\\n(3)\\nh(t)\\nv\\n\\u2190Aggregate({Message(h(t\\u22121)\\nx\\n,\
    \ wq(x, r, v))|(x, r, v) \\u2208\\u2130(v)} \\u222a{h(0)\\nv }) (4)\\nFor the indicator function, NBFNet learns the query\
    \ relation\\nembedding q and assigns q to node v if v equals the source node u.\\nMessage passing uses the DistMult32\
    \ relational operator (multiplica-\\ntion) for messages and summation for aggregation over t GNN lay-\\ners, generating\
    \ path embeddings from the source node. Each node\\nembedding hv (always relative to source u) is updated by multiplying\\\
    nneighbour embeddings with relation embeddings, aggregating via\\npermutation-invariant functions (for example, summation\
    \ or principal\\nneighbourhood aggregation), and combining with hv(0) through a\\nlinear layer, normalization layer (LayerNorm)\
    \ and activation sigmoid\\nfunction. Relation embeddings can be dynamically learned on the\\nbasis of the query q (Fig.\
    \ 7b). LayerNorm standardizes node embed-\\ndings across features by normalizing activations, and by that, acts as a\\\
    nregularizer by reducing sensitivity to small variations in node features,\\nhelping prevent overfitting.\\nUnlike typical\
    \ GNNs, which compute pair representations as inde-\\npendent node embeddings h(u) and h(v), NBFNet conditions each\\\
    nnode\\u2019s representation hq(u) and hq(v) on the source node and query\\nrelation q. The resulting pair representation\
    \ hq(u, v) is then used for\\nLP, predicting the tail entity v given the head entity u and relation q.\\nThis is formulated\
    \ as the conditional likelihood of the tail entity v as:\\np(v|u, q) = \\u03c3( f(hq(u, v)))\\n(5)\\nwhere \\u03c3(_)\
    \ is the sigmoid function and f(_) is a feed-forward neural\\nnetwork. Practically, the model weights are learned using\
    \ the training\\nedge distribution (Fig. 7a), and the trained model is then applied to the\\ntest edge distribution to\
    \ infer new edges.\\nBioPathNet: biomedical KG completion\\nConsidering the unique characteristics of biological KGs,\
    \ we introduce\\nBioPathNet, a graph neural network framework based on NBFNet56.\\nBioPathNet is designed to predict missing\
    \ links in biomedical KGs.\\nPath representation in BioPathNet. As a path-based reasoning\\nmethod, path representations\
    \ hq(u, v) in BioPathNet are learned start-\\ning at a source node u to all potential target nodes v on the basis of\\\
    nthe relations r along the path, following the NBFNet parametrization\\n(equations (3) and (4)) but with important enhancements\
    \ that make\\nBioPathNet more suited for biological KGs. We improve NBFNet in\\ntwo key ways: first, by refining its negative\
    \ sampling strategy to con-\\nsider entity-type information, and second, by introducing a BRG, a\\nmessage-passing-only\
    \ graph that enhances efficiency and learning in\\nLP tasks. These design choices enable BioPathNet to effectively handle\\\
    ndiverse biomedical KGs.\\nNegative sampling in BioPathNet. During training, for each positive\\ntriplet (u, r, v), n\
    \ negative samples (u, r, v\\u2032) are generated by corrupting\\none of the entities v in the positive sample (that is,\
    \ substituting the true\\nnode tail v with another node v\\u2032) to create a negative triplet. In the basic\\nNBFNet,\
    \ the \\u2018self-adversarial negative sampling\\u2019 from RotatE34 is used,\\nwhere instead of uniformly sampling n\
    \ negative samples per positive\\nsample, the weights of negative samples are softly redistributed on the\\nbasis of the\
    \ current model embeddings, thereby forcing the model to\\ndiscriminate on the basis of hard negative samples from positive\
    \ sam-\\nples. A parameter called \\u2018adversarial temperature\\u2019 controls the softness\\nof this weight distribution\
    \ and represents a hyperparameter\\nfor BioPathNet.\\nTo further improve the decision boundary and ensure biologically\\\
    nmeaningful sampling, BioPathNet implements a NTA negative sampling\\nscheme. This means that when sampling negative v\\\
    u2032 for training, we\\nconsider the node type and sample v\\u2032 only from the same type as v. This\\napproach also\
    \ reduces the sample space and challenges the learning\\ntask by compelling the model to learn a decision boundary with\
    \ suf-\\nficiently difficult negative samples.\\nIn addition to NTA, BioPathNet incorporates SANS, as proposed in\\nref.\
    \ 57. This method generates negative samples on the basis of graph\\ndensity, restricting them to the k-hop neighbourhood\
    \ of the head node\\nand using random walks to approximate local neighbourhoods. In our\\ncase we used k = 2, which is\
    \ a reasonable choice given that biomedical\\nnetworks are typically well connected and shallow, with an average\\ndiameter\
    \ of ~4\\u20136. Sampling negatives from similar-density regions can\\nmitigate biases due to local graph structure and\
    \ improves generaliza-\\ntion in sparser graph areas. Negative sampling strategies were tested\\nin ablation experiments.\\\
    nIncorporation of a BRG. Compared to the original NBFNet, BioPathNet\\nincorporates additional entity and relation information,\
    \ referred to as\\nthe BRG or G2, for message passing. Among the four tasks used to\\nevaluate the performance of BioPathNet,\
    \ gene function prediction and\\nlncRNA\\u2013target prediction utilize Pathway Commons, an external data-\\nbase of protein\\\
    u2013protein and protein\\u2013chemical interactions, as the BRG\\n(see Supplementary Table 2). In contrast, drug repurposing\
    \ and SL\\nprediction define the BRG using the unused edges of the dataset,\\nexcluding relations explicitly used for\
    \ supervised training, referred to\\nas G1. The incorporation of a BRG provides additional edges (knowl-\\nedge) that\
    \ are used solely for message passing, enhancing the predic-\\ntion of links of interest (Fig. 1c). For example, in predicting\
    \ the missing\\nlink (u, r, v), where (u, r, v) always comes from the target KG G1, messages\\ncan be passed only along\
    \ paths in G1, yielding a prediction path such\\nas in Fig. 1d. Alternatively, a BRG G2 can be used to further inform\
    \ the\\npredictions, leveraging additional knowledge (for example, including\\nrelations between type 2 and 3 nodes),\
    \ as illustrated in Fig. 1e. Conse-\\nquently, in BioPathNet, equation (4) is modified to always take (u, r, ?)\\nfrom\
    \ G1 but to aggregate and send messages across all edges G1 \\u222a G2.\\nIn equation (4), the edges (x, r, z) \\u2208\\\
    u2130(v) come from G1 \\u222a G2 rather than\\njust G1.\\nBioPathNet training and LP. During the training of the model\
    \ in a\\nsupervised setting, the negative log-likelihood is minimized between\\npositive samples (u, r, v) and negative\
    \ samples (u, r, v\\u2032), generated\\naccording to the sampling scheme outlined above.\\nLKG = \\u2212log p(u, q, v)\
    \ \\u2212\\nn\\n\\u2211\\ni=1\\n1\\nn log(1 \\u2212p(u, q, v\\u2032\\ni))\\n(6)\\n\\nNature Biomedical Engineering\\nArticle\\\
    nhttps://doi.org/10.1038/s41551-025-01598-z\\nwhere n is the number of negative samples per positive sample and\\n(u,\
    \ q, v\\u2032\\ni) is the ith negative sample for KGs.\\nImportantly, the additional edges from the BRG are not used for\\\
    nsampling positive and negative triplets, ensuring that the computation\\nof the loss in equation (6) remains unchanged.\
    \ After performing LP with\\nthe modified message passing scheme, BioPathNet ranks all candidate\\ntail entities according\
    \ to their likelihood p(v\\u2223u, q) to form a true triplet\\nwith a given head entity and relation q as the query. The\
    \ same approach\\nis used for the prediction of v given u and r\\u22121 for the reverse relation of\\nr. It is important\
    \ to notice that in the transductive setting, the same\\nBRG is used for training and inference, ensuring identical graphs.\
    \ In\\ncontrast, inductive tasks such as SL predictions use separate BRGs,\\nwith part reserved for training and another\
    \ for inference, where the\\ninference graph includes unseen nodes.\\nInterpretation of prediction: visualization of most\\\
    nimportant paths\\nLeveraging the NBFNet framework, BioPathNet predictions can be\\ndirectly interpreted through paths.\
    \ This feature is crucial for biomedi-\\ncal tasks, where understanding the mechanisms behind each prediction\\nis essential.\
    \ These interpretations highlight the paths that contribute\\nthe most to the prediction p(v\\u2223u, q). Using local\
    \ interpretation meth-\\nods, we approximated the local landscape of BioPathNet with a linear\\nmodel over the set of\
    \ all paths, and the importance was then defined\\nby its weight in the linear model, which can then be computed as the\\\
    npartial derivative of the prediction with respect to the path56. Formally,\\nthe top-k path interpretations for p(u,\
    \ q, v) are defined as:\\nP1, P2, \\u2026 , Pk = top \\u2212kP\\u2208Puv\\n\\u2202p(u, q, v)\\n\\u2202P\\n(7)\\nWhile\
    \ directly computing the importance of all paths is intractable,\\nNBFNet approximates them with edge importance. Specifically,\
    \ the\\nimportance of each path is approximated by the sum of the impor-\\ntance of edges in that path, and therefore\
    \ intuitively, the top-k path\\ninterpretations are equivalent to the top-k longest paths on the edge\\nimportance graph.\\\
    nFor the visualization plot, we considered the top 10 most impor-\\ntant paths ranked by gradient, with the edge width\
    \ reflecting the num-\\nber of times an edge appears in paths. Furthermore, the most important\\npath is highlighted in\
    \ red. In summary, our interpretability allows\\npredictions to be assessed by their biological plausibility for hypothesis\\\
    ngeneration or validation in the laboratory.\\nBioPathNet training on four different biomedical tasks\\nGene function\
    \ prediction task: identifying gene\\u2013pathway asso-\\nciations. For this task, we used the KG from the KEGG database\
    \ (G1),\\nextracted from ConsensuPathDB, to train the model on gene (G)\\u2013\\npathway (P) interactions in transductive\
    \ setting. In addition, we uti-\\nlized a BRG containing regulatory relationships between gene\\u2013gene\\n(G\\u2013G),\
    \ gene\\u2013chemical (G\\u2013C) and chemical\\u2013chemical (C\\u2013C) interac-\\ntions obtained from Pathway Commons\
    \ (G2)59,60. These interactions\\nwere represented as triplets in the format (node1, relationType,\\nnode2), such as (BABAM1,\
    \ interacts-with, PSMD14) (Supplementary\\nTables 1 and 2). During data preprocessing of G1, we removed KEGG\\npathways\
    \ with fewer than 10 annotations to genes and retained only the\\nbiggest connected component of the BRG, thereby removing\
    \ 11 nodes\\npresent in components of only 2\\u20133 nodes. We trained BioPathNet using\\n70% of the P\\u2013G triplets\
    \ from the G1, which were randomly split, with and\\nwithout incorporating the underlying BRG as a message-passing graph.\\\
    nWe used 10% of the G1 P\\u2013G triplets for validation, and the remaining\\n20% of G1 were reserved for testing. During\
    \ training, training triplets\\nwere used as the message-passing graph (that is, training graph), while\\nremoving the\
    \ specific triplets of the batch for learning path repre-\\nsentations. This graph was also used during validation and\
    \ testing, in\\naddition to a potential G2/BRG. Hyperparameters, including adver-\\nsarial temperature and number of negatives\
    \ per positive sample, were\\noptimized on the basis of the validation MRR, resulting in an optimal\\nset of parameters\
    \ for downstream analysis (Supplementary Table 16).\\nDrug repurposing task: predicting unknown drug\\u2013disease associa-\\\
    ntions. This task is based on PrimeKG53 (Supplementary Fig. 1a), splitting\\nthe data into training, validation and test\
    \ sets (Supplementary Table 3).\\nFor training, validation and testing of BioPathNet, we used the same\\ndata and data\
    \ splits as defined by TxGNN54, reflecting a zero-shot pre-\\ndiction scenario at a proportion of 0.83:0.12:0.05. By using\
    \ the TxGNN\\ncode (https://github.com/mims-harvard/TxGNN from 12 Apr 2023,\\ncommit \\u20181000aac\\u2019), the splits\
    \ were created by removing all indication\\nand contraindication triplets for a disease area from training, along\\nwith\
    \ 95% of connections to biomedical entities (for example, proteins,\\nphenotypes)54, simulating minimal molecular characterization\
    \ and no\\ntherapeutic knowledge. While TxGNN constructs reverse edges, we\\nremoved them beforehand, as BioPathNet inherently\
    \ adds reverse tri-\\nplets during reasoning. Five zero-shot disease areas were used: adrenal\\ngland disorders, anaemia,\
    \ cardiovascular diseases, cell proliferation\\ndiseases (for example, various cancers) and mental health conditions\\\
    n(Supplementary Table 3). BioPathNet was trained in a supervised man-\\nner using only drug\\u2013disease edges (indication,\
    \ contraindication)\\nin G1, while the rest of PrimeKG served as the BRG (G2) for message\\npassing. After removing reverse\
    \ relations, 5.7 million directed edges\\nwere used for message passing per prediction setting, consisting of\\nprotein\\\
    u2013protein or disease\\u2013disease relations. The training and valida-\\ntion sets averaged 33,000 and 4,000 edges,\
    \ respectively, across five\\ndisease areas (Supplementary Table 3).\\nWe further created our custom data split with TxGNN\\\
    u2019s \\u2018dis-\\nease_eval\\u2019 code to evaluate performance in predicting drugs for the\\nneurodegenerative disorder\
    \ Alzheimer\\u2019s disease. Drugs that were\\nassociated with various AD diseases were moved to the test set\\n(Supplementary\
    \ Table 17). All models were trained for 10 epochs,\\nemploying an early stopping mechanism that retained the best model\\\
    nbased on validation set performance (MRR, see below). The final hyper-\\nparameters, including the number of negatives\
    \ per positive sample for\\nall five disease area splits, are reported in Supplementary Table 12. All\\nexperiments were\
    \ repeated for five different data-split seeds, using the\\nexact seeds employed by TxGNN to ensure a fair comparison.\
    \ Each data\\nsplit seed resulted in slightly different training and validation sets for\\neach disease area due to the\
    \ random removal of edges to simulate the\\nzero-shot scenario for the disease under study every time.\\nSL prediction\
    \ task: identifying unknown SL gene pairs. For\\nthis task, we used the SynLethDB-v.2.0 (ref. 103) data as a KG\\n(Supplementary\
    \ Table 18). In transductive setting, BioPathNet was\\ntrained on pre-processed data, that is, the SL gene pairs extracted\
    \ from\\nSynLethDB-v.2.0 (G1), as provided by KR4SL55 and downloaded from\\ntheir GitHub repository (https://github.com/JieZheng-ShanghaiTech/\\\
    nKR4SL from 8 Dec 2023, commit \\u201861b5c84\\u2019). In detail, the SL gene pairs\\nfrom SynLethDB-v.2.0 for humans\
    \ were randomly split into train, vali-\\ndation and test triplets at a ratio of 7:1:2, following the data split of\\\
    nKR4SL (Supplementary Tables 19 and 20). The pre-processed data were\\nmodified to fit the BioPathNet format by removing\
    \ the reverse edges\\nintroduced by KR4SL for SL gene pairs (following the same preproc-\\nessing scheme as in the drug\
    \ repurposing task), as reverse edges are\\nimplicitly added by BioPathNet by default.\\nOn top of the SL pairs, SynLethDB-v.2.0\
    \ constructs a KG includ-\\ning relations between gene entities, pathways and three types of\\nGO term: biological processes\
    \ (BP), molecular functions (MF) and\\ncellular components (CC) augmented using OntoProtein50. While\\nSL pairs were used\
    \ for supervised training (G1), the rest of the KG\\n(G2), augmented by additional SL pairs, was used as BRG for mes-\\\
    nsage passing only, following the same scheme from previous tasks\\n\\nNature Biomedical Engineering\\nArticle\\nhttps://doi.org/10.1038/s41551-025-01598-z\\\
    n(Supplementary Table 18). Hyperparameters, including the number of\\nnegatives per positive sample, were optimized on\
    \ the basis of the vali-\\ndation MRR, resulting in an optimal set of parameters for downstream\\nanalysis (Supplementary\
    \ Table 21). In transductive setting, BioPathNet\\nwas trained and evaluated on SynLethDB SL pairs across confidence\\\
    nthresholds from 0.1 to 0.8. For final training, pairs with confidence\\nthresholds below 0.3 were excluded, removing\
    \ most if not all compu-\\ntationally predicted interactions (Supplementary Fig. 2a). The final\\ndataset included 8,770\
    \ training, 3,172 validation, 6,254 test, and 13,161\\nknown SL pairs in the BRG (Supplementary Table 18). The filtered\
    \ set is\\nreferred to as \\u2018thresholded data,\\u2019 while the original is \\u2018unthresholded\\ndata\\u2019, which\
    \ includes all SL pairs from SynLethDB-v.2.0 without filtering\\nby confidence score. For both thresholded and unthresholded\
    \ data, we\\nalso trained BioPathNet in the inductive setting, using the data split\\nfrom the KR4SL study, ensuring that\
    \ training and testing graphs\\u2019 node\\nsets were not overlapping (Supplementary Table 22). All experiments\\nwere\
    \ run for five random seeds and the optimal hyperparameters are\\nreported in Supplementary Table 21.\\nSince SL relationships\
    \ are symmetric between genes, the final\\nscore for a gene v to be an SL partner of gene u was computed by con-\\nsidering\
    \ both the feed-forward neural network transformed represen-\\ntation of tail node v given head node u and the SL relation,\
    \ f(hq(u, v)),\\nas well as the transformed symmetric representation, f(hq\\u22121(u, v)). Thus,\\nthe final SL score\
    \ for a gene v to be an SL partner of gene u from BioPath-\\nNet is reported as:\\np(v|u) = \\u03c3 (\\nf(hq(u, v)) +\
    \ f(hq\\u22121(u, v))\\n2\\n)\\n(8)\\nLncRNA\\u2013target prediction task: identifying unknown lncRNA\\u2013gene\\nrelationships.\
    \ For this task, we used the LncTarD 2.0 database64, where\\ninteractions are categorized into seven mechanisms of lncRNA\\\
    u2013target\\nregulation: \\u2018ceRNA or sponge\\u2019, \\u2018chromatin looping\\u2019, \\u2018epigenetic regu-\\nlation\\\
    u2019, \\u2018expression association\\u2019, \\u2018interact with mRNA\\u2019, \\u2018interact with\\nprotein\\u2019 and\
    \ \\u2018transcriptional regulation\\u2019. Missing gene information\\n(for example, Ensembl IDs, gene names) was resolved\
    \ using Gencode\\nand HGNC mapping. Due to the scarcity of chromatin looping inter-\\nactions (12 pairs), we relabelled\
    \ them as \\u2018transcriptional regulation\\u2019\\nafter a manual literature review, consolidating interactions into\
    \ six\\ndistinct types.\\nOn top of the lncRNA\\u2013target interactions from LncTarD 2.0 KG, we\\nadded the BRG derived\
    \ from Pathway Commons (G2), the same BRG\\nused for the gene function prediction task. As there is no direct link\\nbetween\
    \ small molecules and lncRNA, we only used PPI, discarding\\nother types of relation (Supplementary Tables 23 and 24).\
    \ To enable\\nNTA negative sampling, node entities in G1 were labelled with six dif-\\nferent categories: \\u2018lncRNA\\\
    u2018, \\u2018mRNA\\u2019, \\u2018microRNA\\u2019, \\u2018transcription factor\\u2019,\\n\\u2018protein\\u2019 and \\\
    u2018protein_ppi\\u2019 (this last one to specifically identify nodes\\nfrom PPI interactions from the BRG, whose edges\
    \ were only used for\\nmessage passing and not for supervised training). The optimal param-\\neters of BioPathNet in this\
    \ setting, determined through the MRR on the\\nvalidation set, are reported in Supplementary Table 25.\\nComparison with\
    \ baselines\\nWe compared BioPathNet against several general-purpose baselines,\\nnamely: the graph neural network-based\
    \ R-GCN, which extends GCNs\\nfor multirelational data by using relation-specific weight matrices to\\naggregate neighbour\
    \ information while preserving relational seman-\\ntics104; HGT, a GNN model which captures graph heterogeneity with\\\
    ntype-dependent parameters, preserving distinct representations while\\nintegrating high-order neighbour information44;\
    \ RAGAT, an embedding\\nmethod which introduces node- and edge-type specific message pass-\\ning functions on a heterogeneous\
    \ graph43; and the original NBFNet56.\\nFor gene function and lncRNA\\u2013target prediction, we compared\\nBioPathNet\
    \ to BIONIC, a GCN-based biological network integration\\nframework that learns gene embeddings in an unsupervised or\
    \ semi-\\nsupervised manner42. BIONIC generates separate gene embeddings\\nfrom multiple networks and integrates them\
    \ into a unified representa-\\ntion for downstream tasks. Here, it was trained to predict functional\\nclasses for genes\
    \ and multiple targets for each lncRNA (referred to as\\nlncBIONIC in the latter case).\\nFor the drug repurposing prediction\
    \ task, we compared BioPath-\\nNet to TxGNN54 and DREAMwalk42. TxGNN is a state-of-the-art model\\nfor predicting drug\\\
    u2013disease relationships in zero-shot scenarios\\nwhere minimal previous information or treatment history is avail-\\\
    nable53. Leveraging PrimeKG53, a comprehensive biomedical KG, TxGNN\\nuses R-GCNs to learn embeddings of drugs and diseases,\
    \ capturing\\ncomplex interactions by mapping them into a shared latent space.\\nDREAMwalk constructs a fixed biomedical\
    \ KG including a drug\\u2013drug\\nand disease\\u2013disease similarity network, along with links connecting\\ndrugs and\
    \ diseases to a PPI network. It generates embeddings via a\\nheterogeneous Skip-gram model and classifies drug\\u2013disease\
    \ asso-\\nciations with XGBoost. Since the original graph (built from the ATC\\nclassification and from the Medical Subject\
    \ Heading (MeSH)) was una-\\nvailable, we reconstructed it in two ways: (1) DREAMwalk_IC, mapping\\nDrugBank and MONDO\
    \ (MeSH-inclusive) hierarchies used in PrimeKG\\nto compute drug\\u2013drug and disease\\u2013disease semantic similarity,\
    \ and\\n(2) DREAMwalk_OC, directly extracting connections from PrimeKG.\\nFor the SL pair prediction task, BioPathNet\
    \ was benchmarked\\nagainst KR4SL, a path-representation learning GNN-based method\\ndesigned specifically for the explainable\
    \ prediction of SL gene pairs\\nin cancer55 in both transductive and inductive setting.\\nFor the lncRNA\\u2013target\
    \ prediction task, BioPathNet was bench-\\nmarked against BIONIC, as described earlier, and DeepLGP, a\\ntask-specific\
    \ baseline. DeepLGP65 prioritizes lncRNA target genes\\nby integrating lncRNA and gene features (such as genomic location,\\\
    nexpression and miRNA interactions) with graph features extracted\\nvia a GCN encoder.\\nAll baseline methods were retrained\
    \ using optimal parameters,\\neither selected on the basis of validation MRR when possible, or set to\\nthe default values\
    \ recommended by the original authors, to ensure a\\nfair comparison. Detailed descriptions of each baseline and the specif-\\\
    nics of the final model parameters are provided in \\u2018Baseline methods\\nused for comparison\\u2019 in Extended Methods.\\\
    nModel evaluation\\nVarious metrics were used to evaluate BioPathNet on a held-out test\\nset (part of the G1) across\
    \ different tasks and compare its performance\\nwith baseline methods. For all tasks, methods were evaluated on the\\\
    nbasis of: mean rank (MR), the average rank of the true positive among all\\npredicted candidates; mean reciprocal rank\
    \ (MRR), the average of the\\nreciprocal ranks of the first relevant item; and Hits@k, the proportion\\nof true positives\
    \ ranked within the top-k predictions. Values for these\\nmetrics range [0, 1], and the larger the value, the better the\
    \ model (for\\nan extensive explanation of these metrics, see Extended Methods\\nin Supplementary Information). The random\
    \ MRR represents the\\nexpected mean reciprocal rank if predictions were made by randomly\\nguessing, meaning the correct\
    \ answer is equally likely to appear in any\\npossible ranking position among all negatives, with the final value\\ndepending\
    \ on the number of available negative candidates for each\\npositive sample.\\nWhile node embedding models the conditional\
    \ probability of pre-\\ndicting the tail entity v given the head entity u and relation r, evaluating\\nthe joint probability\
    \ of u, v and r may be more comprehensive. To ensure\\nconsistency with TxGNN in drug prediction, we also used AUPRC to\\\
    nsummarize precision and recall across thresholds, along with specific-\\nity and F1 score at a 0.5 threshold, using TxGNN\\\
    u2019s evaluation code. This\\napproach assesses the performance of each disease node. For details on\\ncomputing AUPRC\
    \ in the comparison between BioPathNet and TxGNN,\\nsee Extended Methods in Supplementary Information.\\n\\nNature Biomedical\
    \ Engineering\\nArticle\\nhttps://doi.org/10.1038/s41551-025-01598-z\\nFor the SL prediction task, we compared the seed-wise\
    \ perfor-\\nmance of our model with the performance of KR4SL using metrics\\ninherent to the KR4SL framework\\u2019s code,\
    \ specifically NDCG@k,\\nRecall@k and Precision@k (see \\u2018Model evaluation\\u2019 in Extended Meth-\\nods). Moreover,\
    \ we computed MRR for both BioPathNet and KR4SL by\\nfirst calculating MRR for each query gene and then averaging gene-wise\\\
    nMRRs over all query genes. For the SL task, we ensured that predicted\\ntriplets (SL relationships) already present in\
    \ the BRG were excluded\\nfrom the performance evaluation, guaranteeing a reliable assessment\\nof generalization performance.\\\
    nReporting summary\\nFurther information on research design is available in the Nature\\nPortfolio Reporting Summary linked\
    \ to this article.\"\n  },\n  {\n    \"name\": \"Data availability\",\n    \"text\": \"Gene function prediction data are\
