    \ yet often redundant informa-\\ntion. First, on top of a primary KG (G1), for which we want to learn and\\ngenerate predictions,\
    \ it introduces a secondary KG, the BRG or G2. The\\nBRG serves the goal of improving entity connectivity during message\\\
    npassing (Fig. 1c\\u2013e) and thereby enriching the representation of tri-\\nplets through the incorporation of additional\
    \ paths and relationships,\\nwithout affecting loss computation, guaranteeing a scalable solution\\nalso with very large\
