    nTo evaluate BRG quality and potential biases in LP, we conducted\\nperturbation experiments. Biological networks, such\
    \ as PPIs, often\\nexhibit study bias, where well-studied disease-related proteins have\\nhigher node degrees. We first\
    \ analysed bias toward high-degree nodes,\\na common issue in LP, where models favour well-connected nodes,\\npotentially\
    \ reducing generalization to low-degree nodes. By computing\\nand visualizing MRR stratified by node degree across all\
    \ tasks (Fig. 3a),\\nwe find no correlation between performance and query node degree\\nfor three of the four tasks: gene\
    \ function prediction, SL and lncRNA,\\nsuggesting no bias toward genes, lncRNAs or pathway hubs. However,\\nfor drug\
    \ repurposing, we observe a weak positive correlation (0.23),\\nindicating a tendency of the model to associate drug indications\
    \ with\\nwell-characterized drugs or diseases.\\nWe next assessed the impact on BioPathNet performance (meas-\\nured by\
    \ the MRR) of introducing random noise into the BRG by either\\nadding random edges at varying proportions (10\\u201380%)\
