    \ split, 178 diseases had known indications, with an\\naverage of 5.58 indications per disease. For 60 out of 178 diseases,\\\
    nall known treatments were prioritized within the top 10 predictions\\nsampled from a list of 7,000 drug candidates. Recall@k\
    \ quantifies the\\nproportion of ground-truth items found within the top-k predictions.\\nFor instance, at k = 20, the\
    \ recall for indication across all diseases was\\n0.619 for BioPathNet, meaning that 61.9% of the ground-truth drugs\\\
    nwere found within the top 20 predictions. In contrast, Recall@20 for\\nTxGNN was 0.539 and 0.259 for DREAMwalk.\\nFor\
    \ the SL task, we benchmarked BioPathNet in both transductive\\nand inductive settings against KR4SL55, a state-of-the-art\
    \ GNN-based\\nmethod that leverages path-representation learning to predict and\\nexplain SL gene pairs (Extended Methods).\
    \ We tested thresholds from 0\\nto 0.8 (in 0.1 increments) from SythLethDB, corresponding to increas-\\ning confidence\
    \ scores on reported SL interactions, to assess their\\nimpact on BioPathNet and KR4SL (Supplementary Fig. 2b). However,\\\
    nour primary evaluation focused on thresholded data (SL confidence\\nscore >0.3, to balance data quality and performance)\
    \ and unthres-\\nholded data, which corresponds to the original KR4SL dataset with\\nunfiltered interactions. BioPathNet\
    \ outperformed KR4SL in MRR\\nacross both transductive and inductive settings, as well as for both\\nthresholded and unthresholded\
    \ data (Fig. 5d), while having a con-\\nsiderably lower training time compared with KR4SL (Fig. 4b). While\\ngains in\
