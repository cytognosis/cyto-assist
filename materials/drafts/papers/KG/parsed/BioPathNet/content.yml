    nconsistently positive.\\nDespite the availability of databases on RNA interactions, global\"\n  },\n  {\n    \"name\"\
    : \"methods for predicting lncRNA\\u2013target interactions remain limited,\",\n    \"text\": \"with most focusing on\
    \ specific interaction types. BioPathNet addresses\\na broader challenge: prioritizing lncRNA\\u2013target interactions\
    \ (physical,\\nregulatory, direct and indirect) using LP. Among recent deep learning\\nframeworks, we selected DeepLGP65\
    \ for benchmarking due to its supe-\\nrior performance in lncRNA\\u2013target classification. DeepLGP integrates\\ngenomic\
    \ location, expression and miRNA interactions to construct a\\ngene interaction network. It employs a GCN encoder to extract\
    \ fea-\\ntures, which are combined with original lncRNA and gene features\\nand processed by a convolutional neural network\
    \ classifier. Trained\\non LncRNA2Target v.2.0, DeepLGP utilizes additional public datasets\\nfor feature computation.\
    \ Since BioPathNet and DeepLGP use differ-\\nent datasets, each model was trained separately but evaluated on a\\nshared\
    \ test set. In addition, we adapted BIONIC, originally designed for\\ngene function prediction, for lncRNA\\u2013target\
    \ prediction (lncBIONIC).\\nBioPathNet was benchmarked against lncBIONIC, following the same\\ntraining procedure and\
    \ evaluating both forward and forward+reverse\\ninteractions (see \\u2018Comparison with baselines\\u2019 in Extended\
    \ Methods).\\nlncBIONIC achieved a test set MRR of just 0.04, significantly lower than\\nBioPathNet\\u2019s 0.19, and\
    \ performed worse across all metrics (Fig. 5e).\\nHowever, it still demonstrated some predictive capability despite\\\
    nnot being designed for this task. DeepLGP, while achieving a lower\\nMRR than BioPathNet (0.25 vs 0.33 on the intersection\
    \ test set), nearly\\nmatched BIONIC in Hits@k and outperformed it in AUPRC and F1 score\\n(Fig. 5e). Overall, task-specific\
    \ baselines performed better for their\\nintended tasks than general LP methods, even when compared with\\nmore general\
    \ complex models.\\nBioPathNet\\u2019s interpretability and human-curated evaluation\\nOne key advantage of NBFNet is\
    \ its ability to provide interpretable\\npredictions through paths, which are crucial for understanding the\\nrationale\
    \ behind specific predictions. Intuitively, these interpreta-\\ntions should highlight paths that influence the prediction\
    \ the most. In\\nBioPathNet, this follows the NBFNet framework (see Methods), where\\nthe top-k path interpretations for\
    \ a prediction are formally defined\\nas the first derivative (gradient of the prediction) with respect to\\neach path\
    \ between a head and a tail node. We present below a general\\noverview and quantitative evaluation of the most important\
    \ nodes\\nand node types in top explanation paths across the different LP tasks,\\naimed at assessing the biological plausibility\
    \ of the model\\u2019s outputs.\\nIn addition, we provide several interpretability examples, each illus-\\ntrating how\
    \ BioPathNet\\u2019s top-ranked paths for a given triplet can be\\nnaturally understood.\\nGlobal explanation analysis.\
    \ We conducted a global analysis of the\\nkey node types driving top predictions for a specific LP task. For each\\npredicted\
    \ triplet, we selected the top 50 test-set predictions consist-\\nently recovered in at least 3 out of 5 random seeds,\
    \ ensuring robustness\\nbefore extracting explanations. For each, we identified the top 10 most\\ninfluential explanation\
    \ paths (see Methods), then summarized the\\nmost frequent node types across these paths (Supplementary Fig. 3),\\nhighlighting\
    \ the 5 most commonly traversed nodes within each type.\\nThis analysis was performed for all 5 disease-specific drug\
    \ indication\\ntasks and synthetic lethality prediction. We excluded aggregation for\\ntasks involving general cellular\
    \ processes (for example, gene or lncRNA\\nfunction prediction), where the broader functional diversity made such\\nsummaries\
    \ less informative.\\nOur results show that node types such as \\u2018drug\\u2019 and \\u2018disease\\u2019 from\\nPrimeKG\
    \ most strongly explain disease\\u2013drug indications, followed\\nby \\u2018gene\\u2019 and \\u2018phenotype\\u2019 node\
    \ types (Supplementary Fig. 3). From a\\nqualitative assessment, the most frequent nodes along explanation\\npaths align\
    \ well with the prediction tasks. For example, in the cell pro-\\nliferation disease split, top disease nodes relate to\
    \ cancer subtypes or\\nprocesses such as somatic mutations and uncontrolled growth, while\\ntop drug nodes such as tetramin,\
    \ rucaparib and altretamine are chemo-\\ntherapeutics used in oncology, suggesting that the model repurposes\\nexisting\
    \ cancer drugs plausibly. In the mental health task, top-ranked\\nnodes include antipsychotic drugs and central nervous\
    \ system-related\\ngenes (for example, HTR1D, HTR1F, HDAC6) associated with depression,\\nanxiety and neurological disorders66,67.\
    \ While less dominant than \\u2018dis-\\nease\\u2019 and \\u2018drug\\u2019 nodes, \\u2018phenotype\\u2019 and \\u2018anatomy\\\
    u2019 types play a notable\\nrole, especially in mental health (where drugs often treat symptoms\\nsuch as seizures) and\
    \ anaemia (where liver-related phenotypes are\\ncommon), as shown in Supplementary Fig. 3.\\nConsistent with perturbation\
    \ experiments on synthetic lethality\\nprediction, gene\\u2013gene interactions, and thus the \\u2018gene\\u2019 node\
    \ type, are\\nthe primary drivers of BioPathNet\\u2019s predictions, with much smaller\\ncontributions from \\u2018cellular\
    \ component (CC)\\u2019, \\u2018molecular function\\n(MF)\\u2019, \\u2018biological process (BP)\\u2019 and \\u2018pathway\\\
    u2019. Despite their lower overall\\ninfluence, the most frequently traversed nodes are highly relevant to\\ncancer. Notably,\
    \ proto-oncogenes KRAS, NRAS and HRAS\\u2014key members\\nof the RAS family and frequently mutated in cancer\\u2014are\
    \ among the top\\ncontributors. Other influential nodes include the plasma membrane,\\ncrucial for cancer cell homeostasis,\
    \ and signalling pathways such as the\\nRAS/BRAF cascade, which are central to tumour progression.\\nTo more quantitatively\
    \ compare our explanations with established\\nbiomedical knowledge, we conducted overrepresentation analysis on\\nthe\
    \ most influential genes\\u2014those most frequently appearing in the top\\n10 explanation paths (as described above).\
    \ Specifically, we analysed\\n\\nNature Biomedical Engineering\\nArticle\\nhttps://doi.org/10.1038/s41551-025-01598-z\\\
    nDisGeNET terms, including human diseases, symptoms and associated\\nmolecular mechanisms from the literature, for four\
    \ disease splits from\\nthe drug repurposing task, and KEGG pathways for the synthetic lethal-\\nity and cell proliferation\
    \ tasks, the latter to enable a better comparison\\nwith known cancer pathways. Results, shown in Supplementary Fig. 4,\\\
    nhighlight the top 10 enriched (adjusted P < 0.01 from Fisher\\u2019s exact\\ntest, Benjamini\\u2013Hochberg correction)\
    \ and least enriched terms (as\\ncontrols). We observe strong concordance between our explanation\\nnodes and established\
    \ knowledge: for example, statistically significant\\nterms align with known KEGG cancer pathways in the synthetic lethality\\\
    nand cell proliferation tasks. DisGeNET analysis further supports the\\nbiological relevance of our explanations: genes\
    \ from top explanation\\npaths are highly enriched for disease-relevant terms. In the cardio-\\nvascular diseases split,\
    \ enriched terms include \\u2018hypertensive disease\\u2019,\\n\\u2018atherosclerosis\\u2019, \\u2018coronary heart disease\\\
    u2019, \\u2018myocardial infarction\\u2019 and\\n\\u2018hypertension\\u2019. Similar patterns emerge for mental health,\
    \ adrenal\\ngland and anaemia, reinforcing the plausibility and domain alignment\\nof the model\\u2019s explanations.\\\
    nCase study 1: interpreting disease\\u2013drug indication predictions for\\nALL. As a first example, in the context of\
    \ the drug repurposing task,\\nwe closely examined individual disease predictions within the cell\\nproliferation split,\
    \ focusing on drug associations for ALL, a complex\\ncancer characterized by the abnormal proliferation of lymphoid cells\\\
    nin the blood and bone marrow, leading to impaired immune func-\\ntion68. BioPathNet correctly ranked the only known contraindication,\\\
    nAprostadil, at rank 1 with a probability score of 0.73 and placed all 21\\nknown indications within the top 34 predictions\
    \ (Fig. 6a). Among the\\nhighest-ranked known treatments (in orange) were clofarabine, tenipo-\\nside and methotrexate,\
    \ while the top-ranked unknown treatments (in\\nblue) included dasatinib and bosutinib (Fig. 6a, left). Dasatinib, ranked\\\
    nwith a probability score of 0.724, is absent in PrimeKG but is already\\nused for Philadelphia chromosome-positive ALL\
    \ (Ph+ ALL). Bosutinib,\\npredicted for ALL with a probability score of 0.721, was further analysed\\nthrough path visualization\
    \ to explain its ranking.\\nWhile BioPathNet uses all paths from source to target node for the\\nprediction, the visualization\
    \ highlights the ten most important paths\\nranked by gradient in an ad hoc pseudo-linear explanation, with edge\\nwidth\
    \ indicating recurrence across these paths. The most important\\npath, marked in red, links bosutinib to ALL through key\
    \ disease genes\\nAICDA and DUX4 (refs. 69\\u201371). This path traverses \\u2018Ph+ ALL\\u2019, \\u2018chronic\\nmyelogenous\
    \ leukaemia\\u2019, \\u2018BCR-ABL1 positive\\u2019 and the gene BCR, before\\nconnecting to \\u2018bosutinib\\u2019 via\
    \ the \\u2018drug protein\\u2019 relation (Fig. 6d, right).\\nOriginally approved for chronic myeloid leukaemia in 201272,73,\
    \ bosu-\\ntinib is now being investigated for ALL74.\\nCase study 2: hypothesis generation for treatment of gastric can-\\\
    ncer. To demonstrate BioPathNet\\u2019s ability to generate hypotheses for\\nlab testing and evaluation, we investigated\
    \ gastric cancer. Similar\\nto ALL, both known contraindications and indications were ranked\\nhighly (all 5 contraindications\
    \ in the top 6, and 5 out of 6 indications in\\nthe top 5) (Fig. 6b, left). One previously undiscovered drug predicted\\\
    nfor gastric cancer treatment was acitretin, an oral retinoid similar to\\nVitamin A, indicated for skin diseases such\
    \ as psoriasis73. Although\\nuntested for gastric cancer, acitretin has been considered in combina-\\ntion with clarithromycin\
    \ for cutaneous squamous cell carcinoma due\\nto its apoptosis-inducing properties75,76. Interestingly, all paths from\\\
    ngastric cancer to acitretin in the interpretability plot pass through\\nRBP1 (retinol-binding protein 1), annotated with\
    \ the \\u2018retinoic acid\\nbiosynthesis process\\u2019 (Fig. 6b, right). Recent studies suggest this path-\\nway\\u2019s\
    \ involvement in gastric cancer treatment and provide pre-clinical\\nevidence supporting the use of all-trans retinoic\
    \ acid (ATRA)77,78. By\\nvisualizing important paths between drugs and diseases, researchers\\ncan verify the predictions\\\
    u2019 plausibility and generate hypotheses for\\nfurther laboratory validation.\\nCase study 3: predicting drug indications\
    \ for AD. For the final experi-\\nment in the drug repurposing task, we aimed to investigate a disease\\nnot analysed\
    \ by TxGNN to evaluate how well BioPathNet generalizes to\\nanother case study. Here we examined the indication predictions\
    \ for\\nAlzheimer\\u2019s disease together with medical experts. AD is a neurode-\\ngenerative disorder characterized\
    \ by extracellular amyloid beta and\\nintracellular tau protein accumulation in the brain. While AMYLOID and\\nTAU proteins\
    \ are central to AD, the exact mechanisms remain unclear.\\nEmerging evidence suggests that additional pathways, such\
    \ as immu-\\nnoinflammation and bioenergetic dysregulation, may offer promising\\ntherapeutic targets79\\u201381. Presently,\
    \ US Food and Drug Administration\\n(FDA)-approved treatments include only two disease-modifying and\\nfive symptomatic\
    \ treatments, none of which provide a cure for AD.\\nTo explore the potential of BioPathNet for such complex and hetero-\\\
    ngeneous diseases, we trained BioPathNet on a data split tailored for\\nzero-shot prediction on a custom-defined Alzheimer\\\
    u2019s disease area\\nsplit. Here we followed the disease evaluation code as provided by\\nTxGNN to exclude all treatments\
    \ for Alzheimer\\u2019s, as well as closely\\nrelated diseases (for example, dementia) (Supplementary Table 15). We\\\
    nthen evaluated the top 20 predictions for indications and contraindica-\\ntions for Alzheimer\\u2019s disease.\\nAmong\
    \ the top 14 predictions, BioPathNet successfully retrieved\\n7 out of 8 drugs classified as known treatments in PrimeKG,\
    \ including\\n4 out of 7 FDA-approved AD treatments (Fig. 6c). It also identified\\nepicriptine, a nootropic with an unknown\
    \ mode of action, and ace-\\ntylcarnitine, involved in \\u03b2-oxidation of fatty acids82. Known AD drugs\\nwith low probability\
    \ scores included pramiracetam (ranked 344),\\nmemantine (ranked 412), lecanemab (ranked 2,250) and aducanumab\\n(ranked\
    \ 2,216)83\\u201386. Notably, two drugs in clinical trials, nicotine (Phase\\nII trial for cognition; NCT02720445) and\
    \ bupropion (Phase III trials for\\nagitation in AD; NCT05557409, NCT04947553)87, were among the top\\n20 newly predicted\
    \ indications. These predictions were linked to BDNF,\\na gene crucial for synaptic maintenance and plasticity88, with\
    \ both\\ndrugs shown to elevate BDNF protein levels89,90. In addition, everoli-\\nmus, a selective mTOR inhibitor, was\
    \ predicted with high probability.\\nRapamycin and its analogue everolimus are being evaluated for AD\\ntreatment91,92,\
    \ with everolimus offering favourable pharmacokinet-\\nics93. Therefore, everolimus may present an additional candidate\
    \ for\\ntargeting the hyperactivated mTOR pathway in AD.\\nAdditional examples. Supplementary Figs. 5\\u20137 provide\
    \ additional\\nexamples of BioPathNet\\u2019s predictions and their biological interpreta-\\ntion in gene function prediction,\
    \ SL pairs and lncRNA\\u2013target target\\nprediction. For instance, the association between CRY1 and the \\u2018circa-\\\
    ndian rhythm\\u2019 pathway is explained by the key path highlighted in red:\\nCRY1 protein in complex with \\u2192 PER3\
    \ interacts with \\u2192 ARNTL\\nfunction of \\u2192 \\u2018Circadian rhythm\\u2019 (Supplementary Fig. 5). This path\
    \ is\\nbiologically meaningful, as it captures the well-established mechanism\\nby which the essential transcription factors\
    \ ARNTL and CLOCK regulate\\ncircadian rhythm. They upregulate PER3 and CRY2 gene expression94,95,\\nwhich then form heterodimers\
    \ to repress their own transcription,\\nestablishing a negative feedback loop96,97.\\nIn SL prediction, two notable examples\
    \ involve putative SL gene\\npairs consistently identified across model runs (seeds) with an aver-\\nage MRR of 0.75.\
    \ The first pair, EYA4 and MUS81, connects transcrip-\\ntion, eye development and DNA repair with a key DNA repair enzyme\\\
    n(MUS81). BioPathNet ranks MUS81 as EYA4 genes as the seventh strong-\\nest SL partner (Supplementary Fig. 6c), revealing\
    \ an explanation sub-\\ngraph with multiple paths through shared processes such as DNA\\nrepair, supporting their SL relationship\
    \ (Supplementary Fig. 6a). The\\nsecond gene pair, POLB and BRCA1, involves POLB, a base-excision\\nrepair polymerase\
    \ linked to Werner syndrome and oesophageal can-\\ncer. BioPathNet consistently ranks BRCA1 among POLB\\u2019s top 20\
    \ SL\\ngene partners (Supplementary Fig. 6d). The explanation subgraph\\n(Supplementary Fig. 6b) highlights the top 10\
