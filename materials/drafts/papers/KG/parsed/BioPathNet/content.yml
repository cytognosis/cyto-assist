    nedges at varying proportions (10\\u2013100%), as well as removing the top\\n5% highest-degree nodes. In addition, we\
    \ investigated whether specific\\nrelation types contribute more to performance or whether BioPathNet\\nprimarily benefits\
    \ from the overall connectivity provided by the BRG.\\nTo test this, we removed the top 5 relation types (based on edge\
    \ count)\\nfor each task and evaluated performance changes. The results show\\nthat the effects of these perturbations\
    \ vary by task and depend on the\\nspecific BRG (Fig. 3b). For gene function prediction, adding random\\nedges slightly\
    \ decreases performance, suggesting BioPathNet\\u2019s robust-\\nness to noise. However, the biggest performance drops\
    \ occur with\\nprogressive random edge deletions, ultimately reducing performance\\nto levels seen without the BRG (Fig.\
    \ 3b, top left corner). The impact\\nof removing individual relation types on BioPathNet\\u2019s performance\\nfor gene\
    \ function prediction varied by relation. Some had a greater\\neffect than others, particularly \\u2018chemical affects\\\
    u2019 (gene\\u2013chemical\\ncompound interactions), \\u2018interacts with\\u2019 (protein\\u2013protein interac-\\ntions)\
    \ and \\u2018in complex with\\u2019 (protein complexes). For drug repurpos-\\ning, adding random edges had no significant\
    \ impact on BioPathNet\\u2019s\\nperformance, while performance degradation was only observed\\nwhen 50\\u201380% of random\
    \ connections were removed (Fig. 3b, top\\nright corner). Among the top 5 relations, removing individual relation\\ntypes\
    \ from the PrimeKG BRG had no noticeable effect for drug\\u2013disease\\nindication prediction, except a modest decrease\
    \ for \\u2018disease phenotype\\npositive\\u2019, indicating whether a disease is linked to the presence of a\\nrelated\
    \ phenotype. The same relation has an even stronger effect on\\nthe performance of contraindication prediction, together\
    \ with rela-\\ntion type \\u2018anatomy protein present\\u2019, which specifies the body part or\\ntissue where a gene\
    \ is expected to be expressed or, conversely, absent.\\nAlthough we cannot exclude the possibility that any other relation\
    \ type\\nof the 25 remaining relation types from PrimeKG might have a stronger\\neffect on BioPathNet performance, these\
    \ results suggest that biomedi-\\ncal KGs exhibit redundancy, with certain connection types being more\\ncritical than\
    \ others for this task.\\nFor the lncRNA\\u2013target prediction task, we observe trends similar\\nto those in gene function\
    \ prediction, where adding or removing edges\\nleads to modest but consistent performance declines (Fig. 3b, bottom\\\
    nright corner). In addition, different BRG relation types, such as \\u2018control\\nstate change of\\u2019 and \\u2018controls\
    \ expression of\\u2019, appear more informative\\ncompared with gene function, pointing to the regulatory relationship\\\
    nbeing more relevant in the context of lncRNA\\u2013target gene regulation.\\nFinally, across all tasks, we observe a\
    \ substantial performance\\ndrop when removing the top 5% of high-degree nodes from the BRG.\\nThis aligns with expectations,\
    \ as predictive paths are more likely to\\ntraverse network hubs. For SL, the BRG, constructed by the authors of\\nKR4SL,\
    \ includes various gene, pathway and GO relations, along with\\nan additional SL-specific component. Our findings suggest\
    \ that non-SL\\nrelations in the BRG do not improve performance and may even be\\ndetrimental. Instead, only the additional\
    \ SL component significantly\\nenhances performance, highlighting the overall low quality of the\\nSynLethDB graph (Fig.\
    \ 3b, bottom left corner). Overall, our analysis\\nsuggests that the connectivity of the graph, augmented by the BRG,\\\
    nseems to be more critical for performance, rather than individual rela-\\ntion types. To test this, we computed the average\
    \ shortest path between\\nhead and tail nodes (as a proxy for connectivity) across all perturba-\\ntion experiments for\
    \ each LP task. We observed a negative correlation\\nbetween task-specific MRR performance and shortest path length\\\
    n(\\u22120.15 and \\u22120.31 for drug repurposing, contraindication and indication;\\n\\u22120.06 for gene function;\
    \ \\u22120.33 for lncRNA\\u2013target prediction; and \\u22120.58\\nfor SL). These findings support our hypothesis that\
    \ performance drops\\nare primarily driven by disruptions in graph connectivity.\\nComparison with baselines\\nWe compared\
    \ BioPathNet\\u2019s performance to various baselines, includ-\\ning general LP models applied across all four LP tasks\
    \ and task-specific\"\n  },\n  {\n    \"name\": \"methods designed for individual LP challenges. We selected\",\n    \"\
    text\": \"general-purpose baselines to evaluate their ability to handle various\\nbiomedical tasks compared to BioPathNet,\
    \ which is also designed and\\ntested on different LP tasks. In contrast, task-specific baselines are\\noptimized for\
    \ a particular task, potentially giving them an advantage\\non that task over more generalized models.\\nBioPathNet vs\
    \ general GNN-based LP method. We systematically\\ncompared BioPathNet to general LP prediction methods, such as\\nR-GCN,\
    \ which generates node embeddings on heterogeneous graphs;\\nHGT, a GNN-based framework with node- and edge-type dependent\\\
    nattention for heterogeneous graphs; and RAGAT, a GAT-based model\\nincorporating node- and edge-type-aware message passing.\
    \ Finally,\\nwe compared BioPathNet to the original NBFNet across all tasks. To\\nensure fairness, baselines were trained\
    \ on the full KG (training graph\\nfrom G1+BRG) whenever computationally feasible. For R-GCN, RAGAT\\nand HGT, we also\
    \ applied the same NTA-based negative sampling as\\nBioPathNet, allowing a direct assessment of node embedding on het-\\\
    nerogeneous graphs versus path embedding, without confounding\\neffects from differing negative sampling strategies. Hyperparameter\\\
    ntuning to find the best-performing configuration was done for all\\ngeneral baselines, when possible, to utilize these\
    \ methods at their best\\n(Extended Methods \\u2018Baseline methods used for comparison\\u2019).\\nFor SL and lncRNA prediction,\
    \ BioPathNet and NBFNet performed\\nsimilarly across metrics. BioPathNet slightly outperformed other base-\\nlines on\
    \ SL prediction, while HGT matched its MRR on the lncRNA task\\nbut lagged in Hits@3\\u201310. Interestingly, while BioPathNet\
    \ and NBFNet\\nremained consistent across tasks, HGT struggled with SL prediction,\\nshowing the lowest performance, whereas\
    \ RAGAT performed surpris-\\ningly well. Conversely, for lncRNA prediction, HGT was clearly superior\\nto RAGAT. Overall,\
    \ R-GCN was the weakest performer across all LP tasks.\\nOn the function prediction task, BioPathNet outperformed all\\\
    nKGE baselines. It achieved a sustantial performance increase, averag-\\ning 42% higher MRR and 24% higher Hits@10 over\
    \ RAGAT, the weakest\\nbaseline. However, its improvement over HGT, the second-best model,\\nwas modest, with only a 2.2%\
    \ gain in MRR and 3.2% gain in Hits@10. HGT\\nremained competitive, showing performance close to that of BioPath-\\nNet\
    \ across all evaluated metrics (MRR and Hits@1,3,10).\\nFor the more challenging drug repurposing task, specifically,\\\
    nzero-shot disease\\u2013drug prediction, BioPathNet demonstrated a clear\\nadvantage over GNN-based methods such as HGT\
    \ and R-GCN across\\nall disease splits. Our experiments show that these methods struggle\\nto capture the complexity\
    \ of the KG, often yielding extremely low\\nperformance, with some metrics approaching random values (Fig. 4a).\\nIn addition,\
    \ due to the large scale of the drug repurposing graph (~5 mil-\\nlion edges), baselines such as RAGAT and NBFNet were\
    \ computationally\\ninfeasible, requiring over 48\\u2009h per epoch on GPUs. Since computational\\nefficiency is crucial\
    \ in practical applications, we analysed the relation-\\nship between model training time (as a proxy for efficiency)\
    \ and perfor-\\nmance. While it became obvious that node embedding-based methods\\nsuch as R-GCN and HGT are computationally\
    \ efficient for biomedical\\nLP tasks, compared to path-based methods, even on large graphs, this\\nefficiency comes at\
    \ the cost of lower performance in most cases (Fig. 4).\\nAlthough NBFNet performed similarly to BioPathNet on smaller\\\
    ntasks such as lncRNA\\u2013target prediction and SL, its training time was,\\non average, 80 times higher (for example,\
    \ gene function prediction).\\nA similar trend was observed for RAGAT, which had, on average, the\\nsecond-highest runtime\
    \ across all baselines. In addition, despite utiliz-\\ning GPU resources, NBFNet was infeasible to run on the drug repurpos-\\\
    ning task, and RAGAT failed on both drug repurposing and gene function\\nprediction due to memory limitations, with per-epoch\
    \ training times\\nexceeding 48\\u2009h. Overall, BioPathNet demonstrated a strong balance\\nbetween accuracy and computational\
    \ efficiency.\\nBioPathNet vs task-specific baselines. Gene function prediction has\\nbeen approached through various\
