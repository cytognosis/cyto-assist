    \ from non-occurring\\ngene\\u2013gene lethality pairs, avoiding gene\\u2013GO term or other cross-type\\ntriplets. For\
    \ this task, we also trained BioPathNet in an inductive set-\\nting, predicting SL links between gene pairs on an inference\
    \ graph\\ndistinct from the training graph, following a split based on nodes of\\nKnowledge Representation for Synthetic\
    \ Lethality (KR4SL). This setup\\nallowed us to assess BioPathNet\\u2019s ability to generalize to unseen data.\\nFor\
    \ lncRNA target prediction, BioPathNet was trained on triplets where\\nthe head node is an lncRNA and the tail node a\
    \ target of various types\\n(for example, microRNA, protein-coding gene, another lncRNA or\\nother; see Fig. 2d), linked\
    \ by a regulatory mechanism (for example, \\u2018epi-\\ngenetic regulation\\u2019 or \\u2018sponge interaction\\u2019).\
    \ Negatives were generated\\nas above by corrupting positive lncRNA\\u2013target triplets while preserving\\nnode types;\
    \ for instance, if a positive triplet involved an lncRNA and\\na protein-coding gene, only non-occurring lncRNA\\u2013protein\
    \ interac-\\ntions were sampled. We report for each task the mean reciprocal rank\\n(MRR), which measures how well the\
    \ model ranked correct pairs among\\nnegatives, and Hits@k (k\\u2009=\\u20091, 3, 10), which quantifies the proportion\
    \ of\\npositive triplets among the top-k predictions\\u2014both standard metrics\\nfor KG\\u2013LP problems (Table 1).\\\
    nBioPathNet\\u2019s performance and evaluation of design choices. Table 1\\nsummarizes the results of KG completion across\
    \ the four tasks, dem-\\nonstrating that BioPathNet achieves an MRR consistently better than\\nrandom for all LP tasks\
    \ (see Methods), indicating strong predictive\\ncapability. The model performs particularly well in drug\\u2013disease\
    \ indi-\\ncation prediction for the disease categories of adrenal gland, anaemia\\nand cell proliferation, achieving an\
    \ MRR above 0.4 in all three cases\\nand Hits@10 scores ranging from 58% to 100%. Performance is slightly\\nlower for\
    \ other disease categories, such as \\u2018mental health\\u2019, with \\u2018cardio-\\nvascular\\u2019 diseases posing\
    \ the greatest challenge, yielding an MRR of\\n0.2 and a Hits@10 score of 30%. While the drug repurposing tasks pri-\\\
    nmarily focus on predicting disease\\u2013drug indications, BioPathNet also\\nperforms well in identifying disease\\u2013drug\
    \ contraindications, with an\\naverage MRR of 0.53 (Supplementary Table 6). BioPathNet performs\\nwell on the gene function\
    \ prediction task, achieving an MRR of 0.6\\nand a Hits@10 score of 72%. For the SL pair prediction task, perfor-\\nmance\
    \ improved substantially when low-confidence SL edges were\\nfiltered out from the graph, with MRR increasing from 0.31\
    \ to 0.36\\nand Hits@10 rising from 44% to 50%. Finally, for the lncRNA\\u2013target\\nprediction task\\u2014one of the\
    \ most challenging due to graph sparsity and\\nrelational uncertainty\\u2014BioPathNet achieved an MRR of 0.19, outper-\\\
    nforming random predictions. These results underscore BioPathNet\\u2019s\\nversatility in handling diverse LP tasks across\
    \ different biomedical KGs,\\nregardless of task-specific complexities.\\nTo assess the impact of key design choices,\
    \ such as BioPath-\\nNet\\u2019s NTA negative sampling or SANS, as well as the use of a BRG, we\\nconducted ablation studies.\
    \ We compared performance with and\\nwithout NTA and SANS and evaluated BioPathNet with and without\\na BRG for message\
    \ passing alone on all four benchmarked tasks.\\nBioPathNet benefits significantly from incorporating NTA sampling\\nand\
    \ BRG (Supplementary Tables 6\\u20139). In the gene prediction task,\\nsampling negatives from the same node type as the\
    \ tail node improves\\nMRR by 4% and Hits@k by 2\\u20136.2% compared to random sampling\\n(Supplementary Table 7). Similar\
    \ gains are observed for SL and lncRNA\\u2013\\ntarget KGs (Supplementary Tables 8 and 9, respectively). For drug\\u2013dis-\\\
    nease indication prediction, MRR improves across all disease splits, with\\nincreases ranging from 1.6% (cell proliferation)\
    \ to 13.7% (adrenal gland),\\nalongside larger Hits@k improvements compared with other tasks in\\nalmost all cases (Supplementary\
    \ Table 6). While applying SANS alone\\nresulted in minimal performance gains, the greatest improvement\\noccurred when\
    \ SANS\\u2014accounting for local graph structure during\\nnegative sampling\\u2014was combined with NTA sampling (Fig.\
    \ 2e). This\\ncombination enhanced performance in gene function, SL and lncRNA\\u2013\\ntarget LP tasks. However, for\
    \ drug\\u2013disease indication prediction (and\\ncontraindication), the benefits were only partially observed across\\\
    nsome metrics, with a notable exception in the cardiovascular disease\\nsplit, where SANS reduced prediction performance.\
    \ In addition, SANS\\nsampling was computationally expensive due to the random walk\\nsearch (even when limited to length\
    \ 2, see Methods), so we report exper-\\niments with this setting disabled for the remaining part of the section.\\nUsing\
    \ a BRG for message passing in addition to the train-\\ning graph of G1 improved performance across all tasks (Fig. 2f\
