    \ captures literature connected to the\\nHRA v1.4 (June 2023). In 2021, more HRA DO\\u00a0types were added (omap DOs34,\
    \ later 2d-ftu DOs67), plus a grow-\\ning library of SOPs detailing HRA construction and usage (humanatlas.io/standard-operating-procedures).\
    \ As\\nnew HRA DOs are published, they are ingested into the HRA KG.\\nFig.\\u00a05c shows the number of terms that were\
    \ added to existing ontologies\\u00a0based on SME input via HRA DOs.\\nAs of May 2025, the HRA and other atlasing efforts\
    \ added 162 terms to Uberon, 155 to CL, and 468 to PCL\\n(shown in the line graph\\u00a0are additions between July 2023\\\
    u00a0and January 2025).\\nUsage Notes\\nUsers access the HRA KG via UIs, APIs, and data products on lod.humanatlas.io\
    \ to answer biomedical ques-\\ntions. A list of all HRA applications that use the HRA KG is provided in Table\\u00a0S3.\
    \ A list of publications and\\naliases used throughout HRA applications per HRA DO is provided in Table\\u00a0S6. Exemplary\
    \ Python code is\\nprovided on the companion website at cns-iu.github.io/hra-kg-supporting-information/#basic-usage.\\\
    nFig. 5\\u2002 Graphs from the HRA Dashboard showing HRA KG v2.2 growth and coverage: (a) DOs per organ,\\n(b) HRA KG\
    \ growth in terms of DOs over time, (c) number of terms added from the HRA and other sources to\\nCL, PCL, and Uberon\
    \ over time.\\n\\n15\\nScientific Data |         (2025) 12:1100  | https://doi.org/10.1038/s41597-025-05183-6\\nwww.nature.com/scientificdata\\\
    nwww.nature.com/scientificdata/\\nThe HRA KG makes it possible to access harmonized, high-quality reference and experimental\
    \ data in stand-\\nard data formats. Three widely used queries are detailed: (1) retrieve AS-CT-B records from the ASCT+B\\\
    ntables, (2) get mean B expression values for CTs across datasets in HRApop, and (3) query the HRA KG to\\nachieve two\
    \ types of predictions: cell type populations given a spatial origin (3D extraction site), and spatial\\norigin (3D extraction\
    \ site and registration corridor) given a cell type population, see HRA user stories 1-2 in a\\nrelated publication2.\
    \ Code for queries and advanced usage examples are presented on GitHub97. An overview of\\nHRA user stories and how the\
    \ HRA KG supports them is provided in Table\\u00a0S7.\\nTo simplify HRA KG usage, the grlc.io service was implemented\\\
    u00a0to make a set of canned SPARQL que-\\nries available as RESTful\\u00a0web requests. Internally, the service creates\
    \ an OpenAPI specification (swagger.io/\\nspecification) that advertises the available queries. A user-friendly interface\
    \ to these queries is provided\\u00a0at\\napps.humanatlas.io/api/grlc/. Annotated screenshots of the query interface with\
    \ instructions on how to\\nrun the queries and download the resulting data is available on the companion website at cns-iu.github.io/\\\
    nhra-kg-supporting-information/#how-to-run-queries-via-our-openapi-spec. This deployment was inspired by\\nthe PubMed\
    \ Medical Subject Headings (MeSH)\\u00a0SPARQL Explorer at id.nlm.nih.gov/mesh/query.\\nThe HRA KG can also be used in\
    \ coordination with relational databases. With initial SPARQL queries into\\nthe KG, users can get data as a long table.\
    \ Then, a database system like DuckDB (duckdb.org) can be used to\\naggregate the KG data with SQL features that perform\
    \ complex window functions and aggregations on it. That\\nis,\\u00a0users can index the HRA KG data and save it in a relational\\\
    u00a0database and use it\\u00a0for different purposes.\"\n  },\n  {\n    \"name\": \"Code availability\",\n    \"text\"\
    : \"All the code used to construct and deploy the HRA KG v2.2 is available on GitHub46 and URLs are provided\\nin Table\\\
    u00a0S4. Documentation, including an additional overview of HRA KG construction code, is provided in\\nthe Supporting\
    \ Information repository for this paper on GitHub97. Documentation with annotated screenshots\\nto show how to run pre-made\
    \ SPARQL queries against the HRA KG via grlc.io is at cns-iu.github.io/hra-kg-\\nsupporting-information/#how-to-run-queries-via-our-openapi-spec.\
    \ All code was released under the MIT\\nLicense.\\nReceived: 20 February 2025; Accepted: 9 May 2025;\\nPublished: xx xx\
