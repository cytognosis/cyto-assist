    \ gui-\\ndance in a single resource.\"\n  },\n  {\n    \"name\": \"Methods\",\n    \"text\": \"Sentence retrieval\\nWe\
    \ initially gathered 1300 food names, including both common and sci-\\nenti\\ufb01c terms, from FooDB and FoodData Central\
    \ (FDC)7. We then used\\nthese names to search PubMed54 and PubMed Central (PMC)55, which host\\n36 million and 9.8 million\
    \ abstracts and full-text articles in biomedical and\\nlife sciences, respectively. The searches were conducted using\
    \ the NCBI\\u2019s\\nEntrez Direct (EDirect)56 to retrieve scienti\\ufb01c literature that mentions these\\nfood names.\
    \ We employed a search template \\u201c{food name} AND ((com-\\npound) OR (nutrient))\\u201d to ensure that the articles\
    \ included not only the food\\nname but also at least one of the keywords, \\u2018compound\\u2019 or \\u2018nutrient.\\\
    u2019 This\\nsearch template was empirically selected to enhance the accuracy of the\"\n  },\n  {\n    \"name\": \"results.\
    \ Next, we tokenized the retrieved scienti\\ufb01c literature into sentences\",\n    \"text\": \"using the NLTK library57\
    \ and excluded sentences that were either too short\\nor too long, following the approach used by LitSense in their study1.\\\
    nSentence \\ufb01ltering\\nSince not all sentences in the retrieved articles above were related to\\nfood\\u2013chemical\
    \ associations, we followed a two-step \\ufb01ltering procedure.\\nFirst, we used a fuzzy matching58 technique to keep\
    \ only sentences con-\\ntaining one of the food terms described in the last section, resulting in about\\n10 million sentences\
    \ mentioning food terms. Second, we \\ufb01ne-tuned a large\\nlanguage model, BioBERT16, to classify sentences that contain\
    \ valid\\nfood\\u2013chemical associations. This process resulted in 773,366 sentences that\\nwere highly likely (p >\
    \ 0.9) to contain food\\u2013chemical associations. More\\ndetails can be found in Supplementary Note 1.1.\\nAssociation\
    \ extraction\\nFor sentences that indicated food\\u2013chemical associations following the \\ufb01l-\\ntering step above,\
    \ we passed those with a probability greater than 90% to the\\nlarge language model-based information extraction models.\
    \ We compared\\nthe performance of two different models: OpenAI GPT-459 (Model ID: gpt-\\n4-0613) and GPT-3.560 with in-context\
    \ learning or \\ufb01ne-tuning. For both\\nmodels, we extracted food, food parts, chemicals, and chemical con-\\ncentrations.\
    \ For example, the sentence, \\u201cChinese cabbage leaves contain Ca\\n(1020 g kg-1 FW), Fe (26 g kg-1 FW), and total\
    \ glucosinolates (10.926\\nmicromol g-1 DW),\\u201d would result in the following three tuple extraction:\\n(Chinese cabbage,\
    \ leaves, Ca, 1020 g kg-1 FW), (Chinese cabbage, leaves, Fe,\\n26 g kg-1 FW), and (Chinese cabbage, leaves, total glucosinolates,\
    \ 10.926\\nmicromol g-1 DW). We provided more details in Supplementary Note 1.1.\\nFine-tuning of GPT models using annotation\
    \ rules\\nTo improve the accuracy and speci\\ufb01city of extracted data, we \\ufb01ne-tuned the\\nGPT-3.5 (Model ID:\
    \ gpt-3.5-turbo-0125) model with a dataset curated\\nbased on an extensive set of annotation rules. We have two annotators\
    \ label\\nthe same sentences independently and consolidate the disagreement. These\\nrules were designed and validated\
    \ through the analysis of over 1780 sen-\\ntences containing food and chemical information. Speci\\ufb01cally, we extracted\\\
    nthe information in the format: ({food}, {food part}, {chemical compound},\\nA\\nB\\nC\\nD\\nBreakfast\\nLunch\\nDinner\\\
    n\\u22120.5\\n0\\n0.5\\n\\u22120.5\\n0\\n0.5\\n100% Juice\\nCondiments and Sauces\\nSweet Bakery Products\\nFats and Oils\\\
    nBeverages\\nPlant-based Protein Foods\\nPhenolics\\nLipids\\nOther organic acids\\nCarbohydrates\\nAmino acids, peptides,\
    \ and proteins\\nOthers\\nDigestive System Diseases\\nSkin and Connective Tissue Diseases\\nRespiratory Tract Diseases\\\
