    \ Impact Score\\nFig. 5 | FoodAtlas-guided, category-matched ingredient swaps attenuate pre-\\ndicted disease risk and\
    \ expose their chemical drivers across breakfast, lunch, and\\ndinner. A Paired box-and-whisker plots of per-disease scores\
    \ (22 MeSH classes) for\\nbreakfast (blue), lunch (green), and dinner (orange) meals before (lighter tint) and\\nafter\
    \ (darker tint) replacing the single ingredient with the greatest weighted risk by a\\nnutritionally superior food from\
    \ the same category. Box centers show medians,\\nhinges the inter-quartile range, whiskers 1.5 \\u00d7 IQR, and dots outliers;\
    \ horizontal bars\\ndenote Wilcoxon signed-rank signi\\ufb01cance (p < 0.05, *p < 0.01, **p < 0.001). All\\nthree meal\
    \ types shift consistently toward lower risk after substitution. B Radar plots\\nfor one representative meal per time-of-day\
    \ illustrate the multidimensional bene\\ufb01t\\nof a single swap\\u2014nectarine \\u2192cranberry in a fruit-and-cottage-cheese\
    \ breakfast\\n(+21% aggregate improvement), hummus \\u2192olive in a pita-and-chickpea lunch\\n(+18%), and oatmeal-raisin\
    \ cookie \\u2192sweet-potato pur\\u00e9e in a spinach-and-feta\\ndinner (+4%). Solid polygons trace pre-swap scores, dashed\
    \ polygons post-swap\\nscores; adjoining dot-plots rank the \\ufb01ve chemicals contributing most to each\\nimprovement.\
    \ C For each meal type, paired heat-maps display the mean signed\\ncontribution of the ten most in\\ufb02uential chemicals\
    \ (columns) to every disease class\\n(rows): the left panel shows the change induced by the swap (baseline \\u2013 optimized),\\\
    nthe right panel the absolute post-swap impact. Meal-speci\\ufb01c color maps (Blues,\\nGreens, Oranges) reveal a conserved\
    \ pattern in which polyphenol-rich \\ufb02avonoids\\nand omega-3 fatty acids align with risk reductions (cool hues), whereas\
    \ heterocyclic\\namines, advanced glycation products, and saturated tri-acyl-glycerols drive risk\\nelevations (warm hues).\
    \ D Three-layer Sankey diagrams trace risk \\ufb02ow from food\\ncategories (left) through chemical classes (center) to\
    \ disease classes (right). Node\\nheights are equalized with a constant dummy \\ufb02ow to separate topology from\\nmagnitude,\
    \ so dominant \\u201crisk bottlenecks\\u201d stand out visually. Companion lollipop\\ncharts plot the \\u2013log\\u2081\\\
    u2080(p-values) for enrichment of each disease class, con\\ufb01rming the\\nstatistical signi\\ufb01cance of the observed\
    \ pathways. Together, the panels demonstrate\\nthat single, FoodAtlas-recommended swaps reliably lower predicted disease\
    \ burden\\nand that a small, mechanistically coherent set of chemicals mediates most of the\\nbene\\ufb01t.\\nhttps://doi.org/10.1038/s41538-025-00680-9\\\
    nArticle\\nnpj Science of Food |  (2026) 10:33\\n7\\n\\n{chemical concentration}) by following key principles: First,\
    \ extracting\\ninformation exactly as presented in sentences to ensure \\ufb01delity. Second,\\nannotating the most speci\\\
    ufb01c entities, such as individual compounds rather\\nthan broader chemical groups or food species, instead of generalized\
    \ cate-\\ngories. Third, preserving contextual modi\\ufb01ers, such as adjectives and pro-\\ncessing descriptors (e.g.,\
    \ \\u201caqueous extract of Mentha aquatica\\u201d).\\nFine-tuning focused on enhancing the model\\u2019s ability to handle\\\
    ncomplex entity structures and relationships. For instance, sentences\\ndescribing chemical concentrations within speci\\\
    ufb01c food parts (e.g., \\u201ccelery\\nleaves contain phenols\\u201d) were annotated to re\\ufb02ect both the food entity\
    \ and\\nitspart.Additionally,casesinvolvingsynonyms,acronyms,and hierarchical\\nrelationships (e.g., \\u201cblueberry\
    \ extract | Vaccinium angustifolium extract\\u201d)\\nwere \\ufb01ne-tuned to prioritize professional terminology and\
    \ ensure\\ncompleteness.\\nThe \\ufb01ne-tuned models were trained to generate outputs in a structured\\nformatsuitableforintegrationintotheFAKG.Validationmetrics,including\\\
    nprecision,recall,andF1scores,demonstratedsigni\\ufb01cantimprovementsover\\nbaseline models, particularly in extracting\
    \ nuanced relationships and rare\\ndescriptors. Supplementary Note 1.1 shows the details for our \\ufb01ne-\\ntuned model.\\\
    nKnowledge graph construction\\nOur FoodAtlas knowledge graph (FAKG) was formed by a set of ({food},\\ncontains, {chemical})-triplets.\
    \ Each entity can be a food or a chemical,\\nindexed by a unique FoodAtlas ID and other identi\\ufb01ers (e.g., FoodOn\
    \ IDs\\nfor food and PubChem CIDs for chemical entities). Each contains-triplet is\\nassociated with metadata, providing\
    \ additional information, including\\nchemical concentration and references to the source where the information\\nwas\
    \ extracted. To scalably expand FAKG, we developed a KG construction\\npipeline that harmonized and ingested the data\
    \ extracted by the GPT\\nmodels into the knowledge graph. First, the pipeline processed the CSV-\\nformatted outputs from\
    \ the LLM, discarding a few with incorrect CSV\\nformat. Second, chemical concentration information in the raw-string\\\
    nformat was parsed into concentration value-unit pairs using regular\\nexpressions. The units convertible to each other\
    \ were uni\\ufb01ed into a stan-\\ndardizedunit,suchas\\u2018g,\\u2019\\u2018mg,\\u2019\\u2018gram,\\u2019and\\u2018kg,\\\
    u2019whichwereallconvertedinto\\n\\u2018100 g\\u2019 with corresponding changes in concentration value. Third, an entity\\\
    nlinking system performed synonym resolution and string matching, map-\\nping food and chemical names mentioned in sentences\
    \ to ontology data-\\nbases FoodOn11 and ChEBI52, respectively. To enrich the interoperability\\nand categorizability,\
    \ identi\\ufb01ers from several other databases were retrieved\\n(Supplementary Fig. 1 and Supplementary Note 1.2, 1.3).\\\
    nIntegration of disease data from the Comparative Tox-\\nicogenomics Database (CTD)\\nTo enrich the FoodAtlas Knowledge\
    \ Graph (FAKG) with disease-related\\ndata, we integrated chemical\\u2013disease associations from the Comparative\\nToxicogenomics\
    \ Database (CTD)61. The CTD provides a robust dataset\\ndetailing relationships between chemicals and diseases and contains\
    \ critical\\n\\ufb01elds such as ChemicalName, ChemicalID (MeSH62 identi\\ufb01er), Dis-\\neaseName, DiseaseID (MeSH or\
    \ OMIM63 identi\\ufb01er), DirectEvidence\\n(whetherthechemicalisatherapeuticormarker/mechanismforthedisease,\\nwhich\
    \ we map as treats or worsens the disease, respectively), Infer-\\nenceGeneSymbol, InferenceScore, and PubMedIDs (a |-delimited\
    \ list of\"\n  },\n  {\n    \"name\": \"references)\",\n    \"text\": \"We began by mapping the CTD chemicals to FoodAtlas\
    \ using the\\nChemicalID \\ufb01eld, which corresponds to MeSH identi\\ufb01ers. This alignment\\nallowed us to cross-reference\
    \ chemical entities in FoodAtlas with their\\nassociated diseases as recorded in CTD. Once the mappings were estab-\\\
    nlished, we extracted relationships of the type (chemical, associated with,\\ndisease) and populated the knowledge graph\
    \ with these connections. The\\nintegration included metadata for these relationships, such as the original\\nChemicaIDsandDiseaseIDsfoundinCTDfortherelationship,andwhether\\\
    nthe chemical exists in foods in FoodAtlas. Additionally, the linked Pub-\\nMedIDs and their corresponding PMCIDs were\
    \ incorporated as references\\nto enhance the veri\\ufb01ability and provenance of the data. For the diseases in\\nthese\
    \ relationships, we extracted the DiseaseName, DiseaseID, AltDisea-\\nseIDs (MeSH, OMIM, or DiseaseOntology identi\\ufb01ers),\
    \ and the list of\\nsynonyms from CTD\\u2019s disease information to create our FoodAtlas disease\\nentities and their\
    \ relationships to chemicals (Supplementary Note 1.3).\\nIntegration of \\ufb02avor data from FlavorDB and PubChem\\nChemicals\
    \ in FlavorDB are indexed using PubChem IDs, allowing for\\nstraightforward alignment with existing FoodAtlas entities.\
    \ We scraped\\nFlavorDB, iterating through PubChem IDs of FoodAtlas chemicals, and\\nretrieving structured JSON data for\
    \ each chemical. For chemicals missing\\nfrom FlavorDB, we extended \\ufb02avor data collection to PubChem\\u2019s Hazar-\\\
    ndous Substances Data Bank (HSDB)21, extracting \\u201cTaste\\u201d and \\u201cOdor\\u201d\\ndescriptors. While PubChem\
    \ provided a signi\\ufb01cant volume of additional\\ndata, its descriptors were often noisy and inconsistently formatted.\
    \ Hence,\\nfuzzy string matching techniques58 (Supplementary Note 1.2) were\\nemployed to harmonize \\ufb02avor descriptors,\
    \ creating a uni\\ufb01ed set of stan-\\ndardized \\ufb02avor terms. Each unique \\ufb02avor descriptor was represented\
    \ in the\\nknowledge graph as an entity with the entity type \\ufb02avor, and relationships\\nbetween chemicals and their\
    \ \\ufb02avors were established using a newly de\\ufb01ned\\nhasFlavor relationship (Supplementary Note 1.3).\\nIntegration\
    \ of food and chemical bioactivity via Bioactivity\\nPrediction Model\\nTo integrate chemical bioactivity with food composition\
    \ data in the FAKG,\\nwe employed a multi-step procedure for both data assembly and model\\ndevelopment using machine\
    \ learning. First, we mapped chemicals present\\nin FA to corresponding records in the ChEMBL database64, using InChIKey\\\
    nidenti\\ufb01ers as the primary linkage. This allowed us to retrieve chemical\\npChEMBL values (i.e., \\u2013log10(nM))\
    \ for the related assays that capture\\nvarious types of bioactivity, including antioxidant, antimicrobial, anti-\\nin\\\
    ufb02ammatory, immunomodulatory, antiviral, neuroprotective, anticancer,\\nand antidiabetic activities (Supplementary\
    \ Note 1.5). After establishing the\\nconnections between chemicals in FA and their associated assays in\\nChEMBL, we\
    \ linked each food to its constituent chemicals using con-\\ncentration data available in FA. The resulting dataset enabled\
    \ the formation\\nof a Bioactivity Food Link (BFL), whereby each food inherited potential\\nbioactivity from the chemicals\
    \ it contains. This dataset was further enriched\\nby including the Ferric Reducing Antioxidant Power (FRAP) values65\
    \ for\\n159 food samples, providing ground truth for antioxidant capacity. The\\nresulting Bioactivity Prediction Model\
    \ (BPM) was designed to predict\\nantioxidant capacity, quanti\\ufb01ed as \\u2013log10(FRAP), based on a machine\\nlearning\
    \ architecture, Random Forest. The model relies on three primary\\ninput modalities. First, we generated Morgan \\ufb01ngerprints\
    \ from SMILES\\nstrings using RDKit66, encoding chemical structure as a binary vector.\\nSecond, we included pChEMBL values67,\
    \ which re\\ufb02ect comparable mea-\\nsures of concentrations to reach half-maximal potency/af\\ufb01nity/response\\\
    n(e.g., IC50, EC50) on a negative logarithmic scale. Third, we incorporated\\nchemical concentration information from\
    \ FA to capture the quantity of\\neach chemical present in a given food. These three types of inputs were fed\\ninto machine\
    \ learning models. Outputs from the model predicted\\n\\u2013log10(FRAP) for each food. During model training, we employed\
    \ an 80:20\\ntrain-test split, which we repeated across 25 bootstrap iterations to account\\nfor variability due to the\
    \ limited dataset size. The Random Forest was tuned\\nusing a hyperparameter grid search. We tracked metrics such as mean\\\
    nabsolute error (MAE), MSE, Pearson\\u2019s correlation (PCC), and the coef\\ufb01-\\ncient of determination (R\\u00b2)\
    \ between predicted and observed FRAP values.\\nResidual analysis was used to gauge systematic errors and to verify the\\\
    nstability of predictions across foods with diverse chemical pro\\ufb01les (Sup-\\nplementary Note 1.5).\\nOne-hop food\
    \ substitutions for disease- and antioxidant\\nbioactivity-oriented diet improvement\\nWe implemented a one-hop substitution\
    \ framework to evaluate and\\nenhance the healthfulness of real-world meals by jointly optimizing disease-\\nhttps://doi.org/10.1038/s41538-025-00680-9\\\
    nArticle\\nnpj Science of Food |  (2026) 10:33\\n8\\n\\nriskandantioxidant-bioactivitypro\\ufb01les.First,weingestedtheUSDA\\\
    u201cWhat\\nWe Eat in America\\u201d (WWEIA) diet recall data68, extracting each meal\\u2019s\\nconstituent foods and\
    \ their portion sizes. For disease modeling, we mapped\\nfoods to associated conditions (e.g., cardiovascular, in\\ufb02ammatory)\
    \ using\\ncurated chemical\\u2013disease relationships from the CTD. In parallel, we\\nassignedantioxidantbioactivityscoresderivedfromFRAPassays.Toenable\\\
    ndirect comparison and aggregation across disparate metrics, both disease-\\nrisk and bioactivity scores were min-max\
    \ normalized between 0 and 1. We\\nthen computed a weighted aggregate score for each meal by summing\\nindividual food\
    \ contributions in proportion to their serving size. Next, we\\nidenti\\ufb01ed \\u201chigh-impact\\u201d foods, those\
    \ whose removal yielded the greatest\\ndisease-riskreduction, and generatedcandidate alternatives drawn from the\\nsame\
    \ primary food category (e.g., dairy, leafy greens). For each candidate\\nswap, we recomputed the meal\\u2019s composite\
    \ disease and antioxidant scores\\nunder the same portion-weighted scheme. Substitutions that produced the\\nmaximal net\
    \ bene\\ufb01t, minimizing normalized disease risk while maximizing\\nnormalized antioxidant activity, were selected as\
    \ optimal (Supplementary\\nNote 1.6).\"\n  },\n  {\n    \"name\": \"Data availability\",\n    \"text\": \"All data is\
    \ available at https://github.com/IBPA/FoodAtlas-KGv2 and\\nhttps://foodatlas.ai. Food Atlas may be using data that are\
    \ restricted licenses\\nfor different uses, please consult individual license terms from each data\\nsource. CTD compliance.\
    \ FoodAtlas integrates curated knowledge from the\\nComparative Toxicogenomics Database (CTD) by linking to CTD chemi-\\\
    ncal/disease identi\\ufb01ers and PubMed references; we do not redistribute CTD-\\ncurated interaction tables in our public\
    \ releases. Users can reproduce the\\nCTD integration locally using our scripts, which download CTD data from\\nthe source\
    \ and join via CTD IDs and PMIDs. Non-commercial use is free;\\ncommercial reuse requires a license from CTD\\u2019s licensing\
    \ agent. Please\\nconsult CTD\\u2019s terms before downloading/using CTD content.\"\n  },\n  {\n    \"name\": \"Code availability\"\
