  competing_interests: 'G.T. consults for BMS, Genentech, GSK and Relation Tx, and serves on the scientific advisory

    board of Variant Bio.

    Datasets for assessing target–disease associations were initially

    identified within global, public data repositories, such as ChEMBL and

    UniProt hosted at EMBL-EBI. An ontology — a controlled vocabulary of

    diseases and phenotypes and the relationships between them — was

    required to map trait and disease terms across resources to bring the

    evidence into a common framework. Working closely with the EMBL-EBI

    Samples, Phenotypes and Ontologies Team, the Experimental Factor

    Ontology was selected due to its flexibility to incorporate terms and

    map across to other ontologies. A new informatics resource was then

    created to integrate and score the evidence from each different data

    type, providing overall a systematic assessment of target–disease

    associations based on evidence in a high-quality user interface: the

    Open Targets Platform4.

    New informatic projects build on the initial data pipelines that

    supported the Open Targets Platform, which required high degrees

    of manual oversight. Workflows have been refined and automated,

    while expanding coverage and knowledge extraction through more

    complex entity recognition, specific curation efforts and application

    of machine learning (ML). Open Targets has focused on a systematic

    approach to analysing genetic evidence for common traits and dis-

    eases, an approach supported by additional research demonstrating

    the impact of human genetic evidence on success rates in drug discov-

    ery. Collaborative projects with the NHGRI-EBI catalogue of human

    genome-wide association studies (GWAS Catalogue) enabled full sum-

    mary statistics from GWAS to be available for Open Targets and the

    community. Open Targets then addressed the challenge of assigning

    causal genes to GWAS loci at scale by creating a new focussed resource:

    Open Targets Genetics. This companion to the Open Targets Platform

    provides large-scale genetic evidence on the relationships between

    disease-associated genetic loci and candidate causal variants, in order

    to predict drug target genes. The open-source resources provided by

    the Open Targets Platform have been adopted by academic and indus-

    try communities exploring target–disease associations. Significant

    efforts are underway to re-develop Open Targets Genetics pipelines

    to power future versions of the Open Targets informatics ecosystem,

    alongside applications of ML, to enable new modes of interacting with

    and making predictions from data.'
