    \ Tx, and serves on the scientific advisory\\nboard of Variant Bio.\\nDatasets for assessing target\\u2013disease associations\
    \ were initially\\nidentified within global, public data repositories, such as ChEMBL and\\nUniProt hosted at EMBL-EBI.\
    \ An ontology \\u2014 a controlled vocabulary of\\ndiseases and phenotypes and the relationships between them \\u2014\
    \ was\\nrequired to map trait and disease terms across resources to bring the\\nevidence into a common framework. Working\
    \ closely with the EMBL-EBI\\nSamples, Phenotypes and Ontologies Team, the Experimental Factor\\nOntology was selected\
    \ due to its flexibility to incorporate terms and\\nmap across to other ontologies. A new informatics resource was then\\\
    ncreated to integrate and score the evidence from each different data\\ntype, providing overall a systematic assessment\
    \ of target\\u2013disease\\nassociations based on evidence in a high-quality user interface: the\\nOpen Targets Platform4.\\\
    nNew informatic projects build on the initial data pipelines that\\nsupported the Open Targets Platform, which required\
    \ high degrees\\nof manual oversight. Workflows have been refined and automated,\\nwhile expanding coverage and knowledge\
    \ extraction through more\\ncomplex entity recognition, specific curation efforts and application\\nof machine learning\
    \ (ML). Open Targets has focused on a systematic\\napproach to analysing genetic evidence for common traits and dis-\\\
    neases, an approach supported by additional research demonstrating\\nthe impact of human genetic evidence on success rates\
    \ in drug discov-\\nery. Collaborative projects with the NHGRI-EBI catalogue of human\\ngenome-wide association studies\
    \ (GWAS Catalogue) enabled full sum-\\nmary statistics from GWAS to be available for Open Targets and the\\ncommunity.\
    \ Open Targets then addressed the challenge of assigning\\ncausal genes to GWAS loci at scale by creating a new focussed\
    \ resource:\\nOpen Targets Genetics. This companion to the Open Targets Platform\\nprovides large-scale genetic evidence\
    \ on the relationships between\\ndisease-associated genetic loci and candidate causal variants, in order\\nto predict\
