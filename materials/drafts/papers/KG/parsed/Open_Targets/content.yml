    \ Open Targets Genetics pipelines\\nto power future versions of the Open Targets informatics ecosystem,\\nalongside applications\
    \ of ML, to enable new modes of interacting with\\nand making predictions from data.\"\n  },\n  {\n    \"name\": \"Conclusion\
    \ and outlook\",\n    \"text\": \"The founding and successful development of Open Targets exemplifies\\neffective pre-competitive\
    \ collaboration between multiple commercial\\nentities and academia, providing a model for consideration in other are-\\\
    nnas. Feedback from Open Targets partners is that the most successful\\ncollaborations have maintained a strong, ongoing\
    \ connection between\\nacademia and industry, driven by early engagement in project design\\nand discussion of drug discovery\
    \ questions throughout the project\\nlife cycle. The partners also highlight that the larger, more ambitious\\nprojects,\
    \ applying new technology at scale, are of the highest scientific\\nimpact and enable multiple lines of analysis for drug\
