  sections: "[\n  {\n    \"name\": \"Introduction\",\n    \"text\": \"Many candidate medicines fail during clinical trials,\
    \ when the safety and\\nefficacy of the therapeutic approach is tested. These failures increase the\\ncost of bringing\
    \ new treatments to patients. They stem from our incom-\\nplete knowledge of how drug targets are linked to disease and\
    \ our limited\\nability to predict the effect of modulating a target on disease.\\nAs one potential solution to this problem,\
    \ studies have indicated\\nthat drug targets supported by genetic evidence have a higher prob-\\nability of success in\
    \ drug development1. The Open Targets consortium\\nwas founded in 2014 to harness insights from genetics and functional\\\
    ngenomics and transform target identification and prioritization. Indus-\\ntry and academic scientists work together to\
    \ shape the Open Targets\\nresearch programme, which has awarded 95 projects to date. The\\nconsortium comprises the founding\
    \ partners \\u2014 the Wellcome Sanger\\nInstitute, EMBL\\u2019s European Bioinformatics Institute (EMBL-EBI) and\\nthe\
    \ pharmaceutical company GSK \\u2014 and more recent members, the\\ncompanies Genentech, MSD, Pfizer, and Sanofi. Throughout\
    \ its his-\\ntory, the companies Biogen, Takeda and Celgene (now BMS) have also\\ncounted amongst the Open Targets partners.\
    \ Consortium findings are\\nshared within the partnership before publication, then contributed to\\nthe public domain.\\\
    nEstablishing the Open Targets research programme\\nDrug target identification is a complex problem. Multiple evidence\\\
    ntypes must be integrated to understand disease biology and there are\\nmany gaps in our knowledge. The Open Targets research\
    \ programme\\ntakes a systematic approach to two overarching but interconnected\\nthemes: first, to generate new data\
    \ that associate targets with disease;\\nand second, to integrate new and existing disease association evidence\\ninto\
    \ a central informatic framework.\\nOpen Targets initially hosted industry\\u2013academic workshops to\\nunderstand the\
    \ key questions asked in target discovery and the evi-\\ndence required to address these questions. The focus was on integrat-\\\
    ning genetics, genomics and other relevant evidence to systematically\\nassess target\\u2013disease associations.\\nNow,\
    \ the core themes of the research programme are built through\\nactive discussion between all the academic and industry\
    \ partners.\\nProjects are developed within common areas of therapeutic and\\ntechnological interest and are conducted\
    \ collaboratively through the\\nentire project lifecycle. To establish research projects, expressions of\\ninterest from\
    \ both academia and industry are sought, then discussions\\nheld between groups with related interests to build project\
    \ proposals\\nfor collective review. Each new round of project generation builds\\nupon the interests and expertise of\
    \ partners and the lessons learned\\nfrom active projects.\\nExamples and evolution of projects\\nOpen Targets projects\
    \ systematically generate causal data that associ-\\nate genes to disease or build foundational understanding of disease\\\
    nprocesses. Early projects harnessed the expertise and advanced tech-\\nnologies available at the Wellcome Sanger Institute,\
    \ such as CRISPR\\ngene perturbation and single-cell transcriptomics, to generate new\\ndata at scale. For example, an\
    \ initial project involved conducting\\ngenome-wide CRISPR gene knockout screens across 324 cancer cell\\nlines. This\
    \ dataset contributed to the causal evidence supporting the\\nDNA helicase WRN as a promising target in microsatellite-unstable\
    \ colo-\\nrectal cancers2. Another early project created foundational resources\\nby using single-cell transcriptomics\
    \ to generate atlases of airway and\\nlung tissue from patients with asthma and those in remission.\\nProjects focussed\
    \ on new data generation are centred around\\ntherapy areas of common interest to the consortium partners: oncol-\\nogy,\
    \ immunology and neurodegeneration. This focus enables projects\\nto learn from each other, share resources and take aligned\
    \ approaches\\n(for example, using the same induced pluripotent stem cell line back-\\nground across projects). It also\
    \ enables the collective analysis of mul-\\ntiple project outputs. Causal target\\u2013disease association studies in\\\
    nhuman cellular models of disease have expanded to more complex\\ndisease-relevant assays. For example, these assays investigate\
    \ the\\nimpact of co-culturing immune cells and cancer cells, the role of mul-\\ntiple immune cell phenotypes in immune\
    \ and neurodegenerative\\ndiseases, as well as aspects of neuronal function and the cellular stress\\nresponse. With the\
    \ emergence of new technologies and an expanded\\nperturbation toolbox, the latest projects aim to generate hypotheses\\\
    nfor precision therapeutics by integrating systematic combination\\nscreening in cancer, or base-editing in more complex\
    \ systems, with\\nsingle-cell readouts.\\nMore recent foundational studies run by Open Targets increasingly\\nfocus on\
    \ insights from patients to aid translation of findings to drug\\ndiscovery decision-making. Projects in inflammatory\
    \ bowel disease\\n(IBD) and systemic lupus erythematosus use single-cell approaches to\\nbuild detailed tissue maps in\
    \ disease and generate cell-specific maps\\nof quantitative trait loci to deconvolute genetic influences at cellular\\\
    nresolutions. A project in non-small-cell lung cancer profiles disease tis-\\nsue using single-cell and spatial techniques,\
    \ and another in metabolic\\ndysfunction-associated steatohepatitis investigates disease progres-\\nsion, with both projects\
    \ generating foundational datasets in diseases\\nwith high unmet need3.\\nCheck for updates\\n\\nVolume 24 | March 2025\
    \ | 153\\u2013154 | 154\\nnature reviews drug discovery\\ntheme, Open Targets has recently launched Open-IBD, the consortium\\\
    u2019s\\nmost ambitious project to date, following 1,000 patients with IBD from\\ndiagnosis through to the early years\
    \ of disease and treatment.\\nThe research themes of Open Targets\\u2019 programme have differ-\\nent impact profiles\
    \ for drug target identification and prioritization\\ndepending on the nature of the findings. Causal target\\u2013disease\
    \ asso-\\nciations, such as genetic perturbations that impact a disease-relevant\\nphenotype, directly inform the decisions\
    \ and investments of industry\\npartners\\u2019 pipeline of targets. Foundational knowledge, such as a disease\\ntissue\
    \ map or detailed characterization of a disease-relevant process,\\ninforms decision making less directly but more broadly,\
    \ with such\\ndata being used many times across a class of targets or therapy area.\\nInformatic infrastructure and resources\
    \ are widely adopted to sup-\\nport overall decision making and target\\u2013disease research and provide\\nsustainability\
    \ for new knowledge generated. Open Targets\\u2019 systematic\\napproach produces lists of targets associated with disease,\
    \ and further\\nprioritization is required to build therapeutic hypotheses and for\\neffective decision-making. Therefore,\
    \ a later focus of the research\\nprogramme has been target prioritization. Tools are being developed\\nto assess the\
    \ tractability, safety and feasibility of progressing potential\\ndrug targets, as well as to assess the novelty of targets\
    \ and the potential\\ntherapeutic effect5.\\nLooking ahead, Open Targets will continue to bring together aca-\\ndemic\
    \ and industry parties around ambitious projects to understand\\nand treat disease. This approach should aid the translation\
    \ of knowl-\\nedge and technology from academic frontiers to industry applications\\nand ultimately catalyse the development\
    \ of safe and effective new\\ntherapies.\\nDavid G. Hulcoop1,2,3\\n, Gosia Trynka1,3 & Ellen M. McDonagh1,2,3\\n1Open\
    \ Targets, Wellcome Genome Campus, Hinxton, Cambridgeshire,\\nUK. 2European Molecular Biology Laboratory, European Bioinformatics\\\
    nInstitute (EMBL-EBI), Wellcome Genome Campus, Hinxton,\\nCambridgeshire, UK. 3Wellcome Sanger Institute, Wellcome Genome\\\
    nCampus, Hinxton, Cambridgeshire, UK.\\ne-mail: dhulcoop@ebi.ac.uk\\nPublished online: 17 December 2024\"\n  },\n  {\n\
