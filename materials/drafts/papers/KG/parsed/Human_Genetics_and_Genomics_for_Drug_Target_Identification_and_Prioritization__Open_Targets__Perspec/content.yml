    nARjats.cls\\nMarch 13, 2024\\n12:34\\nFigure 2 (Figure appears on preceding page)\\nThe Open Target therapeutic hypothesis-building\
    \ framework. (a) The Open Targets framework for building therapeutic hypotheses is\\ncomposed of three overarching concepts\
    \ that all contribute to a fuller picture of evidence and context to help in the decision-making\\nprocess for taking\
    \ a potential target forward for drug discovery. In blue are considerations for target\\u2013disease association and\\\
    nunderstanding the causality of disease, mechanism, and direction of effect. In yellow are considerations for effective\
    \ therapy that include\\ncell and tissue context, disease subtype and state, and patient stratification factors. In red\
    \ are considerations for the progressability of a\\ntarget, which include how tractable a target is, suitable modalities,\
    \ how safe it may be to modulate it, whether there are tools available\\nfor the next stages of validation or preclinical\
    \ studies (doability), and the clinical precedence for the therapeutic hypothesis that is being\\ndeveloped, for example,\
    \ whether known drugs for the target are in current clinical trials or have been approved. Throughout this\\nframework,\
    \ answers to questions provide evidence to help build up a therapeutic hypothesis, first by identifying targets associated\
    \ with a\\ngiven disease of interest (b), then through questions that help further prioritize these targets (c). Through\
    \ the Open Targets research\\nprogram and informatics resources we generate evidence and evaluate the evidence to help\
    \ answer the questions that are important for\\ntarget identification and prioritization for drug discovery. In this figure\
    \ we provide some examples of the types of questions we try to\\naddress in order to help build therapeutic hypotheses.\
    \ This framework enables the construction of therapeutic hypotheses such as\\n\\u201cinhibition of target X will be beneficial\
    \ in the treatment of disease Y for patients of disease subtype Z, in cell type A, in tissue B, with\\ndrug modality of\
