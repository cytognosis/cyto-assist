    \ FOR TARGET IDENTIFICATION\",\n    \"text\": \"Drugs that have been developed to modulate a target that have supporting\
    \ GWAS evidence are\\ntwice as likely to succeed and be approved, and those with underlying Mendelian genetic evidence\\\
    nare up to eight times more likely to succeed (6, 24). We have shown that two-thirds of the drugs\\napproved by the US\
    \ Food and Drug Administration (FDA) in 2021 have underlying genetic ev-\\nidence for the target\\u2013disease association\
    \ (7), and that this trend extends across the past decade\\n(8). Genetic evidence for the association between a target\
    \ and a disease is therefore of key im-\\nportance for identifying and prioritizing targets for novel drug development;\
    \ the challenge arises\\nwith connecting evidence from GWAS to a target. The majority of associations from GWAS are\\\
    nbetween genetic variants that are not in a coding region; the reported lead variant may be in link-\\nage disequilibrium\
    \ with the true causative genetic variant, or the variant may be influencing gene\\nregulatory mechanisms. Furthermore,\
    \ the genetic association comes with no effector cell type or\\ntissue context. There is therefore a need to connect GWAS\
    \ to the likely disease-causing gene; to\\ndo this in a systematic way for all GWAS loci is complex.\\nOur approach at\
    \ Open Targets has been to develop a machine learning (ML) model to provide\\na predictive locus-to-gene (L2G) score for\
    \ the most likely causative genes underlying each GWAS\\nassociation (14). We provide a summary of the complex analysis\
    \ pipeline below; however, more de-\\ntailed documentation and an illustration are available at https://genetics-docs.opentargets.org/\\\
    nour-approach/prioritising-causal-genes-at-gwas-loci-l2g and are described in our method-\\nology publication (14). In\
    \ total, 57 locus-level predictive features are defined for ML, providing a\\nscored rank of likely causative genes (targets)\
    \ underlying each GWAS locus. The main categories\\nof evidence sources for the predictive features are the following:\\\
    n1. Gene distance to credible set variants (weighed by their fine-mapping probabilities)\"\n  },\n  {\n    \"name\": \"\
