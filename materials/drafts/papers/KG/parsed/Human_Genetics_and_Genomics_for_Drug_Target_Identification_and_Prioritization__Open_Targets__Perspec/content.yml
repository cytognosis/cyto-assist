    \ and prioritization are a complex\\nproblem encompassing how we understand disease processes, how we predict the impact\
    \ of per-\\nturbing our complex biology, and how we select from a range of potential options the approach\\nwith the highest\
    \ chance of success in new drug discovery. The rate of late-stage clinical failures\\nshows that there is a huge opportunity\
    \ to improve our capabilities to select the targets that can\\nlead to safe and effective medicines.\\nIn 2014 discussions\
    \ between the Wellcome Sanger Institute,European Molecular Biology Lab-\\noratory\\u2019s European Bioinformatics Institute\
    \ (EMBL-EBI), and GSK led to the founding of the\\nCentre for Therapeutic Target Validation. This innovative, large-scale,\
    \ multiyear, public\\u2013private\\npartnership was created to use human genetic and genomic data for systematic drug\
    \ target iden-\\ntification and prioritization. Rebranded as Open Targets in 2016, the partnership has grown and\\nnow\
    \ brings together the expertise of EMBL-EBI and the Wellcome Sanger Institute with industry\\npartners GSK, Pfizer, Sanofi,\
    \ Bristol Myers Squibb, and Genentech to enhance the translational\\nimpact of academic science on human health and the\
    \ capabilities of industry to envision new, safe,\\nand effective medicines (Figure 1a).\\nWorking in partnership across\
    \ academia and industry is one of Open Targets\\u2019 core philoso-\\nphies, bringing together the best of academic and\
    \ industrial approaches. Projects are designed\\nand executed and results analyzed by teams of academic and industry scientists\
    \ who stay con-\\nnected through the life cycle of each project to deliver impactful insights that improve the target\\\
    nidentification and prioritization landscapes (Figure 1b). Open Targets research is made available\\nto the community\
    \ through publication, and our approach to target identification and prioriti-\\nzation is exemplified by our flagship\
    \ open-source informatics platforms, Open Targets Platform\\n(https://platform.opentargets.org) and Open Targets Genetics\
