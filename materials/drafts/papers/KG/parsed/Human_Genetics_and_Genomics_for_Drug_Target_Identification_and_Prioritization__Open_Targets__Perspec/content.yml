    \ sets of causal variants across all the lead\\nvariant-associated loci (FinnGen fine-mapping is provided separately).\
    \ Trait\\u2013trait colocalization\\nanalysis is carried out for GWAS datasets with summary statistics, which are provided\
    \ by the\\nGWAS Catalog (9, 27). Tissue and cell type\\u2013specific molecular (QTL) datasets are integrated and\\nused\
    \ to carry out trait\\u2013molecular trait colocalization. These include eQTLs (10, 28, 29), protein\\nQTLs (30\\u201336),\
    \ and splice QTLs (10). In total, over 3.7 million colocalization tests are performed\\nand provided. The trait\\u2013molecular\
    \ trait colocalizations are used as a predictive feature for the ML\\nmodel. In silico functional predictions from Ensembl\
    \ Variant Effect Predictor (37) and PolyPhen,\\nepigenomic information including promoter capture Hi-C and DNase hypersensitivity\
    \ sites (38\\u2013\\n40), and gene distance to credible set variants weighed by their fine-mapping probabilities also\\\
    nprovide data inputs for the predictive features.\\nTo create a gold standard set of genes from solved GWAS loci that\
    \ can be used as a training\\nset for the ML model, our approach was to manually curate a set of gene\\u2013disease or\
    \ gene\\u2013\\ntrait associations of high confidence level. High confidence for the initial gold standard GWAS\\ngene\
    \ assignment list of 445 genes for the first release was classified based upon known drug\\n66\\nMcDonagh et al.\\n, .\\\
    u2022\\u00b7\\u0005-\\nReview in Advance. Changes may\\nstill occur before final publication.\\n\\nBD07_Art05_McDonagh\\\
    nARjats.cls\\nMarch 13, 2024\\n12:34\\ntarget\\u2013disease pairs (41, 42), experimental alterations from literature reports\
    \ (for example, nu-\\ncleotide editing), and observational functional data (for example, colocalizing molecular QTLs,\\\
    ncolocalizing epigenetic marks, reporter assays) (43); it also included expert domain knowledge of\\nstrong orthogonal\
    \ evidence or biological plausibility, curation from the T2D Knowledge Portal\\n(https://t2d.hugeamp.org), and Open Targets\
    \ curated associations. We continue to update this\\nlist with new knowledge and include known target\\u2013disease associations\
    \ for approved drugs and as-\\nsociations sourced from the scientific community. The gold standard list is made publicly\
    \ available\\nfor the community to utilize and feeds back into community efforts to establish known effector\\ngenes in\
    \ disease (https://github.com/opentargets/genetics-gold-standards).\\nThe L2G model produces a score ranging from 0 to\
    \ 1; a gene scored with 0.5 can be interpreted\\nas having a 50% chance of being the causal gene at the locus (under the\
    \ assumption that the\\ncharacteristics of the observed locus are similar to those in the positive gold standard set).\
    \ The\\nintegrated data, analyses, and L2G score are made available in Open Targets Genetics, which\\nserves as a comprehensive\
    \ publicly available source for post-GWAS analyses (5).\"\n  },\n  {\n    \"name\": \"Data availability for post-GWAS\
    \ analysis is a challenge, and the first issue we wanted to\",\n    \"text\": \"overcome was the availability of summary\
    \ statistics from GWAS, required in order to carry out\\nfine-mapping and colocalization. Summary statistics provide aggregate\
    \ p values and association\\ndata for every variant analyzed in a study. With EMBL-EBI being one of the Open Targets part-\\\
    nners, we were able to collaborate closely with the GWAS Catalog team to establish a pipeline for\\nthe submission of\
    \ full summary statistics from GWAS, which are available via an application pro-\\ngramming interface (API) or download\
    \ from the GWAS Catalog (27). This involved harnessing\\nthe scientific as well as the publishing community to advocate\
    \ for the submission of full sum-\\nmary statistics, not only for use by Open Targets, but for the community as a whole.\
    \ This has\\nhad a large impact; since the release of the author submission system in 2020, studies with sum-\\nmary statistics\
    \ have grown from approximately 1,000 studies to over 55,000 studies in the GWAS\\nCatalog (27). Similar challenges exist\
    \ for using population biobank resources, where genotype-\\nlevel data are not readily made available for fine-mapping,\
    \ for example. Our approach has been\\nto collaborate closely with FinnGen, which provides its own fine-mapping for us\
    \ to use internally\\n(https://www.finngen.fi/en).\\nThere is a gap in available funding opportunities for new databases\
    \ and bioinformatics tooling,\\nand one of the advantages of the Open Targets consortium is the ability to identify the\
    \ need and\\ncollect the requirements for a new resource from our own target identification and prioritization\\nperspective,\
    \ as well as within the wider scientific community. We are able to support the genera-\\ntion of new open-source resources\
    \ that help bridge an existing gap in the scientific community. An\\nexample is the EMBL-EBI eQTL Catalogue, which was\
    \ developed to ingest and uniformly com-\\npute gene expression and splicing QTLs from different published studies (10).\
    \ This enables us to\\nefficiently utilize the harmonized data for colocalization with GWAS loci as part of Open Targets\\\
    nGenetics pipelines, which ultimately allows us to prioritize targets from large-scale GWAS data.\\nThis useful resource\
    \ is also available to our partners as well as to the scientific community as a\\nwhole. We continue to support and expand\
    \ the scope of the eQTL Catalogue as the functional ge-\\nnomic research field develops in complexity, working with the\
    \ single-cell eQTLGen Consortium\\ntoward harmonizing the integration and representation of single-cell eQTL data (44).\"\
    \n  },\n  {\n    \"name\": \"SYSTEMATIC INTEGRATION OF TARGET\\u2013DISEASE EVIDENCE\",\n    \"text\": \"\"\n  },\n  {\n\
    \    \"name\": \"FOR TARGET PRIORITIZATION\",\n    \"text\": \"There is an ever expanding and wide range of different\
    \ human genetic and genomic data that\\ncan be used to inform on the role of a potential drug target in a given disease.\
    \ Integration,\\nwww.annualreviews.org \\u2022 Open Targets\\u2019 Perspective on Genetics\\n67\\n, .\\u2022\\u00b7\\\
    u0005-\\nReview in Advance. Changes may\\nstill occur before final publication.\\n\\nBD07_Art05_McDonagh\\nARjats.cls\\\
    nMarch 13, 2024\\n12:34\\nharmonization, and interpretation of this wealth of big data for target discovery and prioritization\\\
    nare complex. Our approach at Open Targets has been to create a comprehensive open-source\\nresource that would bring\
    \ together relevant publicly available data in an intuitive way to help\\nidentify and prioritize targets for drug discovery\
    \ (4). The Open Targets Platform systematically\\nprioritizes targets [represented as genes (45)] across all diseases\
    \ [mapped to EFO (26)] and\\nweighs evidence within and across different data types using a harmonized sum (4). Weights\\\
    nof the contributing evidence sources can be adjusted according to user requirements, which in\\nturn dynamically adjust\
    \ the prioritization of targets. Due to the importance of genetic evidence\\nfor supporting successful drugs, resources\
    \ that provide germline genetic associations (including\\nthe L2G score for target\\u2013disease associations from Open\
    \ Targets Genetics) form a data type\\nprioritization category and are a key contributor to the overall prioritization\
    \ score. Associations\\nfrom somatic mutations also form a separate data type category. Other data source type categories\\\
    ninclude known drugs, pathways/systems biology, text mining, RNA expression data, and animal\\nmodels. Each data type\
    \ can be selected as required, allowing users, for example, to require\\ncontributing genetic evidence for target\\u2013disease\
    \ associations. This enables users to answer the\\ntypes of questions outlined in Figure 2b for target identification\
    \ and the initial prioritization of\\na list of targets for their disease of interest, presenting the underlying evidence\
    \ from each data\\ntype.\\nThere is a growing wealth of curated data for associations between genes and rare diseases.\
    \ Our\\napproach has been to harness this knowledge in several ways to provide insights into complex mul-\\ntifactorial\
    \ diseases. In the Open Targets Platform we integrate gene\\u2013disease validity assessments\\nfrom multiple resources\
    \ (ClinGen, PanelApp, Gene2Phenotype, Orphanet) (46\\u201349), using Gene\\nCuration Coalition terminology where possible\
    \ (50), and use the assessment of evidence to weigh\\nthe contributing association score. The increasing number of clinical\
    \ whole exome and genome\\nsequencing studies has enabled the development of gene burden analysis methods to assess the\\\
    ncontribution of rare variation across a given gene to complex traits. We have integrated the results\\nof gene burden\
    \ analysis from multiple studies in the Open Targets Platform, continually updated\\nwith major published studies that\
    \ are released (51\\u201361). We have investigated the integration of\\ngene burden analysis results both into the gold\
    \ standard list and as a feature in the L2G model for\\nOpen Targets Genetics.\\nThe evidence from rare disease curated\
    \ sources is combined with the complex disease genetic\\nevidence from the Open Targets Genetics L2G score and gene burden\
    \ analyses to provide ge-\\nnetic association scores for target\\u2013disease associations in the Open Targets Platform.\
    \ This allows\\nquestions as exemplified in Figure 2b to be explored through contributing evidence types. All\\ndiseases/traits\
    \ are mapped to EFO, enabling the exploration of evidence for similar traits or dis-\\neases. Evidence for target\\u2013disease\
    \ associations from somatic mutation resources (the Catalog of\\nSomatic Mutations in Cancer\\u2019s Cancer Gene Census,\
    \ IntOGen, ClinVar) is categorized separately\\n(62\\u201365). As a result, the role and pathologic mechanism of a particular\
    \ target in particular diseases\\nbecome apparent; for example, KRAS has strong germline genetic evidence (rare disease\
    \ resources\\nand L2G) and no somatic mutation evidence for the association with RASopathies, whereas the\\nopposite is\
    \ true for the association with non\\u2013small cell lung carcinoma, lung adenocarcinoma, and\\ncolorectal adenocarcinoma\
    \ (for which inhibitors targeted at a specific somatic residue in KRAS\\nhave been developed). In the future, we hope\
    \ to extract more information on the direction of ef-\\nfect involved from these genetic resources, in order to inform\
    \ on the mechanism of action suitable\\nfor a particular therapeutic and to inform on potential drug repurposing opportunities\
    \ for diseases\\nof unmet clinical need. This can also be valuable knowledge in the prediction of possible side ef-\\\
    nfects. For example, knowing that loss-of-function variation in a particular gene results in a severe\\nphenotype may\
    \ provide caution as to the use of an inhibitor.\\n68\\nMcDonagh et al.\\n, .\\u2022\\u00b7\\u0005-\\nReview in Advance.\
    \ Changes may\\nstill occur before final publication.\\n\\nBD07_Art05_McDonagh\\nARjats.cls\\nMarch 13, 2024\\n12:34\"\
    \n  },\n  {\n    \"name\": \"ENABLING THERAPEUTIC HYPOTHESIS BUILDING\",\n    \"text\": \"The foundation for enabling\
    \ therapeutic hypothesis building in the Open Targets Platform is the\\nassociation between a gene (target) and a given\
    \ disease and the extent of the evidence for this\\n(Figure 2b). We are then building upon this to provide a comprehensive\
    \ picture to enable the\\ndevelopment of therapeutic hypotheses based upon answers to questions that lead to further\\\
    nknowledge around disease mechanism, context, and progressability (Figure 2a,c). This allows fur-\\nther prioritization\
    \ of targets to indicate whether it is sensible to move this target forward into drug\\ndiscovery pipelines, as well as\
    \ what therapeutic type it may be most suitable for.\\nThe Link Between Disease Mechanism and Therapeutic Modality\\nGenetic\
    \ data can inform on the likely direction of effect of the disease association and provide\\ninsight into the mechanism.\
    \ This in turn can inform on the likely desired direction of effect of a\\ngiven therapeutic agent, such as the use of\
    \ an inhibitor against a target in which gain-of-function\\nvariants cause disease (66). This goes hand in hand with assessing\
    \ safety because it also provides\\ninformation about the possible undesired effects of inhibiting the target where there\
    \ is evidence\\nfrom human cases of loss of function resulting in a severe rare disease phenotype, in vitro per-\\nturbation\
    \ assays, or in vivo animal knockout models. We plan to build upon this through our\\nresearch program to provide dose\
    \ response curves for targets across a range of phenotypes. The\\ndirection of effect is phenotype-specific, so weighing\
    \ these attributes with regard to the ther-\\napy area becomes important. For oncology, for example, the ultimate goal\
    \ is to kill the cancer\\ncells, and because of the usually urgent and short-term treatment protocol for patients, adverse\\\
    neffects are often tolerated more than with chronic inflammatory diseases, which require long-\\nterm treatments along\
    \ with a need to dampen down damage to tissue and help restore cellular\\nfunction.\\nTarget Tractability\\nIn the Open\
    \ Targets Platform, we provide tractability assessments of targets for the suitability of\\nmodulating a target with a\
    \ small molecule, antibody, or proteolysis-targeting chimera (PROTAC)\\nusing different key attributes that would be required\
    \ for each type of modality (67). For example,\\nif there is a high-quality binding pocket a small molecule may be a suitable,\
    \ a location on the\\ncell surface is important for the use of an antibody, and ubiquination is important if considering\\\
    na PROTAC. Clinical precedence feeds into these assessments, such as whether a therapeutic of\\nthat modality has already\
    \ been developed and what clinical trial phase this has reached. As the\\nexpanding range of new modalities opens up new\
    \ therapeutic possibilities, in accordance with\\nthe theory that no target is undruggable, we will continue to identify\
    \ key features that help\\nevaluate the suitability of a target for a particular modality to expand our tractability assessments\\\
    nin the Open Targets Platform. We also will enhance the use of data such as binding pockets\\nutilizing structural protein\
    \ predictions from AlphaFold (68, 69). New regulatory pathways\\nfor drug approval make drugs designed for a particular\
    \ patient subgroup more attractive and\\nfeasible, and genetics can be utilized for patient stratification or for target\
    \ strategy. A key recent\\nexample in oncology is Sotorasib, which targets KRASG12C to treat non\\u2013small cell lung\
    \ cancer\\npatients with this mutation (7). In rare disease there is an expanding portfolio of antisense\\noligonucleotides\
    \ that target the underlying causal genetic variant in the pre-mRNA, for ex-\\nample, in the treatment of subgroups of\
    \ Duchenne muscular dystrophy patients with variants\\namenable to exon 45 (casimersen), 51 (eteplirsen), or 53 (golodirsen\
    \ and viltolarsen) skipping\\n(8, 70).\\nwww.annualreviews.org \\u2022 Open Targets\\u2019 Perspective on Genetics\\n69\\\
    n, .\\u2022\\u00b7\\u0005-\\nReview in Advance. Changes may\\nstill occur before final publication.\\n\\nBD07_Art05_McDonagh\\\
    nARjats.cls\\nMarch 13, 2024\\n12:34\\nDoability\\nAt Open Targets, doability involves features that enable a drug discovery\
    \ program to be readily\\npursued through validation, for example, the existence of a publicly available chemical probe,\
    \ a\\nmouse ortholog, or a knockout model that can provide the basis of further study of the function of\\nthe target.\
    \ Expansion of the pharmacological tool kit through efforts such as Target2035, which\\naims to provide a chemical and/or\
    \ biological probe for the entire human genome by 2035, will\\nopen up the ability to explore a wider range of targets\
    \ (71). A known biomarker for assessing\\ntarget engagement and effect on biological mechanism is important for being\
    \ able to take a target\\nforward, and we plan to provide this information where available.\\nSafety\\nThe potential safety\
    \ of modulating a target is a key factor for prioritizing some targets over others,\\nand if there is evidence that could\
    \ cause major concern, a target will not be taken forward. There\\nare many different sources of evidence for whether\
    \ it would be safe to modulate a target (and to\\nwhat extent) that can be considered prior to carrying out extensive\
    \ and expensive preclinical stud-\\nies. At Open Targets, the approach has been to establish an informatics research project\
    \ around\\nsafety and toxicity evaluation for targets, for which different workstreams feed useful annotations\\ninto\
    \ the Open Targets Platform (Figure 1b) and help answer questions such as those outlined\\nin Figure 2c. This includes\
    \ curated assessments from key published reviews, publicly available\\nsafety-related databases, and adverse outcome pathways\
    \ (72\\u201377). From these resources, the safety\\nevent associated with modulation of the target, the reported affected\
    \ biosystem, the direction, and\\nthe dosing effect on the target (for example, activation or inhibition, acute or general)\
    \ are pro-\\nvided. Genetics is also informative for safety assessment (78), and we have several approaches to\\nprovide\
    \ genetic-related information for target safety assessment in the Open Targets Platform.\\nPossible safety effects of\
    \ perturbing or inhibiting a target can also be inferred from the gene es-\\nsentiality and genetic constraint. On target\
    \ pages in the Open Target Platform, we provide gene\\nessentiality assessments across 28 tissues based upon cell fitness\
    \ after CRISPR knockout of the\\ngene in different cell lines from the Cancer DepMap (22). A gene is considered a core\
    \ essential\\ngene if the majority of cell lines do not survive after target knockdown; this provides an indication\\\
    nof how target inhibition is likely tolerated. Whether a target is a known cancer driver or a tumor\\nsuppressor gene\
    \ can also provide important information to assess whether modulation would be\\nappropriate. These are potentially good\
    \ targets in cancer; however, inhibition of core essential\\ngenes and tumor suppressors has likely consequences for adverse\
    \ effects. The genetic constraint\\nassessment from the Genome Aggregation Database (https://gnomad.broadinstitute.org)\
    \ (79,\\n80) provides a natural population-level perspective of how safe it may be to perturb a target; tar-\\ngets that\
    \ have very high genetic constraint (with much less loss-of-function variation than would\\nbe expected) may be more risky\
    \ to perturb than those with low constraint, which have shown tol-\\nerance to loss-of-function variation over evolution.\
    \ Comparative genomics can also provide safety\\ninformation; knowing whether there are human paralogs with strong homology\
    \ to a given target\\ncan provide an indication of the risk of interference with other targets. The specificity and dis-\\\
    ntribution of the target are important considerations for the likelihood of on-target effects beyond\\nthe disease-causing\
    \ tissue and the possible severity of these (such as effects on the central nervous\\nsystem or cardiovascular system\
    \ versus liver toxicity). The likelihood of such effects is indicated\\nby assessments from RNA baseline expression across\
    \ tissues, which are provided by Expression\\nAtlas and GTEx (28, 81).\\nAt a whole organism level, we provide an assessment\
    \ of the severity of knocking out the gene\\nbased upon classification of phenotypes from mouse models available in the\
    \ Mouse Genome\\n70\\nMcDonagh et al.\\n, .\\u2022\\u00b7\\u0005-\\nReview in Advance. Changes may\\nstill occur before\
    \ final publication.\\n\\nBD07_Art05_McDonagh\\nARjats.cls\\nMarch 13, 2024\\n12:34\\nInformatics database, which gives\
    \ an indication of the severity of possible side effects when mod-\\nulating the target (82). On a drug level, we also\
    \ provide pharmacovigilance assessments analyzed\\nusing data from the FDA Adverse Event Reporting System (https://open.fda.gov/data/faers)\\\
    nand black box warnings from drug labels (41, 42, 83). Though these may be off-target events,\\nthey can provide useful\
    \ real-world clinical and systemic safety information regarding the effect\\nof modulating a given target in humans.\\\
    nOur Approach to Artificial Intelligence and Machine Learning\\nOpen Targets uses artificial intelligence (AI) to address\
    \ specific scientific challenges such as iden-\\ntifying the most likely target genes underlying GWAS associations; for\
    \ this, we developed the\\nL2G ML pipeline to provide predictive scoring of candidate genes (14). We apply AI to knowl-\\\
    nedge extraction in several ways; for instance, named entity recognition and deep learning are\\nused to extract publications\
    \ and patents related to genes, diseases, drug entities, and relation-\\nships that can be explored through the Open Targets\
    \ Platform in collaboration with Europe\\nPMC (https://europepmc.org/) (84). We also have developed natural language processing\
    \ to\\ncategorize why clinical trials have failed (informing on target\\u2013disease\\u2013drug associations that have\\\
    nresulted in lack of efficacy or safety issues) (85), and to mine drug label information for clinical\\nindications in\
    \ collaboration with EMBL-EBI\\u2019s ChEMBL database (41). This provides informa-\\ntion on clinical precedence and safety\
    \ (Figure 2c). We explore new technology and applications\\nacross our research program and platforms, for example, by\
    \ using OpenAI\\u2019s large language model\\nto provide a contextual summary of the relationship between a target and\
    \ a disease in a given\\npublication.\\nOpen Targets is actively developing its dataset into a unique repository of high-quality\
    \ data\\nwith well-established data provenance, often linking it to other datasets using unified identifiers\\nto facilitate\
    \ downstream analyses. Our datasets are utilized externally as a gold standard for a wide\\narray of AI applications,\
    \ such as ML to identify novel target\\u2013disease associations (86), building\\nknowledge graphs for a range of different\
    \ biological insights and to assist with drug develop-\\nment (87\\u201390), and benchmarking new computational methods\
    \ for drug target prioritization (91,\\n92). There are examples of pharmaceutical companies beyond Open Targets partners\
    \ who have\\nutilized data sourced from Open Targets to build their own target prioritization and drug repur-\\nposing\
    \ pipelines (93). Additionally, the data from Open Targets play a central role in establishing\\nthe foundations of research\
    \ data and are soon set to become the backbone of foundation model\\ndevelopment. Furthermore, the data and pipelines\
    \ empower the creation of various data lakes\\nand the development of end-to-end pipelines for ingesting/generating, integrating,\
    \ and analyzing\\nmultiomics data.\\nThe Benefits of Being Embedded Within EMBL-EBI and the Wellcome\\nSanger Institute\\\
    nBecause data are integrated into Open Targets resources using a consistent mapping of traits/\\ndiseases to EFO, we can\
    \ integrate different data sources and collate evidence for the same disease\\nthat otherwise would not have been connected.\
    \ This also enables the exploration of associations\\nwith targets up or down the ontology hierarchy [for example,connecting\
    \ all targets related to small\\nbowel Crohn\\u2019s disease (CD) to immune system disease]. We work closely with other\
    \ EMBL-EBI\\nresources to develop the requirements for this systematic integration. This includes the expansion\\nof terms\
    \ in the EFO (26) and the development of specific data feeds or data formats from resources\\nsuch as EMBL-EBI\\u2019s\
    \ ChEMBL database (for drug label indications and clinical trial information)\\n(41, 42), the European Variation Archive\
    \ (for ClinVar annotations) (94), and the Expression Atlas\\nwww.annualreviews.org \\u2022 Open Targets\\u2019 Perspective\
    \ on Genetics\\n71\\n, .\\u2022\\u00b7\\u0005-\\nReview in Advance. Changes may\\nstill occur before final publication.\\\
    n\\nBD07_Art05_McDonagh\\nARjats.cls\\nMarch 13, 2024\\n12:34\\n(95). We are able to request focused curation for disease\
    \ areas of particular interest to our partners\\nand harness our scientific community to help review and provide feedback\
    \ to the resources. An\\nexample of this is Reactome\\u2019s in-depth curation of the autophagy pathway, chosen due to\
    \ its role\\nin Open Targets\\u2019 key therapeutic areas and the need for a comprehensive view of the mechanistic\\nrole\
    \ of proteins involved in the process and interaction with other pathways (96). Through the\\nOpen Targets consortium\
    \ community, we were able to harness expert review of the pathway and\\nprovide useful connections to Reactome through\
    \ the Open Targets Platform. Being embedded\\nwithin the Wellcome Sanger Institute, we have access to high-throughput\
    \ experimental platforms\\nas well as vital patient samples through close collaborations with clinical networks within\
    \ the Na-\\ntional Health Service England. This also provides the infrastructure to store, process, and analyze\\nsamples\
    \ safely.\"\n  },\n  {\n    \"name\": \"PARTNER AND COMMUNITY IMPACT\",\n    \"text\": \"The Open Targets consortium is\
    \ an innovative partnership between academia and industry fea-\\nturing continuous collaboration and knowledge exchange\
    \ between all partners. Academic partners\\ncontribute deep expertise and innovation in genetic and genomic research,\
    \ while industry partners\\nprovide an understanding of real-world applications and challenges faced in drug discovery\
    \ and\\ndevelopment. A robust and responsive feedback loop ensures strategic alignment and maximizes\\nimpact for industry\
    \ partners and the broader scientific community.\\nOpen Targets generates impact through several avenues. First, it supports\
    \ the collation of\\npublicly available data into large databases of harmonized datasets (e.g., through supporting the\\\
    ndevelopment of the summary statistic submission portal of the GWAS Catalog and establishing\\nthe eQTL Catalogue) (9,\
    \ 10, 27). This addresses a major gap in the scientific community in which\\nthe abundance of data available in the public\
    \ space is often dwarfed by the effort needed to process\\nand store the data in a format that enables broader use.\\\
    nSecond, Open Targets academics push the boundaries of science by developing novel exper-\\nimental and in silico approaches.\
    \ This is achieved through bespoke Open Targets projects that\\nare formulated jointly by all partners (Figure 1). These\
    \ projects leverage the unique capabil-\\nities of Open Targets, particularly the cutting-edge genomic and bioinformatic\
    \ capabilities of\\nthe Wellcome Sanger Institute and EMBL-EBI, and influence target discovery and validation\\nwork in\
    \ industry partners. Prepublication access to data and results from several Open Targets\\nprojects has been crucial for\
    \ specific drug discovery efforts. One of these projects generated a\\nlarge-scale scRNA-seq dataset from the terminal\
    \ ileum of CD patients. Uniquely, this study also\\nhas germline genotype data on these CD patients (15).In addition to\
    \ the in-depth analyses done by\\nthe project team, this allowed partners to do their own bespoke analyses, which included\
    \ running\\nadditional methods to integrate scRNA-seq with genetic data to further elucidate the mechanisms\\ncontributing\
    \ to IBD risk at the cellular level.\\nFinally, all insights are integrated into the comprehensive, open-access Open Targets\
    \ Platform,\\nwhich is extensively used in industry to facilitate more efficient decision-making, from the iden-\\ntification\
    \ of drug targets to the design of clinical studies (Figure 2). Efficient access to multiple\\nharmonized data sources\
    \ is an extremely valuable resource for target discovery and validation ef-\\nforts in the industry setting. Information\
    \ about a disease-relevant target is heterogeneous and\\noften spread across multiple databases, publications, and supplemental\
    \ materials. The complex\\nlandscape of data around a target is typically best captured through a multiview approach (97,\
    \ 98).\\nFor example, the data related to a target can include open, proprietary, and private data. Open\\nTargets, with\
    \ its various delivery modalities, including software, data, and projects, provides end-\\nto-end capabilities for understanding\
    \ the diverse aspects of a target and enables extensive content\\n72\\nMcDonagh et al.\\n, .\\u2022\\u00b7\\u0005-\\nReview\
    \ in Advance. Changes may\\nstill occur before final publication.\\n\\nBD07_Art05_McDonagh\\nARjats.cls\\nMarch 13, 2024\\\
    n12:34\\ncustomization,which brings the three streams of data classes into a unified view to offer a consider-\\nably\
    \ broader perspective on a target. As an example, Sanofi\\u2019s Precision Medicine & Computational\\nBiology function\
    \ has internalized both Open Targets Genetics and Open Targets Platform, incor-\\nporating them into end-to-end drug discovery\
    \ workflows. This includes integrating novel internal\\nalgorithms and creating custom views designed using internal datasets.While\
    \ there are other tools,\\nboth open source and proprietary, with similar functionality, the Open Targets knowledge feed-\\\
    nback loop is unique in that insights from the data directly impact further data generation efforts\\nwhose results feed\
    \ back into the Open Targets Platform. This knowledge loop creates an ever-\\nevolving ecosystem of information that improves\
    \ and refines industry partners\\u2019 ability not only\\nto link targets to diseases but also to decipher the mechanisms\
    \ by which specific perturbations\\ncontribute to disease etiologies.\\nAnother impactful use for the Open Targets Platform\
    \ is the rapid triage of a list of genes,\\nproteins, diseases, or pathways under a specific therapeutic hypothesis (Figure\
    \ 2). An example\\nof this is a case where a partner has a list of hundreds or even thousands of genes that are likely\\\
    ntractable because of their biochemical properties, predicted protein structure, or existing propri-\\netary chemical\
    \ matter. From this list, the goal is to identify a smaller set of genes causally linked to\\nhuman disease traits via\
    \ genetic or experimental perturbation. The Open Targets Platform allows\\nusers to efficiently prioritize targets for\
    \ a deeper informatics dive and/or appropriate experimental\\nfollow-up. Notably, the data in Open Targets also help to\
    \ build these deep dives (directionality\\nvia genetics, safety, animal model findings, existing drugs, supporting literature)\
    \ and experimen-\\ntal study designs (relevant cell types, disease relevant readouts). The approach for Open Targets\\\
    nGenetics and Open Targets Platform has been to ensure the open-source nature of both the data\\nand the software through\
    \ a CC0 Creative Commons license and to develop the tools and means\\nfor users with different skill sets and requirements\
    \ both across our partners and within the scien-\\ntific community to gain access. For example, simple searches for variants,\
    \ genes, traits, or drugs\\nof interest can be conducted through an intuitive user interface, and users with more complex\
    \ use\\ncases can query through the API or Google BigQuery or download the data.\"\n  },\n  {\n    \"name\": \"CHALLENGES\
    \ AND THE FUTURE\",\n    \"text\": \"The mission of Open Targets is to identify and prioritize therapeutic targets that\
    \ will translate into\\nsafe and effective medicines. Central to this mission is the use of human genetics and genomics\
    \ to\\ngenerate robust mechanistic hypotheses about the drivers of human disease. In the future, there-\\nfore, much of\
    \ Open Targets\\u2019 activity will continue, as now, to focus on teasing out the causal\\nthreads that connect the natural\
    \ experiments of genetic perturbation provided by human genetics\\nto the pharmaceutical perturbations that enable treatments,\
    \ preventions, and cures.\\nTo date, almost all analyses of natural experiments of genetic perturbation have concentrated\\\
    non disease risk, generally through the comparison of genotype frequencies between cases and con-\\ntrols. Yet most therapeutics\
    \ for the treatment of common, late-onset diseases are given to those\\nwith established disease: Rather than aiming to\
    \ halt the processes that lead to the initiation of dis-\\nease, the clinical goal is typically (where full restoration\
    \ of the premorbid state is not feasible) to\\narrest or slow progression. Until recently, the paucity of data on the\
    \ genetics of disease progression\\nhad sustained the assumption that the genetics of risk and progression are sufficiently\
    \ similar for\\nthe former to guide therapeutic strategies for the latter. Indeed, the evidence that targets enriched\\\
    nfor the genetics of risk are more likely to result in safe and effective medicines provides reassurance\\nin this regard\
    \ (6, 24, 85). However, as more longitudinal datasets have become available, examples\\nare emerging of marked divergence\
    \ in the genetics of risk and progression (99). To address this\\ndivergence, Open Targets will increasingly need to be\
    \ able to define and model disease as a process\\nwww.annualreviews.org \\u2022 Open Targets\\u2019 Perspective on Genetics\\\
    n73\\n, .\\u2022\\u00b7\\u0005-\\nReview in Advance. Changes may\\nstill occur before final publication.\\n\\nBD07_Art05_McDonagh\\\
    nARjats.cls\\nMarch 13, 2024\\n12:34\\nthrough time. By doing so, it will support the community\\u2019s need to adapt\
    \ to this emerging under-\\nstanding of the overlap and differences between the processes involved in disease initiation,\
    \ those\\ninvolved in progression, and therapeutic response, and use this knowledge to optimize the design\\nof effective\
    \ therapeutic strategies. As AI/ML approaches become increasingly available to explore\\npredictive genetic and molecular\
    \ biomarkers of disease risk and clinical outcome, this is a pivotal\\nand timely opportunity to expand the acquisition\
    \ of AI-ready data from clinical cohorts, enabling\\nthe concurrent collection of longitudinal molecular data encompassing\
    \ genetics, cell-specific mul-\\ntiomics with corresponding clinical information including symptoms, diagnostic laboratory\
    \ tests,\\ntreatments, response, and more.\\nThat most of the variants implicated by human genetic analysis of common\
    \ complex diseases\\nmap to regulatory sequence is now widely appreciated, but the challenge of connecting those\\nvariants\
    \ to their effector genes and pathophysiological mechanisms through which they exert their\\nimpact on disease (risk or\
    \ progression) remains. Open Targets will focus on addressing this using\\nfour complementary approaches.\\nFirst, the\
    \ rapid expansion of the corpus of genetic data, fueled by the interrogation of datasets\\nthat are larger, more diverse,\
    \ and feature richer clinical information and a more complete inven-\\ntory of genetic variation, will continue to add\
    \ layers of human genetic evidence. By integrating\\nthese data, Open Targets will refine appreciation of the relationship\
    \ between genetic variation and\\nphenotype, improving fine-mapping, revealing coding alleles that decipher effector gene\
    \ identi-\\nfication, and generating allelic series that provide confidence in effect direction and titration of\\neffect\
    \ magnitude (100). The shift to sequence-based discovery improves access to rare variants,\\nsome of them annotated as\
    \ having a major impact on gene function or expression. These high-\\nimpact variants also open up a path to representing\
    \ impactful negative evidence within Open\\nTargets (101). An obvious example of such evidence of the absence of genetic\
    \ effect would be the\\nfailure, despite adequate power, to detect an anticipated phenotypic signal attributable to a\
    \ loss-\\nof-function allele in a putative therapeutic target, an observation that casts serious doubt on the\\ncredibility\
    \ of that target.\\nSecond, the path to mechanistic inference around genetic associations (essentially efforts to\\nsolve\
    \ the variant-to-gene-to-function challenge) will increasingly run through integration with\\nrich multiomics datasets\
    \ generated from healthy and diseased tissues (including organoids) and\\nfrom engineered models (most obviously, iPSC-derived\
    \ cell lines). The increasing scale and\\nrange of single-cell datasets and the development of high-resolution spatial\
    \ profiling methods\\nwill increasingly power insights into the specific cell types and cell states through which associ-\\\
    nated genetic variants (collectively and individually) act. This information represents an essential\\ncomponent to the\
    \ generation of robust mechanistic hypotheses and ensures that downstream func-\\ntional work is performed in the relevant\
    \ cellular systems and models. Open Targets is well-placed\\nto act as a central resource for the integration of these\
    \ data, building on existing methods within\\nOpen Targets Genetics that power current L2G approaches. To date, most of\
    \ this integration has\\nbeen based on the overlay of genomic annotations onto genetic association datasets, but these\\\
    nindirect methods are increasingly being augmented by experimental approaches that provide di-\\nrect examination of the\
    \ impact of genetic variation on single-cell phenotypes. Examples include\\nlarge-scale single cell\\u2013eQTL generation\
    \ in peripheral blood mononuclear cells (44) and the devel-\\nopment of so-called village-in-a-dish strategies based on\
    \ pooled iPSC differentiation approaches\\n(102).\\nThird, while the integration of genetics and genomics is powerful,\
    \ it generally offers correla-\\ntive, rather than causal, inference about mechanism. For example, the accuracy of inference\
    \ based\\non the colocalization of a GWAS variant and a cis-eQTL signal is limited by rampant molecular\\npleiotropy (103,104)\
    \ and by the effects of the cell state.Perturbation studies in appropriate cellular\\n74\\nMcDonagh et al.\\n, .\\u2022\\\
    u00b7\\u0005-\\nReview in Advance. Changes may\\nstill occur before final publication.\\n\\nBD07_Art05_McDonagh\\nARjats.cls\\\
    nMarch 13, 2024\\n12:34\\nand model systems are now seen as an essential step in establishing the causal thread from variant\
    \ to\\ngene to disease, but this only works when they capture phenotypes that are relevant to the disease\\nin question\
    \ or, alternatively, collect high-content molecular or image-based data that can be mined\\nfor pertinent signatures of\
    \ the disease state. Open Targets is already undertaking several pertur-\\nbation screens in disease-relevant cellular\
    \ systems, but the time is right to invest for the project to\\nensure that these data, together with the growing corpus\
    \ of perturbation data being generated in\\nthe global research community, can be collated and cataloged in support of\
    \ robust causal inference.\\nUltimately the strongest mechanistic and therapeutic hypotheses will emerge when the evi-\\\
    ndence from human genetics, molecular and spatial profiling, and perturbation studies aligns in\\nestablishing the causal\
    \ contribution of a given target or pathway to the disease of interest. The core\\ncompetences of EMBL-EBI and Sanger\
    \ ensure that Open Targets is well positioned to build in-\\nference from these diverse data types as they increase in\
    \ scale, diversity, and complexity. Crucially,\\nrather than tackling the variant-to-gene-to-disease challenge one variant\
    \ at a time, inferential im-\\npact is most likely to emerge from approaches that model the biology of health and disease\
    \ on a\\ngenome-wide and systematic scale. Open Targets is already heavily invested in the development\\nof gene regulatory\
    \ and protein interaction networks and is increasingly focused on the opportu-\\nnities provided by more flexible approaches\
    \ to data integration and data-driven inference, such as\\nthose provided by knowledge graphs and large language models.\
    \ The architecture of Open Tar-\\ngets\\u2019 open-source platforms supports the expansion of data types, visuals, and\
    \ tooling to allow for\\nthe development of layering of multiple biological systems to provide users with the ability\
    \ to ex-\\nplore and discover new insights across this wealth of data. In addition, the corpus of external and\\ninternal\
    \ data accessible to Open Targets, ranging from the text of published papers and preprints,\\npopulation-scale genetics\
    \ and real-world data from biobanks, and atlases of single-cell expression\\nin health and disease to genome-scale perturbation\
    \ and beyond, opens the door to efforts to gen-\\nerate rich foundational models that, over time, will evolve into a systematic,\
    \ robust, and predictive\\ndescription of the biology of health and disease.\\nAs we learn more about disease pathophysiology,\
    \ the number of processes causally contributing\\nto the risk and/or progression of any given disease (especially multifactorial\
    \ disease) is set to grow,\\nand with it the number of putative targets. Here, we define putative targets as any gene\
    \ that has\\nbeen mapped into one of those processes and for which it is reasonable to assume that perturbation\\nof function\
    \ or expression could have a material effect on disease. The time and effort required\\nto undertake detailed follow-up\
    \ of each such putative target place a massive premium on careful\\ntarget prioritization. In part, that prioritization\
    \ will be driven by the strength of the causal biology,\\nbut it also needs to take account of other factors that contribute\
    \ to the likelihood that a given target\\ncan be translated into a safe and effective medicine.\\nThese include factors\
    \ that relate to safety: What is the evidence, from human genetics, from\\nperturbation studies in cellular systems and\
    \ preclinical models, from tissue expression profiles,\\nfrom biological knowledge, and from experience with related drugs,\
    \ that the target can be safely\\nperturbed by therapeutics? They include factors related to druggability and tractability:\
    \ How\\nlikely is it that the target will be amenable to perturbation with small molecules, antibodies, or the\\ngrowing\
    \ panoply of available therapeutic modalities? How many of the tools (chemical probes,\\nassays, cellular and animal models)\
    \ required to advance a drug discovery program are already\\nin place? They also include factors related to biomarker\
    \ availability: How much do we know\\nabout the downstream biology that would make it possible to develop the biomarkers\
    \ of target\\nengagement or clinical benefit that are essential elements for drug development?\\nAbove and beyond these\
    \ target-related considerations, there are questions concerning the clin-\\nical impact of a given drug development program\
    \ that influence decision-making. How novel is\\nthe therapeutic hypothesis? How many other programs are targeting the\
    \ same mechanism? What\\nwww.annualreviews.org \\u2022 Open Targets\\u2019 Perspective on Genetics\\n75\\n, .\\u2022\\\
    u00b7\\u0005-\\nReview in Advance. Changes may\\nstill occur before final publication.\\n\\nBD07_Art05_McDonagh\\nARjats.cls\\\
    nMarch 13, 2024\\n12:34\\nis the unmet clinical need in the patient population? To what extent could stratification of\
    \ the\\npatient population (e.g., into disease subtypes or on the basis of polygenic risk) expose subsets for\\nwhom the\
    \ proposed therapeutic could be particularly valuable?\\nThe ongoing challenge is to make possible the systematic and\
    \ comprehensive integration of\\nthese disparate data types to inform decisions about the targets, the pathways, the indications,\
    \ and\\nthe patient populations that will maximize therapeutic success and clinical benefit. One obvious\\nopportunity\
    \ involves target prioritization within a causal pathway of interest. In situations where a\\ntarget first revealed through\
    \ human genetics proves problematic because of safety concerns arising\\nfrom broad expression and/or tractability challenges,\
    \ the systematic exploration of other targets\\nin the biological vicinity of that original target may lead to alternative\
    \ therapeutic strategies with\\na higher probability of success. Open Targets is uniquely positioned to assemble data\
    \ that capture\\nall of these dimensions, and more, and thereby to support pharmaceutical companies in making\\nmore informed\
    \ and successful decisions about the targets they pursue.\"\n  },\n  {\n    \"name\": \"DISCLOSURE STATEMENT\",\n    \"\
