[settings]
profile = black
multi_line_output = 3
line_length = 119
known_first_party = cyto_assist
known_third_party = torch,torchvision,numpy,pandas,scipy,matplotlib,seaborn,plotly
known_scientific = anndata,scanpy,sklearn
skip_glob = 
    scratch/**
experiments/**/logs/**
    experiments/**/results/**
    experiments/**/checkpoints/**
    experiments/**/data/**
repos/**
    .git/**
    .mypy_cache/**
    .pytest_cache/**
    .ruff_cache/**
    .nox/**
    .venv/**
    venv/**
    build/**
    dist/**
